name: 📰 Daily News Digest

# Single run at 9 PM IST every night.
# A separate morning_notify job runs at 9 AM IST the next day
# to send a Telegram message with the digest link.
#
# ── Minutes budget ────────────────────────────────────────────────────────────
# 1 run/day × 31 days = 31 runs/month
# Each full run (download + extract + build + deploy): ~20-25 min
# Morning notify job (just sends a message): ~1 min
# Monthly: ~(25 × 31) + (1 × 31) = 806 min/month  ✅  (well within 1200/day spare)

on:
  schedule:
    - cron: '30 15 * * *'   # 21:00 IST = 15:30 UTC  ← nightly digest run
    - cron: '30 3 * * *'    # 09:00 IST = 03:30 UTC  ← morning link notification
  workflow_dispatch:
    inputs:
      note:
        description: 'Optional note (e.g. "manual trigger")'
        required: false
        default: ''

permissions:
  contents: write
  pages: write
  id-token: write

jobs:

  # ── Nightly digest job (runs at 9 PM IST) ───────────────────────────────────
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 15 * * *'

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🔑 Restore Telegram session
        run: |
          echo "${{ secrets.TELEGRAM_SESSION }}" | base64 -d > news_session.session
          echo "Session restored: $(wc -c < news_session.session) bytes"

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: 📦 Install Python dependencies
        run: pip install -r requirements.txt

      - name: 🛠 Install system dependencies (OCR)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y poppler-utils tesseract-ocr libtesseract-dev

      - name: 🤖 Run digest pipeline
        env:
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_API_ID:   ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          NOTIFY_BOT_TOKEN:  ${{ secrets.NOTIFY_BOT_TOKEN }}
          NOTIFY_CHAT_ID:    ${{ secrets.NOTIFY_CHAT_ID }}
          SITE_URL:          ${{ secrets.SITE_URL }}
          MORNING_NOTIFY:    "false"   # suppress notification at build time; morning job handles it
        run: python3 digest.py

      - name: 💾 Commit site files + state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/digest.json docs/digest_state.json
          git diff --staged --quiet || git commit -m "📰 Digest update: $(TZ='Asia/Kolkata' date +'%d %b %Y %H:%M IST')"
          git push

      - name: 📤 Upload docs/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: 🚀 Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment

      - name: 📤 Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: digest-logs
          path: "*.log"
          retention-days: 3

  # ── Morning notification job (runs at 9 AM IST) ─────────────────────────────
  morning_notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.schedule == '30 3 * * *'

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install minimal dependencies
        run: pip install requests

      - name: 📬 Send morning digest link
        env:
          NOTIFY_BOT_TOKEN: ${{ secrets.NOTIFY_BOT_TOKEN }}
          NOTIFY_CHAT_ID:   ${{ secrets.NOTIFY_CHAT_ID }}
          SITE_URL:         ${{ secrets.SITE_URL }}
        run: python3 morning_notify.py
