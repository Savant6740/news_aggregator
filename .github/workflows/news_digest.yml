name: 📰 Daily News Digest

# Digest runs at 8 AM IST every morning (papers are posted to Telegram overnight).
# A morning_notify job runs at 9 AM IST (after the digest finishes) to send the link.
#
# ── Speed optimisations ───────────────────────────────────────────────────────
# • Gemini extraction runs in parallel (up to 5 papers at once, within 5 RPM limit)
# • PDF downloads from Telegram run concurrently via asyncio.gather()
# • Tesseract / pytesseract removed — image PDFs go directly to Gemini Vision
# • pip dependencies cached between runs
#
# ── Minutes budget ────────────────────────────────────────────────────────────
# 1 run/day × 31 days = 31 runs/month
# Each full run (download + extract + build + deploy): ~15-20 min
# Morning notify job (just sends a message): ~1 min
# Monthly: ~(20 × 31) + (1 × 31) = 651 min/month  ✅  (well within free tier)

on:
  schedule:
    - cron: '30 2 * * *'    # 08:00 IST = 02:30 UTC  ← morning digest run
    - cron: '30 3 * * *'    # 09:00 IST = 03:30 UTC  ← morning link notification
  workflow_dispatch:
    inputs:
      note:
        description: 'Optional note (e.g. "manual trigger")'
        required: false
        default: ''
      force_reset:
        description: 'Clear state and re-download all papers (yes/no)'
        required: false
        default: 'no'
      target_date:
        description: 'Override date to fetch (YYYY-MM-DD). Leave blank for today.'
        required: false
        default: ''

permissions:
  contents: write
  pages: write
  id-token: write

jobs:

  # ── Nightly digest job (runs at 9 PM IST) ───────────────────────────────────
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 2 * * *'

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🔑 Restore Telegram session
        run: |
          echo "${{ secrets.TELEGRAM_SESSION }}" | base64 -d > news_session.session
          echo "Session restored: $(wc -c < news_session.session) bytes"

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: 📦 Install Python dependencies
        run: pip install -r requirements.txt

      - name: 🛠 Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y poppler-utils

      - name: 🤖 Run digest pipeline
        env:
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_API_ID:   ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          NOTIFY_BOT_TOKEN:  ${{ secrets.NOTIFY_BOT_TOKEN }}
          NOTIFY_CHAT_ID:    ${{ secrets.NOTIFY_CHAT_ID }}
          SITE_URL:          ${{ secrets.SITE_URL }}
          MORNING_NOTIFY:    "false"
          FORCE_RESET:       ${{ github.event.inputs.force_reset || 'no' }}
          TARGET_DATE:       ${{ github.event.inputs.target_date || '' }}
        run: python3 digest.py

      - name: 💾 Commit site files + state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/digest.json docs/digest_state.json
          git diff --staged --quiet || git commit -m "📰 Digest update: $(TZ='Asia/Kolkata' date +'%d %b %Y %H:%M IST')"
          git push

      - name: 📤 Upload docs/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: 🚀 Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment

      - name: 📤 Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: digest-logs
          path: "*.log"
          retention-days: 3

  # ── Morning notification job (runs at 9 AM IST) ─────────────────────────────
  morning_notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.schedule == '30 3 * * *'

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install minimal dependencies
        run: pip install requests

      - name: 📬 Send morning digest link
        env:
          NOTIFY_BOT_TOKEN: ${{ secrets.NOTIFY_BOT_TOKEN }}
          NOTIFY_CHAT_ID:   ${{ secrets.NOTIFY_CHAT_ID }}
          SITE_URL:         ${{ secrets.SITE_URL }}
        run: python3 morning_notify.py
