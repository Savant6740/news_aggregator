name: 📰 Daily News Digest

# ── Schedule ──────────────────────────────────────────────────────────────────
# 08:00 IST  Digest pipeline (download, extract, dedup, build, deploy)
#              └─ Batch 1 notifications fire immediately inside generate_site.py
# 09:00 IST  Morning Telegram summary notification
# 08:00 IST  Batch 2 — 1:30 PM IST  = 08:00 UTC
# 11:00 IST  Batch 3 — 4:30 PM IST  = 11:00 UTC
# 14:00 IST  Batch 4 — 7:30 PM IST  = 14:00 UTC
#
# ── Minutes budget ────────────────────────────────────────────────────────────
# Digest:              ~20 min × 31       = 620  min
# Morning notify:      ~1  min × 31       =  31  min
# Notify dispatcher:   ~1  min ×  3 × 31  =  93  min
# Total:                                    744  min/month ✅ (<2,000 free tier)

on:
  schedule:
    - cron: '30 2 * * *'   # 08:00 IST = 02:30 UTC  ← digest (fires Batch 1 internally)
    - cron: '30 3 * * *'   # 09:00 IST = 03:30 UTC  ← morning Telegram link
    - cron: '0 8 * * *'    # 1:30 PM IST = 08:00 UTC  ← Batch 2
    - cron: '0 11 * * *'   # 4:30 PM IST = 11:00 UTC  ← Batch 3
    - cron: '0 14 * * *'   # 7:30 PM IST = 14:00 UTC  ← Batch 4
  workflow_dispatch:
    inputs:
      note:
        description: 'Optional note (e.g. "manual trigger")'
        required: false
        default: ''
      force_reset:
        description: 'Clear state and re-download all papers (yes/no)'
        required: false
        default: 'no'
      target_date:
        description: 'Override date to fetch (YYYY-MM-DD). Leave blank for today.'
        required: false
        default: ''

permissions:
  contents: write
  pages: write
  id-token: write

jobs:

  # ── Digest ───────────────────────────────────────────────────────────────────
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 2 * * *'

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🔑 Restore Telegram session
        run: |
          echo "${{ secrets.TELEGRAM_SESSION }}" | base64 -d > news_session.session
          echo "Session restored: $(wc -c < news_session.session) bytes"

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: 📦 Install Python dependencies
        run: pip install -r requirements.txt

      - name: 🛠 Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y poppler-utils

      - name: 🧹 Clear PDFs from previous day
        run: |
          LAST_DATE=$(python3 - <<'PYEOF'
          import json, sys
          try:
              d = json.load(open("docs/digest_state.json"))
              print(d.get("date", ""))
          except Exception:
              print("")
          PYEOF
          )
          TODAY=$(TZ='Asia/Kolkata' date +'%Y-%m-%d')
          echo "State date : ${LAST_DATE:-<none>}"
          echo "Today (IST): $TODAY"
          if [ -z "$LAST_DATE" ] || [ "$LAST_DATE" != "$TODAY" ]; then
            echo "New day — clearing docs/pdfs/"
            rm -rf docs/pdfs/
          else
            echo "Same-day re-run — keeping docs/pdfs/ intact"
          fi

      - name: 🤖 Run digest pipeline
        env:
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_API_ID:   ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          NOTIFY_BOT_TOKEN:  ${{ secrets.NOTIFY_BOT_TOKEN }}
          NOTIFY_CHAT_ID:    ${{ secrets.NOTIFY_CHAT_ID }}
          SITE_URL:          ${{ secrets.SITE_URL }}
          NTFY_TOPIC:        ${{ secrets.NTFY_TOPIC }}   # ← needed for Batch 1
          MORNING_NOTIFY:    "false"
          FORCE_RESET:       ${{ github.event.inputs.force_reset || 'no' }}
          TARGET_DATE:       ${{ github.event.inputs.target_date || '' }}
        run: python3 digest.py

      - name: 💾 Commit site + state + PDFs + sent log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config http.postBuffer 524288000

          git rm -r --cached docs/pdfs/ --ignore-unmatch -q 2>/dev/null || true

          git add docs/index.html docs/digest.json docs/digest_state.json
          git add docs/.sent_today.json || true         # include Batch 1 sent log
          [ -d docs/pdfs ] && git add docs/pdfs/ || true
          git diff --staged --quiet || git commit -m "📰 Digest update: $(TZ='Asia/Kolkata' date +'%d %b %Y %H:%M IST')"
          git push

      - name: 📤 Upload docs/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: 🚀 Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment

      - name: 📤 Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: digest-logs
          path: "*.log"
          retention-days: 3

  # ── Morning Telegram link (09:00 IST) ────────────────────────────────────────
  morning_notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.schedule == '30 3 * * *'

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install minimal dependencies
        run: pip install requests

      - name: 📬 Send morning digest link
        env:
          NOTIFY_BOT_TOKEN: ${{ secrets.NOTIFY_BOT_TOKEN }}
          NOTIFY_CHAT_ID:   ${{ secrets.NOTIFY_CHAT_ID }}
          SITE_URL:         ${{ secrets.SITE_URL }}
        run: python3 morning_notify.py

  # ── Push notification batches (Batch 2 / 3 / 4) ──────────────────────────────
  #
  # Batch 1 fires inside the digest job via generate_site.py → notify_scheduler.py --batch 1
  #
  # Algorithm:
  #   1. Reads docs/digest.json (committed by digest job)
  #   2. Splits articles into 4 equal batches drawn round-robin across categories
  #   3. BATCH_NUM env var tells notify_scheduler.py exactly which batch to send
  #      (no clock inference needed — immune to GitHub Actions schedule delays)
  #   4. Sends that batch; skips articles already in docs/.sent_today.json
  #   5. Commits the updated sent log [skip ci]
  #
  # Schedule:
  #   Batch 2 — 1:30 PM IST  (08:00 UTC)
  #   Batch 3 — 4:30 PM IST  (11:00 UTC)
  #   Batch 4 — 7:30 PM IST  (14:00 UTC)
  #
  notify_dispatcher:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >
      github.event.schedule == '0 8 * * *' ||
      github.event.schedule == '0 11 * * *' ||
      github.event.schedule == '0 14 * * *'

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📲 Send batch notifications
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          SITE_URL:   ${{ secrets.SITE_URL }}
          BATCH_NUM: >-
            ${{ github.event.schedule == '0 8 * * *'  && '2' ||
                github.event.schedule == '0 11 * * *' && '3' ||
                github.event.schedule == '0 14 * * *' && '4' || '' }}
        run: python3 notify_scheduler.py

      - name: 💾 Commit sent log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/.sent_today.json
          git diff --staged --quiet || git commit -m "chore: update sent log [skip ci]"
          git push
