name: 📰 Daily News Digest

# ── Schedule ──────────────────────────────────────────────────────────────────
# 08:00 IST  Digest pipeline (download, extract, dedup, build, deploy)
# 09:00 IST  Morning Telegram summary notification
# 09:00–22:00 IST  Inshorts-style push notifications every 30 min via ntfy.sh
#
# ── Minutes budget ────────────────────────────────────────────────────────────
# Digest:              ~20 min × 31       = 620  min
# Morning notify:      ~1  min × 31       =  31  min
# Notify dispatcher:   ~1  min × 26 × 31  = 806  min
# Total:                                   1,457 min/month ✅ (<2,000 free tier)

on:
  schedule:
    - cron: '30 2 * * *'      # 08:00 IST = 02:30 UTC  ← digest
    - cron: '30 3 * * *'      # 09:00 IST = 03:30 UTC  ← morning Telegram link
    - cron: '*/5 3-17 * * *'  # Every 5 minutes (GitHub minimum)
  workflow_dispatch:
    inputs:
      note:
        description: 'Optional note (e.g. "manual trigger")'
        required: false
        default: ''
      force_reset:
        description: 'Clear state and re-download all papers (yes/no)'
        required: false
        default: 'no'
      target_date:
        description: 'Override date to fetch (YYYY-MM-DD). Leave blank for today.'
        required: false
        default: ''

permissions:
  contents: write
  pages: write
  id-token: write

jobs:

  # ── Digest ───────────────────────────────────────────────────────────────────
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 2 * * *'

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🔑 Restore Telegram session
        run: |
          echo "${{ secrets.TELEGRAM_SESSION }}" | base64 -d > news_session.session
          echo "Session restored: $(wc -c < news_session.session) bytes"

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: 📦 Install Python dependencies
        run: pip install -r requirements.txt

      - name: 🛠 Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y poppler-utils

      - name: 🤖 Run digest pipeline
        env:
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_API_ID:   ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          NOTIFY_BOT_TOKEN:  ${{ secrets.NOTIFY_BOT_TOKEN }}
          NOTIFY_CHAT_ID:    ${{ secrets.NOTIFY_CHAT_ID }}
          SITE_URL:          ${{ secrets.SITE_URL }}
          MORNING_NOTIFY:    "false"
          FORCE_RESET:       ${{ github.event.inputs.force_reset || 'no' }}
          TARGET_DATE:       ${{ github.event.inputs.target_date || '' }}
        run: python3 digest.py

      - name: 💾 Commit site files + state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/digest.json docs/digest_state.json
          git diff --staged --quiet || git commit -m "📰 Digest update: $(TZ='Asia/Kolkata' date +'%d %b %Y %H:%M IST')"
          git push

      - name: 📤 Upload docs/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: 🚀 Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment

      - name: 📤 Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: digest-logs
          path: "*.log"
          retention-days: 3

  # ── Morning Telegram link (09:00 IST) ────────────────────────────────────────
  morning_notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.schedule == '30 3 * * *'

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install minimal dependencies
        run: pip install requests

      - name: 📬 Send morning digest link
        env:
          NOTIFY_BOT_TOKEN: ${{ secrets.NOTIFY_BOT_TOKEN }}
          NOTIFY_CHAT_ID:   ${{ secrets.NOTIFY_CHAT_ID }}
          SITE_URL:         ${{ secrets.SITE_URL }}
        run: python3 morning_notify.py

  # ── Push notification dispatcher (every 30 min, 08:30–22:30 IST) ─────────────
  #
  # Algorithm:
  #   1. Reads docs/digest.json (committed by digest job)
  #   2. Sorts articles round-robin across categories (Politics→Economy→India→…)
  #   3. Assigns each a deterministic send_at time spread from 09:00→22:00 IST
  #   4. Sends only the article(s) whose window falls in [now-35min, now+5min]
  #
  # Android notification UX:
  #   ▸ Collapsed bar:    HEADLINE
  #   ▸ Expanded (swipe): category emoji + full SUMMARY (up to 400 chars)
  #   ▸ Tap:              opens the Telegram PDF at the article page
  #
  # One-time setup:
  #   1. Choose a secret topic, e.g. "prajay-dailybrief-xyz"
  #   2. Add NTFY_TOPIC as a GitHub Secret
  #   3. Install ntfy app on Android → Subscribe → enter your topic name
  notify_dispatcher:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: github.event.schedule == '0,30 3-16 * * *'

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📲 Send due article notifications
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python3 notify_scheduler.py
