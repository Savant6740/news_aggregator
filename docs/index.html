luru 01-05.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122240"}, {"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/122244"}], "importance": 7, "article_id": "d2ca10f4"}, {"headline": "Amazon Now Reports 25 Percent Monthly Order Growth in India", "summary": "Amazon’s quick delivery service, Amazon Now, is seeing a 25% month-on-month growth in order volumes in India. CEO Andy Jassy noted that Prime members triple their shopping frequency after using the 30-minute delivery service. Amazon is investing over ₹2,800 crore to expand its logistics network in India, targeting a presence in 100 cities with 1,000 micro-fulfilment centres.", "category": "Business", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/122240"}, {"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/122212"}, {"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/122265"}], "importance": 6, "article_id": "c097e32f"}, {"headline": "BSNL Targets 150 Rupee ARPU Despite Stagnant Core Revenue Concerns", "summary": "Bharat Sanchar Nigam Ltd (BSNL) aims to increase its average revenue per user (ARPU) to ₹150 in FY27, up from ₹101 in FY26. However, analysts express concern over stagnant core cellular revenue and suggest the previous ARPU jump might reflect a shrinking active subscriber base rather than higher spending. The company is banking on its 4G rollout to drive future data consumption.", "category": "Business", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/122240"}, {"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/122244"}], "importance": 6, "article_id": "156a2d2a"}, {"headline": "Iran Vows to Safeguard Nuclear Capabilities Amid US Naval Blockade", "summary": "Iran’s Supreme Leader Ayatollah Mojtaba Khamenei stated that the Islamic Republic will protect its nuclear and missile assets as national priorities. The remarks come as a US Navy blockade of Iranian oil tankers squeezes Tehran's economy and crude prices hit $126. Iran continues its control over the Strait of Hormuz, charging ships high fees for passage during the fragile ceasefire.", "category": "World", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122240"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122186"}], "importance": 9, "article_id": "36c7e8bf"}, {"headline": "US Proposes New Maritime Coalition to Restore Strait of Hormuz Traffic", "summary": "The Trump administration is pitching a 'Maritime Freedom Construct' to allies to restart commercial traffic through the Strait of Hormuz. The coalition would share real-time intelligence and coordinate diplomatic sanctions to impose costs on Iranian obstruction. The move follows President Trump’s demands that European allies take more responsibility for protecting energy supply lines.", "category": "World", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122240"}, {"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122244"}], "importance": 8, "article_id": "6ed3f290"}, {"headline": "Delhi High Court Orders Status Quo on Late Sunjay Kapur Assets", "summary": "The Delhi High Court has directed Priya Kapur, widow of late industrialist Sunjay Kapur, to preserve his assets and refrain from creating third-party rights. The order follows a suit by Kapur's children from his marriage to actor Karisma Kapoor, who challenge a will that allegedly leaves the entire estate to Priya. The court ruled that assets must be protected pending a trial on the will.", "category": "Law", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/122240"}, {"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122244"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/122186"}, {"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122265"}], "importance": 7, "article_id": "1874be0b"}, {"headline": "Adani Enterprises Reports Q4 Loss as Expansion Costs Surge", "summary": "Adani Group's flagship, Adani Enterprises Ltd, reported a net loss of ₹220 crore for Q4, compared to a profit of ₹3,850 crore a year earlier. While revenue rose 20% to ₹32,440 crore, total costs jumped 23% due to significant investments in copper assets and airport expansions. The company also approved raising up to ₹15,000 crore through share sales.", "category": "Business", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/122240"}, {"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/122244"}, {"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122212"}], "importance": 7, "article_id": "f26014d3"}, {"headline": "Federal Bank acquires Standard Chartered's retail credit card portfolio", "summary": "Federal Bank announced acquiring Standard Chartered Bank's retail credit card portfolio in India, part of its strategy to expand its presence in major cities. The deal, estimated between ₹1,500 crore and ₹2,000 crore, follows Standard Chartered's shift from single-product relationships to deeper, multi-pocket customer engagement. Federal Bank has aggressively grown its card base, adding over 1 million cards in FY26.", "category": "Business", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/122240"}, {"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122216"}, {"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/122244"}, {"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122212"}, {"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_01-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/122231"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/122186"}], "importance": 8, "article_id": "fe10310b"}, {"headline": "India diversifies crude oil sources to Venezuela, Brazil", "summary": "Amidst West Asia supply disruptions, Indian refiners are shifting crude oil procurement strategies. Venezuela and Brazil have emerged among India's top five suppliers in April, replacing Iraq and the US. Iraq, traditionally India's second-largest supplier, is now at zero due to the closure of the Strait of Hormuz, impacting 20% of global oil traffic.", "category": "Economy", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122216"}], "importance": 7, "article_id": "68863348"}, {"headline": "Tata Power unit to invest ₹6,500 cr in PV ingot & wafer plant", "summary": "Tata Power's subsidiary will establish a photo-voltaic (PV) ingot and wafer manufacturing plant with a 10 GW capacity in two phases, investing ₹6,500 crore. The plant will use pure silicon technology, reducing reliance on raw material imports. This backward integration aligns with India's renewable energy goals.", "category": "Business", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122216"}, {"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122212"}], "importance": 7, "article_id": "158e3e76"}, {"headline": "Adani Ports & SEZ Q4 net profit rises 9.4% to ₹3,308 cr", "summary": "Adani Ports and Special Economic Zone (APSEZ) reported a 9.43% increase in consolidated net profit to ₹3,308.30 crore for Q4 FY26. Total income rose to ₹11,489.45 crore. The board recommended a dividend of ₹1.50 per share for FY26, alongside a special dividend of ₹0.20 per share.", "category": "Business", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122216"}, {"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/122244"}], "importance": 6, "article_id": "9bb73d84"}, {"headline": "Renault to restructure India operations, separate powertrain business", "summary": "French carmaker Renault plans to restructure its India operations by separating powertrain manufacturing into a distinct entity, while vehicle manufacturing and sales will be under an integrated structure. The company has sought NCLT approval for the proposed changes, aiming for clearer and more focused operational structures, potentially re-introducing its popular SUV 'Duster'.", "category": "Business", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122216"}, {"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122212"}], "importance": 5, "article_id": "86bc8539"}, {"headline": "Union MF launches long-short equity SIF under Arthaya", "summary": "Union Mutual Fund launched its first long-short equity Specialised Investment Fund (SIF) under Arthaya, offering investors a dynamic approach to generate returns across market cycles and manage downside risk by combining long equity positions with selective short exposures via derivatives.", "category": "Business", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122216"}, {"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122212"}], "importance": 4, "article_id": "1bb2e3af"}, {"headline": "SEBI introduces fast-track system for AIF scheme processing", "summary": "SEBI has launched a fast-track system for processing Private Placement Memorandums (PPMs) for Alternative Investment Funds (AIFs), excluding Large Value Funds (LVFs). AIFs can now launch schemes and distribute PPMs 30 days after submitting their application to SEBI. This aims to reduce timelines and facilitate faster capital deployment, with merchant bankers and AIF managers responsible for disclosure completeness.", "category": "Business", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122216"}, {"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122212"}], "importance": 6, "article_id": "097ca7b5"}, {"headline": "India's fertiliser production stable despite West Asia crisis", "summary": "India's fertiliser production remained stable in March-April, reaching 37 lakh tonnes, comparable to last year. The government dismissed fears of urea production cuts due to the West Asia crisis and ensured 37 lakh tonnes of urea imports before the Kharif season, maintaining an overall availability of 78 lakh tonnes.", "category": "Economy", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122216"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/122186"}], "importance": 5, "article_id": "6567eea4"}, {"headline": "CISCE declares 10th, 12th results: Girls outperform boys", "summary": "The Council for Indian School Certificate Examinations (CISCE) announced Class 10th and 12th results on Thursday, with 99.18% passing in 10th and 99.13% in 12th. Girls outperformed boys in both exams: 99.46% of girls and 98.93% of boys passed ICSE (10th), while 99.48% of girls and 98.81% of boys passed ISC (12th).", "category": "Education", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/122216"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/122186"}], "importance": 5, "article_id": "d271e3c1"}, {"headline": "India to notify FDI norms for China-linked companies soon", "summary": "India will soon notify a framework for time-bound approvals of investments from companies with limited Chinese ownership in seven key sectors. The new norms aim to process around 600 pending applications, boosting domestic capacity and FDI.", "category": "Economy", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122244"}], "importance": 8, "article_id": "99a7971d"}, {"headline": "SC rejects AIIMS plea to reopen minor's abortion case", "summary": "The Supreme Court declined to reopen a curative plea by AIIMS to reconsider its order allowing a 28-week abortion for a 15-year-old, stressing that reproductive choice rests with the individual, not the State or medical institutions. AIIMS will proceed with termination.", "category": "Law", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122244"}], "importance": 9, "article_id": "399eeea0"}, {"headline": "Amit Shah to attend first international Buddha relics exposition in Ladakh", "summary": "Union Home Minister Amit Shah, on his first visit to Leh since protests over Statehood demands, will attend the first international exposition of Lord Buddha's holy relics. The relics will be publicly displayed across Leh and Zanskar. Ladakh's L-G and BJP leaders welcomed his visit, linking it to the region's development.", "category": "India", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122244"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/122186"}], "importance": 7, "article_id": "73c2022b"}, {"headline": "I-PAC director gets bail in PMLA case", "summary": "A Delhi court granted bail to Vinesh Chandel, director of I-PAC, in a money laundering case linked to alleged coal smuggling in Bengal. The ED did not oppose his plea, citing his \"voluntary\" cooperation. Conditions include not leaving India without permission and cooperating with the probe.", "category": "Law", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122244"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/122186"}, {"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122265"}], "importance": 6, "article_id": "8c55b5c1"}, {"headline": "3 children drown in golf course pond at DDA site in Dwarka; probe ordered", "summary": "Three children, Ravi Jaiswal (8), Veer Jaiswal (10), and Harsh (11), drowned in an under-construction DDA golf course pond in Dwarka. The brothers had left home after an argument with parents, and their friend Harsh joined them. Their clothes were found outside the pond, suggesting they entered to bathe. DDA formed a three-member committee to probe the incident.", "category": "India", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122244"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122186"}], "importance": 5, "article_id": "6d97db78"}, {"headline": "Tourist boat capsizes in Jabalpur, 4 dead, 17 missing", "summary": "A MP tourism cruise boat carrying 43 people capsized in Jabalpur's Bargi Dam during a sudden windstorm, leaving four dead and 17 missing; 22 rescued. Officials reported wind speeds surged to 60-70kmph. Survivors alleged life jackets were distributed only after the vessel started sinking.", "category": "India", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122244"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/122186"}, {"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122265"}], "importance": 6, "article_id": "ed7b56c6"}, {"headline": "Bulandshahr triple murder prime suspect killed in encounter", "summary": "A 33-year-old man, prime suspect in the killing of three family members at a UP birthday party, was killed in a police encounter in Khurja. The incident stemmed from cake smearing; two police personnel were injured.", "category": "India", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122244"}], "importance": 5, "article_id": "e83a3519"}, {"headline": "Car catches fire on expressway in Rajasthan, five burnt alive", "summary": "Five members of a family were burnt alive, and the driver seriously injured, after their car caught fire on the Delhi-Mumbai Expressway in Rajasthan's Alwar district. The incident occurred as they returned from a Vaishno Devi pilgrimage. The car was completely gutted.", "category": "India", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122244"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122186"}], "importance": 5, "article_id": "b506976e"}, {"headline": "Tigress, four cubs die at Kanha Tiger Reserve; CDV suspected", "summary": "A tigress and her four cubs died in Madhya Pradesh’s Kanha Tiger Reserve over two weeks, with a lung infection confirmed in one cub and Canine Distemper Virus (CDV) suspected. Wildlife officials launched an investigation, taking preventive measures to curb the virus's spread after 27 tiger deaths in the State in 2026.", "category": "Environment", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122244"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/122186"}], "importance": 7, "article_id": "02ffb2dc"}, {"headline": "Raids at factory of RS MP an act of ‘political vendetta’: Punjab BJP", "summary": "The Punjab BJP alleged that a raid by the Punjab Pollution Control Board at MP Rajinder Gupta’s Trident Group factory was \"political vendetta\" by the AAP government. This comes after Mr. Gupta and six other Rajya Sabha MPs defected to the BJP.", "category": "Politics", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122244"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122186"}], "importance": 4, "article_id": "2100edf8"}, {"headline": "CISCE Class 10, 12 pass percentages rise marginally", "summary": "The Council for the Indian School Certificate Examinations (CISCE) declared Class 10 and 12 results for 2026, showing a marginal rise in pass percentages to 99.18% (Class 10) and 99.13% (Class 12) from last year.", "category": "Education", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122244"}], "importance": 5, "article_id": "ee2fe177"}, {"headline": "Monkey on runway disrupts 2 flights in Lucknow", "summary": "An IndiGo flight narrowly avoided collision with a monkey on the runway at Lucknow airport, aborting take-off. An Air India Express flight was also forced to circle. This was the first time operations were disrupted due to a monkey, believed to have come from a nearby mango orchard.", "category": "India", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122244"}, {"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122265"}], "importance": 3, "article_id": "a51b083b"}, {"headline": "Global markets react to two months of Iran war", "summary": "Two months into the US-Israel war with Iran, global markets show substantial impact. Oil prices spiked, bond yields rose due to inflation fears, and equity markets reacted unevenly, with India feeling direct crude pain and the rupee weakening.", "category": "Economy", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122244"}, {"newspaper": "Indian Express", "pdf_filename": "IE Delhi 01-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122177"}], "importance": 8, "article_id": "491a10ec"}, {"headline": "CCI overstepping judicial authority, Apple argues in antitrust case", "summary": "Apple has accused India's Competition Commission (CCI) of overstepping its authority by demanding financial information in an antitrust case, arguing the watchdog should await the outcome of Apple's challenge to India's penalty calculation law. CCI seeks the data to calculate potential fines of up to $38 billion.", "category": "Law", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122244"}, {"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/122212"}], "importance": 7, "article_id": "a8fd0201"}, {"headline": "Kharge rejects talk of Karnataka power shift", "summary": "Congress president Mallikarjun Kharge dismissed speculation about a leadership change in Karnataka, stating the party would resolve any perceived issue at an appropriate time. He downplayed calls projecting him as a Chief Minister face, emphasizing that Sonia Gandhi makes most decisions and no immediate change of guard is planned.", "category": "Politics", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122244"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122186"}], "importance": 7, "article_id": "13f60aed"}, {"headline": "Wall collapse: K'taka CM suspends engr, orders notice to hospital", "summary": "Following seven deaths from a Bowring Hospital wall collapse, CM Siddaramaiah suspended an executive engineer and ordered a notice to the hospital over supervision failures. The CM also directed eviction of street vendors from unsafe structures and strengthening of safety measures.", "category": "India", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122244"}, {"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122265"}], "importance": 7, "article_id": "92bb7596"}, {"headline": "State Plans 1,000-MW Data Parks in Three Cities", "summary": "The Karnataka government has announced plans to establish data parks with a total capacity of 1,000 MW in Bengaluru, Mysuru, and Mangaluru. The initiative, led by the state's energy and IT departments, aims to strengthen industrial growth and provide high-speed digital infrastructure. The government has directed officials to identify suitable land for these projects.", "category": "Infrastructure", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122244"}, {"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_01-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122231"}, {"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122265"}], "importance": 7, "article_id": "5079be7d"}, {"headline": "EC approves Kavitha’s new party as Telangana Rakshana Sena", "summary": "Former Telangana MP K. Kavitha’s new political party has been approved by the Election Commission of India as ‘Telangana Rakshana Sena’ (TRS). This follows her April 25 announcement of the party's launch.", "category": "Politics", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122244"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/122186"}], "importance": 5, "article_id": "2b143653"}, {"headline": "EPS rejects exit polls", "summary": "AIADMK general secretary Edappadi K. Palaniswami rejected exit polls predicting a DMK-led alliance victory, expressing hope his party would win in 210 constituencies. He stated AIADMK historically demolishes exit poll predictions.", "category": "Politics", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122244"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122186"}], "importance": 6, "article_id": "ea50bddd"}, {"headline": "IUML to back Satheesan as Kerala CM if UDF wins poll", "summary": "Indian Union Muslim League (IUML) Kerala president Syed Sadikali Shihab Thangal backed V.D. Satheesan, Leader of Opposition, as a potential Chief Ministerial candidate if the UDF wins. He cited anti-incumbency against the LDF government and public sentiment favoring Satheesan.", "category": "Politics", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122244"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122186"}], "importance": 5, "article_id": "0ca650f4"}, {"headline": "Calcutta HC hears pleas on EC move to deploy Central staff for counting", "summary": "The Calcutta High Court concluded hearings on petitions challenging the Election Commission's (EC) directive to deploy Central government staff for vote counting in the West Bengal Assembly election. Petitioners questioned the CEO's jurisdiction and a last-minute shift of a counting centre. EC stated the move aimed to ensure transparency and streamline arrangements.", "category": "Law", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/122244"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122186"}], "importance": 6, "article_id": "cfde0f8c"}, {"headline": "Today’s Chanakya predicts big BJP win in Bengal", "summary": "Today’s Chanakya predicted a big win for BJP in West Bengal assembly polls, forecasting 192 seats (plus or minus 11) for BJP and 100 for TMC. News18 forecast a tight contest with an edge to BJP (143-163 seats). Axis My India didn't release its forecast due to high non-response.", "category": "Politics", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/122244"}, {"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122265"}], "importance": 7, "article_id": "af3ad0ea"}, {"headline": "India halted Operation Sindoor on its own terms: Rajnath Singh", "summary": "Defence Minister Rajnath Singh stated India voluntarily halted Operation Sindoor, a counter-terror action, on its own terms, not due to capability limitations, despite nuclear threats from Pakistan. He accused Pakistan of being an \"epicentre of terrorism\" and a global hub for \"international terrorism.\"", "category": "Politics", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/122244"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/122186"}], "importance": 7, "article_id": "5983a31d"}, {"headline": "Vande Bharat Now Links Jammu to Srinagar Directly", "summary": "Union Railways Minister Ashwini Vaishnaw flagged off the first all-weather Vande Bharat Express linking Jammu and Srinagar. The new rail link, featuring the iconic Chenab Bridge, aims to boost tourism and provides a strategic transport line for the region. Public service is scheduled to commence on May 2, connecting the two capitals in roughly six hours.", "category": "Infrastructure", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/122244"}, {"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122212"}, {"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_01-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122231"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/122186"}, {"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/122265"}], "importance": 8, "article_id": "088eccdb"}, {"headline": "Punjab HC orders govt to ensure safety of RS MP Harbhajan Singh", "summary": "The Punjab and Haryana High Court directed the Punjab government to ensure the safety of former cricketer and Rajya Sabha MP Harbhajan Singh and his family in Jalandhar, after the state withdrew his security cover following his switch to BJP.", "category": "Politics", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/122244"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122186"}], "importance": 4, "article_id": "9917c06e"}, {"headline": "SC seeks response on ‘revenue judicial service cadre’ for land disputes", "summary": "The Supreme Court sought break RR's win spree", "summary": "Rajasthan Royals, high on confidence after beating Punjab Kings, will face struggling Delhi Capitals in Jaipur. RR seeks its sixth win of the season, while DC, placed seventh after three consecutive losses, including a recent defeat to RCB, will be eager to arrest their slide and keep playoff hopes alive.", "category": "Sports", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 19, "telegram_url": "https://t.me/c/1877410077/122186"}, {"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/122265"}], "importance": 6, "article_id": "dbcde0cd"}, {"headline": "Pollard backs Bumrah despite lean IPL season", "summary": "Mumbai Indians batting coach Kieron Pollard defended star pacer Jasprit Bumrah, who has taken only two wickets in eight IPL matches this season with an economy rate of 8.80. Pollard urged perspective, stating even elite cricketers are entitled to lean phases, and expressed confidence Bumrah will bounce back.", "category": "Sports", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 19, "telegram_url": "https://t.me/c/1877410077/122186"}, {"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 19, "telegram_url": "https://t.me/c/1877410077/122265"}], "importance": 5, "article_id": "516896ab"}, {"headline": "Indian men pip Slovakia 3-2 in table tennis", "summary": "The Indian men's table tennis team staged a spirited comeback to defeat Slovakia 3-2 in a Group 7 tie at the ITTF World Team Table Tennis Championships in London. India climbed to the top of the group standings, strengthening their position ahead of their next tie against Guatemala.", "category": "Sports", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 19, "telegram_url": "https://t.me/c/1877410077/122186"}, {"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/122265"}], "importance": 5, "article_id": "62b0a660"}, {"headline": "Former England forward Ashley Young to retire", "summary": "Former England forward Ashley Young announced his retirement at the end of the season. The 40-year-old, currently with Championship side Ipswich Town, made over 750 club appearances and scored 88 goals across a career spanning more than two decades with various clubs.", "category": "Sports", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/122186"}, {"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/122265"}], "importance": 3, "article_id": "ad0b4820"}, {"headline": "Kobbie Mainoo signs new Manchester United contract", "summary": "Manchester United's Kobbie Mainoo signed a new contract that will keep him at Old Trafford until 2031. The club announced the deal on Thursday.", "category": "Sports", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/122186"}, {"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/122265"}], "importance": 3, "article_id": "40fffcc8"}, {"headline": "Karnataka students achieve near-perfect pass rates in ICSE, ISC", "summary": "Karnataka students achieved near-perfect pass percentages of 99.77% (Class X) and 99.96% (Class XII) in ICSE and ISC exams, outperforming the national average. Despite critical-thinking questions, students performed well, especially in English, history, and civics. Class XII pass percentage improved, Class X remained the same.", "category": "Education", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122265"}], "importance": 7, "article_id": "31b2394a"}, {"headline": "Siddaramaiah to continue as CM for now: Kharge", "summary": "AICC president Mallikarjun Kharge stated there will be no \"immediate\" decision on changing Karnataka's chief minister, and Siddaramaiah will continue for now. He dismissed speculation about himself as a consensus candidate as media speculation. Deputy CM DK Shivakumar, whose supporters claimed a transition by May 15, deferred to Kharge's remarks.", "category": "Politics", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122265"}], "importance": 7, "article_id": "f2350e73"}, {"headline": "Timeline of Trump vs Pope Leo XIV", "summary": "A timeline details the escalating public dispute between Pope Leo XIV and President Donald Trump in March-April 2026. The Pope urged de-escalation in Iran, then called Trump's threats \"unacceptable.\" Trump responded by calling the Pope \"weak\" on crime. The Pope reiterated his non-political role, vowing to speak \"loudly against war.\"", "category": "Politics", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 30, "telegram_url": "https://t.me/c/1877410077/122265"}], "importance": 7, "article_id": "b67d1ca7"}]};
const CAT_META = {"Politics": {"color": "#e8334a", "icon": "🏛️"}, "Economy": {"color": "#f5a623", "icon": "📊"}, "Business": {"color": "#f0c040", "icon": "💼"}, "India": {"color": "#ff7043", "icon": "🇮🇳"}, "World": {"color": "#5c9eff", "icon": "🌍"}, "Sports": {"color": "#36c46f", "icon": "🏆"}, "Science": {"color": "#a78bfa", "icon": "🔬"}, "Technology": {"color": "#38bdf8", "icon": "💻"}, "Health": {"color": "#34d399", "icon": "🏥"}, "Law": {"color": "#fb923c", "icon": "⚖️"}, "Environment": {"color": "#4ade80", "icon": "🌿"}, "Education": {"color": "#e879f9", "icon": "📚"}, "Culture": {"color": "#f472b6", "icon": "🎭"}, "Infrastructure": {"color": "#94a3b8", "icon": "🏗️"}};

// FIXED: Pre-build data structures IMMEDIATELY for deep linking
const allArts = [...DIGEST.articles].sort((a,b)=>(b.importance||0)-(a.importance||0));
const byCategory = {};
for (const art of allArts) {
  const c = art.category||"India";
  if (!byCategory[c]) byCategory[c]=[];
  byCategory[c].push(art);
}
const sortedCats = Object.keys(byCategory).sort(
  (a,b)=>(byCategory[b][0].importance||0)-(byCategory[a][0].importance||0)
);

// FIXED DEEP LINK HANDLER - Runs IMMEDIATELY
let deepLinkTarget = null;
function handleDeepLink() {
  const hash = window.location.hash;
  if (!hash || !sortedCats.length) return;
  
  const cleanHash = hash.startsWith('#article-') ? hash.slice(9) : hash.slice(1);
  const targetArticle = DIGEST.articles.find(art => art.article_id === cleanHash);
  
  if (targetArticle) {
    deepLinkTarget = {article: targetArticle, hash: cleanHash};
  }
}
handleDeepLink();

let catIdx=0,vpW=0,vpH=0;
const panels=[];
const outer=document.getElementById('outer');
const hTrack=document.getElementById('hTrack');
const hintUp=document.getElementById('hintUp');
const hintRight=document.getElementById('hintRight');
const catFlash=document.getElementById('catFlash');
const cfIcon=document.getElementById('cfIcon');
const cfName=document.getElementById('cfName');

function buildAll() {
  vpW=outer.offsetWidth; vpH=outer.offsetHeight;
  hTrack.innerHTML=''; panels.length=0;
  sortedCats.forEach((cat,ci)=>{
    const m=CAT_META[cat]||{color:"#e8334a",icon:"📰"};
    const arts=byCategory[cat];
    const panel=document.createElement('div');
    panel.className='cat-panel';
    panel.id=`cat-panel-${ci}`;
    panel.style.setProperty('--cc',m.color);
    panel.innerHTML=`<div class="progress-row" id="prow-${ci}" style="--cc:${m.color}"></div><div class="v-feed" id="vfeed-${ci}"><div class="v-track" id="vtrack-${ci}"></div></div>`;
    hTrack.appendChild(panel);
    const pRow=panel.querySelector(`#prow-${ci}`);
    const vFeed=panel.querySelector(`#vfeed-${ci}`);
    const vTrack=panel.querySelector(`#vtrack-${ci}`);
    const cardH=vFeed.getBoundingClientRect().height||vpH;
    
    arts.forEach((art,ai)=>{
      const card = buildCard(art, cardH, m, cat, ai);
      card.id = `article-${art.article_id}`;
      card.dataset.articleId = art.article_id;
      vTrack.appendChild(card);
    });
    
    panels.push({pRow,vFeed,vTrack,articles:arts,artIdx:0});
    buildPRow(ci);
  });
  
  hTrack.style.transition='none';
  hTrack.style.transform='translateX(0)';
  syncV(0,false);
  
  // FIXED: Apply deep link after build
  if (deepLinkTarget) {
    setTimeout(() => applyDeepLink(deepLinkTarget), 100);
  }
}

function buildCard(art,h,m,cat,articleIndex) {
  const src=art.sources?.[0];
  const href=src?.pdf_filename?`pdfs/${src.pdf_filename}#page=${src.page}`:(src?.telegram_url||'#');
  const card=document.createElement('div');
  card.className='card';
  card.dataset.articleId = art.article_id;
  card.style.height=h+'px';
  card.style.setProperty('--cc',m.color);
  card.innerHTML=`
    <div class="card-content">
      <div class="card-toprow">
        <div class="cat-pill">
          <div class="pill-icon"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="1" y="1" width="8" height="2" rx="0.6" fill="#888"/><rect x="1" y="4.5" width="5" height="1.5" rx="0.6" fill="#666"/><rect x="1" y="7" width="6" height="1.5" rx="0.6" fill="#666"/></svg></div>
          ${cat.toUpperCase()}
        </div>
        <div class="card-date">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="2.5" width="11" height="9.5" rx="1.8" stroke="#555" stroke-width="1.2"/><path d="M4.5 1v3M8.5 1v3" stroke="#555" stroke-width="1.2" stroke-linecap="round"/><path d="M1 6h11" stroke="#555" stroke-width="1.2"/></svg>
          ${DIGEST.date}
        </div>
      </div>
      <div class="card-headline">${art.headline}</div>
      <div class="card-summary">${art.summary}</div>
      <div class="card-divider"></div>
      <div class="card-footer">
        ${src?`<a class="src-chip" href="${href}" target="_blank" onclick="event.stopPropagation()">${src.newspaper}<span class="src-chip-sep">&middot;</span><span class="src-chip-pg">Pg ${src.page}</span><span class="src-chip-ext"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M3.5 7.5L7.5 3.5M7.5 3.5H5M7.5 3.5V6" stroke="#555" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></span></a>`:'<div></div>'}
        <div class="info-btn"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6.5" stroke="#444" stroke-width="1.3"/><circle cx="7.5" cy="4.5" r="0.8" fill="#555"/><path d="M7.5 7v4" stroke="#555" stroke-width="1.5" stroke-linecap="round"/></svg></div>
      </div>
    </div>`;
  return card;
}

function buildPRow(ci) {
  const p=panels[ci],ai=p.artIdx;
  p.pRow.innerHTML='';
  p.articles.forEach((_,i)=>{
    const seg=document.createElement('div');
    seg.className='pseg'+(i<ai?' done':i===ai?' active':'');
    p.pRow.appendChild(seg);
  });
}

function syncV(ci,animated) {
  const p=panels[ci],h=p.vFeed.getBoundingClientRect().height;
 p.vTrack.style.transition=animated?'transform 0.35s cubic-bezier(0.4,0,0.2,1)':'none';
  p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;
  buildPRow(ci);
}

function applyDeepLink(target) {
  const ci = sortedCats.findIndex(cat =>
    byCategory[cat].some(art => art.article_id === target.hash)
  );
  if (ci === -1) return;
  goCat(ci, false);
  const ai = byCategory[sortedCats[ci]].findIndex(art => art.article_id === target.hash);
  if (ai === -1) return;
  panels[ci].artIdx = ai;
  syncV(ci, false);
  const card = document.getElementById('article-' + target.hash);
  if (card) { card.classList.add('target-highlight'); setTimeout(() => card.classList.remove('target-highlight'), 3000); }
}

function goArt(d) {
  const p=panels[catIdx];
  const n=Math.max(0,Math.min(p.artIdx+d,p.articles.length-1));
  if(n===p.artIdx&&d!==0)return;
  p.artIdx=n; syncV(catIdx,true); dismiss();
}

function goCat(idx,animated=true) {
  idx=Math.max(0,Math.min(idx,sortedCats.length-1));
  if(idx===catIdx&&animated)return;
  const prev=catIdx; catIdx=idx;
  hTrack.style.transition=animated?'transform 0.38s cubic-bezier(0.4,0,0.2,1)':'none';
  hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;
  if(animated&&idx!==prev) {
    const m=CAT_META[sortedCats[idx]]||{color:"#e8334a",icon:"📰"};
    catFlash.style.background=m.color+'18';
    cfIcon.textContent=m.icon; cfName.textContent=sortedCats[idx]; cfName.style.color=m.color;
    catFlash.classList.add('on'); setTimeout(()=>catFlash.classList.remove('on'),500);
  }
  dismiss();
}

let dismissed=false;
function dismiss() {
  if(dismissed)return; dismissed=true;
  hintUp.classList.remove('visible'); hintRight.classList.remove('visible');
  hintUp.classList.add('gone'); hintRight.classList.add('gone');
}

(function initHints() {
  const KEY='dailyBriefHintSeen';
  if(!localStorage.getItem(KEY)) {
    localStorage.setItem(KEY,'1');
    setTimeout(()=>{ if(!dismissed){ hintUp.classList.add('visible'); hintRight.classList.add('visible'); } },2500);
  }
})();

let tsX=0,tsY=0,tcX=0,tcY=0,axis=null,drag=false;
outer.addEventListener('touchstart',e=>{ tsX=e.touches[0].clientX; tsY=e.touches[0].clientY; tcX=0; tcY=0; axis=null; drag=true; hTrack.style.transition='none'; const p=panels[catIdx]; if(p)p.vTrack.style.transition='none'; },{passive:true});
outer.addEventListener('touchmove',e=>{ if(!drag)return; const dx=e.touches[0].clientX-tsX,dy=e.touches[0].clientY-tsY; tcX=dx; tcY=dy; if(!axis&&(Math.abs(dx)>8||Math.abs(dy)>8))axis=Math.abs(dx)>Math.abs(dy)?'h':'v'; if(!axis)return; e.preventDefault(); if(axis==='h'){ const edge=(catIdx===0&&dx>0)||(catIdx===sortedCats.length-1&&dx<0); hTrack.style.transform=`translateX(${-catIdx*vpW+dx*(edge ? 0.14 : 1)}px)`; }else{ const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height; const edge=(p.artIdx===0&&dy>0)||(p.artIdx===p.articles.length-1&&dy<0); p.vTrack.style.transform=`translateY(${-p.artIdx*h+dy*(edge ? 0.14 : 1)}px)`; } },{passive:false});
outer.addEventListener('touchend',()=>{ if(!drag)return; drag=false; if(axis==='h'){ const t=vpW*.2; if(tcX<-t)goCat(catIdx+1); else if(tcX>t)goCat(catIdx-1); else{hTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;} }else if(axis==='v'){ const t=vpH*.2; if(tcY<-t)goArt(1); else if(tcY>t)goArt(-1); else{const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height;p.vTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;} } axis=null; },{passive:true});
document.addEventListener('keydown',e=>{ if(e.key==='ArrowDown'||e.key===' '){e.preventDefault();goArt(1);} if(e.key==='ArrowUp'){e.preventDefault();goArt(-1);} if(e.key==='ArrowRight'){e.preventDefault();goCat(catIdx+1);} if(e.key==='ArrowLeft'){e.preventDefault();goCat(catIdx-1);} });
let wl=false;
outer.addEventListener('wheel',e=>{ e.preventDefault();if(wl)return;wl=true; Math.abs(e.deltaX)>Math.abs(e.deltaY)?goCat(catIdx+(e.deltaX>0?1:-1)):goArt(e.deltaY>0?1:-1); setTimeout(()=>wl=false,500); },{passive:false});
window.addEventListener('resize',()=>{ vpW=outer.offsetWidth;vpH=outer.offsetHeight; hTrack.style.transition='none'; hTrack.style.transform=`translateX(${-catIdx*vpW}px)`; panels.forEach(p=>{ const h=p.vFeed.getBoundingClientRect().height; p.vTrack.querySelectorAll('.card').forEach(c=>c.style.height=h+'px'); p.vTrack.style.transition='none'; p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`; }); });

buildAll();
</script>
