<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {

.outer { position: fixed; inset: 0; overflow: hidden; }

.cat-panel { flex-shrink:0; width:100vw; height:100%; display:flex; flex-direction:column; overflow:hidden; }
.progress-row { flex-shrink:0; display:flex; gap:4px; padding:14px 16px 10px; background:#0c0c0c; position:relative; z-index:5; overflow:visible; }
.progress-row::after { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:80%; height:120px; background:radial-gradient(ellipse at top,color-mix(in srgb,var(--cc) 30%,transparent) 0%,transparent 70%); pointer-events:none; z-index:-1; }
.pseg { flex:1; height:2px; border-radius:1px; background:rgba(255,255,255,0.12); position:relative; overflow:hidden; }

.pseg.done::after, .pseg.active::after { transform:scaleX(1); }
.v-feed { flex:1; overflow:hidden; position:relative; clip-path:inset(0); }
.v-track { display:flex; flex-direction:column; will-change:transform; }
.card { 
  width:100%; flex-shrink:0; background:#0c0c0c; display:flex; flex-direction:column; 
  overflow:hidden; position:relative; 
  scroll-margin-top: 80px;
}
.card.target-highlight {
  background: linear-gradient(135deg, #fff3cd22 0%, #ffeaa722 100%) !important;
  box-shadow: 0 0 30px rgba(255, 193, 7, 0.4);
  border: 2px solid #f39c12;
  animation: pulse-highlight 2s ease-in-out;
}

}

.pill-icon svg { display:block; }

.cat-flash { position:fixed; inset:0; z-index:600; pointer-events:none; opacity:0; transition:opacity 0.12s; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; }
.cat-flash.on { opacity:1; }
.cf-icon { font-size:34px; }
.cf-name { font-size:22px; font-weight:900; letter-spacing:-0.03em; text-transform:uppercase; }

.hint.gone { opacity:0 !important; transition:opacity 0.4s; }
.hint-pill { font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.55); background:rgba(255,255,255,0.07); backdrop-filter:blur(10px); padding:5px 13px; border-radius:100px; border:1px solid rgba(255,255,255,0.09); }

@keyframes bRight { 0%,100% { right:14px; opacity:.65; } 50% { right:6px; opacity:1; } }

const DIGEST   = {"date": "20 June 2026", "articles": [{"headline": "Four Indian Lenders Seek $2 Billion via Special RBI Swap", "summary": "State Bank of India, Axis Bank, Bank of Baroda, and PFC are planning to raise at least $2 billion through External Commercial Borrowings (ECBs). They intend to utilize the Reserve Bank of India's 1.5% special fixed-rate swap window to mitigate currency risks. This initiative aims to take advantage of favorable global interest rates while maintaining domestic liquidity stability.", "category": "Economy", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127732", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ²⁰⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127732"}], "article_id": "05592331"}, {"headline": "India Considers Resuming Iran Oil Imports Amid Trade Revival", "summary": "India is studying the implications of a potential peace deal between the US and Iran to resume oil imports. New Delhi is monitoring the Hormuz Strait for safe passage of vessels, including 16 fertilizer ships currently stuck. The move is part of a broader strategy to utilize the International North-South Transport Corridor and secure energy supplies via the Chabahar port.", "category": "Politics", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127732", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ²⁰⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127732"}], "article_id": "935794ce"}, {"headline": "Government to Launch PLI Scheme for Lithium and Nickel Processing", "summary": "The Indian government plans to introduce a Production Linked Incentive (PLI) scheme and duty concessions to boost domestic refining of critical minerals like lithium and nickel. The initiative aims to reduce dependence on overseas processors, particularly China, and build a ₹16,300 crore national mineral ecosystem to support the burgeoning electric vehicle and battery industry.", "category": "Economy", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/127732", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ²⁰⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127732"}], "article_id": "433fbd2e"}, {"headline": "Cabinet Clears ₹19,700 Crore Carbon Capture Incentive Scheme", "summary": "The Expenditure Finance Committee has approved a ₹19,700 crore scheme to promote Carbon Capture, Utilisation, and Storage (CCUS). The program aims to help heavy industries like power and steel reduce their carbon footprint. The government expects to attract private investments worth ₹37,500 crore to create a capture capacity of 7 million tonnes per year.", "category": "Environment", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127732", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ²⁰⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127732"}], "article_id": "c4616977"}, {"headline": "Centre Warns Ministries to Secure Data Against AI-Driven Threats", "summary": "Following concerns over NEET-UG leaks and cyberattacks, the Home Ministry has directed all central ministries to review and strengthen their digital infrastructure. The advisory focuses on defending against AI-driven vulnerabilities and ensuring third-party vendors comply with strict security protocols. Ministries must conduct audits and set up response teams for real-time threat mitigation.", "category": "Technology", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127732", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ²⁰⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127732"}], "article_id": "136b0660"}, {"headline": "Sauce VC Exits Innovist with Massive 8-10x Returns", "summary": "Consumer-focused Sauce VC has achieved a significant exit by selling its stake in Innovist to L’Oréal. The deal, valued at approximately ₹350-450 crore, marks one of the most successful early-stage exits in India’s D2C sector. The venture capital firm had initially invested about ₹10 crore in the startup, which owns brands like Bare Anatomy and SunScoop.", "category": "Business", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127732", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ²⁰⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127732"}], "article_id": "39948254"}, {"headline": "RIL Targets 40 Billion Units of Green Power Annually", "summary": "Reliance Industries (RIL) announced its goal to generate 40 billion units of green electricity annually, representing nearly 3% of India’s current power requirement. The company is setting up a 40-gigawatt-hour battery giga-factory this year as part of its transition to a net-zero future. RIL plans to use proprietary technology to manufacture affordable solar modules and hydrogen.", "category": "Business", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127732", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ²⁰⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127732"}], "article_id": "25f87713"}, {"headline": "BRICS Security Meeting to Discuss Post-Conflict Stability in Iran", "summary": "National Security Advisor Ajit Doval is set to join BRICS counterparts to discuss regional security and the potential for stability in Iran following recent diplomatic shifts. The meeting, scheduled for June 23, will focus on counter-terrorism, maritime security, and building a consensus on non-traditional threats ahead of the main BRICS summit in September.", "category": "Politics", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127732", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ²⁰⁰⁶²⁰²⁶.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127732"}], "article_id": "d93e00e3"}, {"headline": "DGMO Channel with Pakistan Remains Functional Despite LAC Tensions", "summary": "A parliamentary panel was informed that the Director General of Military Operations (DGMO) level communication channel between India and Pakistan remains active. Despite ongoing challenges on the Line of Actual Control (LAC) with China, the 2021 ceasefire agreement with Pakistan along the Line of Control (LoC) is largely holding, providing a mechanism for de-escalation.", "category": "India", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127732", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ²⁰⁰⁶²⁰²⁶.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127732"}], "article_id": "39ca92df"}, {"headline": "TMC Files for Disqualification of 20 Rebel Members of Parliament", "summary": "The Trinamool Congress (TMC) has formally approached the Lok Sabha Speaker seeking the disqualification of 20 rebel MPs who have shifted allegiance to other political factions. The party argues that these members have violated the anti-defection law. This move follows internal friction and significant shifts in regional political dynamics ahead of upcoming sessions.", "category": "Politics", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127732", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ²⁰⁰⁶²⁰²⁶.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127732"}], "article_id": "e16fd94d"}, {"headline": "Supreme Court Dismisses Plea for CBI Probe into Tamil Nadu Trust", "summary": "The Supreme Court has rejected a petition seeking a CBI investigation into alleged financial irregularities within a prominent Tamil Nadu state trust. The bench headed by the Chief Justice noted that the allegations were vague and lacked credible material evidence. The court emphasized that investigative agencies cannot be deployed based on unsubstantiated claims and political rivalry.", "category": "Law", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127732", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ²⁰⁰⁶²⁰²⁶.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127732"}], "article_id": "b4f3af6e"}, {"headline": "Karnataka Approves ₹7,506 Crore Industrial Investments, Creating 28,000 Jobs", "summary": "The Karnataka state government has cleared 55 industrial projects worth ₹7,506 crore. Key investors include Kaynes Technology and Bellatrix Aerospace. These projects, spread across electronics, manufacturing, and ESDM sectors, are expected to generate over 28,000 jobs. A significant portion of these investments will be located in the Chamarajanagar and Kolar districts.", "category": "Business", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127732", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ²⁰⁰⁶²⁰²⁶.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/127732"}], "article_id": "4171d6b0"}, {"headline": "ED Raids Companies Over Alleged ₹2,500 Crore Crypto Money Laundering", "summary": "The Enforcement Directorate (ED) conducted raids on multiple entities in Bengaluru for alleged violations in cross-border money transfers involving crypto assets worth ₹2,500 crore. The investigation focuses on firms using virtual digital assets to bypass traditional banking channels and the Foreign Exchange Management Act (FEMA). Several bank accounts have been frozen as part of the probe.", "category": "Law", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127732", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ²⁰⁰⁶²⁰²⁶.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/127732"}], "article_id": "73f455ec"}, {"headline": "IHG Hotels Plans Expansion at Adani-Managed Airports in India", "summary": "InterContinental Hotels Group (IHG) is in talks to expand its hotel portfolio by partnering with Adani Airports. The plan involves building high-end transit hotels and business properties near major airports like Mumbai and Ahmedabad. This move aligns with IHG's strategy to capture the growing demand for luxury airport-linked hospitality services in India’s Tier-1 cities.", "category": "Business", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127732", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ²⁰⁰⁶²⁰²⁶.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127732"}], "article_id": "acfc397e"}, {"headline": "Ray-Ban Meta AI Glasses Face Privacy Concerns During Gujarat Pilot", "summary": "A pilot project using Meta's AI-powered Ray-Ban glasses for visually impaired users in Gujarat has sparked privacy debates. While the glasses help users navigate and identify objects, experts worry about the lack of consent from bystanders whose images are captured and processed by AI models. Legal activists are calling for stricter data protection guidelines for wearable cameras.", "category": "Technology", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127732", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ²⁰⁰⁶²⁰²⁶.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127732"}], "article_id": "ea5b0690"}, {"headline": "MNCs and Consultancy Firms Face New Taxes on Expat Salaries", "summary": "High Court rulings have clarified that salary reimbursements for seconded employees from foreign headquarters to Indian subsidiaries will attract a 10-15% tax as 'fees for technical services'. This affects several Big Four consultancy firms and MNCs, potentially increasing the cost of hiring international talent. Companies are now reviewing their global secondment agreements.", "category": "Business", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127732", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ²⁰⁰⁶²⁰²⁶.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127732"}], "article_id": "156fef03"}, {"headline": "BSH Repositions Bosch for India’s Entry-Level Consumer Market", "summary": "BSH Home Appliances is shifting its strategy in India by introducing entry-level Bosch products at lower price points. The German manufacturer aims to challenge market leaders in the washing machine and refrigerator segments by localizing 90% of production. Previously focused on the premium segment, the brand will now target value-conscious urban consumers to gain market share.", "category": "Business", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127732", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ²⁰⁰⁶²⁰²⁶.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/127732"}], "article_id": "ee50fd1f"}, {"headline": "Passenger Vehicle Sales Projected to Rise 4-6% by FY27", "summary": "A report by ICRA suggests that passenger vehicle sales in India will see a moderate growth of 4-6% through fiscal year 2027. The growth is expected to be driven by demand for SUVs and electric vehicles, although high interest rates and rising input costs remain concerns. The industry recorded a strong 27% growth in the last fiscal year, fueled by a post-pandemic consumption surge.", "category": "Business", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127732", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ²⁰⁰⁶²⁰²⁶.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/127732"}], "article_id": "f7c68095"}, {"headline": "India to Host 26,000 High Net Worth Families by 2030", "summary": "The number of high-net-worth families in India, those with a net worth over $30 million, is expected to grow from 16,000 today to 26,000 by 2030. This growth is fueling the rise of professional family offices that manage multi-generational wealth and direct investments into startups. India currently ranks behind only the US and China in the number of such wealthy households.", "category": "Economy", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127732", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ²⁰⁰⁶²⁰²⁶.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/127732"}], "article_id": "8240fba8"}, {"headline": "IT Stocks Slump as Accenture Forecasts Lower Quarterly Revenue", "summary": "Indian IT stocks, including Infosys and TCS, saw a significant decline after global major Accenture lowered its revenue growth forecast. Accenture's warning about delayed spending on consulting and digital transformation has sparked fears of a prolonged slowdown in the Indian tech sector. Analysts predict that major firms may report their lowest organic growth in over a decade.", "category": "Business", "page": 8, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127732", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ²⁰⁰⁶²⁰²⁶.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/127732"}], "article_id": "e1530a49"}, {"headline": "RBI MPC Minutes Highlight Persistence of Food Inflation Concerns", "summary": "The recently released minutes of the Reserve Bank of India’s Monetary Policy Committee meeting show that members remain concerned about volatile food prices. Deputy Governor Michael Patra emphasized that while core inflation is easing, shocks in the food supply chain could derail the 4% inflation target. The committee maintains a cautious 'withdrawal of accommodation' stance.", "category": "Economy", "page": 8, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127732", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ²⁰⁰⁶²⁰²⁶.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/127732"}], "article_id": "92976644"}, {"headline": "SBI Funds Management Receives SEBI Approval for Stock Listing", "summary": "SBI Funds h 6 points. As the league phase continues, teams are focused on total points and net run rates to secure a playoff berth, making every upcoming match critical for the final top-four standings.", "category": "Sports", "page": 18, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127720", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 20-06-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/127720"}], "article_id": "ad7c7dd3"}, {"headline": "Trade deals have opened doors for youth and businesses says Modi", "summary": "PM Narendra Modi stated that recent trade agreements with nearly 40 countries have created new market opportunities for Indian industries and youth. Speaking at a Rozgar Mela, he highlighted the expansion of sectors like infrastructure and manufacturing, which have generated significant employment opportunities.", "category": "Politics", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127739", "sources": [{"newspaper": "Times of India", "pdf_filename": "ToI Bangalore + Times ²⁰⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127739"}], "article_id": "425765bf"}, {"headline": "Voter ID key as Karnataka cleans up guarantee rolls", "summary": "The Karnataka government will launch a state-wide verification drive to identify and remove bogus beneficiaries from its five guarantee schemes. Starting June 30, officials will conduct door-to-door checks, making Aadhaar-linked bank accounts and mobile numbers mandatory to ensure benefits reach genuine BPL card holders.", "category": "Politics", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127739", "sources": [{"newspaper": "Times of India", "pdf_filename": "ToI Bangalore + Times ²⁰⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127739"}], "article_id": "6d795025"}, {"headline": "Two feared drowned in BWSSB sewage tank in Bengaluru", "summary": "A massive search operation is underway  percent as reservoir levels dip sharply", "summary": "India's monsoon deficit has reached 40%, with water storage in 166 major reservoirs falling to 27% of their total capacity. Central Water Commission data reveals that levels in the northern and central regions are particularly concerning, potentially impacting kharif crop sowing and hydropower generation.", "category": "Environment", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127739", "sources": [{"newspaper": "Times of India", "pdf_filename": "ToI Bangalore + Times ²⁰⁰⁶²⁰²⁶.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127739"}], "article_id": "fd665cc1"}, {"headline": "19km Blue line metro set for trial run in October", "summary": "The KR Pura-Silk Board stretch of the Bengaluru Metro's Blue Line is scheduled for trial runs starting October 2024. Development Minister Krishna Byre Gowda confirmed that 90% of the work is complete, though labor shortages due to recent elections had briefly slowed construction progress.", "category": "Infrastructure", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127739", "sources": [{"newspaper": "Times of India", "pdf_filename": "ToI Bangalore + Times ²⁰⁰⁶²⁰²⁶.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/127739"}], "article_id": "996bc97b"}, {"headline": "Same state very different odds for a child's survival", "summary": "New SRS 2024 data reveals sharp intra-state disparities in infant and under-five mortality rates. High-performing states like Kerala and Tamil Nadu still show gaps between tribal belts and urban areas, while Madhya Pradesh and Uttar Pradesh continue to record the highest national averages for child mortality.", "category": "Health", "page": 9, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127739", "sources": [{"newspaper": "Times of India", "pdf_filename": "ToI Bangalore + Times ²⁰⁰⁶²⁰²⁶.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/127739"}], "article_id": "f07b44c7"}, {"headline": "PM to lead ceremony to commission two warships into Navy", "summary": "Prime Minister Modi will lead the commissioning of two indigenous warships, Dunagiri (a stealth frigate) and Agray (an anti-submarine vessel), in Kolkata. The ships, built by Garden Reach Shipbuilders, enhance the Navy's capabilities in coastal defense and anti-submarine warfare.", "category": "India", "page": 13, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127739", "sources": [{"newspaper": "Times of India", "pdf_filename": "ToI Bangalore + Times ²⁰⁰⁶²⁰²⁶.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/127739"}], "article_id": "d1984cd0"}, {"headline": "Even remote Himalayan air losing its clean edge per study", "summary": "A study at Munsyari found that even remote areas of the Himalayas are seeing build-up of harmful gases and secondary organic aerosols. Researchers from ARIES found levels of VOCs and pollutants are higher during spring and autumn, attributed to regional biomass burning and urban pollution inflow.", "category": "Environment", "page": 14, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127739", "sources": [{"newspaper": "Times of India", "pdf_filename": "ToI Bangalore + Times ²⁰⁰⁶²⁰²⁶.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/127739"}], "article_id": "29d3c063"}, {"headline": "NTA guardian of paper making process as well as exams", "summary": "The National Testing Agency has expanded its expert panel to reduce paper-setting risks following the NEET-UG leak controversy. The new system involves a high-security process where no single expert has a complete view of the final paper, aimed at cutting down the value of partial leaks.", "category": "Education", "page": 15, "importance": 9, "telegram_url": "https://t.me/c/1877410077/127739", "sources": [{"newspaper": "Times of India", "pdf_filename": "ToI Bangalore + Times ²⁰⁰⁶²⁰²⁶.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/127739"}], "article_id": "b10750fb"}, {"headline": "Sebi allows easier transfer of shares for dead investors", "summary": "The Securities and Exchange Board of India has introduced new conduct rules allowing easier share transfers for deceased investors' heirs. For claims up to Rs 10,000 for physical shares and Rs 30,000 for demat shares, procedures have been simplified to reduce the burden of documentation for small investors.", "category": "Business", "page": 16, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127739", "sources": [{"newspaper": "Times of India", "pdf_filename": "ToI Bangalore + Times ²⁰⁰⁶²⁰²⁶.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/127739"}], "article_id": "087f2aa9"}, {"headline": "Our India data centre will power global AI work says Meta", "summary": "Meta plans to establish its first AI-enabled data centre in India to serve global markets. Vice-president Santosh Janardhan stated the facility will focus on power-efficient technologies to support Meta's networking of global servers, leveraging India's engineering talent and growing digital infrastructure.", "category": "Technology", "page": 16, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127739", "sources": [{"newspaper": "Times of India", "pdf_filename": "ToI Bangalore + Times ²⁰⁰⁶²⁰²⁶.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/127739"}], "article_id": "9f55ad30"}, {"headline": "Smriti Mandhana makes T20I history with record six hundred fours", "summary": "India's vice-captain Smriti Mandhana became the first player in T20 international history across men's and women's cricket to hit 600 fours. The milestone came during India's 95-run victory over the Netherlands, where she scored a fluent 85 to lead the team to a massive total.", "category": "Sports", "page": 29, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127739", "sources": [{"newspaper": "Times of India", "pdf_filename": "ToI Bangalore + Times ²⁰⁰⁶²⁰²⁶.pdf", "page": 29, "telegram_url": "https://t.me/c/1877410077/127739"}], "article_id": "f35c6837"}, {"headline": "Scientists discover new insect species in expedition to Angola", "summary": "An international research team discovered dozens of previously unknown insect species in Angola's Okavango region. Finds include a crab spider that fluoresces under UV light and new species of dragonflies and butterflies, highlighting the biodiversity of Africa's major river sources.", "category": "Science", "page": 27, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127739", "sources": [{"newspaper": "Times of India", "pdf_filename": "ToI Bangalore + Times ²⁰⁰⁶²⁰²⁶.pdf", "page": 27, "telegram_url": "https://t.me/c/1877410077/127739"}], "article_id": "d04441c0"}, {"headline": "Delhi HC upholds curbs on Telegram amid NEET row", "summary": "The Delhi High Court upheld the Centre's temporary ban on Telegram, citing its use by cheating networks in the NEET (UG), 2026 controversy. The court found the government followed IT Act Section 69A, including emergency powers, and confirmed \"information\" includes software. The ban was proportionate given content takedowns were ineffective.", "category": "Law", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "9a6a0a92"}, {"headline": "T.N. Assembly unanimously opposes dam at Mekedatu", "summary": "The Tamil Nadu Assembly unanimously adopted a resolution opposing Karnataka's proposal to construct a balancing reservoir across the Cauvery at Mekedatu. Chief Minister C. Joseph Vijay moved the resolution, citing Karnataka's unilateral attempt without concurrence from basin states or Union government approval, violating tribunal awards.", "category": "Politics", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "7e8aaada"}, {"headline": "Satheesan banks on ‘dream projects’ to transform Kerala", "summary": "Kerala CM V.D. Satheesan tabled the 2026-27 budget, highlighting UDF's 'dream projects' like transforming Kerala into a port city and aviation hub, 'Land Reforms 2.0', and 'Kerala Knowledge Valley'. The budget allocates ₹600 crore for free travel for women, ₹400 crore for Mission Samudra, and ₹100 crore for a health city.", "category": "Politics", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "7cec3f71"}, {"headline": "Security up for CJP’s protest at Jantar Mantar today", "summary": "Security measures, including CCTV cameras, body-worn cameras, and videographers, have been intensified in Delhi for the Cockroach Janta Party’s (CJP) protest at Jantar Mantar on Saturday. Traffic diversions are possible, but metro services are expected to be unaffected.", "category": "India", "page": 2, "importance": 2, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "3eb3d4bd"}, {"headline": "AAP alleges corruption in tenders under BJP govt.", "summary": "AAP Delhi chief Saurabh Bharadwaj alleged corruption in tenders issued since the BJP took power in Delhi, citing examples like tent houses for Kanwar Yatra and hospital supplies. The BJP refuted the claims.", "category": "Politics", "page": 2, "importance": 3, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/
