<script>
const DIGEST   = {"date": "16 May 2026", "articles": [{"headline": "India's Goods Exports Reach 49-Month High Despite Widening Trade Deficit", "summary": "India's merchandise exports grew 13.78% to $43.56 billion in April, led by electronics, engineering goods, and petroleum. However, the trade deficit hit a three-month high of $28.38 billion as imports rose by 10%. Exports to West Asia fell by over 25% due to geopolitical disruptions, while gold and silver imports surged by 81% and 157% respectively during the month.", "category": "Economy", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123892", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123892"}], "article_id": "cf8a0651"}, {"headline": "Rapido Raises $240 Million Valuing Mobility Firm at $3 Billion", "summary": "Urban mobility startup Rapido raised $240 million in a funding round led by Prosus, valuing the company at $3 billion. The round included participation from WestBridge Capital and Accel. The capital will be used to expand its ride-hailing network and prepare for a formal launch of its food delivery service, Ownly. Prosus also acquired Swiggy's 12% stake in Rapido for about $270 million.", "category": "Business", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123892", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123892"}], "article_id": "073666a9"}, {"headline": "Supreme Court Exclusively Online on Mondays and Fridays to Conserve Fuel", "summary": "The Supreme Court has decided to conduct hearings exclusively via video conference on Mondays and Fridays to encourage fuel conservation amid the West Asia crisis. A hybrid mode will be available from Tuesday to Thursday. The judiciary also resolved to encourage carpooling among judges and allow 50% of staff to work from home two days a week to ensure optimum resource utilization.", "category": "Law", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123892", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 16-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123892"}], "article_id": "46b12649"}, {"headline": "Thirty-One Abducted Hostages Released in Manipur Following Concerted Efforts", "summary": "Authorities confirmed the release of 31 of 38 Kuki and Naga community members abducted in Manipur's Kangpokpi and Senapati districts. The release followed joint efforts by public leaders and security forces. An armed gang had ambushed vehicles on May 13, leaving three dead. Efforts continue to rescue at least six Naga men who remain untraceable following the incident.", "category": "India", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123892", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 16-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123892"}], "article_id": "12ab33b9"}, {"headline": "Indigenous Stealth Fighter Facility Groundbreaking Ceremony Held in Andhra Pradesh", "summary": "Defence Minister Rajnath Singh and Andhra CM N Chandrababu Naidu launched the Advanced Medium Combat Aircraft (AMCA) manufacturing facility in Puttaparthi. The project, involving a Rs 15,803 crore investment, will occupy 600 acres. The location was selected for its proximity to Bengaluru's flight-testing ranges, which will help reduce development time for the next-generation stealth jets.", "category": "Infrastructure", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123892", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 16-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123892"}], "article_id": "41dc26c8"}, {"headline": "Russia Increases Oil Supplies to India Despite International Sanctions", "summary": "Russian Foreign Minister Sergey Lavrov confirmed that oil shipments to India have increased as New Delhi seeks a US waiver extension on sanctioned crude. Lavrov described the relationship as a \"privileged strategic partnership\" during his visit to Delhi. Discussions also touched upon expanding trade in fertilizers and coking coal, and potential Indian mediation in West Asia tensions.", "category": "Economy", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123892", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 16-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123892"}], "article_id": "5e1eafaa"}, {"headline": "Flipkart Postpones IPO Plans Citing Market Volatility and Quick Commerce Focus", "summary": "Walmart-owned Flipkart has paused its plans for an initial public offering (IPO) amid stock market volatility caused by the West Asia conflict. The ecommerce giant is currently doubling down on its quick commerce arm, Flipkart Minutes, aiming to reach 1,200 stores by July. The delay follows a similar postponement by its sister firm PhonePe as they navigate a crowded IPO pipeline.", "category": "Business", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123892", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 16-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123892"}], "article_id": "551b891c"}, {"headline": "Lightrock Launches $500 Million Fund for Global Energy Transition Projects", "summary": "Private equity firm Lightrock unveiled its $500-million Accelerate7 fund to support growth-stage companies in electric mobility and clean cooking across India, Southeast Asia, and Africa. The fund will offer cheque sizes between $10 million and $50 million. It has already invested in Indian firms SolarSquare and Euler Motors, targeting sectors that drive economic opportunity through energy.", "category": "Business", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123892", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 16-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123892"}], "article_id": "8d7d7165"}, {"headline": "Restaurants and Delivery Apps Set to Raise Prices by 10 Percent", "summary": "Dining out and food deliveries are expected to become 5-10% more expensive next week following the fuel price hike. Executives from Wow! Momo and Cafe Delhi Heights stated that rising logistics and input costs have made price increases inevitable. The industry is already under pressure from labor shortages and a 60% surge in commercial LPG costs over the past two months.", "category": "Business", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123892", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 16-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123892"}], "article_id": "5c327499"}, {"headline": "India Inc Tightens Travel and Spending Under New Fiscal Prudence", "summary": "Leading Indian firms including HUL, Infosys, and Lupin have restricted business travel and expanded hybrid work models to beat global economic uncertainty. Companies are cutting discretionary spending and adopting virtual meetings to conserve resources following the Prime Minister's call for austerity. IoT-led energy management and electric mobility are being prioritized to cut costs.", "category": "Business", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123892", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 16-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123892"}], "article_id": "9025001b"}, {"headline": "Compressor Import Restrictions May Lead to AC and Refrigerator Shortages", "summary": "The Centre's new restrictions on compressor imports have sparked warnings of potential shortages in the AC and refrigerator market. The DPIIT has capped imports at a percentage of FY25 volumes to push local manufacturing. Industry leaders noted that domestic capacity of 7-8 million units for AC compressors is insufficient to meet the annual demand of approximately 15 million units.", "category": "Business", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123892", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 16-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123892"}], "article_id": "9797593e"}, {"headline": "Nabard Acquires MTNL Mumbai Campus Rights for Rs 350 Crore", "summary": "The National Bank for Agriculture and Rural Development (Nabard) acquired the leasehold rights to MTNL’s commercial campus in Mumbai’s Bandra-Kurla Complex for Rs 350.72 crore. The transaction covers nearly two-thirds of an acre and 43,287 sq ft of built-up area. Nabard will use the premises for its institutional operations, marking a significant asset monetization for the state-run telecom firm.", "category": "Business", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123892", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 16-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123892"}], "article_id": "457dd20e"}, {"headline": "Ola Electric to Invest Rs 2,000 Crore in Battery and EV Units", "summary": "Ola Electric Mobility is infusing Rs 2,000 crore into its wholly-owned subsidiaries focused on electric vehicle and battery manufacturing. The investment aims to accelerate vertical integration and localization amid rising competition and recent rating downgrades. While EV revenue dipped, Ola's cell technology unit saw sharp growth, highlighting the company’s focus on next-gen battery tech.", "category": "Technology", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123892", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 16-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123892"}], "article_id": "88904d19"}, {"headline": "UK Steel Safeguard Measures Hurdle for India-UK Free Trade Pact", "summary": "India's trade agreement with the UK faces delays due to London's decision to cut tariff-free steel import quotas by 60% from 2026. Both nations are seeking a \"creative solution\" to implement the deal. Meanwhile, India is engaging with the US on an interim trade agreement and participating in consultations regarding US Section 301 investigations into forced labor and oversupply.", "category": "Economy", "page": 7, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123892", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 16-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/123892"}], "article_id": "2a9ae995"}, {"headline": "Fuel Price Hike Likely to Add 20 Basis Points to Inflation", "summary": "Economists warn that the Rs 3 per litre hike in petrol and diesel could increase retail inflation by 15-20 basis points. The hike is expected to trigger second-round price pressures through higher logistics and transport costs. Petrol and diesel account for 4.8% of the CPI basket. This follows other inflationary pressures including recent increases in milk and gold prices.", "category": "Economy", "page": 7, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123892", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 16-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/123892"}], "article_id": "6e6a69b9"}, {"headline": "PFC-REC Merger Delayed Amid Fiscal Pressure and Rupee Fall", "summary": "The proposed merger of state-run financiers PFC and REC may not be a priority for the government as it faces a Rs 25,000 crore capital requirement to maintain a majority stake. Analysts suggest fiscal constraints and the weakening rupee make such an infusion unlikely in the near term. The boards of both entities are meeting Saturday for general purposes amid the merger uncertainty.", "category": "Business", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123892", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 16-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/123892"}], "article_id": "b96ee491"}, {"headline": "Oil Stocks Extend Losses as Fuel Hike Fails to Offset Costs", "summary": "Shares of HPCL, BPCL, and IOC continued to decline on Friday as the Rs 3 per litre fuel price hike fell short of market expectations. Analysts noted that OMCs are still incurring significant under-recoveries with crude at $110. Margins are expected to remain under pressure until geopolitical tensions ease, with some predicting further retail price revisions of up to Rs 30 in coming months.", "category": "Business", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123892", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 16-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/123892"}], "article_id": "0b77a094"}, {"headline": "Nabard Withdraws Rs 7,000 Crore Bond Sale on Weak Demand", "summary": "The National Bank for Agriculture and Rural Development (Nabard) cancelled its three-year bond sale on Friday after receiving insufficient bids at its preferred interest rates. The lender sought Rs 7,000 crore but received bids worth only Rs 3,030 crore. Market participants cited rising borrowing costs and tightening liquidity as reasons for the weak investor appetite for the issuance.", "category": "Business", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123892", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 16-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/123892"}], "article_id": "6891357f"}, {"headline": "Armand Duplantis Adopts Longer Run-Up to Target New World Records", "summary": "Double Olympic pole vault champion Armand Duplantis has increased his approach to 22 steps to generate more speed and power. Duplantis, who has set the world record 15 times, debuted the change during the indoor season. He cleared 6.31 metres in March and is focused on refining the technique ahead of the World Championships and the 2028 Los Angeles Olympics.", "category": "Sports", "page": 10, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123892", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 16-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/123892"}], "article_id": "02996b86"}, {"headline": "CJI Surya Kant criticizes online activists for targeting judicial institutions", "summary": "Chief Justice of India Surya Kant remarked that some unemployed people, acting as social media or RTI activists, have begun targeting institutions like the judiciary. During a hearing on senior advocate designations, he described such critics as \"cockroaches\" and \"parasites\" of society, stressing that the senior designation is a distinction conferred by the court, not a status symbol.", "category": "Law", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123866", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123866"}], "article_id": "1d9cf736"}, {"headline": "India trade gap widens to $28bn as gold and electronics imports surge", "summary": "India's merchandise trade deficit widened to $28.38 billion in April 2026. While exports rose 13.79% to a record $43.56 billion, imports climbed 10.03% to $71.94 billion. The gap was driven by an 82% surge in gold imports and a 38.2% rise in electronics imports. The rupee touched a record low of 96.14 against the dollar following the data release.", "category": "Economy", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123866", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123866"}], "article_id": "1076babc"}, {"headline": "US-China summit ends with no major breakthroughs on trade or war", "summary": "A two-day summit between President Donald Trump and Xi Jinping concluded in Beijing without significant deals on trade or help ending the Iran war. Xi proposed \"constructive strategic stability\" but warned against crossing red lines regarding Taiwan. Trump claimed China promised to buy 200 Boeing planes and expressed interest in US oil, though Beijing did not confirm specific commitments.", "category": "World", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123866", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123866"}], "article_id": "3758ac6d"}, {"headline": "Supreme Court urges Centre to rationalize volatile air fares", "summary": "The Supreme Court asked the Union government to address glaring price disparities in airfares, noting economy class tickets for the same route can range from ₹8,000 to ₹18,000. Solicitor General Tushar Mehta informed the bench that rules under the new Bharatiya Vayuyan Adhiniyam, 2024 are under consultation. The court stressed the need for immediate relief from unpredictable pricing.", "category": "Infrastructure", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123866", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123866"}], "article_id": "01138b61"}, {"headline": "West Bengal suspends three senior IPS officers over RG Kar probe", "summary": "Chief Minister Suvendu Adhikari announced the suspension of former Kolkata police commissioner Vineet Goyal and two other senior IPS officers for alleged mishandling of the RG Kar Hospital rape and murder case. The officers are accused of lapses in the initial investigation and allegedly offering money to the victim's family. Departmental proceedings have been initiated.", "category": "Politics", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123866", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123866"}], "article_id": "af6b1097"}, {"headline": "Manipur ethnic tension: 28 of 38 civilians held captive are released", "summary": "Twenty-eight civilians from Kuki and Naga communities were released following negotiations between security agencies and armed groups in Manipur's Kangpokpi and Senapati districts. The swap involved 14 individuals from each community. Six Naga civilians remain missing. The releases followed a surge in violence earlier this week that left four people dead across hill districts.", "category": "India", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123866", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 16-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123866"}], "article_id": "d568dd48"}, {"headline": "Fresh Ebola outbreak confirmed in Democratic Republic of the Congo", "summary": "Health authorities confirmed a new Ebola outbreak in the remote Ituri province of the DRC. The virus was detected in 13 of 20 samples from the gold-mining towns of Mongwalu and Rwampara. Africa CDC is convening meetings with UN agencies and neighboring Uganda to contain the spread, citing challenges from poor infrastructure and ongoing regional violence.", "category": "Health", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123866", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 16-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123866"}], "article_id": "4b3e145b"}, {"headline": "Science of the storm: Why 111 died in UP squall line", "summary": "A collision of a winter western disturbance and moisture from the Bay of Bengal over heated land caused a violent squall line in Uttar Pradesh, killing 111 people. Wind speeds reached 130 kmph, typical of cyclones. Scientists say pre-monsoon thunderstorms are becoming more violent due to climate change, as warmer air holds more moisture, leading to more energetic cloud formations.", "category": "Science", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123866", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 16-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123866"}], "article_id": "4aca9698"}, {"headline": "Siddaramaiah calls fuel price hike a direct assault on citizens", "summary": "Karnataka CM Siddaramaiah criticized the Union government's ₹3 hike in petrol and diesel prices, calling it a failure in economic management. He warned that increased transport costs would raise prices of essential goods like milk and vegetables. Deputy CM DK Shivakumar added that the hike reflects poor handling of international energy tensions linked to the West Asia conflict.", "category": "Politics", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123866", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 16-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123866"}], "article_id": "30d7bba5"}, {"headline": "Supreme Court expedites trial against actor Darshan in murder case", "summary": "The Supreme Court directed the Karnataka government to examine key witnesses in the Renukaswamy murder case involving actor Darshan Thoogudeepa within one year. The bench noted the slow progress of the trial and stated that if substantial progress is not made, Darshan may move for bail. Darshan is currently in custody for the alleged abduction and killing of a fan.", "category": "Law", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123866", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 16-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123866"}], "article_id": "72ed5544"}, {"headline": "ACB court summons KTR and 4 others in Formula E case", "summary": "A special court for Anti-Corruption Bureau cases in Hyderabad issued summons to BRS leader KT Rama Rao and former IAS officer Arvind Kumar in the Formula E misappropriation case. The ACB alleges that ₹54.88 crore was transferred to a foreign firm without mandatory approvals during the 2023 racing event. KTR has dismissed the case as bogus. Trial is set to begin on July 31.", "category": "Law", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123866", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 16-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123866"}], "article_id": "136c9008"}, {"headline": "Rajnath Singh lays foundation for AMCA fifth-generation fighter project", "summary": "Defense Minister Rajnath Singh laid the foundation stone for the Advanced Medium Combat Aircraft (AMCA) complex at Puttaparthi, Andhra Pradesh. The ₹15,803 crore project will be a hub for integrating and flight-testing India's indigenous fifth-generation stealth fighters. Singh emphasized that India cannot depend on others for security and must achieve complete self-reliance.", "category": "Politics", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123866", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 16-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123866"}], "article_id": "aadbd43a"}, {"headline": "Supreme Court allows remission for Madhumita Shukla murder convict", "summary": "The Supreme Court held that the executive cannot deny remission solely because a crime is heinous, paving the way for the release of Rohit Chaturvedi. Chaturvedi spent 22 years in jail for the 2003 murder of poet Madhumita Shukla. The court noted his good conduct and the fact that co-accused Amarmani Tripathi had already been released after 17 years.", "category": "Law", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123866", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 16-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/123866"}], "article_id": "c2265141"}, {"headline": "Government imposes windfall tax on petrol exports as war bites", "summary": "The Union government imposed a windfall gains tax of ₹3 per litre on petrol exports for the first time during the current West Asia crisis. Simultaneously, it cut export levies on diesel to ₹16.5 per litre and ATF to ₹16 per litre. The measures aim to ensure domestic fuel availability and disincentivize exports during a period of high global crude prices and refinery margins.", "category": "Economy", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123866", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 16-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/123866"}], "article_id": "aac9b5f7"}, {"headline": "Iran allows more vessels through Strait of Hormuz after blockade", "summary": "Iran’s Revolutionary Guards have begun allowing more ships to pass through the strategic Strait of Hormuz, state television reported. The waterway was largely blocked following US-Israeli strikes on February 28. While more vessels are clearing the route under new Iranian protocols, Tehran continues to seize ships it associates with the US, Israel, or their military installations.", "category": "World", "page": 15, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123866", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 16-05-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/123866"}], "article_id": "25db74cf"}, {"headline": "UAE to accelerate Fujairah pipeline to bypass Strait of Hormuz", "summary": "The UAE government has directed ADNOC to fast-track a new oil pipeline project to double export capacity through Fujairah by 2027. The move is designed to reduce reliance on the Strait of Hormuz, which has been disrupted by the Iran conflict. The UAE also reportedly sought a coordinated military response from neighbors like Saudi Arabia, but faced reluctance from other Gulf nations.", "category": "Infrastructure", "page": 15, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123866", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 16-05-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/123866"}], "article_id": "7ba971af"}, {"headline": "Sakshi Chaudhary and Lovlina Borgohain seal CWG and Asian Games spots", "summary": "Olympic medalist Lovlina Borgohain and world champion Sakshi Chaudhary won their respective finals at the national boxing selection trials in Patiala. Sakshi moved down to the 51kg category to blank reigning world champion Minakshi, while Lovlina dominated the 75kg final. The boxers have secured their spots for the upcoming Commonwealth Games and Asian Games.", "category": "Sports", "page": 18, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123866", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 16-05-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/123866"}], "article_id": "42b47f8f"}, {"headline": "Investor wealth jumps Rs 10 lakh crore as markets hit record highs", "summary": "Market capitalization of BSE-listed companies crossed the milestone of 412 lakh crore rupees as Sensex and Nifty touched record intra-day highs. Investor sentiment was bolstered by a decline in global crude oil prices and positive domestic earnings. Financial and metal stocks were the top gainers, while foreign institutional investors showed signs of returning to the market.", "category": "Economy", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123880", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123880"}], "article_id": "42d094c4"}, {"headline": "Phase 5 of Lok Sabha elections records over 60 percent turnout", "summary": "The fifth phase of India's Lok Sabha elections concluded on Monday with a voter turnout of approximately 60.5 percent across 49 constituencies. Key seats included Mumbai, Rae Bareli, and Amethi. While the turnout was slightly lower than in 2019, the Election Commission noted that voting was largely peaceful despite the intense heatwave affecting several northern states.", "category": "Politics", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/123880", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123880"}], "article_id": "cc88ea4d"}, {"headline": "India mourns death of Iranian President Raisi in helicopter crash", "summary": "India observed a day of national mourning on Tuesday following the death of Iranian President Ebrahim Raisi in a helicopter crash. Vice President Jagdeep Dhankhar is scheduled to attend the official funeral ceremony in Tehran. The crash, which occurred in a mountainous region amid heavy fog, also claimed the lives of Iran's Foreign Minister and several other high-ranking officials.", "category": "World", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123880", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123880"}], "article_id": "1b1f7657"}, {"headline": "ONGC reports 78 percent jump in Q4 net profit", "summary": "Oil and Natural Gas Corporation (ONGC) reported a 78 percent year-on-year rise in its consolidated net profit to Rs 9,869 crore for the quarter ended March 2024. The growth was driven by stable oil prices and reduced expenses. The company's board also recommended a final dividend of Rs 2.50 per equity share, bringing the total dividend for the fiscal year to Rs 12.25.", "category": "Business", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123880", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123880"}], "article_id": "b0522caa"}, {"headline": "IMD issues red alert for severe heatwave in North India", "summary": "The India Meteorological Department (IMD) has issued a red alert for Delhi, Punjab, Haryana, and Rajasthan as a severe heatwave persists. Temperatures are expected to remain between 44 and 47 degrees Celsius for the next four days. Authorities have advised people to avoid outdoor activities during peak hours and have implemented emergency measures to ensure water and power supply.", "category": "Environment", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123880", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_16-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123880"}], "article_id": "811fc4d4"}, {"headline": "Supreme Court reserves verdict on Patanjali Ayurved misleading ads case", "summary": "The Supreme Court has reserved its verdict on the contempt case involving Patanjali Ayurved and its founders, Ramdev and Balkrishna, regarding misleading advertisements. The court noted that while an apology was tendered, it would evaluate the sincerity of the actions taken to rectify the claims. The bench also emphasized the need for stricter regulations on FMCG health claims.", "category": "Law", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123880", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_16-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123880"}], "article_id": "da995045"}, {"headline": "Bharat Electronics net profit rises 30 percent in fourth quarter", "summary": "Bharat Electronics Limited (BEL) reported a 30 percent increase in its consolidated net profit to Rs 1,783 crore for the fourth quarter ended March 2024. The state-run defense firm also saw its turnover grow to Rs 8,564 crore. The company highlighted a strong order book of over Rs 76,000 crore, driven by demand for defense electronics and communication systems.", "category": "Business", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123880", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_16-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123880"}], "article_id": "e3d14fa2"}, {"headline": "Hyundai India plans mega IPO to raise 3 billion dollars", "summary": "Hyundai Motor India is preparing to file a draft red herring prospectus for a mega Initial Public Offering (IPO) that could raise up to 3 billion dollars. This would potentially be India's largest-ever IPO, valuing the South Korean automaker's local unit at nearly 25-30 billion dollars. The funds are expected to support expansion in electric vehicles and manufacturing capacity.", "category": "Business", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123880", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123880"}], "article_id": "34fff3dc"}, {"headline": "Microsoft unveils Copilot Plus PCs with advanced AI features", "summary": "Microsoft has introduced a new category of \"Copilot Plus\" personal computers designed to run advanced artificial intelligence features directly on the device. These PCs use specialized chips called NPUs to handle AI tasks like real-time translation and image generation without relying on the cloud. The move aims to challenge Apple's dominance in the high-end laptop market.", "category": "Technology", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123880", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_16-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/123880"}], "article_id": "63158a57"}, {"headline": "SEBI eases disclosure norms for Foreign Portfolio Investors", "summary": "The Securities and Exchange Board of India (SEBI) has simplified disclosure requirements for Foreign Portfolio Investors (FPIs). Under the new rules, FPIs with concentrated holdings in a single corporate group are exempt from additional disclosures if the group has no identifiable promoter. This move is expected to attract more foreign capital and improve the ease of doing business.", "category": "Economy", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123880", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_16-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/123880"}], "article_id": "40b24c98"}, {"headline": "NHAI eyes Rs 54,000 crore from asset monetization in FY25", "summary": "The National Highways Authority of India (NHAI) aims to raise Rs 54,000 crore through various asset monetization models in the current fiscal year. This includes the Toll-Operate-Transfer (TOT) model and Infrastructure Investment Trusts (InvITs). The capital raised will be used to fund new highway projects and reduce the authority's debt burden from previous construction cycles.", "category": "Infrastructure", "page": 11, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123880", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_16-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/123880"}], "article_id": "e6d83582"}, {"headline": "KKR beats SRH to enter IPL 2024 finals with dominant win", "summary": "Kolkata Knight Riders (KKR) secured a place in the IPL 2024 final after a convincing eight-wicket victory over Sunrisers Hyderabad (SRH) in Qualifier 1. Mitchell Starc’s early three-wicket haul restricted SRH to 159 runs. KKR chased down the target in just 13.4 overs, led by half-centuries from Shreyas Iyer and Venkatesh Iyer at the Narendra Modi Stadium in Ahmedabad.", "category": "Sports", "page": 22, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123880", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_16-05-2026.pdf", "page": 22, "telegram_url": "https://t.me/c/1877410077/123880"}], "article_id": "2d8f0d71"}, {"headline": "Bharat Biotech begins trials for human-source tuberculosis vaccine MTBVAC", "summary": "Bharat Biotech has started clinical trials for MTBVAC, a pioneering tuberculosis vaccine derived from a human source. The trials are being conducted in collaboration with Spanish firm Biofabri. This vaccine is intended to be a more effective alternative to the current BCG vaccine and could play a vital role in India's target to eliminate tuberculosis by the year 2025.", "category": "Health", "page": 12, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123880", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_16-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/123880"}], "article_id": "5e20e555"}, {"headline": "UGC allows students to pursue two degrees simultaneously in physical mode", "summary": "The University Grants Commission has clarified that students can now pursue two full-time academic programs in physical mode simultaneously. This move aims to provide more flexibility to students and enhance their skills across different domains. However, students must ensure that class timings for the two programs do not overlap, according to the new guidelines issued by the body.", "category": "Education", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123880", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_16-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/123880"}], "article_id": "72579e13"}, {"headline": "Cannes Film Festival showcases Indian cinema with several major screenings", "summary": "The 77th Cannes Film Festival is celebrating Indian cinema with a significant presence of Indian actors and filmmakers. Several Indian films, including Payal Kapadia's \"All We Imagine as Light,\" are being featured in prestigious categories. The festival's spotlight on Indian content highlights the growing global influence of the country's diverse storytelling and filmmaking talent.", "category": "Culture", "page": 24, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123880", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_16-05-2026.pdf", "page": 24, "telegram_url": "https://t.me/c/1877410077/123880"}], "article_id": "42a00aa8"}, {"headline": "Petrol and diesel prices up by ₹3; further increase likely", "summary": "Public sector oil marketing companies hiked petrol and diesel prices by approximately ₹3 per litre after a 20-month hiatus. The move follows rising international crude costs, which have reached nearly $86 per barrel. Analysts predict another potential increase of ₹2-3 in the coming weeks as firms seek to offset significant under-recoveries and narrow the marketing margin gap.", "category": "Economy", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/123904", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123904"}], "article_id": "47e47eb6"}, {"headline": "NEET retest to be held June 21; digital from next year", "summary": "The National Testing Agency announced a re-examination for 1,563 NEET-UG candidates on June 21 following the withdrawal of grace marks. From 2027, the medical entrance exam will transition to a computer-based test (CBT) format to prevent paper leaks and ensure integrity. The decision comes amid a nationwide controversy over alleged discrepancies and inflated scores in recent results.", "category": "Education", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/123904", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123904"}], "article_id": "2bb1d79f"}, {"headline": "UAE-Iran rift leaves BRICS a divided house; no joint statement", "summary": "A meeting of BRICS foreign ministers in New Delhi concluded without a joint statement due to sharp disagreements between members, particularly Iran and the UAE, over regional conflicts. While Russia and China pushed for a unified stance on the West Asia crisis, India maintained a neutral position, focusing on the protection of international maritime trade and sovereignty.", "category": "World", "page": 9, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123904", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_16-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/123904"}], "article_id": "519eae4e"}, {"headline": "UAE announces $5bn investment in India as Modi meets President", "summary": "Prime Minister Narendra Modi and UAE President Sheikh Mohamed bin Zayed Al Nahyan signed agreements for a $5 billion investment in Indian infrastructure and energy projects. This includes $3 billion for a new industrial city and $2 billion for food parks. The leaders also discussed deepening strategic ties and enhancing cooperation in defense, renewable energy, and technology.", "category": "Economy", "page": 12, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123904", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_16-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/123904"}], "article_id": "071c1714"}, {"headline": "Adanis set to settle US case with $18m payment", "summary": "The Adani Group has reached a preliminary agreement to settle a US civil case involving allegations of bribery and concealment of information by paying $18 million. The US Department of Justice and the SEC had investigated claims of illegal payments to Indian officials to secure solar power contracts. The settlement aims to resolve the legal challenges without admission of guilt.", "category": "Business", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123904", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123904"}], "article_id": "3c801b27"}, {"headline": "Exports grow 14%, fastest in 5 months; trade deficit widens", "summary": "India's merchandise exports surged by 14% to $38.13 billion in April, marking the highest growth rate in five months. Key drivers included electronics, engineering goods, and pharmaceuticals. However, the trade deficit expanded to a four-month high of $19.1 billion as imports of crude oil and gold also rose sharply, reflecting resilient domestic demand amid global volatility.", "category": "Business", "page": 17, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123904", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_16-05-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/123904"}], "article_id": "e9641766"}, {"headline": "Armed groups free 28 hostages in Manipur after community intervention", "summary": "Inter-tribal groups in Manipur's Tamenglong district released 28 people, including 12 Naga and 14 Kuki-Zo members, who were abducted during recent ethnic clashes. The release followed mediation by community leaders and local church authorities. While the state government welcomed the move, security remains tight as several others are still reported missing across the conflict-hit zones.", "category": "India", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123904", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123904"}], "article_id": "2ecde6c6"}, {"headline": "Trump returns to Washington after high-stakes China visit", "summary": "Donald Trump returned to the US following a controversial visit to Beijing where he met President Xi Jinping. Critics have labeled the trip a 'Suez moment' for the US, arguing that Trump's conciliatory tone towards China marks a shift in global power dynamics. Discussions focused on trade, intellectual property, and regional security in the South China Sea and Taiwan Strait.", "category": "World", "page": 20, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123904", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_16-05-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/123904"}], "article_id": "156459d6"}, {"headline": "Karnataka rejigs liquor tax; premium brands to get 23% cheaper", "summary": "The Karnataka government has restructured its excise duty slabs, leading to a significant price drop for premium and imported liquor. Prices for top-end scotch and whiskey are expected to fall by up to 23%, aiming to make the state competitive with neighboring markets like Maharashtra. The move is designed to curb smuggling and boost revenue by increasing the volume of legal sales.", "category": "Economy", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123904", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123904"}], "article_id": "81c542b8"}, {"headline": "SC slams 'cockroach' lawyers for attacking institutions via PILs", "summary": "A Supreme Court bench criticized a lawyer for filing a petition questioning the integrity of the judiciary, comparing such litigators to 'parasites and cockroaches.' The court stated that some individuals use public interest litigation as a tool to attack and weaken institutions for personal fame. The bench warned that it would not tolerate attempts to compromise the dignity of the law.", "category": "Law", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123904", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123904"}], "article_id": "c5f6265b"}, {"headline": "Deal with UAE to boost India's strategic oil reserves by 70%", "summary": "India has finalized an agreement with the UAE's ADNOC to fill its strategic petroleum reserves (SPR) in Mangalore. This deal will increase India's emergency oil storage capacity by 70%, from 5.3 million tons to approximately 9 million tons. The partnership enhances India's energy security against global supply shocks and deepens the bilateral economic relationship with the Gulf nation.", "category": "India", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123904", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123904"}], "article_id": "a32e305f"}, {"headline": "Akash Madhwal's three-wicket haul dents CSK's playoff hopes", "summary": "Lucknow Super Giants' bowler Akash Madhwal delivered a match-winning performance, taking 3 wickets for 26 runs to restrict Chennai Super Kings in their IPL encounter. Madhwal's spell in the death overs proved decisive, as CSK failed to chase down the target, significantly denting their chances of finishing in the top four. LSG's victory keeps them in firm contention for the playoffs.", "category": "Sports", "page": 19, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123904", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_16-05-2026.pdf", "page": 19, "telegram_url": "https://t.me/c/1877410077/123904"}], "article_id": "bdd6cb6c"}, {"headline": "Mapping no protection against SIR scrutiny: Election Commission", "summary": "The Election Commission clarified that door-to-door mapping of voters during the Special Intensive Revision (SIR) does not exempt individuals from further scrutiny. The process, which involves 59,000 booth-level officers, aims to ensure electoral roll accuracy by identifying duplicate or deceased entries. The EC emphasized that SIR is a mandatory statutory exercise to ensure fair polls.", "category": "Politics", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123904", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123904"}], "article_id": "7c9c3423"}, {"headline": "CIA chief visits Havana amid rumors of Cuban regime change", "summary": "CIA Director William Burns made a rare, unannounced visit to Havana, sparking speculation about a potential shift in US-Cuba relations or internal political changes on the island. The visit comes as Cuba faces its worst economic crisis in decades, with chronic fuel shortages and widespread power outages. Official reports suggest the trip focused on regional security and intelligence sharing.", "category": "World", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123904", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123904"}], "article_id": "ab1a5958"}, {"headline": "NLSIU VC promises campus revamp after student protests", "summary": "The Vice-Chancellor of National Law School of India University (NLSIU), Sudhir Krishnaswamy, promised a comprehensive revamp of campus facilities following student protests over poor living conditions. Issues raised included inadequate hostel rooms, inconsistent power supply, and poor internet connectivity. The VC assured students that renovation work would begin by the end of the month.", "category": "Education", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123904", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_16-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123904"}], "article_id": "58eebdce"}, {"headline": "Major kills JCO at firing practice in Nagpur ammo depot", "summary": "An Army Major allegedly shot and killed a Junior Commissioned Officer (JCO) during a routine firing practice session at the Central Ammunition Depot in Pulgaon, Nagpur. Preliminary reports suggest the incident occurred after a heated argument over a professional matter. The Army has ordered a high-level inquiry and a court of inquiry to investigate the circumstances of the shooting.", "category": "India", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123904", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123904"}], "article_id": "e6f60b26"}, {"headline": "Bengaluru van fees to jump 10% following fuel hike", "summary": "School bus and van operators in Bengaluru announced a minimum 10% hike in transportation fees for the upcoming academic year. The decision is a direct response to the ₹3 per litre increase in petrol and diesel prices. Parents have expressed frustration, as many schools have already increased tuition fees, adding to the financial burden on middle-class families in the city.", "category": "Economy", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123904", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_16-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123904"}], "article_id": "e18d75b1"}, {"headline": "Goa bypoll candidate dies of snakebite while campaigning in Karnataka", "summary": "Congress candidate for the Goa bypoll, Dr. Ketan Bhatikar, passed away after being bitten by a venomous snake while campaigning for the party in Dandeli, Karnataka. Bhatikar was a prominent local leader and orthopedic surgeon. His sudden demise has led to the postponement of the by-election, with party leaders across states expressing shock and offering condolences to his family.", "category": "India", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123904", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_16-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/123904"}], "article_id": "ffc5da15"}, {"headline": "Engineering college building collapses in Gujarat; no casualties reported", "summary": "A three-story building at the BBIT Engineering College in Vallabh Vidyanagar, Gujarat, collapsed late at night. Fortunately, the building was empty at the time of the incident, and no injuries were reported. The structure was over 40 years old and had been identified for demolition. Authorities have cordoned off the area and are conducting a safety audit of other campus buildings.", "category": "Infrastructure", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123904", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_16-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/123904"}], "article_id": "62a92ce9"}, {"headline": "Sat-Chi enter semis; PV Sindhu and Lakshya Sen exit Thailand Open", "summary": "Indian doubles pair Satwiksairaj Rankireddy and Chirag Shetty advanced to the semifinals of the Thailand Open after a hard-fought victory. However, it was a disappointing day for India in singles as both PV Sindhu and Lakshya Sen lost their respective quarterfinal matches. Sindhu's exit follows a string of inconsistent performances as she seeks to regain form before the Olympics.", "category": "Sports", "page": 18, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123904", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_16-05-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/123904"}], "article_id": "fc42d91b"}, {"headline": "Rapido valued at $3 billion following $240 million funding round", "summary": "Ride-hailing startup Rapido has reached a valuation of $3 billion after successfully raising $240 million in a new funding round led by WestBridge Capital. The company plans to use the capital to expand its auto-rickshaw and bike-taxi operations across more Indian cities and invest in its newly launched cab service. This funding highlights the growing investor interest in mobility platforms.", "category": "Business", "page": 17, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123904", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_16-05-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/123904"}], "article_id": "957c5065"}, {"headline": "Indian Rupee Breaches 96 Mark Against Dollar as Crude Prices Surge", "summary": "The Indian rupee touched a record low of 96.14 per dollar on Friday before closing at 95.96. The decline was fueled by global crude oil prices nearing $110 a barrel due to the West Asia conflict. The Reserve Bank of India intervened in the final minutes of trading to support the local currency. The unit has weakened by over 3% in the current fiscal year amid rising geopolitical tensions.", "category": "Economy", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123892"}, {"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_16-05-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/123904"}], "importance": 10, "article_id": "16781b03"}, {"headline": "Oil Marketing Companies Hike Petrol and Diesel Prices by Rs 3", "summary": "State-run oil companies increased petrol and diesel prices by Rs 3 per litre on Friday, the first hike in pump prices in four years. The move follows soaring global crude costs linked to the Iran war. While companies sought a hike of over Rs 10 per litre to offset losses, the government cleared a more modest increase to control retail inflation and limit the impact on freight costs.", "category": "Economy", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123892"}, {"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123866"}], "importance": 10, "article_id": "00d152da"}, {"headline": "Tata Trusts ordered to defer board meetings amid internal dispute", "summary": "The Charity Commissioner of Maharashtra has directed Tata Trusts to postpone its scheduled board meetings following a complaint regarding the appointment of certain trustees. The order comes amid a legal challenge over the trust's governance structure and the validity of recent administrative decisions. The trusts are expected to provide a detailed response to the regulator by next week.", "category": "Business", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123892"}, {"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123904"}], "importance": 8, "article_id": "f5d963c9"}, {"headline": "Gautam and Sagar Adani Agree to Pay $18 Million SEC Settlement", "summary": "Gautam Adani and his nephew Sagar have agreed to pay $18 million to settle US SEC allegations regarding false representations about Adani Green Energy Ltd. The case involved alleged bribes to Indian officials for solar power contracts. The settlement could facilitate the group's return to international capital markets as the US Justice Department also moves to drop related fraud charges.", "category": "Business", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123892"}, {"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 16-05-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/123866"}], "importance": 8, "article_id": "27441482"}, {"headline": "MP High Court Declares Disputed Bhojshala Complex a Temple", "summary": "The Indore bench of the Madhya Pradesh High Court has recognized the disputed Bhojshala-Kamal Maula Mosque complex as a temple of Goddess Saraswati. The court quashed a 2003 order allowing namaz on Fridays and directed the government to manage the site as a temple. The ruling cited an ASI survey indicating the structure was originally a Sanskrit teaching center built by the Parmar kings.", "category": "Law", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123892"}, {"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123866"}, {"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123904"}], "importance": 10, "article_id": "8b1f13b5"}, {"headline": "NEET-UG Re-Exam Set for June 21 with Shift to CBT Mode", "summary": "Union Education Minister Dharmendra Pradhan announced that the NEET-UG 2026 re-examination will be held on June 21. From 2027, the medical entrance test will transition to a computer-based test (CBT) format conducted over 20 sessions to prevent paper leaks. The CBI has arrested an alleged kingpin, a chemistry lecturer, who purportedly had access to the question papers for the 2024 exam.", "category": "Education", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 16-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123892"}, {"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123866"}], "importance": 10, "article_id": "f4254f2e"}, {"headline": "SC quashes ex-MLA Sengar’s bail in rape case", "summary": "The Supreme Court set aside a Delhi High Court order that had granted bail to expelled BJP leader Kuldeep Singh Sengar, convicted in the 2017 Unnao rape case. The apex court directed the High Court to conduct a fresh hearing, emphasizing the need to consider the impact on witnesses and the gravity of the offense before granting interim relief to a convict in such a sensitive case.", "category": "Law", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 16-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123892"}, {"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123866"}, {"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123904"}], "importance": 8, "article_id": "21c1a08f"}, {"headline": "India and UAE Sign Key Strategic Defence and Energy Pacts", "summary": "During Prime Minister Narendra Modi’s visit to Abu Dhabi, India and the UAE signed a Strategic Defence Partnership framework to bolster industrial collaboration. They also agreed to increase the UAE’s participation in India's strategic petroleum reserves to 30 million barrels. UAE entities announced $5 billion in new investments for India, focusing on infrastructure and energy security.", "category": "Politics", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 16-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123892"}, {"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123866"}], "importance": 9, "article_id": "45d79cd0"}, {"headline": "BRICS Meeting Ends Without Joint Statement Amid UAE-Iran Tension", "summary": "The BRICS Foreign Ministers’ Meeting in Delhi concluded with a chair statement instead of a joint communique after rifts between Iran and the UAE. Members held differing views on the West Asia crisis but agreed on the need for dialogue and respect for sovereignty. The meeting emphasized safe maritime passage through international waterways and the protection of civilian infrastructure.", "category": "World", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 16-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123892"}, {"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123866"}], "importance": 8, "article_id": "7d10abbf"}, {"headline": "Mitchell Marsh Powers Lucknow Super Giants to Win Over Chennai", "summary": "Mitchell Marsh's 38-ball 90 led Lucknow Super Giants to a seven-wicket victory against Chennai Super Kings. LSG chased down CSK's target of 188 with 20 balls to spare, aided by a 135-run opening partnership between Marsh and Josh Inglis. CSK's total of 187 for 5, featuring Kartik Sharma’s 71, proved insufficient against LSG’s aggressive chase and listless bowling from the opposition.", "category": "Sports", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 16-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/123892"}, {"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 16-05-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/123866"}], "importance": 6, "article_id": "37c871c1"}, {"headline": "‘I’m not in that space to prove my value’: Virat Kohli", "summary": "In a candid podcast interview, cricketer Virat Kohli expressed that he is no longer motivated by a need to prove himself to others. Kohli, currently the leading run-scorer in the IPL, stated that he will continue playing only as long as he finds value in his contribution and enjoys the game. He clarified his commitment to the 2027 World Cup remains dependent on his physical fitness.", "category": "Sports", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 16-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/123892"}, {"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_16-05-2026.pdf", "page": 19, "telegram_url": "https://t.me/c/1877410077/123904"}], "importance": 9, "article_id": "eebbd2c1"}, {"headline": "CBI arrests Chemistry professor as alleged mastermind behind NEET paper leak", "summary": "The CBI arrested PV Kulkarni, a professor from Latur, for allegedly dictating leaked NEET-UG 2026 questions to students in Pune. Kulkarni, who was part of the NTA's examination process, reportedly misused his access to provide answers to students who paid several lakhs of rupees. Eight people have been arrested across five states as the agency probes the breach in the command chain.", "category": "Law", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123866"}, {"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123904"}], "importance": 9, "article_id": "a926ac9f"}, {"headline": "Monsoon likely to hit Kerala on May 26, says weather dept", "summary": "The India Meteorological Department has forecast the early onset of the southwest monsoon over Kerala on May 26. This is significantly earlier than the typical June 1 onset date. The early arrival is expected to provide relief from intense summer heat and boost the agricultural sector, though the intensity of rainfall remains subject to evolving El Niño and La Niña conditions.", "category": "Environment", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123866"}, {"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123904"}], "importance": 9, "article_id": "188e22c2"}, {"headline": "7 of family killed in tipper-tractor collision in Koppal", "summary": "Seven members of a single family, including a child, died when a speeding tipper truck rammed into their tractor-trailer near Munirabad in Karnataka's Koppal district. The victims were returning from a temple visit when the accident occurred. Ten others sustained severe injuries and are currently undergoing treatment. Police have registered a case against the truck driver for negligence.", "category": "India", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 16-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123866"}, {"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_16-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123904"}], "importance": 6, "article_id": "f864d633"}]};
const CAT_META = {"Politics": {"color": "#e8334a", "icon": "🏛️"}, "Economy": {"color": "#f5a623", "icon": "📊"}, "Business": {"color": "#f0c040", "icon": "💼"}, "India": {"color": "#ff7043", "icon": "🇮🇳"}, "World": {"color": "#5c9eff", "icon": "🌍"}, "Sports": {"color": "#36c46f", "icon": "🏆"}, "Science": {"color": "#a78bfa", "icon": "🔬"}, "Technology": {"color": "#38bdf8", "icon": "💻"}, "Health": {"color": "#34d399", "icon": "🏥"}, "Law": {"color": "#fb923c", "icon": "⚖️"}, "Environment": {"color": "#4ade80", "icon": "🌿"}, "Education": {"color": "#e879f9", "icon": "📚"}, "Culture": {"color": "#f472b6", "icon": "🎭"}, "Infrastructure": {"color": "#94a3b8", "icon": "🏗️"}};

// FIXED: Pre-build data structures IMMEDIATELY for deep linking
const allArts = [...DIGEST.articles].sort((a,b)=>(b.importance||0)-(a.importance||0));
const byCategory = {};
for (const art of allArts) {
  const c = art.category||"India";
  if (!byCategory[c]) byCategory[c]=[];
  byCategory[c].push(art);
}
const sortedCats = Object.keys(byCategory).sort(
  (a,b)=>(byCategory[b][0].importance||0)-(byCategory[a][0].importance||0)
);

// FIXED DEEP LINK HANDLER - Runs IMMEDIATELY
let deepLinkTarget = null;
function handleDeepLink() {
  const hash = window.location.hash;
  if (!hash || !sortedCats.length) return;
  
  const cleanHash = hash.startsWith('#article-') ? hash.slice(9) : hash.slice(1);
  const targetArticle = DIGEST.articles.find(art => art.article_id === cleanHash);
  
  if (targetArticle) {
    deepLinkTarget = {article: targetArticle, hash: cleanHash};
  }
}
handleDeepLink();

let catIdx=0,vpW=0,vpH=0;
const panels=[];
const outer=document.getElementById('outer');
const hTrack=document.getElementById('hTrack');
const hintUp=document.getElementById('hintUp');
const hintRight=document.getElementById('hintRight');
const catFlash=document.getElementById('catFlash');
const cfIcon=document.getElementById('cfIcon');
const cfName=document.getElementById('cfName');

function buildAll() {
  vpW=outer.offsetWidth; vpH=outer.offsetHeight;
  hTrack.innerHTML=''; panels.length=0;
  sortedCats.forEach((cat,ci)=>{
    const m=CAT_META[cat]||{color:"#e8334a",icon:"📰"};
    const arts=byCategory[cat];
    const panel=document.createElement('div');
    panel.className='cat-panel';
    panel.id=`cat-panel-${ci}`;
    panel.style.setProperty('--cc',m.color);
    panel.innerHTML=`<div class="progress-row" id="prow-${ci}" style="--cc:${m.color}"></div><div class="v-feed" id="vfeed-${ci}"><div class="v-track" id="vtrack-${ci}"></div></div>`;
    hTrack.appendChild(panel);
    const pRow=panel.querySelector(`#prow-${ci}`);
    const vFeed=panel.querySelector(`#vfeed-${ci}`);
    const vTrack=panel.querySelector(`#vtrack-${ci}`);
    const cardH=vFeed.getBoundingClientRect().height||vpH;
    
    arts.forEach((art,ai)=>{
      const card = buildCard(art, cardH, m, cat, ai);
      card.id = `article-${art.article_id}`;
      card.dataset.articleId = art.article_id;
      vTrack.appendChild(card);
    });
    
    panels.push({pRow,vFeed,vTrack,articles:arts,artIdx:0});
    buildPRow(ci);
  });
  
  hTrack.style.transition='none';
  hTrack.style.transform='translateX(0)';
  syncV(0,false);
  
  // FIXED: Apply deep link after build
  if (deepLinkTarget) {
    setTimeout(() => applyDeepLink(deepLinkTarget), 100);
  }
}

function buildCard(art,h,m,cat,articleIndex) {
  const src=art.sources?.[0];
  const href=src?.pdf_filename?`pdfs/${src.pdf_filename}#page=${src.page}`:(src?.telegram_url||'#');
  const card=document.createElement('div');
  card.className='card';
  card.dataset.articleId = art.article_id;
  card.style.height=h+'px';
  card.style.setProperty('--cc',m.color);
  card.innerHTML=`
    <div class="card-content">
      <div class="card-toprow">
        <div class="cat-pill">
          <div class="pill-icon"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="1" y="1" width="8" height="2" rx="0.6" fill="#888"/><rect x="1" y="4.5" width="5" height="1.5" rx="0.6" fill="#666"/><rect x="1" y="7" width="6" height="1.5" rx="0.6" fill="#666"/></svg></div>
          ${cat.toUpperCase()}
        </div>
        <div class="card-date">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="2.5" width="11" height="9.5" rx="1.8" stroke="#555" stroke-width="1.2"/><path d="M4.5 1v3M8.5 1v3" stroke="#555" stroke-width="1.2" stroke-linecap="round"/><path d="M1 6h11" stroke="#555" stroke-width="1.2"/></svg>
          ${DIGEST.date}
        </div>
      </div>
      <div class="card-headline">${art.headline}</div>
      <div class="card-summary">${art.summary}</div>
      <div class="card-divider"></div>
      <div class="card-footer">
        ${src?`<a class="src-chip" href="${href}" target="_blank" onclick="event.stopPropagation()">${src.newspaper}<span class="src-chip-sep">&middot;</span><span class="src-chip-pg">Pg ${src.page}</span><span class="src-chip-ext"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M3.5 7.5L7.5 3.5M7.5 3.5H5M7.5 3.5V6" stroke="#555" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></span></a>`:'<div></div>'}
        <div class="info-btn"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6.5" stroke="#444" stroke-width="1.3"/><circle cx="7.5" cy="4.5" r="0.8" fill="#555"/><path d="M7.5 7v4" stroke="#555" stroke-width="1.5" stroke-linecap="round"/></svg></div>
      </div>
    </div>`;
  return card;
}

function buildPRow(ci) {
  const p=panels[ci],ai=p.artIdx;
  p.pRow.innerHTML='';
  p.articles.forEach((_,i)=>{
    const seg=document.createElement('div');
    seg.className='pseg'+(i<ai?' done':i===ai?' active':'');
    p.pRow.appendChild(seg);
  });
}

function syncV(ci,animated) {
  const p=panels[ci],h=p.vFeed.getBoundingClientRect().height;
 p.vTrack.style.transition=animated?'transform 0.35s cubic-bezier(0.4,0,0.2,1)':'none';
  p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;
  buildPRow(ci);
}

function applyDeepLink(target) {
  const ci = sortedCats.findIndex(cat =>
    byCategory[cat].some(art => art.article_id === target.hash)
  );
  if (ci === -1) return;
  goCat(ci, false);
  const ai = byCategory[sortedCats[ci]].findIndex(art => art.article_id === target.hash);
  if (ai === -1) return;
  panels[ci].artIdx = ai;
  syncV(ci, false);
  const card = document.getElementById('article-' + target.hash);
  if (card) { card.classList.add('target-highlight'); setTimeout(() => card.classList.remove('target-highlight'), 3000); }
}

function goArt(d) {
  const p=panels[catIdx];
  const n=Math.max(0,Math.min(p.artIdx+d,p.articles.length-1));
  if(n===p.artIdx&&d!==0)return;
  p.artIdx=n; syncV(catIdx,true); dismiss();
}

function goCat(idx,animated=true) {
  idx=Math.max(0,Math.min(idx,sortedCats.length-1));
  if(idx===catIdx&&animated)return;
  const prev=catIdx; catIdx=idx;
  hTrack.style.transition=animated?'transform 0.38s cubic-bezier(0.4,0,0.2,1)':'none';
  hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;
  if(animated&&idx!==prev) {
    const m=CAT_META[sortedCats[idx]]||{color:"#e8334a",icon:"📰"};
    catFlash.style.background=m.color+'18';
    cfIcon.textContent=m.icon; cfName.textContent=sortedCats[idx]; cfName.style.color=m.color;
    catFlash.classList.add('on'); setTimeout(()=>catFlash.classList.remove('on'),500);
  }
  dismiss();
}

let dismissed=false;
function dismiss() {
  if(dismissed)return; dismissed=true;
  hintUp.classList.remove('visible'); hintRight.classList.remove('visible');
  hintUp.classList.add('gone'); hintRight.classList.add('gone');
}

(function initHints() {
  const KEY='dailyBriefHintSeen';
  if(!localStorage.getItem(KEY)) {
    localStorage.setItem(KEY,'1');
    setTimeout(()=>{ if(!dismissed){ hintUp.classList.add('visible'); hintRight.classList.add('visible'); } },2500);
  }
})();

let tsX=0,tsY=0,tcX=0,tcY=0,axis=null,drag=false;
outer.addEventListener('touchstart',e=>{ tsX=e.touches[0].clientX; tsY=e.touches[0].clientY; tcX=0; tcY=0; axis=null; drag=true; hTrack.style.transition='none'; const p=panels[catIdx]; if(p)p.vTrack.style.transition='none'; },{passive:true});
outer.addEventListener('touchmove',e=>{ if(!drag)return; const dx=e.touches[0].clientX-tsX,dy=e.touches[0].clientY-tsY; tcX=dx; tcY=dy; if(!axis&&(Math.abs(dx)>8||Math.abs(dy)>8))axis=Math.abs(dx)>Math.abs(dy)?'h':'v'; if(!axis)return; e.preventDefault(); if(axis==='h'){ const edge=(catIdx===0&&dx>0)||(catIdx===sortedCats.length-1&&dx<0); hTrack.style.transform=`translateX(${-catIdx*vpW+dx*(edge ? 0.14 : 1)}px)`; }else{ const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height; const edge=(p.artIdx===0&&dy>0)||(p.artIdx===p.articles.length-1&&dy<0); p.vTrack.style.transform=`translateY(${-p.artIdx*h+dy*(edge ? 0.14 : 1)}px)`; } },{passive:false});
outer.addEventListener('touchend',()=>{ if(!drag)return; drag=false; if(axis==='h'){ const t=vpW*.2; if(tcX<-t)goCat(catIdx+1); else if(tcX>t)goCat(catIdx-1); else{hTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;} }else if(axis==='v'){ const t=vpH*.2; if(tcY<-t)goArt(1); else if(tcY>t)goArt(-1); else{const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height;p.vTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;} } axis=null; },{passive:true});
document.addEventListener('keydown',e=>{ if(e.key==='ArrowDown'||e.key===' '){e.preventDefault();goArt(1);} if(e.key==='ArrowUp'){e.preventDefault();goArt(-1);} if(e.key==='ArrowRight'){e.preventDefault();goCat(catIdx+1);} if(e.key==='ArrowLeft'){e.preventDefault();goCat(catIdx-1);} });
let wl=false;
outer.addEventListener('wheel',e=>{ e.preventDefault();if(wl)return;wl=true; Math.abs(e.deltaX)>Math.abs(e.deltaY)?goCat(catIdx+(e.deltaX>0?1:-1)):goArt(e.deltaY>0?1:-1); setTimeout(()=>wl=false,500); },{passive:false});
window.addEventListener('resize',()=>{ vpW=outer.offsetWidth;vpH=outer.offsetHeight; hTrack.style.transition='none'; hTrack.style.transform=`translateX(${-catIdx*vpW}px)`; panels.forEach(p=>{ const h=p.vFeed.getBoundingClientRect().height; p.vTrack.querySelectorAll('.card').forEach(c=>c.style.height=h+'px'); p.vTrack.style.transition='none'; p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`; }); });

buildAll();
</script>
