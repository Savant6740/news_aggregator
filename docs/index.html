elhi 13-03-2026 .pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/116815"}]}, {"headline": "India Remains World’s Second Largest Arms Importer Between 2021-2025", "summary": "According to SIPRI, India accounted for 8.2% of global arms imports from 2021 to 2025, trailing only Ukraine. Security tensions with China and Pakistan, including the May 2025 clash, drive these purchases. While India’s share has decreased from 9.3% in the previous five-year period, recent major acquisitions include French combat aircraft and German submarines.", "category": "India", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "Vision 2047: India to Create Drone Force and Special Agency", "summary": "The Indian government has unveiled a strategic roadmap for 'Vision 2047' focusing on defense modernization. Key initiatives include the creation of a dedicated Drone Force, a multi-layered defense system under 'Sudarshan Chakra,' and a space-based special agency. The plan emphasizes the integration of AI, cyber warfare capabilities, and enhanced private sector participation in defense.", "category": "India", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116780", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "Bomb threats to Maharashtra Legislature and Stock Exchange found to be hoax", "summary": "Security was heightened at the Maharashtra Legislature, Bombay High Court, and Bombay Stock Exchange following an email threat claiming missile and bomb attacks. Preliminary investigations by bomb detection and disposal squads suggested the threat was a hoax. Staff were evacuated from the buildings during the inspection, but no suspicious objects were found.", "category": "India", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "Meghalaya CM Conrad Sangma visits Garo Hills to restore peace", "summary": "Chief Minister Conrad K. Sangma visited Tura to review security after violence erupted over a notification regarding Scheduled Tribe certificates for local elections. He met with officials and local residents to discuss rebuilding trust between communities. Curfew was briefly relaxed in East and West Garo Hills districts to allow citizens to purchase essential items.", "category": "India", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "Kumbh Mela fame Monalisa Bhosle defends interfaith marriage in Kerala", "summary": "Monalisa Bhosle, who gained fame at the 2025 Maha Kumbh Mela, held a press conference to defend her interfaith marriage to actor Farman Khan. She dismissed 'love jihad' allegations, stating that neither partner converted their religion. The couple confirmed the wedding was legally registered in Kerala and conducted according to Hindu rituals at Bhosle’s request.", "category": "India", "page": 7, "importance": 2, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "Manipur: 21 Nagas released as bodies of two Kukis recovered", "summary": "Fresh tensions emerged in Manipur as 21 Tangkhul Naga captives were released, followed by the discovery of two Kuki men's bodies in Kamjong district. The deaths occurred during an alleged anti-poppy cultivation drive. Chief Minister Yumnam Khemchand Singh announced that the case would be handed over to the NIA and families of the deceased would receive compensation.", "category": "India", "page": 12, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "Gunman arrested after failed assassination attempt on National Conference chief Farooq Abdullah", "summary": "National Conference chief Farooq Abdullah escaped an assassination attempt in Jammu when 63-year-old Kamal Singh Jamwal fired at him from point-blank range. The attacker, who claimed he waited 20 years due to a personal grudge, was remanded to five-day police custody. Union Home Minister Amit Shah assured a high-level probe into the security breach for the Z+ category leader.", "category": "Politics", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "India unveils Defence Forces Vision 2047 roadmap for military modernization", "summary": "The Indian government released the \"Defence Forces Vision 2047\" roadmap to transform the military into a world-class force. The plan includes creating a drone force, cyber and space commands, a cognitive warfare action force, and a national air defence shield. The revamp will occur in three phases: transition (by 2030), consolidation (2030-40), and excellence (2040-47).", "category": "Politics", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "PM Modi reassures nation on energy security amid West Asia conflict", "summary": "Prime Minister Narendra Modi addressed concerns over the LPG situation in India, comparing the current energy crisis to the Covid-19 pandemic. He stated the government is taking all necessary steps to safeguard energy security and warned against black-marketing. Addressing the NXT Summit, he urged citizens not to panic and reaffirmed India's commitment to overcoming global hurdles.", "category": "Politics", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "PM Modi expresses concern over civilian lives in call with Iran", "summary": "Prime Minister Narendra Modi held a phone call with Iranian President Masoud Pezeshkian, expressing deep concern over the escalation of tensions and loss of civilian lives in West Asia. He specifically raised the issue of the safety and security of Indian nationals in the region. This was the first conversation between the two leaders since the start of the conflict.", "category": "Politics", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Delhi Assembly budget session scheduled to begin on March 23", "summary": "The budget session for the Delhi Assembly is expected to commence on March 23. Chief Minister Rekha Gupta will chair a cabinet meeting to formalize the proposal. The Economic Survey will be tabled on the first day, followed by the presentation of the annual budget for 2026-27. Officials anticipate the budget allocation will remain similar to the previous year's ₹1 lakh crore.", "category": "Politics", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Retired judge to investigate fraudulent diploma certificates in Karnataka", "summary": "The Karnataka government ordered an inquiry by retired judge Narayana into allegations of employees using fake diplomas to secure promotions in the Transport Department. Preliminary findings suggest widespread irregularities involving the technical education department as well. Transport Minister Ramalinga Reddy stated that the probe will investigate the source of the forged certificates.", "category": "Politics", "page": 5, "importance": 4, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Rebel CPI(M) leader G Sudhakaran to contest Kerala elections as Independent", "summary": "Former Kerala minister G Sudhakaran announced he will contest the upcoming assembly elections as an Independent from Ambalappuzha. Sudhakaran, a veteran of 63 years in the CPI(M), decided not to renew his membership after feeling \"insulted and neglected\" by current party leadership. The Congress party stated it would deliberate on potentially supporting his candidacy.", "category": "Politics", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "India negotiates with Iran for naval-escorted passage of merchant vessels", "summary": "India is in discussions with Iranian authorities to arrange the safe passage of nearly 30 Indian-flagged merchant vessels through the Strait of Hormuz. The plan involves Indian Navy escorts following multiple attacks on tankers in the Persian Gulf. External Affairs Minister S Jaishankar has held several calls with his Iranian counterpart to address shipping safety and energy security.", "category": "Politics", "page": 7, "importance": 9, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "PM Modi to release 18,640 crore rupees under PM Kisan", "summary": "Prime Minister Narendra Modi will release the 22nd instalment of the PM Kisan scheme in Guwahati on Friday. A total of ₹18,640 crore will be transferred directly to the bank accounts of over 90 million farmers, including 20 million women. The funds are intended to support cultivators ahead of the summer-sown season, providing income support of ₹2,000 per eligible farmer.", "category": "Politics", "page": 9, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Election Commission appoints senior officers for all West Bengal constituencies", "summary": "For the first time, the Election Commission formally appointed SDM-level or higher officers as Returning Officers (RO) for all 294 assembly seats in West Bengal. The move brings the state in line with national standards, replacing lower-rank officials. The appointments resolve a seniority dispute between the ECI and the state government ahead of upcoming elections.", "category": "Politics", "page": 9, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Hormuz Strait to stay closed: Mojtaba's first message as Iran's leader", "summary": "Ayatollah Mojtaba Khamenei, Iran's new supreme leader, ordered forces to keep the Strait of Hormuz closed until US-Israeli attacks on the country cease. The International Energy Agency warned this could lead to the largest supply disruption in history, causing a massive surge in global oil prices and impacting global energy security.", "category": "Politics", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/116795", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "No special treatment for anyone in Lok Sabha, says Om Birla", "summary": "Speaker Om Birla rejected a no-confidence vote against him, asserting that Lok Sabha rules apply equally to all members. He stated he would not provide special treatment to any individual, including the Leader of Opposition, and emphasized that the House functions based on established procedures and impartiality.", "category": "Politics", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116795", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "PM Modi talks to Iran President, stresses safety of Indians", "summary": "Prime Minister Narendra Modi spoke with Iranian President Masoud Pezeshkian to discuss the safety of Indian nationals amid escalating conflict in West Asia. Modi emphasized the need for the unimpeded flow of goods and energy while expressing concern over the loss of civilian lives and damage to infrastructure in the region.", "category": "Politics", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/116795", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "Rastriya Swatantra Party wins 182 seats in Nepal elections", "summary": "The Rastriya Swatantra Party (RSP) secured 182 seats in Nepal's parliamentary elections, gaining a clear majority in the 275-member House of Representatives. RSP is now positioned to form a new government with Balen Shah as Prime Minister, signaling a major shift in Nepal's political landscape.", "category": "Politics", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116795", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "Cylinder crisis in Karnataka likely to stabilise in 7-10 days", "summary": "Food and Civil Supplies Minister KH Muniyappa stated that the LPG shortage in Karnataka will be resolved within 10 days. The state government is coordinating with oil companies and the Centre to prioritize supply for hospitals, hostels, and households. Two ships carrying gas are expected to reach Indian ports shortly.", "category": "Politics", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116795", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "India discusses safe passage for ships with Iran", "summary": "External Affairs Minister S Jaishankar discussed the safety of commercial shipping with his Iranian counterpart. While India sought assurances for vessels in the Persian Gulf and Strait of Hormuz, officials noted it is premature to confirm if Iran will exempt Indian-bound ships from its blockade. Over 770 Indian sailors are currently on vessels in the region.", "category": "Politics", "page": 5, "importance": 9, "telegram_url": "https://t.me/c/1877410077/116795", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "India sponsors GCC-led UN resolution against Iran", "summary": "India has co-sponsored a UN Security Council resolution led by GCC countries condemning attacks by Iran and demanding an end to threats in the Strait of Hormuz. The MEA stated this move reflects India's position on regional stability and the safety of the Indian diaspora. Prime Minister Modi had previously condemned attacks on all GCC countries.", "category": "Politics", "page": 5, "importance": 9, "telegram_url": "https://t.me/c/1877410077/116795", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "House Panel Proposes Including Startups and Four-Wheelers in E-Mobility Schemes", "summary": "A parliamentary standing committee has recommended including startups in the ₹25,938 crore PLI-Auto scheme and adding electric four-wheelers to the PM E-Drive scheme. The panel argued current eligibility thresholds exclude innovative domestic manufacturers. It also suggested extending subsidies for electric two-wheelers through FY28 to support the country's green mobility goals.", "category": "Politics", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "Rahul Gandhi Warns Ongoing War Will Impact Indian Energy Market", "summary": "Opposition leader Rahul Gandhi expressed concern in the Lok Sabha that the conflict involving Israel and Iran will have severe consequences for India's energy security. He noted that the Strait of Hormuz facilitates roughly 20% of global oil flow. Gandhi questioned the government's dependency on certain suppliers and urged for a more diversified strategy to mitigate supply shocks.", "category": "Politics", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116780", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "Kharge Demands Statehood for J&K Following Attack on Farooq Abdullah", "summary": "Congress President Mallikarjun Kharge demanded the immediate restoration of statehood for Jammu and Kashmir after an attack on former CM Farooq Abdullah. Abdullah survived a stone-pelting incident in Jammu. Kharge held the Union Home Ministry responsible for the security lapse, arguing that only a state government can ensure better law and order in the region.", "category": "Politics", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116780", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "Election Commission to Deploy More Observers for West Bengal Polls", "summary": "The Election Commission of India has decided to deploy a record number of general, police, and expenditure observers for the upcoming assembly elections in West Bengal. The number of special observers will rise to 294, one for each constituency, to ensure free and fair polling. This move aims to prevent electoral malpractices and monitor the law-and-order situation during the voting phase.", "category": "Politics", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116780", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "Government removes Turkish firms from Indian metro projects on security grounds", "summary": "The Ministry of Housing and Urban Affairs has directed the removal of Turkish companies ASIS Elektronik and Gulermak Agir Sanayi from metro rail contracts in Bhopal and Indore. The move follows concerns raised by the Ministry of Home Affairs regarding potential sabotage and espionage risks tied to Turkey's support for Pakistan during Operation Sindoor.", "category": "Politics", "page": 11, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116770", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 13~03~2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/116770"}]}, {"headline": "President Murmu calls for gender-inclusive policies in agri-food sector", "summary": "Inaugurating a global conference in New Delhi, President Droupadi Murmu urged policymakers to close the gender gap by providing targeted support for women farmers in land titles and finance. She highlighted that women already hold 56% of Jan Dhan accounts and 68% of Mudra loans, and called for their greater participation in leadership and policy decision-making roles.", "category": "Politics", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116770", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 13~03~2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/116770"}]}, {"headline": "India co-sponsors UN resolution condemning Iranian interference in Strait of Hormuz", "summary": "India has co-sponsored a United Nations Security Council resolution alongside 134 countries demanding an immediate halt to Iranian attacks on navigation in the Strait of Hormuz. The resolution specifically condemns threats to international shipping. India's support highlights concerns over energy security and the safety of 10 million Indian citizens residing in the Gulf region.", "category": "Politics", "page": 3, "importance": 9, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "President Secretariat rejects TMC request for appointment citing paucity of time", "summary": "The President’s Secretariat turned down a request from the Trinamool Congress to meet President Droupadi Murmu to discuss tribal welfare programs in West Bengal. The refusal follows a protocol controversy during the President's recent visit to Siliguri. The TMC has requested a reconsideration of the schedule to brief her on state-led development initiatives.", "category": "Politics", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "Six Delhi BJP MPs discuss civic development with L-G Sandhu", "summary": "Six BJP MPs from Delhi met Lieutenant-Governor Taranjit Singh Sandhu to discuss the implementation of the Master Plan 2041, traffic management, and sanitation. The MPs offered full cooperation for the city's growth. L-G Sandhu assured them that projects benefiting the public, including the DDA land pooling policy for Narela, would be prioritized.", "category": "Politics", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "AAP and BJP exchange barbs over alleged attack on Dalit councillor", "summary": "The Aam Aadmi Party accused BJP supporters of assaulting Dalit councillor Jyoti Gautam in Rajinder Nagar. AAP leaders claimed the police failed to register an FIR despite a formal complaint. The BJP denied the charges, asserting that AAP workers created a disturbance over credit for local development work and that one worker was injured by slipping during the commotion.", "category": "Politics", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "BJD and Congress issue whips for Rajya Sabha elections in Odisha", "summary": "The Biju Janata Dal and Congress have directed their MLAs to remain in Bhubaneswar ahead of the Rajya Sabha elections on Monday. With five candidates vying for four vacancies, political analysts anticipate potential cross-voting. Each candidate requires 30 votes to win; the BJP has 79 MLAs while the BJD has 50. The Congress is backing a common candidate with the BJD.", "category": "Politics", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "Rajendra Arlekar assumes charge as Governor of Tamil Nadu", "summary": "Rajendra Vishwanath Arlekar was sworn in as the Governor of Tamil Nadu at Lok Bhavan in Chennai. The oath of office was administered by Madras High Court Chief Justice Sushrut Arvind Dharmadhikari. The ceremony was attended by Chief Minister M.K. Stalin and other senior officials. Arlekar was previously the Governor of Kerala and was appointed to the new post on March 5.", "category": "Politics", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "Thirty Congress MLAs suspended in Chhattisgarh over LPG shortage protest", "summary": "The Chhattisgarh Assembly witnessed an uproar as 30 Congress legislators were briefly suspended for demanding a discussion on LPG cylinder shortages. The opposition alleged widespread black marketing and hoarding. The Chair disallowed the discussion, stating the matter pertains to the Central government, leading to slogans and a march into the well of the House.", "category": "Politics", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "Punjab CM Bhagwant Mann warns against hoarding amid LPG shortage rumours", "summary": "Punjab Chief Minister Bhagwant Mann addressed public concerns over a possible LPG shortage triggered by the West Asia crisis. He stated that the state has adequate stocks and warned that exemplary action would be taken against anyone found hoarding essential goods or spreading misinformation. Mann urged the public not to panic and to rely on official government updates.", "category": "Politics", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "Congress demands all-party meeting on women’s reservation implementation", "summary": "The Congress party has urged the government to convene an all-party meeting to discuss the timeline for implementing the Women's Reservation Act. The legislation, passed in 2023, seeks to allocate 33% of seats in the Lok Sabha and State Assemblies to women. The party insists on a collective consultation rather than individual discussions with political groups.", "category": "Politics", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "MP raises concern over delayed promotions for CAPF officers", "summary": "Samajwadi Party MP Ram Gopal Yadav highlighted the 'demoralizing' lack of promotions for Central Armed Police Forces (CAPF) officers in the Rajya Sabha. He noted that officers often wait 15 years for their first promotion and urged the government to implement a Supreme Court order regarding Organised Group A Services status and reduced IPS deputations in the forces.", "category": "Politics", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "Farooq Abdullah calls for inquiry into assassination attempt in Jammu", "summary": "Former J&K Chief Minister Farooq Abdullah demanded a thorough probe after a resident fired two shots at him during a wedding in Jammu. Abdullah stated that hatred is deeply rooted in modern India and the space for secularism is shrinking. The accused claimed a long-standing personal rivalry, though Abdullah denied ever meeting the man. Union leaders expressed concern over his safety.", "category": "Politics", "page": 12, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "Rajya Sabha discusses UP school closures and lack of judicial diversity", "summary": "During Zero Hour, MPs raised concerns over the closure or merger of 27,000 schools in Uttar Pradesh and the burden of non-academic duties on teachers. DMK MP P. Wilson also highlighted the lack of social diversity in the higher judiciary, noting that 80% of High Court judges appointed in the last five years belong to forward communities. He renewed calls for regional SC benches.", "category": "Politics", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "MEA calls reports of ships crossing Strait of Hormuz 'premature'", "summary": "The Ministry of External Affairs stated it is premature to confirm reports that Indian ships have received special permission to cross the Strait of Hormuz. While Foreign Ministers of India and Iran have discussed energy security and maritime safety, cargo ships remain targets. An Indian sailor recently died after a Thai-flagged vessel headed for Gujarat was hit near Basra.", "category": "Politics", "page": 13, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "Bangladesh and neighbors request energy supplies from India", "summary": "The Ministry of External Affairs confirmed receiving a request from Bangladesh for high-speed diesel via the Friendship Pipeline. Similar requests for energy assistance have been made by Sri Lanka and the Maldives. India will evaluate its own refining capacity and domestic requirements while considering these requests against the backdrop of global fuel supply disruptions.", "category": "Politics", "page": 13, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "PM Modi Vows to Prevent Religion-Based Reservations in Election Interview", "summary": "Prime Minister Narendra Modi asserted he will not allow religion-based reservations as long as he is alive. In an interview, he accused the opposition of attempting to shift quotas from Dalit, Adivasi, and OBC communities to Muslims for vote-bank politics. Modi emphasized his commitment to the Constitution and criticized the Congress party's past governance.", "category": "Politics", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/116738", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 13~03~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116738"}]}, {"headline": "Srinagar court recalls non-bailable warrant against Farooq Abdullah following attempt", "summary": "A Srinagar court recalled a non-bailable warrant against former J&K chief minister Farooq Abdullah hours after issuing it. The warrant was originally issued in a case regarding financial irregularities in the J&K Cricket Association after Abdullah failed to appear. His counsel moved to recall it, citing medical advice against travel following the recent attempt on his life.", "category": "Law", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Karnataka government orders premature release of 31 life convicts", "summary": "The Karnataka government has ordered the premature release of 31 life convicts from various central prisons based on good conduct. The decision followed recommendations from the Life Convict Review Committee and approval from the Governor under Article 161. The release aims to facilitate the rehabilitation of eligible prisoners who met prescribed criteria.", "category": "Law", "page": 5, "importance": 4, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Court grants bail to five KSU activists in Kerala health minister case", "summary": "A court in Kannur granted bail to five KSU activists arrested for an alleged attack on Kerala Health Minister Veena George during a black-flag protest. The judge noted a lack of evidence that the accused used any weapons. The activists were charged with attempt to murder following the February 25 incident at Kannur railway station regarding medical negligence claims.", "category": "Law", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Supreme Court directs petitioner to Law Commission over Muslim gift law", "summary": "The Supreme Court asked a petitioner challenging the registration exemption for Muslim gifts (hiba) to first approach the Law Commission of India. The petition argued that the exemption in the Transfer of Property Act is discriminatory. The bench stated the Law Commission is the appropriate body to study such laws and recommend changes before judicial intervention.", "category": "Law", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Calcutta High Court acquits death row convict after finding trial errors", "summary": "The Calcutta High Court acquitted Baladeb Paul, who was sentenced to death for a 2011 murder, citing basic procedural mistakes by the sessions court judge. The bench noted the conviction relied on interested witnesses without corroborating evidence. The court ordered the judge's conduct to be reviewed by the Chief Justice for potential corrective measures regarding trial guidance.", "category": "Law", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Allahabad High Court orders police protection for man facing threats", "summary": "The Allahabad High Court ordered 24-hour police protection for Haseen Khan, who alleged that Bareilly police threatened to demolish his house for performing namaz inside. The court stated that any violence against him would be viewed as state-instigated. The District Magistrate and SSP have been ordered to appear at the next hearing on March 23.", "category": "Law", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Allahabad High Court refuses to quash FIRs in Bareilly clashes", "summary": "The Allahabad High Court dismissed a bunch of petitions seeking to quash FIRs related to the September 2025 Bareilly violence. The court vacated interim stays on arrests for some accused and noted that the case was not fit for quashing. Clashes had broken out between police and a crowd outside a mosque, with cleric Tauqeer Raza Khan named as the main accused.", "category": "Law", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Supreme Court criticizes six states for delay in naming DGPs", "summary": "The Supreme Court criticized six states, including Punjab and Himachal Pradesh, for failing to send names to the UPSC for the appointment of Directors General of Police. The court warned that states not following the 2006 Prakash Singh judgment are prima facie in contempt. It has sought responses from the defaulting states regarding the delay in filling anticipated vacancies.", "category": "Law", "page": 11, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Supreme Court grants bail to two accused in Sidhu Moosewala case", "summary": "The Supreme Court granted bail to Pawan Bishnoi and Jagtar Singh, accused in the 2022 murder of Punjabi singer Sidhu Moosewala. The bench cited the long incarceration period as a factor for relief. Pawan is an alleged associate of gangster Lawrence Bishnoi, while Jagtar was suspected of passing information about the singer. Moosewala was shot dead in Punjab’s Mansa in May 2022.", "category": "Law", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Supreme Court warns against building criminal cases based on public bias", "summary": "The Supreme Court cautioned that building criminal cases based on public perception or personal bias instead of evidence can derail justice. The observation came as the court upheld the acquittal of a couple accused of setting their parents on fire in Bihar. The bench noted that overzealous investigations can permanently scar innocent people while allowing real perpetrators to escape.", "category": "Law", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "New Income Tax Act to launch April 1 with simplified forms", "summary": "The Department of Revenue will roll out the Income-tax Act, 2025, starting April 1 with an initial set of 54 forms out of a total of 190. The transition aims for a smooth rollout, with the remaining forms introduced in phases throughout FY27. A parliamentary panel has called for rigorous stress testing of IT systems to handle the expected surge in filings under the new legal framework.", "category": "Law", "page": 7, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116815", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 13-03-2026 .pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/116815"}]}, {"headline": "Kids' welfare above foreign court orders, rules Delhi High Court", "summary": "The Delhi High Court ruled that foreign court orders cannot override the welfare of children in custody matters. The court rejected a plea by a Pakistani-origin man whose British citizen wife returned to India with their children. The court emphasized that children are currently living in a stable family environment in India.", "category": "Law", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116795", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "Bengaluru cybercrime convictions remain low despite rising cases", "summary": "Data shows only 778 cybercrime convictions in Bengaluru over the last five years, despite a massive surge in registered cases. In 2024, only 25 convictions were recorded compared to over 14,000 acquittals. Officials cite sophisticated tactics, cross-border jurisdictional issues, and complex financial trails as major hurdles in prosecution.", "category": "Law", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116795", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "Supreme Court clarifies ruling on passive euthanasia and medical care", "summary": "In a landmark ruling, the Supreme Court allowed the withdrawal of life-sustaining treatment for patients in a permanent vegetative state. The court established guidelines for 'living wills' and mandated that medical boards must assess each case. The ruling aims to ensure that the transition to death is handled with dignity and in accordance with ethical standards.", "category": "Law", "page": 6, "importance": 9, "telegram_url": "https://t.me/c/1877410077/116795", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "High Court allows unrelated donors to give kidneys for transplant", "summary": "The Calcutta High Court permitted two patients to receive kidney transplants from unrelated donors, overturning previous rejections by the state health department. The court ruled that if the donation is made out of affection and without any financial dealing, it should be allowed. The ruling emphasizes the right to life and healthcare for terminally ill patients.", "category": "Law", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116795", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "Supreme Court to Examine Validity of Mandatory EPF for Foreign Workers", "summary": "The Supreme Court has issued a notice to the Union government regarding a plea by LG Electronics challenging mandatory EPF contributions for \"international workers.\" The company argues against rules requiring foreign nationals to enroll in the retirement savings scheme. The case follows a Delhi High Court ruling that upheld the government's power to extend EPF to expats.", "category": "Law", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "EU Antitrust Chief Scrutinizes Big Tech AI Operations for Competition Distortions", "summary": "The European Union’s antitrust chief, Teresa Ribera, has placed the entire AI stack under scrutiny to prevent potential corporate power entrenchment. Regulators are examining alleged risks posed by giants like Nvidia and Meta to ensure competition isn't distorted. The probe looks at technologies and services underpinning AI systems to maintain fair market access across the sector.", "category": "Law", "page": 7, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "Mumbai Police Register FIR Against ADAG-Linked Finance Companies", "summary": "The Mumbai Police have registered a First Information Report (FIR) against companies linked to the Anil Dhirubhai Ambani Group (ADAG), including Reliance Finance. The case follows a complaint by Axis Bank alleging financial irregularities and diversion of funds. An audit reportedly found that approximately Rs 1,800 crore were diverted through structured transactions between various entities.", "category": "Law", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116780", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "Rail Travel Insurance Should be Limited to Online Tickets: Supreme Court", "summary": "The Supreme Court of India suggested that rail travel insurance should be limited to passengers who book tickets through the IRCTC website. The court noted the difficulty in verifying identity and providing coverage for those purchasing tickets at physical counters. The observation came during a hearing on ensuring equal access to travel safety measures for all rail passengers.", "category": "Law", "page": 13, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116780", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "SEBI proposes simplifying securities claim process for bereaved families", "summary": "The Securities and Exchange Board of India (SEBI) has proposed raising the threshold for simplified documentation in securities transmission to ₹30 lakh for dematerialised holdings. The regulator also introduced a 'straight-through processing' category for small claims under ₹30,000 to reduce procedural burdens on heirs while maintaining safeguards against fraud.", "category": "Law", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116770", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 13~03~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/116770"}]}, {"headline": "High Court refuses to stay Delhi University ban on campus protests", "summary": "The Delhi High Court declined to stay a blanket ban on protests and demonstrations at Delhi University campus. While questioning the necessity of such sweeping restrictions under Article 19, the court remarked that students must behave fairly. The police maintained that the order was issued to prevent potential clashes between student groups and maintain law and order.", "category": "Law", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "Over 2,400 cases registered under SC/ST Act in Chhattisgarh", "summary": "The Chhattisgarh government informed the State Assembly that 2,455 cases under the SC/ST (Prevention of Atrocities) Act were registered between January 2023 and February 2026. Data revealed 1,013 rape cases, 73 murders, and 30 abductions. Janjgir Champa and Balrampur recorded the highest number of cases. The state provided a district-wise breakdown of crimes against scheduled communities.", "category": "Law", "page": 12, "importance": 4, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "Supreme Court: Parental income alone cannot determine OBC creamy layer", "summary": "The Supreme Court ruled that parental income from salaries and agricultural land should be excluded when determining the 'creamy layer' status for OBC reservation. The court clarified that the exclusion criteria is primarily status-based. This decision is expected to widen the reservation pool for children of many PSU and public sector employees previously disqualified by income tests.", "category": "Law", "page": 14, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "Calcutta High Court Cancels All OBC Certificates Issued After 2010", "summary": "The Calcutta High Court struck down the OBC status of several classes, primarily Muslim communities, granted by the West Bengal government since 2010. The court cited a lack of proper reports and data for the classification, affecting nearly 5 lakh people. However, those already in service or who have availed the quota will not be affected by the order.", "category": "Law", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/116738", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 13~03~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116738"}]}, {"headline": "Doctors Arrested for Swapping Blood Samples in Pune Porsche Crash Case", "summary": "Pune Police arrested two senior doctors for allegedly swapping blood samples of the minor driver in the luxury car crash case. The doctors are accused of discarding the original sample to hide alcohol consumption. This development follows the arrest of the teen's father and grandfather, highlighting significant attempts to manipulate evidence using family influence.", "category": "Law", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/116738", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 13~03~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116738"}]}, {"headline": "Grandfather of Porsche Crash Teen Arrested for Confinement of Driver", "summary": "The Pune Police arrested the grandfather of the 17-year-old involved in the luxury car crash for the wrongful confinement of the family's driver. Investigators allege the grandfather pressured the driver to take the blame for the accident in exchange for money and threats. This adds to multiple charges faced by the wealthy family involved in the fatal incident.", "category": "Law", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116738", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 13~03~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116738"}]}, {"headline": "Signaling cable theft disrupts services on newly opened Magenta Line stretch", "summary": "Metro services on the new 9.9-km Magenta Line extension between Deepali Chowk and Majlis Park were disrupted after over 500 metres of signaling cables were stolen. The disruption occurred just four days after the corridor was inaugurated by Prime Minister Narendra Modi. Officials are working to repair the damage and investigate the theft on the newly opened stretch.", "category": "Infrastructure", "page": 1, "importance": 4, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Karnataka Cabinet approves international cricket stadium for Bengaluru", "summary": "The Karnataka Cabinet approved the construction of a new international cricket stadium in Anekal taluk, Bengaluru, at an estimated cost of ₹1,980 crore. The project, named \"KHB Surya Sports Village,\" will be built on 75 acres and include commercial infrastructure. Other approvals included railway barricades to prevent wildlife conflict and modernization of canal systems in Mandya.", "category": "Infrastructure", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Parliamentary panel recommends national framework for electrical safety", "summary": "The Standing Committee on Energy has called for a National Electrical Safety and Cable Management Framework to address the danger of hanging live wires. The report highlighted gaps in accountability for distribution utilities and the risk \"jungles of wires\" pose to life and property. The panel also recommended using AI to manage increasing demands on the national grid.", "category": "Infrastructure", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Power stocks surge 8% as Delhi peak demand forecasts hit record", "summary": "Shares of utilities including NTPC, Adani Power, and JSW Energy rallied as India's evening power demand hit a record 224.6 GW. Experts anticipate a harsh summer will drive high plant load factors for thermal units. In Delhi, peak demand is expected to exceed 9,000 MW, prompting the government to consider emergency provisions to ensure power plants operate at full capacity.", "category": "Infrastructure", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116815", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 13-03-2026 .pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/116815"}]}, {"headline": "Ship led by Indian captain arrives in Mumbai from Saudi Arabia", "summary": "The Shenlong Suezmax, a Liberian-flagged vessel commanded by an Indian captain, arrived at Mumbai port carrying 135,335 metric tonnes of crude oil from Saudi Arabia. The vessel successfully navigated the Strait of Hormuz amid high tensions. It is the first vessel to arrive at the port via the volatile route since the conflict intensified.", "category": "Infrastructure", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116795", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "All crest gates of Tungabhadra dam to be replaced by May", "summary": "Karnataka Deputy CM DK Shivakumar announced that all crest gates of the Tungabhadra dam will be replaced by May to ensure long-term safety. Following damage to the 19th gate last year, the government has fast-tracked the project at a cost of 34.5 crore. Work is being carried out by specialized teams to meet the pre-monsoon deadline.", "category": "Infrastructure", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116795", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "SWR fast-tracks Kavach cover for safer train travel", "summary": "South Western Railway is set to implement the Kavach indigenous automatic train protection system on 3,721 km of its network by March 2026. The system prevents collisions by automatically applying brakes if a driver exceeds speed limits or ignores signals. The first phase will cover busy routes like Hubballi, Arsikere, and Bengaluru.", "category": "Infrastructure", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116795", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "Cargo Matters to Invest 100 Crore in EV Manufacturing in Andhra Pradesh", "summary": "Logistics firm Cargo Matters will invest ₹100 crore to set up an EV manufacturing and charging hub in Andhra Pradesh. The facility will include a manufacturing block for chargers, a retrofit facility for heavy vehicle electrification, and a research unit. The investment follows an MoU with the state government to support sustainable infrastructure and green transport goals.", "category": "Infrastructure", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "India Plans Incentives for Construction Hardware Manufacturing to Reduce Imports", "summary": "The Centre is considering 12-16% incentives to boost domestic manufacturing of construction equipment like cranes and tunnel boring machines. The proposed ₹14,300 crore scheme aims to reduce reliance on imports as India's infrastructure spending surges. Incentives would be spread over five years, focusing on local production of high-quality components and spare parts for the sector.", "category": "Infrastructure", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "Alternate Sources in Play to Meet Peak Power Demand", "summary": "The Indian government is preparing to meet a projected peak power demand of 271 GW this summer by utilizing alternate energy sources. Plans include gas-based power plants and new solar and wind capacity additions. However, a shortfall of 8-10 GW from gas-fired units is expected due to high prices. Grid controllers are working to manage supply from both imported and domestic fuel sources.", "category": "Infrastructure", "page": 15, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116780", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "Electrifying industrial heat: India's path to thermal independence", "summary": "As natural gas supplies fluctuate due to the West Asia crisis, Indian industries in hubs like Morbi and Ludhiana are exploring electrified heat and concentrated solar thermal (CST) technology. Industrial heat accounts for 25% of India's energy use. Shifting to induction and plasma heating could reduce gas dependency, though significant grid upgrades and storage solutions are required.", "category": "Infrastructure", "page": 13, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "India must rely on imports for LPG due to storage limitations", "summary": "Despite a 25% increase in domestic LPG production, India remains 50% dependent on imports, which are vulnerable to blockades in the Strait of Hormuz. Unlike crude oil, India lacks strategic long-term storage for LPG. Refining companies have been ordered to prioritize LPG yield over petrochemical derivatives like polypropylene to manage the current supply crisis.", "category": "Infrastructure", "page": 13, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "Government to announce one trillion rupee fund to boost domestic semiconductors", "summary": "India is set to announce a ₹1 trillion fund for the second phase of the India Semiconductor Mission (ISM 2.0). The move aims to build self-reliance and make the country a key part of the global electronics supply chain. The funding will support chip design, specialized assembly, and testing infrastructure, following ₹76,000 crore committed in the first phase.", "category": "Technology", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Karnataka government sets up panel for responsible Artificial Intelligence policy", "summary": "The Karnataka government constituted a Committee on Responsible AI, chaired by Infosys co-founder Kris Gopalakrishnan. The panel will develop a policy framework for the safe and transparent use of AI in government systems. It will focus on risk classification, privacy safeguards, and procurement guidelines, with an interim report due in 60 days and a final report in 90 days.", "category": "Technology", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Iranian-backed hackers target US medical firm Stryker in cyberattack", "summary": "Pro-Iranian hackers claimed responsibility for a major cyberattack on the US medical technology company Stryker. The group, known as \"Handala,\" stated the attack was retaliation for civilian deaths in Iran. Experts warn of an increasing wave of digital chaos targeting US power stations, water plants, and defense contractors as the conflict expands into the cyber domain.", "category": "Technology", "page": 13, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "HCLTech Chennai shifts to work from home due to canteen LPG crisis", "summary": "IT major HCLTech allowed employees at its Chennai center to work from home after limited LPG supplies disrupted office canteen operations. Other firms like Infosys and HTC Global also scaled down food court services or switched to packed snacks. The crisis follows a national shortage of commercial LPG cylinders triggered by the escalating military conflict in the West Asia region.", "category": "Technology", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116815", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 13-03-2026 .pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/116815"}]}, {"headline": "Razorpay launches Agentic AI platform to automate business payment tasks", "summary": "Fintech firm Razorpay unveiled 'Agent Studio', an AI platform built on Anthropic’s Claude SDK to manage payment infrastructure. The agents can autonomously handle tasks like payment integration, onboarding, and recovering abandoned purchases. While the company is preparing for an IPO, co-founder Shashank Kumar stated the timeline remains a few quarters away due to market volatility.", "category": "Technology", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116815", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 13-03-2026 .pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/116815"}]}, {"headline": "Karnataka panel begins work on ensuring responsible AI", "summary": "A state-appointed committee has begun work on a framework for the ethical and transparent adoption of Artificial Intelligence across government systems. Co-chaired by Infosys co-founder Kris Gopalakrishnan, the panel aims to create a governance model that promotes innovation while protecting privacy and ensuring citizen trust in AI-driven services.", "category": "Technology", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116795", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "US Uses Claude AI to Enhance Battlefield Targeting in Iran Conflict", "summary": "Reports indicate the US military is employing Anthropic’s Claude AI model via Palantir systems to sharpen battlefield targeting in the ongoing Iran conflict. This move highlights the rapid transition of artificial intelligence from a supportive tool to an active combat weapon, raising significant ethical concerns about the role of automated systems in global warfare.", "category": "Technology", "page": 4, "importance": 9, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "Anthropic in Talks with Private Equity Firms for AI Joint Venture", "summary": "AI startup Anthropic is reportedly discussing a joint venture with private equity firms Blackstone and Hellman & Friedman. The partnership would focus on selling Anthropic's Claude AI technology to companies backed by the investment firms. The move comes amid a dispute with the US government over military use restrictions, which led to Anthropic being labeled a supply chain risk.", "category": "Technology", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "Google Overhauls Maps App with New Gemini Driven AI Features", "summary": "Google Maps is undergoing a major redesign driven by Gemini technology to help users better navigate their surroundings. New features include 'Ask Maps,' which expands conversational abilities, and 'Immersive Navigation,' presenting a 3-D perspective. The overhaul aims to use artificial intelligence to provide a more intuitive grasp of locations and travel routes for digital users.", "category": "Technology", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "Razorpay Launches Agentic AI Suite to Assist Small and Medium Enterprises", "summary": "Fintech startup Razorpay is introducing \"agentic AI\" to help SMEs automate complex financial tasks like fraud detection and vendor tracking. The technology allows businesses to create autonomous agents that field problems independently. The move marks a shift for Razorpay from being a payments provider to a comprehensive \"financial operating system\" for India’s 79 million MSMEs.", "category": "Technology", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "India Proposes Graded Security Testing for Critical Telecom Equipment", "summary": "The government plans to introduce a graded security certification scheme (ComSec 2026) for telecom gear like Wi-Fi routers and broadband devices. Manufacturers will no longer be able to rely on self-declarations and must clear mandatory security checks. The National Centre for Communication Security aims to phase in compliance to ensure internet networks are resistant to cyberattacks.", "category": "Technology", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "Global IT Giants Hike India Headcount to Protect Operating Margins", "summary": "Capgemini, Cognizant, and EPAM are significantly increasing their India staff to maintain margins as AI technologies change IT workflows. While some Indian peers are trimming workforces, these global firms see India as the largest hub for digital talent in cloud and AI. Cognizant and EPAM now have their largest employee bases in India, offsetting headcount reductions in other regions.", "category": "Technology", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "Netflix Launches Premier VFX and Virtual Production Hub in Hyderabad", "summary": "Netflix has opened \"Eyeline Studios,\" a 32,000-square-foot VFX and virtual production hub in Hyderabad. The facility, which integrates the Scanline VFX brand, will support major global productions like \"Stranger Things\" and \"Daredevil.\" The studio features advanced 4D capture and AI-driven production tools, marking a major investment in India’s animation and gaming sector.", "category": "Technology", "page": 13, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "Digital Deception and Dark Patterns Rise in India’s E-Commerce Sector", "summary": "India’s digital commerce is being plagued by \"dark patterns,\" design elements that trick users into overpaying or sharing personal data. Surveys show up to 98% of apps employ some form of choice manipulation. Regulators are increasingly scrutinizing airlines, banks, and quick-commerce startups for practices like auto-enrolling subscriptions or hiding fees until checkout.", "category": "Technology", "page": 17, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "Karnataka Forms Panel to Aid AI Deployment in Government Systems", "summary": "The Karnataka government has set up a high-level committee to oversee the deployment of Artificial Intelligence across various state departments. The panel, co-chaired by the IT/BT minister and industry experts, aims to ensure transparency, fairness, and safety in AI systems. An interim report is expected within 60 days, focusing on high-risk sectors like healthcare and education.", "category": "Technology", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116780", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "Billions of Dollars at Risk for US Tech Companies in Iran", "summary": "US technology giants, including Microsoft, Google, and Amazon, face significant risks as Iranian threats target regional data infrastructure. Iran’s military has warned it could strike undersea cables and data centers in the Gulf. Analysts estimate over $30 billion worth of cloud and AI infrastructure in the Middle East could be compromised, potentially disrupting global digital services.", "category": "Technology", "page": 15, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116780", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "NxtGen Gears Up for Enterprise AI With Rs 3,600 Crore Factory", "summary": "NxtGen Cloud Technologies has partnered with Dell, Nvidia, and Vertiv to build a sovereign AI factory in India with an investment of Rs 3,600 crore. The facility will be equipped with high-density GPU clusters to process large-scale AI models for enterprises. The initiative aims to provide secure, localized AI infrastructure for domestic businesses and government agencies.", "category": "Technology", "page": 17, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116780", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "Atlassian to Slash 10% of Workforce in Strategic Pivot to AI", "summary": "Global software firm Atlassian has announced plans to cut 10% of its workforce, impacting approximately 1,600 employees. The company stated the layoffs are necessary to refocus resources toward Artificial Intelligence and cloud infrastructure. Atlassian is among several tech firms restructuring operations to prioritize high-growth AI technologies over traditional software services.", "category": "Technology", "page": 17, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116780", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "TVS Motor introduces battery-as-a-service model for electric scooter range", "summary": "TVS Motor Company launched its TVS Orbiter V1 with a battery-as-a-service (BaaS) option, bringing the entry price down to ₹49,999. The model separates vehicle cost from battery usage, offering monthly plans starting at ₹862. The company aims to accelerate EV adoption by reducing upfront costs and providing long-term battery assurance to urban commuters.", "category": "Technology", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116770", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 13~03~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/116770"}]}, {"headline": "Smartphones emerge as India's largest export category by value", "summary": "Smartphones overtook high-speed diesel and diamonds to become India's top export in 2025, reaching a value of ₹2.63 lakh crore. Driven by production-linked incentives and supply chain diversification away from China, smartphone exports saw a 53.45% CAGR between 2021 and 2025. India now accounts for 25% of Apple's global iPhone production.", "category": "Technology", "page": 8, "importance": 9, "telegram_url": "https://t.me/c/1877410077/116770", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 13~03~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/116770"}]}, {"headline": "Razorpay doubles down on AI agents and Southeast Asian expansion", "summary": "Fintech major Razorpay is building AI-powered agents to automate operational tasks in payments and payroll for small and mid-size businesses. Co-founder Shashank Kumar stated the company is rebuilding with AI at its base to improve cost efficiency. Beyond India, Razorpay is expanding its footprint in Malaysia and Singapore while evaluating potential acquisitions.", "category": "Technology", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116770", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 13~03~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/116770"}]}, {"headline": "Karnataka government forms committee for responsible AI adoption", "summary": "Karnataka has established a committee chaired by Infosys co-founder Kris Gopalakrishnan to develop a framework for ethical AI adoption in public services. The panel aims to create a 'Responsible AI Policy' to ensure transparency and accountability. The initiative seeks to leverage AI to accelerate the state's economy while safeguarding citizen trust and privacy.", "category": "Technology", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "PIB fact-check unit flags 50 Pakistan-linked propaganda handles", "summary": "The Press Information Bureau's fact-check unit has identified over 50 cases of deepfakes and manipulated content posted by Pakistani propaganda handles. The misinformation targeted top Indian officials and the West Asia conflict, including false claims about IAF losses and Indian involvement in Israeli military actions. One AI video falsely claimed the government was providing free scooters.", "category": "Technology", "page": 14, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "IEA warns of largest oil supply disruption in history due to war", "summary": "The International Energy Agency (IEA) reports that the Middle East war is creating the largest supply disruption in global oil history. Crude flows through the Strait of Hormuz have plunged from 20 million barrels per day to nearly zero. March global supply is projected to fall by 8 million barrels per day, creating a stubborn demand-price cycle that threatens economic stability.", "category": "Economy", "page": 2, "importance": 9, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Government increases kerosene allocation to states by 48 percent", "summary": "The petroleum ministry ordered the release of an additional 48,240 kilolitres of kerosene to states to address fuel shortages triggered by the West Asia conflict. This represents a 48% increase over existing quarterly allocations. The move aims to provide alternatives for cooking and lighting as LPG supplies face disruptions due to geopolitical tensions affecting global energy.", "category": "Economy", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "US launches Section 301 investigation into manufacturing practices in India", "summary": "The US Trade Representative announced a trade investigation into alleged unfair manufacturing practices by India and 15 other major economies. The Section 301 probe focuses on structural excess industrial capacity that floods global markets. The action could lead to new tariffs, import restrictions, or suspension of trade concessions for economies found to engage in unfair trade.", "category": "Economy", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "India retail inflation reaches 3.2 percent in February", "summary": "India's retail inflation rose to 3.2% in February, up from 2.75% in January, primarily driven by a rise in food inflation to 3.47%. While still below the RBI’s 4% target, the outlook is clouded by the West Asian oil shock. Experts warn that global crude price increases and supply disruptions in the Strait of Hormuz may further pressure domestic economic functioning and pricing.", "category": "Economy", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Andhra CM Naidu directs officials to ground massive investment projects", "summary": "Andhra Pradesh CM N Chandrababu Naidu directed officials to expedite 771 industrial projects worth approximately ₹20 lakh crore. He set a deadline for ready projects to begin operations by June 2026. The investments, secured through the 2025 Partnership Summit, are expected to generate 2.2 million jobs. Naidu emphasized a \"3C formula\" (Commitment, Convince, Cooperation) for investors.", "category": "Economy", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Andhra LPG Association urges households to stop selling cylinders to hotels
