rofit fell 24% to ₹77 crore. The board recommended a final dividend of ₹2 per share.", "category": "Business", "page": 2, "importance": 2, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "2d80dd88"}, {"headline": "Ambuja Cement trims capex, resets execution strategy", "summary": "Promoter Karan Adani announced Ambuja Cement is cutting FY27 capex by 15% to ₹6,000-6,500 crore, \"pausing and course-correcting\" project execution due to delays and cost overruns in acquired assets (Penna, Sanghi). Focus shifts to improving plant reliability and structural rework of manufacturing.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "d97d9445"}, {"headline": "Coforge Q4 net profit jumps multi-fold to ₹612.3 crore", "summary": "IT firm Coforge reported a multi-fold surge in consolidated net profit to ₹612.3 crore in Q4 FY26, driven by a one-time tax benefit from the Cigniti merger and strong operational growth. Revenue from operations grew 30% to ₹4,450.4 crore.", "category": "Business", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "77d75b18"}, {"headline": "Godrej Enterprises aims for aviation expansion with 30% export growth", "summary": "Godrej Enterprises Group's aerospace business grew 25% in FY26, with exports up 30%. It targets ₹700 crore revenue by FY28, driven by new contracts with OEMs like Boeing (for 777X thrust links) as OEMs expand supplier bases and seek dual suppliers due to order backlogs.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "a759ff67"}, {"headline": "Hero MotoCorp posts highest-ever Q4 and FY26 profit", "summary": "Hero MotoCorp reported its highest-ever consolidated net profit of ₹1,460 crore in Q4 FY26 (up 26% YoY) and ₹5,741.73 crore for FY26 (up 31.13%). Revenue grew 30.17% in Q4 and 16% in FY26. Pawan Munjal reappointed Executive Chairman.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "0dcd4a53"}, {"headline": "Marico FY26 profit up, achieves 7-year high volume growth", "summary": "Marico's FY26 volumes rose 8%, its strongest in seven years, with net profit up 9% to ₹1,813 crore and revenue up 26% to ₹13,611 crore. India business revenue grew 28%. Input cost inflation, especially in copra, impacted profit growth despite robust demand.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "ca867478"}, {"headline": "Haleon India maintains double-digit growth, eyes inorganic expansion", "summary": "Haleon India, known for brands like Sensodyne and Eno, is experiencing strong double-digit growth and aims to reach one billion additional consumers globally by 2030, with India as a key market. It has doubled rural distribution reach and is open to inorganic growth opportunities and expanding into adjacent categories.", "category": "Business", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "46e5889b"}, {"headline": "West Asia crisis to moderate India’s GDP growth by 0.6%", "summary": "ADB Chief Economist Albert Park stated that the ongoing West Asia crisis is projected to reduce India’s GDP growth by 0.6% to 6.3% and fuel inflation in the current financial year. ADB had previously forecast India's GDP growth at 6.9% in FY27.", "category": "Economy", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "f166538b"}, {"headline": "Cabinet approves ₹10/quintal sugarcane price hike for 2026-27", "summary": "The Cabinet approved a ₹10 per quintal hike in the Fair and Remunerative Price (FRP) for sugarcane to ₹365 per quintal for the 2026-27 season. This is 2.81% higher than the current rate, benefiting nearly one crore farmers with an estimated ₹15,000-20,000 crore additional income.", "category": "Economy", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "a92f503c"}, {"headline": "High oil prices may strain Indian fuel retailers' credit", "summary": "Fitch Ratings warned that sustained high crude oil prices could increase credit pressure on Indian oil marketing companies (OMCs) if domestic fuel prices don't keep pace. This could threaten earnings, cash flow, and increase working capital needs due to large inventory holdings.", "category": "Economy", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "a5b0cdf4"}, {"headline": "New governments bring fresh industrial policy vision: CII chief Memani", "summary": "CII President Rajiv Memani states new governments, like in West Bengal, offer a chance to unlock stalled infrastructure projects. He notes the West Asia crisis impacts MSMEs via energy costs and transit, but strong tailwinds prevent panic. He advocates for targeted government support and realistic PLI targets.", "category": "Economy", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "7ea1643b"}, {"headline": "Government revises FDI SOPs for 12-week approval timeline", "summary": "The government issued updated Standard Operating Procedures (SOPs) for foreign direct investment (FDI) proposals, aiming for a paperless process and a 12-week approval timeline. DPIIT will act as the nodal body, circulating proposals to relevant ministries and seeking security clearances for sensitive sectors.", "category": "Economy", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "841b6442"}, {"headline": "Rising gold demand despite price surge worries India", "summary": "India's gold imports surged in Q1 2026 despite an 81% price increase, disrupting the traditional pattern. Investors (ETF, bar/coin buyers) now drive demand, surpassing jewellery buyers. This trend could inflate India's import bill and requires policies like reviving Gold Monetisation Schemes to remonetize household stockpiles.", "category": "Economy", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "81e695bd"}, {"headline": "BJP faces daunting task to revive West Bengal's economy", "summary": "The BJP's two-thirds majority win in West Bengal marks a significant political shift. The party faces the daunting task of reviving the state's moribund economy, overhauling bureaucracy, and addressing a severe funds crunch, amidst high expectations after decades of decline under Left and TMC rule.", "category": "Politics", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "7375e5c4"}, {"headline": "West Asia war impacts India's economy, rupee and exports", "summary": "The West Asia conflict is pressuring India's economy, leading to rising logistics costs, oil import bills, rupee depreciation (10% in FY), and hitting exports (16% to West Asia). RBI maintains policy rates, using targeted measures, but structural issues like energy security and non-oil tradable base expansion need addressing.", "category": "Economy", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "8b3289be"}, {"headline": "BJP's Assam, Puducherry wins due to dedicated cadre", "summary": "This letter attributes BJP's victories in Assam and Puducherry to its committed cadre and leadership, despite opposition parties' anti-BJP rhetoric. It suggests voters are impatient with governance failures, leading to shifts like TVK breaking Dravidian duopoly in Tamil Nadu and UDF winning Kerala.", "category": "Politics", "page": 4, "importance": 2, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "9d78f8ce"}, {"headline": "India needs to diversify financing sources, push manufacturing", "summary": "This letter emphasizes the need for India to diversify financing beyond volatile foreign portfolio flows and address the persistent current account deficit. It calls for encouraging household financial savings, expanding manufacturing and exports, and maintaining fiscal discipline to build economic resilience.", "category": "Economy", "page": 4, "importance": 2, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "f231edd6"}, {"headline": "WTO faces deeper deadlock after Yaounde Ministerial Conference", "summary": "The 14th WTO Ministerial Conference failed to break deadlocks, miring the WTO deeper in crisis. While a path for the Investment Facilitation Agreement (IFA) might exist, issues like the moratorium on customs duties on electronic transmissions and non-violation complaints under TRIPS saw further division, threatening the WTO's future and member consensus.", "category": "Economy", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "9284c6a8"}, {"headline": "Erosion of rule of law in tech geopolitics raises concerns", "summary": "Meta's blocked acquisition of Manus by Chinese authorities signals a deeper shift in tech geopolitics, where states prioritize strategic control over rule-based processes. This trend, mirrored by US actions against TikTok, creates fragmented regulatory environments, weakens predictability for firms, and risks siloing innovation ecosystems, impacting global technology flows.", "category": "Technology", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "36ba6f22"}, {"headline": "Retail, HNI equity holdings hit 5-year low in Q4 FY26", "summary": "Individual investor and HNI holdings in NSE-listed companies dropped to a 5-year low of 9.11% in March, as they increasingly prefer investing through mutual funds. MF holdings reached an all-time high of 11.46%, while FIIs' share fell to a 14-year low of 16.13%.", "category": "Economy", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "2a524ff3"}, {"headline": "OnEMI Technology IPO subscribed 9.5 times", "summary": "The ₹926-crore IPO of OnEMI Technology Solutions (Kissht) was subscribed 9.5 times, largely driven by qualified institutional buyers (24.87 times). Non-institutional investors subscribed 6.57 times, and retail individual investors 2.03 times.", "category": "Business", "page": 6, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "60e24705"}, {"headline": "SEBI proposes reforms to expand online bond platforms", "summary": "SEBI proposed changes to allow online bond platform providers (OBPPs) to distribute tax-saving bonds issued by government-backed entities and to relax compliance for appointment of a compliance officer. The reforms aim to widen product offerings and improve ease of doing business in the retail bond market.", "category": "Economy", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "e149e3c3"}, {"headline": "Julius Baer names Kunal Sumaya as interim India Head", "summary": "Julius Baer appointed Kunal Sumaya as interim Country Head India, effective Tuesday. Sumaya will continue his role as Global Head of Non-Resident Indian (NRI) Coverage and will manage the handover until July 2026.", "category": "Business", "page": 6, "importance": 2, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "cac5ae93"}, {"headline": "NSE Q4 net profit surges 19% to ₹2,871 crore", "summary": "National Stock Exchange of India reported a 19% Q-o-Q rise in consolidated net profit to ₹2,871 crore for Q4 FY26, with revenue up 27% to ₹4,968 crore, driven by transaction charges. Consolidated total income for FY26 was ₹18,713 crore, and net profit ₹10,302 crore.", "category": "Business", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "1a5d4b13"}, {"headline": "STT hike impacts equity derivatives, BSE gains trading interest", "summary": "The hike in securities transaction tax (STT) has impacted equity derivatives trading on NSE, with its notional ADT falling 26%. BSE, by limiting to one weekly expiry, attracted fresh interest, its F&O turnover rising to 55% in April, while NSE's share declined to 45%.", "category": "Economy", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "358ee33c"}, {"headline": "Yotta Data considering $900 million IPO in Mumbai", "summary": "Yotta Data Services, operator of India’s largest Nvidia AI processor cluster, is reportedly weighing an initial public offering in Mumbai to raise up to $900 million. The company is also considering a pre-IPO round for up to $300 million and has engaged investment banks.", "category": "Business", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "593a4b30"}, {"headline": "Adani Ports promoter sells 2% stake for ₹7,486 crore", "summary": "A promoter group entity of Adani Ports and Special Economic Zone (APSEZ), Worldwide Emerging Market Holding Ltd, divested a 2% stake for ₹7,486.20 crore. The US-based Capital Group acquired the shares, reducing the promoter group's overall shareholding to 66.03%.", "category": "Business", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "2956b74c"}, {"headline": "Amit Shah named BJP observer for Bengal CM selection", "summary": "BJP appointed Union Home Minister Amit Shah as the main observer and Odisha CM Mohan Charan Majhi as co-observer for the election of its legislature party leader in West Bengal. This signals tight central control to ensure smooth government formation and manage internal party dynamics, building on Shah's direct campaign intervention.", "category": "Politics", "page": 7, "importance": 8, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "188dc858"}, {"headline": "Kerala Congress begins consultations to select next Chief Minister", "summary": "Following an impressive Assembly election win, Kerala's Congress unit began consultations to select its next Chief Minister. Senior leaders like KC Venugopal, Ramesh Chennithala, and VD Satheesan are key contenders. The high command will decide, with concerns about potential by-elections and populist measures for state finances.", "category": "Politics", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "cf7cf09b"}, {"headline": "Investors turn to RBI’s retail direct platform for G-Secs", "summary": "Retail investors are increasingly using RBI’s retail direct platform to invest in Government Securities (G-Secs) for better returns, liquidity, and transparency, offering a structurally superior alternative to bank FDs and small savings. Total accounts grew 54% YoY to 3,61,402 by April 27, 2026.", "category": "Economy", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "b8e83b9e"}, {"headline": "RBI considers state lenders selling foreign bonds for inflows", "summary": "The Reserve Bank of India is considering a plan for state-owned lenders to sell foreign-currency bonds to attract capital inflows. The RBI is also weighing offering foreign-exchange swaps to participating lenders to hedge currency risk, allowing them to offer attractive yields to investors.", "category": "Economy", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "96e01f8c"}, {"headline": "IIFL Finance revives dollar-bond fundraise plan", "summary": "IIFL Finance has revived its dollar-bond fundraise plan, with meetings scheduled this week. The non-bank lender aims to diversify its funding sources and increase the share of external borrowings from 13% to 20%.", "category": "Business", "page": 8, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "d293b9ef"}, {"headline": "Cholamandalam targets 20-23% AUM growth in FY27", "summary": "Cholamandalam Investment and Finance Company Ltd (CIFCL) projects 20-23% growth in assets under management (AUM) for FY27, matching FY26's 21% growth. Disbursements grew 25% in Q4, largely from vehicle finance. The NBFC is monitoring West Asia war impacts, particularly on diesel prices and supply chains.", "category": "Business", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "27c61108"}, {"headline": "Punjab National Bank Q4 net profit grows 14% to ₹5,225 crore", "summary": "Punjab National Bank (PNB) reported a 14% rise in Q4 FY26 net profit to ₹5,225 crore. Total global business increased 10.79% to ₹29.72 lakh crore, with gross advances up 12.17%. The bank recommended a dividend of ₹3 per equity share and does not plan fundraising in FY27.", "category": "Business", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "bb2a46ff"}, {"headline": "RBI Deputy Governor: Inflation targeting architecture is crucial policy choice", "summary": "RBI Deputy Governor Poonam Gupta stated that preserving India's inflation targeting framework (renewed through March 2031) is a critical policy choice amidst global uncertainties. Its durability reflects adaptability, but a future review could consider tweaking inflation levels/tolerance bands. Price stability and growth proved complementary.", "category": "Economy", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "a0e0e1a2"}, {"headline": "Sundram Fasteners relies on export recovery, non-auto for growth", "summary": "Sundram Fasteners Ltd (SFL) expects growth from recovering exports and expanding its non-automotive business. Exports, facing headwinds for much of the year, rebounded in Q4 due to improved demand in North America (trucks) and a weaker rupee. SFL projects 15-20% export growth in FY27.", "category": "Business", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "e14b98a2"}, {"headline": "Sundaram Home Finance FY26 net profit up 15% to ₹282 crore", "summary": "Sundaram Home Finance reported a 15% rise in net profit to ₹282 crore for FY26. Disbursements grew 5% to ₹6,842 crore, with AUM up 14% to ₹19,909 crore. Its emerging business segment (affordable housing, small loans) crossed ₹500 crore in disbursements, expanding into new towns.", "category": "Business", "page": 8, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "c1529311"}, {"headline": "India's rooftop solar additions double in FY26", "summary": "Rooftop solar installations under PM Surya Ghar Muft Bijli Yojana doubled in FY26, benefiting 21.2 lakh households and pushing the total to over 32 lakh. While growth is not broad-based (UP, Maharashtra, Gujarat account for 60%), northern markets show stronger traction due to less reliable power supply.", "category": "Environment", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "63a553e8"}, {"headline": "Euler Motors FY26 revenue jumps 110% on EV sales", "summary": "Delhi-based EV start-up Euler Motors recorded ₹402 crore revenue in FY26, up 110% YoY, selling 7,576 EVs (up 181%). Growth was driven by strong demand from logistics and e-commerce operators, with consistent QoQ volume and revenue increases in FY26.", "category": "Business", "page": 9, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "7c8fd6d2"}, {"headline": "World Gold Council to launch platform for responsible mining standards", "summary": "The World Gold Council (WGC) plans a unified platform for responsible gold mining standards, consolidating approaches on operations, environmental concerns, human/labour rights, and traceability. It aims to link physical and digital gold via shared infrastructure (\"gold-as-a-service\") to boost confidence and investment demand, especially in India.", "category": "Economy", "page": 10, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "f5ecd5ea"}, {"headline": "Spot gold climbs off 1-month low, investors assess truce", "summary": "Spot gold rose 1% to $4,566.79/ounce, rebounding from a one-month low as investors assessed a fragile Middle East truce and its impact on inflation/interest rates. US gold futures also gained 1%.", "category": "Economy", "page": 10, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "8dc3620c"}, {"headline": "Crude oil slips, West Asia war limits decline", "summary": "Global oil prices eased but maintained a floor due to the ongoing US operation in the Strait of Hormuz and exchanges of fire between the US and Iran. Brent crude futures dropped $2.99 to $111.45 a barrel.", "category": "Economy", "page": 10, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "2f0efd0a"}, {"headline": "Cabinet approves ₹5,659 crore Cotton Productivity Mission", "summary": "The Union Cabinet approved a ₹5,659.22 crore, five-year Mission for Cotton Productivity (2026-31) to boost lint productivity from 440 kg/ha to 755 kg/ha, benefiting 32 lakh farmers and promoting traceability for 'Kasturi Cotton Bharat'. This addresses declining growth and quality, driven by farmers shifting from cotton due to pests and better returns from other crops.", "category": "Economy", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "f2f5e6e2"}, {"headline": "SEBI proposes early pay-in settlement for commodity options", "summary": "SEBI plans to introduce early pay-in (EPI) settlement for options contracts in commodity derivatives, extending a facility currently available only for futures. This aims to streamline settlement and was recommended by an advisory committee. Public comments are invited by May 26.", "category": "Economy", "page": 10, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "5f26225c"}, {"headline": "Copper rebounds from 3-week low on bargain hunting", "summary": "Copper prices rebounded from a three-week low due to bargain hunting by investors. US Comex copper futures outperformed, gaining 2.5%, on speculation about possible tariffs on the metal. Aluminium also advanced 1.2%.", "category": "Economy", "page": 10, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "2f473d65"}, {"headline": "Horticulture FPOs urged to adopt B2C model for growth", "summary": "Experts are urging farmer producer organisations (FPOs), especially in horticulture, to shift focus to a B2C model through brand-building, traceability, and quality assurance. This aims to transform India from a commodity-based exporter to a value-added, brand-driven player, leveraging agricultural diversity and GI tags.", "category": "Economy", "page": 10, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "7b333908"}, {"headline": "Procol helps Zuari FarmHub accelerate freight procurement by 95%", "summary": "Agentic AI procurement platform Procol enabled Zuari FarmHub (Adventz Group) to speed up its freight procurement cycles by up to 95% and achieve nearly 6% cost savings. Leveraging AI-powered sourcing, e-auctions, and analytics dashboards streamlined vendor communication, improved participation, and enhanced price discovery.", "category": "Technology", "page": 10, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "a918be65"}, {"headline": "Kerala fishers demand study before deep-sea permits", "summary": "Fishing communities in Kerala urged the Prime Minister to establish a committee to assess fish stocks before issuing deep-sea fishing permits to companies and large vessels. They argue the current permit system relies on outdated studies and call for uniform diesel prices for marine fuel.", "category": "Environment", "page": 10, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "e6679976"}, {"headline": "Truck, tractor sales surge in April; CVs up 15%, tractors 23%", "summary": "Indian auto retail sales hit a record high in April, with commercial vehicle sales up 15.02% and tractor sales jumping 23.22%, indicating strong freight activity and rural demand. FADA reports a 13% YoY expansion across all categories, with mid-distance freight and infrastructure expansion driving CV growth.", "category": "Business", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "5ff9d409"}, {"headline": "Indian auto industry posts highest-ever April retail sales", "summary": "The Indian auto retail industry recorded its highest-ever April sales with 26.11 lakh units sold, up 13% YoY. All segments (2W, 3W, PV, CV, tractors) achieved all-time April records, driven by improved affordability, supportive RBI policies, and a healthy marriage-season pipeline. EV share in 2Ws moderated to 7.76%.", "category": "Business", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "c08eb4cc"}, {"headline": "NCLAT sets aside CCI's ₹301 cr penalty on Grasim", "summary": "The NCLAT set aside a ₹301.6-crore penalty imposed by the CCI on Grasim Industries for alleged dominance in the viscose staple fiber market. NCLAT directed CCI to re-hear the Aditya Birla Group firm, citing that Grasim was not given a chance to present arguments after CCI differed from its probe unit.", "category": "Law", "page": 11, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "79b6596e"}, {"headline": "BJP win in Bengal sparks industry hopes for reforms, investments", "summary": "Following BJP's historic election win in West Bengal, industry leaders are optimistic for a business-friendly environment and \"double-engine government\" to drive big-ticket investments, infrastructure upgrades, and job creation. They expect a U-turn in industrial policy, addressing high land prices and lack of incentives that hampered previous government's efforts.", "category": "Politics", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "0e3f9cab"}, {"headline": "Work starts on IAI–DCX radar facility in Tamil Nadu", "summary": "Groundbreaking for a radar manufacturing facility by Israel Aerospace Industries (IAI) and Bengaluru-based DCX Systems Ltd began in Tamil Nadu. The facility, expected to be completed by April 2027, marks a defense partnership for local production.", "category": "Technology", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "1bae1c2c"}, {"headline": "Tata Power's Bhutan hydro project gets $515M World Bank finance", "summary": "The Royal Government of Bhutan and World Bank signed $515 million financing for the 1,125 MW Dorjilung Hydro Power Ltd (DHPL) project, jointly owned by Bhutan's Druk Green Power and Tata Power. The $1.7 billion project, using an innovative PPP model, will generate over 4,500 GWh clean electricity, exporting 80% to India.", "category": "Infrastructure", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "a1fed19a"}, {"headline": "Defence Ministry inks ₹1,476 cr BEL deal for air defence system", "summary": "The Ministry of Defence signed a ₹1,476 crore contract with Bharat Electronics Ltd (BEL) to procure five ground-based mobile electronic systems for the Army, with 72% indigenous content. These systems, under the Buy (Indian-IDDM) category, will enhance air defence capabilities by dominating the \"invisible\" electronic battlefield.", "category": "India", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "c51ed73d"}, {"headline": "Siemens delivers first of 1,200 electric freight locomotives to Indian Railways", "summary": "Siemens Mobility delivered the first of 1,200 electric freight locomotives under its €3 billion project with Indian Railways and opened its first maintenance depot in Visakhapatnam. The 9,000 hp D9 locomotives, India's most powerful six-axle electric freight locomotives, are designed for speeds up to 120 kmph.", "category": "Infrastructure", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "049f50c0"}, {"headline": "BASF to establish two global hubs in Hyderabad", "summary": "Global chemical company BASF will open two global hubs—Global Service Hub and Global Digital Hub—in Hyderabad in Q2 2026. These integrated centres will support global operations across finance, HR, supply chain, regulatory services, and in-house consulting, leveraging Hyderabad's growing capability centre ecosystem.", "category": "Business", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "b7f8c50d"}, {"headline": "Kashmir widens anti-narcotics drive to choke illicit financial networks", "summary": "The anti-narcotics crackdown in Kashmir is now targeting illicit financial networks, disrupting the channelling of drug trade proceeds into real estate and informal investments. Authorities have demolished 24 houses and attached properties worth ₹3.5 crore, part of the 100-day Nasha Mukt Abhiyan.", "category": "Law", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "df4e123c"}, {"headline": "Tata Education Trust reappointments of Srinivasan, Singh blocked", "summary": "Former Tata Trusts trustee Mehli Mistry opposed the reappointments of Venu Srinivasan and Vijay Singh to the board of Tata Education and Development Trust (TEDT), citing governance lapses. This comes days before a crucial Tata Trusts board meeting to deliberate on Tata Sons' future and potential board reshuffles.", "category": "Business", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "ea877b76"}, {"headline": "Apple explores Intel, Samsung for chip production", "summary": "Apple Inc. is reportedly exploring using Intel Corp and Samsung Electronics Co to produce main processors for its devices in the US, seeking a secondary option beyond its long-time partner, Taiwan Semiconductor Manufacturing Co (TSMC).", "category": "Technology", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "69c95637"}, {"headline": "Zee sues Nykaa for alleged misuse of copyrighted songs", "summary": "Zee Entertainment has sued fashion-to-beauty retailer Nykaa for allegedly using its copyrighted songs in Instagram reels to promote products to millions of followers, seeking ₹1.99 crore in damages. The next hearing is on May 26.", "category": "Law", "page": 12, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "8a21ac92"}, {"headline": "Andhra Pradesh grants power distribution licence to Google data centre", "summary": "Andhra Pradesh has cleared a power distribution licence for Google's upcoming data centre in Visakhapatnam, becoming the first state to issue such a licence to a private firm outside the power sector. The policy allows single developers with a minimum 300 MW connected load to procure power from any lawful source.", "category": "Infrastructure", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "f9c9ec3a"}, {"headline": "Pixxel wins NRO deal for hyperspectral remote sensing", "summary": "Bengaluru-based space tech start-up Pixxel secured a contract from the US National Reconnaissance Office (NRO) to provide advanced hyperspectral remote sensing capabilities. This deal, under the NRO’s Commercial Systems Program, boosts Pixxel's global ambitions in defence and intelligence.", "category": "Technology", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "ba91d501"}, {"headline": "Gartner: AI layoffs create budget room, not ROI", "summary": "A Gartner survey reveals 80% of organizations piloting autonomous business capabilities report workforce reductions, but these don't translate to ROI. Gartner states AI amplifies human work, not replaces it, with AI agent software spending projected to reach $376.3 billion by 2027.", "category": "Technology", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "ce192391"}, {"headline": "Emcure eyes Poviztra as top brand, cuts weightloss drug price", "summary": "Emcure Pharmaceuticals expects its weightloss drug Poviztra (semaglutide injection) to be a top brand after proactively cutting its price by over 50%. This move, ahead of generic competition, aims to make the innovator Novo Nordisk product (sold by Emcure under a second brand name) competitive. Emcure crossed $1 billion in FY26 revenue.", "category": "Health", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "5fa8acdb"}, {"headline": "UAE says struck again amid Hormuz flare-up", "summary": "The UAE reported Iranian missile/drone attacks, after the US launched 'Project Freedom' to escort stranded tankers through the Strait of Hormuz. US said it destroyed Iranian boats and missiles. India condemned attacks as \"unacceptable.\" The Strait remains deserted due to threats; US tanker vanished after distress signal. Negotiations are stalled, with calls for de-escalation.", "category": "World", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "768927ee"}, {"headline": "Cabinet nod for four more SC judges", "summary": "The Union cabinet approved increasing Supreme Court judges from 33 to 37 (excluding CJI) to address over 92,000 pending cases. Based on CJI Surya Kant's request, the move requires a bill in Parliament, aiming for speedier justice and regular Constitution benches. This creates 10 vacancies under CJI's tenure.", "category": "Law", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "23ee13ed"}, {"headline": "₹18.1K-CR OUTLAY TO HELP AVIATION, SMALL BUSINESSES", "summary": "Government approved ₹18,100 crore for Emergency Credit Line Guarantee Scheme (ECLGS) 5, providing ₹2.55 lakh crore liquidity to MSMEs, aviation, and other businesses stressed by the West Asia conflict. This includes 100% guarantee for MSMEs, 90% for non-MSMEs, and higher caps for airlines to ensure operational continuity.", "category": "Economy", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "c50eed07"}, {"headline": "RAIN, HAIL LASH DELHI; IGI OPS HIT WITH 500 DELAYS", "summary": "Delhi experienced rain and hail, disrupting flights at IGI Airport with over 500 delays and diversions. The MeT department forecasts more thundery development for Wednesday evening.", "category": "India", "page": 1, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "5d9fc81b"}, {"headline": "Rebel AAP MPs, Mann separately meet Prez for Kejriwal case", "summary": "Rebel AAP MPs (now BJP) and Punjab CM Bhagwant Mann separately met President Droupadi Murmu. Mann sought termination of six Rajya Sabha MPs' membership for switching parties, calling it \"murder of democracy.\" Rebel MPs alleged \"revenge politics.\" HC permitted jailed AAP MP Engineer Rashid to visit his ailing father.", "category": "Politics", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "69fb6175"}, {"headline": "HC TO APPOINT AMICUS CURIAE FOR KEJRIWAL IN EXCISE CASE", "summary": "Delhi High Court will appoint three senior advocates as amicus curiae to represent former CM Arvind Kejriwal, former deputy CM Manish Sisodia and AAP leader Durgesh Pathak in CBI's appeal against their excise case discharge.", "category": "Law", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "45ab35fd"}, {"headline": "CASTE-BASED SLUR ESCALATED EVENTS THAT LED TO UTTAM NAGAR KILLING: COPS", "summary": "Police charge sheet states caste-based abuse escalated events leading to 26-year-old Tarun Butolia's murder during Holi in Delhi's Uttam Nagar. 18 accused have been booked under sections of murder and mob lynching.", "category": "Law", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "3d653342"}, {"headline": "4 U.P. COPS AMONG 5 KILLED IN ROAD ACCIDENT IN NUH", "summary": "Five people, including four Uttar Pradesh policemen, died after their SUV rammed into another vehicle in Haryana’s Nuh district. Police are investigating.", "category": "India", "page": 1, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "c79475ef"}, {"headline": "'Signature UP dishes' last November, has been assigned rewari, mango prod-", "summary": "Uttar Pradesh notified a district-wise culinary map under 'One District-One Cuisine' scheme for branding. It includes vegetarian dishes like Ayodhya's kachori, but excludes Lucknow's galawati kebab. Scepticism drawn for its all-vegetarian focus and misunderstanding of 'cuisine'.", "category": "Culture", "page": 1, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "6adaad21"}, {"headline": "FIRMS TO GIVE U.S. EARLY AI ACCESS", "summary": "Microsoft, Google, and Elon Musk’s xAI agreed to give the US government early access to new AI models for national security testing. The Trump administration is considering an executive order for an AI working group to boost oversight. This allows evaluation before deployment to identify risks like cyberattacks or military misuse.", "category": "Technology", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "9a4a138e"}, {"headline": "Speed, precision caught Pak off-guard: Ex-IAF vice chief", "summary": "Former IAF vice chief Narmdeshwar Tiwari said Operation Sindoor (May 2025) caught Pakistan off-guard, ensuring they think twice before backing terrorism. India destroyed terror camps and hit 13 airbases, signaling a new normal.", "category": "World", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "e3989aba"}, {"headline": "The many successes of Operation Sindoor", "summary": "Operation Sindoor (May 2025) against Pakistan following the Pahalgam terror attack demonstrated India's shift to military response. It dismantled terror infrastructure and called Pakistan's nuclear bluff, showcasing a whole-of-nation approach with civil-military tandem.", "category": "World", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "1fab5262"}, {"headline": "CM claims BJP conspiracy as recount reverses Sringeri result", "summary": "Karnataka CM Siddaramaiah alleged a \"criminal conspiracy\" and \"vote dacoity\" by BJP in Sringeri assembly poll recount. He claims valid postal ballots for Congress leader TD Rajegowda were tampered, reversing the 2023 result to BJP's favor. The BJP leaders sought early swearing-in of Jeevaraj.", "category": "Politics", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "bc183335"}, {"headline": "FOUR MEN FROM MAHA HELD FOR KILLING BUDDHIST MONK, SAY POLICE", "summary": "Four individuals, including a minor, from Kolhapur, Maharashtra, were arrested for allegedly murdering a Buddhist monk during a failed robbery in Uttara Kannada, Karnataka. The victim was found dead on April 29.", "category": "India", "page": 3, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "43768b67"}, {"headline": "A Mysorean inspiration behind Sringeri outcome for our National Anthem", "summary": "This article is about Basavappa Shastri, who composed Mysore's anthem 'Kayou Shri Gowri', later influencing Rabindranath Tagore's 'Anandaloke Mangalaloke', which shares the tune of 'Jana Gana Mana', adopted as India's national anthem.", "category": "Culture", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "b71fe767"}, {"headline": "Internal issues in focus after Cong’s bypoll win", "summary": "Congress's narrow Davanagere South bypoll win exposed tensions with Muslim voters. Victory margin plummeted; SDPI gained significantly. CM Siddaramaiah frames it as governance endorsement, while internal party maneuvering for cabinet berths continues.", "category": "Politics", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "142dba78"}, {"headline": "Two held for stealing gold worth ₹1.13 crore from minister’s home", "summary": "Two men, including a distant relative, were arrested for stealing gold ornaments worth ₹1.13 crore from Karnataka Housing Minister B Z Zameer Ahmed Khan's Bengaluru residence. Stolen jewelry was recovered from pawn shops.", "category": "India", "page": 3, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "8f61b038"}, {"headline": "Police launch probe after drone spotted at Isro’s ISITE campus", "summary": "A drone was spotted flying over Isro's highly sensitive ISITE campus in Bengaluru, a \"No Drone Zone.\" Police launched a probe under Bharatiya Nyaya Sanhita, 2023, for illegal drone activity in a restricted area.", "category": "Technology", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "e4f4e807"}, {"headline": "Govt, ISEG sign pact for master economic plan", "summary": "Karnataka government signed an SOI with ISEG Foundation to develop a comprehensive economic master plan for Bengaluru Metropolitan Region (BMR) by 2037. BMR accounts for 42% of India's software exports and aims to double its economy by 2032.", "category": "Economy", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "6cad5a38"}, {"headline": "Lokayukta forms team to probe Bengaluru hospital wall collapse", "summary": "Karnataka Lokayukta formed a team to investigate the April 29 wall collapse at Bowring and Lady Curzon Hospital in Bengaluru. A police superintendent, district judge, and engineers will examine the site; a report is due by May 16.", "category": "India", "page": 3, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "6a759bca"}, {"headline": "Cong set to support TVK to protect ‘secular values’", "summary": "The Congress decided to support Tamilaga Vettri Kazhagam (TVK) in Tamil Nadu, citing protection of \"secular values\" and the Constitution. TVK won 108 seats, needing 10 more; Congress's 5 seats and other allies could help form a majority. Vijay is likely to meet Governor on Wednesday.", "category": "Politics", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "bcf6668d"}, {"headline": "Senior Congress leaders lobby for Kerala CM post", "summary": "Following UDF's sweep in Kerala (102 of 140 seats), senior Congress leaders VD Satheesan, Ramesh Chennithala, and KC Venugopal's camps are lobbying for the chief minister's post. AICC observers will gather feedback from newly-elected MLAs to decide.", "category": "Politics", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "c85b0028"}, {"headline": "HYD AUTO-DRIVER FOR FOILING CHAIN SNATCHING", "summary": "Hyderabad police honored auto-rickshaw driver Mohammed Zaher for heroically intercepting a notorious rowdy sheeter attempting a gold chain snatching. He used his vehicle and physical restraint to prevent the criminal's escape.", "category": "India", "page": 4, "importance": 2, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "d48ebf07"}, {"headline": "Man arrested for killing wife over suspicion of affair", "summary": "A 35-year-old man, Badripalli Kiran Kumar, was arrested in YSR Kadapa district for allegedly murdering his wife due to suspicion of an extramarital affair and lifestyle disputes. He was booked under Bharatiya Nyaya Sanhita (BNS).", "category": "Law", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "05eeab09"}, {"headline": "Six arrested for hunting of wild animals in T’gana", "summary": "Six individuals, including a professional shooter from Telangana Rifle Association, were arrested for illegally hunting wild animals with airguns in Shadnagar and Makthal forest areas. Airguns, a licensed rifle, and ammunition were recovered.", "category": "Law", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "55056197"}, {"headline": "IUML’s strong show winning 22 seats fuelled UDF’s sweep", "summary": "Indian Union Muslim League (IUML)'s strong performance, winning 22 of 27 contested seats and sweeping Malappuram, significantly contributed to UDF's victory in Kerala. Fathima Thahiliya became the first woman IUML MLA.", "category": "Politics", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "c49967fe"}, {"headline": "Worksite school for migrant workers’ kids", "summary": "A special Work Site School for children of migrant laborers was inaugurated in Hyderabad, a collaborative effort by Cyberabad Police, Municipal Corporation, and a private property developer. It aims to provide education and a safe environment.", "category": "Education", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "2199f3cd"}, {"headline": "Vijayan travels to state capital without security after resignation", "summary": "Pinarayi Vijayan, who resigned as Kerala chief minister after the LDF's loss, arrived in Thiruvananthapuram from Kannur without his usual security cover and official convoy. He declined to comment on the election results.", "category": "Politics", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "33b49a64"}, {"headline": "Eateries in Kerala call for shutdown against LPG hike", "summary": "Hotels, restaurants, bakeries, and canteens across Kerala will close for 24 hours on May 6 to protest steep LPG price hikes. The Kerala Hotel and Restaurant Association (KHRA) demands a rollback of prices.", "category": "Economy", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "b8c5b61a"}, {"headline": "West Bengal win gives BJP’s Telangana unit new hope", "summary": "BJP's victory in West Bengal has emboldened its Telangana unit to aim for replicating the success in the 2028 assembly elections. Leaders believe the \"Bengal model\" of strategies and cadre galvanization can break the \"Telangana jinx.\"", "category": "Politics", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "87945d7e"}, {"headline": "Centre notifies establishment of South Coast Railway zone for AP", "summary": "The Centre issued a gazette notification establishing the South Coast Railway Zone, headquartered in Visakhapatnam, Andhra Pradesh, effective June 1, 2026. It fulfills a long-pending demand, carving out divisions from existing zones.", "category": "Infrastructure", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "28c7db2a"}, {"headline": "Amaravati economic region to span 9 distts", "summary": "Andhra Pradesh initiated a plan to develop an economic zone across nine districts around the Amaravati capital region. Guided by a planning board, it aims to grow into a $250-billion export-oriented economy by 2047.", "category": "Economy", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "32a8b6fb"}, {"headline": "Bengal BJP MLAs to take oath on May 9, Modi likely to attend", "summary": "Newly elected West Bengal BJP MLAs will take oath on May 9, Rabindranath Tagore's birth anniversary, with PM Modi possibly attending. BJP swept 207 seats, with CM Mamata Banerjee losing her seat.", "category": "Politics", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "f78de29d"}, {"headline": "Parties claim workers killed amid low-scale violence; probe on", "summary": "After BJP's victory in West Bengal, political parties claim at least four workers were killed in post-poll clashes. BJP alleges two workers killed, TMC claims two party members died. Police say two cases not politically motivated.", "category": "Politics", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "e2954e40"}, {"headline": "Lost in SIR debate: Muslim attrition from Trinamool", "summary": "Analysis suggests that TMC's loss in West Bengal is not primarily due to Special Intensive Revision (SIR) deletions but possibly Muslim voters shifting away from TMC. Non-TMC non-BJP Muslim MLAs increased, indicating vote fragmentation hurting TMC.", "category": "Politics", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "e8f3d364"}, {"headline": "After winning 2 seats each, Vijay, Suvendu face a choice", "summary": "TVK chief Vijay (Tamil Nadu) and West Bengal BJP leader Suvendu Adhikari, both won two assembly seats. They must resign one within 14 days. Vijay is likely to retain Perambur, Adhikari Nandigram.", "category": "Politics", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "8022928b"}, {"headline": "VETERAN DMK LEADER LOSES TO TVK BY JUST ONE VOTE", "summary": "Senior DMK leader KR Periakaruppan lost Tiruppattur assembly seat to TVK candidate R Seenivasa Sethupathy by just one vote. Sethupathy secured 83,375 votes against Periakaruppan's 83,374.", "category": "Politics", "page": 5, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "174e8264"}, {"headline": "DOMESTIC HELP WINS FROM AUSGRAM SEAT ON BJP TICKET", "summary": "Kalita Maji, a domestic help contesting on a BJP ticket, won the Ausgram assembly seat in West Bengal by 12,535 votes. She plans to address poor health and education systems.", "category": "Politics", "page": 5, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "94fbab19"}, {"headline": "Younger candidates led Vijay’s political coup", "summary": "Vijay's TVK achieved a political breakthrough in Tamil Nadu, potentially forming a government with 108 MLAs. His success is attributed to fielding younger candidates, appealing strongly to young voters.", "category": "Politics", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "fc870d92"}, {"headline": "TALKS UNDERWAY BETWEEN AIADMK AND TVK FOR AN ALLIANCE: MLA", "summary": "AIADMK MLA Leema Rose Martin stated talks are ongoing between AIADMK and TVK to explore a possible alliance for forming a government in Tamil Nadu. TVK needs 10 more seats for an absolute majority.", "category": "Politics", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "d8e13078"}, {"headline": "Stalin resigns, asks cadre to meet voters", "summary": "Tamil Nadu Governor accepted CM M K Stalin's resignation after DMK's defeat, but asked him to continue until alternative arrangements. Stalin expressed gratitude to voters and urged winning DMK candidates to reach out to the public.", "category": "Politics", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "f8457744"}, {"headline": "HC permits Engineer Rashid to visit father in AIIMS", "summary": "Delhi High Court permitted jailed Baramulla MP Sheikh Abdul Rashid (Engineer Rashid), accused in a terror funding case, to visit his ailing father in AIIMS Delhi for 12 hours daily until May 10.", "category": "Law", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "48f5602f"}, {"headline": "MPs, ministers, judges entitled to honorific: HC", "summary": "The Allahabad High Court ruled that constitutional functionaries like MPs, judges, and ministers are entitled to the courtesy title \"Hon’ble.\" Civil servants are not. The ruling came after UP Police omitted the honorific for an MP.", "category": "Law", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "01389d80"}, {"headline": "₹5.6K-cr outlay for cotton; sugarcane FRP set at ₹365/qtl", "summary": "Government approved a five-year, ₹5,659.22 crore mission to boost cotton productivity, aiming for 498 lakh bales by 2031. It also hiked sugarcane Fair and Remunerative Price (FRP) to ₹365/qtl for 2026-27 season.", "category": "Economy", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "ab1e7f2f"}, {"headline": "CBI books its ex-DSP, wife in ₹98-L DA case", "summary": "CBI booked former DSP Brij Mohan Meena and his wife for allegedly amassing ₹98.63 lakh in disproportionate assets. Meena also faces a separate CBI case for taking ₹5 crore bribe  Bengaluru 06-05.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "b61b1eac"}, {"headline": "SC plans AI norms for drafting orders, pleas", "summary": "The Supreme Court proposed guidelines for AI use in drafting judgments and petitions to maintain judicial integrity, prompted by \"fake\" case citations. It directed the Bar Council of India to form a committee.", "category": "Law", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "a28c328e"}, {"headline": "Dead B’luru bizman prime suspect in lecturer’s murder", "summary": "A 45-year-old Bengaluru businessman, found dead in Ramanagara in suspected suicide, is the prime suspect in a 40-year-old guest lecturer's murder in Doddaballapura. Police suspect an extramarital relationship as motive.", "category": "Law", "page": 7, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "d73d43c4"}, {"headline": "Pune rape victim died due to asphyxia: Cops", "summary": "Autopsy revealed the 3.5-year-old Pune rape victim died of asphyxia, gagged by the accused with socks. The 65-year-old accused, Bhimrao Kamble, has prior molestation cases. His family disowned him.", "category": "Law", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "4f4c732b"}, {"headline": "Maha CM: No parole for sexual assault convicts", "summary": "Maharashtra CM Eknath Shinde directed that sexual assault convicts will not receive parole/furlough, and instructed the law department to amend rules if needed. This follows a recent rape-murder case in Pune.", "category": "Law", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "71f98662"}, {"headline": "SC asks law varsities to assess disability law implementation", "summary": "The Supreme Court directed eight national law universities to conduct a \"substantive evaluation\" of the Rights of Persons with Disabilities Act, 2016 implementation across all states/UTs, citing \"minimal\" and uneven compliance.", "category": "Law", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "c6f7c9e8"}, {"headline": "NSA DOVAL MEETS VIETNAM PREZ TO BOLSTER TIES", "summary": "NSA Ajit Doval met Vietnam President To Lam to strengthen comprehensive strategic partnership. Lam's visit includes talks with PM Modi, focusing on bilateral relations, regional, and global issues, aiming for fresh momentum.", "category": "World", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "1bee3f6c"}, {"headline": "India, Jamaica to boost ties in health, energy", "summary": "External Affairs Minister S Jaishankar visited Jamaica, agreeing to enhance cooperation in healthcare and clean energy. Both sides reviewed existing agreements in digital transformation, culture, sports, and digital payments.", "category": "World", "page": 9, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindu ": "UHT Bengaluru 06-05.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "bb8b91df"}, {"headline": "‘Sick Iran Nobel winner at risk of dying in custody’", "summary": "Supporters warn that jailed Iranian Nobel Peace Prize winner Narges Mohammadi could die in prison without urgent proper healthcare, having suffered two suspected heart attacks in custody.", "category": "World", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "a29c0a06"}, {"headline": "Pak navy aids crew of Indian vessel in Arabian Sea", "summary": "The Pakistan navy provided humanitarian assistance to the crew of an Indian offshore tug and supply vessel stranded in the Arabian Sea. The operation was launched after India's Maritime Rescue and Coordination Centre contacted Pakistani authorities.", "category": "World", "page": 11, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "155e8b6d"}, {"headline": "Russian strikes kill 22 in Ukraine as both sides propose short-term truce", "summary": "Russian attacks killed 22 in Ukraine, including 12 in Zaporizhzhia, as Ukraine proposed an open-ended ceasefire. Russia announced a truce for May 8-9 for WWII victory commemorations.", "category": "World", "page": 11, "importance": 9, "telegram_url": "https://t.me/c/1877410077/122813", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-05.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/122813"}], "article_id": "070bfdd2"}, {"headline": "Russian mobile internet cut ahead of parade", "summary": "Russia cut mobile internet in central Moscow ahead of WWII victory
