s five gold, five silver, and four bronze medals.", "category": "Sports", "page": 16, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121552", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 26-04-2026_removed.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/121552"}], "article_id": "16040f27"}, {"headline": "Elon Musk drops fraud claims against OpenAI and Sam Altman", "summary": "Elon Musk has dropped his fraud and breach of fiduciary duty claims against OpenAI and co-founders Sam Altman and Greg Brockman. The move, made on the eve of a scheduled trial, leaves only two claims remaining. Musk had alleged the startup abandoned its founding non-profit mission to benefit humanity by taking billions in backing from Microsoft.", "category": "Technology", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121704", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 26-04.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121704"}], "article_id": "d0f5905f"}, {"headline": "India's peak power demand hits record 252.1 GW amid heatwave", "summary": "India's peak power demand reached an all-time high of 252.1 GW on April 24, driven by soaring temperatures and widespread air conditioner usage. This surpasses the previous record of 249.9 GW set in May 2024. The Power Ministry estimates demand could reach 271 GW this summer, as the IMD forecasts continued harsh heatwave conditions across multiple states.", "category": "Infrastructure", "page": 5, "importance": 9, "telegram_url": "https://t.me/c/1877410077/121704", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 26-04.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/121704"}], "article_id": "5da55905"}, {"headline": "FM Nirmala Sitharaman signals pandemic-style support amid West Asia conflict", "summary": "Finance Minister Nirmala Sitharaman indicated that the government is considering support measures, similar to COVID-era liquidity schemes, for sectors affected by the West Asia conflict. Speaking at the ET Awards, she urged India Inc to step up domestic manufacturing to replace imports. She also noted that oil sourcing would prioritize Indian interests and cost-efficiency.", "category": "Economy", "page": 5, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121704", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 26-04.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/121704"}], "article_id": "7cdb65f1"}, {"headline": "Trump says US negotiators Witkoff and Kushner will skip Iran talks", "summary": "President Donald Trump announced that US negotiators Steve Witkoff and Jared Kushner will no longer travel to Islamabad for talks with Iran. Trump stated the US 'holds all the cards' and cited infighting within the Iranian leadership. Meanwhile, Iranian FM Abbas Araghchi described his Pakistan visit as fruitful but questioned if the US was serious about diplomacy.", "category": "World", "page": 5, "importance": 9, "telegram_url": "https://t.me/c/1877410077/121704", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 26-04.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/121704"}], "article_id": "d748c9ef"}, {"headline": "FM urges Sebi to implement one nation one KYC initiative", "summary": "Finance Minister Nirmala Sitharaman has called on Sebi to take the lead in establishing a unified 'One Nation, One KYC' system. The initiative aims to eliminate the need for investors to repeat verification processes across banks, mutual funds, and insurance providers. Sebi Chairman Tuhin Kanta Pandey affirmed the regulator's commitment to simplifying regulations and boosting digitalization.", "category": "Economy", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121704", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 26-04.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/121704"}], "article_id": "94b789eb"}, {"headline": "Bescom simplifies electricity connection name transfer via online portal", "summary": "Bangalore Electricity Supply Company (Bescom) has integrated its portal with the e-khata database to allow property owners to transfer connections online in under 10 minutes. The faceless process costs approximately Rs 1,300 and eliminates the need for middlemen or visits to subdivision offices. Over 5,000 owners have already used the system during its soft rollout.", "category": "Infrastructure", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121704", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 26-04.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/121704"}], "article_id": "b2580f11"}, {"headline": "Doctors warn of eye stroke risks linked to GLP-1 weight-loss drugs", "summary": "Ophthalmologists in Bengaluru are flagging potential ocular risks, including non-arteritic anterior ischaemic optic neuropathy (NAION) or 'eye stroke,' associated with GLP-1 drugs used for diabetes and weight loss. As generic versions enter the Indian market, experts urge patients with long-standing diabetes or poor glycaemic control to undergo regular eye screenings.", "category": "Health", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121704", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 26-04.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/121704"}], "article_id": "e87b5b6a"}, {"headline": "Victoria Hospital trauma centre achieves zero surgical infection benchmark", "summary": "The trauma and emergency care centre at Victoria Hospital in Bengaluru reported zero cases of surgical site infection across 31,780 surgeries performed since 2017. The milestone was attributed to strict hygiene protocols, appropriate antibiotic usage, and constant monitoring. To further enhance care, the centre will host South India's first ICMR Integrated Reference Diagnostic Laboratory.", "category": "Health", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121704", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 26-04.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/121704"}], "article_id": "7e5092b2"}, {"headline": "Karnataka prepares for severe drinking water shortage over next two months", "summary": "Rural Development Minister Priyank Kharge announced that Rs 45 crore has been released to manage a looming drinking water crisis in Karnataka as heatwaves intensify. Falling water levels in reservoirs and borewells are expected to cause distress in several districts. Local administrations have been authorized to hire private borewells and supply water via tankers.", "category": "Environment", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121704", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 26-04.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/121704"}], "article_id": "44db452c"}, {"headline": "Karnataka rolls out standardized mental healthcare regulations for 2026", "summary": "The Karnataka government has introduced the State Mental Healthcare Regulations-2026 to standardize services across five categories of establishments. The rules mandate specific staffing ratios, building safety norms, and qualified professionals for psychiatric hospitals, de-addiction centers, and rehab homes. All facilities must register with the State Mental Health Authority.", "category": "Health", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121704", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 26-04.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/121704"}], "article_id": "719a0d5e"}, {"headline": "IISc and surgeon develop world's first dissolvable abdominal stent", "summary": "Researchers at IISc and a liver transplant surgeon have developed the 'Asthana Stent,' a biodegradable tube that keeps bile ducts open after major abdominal surgeries before dissolving naturally. The device, made from polydioxanone, eliminates the need for a second surgery to remove plastic stents. The technology has been licensed to Advanced Medtech Solutions for regulatory approval.", "category": "Science", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121704", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 26-04.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/121704"}], "article_id": "78e7e86a"}, {"headline": "New HRA norms require disclosure of relationship with landlord", "summary": "From April 1, 2026, salaried taxpayers claiming House Rent Allowance must disclose their relationship with their landlord under the new Form 124. The measure aims to curb bogus claims involving family members where no genuine rental transaction exists. Genuine arrangements remain valid if supported by banking channel payments, rent agreements, and landlord PAN details.", "category": "Economy", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121704", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 26-04.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/121704"}], "article_id": "53a103b5"}, {"headline": "Genetic defect CDKN1B identified in breast cancer therapy resistance", "summary": "Scientists at the University of Delhi South Campus have discovered that the loss of the CDKN1B gene, which produces the p27 protein, causes hormone receptor-positive breast cancer to become resistant to treatment. Analyzing 186 Indian patients, the study found the defect in those who stopped responding to hormone therapy. Restoring the protein was shown to make medicines effective again.", "category": "Science", "page": 15, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121704", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 26-04.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/121704"}], "article_id": "b2a4a78b"}, {"headline": "West Bengal assembly turnout hits historic 93.2 percent", "summary": "Revised Election Commission data shows West Bengal recorded a massive 93.2% voter turnout in the first phase of assembly elections, with Cooch Behar leading at 96.2%. In Tamil Nadu, the final provisional figure settled at 85.1%. Finance Minister Nirmala Sitharaman described the high participation as a sign of anti-incumbency and a potential desire for political change in the states.", "category": "Politics", "page": 16, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121704", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 26-04.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/121704"}], "article_id": "b5c8d128"}, {"headline": "US imposes 123 percent anti-dumping duty on Indian solar cells", "summary": "The United States has levied a preliminary anti-dumping duty of 123% on solar cells and panels imported from India. This is in addition to existing countervailing duties, making shipments economically unviable. The National Solar Energy Federation of India criticized the investigation as flawed, while US agencies claim the duties address unfair trade practices.", "category": "Business", "page": 16, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121704", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 26-04.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/121704"}], "article_id": "040ae846"}, {"headline": "WHO clears first malaria treatment specifically for newborns and infants", "summary": "The World Health Organization has prequalified a child-friendly formulation of artemether-lumefantrine designed for infants weighing between 2 and 5 kg. This closing of a critical treatment gap allows newborns to receive quality-assured medication without the risks of adjusting adult doses. The move was announced on World Malaria Day to prioritize the world's most vulnerable group.", "category": "Health", "page": 17, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121704", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 26-04.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/121704"}], "article_id": "0e57e306"}, {"headline": "YouTuber Salim Wastik arrested for 1995 kidnapping and murder", "summary": "Delhi Police arrested Salim Khan, a YouTuber known as 'Salim Wastik,' for the 1995 kidnap and murder of a 13-year-old boy. Khan had jumped bail in 2000 and assumed a new identity for 26 years before being identified through old fingerprints. He had recently gained fame for his controversial religious commentary and had even signed a deal for a Bollywood biopic on his life.", "category": "Law", "page": 17, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121704", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 26-04.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/121704"}], "article_id": "52aa9b5c"}, {"headline": "China likely building first nuclear-powered aircraft carrier", "summary": "Speculation has grown that China's fourth aircraft carrier, currently under construction, will be nuclear-powered after a Navy video hinted at a ship named 'He Jian.' Experts noted 'He' sounds like the Chinese word for nuclear. Satellite images suggest the vessel is similar in size to America's Gerald R. Ford-class carriers, marking a major leap in China's deep-sea naval ambitions.", "category": "World", "page": 20, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121704", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 26-04.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/121704"}], "article_id": "f87e4ca7"}, {"headline": "Pakistan successfully launches indigenous electro-optical satellite from China", "summary": "Pakistan achieved a significant milestone with the successful launch of an indigenous electro-optical satellite from China's Taiyuan Satellite Launch Centre. The Foreign Office stated the satellite will enhance the country's remote sensing capabilities and represents a major step in space technology cooperation. The satellite was launched using a Chinese carrier rocket.", "category": "Technology", "page": 20, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121704", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 26-04.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/121704"}], "article_id": "b54350bd"}, {"headline": "Shareholders approve 81 billion dollar Warner-Paramount mega merger", "summary": "Warner Bros Discovery investors have approved a sale to Skydance-owned Paramount Global in a deal valued at $81 billion, or $111 billion including debt. The merger will combine HBO Max, Harry Potter, and CNN with CBS and Paramount+. However, Hollywood unions and the Writers Guild of America have launched campaigns to block the deal, citing concerns over reduced competition and higher costs.", "category": "Business", "page": 32, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121704", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 26-04.pdf", "page": 32, "telegram_url": "https://t.me/c/1877410077/121704"}], "article_id": "93862b2f"}, {"headline": "Amazon Prime Video wins interim relief in Drishyam 3 rights case", "summary": "The Delhi High Court has restrained Aashirvad Cinemas from entering into third-party agreements for the digital rights of the film Drishyam 3 until May 15. Amazon Prime Video claims it has preferential rights for the franchise's digital distribution under a 2020 agreement. The court intervention follows the producer's attempt to terminate negotiations with the streaming giant.", "category": "Law", "page": 32, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121704", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 26-04.pdf", "page": 32, "telegram_url": "https://t.me/c/1877410077/121704"}], "article_id": "a2b78103"}, {"headline": "FM Pledges to Shield Vulnerable Sections from Price Pain", "summary": "Finance Minister Nirmala Sitharaman, at the ET Awards, committed to protecting vulnerable groups like farmers from price volatility. She urged industry to invest in AI and tech while promising incentives for capacity expansion. The Centre aims to contain the FY27 fiscal deficit at 4.5% of GDP despite global economic headwinds and West Asia tensions.", "category": "Economy", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/121674", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_26-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121674"}], "article_id": "2af35a7c"}, {"headline": "Trump Cancels US Envoys’ Pakistan Visit Amid Regional Tensions", "summary": "US President Donald Trump canceled a trip by special envoys Steve Witkoff and Jared Kushner to Islamabad, citing internal confusion within the Iranian leadership. The move comes as Iranian Foreign Minister Abbas Araghchi visited Pakistan to discuss regional security following a ceasefire between Israel and Lebanon.", "category": "World", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/121674", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_26-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121674"}], "article_id": "77b55516"}, {"headline": "Naidu Proposes P4 Model Over Traditional PPP for Development", "summary": "Andhra Pradesh CM Chandrababu Naidu introduced the 'P4' (Public-Private-People Partnership) model at the ET Awards. He emphasized cost-effective energy to reduce Gulf oil reliance and highlighted the 'future city' Amaravati as a hub for green energy and net-zero living aimed at increasing human lifespan.", "category": "Infrastructure", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/121674", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_26-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121674"}], "article_id": "c7868fa6"}, {"headline": "India Seeks Interim Agreement with Iran for Chabahar Port", "summary": "India is negotiating an interim pact with Iran for long-term management of the Chabahar Port to ensure operational continuity. The deal seeks to protect Indian investments from potential US sanctions and establish a legal framework for local body management of the port, which serves as a gateway to Central Asia.", "category": "Economy", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121674", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_26-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/121674"}], "article_id": "dece9548"}, {"headline": "Five Bengal Cops Suspended by Election Commission for Misconduct", "summary": "The Election Commission of India has suspended five police officials in West Bengal, including an IPS officer, for alleged misconduct and failure to maintain neutrality during the 2026 Assembly Elections. The action follows reports of violence and poll-related irregularities in districts including South 24 Parganas.", "category": "Politics", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121674", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_26-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/121674"}], "article_id": "10d91a32"}, {"headline": "Violence Spreads to Naga-Inhabited Areas in Manipur Conflict", "summary": "The ethnic violence in Manipur has spread to Naga-inhabited areas including Ukhrul and Senapati districts. Recent clashes between security forces and volunteers in Ukhrul resulted in three deaths and multiple injuries. Authorities have tightened security and imposed movement restrictions to prevent further escalation.", "category": "India", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121674", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_26-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/121674"}], "article_id": "f3c7d407"}, {"headline": "Sukhbir Singh Badal Adopts Low-Key Strategy to Rebuild SAD", "summary": "Following recent assembly poll setbacks, Shiromani Akali Dal (SAD) chief Sukhbir Singh Badal has shifted to a 'Punjab Bachao' outreach program. The strategy focuses on quiet, ground-level interactions and small meetings rather than large rallies to reconnect with voters and address internal party challenges.", "category": "Politics", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121674", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_26-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/121674"}], "article_id": "8a50e5cc"}, {"headline": "FM Calls for Unified Financial KYC Framework for Customers", "summary": "Finance Minister Nirmala Sitharaman proposed a unified, 'know-your-customer' (KYC) system across the entire financial sector. The goal is to eliminate redundant verification processes for users and create a secure, portable digital identity that works seamlessly across banking, insurance, and stock market platforms.", "category": "Economy", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121674", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_26-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121674"}], "article_id": "3aac16cd"}, {"headline": "Foxconn Workplace Incident Prompts Calls for Employee Welfare Reforms", "summary": "A tragic case of infanticide involving a young worker at Foxconn's Devanahalli facility has sparked urgent calls for better mental health and reproductive healthcare support in large-scale manufacturing hubs. Experts emphasize the need for sensitization and accessible counseling for the young migrant workforce.", "category": "Health", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121674", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_26-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121674"}], "article_id": "4007c660"}, {"headline": "Online Daters Increasingly Wary of AI Bots and Fake Profiles", "summary": "Users on dating apps like Hinge and Tinder are reporting growing distrust due to a rise in AI-generated profiles and chatbots. The use of 'AI wingmen' to script conversations is raising concerns about authenticity and creating emotional fatigue among digital daters seeking genuine human connection.", "category": "Technology", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121674", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_26-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/121674"}], "article_id": "a2757278"}, {"headline": "Mumbai Undergoes $60 Billion Infrastructure Overhaul to Reshape City", "summary": "Mumbai is executing 130 projects, including a 16-line metro network, a second international airport, and the world's longest urban road tunnel. The $60 billion investment aims to decentralize the city, improve commute times, and transform the Mumbai Metropolitan Region into a polycentric economic hub.", "category": "Infrastructure", "page": 5, "importance": 9, "telegram_url": "https://t.me/c/1877410077/121674", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_26-04-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/121674"}], "article_id": "e594527d"}, {"headline": "Astana Exhibits Innovative Solutions to Combat Kazakh Climate Change", "summary": "The capital of Kazakhstan is showcasing innovative architectural and technological solutions to manage extreme temperature swings and rising water levels. The city is positioning itself as a leader in sustainable urban design for landlocked nations facing severe climate vulnerability.", "category": "Environment", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121674", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_26-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/121674"}], "article_id": "528c1ddf"}, {"headline": "Palestinians Hold First General Elections Since Gaza Conflict", "summary": "Voters in the West Bank and Gaza are casting ballots in the first municipal and legislative elections held since the end of the Gaza war. The election, monitored by international diplomats, is seen as a critical test for Palestinian political unity and the future of regional stability.", "category": "World", "page": 7, "importance": 9, "telegram_url": "https://t.me/c/1877410077/121674", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_26-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/121674"}], "article_id": "d0f8ad42"}, {"headline": "Oil Prices Face Volatility Amid Potential Hormuz Strait Disruptions", "summary": "Global oil markets are bracing for a potential supply shock as tensions in the Strait of Hormuz threaten to crash demand. Analysts warn that prolonged closure of the vital shipping route could send Brent crude prices toward $250 a barrel, triggering a global recession and mandatory fuel rationing.", "category": "Economy", "page": 7, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121674", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_26-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/121674"}], "article_id": "b1c3d471"}, {"headline": "Indian Fast Bowlers Forge New Identity Through IPL Success", "summary": "A new generation of Indian pacers, including Mayank Yadav and Harshit Rana, is utilizing the IPL to transition into the national team. Enhanced coaching at the BCCI's Centre of Excellence and high-pressure tournament play have created unprecedented depth in India's fast-bowling department.", "category": "Sports", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121674", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_26-04-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/121674"}], "article_id": "3fe7de21"}, {"headline": "Advanced Shoe Technology Sparks Innovation Race in Marathon Racing", "summary": "The use of carbon-fiber plates and ultra-light foam in running shoes is revolutionizing marathon times. Brands like Nike and Adidas are competing to create the fastest footwear, leading to new world records but also sparking debate over 'technological doping' in professional athletics.", "category": "Technology", "page": 10, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121674", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_26-04-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/121674"}], "article_id": "3fcf800a"}, {"headline": "Reliance Q3 Profit Rises 9% While Wipro's Net Profit Falls 12%", "summary": "Reliance Industries reported a 9.4% YoY rise in net profit to ₹17,265 crore on ₹2.25 trillion revenue, led by retail and telecom. Conversely, Wipro’s Q3 net profit fell 11.7% to ₹2,694 crore with revenue down 4.4% to ₹22,205 crore amid slow IT spending. Wipro issued a cautious fourth-quarter revenue guidance ranging from -1.5% to +0.5% in constant currency terms.", "category": "Business", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_26-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121664"}], "importance": 10, "article_id": "4151941a"}, {"headline": "Calcutta HC Cancels Post-2010 OBC Certificates; PM Modi Slams \"Appeasement Politics\"", "summary": "The Calcutta High Court cancelled all OBC certificates issued in West Bengal after 2010, affecting nearly 5 lakh people, citing arbitrary religion-based classification. While those currently in service remain unaffected, PM Narendra Modi hailed the ruling as a victory for the Constitution and a setback for the TMC's alleged 'vote-bank politics' and illegal rights snatching.", "category": "Law", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 26-04-2026_removed.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121575"}], "importance": 10, "article_id": "20745581"}, {"headline": "Indian Railways to Launch Vande Bharat Sleeper Trains on Bengaluru-Mumbai Route", "summary": "Railways Minister Ashwini Vaishnaw confirmed Vande Bharat sleeper trains, currently in final production at BEML, will launch by August 2026. The KSR Bengaluru to CSMT Mumbai service via Solapur will take 15 hours. Designed for 160 kmph, the trains feature superior safety and comfort. Trials begin within two months, including the Bengaluru-Mangaluru section with auto-emergency brakes.", "category": "Infrastructure", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 26-04-2026_removed.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/121575"}, {"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 26-04.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/121704"}], "importance": 8, "article_id": "9793de27"}, {"headline": "US-Iran Ceasefire Talks Collapse as Trump Cancels Envoys' Pakistan Trip", "summary": "Ceasefire negotiations between the US and Iran in Islamabad collapsed after President Trump cancelled his envoys' trip and Iran's top diplomat departed Pakistan. Tensions escalated as the US Navy began clearing Iranian mines from the Strait of Hormuz following a blockade. Trump asserted the US holds the advantage, demanding Iran initiate contact to end the maritime conflict.", "category": "World", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121681"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 26-04-2026_removed.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121552"}], "importance": 10, "article_id": "5aa74186"}, {"headline": "AAP Seeks Disqualification of Seven Rajya Sabha MPs After Defection to BJP", "summary": "The Aam Aadmi Party will petition the Rajya Sabha Chairman and President Droupadi Murmu to disqualify seven defecting MPs, including Raghav Chadha and Harbhajan Singh. AAP labels the move unconstitutional under the Tenth Schedule. Defectors claim they represent two-thirds of the party's Upper House strength, seeking legal protection via merger provisions, which AAP disputes.", "category": "Politics", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121681"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 26-04-2026_removed.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121552"}], "importance": 9, "article_id": "8f2a899e"}, {"headline": "BJP Labels Arvind Kejriwal’s New Residence \"Sheesh Mahal 2\" Amid Spending Allegations", "summary": "A political row erupted as the BJP released photos of Arvind Kejriwal’s new Lodhi Estate residence, alleging high-end amenities were funded by private money. AAP and CM Atishi dismissed the \"Sheesh Mahal 2\" claims as fake, asserting the images were downloaded from social media. Threatening a defamation case, AAP stated the controversy mirrors previous bungalow renovation disputes.", "category": "Politics", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121681"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 26-04-2026_removed.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/121552"}], "importance": 7, "article_id": "dd6503d2"}, {"headline": "K Kavitha Launches Telangana Rashtra Sena, Challenging Father’s BRS Party", "summary": "Kalvakuntla Kavitha, daughter of former CM KCR, launched the Telangana Rashtra Sena (TRS) after quitting the BRS, which she called \"soulless.\" Reclaiming the acronym her father abandoned in 2022, she apologized for past misrule and promised free education and healthcare. The party aims to contest local polls but faces potential legal hurdles from the Election Commission over its name.", "category": "Politics", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121681"}, {"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_26-04-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/121656"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 26-04-2026_removed.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121552"}, {"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 26-04.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/121704"}, {"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_26-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/121674"}], "importance": 8, "article_id": "d27a4f7d"}, {"headline": "Punjab Kings Script History Chasing Record 265 Target Against Delhi Capitals", "summary": "Punjab Kings set a new T20 record by successfully chasing 265 against Delhi Capitals. Despite KL Rahul’s record-breaking 152* for Delhi—the highest IPL score by an Indian—Punjab won by six wickets behind Prabhsimran Singh’s 76 and Shreyas Iyer’s 71*. The historic chase at Arun Jaitley Stadium was marred by a head injury to DC pacer Lungi Ngidi during the aggressive 116-run powerplay.", "category": "Sports", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121681"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 26-04-2026_removed.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/121552"}, {"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 26-04.pdf", "page": 21, "telegram_url": "https://t.me/c/1877410077/121704"}, {"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_26-04-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/121674"}], "importance": 9, "article_id": "5f8ff97b"}, {"headline": "Ashwini Vaishnaw Inaugurates Aditya High-Speed Rail Coach Facility in Bengaluru", "summary": "Union Minister Ashwini Vaishnaw inaugurated the 'Aditya' complex at BEML’s Bengaluru unit, dedicated to manufacturing indigenous high-speed rail coaches. The facility is developing B-28 trainsets capable of 280 kmph for India's first electric bullet trains. Vaishnaw emphasized that this technology could reduce travel time between Chennai and Bengaluru to just 73 minutes.", "category": "Infrastructure", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/121681"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 26-04-2026_removed.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/121552"}], "importance": 7, "article_id": "f5f4e240"}, {"headline": "Karnataka HC to Rule on Ranveer Singh’s Apology in Kantara Mimicry Case", "summary": "The Karnataka High Court will pass an order on actor Ranveer Singh's plea to quash an FIR for allegedly insulting a deity by mimicking the film Kantara. Singh submitted an unconditional apology and committed to a temple visit within four weeks. While Justice M Nagaprasanna noted the actor's behavior required admonition, he indicated the court would dispose of the case.", "category": "Law", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/121681"}, {"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 26-04.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/121704"}], "importance": 5, "article_id": "3a3c03c1"}, {"headline": "Amit Shah Predicts BJP Victory in Bengal; Promises Matua Community Citizenship", "summary": "Union Home Minister Amit Shah claimed the BJP will win 110 of the 152 seats from the first phase of West Bengal's assembly elections. At a rally in East Midnapore, he assured the Matua and Namasudra communities of citizenship under the CAA, accusing CM Mamata Banerjee of misleading them. Shah attacked the TMC over women's safety and predicted the end of Banerjee's regime.", "category": "Politics", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121681"}, {"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_26-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121674"}], "importance": 8, "article_id": "2abd0e91"}, {"headline": "Rahul Gandhi Accuses TMC of Aiding BJP and Failing West Bengal", "summary": "Congress leader Rahul Gandhi alleged the TMC is paving the way for the BJP in West Bengal through corruption and industrial decline. Campaigning in Hooghly, Gandhi questioned why central agencies have not interrogated CM Mamata Banerjee despite multiple scams. He asserted that the Congress is the BJP's real enemy, while the TMC and BJP both prioritize power over state development.", "category": "Politics", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121681"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 26-04-2026_removed.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/121552"}], "importance": 7, "article_id": "fcddc93c"}, {"headline": "Former CEA Ashok Lahiri Appointed Vice-Chairperson of Reconstituted NITI Aayog", "summary": "Prime Mini f", "page": 12, "telegram_url": "https://t.me/c/1877410077/121656"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 26-04-2026_removed.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/121552"}, {"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_26-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121674"}], "importance": 8, "article_id": "c31b8644"}, {"headline": "Karnataka Mandates Daily Newspaper Reading in Schools to Curb Mobile Addiction", "summary": "The Karnataka Department of School Education and Literacy has ordered all government, aided, and unaided schools to allot 10 minutes daily for Kannada newspaper reading after morning prayers. Proposed by the state child rights commission, the mandate aims to reduce mobile addiction while improving students' vocabulary, general knowledge, and awareness of current affairs.", "category": "Education", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 26-04-2026_removed.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/121552"}, {"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 26-04.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/121704"}], "importance": 7, "article_id": "426f102b"}, {"headline": "India to Roll Out First Indigenous Bullet Train Prototype by 2027", "summary": "Railway Minister Ashwini Vaishnaw announced that India’s first indigenously designed \"Vande Bullet\" train will be ready for trials by April 2027. Manufactured at the new 'Aditya' facility at BEML's Bengaluru campus, the B-28 trainsets aim to serve the Mumbai-Ahmedabad corridor and potentially reduce travel between Bengaluru and Chennai to approximately 73 minutes.", "category": "Infrastructure", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 26-04.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/121704"}, {"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_26-04-2026.pdf", "page": 3, "telegram_url": "ht const CAT_META = {"Politics": {"color": "#e8334a", "icon": "🏛️"}, "Economy": {"color": "#f5a623", "icon": "📊"}, "Business": {"color": "#f0c040", "icon": "💼"}, "India": {"color": "#ff7043", "icon": "🇮🇳"}, "World": {"color": "#5c9eff", "icon": "🌍"}, "Sports": {"color": "#36c46f", "icon": "🏆"}, "Science": {"color": "#a78bfa", "icon": "🔬"}, "Technology": {"color": "#38bdf8", "icon": "💻"}, "Health": {"color": "#34d399", "icon": "🏥"}, "Law": {"color": "#fb923c", "icon": "⚖️"}, "Environment": {"color": "#4ade80", "icon": "🌿"}, "Education": {"color": "#e879f9", "icon": "📚"}, "Culture": {"color": "#f472b6", "icon": "🎭"}, "Infrastructure": {"color": "#94a3b8", "icon": "🏗️"}};

// FIXED: Pre-build data structures IMMEDIATELY for deep linking
const allArts = [...DIGEST.articles].sort((a,b)=>(b.importance||0)-(a.importance||0));
const byCategory = {};
for (const art of allArts) {
  const c = art.category||"India";
  if (!byCategory[c]) byCategory[c]=[];
  byCategory[c].push(art);
}
const sortedCats = Object.keys(byCategory).sort(
  (a,b)=>(byCategory[b][0].importance||0)-(byCategory[a][0].importance||0)
);

// FIXED DEEP LINK HANDLER - Runs IMMEDIATELY
let deepLinkTarget = null;
function handleDeepLink() {
  const hash = window.location.hash;
  if (!hash || !sortedCats.length) return;
  
  const cleanHash = hash.startsWith('#article-') ? hash.slice(9) : hash.slice(1);
  const targetArticle = DIGEST.articles.find(art => art.article_id === cleanHash);
  
  if (targetArticle) {
    deepLinkTarget = {article: targetArticle, hash: cleanHash};
  }
}
handleDeepLink();

let catIdx=0,vpW=0,vpH=0;
const panels=[];
const outer=document.getElementById('outer');
const hTrack=document.getElementById('hTrack');
const hintUp=document.getElementById('hintUp');
const hintRight=document.getElementById('hintRight');
const catFlash=document.getElementById('catFlash');
const cfIcon=document.getElementById('cfIcon');
const cfName=document.getElementById('cfName');

function buildAll() {
  vpW=outer.offsetWidth; vpH=outer.offsetHeight;
  hTrack.innerHTML=''; panels.length=0;
  sortedCats.forEach((cat,ci)=>{
    const m=CAT_META[cat]||{color:"#e8334a",icon:"📰"};
    const arts=byCategory[cat];
    const panel=document.createElement('div');
    panel.className='cat-panel';
    panel.id=`cat-panel-${ci}`;
    panel.style.setProperty('--cc',m.color);
    panel.innerHTML=`<div class="progress-row" id="prow-${ci}" style="--cc:${m.color}"></div><div class="v-feed" id="vfeed-${ci}"><div class="v-track" id="vtrack-${ci}"></div></div>`;
    hTrack.appendChild(panel);
    const pRow=panel.querySelector(`#prow-${ci}`);
    const vFeed=panel.querySelector(`#vfeed-${ci}`);
    const vTrack=panel.querySelector(`#vtrack-${ci}`);
    const cardH=vFeed.getBoundingClientRect().height||vpH;
    
    arts.forEach((art,ai)=>{
      const card = buildCard(art, cardH, m, cat, ai);
      card.id = `article-${art.article_id}`;
      card.dataset.articleId = art.article_id;
      vTrack.appendChild(card);
    });
    
    panels.push({pRow,vFeed,vTrack,articles:arts,artIdx:0});
    buildPRow(ci);
  });
  
  hTrack.style.transition='none';
  hTrack.style.transform='translateX(0)';
  syncV(0,false);
  
  // FIXED: Apply deep link after build
  if (deepLinkTarget) {
    setTimeout(() => applyDeepLink(deepLinkTarget), 100);
  }
}

function buildCard(art,h,m,cat,articleIndex) {
  const src=art.sources?.[0];
  const href = src?.telegram_url || '#';
  const card=document.createElement('div');
  card.className='card';
  card.dataset.articleId = art.article_id;
  card.style.height=h+'px';
  card.style.setProperty('--cc',m.color);
  card.innerHTML=`
    <div class="card-content">
      <div class="card-toprow">
        <div class="cat-pill">
          <div class="pill-icon"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="1" y="1" width="8" height="2" rx="0.6" fill="#888"/><rect x="1" y="4.5" width="5" height="1.5" rx="0.6" fill="#666"/><rect x="1" y="7" width="6" height="1.5" rx="0.6" fill="#666"/></svg></div>
          ${cat.toUpperCase()}
        </div>
        <div class="card-date">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="2.5" width="11" height="9.5" rx="1.8" stroke="#555" stroke-width="1.2"/><path d="M4.5 1v3M8.5 1v3" stroke="#555" stroke-width="1.2" stroke-linecap="round"/><path d="M1 6h11" stroke="#555" stroke-width="1.2"/></svg>
          ${DIGEST.date}
        </div>
      </div>
      <div class="card-headline">${art.headline}</div>
      <div class="card-summary">${art.summary}</div>
      <div class="card-divider"></div>
      <div class="card-footer">
        ${src?`<a class="src-chip" href="${href}" target="_blank" onclick="event.stopPropagation()">${src.newspaper}<span class="src-chip-sep">&middot;</span><span class="src-chip-pg">Pg ${src.page}</span><span class="src-chip-ext"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M3.5 7.5L7.5 3.5M7.5 3.5H5M7.5 3.5V6" stroke="#555" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></span></a>`:'<div></div>'}
        <div class="info-btn"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6.5" stroke="#444" stroke-width="1.3"/><circle cx="7.5" cy="4.5" r="0.8" fill="#555"/><path d="M7.5 7v4" stroke="#555" stroke-width="1.5" stroke-linecap="round"/></svg></div>
      </div>
    </div>`;
  return card;
}

function buildPRow(ci) {
  const p=panels[ci],ai=p.artIdx;
  p.pRow.innerHTML='';
  p.articles.forEach((_,i)=>{
    const seg=document.createElement('div');
    seg.className='pseg'+(i<ai?' done':i===ai?' active':'');
    p.pRow.appendChild(seg);
  });
}

function syncV(ci,animated) {
  const p=panels[ci],h=p.vFeed.getBoundingClientRect().height;
  p.vTrack.style.transition=animated?'transform 0.35s cubic-bezier(0.4,0,0.2,1)':'none';
  p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;
  buildPRow(ci);
}

function applyDeepLink(target) {
  const ci = sortedCats.findIndex(cat =>
    byCategory[cat].some(art => art.article_id === target.hash)
  );
  if (ci === -1) return;
  goCat(ci, false);
  const ai = byCategory[sortedCats[ci]].findIndex(art => art.article_id === target.hash);
  if (ai === -1) return;
  panels[ci].artIdx = ai;
  syncV(ci, false);
  const card = document.getElementById('article-' + target.hash);
  if (card) { card.classList.add('target-highlight'); setTimeout(() => card.classList.remove('target-highlight'), 3000); }
}

function goArt(d) {
  const p=panels[catIdx];
  const n=Math.max(0,Math.min(p.artIdx+d,p.articles.length-1));
  if(n===p.artIdx&&d!==0)return;
  p.artIdx=n; syncV(catIdx,true); dismiss();
}

function goCat(idx,animated=true) {
  idx=Math.max(0,Math.min(idx,sortedCats.length-1));
  if(idx===catIdx&&animated)return;
  const prev=catIdx; catIdx=idx;
  hTrack.style.transition=animated?'transform 0.38s cubic-bezier(0.4,0,0.2,1)':'none';
  hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;
  if(animated&&idx!==prev) {
    const m=CAT_META[sortedCats[idx]]||{color:"#e8334a",icon:"📰"};
    catFlash.style.background=m.color+'18';
    cfIcon.textContent=m.icon; cfName.textContent=sortedCats[idx]; cfName.style.color=m.color;
    catFlash.classList.add('on'); setTimeout(()=>catFlash.classList.remove('on'),500);
  }
  dismiss();
}

let dismissed=false;
function dismiss() {
  if(dismissed)return; dismissed=true;
  hintUp.classList.remove('visible'); hintRight.classList.remove('visible');
  hintUp.classList.add('gone'); hintRight.classList.add('gone');
}

(function initHints() {
  const KEY='dailyBriefHintSeen';
  if(!localStorage.getItem(KEY)) {
    localStorage.setItem(KEY,'1');
    setTimeout(()=>{ if(!dismissed){ hintUp.classList.add('visible'); hintRight.classList.add('visible'); } },2500);
  }
})();

let tsX=0,tsY=0,tcX=0,tcY=0,axis=null,drag=false;
outer.addEventListener('touchstart',e=>{ tsX=e.touches[0].clientX; tsY=e.touches[0].clientY; tcX=0; tcY=0; axis=null; drag=true; hTrack.style.transition='none'; const p=panels[catIdx]; if(p)p.vTrack.style.transition='none'; },{passive:true});
outer.addEventListener('touchmove',e=>{ if(!drag)return; const dx=e.touches[0].clientX-tsX,dy=e.touches[0].clientY-tsY; tcX=dx; tcY=dy; if(!axis&&(Math.abs(dx)>8||Math.abs(dy)>8))axis=Math.abs(dx)>Math.abs(dy)?'h':'v'; if(!axis)return; e.preventDefault(); if(axis==='h'){ const edge=(catIdx===0&&dx>0)||(catIdx===sortedCats.length-1&&dx<0); hTrack.style.transform=`translateX(${-catIdx*vpW+dx*(edge?.14:1)}px)`; }else{ const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height; const edge=(p.artIdx===0&&dy>0)||(p.artIdx===p.articles.length-1&&dy<0); p.vTrack.style.transform=`translateY(${-p.artIdx*h+dy*(edge?.14:1)}px)`; } },{passive:false});
outer.addEventListener('touchend',()=>{ if(!drag)return; drag=false; if(axis==='h'){ const t=vpW*.2; if(tcX<-t)goCat(catIdx+1); else if(tcX>t)goCat(catIdx-1); else{hTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;} }else if(axis==='v'){ const t=vpH*.2; if(tcY<-t)goArt(1); else if(tcY>t)goArt(-1); else{const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height;p.vTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;} } axis=null; },{passive:true});
document.addEventListener('keydown',e=>{ if(e.key==='ArrowDown'||e.key===' '){e.preventDefault();goArt(1);} if(e.key==='ArrowUp'){e.preventDefault();goArt(-1);} if(e.key==='ArrowRight'){e.preventDefault();goCat(catIdx+1);} if(e.key==='ArrowLeft'){e.preventDefault();goCat(catIdx-1);} });
let wl=false;
outer.addEventListener('wheel',e=>{ e.preventDefault();if(wl)return;wl=true; Math.abs(e.deltaX)>Math.abs(e.deltaY)?goCat(catIdx+(e.deltaX>0?1:-1)):goArt(e.deltaY>0?1:-1); setTimeout(()=>wl=false,500); },{passive:false});
window.addEventListener('resize',()=>{ vpW=outer.offsetWidth;vpH=outer.offsetHeight; hTrack.style.transition='none'; hTrack.style.transform=`translateX(${-catIdx*vpW}px)`; panels.forEach(p=>{ const h=p.vFeed.getBoundingClientRect().height; p.vTrack.querySelectorAll('.card').forEach(c=>c.style.height=h+'px'); p.vTrack.style.transition='none'; p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`; }); });

buildAll();
</script>
