<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Inter', -apple-system, sans-serif;
  background: #0c0c0c; color: #fff; touch-action: none;
}
.outer { position: fixed; inset: 0; overflow: hidden; }
.h-track { display: flex; height: 100%; will-change: transform; }
.cat-panel { flex-shrink:0; width:100vw; height:100%; display:flex; flex-direction:column; overflow:hidden; }
.progress-row { flex-shrink:0; display:flex; gap:4px; padding:14px 16px 10px; background:#0c0c0c; position:relative; z-index:5; overflow:visible; }
.progress-row::after { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:80%; height:120px; background:radial-gradient(ellipse at top,color-mix(in srgb,var(--cc) 30%,transparent) 0%,transparent 70%); pointer-events:none; z-index:-1; }
.pseg { flex:1; height:2px; border-radius:1px; background:rgba(255,255,255,0.12); position:relative; overflow:hidden; }
.pseg::after { content:''; position:absolute; inset:0; background:var(--cc,#e8334a); transform:scaleX(0); transform-origin:left; transition:transform 0.25s ease; }
.pseg.done::after, .pseg.active::after { transform:scaleX(1); }
.v-feed { flex:1; overflow:hidden; position:relative; clip-path:inset(0); }
.v-track { display:flex; flex-direction:column; will-change:transform; }
.card { 
  width:100%; flex-shrink:0; background:#0c0c0c; display:flex; flex-direction:column; 
  overflow:hidden; position:relative; 
  scroll-margin-top: 80px;
}
.card.target-highlight {
  background: linear-gradient(135deg, #fff3cd22 0%, #ffeaa722 100%) !important;
  box-shadow: 0 0 30px rgba(255, 193, 7, 0.4);
  border: 2px solid #f39c12;
  animation: pulse-highlight 2s ease-in-out;
}
@keyframes pulse-highlight {
  0%, 100% { box-shadow: 0 0 30px rgba(255, 193, 7, 0.4); }
  50% { box-shadow: 0 0 50px rgba(255, 193, 7, 0.6); }
}
.card-content { flex:1; display:flex; flex-direction:column; padding:36px 20px 22px; min-height:0; position:relative; z-index:1; }
.card-toprow { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; flex-shrink:0; }
.cat-pill { display:inline-flex; align-items:center; gap:7px; background:#1c1c1e; border-radius:8px; padding:7px 12px 7px 10px; font-size:11.5px; font-weight:700; letter-spacing:0.07em; color:#d0d0d0; text-transform:uppercase; line-height:1; }
.pill-icon { width:16px; height:16px; background:#2e2e30; border-radius:3px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.pill-icon svg { display:block; }
.card-date { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:500; color:#666; letter-spacing:0.01em; }
.card-headline { font-size:28px; font-weight:800; line-height:1.18; color:#fff; letter-spacing:-0.03em; margin-bottom:20px; flex-shrink:0; }
.card-summary { font-size:15.5px; font-weight:400; line-height:1.62; color:#6b6b6b; flex:1; overflow:hidden; display:-webkit-box; -webkit-line-clamp:7; -webkit-box-orient:vertical; }
.card-divider { height:1px; background:#1e1e1e; margin:20px 0 16px; flex-shrink:0; }
.card-footer { display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.src-chip { display:inline-flex; align-items:center; gap:6px; background:#181818; border:1px solid #282828; border-radius:9px; padding:8px 13px; font-size:12.5px; font-weight:600; color:#c0c0c0; text-decoration:none; letter-spacing:0.005em; line-height:1; }
.src-chip-sep { color:#3a3a3a; font-weight:400; }
.src-chip-pg { color:#555; font-weight:500; }
.src-chip-ext { margin-left:2px; }
.src-chip-ext svg { display:block; }
.info-btn { width:36px; height:36px; border-radius:50%; border:1.5px solid #252525; background:#141414; display:flex; align-items:center; justify-content:center; color:#555; cursor:pointer; flex-shrink:0; }
.cat-flash { position:fixed; inset:0; z-index:600; pointer-events:none; opacity:0; transition:opacity 0.12s; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; }
.cat-flash.on { opacity:1; }
.cf-icon { font-size:34px; }
.cf-name { font-size:22px; font-weight:900; letter-spacing:-0.03em; text-transform:uppercase; }
.hint { position:fixed; display:flex; flex-direction:column; align-items:center; gap:5px; pointer-events:none; z-index:400; opacity:0; transition:opacity 0.6s ease; }
.hint.visible { opacity:1; }
.hint.gone { opacity:0 !important; transition:opacity 0.4s; }
.hint-pill { font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.55); background:rgba(255,255,255,0.07); backdrop-filter:blur(10px); padding:5px 13px; border-radius:100px; border:1px solid rgba(255,255,255,0.09); }
.hint-arr { font-size:16px; color:rgba(255,255,255,0.4); }
.h-up { bottom:28px; left:50%; transform:translateX(-50%); animation:bUp 2s ease-in-out infinite; }
.h-right { top:50%; right:14px; transform:translateY(-50%); animation:bRight 2s ease-in-out infinite 0.6s; }
@keyframes bUp { 0%,100% { bottom:28px; opacity:.65; } 50% { bottom:36px; opacity:1; } }
@keyframes bRight { 0%,100% { right:14px; opacity:.65; } 50% { right:6px; opacity:1; } }
</style>

const DIGEST   = {"date": "26 April 2026", "articles": [{"headline": "HCL Tech Q3 profit rises 6.2% to ₹4,350 crore", "summary": "HCL Technologies outperformed estimates with a 6.2% annual growth in net profit for the third quarter. Revenue reached a record high of ₹28,446 crore, up 6.5% YoY. The company maintained its full-year revenue growth guidance of 5-5.5%, supported by strong deal wins in the services segment.", "category": "Business", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/121664", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_26-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121664"}], "article_id": "9fadd6b3"}, {"headline": "Wholesale price inflation hits 9-month high of 0.73% in December", "summary": "India's wholesale price index (WPI) based inflation rose to 0.73% in December from 0.26% in November. The increase was primarily driven by a surge in food prices, particularly vegetables and pulses. This marks the second consecutive month of positive WPI inflation after a period of deflation.", "category": "Economy", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/121664", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_26-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121664"}], "article_id": "4b746e20"}, {"headline": "Supreme Court rejects Bilkis Bano convicts' pleas for more time", "summary": "The Supreme Court dismissed petitions filed by convicts in the Bilkis Bano gang-rape case seeking more time to surrender. The bench ruled that the reasons provided had no merit and directed all 11 convicts to return to jail by the January 21 deadline originally set by the court.", "category": "Law", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121664", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_26-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121664"}], "article_id": "fa4a88bd"}, {"headline": "Akasa Air orders 150 Boeing 737 MAX aircraft for expansion", "summary": "Akasa Air announced a firm order for 150 Boeing 737 MAX aircraft at the Wings India 2024 event. The order includes 737-10 and 737-8-200 variants. This move aims to facilitate the airline's domestic and international expansion plans, bringing its total order book to over 200 aircraft.", "category": "Business", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121664", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_26-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/121664"}], "article_id": "ee6f7bf4"}, {"headline": "Jio Financial Services Q3 profit drops 56% to ₹294 crore", "summary": "Jio Financial Services reported a 56% sequential decline in its consolidated net profit for the third quarter. The drop was largely attributed to a significant reduction in dividend income compared to the previous quarter. Total revenue also moderated to ₹414 crore from ₹608 crore in Q2.", "category": "Business", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121664", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_26-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121664"}], "article_id": "463122db"}, {"headline": "Trump wins Iowa caucuses in first 2024 Republican contest", "summary": "Donald Trump secured a commanding victory in the Iowa caucuses, the first contest of the 2024 US Republican presidential primary. Trump finished with over 50% of the vote, significantly ahead of rivals Ron DeSantis and Nikki Haley, solidifying his position as the clear frontrunner for the GOP nomination.", "category": "World", "page": 6, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121664", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_26-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/121664"}], "article_id": "dad643d5"}, {"headline": "India beats Afghanistan by 6 wickets to clinch T20 series", "summary": "India defeated Afghanistan by six wickets in the second T20 International in Indore to take an unassailable 2-0 lead in the three-match series. Chasing 173, India reached the target in 15.4 overs, powered by half-centuries from Yashasvi Jaiswal and Shivam Dube.", "category": "Sports", "page": 18, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121664", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_26-04-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/121664"}], "article_id": "8b814c45"}, {"headline": "Sumit Nagal stuns Alexander Bublik in Australian Open first round", "summary": "Indian tennis player Sumit Nagal achieved a major milestone by defeating 31st seed Alexander Bublik in straight sets (6-4, 6-2, 7-6) in the first round of the Australian Open. Nagal became the first Indian man since 1989 to defeat a seeded player at a Grand Slam singles event.", "category": "Sports", "page": 18, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121664", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_26-04-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/121664"}], "article_id": "a9c36122"}, {"headline": "RBI approves record dividend of Rs 2.11 lakh crore to Government", "summary": "The Reserve Bank of India's board approved a record surplus transfer of Rs 2,10,874 crore to the Central Government for the fiscal year 2023-24. This significant increase from the previous year's Rs 87,416 crore is expected to provide a major fiscal boost to the government, helping meet deficit targets or increase infrastructure spending.", "category": "Economy", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/121575", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 26-04-2026_removed.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121575"}], "article_id": "5cbc978d"}, {"headline": "Pune Porsche crash: Police investigate blood sample swapping allegations", "summary": "Investigation continues into the Pune Porsche crash involving a minor. Police are looking into allegations that the teen's blood samples were swapped at a state-run hospital to show no alcohol consumption. Two doctors have been detained, and the role of police officers at the Yerwada station is being scrutinized for potential negligence.", "category": "India", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/121575", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 26-04-2026_removed.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121575"}], "article_id": "b914ecd4"}, {"headline": "Norway, Ireland, and Spain announce formal recognition of Palestine state", "summary": "In a historic move, Norway, Ireland, and Spain announced they would formally recognize a Palestinian state. The leaders stated the decision aims to bolster a two-state solution and is essential for long-term peace in the region. The move drew sharp criticism from Israel, which immediately recalled its ambassadors from the three nations.", "category": "World", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/121575", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 26-04-2026_removed.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121575"}], "article_id": "9c4f299d"}, {"headline": "Bibhav Kumar's bail plea rejected in Swati Maliwal assault case", "summary": "A Delhi court rejected the bail application of Bibhav Kumar, personal aide to CM Arvind Kejriwal, in the Swati Maliwal assault case. The court noted that the allegations of assault at the CM's residence were serious and that the investigation was at a sensitive stage. Kumar remains in judicial custody as police continue to record statements.", "category": "Law", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121575", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 26-04-2026_removed.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121575"}], "article_id": "29ef678f"}, {"headline": "Heatwave conditions persist across North India; red alert in Delhi-NCR", "summary": "Severe heatwave conditions continue to bake North and West India, with temperatures in several parts of Delhi-NCR crossing 47 degrees Celsius. The IMD has issued a red alert for the region, advising citizens to avoid exposure to the sun during peak hours. Night temperatures also remained significantly above normal, providing no relief.", "category": "Environment", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121575", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 26-04-2026_removed.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121575"}], "article_id": "056a031a"}, {"headline": "Massive fire at chemical factory in Thane; no casualties reported", "summary": "A major fire broke out at a chemical factory in the Dombivli area of Thane district. Over 10 fire engines were deployed to douse the flames, which were visible from several kilometers away. Nearby residential buildings were evacuated as a precaution. No injuries or casualties were reported, and the cause of the fire is under investigation.", "category": "India", "page": 3, "importance": 4, "telegram_url": "https://t.me/c/1877410077/121575", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 26-04-2026_removed.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121575"}], "article_id": "56ce0be5"}, {"headline": "Political parties intensify campaigning as Phase 6 of Lok Sabha polls nears", "summary": "Campaigning reached a fever pitch for the sixth phase of the Lok Sabha elections covering 58 seats across eight states and UTs. High-profile candidates including Kanhaiya Kumar and Manoj Tiwari in Delhi, and Mehbooba Mufti in Anantnag, are in the fray. Leaders are focusing on local issues, national security, and economic promises to woo voters.", "category": "Politics", "page": 7, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121575", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 26-04-2026_removed.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/121575"}], "article_id": "1b7102b9"}, {"headline": "Explained: Why the Calcutta HC struck down 77 OBC sub-classes", "summary": "The High Court found that the inclusion of 77 castes, primarily from the Muslim community, in the OBC list by the West Bengal government lacked empirical data. The court ruled that the state failed to consult the Backward Classes Commission properly and that the classification was used as a tool for political patronage rather than social upliftment.", "category": "Law", "page": 9, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121575", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 26-04-2026_removed.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/121575"}], "article_id": "4a5fe40c"}, {"headline": "ISRO successfully conducts hot test of liquid rocket engine for Gaganyaan", "summary": "The Indian Space Research Organisation (ISRO) successfully performed a 450-second duration hot test of the CE-20 cryogenic engine. This engine will power the upper stage of the LVM3 launch vehicle for the Gaganyaan human spaceflight mission. The test confirmed the engine's performance parameters and structural integrity for future flights.", "category": "Science", "page": 14, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121575", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 26-04-2026_removed.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/121575"}], "article_id": "962bb608"}, {"headline": "UGC allows students with 4-year undergraduate degrees to pursue PhD", "summary": "The University Grants Commission (UGC) has announced that students who have completed a four-year undergraduate program with a minimum of 75% marks can now directly pursue a PhD. This move eliminates the mandatory requirement of a Master's degree for research, aiming to encourage early entry into academia and align with the National Education Policy.", "category": "Education", "page": 14, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121575", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 26-04-2026_removed.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/121575"}], "article_id": "a07c6c54"}, {"headline": "New study links ultra-processed foods to higher risk of cognitive decline", "summary": "Research published in a leading medical journal suggests that individuals consuming high amounts of ultra-processed foods face a significantly increased risk of cognitive decline and stroke. The study tracked over 30,000 participants and found that even a 10% increase in processed food intake correlates with higher neurological health risks.", "category": "Health", "page": 14, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121575", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 26-04-2026_removed.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/121575"}], "article_id": "a038cbd0"}, {"headline": "SEBI proposes new norms for ease of doing business for FPIs", "summary": "The Securities and Exchange Board of India (SEBI) has proposed a new set of regulations aimed at simplifying registration and disclosure requirements for Foreign Portfolio Investors. The proposals include relaxing the timelines for reporting changes in information and providing more flexibility in the appointment of custodians to attract global capital.", "category": "Business", "page": 15, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121575", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 26-04-2026_removed.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/121575"}], "article_id": "c41071c8"}, {"headline": "Rajasthan Royals beat RCB to set up Qualifier 2 against SRH", "summary": "In the IPL 2024 Eliminator, Rajasthan Royals defeated Royal Challengers Bengaluru by four wickets. Chasing a target of 173, RR reached the mark with an over to spare, ending RCB's six-match winning streak. RR will now face Sunrisers Hyderabad in Chennai for a spot in the final against Kolkata Knight Riders.", "category": "Sports", "page": 17, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121575", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 26-04-2026_removed.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/121575"}], "article_id": "723f953c"}, {"headline": "Cannes 2024: Indian films receive standing ovations at world premiere", "summary": "Multiple Indian entries at the Cannes Film Festival have received positive critical acclaim. Payal Kapadia’s 'All We Imagine as Light,' the first Indian film in competition in 30 years, received an enthusiastic standing ovation. Other Indian films in the Un Certain Regard section also garnered praise, marking a strong year for Indian cinema.", "category": "Culture", "page": 20, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121575", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 26-04-2026_removed.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/121575"}], "article_id": "b5aa2282"}, {"headline": "Delhi Police arrest man for stealing luxury cars from high-end hotels", "summary": "Delhi Police apprehended a 34-year-old man involved in stealing luxury vehicles from various five-star hotels in the city. The suspect allegedly used duplicate keys and forged documents to bypass security. Two stolen cars and several forged number plates were recovered during the operation. He is suspected to be part of a larger interstate gang.", "category": "India", "page": 3, "importance": 2, "telegram_url": "https://t.me/c/1877410077/121575", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 26-04-2026_removed.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121575"}], "article_id": "04d9f6da"}, {"headline": "Supreme Court Endorses Uniform Guidelines to Curb Prolonged ICU Stays", "summary": "The Supreme Court has approved uniform ICU guidelines proposing that stabilized patients requiring no further organ support be moved to hospital wards. The bench directed states and UTs to implement these standards by May 18. The move aims to reduce patient trauma, prevent hospital-acquired infections, and provide clear criteria for ICU admission and discharge.", "category": "Health", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121681", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121681"}], "article_id": "c6818504"}, {"headline": "Season's First Heatwave Grips Delhi with Temperatures Touching 42.8°C", "summary": "Delhi recorded its first citywide heatwave of the season on Saturday, with the Safdarjung base station logging 42.8°C, 5.1 degrees above normal. The IMD issued a yellow alert for Sunday, forecasting continued heatwave conditions. Relief is expected from April 27 due to a cyclonic circulation likely to bring thunderstorm activity and light rain to the region.", "category": "Environment", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121681", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121681"}], "article_id": "77146242"}, {"headline": "Alleged Drug Kingpin Salim Dola Detained in Istanbul", "summary": "Salim Dola, the suspected mastermind of a massive synthetic drug cartel with links to Dawood Ibrahim, has been detained in Istanbul. Mumbai police are seeking his extradition via the UAE, as India lacks an extradition treaty with Turkey. Dola is accused of financing MD manufacturing units in India and managing international distribution networks.", "category": "Law", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121681", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121681"}], "article_id": "e1126c31"}, {"headline": "Trump Administration May Deny Green Cards Based on Political Views", "summary": "New training materials from the US Department of Homeland Security suggest the Trump administration can deny green cards to immigrants expressing certain political opinions. Factors include participation in pro-Palestinian protests or social media criticism of Israel. Critics argue the move conflates policy opposition with anti-semitism to restrict permanent residency.", "category": "World", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121681", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121681"}], "article_id": "07bebc3b"}, {"headline": "Convicted Killer Living as YouTuber Arrested After 26 Years", "summary": "Delhi Police arrested Salim Khan, who had been on the run for 26 years after jumping bail in a 1998 murder case. Khan had built a new identity in Loni as a prominent social media activist and YouTuber with over 63,000 followers. He even secured personal security from the UP Police before a cold case review led investigators to his ancestral village.", "category": "Law", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121681", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121681"}], "article_id": "78393c86"}, {"headline": "Kerala CM Issues Slew of Measures to Address Heatwave", "summary": "Kerala Chief Minister Pinarayi Vijayan held a high-level meeting to address rising temperatures, directing officials to ensure uninterrupted power and water supply. Restrictions were placed on outdoor activities during peak heat hours. The state is also focusing on heat-resilient buildings and making antivenom available at health centers due to increased snake sightings.", "category": "Environment", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121681", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/121681"}], "article_id": "1da40e68"}, {"headline": "Four-Year-Old Elephant Found Dead in Mudumalai Tiger Reserve", "summary": "Forest officials discovered the carcass of a four-year-old male elephant near Mayar waterfalls in the Mudumalai Tiger Reserve. A post-mortem was conducted, and samples were collected to determine the cause of death. The discovery occurred during a routine patrol in the Nilgiris district sanctuary.", "category": "Environment", "page": 2, "importance": 3, "telegram_url": "https://t.me/c/1877410077/121681", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/121681"}], "article_id": "eff1317b"}, {"headline": "AIADMK Chief Tells Counting Agents to Remain Alert on May 4", "summary": "AIADMK chief Edappadi K Palaniswami has urged party counting agents to remain vigilant during the vote-counting process for the Tamil Nadu Assembly elections on May 4. He instructed agents to reach stations early and ensure ballot boxes and EVMs remain untampered throughout the process to protect the party's mandate.", "category": "Politics", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/121681", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/121681"}], "article_id": "80d81740"}, {"headline": "Justice Lisa Gill Sworn In as Andhra Pradesh Chief Justice", "summary": "Justice Lisa Gill took the oath of office as the Chief Justice of the Andhra Pradesh High Court on Saturday. Governor S Abdul Nazeer administered the oath at Lok Bhavan in Vijayawada. Justice Gill, who was transferred from the Punjab and Haryana High Court, succeeds Justice Dhiraj Singh Thakur as the first woman to hold this position in the state.", "category": "Law", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121681", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/121681"}], "article_id": "984740a6"}, {"headline": "YSRCP MLC Sent to Judicial Custody in 2022 Murder Case", "summary": "A local court sent YSRCP MLC Ananta Satya Uday Bhaskar to 14-day judicial custody for allegedly influencing witnesses in a 2022 murder case. The MLC was arrested outside a district court in Rajamahendravaram. The case involves the death of his former driver, V Subrahmanyam. Authorities are investigating claims of witness intimidation and tampering.", "category": "Law", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/121681", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/121681"}], "article_id": "ff5133b1"}, {"headline": "Two Workers Killed in Firecracker Factory Blast in Theni", "summary": "A powerful explosion at a firecracker manufacturing unit near Cumbum in Theni district killed two workers, Surya (22) and Dinesh (23). The blast occurred when the victims opened a room containing raw materials and chemicals. Police and bomb disposal squads are investigating if safety norms were bypassed or if the factory was manufacturing banned high-decibel crackers.", "category": "India", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/121681", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/121681"}], "article_id": "d678fe61"}, {"headline": "47 Maoist Operatives Surrender Before Telangana Police", "summary": "In a significant blow to the CPI (Maoist), 47 cadres surrendered before the Telangana Police, handing over 32 firearms including AK-47s and LMGs. The group includes high-ranking member Hemla Iythu. DGP B Shivadhar Reddy noted that 818 Maoists have surrendered since March 2024, citing the state’s rehabilitation policy and the declining influence of the insurgent group.", "category": "India", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121681", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/121681"}], "article_id": "992f18b9"}, {"headline": "Telangana RTC Strike Ends Following Successful Government Talks", "summary": "TGSRTC employees called off their three-day strike after the state government accepted key demands, including an 11% pay hike and the merger of RTC with the state transport department. Marathon talks led by Deputy CM Mallu Bhatti Vikramarka resulted in a resolution. Over 6,000 buses returned to the roads as employees resumed work on Saturday.", "category": "Economy", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121681", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/121681"}], "article_id": "7d51c1d1"}, {"headline": "Mamata Banerjee Claims TMC Has Already Won 100 Seats", "summary": "West Bengal CM Mamata Banerjee asserted that the TMC has already secured over 100 seats in the first phase of polling. Campaigning in Bhabanipur, she accused the BJP of using federal agencies and central forces to intimidate workers. She also announced plans to file a legal case against Amit Shah for his 'hang upside down' remarks directed at her party members.", "category": "Politics", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121681", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121681"}], "article_id": "2c41d67c"}, {"headline": "ED Raids Nine Premises in West Bengal PDS Case", "summary": "The Enforcement Directorate conducted raids at nine locations across West Bengal in connection with a 2023 money laundering case linked to the Public Distribution System. The searches targeted suppliers and exporters. The TMC called the raids politically motivated, while the BJP stated that the investigation unmasked corruption within the state food department.", "category": "Politics", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121681", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121681"}], "article_id": "90165040"}, {"headline": "Cyber Attack Probed in Rajasthan Refinery Fire Incident", "summary": "Investigators are probing a possible cybersecurity breach as the cause of a fire at the Pachpadra oil refinery in Balotra on April 20. Security agencies are scrutinizing digital logs to determine if automated control systems were remotely hacked. Work to dismantle damaged structures has been halted to collect forensic evidence, and access control has been tightened.", "category": "Infrastructure", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121681", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/121681"}], "article_id": "d6007edb"}, {"headline": "AAP Workers Protest Outside Homes of Defecting Rajya Sabha MPs", "summary": "AAP workers staged demonstrations outside the residences of Harbhajan Singh and Ashok Mittal after they defected to the BJP. Protesters in Jalandhar and Ludhiana painted 'Gaddar' (traitor) on property walls, accusing the leaders of betraying the public mandate. CM Bhagwant Mann condemned the exits, while local leaders alleged the BJP is trying to destabilize the party.", "category": "Politics", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121681", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/121681"}], "article_id": "21e81b08"}, {"headline": "BJP MLA Suffers Critical Burns During Protest in Uttar Pradesh", "summary": "Uttar Pradesh BJP MLA Anupama Jaiswal suffered severe facial burns after a sudden gust of wind blew flames from a burning effigy onto her. The incident occurred in Bahraich during a protest against the rejection of a bill regarding Lok Sabha seat expansion. Jaiswal is receiving treatment at a local medical college; police noted the fire flared up due to flammable substances.", "category": "Politics", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121681", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/121681"}], "article_id": "5be24199"}, {"headline": "CJI Proposes National Registry of Retired Judges for ADR Roles", "summary": "Chief Justice of India Surya Kant has called for a formal national registry of retired judges to serve as mediators and arbitrators in Alternative Dispute Resolution (ADR). He argued that their experience is a valuable national resource that can settle disputes more efficiently than courts. The registry would provide a structured framework for institutional service post-retirement.", "category": "Law", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121681", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/121681"}], "article_id": "27f05f9b"}, {"headline": "Mystery Illness Kills Two Minors in Rajasthan; Village on Alert", "summary": "Health authorities in Rajasthan's Salumber district have launched door-to-door checks after two cousins died of a mystery illness within 18 hours. The children experienced sudden vomiting and seizures. Medical teams have been deployed to Kunda village to collect blood samples and monitor other symptomatic children, while anti-larval activities have been intensified in the area.", "category": "Health", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121681", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/121681"}], "article_id": "9d201882"}, {"headline": "Allahabad HC Quashes FIR Against Married Couple, Raps UP Police", "summary": "The Allahabad High Court quashed an FIR against a married couple, ruling that the police have no right to interfere in the lives of consenting adults. The court criticized the trend of registering kidnapping cases against men when women marry by choice. The bench directed the DGP to take remedial action and ensure the personal liberty of such couples is protected.", "category": "Law", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121681", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/121681"}], "article_id": "69c3879a"}, {"headline": "Ro Khanna Distances Himself from RSS Event Featuring Hosabale", "summary": "US Congressman Ro Khanna clarified that he does not support the RSS after a recorded video of him was played at a Washington DC event featuring RSS general secretary Dattatreya Hosabale. Khanna stated he was unaware of the guest list and reaffirmed his commitment to pluralism. The event, hosted by the Hudson Institute, discussed India's strategic role and foreign policy.", "category": "Politics", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121681", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/121681"}], "article_id": "f7f7bfd8"}, {"headline": "Mumbai Consultant Accuses 'Godman' Ashok Kharat of ₹8.76 Crore Fraud", "summary": "A financial consultant filed an FIR against self-styled godman Ashok Kharat for allegedly extorting and cheating him of over ₹8.76 crore. The victim claimed Kharat convinced him that expensive religious rituals were necessary to save his parents' lives. This is the 17th FIR against Kharat in a month, covering charges of sexual exploitation and land grabbing.", "category": "Law", "page": 7, "importance": 4, "telegram_url": "https://t.me/c/1877410077/121681", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/121681"}], "article_id": "dbc30e82"}, {"headline": "The Lancet Declines US Request for COVID-19 Origin Evidence", "summary": "Medical journal The Lancet has refused a US Senate request to provide evidence for an inquiry into the origins of COVID-19. Editor-in-chief Richard Horton stated the journal would not engage with an administration that has attacked prominent scientists. The inquiry, led by Senator Rand Paul, seeks documents and emails from 2018 to 2022 regarding virus research.", "category": "Science", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121681", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/121681"}], "article_id": "538ce235"}, {"headline": "US Bill Proposes Three-Year Pause on H-1B Visa Program", "summary": "Republican lawmakers in the US Congress have introduced a bill to pause the H-1B visa program for three years to protect American jobs. The bill seeks to replace the lottery system with a wage-based selection and increase the minimum salary to $200,000. It also aims to prohibit H-1B holders from bringing dependents or adjusting their status to permanent residency.", "category": "Economy", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121681", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/121681"}], "article_id": "f79f993d"}, {"headline": "Mughal Astronomical Computer Expected to Fetch Millions at Auction", "summary": "A rare 17th-century brass astrolabe from the collection of Maharani Gayatri Devi of Jaipur is set to be auctioned at Sotheby’s London. The intricate device, used for mapping stars and calculating time, was made in Lahore in 1612. It is considered the largest of its kind and is estimated to fetch between 1.5 million and 2.5 million pounds.", "category": "Culture", "page": 10, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121681", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/121681"}], "article_id": "853d532b"}, {"headline": "Japanese Artist Mari Ito Stages First Indian Solo Exhibition", "summary": "Japanese artist Mari Ito’s exhibition 'Origin of Desire' opened in New Delhi, showcasing her unique blend of traditional Nihonga techniques and contemporary themes. Her work explores biopolitical fabulism and the body as a site of insurgency through vivid botanical imagery. The show at Bikaner House marks her first showcase in India, facilitated by Galerie Geek Art.", "category": "Culture", "page": 11, "importance": 4, "telegram_url": "https://t.me/c/1877410077/121681", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/121681"}], "article_id": "b0ae121b"}, {"headline": "Global Report Warns of $423 Billion Impact from Invasive Species", "summary": "An IPBES assessment report identifies over 3,500 harmful invasive alien species contributing to 60% of global extinctions. Species like the Tree of Heaven, Pleco fish, and Lantana are disrupting ecosystems and damaging infrastructure. Experts advocate for a 'whitelist' approach to biosecurity and increased public awareness to mitigate billions of dollars in annual damages.", "category": "Environment", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121681", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/121681"}], "article_id": "4ded3ff0"}, {"headline": "Marie-Louise Eta Makes History as Top-Flight Men’s Team Manager", "summary": "Marie-Louise Eta became the first woman to manage a top-tier men's football club in Europe, taking charge of Union Berlin in the Bundesliga. Previously the league's first female assistant coach, Eta was promoted to help steer the club out of relegation trouble. Her debut marks a significant milestone for female representation in professional men's sports leadership.", "category": "Sports", "page": 13, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121681", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/121681"}], "article_id": "2cdc168c"}, {"headline": "New Book Decodes Ancient Mesopotamian Life Through Cuneiform", "summary": "Historian Moudhy Al-Rashid’s new book, 'Between Two Rivers,' explores the origins of writing in ancient Mesopotamia. Using cuneiform tablets dating back 5,300 years, the book reveals personal stories ranging from beer ration logs to pleas from distraught mothers and rituals for banishing ghosts. The records provide a window into the earliest forms of human administration and literature.", "category": "Culture", "page": 14, "importance": 4, "telegram_url": "https://t.me/c/1877410077/121681", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/121681"}], "article_id": "bc341199"}, {"headline": "IPL Pacer Lungi Ngidi Stable After Suffering Head Injury", "summary": "Delhi Capitals' fast bowler Lungi Ngidi was hospitalized after hitting his head while attempting a catch during a match against Punjab Kings. Play was halted for 14 minutes as a 'green corridor' was created to transport him to the hospital. Scans ruled out spinal injury, and officials confirmed he is stable and conscious, though he reported initial blurred vision and headaches.", "category": "Sports", "page": 15, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121681", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 26-04.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/121681"}], "article_id": "a3988623"}, {"headline": "Peak-cycle buybacks haunt India's IT giants", "summary": "Major Indian IT firms including Infosys, TCS, and Wipro are under scrutiny for executing stock buybacks at peak market valuations. Analysis reveals that several buybacks were announced at prices up to 56% above current levels. This has led to significant opportunity costs and wasted capital that could have been diverted toward critical AI research and business transformation.", "category": "Business", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/121656", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_26-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121656"}], "article_id": "98ea8d0b"}, {"headline": "Fast-evolving capital market needs sophisticated regulatory approach: FM", "summary": "Finance Minister Nirmala Sitharaman has called for a more sophisticated and anticipatory regulatory framework to govern India's rapidly changing capital markets. Speaking at SEBI's 38th Foundation Day, she urged regulators to stay ahead of technological shifts, improve cybersecurity, and ensure investor protection while maintaining market integrity and ease of doing business.", "category": "Economy", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/121656", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_26-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121656"}], "article_id": "fa8911e5"}, {"headline": "Moving to simplify rules, push tech-led oversight: SEBI chief", "summary": "SEBI Chairperson Madhabi Puri Buch announced that the regulator is simplifying rules and deepening technology-led supervision to manage India's growing market. Speaking at the 38th Foundation Day, she highlighted the use of data analytics and AI to enhance real-time monitoring and reduce the compliance burden for market participants while protecting over 140 million investors.", "category": "Economy", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121656", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_26-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121656"}], "article_id": "65aae8f8"}, {"headline": "Vikram-1 nose cone heads to Sriharikota launch pad", "summary": "Skyroot Aerospace has moved the nose cone of its Vikram-1 rocket to the Sriharikota launch pad following successful pre-flight testing. The maiden flight of the private multi-stage vehicle, which can carry 350 kg to Low Earth Orbit, is expected in the coming months. This marks a major milestone for India's commercial space sector and satellite launch capabilities.", "category": "Science", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121656", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_26-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121656"}], "article_id": "bc374ed7"}, {"headline": "Investment Focus: Jyothy Labs buy recommendation", "summary": "Analysts recommend a 'buy' for Jyothy Labs after its stock corrected by 30% over the past year. The mid-tier FMCG firm shows early signs of stabilization with improving volumes in key segments and a net-debt-free balance sheet. Its flagship brand Ujala maintains a dominant 80% market share, and the company is expected to benefit from recovering rural demand.", "category": "Business", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121656", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_26-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121656"}], "article_id": "4603abc7"}, {"headline": "Charting the direction of the BSE IT index", "summary": "Technical analysis of the BSE IT index suggests it is currently the worst-performing sector, down 25% year-to-date. Experts suggest the index looks vulnerable to further falls but may find a long-term bottom in the 24,700-24,250 range. The study analyzes log charts and long-term support levels, advising investors to adopt a staggered entry approach as valuations become attractive.", "category": "Business", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121656", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_26-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/121656"}], "article_id": "0a08fe0d"}, {"headline": "Decoding MF flows: Seasoned investors double down", "summary": "Mutual fund data from March 2026 shows that while market volatility led to increased redemption requests, SIP contributions remain at record highs. Seasoned investors are using market corrections to increase their holdings, particularly in mid-cap and small-cap funds. This trend suggests a maturing retail investor base in India that is less prone to panic selling during downturns.", "category": "Business", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121656", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_26-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121656"}], "article_id": "4a3ee39e"}, {"headline": "Balancing risk & return: ICICI Pru Equity and Debt Fund", "summary": "The ICICI Prudential Equity and Debt Fund is highlighted as a suitable choice for moderate-risk investors. The fund follows a counter-cyclical equity strategy and maintains a high allocation of 60-70% in stocks while using debt for stability. It has consistently beaten its category benchmark over 10 years, managing assets worth ₹46,700 crore with a focus on value and growth.", "category": "Business", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121656", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_26-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/121656"}], "article_id": "1a1ccae6"}, {"headline": "Defence sector stock rally comes at a premium", "summary": "The Nifty India Defence index has outperformed the Nifty 50, driven by increased national capital outlays and a strong government push for indigenization. However, stock valuations are currently high, leading analysts to recommend passive long-term exposure through ETFs or index funds rather than aggressive individual stock picking at current market peaks.", "category": "Business", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121656", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_26-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/121656"}], "article_id": "1108c87a"}, {"headline": "Global Boardroom Chatter: MNCs bullish on India growth", "summary": "CEOs from global giants including Nestlé, Philip Morris, and Reckitt Benckiser have reaffirmed India as a top growth priority. Key highlights include strong volume growth in the FMCG sector, expansion of manufacturing footprints, and the launch of AI-enabled consumer products. India is increasingly seen as a platform for both domestic expansion and global export scaling.", "category": "Business", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121656", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_26-04-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/121656"}], "article_id": "bb083988"}, {"headline": "Banking on valuation comfort: Tamilnad Mercantile Bank", "summary": "Tamilnad Mercantile Bank is showing signs of recovery following management changes and the resolution of legacy regulatory issues. Analysts note that with a strong focus on retail and MSME lending and an improving digital infrastructure, the bank's stock offers attractive valuation comfort. The lender maintains a healthy ROA of 1.9% and is focusing on volume-led growth.", "category": "Business", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121656", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_26-04-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/121656"}], "article_id": "d27b66a5"}, {"headline": "Mind the margins in derivatives trading", "summary": "An educational analysis advises traders on the financial risks of margin calls and delivery obligations in the derivatives market. It explains the importance of managing liquidity for in-the-money options as they approach expiry to avoid the high costs of physical delivery. The guide emphasizes understanding the difference between cash-settled and delivery-based contracts.", "category": "Education", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/121656", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_26-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/121656"}], "article_id": "c779beee"}, {"headline": "Gold and silver see weak bias amid dollar strength", "summary": "Domestic bullion prices declined last week, with gold falling 2.5% and silver dropping 4.9%. The weakness is attributed to a strengthening US dollar and shifting expectations for Federal Reserve interest rate cuts. Analysts expect gold to find support at ₹1,50,000, while silver remains volatile, influenced by industrial demand and global economic cues.", "category": "Business", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121656", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_26-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/121656"}], "article_id": "de088cc2"}, {"headline": "Brent crude prices hold in broad trading range", "summary": "Brent crude prices rose last week but remain confined within a $92 to $115 per barrel range. Geopolitical tensions are being balanced against concerns of a global economic slowdown and high inventory levels. Domestic futures are expected to trade between ₹7,800 and ₹9,500, with market participants closely watching US Fed meetings for further price direction.", "category": "Business", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121656", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_26-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/121656"}], "article_id": "b38fbe77"}, {"headline": "Limited downside seen for Nifty and Sensex", "summary": "Despite recent falls, technical indicators suggest the current market dip is a corrective phase rather than a reversal. Support for Nifty 50 is expected at the 23,500 level, with the broader bull trend remaining intact. While the IT sector weighs on indices, other sectors like Banking and Metals are showing resilience, pointing toward a potential recovery in the medium term.", "category": "Business", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121656", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_26-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/121656"}], "article_id": "a33f8436"}, {"headline": "US stock market maintains bullish bias", "summary": "Major US indices including the S&P 500 and Nasdaq remain in a bullish trend despite inflationary concerns and high interest rates. Strong corporate earnings and the prospect of eventual Fed rate cuts continue to drive investor sentiment. Analysts suggest the outlook will remain positive as long as indices hold above key support levels during corrective dips.", "category": "World", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121656", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_26-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/121656"}], "article_id": "9edbea11"}, {"headline": "Health Insurance: Understanding cataract coverage and sub-limits", "summary": "A consumer awareness report details the complexities of health insurance for cataract surgery, a common condition affecting over 60% of the elderly. It warns policyholders to check for specific sub-limits, waiting periods (often 2 years), and exclusions for advanced lens types like multifocals. The article advises comparing policies to ensure adequate coverage for modern surgery costs.", "category": "Health", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121656", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_26-04-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/121656"}], "article_id": "71b88417"}, {"headline": "Brent crude: Understanding spot vs futures price divergence", "summary": "A technical breakdown explains why Dated Brent (spot) and ICE Brent (futures) prices often diverge. The analysis covers the impact of market mechanics like backwardation and contango, delivery logistics at the North Sea, and the role of financial speculators. It highlights how these differences affect global oil pricing and the financial risks for traders in the energy market.", "category": "Business", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121656", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_26-04-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/121656"}], "article_id": "db6f10ac"}, {"headline": "India Cements Q4 profit jumps four-fold to ₹59 cr", "summary": "India Cements, now under UltraTech Cement's management, reported a sharp rise in net profit to ₹59 crore for the March quarter. The growth was supported by better price realization and significant reductions in fuel and power costs. Revenue rose slightly to ₹1,229 crore, while the company benefited from the completion of a major brand migration in the southern Indian market.", "category": "Business", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121656", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_26-04-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/121656"}], "article_id": "04745c52"}, {"headline": "Exporters to get higher refunds on gold jewellery", "summary": "The Finance Ministry has increased duty drawback rates for gold and silver jewellery exports to provide relief to the gems and jewellery sector. This move aims to help Indian exporters maintain competitiveness amid high global input costs and volatile precious metal prices. The new rates are expected to boost export volumes and improve foreign exchange inflows for the economy.", "category": "Economy", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121656", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_26-04-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/121656"}], "article_id": "0296ed0f"}, {"headline": "Montra Electric launches new electric SCV variants", "summary": "Montra Electric, part of the Murugappa Group, has expanded its electric small commercial vehicle (SCV) range with two new variants. The vehicles offer a certified range of 140 km to 200 km, targeting the growing last-mile and inter-city logistics sectors. The company aims to provide high-performance, cost-effective green mobility solutions for urban and semi-urban transportation.", "category": "Business", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121656", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_26-04-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/121656"}], "article_id": "c0c46582"}, {"headline": "Pine Labs acquires checkout platform Shopflo for ₹88 cr", "summary": "Fintech firm Pine Labs has acquired SaaS-based checkout platform Shopflo in an ₹88 crore deal. This acquisition is part of Pine Labs' strategy to strengthen its online payment ecosystem and provide a seamless checkout experience for its merchant base. Shopflo's technology will be integrated into Pine Labs' existing offerings to enhance digital commerce capabilities.", "category": "Technology", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121656", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_26-04-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/121656"}], "article_id": "28510924"}, {"headline": "RBI approves third term for Karur Vysya Bank MD", "summary": "The Reserve Bank of India has approved the re-appointment of B. Ramesh Babu as Managing Director and CEO of Karur Vysya Bank for a third three-year term. Under Babu's leadership, the bank has seen improved financial performance and asset quality. The extension provides continuity in leadership as the private sector lender focuses on expanding its digital banking presence.", "category": "Business", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121656", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_26-04-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/121656"}], "article_id": "623076a5"}, {"headline": "India faces strategic test as Chabahar sanctions waiver ends", "summary": "India's U.S. sanctions waiver for the Chabahar port expires on April 26, forcing a choice between the 23-year-old project and potential penalties. Officials are exploring a tactical workaround by transferring the stake of the India Ports Global subsidiary to a local Iranian firm. The project remains vital for connectivity to Central Asia as the IMEC corridor faces regional delays.", "category": "World", "page": 3, "importance": 9, "telegram_url": "https://t.me/c/1877410077/121552", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 26-04-2026_removed.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121552"}], "article_id": "0a09d929"}, {"headline": "Over 20 injured in Manipur protest march toward CM house", "summary": "More than 20 people were injured in Imphal after security forces used tear gas to disperse protesters marching toward Chief Minister Yumnam Khemchand Singh's residence. Organised by COCOMI, the rally demanded justice for the April 7 bomb attack that killed two children. Protesters have announced a boycott of the ruling BJP until their demands for a judicial probe are met.", "category": "India", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121552", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 26-04-2026_removed.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121552"}], "article_id": "5d682271"}, {"headline": "Israel evacuates 240 Bnei Menashe members from Mizoram", "summary": "Israel flew approximately 240 members of the Bnei Menashe community from Mizoram to Tel Aviv under 'Operation Wings of Dawn'. This marks the first major batch of the community to be moved since the regional war in West Asia began. While the Indian government stated it did not facilitate the flight, it ensured that legal migration procedures and safety protocols were followed.", "category": "World", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121552", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 26-04-2026_removed.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121552"}], "article_id": "f75a5dc8"}, {"headline": "Outer North Delhi leads in quick POCSO trial convictions", "summary": "Delhi's Outer North district has established dedicated Special Investigation Teams (SITs) to fast-track POCSO cases, resulting in a conviction within nine months for a Bawana assault case. The SITs coordinate forensic, cyber, and legal teams to file chargesheets within 15 days. This approach aims to prevent trial delays and has already secured 11 rapid chargesheet filings in the district.", "category": "Law", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121552", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 26-04-2026_removed.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/121552"}], "article_id": "fa4e0650"}, {"headline": "Police recreate crime scene in Kailash Hills rape-murder", "summary": "Delhi Police conducted a crime scene reconstruction at the residence of a senior IRS officer's daughter who was allegedly raped and murdered by a former domestic help. Accused Rahul Meena was taken to the site for a two-hour session to establish the sequence of events. Forensic teams are mapping his movements from Alwar to Delhi to bolster the ongoing investigation.", "category": "India", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/121552", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 26-04-2026_removed.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/121552"}], "article_id": "db6c8d2f"}, {"headline": "Central Delhi traffic congestion calls drop by 27 percent", "summary": "Delhi Traffic Police reported a 27% decline in congestion-related calls in the Central Range during the first quarter of 2026. Data shows the maximum decline of 50% occurred in the Civil Lines Circle. Officials attributed the improvement to better management at key circles including Kotwali, Daryaganj, and Karol Bagh compared to the same period in 2025.", "category": "Infrastructure", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/121552", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 26-04-2026_removed.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/121552"}], "article_id": "745f0929"}, {"headline": "Four major fire incidents reported across Delhi; no casualties", "summary": "Delhi witnessed four fire incidents between Friday night and Saturday afternoon, including a major blaze in Laxmi Nagar that engulfed 14 flats. Other fires occurred in a tent house at Jyoti Nagar and near a landfill in Jahangirpuri. While over 100 shanties were destroyed in Shakur Basti, officials reported no loss of life and attributed the fires to soaring summer temperatures.", "category": "Environment", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/121552", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 26-04-2026_removed.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/121552"}], "article_id": "42577ae3"}, {"headline": "High Court quashes suspension of Ramanujan College principal", "summary": "The Delhi High Court set aside the suspension of Principal Rasal Singh, ruling that a fact-finding committee's inquiry into sexual harassment complaints violated POSH Act provisions. The court held that only an Internal Complaints Committee has the authority to inquire into such allegations. The judgment emphasized that the suspension was based on a flawed disciplinary process.", "category": "Law", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121552", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 26-04-2026_removed.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/121552"}], "article_id": "01e0be43"}, {"headline": "Gujarat CM appeals for high voter turnout in civic polls", "summary": "Chief Minister Bhupendra Patel urged 4.18 crore voters to participate in Gujarat's local body elections for over 9,900 seats. He described the poll as a 'sacred festival of democracy'. Meanwhile, a BJP candidate's relative was killed in a clash in Mehsana, and AAP's Gujarat Instagram account was suspended, leading to allegations of political interference ahead of the April 28 counting.", "category": "Politics", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121552", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 26-04-2026_removed.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/121552"}], "article_id": "eeff7efa"}, {"headline": "Badole accuses Fadnavis government of creating Scheduled Caste divisions", "summary": "Former Maharashtra Minister Rajkumar Badole alleged that the state government is attempting to create internal rifts within the Scheduled Caste community through sub-classification. He demanded the public release of the Justice Badar committee report on SC sub-categories. Badole argued that the move violates the unified identity established by B.R. Ambedkar.", "category": "Politics", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121552", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 26-04-2026_removed.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/121552"}], "article_id": "3b9a498a"}, {"headline": "Opposition slams BJP over defection of seven AAP MPs", "summary": "Opposition parties, including the Congress and DMK, accused the BJP of using investigative agencies to engineer the defection of seven AAP Rajya Sabha members. Congress leaders likened the BJP to a 'washing machine' for political realignments. The BJP defended the move, stating the MPs switched sides voluntarily due to disillusionment with the AAP leadership's functioning.", "category": "Politics", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121552", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 26-04-2026_removed.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/121552"}], "article_id": "aa639b10"}, {"headline": "UP Home Guard exam draws 2.5 million job aspirants", "summary": "Approximately 2.5 million candidates appeared for the Home Guard recruitment examination in Uttar Pradesh for 41,424 positions. The high turnout led to massive crowds at bus stations and 1,053 exam centres. Opposition parties cited the high applicant-to-post ratio as evidence of severe underemployment and a failure of state employment policies under the BJP government.", "category": "India", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121552", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 26-04-2026_removed.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/121552"}], "article_id": "90565d5d"}, {"headline": "Modi and Mamata clash over Jadavpur University comments", "summary": "A political row erupted after Prime Minister Narendra Modi called Jadavpur University a 'hotbed of anarchy' during a campaign rally. West Bengal CM Mamata Banerjee defended the institute as 'democracy in motion', praising its students' merit and right to question. JU recently ranked ninth in the NIRF 2025 university rankings and is the only state university in India's top 10.", "category": "Politics", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121552", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 26-04-2026_removed.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/121552"}], "article_id": "54fb5a1f"}, {"headline": "Census chief orders identification of vulnerable population sections", "summary": "Registrar-General Mritunjay Kumar Narayan has directed states to list habitats vulnerable to threat or intimidation during the first phase of the Census. Officials were advised to avoid appointing enumerators with potential community biases to prevent litigation. The first phase, House Listing Operations, runs until September 30, while the population count is set for 2027.", "category": "India", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121552", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 26-04-2026_removed.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/121552"}], "article_id": "db4ab350"}, {"headline": "No Islamic restriction on women entering mosques, AIMPLB tells SC", "summary": "The All India Muslim Personal Law Board informed the Supreme Court that Islam does not prohibit women from entering mosques to offer prayers. In a submission to a nine-judge bench, the board stated that while congregational prayer is mandatory for men, it is optional for women. The board clarified that mosques may maintain separate spaces for women for disciplinary reasons.", "category": "Law", "page": 8, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121552", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 26-04-2026_removed.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/121552"}], "article_id": "f4ca1945"}, {"headline": "Sitharaman urges SEBI to strengthen cybersecurity against AI threats", "summary": "Finance Minister Nirmala Sitharaman advised SEBI to prepare for emerging cybersecurity challenges, noting that AI-led tools are making attacks faster and more autonomous. Speaking at SEBI's 38th Foundation Day, she warned that a single successful breach of an exchange or depository could erase national wealth and shake public confidence. She called for defensive tools to evolve rapidly.", "category": "Business", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121552", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 26-04-2026_removed.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/121552"}], "article_id": "b9064a93"}, {"headline": "Coal gasification for fertilisers remains a distant goal", "summary": "Industry experts suggest that India's target of 100 million tonnes of coal gasification by 2030 is unlikely to mitigate current fertiliser shortages. Only a few projects have reached advanced stages due to high capital intensity and lack of assured offtake policies. While the Coal Ministry remains confident, most commercial output is not expected to come online before 2029.", "category": "Economy", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121552", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 26-04-2026_removed.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/121552"}], "article_id": "9ff18957"}, {"headline": "Shipping crisis highlights need for Indian-flagged vessels", "summary": "The conflict in West Asia has exposed vulnerabilities in India's maritime strategy, as most fertiliser and energy imports are currently carried on foreign ships. Industry leaders are urging the government to acquire second-hand vessels to build a national fleet. Currently, a large share of cargo is under CIF terms, leaving India dependent on external logistics during global crises.", "category": "Infrastructure", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121552", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 26-04-2026_removed.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/121552"}], "article_id": "8d265a3e"}, {"headline": "Indian study identifies genetic pathways to heart disease", "summary": "Research published in PLOS One involving 3,000 Punjabi Sikhs has identified new genetic markers for cardiometabolic disorders in Indians. The study found that certain lipid metabolites intersect with immune system inflammation, predisposing Indians to higher risks of type 2 diabetes. These ancestry-specific findings could help develop targeted prevention strategies for the Indian population.", "category": "Health", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121552", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 26-04-2026_removed.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/121552"}], "article_id": "40152c37"}, {"headline": "Study links chronic pain to structural changes in brain", "summary": "A study in the journal Science reveals that chronic pain physically alters the structure of the hippocampus, leading to depression and cognitive decline. Researchers found that early-stage pain causes hippocampal enlargement as a protective response, but persistent pain eventually leads to shrinkage. The study highlights the role of microglia in modulating neuronal excitability during pain.", "category": "Science", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121552", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 26-04-2026_removed.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/121552"}], "article_id": "b094a0e4"}, {"headline": "U.S. imposes sanctions on Chinese refinery over Iranian oil", "summary": "The Trump administration sanctioned Hengli Petrochemical in China for purchasing billions of dollars worth of Iranian crude. The U.S. Treasury also targeted 40 shipping firms and vessels involved in Iran's shadow fleet. These measures aim to restrict Tehran's revenue as fresh peace talks begin, though experts suggest the impact is limited without targeting Chinese financial institutions.", "category": "World", "page": 13, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121552", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 26-04-2026_removed.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/121552"}], "article_id": "f29ebc26"}, {"headline": "OpenAI CEO apologises for missing Canadian shooter's warning", "summary": "OpenAI chief Sam Altman issued an apology after the company failed to alert law enforcement about an 18-year-old who later killed eight people in British Columbia. OpenAI had banned the user's account for violent activity in June 2025 but determined it did not meet the referral threshold at the time. The incident has drawn criticism from Canadian officials regarding AI safety protocols.", "category": "Technology", "page": 13, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121552", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 26-04-2026_removed.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/121552"}], "article_id": "8cbdb69f"}, {"headline": "Suryavanshi becomes youngest to score 1,000 runs in T20s", "summary": "At 15 years and 29 days, Vaibhav Suryavanshi of Rajasthan Royals became the youngest player to reach 1,000 T20 runs. Despite his 36-ball century, Rajasthan lost to Sunrisers Hyderabad in a high-scoring chase. Sunrisers chased down 228 with nine balls to spare, led by blistering half-centuries from Ishan Kishan and Abhishek Sharma, marking their sixth consecutive win against the Royals.", "category": "Sports", "page": 14, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121552", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 26-04-2026_removed.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/121552"}], "article_id": "5917ad0b"}, {"headline": "Vanshika and Chirag win mixed team pistol gold in Cairo", "summary": "India's Vanshika Chaudhary and Chirag Sharma clinched the 10m air pistol mixed team gold at the ISSF Junior World Cup in Cairo. The duo defeated the Individual Neutral Athlete pair with a score of 484.3. This victory helped India maintain its lead at the top of the medal table, which currently include
