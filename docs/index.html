<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Inter', -apple-system, sans-serif;
  background: #0c0c0c; color: #fff; touch-action: none;
}
.outer { position: fixed; inset: 0; overflow: hidden; }
.h-track { display: flex; height: 100%; will-change: transform; }
.cat-panel { flex-shrink:0; width:100vw; height:100%; display:flex; flex-direction:column; overflow:hidden; }
.progress-row { flex-shrink:0; display:flex; gap:4px; padding:14px 16px 10px; background:#0c0c0c; position:relative; z-index:5; overflow:visible; }
.progress-row::after { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:80%; height:120px; background:radial-gradient(ellipse at top,color-mix(in srgb,var(--cc) 30%,transparent) 0%,transparent 70%); pointer-events:none; z-index:-1; }
.pseg { flex:1; height:2px; border-radius:1px; background:rgba(255,255,255,0.12); position:relative; overflow:hidden; }
.pseg::after { content:''; position:absolute; inset:0; background:var(--cc,#e8334a); transform:scaleX(0); transform-origin:left; transition:transform 0.25s ease; }
.pseg.done::after, .pseg.active::after { transform:scaleX(1); }
.v-feed { flex:1; overflow:hidden; position:relative; clip-path:inset(0); }
.v-track { display:flex; flex-direction:column; will-change:transform; }
.card { 
  width:100%; flex-shrink:0; background:#0c0c0c; display:flex; flex-direction:column; 
  overflow:hidden; position:relative; 
  scroll-margin-top: 80px;
}
.card.target-highlight {
  background: linear-gradient(135deg, #fff3cd22 0%, #ffeaa722 100%) !important;
  box-shadow: 0 0 30px rgba(255, 193, 7, 0.4);
  border: 2px solid #f39c12;
  animation: pulse-highlight 2s ease-in-out;
}
@keyframes pulse-highlight {
  0%, 100% { box-shadow: 0 0 30px rgba(255, 193, 7, 0.4); }
  50% { box-shadow: 0 0 50px rgba(255, 193, 7, 0.6); }
}
.card-content { flex:1; display:flex; flex-direction:column; padding:36px 20px 22px; min-height:0; position:relative; z-index:1; }
.card-toprow { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; flex-shrink:0; }
.cat-pill { display:inline-flex; align-items:center; gap:7px; background:#1c1c1e; border-radius:8px; padding:7px 12px 7px 10px; font-size:11.5px; font-weight:700; letter-spacing:0.07em; color:#d0d0d0; text-transform:uppercase; line-height:1; }
.pill-icon { width:16px; height:16px; background:#2e2e30; border-radius:3px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.pill-icon svg { display:block; }
.card-date { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:500; color:#666; letter-spacing:0.01em; }
.card-headline { font-size:28px; font-weight:800; line-height:1.18; color:#fff; letter-spacing:-0.03em; margin-bottom:20px; flex-shrink:0; }
.card-summary { font-size:15.5px; font-weight:400; line-height:1.62; color:#6b6b6b; flex:1; overflow:hidden; display:-webkit-box; -webkit-line-clamp:7; -webkit-box-orient:vertical; }
.card-divider { height:1px; background:#1e1e1e; margin:20px 0 16px; flex-shrink:0; }
.card-footer { display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.src-chip { display:inline-flex; align-items:center; gap:6px; background:#181818; border:1px solid #282828; border-radius:9px; padding:8px 13px; font-size:12.5px; font-weight:600; color:#c0c0c0; text-decoration:none; letter-spacing:0.005em; line-height:1; }
.src-chip-sep { color:#3a3a3a; font-weight:400; }
.src-chip-pg { color:#555; font-weight:500; }
.src-chip-ext { margin-left:2px; }
.src-chip-ext svg { display:block; }
.info-btn { width:36px; height:36px; border-radius:50%; border:1.5px solid #252525; background:#141414; display:flex; align-items:center; justify-content:center; color:#555; cursor:pointer; flex-shrink:0; }
.cat-flash { position:fixed; inset:0; z-index:600; pointer-events:none; opacity:0; transition:opacity 0.12s; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; }
.cat-flash.on { opacity:1; }
.cf-icon { font-size:34px; }
.cf-name { font-size:22px; font-weight:900; letter-spacing:-0.03em; text-transform:uppercase; }
.hint { position:fixed; display:flex; flex-direction:column; align-items:center; gap:5px; pointer-events:none; z-index:400; opacity:0; transition:opacity 0.6s ease; }
.hint.visible { opacity:1; }
.hint.gone { opacity:0 !important; transition:opacity 0.4s; }
.hint-pill { font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.55); background:rgba(255,255,255,0.07); backdrop-filter:blur(10px); padding:5px 13px; border-radius:100px; border:1px solid rgba(255,255,255,0.09); }
.hint-arr { font-size:16px; color:rgba(255,255,255,0.4); }
.h-up { bottom:28px; left:50%; transform:translateX(-50%); animation:bUp 2s ease-in-out infinite; }
.h-right { top:50%; right:14px; transform:translateY(-50%); animation:bRight 2s ease-in-out infinite 0.6s; }
@keyframes bUp { 0%,100% { bottom:28px; opacity:.65; } 50% { bottom:36px; opacity:1; } }
@keyframes bRight { 0%,100% { right:14px; opacity:.65; } 50% { right:6px; opacity:1; } }

<script>
const DIGEST   = {"date": "01 May 2026", "articles": [{"headline": "Elon Musk Lawsuit Against OpenAI Challenges Transition to For-Profit Model", "summary": "Elon Musk has filed a lawsuit against OpenAI, CEO Sam Altman, and Greg Brockman, alleging the firm abandoned its non-profit mission to develop AI for humanity. Musk claims $150 billion in damages, citing OpenAI’s shift to a commercial partnership with Microsoft. OpenAI denies the claims, citing the massive capital required for AI development and its recent $850 billion valuation.", "category": "Technology", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/122240", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122240"}], "article_id": "36e98f8a"}, {"headline": "Jerome Powell Presides Over Final Meeting as Fed Keeps Rates Unchanged", "summary": "The US Federal Reserve kept interest rates steady as Jerome Powell led the rate-setting committee for the final time. The Fed expressed concern over inflation exceeding its 2% target due to supply shocks from the war in West Asia. Markets are now watching for shifts under Kevin Warsh, Donald Trump’s nominee for Fed chair, who has pledged to maintain independence despite political pressure.", "category": "Economy", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122240", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122240"}], "article_id": "158082eb"}, {"headline": "India Domestic Air Passenger Traffic Declines in March Amid Volatility", "summary": "India’s domestic air passenger traffic saw a decline in March 2026, continuing a stretch of volatility seen throughout the last year. The sector is facing increased pressure from rising aviation turbine fuel prices linked to geopolitical tensions. Data from the Directorate General of Civil Aviation suggests mounting operational challenges for airlines as traffic trends remain unstable.", "category": "Economy", "page": 1, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122240", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122240"}], "article_id": "190e8f7c"}, {"headline": "India and New Zealand Formally Sign Comprehensive Free Trade Agreement", "summary": "India and New Zealand concluded a free trade agreement (FTA) in record time, featuring a $20 billion investment commitment from Wellington over 15 years. The deal grants duty-free access to all Indian exports while India offers tariff liberalization on 70% of lines. Sensitive sectors like dairy, coffee, and sugar remain excluded. Bilateral trade has seen recent signs of moderation.", "category": "Economy", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/122240", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122240"}], "article_id": "ec2cb262"}, {"headline": "India Becomes Net Exporter of Finished Steel in Fiscal Year 2026", "summary": "India regained its status as a net exporter of finished steel in FY26 for the first time in three years. Exports grew 35.9% to 6.6 million metric tonnes, while imports fell 31.9% to 6.5 million tonnes. The shift follows a 12% safeguard duty imposed on imports to protect domestic players from competitive pricing by China, Japan, and South Korea, which had turned India into a net importer in FY24.", "category": "Economy", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122240", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122240"}], "article_id": "3dc621e1"}, {"headline": "Industrial Production Growth Eases to Five-Month Low Amid Regional Conflict", "summary": "India's industrial production growth slowed to 4.1% in March, down from 5.1% in February, as the Iran war impacted industrial activity. While manufacturing grew 4.3%, power generation saw a sharp slowdown to just 0.8%. Capital goods remained a bright spot with 14.6% growth. The figures suggest early economic impacts from West Asia disruptions on primary goods and infrastructure output.", "category": "Economy", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122240", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122240"}], "article_id": "40b2aa49"}, {"headline": "Infosys Secures $500 Million Contract from US-Based Truist Financial", "summary": "Infosys has won a contract estimated at over $500 million from Truist Financial Corp. The deal involves setting up and operating a global capability centre for the US bank in Hyderabad. This highlights continued momentum for Indian IT firms in securing large-scale digitisation and operations contracts despite global economic uncertainty.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122240", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122240"}], "article_id": "03122954"}, {"headline": "NewSpace India Hikes Satellite Bandwidth Rates by 20 Percent", "summary": "NewSpace India, the commercial arm of the Indian Space Research Organisation (ISRO), has increased its satellite bandwidth rates by 20% effective April 1. The price hike reflects the evolving commercial landscape for space-based services in the country.", "category": "Technology", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122240", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122240"}], "article_id": "8b77f23c"}, {"headline": "Coal India Reports 12 Percent Rise in Q4 Consolidated Net Profit", "summary": "Coal India reported a 12% year-on-year growth in consolidated net profit for Q4 FY26, reaching ₹10,839 crore. Sequentially, profit rose 51.4% from the December quarter. The performance comes amid high demand for power and domestic fuel supplies as temperatures rise across the country.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122240", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122240"}], "article_id": "13b40f75"}, {"headline": "World Bank Warns Global Energy Prices Could Surge 24 Percent", "summary": "The World Bank has warned that global energy prices could surge by 24% if severe disruptions from the West Asia war persist through May. Such a rise would mark the highest energy price levels since Russia’s invasion of Ukraine, posing significant risks to global inflation and economic growth.", "category": "Economy", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122240", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122240"}], "article_id": "9c980699"}, {"headline": "Engineering and MBA Graduates Face Job Offer Disruptions in FY26", "summary": "The Unstop Talent Report 2026 reveals that 13% of engineering graduates and 12% of MBA students faced job offer delays or rescissions in FY26. Non-specialized undergraduates were hardest hit at 17%. The stress in the job market is attributed to the combined impact of the Iran war and advancements in artificial intelligence, prompting colleges to warn students about onboarding delays.", "category": "Education", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122240", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122240"}], "article_id": "e2143c5e"}, {"headline": "Gender Disparity Persists in Indian Boardrooms Among Younger Directors", "summary": "A Mint analysis of corporate affairs ministry data shows women hold only 32.5% of director identification numbers (DINs) issued in the last two years. The gap is widest in the 18-30 age group, where women's share falls to 26.1%. While the Companies Act mandates at least one woman director for certain firms, representation remains a distant goal for younger professional cohorts.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122240", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122240"}], "article_id": "dc9aa7b9"}, {"headline": "HUL Reports 21.3 Percent Profit Growth with High Volume Surge", "summary": "Hindustan Unilever Ltd (HUL) reported a 21.3% rise in Q4 net profit to ₹2,994 crore, with revenues growing 7.6% to ₹16,351 crore. Underlying volume growth hit a 15-quarter high of 6%. The company is implementing calibrated price hikes of 2-5% to offset rising input costs linked to the West Asia conflict while projecting improved urban demand and premiumization for FY27.", "category": "Business", "page": 3, "importance": 9, "telegram_url": "https://t.me/c/1877410077/122240", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122240"}], "article_id": "fd2c6941"}, {"headline": "Oil Prices Hit Four-Year Peak Amid US-Iran Tensions", "summary": "Brent crude reached $126 a barrel after US President Donald Trump indicated a naval blockade of the Strait of Hormuz would continue until Iran agrees to a new nuclear deal. The surge pushed the Indian rupee to a record low of 95.33 against the dollar. India, which imports 90% of its oil, faces a widening current account deficit and an additional ₹16,000 crore cost for every $1 price increase.", "category": "Economy", "page": 3, "importance": 10, "telegram_url": "https://t.me/c/1877410077/122240", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122240"}], "article_id": "6d486217"}, {"headline": "Reliance Retail Sale of Subsidiary to Former Associate Under Scrutiny", "summary": "Reliance Retail sold its subsidiary Reliance Projects & Property Management Services (RPPMSL) to Jaipur Enclave Pvt Ltd for ₹274 crore. RPPMSL reported a profit of ₹379 crore on revenue of ₹9,323 crore in FY25, while the buyer had zero revenue. Experts say the transaction, though technically legal, tests the spirit of related-party rules due to shared directors and office space.", "category": "Business", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122240", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122240"}], "article_id": "49f37145"}, {"headline": "Electric Vehicle Sales Face Double Whammy as Subsidies End", "summary": "EV manufacturers face slowing demand as Maharashtra, Uttar Pradesh, Rajasthan, and Tamil Nadu end purchase subsidies after achieving sales targets. Additionally, Karnataka and Madhya Pradesh have introduced road taxes on EVs. These six states account for over a third of India's EV sales. The loss of incentives adds ₹1-1.5 lakh to purchase costs at a time of high energy price volatility.", "category": "Business", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/122240", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122240"}], "article_id": "c1981629"}, {"headline": "Weight-Loss Drug Popularity Drives Demand for Corrective Aesthetic Procedures", "summary": "The rising use of GLP-1 weight-loss drugs like Ozempic and Mounjaro is fueling demand in India’s aesthetics market to fix 'Ozempic face'—sagging skin caused by rapid fat loss. Plastic surgeons report 20-25% of new patients are seeking fillers and skin tightening to reverse these side effects. Experts warn against unauthorised use and the rise of non-board-certified clinics.", "category": "Health", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122240", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122240"}], "article_id": "6287d68b"}, {"headline": "Eight Indian States Limit Fiscal Deficit to Three Percent of GSDP", "summary": "Gujarat, Jharkhand, Uttar Pradesh, Telangana, Odisha, Uttarakhand, Bihar, and Goa have capped their fiscal deficits at 3% or below for the current year. Conversely, Punjab is identified as the most indebted state with liabilities at 45.1% of GSDP. The Finance Ministry’s economic review highlighted rising budget discipline among revenue-surplus states like Jharkhand and Telangana.", "category": "Economy", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122240", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122240"}], "article_id": "76920df9"}, {"headline": "Private Airport Operators Warn of Cash Flow Stress After Tariff Cuts", "summary": "The Association of Private Airport Operations (Apao) has written to the civil aviation ministry warning that a mandated 25% reduction in landing and parking charges is causing immediate cash-flow stress. Operators, including Adani and GMR, argue the move affects debt repayment and operational sustainability, while noting there is no mechanism to ensure airlines pass benefits to passengers.", "category": "Infrastructure", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122240", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122240"}], "article_id": "bbe42080"}, {"headline": "India to Procure 62 Vessels for 51,000 Crore for Energy Security", "summary": "Shipping Corp. of India and state-run oil companies plan to float tenders for 62 vessels worth ₹51,000 crore this year to reduce reliance on foreign carriers. The move, prompted by the West Asia crisis, includes container ships and crude tankers to be manufactured in India. The government has aggregated a total demand for 437 vessels to be procured by 2042 for maritime security.", "category": "Infrastructure", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122240", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122240"}], "article_id": "ace55c61"}, {"headline": "RBI Foreign Exchange Forward Book Hits Record 104 Billion Dollars", "summary": "The Reserve Bank of India’s short-dollar positions in the FX market ballooned to a record $104 billion in March. The $26.5 billion monthly expansion reflects the central bank's aggressive efforts to defend the rupee as the Iran war poses a severe threat to India’s economic outlook and currency stability.", "category": "Economy", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122240", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122240"}], "article_id": "497b1bbc"}, {"headline": "Pocket FM Revives Fundraising Plan at 1.5 to 2 Billion Valuation", "summary": "Tencent-backed audio platform Pocket FM is relaunching a funding round to raise $100–120 million at a valuation of $1.5–2 billion. The company has reportedly turned cash flow positive with annual recurring revenue exceeding $400 million. Pocket FM is leveraging AI-led storytelling to expand beyond India, currently operating in over 20 countries including the US and parts of Europe.", "category": "Business", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122240", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/122240"}], "article_id": "74c26dd9"}, {"headline": "Bajaj Finance AUM Hits 5 Trillion Milestone with Improved Asset Quality", "summary": "Bajaj Finance's assets under management (AUM) crossed ₹5 trillion in Q4FY26, with net profit rising 22% to ₹5,550 crore. The lender saw a sharp moderation in credit costs to 1.6% from 2.9% in the previous quarter as MSME stress formation eased. Gold loans emerged as the fastest-growing segment, though operating expenses rose due to a nationwide branch rollout and AI investments.", "category": "Business", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122240", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122240"}], "article_id": "c812654e"}, {"headline": "Sebi Eases Rules for Faster Launch of Alternative Investment Funds", "summary": "The Securities and Exchange Board of India (Sebi) has introduced a 30-day fast-track route for launching new Alternative Investment Fund (AIF) schemes. Managers can now proceed with launches 30 days after filing unless the regulator intervenes. The move is aimed at improving capital efficiency and reducing administrative delays for fund managers in the growing AIF sector.", "category": "Law", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122240", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122240"}], "article_id": "a7a62757"}, {"headline": "India Defence Sector Eyes 15 Trillion Revenue Opportunity Over Five Years", "summary": "Top Indian defence firms, including HAL, BEL, and L&T, are targeting a ₹15 trillion revenue opportunity by FY31 driven by domestic indigenization and an export push. Defence exports reached ₹38,424 crore in FY26, with a government target of ₹50,000 crore by FY29. India is shifting from a major importer to a global supplier for regions like West Asia, Southeast Asia, and Africa.", "category": "Business", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122240", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/122240"}], "article_id": "89f90dd6"}, {"headline": "India Inc Legal Spending Projected at 72,000 Crore in FY26", "summary": "Corporate India’s legal bill is estimated to reach ₹69,000-72,000 crore in FY26, a 15-20% increase from the previous year. The surge is driven by tighter regulations around data privacy, ESG, and complex cross-border contracts impacted by global sanctions and the West Asia war. Companies are expanding in-house teams and investing in legal tech to mitigate non-compliance risks.", "category": "Business", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122240", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/122240"}], "article_id": "182f30d8"}, {"headline": "RBI Clarification Complicates Tata Sons Efforts to Avoid Mandatory Listing", "summary": "The RBI has clarified that equity investments in an NBFC by group entities with debt will be treated as 'indirect receipt of public funds'. This move likely keeps Tata Sons in the 'upper layer' of NBFCs, requiring it to list on stock exchanges. Despite Tata Sons turning debt-free to stay private, its investments from entities like Tata Steel and Tata Motors may trigger listing mandates.", "category": "Law", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122240", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/122240"}], "article_id": "f5865847"}, {"headline": "Big Tech AI Sales Grow Amid Record 670 Billion Capex Forecast", "summary": "Microsoft, Alphabet, Meta, and Amazon reported strong sales growth driven by AI tools, yet investors remain concerned over rising costs. Alphabet's Google Cloud revenue grew 63% to $20 billion. Combined capital expenditures for these four firms are expected to exceed $670 billion in 2026 as they race to secure chips, data centres, and power infrastructure needed for AI models.", "category": "Technology", "page": 8, "importance": 8, "telegram_url": "https://t.me/c/1877410077/122240", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122240"}], "article_id": "3be34d13"}, {"headline": "US Seeks to Deploy Hypersonic Missiles Against Iran Ballistic Launchers", "summary": "US Central Command has requested the deployment of the Army’s Dark Eagle hypersonic missile to the Middle East for possible use against Iranian ballistic missile launchers. The weapon, with a range of over 1,725 miles, can fly at five times the speed of sound. If approved, it would mark the first operational deployment of the long-delayed US hypersonic system.", "category": "World", "page": 8, "importance": 9, "telegram_url": "https://t.me/c/1877410077/122240", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122240"}], "article_id": "e7dc4142"}, {"headline": "Vizag Farmer Develops Freeze-Ready Amrutham Mango Variety", "summary": "Farmer-breeder Kongara Ramesh has developed the 'Amrutham' mango, a variety that can be frozen skin-on for months without chill injury. Unlike typical commercial cultivars, Amrutham can be peeled and eaten like an ice lolly. Ramesh, who has co-authored papers on biopesticides despite dropping out of school, is seeking registration for the variety under farmer rights laws.", "category": "Science", "page": 10, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122240", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/122240"}], "article_id": "605abdb2"}, {"headline": "Japan Revises Arms Export Rules to Supply Lethal Weapons to Allies", "summary": "Japan has revised its arms-export policy to allow the sale of advanced lethal equipment, including warships and missiles, to regional partners. The shift under Prime Minister Takaichi Sanae aims to strengthen Asia’s defense architecture as US reliability fluctuates. Deals for frigates and aircraft are currently being discussed with Australia, the Philippines, and Indonesia.", "category": "Politics", "page": 13, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122240", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/122240"}], "article_id": "92f077cf"}, {"headline": "VinFast Tests Seven-Seater MPV 7 for Indian Market Launch", "summary": "Vietnamese automaker VinFast is testing its MPV 7, an electric seven-seater, for the Indian market. Priced at ₹24.49 lakh, the vehicle offers a 500-km range and spacious third-row seating. However, analysts note it lacks popular features like ventilated seats and wireless charging found in competitors like Kia and BYD, which may challenge its reception among feature-conscious buyers.", "category": "Business", "page": 14, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122240", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/122240"}], "article_id": "7414fa2b"}, {"headline": "Oil in a boil, market scared", "summary": "The US-Iran conflict has led to extreme market volatility, with crude oil prices soaring to $126 per barrel before settling at $113. Indian indices (Sensex, Nifty) saw a decline today but recorded their best monthly performance since December 2023, recovering from earlier losses. Rising fuel costs and geopolitical tensions are key concerns affecting India's economic outlook.", "category": "Economy", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "5fa97cd0"}, {"headline": "HUL net profit rises 21.4% in Q4 FY26", "summary": "Hindustan Unilever (HUL) reported a 21.4% increase in standalone net profit to ₹2,992 crore for Q4 FY26. Sales grew 7.6% to ₹16,351 crore. The company's full-year turnover was ₹63,763 crore, with a net profit of ₹10,324 crore, and the board proposed a final dividend of ₹22 per share. HUL faces challenges from geopolitical tensions and currency fluctuations.", "category": "Business", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "bb75d0a7"}, {"headline": "Rupee crosses 95, small and midcaps surge in April", "summary": "The Rupee hit a new low of 95.34 against the dollar, closing at 94.92, while 10-year government bond yields crossed 7%, driven by rising crude oil prices amid the West Asia crisis. Despite this, BSE Smallcap and Midcap indices recorded their biggest monthly gains in 12 years in April 2026, up 20.1% and 14.8% respectively.", "category": "Economy", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "1e8859a9"}, {"headline": "Cognizant plans 7,000-15,000 layoffs under 'Project Leap'", "summary": "IT services firm Cognizant is reportedly planning to lay off 7,000 to 15,000 employees under 'Project Leap,' aimed at making its operating model AI-ready and cutting costs. The number depends on severance policy. Most affected employees are in India. The move comes amid a volatile macroeconomic environment and weak client demand, increasing pressure on the CEO for returns.", "category": "Business", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "e7dfe153"}, {"headline": "L&T Metro Rail Hyderabad Q4 net profit plunges 17%", "summary": "L&T Metro Rail (Hyderabad) reported a 17% decline in net profit for the fourth quarter. The company's stock price saw a 2.0% decrease today, with its current price at ₹4,012.7 compared to the previous close of ₹4,095.8.", "category": "Business", "page": 2, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "b598e3cb"}, {"headline": "Netweb Technologies India Q4 net profit surges 69%", "summary": "Netweb Technologies India reported a 69% surge in net profit for the fourth quarter compared to the previous quarter. The company's stock price saw a 7.8% decrease today, with its current price at ₹399.5 compared to the previous close of ₹433.2.", "category": "Business", "page": 2, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "38f559bf"}, {"headline": "PCBL stock up 0.9% today", "summary": "PCBL's stock price increased by 0.9% today, closing at ₹4,065.5, up from its previous close of ₹4,027.8. The company was listed in 2014.", "category": "Business", "page": 2, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "beeb7923"}, {"headline": "Dye Black Carrier Jag profit falls 60% year-on-year", "summary": "Dye Black Carrier Jag reported a 60% decrease in net profit compared to the previous year. The company's stock price decreased by 3.0% today, closing at ₹289.7 from its previous close of ₹298.7.", "category": "Business", "page": 2, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "8bc8848f"}, {"headline": "Infosys to expand operations in Visakhapatnam, Andhra Pradesh", "summary": "Infosys plans to open a permanent campus spanning 20 acres in Visakhapatnam, creating 7,000 jobs, strengthening the city's image as an IT hub. This follows Google's $15 billion investment announcement. The state government has allocated land and promotes Visakhapatnam as an attractive IT destination, offering incentives for technology and innovation.", "category": "Technology", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "e5317217"}, {"headline": "Auto industry urges E25 fuel testing this year", "summary": "The auto industry is concerned about the mandatory shift to E25 fuel (25% ethanol, 75% petrol) and advocates for immediate testing this year. While E20 (20% ethanol) is currently mandatory, varying reactions of different vehicle types to higher ethanol blends necessitate phase-wise implementation and clear guidelines. Many older vehicles use carburetors, which are incompatible with high ethanol content.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "554e607d"}, {"headline": "Tata Power, Capelle, Tata Realty partner for cooling-as-a-service", "summary": "Tata Power and Capelle Connected have partnered with Tata Realty & Infrastructure to offer Cooling-as-a-Service (CaaS) solutions at Chennai's Intellion Park. This innovative service-based model allows clients to pay for cooling services (cold air or water) instead of buying equipment, enhancing energy efficiency in IT parks.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "baa8c1ab"}, {"headline": "Power Grid to raise ₹4,000 crore from SBI", "summary": "Power Grid Corporation of India's board approved raising up to ₹4,000 crore through unsecured term loans/credit lines from the State Bank of India. The company, a major power transmission utility under the Ministry of Power, is seeking funds to support its operations.", "category": "Business", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "7d9f11ef"}, {"headline": "ACC Q4 net profit plunges 68% to ₹238.25 crore", "summary": "Cement major ACC's standalone net profit for Q4 FY26 fell 68.27% year-on-year to ₹238.25 crore, impacted by cost pressures, currency depreciation, and acquisition effects. Total expenses rose 22.71%. The board declared a third interim dividend of ₹2 per share for FY26. Total income increased 5.7% to ₹38,508 crore.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "ef55d0e2"}, {"headline": "Bain Capital sells 1% stake in Emcure Pharma for ₹289 cr", "summary": "Global investment firm Bain Capital, through its affiliate BC Investors 4, sold approximately 0.95% stake (18 lakh shares) in Emcure Pharmaceuticals for over ₹289 crore via open market transactions. The shares were sold at an average price of ₹1,608.20 per share, reducing Bain Capital's stake from 3.87% to 2.93%.", "category": "Business", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "5aaa6f70"}, {"headline": "Bajaj Finserv Q4 net profit rises 5% to ₹2,539 cr", "summary": "Financial services company Bajaj Finserv reported a 5% rise in consolidated net profit to ₹2,539 crore for Q4 FY26. Total income grew 5.7% to ₹38,508 crore. The board recommended a dividend of ₹1.50 per share for the fiscal year ending March 31, 2026, including a special dividend of ₹0.20 per share for its 100th anniversary.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "4a60baab"}, {"headline": "Delhi HC orders preservation of Sanjay Kapoor's assets", "summary": "The Delhi High Court ordered the preservation of late industrialist Sanjay Kapoor's assets, preventing his children and his widow from creating third-party rights or alienating properties. This order was issued during a hearing on a will dispute, aiming to protect the children's future and prevent the assets from being dissipated.", "category": "Law", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "efd08faf"}, {"headline": "Dr Lal PathLabs Q4 standalone net profit drops 15%", "summary": "Diagnostic chain Dr Lal PathLabs (DLPL) reported a 15.2% year-on-year drop in standalone net profit to ₹154.8 crore for Q4 FY26. Operating revenue, however, increased by 16.6% to ₹702 crore, aided by a 12% rise in sample volumes. EBITDA grew 10.5% to ₹187 crore, with EBITDA margin at 20.2%.", "category": "Health", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "3c0612ea"}, {"headline": "Nalco Q4 consolidated net profit drops 16.6% to ₹1,722 cr", "summary": "National Aluminium Company (Nalco) reported a 16.6% decline in consolidated net profit to ₹1,722.44 crore for Q4 FY26. The company's total income fell to ₹5,012.82 crore from ₹5,267.83 crore in the year-ago period. The board recommended a dividend of ₹2 per share for FY26.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "bd1b3428"}, {"headline": "Waaree Energies Q4 consolidated net profit surges 75%", "summary": "Waaree Energies reported a nearly 75% increase in consolidated net profit to ₹1,126 crore for Q4 FY26. Total income more than doubled to ₹8,659.98 crore. For the full fiscal year 2025-26, net profit grew to ₹3,884.15 crore from ₹1,928.13 crore in the previous year.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "d6b5d801"}, {"headline": "Competition drives down mutual fund exit loads", "summary": "Increased competition and investor discipline are leading mutual fund houses to rationalize or remove exit loads. Recent moves by ICICI Prudential MF (reducing to 1 month), WhiteOak Capital MF (removing for all equity/hybrid schemes), and others aim to attract investors and compete with passive funds, which typically have lower or no exit loads.", "category": "Business", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "82b961dc"}, {"headline": "Indian market cap sees record surge after March dip", "summary": "India's market capitalization surged by a record ₹51 lakh crore in April to ₹463.3 lakh crore, recovering from a ₹51.1 lakh crore drop in March caused by the West Asia crisis. Sensex rose 6.9% and Nifty 7.5% in April, their best monthly performance since December 2023. Despite the recovery, Sensex and Nifty are still below their all-time highs.", "category": "Economy", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "f6e1f8dd"}, {"headline": "BSE Smallcap and Midcap see significant monthly gains", "summary": "BSE Smallcap and Midcap indices are poised for their largest monthly gains in 12 years in April 2026, rising 20.1% and 14.8% respectively, outpacing the Sensex's 7.7% gain. Factors include stable Q4 earnings expectations and retail investor interest amid limited primary market opportunities. However, experts warn of continued volatility and potential downside risks.", "category": "Economy", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "7b0960be"}, {"headline": "Crude oil prices and rupee face pressure amid West Asia conflict", "summary": "Crude oil prices have surged past $125 per barrel, influenced by the stalled US-Iran talks and the continued closure of the Strait of Hormuz. Analysts expect continued weakness in the rupee, with 96 being a critical level. A significant drop in oil prices is needed for the rupee to recover. Strong dollar buying is anticipated between 94.50 and 94.80.", "category": "Economy", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "dc6d31a8"}, {"headline": "NBFCs flock to banks for loans as bond yields rise", "summary": "Non-banking financial companies (NBFCs) are increasingly turning to banks for credit due to higher interest rates and volatility in the bond market. Bank credit to NBFCs grew 26.3% year-on-year to ₹20.65 lakh crore in March 2026. This trend is supported by the RBI reducing the risk weight for bank loans to NBFCs in April 2025, encouraging lending.", "category": "Economy", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "d823fd82"}, {"headline": "IDBI Bank Q4 net profit drops 5% year-on-year", "summary": "IDBI Bank reported a 5% year-on-year decline in net profit to ₹1,943 crore for the January-March quarter of FY26, down from ₹2,051 crore in Q4 FY25. The decrease was primarily attributed to lower non-interest income.", "category": "Business", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "c91fea64"}, {"headline": "Task force recommends PNG expansion amid energy crisis", "summary": "A government task force has suggested measures to expand Piped Natural Gas (PNG) distribution, including making PNG mandatory for new/under-construction buildings and commercial establishments in areas with existing infrastructure. Recommendations also include simplifying land approval for pipelines and reducing value-added tax (VAT) on PNG to encourage adoption amidst the West Asia energy crisis.", "category": "Infrastructure", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "68a6df99"}, {"headline": "Rural women's workforce participation rises, but wages lag men", "summary": "Women's labor force participation in India reached 40% in 2025, up from 33.9% in 2022, primarily driven by rural women. However, data shows significant gender wage disparity: rural women earn ₹305/day compared to ₹435 for men, and urban women earn ₹363/hour versus ₹552 for men. Women also spend 389 minutes daily on unpaid domestic work.", "category": "Economy", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "47698bbd"}, {"headline": "RBI's ECL norms could impact banks' CET-1 ratio by 120 bps", "summary": "CRISIL Ratings predicts that the RBI's final guidelines on Expected Credit Loss (ECL) could have a net impact of up to 120 basis points on banks' Common Equity Tier 1 (CET-1) ratios. The new three-stage asset classification framework introduces varying provisioning requirements based on default risk, increasing provisioning costs for performing assets, though strong capitalization buffers may absorb some impact.", "category": "Business", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "fe272b7a"}, {"headline": "Consumption Patterns Evolving, Tax Cuts' Impact on Demand Analyzed", "summary": "This analysis, using CMIE data, examines how tax cuts might affect aggregate demand and consumption patterns in India. It questions if tax reductions increase overall consumption or merely shift spending. Evidence suggests tax cuts in late 2025 did not immediately boost average propensity to consume (APC), indicating a subtle rather than widespread demand stimulus.", "category": "Economy", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "114c1f56"}, {"headline": "Policy Suggestions for Economic Stability and Growth", "summary": "Amidst the West Asia conflict and fluctuating oil prices, India faces economic risks. Policy adjustments are crucial, including simplifying GST structure and reducing special excise duty on fuel to protect marketing companies. The editorial suggests continued decriminalization of regulations and easing of procedures to attract foreign investment and manage current account deficits.", "category": "Economy", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "383a6492"}, {"headline": "Major IBC Reforms to Benefit Homebuyers", "summary": "The Insolvency and Bankruptcy (Amendment) Act, 2026, recently passed, is poised to significantly aid over 162,000 homebuyers trapped in insolvency cases. The amendments provide for expedited resolution, minimum payments for dissenting financial creditors, and allow financial creditors to initiate a swift insolvency process for personal guarantors, aligning with global standards and tackling developer defaults effectively.", "category": "Law", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "2dc4f535"}, {"headline": "UAE's OPEC exit to impact global oil market dynamics", "summary": "A reader's letter discusses the UAE's decision to leave OPEC, a move signaling a shift from price control to production expansion. This could increase global oil supply and lower prices, intensifying competition and volatility. The decision reflects geopolitical shifts and could prompt other OPEC members to reconsider their strategies, impacting global energy geopolitics.", "category": "World", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "2087f4aa"}, {"headline": "Focus on nutrient-rich crops to combat malnutrition", "summary": "A reader emphasizes developing nutrient-rich crop varieties and biofortification to combat global malnutrition, which affects 149 million stunted children and 45 million suffering from wasting. The letter highlights that modern wheat and rice varieties often lack essential micronutrients. India's challenge is to produce not just food, but nutritious food, addressing widespread anemia and stunting.", "category": "Health", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "7ecefba9"}, {"headline": "NCLT notice for Hill View and Salasar Techno amalgamation", "summary": "A public notice announces a National Company Law Tribunal (NCLT) meeting for June 5, 2026, to consider the amalgamation scheme of Hill View Infrabuild Limited (Transferor Company) and Salasar Techno Engineering Limited (Transferee Company). The meeting will be held via video conferencing with e-voting, and details are available on respective company and exchange websites.", "category": "Business", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "1336f1db"}, {"headline": "Debt Recovery Tribunal summons Mukesh Rani against Axis Bank", "summary": "The Debt Recovery Tribunal (DRT-2), Chandigarh, has issued a summons in case OA/2237/2025, filed by Axis Bank against Mukesh Rani and Anil. The notice instructs the defendants to appear before the Registrar on May 4, 2026, at 10:30 AM, state why the relief should not be granted, disclose assets, and refrain from transacting in secured or listed properties without DRT approval.", "category": "Law", "page": 8, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "1ee07cb5"}, {"headline": "DCB Bank withdraws auction notice for two accounts", "summary": "DCB Bank has withdrawn the auction sale notice for accounts of Gagan Singh & Saroj Devi (account 1) and Ankit Kapoor & Tarannum Malik (account 2), which was published on April 2, 2026, in Business Standard (English & Hindi).", "category": "Business", "page": 8, "importance": 2, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "d8c24332"}, {"headline": "Samman Finserv takes possession of properties due to loan defaults", "summary": "Samman Finserv Limited has taken symbolic possession of properties due to loan defaults by Geetanajali Jain and Vikas. The total outstanding amount is ₹40,78,010.92 for facility 1 and ₹2,08,950.51 for facility 2, with interest from February 9, 2026. The public is warned against dealing with these properties.", "category": "Business", "page": 8, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "09063bdd"}, {"headline": "ARCIL takes possession of properties from defaulting borrowers", "summary": "Edelweiss Asset Reconstruction Company (India) Limited (ARCIL), as trustee for EDARC-CPS-IV Trust, has taken physical possession of properties from Madhusudan Motors and others due to loan defaults totaling ₹5,29,00,591.46 as of May 19, 2025. The public is cautioned against dealing with the secured assets without ARCIL's consent.", "category": "Business", "page": 8, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "df962f3f"}, {"headline": "Indian Navy successfully tests Naval Anti-Ship Missile (SR)", "summary": "The Indian Navy successfully conducted the maiden flight test of its short-range Naval Anti-Ship Missile (NASM-SR) off the Odisha coast in the Bay of Bengal. Two missiles were launched from a helicopter, confirming their capabilities to hit targets both above and below the sea surface. Developed by DRDO and Indian industry, the 3.6-meter missile has a range of 55 km and can carry a 100 kg warhead.", "category": "Technology", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "958c8d97"}, {"headline": "Supreme Court: Cannot impose unwanted pregnancy on minor", "summary": "The Supreme Court stressed the need to reconsider abortion rules, especially for minor victims of sexual assault. The bench noted that rigid time limits for abortion become problematic when victims approach courts late, often past the legal gestational limit. The Chief Justice stated that such minors should not be forced to carry unwanted pregnancies, urging a review of legal timelines for these cases.", "category": "Law", "page": 9, "importance": 8, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "b949f020"}, {"headline": "SC rebukes govt for not filing affidavit on airline fares", "summary": "The Supreme Court reprimanded the central government for failing to file an affidavit on regulating 'unprecedented' fluctuations in private airline fares and other charges. A bench of Justices Vikram Nath and Sandeep Mehta ordered the government to submit an affidavit explaining the delay and seeking additional time, in response to a petition seeking transparency and passenger safety in civil aviation.", "category": "Law", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "dbb97c20"}, {"headline": "India, Italy to jointly produce military equipment, deepen defence ties", "summary": "India and Italy agreed to jointly produce military equipment and develop a defence industrial base, as Defence Ministers Rajnath Singh and Guido Crosetto held talks in New Delhi. The decision aims to enhance bilateral defence and strategic relations amid evolving regional and global security scenarios, focusing on co-production, co-development of platforms, and technology transfer.", "category": "Politics", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "e28dc67a"}, {"headline": "High oil prices threaten India's economic growth-inflation balance", "summary": "Soaring crude oil prices, reaching $120 per barrel due to the West Asia conflict, threaten India's economic growth-inflation balance. Experts warn that sustained high prices could push FY27 GDP growth to 6% and CPI inflation to 6%. Despite limited policy options, the government may need to increase repo rates and diversify crude oil sources beyond West Asia to mitigate risks.", "category": "Economy", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/122216", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/122216"}], "article_id": "27a75079"}, {"headline": "Trump considers Iran strikes as crude oil prices surge", "summary": "US President Donald Trump is examining options for new strikes on Iran and blocking its ports, causing Brent crude to surge. This comes as the US-Iran ceasefire is shaky, and Centcom prepares strike plans. Iran's leader vows to protect nuclear capabilities.", "category": "World", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/122244", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122244"}], "article_id": "e0491245"}, {"headline": "FIFA chief confirms Iran will play World Cup games in US", "summary": "FIFA President Gianni Infantino reiterated that Iran will participate in the FIFA World Cup 2026 and play its games in the US, nixing proposals to shift matches to Mexico.", "category": "Sports", "page": 1, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122244", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122244"}], "article_id": "d69d1cf8"}, {"headline": "TMC protests alleged irregularities at EVM strongrooms", "summary": "Trinamool Congress candidates staged a sit-in outside a Kolkata counting centre, alleging outsiders handled polled materials. The Election Commission dismissed claims, stating officials segregated postal ballots per process and strongrooms remained secure.", "category": "Politics", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122244", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122244"}], "article_id": "2cd20dbb"}, {"headline": "Delivery agent killed in car hit, falls from Delhi flyover", "summary": "A 25-year-old food delivery agent died after an allegedly speeding car hit his electric scooter, causing him to fall 40 feet from the Dabri flyover in west Delhi. The driver fled, leaving the damaged car; police are searching for the accused.", "category": "India", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122244", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122244"}], "article_id": "a30dc4cb"}, {"headline": "SC seeks action on Supertech arm over ₹1,500 crore misuse", "summary": "The Supreme Court ordered immediate action against Supertech’s subsidiary involved in the Supernova project in Noida. A court-appointed committee found misappropriation of ₹1,500 crore through backdated entries in the firm’s account books.", "category": "Law", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122244", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122244"}], "article_id": "8b7c09f3"}, {"headline": "Rain and hail bring Delhi respite from heatwave", "summary": "Delhi and NCR received respite from intense heat with thunderstorms, gusty winds, rain, and hail, lowering temperatures by 10°C. Though temperatures may rise Friday, more rain is expected May 3-5 due to a fresh western disturbance.", "category": "India", "page": 1, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122244", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122244"}], "article_id": "71a2baff"}, {"headline": "Geneticist J Craig Venter, human genome pioneer, dies at 79", "summary": "J Craig Venter, the geneticist and entrepreneur instrumental in decoding the human genome, died at 79. His competitive approach accelerated the Human Genome Project, and he later created the first self-replicating bacterial cell.", "category": "Science", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122244", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122244"}], "article_id": "1ecc9067"}, {"headline": "TRAI explores vehicle-to-everything communication system", "summary": "India's telecom regulator (TRAI) released a consultation paper on rolling out a vehicle-to-everything (V2X) wireless system. This technology could alert drivers of crashes, traffic violations, and optimize traffic flow, using on-board and roadside units.", "category": "Technology", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122244", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122244"}], "article_id": "348cdca8"}, {"headline": "Self-enumeration for Census 2027 begins in MCD areas", "summary": "The self-enumeration exercise for Census 2027 starts Friday in MCD areas, with officials targeting dignitaries like LG Taranjit Singh Sandhu. The 15-day drive precedes the house-listing operation. Camps will spread awareness.", "category": "India", "page": 2, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122244", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122244"}], "article_id": "bff2affd"}, {"headline": "Punjab CM’s 'recall' pitch for Rajya Sabha MPs lacks constitutional basis", "summary": "Punjab CM Bhagwant Mann will meet the President over seven AAP Rajya Sabha MPs who switched to BJP. His \"recall\" demand lacks constitutional backing as India's law doesn't permit MP recall. This is seen more as a political than legal move.", "category": "Politics", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122244", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122244"}], "article_id": "4cf7cceb"}, {"headline": "Bengaluru records highest April rainfall, surpassing 2011 record", "summary": "Bengaluru registered 111.5 mm rainfall in 24 hours, highest for April, surpassing the 2011 record. The intense spell caused widespread waterlogging, uprooted trees, and damaged property, despite a dry spell earlier in the month.", "category": "India", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122244", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122244"}], "article_id": "54b41e06"}, {"headline": "Six sentenced to death for BJP leader Venkatesh Kurubara's murder", "summary": "A Koppal court sentenced six convicts to death for the 2025 murder of BJP leader Venkatesh Kurubara. The victim was attacked with machetes and rods; police filed a charge sheet within two months. Personal rivalry was cited as the motive.", "category": "Law", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122244", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122244"}], "article_id": "f2de17c0"}, {"headline": "Karnataka CM urges Centre to clear Jal Jeevan Mission dues", "summary": "CM Siddaramaiah urged the central government to release pending funds and reimburse dues under the Jal Jeevan Mission. Karnataka has invested ₹17,554 crore despite no central support for two years, achieving 86.93% rural tap connections.", "category": "Politics", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122244", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122244"}], "article_id": "38 , "telegram_url": "https://t.me/c/1877410077/122244", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122244"}], "article_id": "de12683d"}, {"headline": "Salim Dola remanded to NCB custody until May 8", "summary": "Mumbai court remanded international drug trafficker Salim Ismail Dola, an aide of Dawood Ibrahim, to NCB custody until May 8. He's linked to a June 2023 drug seizure case, accused of supplying 40kg of mephedrone monthly.", "category": "Law", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122244", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122244"}], "article_id": "eb241735"}, {"headline": "Six held for gangrape of two tribal girls in Chhattisgarh", "summary": "Six people, including three juveniles, were held for allegedly gang-raping two tribal girls in Surguja district, Chhattisgarh. The victims, aged 15 and 13, were forced onto a motorcycle after attending a wedding.", "category": "India", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122244", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122244"}], "article_id": "82e1efb8"}, {"headline": "43 Hmar rebel cadres surrender after Mizoram peace deal", "summary": "43 cadres of Hmar rebel outfit HPC-D Lalhmingthanga Faction (HPCD-LF) surrendered arms in Mizoram following a peace agreement with the state government. Chief Minister Lalduhoma attended the ceremony, where 18 sophisticated rifles were handed over.", "category": "Politics", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122244", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122244"}], "article_id": "
