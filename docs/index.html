grams, with a 10% cut sought for non-defense sectors. Trump stated the increase is essential for 'peace through strength,' though the move is expected to face opposition in Congress amid rising federal deficits.", "category": "World", "page": 10, "importance": 9, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Iran shoots down US F-35 fighter jet in southwestern region", "summary": "Iran’s Revolutionary Guard confirmed it shot down a US F-35 fighter jet on Friday. One pilot was reportedly rescued while a search continues for the other. The loss comes as President Trump threatens to destroy Iranian civilian infrastructure, including power plants and bridges. The conflict has severely impacted global energy markets and the transit of goods through the Strait of Hormuz.", "category": "World", "page": 10, "importance": 10, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "Defence Secretary Pete Hegseth ousts US Army Chief of Staff", "summary": "US Defence Secretary Pete Hegseth has removed Gen Randy George as the Army's Chief of Staff. No specific reason was given for the departure, which is the latest in over a dozen high-level military firings by Hegseth. The ouster comes five weeks into the US-Israel conflict with Iran, raising concerns about leadership stability during active wartime operations.", "category": "World", "page": 10, "importance": 9, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "US job growth rebounds in March with 178,000 new jobs", "summary": "Non-farm payrolls in the US increased by 178,000 in March, rebounding from a sharp decline in February. The growth followed the end of a healthcare worker strike and warming temperatures. However, economists warn of mounting downside risks to the labor market as the war with Iran continues with no clear timeline for resolution, potentially impacting future employment figures.", "category": "World", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "World food prices climb in March due to energy costs: FAO", "summary": "The UN Food and Agriculture Organization reported that global food prices rose 2.4% in March to their highest level since last September. The rise was driven by higher energy and input costs linked to the West Asia conflict. FAO warned that if the war lasts over 40 days, farmers may reduce planting or switch crops, leading to lower yields and higher prices throughout next year.", "category": "World", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "Trump requests $500 billion increase in US defence spending", "summary": "President Donald Trump’s 2027 budget request includes a massive $500 billion hike in defence spending and a 10% cut in non-defence discretionary funds. The request includes funding for a 'Golden Dome' missile shield and 34 new combat ships. The plan faces likely scrutiny in Congress as the US continues to finance its military operations against Iran amid a growing budget deficit.", "category": "World", "page": 10, "importance": 9, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "China Tries to Play Peacemaker Between Pak and Afghanistan", "summary": "China is hosting talks between Afghanistan and Pakistan to mediate the long-standing conflict and secure its regional interests. The discussions aim to normalize ties and ensure security along the border, specifically addressing concerns over extremism. China's involvement highlights its growing diplomatic role in Central Asia and its efforts to protect Belt and Road Initiative projects.", "category": "World", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119223", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_04-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119223"}]}, {"headline": "Australia Plays Hardball on Kids’ Social Media Ban", "summary": "The Australian government is pushing forward with legislation to ban social media for children under 16. Despite intense lobbying from tech giants like Meta and TikTok, the government cited overwhelming parental support and concerns over mental health. Tech companies argue the ban is technically difficult and could drive children to less regulated corners of the internet.", "category": "World", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119223", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_04-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119223"}]}, {"headline": "Food Price Rise Set to Stay if Iran War Lasts, says FAO", "summary": "The UN Food and Agriculture Organization (FAO) warns that global food prices, which reached a seven-month high in March, could continue to rise if the conflict in West Asia persists. Disruptions in the Strait of Hormuz are impacting supplies of fertilizer and fuel, raising production costs for farmers globally. Cereal and vegetable oil prices have seen the sharpest increases recently.", "category": "World", "page": 7, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119223", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_04-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/119223"}]}, {"headline": "US fighter jet crashes in Iran; search for second pilot continues", "summary": "A US F-15E Strike Eagle fighter jet went down in Iran on Friday. One pilot was successfully rescued near the Strait of Hormuz, while a search is ongoing for the second crew member. The Pentagon acknowledged the loss, stating the jet had degraded Iranian air defense to the point of flying unhindered before the crash. US officials say the pilot was rescued by special forces.", "category": "World", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/119205", "sources": [{"newspaper": "Times of India", "pdf_filename": "Delhi_TOI_04-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119205"}]}, {"headline": "US President seeks $1.5 trillion defense budget for 2027 fiscal", "summary": "The White House has requested a record $1.5 trillion defense budget for the 2027 fiscal year. If approved, this would be the highest military spending in US history, representing a 40% jump over previous levels. The proposal comes as the US faces a significant expansion of regional conflicts and seeks to modernize its military infrastructure.", "category": "World", "page": 18, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119205", "sources": [{"newspaper": "Times of India", "pdf_filename": "Delhi_TOI_04-04-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/119205"}]}, {"headline": "Pakistan fuel prices skyrocket by 55% amid global energy crisis", "summary": "Pakistan has announced a massive hike in fuel prices, with petrol and diesel costs rising by up to 55%. The price of petrol has increased by Rs 137 to Rs 321 per litre. The government attributed the move to rising global energy costs and the need to meet international financial obligations, sparking widespread public protests across major cities.", "category": "World", "page": 18, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119205", "sources": [{"newspaper": "Times of India", "pdf_filename": "Delhi_TOI_04-04-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/119205"}]}, {"headline": "LPG Shortage Triggers Medicine Supply Crisis in India", "summary": "The diversion of petrochemical feedstocks for domestic LPG supply has led to a shortage of isopropyl alcohol (IPA), a critical solvent for the pharmaceutical industry. Major drugmakers have warned of disruptions to life-saving medicine supplies. The government has since stepped in with emergency reallocation measures to restore pharma feedstock.", "category": "Health", "page": 17, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119230", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_04-04-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/119230"}]}, {"headline": "Smart Scales Offer More Precise Health Metrics Beyond Body Weight", "summary": "Modern smart scales are helping health-conscious users track BMI, body composition, and heart rate at home. While useful for screening and long-term monitoring, experts caution that they are not a replacement for professional medical check-ups. Several budget and high-end models are now competing in the Indian health-tech market.", "category": "Health", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/119230", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_04-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119230"}]}, {"headline": "Health Ministry issues heatwave advisory as temperatures soar across North India", "summary": "The Ministry of Health and Family Welfare has issued a high-level heatwave advisory to states as North India experiences record temperatures. The directive mandates that hospitals establish specialized heat clinics and ensure sufficient stocks of IV fluids and electrolytes. Public health warnings emphasize staying hydrated and avoiding outdoor activities during peak heat hours.", "category": "Health", "page": 11, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119240", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_04-04-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/119240"}]}, {"headline": "Four women arrested in Kerala for attacking gynaecologist", "summary": "Police in Malappuram arrested four women for allegedly attacking a gynaecologist at a government hospital following the death of a patient. The doctor sustained serious injuries and is undergoing treatment. The Kerala Government Medical Officers’ Association condemned the attack, stating the patient had received proper care for postpartum haemorrhage complications before being referred.", "category": "Health", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "US Exempts Generic Drugs From Tariffs; Patented Medicines Face 100% Levy", "summary": "The US administration announced that generic pharmaceutical products and ingredients will not be subject to new tariffs for now. However, patented medicines face a 100% levy unless companies have 'most favored nation' pricing. India, which exports $10 billion in medicines to the US annually, sees this as a partial relief, though innovators like Sun Pharma may be impacted.", "category": "Health", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Apollo Hospitals Receives NCLT Approval for Corporate Restructuring", "summary": "Apollo Hospitals Enterprise has obtained NCLT clearance for a composite scheme of arrangement. The restructuring involves Apollo Hospitals Enterprise Ltd, Apollo Healthco Ltd, Keimed Pvt Ltd, and Apollo Healthtech Ltd. The move is aimed at streamlining healthcare and allied business operations across the four involved entities.", "category": "Health", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Centre may debar firms with cancelled drug licences from re-applying", "summary": "To tighten regulatory oversight, the Centre is considering a proposal to debar firms and individuals whose drug manufacturing licences were cancelled for non-compliance with GMP norms. Currently, promoters often apply for fresh licences under new legal entities. The move aims to ensure continuing regulatory consequences for manufacturing counterfeit or substandard drugs.", "category": "Health", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "Centre Plans to Report on GLP-1 Drugs Side Effects", "summary": "The Health Ministry plans to set up a registry to monitor and report side effects of popular GLP-1 weight-loss drugs. This follows a surge in demand and concerns over unauthorized sales and potential health risks like pancreatitis and thyroid issues. The government aims to ensure post-marketing surveillance and enforce strict regulations on prescription-only obesity medications.", "category": "Health", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119223", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_04-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119223"}]}, {"headline": "Mounjaro Brides: Injecting Confidence Before ‘I Do’", "summary": "A growing trend sees Indian brides-to-be using GLP-1 weight-loss injections like Mounjaro and Wegovy to lose weight before their weddings. Health experts warn of significant risks, including misuse for cosmetic rather than medical reasons. While some clinics offer 'wedding packages,' doctors caution against the long-term side effects and the lack of proper medical supervision.", "category": "Health", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119223", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_04-04-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119223"}]}, {"headline": "Microsoft to Invest $10 Billion in Japan AI Infrastructure", "summary": "Microsoft announced a $10 billion investment over four years to build artificial intelligence data centers and related infrastructure in Japan. President Brad Smith met with Japanese Prime Minister Sanae Takaichi to confirm the plan. The investment follows a global trend of major tech firms expanding AI capacity in strategic markets.", "category": "Technology", "page": 15, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119230", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_04-04-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/119230"}]}, {"headline": "TCS secures multi-year digital transformation deal with global financial institution", "summary": "Tata Consultancy Services has won a major multi-year contract to drive digital transformation for a leading global bank. The agreement focuses on cloud migration, cybersecurity, and data modernization using TCS’s proprietary AI solutions. This deal confirms the sustained appetite for large-scale IT modernization among global financial firms despite macroeconomic challenges.", "category": "Technology", "page": 7, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119240", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_04-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/119240"}]}, {"headline": "Trai directs Reliance Jio to stop device-specific discriminatory tariffs", "summary": "The telecom regulator Trai has ordered Reliance Jio to stop offering certain recharge plans exclusively through specific apps or for specific low-cost devices like JioBharat. Trai labeled these practices as a violation of transparency and non-discrimination principles. Jio has been given until April 14 to make all tariff offerings available across all platforms and devices for all users.", "category": "Technology", "page": 16, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "DeepSeek's next-gen V4 AI model to run on Huawei chips", "summary": "China’s DeepSeek is preparing to launch its V4 AI model, which will run on the latest chips from Huawei Technologies. In preparation, Chinese tech giants have reportedly placed bulk orders for hundreds of thousands of Huawei's next-generation chips. The collaboration marks a strategic shift for DeepSeek, which is working to optimize its underlying code specifically for Chinese hardware.", "category": "Technology", "page": 16, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "Yamaha Launches EC-06 Electric Scooter in India at ₹1.68 Lakh", "summary": "Yamaha has entered the Indian EV market with the EC-06, based on the River Indie platform. The scooter features a 4-kWh battery, 169 km IDC range, and a top speed of 79 kph. Priced at ₹1.68 lakh, it offers a 24.5-litre boot and emphasizes build quality over gimmicks, though it currently lacks fast-charging capabilities, requiring 8-10 hours for a full charge.", "category": "Technology", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Ducati Unveils Ultra-Exclusive Superleggera V4 Centenario Road-Legal Superbike", "summary": "Ducati has revealed the Superleggera V4 Centenario, featuring a carbon fiber frame, swingarm, and wheels. The 1103 cc V4 engine produces up to 246 bhp in race configuration with a kerb weight of only 167 kg. It is the first road bike to use carbon-ceramic disc brakes. Only 500 units will be produced, blurring the lines between competition and road-legal performance.", "category": "Technology", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "GenAI Startup NeuroPixel.AI Shuts Operations Amid Intense Global Competition", "summary": "Bengaluru-based GenAI startup NeuroPixel.AI has ceased operations after five years. CEO Arvind Venugopal Nair cited the inability to compete with large-scale image models like Google’s NanoBanana Pro. Despite having a unique tech stack, the company faced financial strain after its largest client folded. The startup is now exploring options to monetize its remaining IP.", "category": "Technology", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Netafim Launches Fifth-Generation AI-Enabled Fertigation Dosing Machines", "summary": "Netafim Irrigation India has introduced the Dosing 5G product range, featuring AI-powered automated dosing technology for precise nutrient delivery. The system aims to lower input costs and reduce water and energy consumption in both open-field and protected cultivation. The technology also minimizes nutrient run-off, supporting long-term soil and water sustainability.", "category": "Technology", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Nemetschek and Pinnacle Infotech Partner for Digital Engineering in India", "summary": "Germany's Nemetschek Group signed an MoU with Pinnacle Infotech to introduce advanced digital engineering technologies to the Indian market. The collaboration will integrate Nemetschek’s software brands, including Bluebeam and ALLPLAN, into Pinnacle’s Building Information Modelling (BIM) and construction technology services.", "category": "Technology", "page": 9, "importance": 4, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Amazon MX Player Leverages AI to Drive Advertising and User Engagement", "summary": "Amazon MX Player has integrated AI across its production and advertising stacks, resulting in over 150 advertisers joining the platform. Executives stated that AI has lowered barriers for dubbing content into multiple languages and allows advertisers to create video series efficiently. The platform plans to double down on free premium content and launch gaming features in 2026.", "category": "Technology", "page": 10, "importance": 4, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Borrowers may soon tap formal credit through sovereign ULI app", "summary": "The Reserve Bank Innovation Hub is developing a B2C application for the Unified Lending Interface (ULI). The platform will allow borrowers to access formal credit, initially focusing on Kisan Credit and agricultural loans, directly on their smartphones. The vision is to provide a single platform connecting multiple lenders and borrowers without competing with private aggregators.", "category": "Technology", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "China issues draft rules to regulate misuse of digital humans", "summary": "China’s cyberspace regulator proposed rules requiring clear labeling of virtual human content to prevent misleading children or fueling addiction. The draft regulations prohibit 'digital humans' from providing virtual intimate relationships to minors and ban using others' personal information to create virtual identities without consent, as part of efforts to control AI-generated content.", "category": "Technology", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "China pursues applications-first strategy to win global AI race", "summary": "In an opinion piece, Shyam Saran details China's AI strategy, which focuses on building an open-source, ubiquitous network permeated into manufacturing, robotics, and defense. Unlike the US's pursuit of AGI, China emphasizes rapid social and economic utility. India is urged to follow a similar frugal path, focusing on language models and domestic GPU infrastructure to avoid dependency traps.", "category": "Technology", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "Google launches Gemma 4 open AI models for on-device use", "summary": "Google has introduced Gemma 4, a new family of open AI models designed to run locally on smartphones and PCs without cloud dependency. The lineup includes Gemini Nano 4 for Android and larger variants for developer workstations. These models are built to facilitate on-device and offline AI processing, reflecting a shift toward decentralized artificial intelligence infrastructure.", "category": "Technology", "page": 14, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "Indian Broadcasters Shift to Domestic Satellite Cos", "summary": "Indian television broadcasters are moving their operations away from Chinese-linked satellite firms like Chinasat and APStar following government directives. The Ministry of Information and Broadcasting is pushing for use of domestic capacity on GSAT and Intelsat. The move is driven by security concerns and the goal to promote self-reliance in the nation's space and broadcasting sectors.", "category": "Technology", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119223", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_04-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119223"}]}, {"headline": "OpenAI acquires US technology talk show TBPN for strategic expansion", "summary": "OpenAI has acquired the US-based technology talk show and community platform TBPN (Tech Talk Business Network). The deal, whose financial terms remain undisclosed, is seen as OpenAI's move to integrate media and community feedback into its AI development cycle. TBPN's founders will join OpenAI to lead its new media and community outreach division.", "category": "Technology", "page": 22, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119205", "sources": [{"newspaper": "Times of India", "pdf_filename": "Delhi_TOI_04-04-2026.pdf", "page": 22, "telegram_url": "https://t.me/c/1877410077/119205"}]}, {"headline": "US Imposes 100 Percent Tariffs on Certain Patented Drugs", "summary": "The Trump administration will impose tariffs of up to 100% on imported patented medicines from countries lacking specific trade deals with the US. The move is designed to pressure pharmaceutical companies to manufacture more drugs domestically. Some major exemptions will apply to ensure basic medical availability.", "category": "Politics", "page": 15, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119230", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_04-04-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/119230"}]}, {"headline": "Election Commission monitors final phases of polling across several Indian states", "summary": "The Election Commission of India has intensified monitoring for the remaining phases of the 2024 general elections. Special observers have been deployed to ensure peaceful polling in sensitive constituencies across North and East India. Voter turnout trends show consistent engagement, with the commission emphasizing strict adherence to the model code of conduct.", "category": "Politics", "page": 5, "importance": 9, "telegram_url": "https://t.me/c/1877410077/119240", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_04-04-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/119240"}]}, {"headline": "NIA team reaches Bengal to probe Malda mob siege episode", "summary": "A 20-member National Investigation Agency (NIA) team arrived in Malda, West Bengal, to investigate a mob siege at a block development officer’s office where seven judicial officers were held hostage. The state CID arrested AIMIM leader Mofakkerul Islam from Bagdogra airport, identifying him as a lead conspirator. Thirty-five arrests have been made across 19 registered cases.", "category": "Politics", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "Amit Shah pledges UCC implementation in Assam excluding tribal communities", "summary": "Union home minister Amit Shah reiterated the BJP's commitment to implementing a Uniform Civil Code (UCC) in Assam if returned to power. He clarified that tribal communities would remain outside its jurisdiction, following the model set by Uttarakhand. Shah also criticized the Congress for using tribal groups as vote banks and highlighted increased development budgets for these regions.", "category": "Politics", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "Congress signals support for amendments to women’s reservation bill", "summary": "The Congress party indicated it may back government amendments to the women’s reservation bill to delink it from the census and implement it by the 2029 polls. However, chief whip Jairam Ramesh argued that holding a Parliament session before the end of the current assembly election cycle violates the model code of conduct. Both Houses are scheduled to meet on April 16.", "category": "Politics", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "AAP leaders exchange barbs after Raghav Chadha removed from RS post", "summary": "A day after being removed as AAP’s deputy leader in the Rajya Sabha, Raghav Chadha stated he had been “silenced, not defeated.” This triggered a sharp response from party leader Atishi, who questioned Chadha's silence on national concerns and his alleged absence during party crises. The exchange highlights growing internal friction within the Aam Aadmi Party leadership.", "category": "Politics", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "Pinarayi Vijayan hits back at Telangana CM over 'dark era' comments", "summary": "Kerala CM Pinarayi Vijayan defended his state's development record after Telangana CM Revanth Reddy alleged corruption and malgovernance. Vijayan cited Niti Aayog data showing Kerala leads in the Sustainable Development Index with the lowest poverty rate in India. He criticized Reddy for 'political hypocrisy,' noting that Telangana officials had previously visited Kerala to learn from its projects.", "category": "Politics", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "Union Minister Rijiju assures Christian community over FCRA amendments", "summary": "During a visit to Kerala, Union Minister Kiren Rijiju stated that minority communities and missionaries need not worry about proposed FCRA changes. He clarified that the amendments aim to improve the Act and check the illegal flow of funds for anti-national activities. Rijiju accused the opposition of spreading lies to mislead innocent people regarding the government's intentions.", "category": "Politics", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "Assam CM slams poll rival’s mother over beef and social posts", "summary": "Assam CM Himanta Biswa Sarma sparked controversy by criticizing the mother of AJP candidate Kunki Chowdhury during a rally. Sarma alleged that the candidate's mother eats beef and supports 'anti-national' elements based on her social media posts. The AJP dismissed the claims as a sign of desperation, while the candidate's mother urged the CM to fact-check her family's constitutional history.", "category": "Politics", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "BJP Summons 1,000 provisions for removal to boost ease of living", "summary": "Union Minister Piyush Goyal announced that over 1,000 provisions across 79 Acts will be removed or decriminalized following the enactment of the Jan Vishwas Bill. The legislation aims to reduce regulatory burdens on small businesses and individuals by converting minor criminal offenses into civil penalties. This includes removing jail terms for minor infractions in municipal and motor vehicle laws.", "category": "Politics", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "CPI(M) and BJP Intensify Grassroots Campaigning in Thiruvananthapuram", "summary": "In Kerala’s capital, the CPI(M) has deployed cadres for booth-level mobilization to counter the BJP’s growing digital and data-driven outreach. The BJP has established a high-tech campaign hub in Nemom to support candidate Rajeev Chandrasekhar. The Left is banking on the popularity of sitting MLAs, while the BJP seeks a major breakthrough using national-level messaging.", "category": "Politics", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Congress Releases List of 27 Candidates for Tamil Nadu Polls", "summary": "The Congress has named 27 candidates for the Tamil Nadu Assembly elections, including State President K Selvaperunthagai from Sriperumbudur. Other notable nominees include former MP A Chella Kumar and Lyca Productions head GKM Tamil Kumaran. The party is contesting 28 seats as part of the DMK-led alliance, with one candidate for Melur still to be finalized.", "category": "Politics", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "BJP releases Tamil Nadu candidate list; Annamalai not contesting", "summary": "The BJP announced 27 candidates for the Tamil Nadu Assembly elections, including Union Minister L Murugan and Tamilisai Soundararajan. Notably, former state president K Annamalai is not on the list. The announcement follows rumors of internal differences over seat allocation. Annamalai stated that he was not asked by the party leadership to contest this time.", "category": "Politics", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "Mamata Banerjee mocks Amit Shah's 15-day campaign plan for Bengal", "summary": "West Bengal CM Mamata Banerjee dismissed Union Home Minister Amit Shah's plan to camp in the state for 15 days, claiming the people of Bengal do not like the BJP. Speaking at a rally in Malda, she also targeted AIMIM chief Asaduddin Owaisi, accusing him of engineering protests and acting as a 'cuckoo' for the BJP to disrupt judicial and administrative processes.", "category": "Politics", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "3rd N-Powered Sub Aridaman Inducted", "summary": "India has commissioned its third nuclear-powered ballistic missile submarine, INS Aridaman, in Visakhapatnam. The vessel is larger and more advanced than its predecessors, carrying longer-range nuclear missiles. This induction completes a significant step in strengthening India's nuclear triad, providing a credible second-strike capability and enhancing maritime security in the region.", "category": "Politics", "page": 2, "importance": 9, "telegram_url": "https://t.me/c/1877410077/119223", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_04-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119223"}]}, {"headline": "Nitish likely to Take Oath as RS Member on April 10", "summary": "Bihar Chief Minister Nitish Kumar is expected to take oath as a Rajya Sabha member on April 10. Sources indicate he may resign as Chief Minister to move to central politics, potentially taking a role in the Union Cabinet. The move would trigger a leadership transition in Bihar, with the BJP and JD(U) discussing a new power-sharing arrangement for the state government.", "category": "Politics", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119223", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_04-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119223"}]}, {"headline": "Thrissur Fight Under Shadow of BJP’s Maiden LS Win", "summary": "The temple town of Thrissur is witnessing a fierce assembly election battle following the BJP's first-ever Lok Sabha victory in Kerala. The contest features strong candidates from the Congress, BJP, and CPI(M). The BJP is looking to build on its recent momentum, while the LDF and UDF aim to protect their traditional strongholds in what has become a high-profile three-way electoral fight.", "category": "Politics", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119223", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_04-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119223"}]}, {"headline": "Shah Targets Congress Over Infiltration, Says No UCC for Tribals", "summary": "Home Minister Amit Shah attacked the Congress party over illegal infiltration during an election rally in Assam. He also clarified that the proposed Uniform Civil Code (UCC) would not apply to tribal communities, addressing local concerns. Shah emphasized the government's commitment to border security and promised to identify and deport all illegal immigrants if voted back to power.", "category": "Politics", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119223", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_04-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119223"}]}, {"headline": "Government confident of cross-party support for women's reservation bill", "summary": "The Centre expects significant cross-party support for the women's reservation bill during a special three-day Parliament session starting April 16. Despite opposition from parties like the TMC and Left over the timing and 'lack of outreach,' the government believes the bill's significance and popular demand will prevent any major blocks to its passage.", "category": "Politics", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119205", "sources": [{"newspaper": "Times of India", "pdf_filename": "Delhi_TOI_04-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119205"}]}, {"headline": "EC orders 500 central force companies to stay in Bengal post-polls", "summary": "The Election Commission has decided that 500 companies of central paramilitary forces will remain in West Bengal after the assembly elections to prevent post-poll violence. The EC stated that the move is necessary to secure EVM strongrooms and protect citizens during the results phase, citing the state's history of electoral violence.", "category": "Politics", "page": 25, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119205", "sources": [{"newspaper": "Times of India", "pdf_filename": "Delhi_TOI_04-04-2026.pdf", "page": 25, "telegram_url": "https://t.me/c/1877410077/119205"}]}, {"headline": "India Prepares Contingency Plan for Industrial Output Amid War", "summary": "The Centre is exploring strategies to boost domestic production of induction cookers and petrochemicals to mitigate supply chain risks from the West Asia war. Government officials are reviewing sectors vulnerable to disruptions in shipping routes. Measures include cutting import duties on key petrochemical inputs to cushion price spikes.", "category": "Economy", "page": 16, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119230", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_04-04-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/119230"}]}, {"headline": "War Jitters Push Up Dry Fruit and Nut Prices in India", "summary": "Prices of raisins, dates, and pistachios have surged 20-30% in India due to shipping disruptions in the Persian Gulf. Freight and insurance costs have risen up to 30% as vessels avoid high-risk zones. India relies on imports for nearly 80% of its $8.5 billion dry fruit and nut market.", "category": "Economy", "page": 16, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119230", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_04-04-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/119230"}]}, {"headline": "RBI approves record ₹2.11 lakh crore dividend for fiscal year 2024", "summary": "The Reserve Bank of India board approved a record surplus transfer of ₹2,10,874 crore to the central government for 2023-24. This is more than double the previous year's transfer and significantly exceeds the budget estimate of ₹1.02 lakh crore. The windfall is expected to help the government reduce its fiscal deficit and increase capital expenditure while maintaining fiscal stability.", "category": "Economy", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/119240", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_04-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119240"}]}, {"headline": "India manufacturing growth remains resilient despite rising raw material costs", "summary": "The HSBC India Manufacturing Purchasing Managers' Index remained well into expansion territory at 57.5 in May. While output and new orders showed strong growth, input costs rose at the fastest pace in ten months. The data indicates that despite inflationary pressures, domestic demand and industrial production continue to support India's overall economic momentum.", "category": "Economy", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119240", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_04-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119240"}]}, {"headline": "US oil tanker bound for India reroutes to China midway", "summary": "The US-sanctioned tanker Ping Shun, carrying Iranian crude oil, has changed its destination from India's Vadinar terminal to Dongying in China. The shift occurred mid-voyage, potentially due to missing international maritime documentation or commercial factors. This would have marked the first such shipment to India in nearly seven years before the vessel altered its course.", "category": "Economy", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "Trump imposes 100% tariffs on patented foreign-made drugs", "summary": "President Donald Trump has ordered a 100% tariff on patented pharmaceuticals manufactured abroad unless countries negotiate trade deals or companies build plants in the United States. He also revamped metal duties, imposing a 25% tariff on the full value of finished products containing steel, aluminum, or copper. The moves coincide with the first anniversary of his 'Liberation Day' trade policy.", "category": "Economy", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "Kavitha urges tax relief on severance packages for laid-off techies", "summary": "Former MLC K Kavitha has appealed to the Union Finance Minister to provide total temporary tax exemption on severance packages for IT professionals. Currently taxed as 'profits in lieu of salary,' Kavitha argued that taxing these payments during sudden layoffs creates financial hardship. She highlighted large-scale job cuts in tech hubs like Hyderabad as a reason for urgent policy response.", "category": "Economy", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "Russia Offers India Increased Crude, Fertilizers and LNG Supplies", "summary": "Russia has offered to increase energy trade with India, supplying more crude oil and LNG as India explores alternatives amid the West Asia conflict. First Deputy PM Denis Manturov stated Russia can steadily meet India’s demand for mineral fertilizers, which saw a 40% supply increase in 2025. Discussions also covered industrial cooperation, space, and a joint carbamide project.", "category": "Economy", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "IHC Investment of ₹8,850 Crore to Fuel Sammaan Capital Growth", "summary": "Abu Dhabi's International Holding Company (IHC) will invest ₹8,850 crore in Sammaan Capital (formerly Indiabulls Housing Finance) over 18 months. The capital will support a five-year growth plan, targeting an AUM of ₹1.3-1.5 lakh crore by 2029. IHC will become the promoter with a 41.5% stake, enabling the NBFC to diversify into personal, gold, and small business loans.", "category": "Economy", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "FAO Warns of Continued World Food Price Rises Due to War", "summary": "The UN Food and Agriculture Organization (FAO) reported that global food prices rose 2.4% in March, hitting their highest level since September. Higher energy and input costs driven by the West Asia conflict are forcing farmers to reduce fertilizer use or switch crops. FAO warns these factors will reduce future yields and keep commodity prices elevated through 2027.", "category": "Economy", "page": 3, "importance": 9, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Average Income Tax Refund Time Hits Three-Year High in FY26", "summary": "The average time to issue I-T refunds rose to 35 days in FY26, the highest in three years, due to investigations into bogus donations and fraudulent deductions. The CBDT used AI to identify high-risk cases, resulting in the reduction of ₹2,000 crore in false claims through updated returns. Genuine low-risk taxpayers are now being prioritized via new AI-driven algorithms.", "category": "Economy", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Government Considers Measures to Scale Up Induction Cooktop Production", "summary": "The Commerce Ministry met with industry officials to discuss ramping up production of induction heaters and cooktops due to LPG supply concerns. Demand for these products has surged 8-10 times in recent weeks. To support the supply chain, the government has exempted critical petrochemical imports from customs duty for three months until June 30.", "category": "Economy", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Cryptocurrency Markets Stabilize as West Asia Tensions Show Slight Ease", "summary": "Bitcoin and Ether trimmed recent losses this week, with Bitcoin hovering between $66,000 and $67,000. Improving sentiment regarding a potential de-escalation in the Iran conflict boosted risk appetite, though trading volumes remain low. Altcoins continue to underperform against Bitcoin's dominance, while precious metals saw corrections after earlier gains.", "category": "Economy", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "SEBI to Launch SETU Platform to Simplify Investment Adviser Registration", "summary": "SEBI is set to launch 'SEBI SETU,' a digital single-window interface to ease registration and compliance for investment advisers (IAs). The move aims to expand India's limited advisory base, which currently has fewer than 1,000 registered professionals despite 22 crore demat accounts. Registration norms have also been relaxed, making all graduates eligible to apply.", "category": "Economy", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Central Bank Gold Purchases Led by Poland in February", "summary": "Central banks were net buyers of 19 tonnes of gold in February, with the National Bank of Poland leading with a 20-tonne purchase. Uzbekistan and China also continued buying, while Russia and Turkiye turned sellers. Gold prices have faced pressure recently, falling over 10% in March after hitting a record high of $5,608 per ounce in late January.", "category": "Economy", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Japanese Rubber Futures Reach 14-Month High on Supply Hopes", "summary": "Rubber futures on the Osaka Exchange climbed to a 14-month high, supported by a rally in Tokyo equities and hopes for restored Gulf oil shipments. The September delivery contract finished 1.6% higher at ¥393.7 per kg. The market was also buoyed by firm performance in Shanghai rubber markets.", "category": "Economy", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Maharashtra Sugar Output Jumps 22% as Crushing Season Concludes", "summary": "Maharashtra’s sugar production reached 988.79 lakh quintals in the 2025-26 season, a 22% increase driven by higher cane availability. Crushing rose to 1,043.17 lakh tonnes across 210 operational mills. While Kolhapur division led with an 11.02% recovery rate, eastern regions like Nagpur lagged behind. The surplus may pressure domestic prices unless diverted to ethanol production.", "category": "Economy", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "India Faces Fertilizer Supply Risk if West Asia Conflict Continues", "summary": "Analysts warn that India faces imminent risks to its fertilizer supply as the peak demand window in April approaches. Closure of the Strait of Hormuz has disrupted 30% of global fertilizer and feedstock shipments. With urea prices up 30% in a month, reduced application could significantly impact crop yields, especially if an El Nino event further stresses growing conditions.", "category": "Economy", "page": 8, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "India’s Groundnut Output Projected to Rise 3% in 2026-27", "summary": "Groundnut production in India is expected to rise 3% to 7.75 million tonnes as farmers shift from cotton to oilseeds due to better realizations. Area under groundnut is projected to grow 2% to 5.7 million hectares. The shift is also expected to increase groundnut oil output by 4% and meal production by 3%, supported by strong demand from China and the feed segment.", "category": "Economy", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Centre Commends States for Clamping Down on LPG Black Market", "summary": "Oil Secretary Neeraj Mittal praised state governments for conducting over 2,600 raids to curb LPG hoarding and black marketing. States like Uttar Pradesh and Gujarat were noted for proactive enforcement. Officials were advised to maintain a strict vigil against false rumors of fuel shortages and to encourage the use of petrol in dual-fuel autos to preserve LPG supplies.", "category": "Economy", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Maharashtra’s GST and VAT Collections Grow 12.6% to ₹2.51 Lakh Crore", "summary": "Maharashtra reported a 12.6% year-on-year increase in total tax collections from GST, VAT, and profession tax for FY26. The state remains India's top GST generator, with GST alone contributing ₹1.86 lakh crore, up 14.6% from the previous year. Collections exceeded budget estimates, driven by improved compliance and advanced data analytics to identify tax risks.", "category": "Economy", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Plastic factories in Odisha face uncertainty as machines fall silent", "summary": "The West Asia conflict has devastated the plastic industry in Balasore, Odisha. Over 40 per cent of MSME units have shut down as raw material prices for polymers like HDPE and PVC surged by up to 75 per cent. Larger units have curtailed production by 70 per cent, leaving thousands of workers unemployed as global supply chains for petrochemical feedstocks face severe disruptions.", "category": "Economy", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "MSMEs increase working capital drawdowns as West Asia conflict persists", "summary": "Micro, small, and medium enterprises are facing cash flow pressures due to rising fixed costs and delayed receivables linked to the West Asia conflict. Bankers report an uptick in loan drawdowns as businesses tide over supply chain disruptions. Industries such as ceramics, glass, and rice exports are most affected, with stress expected to reflect in bank portfolios in the next fiscal year.", "category": "Economy", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "Centre explores ways to boost production of induction heaters", "summary": "Commerce Minister Piyush Goyal met with senior officials to discuss speeding up the production of induction heaters and compatible utensils. Demand for electric cooking alternatives has surged due to concerns over LPG availability amid the West Asia crisis. Online retailers report multi-fold jumps in sales as households look to secure energy-efficient cooking options.", "category": "Economy", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "Tanker carrying Iranian oil headed for India diverts to China", "summary": "The tanker 'Ping Shun', originally destined for Vadinar in Gujarat with Iranian crude, has changed its course toward China. According to research firm Kpler, the mid-voyage shift likely stems from payment-related issues and tighter credit terms by sellers. The incident highlights how commercial and geopolitical sensitivities are impacting global energy trade flows.", "category": "Economy", "page": 6, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "Oil above $100 will push inflation past 6%: HSBC", "summary": "HSBC economists warn that if crude oil prices sustain above $100 per barrel, India's headline inflation will breach the RBI's 6% tolerance band. This would likely trigger interest rate hikes. While CPI currently remains below the threshold, a prolonged energy crisis in West Asia could force a shift from 'neutral' monetary and fiscal stances to more aggressive cooling measures.", "category": "Economy", "page": 6, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "IndianOil assures stable LPG supply and warns against panic booking", "summary": "Indian Oil Corporation stated that LPG supply in India remains stable and adequate despite global energy market disruptions. The company is delivering 2.8 million cylinders daily, consistent with pre-tension levels. IOCL urged consumers not to engage in panic booking, emphasizing that domestic availability continues to be the firm's top priority.", "category": "Economy", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "Exports likely to see positive growth in FY26 despite headwinds", "summary": "A senior commerce ministry official stated that India’s merchandise exports are expected to end FY26 with positive growth despite US tariffs and wars in Ukraine and Iran. Official trade data for March and the full fiscal year will be released on April 15. The resilience is attributed to sustained momentum in key sectors despite severe global logistical and geopolitical disturbances.", "category": "Economy", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "Corporate bond issuances to remain subdued in FY27 over yields", "summary": "Corporate bond issuances are expected to remain measured in FY27 as volatile yields and persistent inflation risks deter issuers. Total issuances fell to Rs 10.49 trillion in FY26 as firms shifted to bank funding. Market participants expect top-rated borrowers to prioritize yield stability and benchmark issuances against peer pricing rather than chasing opportunistic market timing.", "category": "Economy", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "Uttar Pradesh targets wheat procurement worth over Rs 12,900 crore", "summary": "The UP government aims to purchase 5 million tonnes of wheat at a minimum support price (MSP) of Rs 2,585 per quintal. The state has set up 6,500 procurement centres to support the farm economy. Over 225,000 farmers have already registered for the process, which runs until June 15. Payments are directed to be made via Direct Benefit Transfer within 48 hours of purchase.", "category": "Economy", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "RBI allows travellers to exchange Indian rupees at airport departure", "summary": "The RBI has introduced new rules allowing residents and non-residents to exchange Indian rupee notes at forex counters in international airport departure zones. Previously, counters beyond immigration had limited functionality. This change simplifies the process for outbound travellers who find extra cash in their wallets after clearing security and immigration checks.", "category": "Economy", "page": 13, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "CASA Deposits at 2-Yr Low, But Turnaround Seen", "summary": "Low-cost Current Account and Savings Account (CASA) deposits in the Indian banking system have hit a two-year low. Savers are increasingly shifting funds to higher-yielding assets like term deposits, equities, and gold amid market volatility. However, bankers expect a turnaround as interest rate cycles stabilize and the appeal of fixed-return products improves for retail investors.", "category": "Economy", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119223", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_04-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119223"}]}, {"headline": "Karnataka EV Tax Tweak Will Derail India’s Emission Targets", "summary": "Union Minister Pralhad Joshi has criticized the Karnataka government's decision to withdraw road tax exemptions for electric vehicles (EVs). He argued that the move, aimed at increasing state revenue, will discourage EV adoption and hamper India's goal of reducing carbon emissions. The state has reintroduced a 5-10% lifetime tax on various EV categories based on their purchase price.", "category": "Economy", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119223", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_04-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119223"}]}, {"headline": "Cabotage Norms Eased for 6 Months Amid Vessel Crunch", "summary": "The Indian government has relaxed cabotage rules for six months, allowing foreign-flagged ships to transport cargo on domestic routes. The move is intended to mitigate the impact of shipping disruptions and a shortage of domestic vessels caused by global geopolitical tensions. The relaxation aims to ensure smooth movement of essential goods and reduce logistics costs for exporters.", "category": "Economy", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119223", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_04-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/119223"}]}, {"headline": "LPG supply crunch: Govt pushes for electric cooktop production", "summary": "Amid a severe LPG shortage due to conflict in the West Asia, the Indian government is urging households and institutions to switch to electric cooking. The Commerce and Industry Ministry is meeting manufacturers to boost domestic production of induction cooktops. Industry sources suggest imports of key components are being ramped up to meet the sudden surge in demand.", "category": "Economy", "page": 21, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119205", "sources": [{"newspaper": "Times of India", "pdf_filename": "Delhi_TOI_04-04-2026.pdf", "page": 21, "telegram_url": "https://t.me/c/1877410077/119205"}]}, {"headline": "Brahmaputra Volleyball League Grows to 400 Teams in Assam", "summary": "Former national captain Abhijit Bhattacharya has built a grassroots volleyball movement in Assam featuring 400 teams. The league, launched in 2020, now includes 5,000 players across U-12 and U-16 categories. The International Olympic Committee recently recognized the initiative for its impact on gender equality and community spirit.", "category": "Sports", "page": 11, "importance": 4, "telegram_url": "https://t.me/c/1877410077/119230", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_04-04-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/119230"}]}, {"headline": "Women's Hockey Team Targets Success at 2026 World Cup", "summary": "The Indian women's hockey team has qualified for the 2026 World Cup in Belgium and the Netherlands. Under coach Sjoerd Marijne, a young squad featuring stars like Sunelita Toppo and Bichu Devi Kharibam is preparing for the tournament. India aims to improve on its best-ever fourth-place finish from 1974.", "category": "Sports", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119230", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_04-04-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/119230"}]}, {"headline": "IPL 2024 digital viewership and advertising revenues hit all-time highs", "summary": "The Indian Premier League 2024 season has seen a record surge in digital engagement, with unique viewership surpassing 500 million. Advertising revenue on streaming platforms has grown by 15% as brands leverage regional language feeds and targeted ads. The trend highlights a significant shift toward digital-first consumption in India's sports broadcasting landscape.", "category": "Sports", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119240", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_04-04-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119240"}]}, {"headline": "Uzbek GM Sindarov crushes Nakamura to lead FIDE Candidates", "summary": "20-year-old Javokhir Sindarov maintained his dominant lead in the FIDE Candidates tournament by defeating world No. 2 Hikaru Nakamura in a one-sided game. Sindarov is the only unbeaten player in the Open section, holding a full point lead after five rounds. Nakamura blamed his team's preparation for a disastrous pawn push that allowed the Uzbek Grandmaster to secure the victory.", "category": "Sports", "page": 17, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "Punjab Kings defeat CSK as Chennai suffers second straight loss", "summary": "Punjab Kings successfully chased a 210-run target to defeat Chennai Super Kings by five wickets in Chepauk. Shreyas Iyer top-scored with a 26-ball 50, while Priyansh Arya provided an explosive start with 39 off 11 balls. Despite a 73-run knock from CSK's Ayush Mhatre and 45 from Shivam Dube, Chennai's bowling failed to defend the total, marking their second defeat in the current season.", "category": "Sports", "page": 18, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "Delhi Capitals Reports Double-Digit Growth in Sponsorship for 2026 Season", "summary": "IPL franchise Delhi Capitals has seen strong double-digit growth in sponsorship revenues, renewing key partnerships with DP World and adding new brands like Hero FinCorp. CEO Sunil Gupta noted that IPL franchises are now viewed as global sports properties. The team is also focusing on deepening fan engagement through digital apps and its web series, 'DC PG by Gulati'.", "category": "Sports", "page": 10, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Gattuso Resigns as Italy Coach after World Cup Flop", "summary": "Gennaro Gattuso has resigned as the head coach of the Italian national football team following their failure to reach the 2026 World Cup. Italy was eliminated in the qualifying playoffs, marking a historic low for the four-time champions. Gattuso stated he took full responsibility for the failure, and the Italian football federation has begun the search for a new manager.", "category": "Sports", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119223", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_04-04-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119223"}]}, {"headline": "India tops global list of ineligible athletes due to doping violations", "summary": "India has surpassed Kenya to top the Athletics Integrity Unit's list of athletes suspended for doping violations. As of April 1, 148 Indian athletes have been suspended, followed by 146 from Kenya and 66 from Russia. Prominent names on the list include 100m national record holder Dutee Chand and middle-distance runner Parvej Khan.", "category": "Sports", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119205", "sources": [{"newspaper": "Times of India", "pdf_filename": "Delhi_TOI_04-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119205"}]}, {"headline": "India Temporarily Eases Morpholine Quality Standards Due to War", "summary": "The government has suspended mandatory BIS quality standards for morpholine for three months to prevent shortages. Global supply chain disruptions from the West Asia war have threatened the availability of the industrial chemical. Morpholine is essential for the rubber, pharmaceutical, and chemical manufacturing industries.", "category": "Science", "page": 16, "importance": 4, "telegram_url": "https://t.me/c/1877410077/119230", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_04-04-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/119230"}]}, {"headline": "Science of Bitterness Gains New Interest in Food and Health", "summary": "Research into bitter taste receptors (TAS2Rs) is revealing their role in regulating appetite and metabolism. Scientists are exploring how bitter compounds trigger GLP-1 hormones, similar to weight-loss drugs like Semaglutide. Traditional Indian cuisines are being revisited for their seasonal use of bitter leaves and vegetables for gut health.", "category": "Science", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/119230", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_04-04-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119230"}]}, {"headline": "Artemis II crew downlinks rare night-side images of Earth", "summary": "NASA's Artemis II astronauts have released their first downlinked images of Earth from 145,000 kilometres away. The photos provide a rare view of the planet from the night side, featuring stars in the background and a sunlight-induced halo. The crew is currently en route to the moon, with another 270,000 kilometres left in their journey.", "category": "Science", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "Isro launches crew behaviour study in Leh for Gaganyaan mission", "summary": "Isro has commenced Mission MITRA in Leh, Ladakh, a first-of-its-kind study to examine team behaviour and physiological dynamics in high-altitude conditions. The week-long study aims to improve safety and performance for human spaceflight missions like Gaganyaan. The Leh environment, characterized by low temperatures and hypoxia, serves as a natural analogue for spaceflight operations.", "category": "Science", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "Artemis II astronauts photograph Earth while nearing the Moon", "summary": "NASA's Artemis II crew executed a critical thruster burn, entering the Moon's gravitational influence. Mission specialist Christina Koch and commander Reid Wiseman shared photos of Earth from the Orion capsule. The mission is on a figure-eight trajectory and is expected to break distance records for human spaceflight as they prepare for a lunar flyby on Sunday morning.", "category": "Science", "page": 16, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "Indian Meteorological Department predicts timely onset of southwest monsoon in Kerala", "summary": "The IMD has announced that the southwest monsoon is likely to hit the Kerala coast by May 31. Conditions are becoming favorable for seasonal rainfall, which is critical for India's agricultural sector and rural economy. Experts anticipate a normal monsoon season, providing relief to farmers and the general public after a period of intense summer heat.", "category": "Environment", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119240", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_04-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119240"}]}, {"headline": "Delhi HC criticizes Ridge Board for keeping conservation funds in FDs", "summary": "The Delhi High Court expressed strong displeasure toward the Ridge Management Board for parking approximately ₹223 crore in fixed deposits instead of utilizing the funds for environmental conservation. The court emphasized that money meant for managing the Delhi Ridge must be used for its intended purpose rather than accumulating interest in bank accounts.", "category": "Environment", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "Delhi CM Rekha Gupta launches 2026 Winter Air Pollution Plan", "summary": "Delhi CM Rekha Gupta unveiled the Air Pollution Mitigation Action Plan 2026, focusing on vehicular emissions, dust control, and waste management. Tools include mechanical sweepers, water sprinklers, and anti-smog guns. Despite the launch, experts expressed skepticism, noting that many strategies are carry-overs from previous years that failed to significantly reduce winter smog.", "category": "Environment", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "Water Storage in India’s Major Reservoirs Drops to 47% Capacity", "summary": "Storage in 166 major reservoirs fell to 85.698 BCM, or 47% of total capacity, as of this week. While the northern and western regions have relatively better levels, the southern region's storage is lower than last year. Persistent rain deficiency in 35% of districts since March 1 has exacerbated water stress, particularly in states like Telangana.", "category": "Environment", "page": 8, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "OMCs red flag viability of flex fuels over pricing structure", "summary": "State-run oil-marketing companies expressed concern that high GST on E100 (18%) compared to E20 (5%) makes flex fuel commercially unviable. OMCs noted that E100's lower calorific value results in lower vehicle mileage, making it unattractive to consumers without a significant price differential. Previous pilots for E93 saw almost no retail demand due to the lack of flex-fuel vehicles.", "category": "Environment", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "Delhi CM unveils strict air pollution action plan for 2026", "summary": "Chief Minister Rekha Gupta announced a new action plan to tackle Delhi's pollution, including a strict 'No PUC, No Fuel' rule at pumps. From November 1, only BS-VI compliant or CNG goods vehicles will be allowed entry into the city. The plan also involves installing 32,000 EV charging points and deploying massive numbers of anti-smog guns and mechanical road sweepers.", "category": "Environment", "page": 14, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "NGT Stays Deployment of Forest Force
