ls and minimize environmental impact.", "category": "Science", "page": 24, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 24, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "Space debris mitigation efforts increase", "summary": "Efforts to mitigate space debris are increasing, as the accumulation poses risks to operational satellites. International cooperation is vital for space sustainability.", "category": "Science", "page": 26, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 26, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "AI in education offers personalized learning", "summary": "Artificial intelligence is being integrated into education to offer personalized learning experiences. AI tools can adapt to individual student needs.", "category": "Education", "page": 14, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "एनईपी लक्ष्य के लिए बच्चों के नामांकन का देशव्यापी अभियान", "summary": "शिक्षा मंत्रालय राष्ट्रीय शिक्षा नीति (NEP) 2020 के तहत 2030 तक 100% सकल नामांकन अनुपात (GER) के लक्ष्य को प्राप्त करने के लिए 'एनआईओएस मित्र' नामक एक देशव्यापी नामांकन अभियान शुरू करेगा। यह अभियान 4-18 वर्ष की आयु के स्कूल से बाहर या अनुत्तीर्ण बच्चों की पहचान कर उन्हें परामर्श और शैक्षणिक सहायता प्रदान करेगा।", "category": "Education", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117673", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_21-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117673"}]}, {"headline": "भारत को अंतरराष्ट्रीय शिक्षा केंद्र बनाने की महत्वाकांक्षा", "summary": "भारत का लक्ष्य 2030 तक 2,00,000 विदेशी छात्रों को आकर्षित करना है, जिसके लिए 19 विदेशी विश्वविद्यालय परिसर स्थापित करने को तैयार हैं। यह पहल वैश्विक अनिश्चितताओं के बीच उच्च शिक्षा की बढ़ती घरेलू मांग और भारत की जनसांख्यिकीय लाभांश का लाभ उठाने पर केंद्रित है, जिससे भारत एक महत्वपूर्ण शिक्षा केंद्र बन सके।", "category": "Education", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117673", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_21-03-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117673"}]}, {"headline": "एनसीईआरटी पाठ्य सामग्री की जांच के लिए विशेषज्ञ समिति गठित", "summary": "उच्चतम न्यायालय ने एनसीईआरटी की विवादित पाठ्य सामग्री की जांच के लिए एक विशेषज्ञ समिति का गठन किया है। इस समिति में उच्चतम न्यायालय की पूर्व न्यायाधीश इंदु मल्होत्रा, पूर्व महान्यायवादी के.के. वेणुगोपाल और उच्चतम न्यायालय के न्यायाधीश अनिरुद्ध बोस शामिल होंगे।", "category": "Education", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117673", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_21-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117673"}]}, {"headline": "Government Forms Panel to Redraft Controversial NCERT Chapter", "summary": "The Centre has informed the Supreme Court that a new committee, including former judges Indu Malhotra and Aniruddha Bose, has been formed to redraft a controversial chapter on the judiciary in NCERT textbooks. The move comes after the SC disposed of a suo motu case regarding contentions in the previous text that were described as disturbing.", "category": "Education", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "HDFC Bank board to search for new chairman next week", "summary": "HDFC Bank’s board will meet mid-next week to find a replacement for Atanu Chakraborty, who resigned citing ethical concerns. Experts suggest the bank may consider a career central banker like M. Rajeshwar Rao. Shares of the lender fell to a new low of ₹772 during trading as investor anxiety persists over leadership transitions and governance allegations at the private sector bank.", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_TH BL Delhi 21~03~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117689"}, {"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Consumer durable makers to hike prices up to 10% in April", "summary": "Leading appliance manufacturers including Haier and Godrej have signaled price hikes for ACs, washing machines, and refrigerators starting this April. The adjustments, ranging from 3% to 10%, are driven by soaring polymer prices, rupee depreciation, and a 300-400% spike in ocean freight rates caused by West Asia disruptions. Television cabinet parts and insulation costs have risen 40-50%.", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_TH BL Delhi 21~03~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117689"}, {"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "IFSCA issues 60 warnings to Gift City market participants", "summary": "The International Financial Services Centres Authority (IFSCA) issued 60 warnings to intermediaries in Gift City during FY26 for compliance lapses. Breaches included unattended offices during business hours, absence of key personnel, and the use of remote access software for trading. The regulator conducted market intelligence visits to assess the operational substance of registered entities.", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_TH BL Delhi 21~03~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117689"}, {"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Tata Steel commissions ₹3,200 crore scrap-based furnace in Ludhiana", "summary": "Tata Steel has commissioned its first scrap-based electric arc furnace (EAF) at Hi-Tech Valley, Ludhiana. The facility, built with a ₹3,200 crore investment, has an annual capacity of 0.75 million tonnes. It is designed to emit less than 0.3 tonnes of CO2 per tonne of steel by using 100% steel scrap as raw material, aligning with the company's sustainability and circular economy goals.", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_TH BL Delhi 21~03~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117689"}, {"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Hindustan Unilever clarifies no discussions on food business divestment", "summary": "Hindustan Unilever Ltd (HUL) has denied global reports suggesting a potential restructuring or exit from its foods business. The company stated that the segment remains an attractive part of its portfolio. This clarification follows parent Unilever Plc's broader strategic shift toward beauty and wellbeing categories and the recent demerger of its ice cream business.", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_TH BL Delhi 21~03~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117689"}, {"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Bata India aims for 25% revenue from digital channels", "summary": "Footwear major Bata India is targeting a 25% digital revenue share over the next three years, up from its current 13-14%. The company is sharpening its online strategy through marketplaces, its own platform, and quick commerce tie-ups with Zepto and Swiggy Instamart. Bata plans to leverage its extensive store network to enable hyperlocal deliveries and assisted commerce.", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_TH BL Delhi 21~03~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117689"}, {"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Ace Turtle ramps up local sourcing amid logistics disruptions", "summary": "Apparel retailer ace turtle is increasing local sourcing for international brands Lee, Wrangler, and G-Star due to rising freight costs and West Asia uncertainties. For G-Star, the company plans to move from 15% to 80% local sourcing by the fall-winter season. The firm is maintaining a cautious outlook on store expansion but plans to relaunch its SaaS business in April.", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_TH BL Delhi 21~03~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117689"}, {"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Skoda updates Kushaq with 8-speed gearbox and new features", "summary": "Skoda has introduced a mid-life update for the Kushaq SUV, featuring a new Aisin 8-speed torque converter automatic for the 1.0 TSI variant. Other upgrades include a segment-first massage function for rear seats, a panoramic sunroof, and a virtual cockpit. The 1.5 TSI variant retains its 7-speed DSG, while the update aims to strengthen the model's position in the competitive mid-size SUV segment.", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_TH BL Delhi 21~03~2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117689"}, {"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "SBI Mutual Fund files for ₹13,000 crore initial public offering", "summary": "India’s largest asset manager, SBI Mutual Fund, has filed draft papers for a ₹13,000 crore IPO. The offering consists of an offer-for-sale by State Bank of India and its French partner Amundi. The fund house, which manages ₹16.32 lakh crore in assets, would become the seventh AMC to list on Indian exchanges. Analysts estimate the company’s valuation at approximately ₹1.5 lakh crore.", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_TH BL Delhi 21~03~2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117689"}, {"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Exchanges issue SOP for new closing auction session", "summary": "Stock exchanges and clearing corporations have released a standard operating procedure for the closing auction session (CAS) in the equity segment. Initially applicable to F&O stocks from August 3, the framework shifts toward auction-driven price discovery for final settlement. The SOP details how settlement prices will be computed based on volume-weighted average prices during the session.", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_TH BL Delhi 21~03~2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117689"}, {"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Norges Bank sells 0.6% stake in Zee for ₹44 crore", "summary": "Norges Bank Investment Management sold 60.98 lakh shares of Zee Entertainment Enterprises through open market transactions on Friday. The stake, amounting to 0.6%, was sold at an average price of ₹72.32 for a total value of ₹44.4 crore. The bank acted on behalf of the Government Pension Fund Global, which held a nearly 4% stake in the media firm as of December.", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_TH BL Delhi 21~03~2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117689"}, {"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Aimtron Electronics targets ₹1,000 crore revenue in three years", "summary": "Aimtron Electronics plans to achieve a revenue of ₹1,000 crore over the next three years by focusing on defense, industrial IoT, and aerospace sectors. The company reported first-half revenue of ₹122 crore and is scaling its design-led manufacturing capabilities. As part of its expansion, Aimtron is setting up a mechatronics facility in Gujarat and exploring inorganic growth in the US.", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_TH BL Delhi 21~03~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117689"}, {"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Zomato raises platform fee by 19% to ₹14.90", "summary": "Food delivery giant Zomato has increased its platform fee from ₹12.50 to ₹14.90 per order, marking a 19.2% rise. This latest hike, following a previous increase in September, comes as food aggregators cope with escalating operational costs amid geopolitical instability. The higher fees have been implemented directly on the app, though the company has not issued a formal comment.", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_TH BL Delhi 21~03~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117689"}, {"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Flipkart CFO steps down ahead of planned IPO", "summary": "Flipkart’s Group Chief Financial Officer Sriram Venkataraman has stepped down as the e-commerce firm advances preparations for its public listing. Venkataraman will remain for a transition period to ensure a smooth handover, during which Ravi Iyer will oversee the finance organization. The company also appointed Nishant Verman as Senior Vice-President for Corporate Development and Partnerships.", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_TH BL Delhi 21~03~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117689"}, {"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Indian manufacturing PMI dips slightly in September", "summary": "India's manufacturing Purchasing Managers' Index (PMI) saw a marginal dip in September, indicating a slight slowdown in manufacturing activity. However, new orders remained robust.", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "Global supply chain disruptions persist", "summary": "Global supply chain disruptions continue to impact various industries, leading to production delays and increased costs. Efforts are underway to improve resilience.", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "Government launches ₹20,000 crore credit scheme for microfinance institutions", "summary": "The government has introduced the Credit Guarantee Scheme for Microfinance Institutions 2.0 to address funding constraints in the sector. The ₹20,000 crore rollout aims to revive credit flow to underserved segments. Under the scheme, MFIs must lending at rates linked to MCLR plus 2%, with at least 5% of loans directed toward small players to ensure broad-based sector support.", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_TH BL Delhi 21~03~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117689"}, {"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_21-03-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/117677"}, {"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117690"}, {"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "Telangana pegs FY27 budget at ₹3.24 lakh crore", "summary": "Telangana Finance Minister Mallu Bhatti Vikramarka presented a ₹3.24 lakh crore budget for 2026-27, focusing on welfare and infrastructure. To manage a public debt of ₹5.62 lakh crore, the state will restructure ₹25,612 crore in high-interest loans. Major allocations include ₹26,674 crore for education and ₹23,179 crore for agriculture, while seeking ₹73,383 crore from open market loans.", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_TH BL Delhi 21~03~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117689"}, {"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "India scouts for LPG imports from Russia and Japan", "summary": "Faced with supply disruptions from the Gulf, the Indian government is seeking additional liquefied petroleum gas (LPG) cargoes from Russia and Japan. While the US remains a major supplier, domestic fuel needs for 33 crore consumers have led to intensified diplomatic efforts. Weekly LPG imports fell to 265,000 tonnes as West Asian inflows declined significantly in mid-March.", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_TH BL Delhi 21~03~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117689"}, {"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "India’s Core Sector Growth Slows to 2.3% in February", "summary": "Growth in India's eight core sectors slowed to a three-month low of 2.3% in February 2026. The decline was primarily driven by a sharp contraction in refinery products and electricity generation. Steel production remained a bright spot, growing at 7.2%, while crude oil and natural gas saw marginal increases. Economists expect growth to remain subdued due to West Asia tensions.", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_TH BL Delhi 21~03~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117689"}, {"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_21-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/117677"}, {"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117690"}, {"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "Asset managers sell government bonds at record pace", "summary": "Mutual funds have net sold government bonds worth nearly ₹35,600 crore in March as the West Asia conflict drives inflation risks. Surging crude oil prices and the rupee's fall to record lows have prompted investors to demand higher yields. Fund managers are shifting toward short-duration corporate debt, where they see better risk-reward value compared to sovereign bonds.", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_TH BL Delhi 21~03~2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117689"}, {"newspaper": "The Hindu", "pdf_filename": "TH BL में घटकर तीन महीने के निचले स्तर 2.3% पर आ गई, जो एक साल पहले 3.4% थी। कच्चे तेल, प्राकृतिक गैस और रिफाइनरी उत्पादों के उत्पादन में कमी के कारण यह गिरावट आई। हालांकि, कोयला और इस्पात उत्पादन में मजबूत वृद्धि दर्ज की गई।", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_21-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117673"}]}, {"headline": "Gautam Singhania Injured in Speedboat Accident in Maldives", "summary": "Raymond Group Chairman Gautam Singhania suffered minor injuries after his speedboat capsized near Velidhoo island in the Maldives. Seven people were on board, and all were reported safe. Singhania is currently recovering under medical care. The accident occurred during a leisure trip with friends, including other prominent Indian businessmen who were also rescued.", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_21-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/117677"}, {"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "Government pushes for PNG migration to offset LPG shortfall", "summary": "India is expediting the migration of households and commercial establishments to piped natural gas (PNG) to reduce reliance on LPG. Over 13,700 new PNG connections were issued recently, with 7,300 consumers already shifting. Incentives are being offered to city gas distribution entities to shorten supply timelines, while raids continue to curb black marketing and hoarding of LPG cylinders.", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_TH BL Delhi 21~03~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117689"}, {"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "PM Modi to inaugurate Noida International Airport on March 28", "summary": "Prime Minister Narendra Modi is scheduled to inaugurate the Noida International Airport at Jewar on March 28. The greenfield project recently cleared key regulatory milestones, including aerodrome licensing from the DGCA and security clearances. Full-scale commercial operations are expected to follow, with IndiGo set as the launch carrier and Akasa Air also planning flights from the site.", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_TH BL Delhi 21~03~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117689"}, {"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "CBI questions Anil Ambani for second day in RCom case", "summary": "The CBI questioned industrialist Anil Ambani for over six hours on Friday regarding a ₹2,929-crore cheating case involving Reliance Communications Ltd. The case was registered following a complaint by the State Bank of India. Officials stated that the investigation focuses on allegations of financial irregularities and loan diversions within the telecommunications firm.", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_TH BL Delhi 21~03~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117689"}, {"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "India's digital payment systems gain traction", "summary": "India's digital payment systems continue to gain traction, with a significant increase in adoption by consumers and businesses. This drives financial inclusion.", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/117662"}]}]};
const CAT_META = {"Politics": {"color": "#e8334a", "icon": "🏛️"}, "Economy": {"color": "#f5a623", "icon": "📊"}, "Business": {"color": "#f0c040", "icon": "💼"}, "India": {"color": "#ff7043", "icon": "🇮🇳"}, "World": {"color": "#5c9eff", "icon": "🌍"}, "Sports": {"color": "#36c46f", "icon": "🏆"}, "Science": {"color": "#a78bfa", "icon": "🔬"}, "Technology": {"color": "#38bdf8", "icon": "💻"}, "Health": {"color": "#34d399", "icon": "🏥"}, "Law": {"color": "#fb923c", "icon": "⚖️"}, "Environment": {"color": "#4ade80", "icon": "🌿"}, "Education": {"color": "#e879f9", "icon": "📚"}, "Culture": {"color": "#f472b6", "icon": "🎭"}, "Infrastructure": {"color": "#94a3b8", "icon": "🏗️"}};

const allArts = [...DIGEST.articles].sort((a,b)=>(b.importance||0)-(a.importance||0));
const byCategory = {};
for (const art of allArts) {
  const c = art.category||"India";
  if (!byCategory[c]) byCategory[c]=[];
  byCategory[c].push(art);
}
const sortedCats = Object.keys(byCategory).sort(
  (a,b)=>(byCategory[b][0].importance||0)-(byCategory[a][0].importance||0)
);

let catIdx=0,vpW=0,vpH=0;
const panels=[];
const outer=document.getElementById('outer');
const hTrack=document.getElementById('hTrack');
const hintUp=document.getElementById('hintUp');
const hintRight=document.getElementById('hintRight');
const catFlash=document.getElementById('catFlash');
const cfIcon=document.getElementById('cfIcon');
const cfName=document.getElementById('cfName');

function buildAll() {
  vpW=outer.offsetWidth; vpH=outer.offsetHeight;
  hTrack.innerHTML=''; panels.length=0;
  sortedCats.forEach((cat,ci)=>{
    const m=CAT_META[cat]||{color:"#e8334a",icon:"📰"};
    const arts=byCategory[cat];
    const panel=document.createElement('div');
    panel.className='cat-panel';
    panel.style.setProperty('--cc',m.color);
    panel.innerHTML=`<div class="progress-row" id="prow-${ci}" style="--cc:${m.color}"></div><div class="v-feed" id="vfeed-${ci}"><div class="v-track" id="vtrack-${ci}"></div></div>`;
    hTrack.appendChild(panel);
    const pRow=panel.querySelector(`#prow-${ci}`);
    const vFeed=panel.querySelector(`#vfeed-${ci}`);
    const vTrack=panel.querySelector(`#vtrack-${ci}`);
    const cardH=vFeed.getBoundingClientRect().height||vpH;
    arts.forEach(art=>vTrack.appendChild(buildCard(art,cardH,m,cat)));
    panels.push({pRow,vFeed,vTrack,articles:arts,artIdx:0});
    buildPRow(ci);
  });
  hTrack.style.transition='none';
  hTrack.style.transform='translateX(0)';
  syncV(0,false);
}

function buildCard(art,h,m,cat) {
  const src=art.sources?.[0];
  const href=src?.pdf_filename?`pdfs/${src.pdf_filename}#page=${src.page}`:(src?.telegram_url||'#');
  const card=document.createElement('div');
  card.className='card';
  card.style.height=h+'px';
  card.style.setProperty('--cc',m.color);
  card.innerHTML=`
    <div class="card-content">
      <div class="card-toprow">
        <div class="cat-pill">
          <div class="pill-icon"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="1" y="1" width="8" height="2" rx="0.6" fill="#888"/><rect x="1" y="4.5" width="5" height="1.5" rx="0.6" fill="#666"/><rect x="1" y="7" width="6" height="1.5" rx="0.6" fill="#666"/></svg></div>
          ${cat.toUpperCase()}
        </div>
        <div class="card-date">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="2.5" width="11" height="9.5" rx="1.8" stroke="#555" stroke-width="1.2"/><path d="M4.5 1v3M8.5 1v3" stroke="#555" stroke-width="1.2" stroke-linecap="round"/><path d="M1 6h11" stroke="#555" stroke-width="1.2"/></svg>
          ${DIGEST.date}
        </div>
      </div>
      <div class="card-headline">${art.headline}</div>
      <div class="card-summary">${art.summary}</div>
      <div class="card-divider"></div>
      <div class="card-footer">
        ${src?`<a class="src-chip" href="${href}" target="_blank" onclick="event.stopPropagation()">${src.newspaper}<span class="src-chip-sep">&middot;</span><span class="src-chip-pg">Pg ${src.page}</span><span class="src-chip-ext"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M3.5 7.5L7.5 3.5M7.5 3.5H5M7.5 3.5V6" stroke="#555" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></span></a>`:'<div></div>'}
        <div class="info-btn"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6.5" stroke="#444" stroke-width="1.3"/><circle cx="7.5" cy="4.5" r="0.8" fill="#555"/><path d="M7.5 7v4" stroke="#555" stroke-width="1.5" stroke-linecap="round"/></svg></div>
      </div>
    </div>`;
  return card;
}

function buildPRow(ci) {
  const p=panels[ci],ai=p.artIdx;
  p.pRow.innerHTML='';
  p.articles.forEach((_,i)=>{
    const seg=document.createElement('div');
    seg.className='pseg'+(i<ai?' done':i===ai?' active':'');
    p.pRow.appendChild(seg);
  });
}

function syncV(ci,animated) {
  const p=panels[ci],h=p.vFeed.getBoundingClientRect().height;
  p.vTrack.style.transition=animated?'transform 0.35s cubic-bezier(0.4,0,0.2,1)':'none';
  p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;
  buildPRow(ci);
}

function goArt(d) {
  const p=panels[catIdx];
  const n=Math.max(0,Math.min(p.artIdx+d,p.articles.length-1));
  if(n===p.artIdx&&d!==0)return;
  p.artIdx=n; syncV(catIdx,true); dismiss();
}

function goCat(idx,animated=true) {
  idx=Math.max(0,Math.min(idx,sortedCats.length-1));
  if(idx===catIdx&&animated)return;
  const prev=catIdx; catIdx=idx;
  hTrack.style.transition=animated?'transform 0.38s cubic-bezier(0.4,0,0.2,1)':'none';
  hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;
  if(animated&&idx!==prev) {
    const m=CAT_META[sortedCats[idx]]||{color:"#e8334a",icon:"📰"};
    catFlash.style.background=m.color+'18';
    cfIcon.textContent=m.icon; cfName.textContent=sortedCats[idx]; cfName.style.color=m.color;
    catFlash.classList.add('on'); setTimeout(()=>catFlash.classList.remove('on'),500);
  }
  dismiss();
}

let dismissed=false;
function dismiss() {
  if(dismissed)return; dismissed=true;
  hintUp.classList.remove('visible'); hintRight.classList.remove('visible');
  hintUp.classList.add('gone'); hintRight.classList.add('gone');
}

(function initHints() {
  const KEY='dailyBriefHintSeen';
  if(!localStorage.getItem(KEY)) {
    localStorage.setItem(KEY,'1');
    setTimeout(()=>{ if(!dismissed){ hintUp.classList.add('visible'); hintRight.classList.add('visible'); } },2500);
  }
})();

let tsX=0,tsY=0,tcX=0,tcY=0,axis=null,drag=false;
outer.addEventListener('touchstart',e=>{
  tsX=e.touches[0].clientX; tsY=e.touches[0].clientY;
  tcX=0; tcY=0; axis=null; drag=true;
  hTrack.style.transition='none';
  const p=panels[catIdx]; if(p)p.vTrack.style.transition='none';
},{passive:true});
outer.addEventListener('touchmove',e=>{
  if(!drag)return;
  const dx=e.touches[0].clientX-tsX,dy=e.touches[0].clientY-tsY;
  tcX=dx; tcY=dy;
  if(!axis&&(Math.abs(dx)>8||Math.abs(dy)>8))axis=Math.abs(dx)>Math.abs(dy)?'h':'v';
  if(!axis)return;
  e.preventDefault();
  if(axis==='h'){
    const edge=(catIdx===0&&dx>0)||(catIdx===sortedCats.length-1&&dx<0);
    hTrack.style.transform=`translateX(${-catIdx*vpW+dx*(edge?.14:1)}px)`;
  }else{
    const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height;
    const edge=(p.artIdx===0&&dy>0)||(p.artIdx===p.articles.length-1&&dy<0);
    p.vTrack.style.transform=`translateY(${-p.artIdx*h+dy*(edge?.14:1)}px)`;
  }
},{passive:false});
outer.addEventListener('touchend',()=>{
  if(!drag)return; drag=false;
  if(axis==='h'){
    const t=vpW*.2;
    if(tcX<-t)goCat(catIdx+1);
    else if(tcX>t)goCat(catIdx-1);
    else{hTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;}
  }else if(axis==='v'){
    const t=vpH*.2;
    if(tcY<-t)goArt(1);
    else if(tcY>t)goArt(-1);
    else{const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height;p.vTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;}
  }
  axis=null;
},{passive:true});

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'||e.key===' '){e.preventDefault();goArt(1);}
  if(e.key==='ArrowUp'){e.preventDefault();goArt(-1);}
  if(e.key==='ArrowRight'){e.preventDefault();goCat(catIdx+1);}
  if(e.key==='ArrowLeft'){e.preventDefault();goCat(catIdx-1);}
});
let wl=false;
outer.addEventListener('wheel',e=>{
  e.preventDefault();if(wl)return;wl=true;
  Math.abs(e.deltaX)>Math.abs(e.deltaY)?goCat(catIdx+(e.deltaX>0?1:-1)):goArt(e.deltaY>0?1:-1);
  setTimeout(()=>wl=false,500);
},{passive:false});
window.addEventListener('resize',()=>{
  vpW=outer.offsetWidth;vpH=outer.offsetHeight;
  hTrack.style.transition='none';
  hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;
  panels.forEach(p=>{
    const h=p.vFeed.getBoundingClientRect().height;
    p.vTrack.querySelectorAll('.card').forEach(c=>c.style.height=h+'px');
    p.vTrack.style.transition='none';
    p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;
  });
});

buildAll();
</script>
