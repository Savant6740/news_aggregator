<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Inter', -apple-system, sans-serif;
  background: #0c0c0c; color: #fff; touch-action: none;
}
.outer { position: fixed; inset: 0; overflow: hidden; }
.h-track { display: flex; height: 100%; will-change: transform; }
.cat-panel { flex-shrink:0; width:100vw; height:100%; display:flex; flex-direction:column; overflow:hidden; }
.progress-row { flex-shrink:0; display:flex; gap:4px; padding:14px 16px 10px; background:#0c0c0c; position:relative; z-index:5; overflow:visible; }
.progress-row::after { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:80%; height:120px; background:radial-gradient(ellipse at top,color-mix(in srgb,var(--cc) 30%,transparent) 0%,transparent 70%); pointer-events:none; z-index:-1; }
.pseg { flex:1; height:2px; border-radius:1px; background:rgba(255,255,255,0.12); position:relative; overflow:hidden; }
.pseg::after { content:''; position:absolute; inset:0; background:var(--cc,#e8334a); transform:scaleX(0); transform-origin:left; transition:transform 0.25s ease; }
.pseg.done::after, .pseg.active::after { transform:scaleX(1); }
.v-feed { flex:1; overflow:hidden; position:relative; clip-path:inset(0); }
.v-track { display:flex; flex-direction:column; will-change:transform; }
.card { 
  width:100%; flex-shrink:0; background:#0c0c0c; display:flex; flex-direction:column; 
  overflow:hidden; position:relative; 
  scroll-margin-top: 80px;
}
.card.target-highlight {
  background: linear-gradient(135deg, #fff3cd22 0%, #ffeaa722 100%) !important;
  box-shadow: 0 0 30px rgba(255, 193, 7, 0.4);
  border: 2px solid #f39c12;
  animation: pulse-highlight 2s ease-in-out;
}
@keyframes pulse-highlight {
  0%, 100% { box-shadow: 0 0 30px rgba(255, 193, 7, 0.4); }
  50% { box-shadow: 0 0 50px rgba(255, 193, 7, 0.6); }
}
.card-content { flex:1; display:flex; flex-direction:column; padding:36px 20px 22px; min-height:0; position:relative; z-index:1; }
.card-toprow { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; flex-shrink:0; }
.cat-pill { display:inline-flex; align-items:center; gap:7px; background:#1c1c1e; border-radius:8px; padding:7px 12px 7px 10px; font-size:11.5px; font-weight:700; letter-spacing:0.07em; color:#d0d0d0; text-transform:uppercase; line-height:1; }
.pill-icon { width:16px; height:16px; background:#2e2e30; border-radius:3px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.pill-icon svg { display:block; }
.card-date { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:500; color:#666; letter-spacing:0.01em; }
.card-headline { font-size:28px; font-weight:800; line-height:1.18; color:#fff; letter-spacing:-0.03em; margin-bottom:20px; flex-shrink:0; }
.card-summary { font-size:15.5px; font-weight:400; line-height:1.62; color:#6b6b6b; flex:1; overflow:hidden; display:-webkit-box; -webkit-line-clamp:7; -webkit-box-orient:vertical; }
.card-divider { height:1px; background:#1e1e1e; margin:20px 0 16px; flex-shrink:0; }
.card-footer { display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.src-chip { display:inline-flex; align-items:center; gap:6px; background:#181818; border:1px solid #282828; border-radius:9px; padding:8px 13px; font-size:12.5px; font-weight:600; color:#c0c0c0; text-decoration:none; letter-spacing:0.005em; line-height:1; }
.src-chip-sep { color:#3a3a3a; font-weight:400; }
.src-chip-pg { color:#555; font-weight:500; }
.src-chip-ext { margin-left:2px; }
.src-chip-ext svg { display:block; }
.info-btn { width:36px; height:36px; border-radius:50%; border:1.5px solid #252525; background:#141414; display:flex; align-items:center; justify-content:center; color:#555; cursor:pointer; flex-shrink:0; }
.cat-flash { position:fixed; inset:0; z-index:600; pointer-events:none; opacity:0; transition:opacity 0.12s; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; }
.cat-flash.on { opacity:1; }
.cf-icon { font-size:34px; }
.cf-name { font-size:22px; font-weight:900; letter-spacing:-0.03em; text-transform:uppercase; }
.hint { position:fixed; display:flex; flex-direction:column; align-items:center; gap:5px; pointer-events:none; z-index:400; opacity:0; transition:opacity 0.6s ease; }
.hint.visible { opacity:1; }
.hint.gone { opacity:0 !important; transition:opacity 0.4s; }
.hint-pill { font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.55); background:rgba(255,255,255,0.07); backdrop-filter:blur(10px); padding:5px 13px; border-radius:100px; border:1px solid rgba(255,255,255,0.09); }
.hint-arr { font-size:16px; color:rgba(255,255,255,0.4); }
.h-up { bottom:28px; left:50%; transform:translateX(-50%); animation:bUp 2s ease-in-out infinite; }
.h-right { top:50%; right:14px; transform:translateY(-50%); animation:bRight 2s ease-in-out infinite 0.6s; }
@keyframes bUp { 0%,100% { bottom:28px; opacity:.65; } 50% { bottom:36px; opacity:1; } }
@keyframes bRight { 0%,100% { right:14px; opacity:.65; } 50% { right:6px; opacity:1; } }

<script>
const DIGEST   = {"date": "15 July 2026", "articles": [{"headline": "Trump backtracks on 20% Hormuz fee plan after West Asia strikes", "summary": "Donald Trump has withdrawn a proposal to charge a 20% transit fee for vessels through the Strait of Hormuz following Iranian missile attacks. Trump initially proposed the fee as part of a deal with Gulf states, but reversed course as US forces carried out retaliatory strikes in Iraq and Syria. The move highlights the volatility of maritime trade routes in the region.", "category": "World", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130519", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁵⁰⁷²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130519"}], "article_id": "b35ef600"}, {"headline": "Yamuna drain discharge 76% higher than previous government estimates", "summary": "A new audit reveals that 22 major drains contribute 1,324.4 million gallons per day (mgd) of wastewater to the Yamuna in Delhi, 76% more than the Delhi Jal Board's previous estimate. The Najafgarh drain alone contributes over 862 mgd. The report highlights severe infrastructure gaps in sewage treatment, as current capacity is only 534.22 mgd.", "category": "Environment", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130519", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁵⁰⁷²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130519"}], "article_id": "055e6d9b"}, {"headline": "New seating arrangements for TMC rebels who joined NCPI in Lok Sabha", "summary": "The Lok Sabha Speaker is set to allot new seating to 20 Trinamool Congress (TMC) MPs who joined the Nationalist Citizens Party of India (NCPI). The move follows a split in the TMC's parliamentary party. The NCPI is expected to be formally recognized as a separate group ahead of the monsoon session starting July 20, shifting the political balance in the lower house.", "category": "Politics", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130519", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁵⁰⁷²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130519"}], "article_id": "e5e9efcc"}, {"headline": "India defeats England in 1st ODI at Edgbaston", "summary": "The Indian cricket team secured a six-wicket victory over England in the first ODI at Edgbaston. Captain Shubman Gill led the chase with a solid 80 runs before retiring hurt, supported by an unbeaten 51 from Axar Patel. Earlier, Axar's four-wicket haul helped bowl out England for 258. India leads the three-match series 1-0.", "category": "Sports", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130519", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁵⁰⁷²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130519"}], "article_id": "6eab1309"}, {"headline": "MEA states passports are documents to regulate departure, not prove citizenship", "summary": "The Ministry of External Affairs clarified in a meeting that a passport is a document meant to regulate the departure of Indian citizens from the country, not a definitive proof of citizenship. This clarification comes amid debate over the use of passports as citizenship verification. Officials noted that less than 8% of the Indian population currently holds a passport.", "category": "India", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130519", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁵⁰⁷²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130519"}], "article_id": "f7db49f0"}, {"headline": "Uttarakhand draft voter rolls reveal 10% of voters missing", "summary": "The draft electoral roll for Uttarakhand’s Special Intensive Revision (SIR)-2026 shows that over 826,000 voters—about 10% of the state's estimated 7.9 million total—are currently missing from the list. Officials have digitized over 7 million records but are still identifying unverified voters. Claims and objections can be filed from August 14 to September 11.", "category": "Politics", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130519", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁵⁰⁷²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130519"}], "article_id": "66e21ad5"}, {"headline": "Ram Temple treasurer refuses to resign amid embezzlement allegations", "summary": "Govind Dev Giri Maharaj, treasurer of the Shri Ram Janmabhoomi Teerth Kshetra Trust, stated he will not resign following allegations of donation embezzlement. He blamed SBI employees for any discrepancies and maintained that the trust has exercised greater vigilance. He dismissed reports of missing gold and silver offerings as malicious and unfounded.", "category": "Politics", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130519", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁵⁰⁷²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130519"}], "article_id": "0f4d9bea"}, {"headline": "ICC considers 'Super 10' phase for 2030 T20 World Cup overhaul", "summary": "The International Cricket Council (ICC) is discussing a proposal to introduce a 'Super 10' phase for the 2030 T20 World Cup, replacing the current Super 8 format. The new structure would feature two groups of five teams each, with the top two from each group advancing to the semi-finals. The move aims to increase the number of high-stakes matches between top-ranked teams.", "category": "Sports", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130519", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁵⁰⁷²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130519"}], "article_id": "d086c089"}, {"headline": "Injured man dies outside Ghaziabad police post; family alleges negligence", "summary": "A 22-year-old man, Raj Kumar, died in Ghaziabad after being found bleeding outside a pink police post in Sanjay Nagar. Witnesses allege that two policewomen on duty looked on as he lay on the road without providing aid. Police officials have launched an internal inquiry into the incident, which was captured on social media videos showing the victim in distress.", "category": "India", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130519", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁵⁰⁷²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130519"}], "article_id": "6d552616"}, {"headline": "China car exports surge past 4.9 million, threatening global manufacturers", "summary": "Chinese car exports have surpassed 4.9 million units annually, with a notable surge in electric vehicles (EVs). China now controls nearly 23.7% of the global EV export market, with significant growth in Europe and Asia. The rapid expansion has triggered concerns among traditional manufacturers in Germany and Japan, leading to calls for protective trade measures.", "category": "Economy", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130519", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁵⁰⁷²⁰²⁶.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130519"}], "article_id": "acba3967"}, {"headline": "India calls for unimpeded commerce in South China Sea", "summary": "India has reiterated its support for freedom of navigation and unimpeded commerce in the South China Sea. The Ministry of External Affairs emphasized that maritime disputes should be resolved peacefully through international law, specifically UNCLOS. New Delhi's stance aligns with its growing strategic ties with ASEAN nations amid regional territorial tensions.", "category": "India", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130519", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁵⁰⁷²⁰²⁶.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130519"}], "article_id": "3c2e60da"}, {"headline": "Uncertainty over Science Department's ₹80,000 per year INSPIRE scholarships", "summary": "Thousands of students are facing uncertainty as the Department of Science and Technology has not issued a notification for its flagship INSPIRE-SHE scholarship for 2025. The scholarship provides ₹80,000 annually to top performers in basic sciences. RTI responses indicate a delay in scheduling the next cycle, leading to financial stress for students in higher education.", "category": "Education", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130519", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁵⁰⁷²⁰²⁶.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130519"}], "article_id": "2367b419"}, {"headline": "BJP accuses Congress of using public funds for grassroots expansion", "summary": "The Karnataka BJP has accused the Congress government of misusing public funds to expand its grassroots base through the 'Bharat Jodo Yuva Sangha' programme. The state government plans to form 10,000 sanghas, providing each with ₹10 lakh for youth empowerment. BJP leaders allege this is a political move disguised as a development scheme ahead of local body elections.", "category": "Politics", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130519", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁵⁰⁷²⁰²⁶.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/130519"}], "article_id": "ab27e0e3"}, {"headline": "Bengaluru records hottest July day in history at 33.6 degrees", "summary": "Bengaluru recorded its highest-ever July temperature of 33.6 degrees Celsius on Tuesday, breaking a 112-year-old record. The previous record for the month was 33.3 degrees, set in 1914. Meteorologists attribute the unusual heat to a prolonged break in the monsoon and low cloud cover. Temperatures are expected to remain above normal for the next few days.", "category": "Environment", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130519", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁵⁰⁷²⁰²⁶.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/130519"}], "article_id": "5748aab7"}, {"headline": "Three convicted prisoners escape from Kalaburagi jail; one recaptured", "summary": "Three inmates serving life sentences for murder and POCSO Act cases escaped from Kalaburagi Central Prison by cutting through iron window bars. Police launched a massive manhunt and successfully recaptured one escapee, Mastan, in Bidar district. Two others, Santosh and Sagar, remain at large. Authorities have suspended three jail guards for negligence.", "category": "India", "page": 3, "importance": 4, "telegram_url": "https://t.me/c/1877410077/130519", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁵⁰⁷²⁰²⁶.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/130519"}], "article_id": "2b06500b"}, {"headline": "Kerala Opposition releases 'White Paper' alleging state financial mismanagement", "summary": "The Congress-led UDF in Kerala released a 'White Paper of Facts' claiming the LDF government has pushed the state into a severe financial crisis. The report alleges that the state's total debt has crossed ₹5 lakh crore and that revenue growth has stagnated. Finance Minister K.N. Balagopal dismissed the report, stating that the state's economy remains resilient despite central funding cuts.", "category": "Politics", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130519", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁵⁰⁷²⁰²⁶.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/130519"}], "article_id": "c487a37c"}, {"headline": "Singapore offers expertise to support Amaravati greenfield city development", "summary": "A delegation from the Singapore government met with Andhra Pradesh officials to offer technical and institutional support for the development of Amaravati. Singapore plans to provide consultancy in urban planning, sustainable infrastructure, and green energy. The move marks a revival of international interest in the capital project following the change in state leadership.", "category": "Infrastructure", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130519", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁵⁰⁷²⁰²⁶.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/130519"}], "article_id": "ed5dc482"}, {"headline": "Five killed in TN factory furnace blast; high-level probe ordered", "summary": "A boiler blast at a steel melting unit in Tiruvallur district, Tamil Nadu, killed five workers and injured several others. The victims, mostly migrant workers from Bihar, were killed instantly when the furnace exploded due to a technical malfunction. The state government has ordered a high-level inquiry into safety lapses at the SIPCOT industrial park facility.", "category": "India", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130519", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁵⁰⁷²⁰²⁶.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/130519"}], "article_id": "36b20bc4"}, {"headline": "Supreme Court seeks Centre's response on revised CBSE three-language policy", "summary": "The Supreme Court has issued a notice to the Union government regarding a plea challenging the new CBSE three-language policy in schools. The petitioners argue that the policy, which mandates the study of three Indian languages, is being implemented without adequate infrastructure and textbooks. The court has asked for a detailed response on the logistics of the rollout.", "category": "Education", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130519", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁵⁰⁷²⁰²⁶.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/130519"}], "article_id": "3b3c4c25"}, {"headline": "India reaffirmed anti-terror cooperation with Canada and United States", "summary": "India has agreed to strengthen counter-terrorism cooperation with Canada and the US following high-level diplomatic meetings. The discussions focused on tracking transnational criminal networks and extremist groups. This reaffirmation comes amid ongoing investigations into the killing of Hardeep Singh Nijjar and alleged plots against other activists in North America.", "category": "India", "page": 5, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130519", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁵⁰⁷²⁰²⁶.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/130519"}], "article_id": "0b00a176"}, {"headline": "Cross-border trade via Shipki La pass to resume from August 1", "summary": "Bilateral trade between India and Tibet via the Shipki La pass in Himachal Pradesh is set to resume on August 1 after a multi-year hiatus. The trade was suspended in 2019 due to the pandemic and border tensions. Traders will be allowed to exchange 36 approved items, including textiles and agricultural products, providing a boost to local economies in the border regions.", "category": "Economy", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130519", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁵⁰⁷²⁰²⁶.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130519"}], "article_id": "64e6e513"}, {"headline": "Hindu and Muslim sides reject mediation in Gyanvapi mosque dispute", "summary": "Both parties in the Gyanvapi mosque dispute have informed a Varanasi court that they are not open to a mediated settlement. The court-appointed committee reported that the gap between the two sides remains too large for reconciliation. The legal battle over the site's religious character will now continue through regular court proceedings starting next month.", "category": "Law", "page": 6, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130519", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁵⁰⁷²⁰²⁶.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130519"}], "article_id": "85193628"}, {"headline": "Supreme Court rejects plea against SRK's Mannat bungalow renovation", "summary": "The Supreme Court has dismissed a petition challenging the renovation of actor Shah Rukh Khan's bungalow, 'Mannat', in Mumbai. The plea alleged that the construction violated Coastal Regulation Zone (CRZ) norms. The court found no evidence of environmental violations and noted that all necessary municipal permissions had been obtained for the structural changes.", "category": "Law", "page": 7, "importance": 4, "telegram_url": "https://t.me/c/1877410077/130519", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁵⁰⁷²⁰²⁶.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/130519"}], "article_id": "746e003c"}, {"headline": "Comedian Samay Raina fined ₹3 lakh for defying Supreme Court undertaking", "summary": "The Supreme Court imposed a ₹3 lakh fine on comedian Samay Raina for failing to adhere to a legal undertaking regarding sensitive content in his online shows. The court rebuked Raina for 'arrogance' after he failed to show proper respect and sensitivity toward persons with spinal muscular atrophy (SMA) as promised in a previous hearing. The fine will be used for SMA treatment funds.", "category": "Law", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130519", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁵⁰⁷²⁰²⁶.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/130519"}], "article_id": "b9f1428a"}, {"headline": "New law removes age limit for freezing embryos for surrogacy", "summary": "The Allahabad High Court has ruled that there should be no upper age limit for freezing embryos under the Surrogacy (Regulation) Act, 2021. The court stated that the current age restrictions on the mother are for the act of surrogacy itself, not for the preservation of genetic material. This ruling provides relief to couples who wish to preserve embryos for future reproductive options.", "category": "Health", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130519", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁵⁰⁷²⁰²⁶.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130519"}], "article_id": "36250a70"}, {"headline": "Acid attack survivors with internal injuries now eligible for disability benefits", "summary": "The Centre informed the Supreme Court that acid attack survivors who have suffered internal organ damage due to ingestion of corrosive substances will now be eligible for benefits under the RPwD Act. Previously, benefits were limited to those with external physical disfigurement. The expansion aims to provide comprehensive medical and financial support to all survivors.", "category": "Health", "page": 8, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130519", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁵⁰⁷²⁰²⁶.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130519"}], "article_id": "ed0d40b3"}, {"headline": "Warren Buffett halts donations to Gates Foundation over Epstein ties", "summary": "Billionaire Warren Buffett has announced he will stop donating to the Bill & Melinda Gates Foundation, citing concerns over the late Jeffrey Epstein's past ties to Bill Gates. Buffett, who has donated over $36 billion to the foundation since 2006, stated his future philanthropic efforts will be directed through a new trust managed by his children. The decision marks a major shift in global philanthropy.", "category": "Business", "page": 11, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130519", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁵⁰⁷²⁰²⁶.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/130519"}], "article_id": "a0c75313"}, {"headline": "Trump pays $5.6 million to E. Jean Carroll for defamation", "summary": "Donald Trump has deposited $5.6 million into a court-controlled account to satisfy the judgment in a defamation lawsuit brought by writer E. Jean Carroll. A jury had found Trump liable for sexually assaulting Carroll and subsequently defaming her by denying the incident. The payment allows Trump to proceed with an appeal while ensuring the funds are available to the plaintiff.", "category": "Law", "page": 11, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130519", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁵⁰⁷²⁰²⁶.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/130519"}], "article_id": "35fd69ac"}, {"headline": "India Post Q1 revenue grows 22% to ₹4,009 crore", "summary": "India Post reported its highest-ever first-quarter revenue of ₹4,009 crore, marking a 22% increase from the previous year. The growth was driven by its e-commerce parcel business and expanded financial services through the India Post Payments Bank. The department has set an ambitious revenue target of ₹19,803 crore for the full fiscal year.", "category": "Business", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130519", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁵⁰⁷²⁰²⁶.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/130519"}], "article_id": "3a3d6c55"}, {"headline": "Fairfax to Acquire Controlling Stake in IDBI Bank for $5.5 Billion", "summary": "Fairfax Holdings has finalised a deal to acquire a 54.8% stake in IDBI Bank for $5.5 billion. The offer price of ₹81 per share marks a significant premium over earlier divestment estimates. The Indian government and LIC will retain minority holdings. This represents one of the largest foreign investments in the Indian banking sector, pending final regulatory clearances.", "category": "Economy", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/130498", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ¹⁵⁰⁷²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130498"}], "article_id": "0aa97253"}, {"headline": "Oil Prices Fluctuate as West Asia Conflict Threatens Strait of Hormuz", "summary": "Global oil prices surged past $87 per barrel following Iranian attacks on tankers and retaliatory strikes by the US. A potential blockade of the Strait of Hormuz, through which 20% of global oil flows, has raised fears of supply disruptions. Analysts warn of continued volatility as tensions between regional powers and Western forces escalate in the strategic waterway.", "category": "World", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/130498", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ¹⁵⁰⁷²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130498"}], "article_id": "7fd22cd9"}, {"headline": "Indian Government Considers Opening Thorium Mining to Private Sector", "summary": "India is weighing policy changes to allow private companies to mine thorium-rich monazite sands. The move aims to bolster the nation's indigenous nuclear power program and secure supply chains for critical minerals. Currently, monazite mining is highly restricted. The initiative could significantly enhance India's long-term energy security and clean energy transitions.", "category": "Infrastructure", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130498", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ¹⁵⁰⁷²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130498"}], "article_id": "05126af7"}, {"headline": "Direct Tax Collection Rises Over 16% in Current Fiscal Year", "summary": "India's net direct tax collections grew by 16.4% to reach ₹6.51 lakh crore as of July 13 for the fiscal year 2026-27. The growth was driven by a 120% surge in corporate tax and robust personal income tax mop-ups. The figures suggest economic resilience despite global headwinds, with the government expected to maintain its fiscal deficit targets.", "category": "Economy", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130498", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ¹⁵⁰⁷²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130498"}], "article_id": "a9dae367"}, {"headline": "NIA Court Issues Non-Bailable Warrant Against Terrorist Hafiz Saeed", "summary": "A special National Investigation Agency court has issued a warrant against Lashkar-e-Taiba chief Hafiz Saeed. The warrant is linked to the April 2025 Pahalgam attack case. The court's move follows investigations into terror funding and cross-border operations. India continues to seek international cooperation to bring the Pakistan-based operative to justice.", "category": "Law", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130498", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ¹⁵⁰⁷²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130498"}], "article_id": "a5c6dd74"}, {"headline": "FSSAI Action Highlights Confusion Over Food Labelling Standards", "summary": "A recent crackdown by the Food Safety and Standards Authority of India on misleading labels has sparked debate among companies. Manufacturers cite a lack of clarity in defining terms like 'natural' or 'pure.' FSSAI is now working on revised guidelines to ensure consumer transparency while addressing industry concerns regarding implementation costs.", "category": "Health", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130498", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ¹⁵⁰⁷²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130498"}], "article_id": "3f21b546"}, {"headline": "Index of Service Production Shows Strong Growth in First Round", "summary": "The newly launched Index of Service Production recorded double-digit growth in April 2026. Out of 19 sectors, 14 posted significant gains, led by accommodation, food services, and transport. Chief Economic Adviser V Anantha Nageswaran hailed the monthly service output indicator as a 'real achievement' reflecting a strong start to the fiscal year.", "category": "Economy", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130498", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ¹⁵⁰⁷²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130498"}], "article_id": "5424ddf0"}, {"headline": "UnifyApps in Talks to Raise $120 Million for Expansion", "summary": "Enterprise integration startup UnifyApps is negotiating a fresh funding round of up to $120 million. Private equity firm EQT is expected to lead the round, which could value the company at $750 million. The startup focuses on helping enterprises unify data and automate workflows across disparate business platforms using AI-driven tools.", "category": "Technology", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130498", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ¹⁵⁰⁷²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130498"}], "article_id": "f2e88df6"}, {"headline": "BigBasket Trims Operational Footprint to Focus on Profitability", "summary": "Tata-owned BigBasket is cutting its operational presence to 40 major cities, down from 76. New CEO Amit Nanda is tasked with steering the e-grocery firm toward profitability. The shift involves a 'cluster strategy' to deepen user density in larger markets while managing high delivery and competition costs from quick-commerce rivals.", "category": "Business", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130498", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ¹⁵⁰⁷²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130498"}], "article_id": "406745cf"}, {"headline": "Udaan Strikes Rescue Deal with Creditors to Avert Bankruptcy", "summary": "B2B e-commerce firm Udaan has reached a deal with offshore lenders to restructure its debt. The agreement includes $45 million in fresh credit from BlackRock and converted debt into convertible bonds. The move provides the company with a lifeline to continue operations while it prepares for a potential public listing next year.", "category": "Business", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130498", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ¹⁵⁰⁷²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130498"}], "article_id": "2d6ecd02"}, {"headline": "Government Proposes Input Tax Credit Relief on Corporate Vehicles", "summary": "The GST Council is considering allowing companies to claim input tax credit on vehicles purchased for business use. Currently, such credits are restricted. The proposal, aimed at easing the tax burden on the automobile and logistics sectors, could also extend to group health and life insurance policies for employees, pending final approval.", "category": "Economy", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130498", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ¹⁵⁰⁷²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130498"}], "article_id": "48e6f94a"}, {"headline": "India to Fund $250,000 Monastery Project in Nepal", "summary": "The Indian government has announced funding of NPR 33 million (approx $250,000) for a new monastery project in Nepal’s Solukhumbu district. The initiative is part of India’s High Impact Community Development Projects. It aims to strengthen cultural ties and support grassroots infrastructure development in the neighboring Himalayan nation.", "category": "Politics", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130498", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ¹⁵⁰⁷²⁰²⁶.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130498"}], "article_id": "83bdaccb"}, {"headline": "West Bengal Withdraws Plea Against Order Striking Down OBC Status", "summary": "The West Bengal government has withdrawn its appeal in the Supreme Court against a Calcutta High Court order that struck down the OBC status of 77 castes. The castes were primarily Muslim groups added during the previous administration. The withdrawal allows the state to re-evaluate its reservation policy under the oversight of the Backward Classes Commission.", "category": "Law", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130498", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ¹⁵⁰⁷²⁰²⁶.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130498"}], "article_id": "10d78b57"}, {"headline": "India Backs Palestine UN Bid and Pledges Humanitarian Aid", "summary": "India reaffirmed its support for Palestine's bid for full UN membership during a ministerial meeting in Brussels. External Affairs Minister S Jaishankar announced fresh humanitarian aid for Palestinian refugees through UNRWA. India reiterated its commitment to a two-state solution to achieve lasting peace and stability in the Middle East.", "category": "Politics", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130498", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ¹⁵⁰⁷²⁰²⁶.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130498"}], "article_id": "f0d2ab42"}, {"headline": "Karnataka Eyes Strategic AI Partnership with Intel India", "summary": "Karnataka IT Minister Priyank Kharge met with Intel India leadership to explore a partnership for a state-led AI Hub. The collaboration aims to democratize access to AI tools for startups and educational institutions. Discussions focused on building future-ready talent and ensuring the benefits of AI reached every sector of society in the state.", "category": "Technology", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130498", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ¹⁵⁰⁷²⁰²⁶.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/130498"}], "article_id": "54b1869f"}, {"headline": "Ikea Plans ₹11,000 Crore Expansion to Speed Up India Stores", "summary": "Swedish furniture retailer Ikea is set to invest ₹11,000 crore to accelerate its expansion in India. The company aims to open 25 stores by 2030, including large formats and smaller city-center shops. CEO Petri Antoni stated the focus will be on local sourcing and omni-channel growth in major metros like Bengaluru, Mumbai, and Delhi-NCR.", "category": "Business", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130498", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ¹⁵⁰⁷²⁰²⁶.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/130498"}], "article_id": "65110623"}, {"headline": "Akasa Air to Raise ₹1,000 Crore for Fleet Expansion", "summary": "Akasa Air plans to raise ₹1,000 crore from its existing investors, including the Jhunjhunwala family and Premji Invest. The funds will be used to support the airline's aggressive fleet expansion and international flight operations. The carrier recently placed an order for additional Boeing 737 MAX aircraft to maintain its growth trajectory.", "category": "Business", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130498", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ¹⁵⁰⁷²⁰²⁶.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/130498"}], "article_id": "bef5da29"}, {"headline": "Navi Mumbai Airport International Services to Begin in December", "summary": "The Navi Mumbai International Airport is scheduled to commence international operations on December 25, 2026. This follows the successful launch of domestic services earlier in the year. The airport, operated by Adani Airports, aims to ease the congestion at Mumbai’s Chhatrapati Shivaji Maharaj International Airport and serve as a key regional hub.", "category": "Infrastructure", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130498", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ¹⁵⁰⁷²⁰²⁶.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/130498"}], "article_id": "dd0758c1"}, {"headline": "Broadcasters Express Concern Over Proposed New Telecom-Style Regulations", "summary": "The broadcasting industry has raised alarms over the draft Telecommunications Rules 2026, which may apply telecom-style licensing to TV services. Industry bodies argue that regulating internet-delivered television could stifle innovation and increase compliance costs. The Ministry is currently holding consultations with stakeholders to address these concerns.", "category": "Technology", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130498", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ¹⁵⁰⁷²⁰²⁶.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/130498"}], "article_id": "d52fcf07"}, {"headline": "Wholesale Inflation Rises to 9.9% in June on Food Prices", "summary": "India's wholesale price index (WPI) inflation climbed to 9.9% in June, driven primarily by a spike in food and fuel costs. Food inflation rose to 12.4%, with vegetables and pulses showing the sharpest increases. Economists warn that persistent supply-side constraints and high energy prices could keep inflation elevated in the coming months, impacting consumer demand.", "category": "Economy", "page": 7, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130498", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ¹⁵⁰⁷²⁰²⁶.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/130498"}], "article_id": "483e79a2"}, {"headline": "Railways Simplifies Rules for Container Train Licensing", "summary": "Indian Railways has replaced four separate categories of container train licenses with a single, unified permit. The move aims to improve operational efficiency and reduce red tape for logistics companies. Minister Ashwini Vaishnaw stated the new rules will allow better utilization of freight wagons and lower costs for businesses across the country.", "category": "Infrastructure", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130498", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ¹⁵⁰⁷²⁰²⁶.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/130498"}], "article_id": "5dfd6712"}, {"headline": "India and UK Discuss Britain's New Carbon Tax Rules", "summary": "India and the UK are in high-level talks regarding the impact of Britain’s new Carbon Border Adjustment Mechanism on trade. India is seeking exemptions or market access for its steel and aluminum sectors. The carbon tax is a key sticking point in the ongoing Free Trade Agreement negotiations, which officials hope to conclude by the end of the year.", "category": "Economy", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130498", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ¹⁵⁰⁷²⁰²⁶.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/130498"}], "article_id": "66b2c060"}, {"headline": "Prices of Rice, Oilseeds and Pulses Rise as Sowing Declines", "summary": "Kharif crop sowing has seen a decline this season due to uneven monsoon distribution, leading to a rise in prices for staples like rice and pulses. Paddy acreage is down by 8.6%, while oilseed sowing has dropped by nearly 11%. Farmers and traders are concerned that continued rainfall deficits could further impact yields and heighten food inflation.", "category": "Economy", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130498", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ¹⁵⁰⁷²⁰²⁶.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130498"}], "article_id": "dcf38be4"}, {"headline": "Anil Agarwal Claims Vedanta Spinoffs Could Reach $100 Billion Value", "summary": "Vedanta Chairman Anil Agarwal stated that each of the company's five planned spinoff ventures has the potential to reach a $100 billion valuation. The demerger process aims to unlock value for shareholders by creating independent entities for aluminum, oil & gas, and power. Agarwal emphasized the focus on green energy and technology as key growth drivers.", "category": "Business", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130498", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ¹⁵⁰⁷²⁰²⁶.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130498"}], "article_id": "392344c4"}, {"headline": "DeepMind Executive Says Agentic AI Adoption Mirrors Mobile Revolution", "summary": "A senior executive at Google DeepMind noted that India is rapidly adopting 'agentic AI,' where autonomous systems perform complex tasks. This shift is compared to the mobile phone revolution that transformed the country's economy. DeepMind is working with Indian developers to build AI models tailored for local languages and specific sectoral needs.", "category": "Technology", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130498", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ¹⁵⁰⁷²⁰²⁶.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/130498"}], "article_id": "afc0cee4"}, {"headline": "Experts Argue Against One-Size-Fits-All AI Law for India", "summary": "Legal experts and tech analysts have warned the Indian government against implementing a rigid, overarching AI law. They suggest a risk-based approach with specific rules for critical sectors like banking and healthcare. The discussion comes as the IT ministry prepares a new legal framework to manage AI risks without stifling the domestic startup ecosystem.", "category": "Technology", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130498", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ¹⁵⁰⁷²⁰²⁶.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/130498"}], "article_id": "276e660b"}, {"headline": "Tata Power Seeks $450 Million Loan for Infrastructure Projects", "summary": "Tata Power is in discussions with offshore banks to raise a five-year loan worth $450 million. The funds will be used to finance various power infrastructure projects and refinance existing debt. The company is expanding its renewable energy portfolio and modernization of distribution networks, aiming for a significant reduction in its carbon footprint.", "category": "Business", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130498", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ¹⁵⁰⁷²⁰²⁶.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/130498"}], "article_id": "25c61bef"}, {"headline": "BMW Struggles to Compete in China’s Rapidly Growing EV Market", "summary": "BMW is facing stiff competition from local players in China’s electric vehicle market, leading to a decline in its market share. Chinese automakers like BYD and Nio are launching technologically advanced models at competitive prices. The German luxury brand is now accelerating its EV roadmap and localizing production to regain its footing in the world's largest car market.", "category": "Business", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130498", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ¹⁵⁰⁷²⁰²⁶.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/130498"}], "article_id": "3d992075"}, {"headline": "RBI Governor and Bank CEOs Discuss Impact of Global Volatility", "summary": "RBI Governor Shaktikanta Das met with bank CEOs to discuss the challenges posed by global economic volatility and surging energy prices. The meeting focused on the impact of West Asian tensions on India's financial stability and exchange rates. The central bank emphasized the need for banks to maintain robust capital buffers and monitor risk exposures closely.", "category": "Economy", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130498", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ¹⁵⁰⁷²⁰²⁶.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/130498"}], "article_id": "05e01306"}, {"headline": "Monazite Mining Highly Restricted to Protect National Mineral Reserves", "summary": "The Indian government has reinforced strict restrictions on monazite mining to protect reserves of thorium and other strategic minerals. Only state-authorized entities are permitted to process the mineral, which is essential for India's three-stage nuclear power program. Authorities are monitoring illegal extraction activities to prevent the smuggling of these sensitive materials.", "category": "Environment", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130498", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ¹⁵⁰⁷²⁰²⁶.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/130498"}], "article_id": "5fa3975c"}, {"headline": "England Faces Argentina in Highly Anticipated World Cup Semi-Final", "summary": "England is set to clash with Argentina in the FIFA World Cup semi-finals, a rivalry with deep historical roots. Both teams are looking to secure a spot in the final, with key players like Jude Bellingham and Lionel Messi expected to be decisive. Fans across the globe are anticipating a high-intensity match reflecting decades of competitive tension between the two nations.", "category": "Sports", "page": 13, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130498", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ¹⁵⁰⁷²⁰²⁶.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/130498"}], "article_id": "c6c7aeb2"}, {"headline": "Ebola Outbreak in Congo May Be Worse Than Official Data", "summary": "The World Health Organization warned that the actual number of Ebola cases in the Democratic Republic of Congo may be four times higher than official reports. Difficulty in accessing conflict-ridden regions has hindered data collection and aid delivery. The global health agency is calling for urgent international support to contain the outbreak and prevent it from spreading to neighboring states.", "category": "Health", "page": 14, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130498", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ¹⁵⁰⁷²⁰²⁶.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/130498"}], "article_id": "dbea7127"}, {"headline": "RBI urges banks to boost FCNR deposits and credit", "summary": "RBI Governor Shaktikanta Das met with bank CEOs to discuss several critical issues, including the mobilization of FCNR(B) deposits and accelerating credit growth. The central bank is also pushing for stronger fraud detection mechanisms and exploring a relaxation in gold loan norms to support economic activity.", "category": "Business", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130514", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-07-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130514"}], "article_id": "82baa7c2"}, {"headline": "Government proposes blanket ban on toxic herbicide Paraquat Dichloride", "summary": "The Union Ministry of Agriculture has issued a draft order seeking a blanket ban on the manufacture, sale, and use of the herbicide Paraquat Dichloride. The proposal follows a committee report highlighting the chemical's high toxicity to humans and animals. Stakeholders have 30 days to provide feedback before the ban is finalized.", "category": "Environment", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130514", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-07-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130514"}], "article_id": "441472ee"}, {"headline": "RBI to introduce principle-based governance framework for banks", "summary": "The Reserve Bank of India plans to implement a new principle-based governance framework for commercial banks. The objective is to empower bank boards to take more active roles in strategy and risk management while ensuring they remain ultimately accountable for the bank's performance and the appointment of key personnel.", "category": "Business", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130514", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-07-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130514"}], "article_id": "f140ac29"}, {"headline": "Hero MotoCorp unveils long-term growth blueprint for FY26", "summary": "Hero MotoCorp has revealed a strategic roadmap focusing on premiumization, global expansion, and leadership in the electric vehicle (EV) segment. The plan includes integrating AI and digital technologies across its operations and products, aiming to transform the company into a broader mobility provider beyond traditional motorcycles.", "category": "Business", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130514", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-07-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130514"}], "article_id": "aa383de2"}, {"headline": "Ikea India aims to quadruple sales by 2030", "summary": "Ikea India has announced an ambitious target to quadruple its sales to ₹8,000 crore by 2030. The expansion strategy involves opening at least 25 new stores, including smaller format locations, and significantly strengthening its e-commerce presence to reach more customers across the country.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130514", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-07-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130514"}], "article_id": "0a919bf3"}, {"headline": "L&T to expand Kattupalli infra with new assembly shops", "summary": "Larsen & Toubro has received environmental clearance for a ₹1,100 crore expansion of its Kattupalli shipyard near Chennai. The project will include new fabrication and assembly shops to support the construction of 25 ships per year and enhance the facility's capacity for the renewable energy and offshore sectors.", "category": "Infrastructure", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130514", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-07-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130514"}], "article_id": "482e5208"}, {"headline": "Tata Elxsi Q1 profit rises 18 percent to ₹170.6 crore", "summary": "Design and technology services provider Tata Elxsi reported an 18.17% increase in net profit to ₹170.59 crore for the first quarter of FY27. The growth was driven by strong performance in its transportation and media segments, alongside steady demand from major global original equipment manufacturers (OEMs).", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130514", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-07-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130514"}], "article_id": "f82cbafb"}, {"headline": "Income Tax department penalizes Titan Company 4 crore rupees", "summary": "Titan Company has been fined approximately ₹4.27 crore by the Income Tax Department for alleged under-reporting of income. The penalty relates to assessment years 2017-18 and 2019-20. The company stated that the penalty is currently being contested and will not have a material impact on its overall financial position.", "category": "Business", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/130514", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-07-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130514"}], "article_id": "534ff0a8"}, {"headline": "Constitutional challenges in India's upcoming delimitation process", "summary": "India faces complex political challenges as it prepares for the 2026 delimitation process, which will redraw Lok Sabha constituencies based on the 2027 census. This process could significantly increase the number of seats in northern states with higher population growth, potentially leading to a shift in political power and federal friction.", "category": "Politics", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130514", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-07-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130514"}], "article_id": "3af63fb1"}, {"headline": "MRF named India's most valuable and strongest tyre brand", "summary": "Tyre manufacturer MRF has been ranked as India's most valuable tyre brand and the world's third strongest tyre brand in the Brand Finance India 100 - 2026 report. The company received a brand strength index score of 87.7 out of 100, reflecting its strong market position and brand equity.", "category": "Business", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/130514", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-07-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130514"}], "article_id": "eb0a1bdb"}, {"headline": "Oil companies find no adulteration in E20 blended fuel", "summary": "State-run oil marketing companies (OMCs) conducted over 14,000 inspections at fuel stations and found no evidence of water contamination or fuel adulteration in E20 petrol. The inspections were launched following social media rumors and aimed to reassure consumers about the quality and safety of ethanol-blended fuels.", "category": "Business", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130514", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-07-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/130514"}], "article_id": "dee9f53c"}, {"headline": "Government overhauls EPF scheme to simplify withdrawal process", "summary": "The central government has significantly amended the Employees' Provident Fund (EPF) Scheme to make it easier for subscribers to make early withdrawals for reasons such as marriage, education, and illness. The new rules also simplify the process for final settlements and introduce measures to ensure account continuity during job losses.", "category": "Economy", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130514", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-07-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/130514"}], "article_id": "b93cd348"}, {"headline": "US President proposes fee for ships traversing Strait of Hormuz", "summary": "President Donald Trump has suggested a $15 per barrel fee for oil tankers passing through the Strait of Hormuz to reimburse the US for the cost of providing naval protection in the region. The proposal has raised concerns about higher global oil prices and increased transport costs for major importing nations like India.", "category": "World", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130514", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-07-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/130514"}], "article_id": "031378db"}, {"headline": "Indian stock markets fall as West Asia tensions rise", "summary": "The Nifty 50 and Sensex both fell over 0.6% as escalating tensions in West Asia led to higher crude oil prices and a weaker rupee. Investors grew cautious as Brent crude prices climbed above $86 per barrel, impacting rate-sensitive sectors and leading to broad-based selling across the market.", "category": "Business", "page": 6, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130514", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130514"}], "article_id": "55abd331"}, {"headline": "HCL Tech shares drop after first quarter earnings report", "summary": "HCL Technologies shares declined by 4.46% after the company maintained its revenue growth guidance of 1-4% for FY27. Despite reporting steady first-quarter results, investors were concerned about the lack of an upward revision in guidance and the potential impact of a cautious spending environment in the global tech sector.", "category": "Business", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130514", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130514"}], "article_id": "eb6458b9"}, {"headline": "SEBI introduces new conflict of interest code for officials", "summary": "The Securities and Exchange Board of India (SEBI) has adopted a new code of conduct for its officials that shifts focus from just disclosing potential conflicts to actively preventing them. The code includes a mandatory two-year cooling-off period for officials before they can join companies they previously regulated.", "category": "Law", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130514", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130514"}], "article_id": "dc05df75"}, {"headline": "India secures larger steel export quota from United Kingdom", "summary": "India has successfully negotiated a significant increase in its duty-free steel export quota to the UK. This move could pave the way for steel exports worth $1 billion in the next fiscal year, providing a major boost to Indian steel manufacturers who had been facing higher tariffs on exports exceeding previous quotas.", "category": "Economy", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130514", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-07-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/130514"}], "article_id": "1dd374fe"}, {"headline": "Fusion CX to increase focus on AI-enabled customer services", "summary": "Global customer experience provider Fusion CX plans to significantly increase its investment in AI technologies. The company aims to have AI-enabled services account for 20-25% of its total business within the next three years, up from the current level of around 10%, to improve service efficiency and quality.", "category": "Technology", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130514", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-07-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/130514"}], "article_id": "63490b2d"}, {"headline": "RBI to simplify bank stake acquisition for institutional investors", "summary": "The Reserve Bank of India plans to simplify the process for mutual funds and insurance companies to acquire up to 10% stake in commercial banks. The new rules would introduce a one-time approval mechanism, removing the need for institutional investors to seek repeated approvals for incremental stake increases.", "category": "Business", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130514", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130514"}], "article_id": "82b5e655"}, {"headline": "Hydrogen vehicles get seven year permit exemption from government", "summary": "The Ministry of Road Transport and Highways has exempted hydrogen-powered transport vehicles from all permit requirements for a period of seven years. The move is designed to promote the adoption of clean fuels and reduce the operating costs for fleet owners transitioning to hydrogen-powered trucks and buses.", "category": "Infrastructure", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130514", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130514"}], "article_id": "80a879ea"}, {"headline": "Trump cancels proposed 20 percent fee for Hormuz Strait cargo", "summary": "US President Donald Trump has announced he will not move forward with a proposed 20% fee on ships passing through the Strait of Hormuz. The decision followed discussions with several Gulf states. The proposed fee had faced criticism for potentially disrupting global oil supplies and significantly increasing transport costs.", "category": "World", "page": 9, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130514", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-07-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/130514"}], "article_id": "274f285c"}, {"headline": "India's edible oil imports drop 30 percent in June", "summary": "India's imports of edible oils, including palm and soybean oil, fell by 30% in June 2026. The decline was attributed to higher global prices and reduced shipments from major exporters. Reduced imports from Nepal under the SAFTA agreement also contributed to the overall drop in edible oil shipments during the month.", "category": "Economy", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130514", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-07-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/130514"}], "article_id": "de60e422"}, {"headline": "New low pressure area over Bay to revive Indian monsoon", "summary": "The India Meteorological Department expects a new low-pressure area over the Bay of Bengal to bring much-needed rain to central and northern India, potentially reviving the monsoon after a weak phase. The system is expected to move towards West Bengal and Odisha, bringing relief to farmers in those regions.", "category": "Environment", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130514", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-07-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/130514"}], "article_id": "0296ff1f"}, {"headline": "First flight of Saras Mk II passenger plane set for 2028", "summary": "The Saras Mk II, an indigenous 19-seater passenger aircraft developed by CSIR-NAL, is scheduled to undergo its first flight test in the last quarter of the 2027-28 fiscal year. The aircraft is designed for regional connectivity and has already received an initial commitment for 15 planes from the Indian Air Force.", "category": "Science", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130514", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-07-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/130514"}], "article_id": "92368479"}, {"headline": "Over 940 million Indians now covered under social security net", "summary": "Union Minister Mansukh Mandaviya stated that India's social security net now covers over 940 million people. He highlighted that the coverage has expanded significantly to include workers in the unorganized sector and the gig economy, providing them with access to healthcare, pensions, and other essential benefits.", "category": "India", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130514", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-07-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/130514"}], "article_id": "fb23e762"}, {"headline": "India faces potential natural gas supply shortage due to West Asia", "summary": "Escalating conflict in West Asia could lead to a shortage of up to 1.5 million tonnes of natural gas per month for India and other South Asian nations. The potential supply disruption has raised concerns about higher energy costs and the need for India to further diversify its natural gas sources.", "category": "Economy", "page": 11, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130514", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-07-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/130514"}], "article_id": "c895b1fd"}, {"headline": "Nitin Gadkari reviews mega highway projects in Uttar Pradesh", "summary": "Union Minister Nitin Gadkari reviewed several major highway projects in Uttar Pradesh with Chief Minister Yogi Adityanath. The projects include a planned 742-km corridor to improve connectivity and logistics. The review focused on accelerating land acquisition and environmental clearances to ensure timely completion.", "category": "Infrastructure", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130514", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-07-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/130514"}], "article_id": "435f432f"}, {"headline": "Google Cloud offers sovereign cloud services to Indian clients", "summary": "Google is targeting Indian public sector and enterprise clients with new sovereign cloud services. These services allow for local data processing and enhanced security within India's own borders, addressing concerns about data privacy and sovereignty while enabling the use of advanced AI and cloud technologies.", "category": "Technology", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130514", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-07-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/130514"}], "article_id": "a533b2d6"}, {"headline": "Indian smartphone market expected to fall 10 percent in June", "summary": "India's smartphone market is projected to see a 10% decline in shipments during the April-June quarter. The fall is attributed to rising component costs, which have led to higher retail prices, and weaker consumer demand as many people defer their purchases in anticipation of the upcoming festival season.", "category": "Business", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130514", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-07-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/130514"}], "article_id": "987df944"}, {"headline": "Anthropic launches paid monthly plans for Claude AI in India", "summary": "AI startup Anthropic has introduced paid monthly subscription plans for its Claude AI chatbot in India. The plans, which target both individual users and enterprise clients, offer access to more advanced features and higher usage limits, marking a significant expansion of the company's services in the Indian market.", "category": "Technology", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130514", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-07-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/130514"}], "article_id": "7d223661"}, {"headline": "Rupee falls past 96 per Dollar as oil prices surge", "summary": "The Indian Rupee hit a new low against the US Dollar, crossing the 96 mark for the first time in two months. The decline is attributed to rising crude oil prices and heavy demand from importers. The 10-year government bond yield also rose to 6.79%. RBI's dollar sales were ineffective in curbing the slide, raising concerns about increasing inflationary pressure.", "category": "Economy", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/130553", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-07-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130553"}], "article_id": "45848b2a"}, {"headline": "RBI issues revised guidelines for bank boards focusing on strategy", "summary": "The Reserve Bank of India has issued new directives for bank boards to prioritize strategy and risk management. Effective October 1, 2026, board chairs will determine agendas, and boards must periodically review critical issues. The rules apply to both public and private sector banks to improve corporate governance and ensure management provides adequate information for decision-making.", "category": "Business", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130553", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-07-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130553"}], "article_id": "7a3c922d"}, {"headline": "El Nino causes 21 percent drop in India's hydroelectricity production", "summary": "A weak southwest monsoon due to El Nino has significantly reduced water levels in reservoirs, leading to a 21% decline in hydroelectricity production in June 2026. Data from the Central Electricity Authority shows output fell to 13,361 GWh compared to last year. The trend continued into July, with production staying below historical averages and daily targets.", "category": "Environment", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130553", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-07-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/130553"}], "article_id": "23d210aa"}, {"headline": "Retail and hospitality sectors lead growth in service production index", "summary": "The Ministry of Statistics and Programme Implementation reported that hospitality and food services grew by 37.2% in April 2026. Retail trade followed with 30.8% growth. Conversely, air transport saw a 13.9% decline. The Service Sector Production Index aims to bridge data gaps in the service industry, which now accounts for more than half of India's GDP.", "category": "Economy", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130553", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-07-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/130553"}], "article_id": "34e6a9f3"}, {"headline": "BIRAC selects biotech startups for research and development fund", "summary": "The Biotechnology Industry Research Assistance Council (BIRAC) selected 7-8 startups for the government's Rs 1 lakh crore RDI fund. Chosen firms include FarmaBaux Bio, Revelations Biotech, and C6 Energy. These companies will receive an average investment of Rs 25 crore for projects involving cellulosic enzymes, seaweed feedstock, and metabolic engineering to boost domestic bio-investment.", "category": "Business", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130553", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-07-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/130553"}], "article_id": "1e8fafb1"}, {"headline": "TVS Bajaj and Ather dominate Indian electric two-wheeler market", "summary": "Established manufacturers TVS Motor, Bajaj Auto, and Hero MotoCorp, along with Ather Energy, captured 96% market share in the electric two-wheeler segment in early 2026. While the industry grew 53.3% overall, former market leader Ola Electric saw its share drop to 6.8% as its monthly registrations fell significantly compared to the previous year.", "category": "Business", "page": 6, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130553", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130553"}], "article_id": "bc46e20f"}, {"headline": "India Post reports 22 percent revenue growth in first quarter", "summary": "Communications Minister Jyotiraditya Scindia announced that India Post earned over Rs 4,000 crore in Q1 FY27, a 22% increase year-on-year. The department achieved 81% of its revenue target. Growth was driven by various segments, with citizen-centric services recording the highest growth at 86%. Top-performing circles included Andhra Pradesh, Chhattisgarh, and West Bengal.", "category": "Business", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130553", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130553"}], "article_id": "63baf384"}, {"headline": "Mylan sells entire stake in Biocon for 3679 crore rupees", "summary": "Mylan, a subsidiary of Viatris, sold its entire 5.64% stake in Biocon through block deals for approximately Rs 3,679 crore. The shares were purchased by major institutional investors including HDFC Mutual Fund, ICICI Prudential, and Kotak Mahindra. Following the news, Biocon's share price jumped 6.5% on the BSE as long-term selling uncertainty ended.", "category": "Business", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130553", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130553"}], "article_id": "f4c2d957"}, {"headline": "IFSC proposes direct listing in GIFT City without public IPOs", "summary": "The IFSCA has proposed allowing companies to list equity shares directly on GIFT City exchanges without a prior public offering. The move aims to make GIFT City a global capital-raising hub. Eligible companies must meet financial criteria regarding revenue or profit. The proposal includes mechanisms for price discovery and requires Indian firms to maintain 10% public shareholding.", "category": "Business", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130553", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-07-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/130553"}], "article_id": "84a04774"}, {"headline": "Edelweiss Mutual Fund to launch India's first Nifty REITs index fund", "summary": "Edelweiss Mutual Fund has received regulatory approval to launch an index fund tracking the Nifty REITs and Realty Index. This follows SEBI's decision to allow REITs in equity indices. The fund will provide investors a way to invest in commercial real estate with professional management and liquidity. Other asset management companies are also considering similar passive funds.", "category": "Business", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130553", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-07-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/130553"}], "article_id": "fd85969a"}, {"headline": "Private bank stocks outperform public sector peers in current fiscal", "summary": "Nifty Private Bank Index has risen 17% in FY27, doubling the 8.4% gain of Nifty 50. Analysts attribute the outperformance to improved asset quality and narrowing funding gaps via FCNR(B) deposits. While stocks like Yes Bank and RBL rose up to 50%, PSU banks like Bank of Mahar
