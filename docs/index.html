}, {"headline": "Four foreign women escape from Doddagubbi refugee shelter by breaking window", "summary": "Four foreign nationals from Uganda and Burundi escaped a refugee shelter in Doddagubbi in the early hours of May 11. The women, who were being held for overstaying and alleged illegal activities, escaped by breaking a window grill. The facility was run by a charitable organization under FRRO supervision. Police are currently searching for the escapees.", "category": "India", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/124037", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124037"}], "article_id": "7dbef80a"}, {"headline": "Bengaluru man booked for sexual assault of cow after viral video", "summary": "The Cottonpet police have registered a case against an unidentified man for engaging in an unnatural sexual act with a cow. The incident, which occurred in Akkipete on May 5, came to light after a video surfaced on social media. Police are using CCTV footage and the vehicle number seen in the video to trace the accused.", "category": "India", "page": 4, "importance": 2, "telegram_url": "https://t.me/c/1877410077/124037", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124037"}], "article_id": "c7eba4fe"}, {"headline": "Textile transport costs double between Bengaluru and major hubs Mumbai, Ahmedabad", "summary": "Transport rates for raw textiles from Bengaluru to Mumbai, Surat, and Ahmedabad have risen from ₹350 to over ₹700 per 60-kg shipment. Traders attribute the hike to rising commercial LPG prices and recent fuel tax increases in Karnataka. Processing units, which use LPG for dyeing and finishing, report a 10% rise in costs, threatening to disrupt the apparel production cycle.", "category": "Economy", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124037", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/124037"}], "article_id": "b006cbd5"}, {"headline": "BJP alleges irregularities in Karnataka agricultural course practical examinations", "summary": "Leader of the Opposition R. Ashok has demanded a re-exam and probe into KEA practical exams for agricultural courses held on May 10. The BJP cited suspicious results where 74 students at a single centre in Hiriyur scored full marks, compared to only 24 across the rest of the 16 centres. The party alleged lapses in the conduct of the exams impacting rural students.", "category": "Education", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124037", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/124037"}], "article_id": "df6d1c7b"}, {"headline": "Yatnal vows to counter hijab with saffron shawls in classrooms", "summary": "Expelled BJP MLA Basanagouda Patil Yatnal criticized the Karnataka government’s decision to allow hijab in educational institutions. He stated he would encourage students to wear saffron shawls and tilaks to school in protest. Yatnal also challenged Chief Minister Siddaramaiah to lower fuel prices in the state following the recent tax hike on petrol and diesel.", "category": "Politics", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124037", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/124037"}], "article_id": "0e51399d"}, {"headline": "H.D. Kumaraswamy defends fuel price hike; slams Congress for state tax increases", "summary": "Union Minister H.D. Kumaraswamy defended the Centre's fuel price management, citing global crude oil volatility. He criticized the Karnataka Congress government for increasing taxes on fuel, electricity, and liquor to fund guarantee schemes. Speaking at a JD(S) convention, he expressed confidence in the party winning 75 seats in the next Assembly elections.", "category": "Politics", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124037", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/124037"}], "article_id": "d70e9030"}, {"headline": "V.D. Satheesan defends IUML as secular force against hate campaign", "summary": "Kerala Chief Minister-designate V.D. Satheesan slammed 'hate propaganda' against the Indian Union Muslim League (IUML). He described the party as a secular and stabilising force in Kerala's history. Satheesan emphasized that the UDF mandate is a rejection of communal division and vowed to counter attempts to portray the IUML as an anti-secular outfit.", "category": "Politics", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124037", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/124037"}], "article_id": "7f3353fe"}, {"headline": "Sixth Philanthropy Asia Summit opens in Singapore to drive climate, health solutions", "summary": "The sixth Philanthropy Asia Summit (PAS) begins in Singapore with the theme 'Asian Innovation, Global Good'. Over 250 global leaders, including World Bank President Ajay Banga and Dr. Soumya Swaminathan, will discuss cross-sector partnerships for climate action and healthcare. The summit focuses on scaling Asian innovations to address global challenges through technology and financing.", "category": "Economy", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124037", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/124037"}], "article_id": "e1d9b6a6"}, {"headline": "Trans Feminist Collective launched in Bengaluru to advocate for gender justice", "summary": "On International Day Against Homophobia, Biphobia and Transphobia, the Trans Feminist Collective (TFC) was launched in Bengaluru. The platform unites transgender persons, feminists, and Dalit rights groups. Key speakers criticized the Transgender Persons Act of 2026 for its restrictive 'Hijra' identity framework and called for political and social assertion of equality and human dignity.", "category": "Culture", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124037", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/124037"}], "article_id": "954c0a34"}, {"headline": "North East Division police return 692 stolen mobile phones to owners", "summary": "Bengaluru's North East Division police returned 692 recovered mobile phones, valued at ₹1.75 crore, to their rightful owners. The devices were traced using the CEIR portal. During the event, police also warned the public about rising cybercrimes, including online investment frauds and phishing links, urging citizens to report incidents via the 1930 helpline.", "category": "India", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/124037", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/124037"}], "article_id": "a0ac0abe"}, {"headline": "Jairam Ramesh warns Great Nicobar project is recipe for ecological disaster", "summary": "Senior Congress leader Jairam Ramesh wrote to Defence Minister Rajnath Singh objecting to the Great Nicobar Island Development Project. Ramesh argued that the proposed transshipment port and township would cause irreparable ecological damage without significantly enhancing military capability. He suggested trebling the runway at INS Baaz as a less destructive alternative for defense needs.", "category": "Environment", "page": 11, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124037", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/124037"}], "article_id": "4d22ccce"}, {"headline": "INDIA bloc face uncertainty as regional allies clash with Congress growth", "summary": "The INDIA bloc faces internal tension as regional allies like the DMK and TMC express unease over the Congress's long-term goal to rebuild itself as the primary national pole. Recent shifts in Tamil Nadu and West Bengal highlight a conundrum where allies want a strong Congress at the Centre but are unwilling to cede ground in state-level politics.", "category": "Politics", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124037", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/124037"}], "article_id": "eaaf8296"}, {"headline": "Parth Pawar meets Devendra Fadnavis amid reports of internal NCP rift", "summary": "NCP MP Parth Pawar met Maharashtra Deputy CM Devendra Fadnavis, sparking speculation of internal tension within the Ajit Pawar-led NCP. While Fadnavis termed it a routine meeting about administrative issues, sources suggest friction over party control and the upcoming Rajya Sabha vacancy. NCP-SP leaders have reportedly asked Sharad Pawar to intervene in the growing 'misunderstanding'.", "category": "Politics", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124037", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/124037"}], "article_id": "164ba3d3"}, {"headline": "Mamata Banerjee condemns bulldozer politics; defends poor against eviction drives", "summary": "West Bengal CM Mamata Banerjee stated that the state does not believe in 'bulldozer politics' following recent eviction drives in Kolkata and Howrah. She alleged that demolitions of structures built by daily wage workers and street vendors attack the dignity of the people. The remarks follow the use of bulldozers to dismantle an illegal factory in Tiljala after a fatal fire.", "category": "Politics", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124037", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/124037"}], "article_id": "09bca7e3"}, {"headline": "Ladakh L-G rationalises wages for daily wagers and seasonal employees", "summary": "Ladakh Lieutenant Governor Vinai Kumar Saxena announced a major wage hike for daily wagers and part-time workers in the Union Territory. Under the new matrix, skilled workers will earn ₹575 per day, and unskilled workers will receive ₹450 per day. The move addresses long-standing grievances of workers who were previously paid as little as ₹300 per month in government departments.", "category": "Economy", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124037", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/124037"}], "article_id": "6d36485e"}, {"headline": "Netherlands returns Chola-era Anaimangalam copper plates to India", "summary": "In a historic repatriation, the Netherlands returned a set of Chola-era copper plates, known as the Leiden plates, to India. The 11th-century artefacts record land grants made by Raja Raja Chola I and Rajendra Chola I to a Buddhist vihara in Nagapattinam. The plates, held by Leiden University for two centuries, were presented during PM Modi's visit to The Hague.", "category": "Culture", "page": 12, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124037", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/124037"}], "article_id": "2b4174e4"}, {"headline": "Education Ministry defends on-screen marking system for Class 12 evaluation", "summary": "The Union Education Ministry and CBSE defended the new on-screen marking (OSM) system following student concerns over marking accuracy. Officials stated that OSM improves transparency and allows for quicker re-evaluation. To address concerns, the board reduced the re-evaluation fee to ₹100 and manually checked 13,000 answer sheets where scanning legibility was an issue.", "category": "Education", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124037", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/124037"}], "article_id": "293e86e6"}, {"headline": "Nalanda University integrates ancient 'Sastrartha' debate tradition into convocation", "summary": "Nalanda University has formally revived the ancient Indian tradition of 'Sastrartha', a form of philosophical and intellectual debate. The initiative, 'Sastrartha 2026', features 23 thematic panels covering Hindu studies, archaeology, and international relations. It serves as a platform for dissertation defense and scholarly discourse during the university's third convocation.", "category": "Culture", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124037", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/124037"}], "article_id": "7ed2120b"}, {"headline": "Woman disrobed and paraded near Mumbai over temple entry dispute", "summary": "Police arrested two women in Ulhasnagar for disrobing and parading a 50-year-old woman with a garland of slippers. The assault followed a dispute over a caste panchayat's ban on the victim's Rajput family entering a local temple. The victim was paraded for two kilometres after her family objected to the restrictions during a community feast. Several other suspects are currently absconding.", "category": "India", "page": 12, "importance": 4, "telegram_url": "https://t.me/c/1877410077/124037", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/124037"}], "article_id": "0527eb84"}, {"headline": "Trump warns Iran 'nothing left' unless peace deal is reached quickly", "summary": "U.S. President Donald Trump warned Tehran of total destruction if it does not agree to a peace deal with the United States. Hostilities have persisted despite an April truce, with U.S. and Israeli forces launching strikes since February. Washington's latest proposal demands Iran operate only one nuclear site and transfer its enriched uranium stockpile to the U.S., which Iran has rejected.", "category": "World", "page": 14, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124037", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/124037"}], "article_id": "716d21bd"}, {"headline": "Palestinian President's son Yasser Abbas elected to Fatah leadership body", "summary": "Yasser Abbas, son of President Mahmoud Abbas, won a seat on Fatah's top decision-making committee during the movement's first congress in a decade. Imprisoned leader Marwan Barghouti also retained his seat with the highest number of votes. The election faces criticism for lacking a new political vision for the West Bank and Gaza amid the ongoing existential challenges facing the movement.", "category": "World", "page": 14, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124037", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/124037"}], "article_id": "f9608ae3"}, {"headline": "Philippines asks Supreme Court to allow ICC arrest of drug war enforcer", "summary": "The Philippine government has petitioned its Supreme Court to permit the arrest of Senator Ronald Dela Rosa for trial in the ICC. The ICC recently unsealed a warrant against Dela Rosa, accusing him of crimes against humanity during his time as chief enforcer of former President Rodrigo Duterte's deadly war on drugs. The move signifies a shift in Manila's cooperation with the international court.", "category": "World", "page": 14, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124037", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/124037"}], "article_id": "ec64b724"}, {"headline": "Families seek release of 20 Kuki and Naga captives in Manipur", "summary": "Families of 14 abducted Kuki-Zo members and six Nagas have appealed for their safe release as deadlines for government action expired. The captives were taken by suspected extremists following the killing of three church leaders. The United Naga Council has threatened an inter-district economic blockade along National Highways in Manipur if the Naga hostages are not rescued immediately.", "category": "India", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124037", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/124037"}], "article_id": "46866ab9"}, {"headline": "Donald Trump's China visit aims for strategic stability amid global tumult", "summary": "President Donald Trump's visit to Beijing focused on restoring stability after years of trade wars and strategic competition. Discussions with Xi Jinping covered market access for US agricultural products, Boeing aircraft, and semiconductors. While no major deals were signed, both leaders signaled a desire to avoid confrontation over Taiwan and energy security as the West Asia crisis persists.", "category": "World", "page": 23, "importance": 9, "telegram_url": "https://t.me/c/1877410077/124037", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 23, "telegram_url": "https://t.me/c/1877410077/124037"}], "article_id": "51276cef"}, {"headline": "PM Modi's Netherlands visit yields 17 key cooperation pacts", "summary": "Prime Minister Narendra Modi's visit to the Netherlands resulted in 17 outcomes across migration, green hydrogen, and defense. Both nations discussed the Ukraine war and regional stability. India highlighted its stance on the Strait of Hormuz conflict. The PM also interacted with the Indian diaspora, where he was welcomed with a Bengali-themed reception.", "category": "Politics", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "af65f308"}, {"headline": "One in three cybercrimes in Karnataka is an investment scam", "summary": "Investment fraud has emerged as the leading category of cybercrime in Karnataka, accounting for 30% of cases reported in 2026. Data shows 1,324 cases were registered between January and April alone. Common tactics include fraudulent WhatsApp trading groups and task-based scams. Losses from these frauds reached Rs 1,821 crore in 2025, up from Rs 2.4 lakh in earlier years.", "category": "Law", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "cc6d95c4"}, {"headline": "PIO gets 14-year jail for abusing 61 women in Australia", "summary": "A 41-year-old Indian-origin massage therapist, Alok Kumar Pathak, was sentenced to 13 years and 10 months in prison by a US court for sexually abusing 61 women over nine months. Pathak surreptitiously filmed the victims and was caught following a sting operation. He will be eligible for parole in 2035 and is expected to be deported after serving his sentence.", "category": "Law", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "8ea054ae"}, {"headline": "India readies first privately built C-295 military aircraft", "summary": "The first C-295 military transport aircraft manufactured by the Tata-Airbus consortium has been assembled at the Vadodara facility and is ready for test flights. This marks the first time a military aircraft is being produced by a private firm in India. Under the Rs 21,935 crore deal, 40 aircraft will be made in India to replace the IAF's aging Avro-748 fleet.", "category": "Infrastructure", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "f39f7564"}, {"headline": "Study: India home to 35% of 'dirtier and richer' cities", "summary": "A global study of 902 cities found that India dominates the 'dirtier and richer' category, where economic growth coincides with rising NO2 pollution. About 35.4% of Indian cities analyzed, including Delhi and Kolkata, showed this trend between 2019 and 2024. Researchers linked the pollution to fossil-fuelled transport and power industries in rapidly urbanizing areas.", "category": "Environment", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "dd6990ac"}, {"headline": "HC: Banks cannot freeze accounts over internal society disputes", "summary": "The Karnataka High Court ruled that banks have no authority to freeze accounts based on internal management disputes of a society. The court directed Canara Bank to defreeze eight savings and five fixed deposit accounts of the Dakshina Kannada District Petitioners Society. The judge stated that such coercive actions by banks are premature and without legal authority.", "category": "Law", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "27bcfc1b"}, {"headline": "Four Ugandan women escape from Bengaluru detention center", "summary": "Four Ugandan women detained for drug peddling charges escaped from a private detention center in Kothanur by breaking window grills. The women were being held due to a lack of space in government facilities. Police have launched an investigation into the security lapse at the ashram, which was used to house detainees after a similar escape attempt months ago.", "category": "India", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "0592e25d"}, {"headline": "Tumakuru tennis center brings global sport to small towns", "summary": "The Karnataka State Lawn Tennis Association (KSLTA) is expanding tennis infrastructure to tier-two cities like Tumakuru and Mandya. Tumakuru recently hosted an ITF W35 tournament, signaling a return to the global tennis map after 14 years. KSLTA plans to develop 10 more district centers with all-weather courts to tap into regional talent and promote sports beyond Bengaluru.", "category": "Sports", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "56a282e7"}, {"headline": "Bengaluru traffic history: The city's first one-way roads", "summary": "A historical look at Bengaluru's traffic management reveals that Subedar Chatram Road was the city's first one-way street, introduced in 1965 to manage growing congestion in Gandhinagar. Other major roads like Dhanvanthri Road followed. The street was named after Subedar Chatram, a rest house built by a military officer to accommodate travelers in the early 20th century.", "category": "Infrastructure", "page": 2, "importance": 3, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "2e6a362e"}, {"headline": "Bengaluru man loses Rs 2.4 lakh to fake call center", "summary": "A 32-year-old Bengaluru resident was duped of Rs 2.4 lakh by a fraudulent customer care center. After booking a resort on Agoda and facing issues, the victim called a number found online. Scammers convinced him to install a malicious APK file, which allowed them to siphon money from his account via multiple UPI transactions. Police have registered a case of cyber fraud.", "category": "Law", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "220174ee"}, {"headline": "Relief eludes 200 Kogilu families 30 months after demolition", "summary": "Nearly 200 families whose houses were demolished in Yelahanka's Kogilu Layout in 2022 are still waiting for government rehabilitation. Despite promises from officials, the displaced residents, mostly Dalits and farmers, are living in tents without basic amenities. The families have planned an indefinite protest as housing allotments remain stuck in administrative delays.", "category": "Infrastructure", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "9835c5f1"}, {"headline": "JP Nagar residents enjoy music and fitness at Happy Streets", "summary": "The Times of India's Happy Streets initiative returned to JP Nagar, drawing large crowds for a morning of yoga, music, and community activities. Panduranga Nagar residents participated in dance performances, a pet show, and street games. The event aims to promote healthy lifestyles and reclaim public spaces for residents to socialize and engage in creative activities.", "category": "Culture", "page": 2, "importance": 3, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "59af24e3"}, {"headline": "Tea shop owner killed over Rs 200 unpaid bill", "summary": "A 40-year-old tea shop owner in Dodda Ballapur was bludgeoned to death by a customer over an unpaid bill of Rs 200. The suspect, Muniyappa, allegedly grew angry when the owner, Manjunatha, asked for the money. Muniyappa has been arrested for murder. Onlookers reportedly failed to intervene during the attack. The police are investigating the incident as a crime of passion.", "category": "India", "page": 3, "importance": 4, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "e3855e04"}, {"headline": "Father and two sons drown in Kolar farm pond", "summary": "Tragedy struck a family in Kolar as a man and his two sons, aged 15 and 9, drowned in a farm pond in Nakkanahalli village. The family was on an outing when the children entered the pond to swim and struggled. The father attempted to rescue them, but all three succumbed. Local authorities have warned of pond hazards and requested better fencing around irrigation tanks.", "category": "India", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "3e91a886"}, {"headline": "Realtor alleges threat calls from fugitive don Vicky Shetty", "summary": "A 54-year-old realtor in Bengaluru filed a police complaint alleging he received death threats from fugitive underworld don Vicky Shetty. The caller reportedly demanded money and warned the realtor not to participate in a local wedding. Vicky Shetty, a former associate of Chhota Rajan, is believed to be operating from abroad and has over a dozen criminal cases against him.", "category": "Law", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "fc475420"}, {"headline": "Blind gaur at Shivamogga zoo recovers after surgery", "summary": "An adult gaur that went blind after being rescued from a village in Chikkamagaluru is recovering at Shivamogga's Tyavarekoppa Lion and Tiger Safari. Specialists performed a successful eye surgery to restore its vision. The animal is currently in a quarantine zone and will be moved to a customized 'crawl area' once fully healed. Zoo officials are monitoring its progress closely.", "category": "Environment", "page": 3, "importance": 3, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "55301a6a"}, {"headline": "TSRTC official robbed of cash and phones at knifepoint", "summary": "Three miscreants robbed a Telangana State Road Transport Corporation (TSRTC) official of Rs 3,000 and two mobile phones in Bengaluru. The victim was walking to his office near the KSRTC bus terminal when he was intercepted and threatened with a knife. Police are scanning CCTV footage from the Majestic area to identify the suspects and have registered a case of robbery.", "category": "India", "page": 3, "importance": 4, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "84c6a43d"}, {"headline": "BMTC staff receive full 26-month salary arrears", "summary": "Around 100 BMTC employees at the Yeshwanthpur depot were pleasantly surprised to receive their full 26-month salary arrears due to a clerical error. The corporation intended to pay only a portion of the arrears but released the entire amount. BMTC has since notified the staff and requested them to return the excess funds to ensure correct accounting and distribution.", "category": "Business", "page": 3, "importance": 4, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "6a936b78"}, {"headline": "Belagavi man duped of Rs 19.5 lakh in stock scam", "summary": "A man from Belagavi lost Rs 19.5 lakh after being lured into a fraudulent stock trading scheme via a WhatsApp group. Scammers shared fake screenshots of high returns and convinced the victim to transfer funds to multiple bank accounts. When he tried to withdraw his supposed profits, the group admin blocked him. A complaint has been filed with the local cybercrime unit.", "category": "Law", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "2f1f461f"}, {"headline": "Street plays in Bengaluru promote waste segregation", "summary": "As part of the Swachh Bharat Mission Urban 2.0, several street plays were organized across Bengaluru to educate residents on waste segregation and plastic reduction. The initiative, led by local NGOs and municipal authorities, targeted busy areas like Church Street and Lalbagh. Volunteers also took a pledge to maintain cleanliness and identified local 'black spots' for cleanup.", "category": "Environment", "page": 3, "importance": 3, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "bca581ae"}, {"headline": "Urban voter mapping in Karnataka sees slow progress", "summary": "A socio-economic survey mapping exercise in Karnataka's urban clusters, particularly Bengaluru, is lagging behind rural areas. Data shows BBMP's central and north zones have only completed 64.5% and 67.3% of the SIR (Special Intensive Revision) mapping respectively. Election officials have directed BBMP to accelerate the process to ensure an accurate voter roll for the 2026 elections.", "category": "Politics", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "2241d03a"}, {"headline": "DK Shivakumar accuses HD Kumaraswamy of real estate bias", "summary": "Karnataka Deputy CM D.K. Shivakumar criticized JDS leader H.D. Kumaraswamy, alleging his opposition to the Bidadi 'SIR' project is a pretext to protect his own real estate interests. Shivakumar claimed Kumaraswamy owns large land holdings in the project area and is trying to block development that would benefit the public. The political spat follows the unveiling of the Mega Tech City.", "category": "Politics", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "31ef9c59"}, {"headline": "Residents in Kudremukh forest must relocate, says Minister", "summary": "Forest Minister Eshwar Khandre stated that approximately 1,300 families living within the Kudremukh National Park must relocate to mitigate human-wildlife conflict. So far, 350 families have accepted a compensation package of Rs 15 lakh each to move out. The government has allocated Rs 20 crore for the relocation process, which aims to protect the sensitive ecosystem and tribal rights.", "category": "Environment", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "10ee5748"}, {"headline": "Ballari thermal plant sets new power generation record", "summary": "The Ballari Thermal Power Station (BTPS) outperformed the Raichur plant, generating 944 million units of electricity in April to meet Karnataka's peak summer demand. This accounted for nearly 35% of the state's total thermal power. Despite low water levels in reservoirs, BTPS maintained high output, helping the state manage its electricity requirements during the heatwave.", "category": "Infrastructure", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "f3e14320"}, {"headline": "Tension in Kodagu over building used for religious conversion", "summary": "Protests erupted in Kodagu after reports emerged of a building being used for illegal religious conversions. Local groups and residents gathered to oppose the activities, leading to police intervention. Authorities have temporarily locked the premises while an investigation is conducted into the nature of the gatherings and whether any legal violations occurred.", "category": "India", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "a1759d9a"}, {"headline": "Writers slam government's SIR revision at literary festival", "summary": "The two-day Sahitya Mela in Hubballi concluded with writers and activists criticizing the Karnataka government's Special Intensive Revision (SIR) mapping. Speakers alleged the process is being used for land grabs and marginalizing Dalit and minority communities. The festival featured discussions on social justice and the need for more inclusive urban planning policies.", "category": "Culture", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "f47fa439"}, {"headline": "Rail passengers lose phones to thieves in Andhra", "summary": "Two individuals from Andhra Pradesh were arrested for stealing mobile phones from passengers at Bengaluru's KR Pura railway station. The Railway Protection Force (RPF) recovered five high-end smartphones worth Rs 2.5 lakh from the suspects. The arrests followed a complaint by a passenger who lost her phone while boarding a train. Police are investigating their links to other thefts.", "category": "India", "page": 5, "importance": 4, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "6b00abc8"}, {"headline": "Unauthorised sheep market sheds removed in Bengaluru", "summary": "Municipal authorities in Bengaluru North removed several illegal sheds and temporary structures used for an unauthorized sheep market. The operation was part of a drive to clear encroachments from public roads and footpaths. Officials stated that these illegal markets cause traffic congestion and hygiene issues, and more such drives are planned across the city.", "category": "Infrastructure", "page": 5, "importance": 3, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "cd204ad9"}, {"headline": "Union Minister's son faces repeated rape charge in Telangana", "summary": "Telangana police added a charge of 'repeated rape' against a Union Minister's son in an ongoing sexual assault case. The accused is currently in judicial custody until May 29. The additional charge under Section 64(2)(m) of BNS carries a minimum sentence of 20 years. The case involves the alleged assault of a minor girl at a farmhouse near Hyderabad earlier this month.", "category": "Law", "page": 6, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "d0b7c3fe"}, {"headline": "IGL hikes Delhi CNG price for second time", "summary": "Indraprastha Gas Limited (IGL) increased the price of Compressed Natural Gas (CNG) in Delhi by Re 1 per kg, marking the second hike in three days. The new price in the national capital is Rs 88.09 per kg. Prices were also raised in Noida and Ghaziabad. Officials attributed the hike to rising input costs and geopolitical tensions impacting global energy supplies.", "category": "Economy", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "cf37bd93"}, {"headline": "Violent protest in Kolkata against bulldozer demolition drive", "summary": "A protest against a municipal demolition drive in Kolkata turned violent, leaving 10 police officers and several residents injured. Protesters threw stones at police vehicles in the Park Circus area, leading to a baton charge and the detention of 21 people. The residents were protesting the removal of unauthorized structures in the Tiljala neighborhood, claiming they were not given notice.", "category": "India", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "a7b2e1a7"}, {"headline": "Chinese national arrested for illegal entry into Bihar", "summary": "A Chinese man, identified as Yao Shuzhang, was arrested by the Sashastra Seema Bal (SSB) for illegally entering Bihar through the Nepal border. Shuzhang claimed he was a toy trader visiting India for business, but he lacked a valid visa or passport. Authorities found a suspicious map in his possession. He has been handed over to local police for further interrogation.", "category": "India", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "add92343"}, {"headline": "The NEET Crisis: Retest causes anxiety for young Indians", "summary": "The decision to hold a retest for NEET-UG 2026 has triggered widespread anxiety and burnout among students across India. Following allegations of paper leaks and irregularities, lakhs of aspirants are now forced to repeat months of intense preparation. Psychologists report a surge in distress cases as families face financial strain and students grapple with uncertainty about their future.", "category": "Education", "page": 10, "importance": 9, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "7ed6bb23"}, {"headline": "Rajasthan teacher blows whistle on NEET paper leak", "summary": "A chemistry teacher in Sikar, Rajasthan, alerted authorities to a potential NEET-UG paper leak after finding a suspicious PDF file on a student's phone. The whistleblower's report led to a CBI investigation into coaching centers and organized paper leak gangs. The incident has raised serious questions about the security of national entrance exams and the pressure on students to succeed.", "category": "Education", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "5ca08d0f"}, {"headline": "India expresses concern over Hormuz conflict at United Nations", "summary": "India's representative to the UN, P. Harish, voiced concerns over the impact of maritime conflict in the Strait of Hormuz on global trade and energy security. Speaking at an ECOSOC meeting, India emphasized that international law must be respected to ensure the safety of commercial shipping. The statement follows recent attacks on tankers that have disrupted supply chains.", "category": "Politics", "page": 11, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "084ea5a3"}, {"headline": "Government: No fresh Ebola case in India since 2014", "summary": "The Indian Health Ministry confirmed that there have been no fresh Ebola cases in the country since a single incident in 2014. Despite global concerns over recent outbreaks in Congo and Uganda, the government stated that India maintains robust surveillance and screening protocols at international airports. Health experts reassured the public that there is no immediate risk of an outbreak.", "category": "Health", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "579a0d7f"}, {"headline": "Study: Trees cut city heat but fail poorest regions", "summary": "A global study of 150 cities found that while urban tree cover can reduce temperatures by up to 0.5°C, the benefits are least present in the poorest, hottest regions. Cities in wealthier nations have significantly more tree cover than those in the global south. Researchers urged cities to prioritize planting in low-income neighborhoods to combat the 'urban heat island' effect effectively.", "category": "Environment", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "92c004c4"}, {"headline": "AI can detect pancreatic cancer three years earlier: Study", "summary": "Researchers at the Mayo Clinic have developed an AI model capable of identifying pancreatic cancer up to three years before traditional diagnosis. The tool analyzed over 2,000 CT scans and correctly identified 73% of early-stage tumors. This breakthrough could significantly improve survival rates for one of the deadliest forms of cancer by enabling much earlier intervention.", "category": "Science", "page": 12, "importance": 9, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "0e6109bd"}, {"headline": "New 'water battery' could last nearly 300 years", "summary": "Chinese scientists have developed a lithium-water battery that is reportedly safer and more durable than traditional ion-lithium batteries. The new design uses a water-based electrolyte and could last for up to 300 years of charge-discharge cycles. The non-toxic, non-flammable battery is being hailed as a major step toward sustainable grid-scale energy storage.", "category": "Science", "page": 12, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "a28de1bc"}, {"headline": "Longer summers fuel toxic algae growth in Ladakh lake", "summary": "A study of Tsoltak, a glacial lake in Ladakh, shows that climate-driven longer summers are fueling the growth of microscopic algae. Researchers from the Agharkar Research Institute found that rising temperatures and shorter freezing periods are altering the lake's ecosystem. This could lead to toxic blooms that threaten local wildlife and water quality in the high-altitude region.", "category": "Environment", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "fa22344a"}, {"headline": "Salesforce rewrites job roles to incorporate AI skills", "summary": "Salesforce is redesigning thousands of job roles to integrate AI capabilities into everyday workflows. The company is retraining employees in AI fluency and data literacy, focusing on 'agent' roles where AI handles repetitive tasks. CEO Arundhati Bhattacharya stated that the move is essential for future growth and maintaining a competitive edge in the global tech landscape.", "category": "Technology", "page": 15, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124103", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/124103"}], "article_id": "e011cb29"}, {"headline": "India Plans Financial Support for Long-Duration Energy Storage Technologies", "summary": "Under 'India Battery Storage Vision 2047', India is developing a viability gap funding scheme for long-duration energy storage (LDES). The initiative aims to store renewable energy for eight hours or more using pumped hydro, flow batteries, and compressed air. This addresses the gap between green energy generation and storage capacity, utilizing surplus power for night-time grid stability.", "category": "Infrastructure", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124067"}, {"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/124125"}], "importance": 9, "article_id": "9b90a7ce"}, {"headline": "Prudential to Acquire 75% Stake in Bharti Life Insurance for ₹3,500 Crore", "summary": "UK-based Prudential Plc will acquire a 75% stake in Bharti Life Insurance from Bharti Life Ventures and 360 ONE for ₹3,500 crore, with a potential ₹700 crore additional payout. To comply with regulations, Prudential will reduce its stake in ICICI Prudential Life to below 10%. The deal follows India allowing 74% FDI in insurers and 100% in intermediaries, signaling sector consolidation.", "category": "Business", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/124067"}, {"newspaper": "Business Line", "pdf_filename": "BL Bangalore 18-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124065"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124091"}, {"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124087"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124103"}], "importance": 8, "article_id": "2f560c4a"}, {"headline": "Government Digitizes Environmental Clearances for Industrial Projects via PARIVESH Portal", "summary": "The Union environment ministry has moved the certification and compliance reporting process for industrial expansion projects online through the PARIVESH portal. The digital shift aims to reduce paperwork and procedural delays by allowing businesses to track approval status on a single platform. Officials will use geo-tagged on-site inspections to enhance transparency and speed up approvals.", "category": "Environment", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/124067"}, {"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/124125"}], "importance": 6, "article_id": "342a6bf4"}, {"headline": "Government Plans Dedicated FASTags for Toll-Exempt Military and Police Vehicles", "summary": "The Centre is developing a separate category of FASTags for vehicles exempt from highway tolls, such as those used by the armed forces and police. Part of a move toward barrier-free tolling using AI-enabled number plate recognition and satellite tracking, these dedicated tags will allow seamless passage through Multi-Lane Free Flow corridors without triggering penalties or e-challans.", "category": "Infrastructure", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/124067"}, {"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/124125"}], "importance": 6, "article_id": "fc1a37aa"}, {"headline": "Finland's ICEYE to Establish Satellite Manufacturing Hub in India", "summary": "Space intelligence leader ICEYE plans to set up its first Asia-Pacific production facility in India within a year. The hub will manufacture small satellites for defense, surveillance, and environmental monitoring, with an investment in the tens of millions of dollars. The facility aims to produce 10 satellites in its first year, eventually scaling up to 40 units annually.", "category": "Technology", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/124067"}, {"newspaper": "Business Line", "pdf_filename": "BL Bangalore 18-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124065"}], "importance": 8, "article_id": "99ccd872"}, {"headline": "JSW Steel Targets 80 Million Tonne Capacity via Global Strategic Partnerships", "summary": "JSW Steel aims to reach a production capacity of 80 million tonnes per annum by 2032, positioning itself as one of the top two steelmakers outside China. Supported by partnerships with JFE Steel and POSCO, the expansion involves investments exceeding ₹2 trillion. A ₹37,250 crore deal with JFE for Bhushan Power & Steel has already helped deleverage the company's balance sheet.", "category": "Business", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/124067"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124091"}], "importance": 8, "article_id": "dfaace92"}, {"headline": "Uber CEO Identifies India as Key Growth Market for Global Investment", "summary": "Uber CEO Dara Khosrowshahi emphasized that India is a vital investment market that could become the company's largest within a decade. Uber is expanding into two-wheelers, bike taxis, and food delivery while experimenting with driver subscription models. Despite current losses in India, the company is utilizing global profits to reinvest and explore partnerships for autonomous vehicles.", "category": "Business", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/124067"}, {"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124087"}], "importance": 8, "article_id": "ca78e31c"}, {"headline": "India and Netherlands Elevate Ties to Strategic Partnership With 17 Pacts", "summary": "Prime Minister Narendra Modi and Dutch PM Rob Jetten upgraded bilateral relations to a strategic partnership, signing 17 agreements in defense, semiconductors, and green energy. A key deal involves Tata Electronics and ASML to support India's chip mission. While discussing trade and navigation in the Strait of Hormuz, the leaders also addressed regional stability and human rights concerns.", "category": "Politics", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/124067"}, {"newspaper": "Business Line", "pdf_filename": "BL Bangalore 18-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124065"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/124091"}, {"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/124037"}], "importance": 9, "article_id": "2ac5e02d"}, {"headline": "Drone Strike Hits Perimeter of UAE Barakah Nuclear Plant; No Radiation Leak", "summary": "A drone attack targeted the United Arab Emirates’ Barakah nuclear power plant, sparking a fire at an electrical generator near the perimeter. Officials reported no radiological impact or injuries, and all four reactors remain operational. While no group claimed responsibility, the incident amid stalled US-Iran peace talks underscores the fragility of regional energy infrastructure.", "category": "World", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/124067"}, {"newspaper": "Business Line", "pdf_filename": "BL Bangalore 18-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/124065"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/124091"}, {"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/124037"}], "importance": 9, "article_id": "12074dca"}, {"headline": "WHO Declares Global Health Emergency Over Rare Ebola Strain in Africa", "summary": "The World Health Organization has declared the Ebola outbreak in the Democratic Republic of Congo and Uganda a public health emergency of international concern. The outbreak, involving the rare Bundibugyo strain for which no approved vaccine exists, has caused 88 deaths and over 300 suspected cases. WHO officials warned of high international risk but advised against closing borders.", "category": "Health", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/124067"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/124091"}, {"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124125"}, {"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124087"}, {"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124037"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/124103"}], "importance": 10, "article_id": "30020e78"}, {"headline": "Ordinance Issued to Increase Supreme Court Sanctioned Strength to 38 Judges", "summary": "The government has issued an ordinance to increase the sanctioned strength of the Supreme Court from 34 to 38 judges, including the Chief Justice. This move aims to address a backlog of over 92,000 pending cases and facilitate more constitution benches. The ordinance, following a request from CJI Surya Kant, amends the Supreme Court Act and will be presented in the next Parliament session.", "category": "Law", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/124067"}, {"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124125"}, {"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124037"}], "importance": 9, "article_id": "06c818d6"}, {"headline": "Hero MotoCorp to Invest ₹1,500 Crore to Double Scooter Production Capacity", "summary": "Hero MotoCorp has earmarked a ₹1,500 crore capital expenditure for FY27 to double its scooter production capacity and reach monthly volumes of 100,000 units for top models. Additionally, the company will invest ₹700 crore in a new global parts center in South India. CEO Harshavardhan Chitale confirmed the expansion targets rising demand in both domestic and global markets.", "category": "Business", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/124067"}, {"newspaper": "Business Line", "pdf_filename": "BL Bangalore 18-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124065"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124091"}, {"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/124125"}], "importance": 7, "article_id": "faac05ec"}, {"headline": "NCLAT Rules for Separate Insolvency Proceedings for Videocon Group Entities", "summary": "The National Company Law Appellate Tribunal (NCLAT) has set aside a previous order to consolidate the insolvency proceedings of Videocon Industries and Videocon Oil Ventures. The tribunal ruled that the entities require independent resolution strategies due to their distinct business natures. Bharat PetroResources (BPRL) has already acquired the oil venture, while the parent case remains.", "category": "Law", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 18-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124065"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124091"}, {"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/124087"}], "importance": 6, "article_id": "a78e4fd9"}, {"headline": "V.D. Satheesan to be Sworn in as Kerala Chief Minister on Monday", "summary": "Congress leader V.D. Satheesan will be sworn in as Kerala’s Chief Minister on Monday leading a 20-member UDF cabinet. The ministry includes 11 members from Congress and five from the IUML. Facing a ₹4.8 trillion debt, Satheesan's government plans a 'blue economy' roadmap to transform Kerala into a port hub. Thiruvanchoor Radhakrishnan has been appointed Assembly Speaker.", "category": "Politics", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 18-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124065"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/124091"}, {"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124125"}], "importance": 8, "article_id": "958e7e7a"}, {"headline": "IGL Increases CNG Prices in Delhi-NCR for Second Time in 48 Hours", "summary": "Indraprastha Gas Limited (IGL) has raised compressed natural gas (CNG) prices by ₹1 per kg, marking the second increase in two days. The new price in Delhi is ₹80.09 per kg, while rates in Noida and Ghaziabad rose to ₹88.70. IGL attributed the hike to rising input gas costs and the appreciation of the US dollar, though it claims CNG remains significantly cheaper than alternative fuels.", "category": "Economy", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 18-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124065"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124091"}, {"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/124037"}], "importance": 7, "article_id": "250c31f4"}, {"headline": "India Negotiates Bilateral Energy Transit Corridors With Iran to Bypass Hormuz", "summary": "India and other major Asian oil importers are negotiating bilateral transit corridors with Iran to secure energy supplies amid the closure of the Strait of Hormuz. According to Moody’s Ratings, while these routes aim to bypass regional volatility and diversify imports, a return to pre-war traffic volumes is unlikely in 2026. The oil market is expected to remain supply-constrained.", "category": "World", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124091"}, {"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/124087"}], "importance": 8, "article_id": "8796ebdf"}, {"headline": "Fire Breaks Out on Delhi-Bound Rajdhani Express; 68 Passengers Safely Evacuated", "summary": "Two coaches of the Thiruvananthapuram-New Delhi Rajdhani Express caught fire near Ratlam, Madhya Pradesh, on Sunday morning. All 68 passengers in the affected B-1 coach were safely evacuated within 15 minutes, assisted by an automatic fire suppression system. No injuries were reported, though luggage was gutted and rail traffic on the Mumbai-Delhi route was disrupted for seven hours.", "category": "India", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124091"}, {"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124125"}, {"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/124037"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124103"}], "importance": 8, "article_id": "24fab3a7"}, {"headline": "Indian Worker Killed in Large-Scale Ukrainian Drone Attack Near Moscow", "summary": "A massive Ukrainian drone strike involving hundreds of UAVs targeted the Moscow region, killing four people, including one Indian worker. The Indian Embassy confirmed the death and noted three other Indians were hospitalized. While debris fell on major airports, President Zelenskyy called the strikes justified retaliation. Russian defenses reportedly intercepted over 500 drones.", "category": "World", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/124091"}, {"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124125"}, {"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/124037"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124103"}], "importance": 9, "article_id": "3cacb53b"}, {"headline": "Nepal's Kami Rita Sherpa Scales Mount Everest for Record 32nd Time", "summary": "Renowned Nepali guide Kami Rita Sherpa, 56, has reached the summit of Mount Everest for the 32nd time, breaking his own world record. Known as the 'Mountain Goat,' he achieved the feat via the Southeast Ridge route while guiding a private expedition. Since his first ascent in 1994, Kami Rita has become a historic milestone in mountain tourism and Sherpa contribution.", "category": "World", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/124091"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/124103"}], "importance": 8, "article_id": "b31d2624"}, {"headline": "Bulgaria Wins 70th Eurovision Song Contest With Dara's 'Bangaranga'", "summary": "Bulgarian singer Dara Yotova won the 70th Eurovision Song Contest in Italy with her track 'Bangaranga,' marking the country's first-ever victory. Israel's Noam Bettan finished second in an event marked by political tension and boycotts by five nations over the Gaza conflict. The competition, watched by 180 million people, remains the world's largest live music event.", "category": "Culture", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/124091"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/124103"}], "importance": 6, "article_id": "43e5ae25"}, {"headline": "Noel Tata Appointed Tata Trusts Chairman Amid Regulatory Restraint on Meetings", "summary": "Noel Naval Tata has been unanimously chosen to lead Tata Trusts following the death of Ratan Tata. However, the Maharashtra Charity Commissioner has restrained the board from holding its next meeting following complaints regarding trustee appointments and tenure. While the trusts support a third term for Chairman N Chandrasekaran, they remain opposed to the public listing of Tata Sons.", "category": "Business", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 21, "telegram_url": "https://t.me/c/1877410077/124091"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/124103"}], "importance": 9, "article_id": "ba1e9cea"}, {"headline": "UAE Intercepts Drones Targeting Barakah Nuclear Plant; Substation Fire Extinguished", "summary": "The UAE defense ministry intercepted drones targeting the Barakah nuclear power plant in Abu Dhabi. While a fire broke out at an electrical substation, officials reported no radiological leaks or safety threats. IAEA chief Rafael Grossi expressed grave concern over the incident, which marks the first drone attack on a nuclear facility in the Arab world amid heightened regional tensions.", "category": "World", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124125"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124103"}], "importance": 10, "article_id": "254eadb0"}, {"headline": "India and Sweden Elevate Ties to Strategic Partnership During PM Modi's Visit", "summary": "Prime Minister Narendra Modi and Swedish PM Ulf Kristersson upgraded bilateral relations to a strategic partnership with a joint action plan for 2026-2030. Focusing on defense, AI, and green transition, Sweden also conferred its highest civilian honor, the Royal Order of the Polar Star, on Modi. Discussions also included the India-EU Free Trade Agreement and doubling trade in five years.", "category": "Politics", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124125"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124103"}], "importance": 9, "article_id": "f64d1e7a"}, {"headline": "CBSE Significantly Reduces Fees for Answer Sheet Re-evaluation and Verification", "summary": "The CBSE has sharply reduced fees for Class 10 and 12 post-result processes to address concerns over the digital evaluation system. The fee for obtaining answer sheet photocopies has dropped (to ₹100-₹500 range), and marks verification fell to ₹100. The board also promised full refunds of these fees if a student's marks increase after the review, making the process more accessible.", "category": "Education", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124125"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_18-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/124103"}], "importance": 7, "article_id": "c78897a0"}, {"headline": "CBI Arrests Two in Patna as NEET-UG Paper Leak Probe Expands", "summary": "The CBI has made its first arrests in Patna and expanded questioning to parents in Maharashtra suspected of paying intermediaries up to ₹25 lakh for leaked NEET-UG papers. Investigators believe some parents further circulated solved papers to recover costs. This follows the Union Education Ministry transferring the probe to the CBI amid nationwide protests against the NTA.", "category": "Law", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124125"}, {"newspaper": "Indian Express", "pdf_filename": "IE-Delhi-May-18-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124027"}], "importance": 9, "article_id": "fa4b7e4e"}, {"headline": "Violent Clashes in Kolkata's Park Circus Over Prayer Restrictions and Evictions", "summary": "At least three police officers were injured during violent clashes at Kolkata’s Park Circus intersection. Protesters demonstrated against an anti-encroachment demolition drive and new restrictions on public road prayers and mosque microphone use. Police conducted flag marches and used baton charges to disperse the stone-pelting crowd. Tensions were also reported in the Rajabazar area.", "category": "India", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124125"}, {"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/124037"}], "importance": 6, "article_id": "0b3d568b"}, {"headline": "Karnataka Man Arrested for Murdering Teenage Daughter Over Relationship Dispute", "summary": "A man in Tumakuru, Karnataka, was arrested for allegedly murdering his 17-year-old daughter, Meghana, after opposing her relationship with a relative. Thimmarayappa reportedly pushed the girl into a well, threw stones at her, and buried the body near his farm. He initially filed a missing person complaint to mislead police but confessed during questioning.", "category": "India", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124125"}, {"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/124037"}], "importance": 3, "article_id": "4ba5908b"}, {"headline": "New Bengaluru-Mumbai Express Flagged Off; Vande Bharat Sleeper Service Announced", "summary": "Union Railway Minister Ashwini Vaishnaw virtually flagged off a new express service between SMVT Bengaluru and Lokmanya Tilak Terminus. He also announced that a Vande Bharat Sleeper service between the cities will commence soon. Additionally, the minister highlighted the redevelopment of 61 stations in Karnataka and progress on two corridors of the Bengaluru Suburban Railway Project.", "category": "Infrastructure", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124125"}, {"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124037"}], "importance": 6, "article_id": "5643e012"}, {"headline": "Rajinikanth Clarifies Meeting With MK Stalin Was Personal, Not Political", "summary": "Megastar Rajinikanth dismissed speculation regarding his recent meeting with MK Stalin, asserting their friendship is purely social const CAT_META = {"Politics": {"color": "#e8334a", "icon": "🏛️"}, "Economy": {"color": "#f5a623", "icon": "📊"}, "Business": {"color": "#f0c040", "icon": "💼"}, "India": {"color": "#ff7043", "icon": "🇮🇳"}, "World": {"color": "#5c9eff", "icon": "🌍"}, "Sports": {"color": "#36c46f", "icon": "🏆"}, "Science": {"color": "#a78bfa", "icon": "🔬"}, "Technology": {"color": "#38bdf8", "icon": "💻"}, "Health": {"color": "#34d399", "icon": "🏥"}, "Law": {"color": "#fb923c", "icon": "⚖️"}, "Environment": {"color": "#4ade80", "icon": "🌿"}, "Education": {"color": "#e879f9", "icon": "📚"}, "Culture": {"color": "#f472b6", "icon": "🎭"}, "Infrastructure": {"color": "#94a3b8", "icon": "🏗️"}};

const allArts = [...DIGEST.articles].sort((a,b)=>(b.importance||0)-(a.importance||0));
const byCategory = {};
for (const art of allArts) {
  const c = art.category||"India";
  if (!byCategory[c]) byCategory[c]=[];
  byCategory[c].push(art);
}
const sortedCats = Object.keys(byCategory).sort(
  (a,b)=>(byCategory[b][0].importance||0)-(byCategory[a][0].importance||0)
);

// FIXED DEEP LINK HANDLER - Runs IMMEDIATELY
let deepLinkTarget = null;
function handleDeepLink() {
  const hash = window.location.hash;
  if (!hash || !sortedCats.length) return;
  
  const cleanHash = hash.startsWith('#article-') ? hash.slice(9) : hash.slice(1);
  const targetArticle = DIGEST.articles.find(art => art.article_id === cleanHash);
  
  if (targetArticle) {
    deepLinkTarget = {article: targetArticle, hash: cleanHash};
  }
}
handleDeepLink();

let catIdx=0,vpW=0,vpH=0;
const panels=[];
const outer=document.getElementById('outer');
const hTrack=document.getElementById('hTrack');

const hintRight=document.getElementById('hintRight');
const catFlash=document.getElementById('catFlash');
const cfIcon=document.getElementById('cfIcon');
const cfName=document.getElementById('cfName');

function buildAll() {
  vpW=outer.offsetWidth; vpH=outer.offsetHeight;
  hTrack.innerHTML=''; panels.length=0;
  sortedCats.forEach((cat,ci)=>{
    const m=CAT_META[cat]||{color:"#e8334a",icon:"📰"};
    const arts=byCategory[cat];
    const panel=document.createElement('div');
    panel.className='cat-panel';
    panel.id=`cat-panel-${ci}`;
    panel.style.setProperty('--cc',m.color);
    panel.innerHTML=`<div class="progress-row" id="prow-${ci}" style="--cc:${m.color}"></div><div class="v-feed" id="vfeed-${ci}"><div class="v-track" id="vtrack-${ci}"></div></div>`;
    hTrack.appendChild(panel);
    const pRow=panel.querySelector(`#prow-${ci}`);
    const vFeed=panel.querySelector(`#vfeed-${ci}`);
    const vTrack=panel.querySelector(`#vtrack-${ci}`);
    const cardH=vFeed.getBoundingClientRect().height||vpH;
    
    arts.forEach((art,ai)=>{
      const card = buildCard(art, cardH, m, cat, ai);
      card.id = `article-${art.article_id}`;
      card.dataset.articleId = art.article_id;
      vTrack.appendChild(card);
    });
    
    panels.push({pRow,vFeed,vTrack,articles:arts,artIdx:0});
    buildPRow(ci);
  });
  
  hTrack.style.transition='none';
  hTrack.style.transform='translateX(0)';
  syncV(0,false);
  
  // FIXED: Apply deep link after build
  if (deepLinkTarget) {
    setTimeout(() => applyDeepLink(deepLinkTarget), 100);
  }
}

function buildCard(art,h,m,cat,articleIndex) {
  const src=art.sources?.[0];
  const href=src?.pdf_filename?`pdfs/${src.pdf_filename}#page=${src.page}`:(src?.telegram_url||'#');
  const card=document.createElement('div');
  card.className='card';
  card.dataset.articleId = art.article_id;
  card.style.height=h+'px';
  card.style.setProperty('--cc',m.color);
  card.innerHTML=`
    <div class="card-content">
      <div class="card-toprow">
        <div class="cat-pill">
          <div class="pill-icon"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="1" y="1" width="8" height="2" rx="0.6" fill="#888"/><rect x="1" y="4.5" width="5" height="1.5" rx="0.6" fill="#666"/><rect x="1" y="7" width="6" height="1.5" rx="0.6" fill="#666"/></svg></div>
