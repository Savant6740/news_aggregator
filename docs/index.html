<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Inter', -apple-system, sans-serif;
  background: #0c0c0c; color: #fff; touch-action: none;
}
.outer { position: fixed; inset: 0; overflow: hidden; }
.h-track { display: flex; height: 100%; will-change: transform; }
.cat-panel { flex-shrink:0; width:100vw; height:100%; display:flex; flex-direction:column; overflow:hidden; }
.progress-row { flex-shrink:0; display:flex; gap:4px; padding:14px 16px 10px; background:#0c0c0c; position:relative; z-index:5; overflow:visible; }
.progress-row::after { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:80%; height:120px; background:radial-gradient(ellipse at top,color-mix(in srgb,var(--cc) 30%,transparent) 0%,transparent 70%); pointer-events:none; z-index:-1; }
.pseg { flex:1; height:2px; border-radius:1px; background:rgba(255,255,255,0.12); position:relative; overflow:hidden; }
.pseg::after { content:''; position:absolute; inset:0; background:var(--cc,#e8334a); transform:scaleX(0); transform-origin:left; transition:transform 0.25s ease; }
.pseg.done::after, .pseg.active::after { transform:scaleX(1); }
.v-feed { flex:1; overflow:hidden; position:relative; clip-path:inset(0); }
.v-track { display:flex; flex-direction:column; will-change:transform; }
.card { 
  width:100%; flex-shrink:0; background:#0c0c0c; display:flex; flex-direction:column; 
  overflow:hidden; position:relative; 
  scroll-margin-top: 80px;
}
.card.target-highlight {
  background: linear-gradient(135deg, #fff3cd22 0%, #ffeaa722 100%) !important;
  box-shadow: 0 0 30px rgba(255, 193, 7, 0.4);
  border: 2px solid #f39c12;
  animation: pulse-highlight 2s ease-in-out;
}
@keyframes pulse-highlight {
  0%, 100% { box-shadow: 0 0 30px rgba(255, 193, 7, 0.4); }
  50% { box-shadow: 0 0 50px rgba(255, 193, 7, 0.6); }
}
.card-content { flex:1; display:flex; flex-direction:column; padding:36px 20px 22px; min-height:0; position:relative; z-index:1; }
.card-toprow { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; flex-shrink:0; }
.cat-pill { display:inline-flex; align-items:center; gap:7px; background:#1c1c1e; border-radius:8px; padding:7px 12px 7px 10px; font-size:11.5px; font-weight:700; letter-spacing:0.07em; color:#d0d0d0; text-transform:uppercase; line-height:1; }
.pill-icon { width:16px; height:16px; background:#2e2e30; border-radius:3px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.pill-icon svg { display:block; }
.card-date { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:500; color:#666; letter-spacing:0.01em; }
.card-headline { font-size:28px; font-weight:800; line-height:1.18; color:#fff; letter-spacing:-0.03em; margin-bottom:20px; flex-shrink:0; }
.card-summary { font-size:15.5px; font-weight:400; line-height:1.62; color:#6b6b6b; flex:1; overflow:hidden; display:-webkit-box; -webkit-line-clamp:7; -webkit-box-orient:vertical; }
.card-divider { height:1px; background:#1e1e1e; margin:20px 0 16px; flex-shrink:0; }
.card-footer { display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.src-chip { display:inline-flex; align-items:center; gap:6px; background:#181818; border:1px solid #282828; border-radius:9px; padding:8px 13px; font-size:12.5px; font-weight:600; color:#c0c0c0; text-decoration:none; letter-spacing:0.005em; line-height:1; }
.src-chip-sep { color:#3a3a3a; font-weight:400; }
.src-chip-pg { color:#555; font-weight:500; }
.src-chip-ext { margin-left:2px; }
.src-chip-ext svg { display:block; }
.info-btn { width:36px; height:36px; border-radius:50%; border:1.5px solid #252525; background:#141414; display:flex; align-items:center; justify-content:center; color:#555; cursor:pointer; flex-shrink:0; }
.cat-flash { position:fixed; inset:0; z-index:600; pointer-events:none; opacity:0; transition:opacity 0.12s; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; }
.cat-flash.on { opacity:1; }
.cf-icon { font-size:34px; }
.cf-name { font-size:22px; font-weight:900; letter-spacing:-0.03em; text-transform:uppercase; }
.hint { position:fixed; display:flex; flex-direction:column; align-items:center; gap:5px; pointer-events:none; z-index:400; opacity:0; transition:opacity 0.6s ease; }
.hint.visible { opacity:1; }
.hint.gone { opacity:0 !important; transition:opacity 0.4s; }
.hint-pill { font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.55); background:rgba(255,255,255,0.07); backdrop-filter:blur(10px); padding:5px 13px; border-radius:100px; border:1px solid rgba(255,255,255,0.09); }
.hint-arr { font-size:16px; color:rgba(255,255,255,0.4); }
.h-up { bottom:28px; left:50%; transform:translateX(-50%); animation:bUp 2s ease-in-out infinite; }
.h-right { top:50%; right:14px; transform:translateY(-50%); animation:bRight 2s ease-in-out infinite 0.6s; }
@keyframes bUp { 0%,100% { bottom:28px; opacity:.65; } 50% { bottom:36px; opacity:1; } }
@keyframes bRight { 0%,100% { right:14px; opacity:.65; } 50% { right:6px; opacity:1; } }

<script>
const DIGEST   = {"date": "23 May 2026", "articles": [{"headline": "RBI to pay record ₹2.87 trillion dividend to Central government", "summary": "The RBI board approved a record dividend of ₹2.87 trillion for FY26 to the Centre. It also increased its contingency risk buffer by ₹1.09 trillion to ₹91.97 trillion. The transfer, representing 90.8% of the government's budgeted non-tax revenue, aims to support public finances amid volatile oil prices and global economic risks. The bank's balance sheet expanded by 20.6% year-on-year.", "category": "Economy", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/124625", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 23-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124625"}], "article_id": "52083454"}, {"headline": "Climate change makes Himalayan trekking and climbing increasingly dangerous", "summary": "Rapid warming in the Himalayas, occurring at 0.34°C per decade above 4,000m, has disrupted traditional seasons. In August 2025, unseasonal rainfall in Ladakh caused floods and destroyed trails. Reports from Icimod indicate snow cover is 27.8% below normal. Glaciers like Chhota Shigri are losing mass rapidly, increasing risks of glacial lake outburst floods and avalanches.", "category": "Environment", "page": 8, "importance": 9, "telegram_url": "https://t.me/c/1877410077/124625", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 23-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/124625"}], "article_id": "df6909e2"}, {"headline": "Dalmia Bharat acquires Jaiprakash Associates cement assets for ₹2,850 crore", "summary": "Dalmia Bharat Ltd has succeeded in its third attempt to acquire cement units from Jaiprakash Associates, currently owned by the Adani Group, for ₹2,850 crore. The deal includes plants in Madhya Pradesh and Uttar Pradesh with a total capacity of 5.2 mtpa. The acquisition will boost Dalmia’s total capacity to 54.7 mtpa, strengthening its presence in central India.", "category": "Business", "page": 13, "importance": 9, "telegram_url": "https://t.me/c/1877410077/124625", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 23-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/124625"}], "article_id": "71f669b3"}, {"headline": "LTM acquires Randstad’s technology units in Europe and Australia for $186 million", "summary": "LTM Ltd (formerly LTIMindtree) is acquiring Randstad’s technology and consulting subsidiaries in France, Germany, Belgium, Luxembourg, and Australia for $186 million. The move adds roughly $500 million in annual revenue and expands LTM's footprint in aerospace, automotive, and BFS sectors. The deal is LTM's first major acquisition since the parent company's IT units merged.", "category": "Business", "page": 13, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124625", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 23-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/124625"}], "article_id": "c7232eb6"}, {"headline": "Sun Pharma reports 12% revenue growth but expects softer FY27", "summary": "Sun Pharmaceutical Industries reported an 11.9% rise in FY26 revenue to ₹58,220 crore, while consolidated net profit grew 5% to ₹11,479.4 crore. However, management projected high single-digit growth for FY27 due to regulatory challenges and a lack of major planned launches. US innovative medicine sales exceeded $1.1 billion, though domestic formulations remains the largest contributor.", "category": "Business", "page": 13, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124625", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 23-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/124625"}], "article_id": "657fef2c"}, {"headline": "India to host Quad foreign ministers meeting on May 26", "summary": "India is set to host the foreign ministers of the Quad security alliance—comprising Australia, Japan, the United States, and India—on May 26. The meeting, which coincides with US Secretary of State Marco Rubio's visit, aims to strengthen cooperation in the Asia-Pacific region. The alliance is widely viewed as a strategic counterweight to China's presence in the Indian Ocean.", "category": "Politics", "page": 13, "importance": 9, "telegram_url": "https://t.me/c/1877410077/124625", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 23-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/124625"}], "article_id": "1efe0aaa"}, {"headline": "Kevin Warsh sworn in as 17th chair of Federal Reserve", "summary": "Kevin Warsh was sworn in as the 17th chair of the US Federal Reserve during a White House ceremony. President Donald Trump emphasized that Warsh would lead the central bank independently, downplaying concerns of political pressure on monetary policy decisions. Warsh's leadership comes as markets monitor global energy supply disruptions and long-term US borrowing costs.", "category": "World", "page": 13, "importance": 9, "telegram_url": "https://t.me/c/1877410077/124625", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 23-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/124625"}], "article_id": "45ef5a39"}, {"headline": "US naval blockade of Iran tests global oil storage limits", "summary": "A five-week U.S. naval blockade has trapped much of Iran’s oil, forcing the country to store crude in onshore tanks and offshore tankers. Analysts estimate Iranian storage capacity is currently between 57% and 90% full. The blockade has significantly reduced Iran’s sea-borne exports, testing the regime’s endurance and impacting global energy supplies and inflation in the West.", "category": "World", "page": 16, "importance": 9, "telegram_url": "https://t.me/c/1877410077/124625", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 23-05-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/124625"}], "article_id": "37d1a3a1"}, {"headline": "Health Ministry brings Pregabalin under Schedule H1 to curb abuse", "summary": "The Union health ministry has classified the nerve pain drug Pregabalin under the stricter Schedule H1 category to combat growing recreational abuse. Starting in 180 days, the drug can only be sold against a stamped prescription, and pharmacists must maintain detailed records of patients and doctors for three years. Packaging must also display a red 'Rx' symbol and risk warnings.", "category": "Health", "page": 14, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124625", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 23-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/124625"}], "article_id": "bcd7ac4e"}, {"headline": "Tata Motors and Stellantis partner for Jeep models and US tech", "summary": "Stellantis NV has agreed to use Tata Motors Passenger Vehicles' platform for its future Jeep models. Additionally, Tata’s Jaguar Land Rover (JLR) unit has signed a non-binding MoU with Stellantis to conduct a feasibility study for a technology partnership in the US. The collaboration aims to reduce development costs and explore synergies in vehicle architecture and software stacks.", "category": "Business", "page": 14, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124625", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 23-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/124625"}], "article_id": "e3267909"}, {"headline": "Delhi High Court provides interim relief to IndiGo in GST dispute", "summary": "The Delhi High Court has protected InterGlobe Aviation (IndiGo) from coercive action regarding a ₹458.26 crore GST demand. The dispute involves credit notes worth ₹2,000 crore received from a foreign engine supplier as compensation for grounded aircraft. The court observed that, prima facie, these payments appear to be compensation for losses rather than a taxable \"supply\" of services.", "category": "Law", "page": 14, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124625", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 23-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/124625"}], "article_id": "b02e66db"}, {"headline": "Hindalco FY26 profit falls 16% on Novelis fire expenses", "summary": "Hindalco Industries Ltd reported a 16% decline in FY26 net profit to ₹13,391 crore. The drop was primarily caused by ₹6,963 crore in one-off expenses at its US subsidiary, Novelis, following fires at its Oswego plant. Despite the profit dip, consolidated revenue rose 15% to ₹2.75 trillion, supported by strong domestic aluminum sales and firm copper realizations.", "category": "Business", "page": 15, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124625", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 23-05-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/124625"}], "article_id": "7ee9c13c"}, {"headline": "Non-tech firms invest in Global Capability Centres and data centers", "summary": "Companies like Uber, LG India, and Macrotech Developers (Lodha) are increasingly investing in Global Capability Centres (GCC) and data center infrastructure. Uber has partnered with the Adani Group for a center in Ahmedabad, while Lodha has committed ₹1.3 trillion for a 2.5GW data center park. The shift aims to leverage AI and automation tools to enhance business operations.", "category": "Technology", "page": 13, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124625", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 23-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/124625"}], "article_id": "783dd6a1"}, {"headline": "Government proposes new framework for highway concessionaire substitution", "summary": "The Ministry of Road Transport and Highways is introducing a revised framework for \"harmonious substitution\" in BoT (toll) projects. The changes aim to prevent large contractors from using proxies to maintain control and to give the government more oversight when developers face financial stress or delays. The move is intended to ensure projects are completed on time and improve quality.", "category": "Infrastructure", "page": 13, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124625", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 23-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/124625"}], "article_id": "f8b42745"}, {"headline": "India and Cyprus elevate ties to strategic partnership level", "summary": "Prime Minister Narendra Modi and Cyprus President Nikos Christodoulides have elevated bilateral relations to a strategic partnership. The two nations have established a joint task force to deepen cooperation in infrastructure, shipping, and investment. The move follows wide-ranging talks in New Delhi aimed at strengthening diplomatic and economic bonds between the two countries.", "category": "Politics", "page": 13, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124625", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 23-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/124625"}], "article_id": "8dbf935c"}, {"headline": "IMD issues severe heatwave forecast for northern and central India", "summary": "The India Meteorological Department (IMD) has forecast intense to severe heatwave conditions across north-west, central, and eastern India for the next week. Temperatures in some regions are expected to stay above 42 degrees Celsius. The Union power ministry has advised citizens to use electricity judiciously as the country faces record power demand during the extreme weather.", "category": "Environment", "page": 13, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124625", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 23-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/124625"}], "article_id": "7564110e"}, {"headline": "Capital Group builds $2 billion stake in Adani Group companies", "summary": "Global investment firm Capital Group has increased its exposure to Adani Group firms to over $2 billion. The firm has simultaneously pared its holdings in Reliance Industries Ltd, signaling a shift in foreign investor preference between India's largest conglomerates. The pivot comes as global funds recalibrate their portfolios in the Indian market.", "category": "Business", "page": 13, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124625", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 23-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/124625"}], "article_id": "1345ffcf"}, {"headline": "Bharti Enterprises seeks UK approval to raise BT Group stake", "summary": "Bharti Enterprises is seeking UK government approval to increase its stake in BT Group to as much as 29.9%. The Indian telecom group aims to raise its holding just below the threshold that would trigger a mandatory full takeover offer. The move follows Bharti's previous acquisition of a significant stake in the British telecom giant.", "category": "Business", "page": 13, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124625", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 23-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/124625"}], "article_id": "94d83b11"}, {"headline": "AI firm C5i revives plans for ₹1,200 crore initial public offering", "summary": "AI-led analytics firm C5i (formerly Course5 Intelligence) has restarted preparations for an IPO to raise between ₹1,000 crore and ₹1,200 crore. The company is in talks with investment banks, including ICICI Securities, for a potential listing in the next 12–18 months. C5i had previously shelved its 2022 listing attempt due to unfavorable market conditions.", "category": "Business", "page": 15, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124625", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 23-05-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/124625"}], "article_id": "31eedd3c"}, {"headline": "PCOS renamed to Polyendocrine Metabolic Ovarian Syndrome to improve care", "summary": "Medical experts have renamed Polycystic Ovarian Syndrome (PCOS) as Polyendocrine Metabolic Ovarian Syndrome (PMOS). The change aims to shift focus from ovarian cysts to the broader metabolic and endocrine impacts of the condition, which affects 170 million individuals globally. Experts hope the new name will lead to more holistic treatment and earlier screening for insulin resistance.", "category": "Health", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124625", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 23-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124625"}], "article_id": "51be9e5d"}, {"headline": "Rare Satyajit Ray colour portraits featured at Delhi photography exhibition", "summary": "A new exhibition at DAG in Delhi features rare colour portraits of filmmaker Satyajit Ray, captured by photographer Nemai Ghosh. The collection spans Ray's creative life from 1968 to 1992, showing the director at work on sets and in his home study. The show includes handwritten screenplays and production paraphernalia, offering a fresh perspective on Ray's cinematic legacy.", "category": "Culture", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124625", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 23-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/124625"}], "article_id": "232d8c17"}, {"headline": "Sikkim filmmaker Tribeny Rai’s debut feature ‘Shape of Momo’ to release", "summary": "Director Tribeny Rai’s debut feature film, Shape of Momo, is set for a theatrical release on May 29. The film explores gender norms and family dynamics in Sikkim through the story of a young woman returning home. It uses the cultural significance of the momo to discuss societal pressures. The production is supported by executive producers Zoya Akhtar and Reema Kagti.", "category": "Culture", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124625", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 23-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/124625"}], "article_id": "0020a05a"}, {"headline": "Unregulated trekking causing severe ecological damage to Himalayan trails", "summary": "The surge in mass-market trekking has led to overcrowding and pollution on popular Himalayan trails like Kedarkantha and Hampta Pass. Issues include improper waste disposal, trampling of meadows, and contaminated water sources. While some regions like Stok Kangri have been closed to visitors, experts call for stricter government-led management policies to protect fragile ecosystems.", "category": "Environment", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124625", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 23-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/124625"}], "article_id": "176157e6"}, {"headline": "Priya Kapur moves High Court for access to husband’s frozen estate", "summary": "Priya Kapur, widow of late industrialist Sunjay Kapur, has filed a fresh application in the Delhi High Court seeking access to frozen family funds. She requested permission to withdraw money from her husband's EPF account and joint overseas bank accounts to cover educational expenses for his children. The case is part of an ongoing legal battle over an estate valued at ₹30,000 crore.", "category": "Law", "page": 14, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124625", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 23-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/124625"}], "article_id": "043aa540"}, {"headline": "Rare Pied hornbill sighting in Delhi’s Lodhi Gardens sparks interest", "summary": "A rare Pied hornbill was recently sighted in Delhi’s Lodhi Gardens, a significant deviation from its usual forest habitat. Conservation biologist Neha Sinha noted the bird was seen feeding Grey hornbill chicks, an unusual inter-species behavior. The sighting highlights the importance of mature native trees in urban spaces for supporting biodiversity and idiosyncratic wildlife behavior.", "category": "Environment", "page": 3, "importance": 4, "telegram_url": "https://t.me/c/1877410077/124625", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 23-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124625"}], "article_id": "c4d890c1"}, {"headline": "LG India expects mid-teen revenue growth in FY27", "summary": "LG Electronics India expects revenue growth in the mid-teens for FY27 despite market struggles with raw material costs and inflation. The company reported a 1% revenue growth to ₹24,605 crore in FY26. To mitigate currency and commodity fluctuations, LG is increasing localization, with 95% of products now produced in India and 55% of components sourced locally.", "category": "Business", "page": 15, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124625", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 23-05-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/124625"}], "article_id": "7d0c66d9"}]};
const CAT_META = {"Politics": {"color": "#e8334a", "icon": "🏛️"}, "Economy": {"color": "#f5a623", "icon": "📊"}, "Business": {"color": "#f0c040", "icon": "💼"}, "India": {"color": "#ff7043", "icon": "🇮🇳"}, "World": {"color": "#5c9eff", "icon": "🌍"}, "Sports": {"color": "#36c46f", "icon": "🏆"}, "Science": {"color": "#a78bfa", "icon": "🔬"}, "Technology": {"color": "#38bdf8", "icon": "💻"}, "Health": {"color": "#34d399", "icon": "🏥"}, "Law": {"color": "#fb923c", "icon": "⚖️"}, "Environment": {"color": "#4ade80", "icon": "🌿"}, "Education": {"color": "#e879f9", "icon": "📚"}, "Culture": {"color": "#f472b6", "icon": "🎭"}, "Infrastructure": {"color": "#94a3b8", "icon": "🏗️"}};

// FIXED: Pre-build data structures IMMEDIATELY for deep linking
const allArts = [...DIGEST.articles].sort((a,b)=>(b.importance||0)-(a.importance||0));
const byCategory = {};
for (const art of allArts) {
  const c = art.category||"India";
  if (!byCategory[c]) byCategory[c]=[];
  byCategory[c].push(art);
}
const sortedCats = Object.keys(byCategory).sort(
  (a,b)=>(byCategory[b][0].importance||0)-(byCategory[a][0].importance||0)
);

// FIXED DEEP LINK HANDLER - Runs IMMEDIATELY
let deepLinkTarget = null;
function handleDeepLink() {
  const hash = window.location.hash;
  if (!hash || !sortedCats.length) return;
  
  const cleanHash = hash.startsWith('#article-') ? hash.slice(9) : hash.slice(1);
  const targetArticle = DIGEST.articles.find(art => art.article_id === cleanHash);
  
  if (targetArticle) {
    deepLinkTarget = {article: targetArticle, hash: cleanHash};
  }
}
handleDeepLink();

let catIdx=0,vpW=0,vpH=0;
const panels=[];
const outer=document.getElementById('outer');
const hTrack=document.getElementById('hTrack');
const hintUp=document.getElementById('hintUp');
const hintRight=document.getElementById('hintRight');
const catFlash=document.getElementById('catFlash');
const cfIcon=document.getElementById('cfIcon');
const cfName=document.getElementById('cfName');

function buildAll() {
  vpW=outer.offsetWidth; vpH=outer.offsetHeight;
  hTrack.innerHTML=''; panels.length=0;
  sortedCats.forEach((cat,ci)=>{
    const m=CAT_META[cat]||{color:"#e8334a",icon:"📰"};
    const arts=byCategory[cat];
    const panel=document.createElement('div');
    panel.className='cat-panel';
    panel.id=`cat-panel-${ci}`;
    panel.style.setProperty('--cc',m.color);
    panel.innerHTML=`<div class="progress-row" id="prow-${ci}" style="--cc:${m.color}"></div><div class="v-feed" id="vfeed-${ci}"><div class="v-track" id="vtrack-${ci}"></div></div>`;
    hTrack.appendChild(panel);
    const pRow=panel.querySelector(`#prow-${ci}`);
    const vFeed=panel.querySelector(`#vfeed-${ci}`);
    const vTrack=panel.querySelector(`#vtrack-${ci}`);
    const cardH=vFeed.getBoundingClientRect().height||vpH;
    
    arts.forEach((art,ai)=>{
      const card = buildCard(art, cardH, m, cat, ai);
      card.id = `article-${art.article_id}`;
      card.dataset.articleId = art.article_id;
      vTrack.appendChild(card);
    });
    
    panels.push({pRow,vFeed,vTrack,articles:arts,artIdx:0});
    buildPRow(ci);
  });
  
  hTrack.style.transition='none';
  hTrack.style.transform='translateX(0)';
  syncV(0,false);
  
  // FIXED: Apply deep link after build
  if (deepLinkTarget) {
    setTimeout(() => applyDeepLink(deepLinkTarget), 100);
  }
}

function buildCard(art,h,m,cat,articleIndex) {
  const src=art.sources?.[0];
  const href=src?.pdf_filename?`pdfs/${src.pdf_filename}#page=${src.page}`:(src?.telegram_url||'#');
  const card=document.createElement('div');
  card.className='card';
  card.dataset.articleId = art.article_id;
  card.style.height=h+'px';
  card.style.setProperty('--cc',m.color);
  card.innerHTML=`
    <div class="card-content">
      <div class="card-toprow">
        <div class="cat-pill">
          <div class="pill-icon"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="1" y="1" width="8" height="2" rx="0.6" fill="#888"/><rect x="1" y="4.5" width="5" height="1.5" rx="0.6" fill="#666"/><rect x="1" y="7" width="6" height="1.5" rx="0.6" fill="#666"/></svg></div>
          ${cat.toUpperCase()}
        </div>
        <div class="card-date">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="2.5" width="11" height="9.5" rx="1.8" stroke="#555" stroke-width="1.2"/><path d="M4.5 1v3M8.5 1v3" stroke="#555" stroke-width="1.2" stroke-linecap="round"/><path d="M1 6h11" stroke="#555" stroke-width="1.2"/></svg>
          ${DIGEST.date}
        </div>
      </div>
      <div class="card-headline">${art.headline}</div>
      <div class="card-summary">${art.summary}</div>
      <div class="card-divider"></div>
      <div class="card-footer">
        ${src?`<a class="src-chip" href="${href}" target="_blank" onclick="event.stopPropagation()">${src.newspaper}<span class="src-chip-sep">&middot;</span><span class="src-chip-pg">Pg ${src.page}</span><span class="src-chip-ext"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M3.5 7.5L7.5 3.5M7.5 3.5H5M7.5 3.5V6" stroke="#555" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></span></a>`:'<div></div>'}
        <div class="info-btn"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6.5" stroke="#444" stroke-width="1.3"/><circle cx="7.5" cy="4.5" r="0.8" fill="#555"/><path d="M7.5 7v4" stroke="#555" stroke-width="1.5" stroke-linecap="round"/></svg></div>
      </div>
    </div>`;
  return card;
}

function buildPRow(ci) {
  const p=panels[ci],ai=p.artIdx;
  p.pRow.innerHTML='';
  p.articles.forEach((_,i)=>{
    const seg=document.createElement('div');
    seg.className='pseg'+(i<ai?' done':i===ai?' active':'');
    p.pRow.appendChild(seg);
  });
}

function syncV(ci,animated) {
  const p=panels[ci],h=p.vFeed.getBoundingClientRect().height;
 p.vTrack.style.transition=animated?'transform 0.35s cubic-bezier(0.4,0,0.2,1)':'none';
  p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;
  buildPRow(ci);
}

function applyDeepLink(target) {
  const ci = sortedCats.findIndex(cat =>
    byCategory[cat].some(art => art.article_id === target.hash)
  );
  if (ci === -1) return;
  goCat(ci, false);
  const ai = byCategory[sortedCats[ci]].findIndex(art => art.article_id === target.hash);
  if (ai === -1) return;
  panels[ci].artIdx = ai;
  syncV(ci, false);
  const card = document.getElementById('article-' + target.hash);
  if (card) { card.classList.add('target-highlight'); setTimeout(() => card.classList.remove('target-highlight'), 3000); }
}

function goArt(d) {
  const p=panels[catIdx];
  const n=Math.max(0,Math.min(p.artIdx+d,p.articles.length-1));
  if(n===p.artIdx&&d!==0)return;
  p.artIdx=n; syncV(catIdx,true); dismiss();
}

function goCat(idx,animated=true) {
  idx=Math.max(0,Math.min(idx,sortedCats.length-1));
  if(idx===catIdx&&animated)return;
  const prev=catIdx; catIdx=idx;
  hTrack.style.transition=animated?'transform 0.38s cubic-bezier(0.4,0,0.2,1)':'none';
  hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;
  if(animated&&idx!==prev) {
    const m=CAT_META[sortedCats[idx]]||{color:"#e8334a",icon:"📰"};
    catFlash.style.background=m.color+'18';
    cfIcon.textContent=m.icon; cfName.textContent=sortedCats[idx]; cfName.style.color=m.color;
    catFlash.classList.add('on'); setTimeout(()=>catFlash.classList.remove('on'),500);
  }
  dismiss();
}

let dismissed=false;
function dismiss() {
  if(dismissed)return; dismissed=true;
  hintUp.classList.remove('visible'); hintRight.classList.remove('visible');
  hintUp.classList.add('gone'); hintRight.classList.add('gone');
}

(function initHints() {
  const KEY='dailyBriefHintSeen';
  if(!localStorage.getItem(KEY)) {
    localStorage.setItem(KEY,'1');
    setTimeout(()=>{ if(!dismissed){ hintUp.classList.add('visible'); hintRight.classList.add('visible'); } },2500);
  }
})();

let tsX=0,tsY=0,tcX=0,tcY=0,axis=null,drag=false;
outer.addEventListener('touchstart',e=>{ tsX=e.touches[0].clientX; tsY=e.touches[0].clientY; tcX=0; tcY=0; axis=null; drag=true; hTrack.style.transition='none'; const p=panels[catIdx]; if(p)p.vTrack.style.transition='none'; },{passive:true});
outer.addEventListener('touchmove',e=>{ if(!drag)return; const dx=e.touches[0].clientX-tsX,dy=e.touches[0].clientY-tsY; tcX=dx; tcY=dy; if(!axis&&(Math.abs(dx)>8||Math.abs(dy)>8))axis=Math.abs(dx)>Math.abs(dy)?'h':'v'; if(!axis)return; e.preventDefault(); if(axis==='h'){ const edge=(catIdx===0&&dx>0)||(catIdx===sortedCats.length-1&&dx<0); hTrack.style.transform=`translateX(${-catIdx*vpW+dx*(edge ? 0.14 : 1)}px)`; }else{ const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height; const edge=(p.artIdx===0&&dy>0)||(p.artIdx===p.articles.length-1&&dy<0); p.vTrack.style.transform=`translateY(${-p.artIdx*h+dy*(edge ? 0.14 : 1)}px)`; } },{passive:false});
outer.addEventListener('touchend',()=>{ if(!drag)return; drag=false; if(axis==='h'){ const t=vpW*.2; if(tcX<-t)goCat(catIdx+1); else if(tcX>t)goCat(catIdx-1); else{hTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;} }else if(axis==='v'){ const t=vpH*.2; if(tcY<-t)goArt(1); else if(tcY>t)goArt(-1); else{const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height;p.vTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;} } axis=null; },{passive:true});
document.addEventListener('keydown',e=>{ if(e.key==='ArrowDown'||e.key===' '){e.preventDefault();goArt(1);} if(e.key==='ArrowUp'){e.preventDefault();goArt(-1);} if(e.key==='ArrowRight'){e.preventDefault();goCat(catIdx+1);} if(e.key==='ArrowLeft'){e.preventDefault();goCat(catIdx-1);} });
let wl=false;
outer.addEventListener('wheel',e=>{ e.preventDefault();if(wl)return;wl=true; Math.abs(e.deltaX)>Math.abs(e.deltaY)?goCat(catIdx+(e.deltaX>0?1:-1)):goArt(e.deltaY>0?1:-1); setTimeout(()=>wl=false,500); },{passive:false});
window.addEventListener('resize',()=>{ vpW=outer.offsetWidth;vpH=outer.offsetHeight; hTrack.style.transition='none'; hTrack.style.transform=`translateX(${-catIdx*vpW}px)`; panels.forEach(p=>{ const h=p.vFeed.getBoundingClientRect().height; p.vTrack.querySelectorAll('.card').forEach(c=>c.style.height=h+'px'); p.vTrack.style.transition='none'; p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`; }); });

buildAll();
</script>
