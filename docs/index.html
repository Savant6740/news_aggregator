e as parked car rolls into Lahaul gorge", "summary": "A 26-year-old woman, Tanu Kumari, and her 11-month-old son, Daksh Kumar, from Gurugram, died in Himachal Pradesh’s Lahaul and Spiti district. Their parked car rolled backward and plunged into a gorge near Gramphu while the family was on a holiday trip.", "category": "India", "page": 2, "importance": 3, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "6ad80ae8"}, {"headline": "A.P. Congress leaders trek to Tirumala shrine on Rahul’s birthday", "summary": "Andhra Pradesh Congress leaders, led by AICC member Sunkara Padmasree, trekked to Tirupati on Rahul Gandhi’s 56th birthday. They prayed for his well-being and sought Lord Venkateswara’s blessings for his efforts to restore democracy and the party’s victory in the next State election.", "category": "Politics", "page": 2, "importance": 3, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "fd1fb8d5"}, {"headline": "BJP calls Karnataka leaders to Delhi over ‘cross-voting’ in MLC poll", "summary": "BJP national president Nitin Nabin summoned Karnataka State chief B.Y. Vijayendra and other leaders to Delhi on June 23 over alleged “cross-voting” in the recent Legislative Council election. The Congress won five of seven seats, BJP two. A fact-finding panel was formed, and the State leadership might be revamped.", "category": "Politics", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "cb262cf0"}, {"headline": "Taking part in Yoga Day not mandatory, Bengal govt. tells HC", "summary": "The Calcutta High Court disposed of a petition challenging the West Bengal government's notification asking State employees to participate in International Yoga Day. The State clarified that participation was “not mandatory” and no punitive action would be taken for non-attendance. PM Modi will lead a session in Kolkata.", "category": "India", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "e10ad036"}, {"headline": "Bihar to bear cost of bringing back migrant workers’ remains", "summary": "The Bihar government will now bear the cost of transporting the remains of migrant workers who die outside the State or abroad. The ex-gratia amount for dependents of deceased migrant workers has also been doubled from ₹2,00,000 to ₹4,00,000.", "category": "India", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "10761bf0"}, {"headline": "Eight killed in lightning strikes across Jharkhand", "summary": "At least eight people, including two women and a two-year-old boy, were killed in lightning strikes across six districts of Jharkhand. Hazaribag district reported three deaths. The victims included a 30-year-old woman, a 15-year-old girl, and a 13-year-old girl.", "category": "India", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "65c1c03b"}, {"headline": "NEET aspirant dies in Indore; probe under way, say police", "summary": "A 21-year-old NEET aspirant, Avantika Maurya, died after \"falling\" from the third floor of a building in Indore, Madhya Pradesh, under \"suspicious circumstances.\" Police have launched an investigation. Her family stated she was disheartened by the recent question paper leak and the upcoming re-examination.", "category": "India", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "0e1d27cf"}, {"headline": "Compulsory three-language policy not viable in Nagaland, say CBSE schools", "summary": "Principals of 19 CBSE-affiliated schools in Nagaland wrote to Union Education Minister Dharmendra Pradhan, citing difficulties in implementing the compulsory three-language policy, especially Sanskrit. They highlighted Nagaland's linguistic diversity, with English serving as the lingua franca, and urged a special exemption or flexible framework.", "category": "Education", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "38de54af"}, {"headline": "BJP worker killed in Howrah: Suvendu promises law to seize properties of accused", "summary": "BJP worker Prasanta Dey was killed in Howrah, West Bengal, after a confrontation over alleged corruption. Chief Minister Suvendu Adhikari announced his government would introduce a Bill to auction properties of accused in such crimes, offering ₹9 lakh compensation and a government job to Dey's wife. Eight arrests made, case handed to CID.", "category": "Politics", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "d29e73f4"}, {"headline": "Maker of Battlefield says his film related to present-day conflict in Manipur", "summary": "Manipuri filmmaker Borun Thokchom's 80-minute anti-war documentary, Battlefield, revisiting WWII battles of Imphal and Kohima, will screen at the Mumbai International Film Festival. Thokchom states the film, though about events 8 decades ago, is \"very much related\" to Manipur's present-day ethnic conflict.", "category": "Culture", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "0ccf04df"}, {"headline": "Kuki people boarding flights from Imphal a positive sign: CM", "summary": "Manipur CM Yumnam Khemchand Singh stated Kuki community members traveling to Imphal for flights is a positive sign for the conflict-scarred state. He urged unity and dialogue among the 36 communities for development and peace, noting the economy suffered from violence.", "category": "India", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "48f955bc"}, {"headline": "Uproar over defacing of Ambedkar’s statue in U.P.", "summary": "Jajouli village in U.P.'s Kaushambi district was tense after Dr. B.R. Ambedkar's statue was vandalized. Dalit villagers protested, demanding strict action. Police reinstalled the statue and promised action, stationing personnel in the area.", "category": "Politics", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "f00c2d2c"}, {"headline": "The pressures of counting India", "summary": "Census enumerators face challenges like heat, connectivity, and safety during India's first fully digital Census. Field workers, mostly teachers, report hostility, denied entry, and pressure from superiors to edit data, especially on sanitation and water access, affecting data accuracy and raising concerns about real-time monitoring and reporting.", "category": "India", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "a2607e01"}, {"headline": "SC refuses urgent hearing on plea to defer NEET retest", "summary": "The Supreme Court declined to grant an urgent hearing for a plea challenging the NTA's decision to conduct the NEET-UG 2026 re-examination on June 21 for 22 lakh candidates. Aspirants cited heightened stress and anxiety after the original May 3 exam was cancelled due to a paper leak.", "category": "Law", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "f1c7933b"}, {"headline": "Pakistan is an example of a ‘Frankenstein state’, India says at UN", "summary": "India slammed Pakistan at the UN, calling it a “Frankenstein state” shocked when its “own monster bites back,” accusing Islamabad of hosting, training, and deploying terrorists. India's Anupama Singh rejected Pakistan's allegations on Jammu & Kashmir, stating denial of freedoms there is met with \"bullets and brutality.\"", "category": "World", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "459d0d75"}, {"headline": "Extraordinary level of opacity, says Congress leader on Nicobar project", "summary": "Jairam Ramesh termed Environment Minister Bhupender Yadav’s defence of the Great Nicobar Island Project \"disappointing.\" Ramesh accused the Ministry of \"extraordinary level of non-transparency\" by withholding reports and studies on environmental safeguards, questioning the adequacy of impact assessments and the secrecy around the HPC report.", "category": "Environment", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "c7811389"}, {"headline": "A nation capable of meeting its defence needs can move forward confidently: Rajnath", "summary": "Defence Minister Rajnath Singh inaugurated a 10,000-tonne aluminium extrusion press at Ordnance Factory Ambajhari, Nagpur. He stated a nation meeting its defence needs moves forward confidently, emphasising indigenous manufacturing in defence, aerospace, missiles, and aviation. The project aims to strengthen India's self-reliance in critical sectors.", "category": "Politics", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "80a3b679"}, {"headline": "Palestine envoy seeks medical assistance for Gaza, West Bank", "summary": "The Palestinian Authority appealed to India for urgent medical assistance for Gaza and the West Bank, citing the healthcare sector's \"state of collapse\" after three years of Israeli military campaigns. Ambassador Abdullah M. Abu Shawesh highlighted critical shortages of essential medicines, including 50 cancer drugs at zero stock.", "category": "World", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "fde6112e"}, {"headline": "SC directs tribunal to hear lawyer’s plea in SIR row", "summary": "The Supreme Court directed an appellate tribunal to expeditiously decide the appeal of 75-year-old Murshidabad lawyer Yean Ali, challenging the deletion of his name from West Bengal's electoral rolls. The Bench noted a panel of former judges exists for such disputes and asked for a decision within two months.", "category": "Law", "page": 8, "importance": 3, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "2dc12cc2"}, {"headline": "Rebel Trinamool MPs must be disqualified: Abhishek", "summary": "Trinamool Congress leader Abhishek Banerjee called for the disqualification of 20 Lok Sabha MPs who declared a merger with Nationalist Citizens Party of India (NCPI). He argued that per the Tenth Schedule, two-thirds of the political party, not just legislature, must agree to a merger, accusing them of disrespecting the Constitution.", "category": "Politics", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "178dbcb5"}, {"headline": "Trinamool faces fresh exits, arrests in Bengal", "summary": "Six weeks after election defeat, Trinamool Congress is seeing continued desertions and arrests in West Bengal. Former Minister Jyoti Priya Mallick resigned citing health, as did district president Narendranath Chakraborty. Former MLA Ramendu Sinharoy was arrested in Karnataka over multiple allegations.", "category": "Politics", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "4763f176"}, {"headline": "Uddhav offers to step down while Shinde hints at more defections", "summary": "Shiv Sena (UBT) chief Uddhav Thackeray emotionally offered to resign if leaders believed allegations against him for aligning with Congress, condemning BJP's \"dirty politics\" and \"Operation Lotus.\" Deputy CM Eknath Shinde hinted at more defections, stating the public \"has only seen a trailer\" of political changes.", "category": "Politics", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "f0e5a2e4"}, {"headline": "Parliamentary panel seeks clarity from govt. on future engagement with Pakistan", "summary": "The Parliamentary Standing Committee on External Affairs questioned Foreign Secretary Vikram Misri on future engagement with Pakistan, including Prime Minister Modi's attendance at the SCO summit. Ministry officials stated \"normal neighbourly relations\" require an atmosphere free of violence, noting Track-II diplomacy continues.", "category": "Politics", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "3e1e3037"}, {"headline": "Attempt to tarnish image: CPI(ML) on ‘cross-voting’", "summary": "CPI(ML) Liberation general secretary Dipankar Bhattacharya protested against \"malicious propaganda\" and attempts to \"tarnish our party’s image\" following allegations of cross-voting against its MLAs in the Jharkhand Rajya Sabha elections. He affirmed the party's commitment to the INDIA bloc.", "category": "Politics", "page": 9, "importance": 3, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "c35027f6"}, {"headline": "Four glacial lakes in Arunachal have expanded in a decade: study", "summary": "A satellite-based study by Suhora Technologies found four of five glacial lakes in Arunachal Pradesh's Tawang district have expanded over the last decade, with Sanhapo Lake showing rapid growth (10 hectares). This raises concerns about Glacial Lake Outburst Floods (GLOFs), stressing continuous monitoring.", "category": "Environment", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "95b76012"}, {"headline": "Sickle cell anaemia to be eradicated by 2047: Murmu", "summary": "President Droupadi Murmu announced India would eradicate sickle cell anaemia well before the 2047 target. Speaking in Omkareshwar, she urged collective efforts, especially among tribal communities, for awareness. Murmu noted the National Mission's key targets for screening 7 crore people have been achieved ahead of schedule.", "category": "Health", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "a1b1170b"}, {"headline": "3 indigenous naval vessels to be launched by PM tomorrow", "summary": "Prime Minister Narendra Modi will commission three indigenously-built Indian Navy frontline platforms—Dunagiri, Sanshodhak, and Agray—at Kolkata’s Syama Prasad Mookerjee Port. Designed by the Indian Navy, these vessels, with over 75% indigenous content, boost maritime combat, hydrographic surveying, and anti-submarine warfare capabilities.", "category": "India", "page": 10, "importance": 5, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "27b7f4c0"}, {"headline": "Man arrested in Chhattisgarh for brutally assaulting wife", "summary": "A 44-year-old man was arrested in Chhattisgarh's Korea district for brutally assaulting his wife on June 14. He allegedly tied her, partially disrobed her, shaved her head, blackened her face, and forced her to drink their son’s urine over a purported extramarital affair.", "category": "Law", "page": 10, "importance": 3, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "0d486630"}, {"headline": "Truth will prevail, says U.P. CM on probe into Ram temple row", "summary": "Uttar Pradesh Chief Minister Yogi Adityanath stated \"truth will prevail\" after the SIT completed its probe into alleged embezzlement of Ram Temple trust donations. He urged devotees not to be misled by Opposition spreading misinformation to \"tarnish\" Ayodhya's reputation, accusing them of worshipping Babur instead of Ram.", "category": "Politics", "page": 10, "importance": 5, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "62611e5a"}, {"headline": "Culture Secretary Vivek Aggarwal is new FATF Vice-President", "summary": "Union Culture Secretary Vivek Aggarwal was appointed Vice-President of the Financial Action Task Force (FATF) for 2026-2027. His selection signifies India's enhanced role in global financial governance, anti-money laundering, counter-terrorist financing, and illicit financial flows. He previously headed India's FATF delegation.", "category": "Economy", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "91ef16ee"}, {"headline": "World Bank approves $1.5 bn support for India reform plan", "summary": "The World Bank approved $1.5 billion financing for India's Development Policy Financing (DPF) Operation. This support targets structural reforms to boost private sector-led job creation and economic growth, aiming to create opportunities for 11 million youth entering the labour market annually.", "category": "Economy", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "e255d4e4"}, {"headline": "West Asia impact dominated MPC meeting discourse", "summary": "The Monetary Policy Committee (MPC) noted that the prolonged West Asia conflict is the most significant risk to India’s economic outlook, raising concerns about inflation, growth, and financial stability. All members agreed to maintain the repo rate at 5.25% and a neutral stance, adopting a cautious approach.", "category": "Economy", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "1b20135e"}, {"headline": "Nifty IT dips on Accenture revenue guidance", "summary": "The Nifty IT index slid 3.65% after Accenture Plc. cut its full-year revenue guidance to 3-4% growth (local currency), down from 3-5%, citing macroeconomic uncertainty and a $100 million impact from the West Asia crisis. Infosys slid 6.5%, while TCS, LTM, and Tech Mahindra also declined.", "category": "Business", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "2b9777f3"}, {"headline": "RIL to turn oil into chemicals: Ambani", "summary": "Reliance Industries CMD Mukesh Ambani announced that RIL will convert all refined oil into chemicals and new materials long-term, aiming to make it the world's leading integrated energy and materials company. This transformation, including New Energy initiatives, will create two lakh green jobs.", "category": "Business", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "cc90b5c5"}, {"headline": "U.S. strike on alleged drug boat kills 3 in the eastern Pacific Ocean", "summary": "The U.S. military attacked a boat suspected of drug smuggling in the eastern Pacific Ocean, killing three people. This incident brings the total number of deaths in such U.S. military strikes to at least 211 since the Trump administration began targeting \"narcoterrorists.\"", "category": "World", "page": 12, "importance": 4, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "3503955d"}, {"headline": "Colombia investigates ex-President Uribe over paramilitary massacres", "summary": "The Colombian prosecutor’s office initiated a probe into influential former President Alvaro Uribe. He is being investigated for alleged links to massacres by paramilitary groups during the 1996 and 1997 armed conflict, marking a significant development in the country's efforts to address past violence.", "category": "World", "page": 12, "importance": 4, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "b085133c"}, {"headline": "Venezuela govt., Opposition hold talks on ‘democratic transition’", "summary": "Members of Venezuela’s interim government and Opposition representatives met in Caracas to discuss a roadmap for democratic transition. Opposition figure Dinorah Figuera, returning after eight years abroad, joined talks with National Assembly chief Jorge Rodriguez, as confirmed by the U.S. State Department.", "category": "World", "page": 12, "importance": 4, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "71411b00"}, {"headline": "U.S. Vice-President Vance delays trip to Switzerland for Iran talks", "summary": "U.S. Vice-President J.D. Vance delayed his trip to Switzerland, where he was scheduled for talks following up on the deal to end the war with Iran. The White House spokesperson cited \"logistics of these negotiations\" as complex and unpredictable for the delay.", "category": "World", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "e03b45b1"}, {"headline": "Russian strikes on Ukraine kill three: Kyiv", "summary": "Russia renewed strikes on Ukraine, killing three people, including an eight-year-old girl, Ukrainian officials reported. This comes a day after Ukraine's largest-ever drone attack on Moscow, which also killed an eight-year-old and sparked an oil refinery fire. The Kremlin vowed to \"continue\" striking Ukraine.", "category": "World", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "38a18ed2"}, {"headline": "Starmer says he won’t step down after Burnham’s victory", "summary": "U.K. Labour leader Keir Starmer affirmed he would not resign after Andy Burnham's Makerfield byelection victory, despite a weakening grip on his position. Burnham, a left-leaning challenger, comfortably won with 55% of the vote, calling for Labour to change. Starmer faces pressure for an internal party contest.", "category": "Politics", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "e93a9d8c"}, {"headline": "‘All of Lebanon must burn’, says Israeli Minister Ben Gvir", "summary": "Far-right Israeli National Security Minister Itamar Ben Gvir stated, \"All of Lebanon must burn,\" following the deaths of four Israeli soldiers. He added, \"For every tear shed by an Israeli mother, a thousand Lebanese mothers must weep,\" urging Israel to \"go wild\" and \"open the gates of hell.\"", "category": "World", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "3dc5f348"}, {"headline": "Italy’s top diplomat cancels U.S. trip as Meloni slams Trump’s claim", "summary": "Italian Foreign Minister Antonio Tajani cancelled his U.S. trip after President Donald Trump claimed Premier Giorgia Meloni \"begged\" for a photo-op at the G7 summit. Meloni called Trump's claims \"completely fabricated\" and \"offensive,\" asserting, \"Italy and I do not beg.\"", "category": "World", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "ce5527bb"}, {"headline": "How pitches are laid, how they age, and why it’s both art and science", "summary": "A cricket pitch is a blend of clay, water, and grass, its behavior governed by these components and environmental factors. Curators select clay types, use heavy rollers, and manage moisture through deep saturation. Grass reinforces soil and influences ball friction. Pitches deteriorate over time, with decay depending on clay type and weather, impacting game dynamics.", "category": "Science", "page": 13, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "2338cc4e"}, {"headline": "Hot-seat shuffle: Alonso, Iraola, Maresca sign up for big-club roulette", "summary": "Xabi Alonso, Andoni Iraola, and Enzo Maresca have joined Chelsea, Liverpool, and Manchester City as new managers, respectively. Their interconnected destinies involve high expectations. Alonso faces challenges reviving Chelsea after a turbulent season, Iraola must resuscitate Liverpool without Salah, and Maresca fills Guardiola’s shoes amidst City’s financial charges.", "category": "Sports", "page": 14, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "ba096cd8"}, {"headline": "Super subs fire Switzerland past Bosnia and close in on last 32 spot", "summary": "Super substitutes Johan Manzambi and Ruben Vargas led Switzerland to a 4-1 victory over 10-man Bosnia-Herzegovina in Los Angeles. The late goal rush gave the Swiss a strong chance to qualify for the FIFA World Cup 2026 knockout round as one of the top two teams in Group B.", "category": "Sports", "page": 15, "importance": 4, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "375cb9b4"}, {"headline": "Six-star Canada hammers Qatar into submission", "summary": "Jonathan David scored three goals, leading Canada to a dominant 6-0 victory over Qatar. This win marked Canada's first World Cup match victory and almost secured its spot in the knockout round. Qatar was reduced to nine players due to red cards in the chaotic match.", "category": "Sports", "page": 15, "importance": 4, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "e39de738"}, {"headline": "Alleyne’s heroics hand West Indies thrilling victory over Scotland", "summary": "Aaliyah Alleyne's three-wicket burst helped West Indies secure a thrilling seven-run victory over Scotland in a Women's T20 World Cup match in Leeds. West Indies scored 153/6, with Taylor hitting 47 n.o., while Scotland was restricted to 146. Taylor was named Player of the Match.", "category": "Sports", "page": 15, "importance": 3, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "338fb688"}, {"headline": "Prema replaces injured Shreyanka in India’s T20 World Cup squad", "summary": "Leg-spinner Prema Rawat has replaced Shreyanka Patil in India’s T20 Women’s World Cup squad. Patil injured her ankle during India’s match against the Netherlands and was ruled out of the tournament. The Event Technical Committee approved the replacement.", "category": "Sports", "page": 15, "importance": 3, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "fb416493"}, {"headline": "Hydration break appears to be affecting the outcome of contests", "summary": "Hydration breaks, introduced in the FIFA World Cup to protect players from heat, seem to influence match outcomes. 53 of 89 goals so far were scored after these breaks, with 20 within 10 minutes of restart. Coaches are recognizing tactical possibilities. The breaks also provide lucrative commercial opportunities for broadcasters.", "category": "Sports", "page": 15, "importance": 5, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "41eeacb5"}, {"headline": "Sri Lanka-A to meet India-A in the final", "summary": "Sri Lanka-A will face India-A in the tri-nation tournament final. The host team secured its spot by beating Afghanistan-A by 103 runs, with Avishka Fernando scoring a century and Dulaj Samuditha taking five wickets. Captain Sahan Arachchige urged his side to focus on the trophy.", "category": "Sports", "page": 15, "importance": 3, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "7297be7a"}, {"headline": "Shree Charani — a great find for the Women in Blue", "summary": "Left-arm spinner Shree Charani has become an integral part of the Indian women's cricket team, showing impressive form since her T20I debut a year ago. She has taken 62 international wickets, is ranked No. 2 in ICC T20I bowlers, and is praised for her control and variations.", "category": "Sports", "page": 15, "importance": 4, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "1d031146"}, {"headline": "Jane and Jill — the pioneers who created a rich legacy", "summary": "Twins Jane and Jill Powell, former England cricketers, reflect on their pioneering careers and the growth of women's cricket. Jane, a former England captain, led in a World Cup final and was Yorkshire's first female president. They noted the lack of recognition and money in their era compared to today's game.", "category": "Sports", "page": 15, "importance": 4, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "492cfde1"}, {"headline": "Nicholls puts Kiwis on top", "summary": "Henry Nicholls scored an unbeaten century, helping New Zealand boost its lead to 352 runs against England on day three of the second Test at the Oval. New Zealand is currently 252/3 in its second innings.", "category": "Sports", "page": 15, "importance": 3, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "fdf3f015"}, {"headline": "Dominant India eyes series sweep against Afghanistan", "summary": "India, having clinched the ODI series against Afghanistan, aims for a 3-0 sweep in the final game at Chepauk. The team will likely experiment with bench strength, with young pacers like Gurnoor Brar and Prince Yadav impressing. Afghanistan seeks improved batting performance.", "category": "Sports", "page": 16, "importance": 5, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "4388f2a5"}, {"headline": "India finishes runner-up in World Team snooker c’ship", "summary": "India lost 2-3 to host China 'A' in the final of the World Team snooker championship in Guangdong, finishing as runner-up. Pankaj Advani secured two wins, but China 'A' ultimately clinched the title.", "category": "Sports", "page": 16, "importance": 3, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "9a5746ee"}, {"headline": "Macau Open: Ashmita storms into semifinals, Anmol out", "summary": "Ashmita Chaliha advanced to the women’s singles semifinals at the Macau Open Super 300 tournament, defeating Korea’s Kim Min Sun 21-16, 21-18. However, compatriot Anmol Kharb was eliminated after a quarterfinal defeat to Han Qian Xi of China.", "category": "Sports", "page": 16, "importance": 3, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "bdc4d031"}, {"headline": "Prachi leads the way as India puts up a good show", "summary": "Prachi secured a 4-1 victory against Paris Olympics bronze medallist Shih Yi Wu of Taiwan, confirming multiple medals for India at the Boxing World Cup 2026 (Stage 2). Other Indian boxers like Minakshi, Nikhil, and Deepak also advanced to the semifinals.", "category": "Sports", "page": 16, "importance": 3, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "9d32c128"}, {"headline": "Yuvraj to join Delhi Capitals as batting coach", "summary": "Former white-ball stalwart Yuvraj Singh is set to join Delhi Capitals as its batting coach for the 2027 season, according to IPL sources. This move will bring his extensive experience to the franchise.", "category": "Sports", "page": 16, "importance": 4, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "972532b1"}, {"headline": "Manika rails against Asiad exclusion", "summary": "India’s top women’s paddler Manika Batra sought intervention from the Sports Ministry and IOA after her exclusion from the Asian Games table tennis squad. The 2018 bronze medallist stated her omission was \"deeply disheartening\" due to how selection criteria were interpreted.", "category": "Sports", "page": 16, "importance": 4, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "df09fb58"}, {"headline": "Thanya swims to new mark in 400m medley", "summary": "Thanya Shadakshari broke an eight-year-old record in the women’s 400m medley at the National aquatics championships in Ahmedabad, clocking 4:56.78. Tanishi Gupta also set a new national mark twice in the women's 100m butterfly.", "category": "Sports", "page": 16, "importance": 3, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "32dc2586"}, {"headline": "Sang-uk clinches men’s sabre gold", "summary": "South Korean Oh Sang-uk won gold in the men’s sabre event on the opening day of the 26th Senior Asian Fencing Championships in New Delhi. China’s Luo Shaotong took silver, while two South Koreans and one Japanese fencer shared bronze.", "category": "Sports", "page": 16, "importance": 3, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "fba53c1b"}, {"headline": "IOA and NCF organise Athletes’ Forum", "summary": "The second IOA Athletes’ Forum gathered over 75 active and retired athletes from 30+ sports federations. It launched the Clean Sport Campaign and focused on providing practical insights and professional guidance for athletes' journeys and post-competitive careers.", "category": "Sports", "page": 16, "importance": 3, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "74fc39cc"}, {"headline": "Reliance Foundation launch movement-based activities and community sports sessions", "summary": "The International Olympic Committee, Abhinav Bindra Foundation, and Reliance Foundation launched ‘Let’s Move’ initiative in India. Starting on Olympic Day (June 23), it aims to encourage young people to be active through sporting activities and community sports sessions, engaging 1,800 Anganwadis and 44,000 children.", "category": "Sports", "page": 16, "importance": 3, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "18f3b386"}, {"headline": "Iniyan wins 360 One Global Chess Masters title", "summary": "GM Pa. Iniyan won the 360 One Global Chess Masters crown, accumulating 7.5 points from 9 rounds. The 23-year-old from Erode, a top seed, secured six wins and three draws in the tournament.", "category": "Sports", "page": 16, "importance": 3, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "6ca26dc1"}, {"headline": "India loses to Germany", "summary": "India lost 1-2 to reigning champion Germany in an FIH Pro League match. Germany secured the win with Jakob Brilla scoring a penalty corner in the 56th minute after the teams were goalless at halftime.", "category": "Sports", "page": 16, "importance": 3, "telegram_url": "https://t.me/c/1877410077/127729", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/127729"}], "article_id": "04b4d406"}, {"headline": "Jio Platforms Files DRHP for India's Largest ₹40,000 Crore IPO", "summary": "Jio Platforms (JPL) filed a DRHP with SEBI for India's largest IPO, valued at ₹35,000-₹40,000 crore (approx. $4 billion). The issue of 27 crore fresh shares aims to repay ₹27,500 crore debt of subsidiary Reliance Jio Infocomm and fund digital/telecom growth, potentially valuing the company at over $150 billion.", "category": "Business", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ²⁰⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127732"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/127729"}], "importance": 10, "article_id": "3d44ec17"}, {"headline": "SEBI Reinstates Open Market Stock Buybacks via Exchanges from August 1", "summary": "SEBI approved reintroduction of open-market buybacks via stock exchanges from August 1, following eased tax treatment. Buybacks must be announced electronically and completed within 66 working days through the normal trading window. This provides flexibility for capital management and ensures transparency. SEBI also relaxed mutual fund borrowing norms, adopted a new board member code, and approved changes for municipal bonds and quick securities transfer.", "category": "Economy", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ²⁰⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127732"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/127729"}], "importance": 8, "article_id": "6e2cb6d7"}, {"headline": "Jio Platforms Explores LEO Satellite Constellation for Broadband, AI Backbone", "summary": "Jio Platforms is developing a sovereign Low Earth Orbit (LEO) satellite constellation and building ground station infrastructure to provide high-speed satellite broadband across India, competing with Starlink and OneWeb. Reliance Industries CMD Mukesh Ambani announced this, stating Jio demonstrated JioSpaceFiber and seeks GMPCS approvals for an end-to-end ecosystem. Jio is also building India's sovereign AI backbone.", "category": "Technology", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ²⁰⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127732"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/127729"}], "importance": 8, "article_id": "edad19d4"}, {"headline": "Supreme Court: Right to Safe Footpaths a Fundamental Right Under Article 21", "summary": "The Supreme Court declared the right to walk on safe, unobstructed, and well-maintained footpaths a fundamental right under Article 21, prioritizing pedestrians over vehicles. It directed civic authorities to ensure all roads have dedicated, unencroached footpaths, noting citizens can sue for violations. Justice Narasimha stressed a statutory framework is needed, citing a case where a child was killed.", "category": "Law", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ²⁰⁰⁶²⁰²⁶.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127732"}, {"newspaper": "Times of India", "pdf_filename": "ToI Bangalore + Times ²⁰⁰⁶²⁰²⁶.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127739"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127729"}], "importance": 9, "article_id": "13727ac8"}, {"headline": "Delhi HC Upholds Telegram Channel Ban Over NEET-UG Leaks, Citing Misinformation", "summary": "The Delhi High Court declined to lift the temporary ban on specific Telegram channels accused of circulating leaked NEET-UG papers and misinformation. The court deemed it a \"least restrictive measure\" and necessary emergency action, stating the government followed due process. Telegram is required to cooperate with investigators by sharing user data linked to the leaks.", "category": "Law", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ²⁰⁰⁶²⁰²⁶.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127732"}, {"newspaper": "Times of India", "pdf_filename": "ToI Bangalore + Times ²⁰⁰⁶²⁰²⁶.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127739"}], "importance": 8, "article_id": "5a24ff93"}, {"headline": "Israel, Hezbollah Agree to Truce in Southern Lebanon After Deadly Clashes", "summary": "Israel and Hezbollah agreed to a halt in heavy fighting in southern Lebanon, mediated by the US, Qatar, and Iran, following clashes that killed 47 in Lebanon and four Israeli soldiers. Israeli PM Netanyahu warned of severe retaliation if the truce is violated, with Israeli forces remaining in a temporary security zone. The accord faces threats from Lebanon and delays planned U.S.-Iran talks.", "category": "World", "sources": [{"newspaper": "Times of India", "pdf_filename": "ToI Bangalore + Times ²⁰⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127739"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/127729"}], "importance": 10, "article_id": "a85de42e"}, {"headline": "Co-host Mexico First to Reach World Cup Knockout Stages with 1-0 Win", "summary": "Co-host Mexico became the first team to reach the 2026 FIFA World Cup knockout stages with a 1-0 win over South Korea in Guadalajara. Luis Romo scored the decisive 56th-minute goal after a goalkeeping error, with stopper Raul Rangel making crucial late saves. Meanwhile, Canada edged closer to the last 32 after beating Qatar.", "category": "Sports", "sources": [{"newspaper": "Times of India", "pdf_filename": "ToI Bangalore + Times ²⁰⁰⁶²⁰²⁶.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/127739"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/127729"}], "importance": 8, "article_id": "0c75c47e"}, {"headline": "Neeraj Chopra Finishes Fourth in Doha Diamond League Season Opener", "summary": "Olympic javelin champion Neeraj Chopra finished fourth in his season opener at the Doha Diamond League after recovering from a minor groin injury. He achieved a best throw of 85.69m. Sri Lanka’s Rumesh Pathirage won the event with 88.68m, with Grenada's Anderson Peters placing second with 88.38m and Curtis Thompson third.", "category": "Sports", "sources": [{"newspaper": "Times of India", "pdf_filename": "ToI Bangalore + Times ²⁰⁰⁶²⁰²⁶.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/127739"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/127729"}], "importance": 7, "article_id": "167a09e6"}, {"headline": "Home Minister Launches 'Abhigyan' App for Instant Police Fingerprint Verification", "summary": "Union Home Minister Amit Shah launched 'Abhigyan', a smartphone app for police to instantly verify criminal records. It links portable fingerprint scanners to the National Automated Fingerprint Identification System (NAFIS) database of 1.3 crore suspects/convicts, enabling real-time identification for ground-level policing. Shah emphasized continuous database enrichment and time-bound justice.", "category": "Technology", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127729"}], "importance": 7, "article_id": "09813c6c"}, {"headline": "Doctor Remanded in Custody for Domestic Help's Murder; Mental Illness Cited", "summary": "Delhi court remanded dermatologist Dr. Manish Gupta to two-day police custody for the murder of his 58-year-old domestic help, Mina Halder, who sustained three stab wounds. A neighbor found Gupta disoriented, confessing \"I have done it.\" Police seek custody to probe co-conspirators. The victim's family alleged police rushed cremation, which police deny. Gupta reportedly suffers from mental illnesses.", "category": "Law", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 20-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127729"}], "importance": 5, "article_id": "8a610c26"}]};
const CAT_META = {"Politics": {"color": "#e8334a", "icon": "🏛️"}, "Economy": {"color": "#f5a623", "icon": "📊"}, "Business": {"color": "#f0c040", "icon": "💼"}, "India": {"color": "#ff7043", "icon": "🇮🇳"}, "World": {"color": "#5c9eff", "icon": "🌍"}, "Sports": {"color": "#36c46f", "icon": "🏆"}, "Science": {"color": "#a78bfa", "icon": "🔬"}, "Technology": {"color": "#38bdf8", "icon": "💻"}, "Health": {"color": "#34d399", "icon": "🏥"}, "Law": {"color": "#fb923c", "icon": "⚖️"}, "Environment": {"color": "#4ade80", "icon": "🌿"}, "Education": {"color": "#e879f9", "icon": "📚"}, "Culture": {"color": "#f472b6", "icon": "🎭"}, "Infrastructure": {"color": "#94a3b8", "icon": "🏗️"}};

// FIXED: Pre-build data structures IMMEDIATELY for deep linking
const allArts = [...DIGEST.articles].sort((a,b)=>(b.importance||0)-(a.importance||0));
const byCategory = {};
for (const art of allArts) {
  const c = art.category||"India";
  if (!byCategory[c]) byCategory[c]=[];
  byCategory[c].push(art);
}
const sortedCats = Object.keys(byCategory).sort(
  (a,b)=>(byCategory[b][0].importance||0)-(byCategory[a][0].importance||0)
);

// FIXED DEEP LINK HANDLER - Runs IMMEDIATELY
let deepLinkTarget = null;
function handleDeepLink() {
  const hash = window.location.hash;
  if (!hash || !sortedCats.length) return;
  
  const cleanHash = hash.startsWith('#article-') ? hash.slice(9) : hash.slice(1);
  const targetArticle = DIGEST.articles.find(art => art.article_id === cleanHash);
  
  if (targetArticle) {
    deepLinkTarget = {article: targetArticle, hash: cleanHash};
  }
}
handleDeepLink();

let catIdx=0,vpW=0,vpH=0;
const panels=[];
const outer=document.getElementById('outer');
const hTrack=document.getElementById('hTrack');
const hintUp=document.getElementById('hintUp');
const hintRight=document.getElementById('hintRight');
const catFlash=document.getElementById('catFlash');
const cfIcon=document.getElementById('cfIcon');
const cfName=document.getElementById('cfName');

function buildAll() {
  vpW=outer.offsetWidth; vpH=outer.offsetHeight;
  hTrack.innerHTML=''; panels.length=0;
  sortedCats.forEach((cat,ci)=>{
    const m=CAT_META[cat]||{color:"#e8334a",icon:"📰"};
    const arts=byCategory[cat];
    const panel=document.createElement('div');
    panel.className='cat-panel';
    panel.id=`cat-panel-${ci}`;
    panel.style.setProperty('--cc',m.color);
    panel.innerHTML=`<div class="progress-row" id="prow-${ci}" style="--cc:${m.color}"></div><div class="v-feed" id="vfeed-${ci}"><div class="v-track" id="vtrack-${ci}"></div></div>`;
    hTrack.appendChild(panel);
    const pRow=panel.querySelector(`#prow-${ci}`);
    const vFeed=panel.querySelector(`#vfeed-${ci}`);
    const vTrack=panel.querySelector(`#vtrack-${ci}`);
    const cardH=vFeed.getBoundingClientRect().height||vpH;
    
    arts.forEach((art,ai)=>{
      const card = buildCard(art, cardH, m, cat, ai);
      card.id = `article-${art.article_id}`;
      card.dataset.articleId = art.article_id;
      vTrack.appendChild(card);
    });
    
    panels.push({pRow,vFeed,vTrack,articles:arts,artIdx:0});
    buildPRow(ci);
  });
  
  hTrack.style.transition='none';
  hTrack.style.transform='translateX(0)';
  syncV(0,false);
  
  // Apply deep link after build — 200ms ensures card heights are measured
  if (deepLinkTarget) {
    setTimeout(() => applyDeepLink(deepLinkTarget), 200);
  }
}

function buildCard(art,h,m,cat,articleIndex) {
  const src=art.sources?.[0];
  // Direct PDF link with #page=N - respected by all modern browser PDF viewers
  // when the file is opened via a link click (Chrome, Firefox, Safari, Edge).
  // Falls back to the Telegram source URL if no PDF is available.
  const href = src?.pdf_filename
    ? ('pdfs/' + src.pdf_filename + '#page=' + (src.page || 1))
    : (src?.telegram_url || '#');
  const card=document.createElement('div');
  card.className='card';
  card.dataset.articleId = art.article_id;
  card.style.height=h+'px';
  card.style.setProperty('--cc',m.color);
  card.innerHTML=`
    <div class="card-content">
      <div class="card-toprow">
        <div class="cat-pill">
          <div class="pill-icon"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="1" y="1" width="8" height="2" rx="0.6" fill="#888"/><rect x="1" y="4.5" width="5" height="1.5" rx="0.6" fill="#666"/><rect x="1" y="7" width="6" height="1.5" rx="0.6" fill="#666"/></svg></div>
          ${cat.toUpperCase()}
        </div>
        <div class="card-date">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="2.5" width="11" height="9.5" rx="1.8" stroke="#555" stroke-width="1.2"/><path d="M4.5 1v3M8.5 1v3" stroke="#555" stroke-width="1.2" stroke-linecap="round"/><path d="M1 6h11" stroke="#555" stroke-width="1.2"/></svg>
          ${DIGEST.date}
        </div>
      </div>
      <div class="card-headline">${art.headline}</div>
      <div class="card-summary">${art.summary}</div>
      <div class="card-divider"></div>
      <div class="card-footer">
        ${src?`<a class="src-chip" href="${href}" target="_blank" onclick="event.stopPropagation()">${src.newspaper}<span class="src-chip-sep">&middot;</span><span class="src-chip-pg">Pg ${src.page}</span><span class="src-chip-ext"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M3.5 7.5L7.5 3.5M7.5 3.5H5M7.5 3.5V6" stroke="#555" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></span></a>`:'<div></div>'}
        <div class="info-btn"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6.5" stroke="#444" stroke-width="1.3"/><circle cx="7.5" cy="4.5" r="0.8" fill="#555"/><path d="M7.5 7v4" stroke="#555" stroke-width="1.5" stroke-linecap="round"/></svg></div>
      </div>
    </div>`;
  return card;
}

function buildPRow(ci) {
  const p=panels[ci],ai=p.artIdx;
  p.pRow.innerHTML='';
  p.articles.forEach((_,i)=>{
    const seg=document.createElement('div');
    seg.className='pseg'+(i<ai?' done':i===ai?' active':'');
    p.pRow.appendChild(seg);
  });
}

function syncV(ci,animated) {
  const p=panels[ci],h=p.vFeed.getBoundingClientRect().height;
 p.vTrack.style.transition=animated?'transform 0.35s cubic-bezier(0.4,0,0.2,1)':'none';
  p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;
  buildPRow(ci);
}

function applyDeepLink(target) {
  const ci = sortedCats.findIndex(cat =>
    byCategory[cat].some(art => art.article_id === target.hash)
  );
  if (ci === -1) return;

  // Set catIdx BEFORE calling goCat so the horizontal track lands correctly
  catIdx = ci;
  hTrack.style.transition = 'none';
  hTrack.style.transform = `translateX(${-ci * vpW}px)`;

  const ai = byCategory[sortedCats[ci]].findIndex(art => art.article_id === target.hash);
  if (ai === -1) return;
  panels[ci].artIdx = ai;
  syncV(ci, false);

  const card = document.getElementById('article-' + target.hash);
  if (card) {
    card.classList.add('target-highlight');
    setTimeout(() => card.classList.remove('target-highlight'), 3000);
  }
}

function goArt(d) {
  const p=panels[catIdx];
  const n=Math.max(0,Math.min(p.artIdx+d,p.articles.length-1));
  if(n===p.artIdx&&d!==0)return;
  p.artIdx=n; syncV(catIdx,true); dismiss();
}

function goCat(idx,animated=true) {
  idx=Math.max(0,Math.min(idx,sortedCats.length-1));
  if(idx===catIdx&&animated)return;
  const prev=catIdx; catIdx=idx;
  hTrack.style.transition=animated?'transform 0.38s cubic-bezier(0.4,0,0.2,1)':'none';
  hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;
  if(animated&&idx!==prev) {
    const m=CAT_META[sortedCats[idx]]||{color:"#e8334a",icon:"📰"};
    catFlash.style.background=m.color+'18';
    cfIcon.textContent=m.icon; cfName.textContent=sortedCats[idx]; cfName.style.color=m.color;
    catFlash.classList.add('on'); setTimeout(()=>catFlash.classList.remove('on'),500);
  }
  dismiss();
}

let dismissed=false;
function dismiss() {
  if(dismissed)return; dismissed=true;
  hintUp.classList.remove('visible'); hintRight.classList.remove('visible');
  hintUp.classList.add('gone'); hintRight.classList.add('gone');
}

(function initHints() {
  const KEY='dailyBriefHintSeen';
  if(!localStorage.getItem(KEY)) {
    localStorage.setItem(KEY,'1');
    setTimeout(()=>{ if(!dismissed){ hintUp.classList.add('visible'); hintRight.classList.add('visible'); } },2500);
  }
})();

let tsX=0,tsY=0,tcX=0,tcY=0,axis=null,drag=false;
outer.addEventListener('touchstart',e=>{ tsX=e.touches[0].clientX; tsY=e.touches[0].clientY; tcX=0; tcY=0; axis=null; drag=true; hTrack.style.transition='none'; const p=panels[catIdx]; if(p)p.vTrack.style.transition='none'; },{passive:true});
outer.addEventListener('touchmove',e=>{ if(!drag)return; const dx=e.touches[0].clientX-tsX,dy=e.touches[0].clientY-tsY; tcX=dx; tcY=dy; if(!axis&&(Math.abs(dx)>8||Math.abs(dy)>8))axis=Math.abs(dx)>Math.abs(dy)?'h':'v'; if(!axis)return; e.preventDefault(); if(axis==='h'){ const edge=(catIdx===0&&dx>0)||(catIdx===sortedCats.length-1&&dx<0); hTrack.style.transform=`translateX(${-catIdx*vpW+dx*(edge ? 0.14 : 1)}px)`; }else{ const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height; const edge=(p.artIdx===0&&dy>0)||(p.artIdx===p.articles.length-1&&dy<0); p.vTrack.style.transform=`translateY(${-p.artIdx*h+dy*(edge ? 0.14 : 1)}px)`; } },{passive:false});
outer.addEventListener('touchend',()=>{ if(!drag)return; drag=false; if(axis==='h'){ const t=vpW*.2; if(tcX<-t)goCat(catIdx+1); else if(tcX>t)goCat(catIdx-1); else{hTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;} }else if(axis==='v'){ const t=vpH*.2; if(tcY<-t)goArt(1); else if(tcY>t)goArt(-1); else{const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height;p.vTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;} } axis=null; },{passive:true});
document.addEventListener('keydown',e=>{ if(e.key==='ArrowDown'||e.key===' '){e.preventDefault();goArt(1);} if(e.key==='ArrowUp'){e.preventDefault();goArt(-1);} if(e.key==='ArrowRight'){e.preventDefault();goCat(catIdx+1);} if(e.key==='ArrowLeft'){e.preventDefault();goCat(catIdx-1);} });
let wl=false;
outer.addEventListener('wheel',e=>{ e.preventDefault();if(wl)return;wl=true; Math.abs(e.deltaX)>Math.abs(e.deltaY)?goCat(catIdx+(e.deltaX>0?1:-1)):goArt(e.deltaY>0?1:-1); setTimeout(()=>wl=false,500); },{passive:false});
window.addEventListener('resize',()=>{ vpW=outer.offsetWidth;vpH=outer.offsetHeight; hTrack.style.transition='none'; hTrack.style.transform=`translateX(${-catIdx*vpW}px)`; panels.forEach(p=>{ const h=p.vFeed.getBoundingClientRect().height; p.vTrack.querySelectorAll('.card').forEach(c=>c.style.height=h+'px'); p.vTrack.style.transition='none'; p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`; }); });

buildAll();
</script>
