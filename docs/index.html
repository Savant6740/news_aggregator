Election Commission's mandate for fair elections. Petitioners had argued the exercise risked disenfranchising voters and eroded federal structure.", "category": "Law", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "7c76b257"}, {"headline": "Thirteen illegal Bangladeshi nationals detained in Gurugram for deportation", "summary": "Gurugram police apprehended 13 Bangladeshi nationals for residing illegally in India. The individuals were identified during a special verification drive in slum and industrial areas. A police escort is transporting them to the West Bengal border town of Malda for handover to authorities for deportation. Police are continuing intensive checks for valid residence documents in the district.", "category": "India", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "5aab1849"}, {"headline": "Five child marriages prevented in Rajasthan's Sikar through court injunctions", "summary": "Authorities in Rajasthan's Sikar district prevented five child marriages in a single day using court-issued injunctions. Rescued children included boys aged nine and 12 and a girl under 18. Some were part of the traditional 'Aata-Saata' exchange practice. The court declared any marriages held despite the order would be void, following coordination between police and voluntary groups.", "category": "India", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "e5b4acdb"}, {"headline": "Human rights council reports illegal coal mining and trade in Assam", "summary": "The International Human Rights Council (IHRC) alleged illegal coal extraction from abandoned mines near the Assam-Arunachal Pradesh border. The report claims coal is transported through a managed \"entry system\" to operate brick and coke kilns. The IHRC plans to submit findings to the President and Prime Minister, questioning the role of local authorities and police in the trade.", "category": "Environment", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "bd10fc8c"}, {"headline": "Kerala Education Minister urges MPs to oppose Viksit Bharat Shiksha Bill", "summary": "Kerala Higher Education Minister Roji M. John requested state MPs to oppose the Viksit Bharat Shiksha Adhishthan (VBSA) Bill, 2025. He argued the Bill centralizes control over higher education and threatens state autonomy. The Minister highlighted Clause 49, which could override state laws, and criticized the limited rotational representation for states in the proposed apex body.", "category": "Education", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "f6ea6c56"}, {"headline": "Kerala High Court orders digitized inventory of Sabarimala temple assets", "summary": "The Kerala High Court directed the Travancore Devaswom Board to establish a digitized inventory management system for all assets at the Sabarimala Sannidhanam. The court also ordered officials to follow public procurement safeguards regarding a ₹1.66 crore contract for staff cots. This follows an audit query and an investigation into alleged misappropriation of gold from the temple.", "category": "Culture", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "6ba040ba"}, {"headline": "Congress alleges BJP government trying to block Rahul Gandhi's student event", "summary": "Uttarakhand Congress leaders alleged the state government tried to prevent students from attending Rahul Gandhi’s 'Chhatron Ki Goonj' event in Dehradun. The venue was moved to Bannu School after permission for the Parade Ground was canceled. Gandhi criticized Uttarakhand as an \"epicenter\" of paper leaks, asserting he would not allow the future of youth to be auctioned off.", "category": "Politics", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "4fe2df80"}, {"headline": "Protests erupt in Andhra Pradesh over alleged custodial death in Nellore", "summary": "Protesters and YSRCP leaders blocked the Manubolu National Highway in Nellore after a man named Yedukondalu died in police custody. The family alleged death by torture by police personnel. Traffic was disrupted for hours before police officials promised a full investigation. The YSRCP has demanded disciplinary action against the involved sub-inspector and constable.", "category": "India", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "8c68fcfe"}, {"headline": "Supreme Court dismisses appeal by Karnataka Deputy Chairman over vote recount", "summary": "The Supreme Court dismissed an appeal by Karnataka Legislative Council Deputy Chairman Pranesh M.K. against a High Court order for a vote recount. Pranesh’s narrow six-vote victory in the 2021 election was challenged by Congress candidate A.V. Gayathri Shanthe Gowda. The top court's decision clears the way for the recount to proceed as previously directed by the lower court.", "category": "Law", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "823704b1"}, {"headline": "Kerala women's bus ridership surges 87% following free travel scheme", "summary": "Daily female ridership on Kerala State Road Transport Corporation (KSRTC) ordinary buses rose from 6.48 lakh to 12.12 lakh after the Priyadarshini free travel scheme. Women now account for 66.6% of passengers. Transport Minister C.P. John noted the increase created new travel demand without reducing male ridership. He also denied reports of mass layoffs of temporary employees.", "category": "India", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "d174d321"}, {"headline": "RJD spokesperson Mrityunjay Tiwari resigns citing humiliation within the party", "summary": "Long-time Rashtriya Janata Dal (RJD) spokesperson Mrityunjay Tiwari resigned from the party, claiming there is no space for dedicated workers. Tiwari, a prominent face of the party since 2014, said he had voiced his grievances to Tejashwi Yadav and state president Mangani Lal Mandal. His exit marks a significant departure from the Lalu Prasad-led party ahead of future polls.", "category": "Politics", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "1cf50590"}, {"headline": "Chhattisgarh Assembly passes Ease of Doing Business Bill to simplify regulations", "summary": "The Chhattisgarh Assembly passed the Ease of Doing Business Bill, 2026, to reduce procedural hurdles for MSMEs. The law implements a risk-based approval framework for 43 services across eight departments. Officials claim Chhattisgarh is the first state to adopt such a trust-based permission system, which is expected to benefit over 15 lakh commercial establishments.", "category": "Economy", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "ae4fb063"}, {"headline": "Bhupinder Singh Hooda slams Haryana government over increased toll rates", "summary": "Congress leader Bhupinder Singh Hooda criticized the Haryana government for raising toll rates, alleging it amounts to \"looting the public.\" He stated that people are already suffering from high fuel costs and the additional toll burden is unjustified. Hooda called on the government to provide relief to commuters and stop the continuous increase in travel costs.", "category": "Politics", "page": 9, "importance": 4, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "14924317"}, {"headline": "CAG flags financial deficiencies in Maharashtra's Ladki Bahin welfare scheme", "summary": "The Comptroller and Auditor General (CAG) raised concerns over Maharashtra's Mukhyamantri Majhi Ladki Bahin Yojana, noting \"significant deficiencies\" in budget estimation and expenditure. The scheme's beneficiaries dropped from 2.43 crore to 1.66 crore following verification. The CAG described excess expenditure as unjustified and criticized the reappropriation of funds from other schemes.", "category": "Economy", "page": 15, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "3516c64e"}, {"headline": "Alexander Zverev's French Open victory highlights challenges of Type 1 diabetes", "summary": "Alexander Zverev became the first player with Type 1 diabetes to win a Grand Slam at the 2026 French Open. Diagnosed at age four, Zverev uses continuous glucose monitoring (CGM) and insulin therapy. His achievement brings attention to the \"game within a game\" of managing blood sugar during professional sports. He also runs a foundation to support children with the condition.", "category": "Health", "page": 16, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "4428c785"}, {"headline": "High Court orders Centre's response to Kunal Kamra's IT Rules challenge", "summary": "The Bombay High Court directed the Union government to respond to a petition by comedian Kunal Kamra challenging the Sahyog Portal and 2025 IT Rule amendments. Kamra argues the framework allows content blocking without safeguards or prior notice, violating free speech. The court scheduled the next hearing for August 14, granting the Centre time to file its affidavit.", "category": "Law", "page": 17, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "79ef7133"}, {"headline": "Supreme Court moves 'bulldozer justice' contempt cases to state High Courts", "summary": "The Supreme Court shifted contempt petitions regarding illegal house demolitions to respective state High Courts. Chief Justice Surya Kant stated High Courts are better suited to examine disputed facts and records. This follows the 2024 judgment declaring retributive demolitions as \"arbitrary use of power.\" The court ensured that any existing interim protections for owners will continue.", "category": "Law", "page": 17, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "7af90945"}, {"headline": "TMC MP visits Birbhum family wrongly deported to Bangladesh last year", "summary": "Trinamool MP Samirul Islam met the family of Sweety Bibi, who returned to Birbhum after being wrongly deported to Bangladesh by Delhi Police. Bibi and her children were detained on suspicion of being foreigners despite holding Indian citizenship. Islam called for state and central accountability to ensure genuine citizens do not face such hardships due to administrative lapses.", "category": "Politics", "page": 17, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "aee3fddc"}, {"headline": "Defence Minister Rajnath Singh emphasizes strategic infrastructure in future conflicts", "summary": "Defence Minister Rajnath Singh stated that strategic roads, tunnels, and ports remain indispensable for national security despite advances in military technology. Speaking at the Border Roads Organisation Conclave, he highlighted projects like the Atal and Sela tunnels. Singh asserted that those building infrastructure are as vital to border protection as soldiers on the frontline.", "category": "Infrastructure", "page": 17, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "40d25d05"}, {"headline": "Congress resolves to block reintroduction of 131st Constitutional Amendment Bill", "summary": "The Congress party stated it will \"strongly oppose\" any attempt by the Centre to reintroduce the delimitation Bill. President Mallikarjun Kharge requested an all-party meeting on the issue. The party also identified paper leaks, institutional corrosion, and alleged corruption in Ram Temple donations as key issues to raise during the upcoming Monsoon Session of Parliament.", "category": "Politics", "page": 18, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "3737fef7"}, {"headline": "Parliamentary panel warns VBSA Bill could undermine institutional autonomy", "summary": "A joint parliamentary committee warned that the Viksit Bharat Shiksha Adhishthan Bill, 2025, could centralize regulatory powers and affect the autonomy of higher education institutions. The draft report cautioned against potential bureaucratic overreach. The Bill proposes replacing existing bodies like the UGC and AICTE with a single regulator, a move critics say threatens academic freedom.", "category": "Education", "page": 18, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "844da321"}, {"headline": "Police tell Supreme Court Ajay Mishra not involved in witness intimidation", "summary": "Uttar Pradesh police informed the Supreme Court that former Minister Ajay Mishra and his son Ashish were not involved in the alleged intimidation of witnesses in the 2021 Lakhimpur Kheri violence case. Charges were instead filed against another individual. The court was also told that trial proceedings for the deaths of four farmers are expected to conclude within three months.", "category": "Law", "page": 18, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "f53da7ad"}, {"headline": "NITI Aayog proposes ₹50,000 crore fund to transform India's bioeconomy", "summary": "NITI Aayog released a roadmap to make India a top three global biotechnology power by 2035. The plan includes a ₹50,000-crore BioEconomy Growth Fund and six national missions, including 'GeneIndia' and 'AgriBio 2.0'. The goal is to expand the bioeconomy to $691 billion by 2035, creating 30 million jobs and bridging the gap between research and commercial manufacturing.", "category": "Science", "page": 19, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 19, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "028ffc62"}, {"headline": "Tax department to display foreign asset data on taxpayer portals", "summary": "The Central Board of Direct Taxes (CBDT) will allow taxpayers to view information received from abroad regarding their foreign assets and income via the Annual Information Statement (AIS). India receives this data from over 100 countries. The move aims to promote voluntary compliance and transparency by showing taxpayers exactly what information the department possesses.", "category": "Economy", "page": 20, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "a9645843"}, {"headline": "Wipro reports flat net profit and announces interim dividend", "summary": "Wipro reported a nearly flat net profit of ₹3,352 crore for the June quarter, despite an 11% rise in revenue to ₹24,479 crore. The company booked $3.4 billion in total deals and declared an interim dividend of ₹2 per share. Wipro provided a cautious revenue guidance of -1.5% to 0.5% for the next quarter, citing global macroeconomic uncertainties and client spending cuts.", "category": "Business", "page": 20, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "237b6273"}, {"headline": "Petrol pump owners raise concerns over water contamination in E20 fuel", "summary": "Petrol dealers claim that the hygroscopic nature of ethanol is causing E20 fuel to bind with moisture, leading to \"phase separation\" and engine damage. They argue existing underground tanks are ill-equipped for higher ethanol blends, especially in coastal areas. Dealers are calling for better infrastructure and public awareness as they face financial losses from contaminated stock.", "category": "Economy", "page": 20, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "5fd8e8d9"}, {"headline": "Iran accuses U.S. of barbaric attack near Ahvaz cancer hospital", "summary": "Tehran condemned a U.S. strike near a cancer hospital in Ahvaz, which forced the evacuation of 211 pediatric patients. Foreign Ministry spokesperson Esmaeil Baqaei described the action as reminiscent of atrocities against healthcare. Residents reported intense explosions, while Iran warned that American attacks on infrastructure would lead to escalated regional retaliation.", "category": "World", "page": 21, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 21, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "c2fdeecf"}, {"headline": "U.S. intensifies strikes on Iranian targets as naval tensions rise", "summary": "The U.S. military expanded its strikes to northern Iran and targeted a ship allegedly attempting to break a naval blockade. Iran retaliated with missile and drone attacks on U.S. allies, warning it would not permit interference in the Strait of Hormuz. Iranian officials reported over 35 deaths and 300 injuries from recent strikes targeting missile production sites.", "category": "World", "page": 21, "importance": 9, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 21, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "cd352287"}, {"headline": "Israel to maintain security zones in Lebanon, Syria, and Gaza", "summary": "Israeli Defence Minister Israel Katz informed his U.S. counterpart that Israel will keep forces in \"security zones\" across its borders to protect against jihadist threats. This follows President Trump's request for troop withdrawals. Israel continues to occupy a buffer zone in the Golan Heights and has forces deployed 10km into Lebanese territory to maintain border security.", "category": "World", "page": 21, "importance": 9, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 21, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "6d84a0ae"}, {"headline": "Kremlin sees no immediate prospect for peace talks with Ukraine", "summary": "Kremlin spokesperson Dmitry Peskov stated there is no current hope for resuming peace negotiations with Ukraine, despite Russia remaining officially open to the idea. Recent cross-border strikes killed five people, including a teenager in Russia’s Bryansk region. Both nations also reported missile attacks on maritime vessels in the Black Sea and Sea of Azov.", "category": "World", "page": 21, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 21, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "4557f0a1"}, {"headline": "UN Secretary-General appoints Rabab Fatima as head of Afghanistan mission", "summary": "Antonio Guterres appointed Bangladeshi diplomat Rabab Fatima as the new head of the UN Assistance Mission in Afghanistan (UNAMA). Fatima, a veteran with 30 years of diplomatic experience, previously served as high representative for least developed countries. She succeeds Georgette Gagnon in the role, taking over leadership of the critical mission.", "category": "World", "page": 21, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 21, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "cd2c40f9"}, {"headline": "Trump administration finalizes stricter visa limits for students and journalists", "summary": "The U.S. government finalized rules limiting foreign student visas to a maximum of four years and restricting journalist stays to 240 days (90 days for Chinese nationals). The Department of Homeland Security claims the move prevents indefinite stays. The change is part of a broader immigration crackdown aimed at tightening legal pathways to remaining in the United States.", "category": "World", "page": 21, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 21, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "6bcd9f1e"}, {"headline": "Alireza Firouzja defeats Pranesh in Chennai Grand Masters opener", "summary": "Alireza Firouzja won a marathon 79-move game against young Indian GM M. Pranesh to lead the Chennai Grand Masters chess tournament. Other matches, including the clash between World Champion D. Gukesh and Nihal Sarin, ended in draws. Firouzja’s win makes him the only winner of the first round in a field that includes high-rated players like Nodirbek Abdusattorov.", "category": "Sports", "page": 23, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 23, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "9890bb4a"}, {"headline": "U Mumba TT secures second consecutive win in Ultimate Table Tennis", "summary": "U Mumba TT defeated PBG Pune Jaguars 9-6 to record their second straight victory in Ultimate Table Tennis Season 7. Manush Shah and Anna Hursey were instrumental, winning their mixed doubles match 3-0. Lilian Bardet also secured a vital 2-1 win over Omar Assar. Despite a late push by Pune's Prithika Pavade, U Mumba maintained control to take the tie.", "category": "Sports", "page": 23, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 23, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "4101bad7"}, {"headline": "FCNR (B) Inflows Trail Expectations as Rupee Falls Over 1 Percent", "summary": "Inflows into foreign currency non-resident (bank) deposits have fallen short of market expectations, contributing to the rupee dropping over 1% against the dollar this week. Despite RBI support measures in June, international crude oil price spikes following US-Iran hostilities have put the Indian currency under renewed pressure, settling at a two-month low of 96.35.", "category": "Economy", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "ebf014da"}, {"headline": "USFDA Approves Merck’s Lipfendra Pill to Significantly Lower Cholesterol", "summary": "The USFDA has approved Merck’s once-daily oral pill, Lipfendra (enlicitide), which inhibits the PCSK9 protein to lower LDL cholesterol by up to 60%. Priced at $315 for a 30-day supply, it offers a cheaper and easier alternative to existing injectable treatments for high-risk heart patients who do not achieve targets with traditional statins.", "category": "Science", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "1e790150"}, {"headline": "Centre Plans to Substitute $189 Billion of Imports With Local Manufacturing", "summary": "The Centre has identified 1,272 products, including chemicals and electronics, to substitute imports worth $189 billion through targeted domestic manufacturing. The strategy focuses on items with annual imports exceeding $50 million. Only 26% of India's total import basket is considered realistically amenable to substitution based on current industrial assessments.", "category": "Economy", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "158f46e0"}, {"headline": "Automakers Shift Recruitment Focus Toward Software and Electronics Engineers", "summary": "Indian carmakers are fundamentally changing hiring strategies as vehicles evolve into software-defined machines. At Tata Motors, over 60% of new engineering hires now specialize in electrical, electronics, and software systems. This shift is also increasing female employment, with companies like Ashok Leyland and MG Motor establishing women-only assembly lines.", "category": "Business", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "7f083f42"}, {"headline": "Wipro Reports Flat Q1 Net Profit at Rs 3,352 Crore", "summary": "Wipro’s first-quarter net profit rose less than 1% year-on-year to Rs 3,352 crore, missing analyst estimates. Revenue grew 10.6% to Rs 24,480 crore, but IT services revenue remained tepid. CEO Srini Pallia cited a resilient but cautious macro environment with longer decision cycles, leading to a weak revenue guidance for the upcoming quarter.", "category": "Business", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "b4df14dd"}, {"headline": "Tech Mahindra Net Profit Surges 28.4% in First Quarter", "summary": "Tech Mahindra reported a 28.4% year-on-year increase in net profit to Rs 1,465 crore for Q1FY27. Revenue rose 17.6% to Rs 15,712 crore, driven by strong performance in manufacturing and financial services. Despite the surge, the profit figure narrowly missed Bloomberg analyst estimates, though the firm saw its strongest deal wins in several quarters.", "category": "Business", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "9f645c49"}, {"headline": "Mahindra Chakan Plant Hits Milestone of Three Million Vehicle Units", "summary": "Mahindra & Mahindra’s Chakan facility has crossed the cumulative production milestone of 3 million vehicles. The latest 1 million units were produced in just 27 months, significantly faster than the 107 months taken for the first million. The milestone unit was a BE 6 electric SUV. The 657-acre plant currently manufactures 19 models across PV, EV, and CV segments.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "8f501f04"}, {"headline": "India’s Gig Workforce Projected to Reach 21 Million by 2030", "summary": "A report by Redseer Strategy Consultants estimates India’s active gig workforce in delivery and ride-hailing will grow to 17-21 million by 2030, up from 6 million currently. The sector is expected to grow at a CAGR of 24-29%, eventually making up 3% of India's total workforce as platform-based work expands significantly beyond major metropolitan areas.", "category": "Economy", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "2bdc1a6e"}, {"headline": "CCI Dismisses Abuse of Dominance Complaint Against Delhi Airport", "summary": "The Competition Commission of India closed a case against Delhi International Airport Limited regarding security service contracts. The regulator found no evidence that DIAL abused its dominance by awarding contracts to GMR subsidiary RAXA. The CCI noted the contracts followed a transparent competitive bidding process and did not violate antitrust laws.", "category": "Law", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "cc944d25"}, {"headline": "McLeod Russel to Sell Tea Gardens After NARCL Withdraws Insolvency", "summary": "McLeod Russel India will proceed with the sale of tea gardens after NARCL withdrew its insolvency application at the NCLT. The company must repay sustainable debt of Rs 1,050 crore by February 2029. Three gardens in Assam—Nya Gogra, Rupajuli, and Boroi—are part of the first tranche of sales intended to clear outstanding dues to the state-backed bad bank.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "f5d3d4ac"}, {"headline": "Apparel Retailers Reduce Discounts as End-of-Season Demand Stays Strong", "summary": "Apparel retailers are shortening sale periods and offering fewer discounts this season as demand for full-priced merchandise remains high. Boosted by an active wedding calendar and recent tax relief measures, brands like Lifestyle and Biba report double-digit growth in fresh stock sales, leading them to launch new collections earlier than usual.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "178a268e"}, {"headline": "Ceat Net Profit Slumps 96% Due to Sri Lankan Rupee Depreciation", "summary": "Tyre maker Ceat saw its Q1 net profit crash 96.4% to Rs 4 crore, primarily hit by a Rs 50 crore impact from the depreciation of the Sri Lankan rupee on dollar-denominated debt. Despite the profit slump, revenue from operations rose 22.4% to Rs 4,318 crore, supported by strong double-digit growth across most domestic demand segments.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "a30958a9"}, {"headline": "Government Summons Meta Over Child Sexual Abuse Material on Instagram", "summary": "Union Minister Ashwini Vaishnaw has directed officials to summon Meta Platforms following a BBC investigation revealing child sexual abuse material in Instagram advertisements. The government seeks an explanation regarding the presence of such content and the platform's failure to prevent its dissemination through paid promotional tools.", "category": "Technology", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "d514a6e2"}, {"headline": "Google Loses $854,000 Italian Appeal Over YouTube Gambling Ads", "summary": "Alphabet unit Google lost a legal battle in Europe’s top court against an $854,250 fine imposed by Italy’s communications authority. The fine was issued four years ago for allowing gambling advertisements on YouTube, violating Italian regulations. The Court of Justice of the European Union sided with the national regulator, upholding the penalty.", "category": "Technology", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "f2a050be"}, {"headline": "Delhi High Court Hears Plea Against Meta’s ‘Edit Post’ Feature", "summary": "Two digital creators have approached the Delhi High Court alleging that Meta’s 'Edit Post' feature is being misused to backdate Facebook posts. The petitioners claim this allows unidentified persons to falsely claim ownership of original content and initiate copyright strikes, leading to the suspension or deletion of legitimate creator accounts.", "category": "Law", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "9ac24cd2"}, {"headline": "India Key Partner for EU in Semiconductor Research and Development", "summary": "European Commission Executive VP Henna Virkkunen identified India as a crucial partner for the EU in the semiconductor sector. Speaking at the India-EU Trade and Technology Council, she emphasized that India’s vast pool of skilled talent is essential as the bloc seeks to strengthen its chip supply chains and build technological sovereignty with trusted partners.", "category": "Technology", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "074d290e"}, {"headline": "PARIVARTAN Scheme Approved to Replace Old Trucks and Buses in NCR", "summary": "The Urban Affairs Ministry approved guidelines for the PARIVARTAN scheme, which aims to replace polluting trucks and buses in the National Capital Region with BS-VI or electric vehicles. The scheme has a total outlay of Rs 9,585 crore, including Rs 5,041 crore in central budgetary support, to reduce transport-related air pollution.", "category": "Environment", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "64e9289a"}, {"headline": "Aluminium Industry Seeks Duty Cut to Protect Downstream MSMEs", "summary": "Downstream aluminium bodies have urged the Ministry of Mines to reduce the 8.25% import duty on primary metal. They argue the tariff allows domestic producers to maintain import-parity pricing, squeezing MSME margins by up to 70%. Input costs have reportedly risen 20-35% in three months due to global price surges and the West Asia conflict.", "category": "Economy", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "4b69d487"}, {"headline": "Taxpayers Can Now View Reported Foreign Assets via AIS Portal", "summary": "The CBDT has enabled the display of foreign bank accounts, investments, and income in the Annual Information Statement (AIS) on the e-filing portal. Data is received from over 100 jurisdictions under the Automatic Exchange of Information framework. The move aims to help taxpayers disclose overseas assets correctly and avoid scrutiny during return filing.", "category": "Economy", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "cfd052e2"}, {"headline": "Moody’s Forecasts Global Growth Slowdown; India to Remain Fastest Growing", "summary": "Moody’s Analytics expects global growth to slow to 2.5% in 2026, though the AI boom has prevented a sharper recession. While India will remain the fastest-growing major economy, the report warns it will lose some momentum as global demand softens. Geopolitical risks and trade friction remain significant threats to the current economic outlook.", "category": "Economy", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "540f4225"}, {"headline": "EPFO to Issue Corrigendum Clarifying Provident Fund Rules for International Workers", "summary": "The EPFO is preparing a corrigendum for the EPF Scheme 2026 to resolve ambiguity regarding wage ceilings for international workers. Drafting inconsistencies had suggested a possible shift to a Rs 15,000 cap, but officials clarified there is no proposal to change the existing framework where contributions are based on total wages under bilateral agreements.", "category": "Economy", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "809e4c51"}, {"headline": "WTTC Report Urges India to Ease Visa Rules to Boost Tourism", "summary": "A WTTC report projects travel and tourism will contribute 6.7% to India's GDP in 2026, supporting 48.1 million jobs. However, CEO Gloria Guevara noted that India needs significant visa reforms and better land connectivity to unlock its full potential. International visitor spending is projected to reach Rs 3.3 trillion in 2026, up 15.3% from 2025 levels.", "category": "Economy", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "253826e0"}, {"headline": "UK Steel Safeguard Deal to Strengthen Indian Export Quotas", "summary": "India has secured a 40% exclusive reservation under the UK's Authorised Use Scheme for steel exports following the implementation of the CETA agreement on July 15. The move allows Indian steel to enter the UK without attracting a 50% duty until the specific quota threshold is reached, building on the doubling of iron and steel exports over the last decade.", "category": "Economy", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "c56962f7"}, {"headline": "Wealth-Tech Firms Emerge as Most Profitable Fintech Segment: Jefferies", "summary": "A Jefferies report shows Indian fintech revenue hit Rs 1.03 trillion in FY25, up 22.4%. While digital payments dominate revenue, wealth-tech firms hold the largest share of the profit pool. The industry's net profit reached Rs 2,300 crore in FY25, reversing a loss in FY23, with projections to reach Rs 4,300 crore in profit by FY30.", "category": "Business", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "eb89cfc4"}, {"headline": "India’s Fintech Funding Hits $2 Billion in First Half of 2026", "summary": "Fintech funding in India rose 42% year-on-year to $2 billion in H1 2026 across 106 rounds. Late-stage companies absorbed 80% of the total capital. Major rounds included Cred ($900mn) and KreditBee ($220mn). The period saw two companies, Kissht and Turtlemint, go public, while Square Yards and KreditBee emerged as new unicorns.", "category": "Business", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "81abc260"}, {"headline": "RBI Mandates Banks Dispose of Immovable Bad Loan Assets in 7 Years", "summary": "The RBI has directed banks to sell immovable assets acquired against bad loans within a maximum of seven years via public auction. The central bank also barred banks from selling these assets back to the original borrower or related parties. For 'legacy' assets currently held, banks have until September 2027 to achieve compliance with the new framework.", "category": "Economy", "page": 6, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "87827e1c"}, {"headline": "Uttar Pradesh to Raise Rs 130 Crore via Municipal Bonds for Two Cities", "summary": "The UP government plans to raise Rs 80 crore and Rs 50 crore through municipal bonds for Gorakhpur and Moradabad, respectively. This follows the successful raising of Rs 500 crore for five other major cities. The funds will be used for local infrastructure development, continuing UP's lead in using debt instruments for urban body financing.", "category": "Infrastructure", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "ebd0f388"}, {"headline": "Rajasthan Opens 12th Phase of Industrial Plot Allotment Under PPP Model", "summary": "RIICO has opened applications for its direct industrial plot allotment scheme until July 28. The 12th phase targets entrepreneurs who signed MoUs during the 2024 Investment Summit. The policy allows for private participation in industrial park development, with Category D parks functioning under a joint venture model where RIICO retains at least 26% equity.", "category": "India", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "5e69e60d"}, {"headline": "Agriculture Minister Urges Scientists to Find Non-GMO Yield Solutions", "summary": "Agriculture Minister Shivraj Singh Chouhan called on the scientific community to develop non-genetically modified solutions for pulses and oilseeds to reduce import reliance. He noted that India imports 15-16 million tonnes of edible oils annually and challenged ICAR scientists to close the yield gap between rice and high-protein pulses.", "category": "Science", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "825721bd"}, {"headline": "ICAR Roadmap Aims for 2.1 Billion Tonne Agriculture Production by 2047", "summary": "ICAR plans to nearly double India's agriculture production to 2.1 billion tonnes by 2047. The strategy includes capping rice acreage to push for diversification into maize, pulses, and horticulture. The roadmap also targets raising farm mechanisation from 47% to over 80% and expanding agroforestry cover to 50 million hectares over the next two decades.", "category": "Science", "page": 7, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "2aaed6ba"}, {"headline": "Government Lists Five New Bills for Monsoon Session; Skips Women’s Quota", "summary": "The government’s monsoon session agenda includes five new Bills, notably one to make insulting the national song Vande Mataram a punishable offense. However, the list excludes the high-profile women's reservation and delimitation Bills. Other proposed legislation covers tighter registration of births and deaths and updates to the MSME Development Act.", "category": "Politics", "page": 7, "importance": 9, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "81ad0a1a"}, {"headline": "BIMSTEC National Security Chiefs Vow Joint Action Against Terrorism", "summary": "National security chiefs from BIMSTEC nations, including India, met in New Delhi to coordinate against regional challenges such as terrorism and organized crime. Hosted by NSA Ajit Doval, the group endorsed new principles for maritime law enforcement. The summit focused on strengthening cooperation among member states to ensure a secure Bay of Bengal region.", "category": "Politics", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "b686a2b1"}, {"headline": "Iran Requests Houthis Stand Ready to Close Red Sea Shipping Route", "summary": "Tehran has reportedly asked Yemen’s Houthi movement to prepare to block the Red Sea oil route if the US strikes Iranian power infrastructure. Sources say the Houthis have deployed drones and missiles near the Bab al-Mandeb strait. This threat to a gateway carrying 7% of global energy supplies heightens risks of a major global energy crisis.", "category": "World", "page": 8, "importance": 10, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "a854cf2f"}, {"headline": "US Imposes 25% Tariffs on Brazil Imports in Trade Reset Strategy", "summary": "The US has announced 25% duties on many Brazilian imports under Section 301 of US trade law, citing unfair trade practices. Brazilian President Lula da Silva called the decision unjustified and political. Experts warn this move could be a precursor for similar actions against other partners like India and China as Washington seeks a global trade reset.", "category": "World", "page": 8, "importance": 9, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "bf7a19e8"}, {"headline": "US Treasury Begins Minting $1 Coin Featuring President Trump’s Face", "summary": "The US Mint has started production of a gold-finished USD 1 commemorative coin featuring President Donald Trump to celebrate America’s 250th birthday. The design was approved by the US Commission of Fine Arts. Treasury Secretary Scott Bessent stated the coin is intended to honor the legacy of liberty and serve as a symbol of patriotism.", "category": "World", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "1ebe8196"}, {"headline": "Government Unlikely to Support Tech Transfer Costs Under ISM 2.0", "summary": "The Centre is expected to withdraw fiscal incentives for technology transfer fees and land procurement in the second phase of the India Semiconductor Mission. Officials stated that calculating fair technology transfer fees is too complex. Instead, state governments will lead on land allocation while the Centre focuses on pari passu incentives for manufacturing.", "category": "Technology", "page": 12, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "059f2ce6"}, {"headline": "AI Startup Aina Raises $5.5 Million for New Hardware Interface", "summary": "Bengaluru-based Aina has raised $5.5 million in seed funding led by Redstart Labs to develop a general-purpose AI interface. The company, founded by former Ultrahuman executive Apoorv Shankar, aims to reshape device interaction through context-aware hardware. The funds will be used to scale its engineering team in San Francisco and Bengaluru.", "category": "Business", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "097336e7"}, {"headline": "KickSky Space Lab to Launch Third Startup Cohort in September", "summary": "Space-tech accelerator KickSky Space Lab plans to select five or six early-stage startups for its third cohort. Co-founded by deep-tech investors including Riceberg Ventures, the accelerator focuses on Supporting space innovation in India. Final selections are expected by August, with the program beginning around September.", "category": "Technology", "page": 12, "importance": 4, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "ad582c39"}, {"headline": "Reliance Industries Expected to Post Strong Q1 Growth on Friday", "summary": "Analysts expect RIL to report double-digit revenue growth in Q1FY27, with Ebitda reaching up to Rs 49,100 crore. Performance is likely driven by steady O2C margins, retail momentum, and Jio’s subscriber additions. Average revenue per user (Arpu) for Jio is expected to rise to Rs 216, while the street monitors the timing of potential telecom tariff hikes.", "category": "Business", "page": 16, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "ac48da87"}, {"headline": "Oil Price Spike Threatens to Halt Return of Foreign Investors", "summary": "A 14% rise in crude oil prices over four sessions has caused FPIs to turn net sellers in Indian equities, offloading shares worth Rs 7,443 crore. The reversal follows the re-escalation of hostilities in West Asia. Market participants warn that elevated US bond yields and rising inflation concerns from oil could lead to sustained capital outflows from India.", "category": "Economy", "page": 16, "importance": 9, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "17cbfe04"}, {"headline": "Sebi Eases Certification Norms for Specialized Investment Fund Distributors", "summary": "NISM has introduced a unified certification for mutual fund and specialized investment fund (SIF) distribution, removing the need for separate exams. The new V-D series examination reduces syllabus difficulty by removing currency derivatives. The change is expected to boost SIF distribution strength, which currently lags far behind the mutual fund base.", "category": "Business", "page": 16, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "53e0c3c1"}, {"headline": "MSCI Index Rebalancing Likely to Attract $2.3 Billion Passive Inflows", "summary": "A JM Financial report suggests the upcoming MSCI India Standard Index review could drive $2.3 billion in inflows. Potential fresh inclusions include Adani Green Energy and Groww. The changes, to be announced August 12, are expected to alter the composition of the index and trigger fund flows from global passive investors tracking the benchmark.", "category": "Economy", "page": 16, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "eb6f35cd"}, {"headline": "HDFC Life Reports Strong Q1 Margins Despite Slower Growth", "summary": "HDFC Life reported a 9% rise in VNB to Rs 880 crore, with margins expanding to 25.6% excluding GST impact. While retail protection grew 42%, overall bancassurance remained flat due to muted volumes at HDFC Bank. Management maintains mid-teens growth guidance for the fiscal year, despite underperforming some peers in annual premium equivalent growth.", "category": "Business", "page": 16, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "c100b9fe"}, {"headline": "Former ISRO Chief S Somanath Joins Agnikul Cosmos as Observer", "summary": "Agnikul Cosmos has appointed former ISRO Chairman S Somanath to its board of directors as an observer. The appointment comes as the private launch company prepares for Mission 02, which will attempt India's first recovery of an orbital-class rocket booster. Somanath's expertise is expected to guide Agnikul's efforts in establishing rocket reusability.", "category": "Technology", "page": 20, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "16a021a3"}, {"headline": "IELTS to Transition to Fully Computer-Based Format From September", "summary": "IDP Education announced that the IELTS exam will move to a fully computer-based format in India starting September 2026. Paper-based tests will conclude on August 22. The speaking component will remain face-to-face with examiners. The move is intended to provide candidates with more frequent test dates and faster result processing within three to five days.", "category": "Education", "page": 20, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130789", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/130789"}], "article_id": "bedb0082"}, {"headline": "Man acquitted of 1977 murder after serving 45-year life term", "summary": "The Supreme Court acquitted a man who served 45 years in jail for a 1977 murder, finding the prosecution's story doubtful and inconsistent. The court overturned the 2011 high court verdict that had upheld his life imprisonment, bringing an end to a decades-long legal struggle.", "category": "Law", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/130764", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130764"}], "article_id": "140a6d42"}, {"headline": "Government plans provident fund cover for informal sector workers", "summary": "The Indian government is developing a new provident fund scheme to provide social security to millions of informal, gig, and self-employed workers. The model allows voluntary contributions with flexibility on payment frequency, aiming for universal coverage outside traditional networks.", "category": "Economy", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130764", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130764"}], "article_id": "d82713bf"}, {"headline": "WHO links air pollution as major risk factor for dementia", "summary": "New World Health Organization guidelines identify air pollution as a significant preventable risk factor for dementia. Tackling pollution, along with lifestyle factors like smoking and physical inactivity, could help prevent or delay up to 45% of dementia cases globally.", "category": "Health", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130764", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130764"}], "article_id": "77ffefe5"}, {"headline": "SC clarifies bulldozer order is not a blanket ban", "summary": "The Supreme Court clarified that its recent order against 'bulldozer justice' is not a blanket ban on removing illegal encroachments. The court stated that authorities must follow due process of law and judicial guidelines before carrying out any demolition activities.", "category": "Law", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130764", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130764"}], "article_id": "fafba728"}, {"headline": "US Defense Secretary Hegseth announces mandatory testosterone screening for troops", "summary": "US Defense Secretary Pete Hegseth has announced a new initiative requiring mandatory annual testosterone screening for all troops aged 30 and older. The move aims to combat testosterone deficiency that can undermine health and military readiness.", "category": "World", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130764", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130764"}], "article_id": "14627f5e"}, {"headline": "RITES report claims double-decker flyover may reduce Metro ridership", "summary": "A report by RITES suggests that the proposed 37km double-decker flyover on Bengaluru's Orange Line Metro corridor could encourage private vehicle use and reduce Metro gains. The report recommends prioritizing public transport infrastructure over flyovers for personal vehicles.", "category": "Infrastructure", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130764", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130764"}], "article_id": "33219827"}, {"headline": "Cough syrups sold without prescriptions in Bengaluru despite curbs", "summary": "A TOI check across Bengaluru pharmacies revealed that many continue to sell scheduled cough syrups containing codeine without a doctor's prescription, despite recent government restrictions. Pharmacists were found dispensing these syrups with minimal questioning.", "category": "Health", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130764", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130764"}], "article_id": "b9b799d1"}, {"headline": "22-year-old graduate crushed to death in Bengaluru cage lift", "summary": "A young BSc graduate died after getting his head trapped in a cage-style service lift at a hotel in Jayanagar, Bengaluru. Police have registered a case of negligence against the hotel owner as the lift reportedly lacked essential safety features.", "category": "India", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/130764", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130764"}], "article_id": "875f16c8"}, {"headline": "Bengaluru clinic fined ₹50,000 for improper biomedical waste disposal", "summary": "The BBMP has imposed a fine of ₹50,000 on a private clinic in Jayanagar for dumping hazardous biomedical waste, including used syringes and needles, on a public roadside. The action follows a surprise inspection by municipal marshals.", "category": "Environment", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/130764", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130764"}], "article_id": "a88487a0"}, {"headline": "Schoolboy dies after collapsing in class; family alleges medical delay", "summary": "A 12-year-old student died after collapsing in a private school in Bengaluru. His parents have alleged that a delay in providing medical aid and school staff's failure to take him to a hospital immediately led to his death.", "category": "India", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130764", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/130764"}], "article_id": "0c5574d1"}, {"headline": "Bengaluru man kills pregnant wife with dog leash before suicide", "summary": "A 30-year-old man allegedly strangled his pregnant wife with a dog leash before dying by suicide in Channammanakere Achchukattu. Police suspect financial distress and marital discord as possible motives behind the tragic incident.", "category": "India", "page": 3, "importance": 4, "telegram_url": "https://t.me/c/1877410077/130764", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/130764"}], "article_id": "2e684e46"}, {"headline": "Karnataka girl secures All India Rank 20 in NEET results", "summary": "Vaishnavi Das from Bengaluru secured All India Rank 20 in the NEET-UG 2026 results, scoring 715 out of 720. A total of 1.12 lakh candidates from Karnataka qualified for the medical entrance test this year.", "category": "Education", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130764", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/130764"}], "article_id": "bbd11156"}, {"headline": "Karnataka govt shifts 4.3 lakh BPL ration cards to APL", "summary": "The Karnataka government has shifted 4.3 lakh BPL ration cards to the APL category after a verification process found the holders ineligible. The move is expected to save the state exchequer significantly while more cards remain under scrutiny.", "category": "Economy", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130764", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/130764"}], "article_id": "e0251339"}, {"headline": "BJP threatens to disrupt Karnataka assembly over Bidadi project", "summary": "The opposition BJP has threatened to stall the upcoming Karnataka legislature session if the government does not scrap the proposed Bidadi township project. BJP leaders allege that the project was planned without proper consultation or legal processes.", "category": "Politics", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130764", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/130764"}], "article_id": "5656438c"}, {"headline": "Karnataka seeks national calamity status from Centre for drought", "summary": "Karnataka has urged the Union government to declare the state's drought situation a national calamity to facilitate immediate financial relief. The state highlighted a significant rainfall deficit in several districts affecting agriculture and drinking water.", "category": "Environment", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130764", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/130764"}], "article_id": "bfdfdafa"}, {"headline": "SC to examine if marital rape exception shields men from prosecution", "summary": "The Supreme Court has agreed to examine challenges to the constitutional validity of penal provisions that exempt husbands from prosecution for marital rape. The court will hear arguments on whether this exception violates a woman's right to dignity and bodily autonomy.", "category": "Law", "page": 6, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130764", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130764"}], "article_id": "074fa515"}, {"headline": "BMC demands ₹27 crore from Taj Hotel for road occupation", "summary": "The Mumbai civic body has issued a demand notice to the Taj Mahal Palace Hotel for ₹27 crore as fees for occupying public roads and footpaths for security purposes. The roads were barricaded following the 26/11 attacks, and earlier concessions have now been withdrawn.", "category": "Infrastructure", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130764", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130764"}], "article_id": "7cc15532"}, {"headline": "Government plans bill to penalize insults to Vande Mataram", "summary": "The Union government is considering a bill to penalize the intentional insult or obstruction of the singing of 'Vande Mataram'. The proposed law would make such acts a punishable offense, similar to protections provided to the National Anthem.", "category": "Politics", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130764", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/130764"}], "article_id": "71057fd2"}, {"headline": "WHO urges governments to regulate children's access to online apps", "summary": "The WHO has urged governments to introduce safeguards to protect children from the negative health impacts of digital platforms. Concerns include rising rates of online harassment, digital addiction, and exposure to harmful content affecting mental well-being.", "category": "Health", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130764", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/130764"}], "article_id": "d7eb60f4"}, {"headline": "RBI bars banks from selling seized assets back to defaulters", "summary": "The RBI has issued a new directive barring banks and financial institutions from selling back seized assets to the same loan defaulter or their related parties. This measure aims to prevent strategic defaults and ensure the integrity of the debt recovery process.", "category": "Business", "page": 13, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130764", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/130764"}], "article_id": "c89d0053"}, {"headline": "Wipro Q1 net profit falls 1.4% to ₹3,000 crore", "summary": "Wipro reported a 1.4% year-on-year decline in its Q1 net profit to ₹3,000 crore, trailing its industry peers. The company attributed the soft performance to cautious client spending on discretionary IT projects amid global economic uncertainty.", "category": "Business", "page": 13, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130764", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/130764"}], "article_id": "ebc60706"}, {"headline": "India-EU free trade agreement likely by year-end: Piyush Goyal", "summary": "Commerce Minister Piyush Goyal stated that India and the European Union are working to finalize a free trade agreement by the end of 2026. The pact is expected to significantly boost bilateral trade in goods and services between the two major economies.", "category": "Economy", "page": 13, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130764", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/130764"}], "article_id": "d20d3b78"}, {"headline": "Wife arrested for murder of Dharwad doctor and son", "summary": "Police have arrested the wife of a prominent doctor in Dharwad for allegedly stabbing her husband and their eight-year-old son to death. The accused was found sitting at the crime scene in a state of shock, and the motive is under investigation.", "category": "India", "page": 32, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130764", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 32, "telegram_url": "https://t.me/c/1877410077/130764"}], "article_id": "cfa819f6"}, {"headline": "Two Dead and Over 100 Injured in Puri Rath Yatra Crowd Surge", "summary": "Two devotees died and over 100 were hospitalized due to suffocation and heart attacks during a massive crowd surge at the annual Jagannath Rath Yatra in Puri, Odisha. The incident occurred on Badadanda road and Marichikot Square as lakhs gathered to pull sacred chariots from the 12th-century temple. Authorities have initiated medical intervention and are reviewing crowd management measures.", "category": "India", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁷⁰⁷²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130777"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/130693"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130764"}], "importance": 9, "article_id": "9980b7a4"}, {"headline": "Supreme Court Warns Third Language in Class 9 Increases Student Stress", "summary": "The Supreme Court questioned CBSE’s decision to make a third language compulsory in Class 9, stating it adds avoidable academic pressure on students preparing for board exams. The bench suggested introducing new languages earlier, such as in Class 5 or 6, to allow students sufficient time to cope before high-stress years. The court was hearing a plea regarding the three-language policy.", "category": "Education", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁷⁰⁷²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130777"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/130789"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/130764"}], "importance": 8, "article_id": "c15b86ac"}, {"headline": "India Advises Against Deploying Seafarers on Ships Transiting Strait of Hormuz", "summary": "India's Directorate General of Shipping has advised recruitment agencies to avoid deploying Indian seafarers on vessels transiting the Strait of Hormuz. The move follows heightened security risks and recent attacks on merchant ships in the West Asia region amid rising tensions from the US-Iran conflict. The advisory aims to protect Indian nationals from potential maritime security threats.", "category": "India", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁷⁰⁷²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130777"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130764"}], "importance": 8, "article_id": "efc4cd21"}, {"headline": "Messi’s Two Assists Lead Argentina Past England Into World Cup Final", "summary": "Lionel Messi provided two crucial assists as Argentina defeated England 2-1 in a dramatic World Cup semi-final. Argentina, heading to its seventh final, will now face Spain as they seek to retain their global title. Messi's performance drew comparisons to Diego Maradona's legendary legacy. England will face France in the third-place playoff following the loss in New Jersey.", "category": "Sports", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁷⁰⁷²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130777"}], "importance": 9, "article_id": "d9c98cc9"}, {"headline": "PM Modi Condoles Passing of Qatar’s Father Amir Sheikh Hamad", "summary": "Prime Minister Narendra Modi spoke with Qatar's Emir, Sheikh Tamim bin Hamad Al Thani, to express condolences on the passing of his father, former Emir Sheikh Hamad bin Khalifa Al Thani. Modi praised the late \"Father Amir\" for his legacy and significant role in guiding India-Qatar relations, emphasizing the deep diplomatic and personal ties between the two nations' leadership.", "category": "World", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁷⁰⁷²⁰²⁶.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130777"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/130693"}], "importance": 5, "article_id": "2ad7a041"}, {"headline": "Kharge Urges PM Modi to Hold All-Party Meeting on Delimitation Bill", "summary": "Congress president Mallikarjun Kharge has written to Prime Minister Narendra Modi requesting an all-party meeting to discuss the proposed delimitation bill before its introduction in the Monsoon session of Parliament. Kharge emphasized the need for a broad consensus regarding the redistricting of constituencies based on population to ensure a fair and representative process.", "category": "Politics", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁷⁰⁷²⁰²⁶.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/130777"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/130764"}], "importance": 7, "article_id": "9685ceb0"}, {"headline": "PM Modi to Flag Off India’s First Hydrogen Train in Punjab", "summary": "Prime Minister Narendra Modi is scheduled to visit Punjab to inaugurate infrastructure projects worth ₹5,470 crore. Highlights include flagging off India's first indigenous hydrogen-fuel-cell-powered train on the Jind-Sonipat route, marking a shift toward zero-emission rail transport. The visit also includes laying the foundation for a medical research institute and other strategic works.", "category": "Infrastructure", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁷⁰⁷²⁰²⁶.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/130777"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/130764"}], "importance": 8, "article_id": "41f54e9a"}, {"headline": "Jailed MP Rashid Engineer Granted Parole to Attend Parliament’s Monsoon Session", "summary": "A Delhi court has granted custody parole to Lok Sabha MP Engineer Rashid, currently jailed on terror-funding charges, to attend the Monsoon Session of Parliament from July 20 to August 13. Arrested in 2019 for alleged involvement in Jammu and Kashmir terror funding, Rashid will be escorted by armed police. The court cited his constitutional duties as a representative of his constituency.", "category": "Law", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁷⁰⁷²⁰²⁶.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/130777"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130693"}], "importance": 6, "article_id": "c87e5f25"}, {"headline": "SIT Summons
