<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Inter', -apple-system, sans-serif;
  background: #0c0c0c; color: #fff; touch-action: none;
}
.outer { position: fixed; inset: 0; overflow: hidden; }
.h-track { display: flex; height: 100%; will-change: transform; }
.cat-panel { flex-shrink:0; width:100vw; height:100%; display:flex; flex-direction:column; overflow:hidden; }
.progress-row { flex-shrink:0; display:flex; gap:4px; padding:14px 16px 10px; background:#0c0c0c; position:relative; z-index:5; overflow:visible; }
.progress-row::after { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:80%; height:120px; background:radial-gradient(ellipse at top,color-mix(in srgb,var(--cc) 30%,transparent) 0%,transparent 70%); pointer-events:none; z-index:-1; }
.pseg { flex:1; height:2px; border-radius:1px; background:rgba(255,255,255,0.12); position:relative; overflow:hidden; }
.pseg::after { content:''; position:absolute; inset:0; background:var(--cc,#e8334a); transform:scaleX(0); transform-origin:left; transition:transform 0.25s ease; }
.pseg.done::after, .pseg.active::after { transform:scaleX(1); }
.v-feed { flex:1; overflow:hidden; position:relative; clip-path:inset(0); }
.v-track { display:flex; flex-direction:column; will-change:transform; }
.card { width:100%; flex-shrink:0; background:#0c0c0c; display:flex; flex-direction:column; overflow:hidden; position:relative; }
.card-content { flex:1; display:flex; flex-direction:column; padding:36px 20px 22px; min-height:0; position:relative; z-index:1; }
.card-toprow { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; flex-shrink:0; }
.cat-pill { display:inline-flex; align-items:center; gap:7px; background:#1c1c1e; border-radius:8px; padding:7px 12px 7px 10px; font-size:11.5px; font-weight:700; letter-spacing:0.07em; color:#d0d0d0; text-transform:uppercase; line-height:1; }
.pill-icon { width:16px; height:16px; background:#2e2e30; border-radius:3px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.pill-icon svg { display:block; }
.card-date { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:500; color:#666; letter-spacing:0.01em; }
.card-headline { font-size:28px; font-weight:800; line-height:1.18; color:#fff; letter-spacing:-0.03em; margin-bottom:20px; flex-shrink:0; }
.card-summary { font-size:15.5px; font-weight:400; line-height:1.62; color:#6b6b6b; flex:1; overflow:hidden; display:-webkit-box; -webkit-line-clamp:7; -webkit-box-orient:vertical; }
.card-divider { height:1px; background:#1e1e1e; margin:20px 0 16px; flex-shrink:0; }
.card-footer { display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.src-chip { display:inline-flex; align-items:center; gap:6px; background:#181818; border:1px solid #282828; border-radius:9px; padding:8px 13px; font-size:12.5px; font-weight:600; color:#c0c0c0; text-decoration:none; letter-spacing:0.005em; line-height:1; }

.src-chip-ext svg { display:block; }
.info-btn { width:36px; height:36px; border-radius:50%; border:1.5px solid #252525; background:#141414; display:flex; align-items:center; justify-content:center; color:#555; cursor:pointer; flex-shrink:0; }
.cat-flash { position:fixed; inset:0; z-index:600; pointer-events:none; opacity:0; transition:opacity 0.12s; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; }
.cat-flash.on { opacity:1; }
.cf-icon { font-size:34px; }
.cf-name { font-size:22px; font-weight:900; letter-spacing:-0.03em; text-transform:uppercase; }
.hint { position:fixed; display:flex; flex-direction:column; align-items:center; gap:5px; pointer-events:none; z-index:400; opacity:0; transition:opacity 0.6s ease; }
.hint.visible { opacity:1; }
.hint.gone { opacity:0 !important; transition:opacity 0.4s; }
.hint-pill { font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.55); background:rgba(255,255,255,0.07); backdrop-filter:blur(10px); padding:5px 13px; border-radius:100px; border:1px solid rgba(255,255,255,0.09); }
.hint-arr { font-size:16px; color:rgba(255,255,255,0.4); }
.h-up { bottom:28px; left:50%; transform:translateX(-50%); animation:bUp 2s ease-in-out infinite; }
.h-right { top:50%; right:14px; transform:translateY(-50%); animation:bRight 2s ease-in-out infinite 0.6s; }
@keyframes bUp { 0%,100% { bottom:28px; opacity:.65; } 50% { bottom:36px; opacity:1; } }

egram_url": "https://t.me/c/1877410077/119230"}]}, {"headline": "Restaurant Staff Meals Foster Community and Regional Culinary Diversity", "summary": "Top Indian restaurants like The Bombay Canteen and Sienna Calcutta are using staff meals to build kitchen camaraderie. Chefs take turns cooking regional favorites from their hometowns, such as Manipuri salads or Panta Bhaat. These rituals allow teams to unwind and sometimes lead to new menu inspirations before service starts.", "category": "Culture", "page": 10, "importance": 2, "telegram_url": "https://t.me/c/1877410077/119230", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_04-04-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/119230"}]}, {"headline": "Raja Ravi Varma masterpiece sells for record Rs 167.2 crore", "summary": "Raja Ravi Varma’s 1890s painting 'Yashoda and Krishna' fetched Rs 167.2 crore at a Saffronart auction, seting a record for modern Indian art. The work was purchased by Cyrus S. Poonawalla. The sale highlights the strength of the domestic market for 'national treasure' artworks, which cannot be exported. It marks a historic moment for South Asian art valuation globally.", "category": "Culture", "page": 15, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "President Murmu Signs Controversial Transgender Bill Into Law", "summary": "President Droupadi Murmu gave her assent to the Transgender Persons (Protection of Rights) Amendment Bill 2026. Activists and queer community members have protested the law, arguing that it reintroduces clinical gatekeeping and undermines the right to self-determination of gender identity established by the 2014 NALSA judgement.", "category": "Law", "page": 3, "importance": 9, "telegram_url": "https://t.me/c/1877410077/119230", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_04-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119230"}]}, {"headline": "IBBI Proposes Mandatory Personal Wealth Disclosure for Promoters", "summary": "The Insolvency and Bankruptcy Board of India (IBBI) has issued draft regulations requiring promoters with guaranteed corporate loans to disclose personal assets during bankruptcy. Disclosures would include crypto assets, retirement funds, and foreign holdings. The move aims to improve valuations of bankruptcy estates and reduce creditor haircuts.", "category": "Law", "page": 17, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119230", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_04-04-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/119230"}]}, {"headline": "CCI Tighter Timelines Boost Merger Approval Certainty for Investors", "summary": "The Competition Commission of India cleared 194 merger cases within a revised 150-day deadline, down from the previous 210 days. All cases saw a prima facie view formed within 30 days. Lawyers say the faster approvals reduce financing costs and lower risk premiums for lenders and investors.", "category": "Law", "page": 17, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119230", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_04-04-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/119230"}]}, {"headline": "SEBI mandates granular disclosures for FPIs with concentrated equity holdings", "summary": "The Securities and Exchange Board of India has introduced new disclosure norms for high-risk Foreign Portfolio Investors. FPIs with over ₹25,000 crore in Indian equity AUM or concentrated holdings in a single corporate group must now disclose their ultimate beneficial owners. The regulations aim to enhance transparency and prevent the circumvention of minimum public shareholding rules.", "category": "Law", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119240", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_04-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119240"}]}, {"headline": "Supreme Court seeks response on plea regarding standardized medical healthcare costs", "summary": "The Supreme Court has issued a notice to the Centre on a petition seeking the implementation of standardized rates for medical procedures across India. The plea argues that lack of uniform pricing violates the right to affordable healthcare. The court has granted four weeks for the government to respond, noting the significant impact on patients nationwide.", "category": "Law", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119240", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_04-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119240"}]}, {"headline": "Supreme Court ends matrimonial dispute involving over 60 legal cases", "summary": "Invoking Article 142, the Supreme Court dissolved a 30-year marriage and wiped out over 60 pending legal cases between an estranged couple. The comprehensive settlement includes a ₹1 crore alimony payment and a property transfer. The bench noted the settlement was voluntary and provided a final 'quietus' to one of the most litigation-heavy marital disputes to reach the top court.", "category": "Law", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "Man arrested for cheating Mysuru firm of ₹6.3 crore via fraud", "summary": "Bengaluru police arrested Gagan N Deep for allegedly defrauding a Mysuru company of ₹6.3 crore by posing as a senior Infosys official. The suspect and three absconding associates convinced the firm to pay 'earnest money deposits' to secure corporate social responsibility grants. The accused reportedly spent the stolen funds at casinos in Goa and on online gaming.", "category": "Law", "page": 5, "importance": 3, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "Supreme Court dismisses petitions against TGPSC Group-1 recruitments", "summary": "The Supreme Court dismissed appeals challenging the recruitment of 563 candidates for Group-1 posts by the Telangana Public Service Commission. The court upheld a high court order, allowing the state to proceed with appointments. Telangana CM Revanth Reddy welcomed the verdict, stating it brings relief to thousands of aspirants and affirms the transparency of the recruitment process.", "category": "Law", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "Andhra IAS officer’s son among seven held in Hyderabad drug raid", "summary": "Telangana's EAGLE force arrested seven people, including the son of a senior Andhra Pradesh IAS officer, following a raid on a pub in Kondapur. Suspects tested positive for narcotics including ganja, methamphetamine, and benzodiazepine. The raid targeted drug abuse at a high-profile DJ event. Authorities are contacting parents to ensure the apprehended individuals undergo de-addiction.", "category": "Law", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "Supreme Court warns Gujarat over bureaucratic delays in prisoner remission", "summary": "The Supreme Court warned the Gujarat government that delays in implementing its remission policy could lead to penal orders against senior officials. The court noted that personal liberty cannot be held hostage to bureaucratic inefficiency, especially when prisoners have completed the 14-year minimum sentence. Officials were directed to ensure final decisions are made within mandated timelines.", "category": "Law", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "Court discharges Bhupinder Hooda and AJL in 2005 PMLA case", "summary": "A special ED court in Panchkula discharged former Haryana CM Bhupinder Singh Hooda and Associated Journals Limited in a money laundering case related to a 2005 land allotment. The ruling follows a previous high court decision that found no prima facie case of criminality. Hooda stated he has full faith in the judiciary, while the ED case was closed as the predicate offense was not established.", "category": "Law", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "DGCA tells HC airlines cannot bypass mandatory pilot rest periods", "summary": "The DGCA informed the Delhi High Court that its decision to allow earned leave to be counted as weekly rest for pilots does not authorize airlines to bypass mandatory safety requirements. The regulator withdrew an earlier advisory after airlines reported operational challenges and flight disruptions. The revised norms, which reduce pilot workload, remain central to the regulatory framework.", "category": "Law", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "Mehli Mistry Challenges Eligibility of Venu Srinivasan as Tata Trustee", "summary": "Former trustee Mehli Mistry has objected to the appointment of Venu Srinivasan and Vijay Singh as trustees of the Bai Hirabai Trust. Mistry claims they are ineligible under a 1923 Trust Deed because they are not of the Parsi Zoroastrian faith and lack permanent residence in Mumbai. He has requested a suo motu inquiry by the Maharashtra Charity Commissioner into the matter.", "category": "Law", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Supreme Court asks if disabled cadets can get ex-servicemen status", "summary": "The Supreme Court has asked the Centre to consider granting ex-servicemen status to military cadets boarded out due to disabilities sustained during training. This status would allow them to avail reservation benefits in government jobs. Currently, such cadets are often ineligible for benefits reserved for those who have completed their military service.", "category": "Law", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "IBC amendment to link application withdrawal to CoC formation", "summary": "The Insolvency and Bankruptcy Code (Amendment) Bill, 2026, will permit the withdrawal of insolvency applications only after the constitution of the Committee of Creditors (CoC). This move aims to prevent the misuse of the IBC as a mere recovery threat. Experts say this will bring more discipline and predictability to the resolution process, protecting the interests of all creditors.", "category": "Law", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "Government may review 50 million cases under Jan Vishwas Bill", "summary": "Commerce Minister Piyush Goyal stated the government might review 50 million pending cases involving minor regulatory offences following the passage of the Jan Vishwas (Amendment) Bill, 2026. The bill aims to decriminalize 717 provisions across 79 central acts, replacing imprisonment with civil penalties. Goyal urged states to adopt similar reforms to promote ease of doing business.", "category": "Law", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "No Courtroom for 50 Million Minor Cases, says Goyal", "summary": "The Commerce Ministry is urging departments to drop petty legal matters to decongest the judicial system. Currently, about 50 million pending cases relate to minor offenses that have never reached the courts. The government has already tweaked 183 provisions across 42 laws to decriminalize 1,000 minor offenses, aiming to improve the ease of living and doing business in India.", "category": "Law", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119223", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_04-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119223"}]}, {"headline": "Malda Hostage Case: AIMIM Member Held While Fleeing", "summary": "The NIA has arrested the alleged mastermind behind a hostage situation involving judicial officials in West Bengal's Malda. Mofakkarul Islam, an AIMIM member, was apprehended at Bagdogra airport while trying to flee. The incident involved the detention of seven judicial officers by a mob. NIA has registered 19 cases related to the violence and is investigating wider political links.", "category": "Law", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119223", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_04-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119223"}]}, {"headline": "CBDT Told to Clarify Double Tax Risk on Partner Bonuses", "summary": "High Courts have directed the Central Board of Direct Taxes (CBDT) to clarify the taxability of bonuses and commissions paid to partners of firms. Tax officials have recently begun treating such payments as salary, which is taxable at a higher rate than profit shares. Firms argue this leads to double taxation and inconsistent assessments across different tax jurisdictions.", "category": "Law", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119223", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_04-04-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/119223"}]}, {"headline": "Supreme Court: Higher officials deserve harsher punishment for misconduct", "summary": "The Supreme Court of India has ruled that public servants in higher positions of authority must face more severe penalties for misconduct compared to lower-ranking staff. The court set aside a Delhi HC order that prevented discriminatory punishment for the same offense, stating that a senior officer's responsibility and rank justify harsher consequences for breach of trust.", "category": "Law", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119205", "sources": [{"newspaper": "Times of India", "pdf_filename": "Delhi_TOI_04-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119205"}]}, {"headline": "HC bars unauthorized AI use of preacher's name and image", "summary": "The Delhi High Court has granted an interim injunction protecting the personality rights of spiritual leader Aniruddhacharya. The court restrained the unauthorized use of his name, voice, and image for creating videos or deepfake content. The judge observed that such AI-generated content could cause irreparable harm to the reputation and goodwill of public figures.", "category": "Law", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119205", "sources": [{"newspaper": "Times of India", "pdf_filename": "Delhi_TOI_04-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119205"}]}, {"headline": "NHAI Aims to Become Debt Free by 2030", "summary": "The National Highways Authority of India (NHAI) plans to cut its debt to below ₹1.5 trillion in FY27. The agency is moving away from market borrowings toward budgetary support and asset monetization via TOT and InvIT models. NHAI debt peaked at ₹3.5 trillion in FY22 and has since fallen to approximately ₹2.17 trillion.", "category": "Infrastructure", "page": 15, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119230", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_04-04-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/119230"}]}, {"headline": "Ministry adds 100 highway projects to PM Gati Shakti master plan", "summary": "The Ministry of Road Transport and Highways has integrated 100 new infrastructure projects worth ₹2 lakh crore into the PM Gati Shakti portal. The move is designed to enhance last-mile connectivity and reduce logistics costs across India. By streamlining data across departments, the government aims to accelerate project clearances and improve execution efficiency.", "category": "Infrastructure", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119240", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_04-04-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/119240"}]}, {"headline": "National Highway Authority to monetize projects worth ₹40,000 crore this fiscal", "summary": "The National Highways Authority of India plans to monetize assets through Infrastructure Investment Trust and Toll-Operate-Transfer models. The authority aims to raise ₹40,000 crore in FY25 to fund new construction. This strategy is part of the government’s asset monetization pipeline to reduce dependence on budgetary support for massive road projects.", "category": "Infrastructure", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119240", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_04-04-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/119240"}]}, {"headline": "Delhi plans RTO revamp and revival of DL-13 registration series", "summary": "The Delhi transport department is restructuring its regional transport offices (RTOs) to improve physical access for residents. The plan involves making 13 offices operational—one in each district—and reviving the DL-13 vehicle registration series. The move aims to assist citizens with offline services that were limited during the push for digital transition after the pandemic.", "category": "Infrastructure", "page": 1, "importance": 4, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "Delhi mandates PNG application for commercial LPG consumers", "summary": "The Delhi government has amended its LPG policy, requiring industrial and commercial consumers to apply for a piped natural gas (PNG) connection to receive fresh cylinder allocations. The move aims to mitigate supply issues caused by the West Asia conflict. Consumers in areas without PNG infrastructure must submit a written declaration of intent to connect once available.", "category": "Infrastructure", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "Naidu asserts Amaravati will be world-class capital for Andhra Pradesh", "summary": "Andhra Pradesh CM N Chandrababu Naidu stated that with recent parliamentary approval, all hurdles for Amaravati as the state's sole capital have been cleared. Projects worth ₹56,000 crore are underway with funding from the World Bank and HUDCO. Naidu criticized the previous YSRCP government for trying to derail the project and reaffirmed that Amaravati would serve as a regional growth engine.", "category": "Infrastructure", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "Bitumen shortage and costs set to slow India's highway construction", "summary": "National highway construction in India is projected to slow down to 21–22 km per day in 2026-27 due to rising bitumen prices and supply chain disruptions. The West Asia conflict has driven bitumen costs up by 20-30%, creating a deficit for contractors. Industry experts warn that increased input costs for steel and fuel are hurting project economics and delaying maintenance contracts.", "category": "Infrastructure", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "Domestic Airfares Jump 44% Despite Government Relief Measures", "summary": "Average domestic ticket prices rose 44% year-on-year in April, with fares on key routes like Delhi-Bengaluru reaching up to ₹14,000 for immediate travel. International fares also climbed 43%. The price hike persists despite Civil Aviation Ministry interventions, including removing fare caps, as fuel surcharges and reduced summer flight schedules continue to pressure costs.", "category": "Infrastructure", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Indian Oil Corporation Reports Stable LPG Supply Despite Geopolitical Tensions", "summary": "The Indian Oil Corporation (IOC) assured that LPG availability remains adequate with 28 lakh cylinders delivered daily. Despite global energy market disruptions caused by the West Asia conflict, the company stated that domestic supply is a top priority and remains in line with normal levels. The statement aims to curb panic regarding fuel shortages.", "category": "Infrastructure", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Northern Coalfields Supplies Record 137 Million Tonnes in FY26", "summary": "Coal India subsidiary NCL dispatched a record 137.08 million tonnes of coal in FY26, reinforcing domestic energy security. Approximately 86% of the supply (117.85 mt) was directed to coal-based power plants to meet surging electricity demand. The achievement comes amid heightening geopolitical tensions impacting global energy markets.", "category": "Infrastructure", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Aviation Ministry Suspends Rule Mandating 60% Free Seats for Airlines", "summary": "The Civil Aviation Ministry has put on hold a directive requiring airlines to offer 60% of seats free of charge following industry objections. Airlines argued the provision had significant commercial implications and conflicted with the existing deregulated tariff regime. The rule will remain in abeyance pending a comprehensive examination of its impact on fare structures.", "category": "Infrastructure", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Srinagar Airport Operating Curbs Raise Concerns Among Tourism Stakeholders", "summary": "The Indian Air Force has restricted Srinagar airport’s operating hours to 8 am–5 pm from April 6 to July 31 for runway upgrades. Tourism stakeholders and the Kashmir Economic Alliance warn that the 10-hour daily reduction during peak travel season could disrupt business, trade, and economic activity. Airlines are currently recalibrating schedules to minimize the impact on passengers.", "category": "Infrastructure", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Amaravati City Major Construction Projects Set for 2028 Completion", "summary": "Andhra Pradesh CM N. Chandrababu Naidu announced that major construction of the Amaravati greenfield capital will be finished by 2028. Naidu highlighted that the Amaravati Capital Bill has granted the project legal status. He expressed confidence that Prime Minister Narendra Modi would inaugurate the city’s major projects during a second term in 2029.", "category": "Infrastructure", "page": 9, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Charter Flight Operators Protest Discriminatory Aviation Fuel Price Hike", "summary": "The Business Aircraft Operators Association (BAOA) has termed the government’s decision to limit ATF price hikes only for scheduled airlines as discriminatory. While airlines face a 25% increase, charter and private operators must pay double. BAOA urged the Civil Aviation Minister to ensure fair pricing, noting their role in remote connectivity and national security transport.", "category": "Infrastructure", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "PNGRB extends national piped natural gas drive until June 30", "summary": "India's gas regulator extended the national PNG campaign to help mitigate LPG shortages caused by geopolitical tensions. As of March 31, city gas distribution entities have provided over 529,000 domestic connections during the drive. The government is prioritizing PNG for households and institutional users to strengthen the country's gas-based energy ecosystem.", "category": "Infrastructure", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "Railway coach safety compromised by second-hand parts: Parliamentary panel", "summary": "A report by the Public Accounts Committee found that the Carriage Repair Workshop in Bhubaneswar used second-hand items for essential coach parts. This violation of periodic overhauling norms endangered passenger safety, with several coaches failing within 100 days of repair. The panel noted that such practices undermine the structural integrity of the railway network.", "category": "Infrastructure", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "Road Toll Mopup Touches a High of Rs 82,900 Crore", "summary": "National highway toll collections in India grew 14% to reach a record ₹82,900 crore in FY26. The increase is attributed to the addition of new toll roads and the widespread rollout of the FASTag facility. Monthly collections now average around ₹7,000 crore, reflecting sustained economic activity and improved efficiency in electronic toll collection across the country's road network.", "category": "Infrastructure", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119223", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_04-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119223"}]}, {"headline": "Delhi PWD fixes Lajpat Nagar flyover barrier after TOI report", "summary": "Following a report by The Times of India, the Delhi Public Works Department (PWD) has repaired a damaged polycarbonate barrier on the Lajpat Nagar flyover. The barrier had been bulging into the carriageway for months, posing a safety risk to commuters. Social media users and local residents had been flagging the issue since November 2025.", "category": "Infrastructure", "page": 5, "importance": 3, "telegram_url": "https://t.me/c/1877410077/119205", "sources": [{"newspaper": "Times of India", "pdf_filename": "Delhi_TOI_04-04-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/119205"}]}, {"headline": "Trai Directs Reliance Jio to End Discriminatory Tariff Practices", "summary": "The Telecom Regulatory Authority of India (Trai) has ordered Reliance Jio to stop offering certain special tariff vouchers exclusively through specific platforms. Trai also flagged device-specific tariffs for JioPhone and JioBharat users as discriminatory. Jio has until April 14 to comply and make all offers accessible across all devices.", "category": "Business", "page": 15, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119230", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_04-04-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/119230"}]}, {"headline": "PFRDA Permits Pension Funds to Invest in AIFs", "summary": "The Pension Fund Regulatory and Development Authority (PFRDA) has allowed NPS funds to invest 1% of their assets in Alternate Investment Funds (AIFs). The move could unlock ₹1.17 trillion for private equity and venture capital. PFRDA is also advocating for perpetual fund structures to support long-term portfolio growth.", "category": "Business", "page": 15, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119230", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_04-04-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/119230"}]}, {"headline": "Mehli Mistry Alleges Irregularities in Tata Trusts Affiliate Appointments", "summary": "Former trustee Mehli Mistry has petitioned the Maharashtra charity commissioner to probe alleged illegal appointments at a Tata Trusts affiliate. Mistry claims that non-Parsis Vijay Singh and Venu Srinivasan were appointed in violation of the 1923 trust deed. The petition follows Mistry’s resignation and subsequent boardroom friction.", "category": "Business", "page": 15, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119230", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_04-04-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/119230"}]}, {"headline": "Investors Withdraw Record 14 Billion Dollars from Private Credit", "summary": "Investors sought to redeem nearly $14 billion from private-credit funds in the first quarter as loan defaults rose. Blue Owl Capital reported redemption requests amounting to 22% of its $36 billion fund. The rush follows bankruptcies in the auto-parts sector and concerns over the impact of AI on software company loan health.", "category": "Business", "page": 16, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119230", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_04-04-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/119230"}]}, {"headline": "TAG Heuer Shifts Strategy to Direct Boutiques in India", "summary": "LVMH-owned watchmaker TAG Heuer is moving away from third-party distributors to open direct boutique stores in India. Despite a global luxury slowdown, Swiss watch demand in India grew over 26% early this year. The brand aims to make India its largest market in the EMEA region within five years.", "category": "Business", "page": 17, "importance": 4, "telegram_url": "https://t.me/c/1877410077/119230", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_04-04-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/119230"}]}, {"headline": "Sebi Reform Allows Net Settlement for Foreign Portfolio Investors", "summary": "Market regulator Sebi has approved a shift to net settlement for FPI cash trades to align with global practices. The move allows funds to be settled on a net basis rather than per individual transaction leg. Custodians have expressed concerns about operational complexity and the need for system upgrades by December 31.", "category": "Business", "page": 16, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119230", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_04-04-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/119230"}]}, {"headline": "Indian equity markets reach record highs following RBI dividend announcement", "summary": "Benchmark indices Sensex and Nifty reached fresh all-time highs on Wednesday. Markets rallied after the RBI announced its record dividend transfer, boosting sentiment across banking, infrastructure, and PSU sectors. Investors anticipate increased liquidity and improved fiscal health for the country, leading to a significant surge in market capitalization across the BSE.", "category": "Business", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/119240", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_04-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119240"}]}, {"headline": "Adani Energy Solutions board approves ₹8,350 crore fundraise via QIP", "summary": "Adani Energy Solutions has approved a plan to raise up to ₹8,350 crore through a Qualified Institutional Placement. The funds are earmarked for debt reduction and the expansion of power transmission networks. This marks the group's first major equity fundraise since early 2023, signaling a return of institutional investor confidence in the conglomerate's stability.", "category": "Business", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119240", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_04-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119240"}]}, {"headline": "LPG tanker Green Sanvi expected in Mumbai on April 6", "summary": "A Liquefied Petroleum Gas (LPG) tanker carrying over 46,000 metric tonnes of fuel is set to reach Mumbai by April 6 after crossing the Strait of Hormuz. Two other vessels, Green Asha and Jag Vikram, are currently awaiting Indian Navy instructions for transit. The shipments are critical as India manages energy supply disruptions stemming from the ongoing West Asia conflict.", "category": "Business", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "LPG diversion for households triggers production crisis for pharma solvents", "summary": "A government order prioritizing domestic LPG supply has choked the production of isopropyl alcohol (IPA), a key solvent for essential medicines. Pharmaceutical companies warned that supply disruptions could force shutdowns of life-saving drug production. The government has since launched an emergency audit of 11 critical chemicals to stabilize the supply chain for the healthcare sector.", "category": "Business", "page": 16, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "Maruti Suzuki Dzire Becomes India's Best-Selling Passenger Vehicle for FY26", "summary": "Maruti Suzuki’s Dzire sedan reclaimed its position as India’s best-selling passenger vehicle in FY26, with approximately 2.3 lakh units sold. It outperformed competitors like Tata Nexon (2.16 lakh) and Hyundai Creta (2.02 lakh). Despite the market shift toward SUVs, Maruti dominates the top 10 list with six models, while the Dzire remains the only sedan in the top tier.", "category": "Business", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Bengaluru Benne Dosa Outlets Rewiring Quick Service Restaurant Market", "summary": "The 'Darshini' format of Bengaluru-style benne dosa joints is expanding rapidly across Mumbai and other metros. Brands like Rameshwaram Cafe and The House of Benne are scaling nationally due to a resilient business model featuring lean staffing and high table turns. Rameshwaram Cafe's Churchgate outlet currently serves 20,000 items daily, signaling a major shift in the QSR segment.", "category": "Business", "page": 1, "importance": 3, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Maruti Suzuki Adds Record 502 Service Centres in Fiscal 2026", "summary": "Maruti Suzuki India expanded its after-sales network by adding 502 touchpoints in FY26, the highest in a single year. The total network now spans 5,926 touchpoints across 3,000 cities. The company aims to reach 8,000 service points by FY31 to support its growing customer base and provide easy access to spare parts nationwide.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "West Asia War Expected to Impact Cement Sector Margins From June", "summary": "Rising fuel and packaging costs are expected to squeeze margins for Indian cement companies starting the June quarter. While firms used low-cost inventory in Q4 FY26, a spike in coal and petcoke prices now necessitates a price hike of ₹15-20 per bag to maintain profitability. Diesel price increases post-elections are also expected to add significant cost pressure.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Dabur India Forecasts Mid-Single Digit Revenue Growth for Q4 FY26", "summary": "Dabur India expects consolidated revenue growth in the mid-single digits for the final quarter, with operating profit outpacing topline growth. While domestic demand remains steady, international markets, particularly in West Asia, faced challenges due to the US-Israel-Iran conflict. However, the company reported double-digit growth in Turkey, Bangladesh, and the UK.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Emami Targets ₹500 Crore Topline for Axiom Ayurveda by 2029", "summary": "Emami Ltd plans to grow Axiom Ayurveda's revenue to ₹500 crore within three years after acquiring the remaining 73.5% stake. Axiom, known for the 'AloFrut' brand, is expected to reach a topline of ₹180 crore in FY26. Emami's board approved up to ₹200 crore for the acquisition, marking a strategic entry into the health and wellness beverage segment.", "category": "Business", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Bank Employees Union Seeks Probe Into Issues Raised by HDFC Chairman", "summary": "The All India Bank Employees’ Association (AIBEA) has written to the Finance Minister seeking an inquiry into governance issues at HDFC Bank. The request follows the resignation of Part-Time Chairman Atanu Chakraborty, who cited 'happenings and practices' inconsistent with his ethics. The union is calling for transparency to protect the interests of 12 crore customers.", "category": "Business", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Renault Duster Returns to India with Rugged Design and Advanced Tech", "summary": "Renault has reintroduced the Duster SUV in India, priced between ₹10.49 lakh and ₹18.49 lakh. The new model features a 160.7 bhp 1.3-litre turbo-petrol engine, Level 2 ADAS, and Google built-in multimedia systems. With 212 mm ground clearance and a muscular design, Renault aims to reclaim market share in the crowded C-segment SUV market currently dominated by the Hyundai Creta.", "category": "Business", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "2026 Mercedes-Benz GLS Launched with Fresh Design and Updated Powertrains", "summary": "Mercedes-Benz released the 2026 GLS flagship SUV featuring a new MBUX Superscreen and revised engine options, including a V8 producing 522 bhp. The SUV includes a cloud-based suspension system and enhanced driver assistance. A global rollout is underway, with an Indian launch expected by late 2026.", "category": "Business", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Royal Enfield Launches Guerrilla 450 Apex Variant at ₹2.49 Lakh", "summary": "Royal Enfield has introduced the Apex trim for the Guerrilla 450, featuring lowered handlebars, Vredestein Centauro ST+ tyres, and new Street and Sport ride modes. The 452 cc liquid-cooled engine remains unchanged. The new variant also includes visual updates like a rear-seat cowl and a small headlight fairing.", "category": "Business", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "PNB Officers Union Protests Mass Transfer of Scale IV Officials", "summary": "The All India Punjab National Bank Officers’ Association has urged the bank’s management to reconsider the transfer of 1,142 scale IV officers. The union claims the mass transfer, involving nearly one-fourth of the total strength in that scale, is causing 'huge disruption' to operations. A letter has been sent to MD and CEO Ashok Chandra seeking a review of the orders.", "category": "Business", "page": 7, "importance": 3, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Ready-to-Drink Brand BuzzBallz Records 3x Monthly Growth in Bengaluru", "summary": "US-based RTD brand BuzzBallz has captured a 20% market share in Bengaluru's launched stores since December. The brand is now available in 700 retail outlets and plans to expand into Maharashtra and Goa by August. The company attributed success to market-specific flavors like 'Chilli Guava Groove' and a general consumer shift away from beer toward RTD products.", "category": "Business", "page": 7, "importance": 3, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Aerospace Maker JJG Aero Targets $100 Million Revenue by 2031", "summary": "JJG Aero aims to reach $100 million in revenue in five years by scaling capacity at its new 200,000 sq ft facility in Bengaluru. The company, which grew eight-fold in the last six years, expects to maintain a 30% CAGR. CEO Anuj Jhunjhunwala noted that India is becoming a preferred alternative manufacturing base for global aerospace OEMs following post-Covid supply chain shifts.", "category": "Business", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "US-based Insurance Broker Lockton to Launch Reinsurance Operations in India", "summary": "Lockton India plans to enter the domestic reinsurance market this financial year, focusing on property, marine, and specialized lines like cruise and P&I. Having started Indian operations in January 2025, the firm now has nine branches and over 1,000 clients. The expansion will leverage the company's international expertise in treaty and facultative reinsurance.", "category": "Business", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Basmati Exporters Seek Government Aid as Shipping Charges Surge", "summary": "The Basmati Rice Farmers and Exporters Development Forum has requested government intervention as shipping costs for stranded consignments multiply due to the West Asia conflict. Exporters face risks of contractual defaults and deteriorating cargo quality. The industry is seeking a waiver of detention and demurrage charges, calling for the current situation to be treated as force majeure.", "category": "Business", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Hindustan Zinc Reports Record Mined Metal Output in FY26", "summary": "Hindustan Zinc achieved its highest-ever mined metal production of 1,114 kt in FY26, a 2% year-on-year increase. However, refined metal output dipped slightly to 1,048 kt, and silver production fell 9% to 627 tonnes. The company attributed the mined metal growth to improved ore grades and higher production in the fourth quarter.", "category": "Business", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Aquapulse Tech Raises ₹25 Crore for Integrated Aquaculture Ecosystem", "summary": "Aquaculture tech startup Aquapulse raised ₹25 crore in a Series A round led by Nabventures. The funds will be used to expand its network from 6,000 to 15,000 farmers and set up an in-house processing facility. The company's AI-driven systems track water quality and disease risk to help farmers in Odisha, Andhra Pradesh, and West Bengal optimize output.", "category": "Business", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Myntra’s International Brand Portfolio Grows 50% in March Quarter", "summary": "Myntra reported a 50% year-on-year growth in its international brands segment in Q1 CY26. The company added 40 new global brands across fashion and beauty. Nearly 45% of demand now originates from non-metro regions, with women’s apparel contributing 60% of total international brand business. Fast delivery services like M-Now are supporting this rapid expansion.", "category": "Business", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "EKA Mobility Expands Manufacturing Capacity to 40,000 Electric Vehicles", "summary": "EKA Mobility has built capacity to produce 40,000 electric commercial vehicles annually, including 10,000 buses and 6,000 trucks. Despite current production standing at 1,344 units in FY26, the company has an order book for 6,000 e-buses. EKA is also expanding into international markets including Africa and Australia while exploring hydrogen fuel cell technology.", "category": "Business", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Asian Textile Hubs Urged to Innovate Amid Rising Global Challenges", "summary": "The Asian textile industry, which controls 63% of global exports, is facing headwinds from cost inflation and sluggish growth. Confederation of Indian Textile Industry (CITI) Chairman Ashwin Chandran urged companies to rethink production and collaboration strategies. Telangana CM Revanth Reddy invited investors to help create an end-to-end textile ecosystem in the state.", "category": "Business", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "BigBasket Pivots Toward Quick Commerce as CEO Hari Menon Exits", "summary": "Tata-owned BigBasket is restructuring its strategy to compete with quick-commerce leaders Blinkit and Zepto following the exit of Co-founder Hari Menon. The online grocer was a late mover in instant fulfillment, allowing rivals to capture significant market share. The Tata Group is now seeking new leadership to improve execution and reach profitability in the high-burn segment.", "category": "Business", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Mutual fund equity investments hit record Rs 1 trillion in March", "summary": "Domestic mutual funds invested a record Rs 1.05 trillion in equities during March 2026, cushioning a Rs 1.23 trillion selloff by foreign portfolio investors. Despite the heavy buying, the Nifty 50 index slumped 11 per cent, its sharpest monthly decline since March 2020. The surge was primarily driven by lump-sum investments as domestic investors capitalized on significant market corrections.", "category": "Business", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "India likely insulated from Trump tariff on imported patented drugs", "summary": "President Donald Trump signed an executive order imposing up to 100% tariffs on imported branded medicines to reshape pharmaceutical supply chains. However, generic medicines—which make up over 90% of US drug use—are exempt for at least one year. Experts believe the immediate impact on India will be limited, though European manufacturing hubs for high-value drugs face significant exposure.", "category": "Business", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "Bajaj Auto and Ather Energy hike vehicle prices over input costs", "summary": "Bajaj Auto and Ather Energy have raised prices across motorcycles and electric scooters by up to Rs 6,000. The hikes are meant to offset sharp increases in raw material costs, particularly aluminum, copper, and lithium, triggered by the conflict in West Asia. Aluminum prices recently hit a four-year high after Iran damaged production facilities in Gulf nations.", "category": "Business", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "TAG Heuer aims to double India business within five years", "summary": "Swiss watchmaker TAG Heuer has opened its first exclusive boutique in Delhi and plans to double its India business by 2031. After restructuring its operations, the firm partnered with Kapoor Watch Company to expand into Mumbai and Bengaluru. The company cites rising discretionary incomes and the Trade and Economic Partnership Agreement (TEPA) as key growth drivers in the luxury segment.", "category": "Business", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "Poor product data costs Indian ecommerce Rs 5,000 crore annually", "summary": "Inaccurate product listings and incomplete data lead to nearly Rs 5,000 crore in annual losses for Indian ecommerce, according to GS1 India. Fashion and apparel account for the highest share of return-related losses. Inaccurate data generates Rs 1,900 crore in direct return costs, including reverse logistics. Platforms like Flipkart and Amazon are increasingly using AI to reduce these mismatches.", "category": "Business", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "Hero MotoCorp emerges as market leader in electric two-wheeler share", "summary": "Hero MotoCorp's VIDA brand recorded the highest gain in electric two-wheeler market share in FY26, rising from 4.2% to 10.3%. Growth was fueled by aggressive sales in West Bengal, Odisha, and Bihar. Conversely, Ola Electric saw its share decline sharply. Overall EV penetration in the segment grew marginally to 6.5%, remaining well below the government's ambitious 2030 targets.", "category": "Business", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "India passenger vehicle sales growth expected to moderate in FY27", "summary": "Icra projects India’s passenger vehicle industry growth will slow to 4-6% in FY27 due to a high base and evolving macroeconomic conditions. For FY26, wholesale volume growth is estimated at 7-9%. Utility vehicles now account for 67% of total sales, reflecting a sustained trend toward premiumization. Rising penetration of CNG and electric vehicles continues to aid demand diversification.", "category": "Business", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "Vedanta reports mixed production results for final quarter of FY26", "summary": "Mining major Vedanta saw aluminium production rise by 2% and Zinc India mined metal output increase by 2% in the March quarter. However, production of iron ore, steel, and oil and gas declined. Average daily gross operated production in the oil and gas segment dropped 15% to 81,500 barrels. The company remains focused on driving operational efficiency and scale despite global dynamics.", "category": "Business", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "FMCG firms expect high single-digit growth despite West Asia conflict", "summary": "Companies like Dabur and Marico expect high single-digit growth in Q4FY26 as strong domestic demand offsets disruptions in the Middle East. Dabur's food and beverages vertical saw improvement, with coconut water growing over 20%. Marico reported stable demand in India but noted that international business in the Gulf region was impacted by geopolitical headwinds in March.", "category": "Business", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "Adani Group moves to three-layer structure to flatten hierarchy", "summary": "Gautam Adani announced the group is moving toward a three-layer organizational structure to empower frontline decision-making. The goal is to build a low-friction culture with faster reflexes rather than cost reduction. Adani Ports and Special Economic Zone reached a milestone of 500 million tonnes of cargo in FY26 and aims for 1 billion tonnes by 2030 through expanded logistics.", "category": "Business", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "Government puts 60% free airline seat allocation directive in abeyance", "summary": "The civil aviation ministry has suspended a rule requiring airlines to offer at least 60% of seats for free selection. The move follows concerns from the Federation of Indian Airlines (FIA) about the impact on fares and commercial viability. Airlines argue that seat selection fees are essential ancillary revenue used to offset rising expenses like fuel and maintenance.", "category": "Business", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "Udaan expands HoReCa-focused procurement vertical to Hyderabad", "summary": "B2B ecommerce platform Udaan has launched its 'horeca360' vertical in Hyderabad to streamline procurement for hotels and restaurants. The service offers direct-from-source fresh produce, staples, and groceries with doorstep delivery. The company plans further expansion to Chennai, Delhi-NCR, and Kolkata, leveraging its tech-driven fulfillment network to serve the food-service industry.", "category": "Business", "page": 5, "importance": 3, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "Reinsurance rates drop sharply as property premiums fall up to 90%", "summary": "Reinsurance rates in India softened significantly in the latest renewal cycle, with property premiums dropping by 85-90%. The decline is attributed to lower loss experiences and a surge in underwriting capacity from domestic and foreign players. However, rates remained firm in high-risk segments like aviation and health insurance due to rising claims and medical inflation.", "category": "Business", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "Amazon to impose 3.5% fuel surcharge on third-party sellers", "summary": "Amazon will implement a temporary 3.5% fuel and logistics surcharge for sellers using its fulfillment services starting April 17. The company cited a spike in operating costs following the start of the war in Iran. Amazon stated it has absorbed these costs so far but must now partially recover them, noting the charge is lower than surcharges applied by other major carriers.", "category": "Business", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "GIFT City's first IPO withdrawn amid global market volatility", "summary": "XED Executive Development withdrew its $12-million IPO from GIFT City after receiving bids for only 5% of the issue. The company cited the 'global crisis' and market uncertainty for the failure. Experts point to structural bottlenecks like restrictive KYC norms and Indian UBO ownership limits as major hurdles preventing GIFT-IFSC from emerging as a viable listing venue for startups.", "category": "Business", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "GIFT City insurance premium ecosystem reaches $1.2 billion in 2025", "summary": "The insurance and reinsurance premium volume in GIFT City has grown 11-fold in five years, hitting $1.2 billion in 2025. The number of IFSC Insurance Offices has expanded to 24, including global giants like Allianz and Lloyd’s. Growth is driven by non-life segments such as trade credit and marine insurance, as more India-linked risk underwriting moves to the Gujarat-based hub.", "category": "Business", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "ECM underwriting fees rise 39% in Q1 despite banking slump", "summary": "Equity capital markets underwriting fees rose to $84.3 million in Q1 2026, even as overall investment banking fees in India fell 31%. The growth was supported by a shift toward higher-fee transactions like IPOs. Axis Bank led the overall fee rankings, while Kotak Mahindra topped the ECM league tables. M&A advisory fees halved during the period due to geopolitical tensions.", "category": "Business", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "Nomura downgrades Indian equities to neutral on rising oil risks", "summary": "Nomura has lowered its stance on Indian equities from 'overweight' to 'neutral', citing India's vulnerability to high energy prices. The brokerage warned that disruptions in the Strait of Hormuz could keep oil elevated, hurting corporate earnings. It also flagged India's weak positioning in the AI technology cycle and suggested investors switch to markets like South Korea and China.", "category": "Business", "page": 12, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "Life insurance stocks hit 52-week lows on muted Q4 outlook", "summary": "Shares of LIC, HDFC Life, and ICICI Prudential hit 52-week lows due to expectations of poor Q4 performance and regulatory uncertainty. The ongoing West Asia war has dampened consumer sentiment during the seasonally strong March quarter. Additionally, proposed changes to commission structures and the implementation of Ind AS from April 2026 are weighing on investor sentiment for the sector.", "category": "Business", "page": 13, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119235", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_04-04-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/119235"}]}, {"headline": "Valuations Do a Quick Jump at Select Startups", "summary": "Venture capitalists are betting on mid-stage startups with strong top-lines despite a general funding slowdown. Companies like Scapia, Snabbit, and Emergent have seen significant valuation spikes in recent rounds. Fintech startup Scapia's valuation more than doubled to $139 million. Investors are focusing on a smaller set of high-growth companies that can deliver outsized returns.", "category": "Business", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119223", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_04-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119223"}]}, {"headline": "Plastic, Glass Crunch Pricks Packaged Goods Companies", "summary": "FMCG companies are facing severe shortages of raw materials like glass, PET, and plastics due to the blockade in the Strait of Hormuz. Firms have warned of production cutbacks, supply disruptions, and the need to shrink pack sizes. Shortages of fuel and urea are also impacting the production process, forcing companies to operate with leaner inventories as the conflict persists.", "category": "Business", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119223", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_04-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119223"}]}, {"headline": "HAL imposes penalty on GE for Tejas engine delivery delays", "summary": "Hindustan Aeronautics Limited (HAL) has slapped contractual penalties on GE Aerospace for delays in supplying F404 engines for the Tejas LCA Mark 1A. The delay in engine deliveries has hampered the production schedule of the indigenous fighter jets. HAL is also exploring alternative options, including potential collaboration on high-thrust engines with other global partners.", "category": "Business", "page": 14, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119205", "sources": [{"newspaper": "Times of India", "pdf_filename": "Delhi_TOI_04-04-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/119205"}]}, {"headline": "Iran Shoots Down US Fighter Jet Amid Escalating Conflict", "summary": "A US F-15E fighter jet was downed by Iranian forces, marking a major escalation in the regional conflict. One crew member was rescued while search operations continue for a second. The incident has triggered a global energy crisis, with crude prices surging 50% to $109.24 a barrel as supply risks through the Strait of Hormuz increase.", "category": "World", "page": 16, "importance": 10, "telegram_url": "https://t.me/c/1877410077/119230", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_04-04-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/119230"}]}, {"headline": "Afghan-Pakistan Peace Talks Advance in China", "summary": "China is mediating peace talks between the Taliban government of Afghanistan and Pakistan in the city of Urumqi. Conversations resumed following weeks of border fighting that killed hundreds. Beijing’s intervention seeks to stabilize the region as bilateral tensions between Islamabad and Kabul continue to fluctuate.", "category": "World", "page": 15, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119230", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_04-04-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/119230"}]}, {"headline": "India and UK trade talks to resume after general election results", "summary": "Negotiations for a Free Trade Agreement between India and the UK are scheduled to resume once India’s new government takes office. While 26 chapters are largely finalized, issues regarding duty cuts on automobiles and Scotch whisky remain under discussion. Both countries aim to significantly boost bilateral trade through the removal of non-tariff barriers and visa relaxations.", "category": "World", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119240", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_04-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/119240"}]}, {"headline": "Myanmar junta chief Min Aung Hlaing elected president by pro-military MPs", "summary": "Myanmar's pro-military lawmakers have elected junta chief Min Aung Hlaing as president, solidifying his rule in a civilian guise five years after seizing power in a coup. The general, who ousted Aung San Suu Kyi in 2021, secured 429 of 584 votes. The move comes amid a continuing civil war and humanitarian crisis, with key ally China pledging continued cooperation.", "category": "World", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "Trump administration fires US Army Chief Randy George in shake-up", "summary": "The Trump administration has fired Army Chief of Staff General Randy George and two other senior military figures amid the ongoing war with Iran. The sudden ouster marks the latest in a series of high-profile departures from the Pentagon since Donald Trump returned to office. The removals raise concerns regarding the potential politicization of traditionally neutral military roles.", "category": "World", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "Magnitude 5.9 earthquake in Afghanistan kills 8 in Kabul", "summary": "A 5.9-magnitude earthquake struck Afghanistan on Friday evening at a depth of 150 km. The tremors were felt in Kabul, Islamabad, and New Delhi. Authorities in Kabul reported at least eight deaths and several destroyed houses. Afghanistan is highly prone to seismic activity, with earthquakes killing an average of 560 people in the country annually.", "category": "World", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "Iranian Crude Tanker Diverts to China Over Payment Terms Issue", "summary": "An Aframax tanker carrying 600,000 barrels of Iranian crude, originally bound for Gujarat, diverted to China mid-voyage. Analysts suggest the shift was caused by the seller demanding immediate payment instead of standard credit terms. This would have been the first Iranian cargo to India since 2019, following a temporary US sanction waiver during the West Asia conflict.", "category": "World", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Trump Threatens Iranian Infrastructure Attacks After Major Bridge Strike", "summary": "US President Donald Trump threatened to extend military strikes to Iran’s electric power plants after a US strike destroyed the newly built B1 bridge in Karaj. In retaliation, Iran’s Revolutionary Guard attacked a water desalination plant in Kuwait and claimed to have downed a US F-35 jet. The escalating conflict continues to impact global oil and gas shipping lanes.", "category": "World", "page": 3, "importance": 10, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Trump Proposes Record $1.5 Trillion US Military Budget for 2027", "summary": "US President Donald Trump has proposed a $1.5 trillion defense budget for 2027, the largest request in decades. The plan prioritizes military spending over domestic pro
