 Personnel for Assam Elections", "summary": "The National Green Tribunal has stayed the Assam government's order to deploy 1,500 forest protection personnel for election duty. The NGT ruled that diverting these personnel would compromise their primary duty of protecting wildlife and biological resources. The decision emphasizes the need for specialized forces to remain at their posts during critical ecological periods.", "category": "Environment", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119223", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_04-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119223"}]}, {"headline": "Delhi to block entry of non-BS-VI goods vehicles from November 1", "summary": "The Delhi government will strictly enforce a ban on goods vehicles below BS-VI emission standards from November 1. Only vehicles meeting BS-VI norms, or those powered by CNG and electricity, will be allowed entry into the city. The move is part of the Air Pollution Mitigation Action Plan 2026, which includes ANPR camera monitoring and digital tracking of fuel types.", "category": "Environment", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119205", "sources": [{"newspaper": "Times of India", "pdf_filename": "Delhi_TOI_04-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119205"}]}, {"headline": "MCD's stray dog sterilization plans stall due to coordination issues", "summary": "The Municipal Corporation of Delhi's ambitious plan to house 1,500 stray dogs in a new facility in Dwarka has stalled. Reports indicate a lack of coordination between the engineering and health departments, leading to delays in constructing additional kennels. The project, aimed at addressing the city's stray dog menace, is currently facing fund and logistical hurdles.", "category": "Environment", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/119205", "sources": [{"newspaper": "Times of India", "pdf_filename": "Delhi_TOI_04-04-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119205"}]}, {"headline": "Maharashtra government approves new industrial policy to attract foreign investments", "summary": "The Maharashtra state cabinet approved a new industrial policy aimed at attracting ₹5 lakh crore in foreign direct investment over five years. The policy offers tax incentives and simplified land acquisition for the manufacturing and electronics sectors. It also includes special provisions for green hydrogen projects to align with national sustainability goals.", "category": "India", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119240", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_04-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119240"}]}, {"headline": "Top Maoist leader Prashant Bose dies in Ranchi during treatment", "summary": "Prashant Bose, alias Kishan Da, a top leader of the banned CPI(Maoist), died at a hospital in Ranchi on Friday. Bose, who carried a reward of ₹1 crore, had been jailed for four years. Authorities stated his health deteriorated in Birsa Munda Jail before he was moved to treatment. He was considered the mastermind behind over 100 violent incidents across several Indian states.", "category": "India", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "Former Karnataka Lokayukta Santosh Hegde hospitalised after collapsing", "summary": "Former Supreme Court judge and Karnataka Lokayukta Justice N Santosh Hegde, 85, was admitted to a Bengaluru hospital after collapsing at a public event. Doctors stated that Hegde, who is diabetic, likely suffered a sudden drop in blood sugar levels. He is currently under medical supervision and reported to be in stable condition.", "category": "India", "page": 5, "importance": 4, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "Karnataka police seek woman missing during Kodagu mountain trek", "summary": "A 36-year-old woman from Kerala, identified as Sharanya, was reported missing on Thursday during a trek to Tadiandamol Peak in Kodagu district. Sharanya reportedly became separated from her trekking group in challenging terrain. A joint search operation by police and forest department officials is underway, though her phone has remained unreachable since the afternoon of her disappearance.", "category": "India", "page": 5, "importance": 3, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "Haveri bus accident that killed toddler caused by driver negligence", "summary": "A transport department investigation into a bus accident in Haveri, which killed a 2.5-year-old toddler, has found the driver guilty of negligence. The driver, Manjunath R, mistakenly pressed the accelerator instead of the brake, causing the bus to slam into a platform where passengers were waiting. The driver has been arrested and suspended from duty.", "category": "India", "page": 5, "importance": 3, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "Gold bars with Swiss markings recovered from Maoist hideout in Bijapur", "summary": "Police in Bijapur, Chhattisgarh, recovered 7.2 kg of gold bars worth approximately ₹11.16 crore from a Maoist dump. The bars featured Swiss bank markings, which investigators believe may be a deception by local jewellers. The recovery followed intelligence from surrendered Maoists regarding funds collected through illegal levies. Forensic examinations are underway to verify the gold's purity.", "category": "India", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119259", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 04-04.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119259"}]}, {"headline": "Alleged Mastermind of Malda Judicial Violence Arrested by Bengal Police", "summary": "Mofakkerul Islam, an advocate and AIMIM leader, was arrested for allegedly leading a mob that attacked and held seven judicial officers hostage in Malda. The violence was sparked by protests over electoral roll revisions. The Supreme Court has sought a response from the state over the incident, while CM Mamata Banerjee blamed the BJP and AIMIM for the unrest.", "category": "India", "page": 5, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "Rajnath Singh Stresses Strong Navy for Energy and Trade Security", "summary": "Defence Minister Rajnath Singh stated that a capable Navy is essential for India’s energy security and maritime trade, which accounts for 95% of national trade. Speaking at the commissioning of INS Taragiri in Visakhapatnam, he highlighted the Navy's role in protecting undersea internet cables and critical sea lanes amid global geopolitical uncertainties.", "category": "India", "page": 9, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119197", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 04~04~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/119197"}]}, {"headline": "India Commissions Third Nuclear-Powered Submarin       <div class="card-toprow">
        <div class="cat-pill">
          <div class="pill-icon"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="1" y="1" width="8" height="2" rx="0.6" fill="#888"/><rect x="1" y="4.5" width="5" height="1.5" rx="0.6" fill="#666"/><rect x="1" y="7" width="6" height="1.5" rx="0.6" fill="#666"/></svg></div>
          ${cat.toUpperCase()}
        </div>
        <div class="card-date">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="2.5" width="11" height="9.5" rx="1.8" stroke="#555" stroke-width="1.2"/><path d="M4.5 1v3M8.5 1v3" stroke="#555" stroke-width="1.2" stroke-linecap="round"/><path d="M1 6h11" stroke="#555" stroke-width="1.2"/></svg>
          ${DIGEST.date}
        </div>
      </div>
      <div class="card-headline">${art.headline}</div>
      <div class="card-summary">${art.summary}</div>
      <div class="card-divider"></div>
      <div class="card-footer">
        ${src?`<a class="src-chip" href="${href}" target="_blank" onclick="event.stopPropagation()">${src.newspaper}<span class="src-chip-sep">&middot;</span><span class="src-chip-pg">Pg ${src.page}</span><span class="src-chip-ext"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M3.5 7.5L7.5 3.5M7.5 3.5H5M7.5 3.5V6" stroke="#555" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></span></a>`:'<div></div>'}
        <div class="info-btn"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6.5" stroke="#444" stroke-width="1.3"/><circle cx="7.5" cy="4.5" r="0.8" fill="#555"/><path d="M7.5 7v4" stroke="#555" stroke-width="1.5" stroke-linecap="round"/></svg></div>
      </div>
    </div>`;
  return card;
}

function buildPRow(ci) {
  const p=panels[ci],ai=p.artIdx;
  p.pRow.innerHTML='';
  p.articles.forEach((_,i)=>{
    const seg=document.createElement('div');
    seg.className='pseg'+(i<ai?' done':i===ai?' active':'');
    p.pRow.appendChild(seg);
  });
}

function syncV(ci,animated) {
  const p=panels[ci],h=p.vFeed.getBoundingClientRect().height;
  p.vTrack.style.transition=animated?'transform 0.35s cubic-bezier(0.4,0,0.2,1)':'none';
  p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;
  buildPRow(ci);
}

function goArt(d) {
  const p=panels[catIdx];
  const n=Math.max(0,Math.min(p.artIdx+d,p.articles.length-1));
  if(n===p.artIdx&&d!==0)return;
  p.artIdx=n; syncV(catIdx,true); dismiss();
}

function goCat(idx,animated=true) {
  idx=Math.max(0,Math.min(idx,sortedCats.length-1));
  if(idx===catIdx&&animated)return;
  const prev=catIdx; catIdx=idx;
  hTrack.style.transition=animated?'transform 0.38s cubic-bezier(0.4,0,0.2,1)':'none';
  hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;
  if(animated&&idx!==prev) {
    const m=CAT_META[sortedCats[idx]]||{color:"#e8334a",icon:"📰"};
    catFlash.style.background=m.color+'18';
    cfIcon.textContent=m.icon; cfName.textContent=sortedCats[idx]; cfName.style.color=m.color;
    catFlash.classList.add('on'); setTimeout(()=>catFlash.classList.remove('on'),500);
  }
  dismiss();
}

let dismissed=false;
function dismiss() {
  if(dismissed)return; dismissed=true;
  hintUp.classList.remove('visible'); hintRight.classList.remove('visible');
  hintUp.classList.add('gone'); hintRight.classList.add('gone');
}

(function initHints() {
  const KEY='dailyBriefHintSeen';
  if(!localStorage.getItem(KEY)) {
    localStorage.setItem(KEY,'1');
    setTimeout(()=>{ if(!dismissed){ hintUp.classList.add('visible'); hintRight.classList.add('visible'); } },2500);
  }
})();

let tsX=0,tsY=0,tcX=0,tcY=0,axis=null,drag=false;
outer.addEventListener('touchstart',e=>{
  tsX=e.touches[0].clientX; tsY=e.touches[0].clientY;
  tcX=0; tcY=0; axis=null; drag=true;
  hTrack.style.transition='none';
  const p=panels[catIdx]; if(p)p.vTrack.style.transition='none';
},{passive:true});
outer.addEventListener('touchmove',e=>{
  if(!drag)return;
  const dx=e.touches[0].clientX-tsX,dy=e.touches[0].clientY-tsY;
  tcX=dx; tcY=dy;
  if(!axis&&(Math.abs(dx)>8||Math.abs(dy)>8))axis=Math.abs(dx)>Math.abs(dy)?'h':'v';
  if(!axis)return;
  e.preventDefault();
  if(axis==='h'){
    const edge=(catIdx===0&&dx>0)||(catIdx===sortedCats.length-1&&dx<0);
    hTrack.style.transform=`translateX(${-catIdx*vpW+dx*(edge?.14:1)}px)`;
  }else{
    const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height;
    const edge=(p.artIdx===0&&dy>0)||(p.artIdx===p.articles.length-1&&dy<0);
    p.vTrack.style.transform=`translateY(${-p.artIdx*h+dy*(edge?.14:1)}px)`;
  }
},{passive:false});
outer.addEventListener('touchend',()=>{
  if(!drag)return; drag=false;
  if(axis==='h'){
    const t=vpW*.2;
    if(tcX<-t)goCat(catIdx+1);
    else if(tcX>t)goCat(catIdx-1);
    else{hTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;}
  }else if(axis==='v'){
    const t=vpH*.2;
    if(tcY<-t)goArt(1);
    else if(tcY>t)goArt(-1);
    else{const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height;p.vTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;}
  }
  axis=null;
},{passive:true});

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'||e.key===' '){e.preventDefault();goArt(1);}
  if(e.key==='ArrowUp'){e.preventDefault();goArt(-1);}
  if(e.key==='ArrowRight'){e.preventDefault();goCat(catIdx+1);}
  if(e.key==='ArrowLeft'){e.preventDefault();goCat(catIdx-1);}
});
let wl=false;
outer.addEventListener('wheel',e=>{
  e.preventDefault();if(wl)return;wl=true;
  Math.abs(e.deltaX)>Math.abs(e.deltaY)?goCat(catIdx+(e.deltaX>0?1:-1)):goArt(e.deltaY>0?1:-1);
  setTimeout(()=>wl=false,500);
},{passive:false});
window.addEventListener('resize',()=>{
  vpW=outer.offsetWidth;vpH=outer.offsetHeight;
  hTrack.style.transition='none';
  hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;
  panels.forEach(p=>{
    const h=p.vFeed.getBoundingClientRect().height;
    p.vTrack.querySelectorAll('.card').forEach(c=>c.style.height=h+'px');
    p.vTrack.style.transition='none';
    p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;
  });
});

buildAll();
</script>
</body>
</html>
