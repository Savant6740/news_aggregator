n Grandmasters Nihal Sarin and D Gukesh settled for a draw in their opening-round match at the Chennai Grand Masters chess tournament.", "category": "Sports", "page": 14, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130777", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁷⁰⁷²⁰²⁶.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/130777"}], "article_id": "e69a9708"}, {"headline": "Centre to co-invest in chip design startups under Semicon 2.0", "summary": "Under the ₹1.27 trillion Semicon 2.0 programme, the government plans to co-invest alongside venture capital funds in early-stage chip design startups. The Centre will match private investments in exchange for equity to address capital shortages. The move aims to foster domestic intellectual property and reduce dependence on expensive overseas fabrication trials for prototype chips.", "category": "Technology", "page": 5, "importance": 9, "telegram_url": "https://t.me/c/1877410077/130732", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/130732"}], "article_id": "2bfe5834"}, {"headline": "Major industrial groups eye Odisha’s Karlapat bauxite block in auction", "summary": "Industrialists including Gautam Adani, Mukesh Ambani, and Kumar Mangalam Birla are reportedly interested in Odisha’s Karlapat bauxite block, one of India’s largest untapped deposits. The block contains over 200 million tonnes of bauxite across 3,100 hectares. Bidders include Adani Enterprises and Reliance Industries, as companies race to secure raw materials for aluminium expansion.", "category": "Business", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130732", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/130732"}], "article_id": "2168b6e6"}, {"headline": "Food firms increase packaging investment to meet preservative-free demand", "summary": "New-age Indian food companies are increasing R&D spending on specialized packaging by up to 50% to maintain product freshness without chemical preservatives. Firms like Khetika and Akshayakalpa Organic are adopting paperboard and nitrogen flushing. The shift is driven by rising consumer demand for clean-label products in the $107.3 billion global healthy snacking market.", "category": "Business", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130732", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/130732"}], "article_id": "50e89863"}, {"headline": "Semicon 2.0 aims to build complete semiconductor ecosystem in India", "summary": "The Union cabinet approved the ₹1.27 trillion Semicon 2.0 program, shifting focus from manufacturing factories to the broader supply chain, including chemicals, gases, and equipment. The plan targets a domestic chip market worth $200 billion by 2035. Key changes include fiscal support for large chip design firms and creating domestic capabilities in compute, memory, and sensors.", "category": "Technology", "page": 3, "importance": 9, "telegram_url": "https://t.me/c/1877410077/130732", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/130732"}], "article_id": "37c74c3f"}, {"headline": "Isro faces wave of resignations as private space sector grows", "summary": "The Indian Space Research Organisation (Isro) is reportedly seeing a wave of resignations, with over 100 scientists leaving recently as private startups attract talent. The government is tightening exit rules at the state-run agency in response. Isro's leadership stated that missions remain unaffected, suggesting the talent flow could benefit the overall domestic space ecosystem.", "category": "Science", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130732", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/130732"}], "article_id": "c32e3497"}, {"headline": "India's retail inflation rises to 4.4 percent in June 2026", "summary": "Statistics ministry data shows retail inflation rose to 4.4% in June, exceeding the RBI’s 4% medium-term target for the first time since early 2025. The spike was driven by higher food and fuel prices, with food inflation reaching 5.3%. Specific items like ginger and garlic saw massive price increases. Potential West Asia tensions and weather risks may keep inflation elevated.", "category": "Economy", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130732", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/130732"}], "article_id": "dc780b1b"}, {"headline": "Indian exports shift toward Singapore and China amid trade disruptions", "summary": "India’s export landscape saw significant changes in the April-June quarter. Shipments to Singapore more than doubled, while exports to South Africa and China rose by 76.5% and 27.6% respectively. Conversely, exports to the UAE fell 12% and US shipments moderated due to trade uncertainty and West Asia conflicts. The data suggests a reorientation of export destinations by Indian firms.", "category": "Economy", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130732", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/130732"}], "article_id": "666a688f"}, {"headline": "New services index shows broad growth across most Indian sub-sectors", "summary": "Trial estimates of the Index of Services Production (ISP) show double-digit year-on-year growth in 12 of 19 sub-sectors for April. Leading gains were seen in accommodation and food services (37.2%) and retail trade (30.8%). Air and rail transport were the only sectors to contract. The new monthly indicator aims to track activity in the services sector, which contributes over 53% of GVA.", "category": "Economy", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130732", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/130732"}], "article_id": "7db61a4d"}, {"headline": "Survey shows 60 percent of urban Indians use AI daily", "summary": "A YouGov survey of urban Indians found that 60% use artificial intelligence daily for information retrieval, with Gen Z showing the highest adoption at 67%. Despite heavy usage, AI is primarily viewed as a secondary or starting tool rather than a total replacement for conventional search engines. The findings highlight how deeply AI is becoming embedded in everyday life in India.", "category": "Technology", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130732", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/130732"}], "article_id": "3132a624"}, {"headline": "India to spend ₹10,000 crore on novel biologics and testing", "summary": "The government is launching the Biopharma SHAKTI scheme with a ₹10,000 crore outlay over five years to transition India into an innovation-led biologics hub. The program will provide research grants and facilities for discovering and testing complex biological medicines, including monoclonal antibodies and CAR-T therapies, reducing dependence on expensive external clinical trials.", "category": "Health", "page": 6, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130732", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130732"}], "article_id": "e1a68c80"}, {"headline": "Moody’s Analytics expects Indian economy to slow due to Iran war", "summary": "Moody’s Analytics warned that the global economy is entering a slower growth phase, with global GDP growth projected to hit 2.5% in 2026. India is expected to lose momentum due to an extended US-Iran conflict, which threatens energy shocks and inflation. The report notes that geopolitical uncertainty and tight global financial conditions pose significant risks to India's growth.", "category": "Economy", "page": 6, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130732", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130732"}], "article_id": "c5be8ade"}, {"headline": "BHEL to develop indigenous 360kW fast chargers for electric trucks", "summary": "Bharat Heavy Electricals Ltd (BHEL) has been tasked by the government to manufacture India's first completely indigenous 360kW fast chargers for long-haul commercial electric vehicles. The move aims to build a local EV ecosystem and support the rollout of non-fossil-fuel vehicles. BHEL currently makes 60kW and 122kW chargers but seeks to compete with global rivals like ABB and Delta.", "category": "Infrastructure", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130732", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130732"}], "article_id": "ec88f573"}, {"headline": "US intensifies strikes on Iran targets near Tehran as war widens", "summary": "US forces intensified military strikes on Iran, hitting targets near Tehran for the first time in the current conflict. Iran retaliated with drone and missile fire against US allies in the region, including Bahrain and Kuwait. The escalation, which included US naval fire against an oil tanker, threatens to tip the Middle East into all-out war and significantly impact global oil prices.", "category": "World", "page": 8, "importance": 10, "telegram_url": "https://t.me/c/1877410077/130732", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130732"}], "article_id": "63790fbf"}, {"headline": "US considers $100,000 bond for certain green-card applicants abroad", "summary": "The Trump administration is reportedly considering a $100,000 bond for some immigrant visa seekers applying at US consulates. The proposal aims to ensure immigrants are financially self-sufficient and serves as collateral if they cannot support themselves after arrival. The refundable bond would be returned only after the individual becomes a US citizen, a process taking at least five years.", "category": "World", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130732", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130732"}], "article_id": "6e124f90"}, {"headline": "Tech executives increase security spending amid rising AI-related threats", "summary": "Growing public opposition to AI has led to a surge in violent rhetoric and threats against AI company leaders. Security spending at firms like Palantir and Oracle has jumped significantly, with some executives hiring armed guards. San Francisco police have responded to several threats against staff at Anthropic and OpenAI as concerns over job losses and societal changes fuel a backlash.", "category": "Technology", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130732", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130732"}], "article_id": "c906ff93"}, {"headline": "Kunal Shah steps down as promoter and board member of Cred", "summary": "Kunal Shah, recently appointed as WhatsApp’s global head, has resigned as a promoter and board member of Cred, the startup he founded. He converted his 11.14% promoter stake into public shares, though he still holds approximately 20% of the company. Meta Platforms also invested ₹8,550 crore for a 20% stake in the fintech firm, valuing it at nearly $4.5 billion.", "category": "Business", "page": 7, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130732", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/130732"}], "article_id": "29d0da9e"}, {"headline": "Blackstone appoints Ami Momaya as head of infrastructure for India", "summary": "Global private equity firm Blackstone has hired Ami Momaya as managing director and its first dedicated infrastructure head for the Asia-Pacific region. Joining from KKR India, Momaya will lead Blackstone’s new infrastructure platform in India. The firm has identified digital infrastructure, transportation, and the energy transition as key investment areas in the country.", "category": "Business", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130732", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/130732"}], "article_id": "26614590"}, {"headline": "AI-driven cyberattacks drive revenue and funding for security startups", "summary": "Indian cybersecurity startups are seeing a surge in demand and investor interest as generative AI makes phishing and deepfake attacks more sophisticated. Funding in the sector nearly doubled to $89 million in the first half of 2026. Firms like Mitigata and SecureBlink report high revenue growth as enterprises seek AI-powered defenses to counter automated vulnerabilities.", "category": "Technology", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130732", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/130732"}], "article_id": "97853662"}, {"headline": "Groww net profit nearly doubles in Q1 despite flat revenue", "summary": "Fintech firm Groww reported that its net profit almost doubled year-on-year to ₹735 crore for the June quarter, aided by operating leverage. While revenue was flat sequentially at ₹1,500 crore due to lower equity derivatives volatility, its margin trading facility and commodity derivatives segments saw growth. Groww remains India's largest distributor of direct mutual funds.", "category": "Business", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130732", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130732"}], "article_id": "fbc77894"}, {"headline": "HSBC offers 19x leverage to NRIs for foreign currency deposits", "summary": "HSBC’s GIFT City branch is offering non-resident Indians (NRIs) leverage of up to 19 times their own capital to create Foreign Currency Non-Resident (FCNR-B) deposits. The move utilizes the RBI's June incentive scheme aimed at boosting dollar inflows. Customers can borrow $1.9 million to create a $2 million deposit, maximizing potential returns under the concessional swap window.", "category": "Business", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130732", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130732"}], "article_id": "c68a8297"}, {"headline": "Life insurance surrender rates spike as persistency remains a concern", "summary": "RBI and IRDAI data indicate that nearly half of Indian life insurance policies are surrendered before the fifth year. Surrenders accounted for 38.3% of total payouts in FY26, exceeding maturity benefits. Experts blame aggressive bank sales targets and mis-selling for the trend. ICICI Prudential Life led major private insurers with a 61st-month persistency ratio of 58.8%.", "category": "Business", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130732", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/130732"}], "article_id": "163bfaab"}, {"headline": "Indian retail investors turn net sellers in July after June surge", "summary": "Following a net purchase of ₹39,287 crore in the June quarter, retail investors have turned net sellers in July, withdrawing ₹2,532 crore as of mid-month. Analysts attribute the shift to tactical profit-booking in mid- and small-cap stocks. Conversely, foreign portfolio investors (FPIs) have returned as net buyers, purchasing ₹15,793 crore in July after significant earlier withdrawals.", "category": "Economy", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130732", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130732"}], "article_id": "d84229c0"}, {"headline": "New ₹62,500 crore mobile incentive scheme boosts electronics stocks", "summary": "Shares of electronics manufacturing services (EMS) firms rose after the government announced the ₹62,500 crore Mobile Phone Manufacturing Scheme (MPMS). The policy offers 2.25-5% incentives on sales, with an extra 1.5% for domestic component sourcing. The scheme replaces the previous PLI and aims for ₹39 trillion in cumulative production over five years.", "category": "Business", "page": 9, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130732", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/130732"}], "article_id": "1d451e3c"}, {"headline": "C-Dac aims to develop indigenous Nvidia-like AI chip by 2030", "summary": "India’s C-Dac is working on a production-grade indigenous AI inference chip targeted for 2029-30. The processor is currently undergoing trial production, with HCL Infosystems selected to validate the design. The government seeks to emulate Nvidia's success to power domestic servers and public services, using grants from the National Supercomputing Mission to foster chip patents.", "category": "Technology", "page": 9, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130732", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/130732"}], "article_id": "eef55970"}, {"headline": "Average age of top Bollywood stars rises to 54 years", "summary": "An Ormax analysis reveals that the average age of Hindi cinema’s top five male superstars has risen to 54 in 2025, up from 47 in 2019. This aging occurs even as 57% of box office revenue comes from the 15-30 age group. Experts express concern over a lack of younger theatrical stars as niche storytelling and OTT platforms slow the emergence of a new generation of mass heroes.", "category": "Culture", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130732", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/130732"}], "article_id": "257bfaa1"}, {"headline": "RMZ Corp to sell premium office condos for ₹6,500 crore", "summary": "Real estate developer RMZ plans to sell premium office inventory worth approximately ₹6,500 crore to family offices and institutional investors this year. Under its Signature Offices arm, the firm will offer office condominiums in Bengaluru, Pune, and Gurugram. Cheque sizes are expected to range from ₹100 crore to ₹1,000 crore, reflecting high interest in commercial real estate.", "category": "Infrastructure", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130732", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/130732"}], "article_id": "5eb92dbf"}, {"headline": "Boutique advisory firms challenge Big Four dominance in India", "summary": "Smaller advisory firms like Uniqus Consultech and Grant Thornton Bharat are aggressively poaching partners from Big Four firms to gain market share. Using niche specializations like IPO-readiness and AI-based tax platforms, these firms are expanding into non-metro cities. Some boutiques now employ over 14,000 professionals as competition for consultancy fees intensifies.", "category": "Business", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130732", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/130732"}], "article_id": "35212cab"}, {"headline": "Private airport operators oppose Aera proposal to delay passenger fees", "summary": "Major airport operators including Adani, GMR, and BIAL are pushing back against a proposal by the Airports Economic Regulatory Authority (Aera). The regulator wants to link passenger fee increases to the actual completion of infrastructure rather than cost recovery approvals. Operators warn the change could squeeze cash flows and complicate financing for ₹32,000 crore in expansion plans.", "category": "Infrastructure", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130732", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/130732"}], "article_id": "ec903bb3"}, {"headline": "M2P Fintech acquires AI pioneer Mad Street Den for millions", "summary": "Chennai-based AI startup Mad Street Den (MSD) has been acquired by M2P Fintech in a cash-and-stock deal estimated between $50 million and $100 million. Founded by Ashwini Asokan and Anand Chandrasekaran, MSD was a pioneer in vector search and generalized AI stacks a decade before the current boom. The deal allows the team to transition as the founders exit the company.", "category": "Business", "page": 14, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130732", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/130732"}], "article_id": "3078e0cb"}, {"headline": "EU requires Google to open search services to AI rivals", "summary": "European Union regulators have mandated that Alphabet's Google must provide OpenAI and other AI competitors access to its search services to comply with the Digital Markets Act. The move aims to curb Big Tech power and allow rivals to integrate with Google's dominant platform. Google has criticized the mandate, while the Commission proceeds with specification proceedings.", "category": "Technology", "page": 13, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130732", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/130732"}], "article_id": "ffb519d2"}, {"headline": "Consumer commission orders Maruti to replace car over E20 compliance", "summary": "A district consumer commission in Chhattisgarh has ordered Maruti Suzuki to replace a vehicle with a new E20 petrol-compliant model. The ruling follows a complaint by a doctor who was sold a vehicle manufactured 16 months prior that suffered from recurring engine issues. The commission held that refusing to rectify the problems constituted a deficiency in service.", "category": "Law", "page": 13, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130732", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/130732"}], "article_id": "a4be39c1"}, {"headline": "India advises sailors to avoid deployment in the Strait of Hormuz", "summary": "The Directorate General of Maritime Administration (DGMA) has directed shipping companies to avoid deploying Indian sailors on vessels traveling through the Strait of Hormuz. The advisory comes amid escalating tensions in West Asia. Masters of vessels operating in the Persian Gulf and surrounding waters have been instructed to maintain heightened security vigilance.", "category": "World", "page": 6, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130732", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130732"}], "article_id": "1a97c5b8"}, {"headline": "India targets domestic manufacturing for $51 billion in imports", "summary": "Government officials stated that India is pushing to replace $51 billion worth of imports with domestic manufacturing. A broader analysis identified $398 billion in potential local replacements, but $51 billion—including textiles and solar panels—is considered critical. The initiative aims to reduce foreign outflows and strengthen India's self-reliance in strategic industrial sectors.", "category": "Economy", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130732", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130732"}], "article_id": "229f5f75"}, {"headline": "Copenhagen ranked world’s most liveable city as food scene expands", "summary": "Copenhagen has been named the world’s most liveable city by the Economist Intelligence Unit, citing strong healthcare and infrastructure. The city's culinary reputation continues to grow, holding a record 31 Michelin stars. New notable spots include Bottega Barlito and Bar Sportif, while traditional smørrebrød remains a staple for tourists and locals.", "category": "Culture", "page": 18, "importance": 4, "telegram_url": "https://t.me/c/1877410077/130732", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/130732"}], "article_id": "6854da8c"}, {"headline": "SBI Mutual Fund aims to double AUM over five years", "summary": "Managing director Debasish Mishra stated that SBI Mutual Fund plans to double its assets under management over the next five years. The fund house aims to increase its customer base to 3.5 crore and derive 50% of its assets from beyond the top 30 cities. The strategy focuses on financial inclusion, AI-led investing, and expanding passive funds and alternative offerings.", "category": "Business", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130732", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130732"}], "article_id": "1c84a7da"}, {"headline": "Forevermark bets on Indian retail with 100 planned store outlets", "summary": "De Beers’ Forevermark is expanding its retail footprint in India, aiming for 100 stores and $100 million in revenue within four years. India is De Beers’ second-largest market globally for natural diamonds. The expansion comes despite a global downturn in natural diamond prices and rising competition from lab-grown stones, with India's diamond market expected to triple by 2030.", "category": "Business", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130732", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/130732"}], "article_id": "17d55080"}, {"headline": "Weather department forecasts heavy rainfall across eastern and north-eastern India", "summary": "The India Meteorological Department has forecast heavy rainfall across eastern and north-eastern India over the next week. A well-marked low-pressure area over the north-west Bay of Bengal is expected to intensify precipitation across Odisha and West Bengal. The weather system is set to bring relief to some regions but may impact local infrastructure and agriculture.", "category": "Environment", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130732", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130732"}], "article_id": "eb738eb5"}, {"headline": "US official describes bilateral ties with India as really great", "summary": "US Representative Dan Negrea has described India as a leader in many areas and noted that the country has made substantial investments in America. Speaking at a high-level meeting, Negrea characterized bilateral ties as really great, highlighting the growing economic partnership and mutual cooperation between the two nations across various strategic sectors.", "category": "Politics", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130732", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130732"}], "article_id": "21893c8f"}, {"headline": "Govt floats CAFE-III with super credits, carbon trading", "summary": "The Ministry of Power released draft amendments to CAFE-II regulations and proposed CAFE-III norms for 2027. The framework introduces a market-based credit trading system to incentivize the shift to electric, hybrid, and flex-fuel vehicles. It retains the fleet-average approach while tightening emission targets to improve fuel efficiency across automakers' portfolios.", "category": "Economy", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "077a650e"}, {"headline": "Union government preparing export-oriented policy for fisheries", "summary": "The Union government is drafting a new export-oriented policy for fisheries with a special emphasis on inland fishing. This initiative aims to boost the sector's contribution to India's overall exports. Union Minister Rajiv Ranjan Singh announced the move, highlighting plans to use drones for transporting fish products and increasing productivity in the sector.", "category": "Economy", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "d39d0c2a"}, {"headline": "Marico plans to step up acquisitions in FY27", "summary": "Marico aims to consolidate its position in existing categories and enter new geographies through strategic acquisitions. MD and CEO Saugata Gupta stated the strategy aims to transform Marico into a more diversified consumer goods company. The firm's digital-first portfolio, including brands like Beardo and Just Herbs, has crossed an annual revenue run rate of ₹1,100 crore.", "category": "Business", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "d803565b"}, {"headline": "ITC focusing on evolving consumer needs for taste and nutrition", "summary": "ITC is sharpening its focus on the health and nutrition segment within the packaged food space. Hemant Malik, Executive Vice-President of ITC's food division, highlighted the launch of high-protein products like 'Aashirvaad' protein atta and protein drinks. The company is also expanding its presence in the rural market where demand for premium products is growing.", "category": "Business", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "070fe55b"}, {"headline": "PepsiCo to set up new food manufacturing facility in TN", "summary": "PepsiCo India plans to establish a new food manufacturing facility in Tamil Nadu as part of its ₹5,700 crore investment commitment in India through 2030. Jagrut Kotecha, CEO of PepsiCo India & South Asia, stated that despite unseasonal rains, the company remains optimistic about growth in the snacks and beverage sectors, particularly in rural markets.", "category": "Business", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "86b6aef6"}, {"headline": "JSW MG expects 80% of total sales from New Energy Vehicles", "summary": "JSW MG Motor India expects New Energy Vehicles, including EVs and hybrids, to contribute 80% of its total sales this year. The company plans to launch several new models to reach this target. MD Gaurav Gupta noted that 50% of current sales come from Tier-I and Tier-II cities. The firm also unveiled the ADAPT architecture to support future EV development.", "category": "Business", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "0362a870"}, {"headline": "Brazil tariff shock flags risks of fast-tracking India-US pact", "summary": "The US decision to impose a 25% tariff on steel imports from Brazil has prompted a cautious approach in India regarding a bilateral trade agreement with Washington. Experts warn that India should not rush into a deal given the uncertainty over US trade actions. India is monitoring Section 301 investigations that could lead to additional tariffs on Indian goods.", "category": "Economy", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "b2b18c5f"}, {"headline": "Russia to continue to meet half of India’s crude imports", "summary": "India’s crude oil imports from Russia are expected to remain at least half of the country's total imports for July and August. Despite rising costs and logistical challenges, Russian barrels remain a competitive source for Indian refiners. Imports in June reached a record 2.13 million barrels per day, accounting for nearly 45% of India’s total crude arrivals.", "category": "Economy", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "a22271e7"}, {"headline": "Govt hikes windfall tax on export of diesel and ATF", "summary": "The Indian government has increased the windfall tax on the export of diesel and aviation turbine fuel (ATF) while lowering the levy on domestic crude oil. The Special Additional Excise Duty on diesel export was raised to ₹15.5 a litre from ₹8.5, and on ATF to ₹14.5 from ₹7.5. The export duty on petrol was reduced from ₹4 per litre to ₹2.5.", "category": "Economy", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "6f021198"}, {"headline": "RBI’s financial inclusion index rises 4.48% in FY26", "summary": "The Reserve Bank of India’s composite financial inclusion index rose to 61.2 in March 2026 from 58.4 a year earlier, reflecting a growth of 4.48%. The index captures the extent of financial inclusion across the country based on access, usage, and quality of services. The RBI noted that improvements were seen across all sub-indices during the 2025-26 fiscal year.", "category": "Economy", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "cf577c6b"}, {"headline": "Inflated worries: RBI can look through June CPI spike", "summary": "June's inflation print of 4.4% was largely driven by supply-side shocks from the Iran war and is not broad-based. Core inflation remains at a manageable 2.5%, and food inflation is expected to ease with the progress of the monsoon. The editorial suggests that while headline numbers might edge up, the RBI should maintain a status quo on interest rates and remain data-dependent.", "category": "Economy", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "be987034"}, {"headline": "Inverted duty structure in aluminium a major concern for MSMEs", "summary": "India’s aluminium sector faces an inverted duty structure where tariffs on raw materials are higher than on finished products. This lopsided structure, exacerbated by Free Trade Agreements with ASEAN and South Korea, is impacting downstream MSMEs more than large upstream firms. The article argues for a review of tariffs to support domestic value addition and MSME development.", "category": "Economy", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "6b23ad31"}, {"headline": "Indian exporters face headwinds from global demand slowdown", "summary": "Indian merchandise exports face challenges from global demand slowdowns and geopolitical uncertainties. While exports showed resilience in the first quarter, factors like the Red Sea crisis, potential US tariff hikes, and weather-related disruptions to agricultural exports could impact growth. The article emphasizes the need for exporters to improve competitiveness to navigate these risks.", "category": "Economy", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "0a46a17b"}, {"headline": "AI success depends on organizational competence, not just tech", "summary": "While AI has the potential to boost global productivity, its success depends on organizational transformation rather than just technology investment. Redesigning processes and improving data quality are essential to unlock AI's value. India’s opportunity lies in applying AI to sectors like healthcare and agriculture through its existing digital public infrastructure.", "category": "Technology", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "4e9c9981"}, {"headline": "IDBI Bank faces long, bumpy road to privatization", "summary": "The government’s attempt to privatise IDBI Bank continues to face hurdles regarding valuation and political will. Despite improved financials, with gross NPAs dropping to 2.5%, the hunt for a buyer for the combined government-LIC stake remains in limbo. Potential bidders like Kotak Mahindra Bank and Fairfax have shown interest, but a final deal has been elusive for years.", "category": "Business", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "8f6f8b71"}, {"headline": "Iran’s top negotiator defends diplomatic talks with United States", "summary": "Iran's lead negotiator Mohammad Bagher Ghalibaf defended diplomatic efforts to end the Iran-US conflict, urging hardliners to support negotiations. He argued that diplomacy is part of national interest and does not mean a compromise on values. The talks aimed to unblock frozen Iranian assets and address economic issues, though tensions remain high following recent military actions.", "category": "World", "page": 5, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "93d62113"}, {"headline": "NISM proposes common certification for SIF and MF distributors", "summary": "The National Institute of Securities Markets has proposed a common certification examination for distributors of both Mutual Funds and Special Investment Funds. This aims to simplify the registration process for distributors who deal in both products and reduce compliance burdens. The new certification, NISM-Series-V-D, is expected to be available from July 22.", "category": "Business", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "7e83b348"}, {"headline": "Angel One sees lending and wealth businesses driving growth", "summary": "Angel One expects its nascent lending and wealth management businesses to contribute 40% of its revenue in the next few years. The brokerage firm is diversifying its income streams beyond traditional stockbroking. Its assets under management for wealth business reached ₹3,230 crore in the June quarter. The company is also exploring opportunities in the GIFT City.", "category": "Business", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "38c94a17"}, {"headline": "FPI stake in Adani Enterprises hits a record low of 8.8%", "summary": "The combined stake of Foreign Portfolio Investors in Adani Enterprises fell to 8.8% at the end of the June quarter, the lowest since 2009. This decline follows a series of sell-offs by several long-term investors following the Hindenburg Research report. Despite the fall in FPI holding, the stock has recovered significantly from its post-report lows.", "category": "Business", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "97ebfacc"}, {"headline": "HSBC upgrades India equity to neutral on growth confidence", "summary": "HSBC Holdings has upgraded its rating on Indian equities to 'neutral' from 'underweight,' citing easing risks from oil prices and strong domestic growth. The brokerage firm raised its year-end target for the BSE Sensex to 84,000 from 80,500. HSBC noted that India remains an attractive destination for investors seeking exposure to domestic-oriented growth.", "category": "Business", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "21dfe0ad"}, {"headline": "Nifty and Sensex end flat after volatile trading session", "summary": "Indian benchmark indices, Nifty and Sensex, ended nearly flat on Thursday after a volatile trading session. The Sensex closed marginally higher at 77,186, while the Nifty ended at 24,072. The market was weighed down by a decline in banking and financial stocks, even as gains in the IT sector provided some support for the indices.", "category": "Business", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "32b4e5c5"}, {"headline": "Top private banks cut jobs amid digital shift and branch expansion", "summary": "Leading private banks like HDFC Bank, Axis Bank, and Kotak Mahindra Bank saw a combined reduction of over 5,000 employees in FY26. This trend comes as banks shift towards digital operations and automate routine tasks to improve efficiency. Despite the reduction in total staff, some banks added new branches while streamlining their non-supervisory workforce.", "category": "Business", "page": 7, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "a8501cd2"}, {"headline": "Barclays expects FCNR deposit inflows to fall below market hype", "summary": "Barclays expects Foreign Currency Non-Resident deposit inflows to India to be between $5 billion and $6 billion, significantly lower than market expectations of $40 billion to $70 billion. The bank noted that while the RBI has incentivized these deposits, current global interest rate trends might limit their attractiveness to non-resident Indians and foreign investors.", "category": "Business", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "092ff375"}, {"headline": "Sanjay Ghodawat Group and Nordstar Estates launch real estate JV", "summary": "The Sanjay Ghodawat Group and Nordstar Estates have announced a joint venture to build residential and commercial real estate projects in Mumbai and Bengaluru. The partnership will develop projects with a total gross development value of over ₹5,000 crore over the next few years. The JV will focus on creating high-quality living and working spaces in these major cities.", "category": "Business", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "f4de4eb9"}, {"headline": "Semicon 2.0 program to position India as a global hub", "summary": "Industry experts believe the Semicon India 2.0 program, with an outlay of ₹1.27 lakh crore, will position India as a global semiconductor hub. The program aims to move beyond manufacturing to include design, R&D, and talent development. The approval of the second phase of the mission is expected to attract significant global investments and create high-skilled jobs.", "category": "Technology", "page": 8, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "824b6f67"}, {"headline": "British Airways’ ground handling receipts are taxable in India: ITAT", "summary": "The Income Tax Appellate Tribunal has ruled that British Airways’ receipts from providing ground-handling services to other airlines in India are taxable. The tribunal rejected the airline's claim for tax exemption under the India-UK Double Taxation Avoidance Agreement. ITAT noted that these services are ancillary to operating aircraft and do not fall under treaty benefits.", "category": "Law", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "14225c04"}, {"headline": "Govt targets 25% food processing levels by 2031", "summary": "The Union government aims to increase India's food processing levels to 25% by 2031 from the current 10-12%. Food Processing Secretary Avinash Joshi highlighted the need for higher investments and better infrastructure to achieve this target. The government is also considering a new incentive scheme, possibly PLI 2.0, to boost the sector’s growth and exports.", "category": "Economy", "page": 8, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "ebd418f4"}, {"headline": "IMFA plans to double chrome ore output with ₹1,200 crore", "summary": "Indian Metals and Ferro Alloys plans to invest ₹1,200 crore to double its chrome ore mining output to 12 lakh tonnes annually by FY31. Managing Director Subhrakant Panda stated that the company will also expand its ferrochrome production capacity. The investment will focus on transitioning from open-cast to underground mining at its facilities in Odisha.", "category": "Business", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "0590bee3"}, {"headline": "Dr Reddy’s sharpens focus on oncology and biologics for growth", "summary": "Dr Reddy’s Laboratories is sharpening its focus on value through differentiated product offerings and expanding its presence in the oncology and biologics segments. In their message to shareholders, the company's leadership emphasized a commitment to innovation and sustainable growth. The firm also plans to strengthen its generic business in the US and European markets.", "category": "Business", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "a4bc851d"}, {"headline": "Automakers face margin pressure despite healthy festival season demand", "summary": "Despite healthy demand during the festival season, Indian automakers are facing margin pressure due to rising input costs. A weak rupee and high prices of commodities like lithium, cobalt, and steel are impacting profitability. Morgan Stanley analysts suggest that while demand remains strong, companies may need to hike prices to protect their profit margins.", "category": "Business", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "0d35c8c2"}, {"headline": "Agri-tech startup Rize raises $31 million in Series B funding", "summary": "Singapore-headquartered agri-tech startup Rize has raised $31 million in Series B funding. The round was led by BNP Paribas Asset Management and included participation from Temasek and Breakthrough Energy Ventures. The funds will be used to expand Rize’s AI-powered platform for smallholder farmers in India, Vietnam, and Indonesia to improve crop yields and sustainability.", "category": "Technology", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "a88fc57a"}, {"headline": "Waaree Energy Storage Solutions commissions 5.15 GWh BESS facility", "summary": "Waaree Energies' subsidiary has commissioned a 5.15 GWh battery energy storage system (BESS) facility in Gujarat. The project, which involved an investment of ₹450 crore, aims to cater to utility-scale and commercial energy storage needs. This marks a significant step in Waaree's expansion into the advanced battery technology space.", "category": "Business", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "e98a13d6"}, {"headline": "ACME Solar secures ₹2,647 crore funding from REC", "summary": "ACME Solar Holdings has secured ₹2,647 crore in funding from Rural Electrification Corporation for its 450 MW hybrid renewable energy project in Rajasthan. The project, which combines solar and wind power, is expected to be completed by late 2026. The funding will be used for the development and construction of the facility.", "category": "Business", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "f3dcf599"}, {"headline": "Onida aims for five-fold revenue growth over five years", "summary": "Consumer electronics brand Onida aims to grow its revenue five-fold over the next five years through a new transformation strategy. CEO Saugata Gupta stated that the company will focus on new product development, strengthening its sales network, and expanding into the air conditioner and washing machine segments. Onida plans to open 100 exclusive brand outlets across India.", "category": "Business", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "4f58d76f"}, {"headline": "Renault India plans to launch seven new models by 2030", "summary": "Renault India plans to launch seven new models by 2030, including two new SUVs and an electric vehicle, as part of its 'FutureReady India' strategy. The company aims to replicate its successful turnaround strategy from South Korea. Renault will focus on expanding its product portfolio, increasing localization, and strengthening its position as a global hub for exports.", "category": "Business", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "3a150a9b"}, {"headline": "Zoho unveils AI-powered Classes 2.0 platform for personalized learning", "summary": "Zoho has launched Classes 2.0, an AI-powered educational platform designed to provide a personalized learning experience for students. The platform includes features like an AI tutor and automated grading to assist teachers. Zoho plans to offer the platform for free to government schools and provide it at an affordable price to private educational institutions.", "category": "Technology", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "bd558751"}, {"headline": "Elgi Equipments receives ₹25 crore tariff refund from US government", "summary": "Elgi Equipments has announced that its US subsidiary, Elgi Compressors USA, has received a tariff refund of $2.68 million from the US government. The refund follows a successful challenge to tariffs imposed on certain types of equipment imported into the US. The company stated that the refund will be used to support its operations and growth in the North American market.", "category": "Business", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "b27cbfc5"}, {"headline": "India’s wheat production likely to be affected by climate change", "summary": "India’s wheat production for the 2026-27 crop year could be impacted by climate change and unseasonal weather patterns. Experts suggest that while a good monsoon is expected, potential heatwaves during the harvest season could affect yields. The government is monitoring the situation and may consider measures to ensure domestic food security and stabilize prices.", "category": "Environment", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "4cc250fc"}, {"headline": "US anti-dumping duties to hit India’s paprika exports", "summary": "The US Department of Commerce has decided to impose anti-dumping duties on paprika exports from India. The move follows a petition by US manufacturers alleging that Indian exporters were selling paprika at unfairly low prices. These duties, ranging from 18% to 25%, are expected to impact India's competitiveness and exports in the US spice market.", "category": "Economy", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "70ad673c"}, {"headline": "India’s oilmeal exports dip 21.5% in April on shipping woes", "summary": "India’s oilmeal exports fell 21.5% in April to 3.65 lakh tonnes, compared to 4.65 lakh tonnes in the same month last year. The decline was attributed to high shipping costs and logistical challenges caused by the Red Sea crisis. Soybean meal exports saw a significant drop, as higher domestic prices made Indian exports less competitive in the global market.", "category": "Economy", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "6c508105"}, {"headline": "KisanKraft launches two electric-powered farm equipment for small farmers", "summary": "KisanKraft has launched two new electric-powered farm equipment: an inter-cultivator and a self-propelled reaper. These machines are designed to reduce fuel costs and improve efficiency for smallholder farmers. The company claims that the electric equipment can reduce operating costs by up to 70% compared to traditional petrol-powered alternatives.", "category": "Technology", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "cfd34b84"}, {"headline": "Crystal Crop Protection launches six new products for kharif season", "summary": "Crystal Crop Protection has introduced six new products for the 2026 kharif season, including three herbicides and three fungicides. These innovations aim to provide farmers with more effective tools to manage pests and diseases while improving crop yields. The company emphasized its commitment to research and development in the Indian agriculture sector.", "category": "Business", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "a390f0a8"}, {"headline": "Telangana government advises farmers to opt for alternative crops", "summary": "The Telangana government has advised farmers to opt for alternative crops like pulses and oilseeds instead of paddy due to concerns over water availability. Agriculture Minister Tummala Nageswara Rao stated that the move would help conserve water and ensure better returns for farmers. The government will provide support for the transition to these alternative crops.", "category": "Environment", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "f53148d2"}, {"headline": "India’s social security coverage expands to over 100 crore citizens", "summary": "Union Minister Mansukh Mandaviya announced that India’s social security coverage has expanded to over 100 crore citizens in 2026. This achievement was highlighted at the BRICS Labour & Employment Ministers’ Meeting. The expansion is attributed to the government's focus on formalizing the unorganized sector and the successful rollout of schemes like the e-Shram portal.", "category": "Politics", "page": 11, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "bdcf2321"}, {"headline": "Higher raw material costs take a toll on CEAT’s Q1 net", "summary": "CEAT reported a decline in its Q1 net profit to ₹39 crore from ₹159 crore a year ago, despite a growth in revenue to ₹4,318 crore. The fall in profit was attributed to higher raw material costs and increased interest expenses. The company's EBITDA margin also contracted during the quarter. CEO Arnab Banerjee stated that CEAT will focus on price hikes to offset these costs.", "category": "Business", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "a061d968"}, {"headline": "Newly formed TVK government in TN to focus on fund efficiency", "summary": "The newly formed TVK government in Tamil Nadu will focus on the efficient use of public funds in its first budget. Finance Minister PTR Palanivel Thiaga Rajan stated that the government aims to prioritize spending on essential services while maintaining fiscal discipline. The budget will also address the state's financial challenges and seek to improve revenue collection.", "category": "Politics", "page": 11, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "5495682c"}, {"headline": "Kandla Port surpasses 50 million tonnes cargo handling milestone", "summary": "Deendayal Port in Gujarat handled over 50 million tonnes of cargo in the first quarter of FY27, achieving the milestone 19 days earlier than in the previous year. This growth was driven by a strong performance in both overseas and coastal cargo segments. Kandla remains the leading port among India's major ports for cargo handling in the current fiscal year.", "category": "Infrastructure", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "df3ccf32"}, {"headline": "Spain’s Inalsa invests ₹50 crore in Sonipat manufacturing plant", "summary": "Inalsa Home Appliances, the Indian arm of Spain’s Taurus Group, has invested ₹50 crore to expand its manufacturing facility in Sonipat, Haryana. The investment will be used to increase the production of kitchen appliances like air fryers and mixers. Inalsa aims to strengthen its manufacturing presence in India and expand its product portfolio for the domestic market.", "category": "Business", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "7703c15b"}, {"headline": "Continued ban on trekking in Kashmir hits adventure tourism sector", "summary": "A ban on trekking in several high-altitude areas of Kashmir, including the Tarsar-Marsar trail, has significantly impacted the region's adventure tourism sector. The restrictions were imposed due to security concerns following recent incidents in the area. Tour operators and local communities that depend on trekking for their livelihoods are facing severe financial losses.", "category": "Business", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "49377a5e"}, {"headline": "AP Minister Nara Lokesh apologises to Amara Raja Group", "summary": "Andhra Pradesh IT Minister Nara Lokesh has apologized to the Amara Raja Group for the 'harassment' it faced under the previous state government. He invited the company to reinvest in the state and promised a more favorable business environment. Amara Raja had earlier shifted some of its investments to Telangana, citing a lack of support from the then AP government.", "category": "Politics", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "01ae3f44"}, {"headline": "Telangana and Microsoft partner to set up Green Skills center", "summary": "The Telangana government has signed an agreement with Microsoft to establish a Center of Excellence for Green Skills in Hyderabad. The center will focus on training youth in skills required for the renewable energy and sustainability sectors. This initiative aims to prepare the state's workforce for the growing green economy and support sustainable development.", "category": "Technology", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "5a568c62"}, {"headline": "India Post eases norms on refund of postage fees", "summary": "India Post has announced a new rule that allows for the refund of postage fees if a customer cancels a registered post before it has been processed. The refund can be claimed at the post office where the article was booked. This move aims to improve customer service and provide more flexibility for people using postal services across the country.", "category": "India", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "8b189d45"}, {"headline": "Goenka family plans to build ₹100 crore university in Haryana", "summary": "The Goenka family, promoters of the Essel Group, has announced plans to build a new university with an investment of ₹100 crore. The university will be located in Haryana and will offer courses in a variety of disciplines, including management and technology. The project is part of the family's philanthropic efforts to improve access to higher education in India.", "category": "Education", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "1e3ebdfe"}, {"headline": "Guidance Tamil Nadu continues consultations for new industrial policy", "summary": "Guidance Tamil Nadu, the state's investment promotion agency, held consultations with various industry associations to gather feedback for its new industrial policy. The meeting included representatives from sectors like electronics and pharmaceuticals. The policy aims to improve the ease of doing business and attract more global investments to the state.", "category": "Business", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "8397ed24"}, {"headline": "Centre will explain dynamic airfare pricing stance to Supreme Court", "summary": "The Union government will explain to the Supreme Court its rationale for allowing airlines to use dynamic airfare pricing. Civil Aviation Minister Ram Mohan Naidu stated that dynamic pricing is a global practice that helps airlines maintain connectivity and manage demand. The remarks come as the apex court is hearing a matter related to the regulation of ticket prices.", "category": "Law", "page": 12, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "397d020f"}, {"headline": "Foreign airlines bolster premium seat offerings in India", "summary": "International airlines like Lufthansa and Emirates are increasing their premium seat capacity on flights to and from India. This trend is driven by strong demand for business and first-class travel among Indian passengers. Airlines are deploying larger aircraft like the Airbus A380 to meet this demand and improve their service offerings in the competitive Indian market.", "category": "Business", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "f94ff6fb"}, {"headline": "Eli Lilly’s partner Atai Life Sciences makes psychedelics progress", "summary": "Eli Lilly’s partner Atai Life Sciences has announced progress in its development of psychedelic treatments for mental health disorders. This move marks Eli Lilly’s entry into the growing field of psychedelic medicine. The treatments are currently in the clinical trial phase and aim to provide new options for patients with conditions like depression and PTSD.", "category": "Health", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130739", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/130739"}], "article_id": "02752ad8"}, {"headline": "Trinamool MP Koel Mallick resigns as Mamata Banerjee challenges rebels", "summary": "Rajya Sabha MP Koel Mallick resigned from the Trinamool Congress (TMC), becoming the fourth MP to quit since the Assembly elections. TMC chairperson Mamata Banerjee stated that those facing pressure from central agencies should leave the party. The exit follows that of Madan Mitra. Banerjee alleged that the rebels are backed by Delhi and are pressuring supporters to skip party rallies.", "category": "Politics", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "463d6308"}, {"headline": "Delhi University releases first undergraduate admission list with 93,033 seat offers", "summary": "The University of Delhi released its first allocation list for undergraduate admissions, offering 93,033 seats across 67 colleges for approximately 71,600 available spots. The excess allotment accounts for potential withdrawals. Shortlisted candidates must accept seats by July 18 and pay fees by July 21. A second allocation list is scheduled for release on July 25.", "category": "Education", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "166d8366"}, {"headline": "High Court grants final chance for AAP leaders to respond to CBI", "summary": "The Delhi High Court granted Arvind Kejriwal, Manish Sisodia, and Durgesh Pathak a final two weeks to respond to a CBI petition challenging their discharge in the excise policy case. Justice Manoj Jain noted the case has been \"sufficiently delayed.\" The court scheduled arguments for August 17. The leaders' counsel was absent due to a lawyer strike protesting jurisdiction changes.", "category": "Law", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "a088bcaf"}, {"headline": "Delhi Cabinet approves ₹400 crore policy to promote startup ecosystem", "summary": "The Delhi Cabinet approved the Delhi Start-up and Incubation Policy with a ₹400 crore allocation over five years. The policy aims to facilitate 5,000 start-ups by 2035 across 11 state universities and various institutes. It provides financial assistance for students and alumni to establish incubation centres. An annual Start-up Youth Festival will be organized to showcase innovations.", "category": "Economy", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "69c1318a"}, {"headline": "Narela housing projects drive robust DDA flat sales in first quarter", "summary": "The Narela area contributed nearly 90% of the Delhi Development Authority's housing sales in the first quarter of 2026-27. The DDA sold 1,284 flats, generating ₹1,020 crore in revenue. The Narela projects have emerged as the primary driver for the authority's recent sales growth, marking a significant shift in Delhi's real estate market dynamics.", "category": "Infrastructure", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "e9cd5440"}, {"headline": "Schoolteacher killed in road accident while riding bike taxi in Delhi", "summary": "A 46-year-old schoolteacher, Priyanka, was killed after the bike taxi she was riding collided with a truck on Kanjhawala Road in Rohini. The truck, loaded with sand, crushed her after she fell. The driver fled the scene. Delhi Police have registered a case for rash driving and causing death by negligence. The victim was a resident of Rama Vihar on her way to work.", "category": "India", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "8782806c"}, {"headline": "Eleven arrested in Delhi for running bribery racket inside Rohini Jail", "summary": "The Anti-Corruption Branch arrested 11 persons, including a prison assistant superintendent and six warders, for running a bribery racket at Rohini Jail. The accused allegedly coerced families of undertrial prisoners to pay for safety and preferential treatment. The investigation began after a complaint in February 2024. Advocates and other associates were also involved in the ring.", "category": "Law", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "c6fcfb60"}, {"headline": "Four arrested for harassing booth level officer during Delhi electoral revision", "summary": "Delhi police arrested four men for allegedly harassing and obstructing a postgraduate teacher serving as a Booth Level Officer (BLO) in Old Delhi. The victim alleged the accused signed her register without permission and used abusive language during the special intensive revision of electoral rolls. The incident occurred on July 5 in the Phatak Teliyan area.", "category": "India", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "17834a8e"}, {"headline": "Delhi Gymkhana workers appeal to Prime Minister over job security fears", "summary": "The Delhi Gymkhana Workers’ Association wrote to Prime Minister Narendra Modi seeking job protection for 700 employees facing potential eviction due to lease-related issues. The association stated that the workers, mostly from lower-middle-class backgrounds, face financial uncertainty and inability to repay loans. Many have worked at the club for over a decade.", "category": "India", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "78a77ee4"}, {"headline": "Tamil Nadu CM Joseph Vijay warns Cabinet against corruption and irregularities", "summary": "Tamil Nadu Chief Minister C. Joseph Vijay warned his Cabinet and senior officials that corruption or irregularities would not be tolerated. During a meeting ahead of the state budget, he emphasized accountability and warned of action against non-cooperation. Law Minister R. Nirmalkumar dismissed rumors of a political pact between the DMK, AIADMK, and BJP during the deliberations.", "category": "Politics", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "61000412"}, {"headline": "BJP to protest against Jammu and Kashmir government over job outsourcing", "summary": "The Jammu and Kashmir unit of the BJP announced protests for July 20 against the state government's \"outsourcing of jobs.\" The move coincides with a planned sit-in by the ruling National Conference in New Delhi demanding statehood. BJP leader Sunil Sharma accused the NC of diverting attention from governance failures, while the Congress has supported the NC's statehood demands.", "category": "Politics", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130693", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130693"}], "article_id": "7fce5754"}, {"headline": "Supreme Court disposes of petitions challenging Tamil Nadu electoral roll revision", "summary": "The Supreme Court closed 13 petitions filed by political parties, including the DMK, challenging a special intensive revision (SIR) of electoral rolls in Tamil Nadu. The court cited its previous judgment in the Bihar case, which upheld the
