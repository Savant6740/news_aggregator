 25, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125198", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_28-05-2026.pdf", "page": 25, "telegram_url": "https://t.me/c/1877410077/125198"}], "article_id": "5f9152a4"}, {"headline": "Can film workers’ union demand boycott of actors?", "summary": "The Federation of Western India Cine Employees (FWICE) urged Hindi film producers not to work with actor Ranveer Singh after he allegedly backed out of a film. The union issued a 'non-cooperation directive' against Singh, but such directives, lacking legal heft, rely on collective agreement from members. FWICE previously issued similar bans.", "category": "Culture", "page": 3, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "f95de3d3"}, {"headline": "Quad’s future in Indo-Pacific highlighted amid China concerns", "summary": "A four-way meeting of Quad diplomats from the US, India, Australia, and Japan in New Delhi yielded agreements on critical minerals, maritime initiatives, and energy security. This effort aims to keep an assertive China from over-projecting power in the Indo-Pacific. US reduction of forces in Europe might shift focus.", "category": "Politics", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "172d507d"}, {"headline": "Do market cap giants also lead in GDP size?", "summary": "Data reveals that Taiwan is the world's fifth-largest stock market despite a smaller economy. Hong Kong also commands a huge stock market despite a lower GDP ranking, showing a divergence between market capitalization and GDP size for some top economies, according to Bloomberg and IMF data.", "category": "Economy", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "ab4e339a"}, {"headline": "India’s gender divide on family matters revealed by Millennial Survey", "summary": "The YouGov-Mint-CPR Millennial Survey shows Indian men prefer traditional family structures and women favour nuclear setups and external childcare. Men often overestimate their domestic contributions. Income and education significantly influence an individual’s satisfaction with family roles, revealing structural changes in household composition.", "category": "India", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "e3e56d2f"}, {"headline": "India’s lower-income tax-payers rapidly exiting return-filing net", "summary": "The number of individuals earning up to ₹5 lakh filing tax returns nearly halved to 27.6 million in 2025-26 from 56.5 million in 2023-24. This shift is due to increased basic exemption limits, reshaping the taxpayer profile towards higher-income groups, with policy-led relief for lower earners.", "category": "Economy", "page": 5, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "c515f528"}, {"headline": "RBI platform on unclaimed deposits exposed sensitive personal data", "summary": "RBI's Udgam platform, meant to help users recover unclaimed bank deposits, exposed sensitive personal information online. An independent researcher found that anyone with a mobile number and OTP could access details of thousands of dormant accounts, raising privacy and scam risks. RBI's login mechanism stopped working on Tuesday.", "category": "Technology", "page": 5, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "78d429d5"}, {"headline": "Traveller from Uganda not Ebola infected; no cases in India", "summary": "A traveller arriving in Bengaluru from Uganda tested negative for Ebola. The Ministry of Health and Family Welfare confirmed no Ebola cases in India. The individual was kept under observation as a precaution, and the government maintains close surveillance with state authorities.", "category": "Health", "page": 6, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "548023ec"}, {"headline": "India, Canada reaffirm aim for $50 bn trade, fast-tracking CEPA", "summary": "India and Canada committed to expanding bilateral trade to $50 billion by 2030 and fast-tracking Comprehensive Economic Partnership Agreement (CEPA) talks. Commerce and Industry Minister Piyush Goyal held a series of high-level meetings with Canadian ministers, investors, and business leaders in Toronto.", "category": "Economy", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "d5c48982"}, {"headline": "Sebi plans to tighten oversight on use of equity funds", "summary": "Sebi plans to tighten oversight on how companies use equity capital raised from public markets, according to draft proposals reviewed by Reuters. The proposals aim to bolster investor confidence and accountability amidst cooled fund-raising momentum due to the Iran war.", "category": "Business", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "09854d04"}, {"headline": "US delegation to visit India for trade pact talks", "summary": "A US delegation led by Trade Representative Jamieson Greer will visit New Delhi from 1-4 June for talks on a Bilateral Trade Agreement (BTA). Both sides intensify efforts to finalize an interim trade arrangement and advance broader economic security cooperation, following Secretary Marco Rubio's visit.", "category": "Politics", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "06522a03"}, {"headline": "India rice exports fall as Iran war curbs basmati shipments to Gulf", "summary": "India's rice exports in the first four months of 2026 fell marginally as the US-Israeli war with Iran disrupted premium basmati variety shipments to Gulf markets. This decline adds pressure on Indian prices, which have already fallen more than 5% this year following a record rice harvest.", "category": "Economy", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "dc48a759"}, {"headline": "Monsoon advances amid severe heatwave over north, central India", "summary": "While north-west and central India reel under severe heatwave conditions, the south-west monsoon is steadily advancing. The India Meteorological Department (IMD) reports favourable conditions for its further spread over the Arabian Sea and Bay of Bengal in the next two to three days, raising hopes of relief.", "category": "India", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "21170d27"}, {"headline": "Banks told to expedite Jansuraksha onboarding", "summary": "The finance ministry urged major private sector banks to expedite onboarding to the Jansuraksha portal. This aims to expand digital access to Pradhan Mantri Suraksha Bima Yojana (PMSBY), Pradhan Mantri Jeevan Jyoti Bima Yojana (PMJJBY), and Atal Pension Yojana (APY) for low-income and underserved households.", "category": "Economy", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "c8916a10"}, {"headline": "Govt approves ₹25,530 crore overhaul of PDS network", "summary": "The cabinet approved a ₹25,530 crore overhaul of the public food distribution network, merging two subsidy programmes. The five-year plan, starting FY27, will use AI, blockchain, and ML to monitor supply chains, aiming for efficient and transparent delivery to over 813.5 million beneficiaries. Rationalization of transport could save ₹280 crore annually.", "category": "Infrastructure", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "ed870d91"}, {"headline": "Green energy investments set to gain momentum in India: BII CEO", "summary": "Leslie Maasdorp, CEO of British International Investment (BII), states green energy investments in India will expand due to heightened energy security concerns from the West Asia war. BII will commit £8 billion from its capital, with the remainder mobilized from other investors for climate and infrastructure projects over five years.", "category": "Environment", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "4568cac1"}, {"headline": "FTSE Russell eases fast-track entry rules ahead of SpaceX IPO", "summary": "FTSE Russell adopted a rule change to speed up the addition of newly listed large-cap firms to its main indexes. IPOs with investable market capitalizations above the Russell Top 500 cutoff will now qualify for fast entry after their fifth trading day, ahead of SpaceX’s expected public offering.", "category": "Business", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "587c815d"}, {"headline": "AI to turbocharge patent creation at India tech hubs, executives say", "summary": "Global firms expect AI to accelerate new product and intellectual property creation at their Indian tech hubs. Executives from Publicis Groupe’s Epsilon, Kimberly-Clark, and Daimler Truck note automation helps staff move beyond routine tasks to complex work and building proprietary technology.", "category": "Technology", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "2b09b399"}, {"headline": "Control, not just FDI, drives insurance M&A", "summary": "Deal activity in India's insurance sector is driven more by foreign investors seeking management and operational control, rather than just the increased FDI limit to 100%. This has led to the collapse of existing partnerships as foreign investors look for greater control, potentially paving way for consolidation.", "category": "Business", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "48fd3ddf"}, {"headline": "Traders wager on 1.6% Nifty swing before Tuesday", "summary": "Amid growing uncertainty over West Asia peace talks, retail investors, HNIs, and proprietary traders are betting on significant short-term market swings to profit from rising volatility. They purchased 52,000 Nifty options contracts at a 23,900 strike price, hoping for a sharp move (over 380 points) in either direction by June 2nd expiry.", "category": "Business", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "01ef9dbb"}, {"headline": "Suzlon powers up on deliveries, boosting wind power cycle", "summary": "Suzlon Energy’s Q4FY26 revenue surged 45% year-on-year to ₹5,500 crore, with Ebitda up 39%. The company's execution improved significantly, with deliveries jumping 45% to 830MW, taking FY26 deliveries to 2,456MW. Suzlon's order book stands at 5,892MW, positioning it as an integrated renewable energy platform.", "category": "Business", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "7c7aca4f"}, {"headline": "AIA Engg bets on new mining solution, after robust Q4", "summary": "AIA Engineering’s shares gained 11% in two days after Q4FY26 Ebitda jumped 20% to ₹362 crore. The company expects volume growth from a new grinding solution successfully trialed in Latin America, which could reduce power consumption by 15% and improve throughput, potentially leading to more re-rating.", "category": "Business", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "494af4d0"}, {"headline": "SBI Funds targets July IPO launch, starts roadshows", "summary": "SBI Funds Management, India’s largest asset manager, has started roadshows and discussions with potential investors for a ₹13,000 crore IPO, targeting a June-end to July launch. SBI will offer up to 128.3 million shares, and Amundi SA will sell up to 75.3 million shares, translating to a 10% stake.", "category": "Business", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "a1299f26"}, {"headline": "HDFC Bank shares fall as report flags payment to state-run co", "summary": "HDFC Bank shares fell 2.6% after a report alleged the lender paid ₹45 crore to Maharashtra State Road Development Corp. (MSRDC), disguised as marketing expenses to offer higher deposit returns. The bank rejected wrongdoing, but the report renewed scrutiny on governance practices.", "category": "Business", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "82ad0866"}, {"headline": "SBI’s AI push has people-first strategy, chairman says", "summary": "SBI chairman Challa Sreenivasulu Setty states the bank's technology overhaul will prioritize 'human capital' alongside AI, emphasizing investment in people, leadership, and skills. The bank is integrating physical branches with digital platforms to create an omni-channel banking experience, focusing on liability mobilization and SME ecosystems.", "category": "Business", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "b94c13bf"}, {"headline": "Selling Essar guarantees will be long battle for lenders", "summary": "A consortium of 12 lenders, led by SBI, plans to sell personal and corporate guarantees on loans given to erstwhile Essar Steel, nearly seven years after its insolvency resolution. The ₹13,751.21 crore outstanding liabilities will face a long and difficult recovery process, as bidders are unlikely to cover full dues.", "category": "Business", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "14d39410"}, {"headline": "AIESL labour crisis drags on despite firm’s softer stance", "summary": "The labour crisis at Air India Engineering Services Ltd (AIESL), India’s largest MRO firm, persisted as nearly half its staff stayed away from maintenance duties. Management accepted 180 resignations, but key demands including reinstatement of terminated employees and talks on wage revision remain unresolved.", "category": "Business", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "f15ba5c2"}, {"headline": "Gillette India profit rises 21.3% in Q4", "summary": "Shaving products maker Gillette India Ltd reported a 21.3% increase in profit to ₹192.51 crore for the March quarter of fiscal year 2026. Revenue from operations rose 3.19% to ₹792 crore, while total expenses fell 5.71%. For FY26, net profit increased 56.66% to ₹654.31 crore.", "category": "Business", "page": 9, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "850c78a0"}, {"headline": "Govt healthcare spending triples to ₹3.85 tn in a decade", "summary": "India’s public spending on healthcare nearly tripled to ₹3.85 trillion in 2022-23 from ₹1.30 trillion in 2013-14. Government health expenditure as a share of GDP increased from 1.15% to 1.43%, reflecting increased public investment towards universal health coverage and reducing out-of-pocket expenditure.", "category": "Health", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "3dde8ff0"}, {"headline": "Bata profit plunges 95% in Mar quarter due to VRS, forex loss", "summary": "Footwear maker Bata India reported a 95.2% year-on-year drop in consolidated net profit to ₹2.2 crore in the March quarter. This was primarily due to ₹28 crore in voluntary retirement scheme (VRS) costs and a ₹22.4 crore non-cash forex loss from royalty restatement amid currency fluctuation.", "category": "Business", "page": 9, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "e1a48817"}, {"headline": "India alleges Pernod withheld Scotch composition, age to evade tariffs", "summary": "Indian investigators concluded Pernod Ricard withheld Scotch whisky import details to hide true value and pay lower tariffs, sparking a legal fight over $314 million in back taxes. Pernod denies wrongdoing, arguing it was not given access to key pricing data in the investigation, according to new documents.", "category": "Law", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "cd846643"}, {"headline": "Coal India OFS subscribed 8.14 times over on first day", "summary": "Investors heavily subscribed to the government’s stake sale in Coal India Ltd, with the offer-for-sale (OFS) drawing bids worth over eight times the shares on offer on the first day. The government has decided to exercise the entire green shoe option to raise non-tax revenue.", "category": "Business", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "44b87829"}, {"headline": "India’s stalled project rate halves, driven by private sector cleanup", "summary": "India’s project stalling rate declined to a 12-year low of 5.5% in FY26 from nearly 11% in 2014-15, largely driven by the private sector. Manufacturing saw an impressive decline, but experts caution it's 'execution recovery' rather than a full private investment revival, with external shocks posing risks.", "category": "Economy", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "cf0359a7"}, {"headline": "Inside India’s chemical meltdown due to Iran war", "summary": "The Iran war has disrupted India’s petrochemical supply chain, halting West Asia supplies and forcing manufacturers to scramble for raw materials globally. This led to acute working capital shortages, factory shutdowns for MSMEs, and potential manufacturing inflation, exposing a deep structural weakness in the economy.", "category": "Business", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "2c271589"}, {"headline": "DS Group brings UK chain Ben’s Cookies to India", "summary": "The Dharampal Satyapal (DS) Group is launching UK’s Ben’s Cookies in India in early June, betting on demand for artisanal bakery products. They plan seven stores in Delhi and Mumbai, expanding to 10 outlets by end of FY27, positioning the brand in the 'affordable premium' segment.", "category": "Business", "page": 10, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "82ea7ac0"}, {"headline": "PW reins in K-12 hopes as focus shifts to profitability", "summary": "Edtech major PhysicsWallah is scaling back its ambitious K-12 schooling expansion, shifting focus to profitability in its core online and offline education. The company reported strong FY26 revenue growth of 35% to ₹3,900 crore and a profit before tax of ₹10 crore, with 72 of 116 offline centres now profitable.", "category": "Education", "page": 10, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "b571cd12"}, {"headline": "Balkrishna hedges export bets amid trade headwinds", "summary": "Balkrishna Industries Ltd (BKT) is re-working its strategy with a sharper focus on India, on-road tyres, and carbon black, reducing its dependence on international off-highway tyre sales. This shift comes amid tariff wars, slowing western markets, and geopolitical disruptions, which have impacted its revenue growth.", "category": "Business", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "096f9d25"}, {"headline": "Misleading digital wellness ads mushroom, challenging enforcement", "summary": "India's advertising landscape is battling a surge in misleading digital wellness ads, with violations in betting and gaming ads rising to 6,933 in FY26. These ads make implausible claims and create unrealistic expectations, often using scientific-sounding language without substantiation, posing a challenge to self-regulatory enforcement.", "category": "India", "page": 10, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "da577df1"}, {"headline": "Bond yields look attractive: bigger returns, bigger risks?", "summary": "Retail investors are shifting from fixed deposits to bonds for higher yields, but often underestimate elevated credit, liquidity, and exit risks. Clients on online bond platforms rose to 560,000 in FY25, but understanding of bond risks has not kept pace, with investors drawn to high yields that signal elevated risk.", "category": "Economy", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "fac142fa"}, {"headline": "Waiver of premiums: how it protects family’s financial goals", "summary": "The Waiver of Premium (WOP) rider in life insurance ensures long-term goals like child education or retirement are protected if the policyholder dies, becomes disabled, or critically ill. The insurer continues premium payments, maintaining policy benefits and potentially offering lump-sum/regular income, ensuring continuity of financial planning.", "category": "Business", "page": 11, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "7b37d143"}, {"headline": "Hurdles and hopes of aspiring cricketers in India", "summary": "'Chasing Like Dhoni,' a new book, explores challenges faced by young Indian cricketers beyond traditional hubs. It highlights stories of toil, poverty, rejection, politics, casteism, and luck. The book reveals that making it to the Indian team is a 0.001% probability, while an IPL spot is 0.005%.", "category": "Sports", "page": 14, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "0a9555b6"}, {"headline": "Allies save D-Day: Film explores meteorologist’s role in invasion delay", "summary": "The film 'Pressure' dramatizes the 72 tense hours before D-Day, focusing on Scottish meteorologist Group Captain James Stagg. His recommendation of catastrophically bad weather led to a seismic one-day delay in the Normandy invasion plans, changing WWII's course. The film, an adaptation of David Haig’s play, is a portrait of leadership.", "category": "Culture", "page": 14, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "1c84d526"}, {"headline": "The deeply satisfying comfort of Lithuanian food", "summary": "Lithuanian cuisine, rooted in agricultural and foraging traditions, offers comforting home-style food best experienced at women-run canteens. Iconic dishes include bright pink šaltibarščiai (cold beetroot soup) and hearty cepelinai (potato dumplings), often paired with hot boiled potatoes and reflecting centuries of culinary traditions across Eastern Europe.", "category": "Culture", "page": 14, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125214", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/125214"}], "article_id": "1f4e58a0"}, {"headline": "SVCS Upholds 6-Month Jail for Byju's Founder Ravindran", "summary": "The Supreme Court of Singapore's International Commercial Court (SICS) upheld a six-month jail term and Rs 200 crore fine for Byju's founder Byju Ravindran in a dispute with a former investor. The ruling, part of a larger legal battle, was based on an alleged failure to disclose information.", "category": "Law", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125167", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Delhi_28-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125167"}], "article_id": "04ea296b"}, {"headline": "US, UK, UAE Teams to Visit India for Tech Park Deals", "summary": "Delegations from the US, UK, and UAE are expected to visit India next week to explore opportunities for setting up data parks and digital infrastructure projects. This initiative aims to strengthen India's position as a global data hub and attract foreign investment.", "category": "Technology", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125167", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Delhi_28-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125167"}], "article_id": "8787182f"}, {"headline": "Banks, Telcos Undergoing Cybersecurity Audits by CERT-In", "summary": "Banks and telecom companies are undergoing comprehensive cybersecurity audits by CERT-In to assess vulnerabilities in their services and infrastructure. This proactive measure aims to enhance national cyber resilience, addressing evolving threats and ensuring data security.", "category": "Technology", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125167", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Delhi_28-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125167"}], "article_id": "e172f74a"}, {"headline": "SK Hynix Joins Micron in HBM Boom; Chip Stock Soars", "summary": "SK Hynix stock surged after joining Micron in the high-bandwidth memory (HBM) market, critical for AI computing. This development signifies increasing demand for specialized memory solutions and a competitive landscape in the semiconductor industry.", "category": "Business", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125167", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Delhi_28-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125167"}], "article_id": "bf763bcd"}, {"headline": "CCI Penalty on Amazon: Rs 990,000 Crore Deal Under Scrutiny", "summary": "The Competition Commission of India (CCI) is scrutinizing a Rs 990,000 crore deal involving Amazon, potentially leading to a penalty. The review pertains to alleged misrepresentation of facts during a past transaction, highlighting regulatory focus on fair competition.", "category": "Business", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125167", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Delhi_28-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125167"}], "article_id": "6edc8fba"}, {"headline": "Local Data Centres Poised for Rs 650K Crore GIP", "summary": "India's local data center industry is expected to attract Rs 650,000 crore in Gross Investment Potential (GIP). This surge is driven by increased data consumption, digital transformation, and government support for digital infrastructure development across the country.", "category": "Infrastructure", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125167", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Delhi_28-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125167"}], "article_id": "a4addbed"}, {"headline": "IndiGo, Air India to Reduce A320neo Aircraft Deliveries", "summary": "IndiGo and Air India plan to reduce the number of Airbus A320neo aircraft deliveries between June and August. This adjustment is likely due to engine issues and supply chain disruptions, impacting their fleet expansion plans and operational schedules.", "category": "Business", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125167", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Delhi_28-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125167"}], "article_id": "0dcf8562"}, {"headline": "Majetty: Better Projects, Not Electoral Scrutiny, is Issue", "summary": "Sriharsha Majetty, co-founder of Swiggy, stated that if a contentious issue persists, a revote would be considered to ensure fairness. The context appears to be internal governance or electoral processes within an organization.", "category": "Business", "page": 1, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125167", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Delhi_28-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125167"}], "article_id": "616ff37b"}, {"headline": "Government Eyes Rationalization of Direct, Indirect Tax Demands", "summary": "The government is considering rationalizing demands for direct and indirect taxes to reduce legal disputes and improve the ease of doing business. This move aims to simplify the tax regime and provide clarity for taxpayers and businesses.", "category": "Economy", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125167", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Delhi_28-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125167"}], "article_id": "7e9b30ed"}, {"headline": "Tamil Nadu and Andhra Pradesh Online Game Bans Upheld", "summary": "The Supreme Court upheld the bans on online games enacted by Tamil Nadu and Andhra Pradesh. This reiterates state authority in regulating online gambling, impacting the operations of gaming platforms in these states.", "category": "Law", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125167", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Delhi_28-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125167"}], "article_id": "824d9feb"}, {"headline": "Heatwave Plunges Textile Industry into Deep Trouble", "summary": "The ongoing heatwave is severely impacting the textile industry, particularly in northern India. Worker productivity is down due to extreme temperatures, leading to production delays and increased costs. This threatens exports and profitability.", "category": "Economy", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125167", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Delhi_28-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125167"}], "article_id": "13325f7f"}, {"headline": "ED Raids Vijayan's House, Sivasankar Questioned in Probe", "summary": "The Enforcement Directorate (ED) raided the residence of a close associate of Kerala Chief Minister Pinarayi Vijayan and questioned Sivasankar in connection with a money laundering probe. This is part of ongoing investigations into alleged irregularities.", "category": "Politics", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125167", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Delhi_28-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125167"}], "article_id": "6b3fbd74"}, {"headline": "Siddaramaiah to Quit; DK Shivakumar to Take Over CM Post", "summary": "Karnataka Chief Minister Siddaramaiah is reportedly set to resign over cabinet decisions, with Deputy CM DK Shivakumar poised to take over. This indicates potential political instability and a change in state leadership.", "category": "Politics", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125167", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Delhi_28-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125167"}], "article_id": "480fa02f"}, {"headline": "Parties Offer Rules, INVITS Bets Seek Easier Investment", "summary": "Industry bodies and political parties are proposing new rules to make it easier to engage investors and attract capital. This aims to streamline processes and create a more favorable environment for investment, potentially boosting economic activity.", "category": "Business", "page": 1, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125167", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Delhi_28-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125167"}], "article_id": "62d0061f"}, {"headline": "Nifty Midcap 100 Outperforms Amid Broad Market Strength", "summary": "The Nifty Midcap 100 index has shown strong performance, climbing 100% since its December low. This rally reflects robust investor sentiment and broad market strength, indicating confidence in mid-sized companies.", "category": "Economy", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125167", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Delhi_28-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125167"}], "article_id": "40db0b34"}, {"headline": "Businesses Guard Against Rupee Volatility Amid Margin Pressure", "summary": "Businesses are facing margin pressure due to rising input costs and guarding against potential rupee depreciation. Exports are expected to fall due to global slowdown, while imports remain steady, leading to challenges in maintaining profitability.", "category": "Economy", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125167", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Delhi_28-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125167"}], "article_id": "c863369a"}, {"headline": "Imported Soft Drinks Cost 5X Local Variants Amid Can Shortage", "summary": "Imported soft drinks are selling at almost five times the price of local variants due to an acute shortage of aluminum cans. Bottlers are importing cans at higher prices, increasing costs for consumers and impacting the beverage industry.", "category": "Business", "page": 1, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125167", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Delhi_28-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125167"}], "article_id": "fa02cefa"}, {"headline": "Rupee Stable, Closes at 95.69 Against Dollar", "summary": "The Indian Rupee closed at 95.69 against the US Dollar, showing stability after previous sessions' volatility. This reflects current market dynamics and intervention from the Reserve Bank of India to manage currency fluctuations.", "category": "Economy", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125167", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Delhi_28-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125167"}], "article_id": "883e6f6f"}, {"headline": "BJP Verdict, Congress Bloc Parties to Introspect", "summary": "Following recent election results, the BJP is celebrating its victory, while the Congress bloc parties are urged to introspect their performance. This highlights the ongoing political dynamics and strategies post-elections.", "category": "Politics ering, cybercrime, and terror financing cases.", "category": "Law", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125223"}], "importance": 7, "article_id": "f9380451"}, {"headline": "AIADMK Factions Reconcile, Withdraw MLA Disqualification Pleas After Internal Rift", "summary": "Rival AIADMK factions, led by SP Velumani and Edappadi K Palaniswami, have reconciled and withdrawn petitions to disqualify MLAs. This truce follows internal rifts during the Tamilaga Vettri Kazhagam government's confidence vote.", "category": "Politics", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125223"}], "importance": 6, "article_id": "833875b3"}, {"headline": "Indian Airlines Slash Domestic Flights by Up to 22% Amid Soaring Fuel Costs", "summary": "Air India, IndiGo, and Air India Express will reduce domestic flights by 10-22% from June due to surging jet fuel prices and increased operating costs from the West Asia conflict and closed Pakistani airspace.", "category": "Business", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125223"}, {"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 28-05.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125214"}], "importance": 7, "article_id": "0d433f85"}, {"headline": "Karnataka CM Siddaramaiah Likely to Resign; DKS Poised to Become New CM", "summary": "Karnataka Chief Minister Siddaramaiah is expected to resign, paving the way for Deputy CM D.K. Shivakumar to assume the top post. This significant leadership transition follows extensive political discussions and negotiations within the ruling party.", "category": "Politics", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 3, "telegram_url": "https://t.m w", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Delhi_28-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125167"}], "importance": 8, "article_id": "3383f731"}, {"headline": "Supreme Court Upholds State Laws Banning Online Gaming", "summary": "The Supreme Court upheld the constitutional validity of state laws banning online gaming, reinforcing states' powers to regulate gambling. This ruling is separate from the GST levy decision and focuses on the legality of outright bans.", "category": "Law", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Delhi_28-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125167"}], "importance": 9, "article_id": "853cc4e6"}, {"headline": "Government May Sell Stakes in GLCs to DFIs, Aiming to Raise Over ₹10,000 Crore", "summary": "The government plans to sell stakes in state-owned general insurance companies (GLCs) to Domestic Financial Institutions (DFIs) in July, potentially raising less than ₹10,000 crore as part of divestment efforts. It also considers selling a 2% stake in LIC.", "category": "Economy", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Delhi_28-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125167"}], "importance": 7, "article_id": "d023911a"}]};
const CAT_META = {"Politics": {"color": "#e8334a", "icon": "🏛️"}, "Economy": {"color": "#f5a623", "icon": "📊"}, "Business": {"color": "#f0c040", "icon": "💼"}, "India": {"color": "#ff7043", "icon": "🇮🇳"}, "World": {"color": "#5c9eff", "icon": "🌍"}, "Sports": {"color": "#36c46f", "icon": "🏆"}, "Science": {"color": "#a78bfa", "icon": "🔬"}, "Technology": {"color": "#38bdf8", "icon": "💻"}, "Health": {"color": "#34d399", "icon": "🏥"}, "Law": {"color": "#fb923c", "icon": "⚖️"}, "Environment": {"color": "#4ade80", "icon": "🌿"}, "Education": {"color": "#e879f9", "icon": "📚"}, "Culture": {"color": "#f472b6", "icon": "🎭"}, "Infrastructure": {"color": "#94a3b8", "icon": "🏗️"}};

// FIXED: Pre-build data structures IMMEDIATELY for deep linking
const allArts = [...DIGEST.articles].sort((a,b)=>(b.importance||0)-(a.importance||0));
const byCategory = {};
for (const art of allArts) {
  const c = art.category||"India";
  if (!byCategory[c]) byCategory[c]=[];
  byCategory[c].push(art);
}
const sortedCats = Object.keys(byCategory).sort(
  (a,b)=>(byCategory[b][0].importance||0)-(byCategory[a][0].importance||0)
);

// FIXED DEEP LINK HANDLER - Runs IMMEDIATELY
let deepLinkTarget = null;
function handleDeepLink() {
  const hash = window.location.hash;
  if (!hash || !sortedCats.length) return;
  
  const cleanHash = hash.startsWith('#article-') ? hash.slice(9) : hash.slice(1);
  const targetArticle = DIGEST.articles.find(art => art.article_id === cleanHash);
  
  if (targetArticle) {
    deepLinkTarget = {article: targetArticle, hash: cleanHash};
  }
}
handleDeepLink();

let catIdx=0,vpW=0,vpH=0;
const panels=[];
const outer=document.getElementById('outer');
const hTrack=document.getElementById('hTrack');
const hintUp=document.getElementById('hintUp');
const hintRight=document.getElementById('hintRight');
const catFlash=document.getElementById('catFlash');
const cfIcon=document.getElementById('cfIcon');
const cfName=document.getElementById('cfName');

function buildAll() {
  vpW=outer.offsetWidth; vpH=outer.offsetHeight;
  hTrack.innerHTML=''; panels.length=0;
  sortedCats.forEach((cat,ci)=>{
    const m=CAT_META[cat]||{color:"#e8334a",icon:"📰"};
    const arts=byCategory[cat];
    const panel=document.createElement('div');
    panel.className='cat-panel';
    panel.id=`cat-panel-${ci}`;
    panel.style.setProperty('--cc',m.color);
    panel.innerHTML=`<div class="progress-row" id="prow-${ci}" style="--cc:${m.color}"></div><div class="v-feed" id="vfeed-${ci}"><div class="v-track" id="vtrack-${ci}"></div></div>`;
    hTrack.appendChild(panel);
    const pRow=panel.querySelector(`#prow-${ci}`);
    const vFeed=panel.querySelector(`#vfeed-${ci}`);
    const vTrack=panel.querySelector(`#vtrack-${ci}`);
    const cardH=vFeed.getBoundingClientRect().height||vpH;
    
    arts.forEach((art,ai)=>{
      const card = buildCard(art, cardH, m, cat, ai);
      card.id = `article-${art.article_id}`;
      card.dataset.articleId = art.article_id;
      vTrack.appendChild(card);
    });
    
    panels.push({pRow,vFeed,vTrack,articles:arts,artIdx:0});
    buildPRow(ci);
  });
  
  hTrack.style.transition='none';
  hTrack.style.transform='translateX(0)';
  syncV(0,false);
  
  // FIXED: Apply deep link after build
  if (deepLinkTarget) {
    setTimeout(() => applyDeepLink(deepLinkTarget), 100);
  }
}

function buildCard(art,h,m,cat,articleIndex) {
  const src=art.sources?.[0];
  const href=src?.pdf_filename?`pdfs/${src.pdf_filename}#page=${src.page}`:(src?.telegram_url||'#');
  const card=document.createElement('div');
  card.className='card';
  card.dataset.articleId = art.article_id;
  card.style.height=h+'px';
  card.style.setProperty('--cc',m.color);
  card.innerHTML=`
    <div class="card-content">
      <div class="card-toprow">
        <div class="cat-pill">
          <div class="pill-icon"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="1" y="1" width="8" height="2" rx="0.6" fill="#888"/><rect x="1" y="4.5" width="5" height="1.5" rx="0.6" fill="#666"/><rect x="1" y="7" width="6" height="1.5" rx="0.6" fill="#666"/></svg></div>
          ${cat.toUpperCase()}
        </div>
        <div class="card-date">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="2.5" width="11" height="9.5" rx="1.8" stroke="#555" stroke-width="1.2"/><path d="M4.5 1v3M8.5 1v3" stroke="#555" stroke-width="1.2" stroke-linecap="round"/><path d="M1 6h11" stroke="#555" stroke-width="1.2"/></svg>
          ${DIGEST.date}
        </div>
      </div>
      <div class="card-headline">${art.headline}</div>
      <div class="card-summary">${art.summary}</div>
      <div class="card-divider"></div>
      <div class="card-footer">
        ${src?`<a class="src-chip" href="${href}" target="_blank" onclick="event.stopPropagation()">${src.newspaper}<span class="src-chip-sep">&middot;</span><span class="src-chip-pg">Pg ${src.page}</span><span class="src-chip-ext"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M3.5 7.5L7.5 3.5M7.5 3.5H5M7.5 3.5V6" stroke="#555" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></span></a>`:'<div></div>'}
        <div class="info-btn"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6.5" stroke="#444" stroke-width="1.3"/><circle cx="7.5" cy="4.5" r="0.8" fill="#555"/><path d="M7.5 7v4" stroke="#555" stroke-width="1.5" stroke-linecap="round"/></svg></div>
      </div>
    </div>`;
  return card;
}

function buildPRow(ci) {
  const p=panels[ci],ai=p.artIdx;
  p.pRow.innerHTML='';
  p.articles.forEach((_,i)=>{
    const seg=document.createElement('div');
    seg.className='pseg'+(i<ai?' done':i===ai?' active':'');
    p.pRow.appendChild(seg);
  });
}

function syncV(ci,animated) {
  const p=panels[ci],h=p.vFeed.getBoundingClientRect().height;
 p.vTrack.style.transition=animated?'transform 0.35s cubic-bezier(0.4,0,0.2,1)':'none';
  p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;
  buildPRow(ci);
}

function applyDeepLink(target) {
  const ci = sortedCats.findIndex(cat =>
    byCategory[cat].some(art => art.article_id === target.hash)
  );
  if (ci === -1) return;
  goCat(ci, false);
  const ai = byCategory[sortedCats[ci]].findIndex(art => art.article_id === target.hash);
  if (ai === -1) return;
  panels[ci].artIdx = ai;
  syncV(ci, false);
  const card = document.getElementById('article-' + target.hash);
  if (card) { card.classList.add('target-highlight'); setTimeout(() => card.classList.remove('target-highlight'), 3000); }
}

function goArt(d) {
  const p=panels[catIdx];
  const n=Math.max(0,Math.min(p.artIdx+d,p.articles.length-1));
  if(n===p.artIdx&&d!==0)return;
  p.artIdx=n; syncV(catIdx,true); dismiss();
}

function goCat(idx,animated=true) {
  idx=Math.max(0,Math.min(idx,sortedCats.length-1));
  if(idx===catIdx&&animated)return;
  const prev=catIdx; catIdx=idx;
  hTrack.style.transition=animated?'transform 0.38s cubic-bezier(0.4,0,0.2,1)':'none';
  hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;
  if(animated&&idx!==prev) {
    const m=CAT_META[sortedCats[idx]]||{color:"#e8334a",icon:"📰"};
    catFlash.style.background=m.color+'18';
    cfIcon.textContent=m.icon; cfName.textContent=sortedCats[idx]; cfName.style.color=m.color;
    catFlash.classList.add('on'); setTimeout(()=>catFlash.classList.remove('on'),500);
  }
  dismiss();
}

let dismissed=false;
function dismiss() {
  if(dismissed)return; dismissed=true;
  hintUp.classList.remove('visible'); hintRight.classList.remove('visible');
  hintUp.classList.add('gone'); hintRight.classList.add('gone');
}

(function initHints() {
  const KEY='dailyBriefHintSeen';
  if(!localStorage.getItem(KEY)) {
    localStorage.setItem(KEY,'1');
    setTimeout(()=>{ if(!dismissed){ hintUp.classList.add('visible'); hintRight.classList.add('visible'); } },2500);
  }
})();

let tsX=0,tsY=0,tcX=0,tcY=0,axis=null,drag=false;
outer.addEventListener('touchstart',e=>{ tsX=e.touches[0].clientX; tsY=e.touches[0].clientY; tcX=0; tcY=0; axis=null; drag=true; hTrack.style.transition='none'; const p=panels[catIdx]; if(p)p.vTrack.style.transition='none'; },{passive:true});
outer.addEventListener('touchmove',e=>{ if(!drag)return; const dx=e.touches[0].clientX-tsX,dy=e.touches[0].clientY-tsY; tcX=dx; tcY=dy; if(!axis&&(Math.abs(dx)>8||Math.abs(dy)>8))axis=Math.abs(dx)>Math.abs(dy)?'h':'v'; if(!axis)return; e.preventDefault(); if(axis==='h'){ const edge=(catIdx===0&&dx>0)||(catIdx===sortedCats.length-1&&dx<0); hTrack.style.transform=`translateX(${-catIdx*vpW+dx*(edge ? 0.14 : 1)}px)`; }else{ const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height; const edge=(p.artIdx===0&&dy>0)||(p.artIdx===p.articles.length-1&&dy<0); p.vTrack.style.transform=`translateY(${-p.artIdx*h+dy*(edge ? 0.14 : 1)}px)`; } },{passive:false});
outer.addEventListener('touchend',()=>{ if(!drag)return; drag=false; if(axis==='h'){ const t=vpW*.2; if(tcX<-t)goCat(catIdx+1); else if(tcX>t)goCat(catIdx-1); else{hTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;} }else if(axis==='v'){ const t=vpH*.2; if(tcY<-t)goArt(1); else if(tcY>t)goArt(-1); else{const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height;p.vTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;} } axis=null; },{passive:true});
document.addEventListener('keydown',e=>{ if(e.key==='ArrowDown'||e.key===' '){e.preventDefault();goArt(1);} if(e.key==='ArrowUp'){e.preventDefault();goArt(-1);} if(e.key==='ArrowRight'){e.preventDefault();goCat(catIdx+1);} if(e.key==='ArrowLeft'){e.preventDefault();goCat(catIdx-1);} });
let wl=false;
outer.addEventListener('wheel',e=>{ e.preventDefault();if(wl)return;wl=true; Math.abs(e.deltaX)>Math.abs(e.deltaY)?goCat(catIdx+(e.deltaX>0?1:-1)):goArt(e.deltaY>0?1:-1); setTimeout(()=>wl=false,500); },{passive:false});
window.addEventListener('resize',()=>{ vpW=outer.offsetWidth;vpH=outer.offsetHeight; hTrack.style.transition='none'; hTrack.style.transform=`translateX(${-catIdx*vpW}px)`; panels.forEach(p=>{ const h=p.vFeed.getBoundingClientRect().height; p.vTrack.querySelectorAll('.card').forEach(c=>c.style.height=h+'px'); p.vTrack.style.transition='none'; p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`; }); });

buildAll();
</script>
