<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Inter', -apple-system, sans-serif;
  background: #0c0c0c; color: #fff; touch-action: none;
}
.outer { position: fixed; inset: 0; overflow: hidden; }
.h-track { display: flex; height: 100%; will-change: transform; }
.cat-panel { flex-shrink:0; width:100vw; height:100%; display:flex; flex-direction:column; overflow:hidden; }
.progress-row { flex-shrink:0; display:flex; gap:4px; padding:14px 16px 10px; background:#0c0c0c; position:relative; z-index:5; overflow:visible; }
.progress-row::after { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:80%; height:120px; background:radial-gradient(ellipse at top,color-mix(in srgb,var(--cc) 30%,transparent) 0%,transparent 70%); pointer-events:none; z-index:-1; }
.pseg { flex:1; height:2px; border-radius:1px; background:rgba(255,255,255,0.12); position:relative; overflow:hidden; }
.pseg::after { content:''; position:absolute; inset:0; background:var(--cc,#e8334a); transform:scaleX(0); transform-origin:left; transition:transform 0.25s ease; }
.pseg.done::after, .pseg.active::after { transform:scaleX(1); }
.v-feed { flex:1; overflow:hidden; position:relative; clip-path:inset(0); }
.v-track { display:flex; flex-direction:column; will-change:transform; }
.card { 
  width:100%; flex-shrink:0; background:#0c0c0c; display:flex; flex-direction:column; 
  overflow:hidden; position:relative; 
  scroll-margin-top: 80px;
}
.card.target-highlight {
  background: linear-gradient(135deg, #fff3cd22 0%, #ffeaa722 100%) !important;
  box-shadow: 0 0 30px rgba(255, 193, 7, 0.4);
  border: 2px solid #f39c12;
  animation: pulse-highlight 2s ease-in-out;
}
@keyframes pulse-highlight {
  0%, 100% { box-shadow: 0 0 30px rgba(255, 193, 7, 0.4); }
  50% { box-shadow: 0 0 50px rgba(255, 193, 7, 0.6); }
}
.card-content { flex:1; display:flex; flex-direction:column; padding:36px 20px 22px; min-height:0; position:relative; z-index:1; }
.card-toprow { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; flex-shrink:0; }
.cat-pill { display:inline-flex; align-items:center; gap:7px; background:#1c1c1e; border-radius:8px; padding:7px 12px 7px 10px; font-size:11.5px; font-weight:700; letter-spacing:0.07em; color:#d0d0d0; text-transform:uppercase; line-height:1; }
.pill-icon { width:16px; height:16px; background:#2e2e30; border-radius:3px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.pill-icon svg { display:block; }
.card-date { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:500; color:#666; letter-spacing:0.01em; }
.card-headline { font-size:28px; font-weight:800; line-height:1.18; color:#fff; letter-spacing:-0.03em; margin-bottom:20px; flex-shrink:0; }
.card-summary { font-size:15.5px; font-weight:400; line-height:1.62; color:#6b6b6b; flex:1; overflow:hidden; display:-webkit-box; -webkit-line-clamp:7; -webkit-box-orient:vertical; }
.card-divider { height:1px; background:#1e1e1e; margin:20px 0 16px; flex-shrink:0; }
.card-footer { display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.src-chip { display:inline-flex; align-items:center; gap:6px; background:#181818; border:1px solid #282828; border-radius:9px; padding:8px 13px; font-size:12.5px; font-weight:600; color:#c0c0c0; text-decoration:none; letter-spacing:0.005em; line-height:1; }
.src-chip-sep { color:#3a3a3a; font-weight:400; }
.src-chip-pg { color:#555; font-weight:500; }
.src-chip-ext { margin-left:2px; }
.src-chip-ext svg { display:block; }
.info-btn { width:36px; height:36px; border-radius:50%; border:1.5px solid #252525; background:#141414; display:flex; align-items:center; justify-content:center; color:#555; cursor:pointer; flex-shrink:0; }
.cat-flash { position:fixed; inset:0; z-index:600; pointer-events:none; opacity:0; transition:opacity 0.12s; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; }
.cat-flash.on { opacity:1; }
.cf-icon { font-size:34px; }
.cf-name { font-size:22px; font-weight:900; letter-spacing:-0.03em; text-transform:uppercase; }
.hint { position:fixed; display:flex; flex-direction:column; align-items:center; gap:5px; pointer-events:none; z-index:400; opacity:0; transition:opacity 0.6s ease; }
.hint.visible { opacity:1; }
.hint.gone { opacity:0 !important; transition:opacity 0.4s; }
.hint-pill { font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.55); background:rgba(255,255,255,0.07); backdrop-filter:blur(10px); padding:5px 13px; border-radius:100px; border:1px solid rgba(255,255,255,0.09); }
.hint-arr { font-size:16px; color:rgba(255,255,255,0.4); }
.h-up { bottom:28px; left:50%; transform:translateX(-50%); animation:bUp 2s ease-in-out infinite; }
.h-right { top:50%; right:14px; transform:translateY(-50%); animation:bRight 2s ease-in-out infinite 0.6s; }
@keyframes bUp { 0%,100% { bottom:28px; opacity:.65; } 50% { bottom:36px; opacity:1; } }
@keyframes bRight { 0%,100% { right:14px; opacity:.65; } 50% { right:6px; opacity:1; } }
</style>

<script>
const DIGEST   = {"date": "08 June 2026", "articles": [{"headline": "Professional forecasters project FY27 GDP growth at 6.5 per cent", "summary": "The RBI’s Survey of Professional Forecasters expects India's GDP growth to moderate to 6.5% in 2026-27, lower than the RBI’s 6.6% estimate. Headline retail inflation is projected at 4.9% for FY27. Forecasters also predict the repo rate will rise to 5.75% by the end of FY27, involving two 25-basis-point hikes. The current account deficit is expected to widen to 2.1% of GDP.", "category": "Economy", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "df09fcb8"}, {"headline": "India must resist Section 301 threats in US trade deal negotiations", "summary": "Trade experts warn the Indian government against yielding to US Section 301 investigations regarding excess capacity and forced labor. Analysts argue that a bilateral trade pact may not shield exports from unilateral US tariffs, which violate WTO rules. Experts suggest India should contest these claims scientifically and consider retaliatory actions if illegal tariffs are applied.", "category": "Economy", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "4f873dce"}, {"headline": "Global Environment Facility conservation fund shrinks by 36 per cent", "summary": "The Global Environment Facility (GEF) will have $3.9 billion until 2030 for biodiversity and climate projects, a 36% decrease from the $5.3 billion available in the previous four-year cycle. The decline follows the US failing to pay for the upcoming period. India has maintained its contribution at $20 million. The GEF recently approved a $13.49 million grant for biodiversity in India.", "category": "Environment", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "44deb854"}, {"headline": "NRIs excluded from government security tax breaks granted to FPIs", "summary": "Non-resident Indians (NRIs) will not receive the income tax exemptions on G-Sec interest and capital gains recently granted to Foreign Portfolio Investors (FPIs). NRIs investing on a standalone basis must pay taxes based on Double Taxation Avoidance Agreements, typically at a 20% rate. Industry bodies may seek an extension of these benefits to individual overseas retail investors.", "category": "Economy", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "dbad4869"}, {"headline": "Indore celebrates World Poha Day to honor popular breakfast dish", "summary": "Vendors in Indore, Madhya Pradesh, distributed flattened rice dishes to celebrate World Poha Day on June 7. The annual event recognizes the cultural significance and popularity of poha as a staple breakfast across India, particularly in the states of Maharashtra and Madhya Pradesh.", "category": "Culture", "page": 1, "importance": 2, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "0d47db99"}, {"headline": "Startup AnduraX builds India’s first re-entry space vehicle for manufacturing", "summary": "Vijayawada-based startup AnduraX is developing a re-entry space vehicle designed to retrieve products manufactured in microgravity. The vehicle aims to serve industries like pharmaceuticals and semiconductors. Supported by government funds, the company recently tested its electronic platform using a stratospheric balloon and plans to address the bottleneck of return logistics in space.", "category": "Science", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "9e940c09"}, {"headline": "India emerges as top source for immigrant founders of US unicorns", "summary": "A report by the National Foundation for American Policy shows Indian immigrants have founded or co-founded 96 US unicorns, the highest for any country. While India leads in numbers, most of these startups are valued below $10 billion. Experts note that visa challenges and social constructs often lead Indian immigrants toward stable jobs rather than high-risk ventures.", "category": "Business", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "93f174d0"}, {"headline": "Tata Steel may delay UK low-carbon project due to electricity issues", "summary": "Tata Steel may defer its £1.25-billion decarbonization project at Port Talbot by six to eight months. The delay is attributed to difficulties in securing access to electricity for the proposed 3.2-million-tonne electric arc furnace. The project, intended to replace shuttered blast furnaces, was originally slated to begin operations by late 2027 or early 2028.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "d4367355"}, {"headline": "Kerala government launches one-time settlement scheme for cooperative loan defaulters", "summary": "The Kerala government has introduced the 'Ashwas-2026' one-time settlement scheme for those who defaulted on loans from cooperative societies. The initiative aims to recover mounting arrears while protecting the interests of depositors. The scheme was announced by Co-operation and Excise Minister M Liju.", "category": "India", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "b1265689"}, {"headline": "Tablet and laptop sales grow while smartphone shipments decline in Q1", "summary": "Smartphone sales in India fell 5% in the first quarter of 2026 due to price inflation, while the tablet and laptop markets each grew by approximately 5%. Analysts report that consumers are increasingly viewing tablets as complementary productivity tools rather than smartphone replacements. Laptop shipments reached 4.4 million units, a 31.1% year-on-year increase.", "category": "Technology", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "a9eb4e01"}, {"headline": "Experts question transparency as technology firms cite AI for job cuts", "summary": "As global tech companies announce layoffs linked to AI-led transformation, industry experts are calling for more transparency. Only 16% of organizations have fully redesigned workflows around AI. Critics suggest 'AI-native' claims may sometimes serve as a justification for restructuring driven by economic conditions or post-pandemic hiring corrections rather than genuine automation gains.", "category": "Technology", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "fc7c0563"}, {"headline": "Government increases domestic LPG cylinder price by 29 rupees in Delhi", "summary": "The Centre has hiked the price of a 14.2 kg domestic LPG cylinder by ₹29, bringing the cost in Delhi to ₹942. This is the first hike of the financial year, driven by a 46% rise in the Saudi CP for LPG. Despite the hike, the government continues to provide an under-recovery of roughly ₹700 per cylinder. PMUY beneficiaries will pay an effective price of ₹642.", "category": "Economy", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "405d0532"}, {"headline": "Tata Motors Commercial Vehicles shifts strategy to reduce dependence on cycles", "summary": "Tata Motors is reorganizing its commercial vehicle business into an 8-vertical structure to insulate itself from domestic market cycles. The strategy focuses on software, services, and exports, which grew 18.2% in FY26. Chairman N Chandrasekaran highlighted geopolitical risks and technology shifts as key drivers for creating resilient, recurring revenue streams beyond vehicle sales.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "6dce7d75"}, {"headline": "Surging iron ore imports establish India as global dry bulk shipping force", "summary": "India imported a record 5 million tonnes of iron ore in Q1 2026, a 127% year-on-year increase. Brazil has emerged as the largest supplier, accounting for 36% of imports. The surge is driven by coastal steelmakers like JSW Steel seeking high-grade ore. This growth is significantly impacting global dry bulk shipping markets and freight rates.", "category": "Infrastructure", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "dcab0861"}, {"headline": "Reliance Infrastructure requests SEBI to review additional surveillance measure framework", "summary": "Reliance Infrastructure has urged SEBI and stock exchanges to review the Additional Surveillance Measure (ASM) framework for companies in insolvency proceedings. The firm argues that restricting trading to once a week within a 5% band hurts price discovery for 7 lakh retail shareholders. The ASM was triggered despite a stay on the company's insolvency process by the NCLAT.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "5197d414"}, {"headline": "Brokers propose bank funding carve-out for hedged proprietary trading activities", "summary": "Broker associations have asked the Industry Standards Forum to allow bank funding for non-speculative, hedged proprietary trading. The move comes ahead of July 1 norms requiring full collateral for bank lending to brokers. They seek a 'liquidity provider' status similar to global markets, where recognized market makers face less stringent cash collateral requirements.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "9317469f"}, {"headline": "Delhi to induct 2,800 electric buses to boost zero-emission public transport", "summary": "The Delhi government plans to add 2,800 air-conditioned low-floor electric buses under the PM E-DRIVE scheme. The fleet will include 1,400 nine-metre and 1,400 twelve-metre buses. Transport Minister Pankaj Kumar Singh stated the induction aims to improve connectivity in underserved areas and accelerate the city's transition to sustainable mobility.", "category": "Infrastructure", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "026b2014"}, {"headline": "India and Indonesia discuss deeper cooperation in defence and semiconductors", "summary": "External Affairs Minister S Jaishankar hosted Indonesian counterpart Sugiono to explore expanded cooperation in defence, maritime trade, and food security. The talks also covered investments in pharmaceuticals and semiconductors. Both nations noted the strong growth of the India-Indonesia Comprehensive Strategic Partnership in recent years.", "category": "Politics", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "e72ebdf4"}, {"headline": "India to drive half of global oil demand growth through 2035", "summary": "Rosneft CEO Igor Sechin stated at the St. Petersburg International Economic Forum that India will account for about 50% of global oil demand growth over the next decade. India’s oil consumption is projected to rise 44% to 8 million barrels per day by 2035, while electricity demand is expected to reach 3,000 terawatt-hours.", "category": "Economy", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "4c9ed103"}, {"headline": "West Asia conflict triggers panic-buying of fertilizers in multiple Indian states", "summary": "Unseasonal spikes in urea and DAP sales were recorded in March-April 2026 as farmers feared supply disruptions from the Iran-Israel conflict. Urea sales in Haryana rose 80% to 1.71 lakh tonnes. The surge has challenged the government’s digitised rationing system, which previously successfully reduced consumption through land-record-linked sales.", "category": "India", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "a6d75672"}, {"headline": "Stock Analysis: Buy Phoenix Mills with target price of 1,920 rupees", "summary": "The Phoenix Mills stock is showing a positive outlook after holding a base at ₹1,690. Analysts recommend buying at the current price of ₹1,745.20 with a target of ₹1,920. A stop-loss is advised at ₹1,660. The stock recently hit a four-month high of ₹1,889.85 in May before the current moderation.", "category": "Business", "page": 3, "importance": 3, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "f5fc535b"}, {"headline": "Government considers removing Rajesh Exports from battery storage PLI scheme", "summary": "The Ministry of Heavy Industries is likely to drop Rajesh Exports from the PLI scheme for advanced chemistry cell battery storage. Minister HD Kumaraswamy will make the final decision following concerns regarding the company's eligibility. The move follows a series of regulatory scrutinies affecting the firm.", "category": "Business", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "b162df2e"}, {"headline": "Outbound travel from India drops 20 per cent due to regional conflict", "summary": "Indian overseas travel fell by over 20% in March and April 2026 due to the West Asia conflict and high airfares. National departures in April stood at 22.34 lakh. Saudi Arabia and the UAE, major destinations for Indians, saw significant traffic declines. Leisure and MICE travel have been particularly affected by the ongoing regional instability.", "category": "Economy", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "a7994cd8"}, {"headline": "IATA halves 2026 airline profit forecast amid West Asia conflict impact", "summary": "The International Air Transport Association (IATA) has slashed its 2026 airline industry profit forecast from $41 billion to $23 billion. The downgrade is attributed to soaring jet fuel prices and airspace disruptions caused by the Iran war. Fuel costs are expected to reach $350 billion this year, accounting for nearly one-third of total operating expenses.", "category": "World", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "c52d9d57"}, {"headline": "Airline industry requests six-month notice for recurring event airspace restrictions", "summary": "The Federation of Indian Airlines (FIA) has asked the Ministry of Civil Aviation for at least six months' advance notice for airspace closures during recurring events like Republic Day. The industry argues that last-minute NOTAMs and revisions cause unnecessary flight cancellations and passenger inconvenience. The IAF has supported including these predictable events in permanent publications.", "category": "Infrastructure", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "c1428f8a"}, {"headline": "IATA says current energy shock highlights need for sustainable aviation fuel", "summary": "IATA Director General Willie Walsh stated that the current energy crisis, driven by the West Asia conflict, should accelerate the development of renewable energy and Sustainable Aviation Fuel (SAF). Despite the urgency of climate change and energy independence, Walsh noted that sufficient incentives to create a viable SAF market have yet to materialize.", "category": "Environment", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "de832d24"}, {"headline": "NFHS-6 survey shows improvement in national health metrics and institutional deliveries", "summary": "The sixth National Family Health Survey (NFHS-6) reports that institutional deliveries in India have risen to 90.6%. The survey of 6.79 lakh households also shows declines in child stunting and wasting. However, C-section deliveries increased to 27.2%. The Centre explained that certain omissions in the fact sheet, such as anaemia data, will be covered by specialized venous blood surveys.", "category": "Health", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "335921db"}, {"headline": "Analysis of geopolitical and economic challenges facing the central government", "summary": "The Modi government faces significant pressures from US trade tariffs, West Asia supply disruptions, and a $25 billion withdrawal of foreign investment. With inflation rising and a potentially weak monsoon, the article suggests the administration is entering a period of high anti-incumbency risk. Public sentiment may shift toward seeking alternatives after 12 years of the same leadership.", "category": "Politics", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "c57b4027"}, {"headline": "Critique of NITI Aayog’s Fiscal Health Index for disadvantaging social spending", "summary": "Critics argue that the NITI Aayog’s Fiscal Health Index (FHI) rewards fiscal restraint over human development. Developed states like Kerala and Tamil Nadu rank lower due to high committed social spending, while mineral-rich states like Odisha top the index due to natural revenue advantages. The FHI is viewed by some as penalizing states that invest heavily in public services and human capital.", "category": "Economy", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "12a9af6b"}, {"headline": "Book Review: Anoop Misra defends sensible eating in Smart Calories", "summary": "Anoop Misra’s new book, 'Smart Calories and Common Sense,' challenges modern nutrition fads and anxiety. The author advocates for moderation and simple dietary choices, such as combining chickpeas with rice to manage glucose. The book emphasizes that health does not require expensive supplements or superfoods, but rather a return to common-sense eating habits.", "category": "Health", "page": 5, "importance": 3, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "bf994f61"}, {"headline": "Book Review: Prosenjit Nath chronicles the life of musician Zubeen Garg", "summary": "The biography 'Zubeen Garg - The Voice that Bridged Worlds' traces the restless career of the Assamese cultural icon. While the book covers his success in Mumbai and his humanitarian work, the reviewer criticizes it for being a 'sanitized' account that relies on AI-assisted aggregation and fails to explore the singer's deeper personal struggles and health issues.", "category": "Culture", "page": 5, "importance": 3, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "4fe29b00"}, {"headline": "Commentary: RBI monetary policy aims to manage growth amidst geopolitical risks", "summary": "The RBI's decision to maintain the repo rate reflects a data-driven approach to navigate global trade disruptions and rising energy costs. While GDP growth is projected to be slightly lower at 6.6%, credit growth remains robust at 15.4%. The policy provides a framework for regulated entities to withstand external shocks and manage foreign exchange reserves effectively.", "category": "Economy", "page": 5, "importance": 4, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "b8610d5b"}, {"headline": "Students develop Green Grid platform to streamline electronic waste recycling", "summary": "Students have created 'Green Grid,' a web-based platform featuring an 'E-dumper locator' to help users find certified recycling centers. India generated 1.75 million tonnes of e-waste in 2023-24, but less than half was formally processed. The platform uses AI and reward systems to encourage responsible disposal and includes features for scheduling doorstep pickups.", "category": "Technology", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "69a3ace1"}, {"headline": "Report: Tamil Nadu textile sector could save 3,250 crore rupees annually", "summary": "A report by Climate Risk Horizons suggests that Tamil Nadu’s textile industry can save up to ₹3,250 crore by transitioning to renewable energy. Rising fuel costs due to the West Asia conflict have eroded the sector's competitiveness. Transitioning to electric boilers and renewable power could also help revitalize stagnant exports, which have remained around $7.4 billion since 2017.", "category": "Business", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "c27ed23e"}, {"headline": "Suzlon Energy outlines five-year roadmap to become end-to-end solutions provider", "summary": "Suzlon Energy has unveiled its 'Suzlon 2.0' strategy, aiming to grow its order book to 15 GW by 2030-31. The company plans to expand from wind turbines into solar and battery storage. It also targets increasing its 'assets under management' for operations and maintenance from 18 GW to 70 GW, leveraging predictive analytics and high-margin services.", "category": "Business", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "b7f9a9e2"}, {"headline": "PSU RITES pursues disruptive growth with record 9,416 crore rupee orders", "summary": "Infrastructure consultancy RITES reports its highest-ever order book of ₹9,416 crore, following an internal restructuring. The company is aggressively targeting global tenders and expanding into maritime and aviation sectors. A new initiative involves retrofitting old diesel locomotives for international markets, such as Mozambique, which use Cape gauge tracks.", "category": "Infrastructure", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "0b3b105e"}, {"headline": "Heritage brand Narasu’s Coffee modernizes operations for its 100th anniversary", "summary": "Salem-based Narasu’s Coffee is celebrating its centenary by expanding into instant coffee and liquid decoctions. The company, which holds a 40-45% share of the roasted-and-ground market in Tamil Nadu, now exports to 45 countries. Despite the rise of chic coffee chains, the legacy brand is focusing on packaging innovation and a 'farm-to-shelf in 24 hours' policy.", "category": "Business", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "be1aa731"}, {"headline": "Indian toy startups scale manufacturing and exports amid global demand surge", "summary": "Indian toy makers are attracting significant investment as global brands like Hasbro and Mattel diversify sourcing beyond China. Startups such as PlayShifu and Bidso are scaling production of educational and outdoor toys. Government incentives, including a 70% customs duty on imports and mandatory quality certifications, have helped India become a net exporter of toys.", "category": "Business", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "94578b09"}, {"headline": "Analysis: Challenges facing Tamil Nadu’s TVK party as a political startup", "summary": "The Tamizhaga Vetri Kazhagam (TVK), led by actor Vijay, faces the challenge of scaling from a fan-driven network to a structured political party. Similar to business startups, the party must build a second line of leadership and robust processes. Experts warn against over-promising and recommend focusing on credible early wins to maintain voter trust.", "category": "Politics", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "e7b298ff"}, {"headline": "Startup eNLife Research develops AI-powered blood test for early Alzheimer’s detection", "summary": "Bengaluru-based eNLife Research is building a diagnostic tool that uses AI to detect Alzheimer’s disease risk 10 to 15 years before symptoms appear. The blood-based test identifies correlations between 25-100 biomarkers. The startup aims to provide affordable diagnostics tailored to Indian genetic factors and plans to expand the platform to other neurodegenerative disorders.", "category": "Science", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "d6aa6afd"}, {"headline": "Riceberg Ventures launches 20 million dollar fund for deep-tech startups", "summary": "Riceberg Ventures has launched a $20 million fund targeting pre-seed and seed-stage startups in space-tech, biotech, and robotics. Founding partner Mredul Sarda noted that India is at the start of a long innovation cycle. The fund typically invests between $100,000 and $500,000 per startup, focusing on research-heavy companies with clear commercialization paths.", "category": "Business", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "bbb5d9ed"}, {"headline": "EV owners face higher insurance costs due to battery risks", "summary": "Insurance premiums for electric vehicles are 20-40% higher than for petrol cars, primarily due to the high cost of battery repair and replacement. Lithium-ion batteries can account for 50% of an EV's value. Insurers are moving toward data-driven underwriting using battery management systems, while also introducing dual-beneficiary policies for 'battery-as-a-service' models.", "category": "Business", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "09b394c9"}, {"headline": "Analysis: RBI measures to attract forex inflows aim to stabilize rupee", "summary": "To counter the rupee's 6% depreciation since the start of the year, the RBI has introduced measures to boost capital inflows. These include tax exemptions for FPIs on G-Sec interest and capital gains, and incentives for NRI investments. Analysts believe these steps are crucial to curb imported inflation, though rate actions will remain data-dependent based on monsoon and war impacts.", "category": "Economy", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126482", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 08-06.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/126482"}], "article_id": "8eef0d6b"}, {"headline": "Death toll in Delhi B&B fire reaches 22 as Nigerian man dies", "summary": "The death toll from a fire at an illegal bed and breakfast in Delhi has reached 22 after a 39-year-old Nigerian man succumbed to his injuries. Authorities are investigating the cause of the blaze at the property. Uttarakhand CM Pushkar Singh Dhami has also sought a report on the incident, as the building allegedly lacked proper safety clearances.", "category": "India", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126467", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ⁰⁸⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126467"}], "article_id": "6c330209"}, {"headline": "Retired HC judge GS Patel faces threats over Bohra succession verdict", "summary": "Justice (retd) GS Patel and his family have faced threats and physical intimidation in London following his 2024 verdict on the Dawoodi Bohra succession case. An anonymous letter and an SD card were sent from Germany to his daughter's residence. London's police and Mumbai’s counter-terrorism unit are now investigating the serious security breach.", "category": "Law", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/126467", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ⁰⁸⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126467"}], "article_id": "7381acf3"}, {"headline": "INDIA bloc to hold meeting today to redraw strategy amid strain", "summary": "Leaders from 23 parties of the INDIA opposition alliance are set to meet in New Delhi to discuss their strategy for the 2029 Lok Sabha polls and address internal tensions. TMC chief Mamata Banerjee is expected to propose fielding a united candidate in all 543 seats. The meeting comes amid calls from various constituents to strengthen the alliance against the NDA.", "category": "Politics", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/126467", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ⁰⁸⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126467"}], "article_id": "d434121f"}, {"headline": "Nepal supports bilateral route to resolve border disputes with India", "summary": "Nepal’s foreign minister Shishir Khanal stated that Kathmandu seeks to resolve border disputes with New Delhi through existing bilateral mechanisms rather than third-party mediation. The statement follows high-level talks between Khanal and India’s S Jaishankar. Additionally, BGB and BSF began a four-day director-level talk focusing on border security and infiltration.", "category": "World", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/126467", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ⁰⁸⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126467"}], "article_id": "ef7bfcf6"}, {"headline": "Three Air India planes damaged at Delhi airport by high winds", "summary": "Three stationary Air India Boeing 787-8 Dreamliner aircraft were damaged at Delhi's Indira Gandhi International Airport after being struck by ground support equipment moved by high-speed winds and heavy rain. The aircraft have been taken out of service for inspection and repairs. No injuries were reported during the incident, which occurred on Sunday evening.", "category": "Infrastructure", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126467", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ⁰⁸⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126467"}], "article_id": "10d3a244"}, {"headline": "Bengal couple and son arrested for murder of Delhi University professor", "summary": "Delhi police have arrested a couple from West Bengal and their 13-year-old son for the murder of a Delhi University assistant professor. The victim was found dead at her residence after a dispute over a property the suspects were allegedly trying to force her to sell. The family reportedly traveled from West Bengal specifically to carry out the killing.", "category": "Law", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126467", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ⁰⁸⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126467"}], "article_id": "e278002e"}, {"headline": "Donald Trump calls for more surgical strikes against Hezbollah in Lebanon", "summary": "U.S. presidential candidate Donald Trump has called for increased surgical strikes against Hezbollah targets in Lebanon and Syria. Trump argued that the strikes are necessary to prevent Iranian escalation in the region. Meanwhile, the U.S. Central Command reported shooting down two Iranian-made drones targeting international shipping in the Strait of Hormuz.", "category": "World", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/126467", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ⁰⁸⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126467"}], "article_id": "4f98218c"}, {"headline": "Gehlot says 2022 revolt was to stop Pilot, not defy brass", "summary": "Former Rajasthan CM Ashok Gehlot claimed that the 2022 upheaval by Congress MLAs was aimed at preventing Sachin Pilot from becoming the Chief Minister, rather than defying the party high command. Gehlot stated that the MLAs felt Pilot’s elevation would be unacceptable. He also suggested the revolt was a spontaneous reaction to internal party politics at the time.", "category": "Politics", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126467", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ⁰⁸⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126467"}], "article_id": "588b591f"}, {"headline": "Telangana man shot dead while delivering pizza in Philadelphia", "summary": "Kuncha Anshul, a 28-year-old student from Telangana, was shot dead while delivering pizza in Philadelphia, USA. Family members allege the killing was a planned trap, as he was lured to a vacant apartment. Police are reviewing surveillance footage showing two masked assailants. The victim had moved to the US in 2023 to pursue higher education.", "category": "World", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126467", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ⁰⁸⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126467"}], "article_id": "05a56ba6"}, {"headline": "Mumbai man dies at concert; police probe alcohol and drug use", "summary": "A 28-year-old man died after collapsing during an electronic music concert in Mumbai. Preliminary probes suggest the victim may have consumed prohibited substances or alcohol, though police are also investigating underlying health conditions. The event organizers have been booked for negligence as authorities examine CCTV footage and wait for post-mortem results.", "category": "Health", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126467", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ⁰⁸⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126467"}], "article_id": "90e33520"}, {"headline": "Jill Biden wanted to buy diamond gifted by PM Modi in 2023", "summary": "In her recently released memoir, U.S. First Lady Jill Biden revealed she considered buying the 7.5-carat lab-grown diamond gifted to her by PM Narendra Modi during his 2023 state visit. However, U.S. ethics rules required the gift to be property of the government unless purchased at fair market value. She described the gem as a symbol of India’s technological ambition.", "category": "World", "page": 1, "importance": 4, "telegram_url": "https://t.me/c/1877410077/126467", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ⁰⁸⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126467"}], "article_id": "d8129eef"}, {"headline": "Man dies in Greater Noida as plaster falls from high-rise building", "summary": "A 46-year-old man riding a Harley-Davidson bike died in Greater Noida after plaster fell on him from a high-rise building. The incident occurred in the Sector 1 residential complex. Police have registered a case of negligence against the building's maintenance team. Residents have long complained about the deteriorating condition of the building's facade.", "category": "Infrastructure", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126467", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ⁰⁸⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126467"}], "article_id": "a63ce464"}, {"headline": "Chhagan Bhujbal declines NCP Rajya Sabha seat offer over assembly snub", "summary": "NCP leader Chhagan Bhujbal has turned down his party leadership's offer to nominate him for a Rajya Sabha seat. Bhujbal cited the party's rejection of his request to field his nephew, Sameer Bhujbal, for a local assembly seat as the reason. He stated he preferred to remain focused on state politics and his current legislative role.", "category": "Politics", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126467", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ⁰⁸⁰⁶²⁰²⁶.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126467"}], "article_id": "d9c6f8ca"}, {"headline": "Teenager Kimi Antonelli wins rain-hit Monaco GP for Mercedes", "summary": "19-y s the territory despite an international court ruling. The proposal aims to secure long-term US strategic interests in the Indian Ocean region.", "category": "World", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126467", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ⁰⁸⁰⁶²⁰²⁶.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/126467"}], "article_id": "f26e4f78"}, {"headline": "Ten migrants die in shipwreck off the coast of Malta", "summary": "At least ten migrants died after their boat capsized and sank off the coast of Malta. The Italian Coast Guard rescued 60 others from the water, while several people remain missing. The shipwreck is the latest in a series of tragedies involving migrants attempting to cross the Mediterranean into Europe. Rescue operations are continuing in the area.", "category": "World", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126467", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ⁰⁸⁰⁶²⁰²⁶.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/126467"}], "article_id": "0fe670ce"}, {"headline": "Malaysian hiker found alive after being missing for two weeks", "summary": "A Malaysian hiker who had been missing for two weeks was found alive in a remote forest area. The 49-year-old survived by drinking stream water and eating wild berries. He was spotted by a search and rescue helicopter and is currently being treated at a hospital for dehydration and exhaustion. His rescue has been described as a 'miracle' by local authorities.", "category": "World", "page": 9, "importance": 4, "telegram_url": "https://t.me/c/1877410077/126467", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ⁰⁸⁰⁶²⁰²⁶.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/126467"}], "article_id": "8d54838b"}, {"headline": "South Korea considers first female prime minister in twenty years", "summary": "South Korean President Y // FIXED DEEP LINK HANDLER - Runs IMMEDIATELY
let deepLinkTarget = null;
function handleDeepLink() {
  const hash = window.location.hash;
  if (!hash || !sortedCats.length) return;
  
  const cleanHash = hash.startsWith('#article-') ? hash.slice(9) : hash.slice(1);
  const targetArticle = DIGEST.articles.find(art => art.article_id === cleanHash);
  
  if (targetArticle) {
    deepLinkTarget = {article: targetArticle, hash: cleanHash};
  }
}

let catIdx=0,vpW=0,vpH=0;

function buildAll() {
  vpW=outer.offsetWidth; vpH=outer.offsetHeight;
  hTrack.innerHTML=''; panels.length=0;
  sortedCats.forEach((cat,ci)=>{
    const m=CAT_META[cat]||{color:"#e8334a",icon:"📰"};
    const arts=byCategory[cat];
    const panel=document.createElement('div');
    panel.className='cat-panel';
    panel.id=`cat-panel-${ci}`;
    panel.style.setProperty('--cc',m.color);
    panel.innerHTML=`<div class="progress-row" id="prow-${ci}" style="--cc:${m.color}"></div><div class="v-feed" id="vfeed-${ci}"><div class="v-track" id="vtrack-${ci}"></div></div>`;
    hTrack.appendChild(panel);
    const pRow=panel.querySelector(`#prow-${ci}`);
    const vFeed=panel.querySelector(`#vfeed-${ci}`);
    const vTrack=panel.querySelector(`#vtrack-${ci}`);
    const cardH=vFeed.getBoundingClientRect().height||vpH;
    
    arts.forEach((art,ai)=>{
      const card = buildCard(art, cardH, m, cat, ai);
      card.id = `article-${art.article_id}`;
      card.dataset.articleId = art.article_id;
      vTrack.appendChild(card);
    });
    
    panels.push({pRow,vFeed,vTrack,articles:arts,artIdx:0});
    buildPRow(ci);
  });
  
  hTrack.style.transition='none';
  hTrack.style.transform='translateX(0)';
  syncV(0,false);
  
  // Apply deep link after build — 200ms ensures card heights are measured
  if (deepLinkTarget) {
    setTimeout(() => applyDeepLink(deepLinkTarget), 200);
  }
}

function buildCard(art,h,m,cat,articleIndex) {
  const src=art.sources?.[0];
  // Direct PDF link with #page=N - respected by all modern browser PDF viewers
  // when the file is opened via a link click (Chrome, Firefox, Safari, Edge).
  // Falls back to the Telegram source URL if no PDF is available.
  const href = src?.pdf_filename
    ? ('pdfs/' + src.pdf_filename + '#page=' + (src.page || 1))
    : (src?.telegram_url || '#');
  const card=document.createElement('div');
  card.className='card';
  card.dataset.articleId = art.article_id;
  card.style.height=h+'px';
  card.style.setProperty('--cc',m.color);
  card.innerHTML=`
    <div class="card-content">
      <div class="card-toprow">
        <div class="cat-pill">
          <div class="pill-icon"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="1" y="1" width="8" height="2" rx="0.6" fill="#888"/><rect x="1" y="4.5" width="5" height="1.5" rx="0.6" fill="#666"/><rect x="1" y="7" width="6" height="1.5" rx="0.6" fill="#666"/></svg></div>

        </div>
        <div class="card-date">

        <div class="info-btn"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6.5" stroke="#444" stroke-width="1.3"/><circle cx="7.5" cy="4.5" r="0.8" fill="#555"/><path d="M7.5 7v4" stroke="#555" stroke-width="1.5" stroke-linecap="round"/></svg></div>
      </div>

  return card;
}

function buildPRow(ci) {
  const p=panels[ci],ai=p.artIdx;
  p.pRow.innerHTML='';
  p.articles.forEach((_,i)=>{
    const seg=document.createElement('div');
    seg.className='pseg'+(i<ai?' done':i===ai?' active':'');
    p.pRow.appendChild(seg);
  });
}

function syncV(ci,animated) {
  const p=panels[ci],h=p.vFeed.getBoundingClientRect().height;
 p.vTrack.style.transition=animated?'transform 0.35s cubic-bezier(0.4,0,0.2,1)':'none';
  p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;
  buildPRow(ci);
}

function applyDeepLink(target) {
  const ci = sortedCats.findIndex(cat =>
    byCategory[cat].some(art => art.article_id === target.hash)
  );
  if (ci === -1) return;

  // Set catIdx BEFORE calling goCat so the horizontal track lands correctly
  catIdx = ci;
  hTrack.style.transition = 'none';
  hTrack.style.transform = `translateX(${-ci * vpW}px)`;

  const ai = byCategory[sortedCats[ci]].findIndex(art => art.article_id === target.hash);
  if (ai === -1) return;
  panels[ci].artIdx = ai;
  syncV(ci, false);

  const card = document.getElementById('article-' + target.hash);
  if (card) {
    card.classList.add('target-highlight');
    setTimeout(() => card.classList.remove('target-highlight'), 3000);
  }
}

function goArt(d) {
  const p=panels[catIdx];
  const n=Math.max(0,Math.min(p.artIdx+d,p.articles.length-1));
  if(n===p.artIdx&&d!==0)return;
  p.artIdx=n; syncV(catIdx,true); dismiss();
}

function goCat(idx,animated=true) {
  idx=Math.max(0,Math.min(idx,sortedCats.length-1));
  if(idx===catIdx&&animated)return;
  const prev=catIdx; catIdx=idx;
  hTrack.style.transition=animated?'transform 0.38s cubic-bezier(0.4,0,0.2,1)':'none';
  hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;
  if(animated&&idx!==prev) {
    const m=CAT_META[sortedCats[idx]]||{color:"#e8334a",icon:"📰"};
    catFlash.style.background=m.color+'18';
    cfIcon.textContent=m.icon; cfName.textContent=sortedCats[idx]; cfName.style.color=m.color;
    catFlash.classList.add('on'); setTimeout(()=>catFlash.classList.remove('on'),500);
  }
  dismiss();
}

let dismissed=false;
function dismiss() {
  if(dismissed)return; dismissed=true;
  hintUp.classList.remove('visible'); hintRight.classList.remove('visible');
  hintUp.classList.add('gone'); hintRight.classList.add('gone');
}

(function initHints() {
  const KEY='dailyBriefHintSeen';
  if(!localStorage.getItem(KEY)) {
    localStorage.setItem(KEY,'1');
    setTimeout(()=>{ if(!dismissed){ hintUp.classList.add('visible'); hintRight.classList.add('visible'); } },2500);
  }
})();

let tsX=0,tsY=0,tcX=0,tcY=0,axis=null,drag=false;
outer.addEventListener('touchstart',e=>{ tsX=e.touches[0].clientX; tsY=e.touches[0].clientY; tcX=0; tcY=0; axis=null; drag=true; hTrack.style.transition='none'; const p=panels[catIdx]; if(p)p.vTrack.style.transition='none'; },{passive:true});
outer.addEventListener('touchmove',e=>{ if(!drag)return; const dx=e.touches[0].clientX-tsX,dy=e.touches[0].clientY-tsY; tcX=dx; tcY=dy; if(!axis&&(Math.abs(dx)>8||Math.abs(dy)>8))axis=Math.abs(dx)>Math.abs(dy)?'h':'v'; if(!axis)return; e.preventDefault(); if(axis==='h'){ const edge=(catIdx===0&&dx>0)||(catIdx===sortedCats.length-1&&dx<0); hTrack.style.transform=`translateX(${-catIdx*vpW+dx*(edge ? 0.14 : 1)}px)`; }else{ const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height; const edge=(p.artIdx===0&&dy>0)||(p.artIdx===p.articles.length-1&&dy<0); p.vTrack.style.transform=`translateY(${-p.artIdx*h+dy*(edge ? 0.14 : 1)}px)`; } },{passive:false});
outer.addEventListener('touchend',()=>{ if(!drag)return; drag=false; if(axis==='h'){ const t=vpW*.2; if(tcX<-t)goCat(catIdx+1); else if(tcX>t)goCat(catIdx-1); else{hTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;} }else if(axis==='v'){ const t=vpH*.2; if(tcY<-t)goArt(1); else if(tcY>t)goArt(-1); else{const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height;p.vTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;} } axis=null; },{passive:true});
document.addEventListener('keydown',e=>{ if(e.key==='ArrowDown'||e.key===' '){e.preventDefault();goArt(1);} if(e.key==='ArrowUp'){e.preventDefault();goArt(-1);} if(e.key==='ArrowRight'){e.preventDefault();goCat(catIdx+1);} if(e.key==='ArrowLeft'){e.preventDefault();goCat(catIdx-1);} });
let wl=false;
outer.addEventListener('wheel',e=>{ e.preventDefault();if(wl)return;wl=true; Math.abs(e.deltaX)>Math.abs(e.deltaY)?goCat(catIdx+(e.deltaX>0?1:-1)):goArt(e.deltaY>0?1:-1); setTimeout(()=>wl=false,500); },{passive:false});
window.addEventListener('resize',()=>{ vpW=outer.offsetWidth;vpH=outer.offsetHeight; hTrack.style.transition='none'; hTrack.style.transform=`translateX(${-catIdx*vpW}px)`; panels.forEach(p=>{ const h=p.vFeed.getBoundingClientRect().height; p.vTrack.querySelectorAll('.card').forEach(c=>c.style.height=h+'px'); p.vTrack.style.transition='none'; p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`; }); });

buildAll();
</script>
</body>
</html>
