3", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "RBI Likely To Review HDFC Bank Chief Sashidhar Jagdishan's Third Term", "summary": "The RBI may conduct a rigorous review of HDFC Bank MD and CEO Sashidhar Jagdishan’s next term following the abrupt exit of Chairman Atanu Chakraborty. Chakraborty resigned citing ethical differences with bank practices, causing the stock to plunge to a 52-week low. Sources suggest the central bank will examine governance, whistleblower complaints, and personal value alignment at the bank.", "category": "Business", "page": 11, "importance": 9, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "Novo Nordisk Ready For Generics Entry In Indian Semaglutide Market", "summary": "As patents for semaglutide expire, Novo Nordisk believes its localized pricing and brand heritage will help it maintain leadership against upcoming generic competitors. Major Indian drugmakers like Dr. Reddy's and Sun Pharma are launching versions of the drug at significantly lower prices. The domestic market for weight-loss and diabetes treatments is estimated at $1 billion.", "category": "Business", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "Indian Retailers Register Nine Percent Sales Growth In February", "summary": "Retailers in India recorded 9% year-on-year growth in February as consumption levels normalized following the festive season. Apparel and groceries led growth at 12% and 11% respectively. However, the Retailers Association of India flagged concerns about rising logistics and input costs stemming from the West Asia conflict, which could impact margins in the coming months.", "category": "Business", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "Malaysia And Singapore Step Up Tourism Promotions For Indian Travelers", "summary": "Tourism boards from South-East Asian nations are launching targeted promotions to attract Indian tourists as West Asia travel declines. Malaysia is offering bundled shopping vouchers and free hotel stays, while Singapore has partnered with Visa for curated rewards. Indians continue to rank Thailand, Singapore, and Vietnam among their top five international destinations.", "category": "Business", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "Domestic Indices Tumble 2.5% as West Asia Tensions Weigh on Markets", "summary": "Indian equities saw a massive selloff on Monday, with the Sensex falling 1,837 points and Nifty dropping 602 points. Concerns over oil supply disruptions and the closure of the Strait of Hormuz drove the crash. Sentiment improved slightly in after-market hours following US President Trump's announcement of a pause in strikes on Iran, leading to a rebound in GIFT City Nifty futures.", "category": "Business", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "Unseasonal Rains and Geopolitics Squeeze Indian Consumer Goods Demand", "summary": "Consumer companies are facing a 'double whammy' as unseasonal rains in North India dampen summer sales while West Asia tensions drive up raw material costs. Haier reported a 15% dip in sales last week due to lower temperatures. Rising plastic and resin prices are forcing firms to consider price hikes of up to 10% starting April to protect margins.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "Somerset Indus Capital Closes Third Healthcare Fund at $228 Million", "summary": "Healthcare-focused private equity firm Somerset Indus Capital achieved a final close of $288 million for its third fund, exceeding its $250 million target. The fund will target 10-12 companies in segments like preventive care, medtech, and diagnostics with ticket sizes between $15-40 million. Participation came from global institutional investors and family offices.", "category": "Business", "page": 3, "importance": 4, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "200 Firms Apply for Fund Manager Roles in ₹1 Trillion RDI Fund", "summary": "The government has received nearly 200 applications for second-level fund manager roles under the Research, Development, and Innovation (RDI) fund. About 80% of applicants are venture capital firms, including 3one4 Capital and Speciale Invest. Selection will follow a quality-and-cost-based criteria, with the first lot of managers expected to be announced in 6-8 weeks.", "category": "Business", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "Duroflex Plans 150 New Stores to Boost Omnichannel Presence", "summary": "Mattress brand Duroflex will open 150 company-owned stores over the next three years to strengthen its retail footprint. CEO Sridhar Balakrishnan stated that while online channels contribute 18% of revenue, physical stores remain vital for consumer experience. The brand is also expanding its product range into sofas and recliners as part of a broader sleep ecosystem strategy.", "category": "Business", "page": 3, "importance": 3, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "Domestic Medtech Lobby Seeks Support as Input Costs Surge 50%", "summary": "The Association of Indian Medical Device Industry (AIMED) has urged the government for GST refunds and duty rebates as the West Asia conflict drives up raw material costs. Critical plastic prices for syringes and IV sets have risen by 50%. The blockade at the Strait of Hormuz has also led to a 20% increase in packaging and energy expenses for domestic manufacturers.", "category": "Business", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "Odisha to Auction Three Gold-Bearing Mineral Blocks for First Time", "summary": "Odisha is set to auction three gold blocks—Jaldihi, Madansahi-Kanjia, and Adash-Rampali—marking a first for the state. These are part of 34 mineral blocks planned for auction in FY27. The Adash-Rampali block is estimated to contain 0.9 million tonnes of gold alongside copper and silver. The state aims to leverage these assets to boost mining revenue and critical mineral supply.", "category": "Business", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "Sidbi Withdraws Bond Issuance While Other Banks Raise ₹8,000 Crore", "summary": "Sidbi cancelled its ₹6,000 crore bond issuance as investors demanded higher yields amid market volatility. In contrast, Indian Bank and Union Bank successfully raised a combined ₹8,000 crore via 10-year infrastructure bonds at yields of 7.15-7.16%. The secondary market saw a 10 basis point rise in benchmark yields due to oil shocks and global uncertainty.", "category": "Business", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "India Inc Planned Capex to Decline 16.5% in FY27", "summary": "A National Statistics Office (NSO) survey indicates that aggregate private corporate capital expenditure intentions for FY27 are set to fall to ₹9.55 trillion from ₹11.44 trillion in FY26. Manufacturing remains the largest investment sector despite a drop in its overall share. Nearly 22% of surveyed firms reported no capex plans, signaling a cautious corporate investment stance.", "category": "Business", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "FPI Selling in Indian Equities Surpasses ₹1 Trillion in March", "summary": "Foreign portfolio investors (FPIs) offloaded a record ₹1.04 trillion in Indian equities this month due to West Asia tensions and high domestic valuations. This surpasses the previous high of ₹94,017 crore seen in October 2024. Heavy selling was countered by domestic institutional investors (DIIs), who made a net investment of ₹1.13 trillion, supported by steady SIP flows.", "category": "Business", "page": 11, "importance": 9, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "Mutual Funds Lose ₹50,000 Crore as HDFC Bank Shares Tumble", "summary": "The 16.4% slide in HDFC Bank shares this month has caused an estimated ₹50,000 crore erosion in mutual fund investor wealth. HDFC Bank is the single-largest holding for Indian MFs, with active schemes holding shares worth ₹3.2 trillion. The decline, triggered by geopolitical tensions and management exits, has weighed heavily on the performance of large-cap and flexi-cap funds.", "category": "Business", "page": 11, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "Sebi to Probe HDFC Bank Board Minutes After Chairman's Exit", "summary": "Sebi Chairman Tuhin Kanta Pandey announced the regulator will examine HDFC Bank’s board meeting minutes following the surprise resignation of part-time chairman Atanu Chakraborty. The move aims to ensure compliance with corporate governance and listing regulations. Pandey emphasized that independent directors must ensure their concerns are formally recorded to protect minority shareholders.", "category": "Business", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "GIFT City’s First IPO XED Institute May Extend Subscription Period", "summary": "XED Institute, the first company to launch an IPO from GIFT City’s IFSC, is seeking a three-day extension for its subscription window. The move comes amid tepid demand and global uncertainty caused by the West Asia conflict. The issue, which opened on March 16, has reportedly received bids for only about 5% of the shares as overseas investors remain cautious.", "category": "Business", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "Consumption Funds Decline 12.7% as Oil Prices and Inflation Weigh", "summary": "Thematic consumption funds have fallen nearly 13% over the past three months, making them the second worst-performing fund category. Analysts attribute the decline to rising raw material costs driven by oil prices and uneven rural demand. Despite short-term volatility, experts suggest long-term investors stay put as India's structural consumption story remains intact.", "category": "Business", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "SEBI proposes widening 'connected persons' definition to tackle insider trading", "summary": "The Securities and Exchange Board of India has proposed to broaden the definition of 'connected persons' to curb insider trading. The new definition would include individuals who share a household with or are financially dependent on a person with access to unpublished price-sensitive information, making it harder to leak data through associates.", "category": "Business", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117932", "sources": [{"newspaper": "Indian Express", "pdf_filename": "cleaned_IE Delhi 24-03-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/117932"}]}, {"headline": "Indian Benchmark Indices Fall 2.5 Percent Amid West Asia War Concerns", "summary": "The BSE Sensex dropped 2.46% to 72,696 points, while the NSE Nifty 50 fell 2.6% to 22,513 points on Monday. The market crash was fueled by fears of high inflation due to spiking crude oil prices and the ongoing West Asia conflict. Most sectoral indices closed lower, with consumer durables, metals, and realty suffering significant losses. Every intraday recovery was sold off.", "category": "Business", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/117941", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -24-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117941"}]}, {"headline": "India Records Negative Net FDI for Fifth Straight Month", "summary": "Net Foreign Direct Investment (FDI) into India remained negative for the fifth consecutive month in January 2026, with outflows exceeding inflows by $1.4 billion. Gross FDI inflows fell by 7% compared to the previous year, while repatriations nearly doubled. Manufacturing, computer services, and energy remained the top sectors for equity inflows despite the overall decline.", "category": "Business", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/117941", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -24-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117941"}]}, {"headline": "Global Oil Prices Plunge 13 Percent as Trump Pauses Iran Strikes", "summary": "Brent crude futures fell as much as 15% to $96 a barrel before stabilizing at $104.1 after U.S. President Donald Trump announced a five-day postponement of military strikes on Iranian power plants. The delay in escalation eased immediate supply concerns, though prices remain sensitive to the ongoing conflict in the Persian Gulf.", "category": "Business", "page": 13, "importance": 9, "telegram_url": "https://t.me/c/1877410077/117941", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -24-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/117941"}]}, {"headline": "Government Restores Full RoDTEP Benefits for Indian Exporters", "summary": "The Union government has restored full benefits under the Remission of Duties and Taxes on Exported Products (RoDTEP) scheme. Previous reductions of 50% have been reversed, effective from February 23 to March 31. The Global Trade Research Initiative welcomed the move, noting that RoDTEP is a tax remission rather than a subsidy.", "category": "Business", "page": 13, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117941", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -24-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/117941"}]}, {"headline": "Gold Futures Dive Ten Percent Amid Rising Dollar and Inflation Fears", "summary": "Gold prices fell by 10.3% to ₹1,29,595 per 10 grams on the Multi Commodity Exchange. The drop was triggered by a stronger U.S. dollar, rising bond yields, and surging crude prices impacting the global economic outlook. Gold has now declined by nearly 33% from its all-time high of ₹1.93 lakh recorded in January.", "category": "Business", "page": 13, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117941", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -24-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/117941"}]}, {"headline": "SEBI Approves Conflict of Interest Recommendations for Board Members", "summary": "The SEBI board approved new rules to manage conflicts of interest, bringing the chairperson and whole-time members under the 'insider' definition. The board also simplified 'fit and proper' norms for intermediaries and allowed FPIs to settle stock market transactions on a net basis. Investment limits for social impact funds in AIFs were reduced to ₹1,000 to boost retail participation.", "category": "Business", "page": 13, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117941", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -24-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/117941"}]}, {"headline": "Centre to Table Bill Amending Laws for Companies and LLPs", "summary": "Finance Minister Nirmala Sitharaman introduced a bill in the Lok Sabha to amend laws governing companies and limited liability partnerships (LLPs). The proposed changes include decriminalizing certain offenses, simplifying compliance for small businesses, and easing rules for CSR spending. The move is aimed at promoting ease of doing business and attracting foreign investment to India.", "category": "Business", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117990", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_24-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117990"}]}, {"headline": "NCLT Directs Vedanta to Include Adani in Jaiprakash Associate Appeal", "summary": "The National Company Law Appellate Tribunal (NCLAT) has directed Vedanta Group to include Adani Enterprises as a party in its appeal against the NCLT's approval of the Jaiprakash Associates resolution plan. Adani's bid of ₹14,535 crore was previously accepted by lenders, and the tribunal noted that any decision on the case must involve the successful resolution applicant.", "category": "Business", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117990", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_24-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117990"}]}, {"headline": "Burman Family Investment Assets Now Match Valuation of Dabur India", "summary": "The Burman family, promoters of Dabur, has built a pool of non-core investment assets through dividends valued at ₹11,000 crore, nearly matching the family's 68% stake in Dabur itself. Managed through a family office, the portfolio includes stakes in various sectors including sports franchises and food ventures, highlighting a successful diversification strategy beyond the core FMCG business.", "category": "Business", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117990", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_24-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117990"}]}, {"headline": "Indian GCCs Evolving into Hubs for Global Strategic Leadership Roles", "summary": "Global Capability Centres (GCCs) in India are rapidly shifting from back-office support to strategic leadership hubs. According to a Deloitte-ANSR report, 45% of GCCs in India now participate in global decision-making, with the number of leadership roles expected to reach 30,000 by 2030. Talent from India is increasingly driving global product roadmaps and technology policy.", "category": "Business", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117990", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_24-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117990"}]}, {"headline": "Bank of Baroda System Error Leads to Inflated EMIs for Borrowers", "summary": "A technical glitch in Bank of Baroda's system resulted in thousands of borrowers being charged higher-than-usual EMIs. The error affected roughly 11% of the bank's home loan portfolio. BoB has acknowledged the issue, stating it was caused by a calculation error in interest rates, and assured customers that excess amounts would be refunded or adjusted in subsequent cycles.", "category": "Business", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117990", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_24-03-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/117990"}]}, {"headline": "Hopes fade for missing Indian racing and sailing stars in Maldives", "summary": "Search operations have been extended to seven days for motor racing star Hari Singh and sailing veteran Mahesh Ramchandra after their speedboat crashed in the Maldives. The duo was part of a group holidaying on businessman Gautam Singhania’s yacht. Five others were rescued, but clarity on the accident's cause remains limited.", "category": "India", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117999", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "Bangalore_HT_24-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117999"}]}, {"headline": "Four dead as cold storage facility collapses in Prayagraj", "summary": "A portion of a 30-year-old cold storage building in Prayagraj collapsed, killing four people and injuring 13. Dozens are feared trapped under the debris. An ammonia gas leak was reported following the collapse, which occurred during the busy rabi season. PM Modi and CM Yogi Adityanath announced ex gratia for the victims.", "category": "India", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117999", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "Bangalore_HT_24-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117999"}]}, {"headline": "Dalit men assaulted for sitting on temple platform in Yadgir", "summary": "A temple priest was arrested in Yadgir, Karnataka, after two Dalit men were allegedly beaten with iron rods for sitting on a platform near a Hanuman temple. The victims had attended a family ceremony. Police are searching for three other suspects in connection with the assault.", "category": "India", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117999", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "Bangalore_HT_24-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117999"}]}, {"headline": "Woman injured in gunfire between village volunteers in Manipur", "summary": "A 19-year-old woman working in a paddy field sustained bullet injuries during gunfire between village volunteers of two communities in Manipur’s Ukhrul district. BSF personnel were dispatched to the scene after automatic assault rifles were reportedly used. The woman is receiving treatment.", "category": "India", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117999", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "Bangalore_HT_24-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117999"}]}, {"headline": "Fuel Scarcity Fear Sparks Panic Buying Across Cities In Gujarat", "summary": "Panic buying gripped major cities in Gujarat including Ahmedabad and Surat as consumers lined up at petrol pumps over fuel shortage fears. Several outlets operated by Nayara Energy and BPCL reported dry-outs. While some dealers faced payment-related delays, oil marketing companies and the state government assured the public that adequate quantities of fuel are available.", "category": "India", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "Public Policy Dialogues Call For Action To Shield Small Farmers", "summary": "The PPD 2026 forum at the Indian School of Business has called for collective action led by farmer producer organizations to lift 100 million small farmers out of economic vulnerability. Discussions focused on the challenge of transitioning farmers from producers to business owners and ensuring women, who perform 70% of agricultural work, receive formal recognition as farmers.", "category": "India", "page": 10, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "Sixty Percent Of Indian Professionals In US Not Planning Return", "summary": "A survey of over 2,300 Indian professionals in the US revealed that 60% are not planning to move back to India within the next three years. Despite the growth of engineering hubs in India, respondents cited workplace conditions and career growth ecosystems as major factors. Most said they would only consider returning if compensation remained broadly comparable to US levels.", "category": "India", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "Explained: The legal basis for scrapping Bengal’s post-2010 OBC lists", "summary": "The Explained page analyzes the Calcutta High Court's decision to scrap the OBC certificates of 77 communities in West Bengal. It details how the court found the state government had failed to collect empirical data on the backwardness of these groups and instead used them as a political tool for vote-bank politics.", "category": "India", "page": 15, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117932", "sources": [{"newspaper": "Indian Express", "pdf_filename": "cleaned_IE Delhi 24-03-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/117932"}]}, {"headline": "Two Indian LPG Carriers Cross Strait of Hormuz Amid Conflict", "summary": "Two Indian-flagged vessels, Jag Vasant and Pine Gas, successfully transited the Strait of Hormuz on Monday. The carriers are transporting nearly 93,000 tonnes of LPG to help address domestic shortages. The transit occurred amid heightened tensions in the region and follows inter-Ministerial briefings on securing India's energy supply chains.", "category": "India", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117941", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -24-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117941"}]}, {"headline": "Four Dead in Bengaluru-Mysuru Highway Bus Accident", "summary": "A high-speed bus crash on the Bengaluru–Mysuru highway killed four passengers and injured several others early Monday. Preliminary investigations suggest the driver dozed off, causing the vehicle to veer into fencing. Metal rods pierced the bus, which was carrying 43 people. The Channapatna Traffic Police arrested the driver, Riyaz, on charges of negligent driving.", "category": "India", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117941", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -24-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117941"}]}, {"headline": "Karnataka to Provide Ten Crore Grant for Wayanad Landslide Rehabilitation", "summary": "The Karnataka government has made a provision of ₹10 crore in its supplementary estimates to aid families affected by landslides in Wayanad, Kerala. The move comes ahead of the Kerala Assembly elections. Other budgetary provisions include ₹16.3 crore for the Chief Minister’s convention bills and ₹10 crore for a state delegation visit to the World Economic Forum in Davos.", "category": "India", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117941", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -24-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117941"}]}, {"headline": "India and UAE Focus on Economy and Hormuz Security", "summary": "External Affairs Minister S Jaishankar and UAE Minister Reem Al Hashimy met to discuss the impact of the West Asia conflict on regional security and energy supplies. The UAE reaffirmed its right to defend its territory following reported US-led strikes launched from its soil. Both nations emphasized the importance of maintaining navigation through the critical Strait of Hormuz.", "category": "India", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117990", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_24-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117990"}]}, {"headline": "Modi Expected to Visit Russia this Year for Brics Summit", "summary": "Russian Foreign Minister Sergey Lavrov confirmed that Prime Minister Narendra Modi is expected to visit Russia this year, likely for the Brics summit. The visit underscores the 'special and privileged' strategic partnership between the two nations, focusing on expanding economic bonds and bilateral cooperation despite shifting global geopolitical dynamics.", "category": "India", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117990", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_24-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117990"}]}, {"headline": "NIA Conducts Searches in Delhi Blast Case Across Jammu and Kashmir", "summary": "The National Investigation Agency (NIA) carried out extensive searches at nine locations in Srinagar, Baramulla, and Jammu in connection with the Delhi Red Fort blast case. Digital devices and incriminating documents were seized during the raids. The agency is tracking several leads to identify the masterminds behind the explosive incident that occurred in November 2025.", "category": "India", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117990", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_24-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117990"}]}, {"headline": "Shortage of Domestic Help Expected in Cities During Election Season", "summary": "Major Indian cities like Delhi, Mumbai, and Bengaluru are bracing for a shortage of domestic help, including cooks and security guards, as migrant workers return to their home states to vote in the upcoming assembly polls. Recruitment firms report that 15-30% of workers in the informal sector may take extended leave, leading to a spike in service costs and wage demands.", "category": "India", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117990", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_24-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117990"}]}, {"headline": "29L of 60L voters make the cut in Bengal supplementary rolls", "summary": "About 29 lakh voters out of 60 lakh applicants were included in West Bengal's final supplementary electoral rolls. The remaining 31 lakh applications are currently under judicial adjudication. The peak in applications occurred just before the final rolls were published, highlighting active voter registration ahead of upcoming elections.", "category": "India", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/118010", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_24-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/118010"}]}, {"headline": "Supreme Court slams Gurugram police over minor's sexual assault probe", "summary": "The Supreme Court expressed shock at the 'insensitivity' of the Gurugram police regarding an investigation into the sexual assault of a four-year-old girl. The court directed the police commissioner to appear on March 25 with complete records of the probe.", "category": "Law", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117999", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "Bangalore_HT_24-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117999"}]}, {"headline": "Nine policemen convicted for 2020 Sathankulam custodial deaths", "summary": "A Tamil Nadu court convicted nine policemen for the brutal 2020 custodial torture and deaths of P Jayaraj and his son J Benicks. The incident, which occurred during Covid-19 lockdown enforcement, sparked national outrage. Sentencing is scheduled for March 30. One other accused officer died during the trial.", "category": "Law", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117999", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "Bangalore_HT_24-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117999"}]}, {"headline": "Punjab Police starts charging ₹80 for downloading FIRs online", "summary": "The Punjab government has introduced a ₹80 fee for downloading First Information Reports (FIRs) from its digital portals. Complainants can still get a free copy from police stations. Legal experts have criticized the move, arguing it monetizes public documents and creates barriers to justice.", "category": "Law", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117999", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "Bangalore_HT_24-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117999"}]}, {"headline": "Karnataka assembly passes bill to curb hate crimes and protect couples", "summary": "The Karnataka assembly passed a bill granting legal protection to adults choosing their marriage partners. The legislation criminalizes social and economic retaliation, including 'symbolic disownment' and denying access to markets. Offences resulting in death carry a minimum five-year prison term. The bill also mandates the creation of safe houses.", "category": "Law", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117999", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "Bangalore_HT_24-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117999"}]}, {"headline": "High Court issues notice to BRS MLA over defection to Congress", "summary": "The Telangana High Court issued notices to MLA Danam Nagender and the Assembly Speaker regarding a petition challenging the Speaker's refusal to disqualify Nagender. The petitioner argues Nagender ceased to be a BRS member after contesting the Lok Sabha polls on a Congress ticket.", "category": "Law", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117999", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "Bangalore_HT_24-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117999"}]}, {"headline": "HC orders Telangana to clear retired employee dues by April 9", "summary": "The Telangana High Court set a final deadline of April 9 for the state to pay all pending post-retirement benefits to thousands of employees. Finance Secretary Sandeep Kumar Sultania informed the court that dues for 2,600 staff are still pending. The court warned of action if the undertaking is not met.", "category": "Law", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117999", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "Bangalore_HT_24-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117999"}]}, {"headline": "Supreme Court weighs public good in post-facto environmental clearances", "summary": "The Supreme Court observed that the legislature should not be entirely barred from granting post-facto environmental clearances for projects serving a higher public good, like hospitals. The court noted that while India contributes less than 10% to global warming, it often faces disproportionate pressure on environmental protection compared to other nations.", "category": "Law", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117999", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "Bangalore_HT_24-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117999"}]}, {"headline": "Delhi HC: Public figures must be ready for caricatures and criticism", "summary": "The Delhi High Court observed that courts cannot prevent the public from making fun of public figures unless remarks are humiliating or disparaging. The bench made the comment while hearing a plea from Patanjali MD Acharya Balkrishna regarding personality rights, adding that brickbats are part of being in the public eye.", "category": "Law", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117999", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "Bangalore_HT_24-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117999"}]}, {"headline": "Delhi HC seeks CBI response on Rabri Devi’s plea in land-for-jobs case", "summary": "The Delhi High Court has sought the CBI’s stance on a plea by former Bihar CM Rabri Devi. She is challenging a trial court order that refused to provide her 1,600 unrelied documents in the land-for-jobs case. The matter is listed for further hearing on April 1.", "category": "Law", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117999", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "Bangalore_HT_24-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117999"}]}, {"headline": "Sameer Wankhede denies demanding bribe from Shah Rukh Khan", "summary": "Former NCB zonal director Sameer Wankhede told the Bombay High Court that he never demanded or accepted a bribe from actor Shah Rukh Khan. Wankhede is challenging a CBI FIR alleging he conspired to extort ₹25 crore to release Aryan Khan in the Cordelia cruise drugs case. He claimed the FIR lacks material evidence against him.", "category": "Law", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117999", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "Bangalore_HT_24-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117999"}]}, {"headline": "Goa club owner Ajay Gupta granted bail in fire tragedy case", "summary": "Ajay Gupta, one of the owners of the 'Birch by Romeo Lane' nightclub, was granted bail by a Goa court. Gupta was arrested in New Delhi following a fire in December 2025 that killed 25 people. He was ordered to surrender his passport and not leave the country.", "category": "Law", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117999", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "Bangalore_HT_24-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117999"}]}, {"headline": "Fresh trial begins in London High Court against Nirav Modi", "summary": "A new legal battle has started in London as Bank of India seeks to recover over $10.7 million from fugitive diamantaire Nirav Modi. The bank is suing Modi personally based on a guarantee for an overdraft facility. Modi’s defense argues the demand notice was never validly served and the guarantee is unenforceable.", "category": "Law", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117999", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "Bangalore_HT_24-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117999"}]}, {"headline": "Sitharaman introduces Corporate Laws Bill to boost ease of business", "summary": "Finance Minister Nirmala Sitharaman introduced the Corporate Laws (Amendment) Bill, 2026, which seeks to decriminalize minor offences and reduce compliance for startups and small firms. Opposition members raised concerns about reduced parliamentary oversight and dilution of CSR obligations. The bill has been proposed for examination by a Joint Parliamentary Committee.", "category": "Law", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117999", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "Bangalore_HT_24-03-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/117999"}]}, {"headline": "SC directs CBI and ED to finish RCom fraud probe in four weeks", "summary": "The Supreme Court expressed displeasure over the 'reluctance' of the CBI and ED in investigating a massive bank fraud involving Reliance Communications and ADAG entities. The court noted debts of nearly ₹3,000 crore were settled for just ₹26 crore and ordered the agencies to unearth any irregularities or public official connivance within four weeks.", "category": "Law", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117999", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "Bangalore_HT_24-03-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/117999"}]}, {"headline": "SEBI Board Clears Tighter Conflict Of Interest Code For Officials", "summary": "The SEBI board has adopted a revised conflict-of-interest framework for its chairman, members, and employees. Key changes include mandatory internal disclosures of assets and liabilities and extending investment restrictions to spouses and dependent family members. The regulator also approved a digital system for conflict management and whistleblower reporting to improve internal ethics.", "category": "Law", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "Vedanta Moves NCLAT Against Adani Bid For Jaiprakash Associates", "summary": "Vedanta has appealed to the NCLAT against a court order approving the Adani group's bid for Jaiprakash Associates. Vedanta argues its offer was higher by ₹3,400 crore in total value, but lenders preferred Adani's plan for its upfront cash and faster payment timelines. Legal experts suggest the tribunal may not interfere with the commercial wisdom of the Committee of Creditors.", "category": "Law", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "SEBI Escalates Over One Lakh Manipulative Social Media Content Items", "summary": "The Securities and Exchange Board of India informed Parliament that it has escalated 1.33 lakh items of manipulative social media content to platform providers for removal. These actions, taken as of February 28, 2026, target misleading or unlawful content related to the securities market. The regulator receives input regarding such content and works with platforms to take it down.", "category": "Law", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "SEBI Eases Fit And Proper Norms For Market Intermediaries", "summary": "SEBI has amended its 'fit and proper person' criteria to remove automatic disqualification based solely on pending criminal complaints or FIRs. Cases will now be assessed individually under principle-based criteria. However, the regulator tightened eligibility for those convicted of economic offenses or securities law violations while ensuring entities receive an opportunity to be heard.", "category": "Law", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "NCLAT Directs Vedanta to Implead Adani in JAL Acquisition Plea", "summary": "The National Company Law Appellate Tribunal (NCLAT) directed the Vedanta group to make the Adani group a party in its appeal. Vedanta is challenging the NCLT’s approval of Adani’s ₹14,535 crore bid to acquire Jaiprakash Associates Ltd (JAL). The bench stated it cannot pass ex-parte orders and has scheduled the next hearing for Tuesday.", "category": "Law", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "Anil Ambani Seeks Structured Debt Resolution for Reliance ADAG", "summary": "Industrialist Anil Ambani has petitioned the Supreme Court for a court-facilitated debt resolution plan for the Reliance Anil Dhirubhai Ambani Group (ADAG). Citing a precedent set by the Sterling group, Ambani requested a lenders' committee to settle ₹3.44 trillion in outstanding dues. Meanwhile, the SC criticized central agencies for slow progress in probing alleged loan frauds by his firms.", "category": "Law", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "Corporate Laws Amendment Bill Tabled to Empower NFRA and Ease Compliance", "summary": "The government introduced the Corporate Laws Amendment Bill in the Lok Sabha, proposing several changes to improve the ease of doing business. Key features include strengthening the National Financial Reporting Authority (NFRA), decriminalizing procedural defaults, and allowing AIFs to convert into LLPs. The Bill also recognizes new executive compensation instruments like RSUs.", "category": "Law", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "Sebi Overhauls Conflict of Interest Norms for Top Officials", "summary": "Sebi approved a comprehensive revamp of conflict of interest and disclosure rules for its chairman and whole-time members. Top officials will now be classified as 'insiders' and must publicly disclose immovable property details. The new rules also restrict direct equity investments by family members. Sebi will implement a digital system to track recusal decisions and disclosures.", "category": "Law", "page": 11, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "Supreme Court Directs Sebi to Distribute Sandesara Settlement to Lenders", "summary": "The Supreme Court ordered that ₹5,100 crore paid by Nitin and Chetan Sandesara as part of a settlement must be distributed to secured lenders on a proportionate basis. The court also asked Sebi to explain its refusal to close a probe into the Sterling Biotech case. The bench noted its primary concern is the recovery of bank funds from economic offenders.", "category": "Law", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "Calcutta HC cancels OBC certificates issued in Bengal after 2010", "summary": "The Calcutta High Court cancelled all OBC certificates issued in West Bengal after 2010. The court found the process of identifying 77 classes as OBCs was illegal and bypassed the state's Backward Classes Commission. The ruling impacts approximately 5 lakh people but does not affect those who have already entered the workforce using these certificates.", "category": "Law", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/117932", "sources": [{"newspaper": "Indian Express", "pdf_filename": "cleaned_IE Delhi 24-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117932"}]}, {"headline": "Pune Porsche crash: Two doctors arrested for swapping driver's blood samples", "summary": "Pune police are investigating a potential swap of blood samples involving the 17-year-old driver in the fatal Porsche crash. Authorities have arrested two senior doctors from Sassoon General Hospital for allegedly replacing the minor's blood sample with a clean one to hide evidence of alcohol consumption during the accident.", "category": "Law", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117932", "sources": [{"newspaper": "Indian Express", "pdf_filename": "cleaned_IE Delhi 24-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117932"}]}, {"headline": "Ricky Rai Questioned by Traffic Police Over Lamborghini Stunt Case", "summary": "Ricky Rai, son of late Muthappa Rai, appeared before Bengaluru Traffic Police regarding a Lamborghini performing stunts at Anil Kumble Circle on March 21. While Rai denied driving the vehicle, police claim to have evidence to the contrary. Rai had secured bail from a Bengaluru court prior to questioning. Ownership transfer for the car from a Delhi resident is currently in process.", "category": "Law", "page": 2, "importance": 3, "telegram_url": "https://t.me/c/1877410077/117941", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -24-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117941"}]}, {"headline": "Bengaluru Traffic Police Book 634 Drunk Driving Cases in Weekly Drive", "summary": "During a special enforcement drive between March 16 and 22, the Bengaluru Traffic Police registered 634 cases of drunk driving. Personnel from 53 stations inspected 45,568 vehicles. Additionally, 122 cases of overspeeding were booked, with total fines amounting to ₹1.29 lakh.", "category": "Law", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/117941", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -24-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117941"}]}, {"headline": "Couple Arrested in Bengaluru for Alleged Five Crore Government Job Racket", "summary": "The Central Crime Branch arrested Jason D’Souza and his wife Lavina for allegedly cheating over 100 people by promising government jobs. The couple reportedly collected commissions ranging from ₹2 lakh to ₹15 lakh per victim, totaling an estimated ₹5 crore. The scam involved forged documents and fake appointment orders. Cases have been registered across several city police stations.", "category": "Law", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117941", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -24-03-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117941"}]}, {"headline": "Supreme Court Restores Bribery FIR Against IAS Officer J. Manjunath", "summary": "The Supreme Court set aside a High Court order quashing an FIR against IAS officer J. Manjunath, the former Bengaluru Urban DC. The case involves an alleged ₹5 lakh bribe for land conversion. The apex court ruled that the truth of the allegations must be tested during trial rather than quashed prematurely, allowing the Lokayukta police to resume their investigation.", "category": "Law", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117941", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -24-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117941"}]}, {"headline": "Former Punjab Minister Arrested Following Suicide of Warehousing Official", "summary": "Laljit Singh Bhullar, a former AAP Minister in Punjab, was arrested in connection with the suicide of a state warehousing official, Gagandeep Singh Randhawa. The deceased allegedly left a video accusing Bhullar of harassment over contract tenders. Bhullar will be produced in court on Tuesday, while the AAP government claimed credit for taking decisive action against i rid, is seen as the ideal successor to Didier Deschamps. The move is expected to mark a new era for French football under the legendary former player.", "category": "Sports", "page": 18, "importance": 7, "telegram_url": "https://t.me/c/1877410077/118010", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_24-03-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/118010"}]}, {"headline": "Government to expand Sahyog portal for law enforcement data requests", "summary": "The Home Ministry plans to enhance the Sahyog portal to allow law enforcement agencies to submit user data requests directly to electronic service providers. The move aims to expedite cybercrime investigations. Over 16,000 illegal links and websites have already been taken down through the portal since its 2024 launch.", "category": "Technology", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117999", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "Bangalore_HT_24-03-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117999"}]}, {"headline": "Government pushes telcos to offer 30-day recharge plans", "summary": "Communications Minister Jyotiraditya Scindia said the Centre is urging telecom operators to actively market 30-day recharge plans to improve transparency for consumers. Currently, most 'monthly' plans have a 28-day validity, forcing 13 recharges per year. Trai already mandates that operators offer at least one 30-day plan in each category.", "category": "Technology", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117999", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "Bangalore_HT_24-03-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/117999"}]}, {"headline": "Archimedis Digital Eyes One Hundred Crore Revenue From AI Projects", "summary": "IT services firm Archimedis Digital plans to double its revenue to ₹100 crore by FY27, driven by life sciences AI projects. The company will double its workforce and focus on emerging markets in India and Latin America. CEO Duraisamy Rajan Palani noted that 50% of new hires will require an AI background to support digital transformation for biotech and pharma firms.", "category": "Technology", "page": 10, "importance": 4, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "Chip Startup Deepgrid Semi Seeks ₹25 Crore for AI Solutions", "summary": "T-Hub incubated startup Deepgrid Semi aims to raise ₹25 crore to begin manufacturing its AI-powered System-on-Chip (SoC) for Advanced Driver Assistance Systems (ADAS). The company seeks to reduce chipset costs from ₹35,000 to ₹3,000 through the 'tape-out' process. It is currently conducting field trials on humanoids and autonomous vehicles.", "category": "Technology", "page": 3, "importance": 4, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "Broadcasters Urge EU to Apply Digital Rules to Big Tech Smart TVs", "summary": "Major European broadcasters, including Disney and Paramount+, have called for the EU to designate smart TV operating systems from Google, Amazon, and Samsung as 'gatekeepers' under the Digital Markets Act. Broadcasters argue that these platforms exert growing market power over content distribution, potentially harming competition as Big Tech expands into the media industry.", "category": "Technology", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "BlackRock CEO Warns AI Boom Could Exacerbate Wealth Inequality", "summary": "In his annual letter, BlackRock CEO Larry Fink cautioned that the AI revolution might disproportionately benefit wealthy asset owners, mirroring past wealth creation patterns. He urged a rethink of the US Social Security system to allow more individuals to build wealth through market investments. Fink noted that while AI will displace some jobs, it will create significant economic value.", "category": "Technology", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "OpenAI and Anthropic Compete for Private Equity Capital for AI Projects", "summary": "AI giants OpenAI and Anthropic are reportedly courting private equity firms to form joint ventures for capital-intensive AI infrastructure. OpenAI is offering guaranteed minimum returns of 17.5% and early access to new models to entice investors like TPG and Advent. The move highlights a growing turf war as companies seek to accelerate the adoption of enterprise AI products.", "category": "Technology", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "Microsoft unveils new AI features and Copilot+ PCs for Windows users", "summary": "Microsoft has introduced a new category of Windows PCs called Copilot+ that features deep AI integration. These devices include a \"Recall\" feature to track user activity and specialized hardware for AI tasks, aiming to compete with Apple’s latest hardware offerings in the laptop market with advanced generative AI features.", "category": "Technology", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117932", "sources": [{"newspaper": "Indian Express", "pdf_filename": "cleaned_IE Delhi 24-03-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/117932"}]}, {"headline": "Karnataka Accounted for 9 Percent of India’s Ransomware Cases in 2025-26", "summary": "A report by CySecK revealed that Karnataka contributed nearly 9% of India's total ransomware cases in 2025-26. Bengaluru witnessed cyberattacks four times higher than the previous year. Major incidents included a DDoS attack on the Kaveri 2.0 system and a ransomware attack on a private hospital. Vulnerable sectors include government departments, education, and healthcare.", "category": "Technology", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117941", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -24-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117941"}]}, {"headline": "Centre Launches AI Skilling Initiative with Google and YouTube", "summary": "Information and Broadcasting Minister Ashwini Vaishnaw unveiled a National AI Skilling Initiative in collaboration with Google and YouTube. The programme aims to train 15,000 youth in AI essentials and generative AI tools for free. The initiative is designed to support the 'orange economy' by helping creators master digital storytelling and professional AI applications.", "category": "Technology", "page": 12, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117941", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -24-03-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/117941"}]}, {"headline": "Apple Pay Negotiates with Indian Banks Over UPI Pricing Challenges", "summary": "Apple is in talks with HDFC, ICICI, and Axis Bank to launch Apple Pay in India. The primary hurdle is the transaction fee structure; Apple typically seeks a small percentage, but India's UPI ecosystem operates at near-zero costs. Success depends on whether Apple can justify its fees through superior user experience or premium features in a highly competitive digital payment market.", "category": "Technology", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117990", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_24-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117990"}]}, {"headline": "AWS Eyes Massive Cloud Capacity Expansion in India via Tax Incentives", "summary": "Amazon Web Services (AWS) is planning to add 2-3 gigawatts of cloud capacity in India, lured by government tax sops and incentives. The company has signed letters of intent with six co-location providers to expand infrastructure in Mumbai and Hyderabad. This move aims to meet the surging demand for cloud services and AI processing power from Indian enterprises and startups.", "category": "Technology", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117990", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_24-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117990"}]}, {"headline": "Indian GenAI Startups Face Reset as Investors Seek Sustainable Models", "summary": "Indian Generative AI startups are undergoing a strategic reset as venture capital funding slows. Investors are moving away from foundational models to industry-specific AI applications that offer clear ROI. While funding in the sector reached $832 million in 2025, the focus has shifted toward startups that can integrate AI into existing enterprise workflows and solve vertical-specific problems.", "category": "Technology", "page": 14, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117990", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_24-03-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/117990"}]}, {"headline": "SC orders Haryana to restore Karnal green belt after tree removal", "summary": "The Supreme Court directed the Haryana government to restore a green belt in Karnal where 40 trees were uprooted to build an access road for a BJP office. The court emphasized that the area must be returned to its original condition and dense with trees, following reports that the illegal road has been removed.", "category": "Environment", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117999", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "Bangalore_HT_24-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117999"}]}, {"headline": "WMO: Global climate in 2025 more unbalanced than ever", "summary": "The World Meteorological Organization’s State of the Global Climate 2025 report warns that the earth's energy imbalance has reached record levels. Over 91% of excess heat is being stored in the oceans. 2025 was the second or third warmest year on record, with greenhouse gas concentrations continuing to hit new highs.", "category": "Environment", "page": 11, "importance": 9, "telegram_url": "https://t.me/c/1877410077/117999", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "Bangalore_HT_24-03-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/117999"}]}, {"headline": "Past Decade Confirmed As Hottest On Record By WMO", "summary": "The World Meteorological Organization (WMO) reported that the period from 2015 to 2025 was the hottest decade on record. The 'State of the Global Climate 2025' report noted that global temperatures were 1.43°C above pre-industrial levels. UN Secretary-General António Guterres stated the planet is in a state of emergency as key indicators like ocean heat and glacier melt hit record levels.", "category": "Environment", "page": 9, "importance": 9, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "Biogas Association Urges Delhi Government To Blend Biogas In CNG", "summary": "The Indian Biogas Association has suggested that the Delhi government pursue a 20 per cent blending of compressed biogas into CNG. The move is intended to bring vehicular mobility closer to carbon neutrality. The IBA argues that while EV adoption is increasing, existing CNG infrastructure can deliver immediate emissions reductions using the current fleet of vehicles.", "category": "Environment", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "Niti Aayog Retools Transport Report Favoring Electric Vehicles Over Hybrids", "summary": "NITI Aayog has revised its transport sector report following pushback from major automobile companies. The updated version favors Battery Electric Vehicles (BEVs) as the primary technology for decarbonization. It reduces the estimated driving distance needed for BEVs to offset manufacturing emissions and provides a stricter definition of Zero-Emission Vehicles based on lifecycle impact.", "category": "Environment", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "Delhi heatwave: Temperature hits 45 degrees as IMD issues red alert", "summary": "Temperatures in Delhi surged to 45.2 degrees Celsius as a severe heatwave gripped the capital. The India Meteorological Department has issued a red alert, warning of extreme conditions for several more days. The government has advised citizens to stay hydrated and avoid exposure to the sun during the hottest parts of the day.", "category": "Environment", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117932", "sources": [{"newspaper": "Indian Express", "pdf_filename": "cleaned_IE Delhi 24-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117932"}]}, {"headline": "Groundwater Levels in Kolar Rise Significantly Under K.C. Valley Project", "summary": "The Indian Institute of Science (IISc) reported that the K.C. Valley project has raised the water table in parts of Kolar to depths of 50-100 ft, up from 1,800 ft. Sustained monitoring since 2019 found no adverse impacts on water quality, soil, or public health. Revenue Minister Krishna Byre Gowda directed officials to monitor fish health and take action against illegal sewage discharge.", "category": "Environment", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117941", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -24-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117941"}]}, {"headline": "Over Seven Hundred Wildlife Trophies Surrendered to Karnataka Government", "summary": "Forest Minister Eshwar Khandre informed the Legislative Council that 192 individuals have surrendered 705 wildlife trophies following a government amnesty call. The surrenders followed a January 10 directive aimed at curbing illegal possession. The matter of trophy ownership is currently being deliberated in the High Court.", "category": "Environment", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117941", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -24-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117941"}]}, {"headline": "Hudsonian Godwit Population Plunges 95 Percent Due to Climate Change", "summary": "The Hudsonian godwit population has declined by 95% over four decades as climate change disrupts its 30,000 km annual migration. Shifting spring timings in the Arctic and habitat loss in South America are cited as primary causes. The species is now proposed for internati function buildPRow(ci) {
  const p=panels[ci],ai=p.artIdx;
  p.pRow.innerHTML='';
  p.articles.forEach((_,i)=>{
    const seg=document.createElement('div');
    seg.className='pseg'+(i<ai?' done':i===ai?' active':'');
    p.pRow.appendChild(seg);
  });
}

function syncV(ci,animated) {
  const p=panels[ci],h=p.vFeed.getBoundingClientRect().height;
  p.vTrack.style.transition=animated?'transform 0.35s cubic-bezier(0.4,0,0.2,1)':'none';
  p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;
  buildPRow(ci);
}

function goArt(d) {
  const p=panels[catIdx];
  const n=Math.max(0,Math.min(p.artIdx+d,p.articles.length-1));
  if(n===p.artIdx&&d!==0)return;
  p.artIdx=n; syncV(catIdx,true); dismiss();
}

function goCat(idx,animated=true) {
  idx=Math.max(0,Math.min(idx,sortedCats.length-1));
  if(idx===catIdx&&animated)return;
  const prev=catIdx; catIdx=idx;
  hTrack.style.transition=animated?'transform 0.38s cubic-bezier(0.4,0,0.2,1)':'none';
  hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;
  if(animated&&idx!==prev) {
    const m=CAT_META[sortedCats[idx]]||{color:"#e8334a",icon:"📰"};
    catFlash.style.background=m.color+'18';
    cfIcon.textContent=m.icon; cfName.textContent=sortedCats[idx]; cfName.style.color=m.color;
    catFlash.classList.add('on'); setTimeout(()=>catFlash.classList.remove('on'),500);
  }
  dismiss();
}

let dismissed=false;
function dismiss() {
  if(dismissed)return; dismissed=true;
  hintUp.classList.remove('visible'); hintRight.classList.remove('visible');
  hintUp.classList.add('gone'); hintRight.classList.add('gone');
}

(function initHints() {

  if(!localStorage.getItem(KEY)) {
    localStorage.setItem(KEY,'1');
    setTimeout(()=>{ if(!dismissed){ hintUp.classList.add('visible'); hintRight.classList.add('visible'); } },2500);
  }
})();

    const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height;
    const edge=(p.artIdx===0&&dy>0)||(p.artIdx===p.articles.length-1&&dy<0);
    p.vTrack.style.transform=`translateY(${-p.artIdx*h+dy*(edge?.14:1)}px)`;
  }
},{passive:false});
outer.addEventListener('touchend',()=>{
  if(!drag)return; drag=false;
  if(axis==='h'){
    const t=vpW*.2;
    if(tcX<-t)goCat(catIdx+1);
    else if(tcX>t)goCat(catIdx-1);
    else{hTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;}
  }else if(axis==='v'){
    const t=vpH*.2;
    if(tcY<-t)goArt(1);
    else if(tcY>t)goArt(-1);
    else{const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height;p.vTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;}
  }
  axis=null;
},{passive:true});

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'||e.key===' '){e.preventDefault();goArt(1);}
  if(e.key==='ArrowUp'){e.preventDefault();goArt(-1);}
  if(e.key==='ArrowRight'){e.preventDefault();goCat(catIdx+1);}
  if(e.key==='ArrowLeft'){e.preventDefault();goCat(catIdx-1);}
});
let wl=false;
outer.addEventListener('wheel',e=>{
  e.preventDefault();if(wl)return;wl=true;
  Math.abs(e.deltaX)>Math.abs(e.deltaY)?goCat(catIdx+(e.deltaX>0?1:-1)):goArt(e.deltaY>0?1:-1);
  setTimeout(()=>wl=false,500);
},{passive:false});
window.addEventListener('resize',()=>{
  vpW=outer.offsetWidth;vpH=outer.offsetHeight;
  hTrack.style.transition='none';
  hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;
  panels.forEach(p=>{
    const h=p.vFeed.getBoundingClientRect().height;
    p.vTrack.querySelectorAll('.card').forEach(c=>c.style.height=h+'px');
    p.vTrack.style.transition='none';
    p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;
  });
});

buildAll();
</script>
</body>
</html>
