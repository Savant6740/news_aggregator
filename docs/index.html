tance": 5, "telegram_url": "https://t.me/c/1877410077/117673", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_21-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117673"}]}, {"headline": "भू-राजनीतिक अनिश्चितता के कारण रेजरपे का IPO टला", "summary": "रेजरपे के सह-संस्थापक शशांक कुमार ने बताया कि कंपनी का आईपीओ भू-राजनीतिक अनिश्चितता के कारण कुछ तिमाहियों के लिए टल गया है। उन्होंने AI एजेंट स्टूडियो की बात की, जिसे वे 'एजेंट इकॉनमी' का भविष्य मानते हैं, जो पारंपरिक सर्च से बेहतर तरीके से काम करेगा और एसएमबी के लिए फायदेमंद होगा।", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117673", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_21-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117673"}]}, {"headline": "बाजार में उतार-चढ़ाव से PE, HNI की शेयर बिक्री पर विराम", "summary": "ईरान संघर्ष, कच्चे तेल की कीमतों में तेज उछाल और FPIs की बिकवाली जैसे कारकों के चलते बाजार में उतार-चढ़ाव से प्राइवेट इक्विटी (PE) फर्मों और उच्च नेटवर्थ वाले व्यक्तियों (HNIs) द्वारा ब्लॉक ट्रेड में शेयर बिक्री रुक गई है। लगभग ₹6 लाख करोड़ के शेयर, जिनकी लॉक-इन अवधि समाप्त हो रही है, प्रभावित हो सकते हैं।", "category": "Business", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117673", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_21-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117673"}]}, {"headline": "सीएमपीडीआईएल के IPO को पहले दिन 7% बोलियां मिलीं", "summary": "कोल इंडिया की सहायक कंपनी, सेंट्रल माइन प्लानिंग एंड डिजाइन इंस्टीट्यूट लिमिटेड (CMPDIL) के आरंभिक सार्वजनिक निर्गम (IPO) को शुक्रवार को पहले दिन 7% बोलियां मिलीं। खुदरा व्यक्तिगत निवेशकों की श्रेणी में 10% आवेदन मिले, जबकि गैर-संस्थागत निवेशकों के लिए निर्धारित श्रेणी में 5% बोलियां मिलीं।", "category": "Business", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117673", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_21-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117673"}]}, {"headline": "दुर्लभ खनिजों को बढ़ावा देने के लिए सरकार ने बोलियां आमंत्रित कीं", "summary": "सरकार ने ₹7,280 करोड़ की योजना के तहत दुर्लभ खनिज (चुंबक) विनिर्माण संयंत्र स्थापित करने के लिए बोलियां आमंत्रित की हैं। इसका उद्देश्य 6,000 टन प्रति वर्ष (MTPA) क्षमता की एकीकृत नियोडिमियम-आयरन-बोरोन (NdFeB) दुर्लभ खनिज इकाईयों की स्थापना करना है, जिससे आयात निर्भरता कम होगी।", "category": "Business", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117673", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_21-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117673"}]}, {"headline": "एयर इंडिया का वैंकूवर जा रहा विमान नियामक मंजूरी न होने पर लौटा", "summary": "एयर इंडिया की वैंकूवर जा रही एक उड़ान को नियामक मंजूरी न होने के कारण दिल्ली लौटना पड़ा। बोइंग 777-200एलआर विमान को उस मार्ग पर उड़ान भरने की अनुमति नहीं थी, जो हिमालयी क्षेत्रों से होकर गुजरता है। यह घटना नियामक अनुपालन में एयरलाइन की पिछली खामियों को दर्शाती है।", "category": "Business", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117673", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_21-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117673"}]}, {"headline": "NIACL OCL Products India में ट्रेडिंग वॉल्यूम 66 गुना बढ़ा", "summary": "एनआईएसीएल ओसीएल प्रोडक्ट्स इंडिया में बीएसई पर दो सप्ताह के औसत से 66 गुना अधिक ट्रेडिंग वॉल्यूम देखा गया। शेयर ₹351.8 पर बंद हुआ, जो पिछले बंद भाव ₹307.8 से 14.3% अधिक है।", "category": "Business", "page": 6, "importance": 2, "telegram_url": "https://t.me/c/1877410077/117673", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_21-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117673"}]}, {"headline": "सीसीएल प्रोडक्ट्स इंडिया ने नया रिकॉर्ड उच्च स्तर छुआ", "summary": "सीसी ices by 0.5% from April 1", "summary": "Tata Motors Passenger Vehicles Ltd will increase prices across its internal combustion engine (ICE) portfolio by a weighted average of 0.5%, effective April 1. The hike, varying by model and variant, is aimed at partially offsetting rising input costs and sustained inflationary pressures, joining other automakers recalibrating pricing.", "category": "Business", "page": 2, "importance": 3, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Audi debuts performance SUV SQ8 in India at ₹1.78 crore", "summary": "German luxury carmaker Audi launched its SQ8 performance SUV in India, priced at ₹1.78 crore. Positioned between the Q8 and RS Q8, it features a 4.0-litre twin-turbo V8 engine producing 507 bhp and 78.5 kg-m, paired with quattro all-wheel drive. The cabin includes premium tech and S-specific styling.", "category": "Business", "page": 4, "importance": 2, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "New Renault Duster returns to India, starting at ₹10.28 lakh", "summary": "Renault has reintroduced the Duster mid-size SUV in India, with prices starting at ₹10.28 lakh. Based on the CMF-B platform, it offers multiple powertrains including 1.0-litre and 1.3-litre turbo-petrol engines, and a strong hybrid option expected by Diwali 2026. Features include 212 mm ground clearance and advanced driver assistance systems.", "category": "Business", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Kawasaki Z900 gets substantial overhaul, steps up VFM quotient", "summary": "Kawasaki's Z900 receives a substantial overhaul, retaining its naked streetfighter styling while becoming more lithe. Upgrades include premium switchgear, a new 5-inch TFT console, ride modes, cruise control, and a two-way quickshifter. Priced at ₹9.99 lakh (ex-showroom), it offers accessible inline-four performance with improved brakes and Dunlop Sportmax Q5A tyres.", "category": "Business", "page": 4, "importance": 2, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Goldman Sachs, ICICI PruMF buy 43.4 lakh DLF shares", "summary": "Goldman Sachs and ICICI Prudential Mutual Fund collectively bought over 43.40 lakh shares of real estate major DLF for nearly ₹231 crore through open market transactions. Shares were acquired at an average price of ₹531.7. Best Investment Corporation and Baillie Gifford funds were the sellers.", "category": "Business", "page": 5, "importance": 3, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Polite Powertech files IPO papers with SEBI for funds", "summary": "Polite Powertech, an integrated power infrastructure EPC company, has filed its Draft Red Herring Prospectus (DRHP) with SEBI for an IPO. The offering includes a fresh issue of one crore equity shares and an offer for sale of 25 lakh equity shares. Proceeds will fund working capital and general corporate purposes.", "category": "Business", "page": 5, "importance": 2, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Coal India's CMPDI issue subscribed 7% on Day 1", "summary": "Central Mine Planning & Design Institute (CMPDIL), a Coal India subsidiary, saw a subdued response on its first day of bidding for its public offering, subscribed just 0.07 times or 7%. The ₹1,842-crore IPO is priced at ₹163-172 per share, with proceeds going to the parent company.", "category": "Business", "page": 5, "importance": 3, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "MSMEs must prioritize quality, innovation for India's global competitiveness", "summary": "Venu Srinivasan, Chairman Emeritus of TVS Motor Company and IFQM, stressed the importance of quality, innovation, and excellence for MSMEs to drive India's overall development and global competitiveness. The IFQM, an industry-led organization, aims to catalyse Indian companies, including MSMEs, to embrace quality and R&D.", "category": "Business", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "SBI receives ₹6,337.5 crore income tax demand", "summary": "State Bank of India (SBI) received an income tax demand of ₹6,337.5 crore, including interest, for Assessment Year 2023-24. The order was issued under Section 143(3) of the Income Tax Act, 1961, following scrutiny assessment proceedings, with disallowances made on various grounds.", "category": "Business", "page": 7, "importance": 4, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "West Asia crisis impacts orthodox tea market at Kochi auctions", "summary": "The West Asia crisis has started affecting orthodox tea markets at Kochi auctions, with average prices declining by around ₹10 per kg. Exporters to CIS and neighbouring countries showed interest, but West Asia buyers were selective. CTC dust market also ruled lower. Traders attribute subdued domestic buying to LPG shortage affecting eateries.", "category": "Business", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Apitoria Pharma facility receives 'voluntary action indicated' from USFDA", "summary": "An API manufacturing facility of Apitoria Pharma, a wholly-owned subsidiary of Aurobindo Pharma in Pashamylaram, received an establishment inspection report from the USFDA. The facility was classified as ‘voluntary action indicated,’ meaning the inspection is now \"closed\" without official action.", "category": "Business", "page": 10, "importance": 3, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Anand Mahindra's leadership selection: curiosity, risk, and enabling others", "summary": "Anand Mahindra selects top leaders through 90-minute unstructured conversations, focusing on curiosity and how leaders behave unsupervised. His \"ESEE\" framework (envision, structure, enable, energise) guides leadership, risk, and execution. He champions \"asymmetric risk-taking\" and building a culture where employees feel enabled to rise, not just achieve personal legacy.", "category": "Business", "page": 10, "importance": 4, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "HDFC Bank Sacks Three Executives Over AT1 Bond Mis-selling", "summary": "HDFC Bank terminated three senior executives following an internal probe into the mis-selling of Additional Tier-1 (AT1) bonds at its Dubai branch. The action comes after chairman Atanu Chakraborty resigned citing ethical misalignment. The probe suggested that investors were encouraged to move FCNR deposits from India to Bahrain to purchase the high-yield debt products.", "category": "Business", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "Zetwerk to File for $550 Million IPO in Two Weeks", "summary": "Contract manufacturing major Zetwerk is set to confidentially file for its initial public offering (IPO) within the next two weeks. The company plans to raise up to $550 million at a valuation of approximately $4 billion. Kotak Investment Banking, Goldman Sachs, and JP Morgan are among the lead managers for the issue, which follows a strong year for the manufacturing sector.", "category": "Business", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "Ola Electric Reallocates Rs 575 Crore IPO Funds to Debt", "summary": "Ola Electric has received board approval to reallocate Rs 575 crore from its IPO proceeds. The funds, originally earmarked for research and development and growth initiatives, will now be used to pare debt. This move comes as the company faces a sharp decline in sales and market share in the electric two-wheeler segment, which is currently dominated by TVS and Bajaj.", "category": "Business", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "Zomato Hikes Platform Fee to Rs 17.58 Per Order", "summary": "Food delivery platform Zomato has increased its platform fee to Rs 17.58 per order, including GST. This marks a significant rise from the previous fee of approximately Rs 15. The company aims to improve its take-rate and reach profitability targets. Rival Swiggy currently maintains a lower platform fee of Rs 14.99, though Zomato expects to maintain order volumes despite the hike.", "category": "Business", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "Flipkart Group CFO Sriram Venkataraman to Step Down", "summary": "Flipkart Group CFO Sriram Venkataraman is stepping down after nearly eight years with the Walmart-owned e-commerce giant. His departure comes as the company evaluates its IPO plans for next year. Nishant Verman has been appointed as the new vice president of corporate development to oversee strategic partnerships and the company's public listing preparations.", "category": "Business", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "Indian Spice Exporters Face Crisis as US Buyers Withdraw", "summary": "Indian spice exporters are facing a sharp decline in orders from the US following reports of quality concerns and regional war risks. Exports of pepper and cardamom have been particularly hit, with shipments worth $500 million annually at risk. Exporters are now looking at alternative markets in Europe and Southeast Asia to dispose of excess domestic stock.", "category": "Business", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "Goldman Sachs CEO Forecasts Rebound in Global Dealmaking", "summary": "Goldman Sachs CEO David Solomon predicts a recovery in global mergers and acquisitions (M&A) despite the ongoing West Asia conflict. Solomon noted that corporate leaders are becoming more confident in the economic outlook and are looking to deploy capital for strategic growth. However, he cautioned that private credit markets may face increased scrutiny from regulators.", "category": "Business", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "Rupee crashes past 93 per dollar amid West Asia conflict", "summary": "The Indian rupee recorded a significant single-day fall of 108 paise to close at an all-time low of 93.71 against the US dollar. The decline was triggered by escalating crude oil prices, which reached $118 per barrel, and persistent foreign portfolio investor outflows. Markets remain cautious as geopolitical instability in West Asia pressures global risk sentiment and domestic liquidity.", "category": "Economy", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/117689", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_TH BL Delhi 21~03~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117689"}]}, {"headline": "Auto PLI payouts under 10% as 2028 deadline nears", "summary": "The ₹25,938 crore automotive production-linked incentive (PLI) scheme has disbursed only ₹2,321 crore, less than 10% of its allocation. Challenges in meeting the 50% domestic value addition requirement, particularly for EV battery cells and power electronics, have slowed disbursements. The government reduced its FY26 allocation for the scheme to ₹2,091 crore in the revised estimates.", "category": "Economy", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117689", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_TH BL Delhi 21~03~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117689"}]}, {"headline": "New Income Tax Act to focus on ethical framework", "summary": "Finance Minister Nirmala Sitharaman announced that the new Income Tax Act, 2025, must be rooted in ethics and moral systems. The revised code reduces sections from 819 to 536 and will take effect on April 1. Key changes include transaction-level capital gains reporting and the inclusion of cities like Bengaluru and Hyderabad in the 50% metro HRA category to align with rapid urbanisation.", "category": "Economy", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117689", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_TH BL Delhi 21~03~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117689"}]}, {"headline": "PMO directs measures to combat potential fertilizer shortage", "summary": "The Prime Minister's Office has asked the Agriculture Ministry to prepare for potential shortages of fertilizers and chemicals due to the prolonged West Asia conflict. Industry experts have suggested focusing on bionutrition and bio-additives to reduce dependency on petroleum-sourced chemicals. The move comes amid concerns that El Nino could also impact the upcoming kharif sowing season.", "category": "Economy", "page": 8, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117689", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_TH BL Delhi 21~03~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117689"}]}, {"headline": "Telangana's per capita income rises to ₹4.19 lakh", "summary": "Telangana's per capita income reached ₹4,18,931 in 2025-26, which is 1.9 times the national average. The state's GSDP grew by 10.7% at current prices, reaching ₹17.82 lakh crore. Deputy CM Mallu Bhatti Vikramarka noted that IT exports reached ₹3.13 lakh crore, generating nearly 9.4 lakh jobs. The state aims to become a $3 trillion economy by 2047 through special sector-wise development plans.", "category": "Economy", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117689", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_TH BL Delhi 21~03~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117689"}]}, {"headline": "Labour Ministry considers social security cover for 32 crore workers", "summary": "The Union Labour and Employment Ministry is examining domestic and global models to provide insurance cover to 32 crore unorganised, gig, and platform workers. The proposed scheme, under the four Labour Codes, may involve worker contributions supplemented by government subsidies. The ESIC is conducting impact analysis to arrive at a sustainable funding structure for health and life benefits.", "category": "Economy", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117689", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_TH BL Delhi 21~03~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117689"}]}, {"headline": "WTO adopts mechanism to track trade concerns for transparency", "summary": "The World Trade Organization has implemented a new standing agenda to track the resolution of trade concerns raised by member countries. The system will allow members to update the Committee on Market Access on previously raised issues, including India's import restrictions and the EU's Carbon Border Adjustment Mechanism. Explicit confirmation will now be required to mark a concern as resolved.", "category": "Economy", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117689", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_TH BL Delhi 21~03~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117689"}]}, {"headline": "India raises fuel prices as global crude oil tops $100", "summary": "State-run oil marketing companies have increased industrial diesel prices by ₹22 per litre and premium petrol by ₹2 per litre. The move follows rising global crude prices above $100 per barrel due to the West Asia conflict. Prices for regular transport fuels and domestic cooking gas remain unchanged for now to manage broader inflation and consumer impact.", "category": "Economy", "page": 16, "importance": 10, "telegram_url": "https://t.me/c/1877410077/117677", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_21-03-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/117677"}]}, {"headline": "Indian rupee falls past 93 against US dollar for first time", "summary": "The Indian rupee hit a record low of 93.70 against the US dollar on Friday, depreciating over ₹1.07 in a single day. The decline is attributed to a global oil shock and escalating West Asia tensions. The currency has lost 3% since the conflict began, putting significant pressure on India's current account deficit and national inflation outlook.", "category": "Economy", "page": 16, "importance": 10, "telegram_url": "https://t.me/c/1877410077/117677", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_21-03-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/117677"}]}, {"headline": "Indian farmers shift from cotton to rice and maize", "summary": "Cotton acreage in India has dropped by nearly 20% to 11.2 million hectares since 2019-20 as farmers switch to crops with more stable returns. Volatile yields and pest attacks have driven a shift toward rice and maize. The government has allocated ₹500 crore to a new Cotton Mission to improve productivity and technology in the sector.", "category": "Economy", "page": 13, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117677", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_21-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/117677"}]}, {"headline": "India's economy shows resilience, aims for sustainable growth", "summary": "India's economy is demonstrating resilience amidst global challenges. The government is focused on structural reforms and sustainable growth strategies, targeting key sectors for development.", "category": "Economy", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "RBI keeps repo rate unchanged, maintains accommodative stance", "summary": "The Reserve Bank of India (RBI) announced its decision to keep the repo rate unchanged at 4 per cent, while maintaining an accommodative monetary policy stance to support economic recovery.", "category": "Economy", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "Global inflation concerns persist, central banks tighten monetary policy", "summary": "Global inflation rates remain a significant concern, prompting central banks worldwide to tighten monetary policies. This could lead to slower economic growth globally.", "category": "Economy", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "India's services sector expands further", "summary": "India's services sector continued its expansion in September, with strong growth in new business and output. The sector remains a key driver of economic activity.", "category": "Economy", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "Retail inflation eases slightly in September", "summary": "India's retail inflation eased slightly in September to 7.41% from 7.7% in August, primarily due to a moderation in food prices. However, it remains above RBI's target.", "category": "Economy", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "China's economy faces headwinds, growth slows", "summary": "China's economic growth has slowed down due to lingering COVID-19 restrictions and property sector challenges. The government is implementing measures to boost domestic demand.", "category": "Economy", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "European Central Bank raises interest rates", "summary": "The European Central Bank (ECB) has raised its key interest rates to combat rising inflation in the Eurozone. This move signals a shift towards tighter monetary policy.", "category": "Economy", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "US inflation shows signs of cooling", "summary": "Recent data indicates a slight cooling in US inflation, although it remains elevated. Federal Reserve officials are closely monitoring the situation.", "category": "Economy", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "World Bank warns of global recession risks", "summary": "The World Bank has warned of increasing risks of a global recession, citing persistent inflation, tightening monetary policies, and geopolitical tensions.", "category": "Economy", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "Central banks eye coordinated action on inflation", "summary": "Global central banks are considering coordinated actions to address persistent inflation. Discussions are underway to ensure policy alignment and minimize negative impacts.", "category": "Economy", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "India's trade deficit widens in September", "summary": "India's trade deficit widened in September, primarily due to increased imports. Exports also saw a growth, but at a slower pace than imports.", "category": "Economy", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "Global food prices remain high", "summary": "Global food prices continue to remain at high levels, contributing to food insecurity in several regions. Supply chain issues and geopolitical factors are key drivers.", "category": "Economy", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "US Fed signals further interest rate hikes", "summary": "The US Federal Reserve has signaled its intention to continue raising interest rates to control inflation. This could lead to higher borrowing costs globally.", "category": "Economy", "page": 5, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "India's foreign exchange reserves decline", "summary": "India's foreign exchange reserves have seen a decline, influenced by the RBI's intervention to support the rupee and valuation changes. Reserves remain substantial.", "category": "Economy", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "Global energy prices stabilize", "summary": "Global energy prices have shown signs of stabilization after a period of volatility. However, geopolitical factors continue to pose risks to market stability.", "category": "Economy", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "World leaders meet to discuss global economic outlook", "summary": "World leaders are convening to discuss the global economic outlook and address pressing challenges. Key topics include inflation, growth prospects, and supply chain resilience.", "category": "Economy", "page": 7, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "Global commodity prices fluctuate", "summary": "Global commodity prices are experiencing fluctuations, influenced by supply-demand dynamics and geopolitical events. Energy and metal prices are particularly volatile.", "category": "Economy", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "Global economic growth forecast revised downwards", "summary": "International organizations have revised their global economic growth forecasts downwards, citing persistent inflation and geopolitical risks. A slowdown is anticipated.", "category": "Economy", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "New guidelines for cryptocurrency regulation proposed", "summary": "Proposed guidelines for cryptocurrency regulation are being discussed, aiming to address concerns related to financial stability and investor protection.", "category": "Economy", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headli inflation expectations", "summary": "Central banks are actively managing inflation expectations through clear communication and policy actions. Maintaining price stability is a primary objective.", "category": "Economy", "page": 19, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 19, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "WTO warns of trade slowdown", "summary": "The World Trade Organization (WTO) has warned of a slowdown in global trade growth, citing economic uncertainties and protectionist policies.", "category": "Economy", "page": 20, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "Global debt levels raise concerns", "summary": "Global debt levels are raising concerns among economists and policymakers. Managing debt sustainably is critical for financial stability.", "category": "Economy", "page": 21, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 21, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "RBI's foreign exchange management strategy", "summary": "The RBI's strategy for managing foreign exchange reserves is aimed at maintaining stability. Interventions are used judiciously to manage currency fluctuations.", "category": "Economy", "page": 23, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 23, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "Global economic fragmentation risks", "summary": "Risks of global economic fragmentation are
