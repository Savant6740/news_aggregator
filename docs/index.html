e king's U.S. state visit.", "category": "Culture", "page": 18, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "ccdf498e"}, {"headline": "Israel raids Gaza aid flotilla, ‘kidnaps’ crew members in international waters", "summary": "Organizers of a Gaza-bound aid flotilla alleged Israel's army \"kidnapped\" 211 activists, including a Paris city councilor, in a raid over 1,000 km from the Gaza Strip. Israel's Foreign Ministry dismissed the initiative as a \"condom flotilla\" and said more than 20 ships were heading peacefully to Israel.", "category": "World", "page": 18, "importance": 8, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "fdcc6c56"}, {"headline": "U.K. police probe stabbing attack on two Jewish men as terrorism", "summary": "British police are investigating a stabbing attack on two Jewish men in north London as an act of terrorism, amidst rising antisemitism. Prime Minister Keir Starmer pledged increased security. The suspect, with a history of violence and mental health issues, was previously referred to a de-radicalization program.", "category": "Law", "page": 18, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "05a49b8a"}, {"headline": "Trump tells German Chancellor Merz to focus on Ukraine war", "summary": "U.S. President Donald Trump renewed his criticism of German Chancellor Friedrich Merz, urging him to focus on ending the Ukraine war and fixing Germany's immigration and energy issues, rather than \"interfering\" on Iran. This follows Trump's threat to redeploy U.S. troops from Germany.", "category": "World", "page": 18, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "497f24c2"}, {"headline": "Royals coach Sangakkara addresses controversies, highlights team culture", "summary": "Rajasthan Royals head coach Kumar Sangakkara acknowledged controversies, including fines for manager Romi Bhinder and captain Riyan Parag, stating they are \"no positives for the team.\" He emphasized the importance of maintaining team culture and said both issues were addressed by BCCI and the franchise.", "category": "Sports", "page": 19, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 19, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "fa74c1c7"}, {"headline": "PSG’s Hakimi to miss CL second leg due to injury", "summary": "Paris Saint-Germain defender Achraf Hakimi will miss the return leg of the Champions League semifinal against Bayern Munich due to a right thigh injury sustained during the first leg. He is expected to be out for several weeks.", "category": "Sports", "page": 20, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "807cd1cc"}, {"headline": "West Bengal gymnasts win junior women’s team gold", "summary": "West Bengal won the junior women's team gold medal at the National artistic gymnastics championships in Bhubaneswar. The team scored 172.433 points, ahead of Maharashtra and Tripura.", "category": "Sports", "page": 20, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "8638b642"}, {"headline": "Fazila Ikwaput's strike helps East Bengal defeat Sethu in IWL", "summary": "East Bengal FC secured a 1-0 victory over Sethu FC in the Indian Women’s League (IWL) at their home ground. Fazila Ikwaput scored the lone goal in the 64th minute, earning three points for the league topper.", "category": "Sports", "page": 20, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "32a92436"}, {"headline": "India faces Taiwan in Thomas Cup quarterfinals for semifinal spot", "summary": "India will compete against a formidable Taiwan in the Thomas Cup quarterfinals. India finished second in Group A after beating Canada and Australia but losing to China. Youngster Ayush Shetty has won all his matches, while veterans Prannoy and Srikanth have performed well.", "category": "Sports", "page": 20, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "c99d86c6"}, {"headline": "Pace bowlers dominate IPL 2026 amid batting carnage", "summary": "Despite an IPL season dominated by batting with numerous 200+ scores, pace bowlers are leading the wicket-takers' leaderboard. The article highlights the struggles of Jasprit Bumrah contrasting with the successes of seasoned pacers like Bhuvneshwar Kumar and Josh Hazlewood, who have adapted their skills to the T20 format's demands.", "category": "Sports", "page": 21, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 21, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "087abe19"}, {"headline": "Residential segregation shapes public health access in India", "summary": "A working paper reveals high residential segregation among Muslims and Scheduled Castes in India, closely tied to unequal access to basic public services like health centres and piped water. This spatial exclusion, often invisible at policy levels, leads to limited care, higher disease risks, and worse health outcomes for marginalized communities.", "category": "Health", "page": 22, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 22, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "3c8bdf24"}, {"headline": "K'taka govt clears Rs 18k-cr GBA suburban township project", "summary": "Karnataka government approved the Rs 18,000-crore Greater Bengaluru suburban township, spanning 7,481 acres. The project requires 6,650 acres from private parties, with the government guaranteeing Rs 7,500 crore from Hudco. Compensation is over Rs 2 crore per acre or developed land.", "category": "Infrastructure", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "04cc0dcb"}, {"headline": "Six get death in Koppal BJP neta’s murder case", "summary": "A Koppal court sentenced six persons to death and fined them Rs 3 lakh each for the premeditated murder of BJP Yuva Morcha city unit president Venkatesh Kurubar in Oct 2025. Six others were acquitted due to lack of evidence. The convicts can appeal to the high court.", "category": "Law", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "c832b6da"}, {"headline": "Petitioner: CBI arresting only ADAG officials, not kingpin", "summary": "A petitioner complained to the Supreme Court that CBI and ED are only arresting officials of Anil Dhirubhai Ambani Group (ADAG) companies, not the alleged kingpin, in a Rs 40,000 crore bank loan siphoning probe. SG Tushar Mehta stated new facts emerged, delaying probe completion.", "category": "Law", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "7bbd6c19"}, {"headline": "Girls now outnumber boys in education: NSO data", "summary": "NSO data shows girls outnumber boys at all education levels in India, from school to higher education. Female GER in higher education rose to 30.2%, exceeding male GER. However, participation remains low in STEM fields, and average years of schooling for women is 7.4 years vs 8.4 years overall.", "category": "Education", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "f87dd036"}, {"headline": "Bombay HC orders Rs 25k payout for illegal arrest", "summary": "Bombay High Court ordered Maharashtra government to pay Rs 25,000 compensation to a 70-year-old man for illegal arrest. The court cited Supreme Court directions that police must inform arrestees of grounds in writing, emphasizing stringent punishment for police violating the law.", "category": "Law", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "5c119ae2"}, {"headline": "UP govt ordered Rs 2L payout in ‘beef’ truck seizure", "summary": "Allahabad High Court ordered UP government to pay Rs 2 lakh compensation to a Baghpat resident whose truck was illegally seized over an unproven beef allegation. The court quashed seizure orders and directed vehicle release, highlighting serious economic loss, as veterinary exams didn't confirm the meat as beef.", "category": "Law", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "21b2d51b"}, {"headline": "Flamingos extend stay at Nashik bird sanctuary", "summary": "Thousands of flamingos have unexpectedly extended their stay at Nandur Madhyameshwar bird sanctuary in Nashik, transforming it pink. Their late April arrival, typically by March, signals a conservation victory, credited to sustained water levels and abundant algae. The sanctuary, ‘Bharatpur of Maharashtra’, has seen a surge in visitors.", "category": "Environment", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "8c3d9d29"}, {"headline": "SC to AIIMS: Can't force 15-year-old to be mother", "summary": "The Supreme Court criticized AIIMS Delhi for repeatedly seeking reconsideration of its order for termination of a 15-year-old girl's 30-week pregnancy, citing health hazards. The bench stated government must respect a citizen’s autonomy of choice and cannot burden a minor with motherhood and lifelong stigma.", "category": "Law", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "aca0bc27"}, {"headline": "India’s crude imports 85% of Feb level in April", "summary": "India imported 4.4 million barrels a day (mbd) of crude in April, marginally lower than March and 85% of February shipments, amidst Strait of Hormuz disruptions. Russia remained the largest source (1.6 mbd), followed by Saudi Arabia and UAE. India resumed imports from Iran and Venezuela to plug gaps from other West Asian nations.", "category": "Economy", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "14161942"}, {"headline": "ICSE student scores 94.8% while on chemotherapy", "summary": "Vaibhav Mahapatra, a student at Primus Public School, scored an outstanding 94.8% in ICSE exams despite battling acute lymphoblastic leukaemia and undergoing chemotherapy for two years. His school streamed live classes and arranged special sessions. Vaibhav plans to pursue science and return to regular offline classes.", "category": "Education", "page": 5, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "25c8429b"}, {"headline": "Science high scorer chose subject accidentally", "summary": "Victor Manoj (99.5%) from St Joseph’s Boys High School, a Class XII science topper, initially intended for Commerce but switched to science, finding it interesting. He aims for independence and creative freedom, planning to expand his family’s publishing distribution business.", "category": "Education", "page": 5, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "de8b5742"}, {"headline": "Topper takes gap year for NEET medicine prep", "summary": "Keerthana Rajesh (99.5%) from St Patrick’s Academy decided to take a gap year for intensive NEET preparation to pursue medicine, an interest shaped early by her grandmother. She credited consistent study habits and extensive practice for her Class XII success.", "category": "Education", "page": 5, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "e3e9d2a6"}, {"headline": "Topper balances CLAT and board exams", "summary": "Vidhita Dhamija (98.75%) from Vibgyor High achieved a CLAT score of 25 and awaits NLSIU admission, having balanced law entrance preparation with Commerce board exams. Her interest in law developed through Model United Nations conferences during school.", "category": "Education", "page": 5, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "0a3a3416"}, {"headline": "Space fascinates ICSE topper, aims for astrophysics", "summary": "Sriyagvi Bongisvan (99.8%) from Vibgyor High, Whitefield, is fascinated by space and preparing for JEE, hoping to pursue astrophysics. She emphasized consistent, conceptual understanding and a balanced routine across subjects for her ICSE success.", "category": "Education", "page": 5, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "da6c044c"}, {"headline": "Topper chooses unconventional path, studies international relations", "summary": "Aarohii Prasanna Oke (99.5%) from Bethany High School will join Ashoka University for economics and international relations. She chose humanities, valuing reading newspapers and learning about world issues and geopolitics over a conventional engineering path.", "category": "Education", "page": 5, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "f5899787"}, {"headline": "Happy Streets returns to Nandini Layout Sunday", "summary": "The Times of India's Happy Streets event returns to Nandini Layout Sunday, May 3, transforming the street into a vehicle-free zone. Activities include yoga, Zumba, dance, music, and martial arts, alongside quizzes and draws, promoting fitness, recreation, and community interaction.", "category": "Culture", "page": 5, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "b872c69f"}, {"headline": "Machine operator crushed to death in Bommasandra", "summary": "A 33-year-old machine operator, Khemlal Newar Pradhan, was crushed to death in a die-casting machine at Dimo Castings. A complaint alleged negligence, stating safety measures failed and no adequate precautions were in place for dangerous machinery. Police registered a case.", "category": "India", "page": 5, "importance": 2, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "9761e361"}, {"headline": "Community unites to save Bookworm after flood", "summary": "After heavy rain flooded The Bookworm on Church Street, damaging over 5,000 books, the community, including students, customers, and booksellers, united to help clean up. Owners declined monetary donations, preferring book donations or purchasing water-damaged books.", "category": "Culture", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "277b796a"}, {"headline": "Vulnerable city locations being mapped for safety: DKS", "summary": "Deputy CM DK Shivakumar announced vulnerable locations across Bengaluru are being identified and mapped, focusing on clearing encroachments and strengthening monitoring after Wednesday's rain. He instructed civic agencies to fix potholes, clear debris, and desilt stormwater drains. CM Siddaramaiah ordered eviction of street vendors.", "category": "Infrastructure", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "9ff2f236"}, {"headline": "Bengaluru's 11cm rain could fill 30k pools, 2/3rds of lakes", "summary": "Bengaluru received over 11cm of rain in an hour, estimated at 0.75 tmcft, enough to fill 30,000 swimming pools or two-thirds of the city’s lakes. Experts lamented this as a missed opportunity for water harvesting, as most ran off due to paved surfaces and reduced lake capacities.", "category": "Environment", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "395c82e0"}, {"headline": "Evicted hawkers question future after hospital wall collapse", "summary": "Hundreds of street vendors near Bowring Hospital were rattled by the government's eviction order following a wall collapse. They questioned their livelihood and lack of designated hawking zones, blaming lapses in civil work rather than their presence for the incident.", "category": "India", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "cefe854a"}, {"headline": "Rs 200 loan saves vendor from wall collapse tragedy", "summary": "A Rs 200 loan saved street vendor Naseer Ahmed from the Bowring Hospital wall collapse tragedy; his colleague, Naseemullah, who lent the money, died. Naseer, who usually came daily, skipped Wednesday due to heat and dull business, an unexplained decision that saved his life.", "category": "India", "page": 6, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "83e69135"}, {"headline": "KR Circle underpass floods again, raises safety concerns", "summary": "The KR Circle underpass in Bengaluru, where a software engineer drowned in May 2023, flooded again with over 12ft of rainwater. Pumping operations struggled, exacerbated by run-off from elevated areas. The Lokayukta is set to reopen its probe, as repeated flooding indicates earlier mitigation measures were ineffective.", "category": "Infrastructure", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "91faae22"}, {"headline": "Hailstorm damages AG’s chamber in HC building", "summary": "The hailstorm on Wednesday damaged Karnataka's advocate general's chamber in the 168-year-old high court building. Rainwater gushed in through the roof, damaging electronic devices and documents. Leaks were also reported in judges' chambers and other sections of the high court.", "category": "Law", "page": 6, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "ea1a34c1"}, {"headline": "Namma Metro records highest ridership amid rain", "summary": "Namma Metro recorded its highest single-day ridership on Wednesday, with over 12.8 lakh passengers using its services amidst heavy rain and slow-moving road traffic in Bengaluru. This surpasses the previous record of 10.8 lakh passengers and includes 2.5 lakh commuters using interchange stations.", "category": "Infrastructure", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "9b135472"}, {"headline": "Bengaluru property tax rebate deadline extended", "summary": "Karnataka government extended the deadline to avail a 5% rebate on property tax for the 2026-27 fiscal year to May 31. The extension applies to all taxpayers within the Greater Bengaluru Authority's five city municipal corporations who pay their total annual tax in a single instalment.", "category": "Economy", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "0d7f3800"}, {"headline": "Speeding car kills calf on KSRP service road", "summary": "A speeding car fatally struck a month-old calf on the KSRP service road near Koramangala Tuesday. Constable Shilpa TM responded, but eyewitnesses were unable to identify the vehicle or its registration number.", "category": "India", "page": 6, "importance": 1, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "a0ff7273"}, {"headline": "Bengaluru-Jolarpettai Memu trains partially cancelled", "summary": "Due to engineering works in Chennai division of Southern Railway, the KSR Bengaluru-Jolarpettai Memu train and its return service will be partially cancelled between Somanayakanpatti and Jolarpettai stations on May 5, 7, and 12.", "category": "Infrastructure", "page": 6, "importance": 2, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "c404aac3"}, {"headline": "Two youths caught with 23kg ganja at SMVT", "summary": "Two youths from West Bengal, Rimnujaman Minya and Arif Sekh, were arrested at Sir M Visvesvaraya Terminal (SMVT) railway station after 23.6kg of dry ganja, valued at Rs 11.8 lakh, was found in their trolley bags by Railway Protection Force.", "category": "Law", "page": 6, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "95167ae8"}, {"headline": "Commuters urge KSRTC to increase inter-state bus fleet", "summary": "Commuters are urging KSRTC to increase its inter-state bus fleet connecting Karnataka and Andhra Pradesh due to acute shortages, forcing reliance on private operators. KSRTC plans to induct 1,500 buses in FY27, as daily passenger volume climbed to 34.8 lakh after the Shakti scheme.", "category": "Infrastructure", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "f0aab348"}, {"headline": "HC stays cow theft case, criticizes police", "summary": "The Karnataka High Court stayed proceedings in a cow theft case against a family, criticizing police for registering \"real crimes\" late while acting promptly on a 20-month-delayed cow theft complaint. Justice M Nagaprasanna observed significant delay without plausible explanation.", "category": "Law", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "3cc557f8"}, {"headline": "K'taka govt eyes CET retest for 5 students", "summary": "Karnataka government is considering offering a retest to five students who were asked to remove religious symbols during the Karnataka Common Entrance Test (KCET). One girl missed physics paper due to hijab removal, and four boys were affected by sacred thread removal. Grace marks were ruled out.", "category": "Education", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "70a0a116"}, {"headline": "KIA international passenger traffic up 24%", "summary": "Kempegowda International Airport (KIA) recorded robust passenger traffic growth in 2025-26, handling nearly 44.5 million flyers, a 6.2% rise year-on-year. International traffic was the key driver, increasing by 23.9% to 7.2 million passengers, despite global uncertainties. Cargo business also rose 6% with 5.3 lakh tonnes transported.", "category": "Business", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "5d0e6586"}, {"headline": "Revenue dept lacks jurisdiction on GBA land: HC", "summary": "Karnataka High Court ruled that revenue authorities lack jurisdiction to act on agricultural land under Greater Bengaluru Authority (GBA) jurisdiction. The court disposed of appeals challenging a tahsildar’s notice to vacate land, stating BBMP/GBA may take action as provided in their provisions.", "category": "Law", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "9c13e4d5"}, {"headline": "Fake IAS officer chargesheeted for duping J&K doctor", "summary": "A Bengaluru man, HN Sujayendra, was chargesheeted for pretending to be an IAS officer and duping a J&K doctor of Rs 2.7 crore in a land deal near Kempegowda International Airport. Sujayendra, possessing fake seals and letterheads, promised plum positions and 'heritage homes' for the land.", "category": "Law", "page": 7, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "debe7862"}, {"headline": "Yettinahole project work to resume next week: DKS", "summary": "Deputy CM DK Shivakumar announced that pending work on the Yettinahole integrated drinking water project will resume within a week, after the Union environment ministry directed the state to pay Rs 257 crore. Water would be supplied to Chikkaballapur and Kolar districts soon, with a DPR ready for Mekedatu project.", "category": "Infrastructure", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "5a56e8ad"}, {"headline": "K'taka permits building plans, land use changes during master plan revision", "summary": "Karnataka government permitted development-related approvals, including land use changes and building plans, to continue during the preparation and revision of master plans. This aims to prevent delays in investment and urban growth, ensuring development is not stalled during the transition between planning cycles.", "category": "Infrastructure", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "3db15c35"}, {"headline": "MP urges Centre to take over Shivamogga airport", "summary": "MP BY Raghavendra requested the state government to hand over Shivamogga’s Rashtrakavi Kuvempu Airport to the Union government. He said the state is discussing reimbursement of costs and possibility of private player maintenance, highlighting the airport's importance for central Karnataka.", "category": "Infrastructure", "page": 7, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "f1b417cf"}, {"headline": "Congress expels six functionaries in Davanagere", "summary": "Congress expelled six district functionaries for alleged anti-party activities during the Davanagere South assembly byelection. This deepens internal tension, with leaders alleging insults to the party and campaigning for rivals.", "category": "Politics", "page": 8, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "b2de7d4d"}, {"headline": "IUML backs VD Satheesan as potential Kerala CM", "summary": "The IUML backed opposition's V D Satheesan as a potential chief ministerial candidate in Kerala, following opinion polls projecting a UDF victory. Party's state chief Panakkad Sadikali Shihab Thangal said people expressed their opinion in Satheesan's favour, and it is for the high command to decide.", "category": "Politics", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "4c6794d3"}, {"headline": "EC to review repoll demand in Bengal booths", "summary": "The Election Commission is reviewing reports before deciding on demands for repolls in 77 booths across four assembly seats of Bengal's South 24 Parganas, following allegations of irregularities. CEO Manoj Agarwal announced the review.", "category": "Politics", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "d10d3729"}, {"headline": "Lucknow’s 'Helen Keller' scores 98.7% in ISC", "summary": "Sarah Moin, nicknamed \"Helen Keller\" by teachers, topped the humanities class at Christ Church College, Lucknow, with 98.7% in ISC Class XII, despite sarcoidosis destroying her hearing and speech. Born blind, she used finger-drawn alphabets on her palm to revise. Her parents ensured she attended a regular school.", "category": "Education", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "9121681b"}, {"headline": "Identical twins top school with identical scores", "summary": "Identical twins Srishti and Drishti Kumari jointly topped Carmel School, Hazaribag, securing an identical 97.6% in ICSE Class X exams. Daughters of doctor parents, they also scored the same in English and Hindi. Their parents expressed elation over the unexpected matching results.", "category": "Education", "page": 8, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "1930df30"}, {"headline": "Critical thinking becomes new classroom currency with AI", "summary": "The Times Critical Thinking Championship returns in 2026 to embed critical thinking in school education, addressing the need for inquiry-based learning in an AI and information-saturated era. It aims to help students question assumptions, analyze evidence, and form independent judgments, reaching one million students nationwide.", "category": "Education", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "6ee34141"}, {"headline": "EC to retain 70K central forces to foil Bengal unrest", "summary": "The Election Commission is retaining around 70,000 central forces personnel in West Bengal post-results to prevent unrest, especially in areas with a history of post-poll violence. Security arrangements include control rooms at EC headquarters and strict action against targeting political rivals, following the 2021 violence which saw 1,934 incidents.", "category": "Politics", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "0018a139"}, {"headline": "CBI court begins trial against ex-CM Hooda", "summary": "A CBI court began trial proceedings against former Haryana chief minister Bhupinder Singh Hooda and 21 others in a land scam involving alleged irregular allotment of 14 industrial plots in Panchkula by HUDA in 2013-14. The case alleges a conspiracy to benefit specific applicants.", "category": "Law", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "27d8a531"}, {"headline": "Post-poll violence erupts in Kolkata, Bengal", "summary": "Post-poll violence erupted in Kolkata and its industrial fringe, with incidents of gunfire and street fights. A TMC functionary was shot twice. Clashes also occurred in Behala, and TMC alleged central forces assaulted residents in New Alipore. BJP countered that Trinamool members stormed a home.", "category": "Politics", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "e1d167ad"}, {"headline": "HC upholds EC's use of central staff as counting supervisors", "summary": "Calcutta High Court upheld the Election Commission’s authority to appoint Union government and PSU employees as counting supervisors for Bengal assembly polls, rejecting a TMC challenge alleging BJP bias. Justice Krishna Rao ruled that EC can choose personnel from either state or Union pools, stating it's the EC's prerogative.", "category": "Law", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "287ab780"}, {"headline": "Badmaash Koramangala hosts RCB match dugout", "summary": "Badmaash Koramangala hosted Red FM's RCB match dugout, broadcast on a huge LED screen. Guests enjoyed the swift RCB win, RJ Julius Sharma's trivia quiz rounds, and Bollywood tunes by DJ Niven, along with unlimited cocktails and dinner.", "category": "Culture", "page": 10, "importance": 2, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "cd5fd003"}, {"headline": "Woman running alone: Society still uneasy", "summary": "A Hyderabad incident where a man exposed himself to a woman on a cycling track highlights society's discomfort with women occupying public spaces alone. The author argues that while running has been repackaged into curated events, true freedom requires women to occupy space without explanation or consequence.", "category": "Culture", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "b42d3545"}, {"headline": "ADAG companies case: Next hearing on May 8", "summary": "The Supreme Court will pass further orders on May 8 in the ADAG companies case, after reviewing status reports from CBI and ED. The bench had expressed displeasure over agencies' reluctance to proceed against ADAG. Anil Ambani’s counsel stated ADAG is ready to discuss settlement of dues.", "category": "Law", "page": 13, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "2c89f1a7"}, {"headline": "Indian refiners source oil from Iran after five years", "summary": "For the first time since March 2019, Indian refiners sourced oil from Iran in April, after the US eased sanctions. India imported 1.3 lakh barrels of oil a day from Iran and 2.9 lakh barrels from Venezuela, alongside supplies from Russia, Saudi Arabia, and UAE, plugging supply gaps.", "category": "Economy", "page": 13, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "50fc3e9d"}, {"headline": "Occupancy Certificate: Key to a legal home", "summary": "The Occupancy Certificate (OC) is a crucial legal document proving a building is safe and fit for occupation. Without it, homeowners face problems like lacking utility connections, reselling difficulties, or securing loans. Delays in OC issuance are often blamed on builders, but bureaucratic hurdles also contribute.", "category": "Law", "page": 13, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "0ac35e0c"}, {"headline": "Namma Metro Pink Line enters testing phase", "summary": "The Namma Metro Pink Line has commenced critical inspections and trials by the Research Designs and Standards Organisation (RDSO), scheduled until May 12. After data analysis, an interim speed certification will be issued, followed by inspections from the commissioner of Metro Railway Safety before opening for operations.", "category": "Infrastructure", "page": 13, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "b3555ec5"}, {"headline": "Cooling homes in high temperatures with low bills", "summary": "Homeowners can maintain indoor comfort and reduce electricity costs by using cooling habits like closing curtains, using ceiling fans, and applying reflective films. Smart alternatives include evaporative coolers and natural ventilation, along with switching to LED lighting, offering sustainable ways to stay cool.", "category": "Environment", "page": 13, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "2fba512d"}, {"headline": "Bengaluru real estate resilient despite market correction", "summary": "Bengaluru’s real estate market showed resilience in Q1 2026, with annual sales up 31%, despite a 7% quarter-on-quarter (QoQ) decline reflecting global uncertainties. New launches remained strong, though supply has begun to outpace absorption, increasing unsold inventory to over six lakh units across top cities.", "category": "Business", "page": 14, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "9cf11787"}, {"headline": "Barrierless tolling system for Indian highways", "summary": "Multi-Lane Free Flow (MLFF) or barrierless tolling is going live at Choryasi toll plaza from May 1 and Delhi’s Mundka by mid-May. This system uses cameras, radars, scanners, and FASTag to automatically deduct tolls, allowing vehicles to cross at 80-85kmph, reducing congestion, fuel wastage, and pollution.", "category": "Infrastructure", "page": 15, "importance": 8, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "b8de9158"}, {"headline": "Vodafone Idea gets Rs 23k cr relief in govt payment", "summary": "Vodafone Idea received a significant relief as DoT reassessed its AGR dues at Rs 64,046 crore, down from Rs 87,695 crore. The company can now pay at least Rs 100 crore annually from 2031-32, with the remaining in six equal installments until 2040-41, providing crucial cash flow relief.", "category": "Business", "page": 17, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "29c2f184"}, {"headline": "Capgemini Q1 revenue up 7%, stable demand", "summary": "Capgemini reported 7% Q1 revenue growth to ¤5.9 billion (11% constant currency), with bookings of ¤6 billion, reflecting sustained demand. CEO Aiman Ezzat noted no slowdown signs, with traction in cloud and AI-led transformation. The firm expects 6.5-8.5% revenue growth for 2026, targeting ¤1.8-1.9 billion organic free cash flow.", "category": "Business", "page": 17, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "cb60d068"}, {"headline": "Infosys appoints Nitin Paranjpe as vice-chairman", "summary": "Infosys appointed Nitin Paranjpe as non-executive vice-chairman, effective immediately. Paranjpe, with extensive experience including roles at Hindustan Unilever and Heineken, will support the chairman in guiding the board and shaping the company’s strategic agenda. Chairman Nandan Nilekani ruled out immediate succession plans.", "category": "Business", "page": 17, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "c7e897f6"}, {"headline": "State-run banks hire over 50k in FY26, up 33%", "summary": "Public sector banks recruited 50,552 employees in FY26, a 33% rise from the previous year, expanding operations. Offer letters were sent to over 50,000 candidates through IBPS. This adds to nearly 1.5 lakh employees hired between 2019-20 and 2024-25, strengthening operational capacity and improving customer service.", "category": "Economy", "page": 17, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "9b78ad3e"}, {"headline": "JuliaHub raises $65mn, launches AI platform Dyad 3.0", "summary": "JuliaHub raised $65 million, led by Dorilton Capital, and launched Dyad 3.0, an updated AI platform for designing and testing complex industrial systems. Dyad brings “agentic AI” into hardware engineering, automating tasks like building control systems for chemical plants and ensuring AI-generated designs follow physics laws.", "category": "Technology", "page": 17, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "5de77bc8"}, {"headline": "Roblox appoints Sunil Rao as India MD", "summary": "Gaming platform Roblox appointed Sunil Rao as India managing director. Rao, formerly from AWS, will strengthen the company’s local presence, build partnerships, support the creator ecosystem, and align India-specific needs with global product priorities. Roblox’s global creator community earned over $1.5 billion last year.", "category": "Business", "page": 17, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "a7db4e1e"}, {"headline": "Rupee breaches 95 intraday as crude surges", "summary": "The rupee breached the 95-per-dollar mark intraday, hitting a record low of 95.33, before RBI intervention helped it recover to close at 94.91. Rising crude oil prices intensified pressure, raising concerns over inflation, growth, and capital flows. Dealers expect further weakening towards 97 if crude remains above $120.", "category": "Economy", "page": 17, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "fa11b4c0"}, {"headline": "Cars24 cofounder Agrawal steps back from operating role", "summary": "Mehul Agrawal, cofounder of used-car marketplace Cars24, stepped back from his operating role after over a decade. He announced on LinkedIn that he will continue to be associated with the SoftBank-backed firm as a board member.", "category": "Business", "page": 17, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "54db6508"}, {"headline": "RBI repatriates 104MT of gold to India", "summary": "The RBI repatriated 104.2 metric tonnes of gold to India during Oct 2025-March 2026, increasing domestically held gold from 575.8 to 680 metric tonnes. The share of gold in forex reserves rose to 16.7% amid soaring gold prices and declining foreign currency assets.", "category": "Economy", "page": 17, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "2d8abe6e"}, {"headline": "Trump's science cuts: India's \"brain regain\" opportunity?", "summary": "The Trump administration's dismissal of the National Science Board, including three Indian-Americans, and proposed budget cuts to research agencies, has prompted questions among desi expats about relocating to India. This dismantling of US scientific architecture creates an opportunity for India's \"brain regain\" initiatives.", "category": "Science", "page": 18, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "0d56d607"}, {"headline": "Trump hails King Charles as 'greatest king'", "summary": "President Donald Trump hailed King Charles III as the \"greatest king\" during a departure ceremony on the South Lawn of the White House, as the state visit wrapped up. Trump said the United States needed more people like Britain’s monarch.", "category": "World", "page": 18, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "6ed3b5a4"}, {"headline": "Iran’s supreme leader rejects Trump warnings", "summary": "Iran’s supreme leader defiantly rejected President Donald Trump’s warning of an economically punishing naval blockade, declaring the US suffered a \"shameful defeat\" two months after its military deployment in the region. He stated a new chapter is unfolding for the Persian Gulf and Strait of Hormuz.", "category": "World", "page": 18, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "d5e3c38a"}, {"headline": "Italy condemns Israeli interception of Gaza aid flotilla", "summary": "Italy condemned Israel’s seizure of aid ships bound for Gaza in international waters and demanded the immediate release of all Italians unlawfully detained. PM Giorgia Meloni’s office called for \"full respect of international law\" and avoidance of \"irresponsible actions,\" with Germany also expressing deep concern.", "category": "World", "page": 18, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "e22ff1f2"}, {"headline": "Defense secretary Hegseth accused of harming military", "summary": "Defense secretary Pete Hegseth was accused by a top Democrat of \"causing lasting harm to the military,\" as the Senate Armed Services Committee hosted his testimony. Senator Jack Reed stated officers fear speaking honestly when leaders fear hearing it, leading to failed missions and lost wars.", "category": "Politics", "page": 18, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "fd3b9cfa"}, {"headline": "Asean nations vow to avoid export bans, share fuel", "summary": "The Association of Southeast Asian Nations (Asean) vowed to avoid trade curbs, including export bans, and push ahead with a fuel-sharing scheme. This comes as the region grapples with a spike in oil prices and supply disruptions due to the Iran war, ensuring predictable trade and coordinated emergency fuel sharing.", "category": "Economy", "page": 18, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "2dbc9954"}, {"headline": "Euro-Zone growth slows, stagflation looms due to Iran war", "summary": "The Euro-Zone economy unexpectedly slowed at the start of 2026, with first-quarter GDP rising 0.1%. Soaring energy costs triggered by the Iran war are threatening stagflation. Spain led regional growth at 0.6%, while Germany grew 0.3% and France stagnated.", "category": "Economy", "page": 18, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "dd1d9558"}, {"headline": "Canada to raise financial bar for international students", "summary": "Canada proposed sweeping changes to its international student program, including higher financial thresholds and country-based caps. Applicants must show C$22,895 (excluding tuition/travel). The move aims to curb influx that outpaced housing and healthcare capacity, particularly impacting Indian students, the largest cohort.", "category": "Education", "page": 18, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "d4f55438"}, {"headline": "UK police arrest ‘Islamic sect’ members for sexual abuse", "summary": "Over 500 police officers raided an \"Islamic sect\" headquarters in Crewe, UK, arresting 10 members, including spiritual leader Abdullah Hashem Aba Al-Safiq, for rape, sexual assault, and human trafficking. The AROPL members were arrested following allegations of offenses from 2023.", "category": "Law", "page": 18, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "fb006c46"}, {"headline": "Humanoid maker 1X opens US factory for 10k home robots", "summary": "Norway-founded robotics startup 1X Technologies AS, backed by OpenAI, opened a new 58,000-square-foot factory in Hayward, California. The facility aims to build 10,000 \"Neo\" humanoids in its first year for domestic tasks like folding laundry and tidying up.", "category": "Technology", "page": 18, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "1f1642e3"}, {"headline": "Taiwan economy surges fastest since 1987 on AI boom", "summary": "Taiwan's economy grew at its fastest pace since 1987, expanding 13.7% in Q1 from a year earlier, driven by demand for its tech products supporting AI computing. This surge occurred despite disruptions caused by the war in Iran.", "category": "Economy", "page": 18, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "d163e643"}, {"headline": "White House opposes Anthropic's Mythos AI expansion", "summary": "The White House opposes Anthropic PBC's plan to expand access to its Mythos AI model, fearing insufficient computing power could affect government use. US officials are concerned about cybersecurity vulnerabilities in popular software being tested by the National Security Agency using Mythos.", "category": "Technology", "page": 18, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "1cdae8fc"}, {"headline": "Teen caught smuggling 30 tortoises under clothes", "summary": "Thai authorities arrested a teenager at a Bangkok airport for allegedly smuggling 30 protected tortoises, valued at about $9,000, that were taped under her clothing. Wildlife officials confirmed the incident.", "category": "Law", "page": 18, "importance": 2, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "4612dd23"}, {"headline": "Space-brewed sake sells for $700,000", "summary": "A small bottle of Japanese sake, made from mash fermented in space, sold for almost $700,000. Brewer Dassai partnered with Mitsubishi Heavy Industries to build specialized brewing equipment. The alcoholic fermentation process occurred inside the ISS in November and the mash was returned to Earth in February.", "category": "Science", "page": 18, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "a4f93df0"}, {"headline": "German artist Georg Baselitz dies at 88", "summary": "German artist Georg Baselitz, whose expressive paintings and sculptures stirred controversy before winning global acclaim, has died aged 88. Baselitz was a prominent contemporary visual artist with a body of work spanning over six decades.", "category": "Culture", "page": 18, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "f9e44480"}, {"headline": "Sweden fetes king’s 80th birthday with flypast", "summary": "Sweden celebrated its longest-reigning monarch, King Carl XVI Gustaf’s 80th birthday, with a choral tribute, a flypast, and a gala banquet attended by royals from around the world.", "category": "World", "page": 18, "importance": 2, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "100c11a8"}, {"headline": "MCC upholds Angkrish Raghuvanshi's obstruction dismissal", "summary": "The Marylebone Cricket Club (MCC) defended the decision to rule KKR batter Angkrish Raghuvanshi out for obstructing the field during a recent match. Citing Law 37.1.1, MCC stated the dismissal met the criteria of a “wilful act,” as Raghuvanshi altered his running line between the ball and stumps.", "category": "Sports", "page": 19, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 19, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "e345bbad"}, {"headline": "Jack Draper to miss French Open due to knee injury", "summary": "British tennis player Jack Draper will miss next month's French Open as he recovers from a knee injury. The 24-year-old left-hander retired midway through his first-round match at the Barcelona Open earlier this month due to a problem with his right leg.", "category": "Sports", "page": 20, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "a9710742"}, {"headline": "Sangakkara, Mahanama in Sri Lanka Cricket interim committee", "summary": "Former Sri Lanka internationals Kumar Sangakkara and Roshan Mahanama were named in a nine-member transformation committee that will run Sri Lanka Cricket. This follows the resignation of the previous leadership, with former state minister Eran Wickramaratne named as chairman.", "category": "Sports", "page": 20, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "655bf563"}, {"headline": "Scott Parker leaves Burnley after relegation", "summary": "Scott Parker has left his position as head coach of Burnley by mutual consent, following the club’s relegation from the Premier League. Parker led the Clarets to promotion last year, but the team won just four league games this season.", "category": "Sports", "page": 20, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "19724ad8"}, {"headline": "India U-17 coach optimistic about WC qualification", "summary": "India U-17 coach Bibiano Fernandes is optimistic his team is close to qualifying for the FIFA World Cup, potentially by winning against Australia or Uzbekistan. Following North Korea’s withdrawal, the group now has three teams, with two qualifying, making one win potentially enough.", "category": "Sports", "page": 20, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "a5ad50e9"}, {"headline": "Alex Blockx sends Casper Ruud home at Madrid Open", "summary": "Up-and-coming Belgian Alexander Blockx defeated former world number two Casper Ruud 6-4, 6-4 to reach the Madrid Open semifinals. Blockx, 21, ranked 69th, has knocked out four consecutive seeds. Meanwhile, Mira Andreeva advanced to the women's final.", "category": "Sports", "page": 20, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "32231301"}, {"headline": "Muralitharan: Fair IPL pitches would be boring", "summary": "Spin bowling legend Muttiah Muralitharan stated that modern T20 cricket heavily favors batters, making even his control difficult. He suggested that fair pitches would make IPL \"boring,\" as fans desire fours and sixes, and bowlers must adapt to the relentless hitting.", "category": "Sports", "page": 20, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "076f6d26"}, {"headline": "Selection row leaves 40 boxers in limbo for Games", "summary": "The future of 40 promising boxers for the Commonwealth and Asian Games is uncertain due to an administrative dispute between SAI and BFI. SAI refused to recognize the COAS Cup as a fair selection event, barring medal-winning boxers from national coaching camps and potential India representation.", "category": "Sports", "page": 20, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "25e4c9d5"}, {"headline": "Rishik, Vaibhav clinch doubles in state badminton", "summary": "Rishik Sai and Vaibhav Rao clinched a double each in the boys’ section of the State U-11&13 badminton tournament. Rishik won the U-11 singles and doubles, while Vaibhav secured the U-13 singles and doubles titles, showcasing dominant performances.", "category": "Sports", "page": 20, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "b7be87df"}, {"headline": "Burevestnik looks good for Labour Day Trophy feature", "summary": "Sulaiman Ataollahi-trained Burevestnik, to be ridden by Trevor Patel, looks strong for the International Labour Day Trophy, the feature event on the opening day of the summer season at the Bangalore Turf Club on Friday. The first race starts at 3 pm.", "category": "Sports", "page": 20, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "e4a4e843"}, {"headline": "PPC stages comeback to beat MNK Rao Park BC", "summary": "PPC staged a defiant comeback to defeat MNK Rao Park Basketball Club 60-55 in the boys' super league of the State sub-junior basketball championship in Bengaluru. Trailing 24-28 at half-time, PPC regrouped with Narrun scoring 21 points. In the girls' section, Beagles BC won 26-15.", "category": "Sports", "page": 20, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "fdc479dd"}, {"headline": "Ruchitaksh Inderkar's 245 leads VCC to big win", "summary": "Captain Ruchitaksh Inderkar scored a quickfire double century (245 off 121 balls) to power Visweswarapuram CC (VCC) to a 243-run victory against Young Cricketers in the KSCA U-16 inter-club tournament. His innings was supported by Chiranth (54n.o), sharing a 179-run partnership.", "category": "Sports", "page": 20, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "87578a12"}, {"headline": "Coles CC clinches thriller, enters quarterfinals", "summary": "Coles Cricket Club edged Palar Sports Club, Kolar, in a Super Over to enter the quarterfinals of the KSCA G Kasturirangan Memorial T20 tournament. Coles scored 210/7, with Ritesh Bhatkal scoring 51 for Palar, who also ended on 210. In the Super Over, Palar managed only one run.", "category": "Sports", "page": 20, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "c37989df"}, {"headline": "Dhruva Sarja on KD: I play what's needed", "summary": "Kannada actor Dhruva Sarja discusses his role in \"KD: The Devil,\" where he portrays an innocent man, a departure from his usual high-energy roles. He addresses past criticism for portraying women negatively, stating choices are rooted in narrative demands, not personal beliefs, and highlights learning from the film's cast.", "category": "Culture", "page": 23, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 23, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "757533a0"}, {"headline": "Sujoy Ghosh wins decade-long Kahaani 2 plagiarism case", "summary": "Filmmaker Sujoy Ghosh describes his decade-long court battle over plagiarism accusations against \"Kahaani 2: Durga Rani Singh\" as \"one battle after another.\" The Supreme Court quashed the case, noting Ghosh’s script had prior registration and the complainant was a serial litigator who concealed the Screenwriters Association's finding of no similarity.", "category": "Culture", "page": 23, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 23, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "afc2073d"}, {"headline": "Bengaluru's weather twist: Hail to havoc", "summary": "Bengaluru experienced a dramatic weather shift, with Wednesday's hailstorm and rain bringing relief but escalating into a crisis. Record rainfall caused waist-deep flooding, choked roads, disrupted Metro, and led to tragic loss of lives, including a hospital wall collapse. Social media largely celebrated the weather.", "category": "Environment", "page": 23, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 23, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "16a20662"}, {"headline": "Nolan's 'The Odyssey' shorter than 'Oppenheimer'", "summary": "Christopher Nolan confirmed his upcoming film \"The Odyssey\" will have a shorter runtime than \"Oppenheimer,\" citing IMAX's technical cap of around 180 minutes. Despite tighter duration, Nolan emphasized the adaptation of Homer’s tale will retain its grandeur and features a star-studded cast for its July 2026 release.", "category": "Culture", "page": 23, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 23, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "e9b34dd5"}, {"headline": "KPop Demon Hunters director in BTS docu-series", "summary": "Director Maggie Kang, known for \"KPop Demon Hunters,\" joined BTS’ \"Keep Swimming With BTS\" docu-series. Kang spoke about her Oscar win, film making, and connection to Korean identity, emphasizing her desire to depict Korean culture through animation and the pride she felt from the film's success.", "category": "Culture", "page": 23, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 23, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "b461df9f"}, {"headline": "Bengaluru bonds over hands-on cooking workshops", "summary": "Bengaluru residents are increasingly joining hands-on cooking workshops, seeing them as more meaningful weekend plans than dining out. These workshops cater to friends, couples, and families, offering a skill-learning, engaging, and social experience that bridges the gap between watching cooking shows and actually preparing dishes.", "category": "Culture", "page": 24, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 24, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "7de6e980"}, {"headline": "Man pleads guilty to plotting Taylor Swift concert attack", "summary": "A 21-year-old man pleaded guilty in an Austrian court to plotting an attack on a Taylor Swift concert, which led to the cancellation of her 2024 shows in the Alpine nation. He is accused, along with two others, of forming a \"highly dangerous IS terror cell\" planning multiple attacks.", "category": "Law", "page": 27, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 27, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "b451bf01"}, {"headline": "He-Man creator Roger Sweet passes away at 91", "summary": "Roger Sweet, the lead designer behind the popular He-Man action figure, passed away at 91 after battling dementia. Sweet created the prototype for the action figure, which hit the market in 1982 and spawned the \"He-Man and the Masters of the Universe\" cartoon series.", "category": "Culture", "page": 27, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 27, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "53842990"}, {"headline": "Rafa Nadal docu-series to release May 29", "summary": "A documentary series titled \"RAFFA\" about tennis great Rafael Nadal is set to release on a leading streaming platform on May 29. It will follow Nadal's final career year, focusing on his injuries, embrace of fatherhood, and decision to retire. The series will feature interviews with Nadal, Federer, Djokovic, and McEnroe.", "category": "Sports", "page": 27, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 27, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "795d0bc0"}, {"headline": "Cartier Crash sells for $2M, most valuable timepiece", "summary": "The Cartier Crash timepiece sold for 15.6 million Hong Kong dollars (approx. Rs 18.87 crore) at Sotheby's, making it the watchmaker's most expensive timepiece ever sold at an auction. This ultra-rare Crash is one of only three examples made in 1987 and was bought by Japanese businessman Shinsuke Sakimoto.", "category": "Business", "page": 27, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 27, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "76d7c323"}, {"headline": "Reading nooks become a home essential", "summary": "Reading nooks are becoming a home essential, reflecting a shift towards more lived-in, personal spaces and a need for quiet escapes. Homeowners are transforming overlooked corners into cosy reading spots, with searches for 'closet reading nook for adults' up by 55%. This trend prioritizes comfort and well-being.", "category": "Culture", "page": 28, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 28, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "f20fc8be"}, {"headline": "Miu Miu gives stylish spin to literary clubs", "summary": "Miu Miu's Literary Club returned to Milan, presenting \"Politics of Desire,\" a three-day cultural salon exploring sexuality, consent, and self-determination. The event blended literature, conversation, and performance at the historic Circolo Filologico Milanese, drawing from Europe’s literary salon tradition with panels and lectures.", "category": "Culture", "page": 28, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122265", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 28, "telegram_url": "https://t.me/c/1877410077/122265"}], "article_id": "f8e266a5"}, {"headline": "Eli Lilly backs Haryana FDA action against fake Mounjaro", "summary": "Eli Lilly supported Haryana FDA's action against counterfeit versions of its diabetes drug, Mounjaro, seized in Gurugram. The company clarified that the fake drug did not come from its authorized supply chain. Eli Lilly emphasizes patient safety and public health risks from unauthorized manufacturing.", "category": "Health", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122240"}, {"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122216"}], "importance": 5, "article_id": "39d2554b"}, {"headline": "Government Slashes Vodafone Idea AGR Dues by 23,600 Crore", "summary": "In a major relief for Vodafone Idea, the government set its adjusted gross revenue (AGR) dues at ₹64,046 crore, significantly lower than the previous estimate of ₹87,695 crore. The move follows a Supreme Court-ordered reassessment. While spectrum dues of ₹1.25 trillion remain unchanged, the reduction in AGR liabilities is expected to help the carrier secure much-needed bank loans.", "category": "Business", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122240"}, {"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122216"}, {"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122244"}, {"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/122212"}], "importance": 8, "article_id": "3c4c6332"}, {"headline": "India FDI Inflows Expected to Exceed $90 Billion in FY26", "summary": "Foreign direct investment (FDI) inflows are on track to top $90 billion for FY26, having already passed $88 billion by February. DPIIT Secretary Amardeep Singh Bhatia credited the push for manufacturing and free trade agreements for the momentum. Chemicals, pharmaceuticals, and food processing accounted for 65% of grounded investments, with Europe contributing 42% of the value.", "category": "Economy", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Bengaluru 01-05.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122240"}, {"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_01-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122216"}, {"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 01-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122265"}], "importance": 8, "article_id": "9e46e89a"}, {"headline": "Government Mandates Fee Transparency and Standardized Norms for Clinics", "summary": "The Centre plans to mandate that doctors and specialists display consultation fees in English and regional languages. New draft rules under the Clinical Establishments Act also set minimum spatial requirements, such as 70 sq. ft for consultation rooms and 65 sq. ft per bed for short-stay observation. Clinics must also stock essential emergency drugs like adrenaline and aspirin.", "category": "Health", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Benga
