<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {

.outer { position: fixed; inset: 0; overflow: hidden; }

.card-headline { font-size:28px; font-weight:800; line-height:1.18; color:#fff; letter-spacing:-0.03em; margin-bottom:20px; flex-shrink:0; }

ources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore  06-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119404"}]}, {"headline": "Maersk to retrofit 200 vessels to improve fuel efficiency and capacity", "summary": "AP Moller-Maersk is retrofitting approximately 200 ships in its time-chartered fleet to reduce slot costs. The program aims to improve fuel efficiency and cargo-carrying capacity while lowering greenhouse gas emissions. Over 1,500 projects have been executed with more scheduled through 2027 to lower operational costs.", "category": "Infrastructure", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119404", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore  06-04-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119404"}]}, {"headline": "Global air cargo demand rises 11.2 percent in February 2026", "summary": "International air cargo demand saw double-digit growth in February, according to IATA. Capacity also increased by 8.5%, partly driven by movements ahead of the Lunar New Year. However, ongoing conflict in West Asia continues to make full-year forecasting difficult for the aviation industry due to volatile operating conditions.", "category": "Infrastructure", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119404", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore  06-04-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119404"}]}, {"headline": "Visakhapatnam Port reports 19.4 percent growth in exports for FY26", "summary": "Visakhapatnam Port Authority saw a significant surge in exports, driven by crude oil, iron ore, and thermal coal. The growth has stimulated the local economy, benefiting shipping agents and transport operators. The port is positioning itself as a primary gateway for trade flows from eastern and central India with broad-based volume gains.", "category": "Infrastructure", "pa fitability and credit growth. The RBI noted that enhanced risk management and robust recovery mechanisms contributed to the systemic cleanup.", "category": "Business", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119415", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE-Bengaluru 06-04.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119415"}]}, {"headline": "EV Sales in India Jump 40 Percent Amid Subsidy Schemes", "summary": "Electric vehicle registrations in India surged by 40 percent last year, driven by the FAME-II subsidy scheme and growing environmental awareness. Two-wheelers dominated the sales volume, while the passenger car segment saw entry of new affordable models. Infrastructure challenges, particularly charging station density, remain a hurdle for long-term adoption.", "category": "Business", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119415", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE-Bengaluru 06-04.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/119415"}]}, {"headline": "Senior Leadership Exodus at TCS Amid AI Disruptions and Layoffs", "summary": "Tata Consultancy Services has seen at least 300 of its 1,800 senior executives resign over the last eight months, representing a 16% churn. The exodus follows unprecedented job cuts of 12,000 employees and reductions in variable pay driven by AI-powered industry shifts. Analysts suggest the departures mark a structural reset as the firm moves toward AI-led execution.", "category": "Business", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119408", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 06-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119408"}]}, {"headline": "Indian Banks Struggle to Raise Deposits as Loan Demand Surges", "summary": "Indian lenders are finding it difficult to match deposit growth with rising loan demand, as investors increasingly favor equity markets. In the March quarter, HDFC Bank was an outlier, raising deposits faster than loans. Systemic credit growth reached 13.7% compared to 10.8% for deposits, leading to a high credit-deposit ratio and continued pressure on low-cost mobilization.", "category": "Business", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119408", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 06-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119408"}]}, {"headline": "IPL Season Drives Footfall Recovery for Restaurants Despite High Costs", "summary": "The Indian Premier League (IPL) has triggered a 5-15% jump in footfall and delivery orders for Indian eateries and bars. Despite facing high LPG prices caused by the West Asia war, businesses are using match screenings and themed menus to boost revenue. The opening weekend saw 515 million viewers, encouraging restaurants to invest in live-viewing experiences and group deals.", "category": "Business", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119408", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 06-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119408"}]}, {"headline": "State Oil Firms Discount Refinery Prices to Offset Retail Losses", "summary": "Indian state-run oil marketing companies (OMCs) have implemented a discount on the refinery transfer price to limit losses from frozen retail fuel rates. With global crude over $100, OMCs are paying refineries roughly ₹22.34 per litre less for diesel to manage the price gap. The move is expected to impact the margins of standalone refiners like MRPL and CPCL.", "category": "Business", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119408", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 06-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119408"}]}, {"headline": "Record 38 Companies File for IPOs in March Amid Market Volatility", "summary": "Despite geopolitical tensions, 38 companies including Manipal Health and SBI Funds Management filed preliminary IPO papers in March 2026. This surge, up from 22 filings a year ago, reflects strong issuer confidence and a push to meet regulatory timelines. High-profile firms like NSE and Jio are also expected to submit draft papers soon as the FY27 pipeline strengthens.", "category": "Business", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119408", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 06-04-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/119408"}]}, {"headline": "Paragon Partners to Launch 1,500 Crore Fund Following Portfolio Exits", "summary": "Private equity firm Paragon Partners plans to launch its third mid-market fund with a target corpus of ₹1,200-1,500 crore. The firm is preparing for 2-3 liquidity events this year to return capital to investors from its earlier funds. The new fund will focus on 10-12 investments in \"old-economy\" businesses across financial services, consumer, and manufacturing sectors.", "category": "Business", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119408", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 06-04-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/119408"}]}, {"headline": "Indian IT Sector Expected to Report Muted Fourth Quarter Earnings", "summary": "Indian IT firms are bracing for uneventful March quarter results as clients remain cautious regarding discretionary spending. While banking and financial services show positive momentum, the West Asia war is impacting travel and logistics sectors. Margin performance will be influenced by wage hikes and visa costs, though a weaker rupee may provide some immediate translation gains.", "category": "Business", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119408", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 06-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/119408"}]}, {"headline": "Foreign Investors Pull 43,085 Crore From HDFC Bank in Q4", "summary": "Foreign portfolio investors (FPIs) sold a 3.62% stake in HDFC Bank during the March quarter, accounting for over a quarter of total FPI outflows from India’s cash market. The selling was driven by macroeconomic headwinds from the Iran war and the abrupt resignation of the bank's part-time chairman. Despite the sell-off, some analysts have recently upgraded the stock to overweight.", "category": "Business", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119408", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 06-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/119408"}]}, {"headline": "Mondelez Uses IPL and AI to Drive Rural Chocolate Penetration", "summary": "Mondelez India is leveraging the IPL season and AI-driven marketing to expand its reach in rural markets. The company is focusing on low unit price points, such as ₹5 and ₹10, to increase penetration for brands like Dairy Milk and Oreo. While television remains a primary channel for rural salience, the firm is also increasing digital investments and using AI for personalized campaigns.", "category": "Business", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119408", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 06-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/119408"}]}, {"headline": "Indian FMCG Firms Report Resilient Growth Despite Geopolitical Tensions", "summary": "Major FMCG companies like Marico, Dabur, and Adani Wilmar reported healthy revenue and volume growth in the March quarter. While international business in the Gulf region faced headwinds, domestic demand remained stable. Firms expect margin improvements as input costs for commodities like copra and edible oils ease, though they remain watchful of the evolving situation in West Asia.", "category": "Business", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119408", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 06-04-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/119408"}]}, {"headline": "Rising Component Costs and Rupee Depreciation Hit Television Prices", "summary": "India's television industry is facing higher production costs due to soaring memory chip prices, expensive plastics, and rising ocean freight. Geopolitical tensions in West Asia have also led to rupee depreciation, pushing retail prices higher. Consumers are reportedly \"downtrading\" to smaller screen sizes, such as 50-inch instead of 55-inch models, as entry-level prices rise.", "category": "Business", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119408", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 06-04-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/119408"}]}, {"headline": "Hindustan Copper Seeks Navratna Status Amid Aggressive Mining Expansion", "summary": "State-owned Hindustan Copper Ltd is pursuing Navratna status to gain greater financial and operational autonomy. Chairman Sanjiv Kumar Singh stated the status would reflect the company's improved operations and strategic growth. The firm operates India's only vertically integrated refined copper facility and plans to expand mining capacity to meet rising domestic demand.", "category": "Business", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119408", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 06-04-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/119408"}]}, {"headline": "Air India Suspends New Delhi to Tel Aviv Flights Until June", "summary": "Air India has suspended all direct flight services between New Delhi and Tel Aviv until 31 May due to the ongoing West Asia war. Most international carriers have similarly halted operations to Israel, leaving 40,000 Indians in the country to seek land crossings through Jordan or Egypt. The Indian mission in Tel Aviv is assisting citizens with registration and emergency travel.", "category": "Business", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119408", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 06-04-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/119408"}]}, {"headline": "LPG crisis hits Bengaluru auto fleet; IOCL ramps up supply", "summary": "A disruption in LPG supply has forced many autorickshaws off Bengaluru roads, as private outlets close due to geopolitical challenges. IOCL has significantly increased its daily supply to 68.53 MT to offset the gap, but infrastructure limits and long queues at fuel stations persist. Many drivers are switching to CNG or storing fuel in reserve to cope with the uncertainty.", "category": "Business", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119426", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-04.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119426"}]}, {"headline": "SEBI proposal to revive open market buybacks may stabilize stocks", "summary": "SEBI’s plan to revive open market buybacks through stock exchanges could provide price stability during market volatility. Unlike the tender route, open market purchases allow companies to buy shares gradually, signaling management confidence. Recent tax parity for capital gains further strengthens the case for buybacks as a capital return tool.", "category": "Business", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119404", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore  06-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119404"}]}, {"headline": "SUVs dominate Indian car market with 56 percent share in FY26", "summary": "SUV sales reached 26.34 lakh units in FY26, capturing 56% of the passenger vehicle market. The Tata Nexon emerged as the top-selling model with 2.16 lakh units. Industry experts attribute the growth to a wide range of choices across petrol, hybrid, CNG, and electric variants, democratizing SUV ownership in India.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119404", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore  06-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119404"}]}, {"headline": "DHL Express targets India as priority market for infrastructure expansion", "summary": "DHL Express is intensifying its Indian presence as part of its 'Strategy 2030' roadmap, focusing on life sciences, new energy, and e-commerce. The company aims to grow its global topline by 50% from its 2023 base, with India identified as one of 20 priority countries for future growth and scale.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119404", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore  06-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119404"}]}, {"headline": "Rasna acquires Jumpin for 350 crore to enter ready-to-drink market", "summary": "Soft drink concentrate maker Rasna has acquired the Jumpin brand from Hershey India, targeting the ₹25,000 crore ready-to-drink market. Rasna plans to scale into a ₹2,000 crore business by FY27 through regional manufacturing, cost optimization, and exports, which already contribute 40% of its revenue.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119404", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore  06-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119404"}]}, {"headline": "Nuclear Power Corporation of India likely to launch IPO this year", "summary": "The Nuclear Power Corporation of India (NPCIL) is expected to launch its initial public offering this year. The Department of Atomic Energy has reduced equity support for the company to ₹100 crore in the 2026-27 Budget, signaling the transition to public markets. NPCIL currently operates 24 nuclear plants with 8,780 MW capacity.", "category": "Business", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119404", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore  06-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119404"}]}, {"headline": "Coal India to auction 25.62 million tonnes of coal in April", "summary": "State-owned Coal India Ltd plans to offer 25.62 million tonnes of coal through online auctions this month. The move is intended to mitigate energy supply shocks caused by the West Asia crisis, which has driven up import prices and increased domestic demand for coal due to disruptions in LNG and crude oil supplies.", "category": "Business", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119404", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore  06-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119404"}]}, {"headline": "Technical analysis outlook remains bullish for Lloyds Metals and Energy stock", "summary": "Lloyds Metals & Energy shares showed an 8.7% surge last week, signaling strong momentum. Technical analysis suggests the stock could rise to ₹1,550 from its current level of ₹1,390.05. A strong support zone is established between ₹1,290 and ₹1,320, with traders advised to accumulate on dips.", "category": "Business", "page": 3, "importance": 3, "telegram_url": "https://t.me/c/1877410077/119404", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore  06-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119404"}]}, {"headline": "Hansa Entertainment pivots to vertical and IP driven digital content", "summary": "Hansa Entertainment is revamping its strategy to focus on vertical snackable content and IP ownership. The new leadership aims to create content tailored for mobile-first audiences, including OTT shows and podcasts. The company will prioritize owning and distributing IP rather than serving as a traditional production service provider.", "category": "Business", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119404", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore  06-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/119404"}]}, {"headline": "IPL television ad volumes rise 10 percent in current season", "summary": "Data from TAM Sports shows a 10% increase in ad volumes during the first four matches of IPL's 19th season. Google emerged as the top advertiser, accounting for 13% of the share. The top five categories, including e-commerce and mouth fresheners, contributed 44% of total ad volumes despite a decrease in the number of individual advertisers.", "category": "Business", "page": 10, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119404", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore  06-04-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/119404"}]}, {"headline": "Clean Tech Passenger Vehicle Sales Grow at Double Industry Pace", "summary": "Sales of electric, hybrid, and CNG passenger vehicles grew by 31% in FY26 to 1.34 million units, outperforming the overall industry growth of 13%. Clean energy vehicles now account for nearly one-third of the Indian market. Industry experts cite improving infrastructure, new model launches, and high fuel prices as key drivers for the shift toward greener mobility options.", "category": "Business", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/119442", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bangalore 06-04.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119442"}]}, {"headline": "Nykaa in Negotiations to Acquire Majority Stake in 82°E", "summary": "FSN E-Commerce Ventures, the parent of Nykaa, is in talks to buy a majority stake in Deepika Padukone’s skincare brand 82°E. The move aims to bolster Nykaa’s house of brands as 82°E faced challenges with high pricing and a 30% revenue decline in FY25. The potential deal follows an existing endorsement partnership where Padukone serves as Nykaa’s global brand ambassador.", "category": "Business", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119442", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bangalore 06-04.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119442"}]}, {"headline": "Foxconn Q1 Revenue Jumps 30% on Strong AI Demand", "summary": "Taiwan's Foxconn, the world’s largest contract electronics maker, reported a 29.7% year-on-year rise in first-quarter revenue to T$2.13 trillion. The growth was primarily driven by massive demand for AI servers and related products. Despite the strong performance, the company cautioned about potential volatility in global politics affecting future supply chains.", "category": "Business", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119442", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bangalore 06-04.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/119442"}]}, {"headline": "Small Finance Banks Record Strong Loan Growth in FY26", "summary": "Differentiated banking entities reported over 20% growth in gross loan portfolios for the last fiscal year, led by a revival in microfinance. AU Small Finance Bank saw assets under management rise 21.3% to ₹1.40 lakh crore. Improved collection efficiency and a sign of growth at the 'bottom of the pyramid' borrower segment have supported the sector’s strong performance.", "category": "Business", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119442", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bangalore 06-04.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/119442"}]}, {"headline": "Amul Group Turnover Crosses ₹1 Lakh Crore Milestone in FY26", "summary": "The Amul brand, managed by GCMMF, achieved a total turnover of over ₹1 lakh crore in the 2025-26 financial year, marking 11% growth. The federation reported unduplicated revenue increased from ₹90,000 crore in the previous year, driven by strong demand for dairy products. GCMMF’s specific turnover reached ₹73,450 crore as the cooperative continues to dominate the Indian dairy sector.", "category": "Business", "page": 12, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119442", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bangalore 06-04.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/119442"}]}, {"headline": "Karnataka Government Orders Probe Into Hutti Gold Mines Tendering Row", "summary": "Karnataka has ordered a probe into alleged tendering irregularities at the state-owned Hutti Gold Mines Co Ltd. Allegations include arbitrary disqualification of bidders and unauthorized changes to tender conditions that restricted international participants. A technical committee has submitted a report on the matter, following the premature refund of earnest money deposits to bidders.", "category": "Business", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119455", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 06-04.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119455"}]}, {"headline": "IOC Urges Bengaluru Auto Drivers to Use Petrol Amid LPG Shortage", "summary": "Indian Oil Corporation (IOC) has urged dual-fuel autorickshaw drivers to switch to petrol to ease massive queues at LPG stations. IOC increased daily LPG supply to 68.5 metric tonnes in April to meet demand, but infrastructure constraints persist. Nearly 80% of private LPG stations in Karnataka are non-operational due to geopolitical disruptions, pushing demand to PSU outlets.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119455", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 06-04.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119455"}]}, {"headline": "Govt. bans direct sale of LPG cylinders from godowns", "summary": "The Delhi government has banned the direct sale of LPG cylinders from godowns, warning of strict action against violations. Supply is monitored to prevent a crunch.", "category": "Business", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119379", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/119379"}]}, {"headline": "Ladakh tourism body calls for restricted outside investment", "summary": "Ladakh tourism stakeholders urged restricted external investment, citing pressure from vested interests. They called for protecting local jobs and businesses.", "category": "Business", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119379", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/119379"}]}, {"headline": "Indian-flagged ship with LPG sails out of Strait of Hormuz", "summary": "An Indian-flagged vessel carrying 15,400 tonnes of LPG exited the Strait of Hormuz. Several other Indian-flagged vessels are awaiting safe passage amid the ongoing crisis.", "category": "Business", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119379", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-04-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/119379"}]}, {"headline": "Renewable Energy Projects Attract Foreign Investment", "summary": "Several new renewable energy projects have successfully secured substantial foreign investment, signaling growing confidence in the sector and contributing to sustainable development goals.", "category": "Business", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119370", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 06-04-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/119370"}]}, {"headline": "IT Sector Records Robust Export Growth", "summary": "The information technology sector posted strong export growth figures for the last quarter, driven by increasing global demand for digital services and software solutions.", "category": "Business", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119370", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 06-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/119370"}]}, {"headline": "Manufacturing Output Continues Steady Increase", "summary": "Manufacturing output maintained its steady upward trajectory, contributing positively to industrial production indices and reflecting sustained economic activity.", "category": "Business", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119370", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 06-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/119370"}]}, {"headline": "Startup Ecosystem Witnesses Surge in Funding", "summary": "The national startup ecosystem experienced a significant surge in venture capital funding, indicating robust investor confidence and fostering innovation across sectors.", "category": "Business", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119370", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 06-04-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/ tps://t.me/c/1877410077/119370"}]}, {"headline": "Government Sets Up Task Force for 5G Technology Expansion", "summary": "The Department of Telecommunications has established a high-level task force to accelerate the rollout of 5G services across rural India. The initiative aims to bridge the digital divide and foster innovation in sectors like agriculture and healthcare. Private telecom operators have been urged to meet coverage obligations within the specified timeframe.", "category": "Technology", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119415", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE-Bengaluru 06-04.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119415"}]}, {"headline": "India Eyes Global Space Surveillance Market Amid West Asia Conflict", "summary": "Indian space startups like Pixxel and Digantara are seeing increased interest for satellite surveillance services in West Asia. While the sector aims for $8 billion in revenue by 2033, challenges include the absence of a formal space law and compliance with US geospatial regulations. Isro continues its Earth Observation series but primarily serves domestic needs rather than retail.", "category": "Technology", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119408", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 06-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119408"}]}, {"headline": "Travel Fintechs Face Double Blow from War and Rupee Weakness", "summary": "Fintech firms specializing in travel and foreign exchange, such as Niyo and Scapia, are reporting a decline in remittances and forex usage. The Indian rupee's 4.5% fall since the start of the West Asia war has increased airfares and insurance costs. Users are opting for physical cash over digital wallets as uncertainty disrupts travel to GCC and Southeast Asian destinations.", "category": "Technology", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119408", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 06-04-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/119408"}]}, {"headline": "Snapchat Partners With Regional Film Industries to Target Gen Z", "summary": "Social media platform Snapchat is collaborating with South Indian film industries to engage Gen Z users in tier-II and tier-III cities. By offering exclusive behind-the-scenes content and AR lenses for films like Pushpa 2 and Kantara, the app aims to become a culturally relevant content hub. Regional cinema release volume currently outpaces Hindi cinema, driving strong digital momentum.", "category": "Technology", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119408", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 06-04-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/119408"}]}, {"headline": "Tech Union Calls for Mandatory Severance Norms Amid AI Layoffs", "summary": "The Nascent Information Technology Employees Senate (NITES) is urging tech firms to prioritize reskilling over layoffs as AI adoption triggers job cuts. The union called for policy intervention to implement stronger safeguards and mandatory severance norms for white-collar workers. NITES argued that despite strong profits, companies are failing their responsibility toward employee job security.", "category": "Technology", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119408", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 06-04-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/119408"}]}, {"headline": "Global cloud majors eye India as regional data centre hub", "summary": "Google Cloud, AWS, and Microsoft Azure are seeking larger co-location deals in India as the West Asia crisis spikes demand. Demand for data center capacity has increased by 200-500 MW in recent weeks. India offers a cost n to hometowns for elections and the harvest season. Platforms like Zepto and Snabbitt are reporting delays or unavailable service slots in major metros. Demand for riders is expected to rise by 25% due to the IPL and summer peak, leading to higher incentives to bridge the supply gap.", "category": "Technology", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119442", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bangalore 06-04.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/119442"}]}, {"headline": "Semicon Mission 2.0 to Prioritize Advanced Memory Packaging", "summary": "India Semiconductor Mission 2.0 will focus on high bandwidth memory (HBM) packaging to support the AI data center ecosystem. HBM provides massive data processing speeds that traditional memory cannot. The Indian semiconductor market, valued at $50 billion in 2024, is projected to reach $120 billion by 2030. Precedence will be given to HBM applications to win the global AI technology race.", "category": "Technology", "page": 5, "importance": 9, "telegram_url": "https://t.me/c/1877410077/119442", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bangalore 06-04.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/119442"}]}, {"headline": "IAF Invites Bids for Unmanned Heavy-Lift Airship for Border Surveillance", "summary": "The Indian Air Force has initiated a plan to develop a 'Medium Altitude Heavy Lift Airship' capable of operating at 30,000 feet. The unmanned platform is intended for long-endurance intelligence, surveillance, and reconnaissance (ISR) missions along India's borders. It will carry a payload of up to 5,000 kg and operate in GNSS-denied environments to counter drone threats.", "category": "Technology", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119455", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI-Bangalore 06-04.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/119455"}]}, {"headline": "Tech Company Launches New AI-Powered Product", "summary": "A leading technology firm unveiled its latest artificial intelligence-powered product, promising enhanced user experience and new capabilities. The launch marks a step forward in consumer tech.", "category": "Technology", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119370", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 06-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119370"}]}, {"headline": "Cyber Security Threats on the Rise", "summary": "Experts warn of an escalating number of cyber security threats targeting critical infrastructure and personal data. Businesses and individuals are urged to enhance their digital defenses.", "category": "Technology", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119370", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 06-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/119370"}]}, {"headline": "Efforts to Promote Digital Literacy in Rural Areas", "summary": "A government-backed program is intensifying efforts to enhance digital literacy among rural populations, bridging the technological divide and empowering communities.", "category": "Technology", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119370", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 06-04-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/119370"}]}, {"headline": "Tech Innovations Driving Business Transformation", "summary": "New technological innovations are rapidly transforming various business sectors, driving efficiency and creating new market opportunities. Companies are adapting strategies.", "category": "Technology", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119370", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 06-04-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/119370"}]}, {"headline": "Digital Economy Policy Framework Under Discussion", "summary": "Policymakers are engaged in discussions to shape a robust digital economy framework, addressing data privacy, e-commerce, and digital services regulation.", "category": "Technology", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119370", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 06-04-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/119370"}]}, {"headline": "Public Safety Campaign Against Cyber Fraud", "summary": "A new public safety campaign is educating citizens on how to protect themselves from rising instances of cyber fraud and online scams.", "category": "Technology", "page": 14, "importance": 4, "telegram_url": "https://t.me/c/1877410077/119370", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 06-04-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/119370"}]}, {"headline": "Digital Transformation Initiatives in Government Services", "summary": "Government agencies are accelerating digital transformation initiatives to streamline public services, making them more accessible and efficient for citizens.", "category": "Technology", "page": 17, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119370", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 06-04-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/119370"}]}, {"headline": "Digital Health Records System Implementation Underway", "summary": "A new digital health records system is being implemented across public hospitals, aiming to improve patient care, data management, and operational efficiency.", "category": "Technology", "page": 19, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119370", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 06-04-2026.pdf", "page": 19, "telegram_url": "https://t.me/c/1877410077/119370"}]}, {"headline": "Promoting Digital Inclusion in Underserved Areas", "summary": "Initiatives are being rolled out to promote digital inclusion, providing internet access and digital literacy training to underserved populations to bridge the digital divide.", "category": "Technology", "page": 20, "importance": 4, "telegram_url": "https://t.me/c/1877410077/119370", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 06-04-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/119370"}]}, {"headline": "Geopolitical Tensions Impact Global Oil Prices and Supply Routes", "summary": "Escalating conflicts in the Middle East have led to increased volatility in global crude oil prices. Brent crude crossed the $85 mark as supply chain disruptions in the Red Sea forced tankers to take longer routes. Analysts warn that prolonged instability could impact energy security and lead to inflationary pressures in major oil-importing nations.", "category": "World", "page": 11, "importance": 9, "telegram_url": "https://t.me/c/1877410077/119415", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE-Bengaluru 06-04.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/119415"}]}, {"headline": "US Trade Policy and West Asia Conflict Warp Economic Prospects", "summary": "A year after the US moved away from free trade, the economy grew 2.2% despite tariffs. However, recent tensions in the Gulf and potential increases in defense spending to $1.5 trillion threaten to misallocate resources. The shift toward protectionism and disregard for international law are viewed as risks to US global influence and long-term economic stability.", "category": "World", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119408", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 06-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119408"}]}, {"headline": "Trump Threatens to Withdraw US Naval Protection From Persian Gulf", "summary": "President Donald Trump’s threats to leave the Persian Gulf have shaken global confidence in the US role as the protector of maritime trade. Traffic through the Strait of Hormuz has plummeted from 135 to a few ships daily, affecting 20% of global oil flows. Allies are now considering multinational security measures as the US shifts away from decades of maritime security policy.", "category": "World", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119408", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 06-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119408"}]}, {"headline": "Trump Threatens Iran With Hell if Strait of Hormuz Stays Shut", "summary": "US special forces successfully rescued a stranded airman deep inside Iranian territory following a high-risk mission. President Donald Trump warned Tehran to reopen the Strait of Hormuz by Tuesday or face strikes on energy and transport infrastructure. The strait, a conduit for 20% of the world's energy supply, has been largely closed for five weeks, sending crude prices to $120 a barrel.", "category": "World", "page": 10, "importance": 10, "telegram_url": "https://t.me/c/1877410077/119408", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 06-04-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/119408"}]}, {"headline": "Iranian Drone Strikes Cause Severe Damage to Gulf Energy Facilities", "summary": "Iran launched multiple drone and missile attacks against critical energy infrastructure in the UAE, Bahrain, and Kuwait. The strikes caused \"severe material damage\" to petrochemical plants and power desalination units, forcing operational suspensions. Tehran claims the attacks are in retaliation for US and Israeli strikes and accuses Gulf neighbors of hosting hostile US forces.", "category": "World", "page": 10, "importance": 9, "telegram_url": "https://t.me/c/1877410077/119408", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 06-04-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/119408"}]}, {"headline": "Israel Assesses Over 1,000 Iranian Ballistic Missiles Remain Operational", "summary": "Israeli intelligence estimates that Iran still possesses more than 1,000 missiles capable of reaching its territory five weeks into the conflict. Additionally, Hezbollah's arsenal in Lebanon reportedly includes up to 10,000 shorter-range rockets. Military officials warn that bringing these numbers to zero is unlikely, implying that the war could continue for several more months.", "category": "World", "page": 10, "importance": 9, "telegram_url": "https://t.me/c/1877410077/119408", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 06-04-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/119408"}]}, {"headline": "Over 20,000 Seafarers Stranded as 2,000 Ships Wait Near Hormuz", "summary": "Approximately 2,000 ships and 20,000 seafarers are trapped in the Persian Gulf as the West Asia conflict prevents safe passage through the Strait of Hormuz. Reports indicate critical shortages of fresh food and water, with some crew members resorting to fishing and collecting air-conditioner condensate. At least one captain has died following a medical emergency that lacked air ambulance access.", "category": "World", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119408", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 06-04-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/119408"}]}, {"headline": "Opec Plus Raises Oil Production Quotas Amid Damage to Infrastructure", "summary": "The Opec+ oil cartel agreed to increase production quotas by 206,000 barrels per day starting in May. However, the group warned that damage to energy facilities from the West Asia war is costly and causes significant market volatility. The bloc stressed the importance of safeguarding maritime routes like the Strait of Hormuz to ensure the uninterrupted flow of global energy.", "category": "World", "page": 11, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119408", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 06-04-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/119408"}]}, {"headline": "Trans-Atlantic Ties Fray as Trump Questions US Commitment to NATO", "summary": "Geopolitical partnerships between the US and Europe are deteriorating as President Donald Trump expresses frustration over allies’ refusal to join the war against Iran. European leaders have criticized the war as illegal, leading to restrictions on US use of airbases and airspace. Analysts warn that the future of the 77-year-old NATO alliance is at risk if mutual defense perception collapses.", "category": "World", "page": 12, "importance": 9, "telegram_url": "https://t.me/c/1877410077/119408", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 06-04-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/119408"}]}, {"headline": "China Proposes Five Point Peace Plan to Resolve West Asia Conflict", "summary": "China has released a five-point plan to end the West Asia war, calling for an immediate ceasefire and the reopening of the Strait of Hormuz. While Beijing aims to position itself as a reliable order-maker compared to the US, experts remain skeptical about its ability to enforce any settlement. China remains the dominant buyer of Iranian crude, giving it significant economic stakes.", "category": "World", "page": 13, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119408", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 06-04-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/119408"}]}, {"headline": "Trump threatens Iran with destruction if Hormuz remains closed", "summary": "US President Donald Trump has issued a profanity-laden warning to Iran, threatening to strike power plants and bridges if the Strait of Hormuz is not opened by Tuesday evening. The threat follows a successful US special forces operation to rescue an airman shot down behind enemy lines. Iranian officials described the threats as contradictory and indicative of war intent.", "category": "World", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/119426", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-04.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119426"}]}, {"headline": "China and Russia pledge cooperation to cool West Asia tensions", "summary": "Chinese Foreign Minister Wang Yi and Russian counterpart Sergei Lavrov discussed the West Asia conflict via telephone, agreeing to cooperate at the UN Security Council. China advocated for a ceasefire in the Strait of Hormuz through political settlement and dialogue. Lavrov urged the US to abandon 'the language of ultimatums' and return to negotiations with Iran.", "category": "World", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119426", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-04.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119426"}]}, {"headline": "Pope Leo XIV calls for dialogue and peace in first Easter Mass", "summary": "In his first Easter Mass as pontiff, Pope Leo XIV urged global leaders to lay down arms and seek peace through dialogue rather than force. He specifically addressed the conflicts involving Iran, Israel, and Russia’s campaign in Ukraine. The US-born Pope emphasized the message of hope and condemned the global indifference toward the deaths of thousands in modern warfare.", "category": "World", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119426", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 06-04.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119426"}]}, {"headline": "OPEC plus members agree on symbolic oil production quota increase", "summary": "OPEC+ members, led by Saudi Arabia and Russia, agreed to raise oil production quotas by 206,000 barrels a day for May. The move is largely symbolic as the West Asia conflict constrains output. Brent crude settled near $109 per barrel following threats of escalation that could further disrupt energy flows through the Strait of Hormuz.", "category": "World", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119404", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore  06-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119404"}]}, {"headline": "China poised to emerge as peace guarantor in West Asia region", "summary": "As the US faces mistrust in West Asia, China may replace it as the regional guarantor of stability. Driven by its need for oil and internal stability, China has already mediated between Saudi Arabia and Iran. Unlike Western powers, China’s lack of historical religious baggage in the region offers it a neutral advantage for pure trade diplomacy.", "category": "World", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119404", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore  06-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119404"}]}, {"headline": "Iran Strikes Energy Infrastructure in UAE, Bahrain, and Kuwait", "summary": "Iranian drones and missiles targeted critical Gulf infrastructure, including a petrochemical plant in Abu Dhabi and power plants in Kuwait. The attacks are retaliatory strikes against US and Israeli actions in the region. While no injuries were reported, the strikes caused fires at storage tanks and forced the shutdown of power generating units, further destabilizing energy security.", "category": "World", "page": 8, "importance": 10, "telegram_url": "https://t.me/c/1877410077/ sed approach could also reduce agricultural emissions by 32%.", "category": "Science", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119404", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore  06-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119404"}]}, {"headline": "Parliamentary panel criticizes 15 year delay in prototype fast breeder reactor", "summary": "A parliamentary committee expressed concern over the delayed 500 MW Prototype Fast Breeder Reactor (PFBR). The project cost has ballooned from ₹3,492 crore to ₹8,181 crore. Started in 2004, the reactor remains in the commissioning stage and has yet to generate power or revenue, despite being critical for India's thorium energy goals.", "category": "Science", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119404", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore  06-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119404"}]}, {"headline": "India maintains 745 crore contribution to international nuclear fusion project", "summary": "India will contribute ₹745 crore in 2026-27 to the International Thermonuclear Experimental Reactor (ITER) in France. The long-term multi-country project aims to pave the way for a 500 MW demonstration fusion plant by 2050, representing India's commitment to defining next-century energy technologies alongside global partners.", "category": "Science", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119404", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore  06-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/119404"}]}, {"headline": "Scientists develop polymeric materials for improved energy storage and hydrogen", "summary": "Researchers from the CeNS have created coordination polymers that could enhance green hydrogen production. These materials, Zn(DAB) and Cd(DAB), demonstrated high sto }
const sortedCats = Object.keys(byCategory).sort(
  (a,b)=>(byCategory[b][0].importance||0)-(byCategory[a][0].importance||0)
);

let catIdx=0,vpW=0,vpH=0;
const panels=[];
const outer=document.getElementById('outer');
const hTrack=document.getElementById('hTrack');
const hintUp=document.getElementById('hintUp');
const hintRight=document.getElementById('hintRight');
const catFlash=document.getElementById('catFlash');
const cfIcon=document.getElementById('cfIcon');
const cfName=document.getElementById('cfName');

function buildAll() {
  vpW=outer.offsetWidth; vpH=outer.offsetHeight;
  hTrack.innerHTML=''; panels.length=0;
  sortedCats.forEach((cat,ci)=>{
    const m=CAT_META[cat]||{color:"#e8334a",icon:"📰"};
    const arts=byCategory[cat];
    const panel=document.createElement('div');
    panel.className='cat-panel';
    panel.style.setProperty('--cc',m.color);
    panel.innerHTML=`<div class="progress-row" id="prow-${ci}" style="--cc:${m.color}"></div><div class="v-feed" id="vfeed-${ci}"><div class="v-track" id="vtrack-${ci}"></div></div>`;
    hTrack.appendChild(panel);
    const pRow=panel.querySelector(`#prow-${ci}`);
    const vFeed=panel.querySelector(`#vfeed-${ci}`);
    const vTrack=panel.querySelector(`#vtrack-${ci}`);
    const cardH=vFeed.getBoundingClientRect().height||vpH;
    arts.forEach(art=>vTrack.appendChild(buildCard(art,cardH,m,cat)));
    panels.push({pRow,vFeed,vTrack,articles:arts,artIdx:0});
    buildPRow(ci);
  });
  hTrack.style.transition='none';
  hTrack.style.transform='translateX(0)';
  syncV(0,false);
}

function buildCard(art,h,m,cat) {
  const src=art.sources?.[0];
  const href=src?.pdf_filename?`pdfs/${src.pdf_filename}#page=${src.page}`:(src?.telegram_url||'#');
  const card=document.createElement('div');
  card.className='card';
  card.style.height=h+'px';
  card.style.setProperty('--cc',m.color);
  card.innerHTML=`
    <div class="card-content">
      <div class="card-toprow">
        <div class="cat-pill">
          <div class="pill-icon"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="1" y="1" width="8" height="2" rx="0.6" fill="#888"/><rect x="1" y="4.5" width="5" height="1.5" rx="0.6" fill="#666"/><rect x="1" y="7" width="6" height="1.5" rx="0.6" fill="#666"/></svg></div>
          ${cat.toUpperCase()}
        </div>
        <div class="card-date">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="2.5" width="11" height="9.5" rx="1.8" stroke="#555" stroke-width="1.2"/><path d="M4.5 1v3M8.5 1v3" stroke="#555" stroke-width="1.2" stroke-linecap="round"/><path d="M1 6h11" stroke="#555" stroke-width="1.2"/></svg>
          ${DIGEST.date}
        </div>
      </div>
      <div class="card-headline">${art.headline}</div>
      <div class="card-summary">${art.summary}</div>
      <div class="card-divider"></div>
      <div class="card-footer">
        ${src?`<a class="src-chip" href="${href}" target="_blank" onclick="event.stopPropagation()">${src.newspaper}<span class="src-chip-sep">&middot;</span><span class="src-chip-pg">Pg ${src.page}</span><span class="src-chip-ext"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M3.5 7.5L7.5 3.5M7.5 3.5H5M7.5 3.5V6" stroke="#555" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></span></a>`:'<div></div>'}
        <div class="info-btn"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6.5" stroke="#444" stroke-width="1.3"/><circle cx="7.5" cy="4.5" r="0.8" fill="#555"/><path d="M7.5 7v4" stroke="#555" stroke-width="1.5" stroke-linecap="round"/></svg></div>
      </div>
    </div>`;
  return card;
}

function buildPRow(ci) {
  const p=panels[ci],ai=p.artIdx;
  p.pRow.innerHTML='';
  p.articles.forEach((_,i)=>{
    const seg=document.createElement('div');
    seg.className='pseg'+(i<ai?' done':i===ai?' active':'');
    p.pRow.appendChild(seg);
  });
}

function syncV(ci,animated) {
  const p=panels[ci],h=p.vFeed.getBoundingClientRect().height;
  p.vTrack.style.transition=animated?'transform 0.35s cubic-bezier(0.4,0,0.2,1)':'none';
  p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;
  buildPRow(ci);
}

function goArt(d) {
  const p=panels[catIdx];
  const n=Math.max(0,Math.min(p.artIdx+d,p.articles.length-1));
  if(n===p.artIdx&&d!==0)return;
  p.artIdx=n; syncV(catIdx,true); dismiss();
}

function goCat(idx,animated=true) {
  idx=Math.max(0,Math.min(idx,sortedCats.length-1));
  if(idx===catIdx&&animated)return;
  const prev=catIdx; catIdx=idx;
  hTrack.style.transition=animated?'transform 0.38s cubic-bezier(0.4,0,0.2,1)':'none';
  hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;
  if(animated&&idx!==prev) {
    const m=CAT_META[sortedCats[idx]]||{color:"#e8334a",icon:"📰"};
    catFlash.style.background=m.color+'18';
    cfIcon.textContent=m.icon; cfName.textContent=sortedCats[idx]; cfName.style.color=m.color;
    catFlash.classList.add('on'); setTimeout(()=>catFlash.classList.remove('on'),500);
  }
  dismiss();
}

let dismissed=false;
function dismiss() {
  if(dismissed)return; dismissed=true;
  hintUp.classList.remove('visible'); hintRight.classList.remove('visible');
  hintUp.classList.add('gone'); hintRight.classList.add('gone');
}

(function initHints() {
  const KEY='dailyBriefHintSeen';
  if(!localStorage.getItem(KEY)) {
    localStorage.setItem(KEY,'1');
    setTimeout(()=>{ if(!dismissed){ hintUp.classList.add('visible'); hintRight.classList.add('visible'); } },2500);
  }
})();

let tsX=0,tsY=0,tcX=0,tcY=0,axis=null,drag=false;
outer.addEventListener('touchstart',e=>{
  tsX=e.touches[0].clientX; tsY=e.touches[0].clientY;
  tcX=0; tcY=0; axis=null; drag=true;
  hTrack.style.transition='none';
  const p=panels[catIdx]; if(p)p.vTrack.style.transition='none';
},{passive:true});
outer.addEventListener('touchmove',e=>{
  if(!drag)return;
  const dx=e.touches[0].clientX-tsX,dy=e.touches[0].clientY-tsY;
  tcX=dx; tcY=dy;
  if(!axis&&(Math.abs(dx)>8||Math.abs(dy)>8))axis=Math.abs(dx)>Math.abs(dy)?'h':'v';
  if(!axis)return;
  e.preventDefault();
  if(axis==='h'){
    const edge=(catIdx===0&&dx>0)||(catIdx===sortedCats.length-1&&dx<0);
    hTrack.style.transform=`translateX(${-catIdx*vpW+dx*(edge?.14:1)}px)`;
  }else{
    const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height;
    const edge=(p.artIdx===0&&dy>0)||(p.artIdx===p.articles.length-1&&dy<0);
    p.vTrack.style.transform=`translateY(${-p.artIdx*h+dy*(edge?.14:1)}px)`;
  }
},{passive:false});
outer.addEventListener('touchend',()=>{
  if(!drag)return; drag=false;
  if(axis==='h'){
    const t=vpW*.2;
    if(tcX<-t)goCat(catIdx+1);
    else if(tcX>t)goCat(catIdx-1);
    else{hTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;}
  }else if(axis==='v'){
    const t=vpH*.2;
    if(tcY<-t)goArt(1);
    else if(tcY>t)goArt(-1);
    else{const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height;p.vTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;}
  }
  axis=null;
},{passive:true});

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'||e.key===' '){e.preventDefault();goArt(1);}
  if(e.key==='ArrowUp'){e.preventDefault();goArt(-1);}
  if(e.key==='ArrowRight'){e.preventDefault();goCat(catIdx+1);}
  if(e.key==='ArrowLeft'){e.preventDefault();goCat(catIdx-1);}
});
let wl=false;
outer.addEventListener('wheel',e=>{
  e.preventDefault();if(wl)return;wl=true;
  Math.abs(e.deltaX)>Math.abs(e.deltaY)?goCat(catIdx+(e.deltaX>0?1:-1)):goArt(e.deltaY>0?1:-1);
  setTimeout(()=>wl=false,500);
},{passive:false});
window.addEventListener('resize',()=>{
  vpW=outer.offsetWidth;vpH=outer.offsetHeight;
  hTrack.style.transition='none';
  hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;
  panels.forEach(p=>{
    const h=p.vFeed.getBoundingClientRect().height;
    p.vTrack.querySelectorAll('.card').forEach(c=>c.style.height=h+'px');
    p.vTrack.style.transition='none';
    p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;
  });
});

buildAll();
</script>
</body>
</html>
