ue to garbled text. It appears to cover a general topic relevant to the newspaper, preventing a specific factual summary.", "category": "India", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/115961", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 06-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/115961"}]}, {"headline": "Indian fertiliser companies cut urea production amid West Asia conflict", "summary": "Major Indian fertiliser firms, including IFFCO, have begun reducing urea production as gas stocks dwindle following supply disruptions from Qatar. The West Asia conflict has led to gas distributors rationing feedstock, prompting companies to rework supply schedules. This production cut comes ahead of the critical kharif sowing season, threatening domestic agricultural output.", "category": "Economy", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116048", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi 06-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116048"}]}, {"headline": "War-risk premiums for flights may push up West Asia airfares", "summary": "Insurance companies are moving to raise war-risk premiums for airline fleets operating in West Asia, likely pushing up airfares by 10-12%. Carriers like Air India and IndiGo are facing higher operational risks and fuel costs. Airspace restrictions and sudden route changes have already affected 20% of flights in the region as insurers seek to revise aircraft coverage costs.", "category": "Economy", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116048", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi 06-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/116048"}]}, {"headline": "Maharashtra Economic Survey projects 7.9% growth for 2025-26 fiscal year", "summary": "Maharashtra's economy is projected to grow by 7.9% in the 77410077/116041"}]}, {"headline": "India Resumes Russian Oil Shipments Amid West Asia Energy Blockade", "summary": "Two shipments of Russian crude oil originally headed for East Asia have reportedly been redirected to India. This pragmatic shift comes as the Strait of Hormuz blockade threatens energy security and supplies from West Asia. Despite previous US pressure to end Russian imports, India is prioritizing stable availability and price as the Iran-US war escalates.", "category": "Economy", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/116041", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116041"}]}, {"headline": "India Revises GDP Base Year to 2022-23 Trimming Economy Size", "summary": "India has updated its GDP calculation base year to 2022-23, resulting in a correction of past overestimates and a change in sectoral makeup. The share of agriculture in nominal GVA increased to 19.1%, while the services share declined due to better informal activity data. The recalibration aims to reduce statistical discrepancies and utilize more robust datasets.", "category": "Economy", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116041", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/116041"}]}, {"headline": "Manufacturing Activity Hits Four-Month High While Services Ease Slightly", "summary": "India’s manufacturing PMI rose to 56.9 in February, driven by strong domestic demand despite the slowest export order growth in 17 months. Meanwhile, the services PMI eased marginally to 58.1 from 58.5. Overall, both sectors continue to show strong expansion momentum, with the reading remaining well above the 50-mark threshold.", "category": "Economy", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116041", "sources": [{"newspaper": gram_url": "https://t.me/c/1877410077/115991"}]}, {"headline": "Costlier credit indicates end of repo rate cut transmission", "summary": "RBI data for January shows that repo rate cuts may no longer be fully transmitted to lending and deposit rates. The weighted average lending rate on fresh rupee loans rose 39 bps to 8.67%, while fresh deposit rates barely decreased, as deposit growth lags credit expansion.", "category": "Economy", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/115991", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~03~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/115991"}]}, {"headline": "ECB closely monitoring war inflation impact", "summary": "European Central Bank Governing Council member Joachim Nagel stated that the ECB is closely monitoring the impact of surging energy costs due to the Iran war. Policymakers are determined to avoid second-round effects, recalling the price shock from Russia's Ukraine invasion.", "category": "Economy", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/115991", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~03~2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/115991"}]}, {"headline": "India seeks LPG from US amid Strait of Hormuz blockade, prices spike", "summary": "India's LPG imports are severely impacted by the Strait of Hormuz closure, leading to higher prices and potential under-recoveries for OMCs. While the US can partially substitute West Asian cargoes, this entails delays and higher logistic costs. India lacks strategic LPG reserves.", "category": "Economy", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/115991", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~03~2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/115991"}]}, {"headline": "War poses serious energy challenge for India: Arvind Panagariya", "summary": "Arvind Panagariya, Chairman of the 16th Finance Commission, stated that the Persian Gulf war presents serious energy challenges for India. He noted that despite this, India's economy has performed better than predicted, with manufacturing growth accelerating. He highlighted the need for reforms in trade liberalization and land acquisition.", "category": "Economy", "page": 5, "importance": 8, "telegram_url": "https://t.me/c/1877410077/115991", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~03~2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/115991"}]}, {"headline": "Basmati exporters seek Covid-type relief amid Iran war shipping disruptions", "summary": "Basmati rice exporters urged Apeda to address issues like rising freight and insurance rates due to the Iran war disrupting shipping. With cargo space shortages and increased fuel charges, exporters face pressure on working capital and realisations. They seek waiver of port charges and temporary financial support.", "category": "Economy", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/115991", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~03~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/115991"}]}, {"headline": "Weather woes, reduced area may hit cumin output", "summary": "India's cumin (jeera) output in 2026 is expected to decline due to reduced acreage, erratic weather, and blight. Trade body FISS estimates a 5% drop to 5.13 lakh tonnes, with Gujarat production falling 27%. The West Asia conflict is also weighing on market sentiment, disrupting shipments.", "category": "Economy", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/115991", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~03~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/115991"}]}, {"headline": "Capitalize seaweed sector for blue economy growth y": "India secured a place in the T20 World Cup final after a 7-run victory over England at Mumbai's Wankhede Stadium. Sanju Samson led the charge with a blistering 89 off 42 balls, helping India post 253/7. Despite Jacob Bethell's valiant century for England, Jasprit Bumrah’s clinical death bowling ensured India's progression to face New Zealand in the final on Sunday.", "category": "Sports", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/116048", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi 06-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116048"}]}, {"headline": "Charter flight arranged for stranded West Indies team after airspace restrictions", "summary": "A charter flight has been arranged for the West Indies cricket team to return home after being stranded in Kolkata for five days. The team's travel was disrupted by international airspace restrictions triggered by US and Israeli strikes on Iran. West Indies coach Daren Sammy had earlier expressed frustration on social media over the lack of clarity regarding their departure.", "category": "Sports", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116048", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi 06-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/116048"}]}, {"headline": "Sri Lanka considers interim cricket committee after poor World Cup performance", "summary": "Sri Lanka's sports minister Sunil Kumara Gamage hinted at a complete overhaul of the country's cricket board following its dismal T20 World Cup performance. Discussions are underway with the ICC to appoint an interim committee to rebuild the sport. The move follows public protests and the team's elimination after losing all Super Eight games.", "category": "Sports", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/116048", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT De ture", "summary": "The Ministry of Heavy Industries is evaluating proposals from states and oil companies to install EV charging stations under the PM E-Drive scheme. The goal is to disburse ₹80 crore by the end of FY26 to address infrastructure gaps. Currently, only eight of India's 47 million-plus population cities have crossed the 10% mark in EV adoption.", "category": "Infrastructure", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116041", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/116041"}]}, {"headline": "NaBFID Plans $500 Million Equity Fund for Indian Infrastructure Projects", "summary": "The National Bank for Financing Infrastructure and Development (NaBFID) plans to raise $500 million for its first equity-focused fund at GIFT City. This marks an expansion beyond traditional debt for the state-owned lender. The agency aims to close India's infrastructure financing gap by supporting long-term projects that struggle to obtain bank credit.", "category": "Infrastructure", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116041", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-03-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/116041"}]}, {"headline": "New Investments Drive Infrastructure Development Projects", "summary": "Significant capital injections are slated for several major infrastructure initiatives across the country. These projects aim to enhance connectivity and create new employment opportunities.", "category": "Infrastructure", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116030", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_06-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/116030"}]}, {"headline": "Logistics and Supply Chain Sector Undergoes Modernization", "summary": "The logistics and suppl e", "summary": "Muppala Lakshmana Rao, alias Ganapathy, the former general secretary of the CPI(Maoist), is expected to surrender to the Telangana Police soon. The 77-year-old leader, who has been hiding in Nepal for two years, is reportedly suffering from health issues and was recently brought to Delhi. Over 590 Maoists have surrendered in the last year, according to state officials.", "category": "Law", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116048", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi 06-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116048"}]}, {"headline": "Maharashtra cabinet approves draft anti-conversion bill with jail provisions", "summary": "The Maharashtra cabinet has approved the draft Freedom of Religion Bill, aimed at curbing forced religious conversions through marriage. The proposed law makes interfaith marriages a cognizable and non-bailable offense if family members object, carrying a minimum seven-year prison sentence. Couples must provide a 60-day notice before converting under the new regulations.", "category": "Law", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116048", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi 06-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/116048"}]}, {"headline": "Madhya Pradesh man arrested for teen’s murder and suspected cannibalism", "summary": "A 46-year-old man was arrested in Damoh district, Madhya Pradesh, for allegedly killing a 16-year-old boy and attempting to eat his flesh. Villagers caught the accused, Gudda Patel, at the scene following the teen's screams. Patel, who was recently released from jail after a previous murder conviction, was apprehended in a nearby field by police.", "category": "Law", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116048", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi 06-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/116048"}]}, {"headline": "CID questions VSR Ventures owner over Baramati plane crash", "summary": "The Maharashtra Criminal Investigation Department (CID) questioned VK Singh, owner of VSR Ventures, regarding the January plane crash that killed former Deputy CM Ajit Pawar. Investigators are examining potential sabotage or operational lapses. A preliminary report flagged poor visibility and runway conditions as contributing factors, while Pawar's son has alleged negligence.", "category": "Law", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116048", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi 06-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/116048"}]}, {"headline": "Sri Lankan Supreme Court judge petitions Karnataka High Court over defamation", "summary": "Justice AHMD Nawaz, a sitting judge of the Sri Lankan Supreme Court, has approached the Karnataka High Court seeking to block online defamatory content. The judge argued that baseless allegations on Google India platforms have damaged his international reputation. The court has directed the Union government and Google India to respond to the petition by March 16.", "category": "Law", "page": 10, "importance": 4, "telegram_url": "https://t.me/c/1877410077/116048", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi 06-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/116048"}]}, {"headline": "Supreme Court reveals over 2,800 child trafficking cases pending in India", "summary": "Supreme Court data shows that 2,846 child trafficking cases are currently pending trial across India, with Tamil Nadu reporting the highest figure at 748. The court has directed all high courts to complete these trials within six months. The bench expressed concern over the \"rampage\" of trafficking and warned states against any lethargy in taking action.", "categ iness", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/115997", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_06-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/115997"}]}, {"headline": "IT Hardware Suppliers Seek Procurement Relief on Tenders", "summary": "IT hardware suppliers are seeking procurement relief from the government on tenders, citing volatility in component prices and global supply chain disruptions. They advocate for flexible pricing models.", "category": "Business", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/115997", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_06-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/115997"}]}, {"headline": "Aluminium Share Rally Likely to See Pullback: Analysts", "summary": "Analysts predict a potential pullback in the rally of aluminum shares, citing overbought conditions and profit-taking. Despite strong demand, market sentiment suggests a correction may be imminent.", "category": "Business", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/115997", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_06-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/115997"}]}, {"headline": "Ambition in Action: Women Leaders Transforming Industries", "summary": "The article highlights women leaders who are transforming industries and communities through their ambition and collective effort. It showcases their strategies for success, mentorship, and building inclusive environments.", "category": "Business", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/115997", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_06-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/115997"}]}, {"headline": "Company Registrations Break Records, Signalling Growth", "summary": "Company registrations have reached record highs, indicating strong entrepreneurial activity and business growth. This surge reflects a positive business environment and increased investor confidence in the economy.", "category": "Business", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/115997", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_06-03-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/115997"}]}, {"headline": "Infosys Sr Hands at Some Units to Work from Office 4 Days", "summary": "Infosys senior employees at some units will now be required to work from the office four days a week, signaling a shift towards a hybrid work model. This move aims to improve collaboration and productivity.", "category": "Business", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/115997", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_06-03-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/115997"}]}, {"headline": "Rural Commerce Startup Rozana Bags $30m Funding", "summary": "Rural commerce startup Rozana has raised $30 million in funding, pushing its valuation close to $200 million. The investment will fuel its expansion into underserved rural markets.", "category": "Business", "page": 12, "importance": 4, "telegram_url": "https://t.me/c/1877410077/115997", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_06-03-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/115997"}]}, {"headline": "Women in Leadership Bring Growth and Value to Firms", "summary": "Research shows that women in leadership roles can significantly contribute to firm growth and value. Diverse leadership brings varied perspectives, improving decision-making and overall organizational performance.", "category": "Business", "page": 13, "importance": 5, "telegram_url": "https://t.me/c/1877410077/115997", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_06-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/115997"}]}, {"headline": "FMCG Q3 Sales Hit as GST Cuts Force Tweaks", "summary": "FMCG firms reported lower Q3 sales, impacted by GST rate cuts which necessitated supply adjustments and pricing tweaks. This affected profitability and market strategies in the consumer goods sector.", "category": "Business", "page": 14, "importance": 6, "telegram_url": "https://t.me/c/1877410077/115997", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_06-03-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/115997"}]}, {"headline": "India & China Must-win Markets: Reckitt Chief", "summary": "Reckitt's chief identifies India and China as crucial \"must-win\" markets, driven by their rising middle-income households. This signals a strategic focus on consumer growth in emerging economies.", "category": "Business", "page": 14, "importance": 5, "telegram_url": "https://t.me/c/1877410077/115997", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_06-03-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/115997"}]}, {"headline": "Motown Rings in Best-ever Feb on New Affordable Models", "summary": "India's automotive sector recorded its best-ever February sales, boosted by the launch of new and affordable models. This indicates strong consumer demand and positive market sentiment.", "category": "Business", "page": 14, "importance": 7, "telegram_url": "https://t.me/c/1877410077/115997", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_06-03-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/115997"}]}, {"headline": "MRPL denies declaring force majeure on fuel exports", "summary": "Mangalore Refinery and Petrochemicals Ltd (MRPL) has clarified that it has not declared force majeure on export of cargoes, contrary to media reports. The company stated it is unaware of the news item and its source, in response to queries from stock exchanges.", "category": "Business", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/115991", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~03~2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/115991"}]}, {"headline": "VA Tech Wabag unaffected by Iran war impact on projects", "summary": "Chennai-based water technology firm VA Tech Wabag reports no immediate business impact from the Iran war, as its West Asia projects are far from sensitive zones. The company expects the situation to stabilize soon and anticipates no slowdown, with international business contributing 50% of revenues.", "category": "Business", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/115991", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~03~2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/115991"}]}, {"headline": "February auto sales reach best-ever 24.09 lakh units across all segments", "summary": "India's retail auto sales in February reached a record 24.09 lakh units, up 25.6% year-on-year, for two-wheelers, three-wheelers, commercial vehicles, passenger vehicles, and tractors. This strong performance extends momentum post-GST 2.0, driven by improved affordability, market confidence, and upcoming festivals.", "category": "Business", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/115991", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~03~2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/115991"}]}, {"headline": "SEBI seeks results disclosures from Force Motors", "summary": "SEBI has requested information from Force Motors regarding its quarter and half-year results up to September 30, 2024, and nine months ended December 31, 2023. The company announced it would file suitable replies, with its shares closing 1.7% higher at ₹21,815.", "category": "Business", "page": 5, "importance": 3, "telegram_url": "https://t.me/c/1877410077/115991", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~03~2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/115991"}]}, {"headline": "Rising pet coke prices threaten cement companies' profit margins", "summary": "The ongoing West Asia war may increase operational costs for cement companies, impacting their margins. Coking coal prices rose 12% to $135/tonne, and imported coal prices increased 7% to $110/tonne. Although companies hold 30-45 days of fuel inventory, sustained high prices could erode EBITDA.", "category": "Business", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/115991", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~03~2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/115991"}]}, {"headline": "Nexus Select Mall settles REIT violation allegations with SEBI", "summary": "Nexus Select Mall Management settled allegations of flouting REIT norms with SEBI by paying ₹24.37 lakh. The allegations included failing to maintain required net worth and not informing the regulator about the change, leading to the disposal of adjudication proceedings.", "category": "Business", "page": 6, "importance": 3, "telegram_url": "https://t.me/c/1877410077/115991", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~03~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/115991"}]}, {"headline": "Embassy REIT raises ₹1,400 crore through 10-year NCDs", "summary": "Embassy Office Parks REIT raised ₹1,400 crore via its second 10-year Non-Convertible Debenture (NCD) issuance this fiscal. Priced at a 7.49% fixed coupon, it was fully subscribed by a large life insurance company, as part of a strategy to extend debt duration at competitive rates.", "category": "Business", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/115991", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~03~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/115991"}]}, {"headline": "Omnitech Engineering debuts 10% below issue price, subdued demand", "summary": "Shares of Omnitech Engineering debuted weakly on bourses, listing at an 11% discount to the ₹227 IPO price, and closed 10% below issue. The stock opened at ₹205 on BSE and ₹202 on NSE, signaling subdued institutional demand.", "category": "Business", "page": 6, "importance": 3, "telegram_url": "https://t.me/c/1877410077/115991", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~03~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/115991"}]}, {"headline": "Aditya Birla Sun Life MF launches Apex Hybrid Long-Short Fund", "summary": "Aditya Birla Sun Life Mutual Fund launched its first Specialised Investment Strategy, the Apex Hybrid Long-Short Fund. It uses equity, debt, and derivatives for risk-adjusted returns, structured for equity-like taxation, aiming to manage volatility and capture tactical alpha.", "category": "Business", "page": 6, "importance": 3, "telegram_url": "https://t.me/c/1877410077/115991", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~03~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/115991"}]}, {"headline": "Wealth Company Mutual Fund launches Small Cap NFO", "summary": "The Wealth Company Mutual Fund has launched a New Fund Offer (NFO) for its Small Cap Fund. It aims to invest in high-growth businesses within the small-cap universe, leveraging institutional-quality research, PE-style due diligence, and retail-first accessibility.", "category": "Business", "page": 6, "importance": 3, "telegram_url": "https://t.me/c/1877410077/115991", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~03~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/115991"}]}, {"headline": "Sedemac Mechatronics IPO: Wait for green signal, investors advised caution", "summary": "Sedemac Mechatronics, an auto ancillary player with a ₹1,087-crore IPO, is advised for cautious entry. The company designs and supplies ECUs, focusing on mobility and industrial verticals, with strong R&D. Customer concentration and cyclical industry growth are risk factors, but technical depth is a strength.", "category": "Business", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/115991", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~03~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/115991"}]}, {"headline": "Iran 'olive branch' sparks Sensex surge, index reclaims 80,000", "summary": "Indian equity benchmarks surged on Thursday, snapping a three-session losing streak, as rumors of Iran's conditional nuclear program offer raised de-escalation hopes. The Sensex closed up 899.71 points at 80,015.90, and Nifty 50 gained 285.40 points to 24,765.90. Broader markets outperformed, driven by geopolitical and trade developments.", "category": "Business", "page": 6, "importance": 9, "telegram_url": "https://t.me/c/1877410077/115991", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~03~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/115991"}]}, {"headline": "FMCG growth moderated to 7.8% in Dec quarter on GST transition", "summary": "India's FMCG industry saw 7.8% value growth in Oct-Dec, down from 13% in Sep, due to a higher festive base and GST rate revisions. Volume growth was 2.6%. Rural areas outpaced urban, but the gap narrowed. E-commerce, especially quick commerce, reached 6% of urban sales.", "category": "Business", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/115991", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~03~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/115991"}]}, {"headline": "Commercial vehicle sales rise 29% in February; Tata Motors leads", "summary": "India's commercial vehicle retail sales grew 29% year-on-year in February to 100,820 units, driven by strong freight activity and improved fleet utilization. Tata Motors held a 35.61% market share, followed by Mahindra & Mahindra (26.79%) and Ashok Leyland (18.47%).", "category": "Business", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/115991", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~03~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/115991"}]}, {"headline": "Auto component industry to grow 8-10% in FY27", "summary": "India's auto component sector is projected to grow 8-10% in FY27, driven by rising technology content, export opportunities, and supply chain formalization, despite moderating vehicle sales. Premiumization, especially in SUVs, will boost high-value component demand, and input costs are stabilizing.", "category": "Business", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/115991", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~03~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/115991"}]}, {"headline": "Gold prices rise on haven demand, dollar caps gains", "summary": "Spot gold rose 0.4% to $5,156.11/ounce, lifted by safe-haven demand amid escalating Middle East conflict. However, a stronger dollar and US Fed monetary policy concerns capped gains. US gold futures also saw a 0.7% increase.", "category": "Business", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/115991", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~03~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/115991"}]}, {"headline": "Aluminium prices ease as dollar firms, smelter focus remains", "summary": "Benchmark three-month aluminium prices on the LME fell 1.3% to $3,300/tonne, influenced by a firmer dollar. The market is also awaiting news from smelters in the war-hit Middle East. Copper and tin prices also saw declines.", "category": "Business", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/115991", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~03~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/115991"}]}, {"headline": "Crude oil prices rise on supply concerns as Iran war escalates", "summary": "Crude oil prices increased due to escalating US-Israeli war in Iran disrupting supplies and shipping. Brent crude rose $1.72 to $83.12/barrel, and US WTI crude rose $1.95 to $76.61. Potential closure of the Strait of Hormuz could cut 3.3 million barrels per day.", "category": "Business", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/115991", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~03~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/115991"}]}, {"headline": "Platinum deficit to continue fourth year, demand to reach four-year low", "summary": "Platinum will remain in deficit for the fourth consecutive year in 2026, though the shortage will drop over 75%. Total demand is expected to hit a four-year low, but supply, reaching a five-year high, will not fully offset the deficit. Investment demand may slip 65%, jewellery offtake by 12%.", "category": "Business", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/115991", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~03~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/115991"}]}, {"headline": "Natural gas futures could decline to ₹235, ₹200", "summary": "Natural gas futures are trading around ₹274 (per mmBtu), having moderated from a high of ₹295.10. With resistance at ₹290, a bearish bias is expected, potentially pushing prices down to support levels at ₹255, ₹245, ₹235, and ₹200. Risk-averse traders advised caution.", "category": "Business", "page": 8, "importance": 3, "telegram_url": "https://t.me/c/1877410077/115991", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~03~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/115991"}]}, {"headline": "Coffee prices rise, sugar and cocoa remain flat", "summary": "Robusta coffee futures rose 0.5% to $3,752/tonne due to concerns about Middle East conflict disrupting European shipments. Arabica coffee also gained. However, raw sugar prices fell 0.1% to 13.72 cents/lb, and cocoa prices also saw minor changes.", "category": "Business", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/115991", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~03~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/115991"}]}, {"headline": "MakeMyTrip acquires majority stake in Flamingo Transworld", "summary": "Online travel company MakeMyTrip acquired a majority stake in regional tour operator Flamingo Transworld to strengthen its holiday packages business. Rajesh Magow, Co-Founder and Group CEO, stated that Flamingo aligns with their growth strategy in the group travel domain.", "category": "Business", "page": 10, "importance": 4, "telegram_url": "https://t.me/c/1877410077/115991", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~03~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/115991"}]}, {"headline": "Men fuel rapid growth in India's beauty, skincare market", "summary": "Male shoppers are increasingly driving growth in India's online beauty and personal care (BPC) market. Marketplaces like Flipkart, Myntra, and Amazon report significant male participation, moving beyond basic grooming to experiment with skincare routines and problem-solving products. Brands like RAS Beauty and Deconstruct see strong male customer bases.", "category": "Business", "page": 10, "importance": 5, "telegram_url": "https://t.me/c/1877410077/115991", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~03~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/115991"}]}, {"headline": "Formula 1 introduces major engine and aerodynamic regulation changes for 2026", "summary": "Formula 1 has unveiled major regulation changes for 2026, focusing on a 50-50 power split between internal combustion and electric motors. New rules introduce active aerodynamics with moveable wings and a manual 'boost' button for overtaking. Cars will be 30kg lighter and narrower. These shifts aim to emphasize driver energy management while increasing technical efficiency.", "category": "Technology", "page": 21, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116048", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi 06-03-2026.pdf", "page": 21, "telegram_url": "https://t.me/c/1877410077/116048"}]}, {"headline": "Airtel Uses AI to Block 71 Billion Spam Calls in 1.5 Years", "summary": "Bharti Airtel reported blocking 71 billion spam calls and 2.9 billion spam SMS messages over the last 18 months using advanced AI tools. The initiative has reportedly cut financial fraud losses for its customers by 68.7%, addressing the growing national concern over digital security and unsolicited communications.", "category": "Technology", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116041", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/116041"}]}, {"headline": "Anthropic Resumes Pentagon Talks Over Military AI Usage and Guardrails", "summary": "AI startup Anthropic has resumed negotiations with the Pentagon regarding the use of its models by the US military. Previous talks stalled after Anthropic demanded assurances that its technology would not be used for mass surveillance or autonomous weapons. The resumption follows a supply-chain risk designation by the US Defense Secretary, which had muddied the firm's outlook.", "category": "Technology", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116041", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-03-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/116041"}]}, {"headline": "Trai Reviews Decade-Old Tariffs for Domestic Leased Circuits", "summary": "The Telecom Regulatory Authority of India (Trai) is conducting its first review of Domestic Leased Circuit (DLC) tariffs since 2014. Telecom giants and tech firms are clashing over the pricing of these dedicated broadband lines used by banks and data centres. DLC revenues grew 60% over the last decade to reach ₹13,300 crore in FY24.", "category": "Technology", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116041", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/116041"}]}, {"headline": "TCS Nears AI Data Centre Deals With Multiple Global Hyperscalers", "summary": "Tata Consultancy Services is in advanced discussions with several hyperscalers to build AI data centre infrastructure. Following an agreement with OpenAI, CEO K. Krithivasan stated the firm is commitment to investing $1 billion alongside partner TPG to meet India's projected 10-gigawatt capacity demand by 2030. The strategy signals a shift in TCS's core business model.", "category": "Technology", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116041", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/116041"}]}, {"headline": "Amazon Launches AI Tools for Automated Medical Practice Documentation", "summary": "Amazon Web Services is launching AI tools designed to generate clinical notes from live doctor-patient conversations. The 'Amazon Connect Health' service     panel.className='cat-panel';
    panel.style.setProperty('--cc',m.color);
    panel.innerHTML=`<div class="progress-row" id="prow-${ci}" style="--cc:${m.color}"></div><div class="v-feed" id="vfeed-${ci}"><div class="v-track" id="vtrack-${ci}"></div></div>`;
    hTrack.appendChild(panel);
    const pRow=panel.querySelector(`#prow-${ci}`);
    const vFeed=panel.querySelector(`#vfeed-${ci}`);
    const vTrack=panel.querySelector(`#vtrack-${ci}`);
    const cardH=vFeed.getBoundingClientRect().height||vpH;
    arts.forEach(art=>vTrack.appendChild(buildCard(art,cardH,m,cat)));
    panels.push({pRow,vFeed,vTrack,articles:arts,artIdx:0});
    buildPRow(ci);
  });
  hTrack.style.transition='none';
  hTrack.style.transform='translateX(0)';
  syncV(0,false);
}

function buildCard(art,h,m,cat) {
  const src=art.sources?.[0];
  const href=src?.pdf_filename?`pdfs/${src.pdf_filename}#page=${src.page}`:(src?.telegram_url||'#');
  const card=document.createElement('div');
  card.className='card';
  card.style.height=h+'px';
  card.style.setProperty('--cc',m.color);
  card.innerHTML=`
    <div class="card-content">
      <div class="card-toprow">
        <div class="cat-pill">
          <div class="pill-icon"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="1" y="1" width="8" height="2" rx="0.6" fill="#888"/><rect x="1" y="4.5" width="5" height="1.5" rx="0.6" fill="#666"/><rect x="1" y="7" width="6" height="1.5" rx="0.6" fill="#666"/></svg></div>
          ${cat.toUpperCase()}
        </div>
        <div class="card-date">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="2.5" width="11" height="9.5" rx="1.8" stroke="#555" stroke-width="1.2"/><path d="M4.5 1v3M8.5 1v3" stroke="#555" stroke-width="1.2" stroke-linecap="round"/><path d="M1 6h11" stroke="#555" stroke-width="1.2"/></svg>
          ${DIGEST.date}
        </div>
      </div>
      <div class="card-headline">${art.headline}</div>
      <div class="card-summary">${art.summary}</div>
      <div class="card-divider"></div>
      <div class="card-footer">
        ${src?`<a class="src-chip" href="${href}" target="_blank" onclick="event.stopPropagation()">${src.newspaper}<span class="src-chip-sep">&middot;</span><span class="src-chip-pg">Pg ${src.page}</span><span class="src-chip-ext"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M3.5 7.5L7.5 3.5M7.5 3.5H5M7.5 3.5V6" stroke="#555" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></span></a>`:'<div></div>'}
        <div class="info-btn"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6.5" stroke="#444" stroke-width="1.3"/><circle cx="7.5" cy="4.5" r="0.8" fill="#555"/><path d="M7.5 7v4" stroke="#555" stroke-width="1.5" stroke-linecap="round"/></svg></div>
      </div>
    </div>`;
  return card;
}

function buildPRow(ci) {
  const p=panels[ci],ai=p.artIdx;
  p.pRow.innerHTML='';
  p.articles.forEach((_,i)=>{
    const seg=document.createElement('div');
    seg.className='pseg'+(i<ai?' done':i===ai?' active':'');
    p.pRow.appendChild(seg);
  });
}

function syncV(ci,animated) {
  const p=panels[ci],h=p.vFeed.getBoundingClientRect().height;
  p.vTrack.style.transition=animated?'transform 0.35s cubic-bezier(0.4,0,0.2,1)':'none';
  p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;
  buildPRow(ci);
}

function goArt(d) {
  const p=panels[catIdx];
  const n=Math.max(0,Math.min(p.artIdx+d,p.articles.length-1));
  if(n===p.artIdx&&d!==0)return;
  p.artIdx=n; syncV(catIdx,true); dismiss();
}

function goCat(idx,animated=true) {
  idx=Math.max(0,Math.min(idx,sortedCats.length-1));
  if(idx===catIdx&&animated)return;
  const prev=catIdx; catIdx=idx;
  hTrack.style.transition=animated?'transform 0.38s cubic-bezier(0.4,0,0.2,1)':'none';
  hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;
  if(animated&&idx!==prev) {
    const m=CAT_META[sortedCats[idx]]||{color:"#e8334a",icon:"📰"};
    catFlash.style.background=m.color+'18';
    cfIcon.textContent=m.icon; cfName.textContent=sortedCats[idx]; cfName.style.color=m.color;
    catFlash.classList.add('on'); setTimeout(()=>catFlash.classList.remove('on'),500);
  }
  dismiss();
}

let dismissed=false;
function dismiss() {
  if(dismissed)return; dismissed=true;
  hintUp.classList.remove('visible'); hintRight.classList.remove('visible');
  hintUp.classList.add('gone'); hintRight.classList.add('gone');
}

(function initHints() {
  const KEY='dailyBriefHintSeen';
  if(!localStorage.getItem(KEY)) {
    localStorage.setItem(KEY,'1');
    setTimeout(()=>{ if(!dismissed){ hintUp.classList.add('visible'); hintRight.classList.add('visible'); } },2500);
  }
})();

let tsX=0,tsY=0,tcX=0,tcY=0,axis=null,drag=false;
outer.addEventListener('touchstart',e=>{
  tsX=e.touches[0].clientX; tsY=e.touches[0].clientY;
  tcX=0; tcY=0; axis=null; drag=true;
  hTrack.style.transition='none';
  const p=panels[catIdx]; if(p)p.vTrack.style.transition='none';
},{passive:true});
outer.addEventListener('touchmove',e=>{
  if(!drag)return;
  const dx=e.touches[0].clientX-tsX,dy=e.touches[0].clientY-tsY;
  tcX=dx; tcY=dy;
  if(!axis&&(Math.abs(dx)>8||Math.abs(dy)>8))axis=Math.abs(dx)>Math.abs(dy)?'h':'v';
  if(!axis)return;
  e.preventDefault();
  if(axis==='h'){
    const edge=(catIdx===0&&dx>0)||(catIdx===sortedCats.length-1&&dx<0);
    hTrack.style.transform=`translateX(${-catIdx*vpW+dx*(edge?.14:1)}px)`;
  }else{
    const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height;
    const edge=(p.artIdx===0&&dy>0)||(p.artIdx===p.articles.length-1&&dy<0);
    p.vTrack.style.transform=`translateY(${-p.artIdx*h+dy*(edge?.14:1)}px)`;
  }
},{passive:false});
outer.addEventListener('touchend',()=>{
  if(!drag)return; drag=false;
  if(axis==='h'){
    const t=vpW*.2;
    if(tcX<-t)goCat(catIdx+1);
    else if(tcX>t)goCat(catIdx-1);
    else{hTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;}
  }else if(axis==='v'){
    const t=vpH*.2;
    if(tcY<-t)goArt(1);
    else if(tcY>t)goArt(-1);
    else{const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height;p.vTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;}
  }
  axis=null;
},{passive:true});

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'||e.key===' '){e.preventDefault();goArt(1);}
  if(e.key==='ArrowUp'){e.preventDefault();goArt(-1);}
  if(e.key==='ArrowRight'){e.preventDefault();goCat(catIdx+1);}
  if(e.key==='ArrowLeft'){e.preventDefault();goCat(catIdx-1);}
});
let wl=false;
outer.addEventListener('wheel',e=>{
  e.preventDefault();if(wl)return;wl=true;
  Math.abs(e.deltaX)>Math.abs(e.deltaY)?goCat(catIdx+(e.deltaX>0?1:-1)):goArt(e.deltaY>0?1:-1);
  setTimeout(()=>wl=false,500);
},{passive:false});
window.addEventListener('resize',()=>{
  vpW=outer.offsetWidth;vpH=outer.offsetHeight;
  hTrack.style.transition='none';
  hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;
  panels.forEach(p=>{
    const h=p.vFeed.getBoundingClientRect().height;
    p.vTrack.querySelectorAll('.card').forEach(c=>c.style.height=h+'px');
    p.vTrack.style.transition='none';
    p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;
  });
});

buildAll();
</script>
</body>
</html>
