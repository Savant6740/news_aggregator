ashtra saw 35% growth. RBI's measures to encourage foreign currency inflows have aided private lenders.", "category": "Business", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130553", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-07-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/130553"}], "article_id": "d6d3a96c"}, {"headline": "India bans imports of products made using forced labor", "summary": "The Directorate General of Foreign Trade (DGFT) has issued a notification banning the import of goods produced wholly or partially using forced labor. This alignment with international labor standards comes amid global investigations into labor practices. The ban follows International Labour Organization (ILO) definitions where work is extracted under threat of penalty.", "category": "Economy", "page": 8, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130553", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130553"}], "article_id": "8a480efa"}, {"headline": "UK may grant India 1 billion dollar duty-free steel quota", "summary": "India expects a $1 billion annual duty-free steel export quota from the UK under a comprehensive trade deal effective Wednesday. The deal follows negotiations to resolve safeguard measures that previously hindered exports. India exported $900 million worth of steel to the UK in FY26. The agreement is expected to benefit Indian sectors like textiles, footwear, and agriculture.", "category": "Economy", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130553", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130553"}], "article_id": "bda1aae1"}, {"headline": "Central government bans herbicide Paraquat citing health risks", "summary": "The Indian government has banned Paraquat Dichloride with immediate effect due to its adverse effects on human and animal health. The herbicide, widely used in crops like tea, coffee, and cotton, is already prohibited in over 70 countries. The ban follows reports of poisoning incidents and the lack of a specific antidote. Stakeholders have until August 13 to file objections.", "category": "Health", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130553", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130553"}], "article_id": "fc5a04d9"}, {"headline": "Indian companies to raise 4.74 billion dollars via ECB and FCCB", "summary": "Indian firms, including IRFC and NTPC, have proposed raising $4.74 billion through External Commercial Borrowings (ECB) and Foreign Currency Convertible Bonds (FCCB). IRFC plans to raise $1.10 billion for sub-lending, while NTPC seeks $750 million for infrastructure. This represents a significant increase in foreign borrowing compared to previous years as firms look to fund expansion.", "category": "Business", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130553", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130553"}], "article_id": "09730063"}, {"headline": "Rajnath Singh flags off 'Shaurya Vijay Yatra' motorcycle rally", "summary": "Defence Minister Rajnath Singh flagged off the 'Shaurya Vijay Yatra' motorcycle rally from the National War Memorial in New Delhi. The rally will travel to the Dras War Memorial in Ladakh to honor the armed forces and veterans. Top military officials, including the Chief of Defence Staff and Army and Navy chiefs, were present at the event to support the participants.", "category": "India", "page": 9, "importance": 4, "telegram_url": "https://t.me/c/1877410077/130553", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-07-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/130553"}], "article_id": "1d58a5e4"}, {"headline": "India's soybean imports surge to 7.77 lakh tonnes", "summary": "Despite high domestic production, India imported 7.77 lakh tonnes of soybean by June 2026, compared to just 2,000 tonnes last year. The surge is driven by low domestic market arrivals and high local prices, making imports more viable for processors. Meanwhile, soybean meal exports fell significantly due to high costs. The industry expects total seasonal imports to reach 9 lakh tonnes.", "category": "Economy", "page": 13, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130553", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-07-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/130553"}], "article_id": "1b0723bf"}, {"headline": "Maharashtra to build world's largest modern agricultural market", "summary": "The Maharashtra government has approved the transfer of 1,395 acres of land near Vadhvan Port to establish a world-class modern agricultural market. Modeled after markets in Paris and the Netherlands, this project aims to provide farmers direct access to global markets with advanced storage and packaging facilities. The market will be located 40 km from the strategic Vadhvan Port.", "category": "Infrastructure", "page": 13, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130553", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-07-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/130553"}], "article_id": "79bc1bd6"}, {"headline": "Edible oil prices rise 5 percent amid Middle East tensions", "summary": "Wholesale edible oil prices have increased by 5% in July following renewed tensions between the US and Iran. Conflicts in the Strait of Hormuz have disrupted supply chains, while weak kharif sowing of oilseeds has further fueled price rises. Sunflower and groundnut oils saw price increases of up to Rs 7 per liter, potentially leading to higher kitchen costs for households.", "category": "Economy", "page": 13, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130553", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-07-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/130553"}], "article_id": "b3f7dc12"}, {"headline": "India to prioritize maritime security and sailor safety at UNSC", "summary": "External Affairs Minister S. Jaishankar announced that India will prioritize the safety of maritime lifelines and sailors during its 2028-29 UN Security Council term. India is competing for a non-permanent seat and aims to address threats to supply chains and international maritime law. The move comes amid rising conflicts in West Asia and threats to global shipping routes.", "category": "Politics", "page": 14, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130553", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-07-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/130553"}], "article_id": "dd54f07c"}, {"headline": "Monsoon deficit shrinks as heavy July rains narrow shortfall to 19.3%", "summary": "Heavy showers in early July narrowed India’s monsoon deficit to 19.3% from 38% in June. However, rainfall remains uneven, with the east and northeast reporting a 35.5% deficit. July is critical for kharif sowing of pulses, paddy, and oilseeds. Policymakers remain cautious as retail inflation touched a 17-month high of 4.38% in June, driven by rising food prices and El Niño risks.", "category": "Economy", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/130507", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_15-07-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130507"}], "article_id": "fd50ef23"}, {"headline": "Sprng Energy acquisition highlights Grasim's evolution as Aditya Birla flagship incubator", "summary": "Aditya Birla Renewables acquired Sprng Energy from Shell for $1.8 billion, making it one of India’s top five renewable players with 9.3GW capacity. The deal spotlights Grasim Industries’ shift from a textiles firm into the group’s capital allocation and incubation vehicle, managing diverse interests from cement (UltraTech) and finance to new ventures in paints and B2B e-commerce.", "category": "Business", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130507", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_15-07-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/130507"}], "article_id": "13909991"}, {"headline": "Aera proposes delaying airport fee recovery until infrastructure is operational", "summary": "India’s airport regulator, Aera, has proposed that airports only recover infrastructure costs from passengers via user development fees (UDF) after projects are operational. Currently, flyers pay for construction in progress. While passenger groups welcome the move for fairness, major operators like GMR and Fairfax argue it could create financial challenges for funding large projects.", "category": "Infrastructure", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130507", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_15-07-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/130507"}], "article_id": "1409b8dd"}, {"headline": "China overhauls university curricula by replacing 12,000 programs with AI courses", "summary": "China is redrawing its higher education landscape, replacing over 12,000 humanities and management programs with AI, robotics, and semiconductors. The shift aims to address a 15.6% youth unemployment rate and align graduates with market demand. Meanwhile, university entrance exam registrations have declined for two years, signaling a shift away from traditional academic pathways.", "category": "Education", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130507", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_15-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130507"}], "article_id": "5f547b41"}, {"headline": "Oil prices jump to $85 as Trump threat creates supply uncertainty", "summary": "Brent crude rose 10% to over $87 before easing to $85 after US President Donald Trump threatened to toll vessels in the Strait of Hormuz. Though he later pivoted to trade deals, the threat of a blockade remains. Every $1 per barrel increase in oil raises India’s annual import bill by ₹18,000 crore, posing risks to inflation and corporate profitability as India imports 90% of its oil.", "category": "World", "page": 7, "importance": 9, "telegram_url": "https://t.me/c/1877410077/130507", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_15-07-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/130507"}], "article_id": "fd8f205a"}, {"headline": "India-UK trade deal live now, targets $100 billion trade by 2030", "summary": "The India-UK Comprehensive Economic and Trade Agreement (CETA) took effect Wednesday, offering duty-free access for 99.5% of Indian export value. The pact covers 30 chapters including digital trade, innovation, and professional services. Indian exporters in textiles, leather, and gems expect significant gains, while a social security pact will save professionals over ₹4,000 crore annually.", "category": "Economy", "page": 8, "importance": 9, "telegram_url": "https://t.me/c/1877410077/130507", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_15-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130507"}], "article_id": "518d841e"}, {"headline": "Drugmakers prepare legal response as DCGI flags confusing brand name extensions", "summary": "Pharmaceutical associations are collating data to challenge a government notice against extending primary brand names to drugs with different active ingredients. The DCGI warned that the practice misleads consumers and endangers patient safety. The $60 billion industry faces a potential regulatory overhaul of marketing strategies and multi-million dollar brand portfolios.", "category": "Health", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130507", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_15-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130507"}], "article_id": "5d1704ab"}, {"headline": "Government opens freight wagon design to private companies in major reform", "summary": "The Ministry of Railways has introduced eight new reforms allowing private firms to design and manufacture commodity-specific freight wagons. The move aims to increase rail's cargo share from 27% and reduce logistics costs. Policies now allow oil companies to introduce tailored tank wagons, shifting responsibility for design from the government to private industry for faster innovation.", "category": "Infrastructure", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130507", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_15-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130507"}], "article_id": "bc2745af"}, {"headline": "Competition Commission fines HP India ₹1.27 billion for tender price rigging", "summary": "The CCI imposed a ₹1.27 billion fine on HP Inc.'s Indian arm and additional penalties on its resellers for colluding to rig prices in government procurement tenders. The regulator found that the company and its partners suppressed competition by coordinating bids, violating fair trade practices in the public sector supply chain.", "category": "Law", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130507", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_15-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130507"}], "article_id": "655397c5"}, {"headline": "India draws $10 billion through RBI's concessional forex-swap drive", "summary": "The Reserve Bank of India has attracted approximately $10 billion in foreign currency through a zero-cost swap facility for NRI deposits. The scheme allows banks to offer higher returns on 3-5 year FCNR(B) deposits to bolster foreign exchange reserves and support the rupee. Most inflows are originating from West Asia and Singapore rather than the US.", "category": "Economy", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130507", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_15-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130507"}], "article_id": "1ea33207"}, {"headline": "AI hiring shifts focus from token consumption to measurable business value", "summary": "Recruiters are moving away from evaluating AI talent based on 'token maxing' to 'value maxing.' Startups and enterprises now assess candidates on cost-per-outcome and return on AI investment (ROAI). While 90% of tech professionals use AI, industry leaders warn of a shortage of deep engineering skills needed to build AI-native products rather than just using existing tools.", "category": "Technology", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130507", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_15-07-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/130507"}], "article_id": "1bc1e46b"}, {"headline": "DeepSeek founder Liang Wenfeng becomes world's richest AI model creator", "summary": "DeepSeek founder Liang Wenfeng's net worth has doubled to $36 billion following a new funding round. The Chinese entrepreneur now outranks OpenAI’s Greg Brockman and Anthropic’s Dario Amodei. DeepSeek recently disrupted the industry by releasing a high-performing large language model at a significantly lower cost ", "page": 13, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130507", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_15-07-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/130507"}], "article_id": "4ed3dc4f"}, {"headline": "Smartphone replacement cycles stretch to 36 months amid 'memflation' price hikes", "summary": "India's smartphone market is plateauing as replacement cycles extend to 36 months, up from 18-24 months. A global memory shortage and rupee depreciation have pushed average selling prices up to $320. Shipments are expected to fall 10% in H1 2026 as mass-market buyers defer upgrades or turn to refurbished devices, shifting the market from volume-led to value-led growth.", "category": "Technology", "page": 14, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130507", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_15-07-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/130507"}], "article_id": "24e9d837"}, {"headline": "Akasa Air seeks ₹10.5 billion to offset war-driven jet fuel costs", "summary": "Akasa Air is looking to raise ₹10.5 billion through equity and debt to counter financial strain from the Iran-US conflict. The war has spiked jet fuel prices, which account for 40% of airline operating costs. The carrier is in talks with existing investors and seeking a government credit line for airlines impacted by the geopolitical situation.", "category": "Business", "page": 15, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130507", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_15-07-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/130507"}], "article_id": "b462999c"}, {"headline": "India reaffirms support for Palestine UN membership and two-state solution", "summary": "India has backed Palestine’s bid for United Nations membership and reiterated its support for a two-state solution. During a ministerial meeting in Brussels, officials emphasized India's role as a long-standing partner and its commitment to humanitarian aid for Palestinians. The stance reflects India’s balanced diplomatic approach to the ongoing conflict.", "category": "Politics", "page": 15, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130507", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_15-07-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/130507"}], "article_id": "89aa69fe"}, {"headline": "RBI proposes easing major bank stake purchase rules for institutional investors", "summary": "The RBI has proposed a one-time approval for mutual funds and insurance companies to acquire major shareholdings in banks, replacing the requirement for repeated clearances. The move seeks to simplify the investment process for institutional players and encourage long-term capital stability in the banking sector. Feedback on the draft proposal is invited until August 4.", "category": "Economy", "page": 15, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130507", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_15-07-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/130507"}], "article_id": "acf62eb7"}, {"headline": "Tier-II cities emerge as commercial real estate hotspots for office space", "summary": "Rising metro rents are driving a 20-35% lower-cost expansion into tier-II cities like Jaipur, Kochi, and Ahmedabad. These cities now account for 29% of India's flex coworking centres. Driven by reverse migration and hybrid work, commercial yields in these hubs range from 6-8%, drawing institutional investment and residential development into new economic ecosystems.", "category": "Infrastructure", "page": 17, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130507", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_15-07-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/130507"}], "article_i     panel.id=`cat-panel-${ci}`;
    panel.style.setProperty('--cc',m.color);
    panel.innerHTML=`<div class="progress-row" id="prow-${ci}" style="--cc:${m.color}"></div><div class="v-feed" id="vfeed-${ci}"><div class="v-track" id="vtrack-${ci}"></div></div>`;
    hTrack.appendChild(panel);
    const pRow=panel.querySelector(`#prow-${ci}`);
    const vFeed=panel.querySelector(`#vfeed-${ci}`);
    const vTrack=panel.querySelector(`#vtrack-${ci}`);
    const cardH=vFeed.getBoundingClientRect().height||vpH;
    
    arts.forEach((art,ai)=>{
      const card = buildCard(art, cardH, m, cat, ai);
      card.id = `article-${art.article_id}`;
      card.dataset.articleId = art.article_id;
      vTrack.appendChild(card);
    });
    
    panels.push({pRow,vFeed,vTrack,articles:arts,artIdx:0});
    buildPRow(ci);
  });
  
  hTrack.style.transition='none';
  hTrack.style.transform='translateX(0)';
  syncV(0,false);
  
  // Apply deep link after build — 200ms ensures card heights are measured
  if (deepLinkTarget) {
    setTimeout(() => applyDeepLink(deepLinkTarget), 200);
  }
}

function buildCard(art,h,m,cat,articleIndex) {
  const src=art.sources?.[0];
  // Direct PDF link with #page=N - respected by all modern browser PDF viewers
  // when the file is opened via a link click (Chrome, Firefox, Safari, Edge).
  // Falls back to the Telegram source URL if no PDF is available.
  const href = src?.pdf_filename
    ? ('pdfs/' + src.pdf_filename + '#page=' + (src.page || 1))
    : (src?.telegram_url || '#');
  const card=document.createElement('div');
  card.className='card';
  card.dataset.articleId = art.article_id;
  card.style.height=h+'px';
  card.style.setProperty('--cc',m.color);
  card.innerHTML=`
    <div class="card-content">
      <div class="card-toprow">
        <div class="cat-pill">
          <div class="pill-icon"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="1" y="1" width="8" height="2" rx="0.6" fill="#888"/><rect x="1" y="4.5" width="5" height="1.5" rx="0.6" fill="#666"/><rect x="1" y="7" width="6" height="1.5" rx="0.6" fill="#666"/></svg></div>
          ${cat.toUpperCase()}
        </div>
        <div class="card-date">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="2.5" width="11" height="9.5" rx="1.8" stroke="#555" stroke-width="1.2"/><path d="M4.5 1v3M8.5 1v3" stroke="#555" stroke-width="1.2" stroke-linecap="round"/><path d="M1 6h11" stroke="#555" stroke-width="1.2"/></svg>
          ${DIGEST.date}
        </div>
      </div>
      <div class="card-headline">${art.headline}</div>
      <div class="card-summary">${art.summary}</div>
      <div class="card-divider"></div>
      <div class="card-footer">
        ${src?`<a class="src-chip" href="${href}" target="_blank" onclick="event.stopPropagation()">${src.newspaper}<span class="src-chip-sep">&middot;</span><span class="src-chip-pg">Pg ${src.page}</span><span class="src-chip-ext"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M3.5 7.5L7.5 3.5M7.5 3.5H5M7.5 3.5V6" stroke="#555" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></span></a>`:'<div></div>'}
        <div class="info-btn"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6.5" stroke="#444" stroke-width="1.3"/><circle cx="7.5" cy="4.5" r="0.8" fill="#555"/><path d="M7.5 7v4" stroke="#555" stroke-width="1.5" stroke-linecap="round"/></svg></div>
      </div>
    </div>`;
  return card;
}

function buildPRow(ci) {
  const p=panels[ci],ai=p.artIdx;
  p.pRow.innerHTML='';
  p.articles.forEach((_,i)=>{
    const seg=document.createElement('div');
    seg.className='pseg'+(i<ai?' done':i===ai?' active':'');
    p.pRow.appendChild(seg);
  });
}

function syncV(ci,animated) {
  const p=panels[ci],h=p.vFeed.getBoundingClientRect().height;
 p.vTrack.style.transition=animated?'transform 0.35s cubic-bezier(0.4,0,0.2,1)':'none';
  p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;
  buildPRow(ci);
}

function applyDeepLink(target) {
  const ci = sortedCats.findIndex(cat =>
    byCategory[cat].some(art => art.article_id === target.hash)
  );
  if (ci === -1) return;

  // Set catIdx BEFORE calling goCat so the horizontal track lands correctly
  catIdx = ci;
  hTrack.style.transition = 'none';
  hTrack.style.transform = `translateX(${-ci * vpW}px)`;

  const ai = byCategory[sortedCats[ci]].findIndex(art => art.article_id === target.hash);
  if (ai === -1) return;
  panels[ci].artIdx = ai;
  syncV(ci, false);

  const card = document.getElementById('article-' + target.hash);
  if (card) {
    card.classList.add('target-highlight');
    setTimeout(() => card.classList.remove('target-highlight'), 3000);
  }
}

function goArt(d) {
  const p=panels[catIdx];
  const n=Math.max(0,Math.min(p.artIdx+d,p.articles.length-1));
  if(n===p.artIdx&&d!==0)return;
  p.artIdx=n; syncV(catIdx,true); dismiss();
}

function goCat(idx,animated=true) {
  idx=Math.max(0,Math.min(idx,sortedCats.length-1));
  if(idx===catIdx&&animated)return;
  const prev=catIdx; catIdx=idx;
  hTrack.style.transition=animated?'transform 0.38s cubic-bezier(0.4,0,0.2,1)':'none';
  hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;
  if(animated&&idx!==prev) {
    const m=CAT_META[sortedCats[idx]]||{color:"#e8334a",icon:"📰"};
    catFlash.style.background=m.color+'18';
    cfIcon.textContent=m.icon; cfName.textContent=sortedCats[idx]; cfName.style.color=m.color;
    catFlash.classList.add('on'); setTimeout(()=>catFlash.classList.remove('on'),500);
  }
  dismiss();
}

let dismissed=false;
function dismiss() {
  if(dismissed)return; dismissed=true;
  hintUp.classList.remove('visible'); hintRight.classList.remove('visible');
  hintUp.classList.add('gone'); hintRight.classList.add('gone');
}

(function initHints() {
  const KEY='dailyBriefHintSeen';
  if(!localStorage.getItem(KEY)) {
    localStorage.setItem(KEY,'1');
    setTimeout(()=>{ if(!dismissed){ hintUp.classList.add('visible'); hintRight.classList.add('visible'); } },2500);
  }
})();

let tsX=0,tsY=0,tcX=0,tcY=0,axis=null,drag=false;
outer.addEventListener('touchstart',e=>{ tsX=e.touches[0].clientX; tsY=e.touches[0].clientY; tcX=0; tcY=0; axis=null; drag=true; hTrack.style.transition='none'; const p=panels[catIdx]; if(p)p.vTrack.style.transition='none'; },{passive:true});
outer.addEventListener('touchmove',e=>{ if(!drag)return; const dx=e.touches[0].clientX-tsX,dy=e.touches[0].clientY-tsY; tcX=dx; tcY=dy; if(!axis&&(Math.abs(dx)>8||Math.abs(dy)>8))axis=Math.abs(dx)>Math.abs(dy)?'h':'v'; if(!axis)return; e.preventDefault(); if(axis==='h'){ const edge=(catIdx===0&&dx>0)||(catIdx===sortedCats.length-1&&dx<0); hTrack.style.transform=`translateX(${-catIdx*vpW+dx*(edge ? 0.14 : 1)}px)`; }else{ const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height; const edge=(p.artIdx===0&&dy>0)||(p.artIdx===p.articles.length-1&&dy<0); p.vTrack.style.transform=`translateY(${-p.artIdx*h+dy*(edge ? 0.14 : 1)}px)`; } },{passive:false});
outer.addEventListener('touchend',()=>{ if(!drag)return; drag=false; if(axis==='h'){ const t=vpW*.2; if(tcX<-t)goCat(catIdx+1); else if(tcX>t)goCat(catIdx-1); else{hTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;} }else if(axis==='v'){ const t=vpH*.2; if(tcY<-t)goArt(1); else if(tcY>t)goArt(-1); else{const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height;p.vTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;} } axis=null; },{passive:true});
document.addEventListener('keydown',e=>{ if(e.key==='ArrowDown'||e.key===' '){e.preventDefault();goArt(1);} if(e.key==='ArrowUp'){e.preventDefault();goArt(-1);} if(e.key==='ArrowRight'){e.preventDefault();goCat(catIdx+1);} if(e.key==='ArrowLeft'){e.preventDefault();goCat(catIdx-1);} });
let wl=false;
outer.addEventListener('wheel',e=>{ e.preventDefault();if(wl)return;wl=true; Math.abs(e.deltaX)>Math.abs(e.deltaY)?goCat(catIdx+(e.deltaX>0?1:-1)):goArt(e.deltaY>0?1:-1); setTimeout(()=>wl=false,500); },{passive:false});
window.addEventListener('resize',()=>{ vpW=outer.offsetWidth;vpH=outer.offsetHeight; hTrack.style.transition='none'; hTrack.style.transform=`translateX(${-catIdx*vpW}px)`; panels.forEach(p=>{ const h=p.vFeed.getBoundingClientRect().height; p.vTrack.querySelectorAll('.card').forEach(c=>c.style.height=h+'px'); p.vTrack.style.transition='none'; p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`; }); });

buildAll();
</script>
</body>
</html>
