me/c/1877410077/128171", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_24-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/128171"}], "article_id": "cb65484c"}, {"headline": "Factor investing gains traction, led by value and momentum factors", "summary": "New fund launches signal a resurgence in factor investing, with value and momentum factors outperforming in 2026. While silver ETFs lead, value-oriented portfolios benefit from sectoral exposure. Low volatility and quality factors have struggled due to moderate earnings. Investors debate the trend's sustainability.", "category": "Economy", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128171", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_24-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/128171"}], "article_id": "58938188"}, {"headline": "Indian consumers remain wary despite easing oil prices, inflation", "summary": "Indian consumer sentiment remains weak, influenced by high food inflation (4.8% last month) and a 40% monsoon deficit, despite falling crude prices. The RBI's Consumer Confidence Survey showed broad declines, with lower-income households struggling and affluent ones becoming cautious about discretionary spending.", "category": "Economy", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128171", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_24-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/128171"}], "article_id": "9c2ce9f5"}, {"headline": "EQT sees India as key exit market after $15.6 billion fund close", "summary": "Hari Gopalakrishnan of EQT stated India remains a top market for the PE firm after closing a $15.6 billion fund. With $7 billion deployed in three years, he sees the underpenetrated buyout market, young demographic, and family businesses driving future private investments despite short-term fluctuations.", "category": "Business", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128171", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_24-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/128171"}], "article_id": "b3cdc033"}, {"headline": "Satcom firms raise concerns over non-auction spectrum rules", "summary": "Satellite communication firms are concerned over the exclusion of commercial satellite internet services (GMPCS) from draft non-auction spectrum assignment rules. They urge explicit inclusion, aligning with the Telecommunications Act 2023, to ensure a clear framework for timely commercial rollout and investment.", "category": "Technology", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128171", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_24-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/128171"}], "article_id": "61245914"}, {"headline": "Flipkart Minutes expands quick commerce to tier II/III cities", "summary": "Flipkart Minutes is expanding quick commerce beyond metros, operating 1,000 dark stores across 130+ cities, with 90 in tier II/III markets. This strategy leverages existing logistics, tailoring instant delivery to smaller towns with higher average order values and comparable profitability due to lower operating costs.", "category": "Business", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128171", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_24-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/128171"}], "article_id": "9780c1b2"}, {"headline": "Akasa Air plans 30% fleet expansion, defies industry caution", "summary": "Akasa Air aims to expand passenger capacity by 30% this fiscal year, defying industry caution and larger rivals trimming growth plans. Despite West Asia war disruptions, the airline, backed by late Rakesh Jhunjhunwala, is pushing ahead after narrowing losses and achieving six straight months of operational profitability.", "category": "Business", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128171", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_24-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/128171"}], "article_id": "22d2868c"}, {"headline": "India's 'insurgent' consumer brands struggle to scale past ₹250 cr", "summary": "India is producing more 'insurgent' consumer brands (over ₹100 crore annual revenue, 30%+ CAGR), but only a few scale beyond ₹250 crore. Quick commerce and higher beauty/personal care margins drive growth, yet only a third of brands founded before 2015 have crossed ₹500 crore.", "category": "Business", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128171", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_24-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/128171"}], "article_id": "3451aa33"}, {"headline": "Strait of Hormuz traffic increases as Iran-US peace deal holds", "summary": "More oil tankers are transiting the Strait of Hormuz with signals on, indicating growing confidence after an interim Iran-US peace deal. Seven tankers, including two fully-laden supertankers, crossed Tuesday, reflecting a thaw in tensions and rising traffic volumes towards pre-war levels.", "category": "World", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128171", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_24-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/128171"}], "article_id": "4d38fb31"}, {"headline": "Iran denies IAEA access to nuclear sites, complicates peace talks", "summary": "Iran denies it will allow UN nuclear watchdog inspectors access to sites bombed by the US and Israel, contradicting US claims of comprehensive nuclear inspections in peace talks. This complicates the 60-day period to settle broader issues including Iran’s nuclear program and sanctions relief.", "category": "World", "page": 8, "importance": 8, "telegram_url": "https://t.me/c/1877410077/128171", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_24-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/128171"}], "article_id": "c0357ec4"}, {"headline": "Trump: Iran's unfrozen funds for food, medical supplies from US", "summary": "President Trump stated Iran's unfrozen $12 billion in funds, part of a peace deal, will be escrowed and used *exclusively* for food and medical supplies purchased from the US. This addresses criticism from defense hawks, though Iran disputes the restriction, claiming free use of funds.", "category": "World", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128171", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_24-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/128171"}], "article_id": "dbc95e82"}, {"headline": "Record-breaking heat wave sweeps Europe, threatens health and power", "summary": "A strengthening heat wave threatens to break temperature records across Europe, with highs up to 43.3C in France and forecasts of 39C in the UK. Red warnings are issued, posing risks to transport, power systems, and public health, exacerbated by \"tropical nights\" and inadequate air conditioning.", "category": "Environment", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128171", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_24-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/128171"}], "article_id": "862e483c"}, {"headline": "Oracle cuts 21,000 jobs (13%) in FY26, focuses on AI", "summary": "Oracle reduced its workforce by 13% (21,000 employees) in fiscal 2026, attributing cuts to restructuring, management changes, performance issues, and AI adoption. The cloud computing giant spent $1.84 billion on severance, reflecting a broader tech trend of job losses due to AI disruption.", "category": "Technology", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128171", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_24-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/128171"}], "article_id": "7e87f0df"}, {"headline": "Coworking firm Innov8 acquires Vatika Business Centres", "summary": "Coworking firm Innov8 has acquired Vatika Business Centres, adding 11 prime business centres across key Indian cities including New Delhi, Gurugram, and Bengaluru. This expansion aims to strengthen Innov8's presence in commercial hubs and capitalize on rising demand for flexible managed workspaces.", "category": "Business", "page": 9, "importance": 3, "telegram_url": "https://t.me/c/1877410077/128171", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_24-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/128171"}], "article_id": "08565783"}, {"headline": "Irdai seeks views on insurer contributions to PEPF", "summary": "India’s insurance regulator, Irdai, is seeking feedback on whether insurers should contribute a percentage of gross direct premium to the Policyholders’ Education and Protection Fund (PEPF). This new ₹800-crore fund, created under the Sabka Bima Sabki Raksha Act, aims to expand insurance coverage and enhance policyholder protection.", "category": "Economy", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128171", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_24-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/128171"}], "article_id": "680697fd"}, {"headline": "Government to divest up to 2% stake in IRFC via OFS", "summary": "The government announced an Offer For Sale (OFS) to divest up to 2% equity stake in state-run Indian Railway Finance Corporation (IRFC). Non-retail investors can participate Wednesday, retail on Thursday, with a 1% base offer and an additional 1% greenshoe option in case of strong demand.", "category": "Business", "page": 9, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128171", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_24-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/128171"}], "article_id": "0ae203f8"}, {"headline": "Fairfax buys $1 billion Indian government bonds", "summary": "Fairfax bought nearly $1 billion in Indian government debt last Friday, a rare purchase, ahead of a potential deal to acquire a stake in government-owned IDBI Bank. India’s recent decision to exempt foreign investors in government bonds from capital gains tax made the transaction viable.", "category": "Economy", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128171", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_24-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/128171"}], "article_id": "02b6d0fe"}, {"headline": "PPFAS Flexi Cap Fund increases exposure to IT stocks", "summary": "India’s largest actively managed equity fund, PPFAS Mutual Fund’s $14.9 billion Flexi Cap Fund, has increased its exposure to beaten-down IT services stocks over the past three months to May. This strategy bets against investor fears regarding artificial intelligence’s impact on the outsourcing industry.", "category": "Economy", "page": 9, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128171", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_24-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/128171"}], "article_id": "642f02d2"}, {"headline": "Jai Bajaj appointed CEO of Bajaj Capital", "summary": "Financial services firm Bajaj Capital announced Jai Bajaj as its new managing director and chief executive officer. This appointment marks a significant milestone, aiming to accelerate the company's transformation into a technology-enabled, insight-driven financial advisory organization, building on over 60 years of trust.", "category": "Business", "page": 9, "importance": 3, "telegram_url": "https://t.me/c/1877410077/128171", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_24-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/128171"}], "article_id": "2a268ccc"}, {"headline": "Honasa acquires 58% stake in Fluence Pharma for ₹135 cr", "summary": "Honasa Consumer Ltd, parent of Mamaearth, will acquire a 58% stake in Fluence Pharma, a science-backed nutraceuticals company, at an enterprise value of ₹135 crore. This marks Honasa's entry into the high-growth nutraceuticals space, with plans to acquire the remaining stake over 5-7 years.", "category": "Business", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128171", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_24-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/128171"}], "article_id": "54d2263a"}, {"headline": "Sebi enhances investor protection with new anti-fraud tools", "summary": "Sebi has launched a suite of investor protection tools, including Past Risk and Return Verification Agency (PaRRVA) for performance data, an updated SCORES 2.0 AI for grievances, AI Sudarshan to detect online investment advice, and verified labels for trading apps and UPI handles, but their success hinges on investor awareness.", "category": "Economy", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128171", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_24-06-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/128171"}], "article_id": "a5ff19bf"}, {"headline": "Parents grapple with AI's role in children's homework and learning", "summary": "Parents and teachers are wrestling with AI's role in children's homework, with some schools banning its use. The dilemma is how to integrate AI tools—for brainstorming or hints—without undermining foundational skills and independent thinking, necessitating new curricula and a shared vocabulary for AI literacy in education.", "category": "Education", "page": 14, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128171", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_24-06-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/128171"}], "article_id": "3cc965e0"}, {"headline": "Vivo X300 FE offers flagship features in a compact smartphone", "summary": "The Vivo X300 FE, priced from ₹79,999, is a premium, compact flagship with a 6.31-inch AMOLED panel, Snapdragon 8 Gen 5 chip, and 6,500mAh battery. Its ZEISS-backed camera system, particularly the telephoto lens, offers strong performance, though overall cost and some features face tough competition.", "category": "Technology", "page": 14, "importance": 3, "telegram_url": "https://t.me/c/1877410077/128171", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_24-06-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/128171"}], "article_id": "e629402a"}, {"headline": "Three devices offer affordable solutions to expensive memory", "summary": "As memory prices climb, three devices offer cost-effective external storage solutions. The Sharge Disk Pro (from ₹36,799) combines SSD with a USB hub for mobile devices. UltraProlink Mag-Vault (₹2,999) is a magnetic storage card reader. SanDisk Extreme Fit (from ₹2,049) is a compact, always-on USB-C drive for laptops.", "category": "Technology", "page": 14, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128171", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_24-06-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/128171"}], "article_id": "954f4024"}, {"headline": "Fiancee, boyfriend arrested for Pune businessman's murder at fort", "summary": "Pune police arrested Siya Goyal, 20, and her boyfriend Chetan Chaudhary for allegedly pushing her fiance, businessman Ketan Vishal Agarwal, 25, down a 400-foot gorge at Lohagad Fort. Agarwal and Goyal were engaged in February, but she was in love with Chaudhary, leading to the murder plot. They reportedly confessed.", "category": "Law", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "8578173d"}, {"headline": "Dust storm, strong winds lash Delhi", "summary": "A dust storm with strong winds (80-100km/h) lashed parts of Delhi on Tuesday evening, tinting the city in sepia. This event preceded light showers and thunderstorms, prompting IMD to issue a red alert for large parts of the capital.", "category": "Environment", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "7b4589e8"}, {"headline": "Monsoon hits Mumbai, remains weak till July 2", "summary": "The monsoon hit Mumbai on Tuesday, 12 days late. IMD predicts it will remain weak until July 2, potentially affecting kharif crops in 111 districts across 12 states.", "category": "Environment", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "e2983dce"}, {"headline": "Shutdown halts Ladakh amid impasse with Centre over safeguards", "summary": "A shutdown called by the Leh Apex Body and Kargil Democratic Alliance disrupted normal life in Ladakh on Tuesday. Protesters in Leh demanded the Centre commit to constitutional safeguards for the region, which has led to an ongoing impasse with the government.", "category": "Politics", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "09776295"}, {"headline": "Cab driver arrested for raping, killing 10-year-old girl", "summary": "A 29-year-old cab driver was arrested for kidnapping a 10-year-old girl from Chhattarpur on Monday, raping her in his car, and then killing and dumping her body in Mehrauli. The accused was apprehended by police on Tuesday.", "category": "Law", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "4110a342"}, {"headline": "Couple killed in Lucknow fire were soon to be married", "summary": "Neelesh Kumar, 28, and Anamika Samanta, 30, who met at an animation centre in Lucknow and were planning to marry, died in a fire that tore through their office building on Monday. They were among 15 fatalities.", "category": "India", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "4ecea5e2"}, {"headline": "Markets fall 1% as investors dump tech, metal stocks", "summary": "Indian markets experienced a 1% decline as investors offloaded shares in technology and metal sectors. The downturn reflects broader investor sentiment following recent economic reports and global market trends, impacting equity valuations across key industries.", "category": "Economy", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "93e82912"}, {"headline": "Indo-Japan summit moved to Delhi due to 'logistical issues'", "summary": "The Indo-Japan summit has been relocated to Delhi from its original venue. Officials cited 'logistical issues' as the reason for the change, impacting the scheduling and preparations for the high-level bilateral discussions between the two nations.", "category": "Politics", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "e3c7000d"}, {"headline": "SC stays release of 1993 Kolkata blast convict", "summary": "The Supreme Court has temporarily halted the release of a convict in the 1993 Kolkata blast case. This decision comes after an appeal challenged the earlier order for his release, pending further review by the apex court.", "category": "Law", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "1a49df1b"}, {"headline": "June 2026 monsoon progress 11th driest in 126 years", "summary": "India's June 2026 monsoon rainfall is the 11th driest since 1901 (76.4 mm), 33% below the 1971-2020 average. Despite a recent stall ending, the cumulative national deficit remains 33%, raising concerns for kharif crops but not unprecedented in historical context.", "category": "Environment", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "314070be"}, {"headline": "US, Iran dispute N-checks; Hormuz evacuation of ships begins", "summary": "US President Donald Trump claims Iran agreed to \"infinity\" nuclear inspections, which Tehran denies. Amid a fragile peace deal, a UN shipping agency initiated the evacuation of 11,000 seafarers from the Gulf, allowing vessels to transit the Strait of Hormuz, previously blocked by Iran during the war.", "category": "World", "page": 3, "importance": 9, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "3c4645dd"}, {"headline": "Union minister George Kurian resigns as Rajya Sabha term ends", "summary": "Union Minister of State George Kurian, a BJP leader from Kerala, resigned from the Union council of ministers after his Rajya Sabha term expired and he was not renominated. Kurian, the only Christian minister, served Minority Affairs, Fisheries, Animal Husbandry, and Dairying.", "category": "Politics", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "f4e7380f"}, {"headline": "TMC factions move EC, claim control of party and symbol", "summary": "Mamata Banerjee's Trinamool Congress and a rebel bloc led by Ritabrata Banerjee filed competing national working committee lists with the Election Commission, initiating a formal dispute over the party's name, assets, and twin-flower election symbol, following defections by 65 of 80 legislators.", "category": "Politics", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "801dc755"}, {"headline": "TN challenges HC order allowing Deepam lighting on Madurai hill", "summary": "The Tamil Nadu government moved the Supreme Court against Madras High Court orders permitting Karthigai Deepam lighting at a stone pillar near a dargah atop Thirupparankundram hill in Madurai. The state challenges both December 2025 and January 2026 judgments upholding the ritual.", "category": "Law", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "50c6bf8e"}, {"headline": "Congress demands probe into MP CM kin’s Ujjain land dealings", "summary": "The Congress sought a judicial inquiry into land purchases in Ujjain by Chief Minister Mohan Yadav’s family and associated real estate firms, alleging a \"conflict of interest\" and demanding his resignation. A report claims 335 acres were acquired, with value appreciating due to government infrastructure push.", "category": "Politics", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "08aff214"}, {"headline": "AAP MLA Chaitar Vasava gets 7-year jail for assault, extortion", "summary": "Gujarat's Narmada district court convicted AAP MLA Chaitar Vasava for assault, intimidation, and extortion of forest officials, sentencing him to seven years' imprisonment. Vasava ceases to be a legislator with the order, which stems from a 2023 incident involving illegal cultivation and an alleged payment of ₹60,000.", "category": "Law", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "7b51a8ed"}, {"headline": "SIT submits initial report on Ayodhya Ram Temple funds case", "summary": "The Special Investigation Team (SIT) probing alleged embezzlement of donations at the Ayodhya Ram Temple submitted a preliminary report to the Uttar Pradesh government, seeking more time. It covers alleged cash theft, missing ornaments, and administrative practices, recommending a CEO and weekly audits.", "category": "Law", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "46b8392c"}, {"headline": "Uttarakhand gurdwara standoff resolved as Nihang Sikhs descend", "summary": "The standoff between Nihang Sikhs and gurdwara administration in Nagrasu, Rudraprayag, ended peacefully as remaining group members descended from the gurdwara terrace. The resolution followed persuasion by a delegation of Nihang Sikhs from Punjab after a June 19 Supreme Court ruling on pedestrian rights.", "category": "India", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "91ec0e30"}, {"headline": "US pilot reports 'jellyfish formation' of Iranian drones before F-15 downed", "summary": "A US fighter pilot, whose jet was shot down over Iran in April, told intelligence officials he saw a swarm of Iranian drones in a \"jellyfish formation,\" raising alarm about new Iranian drone technology. The drone formation may have contributed to the F-15's downing.", "category": "World", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "c48ac38b"}, {"headline": "US VP Vance suggested Indian troops for Ukraine peacekeeping", "summary": "US Vice President JD Vance reportedly suggested deploying Indian or Saudi Arabian troops as peacekeepers in Ukraine during a White House discussion. According to \"Regime Change: Inside the Trump Presidency,\" Trump dismissed the idea, stating Indians \"won't pay for something like that,\" despite Modi's good relationship with him.", "category": "World", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "75ba92e4"}, {"headline": "President Murmu confers Padma awards for sport, cinema, art", "summary": "President Droupadi Murmu conferred Padma Shri and Padma Bhushan awards at Rashtrapati Bhavan. Honorees included hockey player Savita Punia, folk artist Sangyusang Pongener, cricketer Rohit Sharma, and Malayalam cinema legend Mammootty, celebrating exceptional service across diverse fields.", "category": "India", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "316e5c95"}, {"headline": "Messi, Mbappe, Haaland lead breathless World Cup golden boot race", "summary": "Lionel Messi, Kylian Mbappe, and Erling Haaland are dominating the World Cup's Golden Boot race with contrasting styles. Messi surpassed Klose's WC goal record, Mbappe set a multiple-goal game record, and Haaland continues his prolific scoring, showcasing diverse footballing genius early in the tournament.", "category": "Sports", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "5ee3f963"}, {"headline": "Daughter of BJP leader Kailash Gahlot tops CUET-UG exam", "summary": "Devina Gahlot, 17, daughter of former Delhi minister Kailash Gahlot, scored in the 100th percentile in four subjects, topping CUET-UG with 1,232.19/1,250 marks. She aims to study English at St. Stephen’s College and pursue journalism/creative writing, emphasizing consistent daily study.", "category": "Education", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "12b6f399"}, {"headline": "Karnataka plans 'Namma Guide' app to boost tourism", "summary": "Karnataka Tourism Department is developing 'Namma Guide,' a new online platform to enhance state tourism and provide world-class facilities. The app will offer tourists accurate information on history, culture, and significance of various destinations through local guides.", "category": "Technology", "page": 5, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "a6e802f6"}, {"headline": "BJP begins disciplinary action against Karnataka cross-voters", "summary": "Karnataka BJP leadership confirmed disciplinary action has started against party legislators who allegedly cross-voted in last week's Legislative Council elections. While the secret ballot makes identification difficult, internal calculations suggest a wider rebellion than officially acknowledged, with some JD(S) MLAs also deviating.", "category": "Politics", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "b470daa5"}, {"headline": "Karnataka rejects Tamil Nadu’s demand for additional Cauvery water", "summary": "Karnataka rejected Tamil Nadu's demand for additional Cauvery water at a CWMA meeting, citing weak monsoon rains and reduced reservoir inflows. The state argued releasing more water would jeopardize drinking water supplies, emphasizing conservation for essential needs amidst a difficult hydrological situation.", "category": "Environment", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "d02c04f9"}, {"headline": "BWSSB chief urges proactive measures to prevent Bengaluru water crisis", "summary": "BWSSB Chairperson N Manjula instructed senior officials to implement immediate steps to prevent an impending drinking water crisis in Bengaluru, following a deficit in expected monsoon rains. The directive emphasizes preparedness and water scarcity management.", "category": "Environment", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "b0a8a89b"}, {"headline": "NBW re-issued against actor Prakash Raj in voter IDs case", "summary": "A Bengaluru court re-issued a non-bailable warrant (NBW) against actor Prakash Raj for allegedly failing to appear in a case accusing him of maintaining voter registrations in multiple states, violating Election Commission rules. This is the third NBW issuance after he remained absent.", "category": "Law", "page": 5, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "c00b9da4"}, {"headline": "KPCC chief urges vigilance in voter roll revision exercise", "summary": "State Congress chief B K Hariprasad called on party workers to be vigilant during the ongoing Special Intensive Revision (SIR) of electoral rolls in Karnataka, claiming BJP and RSS were attempting to remove legitimate voters. He stressed ensuring no genuine voter names are deleted to protect democracy.", "category": "Politics", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "9008efc2"}, {"headline": "Woman, son held for murdering grandmother over alcohol dispute", "summary": "A 70-year-old woman, Jayamma, was allegedly beaten to death by her daughter Bhagyalakshmi (49) and grandson Kushal (26) in Kengeri, Bengaluru, after she objected to their alcohol consumption. Police have taken both into custody and registered a murder case.", "category": "Law", "page": 5, "importance": 3, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "2a397128"}, {"headline": "Traffic police: Student missed NEET due to late start, longer route", "summary": "Bengaluru Traffic Police found no evidence linking a Congress rally to a NEET UG re-examination delay, concluding the student left home too late (12:57 pm for 1:30 pm closure) and chose a longer route. CCTV footage confirmed normal traffic and police assistance.", "category": "Education", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "e9f267d1"}, {"headline": "Couple booked for killing parents, sister over unpaid loans", "summary": "A software engineer, Shwetha (25), and her live-in partner, Kenneth (26), allegedly hacked Shwetha's parents and younger sister to death in east Bengaluru after an argument over unpaid loans. The couple, who borrowed over ₹20 lakh, fled after the Monday evening attack.", "category": "Law", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "994c44d3"}, {"headline": "Technical snag disrupts Bengaluru Metro Purple Line services", "summary": "Metro services on Bengaluru's Purple Line were affected by a technical snag at Cubbon Park Metro Station, causing delays and crowding. Operations are currently split between Magadi Road-Challaghatta and MG Road-Whitefield sections while repairs are underway.", "category": "Infrastructure", "page": 5, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "c7f08d3f"}, {"headline": "Two college students arrested for beating PG owner to death", "summary": "Two college students, Rakesh (21) and Don Brightson (20), were arrested for allegedly killing their PG owner, Madhav Metli (37), in east Bengaluru. The incident occurred Monday after Metli objected to the students washing their feet at a tap, leading to a fatal assault with a cricket bat.", "category": "Law", "page": 5, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "b223ebfb"}, {"headline": "Karnataka to operationalize Wildlife Forensic Unit soon", "summary": "Home Minister Priyank Kharge announced that Karnataka's Wildlife Forensic Unit is fully prepared and will be operational shortly. The unit, which will greatly assist in investigating wildlife crimes and illegal smuggling, will also see staff recruitment, including Scientific Officers.", "category": "Science", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "33ed1cb1"}, {"headline": "Doctor, 3 others arrested for illegal infant adoption", "summary": "Four people, including Dr. K. Surendra Kamath, were arrested in Udupi, Karnataka, for the illegal adoption of a month-old baby girl. They created forged documents to bypass legal adoption, with the doctor facilitating the transfer to a childless couple for financial gain. The infant is now in care.", "category": "Law", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "2577522f"}, {"headline": "TN CM Vijay slams DMK, vows action against corruption", "summary": "Tamil Nadu Chief Minister C Joseph Vijay, in his maiden speech, criticized the opposition DMK and vowed strict action against corruption in government departments and TASMAC. He accused the DMK of plunder, contrasting it with his government's focus on public service.", "category": "Politics", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "530ce19b"}, {"headline": "Two workers killed in AP plastic unit blaze", "summary": "Two workers were charred to death and two injured in a major fire at Dakshin Energy, a plastic pyrolysis oil manufacturing unit in Anakapalli district, Andhra Pradesh. The blaze erupted after a storage tank exploded during plastic waste recycling, consuming large quantities of material.", "category": "Environment", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "7381a0e9"}, {"headline": "Kerala police to exhume grave after suspicious bundle found", "summary": "Police in Kerala's Kannur district will exhume a grave at a church cemetery after a suspicious bundle, allegedly resembling human remains, was discovered inside. The object, wrapped and cello-taped, was found alongside a coffin during a burial, prompting a forensic examination.", "category": "Law", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "186ea09c"}, {"headline": "Suspended cop arrested in AP custodial death case", "summary": "Andhra Pradesh SIT arrested suspended police inspector S S V Nagaraju for his alleged role in the custodial death of Gade Sai Krishna, 25. Crucial CCTV footage from May 1 to June 1 was allegedly removed to destroy evidence, leading to charges under Bharatiya Nyaya Sanhita.", "category": "Law", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "35090df6"}, {"headline": "Andhra Pradesh reduces motor vehicle tax for AIT permit buses", "summary": "The Andhra Pradesh cabinet, chaired by CM N Chandrababu Naidu, approved reducing the quarterly motor vehicle tax for All India Tourist (AIT) permit buses with over 12 seats from ₹4,000 to ₹2,500 per seat/berth, amending the 1963 Taxation Act.", "category": "Economy", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "dfca0034"}, {"headline": "Five arrested for cooking non-veg on Ganga boat in Varanasi", "summary": "Five people were arrested in Varanasi for allegedly cooking non-vegetarian food on a boat in the Ganga River, a sacred site, after an old video went viral. The boat was seized, and a case registered under Dashashwamedh police station.", "category": "Law", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "177a2e0a"}, {"headline": "Vijay's close aide appointed as TN CM's private secretary", "summary": "Jagadish Palanisamy, a close associate of Tamil Nadu Chief Minister C Joseph Vijay, has been appointed as the private secretary-political to the CM. The appointment came into effect on his joining date, as per a government notification issued on Monday.", "category": "Politics", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "b2d95de0"}, {"headline": "LDF alleges graft in UDF govt's tax cut on low-alcohol drinks", "summary": "Opposition Left Democratic Front (LDF) MLAs disrupted Kerala assembly proceedings over alleged corruption in the UDF government's move to slash sales taxes on low-alcohol beverages from 251% to 120%, demanding a discussion on the issue.", "category": "Politics", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "0dd4deff"}, {"headline": "India lauds Iran-US MoU, NSA Doval warns of emerging threats", "summary": "India welcomed the Iran-US de-escalation, with NSA Ajit Doval stating it aids energy security and removes supply chain bottlenecks. Addressing BRICS NSAs, Doval also highlighted non-traditional threats like disruptive technologies, camouflaged terrorism, and cyber threats in a tumultuous global scenario.", "category": "World", "page": 7, "importance": 8, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "34d4ba80"}, {"headline": "IAF to get first Made-in-India C295 transport aircraft by Sept-end", "summary": "The Indian Air Force is set to receive its first Made-in-India C295 transport aircraft in Vadodara by September 22-23. This landmark event marks the first military plane produced by India's private sector, enhancing IAF's logistics capabilities and replacing ageing Avro aircraft.", "category": "Technology", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "54d7fa2e"}, {"headline": "Haryana police nab two in Punjab CM viral video row", "summary": "Haryana Police arrested two individuals, Arun Mahendru and Ankit Sharma, for allegedly pressuring Punjab government officials to procure forged forensic reports declaring a viral video involving CM Bhagwant Mann artificial. The FIR invokes BNS provisions for cheating, forgery, and organized crime.", "category": "Law", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "82cb0a7c"}, {"headline": "Five-minute walk every hour can mitigate sedentary risks", "summary": "A study in the British Journal of Sports Medicine found that five-minute walks every hour can mitigate health harms from prolonged sitting (11-12 hours/day). These breaks boost mood, reduce fatigue, and don't affect work performance, offering a feasible public health strategy.", "category": "Health", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "d0b3a7bb"}, {"headline": "LDA fixes responsibility on 18 engineers for Lucknow fire", "summary": "The Lucknow Development Authority (LDA) blamed 18 engineers who served between 2016-2026 for failing to stop illegal construction and commercial activities in the Aliganj building where a fire killed 15. A demolition order in 2016 was revoked, and a new one is now issued.", "category": "Infrastructure", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "2fe3fe04"}, {"headline": "CBI arrests Haryana IAS officer in IDFC bank fraud case", "summary": "CBI arrested senior Haryana IAS officer Pankaj Agarwal for alleged misappropriation of government funds in an IDFC First Bank case. Agarwal, then Principal Secretary of School Education, allegedly oversaw departments transferring funds well beyond limits, leading to a ₹60.54 crore loss.", "category": "Law", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "819a1908"}, {"headline": "Crisis-hit TMC reworks organization, cuts consultant role", "summary": "Facing defection and dissent, the Trinamool Congress is overhauling its organizational strategy, with party leaders indicating decisions will now be handled directly, reducing reliance on external consultants. The move aims to stabilize ranks amid continuing exits and internal criticism of I-PAC's influence.", "category": "Politics", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "1ad7e512"}, {"headline": "SC declines urgent hearing on ration denial linked to SIR", "summary": "The Supreme Court declined an urgent hearing on a plea challenging West Bengal government orders linking welfare benefits to exclusions from electoral rolls post-SIR exercise. The court advised approaching the Calcutta High Court, stating the petition raised a separate cause of action regarding welfare eligibility.", "category": "Law", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "409873c8"}, {"headline": "Govt seeks district-level contingency plans for Kharif crops", "summary": "Due to significant monsoon delay (43% below normal), the Centre directed states to activate district-level contingency plans to safeguard Kharif crops. Agriculture Minister Shivraj Singh Chouhan warned of weak rainfall till July 2, advising alternative crops like pulses, oilseeds, and millets for 111 vulnerable districts.", "category": "Economy", "page": 8, "importance": 8, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "25570086"}, {"headline": "New FCRA rules mandate NGOs disclose purpose, states of operation", "summary": "New FCRA amendments require NGOs seeking registration to specify exact purposes from a schedule and states/UTs of operation. They must also disclose social media accounts, ultimate donors for intermediary funds, and have a minimum spending limit of ₹10 lakh foreign contribution over two years.", "category": "Law", "page": 9, "importance": 8, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "017d785c"}, {"headline": "Oman, Iran to discuss future management of Hormuz traffic", "summary": "Oman and Iran agreed to hold discussions on the future administration of navigation in the Strait of Hormuz, including maritime services and associated costs. This follows a joint statement and is part of de-escalation efforts after Iran previously blocked the vital waterway.", "category": "World", "page": 11, "importance": 9, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "c6b4d379"}, {"headline": "Qatar's Amir calls Modi, condoles death of 12 Indians", "summary": "Prime Minister Narendra Modi received a phone call from Qatar's Amir, Sheikh Tamim bin Hamad Al Thani, who expressed grief over the death of 12 Indian nationals in a tragic accident at Ras Laffan Industrial City in Qatar.", "category": "World", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "54250681"}, {"headline": "Labour MPs consider challenge to frontrunner Andy Burnham in UK PM race", "summary": "Outgoing UK PM Keir Starmer initiated access talks for prospective successors. With frontrunner Andy Burnham, some Labour MPs are considering challenging him, including government minister Darren Jones, amid concerns about a \"coronation\" and seeking detailed policy plans from Burnham.", "category": "Politics", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "e04e491b"}, {"headline": "Sri Lanka to scrap indelible ink marking for elections", "summary": "Sri Lanka has decided to discontinue the use of indelible ink to mark voters during elections. Authorities cited additional costs and unnecessary delays in the voting process as reasons for the change in electoral procedures.", "category": "Politics", "page": 11, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "3284e425"}, {"headline": "Russia considers fuel imports after Ukrainian refinery strikes", "summary": "Russia is reportedly weighing importing fuel to mitigate supply disruptions of gasoline and diesel, caused by Ukrainian strikes on its oil refineries. Crimea has also tightened restrictions on public services and activities amidst the ongoing conflict.", "category": "World", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "20dbd3f9"}, {"headline": "Europe swelters in extreme early-summer heatwave", "summary": "Western Europe is experiencing an early-summer heatwave, with France recording its hottest night ever and Spain under high alert. Dozens of schools closed in the UK, and Swiss cantons restricted water withdrawal, as temperatures soar due to a massive front of hot air from North Africa.", "category": "Environment", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "0c1acddd"}, {"headline": "US sanctions five Cuban firms, Raul Castro's son's wife", "summary": "The US government announced sanctions against five Cuban companies affiliated with the military conglomerate GAESA, and against Raul Castro’s daughter-in-law. Washington has intensified pressure on the communist island in recent months.", "category": "Politics", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "3aa379a1"}, {"headline": "Italian PM Meloni calls for return to normality after Trump spat", "summary": "Italian Prime Minister Giorgia Meloni stated relations with the US must return to normal following a public falling out with Donald Trump. Meloni had accused Trump of fabricating claims that she \"begged\" him for a photo at a G7 summit, denying his \"unprovoked attacks.\"", "category": "Politics", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "a186b431"}, {"headline": "Indian Oil receives no bids for Gulf cargo charter tenders", "summary": "Indian Oil Corp received no bids in its tenders to charter vessels for lifting crude oil and LPG cargoes from Strait of Hormuz ports. Trade sources indicate ship owners are hesitant due to risks following the Iran-US conflict, awaiting clarity on transit terms.", "category": "Business", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "3c2e2c35"}, {"headline": "Airtel raises stake in Africa unit to 79% via ₹28,200 cr share swap", "summary": "Bharti Airtel increased its stake in Airtel Africa by 16.31% to 79% through a cashless share-swap agreement, valued at around ₹28,200 crore. This transaction, involving promoter group entity ICIL, aims to boost Bharti Airtel's economic interest in the high-growth African subsidiary.", "category": "Business", "page": 14, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "e9f1b4bb"}, {"headline": "Private investments measured in India due to global uncertainties: CII", "summary": "CII president R Mukundan stated that while India remains an attractive investment destination, private investments are \"somewhat measured\" due to global uncertainties and geopolitical tensions. Businesses are cautious, awaiting stronger demand signals despite healthy corporate balance sheets and improved capacity utilization.", "category": "Economy", "page": 14, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "a189b974"}, {"headline": "Kalshi adds India to restricted list after prediction market ban", "summary": "Prediction markets platform Kalshi Inc. added India to its restricted jurisdictions, following a warning from India's technology ministry that such platforms are illegal. Indian users are now prohibited from trading event contracts, and Kalshi's website has been inaccessible in India since late May.", "category": "Technology", "page": 14, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "9f074bc8"}, {"headline": "RBI injects ₹1.41 lakh cr into banking system via VRR auction", "summary": "The Reserve Bank of India (RBI) injected ₹1,41,171 crore of transient liquidity into the banking system through a seven-day variable rate repo (VRR) auction at a 5.26% rate. This action addresses a liquidity deficit, attributed to outflows from GST payments.", "category": "Economy", "page": 14, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "a90256b5"}, {"headline": "India defeats Pakistan 4-3 in FIH Pro League hockey", "summary": "India extended its decade-long unbeaten streak against Pakistan by defeating them 4-3 in a FIH Pro League hockey match. Abhishek and Nilakanta Sharma initially gave India the lead, followed by Sukhjeet Singh and Rajinder Singh, despite a late comeback by Pakistan.", "category": "Sports", "page": 15, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "0aa65f34"}, {"headline": "Playing under pressure suits me, says Suryansh Shedge", "summary": "Uncapped all-rounder Suryansh Shedge, called to India's T20I squad as a replacement for Nitish Kumar Reddy, expressed happiness for his parents' sacrifices. Shedge, a clean striker and utility medium-pace bowler, feels playing under pressure \"suits\" him, focusing on emotional control.", "category": "Sports", "page": 15, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "72741292"}, {"headline": "Rishabh Pant rejoins Delhi Capitals with significant pay cut", "summary": "Rishabh Pant has returned to Delhi Capitals from LSG in a trade deal, taking a pay cut from ₹27cr to ₹15cr. The move brings back a fan-favorite, aiming to stabilize DC after two turbulent seasons. While Pant's form has been inconsistent, his presence offers a proven Indian core and captaincy option.", "category": "Sports", "page": 15, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "36bcea83"}, {"headline": "Bhavani Devi apologizes, seeks revocation of two-month ban", "summary": "India's Bhavani Devi has offered an unconditional apology for her conduct during the Asian Fencing Championships, appealing to revoke her two-month suspension. The appeal highlights her exemplary disciplinary record and upcoming Worlds, emphasizing the seriousness of the Black Card sanction.", "category": "Sports", "page": 15, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "f216c165"}, {"headline": "Teen sensation Sooryavanshi expresses joy after India T20 selection", "summary": "Vaibhav Sooryavanshi, 15, expressed overwhelming joy after his selection in India's T20 squad, calling it the \"biggest step\" of his career. The youngest centurion in T20 cricket (101 off 38 balls in IPL 2025), he looks forward to potentially becoming India's youngest international cricketer.", "category": "Sports", "page": 15, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "ad8a1d73"}, {"headline": "Vinicius Jr key to Brazil's World Cup deep run", "summary": "Vinicius Jr has been involved in all six of Brazil's World Cup goals since 2022, displaying speed, dribbling, and scoring ability. As Brazil's \"craque\" (ace), his form and focus are crucial for the five-time champions to maintain their group stage dominance and advance deep into the tournament.", "category": "Sports", "page": 16, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "69c84dbc"}, {"headline": "Cristiano Ronaldo scores brace, announces comeback at World Cup", "summary": "Portugal's Cristiano Ronaldo scored two goals in a 5-0 victory against Uzbekistan in their World Cup Group K match, showcasing his prowess. This performance signals a strong comeback for the star player after a period of mixed form, making a significant impact on his team's campaign.", "category": "Sports", "page": 16, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "446fb120"}, {"headline": "Norway's 'Viking Row' celebration spreads warmth at World Cup", "summary": "Norway's footballers and fans created a viral \"Viking Row\" celebration at the Metlife Stadium, moving in unison with drum beats after their 3-2 win over Senegal. This synchronized ritual, symbolizing solidarity and identity, has become a distinctive and powerful display of collective emotion in World Cup history.", "category": "Sports", "page": 16, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128216", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/128216"}], "article_id": "939ece5d"}, {"headline": "India's private sector activity slows in June due to softer demand", "summary": "India's private-sector activity expanded at a slower pace in June, with HSBC Flash PMI Output Index falling to 57.4 from 59.3 in May. Growth in manufacturing and services moderated amid softer demand, cost pressures, and slower hiring, marking the weakest expansion since March.", "category": "Economy", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_24-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/128171"}, {"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/128216"}], "importance": 7, "article_id": "9ad45f2d"}, {"headline": "Maharashtra's Nandurbar district teaches AI unwritten Bhili dialect", "summary": "Nandurbar district’s 'Astitva Prakalp' project aims to train AI to recognize, translate, and speak Dehwali Bhili, an unwritten tribal language spoken by 10 million people. The goal is to integrate it into MahaVISTAAR, Maharashtra's AI farm-advisory, enabling Bhili speakers to access state services on basic phones.", "category": "Technology", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_24-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/128171"}], "importance": 8, "article_id": "e1f4967c"}, {"headline": "ED raids Rajesh Exports over benami share deals, gold inventory", "summary": "The Enforcement Directorate conducted searches at nine premises linked to Rajesh Exports Ltd in Bengaluru and Mumbai. The probe targets suspected benami share transactions, discrepancies in gold inventory (40% lower than declared), and questionable overseas deals, with over $20 million potentially siphoned out.", "category": "Law", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_24-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/128171"}, {"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/128216"}], "importance": 7, "article_id": "b0262a77"}, {"headline": "US, India near finalization of bilateral trade agreement", "summary": "US Ambassador Sergio Gor stated India and the US are \"moving decisively\" to finalize their bilateral trade agreement (BTA) and advance an ambitious trade agenda. Discussions with Commerce Minister Piyush Goyal and USTR Ambassador Jamieson Greer are ongoing to deepen economic ties and address market access issues.", "category": "Economy", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_24-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/128171"}, {"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/128216"}], "importance": 8, "article_id": "132703ae"}, {"headline": "Centre amends FCRA rules for foreign fund reception by NGOs", "summary": "The government amended Foreign Contribution Regulation Act (FCRA) rules, requiring NGOs receiving foreign funds to choose predefined purposes and operation areas. It allows faith-based activities but explicitly excludes proselytization from eligible registration categories, with new fee structures for additional states or purposes.", "category": "Politics", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_24-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/128171"}, {"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/128216"}], "importance": 8, "article_id": "2eb2a58a"}, {"headline": "India's US LPG imports to exceed 1 million tonnes in June", "summary": "India's liquefied petroleum gas (LPG) imports from the US are projected to surpass 1 million metric tonnes in June, setting a new record. This increase is part of India's rebalancing trade strategy, especially after the Iran-US conflict disrupted traditional Middle Eastern supply routes.", "category": "Economy", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_24-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/128171"}, {"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/128216"}], "importance": 6, "article_id": "44265bc1"}, {"headline": "Tata Motors aims for 20% PV, 40% CV market share by FY31", "summary": "Tata Motors Passenger Vehicle Ltd targets a 20% market share by FY31 with a 26-model offensive, doubling sales to 1.2M units. Its commercial vehicle unit aims for 40% by FY28, expanding offerings globally and through the Iveco acquisition to drive profitable growth and defend its market position.", "category": "Business", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_24-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/128171"}, {"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 24-06.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/128216"}], "importance": 7, "article_id": "d6e7ea12"}]};
const CAT_META = {"Politics": {"color": "#e8334a", "icon": "🏛️"}, "Economy": {"color": "#f5a623", "icon": "📊"}, "Business": {"color": "#f0c040", "icon": "💼"}, "India": {"color": "#ff7043", "icon": "🇮🇳"}, "World": {"color": "#5c9eff", "icon": "🌍"}, "Sports": {"color": "#36c46f", "icon": "🏆"}, "Science": {"color": "#a78bfa", "icon": "🔬"}, "Technology": {"color": "#38bdf8", "icon": "💻"}, "Health": {"color": "#34d399", "icon": "🏥"}, "Law": {"color": "#fb923c", "icon": "⚖️"}, "Environment": {"color": "#4ade80", "icon": "🌿"}, "Education": {"color": "#e879f9", "icon": "📚"}, "Culture": {"color": "#f472b6", "icon": "🎭"}, "Infrastructure": {"color": "#94a3b8", "icon": "🏗️"}};

// FIXED: Pre-build data structures IMMEDIATELY for deep linking
const allArts = [...DIGEST.articles].sort((a,b)=>(b.importance||0)-(a.importance||0));
const byCategory = {};
for (const art of allArts) {
  const c = art.category||"India";
  if (!byCategory[c]) byCategory[c]=[];
  byCategory[c].push(art);
}
const sortedCats = Object.keys(byCategory).sort(
  (a,b)=>(byCategory[b][0].importance||0)-(byCategory[a][0].importance||0)
);

// FIXED DEEP LINK HANDLER - Runs IMMEDIATELY
let deepLinkTarget = null;
function handleDeepLink() {
  const hash = window.location.hash;
  if (!hash || !sortedCats.length) return;
  
  const cleanHash = hash.startsWith('#article-') ? hash.slice(9) : hash.slice(1);
  const targetArticle = DIGEST.articles.find(art => art.article_id === cleanHash);
  
  if (targetArticle) {
    deepLinkTarget = {article: targetArticle, hash: cleanHash};
  }
}
handleDeepLink();

let catIdx=0,vpW=0,vpH=0;
const panels=[];
const outer=document.getElementById('outer');
const hTrack=document.getElementById('hTrack');
const hintUp=document.getElementById('hintUp');
const hintRight=document.getElementById('hintRight');
const catFlash=document.getElementById('catFlash');
const cfIcon=document.getElementById('cfIcon');
const cfName=document.getElementById('cfName');

function buildAll() {
  vpW=outer.offsetWidth; vpH=outer.offsetHeight;
  hTrack.innerHTML=''; panels.length=0;
  sortedCats.forEach((cat,ci)=>{
    const m=CAT_META[cat]||{color:"#e8334a",icon:"📰"};
    const arts=byCategory[cat];
    const panel=document.createElement('div');
    panel.className='cat-panel';
    panel.id=`cat-panel-${ci}`;
    panel.style.setProperty('--cc',m.color);
    panel.innerHTML=`<div class="progress-row" id="prow-${ci}" style="--cc:${m.color}"></div><div class="v-feed" id="vfeed-${ci}"><div class="v-track" id="vtrack-${ci}"></div></div>`;
    hTrack.appendChild(panel);
    const pRow=panel.querySelector(`#prow-${ci}`);
    const vFeed=panel.querySelector(`#vfeed-${ci}`);
    const vTrack=panel.querySelector(`#vtrack-${ci}`);
    const cardH=vFeed.getBoundingClientRect().height||vpH;
    
    arts.forEach((art,ai)=>{
      const card = buildCard(art, cardH, m, cat, ai);
      card.id = `article-${art.article_id}`;
      card.dataset.articleId = art.article_id;
      vTrack.appendChild(card);
    });
    
    panels.push({pRow,vFeed,vTrack,articles:arts,artIdx:0});
    buildPRow(ci);
  });
  
  hTrack.style.transition='none';
  hTrack.style.transform='translateX(0)';
  syncV(0,false);
  
  // Apply deep link after build — 200ms ensures card heights are measured
  if (deepLinkTarget) {
    setTimeout(() => applyDeepLink(deepLinkTarget), 200);
  }
}

function buildCard(art,h,m,cat,articleIndex) {
  const src=art.sources?.[0];
  // Direct PDF link with #page=N - respected by all modern browser PDF viewers
  // when the file is opened via a link click (Chrome, Firefox, Safari, Edge).
  // Falls back to the Telegram source URL if no PDF is available.
  const href = src?.pdf_filename
    ? ('pdfs/' + src.pdf_filename + '#page=' + (src.page || 1))
    : (src?.telegram_url || '#');
  const card=document.createElement('div');
  card.className='card';
  card.dataset.articleId = art.article_id;
  card.style.height=h+'px';
  card.style.setProperty('--cc',m.color);
  card.innerHTML=`
    <div class="card-content">
      <div class="card-toprow">
        <div class="cat-pill">
          <div class="pill-icon"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="1" y="1" width="8" height="2" rx="0.6" fill="#888"/><rect x="1" y="4.5" width="5" height="1.5" rx="0.6" fill="#666"/><rect x="1" y="7" width="6" height="1.5" rx="0.6" fill="#666"/></svg></div>
          ${cat.toUpperCase()}
        </div>
        <div class="card-date">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="2.5" width="11" height="9.5" rx="1.8" stroke="#555" stroke-width="1.2"/><path d="M4.5 1v3M8.5 1v3" stroke="#555" stroke-width="1.2" stroke-linecap="round"/><path d="M1 6h11" stroke="#555" stroke-width="1.2"/></svg>
          ${DIGEST.date}
        </div>
      </div>
      <div class="card-headline">${art.headline}</div>
      <div class="card-summary">${art.summary}</div>
      <div class="card-divider"></div>
      <div class="card-footer">
        ${src?`<a class="src-chip" href="${href}" target="_blank" onclick="event.stopPropagation()">${src.newspaper}<span class="src-chip-sep">&middot;</span><span class="src-chip-pg">Pg ${src.page}</span><span class="src-chip-ext"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M3.5 7.5L7.5 3.5M7.5 3.5H5M7.5 3.5V6" stroke="#555" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></span></a>`:'<div></div>'}
        <div class="info-btn"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6.5" stroke="#444" stroke-width="1.3"/><circle cx="7.5" cy="4.5" r="0.8" fill="#555"/><path d="M7.5 7v4" stroke="#555" stroke-width="1.5" stroke-linecap="round"/></svg></div>
      </div>
    </div>`;
  return card;
}

function buildPRow(ci) {
  const p=panels[ci],ai=p.artIdx;
  p.pRow.innerHTML='';
  p.articles.forEach((_,i)=>{
    const seg=document.createElement('div');
    seg.className='pseg'+(i<ai?' done':i===ai?' active':'');
    p.pRow.appendChild(seg);
  });
}

function syncV(ci,animated) {
  const p=panels[ci],h=p.vFeed.getBoundingClientRect().height;
 p.vTrack.style.transition=animated?'transform 0.35s cubic-bezier(0.4,0,0.2,1)':'none';
  p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;
  buildPRow(ci);
}

function applyDeepLink(target) {
  const ci = sortedCats.findIndex(cat =>
    byCategory[cat].some(art => art.article_id === target.hash)
  );
  if (ci === -1) return;

  // Set catIdx BEFORE calling goCat so the horizontal track lands correctly
  catIdx = ci;
  hTrack.style.transition = 'none';
  hTrack.style.transform = `translateX(${-ci * vpW}px)`;

  const ai = byCategory[sortedCats[ci]].findIndex(art => art.article_id === target.hash);
  if (ai === -1) return;
  panels[ci].artIdx = ai;
  syncV(ci, false);

  const card = document.getElementById('article-' + target.hash);
  if (card) {
    card.classList.add('target-highlight');
    setTimeout(() => card.classList.remove('target-highlight'), 3000);
  }
}

function goArt(d) {
  const p=panels[catIdx];
  const n=Math.max(0,Math.min(p.artIdx+d,p.articles.length-1));
  if(n===p.artIdx&&d!==0)return;
  p.artIdx=n; syncV(catIdx,true); dismiss();
}

function goCat(idx,animated=true) {
  idx=Math.max(0,Math.min(idx,sortedCats.length-1));
  if(idx===catIdx&&animated)return;
  const prev=catIdx; catIdx=idx;
  hTrack.style.transition=animated?'transform 0.38s cubic-bezier(0.4,0,0.2,1)':'none';
  hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;
  if(animated&&idx!==prev) {
    const m=CAT_META[sortedCats[idx]]||{color:"#e8334a",icon:"📰"};
    catFlash.style.background=m.color+'18';
    cfIcon.textContent=m.icon; cfName.textContent=sortedCats[idx]; cfName.style.color=m.color;
    catFlash.classList.add('on'); setTimeout(()=>catFlash.classList.remove('on'),500);
  }
  dismiss();
}

let dismissed=false;
function dismiss() {
  if(dismissed)return; dismissed=true;
  hintUp.classList.remove('visible'); hintRight.classList.remove('visible');
  hintUp.classList.add('gone'); hintRight.classList.add('gone');
}

(function initHints() {
  const KEY='dailyBriefHintSeen';
  if(!localStorage.getItem(KEY)) {
    localStorage.setItem(KEY,'1');
    setTimeout(()=>{ if(!dismissed){ hintUp.classList.add('visible'); hintRight.classList.add('visible'); } },2500);
  }
})();

let tsX=0,tsY=0,tcX=0,tcY=0,axis=null,drag=false;
outer.addEventListener('touchstart',e=>{ tsX=e.touches[0].clientX; tsY=e.touches[0].clientY; tcX=0; tcY=0; axis=null; drag=true; hTrack.style.transition='none'; const p=panels[catIdx]; if(p)p.vTrack.style.transition='none'; },{passive:true});
outer.addEventListener('touchmove',e=>{ if(!drag)return; const dx=e.touches[0].clientX-tsX,dy=e.touches[0].clientY-tsY; tcX=dx; tcY=dy; if(!axis&&(Math.abs(dx)>8||Math.abs(dy)>8))axis=Math.abs(dx)>Math.abs(dy)?'h':'v'; if(!axis)return; e.preventDefault(); if(axis==='h'){ const edge=(catIdx===0&&dx>0)||(catIdx===sortedCats.length-1&&dx<0); hTrack.style.transform=`translateX(${-catIdx*vpW+dx*(edge ? 0.14 : 1)}px)`; }else{ const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height; const edge=(p.artIdx===0&&dy>0)||(p.artIdx===p.articles.length-1&&dy<0); p.vTrack.style.transform=`translateY(${-p.artIdx*h+dy*(edge ? 0.14 : 1)}px)`; } },{passive:false});
outer.addEventListener('touchend',()=>{ if(!drag)return; drag=false; if(axis==='h'){ const t=vpW*.2; if(tcX<-t)goCat(catIdx+1); else if(tcX>t)goCat(catIdx-1); else{hTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;} }else if(axis==='v'){ const t=vpH*.2; if(tcY<-t)goArt(1); else if(tcY>t)goArt(-1); else{const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height;p.vTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;} } axis=null; },{passive:true});
document.addEventListener('keydown',e=>{ if(e.key==='ArrowDown'||e.key===' '){e.preventDefault();goArt(1);} if(e.key==='ArrowUp'){e.preventDefault();goArt(-1);} if(e.key==='ArrowRight'){e.preventDefault();goCat(catIdx+1);} if(e.key==='ArrowLeft'){e.preventDefault();goCat(catIdx-1);} });
let wl=false;
outer.addEventListener('wheel',e=>{ e.preventDefault();if(wl)return;wl=true; Math.abs(e.deltaX)>Math.abs(e.deltaY)?goCat(catIdx+(e.deltaX>0?1:-1)):goArt(e.deltaY>0?1:-1); setTimeout(()=>wl=false,500); },{passive:false});
window.addEventListener('resize',()=>{ vpW=outer.offsetWidth;vpH=outer.offsetHeight; hTrack.style.transition='none'; hTrack.style.transform=`translateX(${-catIdx*vpW}px)`; panels.forEach(p=>{ const h=p.vFeed.getBoundingClientRect().height; p.vTrack.querySelectorAll('.card').forEach(c=>c.style.height=h+'px'); p.vTrack.style.transition='none'; p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`; }); });

buildAll();
</script>
