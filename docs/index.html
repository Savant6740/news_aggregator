<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Inter', -apple-system, sans-serif;
  background: #0c0c0c; color: #fff; touch-action: none;
}
.outer { position: fixed; inset: 0; overflow: hidden; }
.h-track { display: flex; height: 100%; will-change: transform; }
.cat-panel { flex-shrink:0; width:100vw; height:100%; display:flex; flex-direction:column; overflow:hidden; }
.progress-row { flex-shrink:0; display:flex; gap:4px; padding:14px 16px 10px; background:#0c0c0c; position:relative; z-index:5; overflow:visible; }
.progress-row::after { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:80%; height:120px; background:radial-gradient(ellipse at top,color-mix(in srgb,var(--cc) 30%,transparent) 0%,transparent 70%); pointer-events:none; z-index:-1; }
.pseg { flex:1; height:2px; border-radius:1px; background:rgba(255,255,255,0.12); position:relative; overflow:hidden; }
.pseg::after { content:''; position:absolute; inset:0; background:var(--cc,#e8334a); transform:scaleX(0); transform-origin:left; transition:transform 0.25s ease; }
.pseg.done::after, .pseg.active::after { transform:scaleX(1); }
.v-feed { flex:1; overflow:hidden; position:relative; clip-path:inset(0); }
.v-track { display:flex; flex-direction:column; will-change:transform; }
.card { 
  width:100%; flex-shrink:0; background:#0c0c0c; display:flex; flex-direction:column; 
  overflow:hidden; position:relative; 
  scroll-margin-top: 80px;
}
.card.target-highlight {
  background: linear-gradient(135deg, #fff3cd22 0%, #ffeaa722 100%) !important;
  box-shadow: 0 0 30px rgba(255, 193, 7, 0.4);
  border: 2px solid #f39c12;
  animation: pulse-highlight 2s ease-in-out;
}
@keyframes pulse-highlight {
  0%, 100% { box-shadow: 0 0 30px rgba(255, 193, 7, 0.4); }
  50% { box-shadow: 0 0 50px rgba(255, 193, 7, 0.6); }
}
.card-content { flex:1; display:flex; flex-direction:column; padding:36px 20px 22px; min-height:0; position:relative; z-index:1; }
.card-toprow { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; flex-shrink:0; }
.cat-pill { display:inline-flex; align-items:center; gap:7px; background:#1c1c1e; border-radius:8px; padding:7px 12px 7px 10px; font-size:11.5px; font-weight:700; letter-spacing:0.07em; color:#d0d0d0; text-transform:uppercase; line-height:1; }
.pill-icon { width:16px; height:16px; background:#2e2e30; border-radius:3px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.pill-icon svg { display:block; }
.card-date { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:500; color:#666; letter-spacing:0.01em; }
.card-headline { font-size:28px; font-weight:800; line-height:1.18; color:#fff; letter-spacing:-0.03em; margin-bottom:20px; flex-shrink:0; }
.card-summary { font-size:15.5px; font-weight:400; line-height:1.62; color:#6b6b6b; flex:1; overflow:hidden; display:-webkit-box; -webkit-line-clamp:7; -webkit-box-orient:vertical; }
.card-divider { height:1px; background:#1e1e1e; margin:20px 0 16px; flex-shrink:0; }
.card-footer { display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.src-chip { display:inline-flex; align-items:center; gap:6px; background:#181818; border:1px solid #282828; border-radius:9px; padding:8px 13px; font-size:12.5px; font-weight:600; color:#c0c0c0; text-decoration:none; letter-spacing:0.005em; line-height:1; }
.src-chip-sep { color:#3a3a3a; font-weight:400; }
.src-chip-pg { color:#555; font-weight:500; }
.src-chip-ext { margin-left:2px; }
.src-chip-ext svg { display:block; }
.info-btn { width:36px; height:36px; border-radius:50%; border:1.5px solid #252525; background:#141414; display:flex; align-items:center; justify-content:center; color:#555; cursor:pointer; flex-shrink:0; }
.cat-flash { position:fixed; inset:0; z-index:600; pointer-events:none; opacity:0; transition:opacity 0.12s; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; }
.cat-flash.on { opacity:1; }
.cf-icon { font-size:34px; }
.cf-name { font-size:22px; font-weight:900; letter-spacing:-0.03em; text-transform:uppercase; }
.hint { position:fixed; display:flex; flex-direction:column; align-items:center; gap:5px; pointer-events:none; z-index:400; opacity:0; transition:opacity 0.6s ease; }
.hint.visible { opacity:1; }
.hint.gone { opacity:0 !important; transition:opacity 0.4s; }
.hint-pill { font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.55); background:rgba(255,255,255,0.07); backdrop-filter:blur(10px); padding:5px 13px; border-radius:100px; border:1px solid rgba(255,255,255,0.09); }
.hint-arr { font-size:16px; color:rgba(255,255,255,0.4); }
.h-up { bottom:28px; left:50%; transform:translateX(-50%); animation:bUp 2s ease-in-out infinite; }
.h-right { top:50%; right:14px; transform:translateY(-50%); animation:bRight 2s ease-in-out infinite 0.6s; }
@keyframes bUp { 0%,100% { bottom:28px; opacity:.65; } 50% { bottom:36px; opacity:1; } }
@keyframes bRight { 0%,100% { right:14px; opacity:.65; } 50% { right:6px; opacity:1; } }

<script>
const DIGEST   = {"date": "25 May 2026", "articles": [{"headline": "PMO tells Ministries to find ways to curb fuel use, conserve forex", "summary": "The PMO has asked Ministries of Road Transport, Petroleum, Power, and Heavy Industries to urgently draw up measures to cut dependence on imported fuel and conserve forex. This is due to a widening current account deficit and rising oil import bill. Measures being discussed include a GST cut on flex-fuel vehicles and greater adoption of smaller, entry-level vehicles to moderate fuel consumption.", "category": "Economy", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "10fde5bc"}, {"headline": "US has emerged as strong energy partner: Jaishankar", "summary": "External Affairs Minister S Jaishankar stated that the US has emerged as a reliable energy partner for India, but India will continue to source energy from multiple suppliers to navigate vulnerabilities and secure its future needs. His comments were made after discussions with US Secretary of State Marco Rubio, addressing bilateral issues and the economic impact of the West Asia crisis.", "category": "World", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "842d7f04"}, {"headline": "Heatwave pushes up sales of ice cream, beverages, ACs", "summary": "A searing heatwave gripping large parts of India has caused a sharp rebound in demand for ice cream, air-conditioners, and beverages in May. Companies are witnessing accelerated consumption trends, with quick commerce emerging as a major driver for immediate purchases, fueling hopes for a stronger-than-expected summer season after an initially sluggish start.", "category": "Business", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "0eacebd8"}, {"headline": "CAFE III, ADAS norms to drive growth for auto-parts makers", "summary": "India’s tightening fuel-efficiency (CAFE III) and safety (ADAS) regulations are emerging as major growth drivers for auto-component makers. Companies like Bosch anticipate a sharp rise in demand for electronics, software, and emission-control systems per vehicle, as automakers prepare for regulatory shifts including CAFE Phase III norms and mandatory ADAS for commercial vehicles.", "category": "Business", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "c36aceb2"}, {"headline": "States see up to 58% increase in sales tax revenue during April", "summary": "Most States, excluding Kerala, have recorded a growth of up to 58% in sales tax revenue from petroleum products during April, despite the Centre's ₹30,000-crore revenue hit from excise duty cuts on fuel. This indicates that most states have refrained from lowering local levies on petrol, diesel, and aviation turbine fuel.", "category": "Economy", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "543c7247"}, {"headline": "Rubio reminds India of intent to buy US goods worth $500 b", "summary": "US Secretary of State Marco Rubio reminded India of its commitment to purchase $500 billion of US goods over the next five years, focusing on energy, technology, and agriculture. However, experts argue this pledge is irrelevant, as the reciprocal tariff framework, part of an unformalised interim trade agreement, collapsed after an unfavourable US Supreme Court verdict.", "category": "World", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "2ee5e20f"}, {"headline": "Ebola screening at AP, Chennai airports", "summary": "Andhra Pradesh and Tamil Nadu governments are on high alert for the Ebola virus, initiating screening for travellers arriving from affected countries like Congo, Uganda, and Sudan at international airports. Isolation wards, testing kits, and medicines are prepared in teaching hospitals, and health desks established at airports.", "category": "Health", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "6beb9557"}, {"headline": "MoD likely to issue request for proposal for Advanced Medium Combat Aircraft by month-end", "summary": "The Ministry of Defence is expected to issue a Request for Proposal (RFP) to one of three shortlisted private sector consortia for the Advanced Medium Combat Aircraft (AMCA) by month-end. The ₹15,000 crore project's core integration and advanced flight testing centre is being developed on 650 acres in Puttaparthi, Andhra Pradesh.", "category": "Technology", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "0790222b"}, {"headline": "Production normalising after temporary disruptions in TN facility: Royal Enfield", "summary": "Royal Enfield announced that production and dispatches at its Cheyyar manufacturing facility in Tamil Nadu are returning to normal. Operations were temporarily impacted by labour shortages linked to elections, LPG shortages, and commodity availability issues. The company plans to increase annual production capacity to around 20 lakh units by FY28.", "category": "Business", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "6fe1a553"}, {"headline": "Karnataka notifies 60% hike in minimum wages", "summary": "Karnataka has notified a 60% increase in minimum wages, aiming to significantly boost earnings for workers in the unorganized sector. Labourers in Bengaluru will now receive a minimum monthly wage of ₹23,376. Karnataka is the third State, after Uttar Pradesh and Haryana, to revise minimum wages recently.", "category": "Economy", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "689b9c0e"}, {"headline": "Small MF distributors latch on to online platforms to beat GST complications", "summary": "Individual Mutual Fund (MF) distributors are increasingly adopting online platform services to navigate complex GST compliance and falling trail commissions. New AMFI norms requiring GST registration and expense proofs have reduced their income and caused operational challenges, pushing them towards technology platforms for integrated management.", "category": "Business", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "1241fe82"}, {"headline": "Green SM’s EV fleet on the roads, ₹35,000 guaranteed driver income signal Vingroup’s India bet ahead of launch", "summary": "Vingroup-owned Green SM is preparing for a formal mid-June launch of its electric taxi service in Delhi-NCR, with an estimated 1,500-2,000 vehicles already staged. The company is offering a guaranteed driver income of ₹35,000 per month in the initial stage, part of its broader EV ecosystem push through VinFast in India.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "437dac19"}, {"headline": "FAI urges UP, Maha to reconsider directive on non-subsidised fertilizers", "summary": "The Fertilizer Association of India (FAI) has urged Uttar Pradesh and Maharashtra to reconsider their ban on non-subsidised fertilizers sold by companies that also sell subsidised products. FAI argues this move is arbitrary, goes against balanced crop nutrition, and could hurt farmers’ interests and food security, seeking abeyance through the Kharif season.", "category": "Economy", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "e0fc1792"}, {"headline": "IndianOil’s Sprint saves ₹2,200 crore in FY26 as West Asia conflict squeezes margins", "summary": "IndianOil Corporation (IOCL) saved ₹2,200 crore in FY26 through Project Sprint, its strategy to become future-ready by optimizing repairs, energy efficiency, and supply chains. Despite the West Asia conflict impacting profitability, IOCL aims for an additional ₹2,500 crore in savings for FY27, focusing on innovation and sustainable practices.", "category": "Business", "page": 3, "importance": 4, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "083c63b4"}, {"headline": "Insist on Tata Sons’ time-bound listing: InGovern to RBI", "summary": "Proxy advisory firm InGovern has urged the RBI to insist on Tata Sons moving towards a listed structure in a time-bound manner, arguing it remains the only Core Investment Company (CIC) non-compliant with RBI regulations. InGovern claims listing would ensure greater public transparency and market discipline for the systemically important conglomerate.", "category": "Business", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "41a758e6"}, {"headline": "Centre amends rules to include five types of fuel dispensers for verification", "summary": "The Centre has amended the Legal Metrology (GATC) Rules, 2013, to include five new types of fuel dispensers (petrol/diesel, hydrogen, LPG, LNG, and CNG) for verification by government-approved test centres. This reform aims to enhance verification services, improve efficiency, and support the growing adoption of cleaner fuels across India.", "category": "Law", "page": 3, "importance": 4, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "75b9b28c"}, {"headline": "Creating semicon dependency?", "summary": "An analysis argues that India's primary focus on semiconductor assembly, testing, and packaging (ATP) without a surge in indigenous chip design and IP ownership risks creating a 'Silicon Shackle.' It highlights that ATP yields low profits, external export controls make assets dependent, and calls for a 'Data-for-Tech' framework to ensure true autonomy.", "category": "Technology", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "c7d04c2a"}, {"headline": "Fiscal dividend RBI’s dual transfers, a confidence booster", "summary": "The Reserve Bank of India transferred a record ₹2.86 lakh crore dividend to the Centre for 2025-26, while also setting aside ₹1.09 lakh crore for its contingency risk buffer, now at 6.5% of its balance sheet. This dual action aims to reduce fiscal stress for the Centre and provide the RBI with ample reserves for market intervention in volatile times.", "category": "Economy", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "e19afb2e"}, {"headline": "PM Modi awarded Agricola medal by FAO", "summary": "Prime Minister Narendra Modi was conferred the prestigious Agricola medal by the Food and Agriculture Organization (FAO) last week. The award recognized his \"exceptional commitment to eradicating hunger, reducing poverty, and ensuring global food security and nutrition\" in India.", "category": "Politics", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "9e92d3ed"}, {"headline": "Ministers' performance review reveals pending files", "summary": "A recent Council of Ministers meeting, with Narendra Modi present, left several ministers jittery after a performance review presentation by the Cabinet Secretary. The review ranked ministers based on files pending for over a month, triggering a flurry of activity across ministries to clear backlogs.", "category": "Politics", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "0b5cd258"}, {"headline": "Nara Lokesh's rising political prominence in Andhra Pradesh", "summary": "Nara Lokesh, son of Andhra Pradesh Chief Minister N Chandrababu Naidu, is emerging as a key figure in the NDA government in the state, handling IT and HRD and spearheading investment outreach. His rising political stock and Naidu's comments about \"bigger responsibilities\" fuel speculation about a \"son's rise\" in AP politics.", "category": "Politics", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "48e3dcfc"}, {"headline": "Book Review: My Summer of Cricket by Nikhil Kulkarni", "summary": "Nikhil Kulkarni's 'My Summer of Cricket' is an endearing personal account of a fan's experience watching India's 2024-25 Test series loss to Australia. The book covers the author's travels and experiences at the last three Tests in Brisbane, Melbourne, and his hometown Sydney, sharing his awe and enjoyment from a spectator's perspective.", "category": "Culture", "page": 5, "importance": 2, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "ba32f8f6"}, {"headline": "Book Review: Building India’s Upstarts by R Narasimhan", "summary": "'Building India’s Upstarts' by R Narasimhan is a useful manual for first-time entrepreneurs on creating thriving companies without venture capital. Narasimhan recounts his journey bootstrapping a national logistics business, focusing on steady growth, process consistency, and customer value, before eventually selling it to Delhivery, one of India’s largest logistics firms.", "category": "Business", "page": 5, "importance": 3, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "15a1acda"}, {"headline": "An unhealthy workforce cannot deliver growth", "summary": "India's high disease burden and low public investment in health (1.3-1.5% of GDP) impose an estimated annual opportunity cost of over $1 trillion, hindering economic growth. The analysis calls for pushing health-adjusted life expectancy (HALE) closer to 70 years, prioritizing primary and preventive care, and over $200 billion investment to improve healthcare outcomes.", "category": "Health", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "bb7696d6"}, {"headline": "New coating steps up green hydrogen output, lowers cost", "summary": "Researchers at IIT-Guwahati have developed a new coating technology that improves the efficiency and durability of solar-powered green hydrogen production systems. The composite coating, combining graphitic carbon nitride with a bubble-repellent hydrogel, delivered 51% higher hydrogen and 44% higher oxygen production, potentially lowering costs for clean hydrogen generation.", "category": "Science", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "9c6e02ae"}, {"headline": "What prevents India from reducing power supply losses by raising electricity's share in energy mix?", "summary": "India's energy supply faces 35% conversion and system losses, primarily from thermal power. The article explores increasing electricity's share in total final consumption, especially in industrial heat and transport, through electric end-use technologies like heat pumps and EV charging infrastructure. This aims to improve energy efficiency, security, and decarbonization, but faces challenges in cost and policy.", "category": "Energy", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "2255ae39"}, {"headline": "Real estate dividends from clean energy transition", "summary": "India's accelerated renewable energy push is expected to create a $10-15 billion opportunity in land aggregation and acquisition for the real estate sector by 2030. An estimated $110-120 billion investment is likely to flow into solar and wind energy projects, driving demand for land and wider real estate ecosystem opportunities including industrial and warehousing.", "category": "Environment", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "69463602"}, {"headline": "India’s nuclear power ambitions face a tariff test", "summary": "The SHANTI Act, allowing private sector nuclear power, creates a buzz but raises concerns about cost. New 700 MW PHWRs could cost ₹7.77-₹7.78/kWhr, significantly higher than renewable energy, posing a challenge for market competitiveness. Experts suggest tariff reductions through GST cuts, lower ROI expectations, and optimized plant operations.", "category": "Energy", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "328f00d1"}, {"headline": "How protected are power plants from the risk of flooding?", "summary": "A study reveals that 80% of India’s districts are vulnerable to climate-induced flooding, posing catastrophic risks to power plants. Without protection, average power sector losses could exceed 19% of asset value. However, building 100-year flood walls could cut average losses to below 1%, highlighting unequal existing defenses and the need for improved infrastructure resilience.", "category": "Environment", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "96ea9aa6"}, {"headline": "Air India: Flying from turbulence to turnaround", "summary": "Air India faces its most difficult phase since privatization, with losses crossing ₹26,000 crore in FY2025-26 due to geopolitical disruptions, high fuel costs, and safety scrutiny. Despite this, it retains strong shareholder backing from Tata Sons and Singapore Airlines for its multi-year transformation strategy, focusing on liquidity, operational restructuring, and fleet modernization.", "category": "Business", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "d996e937"}, {"headline": "AI adoption to reshape enterprise workplace strategies in India", "summary": "A Redseer report indicates that AI adoption is beginning to reshape enterprise workplace strategies in India, forecasting an incremental addition of 79 million sq ft to the knowledge-economy office stock between CY2025 and CY2030. A significant share of this demand is expected to flow toward managed and flexible workspace formats.", "category": "Technology", "page": 7, "importance": 4, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "8e77000b"}, {"headline": "Flexible working vital for attracting tech talent", "summary": "New research from the International Workplace Group shows that flexible working has become the decisive factor in competing for leading tech talent, with 72% of business leaders citing it as vital. Hybrid working is the most used strategy, surpassing competitive pay, especially among millennial (79%) and Gen Z (80%) leaders.", "category": "Business", "page": 7, "importance": 4, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "612155a8"}, {"headline": "How Diageo’s doubled investment is scaling up Sober", "summary": "Diageo India has doubled its stake in non-alcoholic beverage startup Sober to 25%, signaling confidence in the growing market for moderation-led choices. Sober, which offers a range of zero-alcohol spirits and wines, plans expansion into the top 100 bars and aims to become a household name for non-alcoholic options, catering to mindful drinkers.", "category": "Business", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "e9f5bf33"}, {"headline": "Indian space-tech startups meet global demand for satellite data", "summary": "India's private space-tech sector is commercially scaling up as startups expand satellite constellations and win global customers for geospatial intelligence. Firms like Pixxel, GalaxEye, and Agnikul Cosmos are positioning themselves as providers of critical infrastructure, attracting $120-150 million in funding in 2025 for diverse applications from agriculture to defense.", "category": "Technology", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "26672f72"}, {"headline": "How political startup TVK won so big and so quickly", "summary": "Joseph Vijay's political party, Tamizhaga Vetri Kazhagam (TVK), achieved rapid success in TN State Assembly elections, overturning predictions. The article analyses TVK's strategy akin to a successful startup: identifying an underserved political market, leveraging the founder's existing fan base and cultural relevance, and scaling up rapidly through effective mobilisation and digital amplification.", "category": "Politics", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "91f401f8"}, {"headline": "Karban to launch offline retail for integrated air-circulation appliances", "summary": "Startup Karban is preparing to launch offline retail and commercial installation services for its integrated air-circulation systems. Its flagship product, Airzone, combines a ceiling fan, air purifier, and ambient lighting. The company, which sells online, aims to make its multi-functional 'ultra appliance' accessible beyond online buyers, leveraging its airflow-focused design.", "category": "Business", "page": 8, "importance": 3, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "60fe4a01"}, {"headline": "Artha Group's investment strategy focuses on market timing and founder conviction", "summary": "Sandesha Jaitapkar, COO of Artha Group, discusses the firm's venture capital strategy, emphasizing investing before markets are ready for a sector and focusing on increasing per-unit value long-term. Artha prioritizes backing founders with strong conviction, clear execution capability, and compelling business models over specific sectors, having built a portfolio of 130+ startups.", "category": "Business", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "00906aba"}, {"headline": "Bank of Maharashtra targets ₹10-lakh-crore business by 2029", "summary": "Bank of Maharashtra (BoM) MD & CEO Nidhu Saxena announced a strategy focused on institutional deposit mobilization, branch-led growth, and calibrated asset expansion. This approach aims to cross the ₹10-lakh-crore mark in total business by March 2029, expecting 18% advances and 14-15% deposit growth in FY27, with emphasis on retail, MSME, and agriculture segments.", "category": "Economy", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "97d38c9d"}, {"headline": "RBI faces complex challenge of stabilising rupee amidst economic pressures", "summary": "The RBI confronts an unusually fraught juncture with the rupee touching record lows, surging bond yields, growth headwinds, and inflationary risks. An analysis suggests the RBI's most urgent task is to stabilize the currency, proposing a three-part sequence: hold rates, forcefully signal its rupee toolkit, and deploy instruments in a calibrated fashion, rather than premature hikes.", "category": "Economy", "page": 9, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "9afaf9f1"}, {"headline": "Gold offered at ₹450/g discount to consumers after import duty hike", "summary": "Domestic gold prices are trading at a steep discount of over ₹450 per gram to the landed prices, including import taxes, after the government more than doubled the customs duty to 15% on May 13. This discount is being offered to spur demand, which has been impacted by the Prime Minister's appeal against buying gold.", "category": "Economy", "page": 10, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "e5fdcef6"}, {"headline": "OMCs seek sops for green aviation fuel, see no rollout delay", "summary": "State oil marketing companies (OMCs) do not foresee delays in sustainable aviation fuel (SAF) adoption despite ongoing West Asia tensions, but have called for fiscal incentives to make SAF affordable for airlines. India targets blending 1-5% SAF in international flights by 2027-2030, with IOC and BPCL progressing on production facilities.", "category": "Environment", "page": 10, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "ff3b8a06"}, {"headline": "Overseas travel spending falls to $1.09 b in March", "summary": "Overseas travel spending by Indians, including holiday trips, declined by $212.43 million to $1.09 billion in March, compared to $1.3 billion in February and $1.65 billion in January. Spending on education-related travel totalled $450.16 million during the same month, according to RBI data.", "category": "Economy", "page": 10, "importance": 3, "telegram_url": "https://t.me/c/1877410077/124861", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/124861"}], "article_id": "ce5ec4cb"}, {"headline": "Om Birla Elected Lok Sabha Speaker for Second Consecutive Term", "summary": "BJP leader Om Birla was elected Speaker of the 18th Lok Sabha via a voice vote after a motion moved by PM Narendra Modi was adopted. In a symbolic gesture of democratic traditions, both PM Modi and Leader of Opposition Rahul Gandhi escorted Birla to the chair. Birla is the first person in two decades to be re-elected to the post, representing a significant continuity in parliamentary leadership.", "category": "Politics", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/124788", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE-Delhi-May-25-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124788"}], "article_id": "33337d31"}, {"headline": "CBI Arrests Arvind Kejriwal in Delhi Excise Policy Corruption Case", "summary": "The CBI formally arrested Delhi Chief Minister Arvind Kejriwal at the Rouse Avenue Court in connection with the alleged excise policy scam. The court granted the agency three-day custody to interrogate the AAP leader. This development occurred as Kejriwal was already in judicial custody following an earlier arrest by the ED. He has subsequently withdrawn his bail plea from the Supreme Court.", "category": "Law", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/124788", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE-Delhi-May-25-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124788"}], "article_id": "251cc1d6"}, {"headline": "President Droupadi Murmu to Address Joint Session of Parliament Today", "summary": "President Droupadi Murmu is scheduled to address a joint session of both Houses of Parliament. Her speech is expected to outline the NDA government's roadmap for 'Viksit Bharat' over the next five years. The address serves as a constitutional requirement following the general elections and will likely touch upon economic goals, national security, and the government's legislative priorities.", "category": "Politics", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/124788", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE-Delhi-May-25-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124788"}], "article_id": "7e475a5c"}, {"headline": "CBI Intensifies Probe into NEET-UG Paper Leak with Multiple Arrests", "summary": "The Central Bureau of Investigation has taken over the probe into alleged irregularities in the NEET-UG 2024 exam. Investigators are conducting raids across Bihar and Jharkhand to dismantle an interstate network involved in leaking question papers. The agency is utilizing digital forensics and questioning suspects previously detained by state police to trace the origin of the leak.", "category": "Education", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/124788", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE-Delhi-May-25-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124788"}], "article_id": "f161210f"}, {"headline": "Sensex Crosses 78,000 Mark as Indian Stock Markets Reach Record Highs", "summary": "The BSE Sensex surged past the 78,000 mark for the first time, while the Nifty 50 touched a record high near 24,000. The rally was driven by significant gains in banking and IT stocks, coupled with positive global cues and sustained foreign institutional investment. Market analysts attribute the growth to investor confidence in political stability and India's robust macroeconomic indicators.", "category": "Economy", "page": 14, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124788", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE-Delhi-May-25-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/124788"}], "article_id": "485d6fc8"}, {"headline": "Julian Assange Returns to Australia After Plea Deal with US Government", "summary": "WikiLeaks founder Julian Assange landed in Canberra a free man after pleading guilty to one felony count of conspiring to obtain and disclose national defense information. The plea deal, finalized in a US court in Saipan, ends a 14-year legal battle that included seven years in London's Ecuadorean embassy and five years in a high-security prison. He was sentenced to time already served.", "category": "World", "page": 12, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124788", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE-Delhi-May-25-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/124788"}], "article_id": "e8012c47"}, {"headline": "Kenya President Withdraws Finance Bill Following Deadly Anti-Tax Protests", "summary": "President William Ruto announced he would not sign a controversial finance bill into law following violent protests that saw demonstrators storm the parliament. The proposed bill included new taxes meant to reduce national debt, which triggered nationwide unrest resulting in multiple fatalities. Ruto stated he would start a dialogue with the youth to address their economic grievances.", "category": "World", "page": 12, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124788", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE-Delhi-May-25-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/124788"}], "article_id": "299e61f9"}, {"headline": "South Africa Crushes Afghanistan to Enter Their First T20 Final", "summary": "South Africa secured a place in their first-ever Men's T20 World Cup final by defeating Afghanistan by nine wickets in a one-sided semi-final. Afghanistan was bowled out for a record-low 56 runs in 11.5 overs as Proteas bowlers dominated the pitch in Trinidad. South Africa chased the target comfortably, ending their long-standing 'chokers' tag in ICC tournament knockout stages.", "category": "Sports", "page": 16, "importance": 9, "telegram_url": "https://t.me/c/1877410077/124788", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE-Delhi-May-25-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/124788"}], "article_id": "747fcaaa"}, {"headline": "Atishi Hospitalized After Health Deteriorates During Hunger Strike Over Water", "summary": "Delhi Water Minister Atishi was admitted to the hospital after her health worsened during an indefinite hunger strike. She was protesting against Haryana's alleged refusal to release Delhi's share of Yamuna water amid a severe water crisis. Doctors advised hospitalization after her blood sugar levels dropped to 36 mg/dL. The AAP has appealed to the Prime Minister to intervene in the crisis.", "category": "India", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124788", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE-Delhi-May-25-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124788"}], "article_id": "224c9ebf"}, {"headline": "Government Forms High-Level Committee to Overhaul NTA Exam Procedures", "summary": "The Union Education Ministry has constituted a high-level committee led by former ISRO chief K. Radhakrishnan to recommend reforms in the National Testing Agency. The panel will focus on enhancing data security protocols, improving exam center selection, and ensuring transparent operations following the recent NEET and UGC-NET controversies. A report is expected within two months.", "category": "Education", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124788", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE-Delhi-May-25-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/124788"}], "article_id": "e570baa6"}, {"headline": "Iran deal inches closer, but Trump says ‘no rush’", "summary": "The US is close to a deal with Iran to end the war, reopen the Strait of Hormuz, and surrender enriched uranium. Trump says the deal is \"largely negotiated\" but \"no rush.\" Sanctions relief and a Lebanon ceasefire are proposed. EAM Jaishankar and Rubio discussed regional stability amid the West Asia conflict.", "category": "World", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/124836", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 25-05-202pdf.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124836"}], "article_id": "c47ae6e5"}, {"headline": "India, US signal thaw as EAM, Rubio meet", "summary": "India and the US moved to set aside rancour, with EAM Jaishankar and US Secretary of State Marco Rubio discussing deeper cooperation in defence, energy, technology, and critical minerals. Talks were held in New Delhi, followed by a Quad meeting. India raised concerns over US visa policies.", "category": "Politics", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124836", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 25-05-202pdf.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124836"}], "article_id": "4a618a7f"}, {"headline": "Trump agrees deal must end nuclear threat: tors like Lightspeed and M&G. This funding round aims to strengthen its financial position and support growth initiatives.", "category": "Business", "page": 20, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124865", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ²⁵⁰⁵²⁰²⁶.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/124865"}], "article_id": "ffd9b9f5"}, {"headline": "Delhivery Stock up 8% on Analyst Price Target", "summary": "Delhivery's stock surged 8% following an analyst upgrade to its price target. This reflects positive market sentiment and confidence in the logistics company's future growth prospects.", "category": "Business", "page": 20, "importance": 4, "telegram_url": "https://t.me/c/1877410077/124865", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ²⁵⁰⁵²⁰²⁶.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/124865"}], "article_id": "571fe7c0"}, {"headline": "DMK Slams Shivakumar on Mekedatu Dam, Citing TN Rights", "summary": "DMK criticized Karnataka Deputy CM DK Shivakumar for his \"arrogant attitude\" over the Mekedatu dam issue, alleging he claimed Tamil Nadu had no right to object. DMK stressed construction requires prior permission from lower riparian states as per SC orders, ensuring TN's Cauvery river water rights.", "category": "Politics", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124861"}, {"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 25-05-202pdf.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124836"}], "importance": 4, "article_id": "5b88b5f8"}, {"headline": "Anupam Rasayan to Acquire 74.2% Stake in Bliss GVS Pharma", "summary": "Surat-based Anupam Rasayan India Ltd, a specialty chemicals maker, is acquiring up to 74.2% equity in Mumbai-based Bliss GVS Pharma Ltd for over ₹1,360 crore. The deal involves an initial 43.3-48.2% stake, followed by an open offer for an additional 26%, aiming to strengthen its pharmaceutical value chain presence.", "category": "Business", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124861"}, {"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 25-05-202pdf.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/124836"}], "importance": 4, "article_id": "1fd84753"}, {"headline": "BJP Sweeps Bengal's Falta Repoll by Over 1 Lakh Votes", "summary": "BJP candidate Debangshu Panda won West Bengal's Falta Assembly re-poll by over 1 lakh votes (71.2% share), increasing BJP's state tally to 208 seats. The TMC nominee, who withdrew, and Congress forfeited deposits. PM Modi congratulated Panda on the victory of democracy over intimidation; CM Suvendu Adhikari also lauded the win.", "category": "Politics", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124861"}, {"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 25-05-202pdf.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124836"}, {"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ²⁵⁰⁵²⁰²⁶.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124865"}], "importance": 6, "article_id": "425eecb5"}, {"headline": "WHO Declares Ebola Emergency; India Issues Travel Advisory", "summary": "The WHO declared the Ebola outbreak in the Democratic Republic of Congo and Uganda a Public Health Emergency of International Concern. Caused by the Bundibugyo virus, this variant lacks approved vaccines or therapeutics. India's health ministry advised citizens against non-essential travel to DRC, Uganda, and South Sudan.", "category": "Health", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 25~05~2026.pdf", "page": 4, "telegram_url": "https://t.me/c/187 PM Carney on Comprehensive Trade Deal", "summary": "Commerce Minister Piyush Goyal will meet Canadian PM Mark Carney in Ottawa, leading India's largest trade delegation abroad. This rare high-level meeting aims to deepen India-Canada economic engagement and focuses on finalizing a comprehensive trade agreement, highlighting growing bilateral ties.", "category": "Business", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 25-05-202pdf.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124836"}], "importance": 7, "article_id": "969bbf48"}, {"headline": "India Raises Visa Concerns with US Secretary Rubio", "summary": "EAM S Jaishankar raised India's concerns with US Secretary of State Marco Rubio regarding recent US immigration and visa policy changes, which disproportionately affect Indian professionals. Rubio acknowledged \"bumps in the road\" during the system's modernization and transition.", "category": "Politics", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 25-05-202pdf.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124836"}], "importance": 6, "article_id": "cf2025f1"}, {"headline": "India, US Aim for Early Interim Trade Agreement Finalization", "summary": "India and the US are working towards an early conclusion of an interim trade agreement, with a US delegation expected in New Delhi soon. EAM Jaishankar and US Secretary of State Marco Rubio expressed hopes for an \"enduring\" and mutually beneficial trade deal.", "category": "Business", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 25-05-202pdf.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124836"}], "importance": 6, "article_id": "442ab587"}, {"headline": "Delhi Gymkhana Club to Challenge Eviction Order in HC", "summary": "The Delhi Gymkhana Club plans to challenge a Union government order in the Delhi High Court to vacate its 27.3-acre premises, alleging political motivation. Over 500 members authorized legal action as the club remains embroiled in land lease disputes.", "category": "Law", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 25-05-202pdf.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124836"}, {"newspaper": "Times of India", "pdf_filename": "ToI Bangalore ²⁵⁰⁵²⁰²⁶.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/124876"}], "importance": 5, "article_id": "1d235ae0"}, {"headline": "First LNG Tanker for India Exits Hormuz Amidst Iran War", "summary": "The first LNG tanker destined for India from the Persian Gulf has exited the Strait of Hormuz since the Iran war, heading to western India and easing energy supply concerns. The IRGC Navy reported 33 commercial vessels traversed the strait in 24 hours under Iranian security, signifying a partial resumption of energy trade routes.", "category": "Economy", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 25-05-202pdf.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124836"}, {"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ²⁵⁰⁵²⁰²⁶.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/124865"}], "importance": 7, "article_id": "bb7a0af6"}, {"headline": "SC Plea Demands Action Against Satirical \"Cockroach Janata Party\"", "summary": "A Supreme Court petition seeks action against the satirical online collective \"Cockroach Janata Party\" (CJP) for allegedly exploiting and commercially appropriating the court's May 15 observations. The plea claims their actions constitute \"selective extraction\" and \"sensational dissemination.\"", "category": "Law", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 25-05-202pdf.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124836"}], "importance": 3, "article_id": "0a6c6623"}, {"headline": "Bengal CM Orders 'Holding Centres' for Illegal Immigrants", "summary": "West Bengal CM Suvendu Adhikari directed district magistrates to establish \"holding centres\" in 20 districts for apprehended illegal immigrants, pending deportation. This policy, aligning with a May 2025 MHA directive, advances the BJP's \"detect, delete and deport\" agenda and will be managed by the state's home department. A bill was passed to facilitate this.", "category": "Politics", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 25-05-202pdf.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124836"}, {"newspaper": "Times of India", "pdf_filename": "ToI Bangalore ²⁵⁰⁵²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124876"}, {"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ²⁵⁰⁵²⁰²⁶.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124865"}], "importance": 6, "article_id": "db5e6d3b"}, {"headline": "Congress-DMK Rift Deepens Over Alliance Allegations", "summary": "The political rift between Congress and DMK in Tamil Nadu has intensified. Congress MP Manickam Tagore alleged BJP mediated an AIADMK-DMK alliance to prevent TVK's Vijay from becoming CM, following DMK's Udhayanidhi Stalin urging cadres to \"never trust Congress again\" and accusing them of \"backstabbing.\"", "category": "Politics", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 25-05-202pdf.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124836"}], "importance": 5, "article_id": "ca7fb475"}, {"headline": "Engine Power Loss Caused Leh Army Cheetah Chopper Crash", "summary": "A technical failure, causing engine power loss, led to an Army Cheetah helicopter crash in Tangtse near Leh on May 20. Two pilots and a Major General survived with minor injuries. The incident highlights the urgent need to replace the ageing Cheetah and Chetak fleets, though the known cause allows current fleet operations.", "category": "India", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 25-05-202pdf.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124836"}], "importance": 5, "article_id": "1e9df00e"}, {"headline": "Gunman Killed Near White House Security Checkpoint", "summary": "Nasire Best, 21, was killed by US Secret Service officers after opening fire near a White House security checkpoint, prompting a lockdown. He had a weapon and had previously attempted to enter a checkpoint in 2025, claiming to be Jesus Christ. Investigations are ongoing into his motive.", "category": "World", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 25-05-202pdf.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124836"}, {"newspaper": "Times of India", "pdf_filename": "ToI Bangalore ²⁵⁰⁵²⁰²⁶.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/124876"}, {"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ²⁵⁰⁵²⁰²⁶.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/124865"}], "importance": 7, "article_id": "37d3995a"}, {"headline": "Model Twisha Sharma Cremated After Dowry Death Allegations", "summary": "Former model-turned-actor Twisha Sharma, 32, was cremated 12 days after her death in Bhopal. Her family alleges dowry harassment, while her husband, Samarth Singh (now in custody), claims suicide, stating relations soured after her pregnancy. A second autopsy by AIIMS Delhi was performed at the high court's direction.", "category": "India", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 25-05-202pdf.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124836"}, {"newspaper": "Economic Times", "pdf_filename": "ET Bangalore ²⁵⁰⁵²⁰²⁶.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124865"}], "importance": 4, "article_id": "6623baa3"}, {"headline": "Punjab Police ASI Shot Dead in Amritsar; AAP Govt Blamed", "summary": "Punjab Police ASI Joga Singh, 52, was shot dead by two unidentified assailants on a motorcycle in Amritsar while on duty. Opposition parties slammed the AAP government, alleging \"lawlessness and anarchy,\" as police investigate the incident.", "category": "Politics", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 25-05-202pdf.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124836"}], "importance": 5, "article_id": "909df084"}, {"headline": "Illegal Sand Mining Threatens MP's Chambal Sanctuary", "summary": "Rampant illegal sand mining is scarring Madhya Pradesh's Chambal Wildlife Sanctuary, degrading floodplains and impacting the fragile habitats of endangered gharials, Gangetic dolphins, and red-crowned roofed turtles. Despite court bans and conservation efforts, enforcement remains weak.", "category": "Environment", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 25-05-202pdf.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124836"}], "importance": 6, "article_id": "6ed8d828"}, {"headline": "Archer's All-Round Show Powers Rajasthan Royals into IPL Playoffs", "summary": "Rajasthan Royals secured the fourth IPL playoff berth with a 30-run victory over Mumbai Indians, largely thanks to Jofra Archer's all-round brilliance. His crucial late-overs batting, strong Powerplay bowling, and dismissal of Hardik Pandya ensured the win, eliminating Punjab Kings and KKR.", "category": "Sports", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 25-05-202pdf.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124836"}], "importance": 5, "article_id": "274b7eff"}, {"headline": "10 Drown in Karnataka River While Collecting Shells", "summary": "Ten members of a family drowned, and one remains missing, after being swept away by strong currents in Karnataka's Palli Hallu Venkchapur river (Uttara Kannada district) while collecting freshwater mussels/shells. CM Siddaramaiah announced ₹5 lakh ex gratia for deceased families; search operations are ongoing.", "category": "India", "sources": [{"newspaper": "Hindustan Times", "pdf_filename" const CAT_META = {"Politics": {"color": "#e8334a", "icon": "🏛️"}, "Economy": {"color": "#f5a623", "icon": "📊"}, "Business": {"color": "#f0c040", "icon": "💼"}, "India": {"color": "#ff7043", "icon": "🇮🇳"}, "World": {"color": "#5c9eff", "icon": "🌍"}, "Sports": {"color": "#36c46f", "icon": "🏆"}, "Science": {"color": "#a78bfa", "icon": "🔬"}, "Technology": {"color": "#38bdf8", "icon": "💻"}, "Health": {"color": "#34d399", "icon": "🏥"}, "Law": {"color": "#fb923c", "icon": "⚖️"}, "Environment": {"color": "#4ade80", "icon": "🌿"}, "Education": {"color": "#e879f9", "icon": "📚"}, "Culture": {"color": "#f472b6", "icon": "🎭"}, "Infrastructure": {"color": "#94a3b8", "icon": "🏗️"}};

// FIXED: Pre-build data structures IMMEDIATELY for deep linking
const allArts = [...DIGEST.articles].sort((a,b)=>(b.importance||0)-(a.importance||0));
const byCategory = {};
for (const art of allArts) {
  const c = art.category||"India";
  if (!byCategory[c]) byCategory[c]=[];
  byCategory[c].push(art);
}
const sortedCats = Object.keys(byCategory).sort(
  (a,b)=>(byCategory[b][0].importance||0)-(byCategory[a][0].importance||0)
);

// FIXED DEEP LINK HANDLER - Runs IMMEDIATELY
let deepLinkTarget = null;
function handleDeepLink() {
  const hash = window.location.hash;
  if (!hash || !sortedCats.length) return;
  
  const cleanHash = hash.startsWith('#article-') ? hash.slice(9) : hash.slice(1);
  const targetArticle = DIGEST.articles.find(art => art.article_id === cleanHash);
  
  if (targetArticle) {
    deepLinkTarget = {article: targetArticle, hash: cleanHash};
  }
}
handleDeepLink();

let catIdx=0,vpW=0,vpH=0;
const panels=[];
const outer=document.getElementById('outer');
const hTrack=document.getElementById('hTrack');
const hintUp=document.getElementById('hintUp');
const hintRight=document.getElementById('hintRight');
const catFlash=document.getElementById('catFlash');
const cfIcon=document.getElementById('cfIcon');
const cfName=document.getElementById('cfName');

function buildAll() {
  vpW=outer.offsetWidth; vpH=outer.offsetHeight;
  hTrack.innerHTML=''; panels.length=0;
  sortedCats.forEach((cat,ci)=>{
    const m=CAT_META[cat]||{color:"#e8334a",icon:"📰"};
    const arts=byCategory[cat];
    const panel=document.createElement('div');
    panel.className='cat-panel';
    panel.id=`cat-panel-${ci}`;
    panel.style.setProperty('--cc',m.color);
    panel.innerHTML=`<div class="progress-row" id="prow-${ci}" style="--cc:${m.color}"></div><div class="v-feed" id="vfeed-${ci}"><div class="v-track" id="vtrack-${ci}"></div></div>`;
    hTrack.appendChild(panel);
    const pRow=panel.querySelector(`#prow-${ci}`);
    const vFeed=panel.querySelector(`#vfeed-${ci}`);
    const vTrack=panel.querySelector(`#vtrack-${ci}`);
    const cardH=vFeed.getBoundingClientRect().height||vpH;
    
    arts.forEach((art,ai)=>{
      const card = buildCard(art, cardH, m, cat, ai);
      card.id = `article-${art.article_id}`;
      card.dataset.articleId = art.article_id;
      vTrack.appendChild(card);
    });
    
    panels.push({pRow,vFeed,vTrack,articles:arts,artIdx:0});
    buildPRow(ci);
  });
  
  hTrack.style.transition='none';
  hTrack.style.transform='translateX(0)';
  syncV(0,false);
  
  // FIXED: Apply deep link after build
  if (deepLinkTarget) {
    setTimeout(() => applyDeepLink(deepLinkTarget), 100);
  }
}

function buildCard(art,h,m,cat,articleIndex) {
  const src=art.sources?.[0];
  const href=src?.pdf_filename?`pdfs/${src.pdf_filename}#page=${src.page}`:(src?.telegram_url||'#');
  const card=document.createElement('div');
  card.className='card';
  card.dataset.articleId = art.article_id;
  card.style.height=h+'px';
  card.style.setProperty('--cc',m.color);
  card.innerHTML=`
    <div class="card-content">
      <div class="card-toprow">
        <div class="cat-pill">
          <div class="pill-icon"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="1" y="1" width="8" height="2" rx="0.6" fill="#888"/><rect x="1" y="4.5" width="5" height="1.5" rx="0.6" fill="#666"/><rect x="1" y="7" width="6" height="1.5" rx="0.6" fill="#666"/></svg></div>
          ${cat.toUpperCase()}
        </div>
        <div class="card-date">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="2.5" width="11" height="9.5" rx="1.8" stroke="#555" stroke-width="1.2"/><path d="M4.5 1v3M8.5 1v3" stroke="#555" stroke-width="1.2" stroke-linecap="round"/><path d="M1 6h11" stroke="#555" stroke-width="1.2"/></svg>
          ${DIGEST.date}
        </div>
      </div>
      <div class="card-headline">${art.headline}</div>
      <div class="card-summary">${art.summary}</div>
      <div class="card-divider"></div>
      <div class="card-footer">
        ${src?`<a class="src-chip" href="${href}" target="_blank" onclick="event.stopPropagation()">${src.newspaper}<span class="src-chip-sep">&middot;</span><span class="src-chip-pg">Pg ${src.page}</span><span class="src-chip-ext"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M3.5 7.5L7.5 3.5M7.5 3.5H5M7.5 3.5V6" stroke="#555" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></span></a>`:'<div></div>'}
        <div class="info-btn"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6.5" stroke="#444" stroke-width="1.3"/><circle cx="7.5" cy="4.5" r="0.8" fill="#555"/><path d="M7.5 7v4" stroke="#555" stroke-width="1.5" stroke-linecap="round"/></svg></div>
      </div>
    </div>`;
  return card;
}

function buildPRow(ci) {
  const p=panels[ci],ai=p.artIdx;
  p.pRow.innerHTML='';
  p.articles.forEach((_,i)=>{
    const seg=document.createElement('div');
    seg.className='pseg'+(i<ai?' done':i===ai?' active':'');
    p.pRow.appendChild(seg);
  });
}

function syncV(ci,animated) {
  const p=panels[ci],h=p.vFeed.getBoundingClientRect().height;
 p.vTrack.style.transition=animated?'transform 0.35s cubic-bezier(0.4,0,0.2,1)':'none';
  p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;
  buildPRow(ci);
}

function applyDeepLink(target) {
  const ci = sortedCats.findIndex(cat =>
    byCategory[cat].some(art => art.article_id === target.hash)
  );
  if (ci === -1) return;
  goCat(ci, false);
  const ai = byCategory[sortedCats[ci]].findIndex(art => art.article_id === target.hash);
  if (ai === -1) return;
  panels[ci].artIdx = ai;
  syncV(ci, false);
  const card = document.getElementById('article-' + target.hash);
  if (card) { card.classList.add('target-highlight'); setTimeout(() => card.classList.remove('target-highlight'), 3000); }
}

function goArt(d) {
  const p=panels[catIdx];
  const n=Math.max(0,Math.min(p.artIdx+d,p.articles.length-1));
  if(n===p.artIdx&&d!==0)return;
  p.artIdx=n; syncV(catIdx,true); dismiss();
}

function goCat(idx,animated=true) {
  idx=Math.max(0,Math.min(idx,sortedCats.length-1));
  if(idx===catIdx&&animated)return;
  const prev=catIdx; catIdx=idx;
  hTrack.style.transition=animated?'transform 0.38s cubic-bezier(0.4,0,0.2,1)':'none';
  hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;
  if(animated&&idx!==prev) {
    const m=CAT_META[sortedCats[idx]]||{color:"#e8334a",icon:"📰"};
    catFlash.style.background=m.color+'18';
    cfIcon.textContent=m.icon; cfName.textContent=sortedCats[idx]; cfName.style.color=m.color;
    catFlash.classList.add('on'); setTimeout(()=>catFlash.classList.remove('on'),500);
  }
  dismiss();
}

let dismissed=false;
function dismiss() {
  if(dismissed)return; dismissed=true;
  hintUp.classList.remove('visible'); hintRight.classList.remove('visible');
  hintUp.classList.add('gone'); hintRight.classList.add('gone');
}

(function initHints() {
  const KEY='dailyBriefHintSeen';
  if(!localStorage.getItem(KEY)) {
    localStorage.setItem(KEY,'1');
    setTimeout(()=>{ if(!dismissed){ hintUp.classList.add('visible'); hintRight.classList.add('visible'); } },2500);
  }
})();

let tsX=0,tsY=0,tcX=0,tcY=0,axis=null,drag=false;
outer.addEventListener('touchstart',e=>{ tsX=e.touches[0].clientX; tsY=e.touches[0].clientY; tcX=0; tcY=0; axis=null; drag=true; hTrack.style.transition='none'; const p=panels[catIdx]; if(p)p.vTrack.style.transition='none'; },{passive:true});
outer.addEventListener('touchmove',e=>{ if(!drag)return; const dx=e.touches[0].clientX-tsX,dy=e.touches[0].clientY-tsY; tcX=dx; tcY=dy; if(!axis&&(Math.abs(dx)>8||Math.abs(dy)>8))axis=Math.abs(dx)>Math.abs(dy)?'h':'v'; if(!axis)return; e.preventDefault(); if(axis==='h'){ const edge=(catIdx===0&&dx>0)||(catIdx===sortedCats.length-1&&dx<0); hTrack.style.transform=`translateX(${-catIdx*vpW+dx*(edge ? 0.14 : 1)}px)`; }else{ const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height; const edge=(p.artIdx===0&&dy>0)||(p.artIdx===p.articles.length-1&&dy<0); p.vTrack.style.transform=`translateY(${-p.artIdx*h+dy*(edge ? 0.14 : 1)}px)`; } },{passive:false});
outer.addEventListener('touchend',()=>{ if(!drag)return; drag=false; if(axis==='h'){ const t=vpW*.2; if(tcX<-t)goCat(catIdx+1); else if(tcX>t)goCat(catIdx-1); else{hTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;} }else if(axis==='v'){ const t=vpH*.2; if(tcY<-t)goArt(1); else if(tcY>t)goArt(-1); else{const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height;p.vTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;} } axis=null; },{passive:true});
document.addEventListener('keydown',e=>{ if(e.key==='ArrowDown'||e.key===' '){e.preventDefault();goArt(1);} if(e.key==='ArrowUp'){e.preventDefault();goArt(-1);} if(e.key==='ArrowRight'){e.preventDefault();goCat(catIdx+1);} if(e.key==='ArrowLeft'){e.preventDefault();goCat(catIdx-1);} });
let wl=false;
outer.addEventListener('wheel',e=>{ e.preventDefault();if(wl)return;wl=true; Math.abs(e.deltaX)>Math.abs(e.deltaY)?goCat(catIdx+(e.deltaX>0?1:-1)):goArt(e.deltaY>0?1:-1); setTimeout(()=>wl=false,500); },{passive:false});
window.addEventListener('resize',()=>{ vpW=outer.offsetWidth;vpH=outer.offsetHeight; hTrack.style.transition='none'; hTrack.style.transform=`translateX(${-catIdx*vpW}px)`; panels.forEach(p=>{ const h=p.vFeed.getBoundingClientRect().height; p.vTrack.querySelectorAll('.card').forEach(c=>c.style.height=h+'px'); p.vTrack.style.transition='none'; p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`; }); });

buildAll();
</script>
