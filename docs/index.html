<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Inter', -apple-system, sans-serif;
  background: #0c0c0c; color: #fff; touch-action: none;
}
.outer { position: fixed; inset: 0; overflow: hidden; }
.h-track { display: flex; height: 100%; will-change: transform; }
.cat-panel { flex-shrink:0; width:100vw; height:100%; display:flex; flex-direction:column; overflow:hidden; }
.progress-row { flex-shrink:0; display:flex; gap:4px; padding:14px 16px 10px; background:#0c0c0c; position:relative; z-index:5; overflow:visible; }
.progress-row::after { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:80%; height:120px; background:radial-gradient(ellipse at top,color-mix(in srgb,var(--cc) 30%,transparent) 0%,transparent 70%); pointer-events:none; z-index:-1; }
.pseg { flex:1; height:2px; border-radius:1px; background:rgba(255,255,255,0.12); position:relative; overflow:hidden; }
.pseg::after { content:''; position:absolute; inset:0; background:var(--cc,#e8334a); transform:scaleX(0); transform-origin:left; transition:transform 0.25s ease; }
.pseg.done::after, .pseg.active::after { transform:scaleX(1); }
.v-feed { flex:1; overflow:hidden; position:relative; clip-path:inset(0); }
.v-track { display:flex; flex-direction:column; will-change:transform; }
.card { 
  width:100%; flex-shrink:0; background:#0c0c0c; display:flex; flex-direction:column; 
  overflow:hidden; position:relative; 
  scroll-margin-top: 80px;
}
.card.target-highlight {
  background: linear-gradient(135deg, #fff3cd22 0%, #ffeaa722 100%) !important;
  box-shadow: 0 0 30px rgba(255, 193, 7, 0.4);
  border: 2px solid #f39c12;
  animation: pulse-highlight 2s ease-in-out;
}
@keyframes pulse-highlight {
  0%, 100% { box-shadow: 0 0 30px rgba(255, 193, 7, 0.4); }
  50% { box-shadow: 0 0 50px rgba(255, 193, 7, 0.6); }
}
.card-content { flex:1; display:flex; flex-direction:column; padding:36px 20px 22px; min-height:0; position:relative; z-index:1; }
.card-toprow { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; flex-shrink:0; }
.cat-pill { display:inline-flex; align-items:center; gap:7px; background:#1c1c1e; border-radius:8px; padding:7px 12px 7px 10px; font-size:11.5px; font-weight:700; letter-spacing:0.07em; color:#d0d0d0; text-transform:uppercase; line-height:1; }
.pill-icon { width:16px; height:16px; background:#2e2e30; border-radius:3px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.pill-icon svg { display:block; }
.card-date { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:500; color:#666; letter-spacing:0.01em; }
.card-headline { font-size:28px; font-weight:800; line-height:1.18; color:#fff; letter-spacing:-0.03em; margin-bottom:20px; flex-shrink:0; }
.card-summary { font-size:15.5px; font-weight:400; line-height:1.62; color:#6b6b6b; flex:1; overflow:hidden; display:-webkit-box; -webkit-line-clamp:7; -webkit-box-orient:vertical; }
.card-divider { height:1px; background:#1e1e1e; margin:20px 0 16px; flex-shrink:0; }
.card-footer { display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.src-chip { display:inline-flex; align-items:center; gap:6px; background:#181818; border:1px solid #282828; border-radius:9px; padding:8px 13px; font-size:12.5px; font-weight:600; color:#c0c0c0; text-decoration:none; letter-spacing:0.005em; line-height:1; }
.src-chip-sep { color:#3a3a3a; font-weight:400; }
.src-chip-pg { color:#555; font-weight:500; }
.src-chip-ext { margin-left:2px; }
.src-chip-ext svg { display:block; }
.info-btn { width:36px; height:36px; border-radius:50%; border:1.5px solid #252525; background:#141414; display:flex; align-items:center; justify-content:center; color:#555; cursor:pointer; flex-shrink:0; }
.cat-flash { position:fixed; inset:0; z-index:600; pointer-events:none; opacity:0; transition:opacity 0.12s; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; }
.cat-flash.on { opacity:1; }
.cf-icon { font-size:34px; }
.cf-name { font-size:22px; font-weight:900; letter-spacing:-0.03em; text-transform:uppercase; }
.hint { position:fixed; display:flex; flex-direction:column; align-items:center; gap:5px; pointer-events:none; z-index:400; opacity:0; transition:opacity 0.6s ease; }
.hint.visible { opacity:1; }
.hint.gone { opacity:0 !important; transition:opacity 0.4s; }
.hint-pill { font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.55); background:rgba(255,255,255,0.07); backdrop-filter:blur(10px); padding:5px 13px; border-radius:100px; border:1px solid rgba(255,255,255,0.09); }
.hint-arr { font-size:16px; color:rgba(255,255,255,0.4); }
.h-up { bottom:28px; left:50%; transform:translateX(-50%); animation:bUp 2s ease-in-out infinite; }
.h-right { top:50%; right:14px; transform:translateY(-50%); animation:bRight 2s ease-in-out infinite 0.6s; }
@keyframes bUp { 0%,100% { bottom:28px; opacity:.65; } 50% { bottom:36px; opacity:1; } }
@keyframes bRight { 0%,100% { right:14px; opacity:.65; } 50% { right:6px; opacity:1; } }

<script>
const DIGEST   = {"date": "09 May 2026", "articles": [{"headline": "IndiGo and Air India oppose steep user fee at new airports", "summary": "India's leading airlines have opposed proposals by Navi Mumbai and Noida international airports to hike passenger charges. Adani-owned Navi Mumbai airport proposed a domestic departure fee of ₹653 by FY27, a significant increase from current rates. Carriers warned that high User Development Fees could slow traffic growth as domestic demand softens due to high fuel prices.", "category": "Infrastructure", "page": 13, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123099", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_09-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/123099"}], "article_id": "c0cfc0d4"}, {"headline": "The Pain Economy: Online platforms transform chronic pain management in India", "summary": "India’s analgesics market reached ₹16,757 crore as digital pharmacies and quick-commerce apps reshape how patients seek relief. The rise of self-diagnosis through social media and easy access to pain-relief products like patches and roll-ons is changing medical consumption. Experts highlight a growing focus on the 'root cause' of chronic pain versus traditional quick-fix medications.", "category": "Health", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123099", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_09-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/123099"}], "article_id": "dceb28e6"}, {"headline": "Vaishali becomes first Indian woman to win Candidates chess tournament", "summary": "R. Vaishali made history by winning the Candidates tournament after defeating Kateryna Lagno in the final round. The victory makes her the first Indian woman to qualify for a World Championship match involving just two players. Her resilience followed a difficult start to the tournament, eventually leading her to finish ahead of top-rated global grandmasters.", "category": "Sports", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123099", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_09-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123099"}], "article_id": "c43e86a9"}, {"headline": "AI spending distorts global economic data and trade balances", "summary": "Massive corporate investment in artificial intelligence is skewing U.S. GDP growth and trade deficits. While the AI economy grew an estimated 31% in the first quarter, the non-AI economy grew just 0.1%. This distortion is reflected in widening trade deficits with hardware-exporting nations like Taiwan and a massive valuation gap between tech giants and the rest of the stock market.", "category": "Economy", "page": 16, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123099", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_09-05-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/123099"}], "article_id": "7a7ab89b"}, {"headline": "GST Council to add four new state representatives after elections", "summary": "The Goods and Services Tax (GST) Council will induct four new members from Kerala, West Bengal, Tamil Nadu, and Bihar following recent assembly elections and leadership changes. The new representatives will join ministerial panels tasked with revenue analysis and system reforms. The council is expected to meet soon to discuss tax rate rationalization and sectoral issues.", "category": "Economy", "page": 14, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123099", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_09-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/123099"}], "article_id": "c3e3e594"}, {"headline": "Bikaji promoter acquires 35% stake in The Filter Coffee", "summary": "The family office of Bikaji Foods promoter Deepak Agarwal has invested ₹45 crore to acquire a 35% stake in Wishvish Foods, parent of The Filter Coffee. The Bengaluru-based South Indian restaurant chain plans to use the capital for retail expansion and backend infrastructure. The investment was made in a personal capacity to leverage Bikaji’s experience in scaling food brands.", "category": "Business", "page": 13, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123099", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_09-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/123099"}], "article_id": "13c8af86"}, {"headline": "Bollywood VFX quality faces scrutiny after high-budget Ramayana trailer", "summary": "The trailer for the mega-budget film Ramayana has drawn criticism for artificial visual effects, highlighting Bollywood's struggle with VFX integration. Experts suggest that while Indian artists are world-class, rushed post-production timelines and limited budgets often compromise quality. Audiences exposed to global standards now demand seamless effects that enhance rather than distract.", "category": "Business", "page": 13, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123099", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_09-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/123099"}], "article_id": "1eace949"}, {"headline": "RBI rejects industry demand to include quarterly profits in capital", "summary": "The Reserve Bank of India has declined feedback from the banking industry to allow quarterly profits to be added to capital adequacy calculations without specific conditions. Under current guidelines, banks can only count these profits if they meet bad loan provision requirements. The regulator emphasized maintaining a conservative approach to capital buffers to ensure financial stability.", "category": "Economy", "page": 13, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123099", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_09-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/123099"}], "article_id": "58116262"}, {"headline": "Cable and telecom gear firms squeezed by West Asia war", "summary": "Indian manufacturers like Polycab, Havells, and RR Kabel are facing increased input costs for PVC, copper, and aluminum due to the US-Iran conflict. Disrupted supply chains and rising freight costs have led companies to implement price hikes of up to 19%. Exports to West Asia, which account for a significant portion of revenue for firms like RR Kabel, are also facing near-term delays.", "category": "Business", "page": 16, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123099", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_09-05-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/123099"}], "article_id": "5ca76412"}, {"headline": "Swiggy shifts focus to sustainable growth for Instamart business", "summary": "Swiggy CEO Sriharsha Majety stated that the company will prioritize sustainable growth for its quick-commerce arm, Instamart, amid intensifying competition. Instamart reported a 53% year-on-year revenue jump to ₹1,057 crore, while narrowing losses. The company aims for a ₹1 trillion opportunity in the medium term, focusing on contribution margin breakeven rather than buying market share.", "category": "Business", "page": 14, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123099", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_09-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/123099"}], "article_id": "a71b74ea"}, {"headline": "LTM aims to double revenue to $10 billion by FY31", "summary": "L&T's IT services arm, LTM Ltd, targets doubling its revenue through large deals and AI-led services by 2030-31. The company ended the last fiscal with $4.76 billion in revenue, up 6%. Under CEO Venu Lambu, the firm is focusing on manufacturing and resources sectors while implementing a new five-year plan to balance margin expansion with aggressive reinvestment in growth capabilities.", "category": "Business", "page": 15, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123099", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_09-05-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/123099"}], "article_id": "6b0ea21d"}, {"headline": "E-way bill generation falls 5% in April after March record", "summary": "Electronic permits for goods shipments declined to 133.3 million in April from 140 million in March. The drop is attributed to the easing of year-end pressure to move inventory. However, volumes remained 12% higher compared to April last year, suggesting resilient underlying economic activity and improved tax compliance across both inter-state and intra-state supply chains.", "category": "Economy", "page": 14, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123099", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_09-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/123099"}], "article_id": "fafbc314"}, {"headline": "Titan revenue surges 33% to ₹76,000 crore in FY26", "summary": "Titan Co. Ltd reported a strong fiscal year with revenue hitting ₹76,000 crore, driven by high demand for jewellery during the wedding season and rising gold prices. The company's net profit jumped 52% to ₹5,073 crore. Following the results, Titan shares reached a fresh 52-week high, reflecting investor confidence in the brand's premium segment growth and retail expansion.", "category": "Business", "page": 13, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123099", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_09-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/123099"}], "article_id": "43538753"}, {"headline": "NTPC, IndianOil, and Coal India plan ₹6,000-crore HURL IPO", "summary": "State-run companies NTPC, Indian Oil, and Coal India are preparing to list their joint venture, Hindustan Urvarak & Rasayan Ltd (HURL), in FY27. The IPO is expected to raise up to ₹6,000 crore as part of the government's asset monetization strategy. HURL operates major fertilizer plants in Gorakhpur, Sindri, and Barauni, which are critical to India's agricultural self-sufficiency goals.", "category": "Business", "page": 13, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123099", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_09-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/123099"}], "article_id": "520c4fbb"}, {"headline": "Mid-tier IT firms narrow revenue gap with industry leaders", "summary": "Mid-tier software firms like Coforge, Mphasis, and Persistent Systems are adding new business at a faster relative rate than larger peers. While growth slowed across the industry, seven mid-tier firms added $1.1 billion in incremental revenue in FY26. Experts note these firms were less affected by AI-led disruption and benefit from niche expertise in development and security services.", "category": "Business", "page": 15, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123099", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_09-05-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/123099"}], "article_id": "5bf8728d"}, {"headline": "Accor expands luxury footprint in India targeting domestic travelers", "summary": "French hospitality giant Accor is shifting its India strategy to focus on the affluent domestic consumer rather than international tourists. The company, which operates 74 hotels in India, is expanding its Ennismore lifestyle and luxury brands. Accor executives believe the Indian luxury market is just starting, with domestic spending on high-end experiences reaching new record levels.", "category": "Business", "page": 14, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123099", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_09-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/123099"}], "article_id": "580af179"}, {"headline": "Restaurant menus get leaner as Ozempic use curbs appetites", "summary": "Indian restaurants are adjusting to the 'Ozempic effect' by offering smaller portion sizes and lighter, protein-forward dishes. As GLP-1 weight-loss drugs gain popularity in urban centers, diners are ordering less and avoiding high-calorie ingredients. Brands like McDonald's and high-end establishments like Indian Accent are introducing 'Lite' menus to cater to this shift in consumption.", "category": "Health", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123099", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_09-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123099"}], "article_id": "aebea11b"}, {"headline": "Prada Kolhapuri-inspired sandals spark debate on craft and appropriation", "summary": "Prada has launched a limited-edition sandal inspired by India's Kolhapuri chappals, priced at €750 (₹84,000). The footwear is produced in collaboration with artisans from Karnataka and Maharashtra. While the move follows initial accusations of cultural appropriation, the brand claims it will upskill local artisans. The high price tag contrasts sharply with the ₹500 cost of traditional pairs.", "category": "Business", "page": 7, "importance": 4, "telegram_url": "https://t.me/c/1877410077/123099", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_09-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/123099"}], "article_id": "8f0e3896"}, {"headline": "Sony Pictures CEO Gaurav Banerjee outlines pan-India growth strategy", "summary": "Gaurav Banerjee, the new MD and CEO of Sony Pictures Networks India, aims to expand the network's footprint into regional languages like Tamil, Telugu, and Marathi. With a 45% decline in FY25 net profit, Banerjee is focused on building a distribution-agnostic content company. He emphasizes the transition from a 'player' to a 'coach' role to foster creativity among writers and producers.", "category": "Business", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123099", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_09-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/123099"}], "article_id": "f1fc435b"}, {"headline": "Active holidays emerge as biggest travel trend for 2026", "summary": "The 'active holiday' is set to dominate travel in 2026, with tourists seeking movement-based recharge through paragliding in Bali and surfing in Sri Lanka. Destinations like Chiang Mai for mountain biking and Takayama for alpine hot springs are gaining traction among fitness-conscious travelers. The trend marks a shift away from traditional sightseeing toward adrenaline-pumping experiences.", "category": "Culture", "page": 10, "importance": 4, "telegram_url": "https://t.me/c/1877410077/123099", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_09-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/123099"}], "article_id": "a67280ec"}, {"headline": "Koovagam festival photobook highlights gaps in transgender rights laws", "summary": "A new photobook by Shino Cherian documents the 18-day Koovagam festival in Tamil Nadu, where trans women enact the marriage and mourning of deity Aravan. The work explores themes of community care and grief, while activists point out how these lived realities clash with the 'inhuman' medical vetting requirements of India's current Transgender Persons Protection of Rights laws.", "category": "Culture", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123099", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_09-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123099"}], "article_id": "c7fea0ed"}, {"headline": "Indian art exhibition Epochal explores collaborative modernism in Mumbai", "summary": "A joint exhibition by Chatterjee & Lal and DAG in Mumbai showcases 118 paintings from 1877 to the 1980s. The show focuses on the 'Period of Pioneers,' highlighting how collaboration between artists like K.G. Subramanyan and M.F. Husain shaped modern Indian art. It examines the engagement with national identity, traditional crafts like batik, and the sociopolitical landscape post-independence.", "category": "Culture", "page": 11, "importance": 4, "telegram_url": "https://t.me/c/1877410077/123099", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_09-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/123099"}], "article_id": "4c23c76c"}, {"headline": "Theatre directors adapt to dwindling audiences with intimate shows", "summary": "As digital competition and shrinking attention spans reduce theatre attendance, directors are moving away from large auditoriums to intimate spaces. Playwrights in cities like Bengaluru and Delhi are focusing on community building and post-show interactions to retain patrons. Some creators are tailoring productions to specific demographics to counter the dominance of OTT platforms.", "category": "Culture", "page": 11, "importance": 4, "telegram_url": "https://t.me/c/1877410077/123099", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_09-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/123099"}], "article_id": "f64162de"}, {"headline": "Android tablets see resurgence in India despite Apple dominance", "summary": "Xiaomi, OnePlus, Lenovo, and Samsung are reporting strong sales for Android tablets in India as hardware specs and design improve. Once dismissed as pandemic-era stopgaps, these devices are now treated as long-term computing tools rather than secondary accessories. Better software optimization and price-to-performance ratios are driving growth in both the functional and lifestyle segments.", "category": "Technology", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/123099", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_09-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123099"}], "article_id": "78024a5a"}, {"headline": "Fitness experts advise lighter workout regimens during record summer heat", "summary": "With temperatures crossing 40 degrees Celsius, doctors recommend modifying exercise schedules to avoid dehydration and heatstroke. Experts suggest shifting to indoor sessions, reducing intensity, and focusing on consistency over perfection. Training outdoors in high humidity can lead to dizziness as the body's natural cooling through sweat falters, making early morning or late evening best.", "category": "Health", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/123099", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_09-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123099"}], "article_id": "53c84e1d"}, {"headline": "Historian Manu S. Pillai explores power of eunuchs in Indian history", "summary": "Historical records reveal that eunuchs held significant political and military power in India for nearly 1,000 years. From Malik Kafur’s Deccan conquests to the influential Almas Khan in 18th-century Awadh, these individuals often managed state revenues and royal harems. Despite the social stigma and the cruelty of castration, many rose to become stately icons of loyalty and masculinity.", "category": "Culture", "page": 5, "importance": 4, "telegram_url": "https://t.me/c/1877410077/123099", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_09-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123099"}], "article_id": "a7d6a180"}, {"headline": "Shaky Ceasefire: UAE Attacked, US and Iran Exchange Fire", "summary": "Hostilities have renewed in West Asia as UAE forces engaged ballistic missiles and drones launched by Iran-backed groups. The US Navy also exchanged fire with Iranian forces in the Strait of Hormuz. The escalation comes despite international efforts to maintain a month-long ceasefire, causing significant concern for global oil supplies and regional stability.", "category": "World", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123105", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_09-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123105"}], "article_id": "a8296fee"}, {"headline": "Donald Trump Proposes Higher H-1B Costs for US Companies", "summary": "Former US President Donald Trump has proposed a significant increase in the minimum salary requirements for H-1B visa holders. The move aims to protect American workers and could cost US employers up to $18 billion in the first year. Critics argue the policy would shrink the talent pool for tech companies and drive higher operational costs in the sector.", "category": "World", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123105", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_09-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123105"}], "article_id": "05496574"}, {"headline": "Retail Inc Opens More Doors to Rising Demand", "summary": "Major Indian retailers like Reliance Retail, DMart, and Trent added over 2,100 stores in FY24, a 25% increase from the previous year. The expansion is driven by a surge in consumer spending and efforts to penetrate smaller towns. Industry experts expect this growth to continue through FY25 as retailers capitalize on post-Covid economic recovery and rising aspirations.", "category": "Business", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123105", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_09-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123105"}], "article_id": "cb7c11c0"}, {"headline": "Qualcomm Challenges Nvidia in Artificial Intelligence Chip Market", "summary": "Qualcomm is targeting Nvidia's dominance in the AI data center chip market with new products designed for generative AI workloads. The company aims to leverage its mobile expertise to provide more power-efficient solutions. Executives believe the shift from training to running large language models offers a strategic opportunity for Qualcomm to capture significant market share.", "category": "Technology", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123105", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_09-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123105"}], "article_id": "5259a3f6"}, {"headline": "SBI Q4 Profit Up 6% Despite Margin Strain", "summary": "State Bank of India reported a 6% increase in net profit for the fourth quarter, reaching ₹20,699 crore, driven by strong loan growth. However, the bank's net interest margin (NIM) saw a decline of 21 basis points to 3.14%. Shares fell 7% as investors reacted to the margin pressures and a cautious outlook on future credit growth and treasury yields.", "category": "Business", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123105", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_09-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123105"}], "article_id": "ada48345"}, {"headline": "MoSPI Directs States to Shift to New GSDP Base Year", "summary": "The Ministry of Statistics and Programme Implementation has asked states to shift the base year for Gross State Domestic Product (GSDP) calculation to 2011-12 by the end of FY27. This move aims to align state-level economic data with national accounts and improve the accuracy of regional economic monitoring and policy planning across the country.", "category": "Economy", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123105", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_09-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123105"}], "article_id": "a5809875"}, {"headline": "Govt Establishes Code to Streamline Public Land Transfers", "summary": "The Union Government has introduced a new framework for the transfer of public land for developmental projects. The code aims to reduce legal disputes and accelerate asset monetization by providing clear guidelines for land valuation and transfers between different government entities and departments. This is expected to boost infrastructure development speed.", "category": "Infrastructure", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123105", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_09-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123105"}], "article_id": "eac74890"}, {"headline": "Cloudflare to Cut 20% of Global Workforce", "summary": "Cybersecurity and internet infrastructure provider Cloudflare has announced plans to reduce its workforce by 20%, impacting approximately 1,100 jobs. The move is part of a restructuring plan to optimize costs and focus on rapid AI deployment. The company's revenue forecast for the second quarter came in slightly below analysts' expectations.", "category": "Technology", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123105", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_09-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123105"}], "article_id": "06052d99"}, {"headline": "Monsoon Expected to Hit Kerala by June 1", "summary": "The India Meteorological Department (IMD) has forecasted a timely arrival for the Southwest Monsoon, with onset over Kerala expected on June 1. The monsoon is likely to reach the Andaman and Nicobar Islands around May 20. This timely onset is seen as a positive indicator for India's agricultural sector and overall economic outlook for the coming year.", "category": "Environment", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123105", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_09-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123105"}], "article_id": "c985fa0b"}, {"headline": "Supreme Court Criticizes MP Government over Delay in MP Prosecution", "summary": "The Supreme Court expressed strong disapproval of the Madhya Pradesh government's delay in granting sanction to prosecute state minister Kunwar Vijay Shah. The case relates to allegedly objectionable remarks made against a former colleague. The court ordered that the decision on the sanction must be made within two weeks, emphasizing that 'enough is enough'.", "category": "Law", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123105", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_09-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123105"}], "article_id": "0cd2e613"}, {"headline": "China Confirms Support to Pakistan During Recent Military Conflict", "summary": "Chinese officials have confirmed providing military equipment and technical support to Pakistan during a four-day conflict with India last year. The assistance included fighter jets and advanced aerial vehicle design support. This confirmation highlights the deepening strategic and military ties between the two nations, which China describes as a 'live lab' for its technology.", "category": "World", "page": 3, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123105", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_09-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123105"}], "article_id": "c631dfbc"}, {"headline": "AICC Summons Kerala Congress Leaders Over CM Leadership Dispute", "summary": "The All India Congress Committee (AICC) has summoned senior Kerala Congress leaders to Delhi to resolve a growing power struggle over the Chief Minister's post. Frontrunners V.D. Satheesan and K.C. Venugopal are currently at odds, causing internal friction within the state unit. The party high command aims to finalize a leadership structure to ensure stability in the state assembly.", "category": "Politics", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123105", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_09-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123105"}], "article_id": "a33c802b"}, {"headline": "SC Orders Special Courts for Speedy NIA Trials", "summary": "The Supreme Court has directed the setting up of special courts to ensure the speedy trial of cases registered by the National Investigation Agency (NIA). The court noted that long delays in these trials violate the rights of the accused. High Courts have been instructed to designate specific judges for these cases to ensure hearings occur on a day-to-day basis.", "category": "Law", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123105", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_09-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123105"}], "article_id": "2a26c9c3"}, {"headline": "Oman Ports Provide Strategic Lifeline to Indian Exporters", "summary": "Ports in Oman are emerging as a vital alternative for Indian exporters to reach GCC nations, bypassing the volatile Strait of Hormuz. These ports have seen a surge in shipments of agricultural and food products from India. The development is being viewed as a strategic move to ensure supply chain resilience for India's food exports amid regional geopolitical instability.", "category": "Economy", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123105", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_09-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123105"}], "article_id": "b2f4585e"}, {"headline": "India Monitoring Hantavirus Outbreak on International Cruise Ship", "summary": "The Union Health Ministry is closely monitoring reports of a Hantavirus outbreak on a luxury cruise ship currently off the coast of Africa. Two Indian crew members are reportedly among those infected. The ministry is coordinating with international health agencies to ensure protocols are followed and to prevent any potential spread of the virus to Indian shores.", "category": "Health", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123105", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_09-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/123105"}], "article_id": "193313f5"}, {"headline": "US Suspects Smuggling of High-End Nvidia Chips to China", "summary": "US authorities are investigating a suspected smuggling ring that allegedly funneled billions of dollars' worth of advanced Nvidia AI chips to China through intermediaries in Southeast Asia. The chips, subject to strict export controls, are critical for developing advanced military and civilian AI technologies. The probe highlights challenges in enforcing tech sanctions.", "category": "Technology", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123105", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_09-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123105"}], "article_id": "456f6e0e"}, {"headline": "Hero Realty Secures ₹1,200 Crore Credit from IndusInd Bank", "summary": "Hero Realty has successfully raised ₹1,200 crore in debt funding from IndusInd Bank to support its expansion plans in major Indian cities. The capital will be utilized for the development of upcoming residential projects and to acquire new land parcels. The company aims to capitalize on the sustained demand for premium housing in Delhi-NCR and other urban markets.", "category": "Business", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123105", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_09-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123105"}], "article_id": "519e9b49"}, {"headline": "BCCI Warns IPL Franchises Over Unauthorised Guest Entries", "summary": "The BCCI has issued a stern warning to IPL franchises following reports of unauthorized guests being given access to restricted player areas and team hotels. The board cited security risks and potential integrity issues as primary concerns. Franchises have been told that further violations could lead to heavy fines or disciplinary action against team management.", "category": "Sports", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123105", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_09-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/123105"}], "article_id": "91c9c7fa"}, {"headline": "Akasa Air Establishes Aircraft Leasing Unit in GIFT City", "summary": "Akasa Air has launched a new aircraft leasing subsidiary within Gujarat International Finance Tec-City (GIFT City). The move is designed to optimize the airline's fleet financing costs and leverage tax incentives offered by the special economic zone. Akasa is the latest Indian carrier to shift leasing activities domestically to improve operational efficiency.", "category": "Business", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123105", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_09-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123105"}], "article_id": "29123a08"}, {"headline": "Forex Reserves Fall by $7.8 Billion as RBI Defends Rupee", "summary": "India's foreign exchange reserves dropped by $7.8 billion to $690.6 billion for the week ending May 1. The decline is largely attributed to the Reserve Bank of India selling dollars to prevent the rupee's volatility amid global market fluctuations. This represents the second consecutive weekly fall in reserves, though the central bank maintains they remain at a healthy level.", "category": "Economy", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123105", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_09-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/123105"}], "article_id": "6685268d"}, {"headline": "CDSCO Tightens Safety Norms for Post-Marketing Drug Reporting", "summary": "The Central Drugs Standard Control Organisation (CDSCO) has introduced stricter regulations for pharmaceutical companies regarding the reporting of adverse drug reactions post-launch. Manufacturers are now required to submit Periodic Safety Update Reports (PSUR) more frequently. The directive aims to enhance patient safety and ensure quicker identification of long-term side effects.", "category": "Health", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123105", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_09-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/123105"}], "article_id": "fca7fdc8"}, {"headline": "KKR Secures Dominant Victory Over Delhi Capitals in IPL", "summary": "Kolkata Knight Riders (KKR) achieved a significant eight-wicket victory over Delhi Capitals, bolstered by a brilliant 48-ball 100 from Phil Allen. KKR's spin-heavy bowling attack effectively restricted Delhi to a low total before chasing the target with 5.4 overs to spare. The win strengthens KKR's position in the top four of the league standings.", "category": "Sports", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123105", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_09-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/123105"}], "article_id": "0c6ddc0a"}, {"headline": "Jammu & Kashmir Sees 28% Surge in New Company Registrations", "summary": "The Union Territory of Jammu & Kashmir recorded a 28% increase in new company registrations in FY26 compared to the previous year. Official data shows a total of 1,770 new firms were incorporated, signaling growing investor confidence in the region's economic potential. The growth is particularly notable in sectors like tourism, food processing, and local manufacturing.", "category": "Economy", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123105", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_09-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/123105"}], "article_id": "daba344f"}, {"headline": "US trade court rejects Donald Trump’s 10% global tariff", "summary": "The US Court of International Trade ruled 2-1 against President Trump’s 10% global tariff under Section 122 of a 1974 trade law. The court found the tariff unlawful as it could only be justified for serious balance of payment problems. This decision strengthens India's position in Bilateral Trade Agreement negotiations, though India remains cautious over ongoing Section 301 investigations.", "category": "Economy", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123143", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123143"}], "article_id": "3db80f6b"}, {"headline": "Supreme Court reluctant to order arrest in ADAG fraud case", "summary": "The Supreme Court stated that arrest must be a last resort while hearing a plea regarding alleged financial fraud by the Reliance ADAG group. A CBI status report placed losses to public sector banks and LIC at ₹27,337 crore across seven cases. Senior advocate Kapil Sibal, appearing for Anil Ambani, suggested his client might have been cheated. The matter is listed for hearing in July.", "category": "Law", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123143", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123143"}], "article_id": "6a3f937b"}, {"headline": "Hyundai Motor India Q4 net profit drops 22%", "summary": "Hyundai Motor India reported a 22.22% decline in consolidated net profit to ₹1,255.6 crore for the quarter ended March, hit by higher commodity prices. Despite the profit skid, revenue grew by 5.4% to ₹18,916.2 crore. The company plans to invest ₹7,500 crore in new products and plant expansions in Chennai and Pune, aiming for 8-10% volume growth in FY27.", "category": "Business", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123143", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123143"}], "article_id": "7428a02e"}, {"headline": "Hero MotoCorp to invest ₹1,500 crore in FY27", "summary": "India's largest two-wheeler maker Hero MotoCorp will invest over ₹1,500 crore in FY27 to expand its scooter capacity and electric vehicle brand, Vida. The company reported a 26% rise in Q4 net profit to ₹1,460 crore. Planned capital expenditure includes over ₹700 crore for a global parts centre in south India. The firm expects to double EV production output within a month.", "category": "Business", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123143", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123143"}], "article_id": "585a0284"}, {"headline": "Biocon Q4 profit declines 57% on exceptional items", "summary": "Biocon Ltd reported a 56.8% year-on-year drop in consolidated net profit to ₹198.6 crore for Q4FY26, primarily due to an exceptional item outgo of ₹80.4 crore. However, revenue from operations rose 13% to ₹4,517 crore, driven by 16% growth in the biosimilars segment. The company completed the integration of its biologics arm and plans to focus on long-term value creation in FY27.", "category": "Business", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123143", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123143"}], "article_id": "e580723f"}, {"headline": "Tata Motors says VRS was employee-driven, not cost-cutting", "summary": "Tata Motors clarified that its recently concluded voluntary retirement scheme (VRS) was offered in response to union requests and not for workforce reduction. Around 275-300 employees opted for the scheme out of 750 eligible workers. The move comes as the company transitions toward electric vehicles, which require less labor than traditional internal combustion engine manufacturing.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123143", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123143"}], "article_id": "69b7bbbb"}, {"headline": "Tata Consumer Q4 net profit rises 22% on volume", "summary": "Tata Consumer Products Ltd reported a 22% rise in consolidated net profit to ₹424 crore for the quarter ended March 31, 2026. Revenue increased 18% to ₹5,434 crore, driven by 13% volume growth in the India business. Easing tea cost inflation helped offset higher coffee prices and international tariff headwinds. The board recommended a dividend of ₹10 per share.", "category": "Business", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123143", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123143"}], "article_id": "01ea2305"}, {"headline": "Bata India eyes expansion in Eastern India", "summary": "Footwear major Bata India plans to increase its total store count from 2,000 to 3,000 over the next three years. CEO Gunjan Shah stated that investments would focus on West Bengal and the eastern region, which contributes 12-15% of national revenue. The company plans to open 25-30 new stores in the eastern region over the next year.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123143", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123143"}], "article_id": "8fa4067c"}, {"headline": "Titan Q4 profit jumps 35% on jewellery demand", "summary": "Retail major Titan recorded a 35% year-on-year growth in consolidated net profit to ₹1,179 crore for Q4 FY26. Total income increased 46% to ₹20,300 crore, led by a 50% surge in jewellery income which reached ₹18,195 crore. The company added 30 new stores during the quarter and surpassed the ₹50,000-crore annual revenue milestone in FY25.", "category": "Business", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123143", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123143"}], "article_id": "8272ad41"}, {"headline": "India's forex reserves drop by $7.8 billion", "summary": "India's foreign exchange reserves declined by $7.794 billion to $690.693 billion for the week ended May 1, according to the RBI. Foreign currency assets dropped by $2.797 billion, while the value of gold reserves decreased by $5.021 billion. The decline follows a record high of $728.494 billion reached in February 2026.", "category": "Economy", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123143", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123143"}], "article_id": "efe3af6f"}, {"headline": "India and Oman to discuss FTA implementation", "summary": "A meeting scheduled for May 11 between India and Oman will focus on the early implementation of the free trade agreement signed in December 2025. The pact will grant duty-free access to 98% of India's exports, including textiles and leather. In return, India will reduce tariffs on Omani products like petrochemicals and dates.", "category": "Economy", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123143", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123143"}], "article_id": "86651686"}, {"headline": "India hopes for US-Iran deal on Chabahar port", "summary": "India is deferring action on the Chabahar port project following the April 26 expiry of a US sanctions waiver, anticipating a diplomatic breakthrough between Iran and the US. India and Iran had finalized a 10-year agreement for the port, involving a $120 million investment. New Delhi remains optimistic that a truce would lead to the withdrawal of sanctions on Indian entities.", "category": "Infrastructure", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123143", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123143"}], "article_id": "12b6c332"}, {"headline": "TVS launches iQube S with larger 4.7 kWh battery", "summary": "TVS Motor has reintroduced the iQube S variant with a larger 4.7 kWh battery pack, replacing the previous 3.5 kWh unit. The new variant offers a claimed 175 km IDC range and is priced at ₹1.37 lakh (ex-showroom, Delhi). The larger battery increases the kerb weight to 128.8 kg, positioned between the base model and the top-spec ST version.", "category": "Business", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123143", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123143"}], "article_id": "86a20584"}, {"headline": "Nissan launches CNG kit for Gravite MPV", "summary": "Nissan has introduced a factory-fitted CNG kit for its Gravite MPV, priced at ₹82,999. The system features two 25-litre cylinders designed to retain three-row usability and the vehicle's practicality. It comes with a 3-year, 1 lakh km third-party warranty on components and is available through authorized Nissan dealerships.", "category": "Business", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123143", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123143"}], "article_id": "3efb71f0"}, {"headline": "Tata Motors launches Currv.ev SeriesX with 55 kWh batteries", "summary": "Tata has updated its Currv.ev range with two new SeriesX variants featuring 55 kWh battery packs. The Accomplished X 55 starts at ₹16.55 lakh, while the Empowered X 55 #Dark is priced at ₹19.49 lakh. These models replace the previous 45 kWh versions as the company moves to increase the value quotient of its electric SUV lineup.", "category": "Business", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123143", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123143"}], "article_id": "335df6e3"}, {"headline": "Electoral roll revisions reshaped victory margins in Bengal", "summary": "The Special Intensive Revision (SIR) of electoral rolls, which deleted 91 lakh electors in West Bengal, emerged as a decisive factor in the 2026 Assembly polls. Analysis shows that in 49 constituencies with victory margins under 10,000, voter reductions often exceeded the eventual winning gap. Total 28 seats shifted from the TMC to the BJP in these closely contested areas.", "category": "Politics", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123143", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123143"}], "article_id": "b41d8318"}, {"headline": "N Rangasamy re-elected as leader of NDA in Puducherry", "summary": "Incumbent Chief Minister N Rangasamy was re-elected as the leader of the NDA legislature party in Puducherry following a decisive electoral victory. His party, NR Congress, won 12 seats, while the BJP secured four in the 30-member Assembly. Rangasamy, a veteran leader who has served multiple terms as CM, won his Thattanchavady seat by a margin of 4,441 votes.", "category": "Politics", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123143", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123143"}], "article_id": "e7116d53"}, {"headline": "Women voters outnumber men in 2026 Assembly polls", "summary": "Election Commission data shows exceptionally high voter participation across states, with women outnumbering men in turnout percentages. West Bengal recorded the highest turnout at 93.71%, with 93.8% of women voting. Similar trends were seen in Tamil Nadu (85.01%), Assam (85.74%), Kerala (78.11%), and Puducherry (89.82%), where female participation consistently led.", "category": "Politics", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123143", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123143"}], "article_id": "b50c769c"}, {"headline": "Emergency Credit Scheme 5.0 to assist war-stressed MSMEs", "summary": "The Centre has launched the fifth tranche of the Emergency Credit Linked Guarantee Scheme (ECLGS) to help MSMEs affected by the West Asia conflict and supply chain disruptions. MSMEs can access 20% additional credit of their working capital with a 100% bank guarantee. The scheme aims to ease liquidity constraints for industries facing high crude and input costs.", "category": "Economy", "page": 6, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123143", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123143"}], "article_id": "2e6b165b"}, {"headline": "India urges ramp-up of strategic petroleum reserves", "summary": "India is looking to increase its Strategic Petroleum Reserves (SPRs) to ensure energy security against global shocks. Phase II completion will take capacity to 11.83 MMT, providing 86 days of supply. Strategies include inviting private investment through PPP models, diversifying crude portfolios with light US crude, and exploring oil storage facilities in Oman.", "category": "Infrastructure", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123143", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123143"}], "article_id": "4c6813ad"}, {"headline": "Bank of Baroda Q4 net profit rises 11%", "summary": "Bank of Baroda reported an 11% year-on-year increase in standalone net profit to ₹5,616 crore for the fourth quarter. Net interest income rose 9% to ₹12,494 crore, while gross non-performing assets improved to 1.89% from 2.26%. The board recommended a final dividend of ₹8.50 per share and approved raising up to ₹6,000 crore in additional capital.", "category": "Business", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123143", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/123143"}], "article_id": "36530049"}, {"headline": "Urban Company reports Q4 net loss of ₹161 crore", "summary": "Home-services platform Urban Company saw its consolidated loss widen to ₹161.16 crore in the March quarter as it focused on scaling its housekeeping service, InstaHelp. However, revenue from operations grew 36% to ₹1,555.54 crore for the full year. The company aims for consolidated adjusted EBITDA break-even by the third quarter of FY28.", "category": "Business", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123143", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/123143"}], "article_id": "c0deaf36"}, {"headline": "Bank of India Q4 net profit climbs 15%", "summary": "Bank of India reported a 15% increase in net profit to ₹3,016 crore for the fourth quarter of FY26. Total income for the quarter rose to ₹22,685 crore from ₹21,751 crore in the year-ago period. Interest income saw growth of 6.3% to ₹19,476 crore. For the full fiscal year, the bank's net profit reached ₹20,021 crore.", "category": "Business", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123143", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/123143"}], "article_id": "29cbb4d8"}, {"headline": "RBI imposes ₹31.8 lakh penalty on Yes Bank", "summary": "The Reserve Bank of India has imposed a penalty of ₹31.80 lakh on Yes Bank for non-compliance with 'Know Your Customer' provisions. Separately, the regulator fined Hinduja Housing Finance Ltd ₹1.8 lakh for violating governance-related directions. Both penalties were based on deficiencies in regulatory compliance discovered during statutory inspections.", "category": "Business", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123143", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/123143"}], "article_id": "620b0e6d"}, {"headline": "JSW Infrastructure net profit grows 15% in Q4", "summary": "Ports operator JSW Infrastructure reported a 15% increase in net profit to ₹528 crore for the quarter ended March 2026. Revenue from operations climbed 19% to ₹1,522 crore, supported by steady cargo volumes at western ports. The company aims to expand its cargo handling capacity to 400 mtpa by FY30 and is targeting ₹3,000 crore EBITDA in FY27.", "category": "Infrastructure", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123143", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/123143"}], "article_id": "1c961ce2"}, {"headline": "NTPC to list THDC and NEEPCO arms this fiscal", "summary": "State-owned power giant NTPC plans to launch initial public offerings (IPOs) for its subsidiaries THDC and NEEPCO by the end of the current financial year. The move follows the listing of its green energy arm, NGEL. NTPC also agreed to the market debut of Hindustan Urvarak & Rasayan Ltd, in which it holds a 30% stake, to raise funds for expansion.", "category": "Business", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123143", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/123143"}], "article_id": "da7d1a58"}, {"headline": "Geopolitical tensions drag Nifty lower as oil crosses $100", "summary": "Indian equity markets ended the week on a weak note as renewed military exchanges between US and Iranian forces pushed Brent crude back above $100 per barrel. The Nifty 50 fell 0.62% to settle at 24,176.15. Banking and financial stocks led the losses, while Nifty IT managed modest gains. Investors are cautious as high oil prices threaten corporate margins.", "category": "Economy", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123143", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/123143"}], "article_id": "9bfccd53"}, {"headline": "SEBI eases data lag rules for educational activities", "summary": "The Securities and Exchange Board of India has revised rules to allow a uniform 30-day time lag for using stock price data in educational and investor awareness programs. Effective July 1, the move replaces a previous framework that required a three-month lag for educational entities. The change aims to balance data misuse prevention with the relevance of educational content.", "category": "Economy", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123143", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/123143"}], "article_id": "896e91ac"}, {"headline": "Natural rubber hits record high of ₹253 per kg", "summary": "Natural rubber prices in India have rallied to a record high of ₹253 per kg due to supply shortages caused by the West Asia conflict and extreme temperatures in production regions. Tapping has stopped in major areas due to lack of rainfall. International price hikes and industrial demand have further pushed domestic rates, with some transactions hitting ₹260 per kg.", "category": "Economy", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123143", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/123143"}], "article_id": "fcee8c42"}, {"headline": "April 2026 recorded as third-warmest globally", "summary": "Last month was the third-warmest April on record globally, with sea surface temperatures in extra-polar oceans reaching the second-highest levels ever recorded. Data from the Copernicus Climate Change Service shows average surface air temperatures were 0.52°C above the 1991-2020 average. Significant temperature anomalies were noted across the Northern Hemisphere.", "category": "Environment", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123143", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/123143"}], "article_id": "b694e126"}, {"headline": "Three out of four major Indian reservoirs are half-empty", "summary": "Overall storage in 166 major Indian reservoirs has dipped to 36% of total capacity, with the southern region particularly affected. Storage in Telangana is at 20% and Karnataka at 22%, while West Bengal faces a precarious 12%. Around 28% of the country's 725 districts received deficient or no rainfall between March 1 and May 7, intensifying the water crisis.", "category": "Environment", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123143", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/123143"}], "article_id": "9870386e"}, {"headline": "Indian drone industry ramps up production for military", "summary": "Domestic drone manufacturers are scaling up capacity as the Indian military shifts toward unmanned systems for combat. Zen Technologies is producing 15,000 interceptor drones monthly, while IG Defence rolls out 200 first-person view drones daily. Experts note that while the industry is ready, it needs expedited procurement orders to sustain manufacturing on the scale of global peers.", "category": "Technology", "page": 11, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123143", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/123143"}], "article_id": "d2962270"}, {"headline": "Maharashtra orders strict enforcement of POSH Act", "summary": "The Maharashtra government has directed all establishments with 10 or more employees to strictly implement the Prevention of Sexual Harassment (POSH) Act. Businesses must set up Internal Complaints Committees and register them on the Centre’s She-Box portal. The move follows the Nashik TCS case and aims to enhance the safety of women at workplaces.", "category": "Law", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123143", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/123143"}], "article_id": "2ae11d47"}, {"headline": "India plans policy framework for fractional aircraft ownership", "summary": "The Civil Aviation Ministry is developing a regulatory framework for fractional aircraft ownership to deepen the aviation ecosystem. Minister Ram Mohan Naidu also announced efforts to classify aircraft as infrastructure assets and plans to restart seaplane services between Kochi and Lakshadweep. Major airlines have pledged to lease over 200 additional aircraft through GIFT City.", "category": "Infrastructure", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123143", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/123143"}], "article_id": "314107fa"}, {"headline": "No immediate threat from hantavirus in India says ICMR", "summary": "The ICMR’s National Institute of Virology stated there is no immediate public health threat to India from hantavirus following reports of infected nationals on a cruise ship. Health officials clarified that the virus is generally linked to rodent exposure rather than human-to-human transmission. India currently has adequate laboratory surveillance to identify suspected cases.", "category": "Health", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123143", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/123143"}], "article_id": "40afef53"}, {"headline": "ED arrests three Gameskraft founders in money laundering case", "summary": "The Enforcement Directorate arrested Gameskraft founders Deepak Singh, Prithvi Raj Singh, and Vikas Taneja in connection with a money laundering probe. The case stems from FIRs related to suicides of individuals allegedly cheated through online money gaming. The agency carried out searches at 17 locations, following a government ban on various online real-money games.", "category": "Law", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123143", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/123143"}], "article_id": "bdebb42d"}, {"headline": "Vedanta and Tata 1mg launch telemedicine in Odisha", "summary": "Vedanta Aluminium has partnered with Tata 1mg to launch a 24x7 telemedicine facility in Lanjigarh, Odisha. The service provides free audio and video consultations with specialist doctors to nearly 70 remote villages, benefiting over 70,000 people. A dedicated telemedicine room has also been established at the Vedanta Lanjigarh Hospital for assisted consultations.", "category": "Health", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123143", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/123143"}], "article_id": "f3de53dc"}, {"headline": "SBI maintains FY27 credit guidance despite Q4 profit dip", "summary": "State Bank of India (SBI) kept its FY27 credit growth guidance at 13-15% despite a 6.4% sequential decline in Q4 net profit to ₹19,684 crore. Lower net interest margins and treasury losses impacted earnings, while shares fell 7%. Chairman C.S. Setty remains optimistic about asset quality but noted potential economic risks if the West Asia conflict persists for several months.", "category": "Business", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_09-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123099"}, {"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123143"}], "importance": 9, "article_id": "a00f4884"}, {"headline": "Zepto receives Sebi approval for confidential quick commerce IPO", "summary": "Quick-commerce unicorn Zepto has received observations from Sebi regarding its confidential initial public offering (IPO) papers. This marks a significant step toward India's first pure-play quick commerce listing. The company received the regulator's nod on 8 May, allowing it to proceed with the public issue process to capitalize on the rapidly growing 10-minute delivery market.", "category": "Business", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_09-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/123099"}, {"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_09-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123105"}], "importance": 8, "article_id": "cdb05f9a"}, {"headline": "Hyundai India profit falls as competition and commodity costs weigh", "summary": "Hyundai Motor India reported a 4% decline in annual net profit to ₹5,432 crore for FY26. The company saw margins dip by 50 basis points due to rising commodity prices and high discounts in a competitive market. Despite a 2.3% drop in domestic sales, the firm recorded 16% growth in exports and plans to reclaim its position as India's second-largest carmaker through new model launches.", "category": "Business", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_09-05-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/123099"}, {"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_09-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123105"}], "importance": 8, "article_id": "0ff0aa77"}, {"headline": "Air India rules out layoffs but defers annual salary increments", "summary": "Air India management informed employees that no layoffs are planned despite geopolitical headwinds and rising fuel costs. However, the carrier has deferred annual salary increments by at least one quarter and is tightening discretionary spending. The airline is currently managing a leadership transition and navigating increased operational costs due to the West Asia conflict.", "category": "Business", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_09-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/123099"}, {"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123143"}], "importance": 8, "article_id": "2d9e092a"}, {"headline": "BJP selects Suvendu Adhikari as West Bengal Chief Minister", "summary": "Following a landslide victory in the West Bengal Assembly elections, the BJP has selected Suvendu Adhikari as its legislature party leader. Union Home Minister Amit Shah presided over the meeting, stating the victory plugs a hole in national security regarding infiltration. Adhikari met Governor RN Ravi to stake his claim, becoming the first BJP Chief Minister in the state's history.", "category": "Politics", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_09-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123105"}, {"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123143"}], "importance": 10, "article_id": "598fe7ec"}, {"headline": "Tata Trusts Postpone Board Meeting Amid Legal Tussle", "summary": "Tata Trusts has deferred a key board meeting scheduled to discuss the potential listing of Tata Sons and the appointment of new trustees. The delay follows concerns raised by some trustees regarding representation and the proposed listing structure. The internal rift highlights the complex governance challenges within India's largest philanthropic organization and corporate group.", "category": "Business", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_09-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123105"}, {"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123143"}], "importance": 9, "article_id": "e11b64b6"}, {"headline": "Swiggy Narrows Net Loss to ₹800 Crore in Q4", "summary": "Food delivery major Swiggy reported a 26% reduction in its net loss for the quarter ending March, bringing it down to ₹800 crore from ₹903 crore a year ago. Revenue grew by 45% during the same period. The company credited improved operational efficiency and reduced spending on discounts for the improved financial performance ahead of its planned public listing.", "category": "Business", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_09-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123105"}, {"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/123143"}], "importance": 8, "article_id": "7232d632"}, {"headline": "Oil marketing companies face ₹30,000 crore monthly under-recovery", "summary": "Indian Oil, HPCL, and BPCL are incurring combined under-recoveries of approximately ₹30,000 crore per month by selling petrol, diesel, and LPG below cost. Despite high global crude prices, the OMCs have not revised retail fuel prices to protect consumers. The government recently lowered special additional excise duty by ₹10 a litre, but OMCs continue to face high operating and freight costs.", "category": "Business", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_09-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123105"}, {"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123143"}], "importance": 8, "article_id": "0035c16d"}, {"headline": "Vijay's Government Formation Hits Majority Hurdle in Tamil Nadu", "summary": "In Tamil Nadu, Vijay's bid to form a government has encountered a delay as Governor R.N. Ravi sought further clarification on majority support. While the TVK chief claimed the support of 118 MLAs, reports suggest physical letters were provided for only 116. The Left parties have clarified they will support the government from outside to keep communal forces at bay.", "category": "Politics", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_09-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123105"}, {"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 09~05~2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123143"}], "importance": 9, "article_id": "9fa39140"}]};
const CAT_META = {"Politics": {"color": "#e8334a", "icon": "🏛️"}, "Economy": {"color": "#f5a623", "icon": "📊"}, "Business": {"color": "#f0c040", "icon": "💼"}, "India": {"color": "#ff7043", "icon": "🇮🇳"}, "World": {"color": "#5c9eff", "icon": "🌍"}, "Sports": {"color": "#36c46f", "icon": "🏆"}, "Science": {"color": "#a78bfa", "icon": "🔬"}, "Technology": {"color": "#38bdf8", "icon": "💻"}, "Health": {"color": "#34d399", "icon": "🏥"}, "Law": {"color": "#fb923c", "icon": "⚖️"}, "Environment": {"color": "#4ade80", "icon": "🌿"}, "Education": {"color": "#e879f9", "icon": "📚"}, "Culture": {"color": "#f472b6", "icon": "🎭"}, "Infrastructure": {"color": "#94a3b8", "icon": "🏗️"}};

// FIXED: Pre-build data structures IMMEDIATELY for deep linking
const allArts = [...DIGEST.articles].sort((a,b)=>(b.importance||0)-(a.importance||0));
const byCategory = {};
for (const art of allArts) {
  const c = art.category||"India";
  if (!byCategory[c]) byCategory[c]=[];
  byCategory[c].push(art);
}
const sortedCats = Object.keys(byCategory).sort(
  (a,b)=>(byCategory[b][0].importance||0)-(byCategory[a][0].importance||0)
);

// FIXED DEEP LINK HANDLER - Runs IMMEDIATELY
let deepLinkTarget = null;
function handleDeepLink() {
  const hash = window.location.hash;
  if (!hash || !sortedCats.length) return;
  
  const cleanHash = hash.startsWith('#article-') ? hash.slice(9) : hash.slice(1);
  const targetArticle = DIGEST.articles.find(art => art.article_id === cleanHash);
  
  if (targetArticle) {
    deepLinkTarget = {article: targetArticle, hash: cleanHash};
  }
}
handleDeepLink();

let catIdx=0,vpW=0,vpH=0;
const panels=[];
const outer=document.getElementById('outer');
const hTrack=document.getElementById('hTrack');
const hintUp=document.getElementById('hintUp');
const hintRight=document.getElementById('hintRight');
const catFlash=document.getElementById('catFlash');
const cfIcon=document.getElementById('cfIcon');
const cfName=document.getElementById('cfName');

function buildAll() {
  vpW=outer.offsetWidth; vpH=outer.offsetHeight;
  hTrack.innerHTML=''; panels.length=0;
  sortedCats.forEach((cat,ci)=>{
    const m=CAT_META[cat]||{color:"#e8334a",icon:"📰"};
    const arts=byCategory[cat];
    const panel=document.createElement('div');
    panel.className='cat-panel';
    panel.id=`cat-panel-${ci}`;
    panel.style.setProperty('--cc',m.color);
    panel.innerHTML=`<div class="progress-row" id="prow-${ci}" style="--cc:${m.color}"></div><div class="v-feed" id="vfeed-${ci}"><div class="v-track" id="vtrack-${ci}"></div></div>`;
    hTrack.appendChild(panel);
    const pRow=panel.querySelector(`#prow-${ci}`);
    const vFeed=panel.querySelector(`#vfeed-${ci}`);
    const vTrack=panel.querySelector(`#vtrack-${ci}`);
    const cardH=vFeed.getBoundingClientRect().height||vpH;
    
    arts.forEach((art,ai)=>{
      const card = buildCard(art, cardH, m, cat, ai);
      card.id = `article-${art.article_id}`;
      card.dataset.articleId = art.article_id;
      vTrack.appendChild(card);
    });
    
    panels.push({pRow,vFeed,vTrack,articles:arts,artIdx:0});
    buildPRow(ci);
  });
  
  hTrack.style.transition='none';
  hTrack.style.transform='translateX(0)';
  syncV(0,false);
  
  // FIXED: Apply deep link after build
  if (deepLinkTarget) {
    setTimeout(() => applyDeepLink(deepLinkTarget), 100);
  }
}

function buildCard(art,h,m,cat,articleIndex) {
  const src=art.sources?.[0];
