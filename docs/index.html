7410077/127085", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 14~06~2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/127085"}], "article_id": "89d71bfd"}, {"headline": "Alcaraz and Djokovic advance to Wimbledon quarterfinals with dominant performances", "summary": "Defending champion Carlos Alcaraz and seven-time winner Novak Djokovic secured spots in the Wimbledon quarterfinals on Monday. Alcaraz defeated Ugo Humbert in four sets, while Djokovic overcame Holger Rune in a straight-sets masterclass. Both remain favorites for a potential rematch of last year’s final in the tournament's closing stages.", "category": "Sports", "page": 16, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127085", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 14~06~2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/127085"}], "article_id": "e4a8ec3e"}, {"headline": "Abhishek Sharma scores maiden century as India levels T20 series", "summary": "Young opener Abhishek Sharma hit a brilliant maiden international century to lead India to a 100-run victory over Zimbabwe in the second T20I. The win levels the five-match series 1-1. India's bowlers, led by Ravi Bishnoi and Mukesh Kumar, successfully defended the massive total of 234, restricting the hosts to 134.", "category": "Sports", "page": 17, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127085", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 14~06~2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/127085"}], "article_id": "d77f2c09"}, {"headline": "Union Ministry takes physical possession of Jaipur Polo Ground in Delhi", "summary": "The Union Housing and Urban Affairs Ministry took possession of the 15.20-acre Jaipur Polo Ground on Saturday. The move followed a Delhi court's refusal to grant temporary protection to the Indian Polo Association against an eviction order. The land, located in the Race Course area, was sought for a larger public purpose, though specific future use details were not disclosed.", "category": "Infrastructure", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/127094", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127094"}], "article_id": "6c5aa80e"}, {"headline": "Congress launches nationwide campaign against paper leaks and examination irregularities", "summary": "Rahul Gandhi will lead a Congress campaign starting June 17 to protest paper leaks and irregularities in examinations like NEET. The initiative includes student conventions in Kota, Prayagraj, Patna, and Delhi. Demands include the decentralization of NEET, abolition of examination fees, and fixing accountability for recurring lapses in the national recruitment and education systems.", "category": "Education", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127094", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127094"}], "article_id": "767bdb12"}, {"headline": "Uphaar tragedy survivors demand stricter accountability for fire safety negligence", "summary": "The Association of Victims of Uphaar Tragedy gathered to mark the 29th anniversary of the 1997 fire that killed 59 people. President Neelam Krishnamoorthy criticized the recurring fire incidents in Delhi, citing overlooked safety violations and poorly scrutinized certificates. The association is seeking a specific law to govern safety violations to prevent similar future disasters.", "category": "India", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/127094", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127094"}], "article_id": "538cdd4a"}, {"headline": "Delhi Power Minister says fuel price surge won't hike consumer bills", "summary": "Delhi Power Minister Ashish Sood stated that a 31% rise in power procurement costs due to global fuel prices will not impact subsidized consumers. While the DERC allowed a 2.4% increase in the Power Purchase Adjustment Cost (PPAC), the Minister assured that the government would insulate the public from the burden of rising energy costs triggered by the West Asia crisis.", "category": "Economy", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/127094", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127094"}], "article_id": "358fcc9c"}, {"headline": "Delhi Fire Services proposes mandatory fire detectors for all new constructions", "summary": "The Delhi Fire Services has recommended making fire detection systems mandatory in all new buildings. The proposal includes a three-year window for existing buildings to install detectors via a house tax rebate. Additionally, mandatory sprinklers are suggested for new residential structures. The agency noted modern homes reach dangerous 'flashover' ignition levels in just 3 to 5 minutes.", "category": "Infrastructure", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/127094", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127094"}], "article_id": "4b447c71"}, {"headline": "Residents protest in Hapur after Ambedkar statue vandalized by miscreants", "summary": "Villagers in Hapur, Uttar Pradesh, staged a sit-in protest after a statue of Dr. B.R. Ambedkar was vandalized. Senior police officials intervened to reinstall the statue and provided assurances of action against the culprits, leading to the protest being called off. The incident occurred during the intervening night of Friday and Saturday in Ghungrala and neighbouring areas.", "category": "Politics", "page": 3, "importance": 3, "telegram_url": "https://t.me/c/1877410077/127094", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/127094"}], "article_id": "84e6b269"}, {"headline": "Union Minister Hardeep Singh Puri rules out junior partner role in Punjab", "summary": "Union Minister Hardeep Singh Puri stated that the BJP will not accept the role of a \"younger brother\" in any alliance in Punjab. Speaking amid speculation of a revived SAD-BJP tie-up, Puri asserted that the BJP is the world's largest party and intends to contest all 117 Assembly seats. State BJP leaders expressed confidence in forming the next government to address the drug menace.", "category": "Politics", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127094", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/127094"}], "article_id": "2869a963"}, {"headline": "Three close contacts of Kerala Nipah patient test negative for virus", "summary": "Health Minister K. Muraleedharan announced that three high-risk contacts of a Nipah-infected patient in Kozhikode have tested negative. This suggests a low likelihood of community spread. Currently, 100 people are on the contact list. An ICMR team has arrived to review containment steps. The patient remains on ventilator support and has been administered monoclonal antibodies.", "category": "Health", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127094", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/127094"}], "article_id": "ef26a0ef"}, {"headline": "Adivasi woman rescued from bonded labour conditions in Gurugram", "summary": "A 39-year-old woman from West Bengal was rescued from a home in Gurugram after being kept in bonded labour conditions for over two years. The rescue was a joint operation between Haryana and West Bengal police following an NGO intervention. The victim reported being confined by smart locks, subjected to physical abuse, and forced to work 16-hour days without a phone.", "category": "India", "page": 3, "importance": 4, "telegram_url": "https://t.me/c/1877410077/127094", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/127094"}], "article_id": "9fb38ffa"}, {"headline": "Telangana Deputy CM alleges BRS-BJP conspiracy to weaken Singareni Collieries", "summary": "Telangana Deputy CM Mallu Bhatti Vikramarka accused the BRS and BJP of a \"secret pact\" to weaken the Singareni Collieries Company Limited (SCCL) to benefit private entities. He claimed the previous government prevented SCCL from participating in coal block auctions. Meanwhile, Union Minister G. Kishan Reddy sought an inquiry into alleged missing coal valued at ₹1,600 crore.", "category": "Politics", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127094", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127094"}], "article_id": "85709dec"}, {"headline": "Two AIIMS Bhopal nurses booked for administering toxic chemical to child", "summary": "Police in Bhopal booked two nurses for gross negligence after a three-year-old cancer patient died from a toxic chemical injection. An internal AIIMS inquiry found that formalin or formaldehyde was mistakenly administered instead of medication. Both nurses have been suspended. The FIR follows a forensic analysis of the IV bottle used during the incident in December 2025.", "category": "Health", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/127094", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127094"}], "article_id": "7597fc46"}, {"headline": "Kerala Devaswom special government pleader resigns following gold theft row", "summary": "Special government pleader K.B. Pradeep resigned on Saturday following a political controversy over his appointment. Opponents alleged he previously represented a firm implicated in the Sabarimala gold theft case. While Pradeep denied the allegations, he stepped down to avoid embarrassing the government. The SIT is currently investigating the transfer of gold-clad plates at the temple.", "category": "Law", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/127094", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127094"}], "article_id": "782a7ee2"}, {"headline": "BJP leaders visit family of Indian seafarer killed in Oman coast attack", "summary": "BJP leaders met the family of Shivanand Chaurasia, one of three Indian crew members killed in an attack on a merchant vessel off the Oman coast. Acting on directions from CM Yogi Adityanath, officials offered condolences and assured support. Chaurasia, who worked as an engine fitter, is survived by his wife and two children. His body was recovered on June 11.", "category": "India", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/127094", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127094"}], "article_id": "0d9e324a"}, {"headline": "Zojila Tunnel achieves breakthrough as world's longest high-altitude single-tube tunnel", "summary": "The 13.14-km Zojila Tunnel achieved a construction breakthrough on June 9, 2026. Built at a cost of ₹6,800 crore, the tunnel will provide all-weather connectivity between Kashmir and Ladakh at an altitude of 11,578 feet. It significantly enhances India's strategic logistics near the borders with China and Pakistan and is expected to be operational for civilian traffic by 2028.", "category": "Infrastructure", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127094", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127094"}], "article_id": "31704824"}, {"headline": "Family of Indian mariner killed in Oman face complex insurance battle", "summary": "The family of chief engineer Patnala Suresh, killed in a strike on the tanker MT Settebello, faces a legal struggle for compensation. Navigating international maritime law and Protection & Indemnity (P&I) insurance is complicated by the vessel's links to U.S. sanctions. Experts advise the family to secure the original crew agreement and route claims through the DG of Shipping.", "category": "India", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/127094", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/127094"}], "article_id": "5e2ddcde"}, {"headline": "Bangladesh Jamaat-e-Islami chief seeks clarity on Indian diplomat's remarks", "summary": "Bangladesh Jamaat-e-Islami chief Shafiqur Rahman called for clarity on remarks by India’s High Commissioner-designate Dinesh Trivedi. Trivedi suggested India and Bangladesh should \"become one\" in their efforts. Rahman asserted that while the countries are close partners, they remain independent nations, and the phrase could cause public confusion if not explained.", "category": "World", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127094", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/127094"}], "article_id": "c1ac34ac"}, {"headline": "West Bengal Police search residence of Trinamool general secretary Abhishek Banerjee", "summary": "West Bengal Police conducted a search at the Kalighat residence of Trinamool leader Abhishek Banerjee early Saturday morning. Officials were reportedly looking for his personal assistant, Sumit Roy, in connection with a financial embezzlement case. Banerjee and CM Mamata Banerjee condemned the move as harassment. The search follows multiple summons for Banerjee in other cases.", "category": "Politics", "page": 8, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127094", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/127094"}], "article_id": "758d4f00"}, {"headline": "Senior Trinamool MP Sudip Bandyopadhyay meets BJP leader amid defection speculation", "summary": "Speculation is rife that six-time Trinamool MP Sudip Bandyopadhyay may join a rebel faction after meeting Union Minister Bhupendra Yadav. Accompanied by MP Satabdi Roy, Bandyopadhyay's move could increase the rebel camp's strength to 20 MPs. Loyalists of Mamata Banerjee responded with sharp criticism, calling him a political liability who rose through opportunistic alliances.", "category": "Politics", "page": 8, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127094", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/127094"}], "article_id": "fc308d0b"}, {"headline": "ED searches properties of Trinamool MLA Madan Mitra in recruitment scam", "summary": "The Enforcement Directorate searched at least six properties linked to Trinamool MLA Madan Mitra regarding an alleged gold-for-jobs scam. Allegations suggest Mitra accepted bribes for municipal postings. Meanwhile, Trinamool leader Aroop Biswas received a third police summons regarding a 2025 Lionel Messi event fiasco that led to chaotic vandalism and extortion allegations.", "category": "Politics", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127094", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/127094"}], "article_id": "44c79a30"}, {"headline": "Centre allocates ₹10 crore in rice for refugees sheltered in Mizoram", "summary": "The Union government will provide rice worth ₹10 crore to support approximately 40,000 refugees and displaced persons in Mizoram. The decision follows a request from CM Lalduhoma to Home Minister Amit Shah. Mizoram currently hosts thousands of nationals from Myanmar and Bangladesh, as well as internally displaced persons from Manipur fleeing ethnic violence.", "category": "India", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127094", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/127094"}], "article_id": "8b6ab29d"}, {"headline": "Defence Minister Rajnath Singh commissions first batch of women officers from NDA", "summary": "Defence Minister Rajnath Singh commissioned the first batch of women officers from the National Defence Academy into the Indian Air Force. During the graduation parade at Dundigal, Singh stated that increased women's participation makes the force more balanced and robust. A total of 37 women were commissioned in this historic batch across various flying and ground duty branches.", "category": "India", "page": 9, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127094", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/127094"}], "article_id": "41e271e5"}, {"headline": "Anomaly in PSLV rocket resolved as ISRO prepares for next launch", "summary": "Union Minister Jitendra Singh announced that the technical anomaly in the Polar Satellite Launch Vehicle (PSLV) has been detected and resolved by an expert committee. Recent setbacks in the PSLV-C62 and PSLV-C61 missions were linked to third-stage issues. ISRO Chairman V. Narayanan confirmed that the next launch is scheduled for next month following the resolution of these errors.", "category": "Technology", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127094", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/127094"}], "article_id": "6d803ccd"}, {"headline": "President Murmu reviews passing-out parade at Indian Military Academy Dehradun", "summary": "President Droupadi Murmu reviewed the passing-out parade of the 158th Regular Course and 141st Technical Graduate Course at the IMA. She described the induction of women cadets as a watershed moment for India’s journey toward women-led development. The batch included nine women cadets. Murmu congratulated the officers on completing their rigorous military training programs.", "category": "India", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127094", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/127094"}], "article_id": "a8706427"}, {"headline": "Displaced Kashmiri Pandits tour Valley in push for reconciliation and return", "summary": "Around 100 displaced Kashmiri Pandits visited heritage sites in the Valley in an initiative to explore returning home. Lieutenant-Governor Manoj Sinha called the visit the \"truest victory\" against terrorism. Organizers of the 'Pragaash' initiative stated that declining militant attacks have reduced the fear factor, allowing Pandits to reconnect with their ancestry and heritage.", "category": "India", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127094", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/127094"}], "article_id": "9961ce55"}, {"headline": "Scientists study African grey foam-nest tree frogs' communal nesting behavior", "summary": "Researchers have discovered that African grey foam-nest tree frogs build larger, moister nests when they work in groups. By churning secretions into a foam, the frogs protect their eggs from drying out. DNA testing revealed that multiple males participate in building a single nest to ensure higher offspring survival rates, a cooperative strategy that overcomes harsh environments.", "category": "Science", "page": 11, "importance": 3, "telegram_url": "https://t.me/c/1877410077/127094", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/127094"}], "article_id": "bca77917"}, {"headline": "Caltech study finds drought stress accelerates antibiotic resistance in soil", "summary": "A study from the California Institute of Technology revealed that drought increases the concentration of natural antibiotics in soil, favoring resistant bacteria. Projections suggest several parts of India will face severe antibiotic resistance by 2050 due to climate-driven environmental changes. This phenomenon allows genetic resistance to transfer from soil to human pathogens.", "category": "Science", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127094", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/127094"}], "article_id": "cfadb465"}, {"headline": "Research highlights how ant colonies use social distancing to fight epidemics", "summary": "A study of black garden ants shows that colonies adapt their social structures and nest architecture during disease outbreaks. Infected ants self-isolate, and the colony digs more segregated chambers to protect high-value members like the queen. These collective measures, including antimicrobial secretions, effectively limit the spread of pathogens within the social group.", "category": "Science", "page": 11, "importance": 3, "telegram_url": "https://t.me/c/1877410077/127094", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/127094"}], "article_id": "30c10e86"}, {"headline": "UAE reportedly agrees to release ten billion dollars in frozen Iranian funds", "summary": "Sources claim the UAE has agreed to unlock $10 billion for Iran to halt Iranian attacks on the Gulf state. While the UAE officially denied the reports, diplomatic circles suggest a first tranche of $3 billion has already been made available. The move coincides with broader negotiations between Tehran and Washington to end their conflict and lift economic blockades.", "category": "World", "page": 14, "importance": 9, "telegram_url": "https://t.me/c/1877410077/127094", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/127094"}], "article_id": "834a969b"}, {"headline": "Lebanese Army withdraws from southern village following Israeli military advance", "summary": "The Lebanese Army withdrew its troops from the Kfar Tebnit barracks after Israeli forces advanced into the area on Saturday. The move occurred amid Israeli airstrikes near Nabatiyeh that killed multiple people, including a local official. Israeli forces are reportedly attempting to capture the strategic Ali Taher hill, which they previously held for 18 years until 2000.", "category": "World", "page": 14, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127094", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/127094"}], "article_id": "27904969"}, {"headline": "United States thrashes Paraguay in World Cup opener in Los Angeles", "summary": "The United States began its World Cup campaign with a dominant 4-1 victory over Paraguay. Folarin Balogun scored twice, while Gio Reyna added a late goal to secure the win. An early own goal by Paraguay set the tone for a one-sided match. The result puts the co-host in a strong position to advance from Group D, which also includes Australia and Turkiye.", "category": "Sports", "page": 15, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127094", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/127094"}], "article_id": "d9624f4f"}, {"headline": "Modi and Macron to Inaugurate Bharat Innovates Tech Showcase", "summary": "Prime Minister Narendra Modi and French President Emmanuel Macron will inaugurate Bharat Innovates, a three-day global deep tech showcase in Nice. The event aims to help Indian startups attract international partnerships and funding. This marks the start of Modi's two-nation European tour, which also includes a visit to Slovakia and attendance at the G7 Summit in Italy.", "category": "Business", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/127127", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_14-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127127"}], "article_id": "56398d04"}, {"headline": "Jaishankar Protests Killing of Indian Sailors to US Senator Marco Rubio", "summary": "External Affairs Minister S. Jaishankar spoke with US Senator Marco Rubio to protest the killing of three Indian sailors by the US military off the coast of Oman. The incident occurred during strikes aimed at blocking the Hormuz Strait. Jaishankar emphasized that the killing of civilians cannot be justified, while the US maintains the strikes were necessary against Iranian threats.", "category": "World", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/127127", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_14-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127127"}], "article_id": "3c5424f8"}, {"headline": "Indian Staffing Firms Expand Global Recruitment for Skilled Talent", "summary": "Indian staffing firms are increasing their international presence to address global talent shortages in sectors like AI, healthcare, and infrastructure. Companies like TeamLease, Quess, and Randstad are expanding into markets including Southeast Asia, West Asia, the US, and Europe. This shift follows the rapid growth of Global Capability Centres (GCCs) requiring specialized cross-border talent.", "category": "Business", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127127", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_14-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127127"}], "article_id": "2211f4b2"}, {"headline": "Alang Shipbreaking Yard Hits Record Low as Vessel Arrivals Plunge", "summary": "The Alang shipbreaking yard in Gujarat is facing a severe crisis with monthly vessel arrivals hitting an all-time low. Disruptions in the Red Sea and high freight rates have led shipowners to keep older vessels in service longer rather than scrapping them. Only one ship reached Alang in May, threatening the survival of the ₹10,000-crore industry and its 15,000-strong workforce.", "category": "Infrastructure", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127127", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_14-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127127"}], "article_id": "5ea87802"}, {"headline": "Rahul Gandhi to Address Student Protests Over National Paper Leaks", "summary": "Congress leader Rahul Gandhi is set to address four student meetings in different cities to protest against recent examination paper leaks and demand the resignation of the Union Education Minister. The party's 'Satyagraha' campaign aims to highlight the grievances of millions of students affected by repeated leaks in recruitment and education entrance exams.", "category": "Politics", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127127", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_14-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127127"}], "article_id": "1fd1b5eb"}, {"headline": "Assam Tightens Aadhaar Rules to Curb Illegal Infiltration", "summary": "Assam Chief Minister Himanta Biswa Sarma announced that new Aadhaar cards will not be issued to individuals above 18 years of age without a stringent verification process. Applicants must obtain permission from the district commissioner to ensure they are not illegal immigrants. The measure follows reports of Aadhaar being used by non-citizens to establish residency.", "category": "Politics", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127127", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_14-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127127"}], "article_id": "64e38159"}, {"headline": "Supreme Court Clears Way for Delayed Noida Sports City Projects", "summary": "The Supreme Court has granted permission for construction to resume at the long-delayed Noida Sports City projects. The decision allows for the development of up to 20 million square feet of real estate across various sectors in Noida. Several developers, including the Bhutani Group and Gaurs Group, have planned large-scale residential and recreational facilities for the sites.", "category": "Infrastructure", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127127", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_14-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/127127"}], "article_id": "e1b9e90a"}, {"headline": "Ebola Outbreak Fears Deter Indian Travelers from East African Destinations", "summary": "An Ebola outbreak in parts of East and Central Africa is causing Indian travelers to cancel or postpone summer holiday plans to the region. Travel agencies report an 8-12% increase in cancellations and a significant drop in new inquiries for destinations like Kenya, Rwanda, and Tanzania. Health officials are monitoring the situation as anxiety levels rise among tourists.", "category": "Health", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127127", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_14-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/127127"}], "article_id": "fb18ee67"}, {"headline": "Adani Green to Commission Major Energy Storage Project in Gujarat", "summary": "Adani Green Energy is set to commission a 14 GWh battery energy storage system at Khavda, Gujarat, by the end of this fiscal year. The project, part of a larger 30 GW renewable energy hub, aims to reduce wastage of clean energy and stabilize the power grid. It is currently one of the world's largest planned storage facilities for renewable power.", "category": "Infrastructure", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127127", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_14-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/127127"}], "article_id": "f649ed08"}, {"headline": "Sebi Developing AI Framework to Enhance Capital Market Efficiency", "summary": "The Securities and Exchange Board of India (Sebi) is working on a comprehensive framework for the use of Artificial Intelligence in capital markets. The guidelines will focus on risk management, cybersecurity, and investor protection, while encouraging the use of AI for surveillance and sentiment analysis. Sebi aims to balance innovation with market integrity and accountability.", "category": "Business", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127127", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_14-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/127127"}], "article_id": "bf0ec06f"}, {"headline": "Eli Lilly's Alzheimer Drug Faces Adoption Challenges in India", "summary": "The launch of Eli Lilly's amyloid-drug Donanemab for Alzheimer's is expected to see limited initial adoption in India due to high costs and diagnostic requirements. Treatment could cost ₹16-18 lakh over 18 months, requiring specialized PET scans or MRI monitoring. Experts suggest that while the drug is a breakthrough, its real-world impact may be limited by late-stage diagnoses.", "category": "Health", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127127", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_14-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/127127"}], "article_id": "c9d29a1c"}, {"headline": "Indian Space Startups Collaborate with Armed Forces on Defense Tech", "summary": "A growing number of Indian space startups, including Pixxel and GalaxEye Space, are collaborating with the armed forces under the Innovations for Defence Excellence (iDEX) scheme. These startups are developing dual-use technologies like hyperspectral satellites and multi-sensor fusion for defense applications, signaling a shift in how private firms influence national security strategy.", "category": "Technology", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127127", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_14-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127127"}], "article_id": "5fceefcb"}, {"headline": "Nagaland Coffee Sector Grows with New Brands and Global Exports", "summary": "Nagaland is witnessing a resurgence in coffee cultivation, with the area under production reaching nearly 11,800 hectares. Local brands like Nagaland Coffee are exporting specialty beans to international markets, including the UAE and Europe. The state government is promoting coffee as a sustainable alternative to traditional jhum cultivation, aiming for global recognition.", "category": "Economy", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/127127", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_14-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/127127"}], "article_id": "0bed4eeb"}, {"headline": "Funeral Rites for Iran's Ayatollah Khamenei to Begin on July 4", "summary": "Funeral ceremonies for Iran's Supreme Leader Ayatollah Ali Khamenei will begin in Tehran on July 4, concluding with his burial in Mashhad on July 9. The 86-year-old leader had led the Islamic Republic since 1989. The announcement follows a period of mourning after his death, which occurred as regional tensions remain high following recent military strikes.", "category": "World", "page": 7, "importance": 9, "telegram_url": "https://t.me/c/1877410077/127127", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_14-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/127127"}], "article_id": "94ab8ab4"}, {"headline": "India Lacks Supertall Buildings Despite Rapid Urbanization and Economic Growth", "summary": "India has only one building exceeding the 300-meter 'supertall' mark, despite a booming real estate sector. Regulatory bottlenecks, fragmented infrastructure, and high construction costs are cited as primary reasons. While cities like Mumbai and Kolkata have ambitious vertical projects in the pipeline, experts debate whether supertalls are necessary versus decentralized urban growth.", "category": "Infrastructure", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127127", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_14-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/127127"}], "article_id": "4ba6823c"}, {"headline": "PV Sindhu and Satwik-Chirag to Lead India's Asian Games Squad", "summary": "Olympic medalist PV Sindhu and the world-ranked doubles pair Satwiksairaj Rankireddy and Chirag Shetty will lead India's badminton squad at the upcoming Asian Games in Aichi-Nagoya. The Badminton Association of India announced a 20-member team, including Lakshya Sen and HS Prannoy, aiming for multiple podium finishes in both individual and team events.", "category": "Sports", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127127", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_14-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/127127"}], "article_id": "0d1bfe48"}, {"headline": "India Defeats Afghanistan by 7 Wickets in Rain-hit T20 Opener", "summary": "India secured a 7-wicket victory over Afghanistan in a rain-shortened T20 match in Dhaka. Chasing a target of 115 runs in 15 overs, India reached the total with 13 balls to spare, led by KL Rahul's unbeaten 39. Earlier, Shubman Gill provided a strong start with a quick-fire 47. The win gives India a 1-0 lead in the three-match series.", "category": "Sports", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127127", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_14-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/127127"}], "article_id": "29586a44"}, {"headline": "Isro develops tech to extend lunar lander life to 200 days", "summary": "Isro Chairman V Narayanan announced the development of technology to extend the operational life of future lunar landers from 14 days to 200 days. The research, in collaboration with the Department of Atomic Energy, focuses on advanced artificial heating systems to survive the harsh lunar night temperatures through nuclear technology.", "category": "Science", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127174", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI Bengaluru+Times 14-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127174"}], "article_id": "85c9d87c"}, {"headline": "University student discovers two prehistoric sites in Tamil Nadu", "summary": "Umamaheswari G, a postgraduate archaeology student from the University of Madras, found two prehistoric sites in Coimbatore. Discoveries at Chinnamalai and Senjerimalai include a rock shelter with red ochre geometric paintings and microlithic tools like borers and scrapers. The sites carry documented medieval history alongside prehistoric art.", "category": "Science", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/127174", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI Bengaluru+Times 14-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127174"}], "article_id": "d97acb4e"}, {"headline": "Elon Musk pro-natalism and the debate over sperm donation", "summary": "Elon Musk's advocacy for pro-natalism has sparked debate regarding sperm donation and genetic inheritance. While Musk believes smart individuals should procreate more, scientific studies suggest intelligence is primarily inherited from mothers. Jurisdictions like the UK and California allow donor identity disclosure, unlike India's anonymous guidelines.", "category": "Health", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/127174", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI Bengaluru+Times 14-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127174"}], "article_id": "c104dd19"}, {"headline": "Nitin Gadkari clears path for 100% ethanol-powered vehicles", "summary": "Union Road Transport Minister Nitin Gadkari has signed the file approving rules for legal sanction to 100% ethanol-powered vehicles. He announced that major automobile firms would soon launch ethanol versions of popular models. The government has also declared a Rs 10,000 crore package to stabilize sustainable aviation fuel prices.", "category": "Infrastructure", "page": 5, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127174", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI Bengaluru+Times 14-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/127174"}], "article_id": "adeac05c"}, {"headline": "FSSAI bans metallic pins and wires in food packaging", "summary": "The Food Safety and Standards Authority of India (FSSAI) has ordered an immediate halt to the use of metallic pins and wires in food products and packaging. The ban follows an incident where a toddler swallowed metal wires hidden in decorative cake toppers. Businesses must adopt safer alternatives like heat-sealed packaging.", "category": "Health", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127174", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI Bengaluru+Times 14-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/127174"}], "article_id": "1f465022"}, {"headline": "Three-year-old boy becomes youngest paediatric organ donor in Pune", "summary": "A three-year-old boy declared brain-dead after a fall from his home became Pune’s youngest paediatric organ donor. His kidneys and liver were donated to two paediatric patients, while his corneas restored sight to two others. The Zonal Transplant Coordination Committee described the family's decision as rare and courageous.", "category": "Health", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127174", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI Bengaluru+Times 14-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/127174"}], "article_id": "600aedef"}, {"headline": "Karnataka Deputy CM rolls out bribe reporting hotline", "summary": "Karnataka Deputy CM DK Shivakumar announced a direct public reporting system to curb bribery in government offices. Every taluk and district office will display boards with phone numbers where citizens can report demands for bribes. COMPLAINTS will be scrutinised before action is taken to make the state corruption-free.", "category": "Politics", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127174", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI Bengaluru+Times 14-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/127174"}], "article_id": "0a9b1716"}, {"headline": "First package of Bengaluru Business Corridor project awarded", "summary": "The Bengaluru Business Corridor project has moved closer to execution with the awarding of a 21-km package to Shankaranarayana Constructions. The Rs 3,253 crore contract covers the stretch from Madavara to Ballari Road, providing a key link to the international airport. Construction is likely to start within three months.", "category": "Infrastructure", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127174", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI Bengaluru+Times 14-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/127174"}], "article_id": "0f7a0b46"}, {"headline": "Mud wall saved lone survivor of Air India flight 171 crash", "summary": "An internal assessment revealed how British national Viswashkumar Ramesh survived the Air India flight 171 crash in Ahmedabad that killed 241 people. Ramesh was ejected from the aircraft and landed 50ft away near a mud embankment that shielded him from a fireball. The 10ft mud wall was created by nearby construction work.", "category": "India", "page": 5, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127174", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI Bengaluru+Times 14-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/127174"}], "article_id": "b3fd9e79"}, {"headline": "Car dealer and friend killed in Mercedes SUV crash", "summary": "A 30-year-old car dealer and his 23-year-old companion died after their Mercedes-Benz SUV crashed into a divider on the Satellite Town Ring Road near Hoskote. The driver was thrown out of the vehicle into a water-filled area, while the passenger died on the spot. Police suspect speeding and reckless driving as primary causes.", "category": "India", "page": 5, "importance": 3, "telegram_url": "https://t.me/c/1877410077/127174", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI Bengaluru+Times 14-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/127174"}], "article_id": "2941c29e"}, {"headline": "Loose fiber cable causes severe scooter accident in Bengaluru", "summary": "A 46-year-old woman, Shaziya, suffered four fractures in her ankle after a loose optical fiber cable snagged her scooter’s handlebar in Kalyan Nagar. The incident occurred while she was riding home with her daughter. The fall required a major surgery with 13 screws. The case highlights the growing danger of abandoned telecom cables.", "category": "Infrastructure", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/127174", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI Bengaluru+Times 14-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/127174"}], "article_id": "320c240f"}, {"headline": "CET counseling deferred again due to seat matrix delays", "summary": "Counseling for Common Entrance Test (CET) aspirants has been postponed as the Karnataka Examinations Authority awaits seat matrices for various courses. The delay stems from pending government approval for engineering seat allotments. KEA has released verification slips, but the option-entry process remains closed until the matrix is received.", "category": "Education", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127174", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI Bengaluru+Times 14-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/127174"}], "article_id": "9fe8e26b"}, {"headline": "Political row over Bengaluru's Rs 39,437-crore garbage tender", "summary": "Opposition leader R Ashoka has alleged irregularities and kickbacks in a massive 30-year solid waste management tender for Bengaluru. The contract was awarded to MSW Solutions Ltd at rates allegedly 19% above estimates. Deputy CM DK Shivakumar countered the claims, accusing Ashoka of operating on behalf of the 'garbage mafia.'", "category": "Politics", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127174", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI Bengaluru+Times 14-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/127174"}], "article_id": "95c13c3d"}, {"headline": "Police serve notice to Ricky Rai over Lamborghini stunt video", "summary": "Devanahalli traffic police issued a notice to Ricky Rai, son of late underworld operator Muthappa Rai, following a viral video of a Lamborghini performing dangerous stunts. The vehicle was allegedly driven at high speeds with flames emitting from the exhaust on the international airport road. Rai has been asked to appear and submit an explanation.", "category": "Law", "page": 6, "importance": 3, "telegram_url": "https://t.me/c/1877410077/127174", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI Bengaluru+Times 14-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/127174"}], "article_id": "86ca9b43"}, {"headline": "New animal arrivals boost conservation efforts at Bannerughatta Park", "summary": "Bannerughatta Biological Park announced the birth of a zebra foal and a hippopotamus calf, alongside the successful acclimatization of four cheetahs from South Africa. The cheetahs have completed their mandatory quarantine and are now available for public viewing. The births reflect sustained efforts to maintain genetically viable captive populations.", "category": "Environment", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/127174", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI Ben e/c/1877410077/127174"}], "article_id": "b1b650e7"}, {"headline": "SEBI considers AI guidelines for Indian capital markets", "summary": "SEBI Chairman Tuhin Kanta Pandey announced that the regulator is working on a framework for the responsible adoption of artificial intelligence in capital markets. The guidelines will emphasize a 'Human-in-the-Loop' approach to ensure critical decisions involve human supervision. SEBI also noted the resilience of Indian markets despite global challenges.", "category": "Business", "page": 14, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127174", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI Bengaluru+Times 14-06-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/127174"}], "article_id": "cd6390e3"}, {"headline": "Uddhav Thackeray summons MPs amid split speculation", "summary": "Shiv Sena (UBT) chief Uddhav Thackeray called all his party MPs to Mumbai amid rumors that two-thirds of them may join the Eknath Shinde-led faction. A legal split would require at least 6 of the 9 MPs to cross over. The summons follows some MPs skipping recent party meetings, raising concerns about internal stability.", "category": "Politics", "page": 14, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127174", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI Bengaluru+Times 14-06-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/127174"}], "article_id": "88f75049"}, {"headline": "India tests interceptor missiles for multi-layered defense system", "summary": "DRDO successfully flight-tested advanced interceptor missiles designed for Intermediate-Range Ballistic Missile defense. The tests put India in an elite group of nations capable of intercepting intercontinental ballistic missiles. The systems can destroy hostile aircraft and missiles both within and outside the Earth's atmosphere.", "category": "Science", "page": 16, "importance": 9, "telegram_url": "https://t.m ents. He also visited the Royal Academy of Performing Arts to support cultural preservation efforts.", "category": "Culture", "page": 34, "importance": 5, "telegram_url": "https://t.me/c/1877410077/127174", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI Bengaluru+Times 14-06-2026.pdf", "page": 34, "telegram_url": "https://t.me/c/1877410077/127174"}], "article_id": "f8dde1cd"}, {"headline": "US Suspends Access to Anthropic’s Fable 5 and Mythos 5 AI Models", "summary": "The US government ordered Anthropic to suspend foreign access to its Fable 5 and Mythos 5 AI models citing national security. The move affects Indian organizations using advanced coding capabilities under Project Glasswing. In response, Indian experts like Zoho’s Sridhar Vembu have called for a ₹50,000 crore sovereign AI fund and a national mission to reduce reliance on foreign technology.", "category": "Technology", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_14-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127120"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/127094"}, {"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_14-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127127"}, {"newspaper": "Times of India", "pdf_filename": "TOI Bengaluru+Times 14-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/127174"}], "importance": 10, "article_id": "bf276858"}, {"headline": "TN Regulator Warns Tata Electronics Over Groundwater Contamination at iPhone Plant", "summary": "The Tamil Nadu Pollution Control Board has warned Tata Electronics of a potential shutdown at its Hosur plant, which makes iPhone components, for allegedly contaminating groundwater. Inspections between December 2025 and May 2026 found wastewater discharged into rainwater harvesting ponds and agricultural wells. Tata Electronics maintains it is in ange, enhancing all-weather naval coverage.", "category": "Science", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_14-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/127120"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/127094"}], "importance": 9, "article_id": "df6c137c"}, {"headline": "Lt Gen Dhiraj Seth Appointed as India’s Next Chief of Army Staff", "summary": "Lieutenant General Dhiraj Seth will succeed General Upendra Dwivedi as the Chief of Army Staff on June 30. Commissioned into the Armoured Corps in 1986, Seth is currently the Vice-Chief and formerly the Southern Army Commander. He will be the first officer from the cavalry to lead the Army in over two decades, focusing on structural reforms, modernization, and the 'Make in India' initiative.", "category": "India", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_14-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/127120"}, {"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁴⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127142"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/127094"}, {"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_14-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127127"}], "importance": 8, "article_id": "401494f4"}, {"headline": "Amit Shah Expands Demographic Change Study to Metropolitan and Industrial Areas", "summary": "Home Minister Amit Shah has directed a high-level committee, led by retired Justice Prakash Naolekar, to expand its study on demographic shifts beyond border areas to include metropolitan cities and industrial towns. The panel is investigating population changes caused by illegal immigration and \"unnatural causes\" to recommend institutional mechanisms for tine sortie.", "category": "India", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_14-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/127120"}, {"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁴⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127142"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127094"}, {"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_14-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127127"}, {"newspaper": "Times of India", "pdf_filename": "TOI Bengaluru+Times 14-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/127174"}], "importance": 10, "article_id": "aff9b1f6"}, {"headline": "Umar Khalid and Sharjeel Imam File Fresh Bail Pleas in Delhi Riots", "summary": "Umar Khalid and Sharjeel Imam have moved a Delhi court for bail in the 2020 riots \"larger conspiracy\" case, with a hearing scheduled for July 4. Their pleas cite a recent Supreme Court precedent and argue that trial progress has been minimal despite nearly six years of incarceration and delays in framing charges. The court has issued a notice to the police regarding these fresh applications.", "category": "Law", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁴⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127142"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/127094"}], "importance": 7, "article_id": "300c4fb7"}, {"headline": "Uttar Pradesh Forms SIT to Probe Alleged Embezzlement of Ram Temple Donations", "summary": "The Uttar Pradesh government has formed a three-member Special Investigation Team (SIT) to investigate allegations of missing donations and embezzlement at the Ram temple in Ayodhya. Led by the Lucknow Divisional Commissioner, the SIT will scrutinize cash handling and internal controls. The probe, requested by the Temple Trust, follows concerns raised by political leaders.", "category": "Politics", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁴⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127142"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127094"}, {"newspaper": "Times of India", "pdf_filename": "TOI Bengaluru+Times 14-06-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/127174"}], "importance": 8, "article_id": "844dd362"}, {"headline": "Pinarayi Vijayan Accuses Rahul Gandhi of Weakening INDIA Bloc and Aiding BJP", "summary": "Kerala Chief Minister Pinarayi Vijayan has criticized Rahul Gandhi, alleging that his political strategy is weakening the opposition's INDIA bloc and indirectly assisting the BJP. Vijayan suggested Gandhi's refusal to align with the Kerala government is counterproductive to national unity. He noted that other alliance leaders have also expressed concerns regarding the Congress leadership.", "category": "Politics", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁴⁰⁶²⁰²⁶.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127142"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/127094"}], "importance": 7, "article_id": "11cdec83"}, {"headline": "Police Search TMC Leader Abhishek Banerjee’s Residence in Recruitment and Extortion Probe", "summary": "West Bengal police searched the residence of TMC leader Abhishek Banerjee and his personal assistant, Sumit Roy. The raids are linked to an alleged recruitment scam and an extortion case involving an absconding suspect. While the TMC condemned the action as a \"political vendetta,\" the search occurred amidst internal party friction and rumors of leaders defecting to the BJP.", "category": "Politics", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁴⁰⁶²⁰²⁶.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/127142"}, {"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_14-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127127"}], "importance": 8, "article_id": "d540176e"}, {"headline": "KEM Hospital Student Placed on Leave Over Offensive Social Media Remarks", "summary": "Mumbai’s KEM Hospital has sent third-year MBBS student Sejal Pawar on 15 days of compulsory leave after she made objectionable remarks about cadavers during a comedy show. A five-member inquiry committee is investigating the incident, which sparked protests among colleagues. Police have also registered an FIR against Pawar and the comedians for circulating the content on social media.", "category": "Education", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁴⁰⁶²⁰²⁶.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/127142"}, {"newspaper": "Times of India", "pdf_filename": "TOI Bengaluru+Times 14-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127174"}], "importance": 4, "article_id": "8993e238"}, {"headline": "First Batch of Nine Women Officers Graduate From Indian Military Academy", "summary": "Marking a historic milestone, the first batch of nine women officer cadets graduated from the Indian Military Academy in Dehradun. President Droupadi Murmu reviewed the parade, hailing the event as a watershed moment for gender equality in the armed forces. The 93-year-old academy opened its doors to women in 2022, and these graduates will now join various arms of the Indian Army.", "category": "India", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁴⁰⁶²⁰²⁶.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127142"}, {"newspaper": "Times of India", "pdf_filename": "TOI Bengaluru+Times 14-06-2026.pdf", "page": 5, "telegram_u sit to Strengthen Ties With France", "summary": "Prime Minister Narendra Modi arrived in Nice to begin a six-day tour of France and Slovakia. He is scheduled to meet President Emmanuel Macron for bilateral talks on defense and trade before attending the G7 Summit in Évian-les-Bains as an outreach partner. Modi will also inaugurate the Bharat Innovates 2026 summit and participate in the VivaTech event in Paris.", "category": "Politics", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/127094"}, {"newspaper": "Times of India", "pdf_filename": "TOI Bengaluru+Times 14-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/127174"}], "importance": 9, "article_id": "3bacd9ff"}, {"headline": "India Faces Pakistan in High-Octane Women’s T20 World Cup Opener", "summary": "India will launch its Women’s T20 World Cup campaign against Pakistan at Edgbaston, entering as the favorite with a 13-3 head-to-head record. While India relies on the explosive opening pair of Smriti Mandhana and Shafali Verma, Pakistan’s hopes rest on their world-class spinners. Pakistan captain Fatima Sana faces a potential injury scare ahead of the high-profile clash.", "category": "Sports", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 14-06-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/127094"}, {"newspaper": "Times of India", "pdf_filename": "TOI Bengaluru+Times 14-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/127174"}], "importance": 9, "article_id": "a3cda53b"}, {"headline": "High Gold Prices Drive Owners to Melt Down Vintage Luxury Watches", "summary": "Record-high gold prices are prompting owners to melt down vintage luxury gold watches, as their scrap metal value now frequently exceeds their resale value as timepieces. Dealers report that classic 18-karat gold models from brands like Rolex, Omega, and Patek Philippe are being destroyed       card.dataset.articleId = art.article_id;
      vTrack.appendChild(card);
    });
    
    panels.push({pRow,vFeed,vTrack,articles:arts,artIdx:0});
    buildPRow(ci);
  });
  
  hTrack.style.transition='none';
  hTrack.style.transform='translateX(0)';
  syncV(0,false);
  
  // Apply deep link after build — 200ms ensures card heights are measured
  if (deepLinkTarget) {
    setTimeout(() => applyDeepLink(deepLinkTarget), 200);
  }
}

function buildCard(art,h,m,cat,articleIndex) {
  const src=art.sources?.[0];
  // Direct PDF link with #page=N - respected by all modern browser PDF viewers
  // when the file is opened via a link click (Chrome, Firefox, Safari, Edge).
  // Falls back to the Telegram source URL if no PDF is available.
  const href = src?.pdf_filename
    ? ('pdfs/' + src.pdf_filename + '#page=' + (src.page || 1))
    : (src?.telegram_url || '#');
  const card=document.createElement('div');
  card.className='card';
  card.dataset.articleId = art.article_id;
  card.style.height=h+'px';
  card.style.setProperty('--cc',m.color);
  card.innerHTML=`
    <div class="card-content">
      <div class="card-toprow">
        <div class="cat-pill">
          <div class="pill-icon"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="1" y="1" width="8" height="2" rx="0.6" fill="#888"/><rect x="1" y="4.5" width="5" height="1.5" rx="0.6" fill="#666"/><rect x="1" y="7" width="6" height="1.5" rx="0.6" fill="#666"/></svg></div>
          ${cat.toUpperCase()}
        </div>
        <div class="card-date">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="2.5" width="11" height="9.5" rx="1.8" stroke="#555" stroke-width="1.2"/><path d="M4.5 1v3M8.5 1v3" stroke="#555" stroke-width="1.2" stroke-linecap="round"/><path d="M1 6h11" stroke="#555" stroke-width="1.2"/></svg>
          ${DIGEST.date}
        </div>
      </div>
      <div class="card-headline">${art.headline}</div>
      <div class="card-summary">${art.summary}</div>
      <div class="card-divider"></div>
      <div class="card-footer">
        ${src?`<a class="src-chip" href="${href}" target="_blank" onclick="event.stopPropagation()">${src.newspaper}<span class="src-chip-sep">&middot;</span><span class="src-chip-pg">Pg ${src.page}</span><span class="src-chip-ext"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M3.5 7.5L7.5 3.5M7.5 3.5H5M7.5 3.5V6" stroke="#555" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></span></a>`:'<div></div>'}
        <div class="info-btn"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6.5" stroke="#444" stroke-width="1.3"/><circle cx="7.5" cy="4.5" r="0.8" fill="#555"/><path d="M7.5 7v4" stroke="#555" stroke-width="1.5" stroke-linecap="round"/></svg></div>
      </div>
    </div>`;
  return card;
}

function buildPRow(ci) {
  const p=panels[ci],ai=p.artIdx;
  p.pRow.innerHTML='';
  p.articles.forEach((_,i)=>{
    const seg=document.createElement('div');
    seg.className='pseg'+(i<ai?' done':i===ai?' active':'');
    p.pRow.appendChild(seg);
  });
}

function syncV(ci,animated) {
  const p=panels[ci],h=p.vFeed.getBoundingClientRect().height;
 p.vTrack.style.transition=animated?'transform 0.35s cubic-bezier(0.4,0,0.2,1)':'none';
  p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;
  buildPRow(ci);
}

function applyDeepLink(target) {
  const ci = sortedCats.findIndex(cat =>
    byCategory[cat].some(art => art.article_id === target.hash)
  );
  if (ci === -1) return;

  // Set catIdx BEFORE calling goCat so the horizontal track lands correctly
  catIdx = ci;
  hTrack.style.transition = 'none';
  hTrack.style.transform = `translateX(${-ci * vpW}px)`;

  const ai = byCategory[sortedCats[ci]].findIndex(art => art.article_id === target.hash);
  if (ai === -1) return;
  panels[ci].artIdx = ai;
  syncV(ci, false);

  const card = document.getElementById('article-' + target.hash);
  if (card) {
    card.classList.add('target-highlight');
    setTimeout(() => card.classList.remove('target-highlight'), 3000);
  }
}

function goArt(d) {
  const p=panels[catIdx];
  const n=Math.max(0,Math.min(p.artIdx+d,p.articles.length-1));
  if(n===p.artIdx&&d!==0)return;
  p.artIdx=n; syncV(catIdx,true); dismiss();
}

function goCat(idx,animated=true) {
  idx=Math.max(0,Math.min(idx,sortedCats.length-1));
  if(idx===catIdx&&animated)return;
  const prev=catIdx; catIdx=idx;
  hTrack.style.transition=animated?'transform 0.38s cubic-bezier(0.4,0,0.2,1)':'none';
  hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;
  if(animated&&idx!==prev) {
    const m=CAT_META[sortedCats[idx]]||{color:"#e8334a",icon:"📰"};
    catFlash.style.background=m.color+'18';
    cfIcon.textContent=m.icon; cfName.textContent=sortedCats[idx]; cfName.style.color=m.color;
    catFlash.classList.add('on'); setTimeout(()=>catFlash.classList.remove('on'),500);
  }
  dismiss();
}

let dismissed=false;
function dismiss() {
  if(dismissed)return; dismissed=true;
  hintUp.classList.remove('visible'); hintRight.classList.remove('visible');
  hintUp.classList.add('gone'); hintRight.classList.add('gone');
}

(function initHints() {
  const KEY='dailyBriefHintSeen';
  if(!localStorage.getItem(KEY)) {
    localStorage.setItem(KEY,'1');
    setTimeout(()=>{ if(!dismissed){ hintUp.classList.add('visible'); hintRight.classList.add('visible'); } },2500);
  }
})();

let tsX=0,tsY=0,tcX=0,tcY=0,axis=null,drag=false;
outer.addEventListener('touchstart',e=>{ tsX=e.touches[0].clientX; tsY=e.touches[0].clientY; tcX=0; tcY=0; axis=null; drag=true; hTrack.style.transition='none'; const p=panels[catIdx]; if(p)p.vTrack.style.transition='none'; },{passive:true});
outer.addEventListener('touchmove',e=>{ if(!drag)return; const dx=e.touches[0].clientX-tsX,dy=e.touches[0].clientY-tsY; tcX=dx; tcY=dy; if(!axis&&(Math.abs(dx)>8||Math.abs(dy)>8))axis=Math.abs(dx)>Math.abs(dy)?'h':'v'; if(!axis)return; e.preventDefault(); if(axis==='h'){ const edge=(catIdx===0&&dx>0)||(catIdx===sortedCats.length-1&&dx<0); hTrack.style.transform=`translateX(${-catIdx*vpW+dx*(edge ? 0.14 : 1)}px)`; }else{ const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height; const edge=(p.artIdx===0&&dy>0)||(p.artIdx===p.articles.length-1&&dy<0); p.vTrack.style.transform=`translateY(${-p.artIdx*h+dy*(edge ? 0.14 : 1)}px)`; } },{passive:false});
outer.addEventListener('touchend',()=>{ if(!drag)return; drag=false; if(axis==='h'){ const t=vpW*.2; if(tcX<-t)goCat(catIdx+1); else if(tcX>t)goCat(catIdx-1); else{hTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;} }else if(axis==='v'){ const t=vpH*.2; if(tcY<-t)goArt(1); else if(tcY>t)goArt(-1); else{const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height;p.vTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;} } axis=null; },{passive:true});
document.addEventListener('keydown',e=>{ if(e.key==='ArrowDown'||e.key===' '){e.preventDefault();goArt(1);} if(e.key==='ArrowUp'){e.preventDefault();goArt(-1);} if(e.key==='ArrowRight'){e.preventDefault();goCat(catIdx+1);} if(e.key==='ArrowLeft'){e.preventDefault();goCat(catIdx-1);} });
let wl=false;
outer.addEventListener('wheel',e=>{ e.preventDefault();if(wl)return;wl=true; Math.abs(e.deltaX)>Math.abs(e.deltaY)?goCat(catIdx+(e.deltaX>0?1:-1)):goArt(e.deltaY>0?1:-1); setTimeout(()=>wl=false,500); },{passive:false});
window.addEventListener('resize',()=>{ vpW=outer.offsetWidth;vpH=outer.offsetHeight; hTrack.style.transition='none'; hTrack.style.transform=`translateX(${-catIdx*vpW}px)`; panels.forEach(p=>{ const h=p.vFeed.getBoundingClientRect().height; p.vTrack.querySelectorAll('.card').forEach(c=>c.style.height=h+'px'); p.vTrack.style.transition='none'; p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`; }); });

buildAll();
</script>
</body>
</html>
