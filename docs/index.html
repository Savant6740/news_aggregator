y Iran. This follows heightened tensions in West Asia and impacts global energy markets.", "category": "World", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117491", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "Trump waives US shipping law to ease pump prices", "summary": "US President Donald Trump temporarily waived the century-old Jones Act for 60 days to lower oil and gas transport costs. This move, his latest bid to combat rising energy prices due to the Iran war, allows foreign-flagged vessels to carry commodities between US ports, potentially saving East Coast motorists 10 cents/gallon.", "category": "World", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117491", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "Gulf Air adds Chennai flights for stranded passengers", "summary": "Gulf Air and Jazeera Airways introduced special flights to India, including Chennai, for passengers stranded in Bahrain and Kuwait due to the West Asia conflict. Gulf Air will operate Dammam-Chennai flights (March 21-28), while Jazeera Airways will fly from Qaisumah (Saudi Arabia) to six Indian cities. Indian Embassies coordinated.", "category": "World", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117491", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "India deploys warships to Gulf of Oman for fuel ship safety", "summary": "India is sending additional warships to the Gulf of Oman and Arabian Sea to ensure safe passage for its vessels. This move anticipates Iran allowing more fuel tankers to exit the Strait of Hormuz amid regional tensions.", "category": "Wo ://t.me/c/1877410077/117443", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_19-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/117443"}]}, {"headline": "Iran’s intelligence chief killed in Israeli strike; Gulf energy facilities threatened", "summary": "Iran’s intelligence minister was killed in an Israeli strike, escalating the US-Israeli war on Iran. The Pars gas field was hit, prompting Iran to warn Gulf neighbours to evacuate energy installations. This major escalation has led to a 5% surge in oil prices to $108/barrel, with Israel authorizing strikes on any senior Iranian official.", "category": "World", "page": 8, "importance": 9, "telegram_url": "https://t.me/c/1877410077/117469", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 19-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117469"}]}, {"headline": "90 ships cross Strait of Hormuz as Iran exports oil despite war", "summary": "Despite the effective closure of the Strait of Hormuz due to the war, about 90 ships, including oil tankers, have crossed the waterway. Iran has managed to export over 16 million barrels of oil since early March. Many were 'dark' transits evading Western sanctions, with China being the biggest buyer of Iranian oil.", "category": "World", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117469", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 19-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117469"}]}, {"headline": "US eases Venezuela oil sanctions to boost supply amid Iran war", "summary": "The US Treasury Department eased sanctions on Venezuela’s state-owned oil company, PDVSA, allowing it to directly sell oil to US companies and on global markets. This shift by the Trump administration aims to boost world oil supplies during the Iran war. Additionally, Jones Act requirements for US port shipments will be waived for 60 days.", "cat wn as labor unions stage protests over wage disputes. The strike is expected to cause significant travel disruptions and highlights ongoing industrial relations challenges.", "category": "World", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117455", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_19-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117455"}]}, {"headline": "Scary Middle Game: Global order at crossroads", "summary": "This opinion piece argues that the global order is at a \"scary middle game\" crossroads, with escalating conflicts and challenges to established norms. It discusses how nations navigate complex geopolitical landscapes, emphasizing the need for strategic recalculations.", "category": "World", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117455", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_19-03-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117455"}]}, {"headline": "War or Peace: Brains of Nations, behavioral science", "summary": "This opinion piece explores how behavioral science can offer insights into why countries choose war or peace. It suggests that understanding national decision-making processes, particularly cognitive biases, can help foster conditions for stability and cooperation.", "category": "World", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117455", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_19-03-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117455"}]}, {"headline": "Nine Family Members Killed in Fire at Delhi’s Palam Colony", "summary": "Nine members of a family, including three children, died in a fire at a residential-cum-commercial building in southwest Delhi. Allegations surfaced that a faulty fire department ladder delayed rescue operations by 90 minutes. Three others were seriously injured, including two who fell during rescue attempts.", "category": "India", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/117498", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 19-03.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117498"}]}, {"headline": "Eight Dead in Indore After EV Charger Sparks House Fire", "summary": "A fire sparked by an electric vehicle charging station killed eight members of a family in Indore. The blaze spread quickly through the two-storey house, detonating commercial LPG cylinders and chemicals stored on-site. Digital door locks reportedly failed after the power supply was cut, trapping victims inside.", "category": "India", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117498", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 19-03.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117498"}]}, {"headline": "One Charred to Death as Fuel Tanker Catches Fire in Rajasthan", "summary": "A driver was killed after an ethanol tanker overturned and burst into flames on National Highway-48 in Rajasthan’s Jalore district. The fire spread across a 200-metre stretch of the highway, disrupting traffic for several hours. Authorities stated a short-circuit or balance loss likely caused the accident.", "category": "India", "page": 1, "importance": 4, "telegram_url": "https://t.me/c/1877410077/117498", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 19-03.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117498"}]}, {"headline": "Russia Shared Intelligence on Ukrainians Arrested by NIA for Myanmar Training", "summary": "Russian authorities reportedly shared information leading to the arrest of six Ukrainians and one US citizen by the NIA. The group is suspected of training ethnic armed groups in Myanmar and importing drones via India. They are currently in NIA custody until March 27, while Ukrainian officials raise concerns over due process and consular access.", "category": "India", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117498", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 19-03.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117498"}]}, {"headline": "Delhi Police Increase Security for Eid Following Clashes in Uttam Nagar", "summary": "Security has been tightened in west Delhi’s Uttam Nagar ahead of Eid following a communal clash during Holi celebrations that resulted in a man's death. Large-scale deployment is planned to prevent further violence after threats circulated on social media. The administration is monitoring the situation to maintain peace during the festival.", "category": "India", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117498", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 19-03.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117498"}]}, {"headline": "Andhra CM Distributes Rs 226 Crore Compensation to Polavaram Evacuees", "summary": "Chief Minister N Chandrababu Naidu handed over Rs 226 crore in rehabilitation aid to families affected by the Polavaram project. The third-phase compensation was timed for the Ugadi festival. Naidu reaffirmed his commitment to completing the project swiftly, ensuring all affected residents receive their due benefits.", "category": "India", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117498", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 19-03.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117498"}]}, {"headline": "Indian Navy Deploys Extra Warships for Safe Passage in Gulf", "summary": "India is increasing its naval presence in the Gulf of Oman to six or seven warships to ensure the safe transit of fuel carriers amid West Asia tensions. The move follows the effective closure of the Strait of Hormuz ts, to make public systems work as intended.", "category": "India", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117469", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 19-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117469"}]}, {"headline": "Nine of family die as fire engulfs building in Delhi", "summary": "Nine family members, including three children, died in a fire in southwest Delhi. Three others were injured. A hydraulic lift reportedly failed, delaying rescue operations. The cause of the fire is unknown.", "category": "India", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117435", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -19-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117435"}]}, {"headline": "Eight dead as EV explosion sparks fire in Indore house", "summary": "Eight people, including two minors, died in Indore after an electric car explosion sparked a fire in a three-storey house. The fire broke out around 4 a.m. while 12 people were asleep. The State government ordered an investigation.", "category": "India", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117435", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -19-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117435"}]}, {"headline": "Months after demolition, 30 families get land titles", "summary": "30 families received land titles in Baiyappanahalli, Bengaluru, months after demolitions in Fakir Colony and Waseem Layout. While 10 families are general category, seven are SCs, two STs, and 11 are minorities. Residents of Old Fakir Colony claim many eligible families were excluded.", "category": "India", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117435", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -19-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117435"}]}, {"headline": "LPG shortage: Minister tells hotels to adjust operations for a week", "summary": "Karnataka’s Food and Civil Supplies Minister urged hotels and eateries to adjust operations due to an LPG cylinder shortage. Commercial supply is capped at 20% against a daily requirement of 44,000 cylinders. Shipments are delayed overseas.", "category": "India", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117435", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -19-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117435"}]}, {"headline": "Height curbs near airports hindering Bengaluru growth", "summary": "Bengaluru Development Minister D.K. Shivakumar stated that height restrictions near airports are hindering city development. He urged the Centre to review these norms, noting that cities like Hyderabad and Mumbai have more relaxed provisions.", "category": "India", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117435", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -19-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117435"}]}, {"headline": "NCB Raising Day observed", "summary": "The Narcotics Control Bureau observed its 41st Raising Day with a Drug Misuse Awareness Programme. RGUHS V-C Bhagwan lauded NCB's efforts in awareness initiatives across 13 districts, reaching over 77,000 students.", "category": "India", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117435", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -19-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117435"}]}, {"headline": "State govt. announces six-point reform plan to overhaul KPSC", "summary": "Karnataka government announced a six-point reform plan for KPSC, including annual recruitment, a five-year roadmap, and reducing members from 18 to eight. BJP demanded an SIT probe into alleged exam irregularities.", "category": "India", "page": 8, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117435", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -19-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117435"}]}, {"headline": "₹260 crore sought to develop 50 slums: Zameer Ahmed", "summary": "Housing Minister B.Z. Zameer Ahmed urged the CM to sanction ₹260 crore to develop 50 slums, stating current allocations are inadequate. He plans to mobilize CSR funds for slum development.", "category": "India", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117435", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -19-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117435"}]}, {"headline": "99.35% of Sakala services delivered within timeline: Minister", "summary": "Revenue Minister Krishna Byre Gowda reported 99.35% of Sakala scheme applications were processed within the timeline, indicating improved service delivery. Online applications have been enabled for various certificates.", "category": "India", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117435", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -19-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117435"}]}, {"headline": "Hailstorm lashes Shivamogga; rain in Mysuru, other districts", "summary": "Shivamogga city and surrounding areas experienced hailstorms, high-speed winds, and thunderstorms. Several roads were covered with debris, and power supply was disrupted. Mysuru also received moderate to heavy rainfall.", "category": "India", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117435", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -19-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117435"}]}, {"headline": "Indian wolf gives birth to 7 pups", "summary": "Seven pups of an Indian wolf born at Pilikula Biological Park in January have been released into an open enclosure. This is the first time an Indian wolf under captivity gave birth to pups at the park.", "category": "India", "page": 9, "importance": 4, "telegram_url": "https://t.me/c/1877410077/117435", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -19-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117435"}]}, {"headline": "What is new in transgender rights Bill?", "summary": "The proposed Transgender Persons Bill 2026 seeks to remove the right to self-perceived gender identity and redefines 'transgender person'. Activists oppose these changes, arguing they contradict the NALSA judgment and exclude community members.", "category": "India", "page": 21, "importance": 9, "telegram_url": "https://t.me/c/1877410077/117435", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -19-03-2026.pdf", "page": 21, "telegram_url": "https://t.me/c/1877410077/117435"}]}, {"headline": "Thinking With Hands: The dignity of blue-collar jobs", "summary": "This opinion piece advocates for recognizing the dignity of blue-collar jobs and addressing the skill gap in India. It highlights the importance of vocational training and societal respect for manual labor to ensure economic growth and stability.", "category": "India", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117455", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_19-03-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117455"}]}, {"headline": "Indian Airlines Resume Services to Dubai After Drone Strike Disruptions", "summary": "Air India, IndiGo, and Air India Express have resumed flight operations to Dubai after local authorities lifted restrictions on foreign carriers. Services were previously hampered by a drone strike on a fuel tank at the airport on Monday. Airlines are working to restore scheduled flights and accommodate stranded passengers.", "category": "Business", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117498", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 19-03.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117498"}]}, {"headline": "Pilots Association Flags Fatigue and Safety Concerns in West Asia", "summary": "The Airline Pilots’ Association of India has written to the DGCA regarding flight safety and crew fatigue during the ongoing West Asia conflict. Key concerns include extended flight duty hours for long-haul operations and the need for war risk insurance. The body sought urgent clarity on risk mitigation for crews flying near conflict zones.", "category": "Business", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117498", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 19-03.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117498"}]}, {"headline": "JSW Steel to Establish Integrated Plant on 424 Acres in Andhra", "summary": "The Andhra Pradesh government has approved the alienation of 424.45 acres of land in Kadapa district for a JSW Steel integrated plant. The project involves an outlay of Rs 21.3 crore for the land cost. The facility will be established in Jammalamadugu mandal as part of the state's industrial expansion efforts.", "category": "Business", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117498", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 19-03.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117498"}]}, {"headline": "Airlines Mandated to Offer Majority of Seats Free, Seat Families Together", "summary": "India's Ministry of Civil Aviation directed airlines to make at least 60% of seats free for selection and seat passengers on common PNRs together. This could lead to higher base fares as seat fees are a key ancillary revenue source for airlines in a price-sensitive market. Legal challenges are noted by airlines.", "category": "Business", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117476", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117476"}]}, {"headline": "AsiaSat Sues India, Broadcasters Over Service Ban", "summary": "Hong Kong-based satellite operator AsiaSat has sent notices to the Indian government and broadcasters like JioStar and Zee, alleging contract breaches. This follows IN-SPACe's decision to bar Chinese-owned satellite players from operating after March 31 due to security concerns, prompting a legal dispute.", "category": "Business", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117476", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117476"}]}, {"headline": "India Considers Fund for Insuring Ships in War Zones", "summary": "The government is considering a dedicated fund to support insurers providing cover for vessels in West Asian conflict-hit waters. This aims to address the lack of global reinsurance and ensure cargo movement, potentially similar to the Marine Cargo Excluded Territories Pool, with a fund size of ~₹1,000 crore.", "category": "Business", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117476", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117476"}]}, {"headline": "Amundi CIO: Time to Invest in India if Not Already", "summary": "Vincent Mortier, Group CIO of Amundi, advises global asset allocators to invest in India, citing strong long-term prospects and attractive valuations for Indian equities. He notes the market's contained reaction to the West Asia conflict but warns of potential shifts if the situation escalates.", "category": "Business", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117476", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117476"}]}, {"headline": "Reliance Plans Jio Platforms IPO by Early April, Picks 17 Banks", "summary": "Reliance Industries plans to file a draft prospectus for Jio Platforms' IPO by early April, appointing 17 investment banks. Expected to be India's largest, the IPO will offer 2.5-2.7% equity, following government approval for companies valued over ₹5 lakh crore to list with a 2.5% public float.", "category": "Business", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117476", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117476"}]}, {"headline": "India Reviews South Asia Trade Routes Amid West Asia Crisis", "summary": "The government is reviewing trade issues with Bangladesh, Nepal, Bhutan, Sri Lanka, Maldives, and Afghanistan to boost exports amid the West Asia crisis. It seeks to address tariff, non-tariff, logistics, and quality certification challenges that hamper business with these six South Asian nations.", "category": "Business", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117476", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/117476"}]}, {"headline": "Solar Gear Makers Received No PLI Funds by February-End", "summary": "Solar equipment manufacturers have not received any funds under the ₹24,000-crore production-linked incentive (PLI) scheme till February-end. Letters of award have been issued for 48,337 MW capacity, but funds are released a year after commissioning of manufacturing projects.", "category": "Business", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117476", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/117476"}]}, {"headline": "Reforms Planned to Strengthen Regional Rural Banks (RRBs)", "summary": "The government is planning reforms for regional rural banks (RRBs), similar to public sector banks, focusing on technology, product diversification, and collaboration. This aims to scale operations and prepare them for next-generation challenges, including governance upgrades, to attract market capital.", "category": "Business", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117476", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/117476"}]}, {"headline": "Govt mandates 60% seats on flights to be free of selection fee", "summary": "Government directs airlines to ensure 60% of seats are free of selection fees and passengers on the same PNR are seated together. DGCA also mandates clear policies on sports equipment, musical instruments, pets, and passenger rights in regional languages. Airlines are uneasy due to rising costs; ancillary revenues (10-15% of income) are impacted.", "category": "Business", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/117491", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "Indian Bank plans to raise ₹5,000 cr via infra bonds", "summary": "Indian Bank plans to raise approximately ₹5,000 crore through infrastructure bonds by the end of March, having secured board approval. This is the bank's first bond market tap this fiscal year, following other PSU banks, to support infrastructure lending, especially in green finance and battery storage.", "category": "Business", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117491", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "AM/NS ₹70,000 cr AP steel plant will boost national growth, says CEO", "summary": "ArcelorMittal and Nippon Steel (AM/NS) India's ₹70,000 crore integrated steel plant in Andhra Pradesh will be a growth catalyst for the state and country. The foundation stone will be laid March 23. With an 8.2 mtpa capacity, it will create one lakh direct/indirect jobs and leverage best technologies from both entities.", "category": "Business", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117491", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "Gold jewellery sale seen rising 40% during Gudi Padwa, Ugadi", "summary": "Jewellers are expecting a 40% rise in gold jewellery demand for Gudi Padwa and Ugadi, despite elevated gold prices. Recent price drops (₹12,592/10g for gold; ₹39,941/kg for silver) and cultural significance are boosting sentiment for light-weight and innovative designs. Sales are expected to reach 7-8 tonnes on Thursday.", "category": "Business", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117491", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "Maruti to launch 7 SUVs, new small car", "summary": "Maruti Suzuki plans to launch seven SUVs and a new \"unique to Suzuki\" small car for first-time buyers over the next 5-6 years. The company is ramping up production capacity to 4 million units and maintaining a multi-fuel strategy. SUV market share rose from 16.8% (FY20) to 19.6% (FY26 Feb).", "category": "Business", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117491", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "KKR’s $310 m PMI deal reshapes India’s e-bus market", "summary": "KKR's investment of up to $310 million in PMI Electro Mobility marks a shift in India's electric bus market towards platform-led mobility models. KKR will acquire a majority stake in Allfleet (PMI's fleet management platform) and a minority in manufacturing. PMI secured 5,210 buses in the PM E-DRIVE tender.", "category": "Business", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117491", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "Surge in polymer prices puts plastic industry in a spot", "summary": "Plastic product prices are expected to rise from April due to a 50-60% surge in polymer prices, driven by the West Asia war causing short supply of crude oil/natural gas derivatives. The industry has 15-20 days inventory and faces demand slowdown. AIPMA suggests government support and exploring new export markets.", "category": "Business", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117491", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "Lloyd’s of London to set up operations in Gift City", "summary": "UK-based insurance and reinsurance powerhouse Lloyd’s of London is set to establish operations in Gujarat International Finance Tec-City (Gift City). Their application for a statutory insurance and reinsurance corporation is under process. This landmark move will boost Gift City's access to global underwriting capital and deepen its risk-management capabilities.", "category": "Business", "page": 5, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117491", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "Paisalo Digital-proposed NCD gets AA rating", "summary": "NBFC Paisalo Digital's proposed ₹1,500 crore non-convertible debenture (NCD) received an 'AA/Stable' rating from Brickwork Ratings, supplementing its existing rating. This reflects the company's commitment to transparency, strong governance, and broader investor participation in debt capital markets.", "category": "Business", "page": 8, "importance": 3, "telegram_url": "https://t.me/c/1877410077/117491", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "EV stocks on top gear as oil price remains firm on West Asia crisis", "summary": "EV-related stocks like JBM Auto, Ather Energy, Ola Electric Mobility, and Olectra Greentech rallied sharply, defying broader market weakness. Investors anticipate that persistently high crude oil prices, fueled by the West Asia conflict, will accelerate the shift towards electric mobility and strengthen the sector's long-term prospects.", "category": "Business", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117491", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "Edelweiss AMC launches first passive hybrid index fund", "summary": "Edelweiss Asset Management Company launched India's first passive hybrid index fund, the Edelweiss Nifty LargeMidcap250 and 8-13 year G-Sec 70:30 Index Fund. The NFO, now open, allocates 70% to equities and 30% to government securities, aiming to combine simplicity and innovation for stable returns across market cycles.", "category": "Business", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/117491", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "GSP Crop Science IPO subscribed 1.6 times", "summary": "Agrochemical maker GSP Crop Science's ₹400-crore IPO was subscribed 1.61 times, with healthy participation from institutional and high-net-worth investors. The QIB portion was subscribed 2.66 times, and HNIs 3.05 times. Retail subscription was 0.4 times. Proceeds will fund debt repayment (₹170 crore) and general corporate purposes.", "category": "Business", "page": 8, "importance": 3, "telegram_url": "https://t.me/c/1877410077/117491", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "ARCL facilitated ₹10.5 lakh crore funding via tri-party repo", "summary": "AMC Repo Clearing (ARCL) has facilitated over ₹10.5 lakh crore in short-term funding for entities like listed corporates, NBFCs, SPDs, and stockbrokers via tri-party repo in corporate bonds since its July 2023 inception. This provides better returns for investors compared to government securities and low-cost funding for borrowers.", "category": "Business", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/117491", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "Belrise Industries acquires UK-based Chester Hall for £13.2 million", "summary": "Belrise Industries acquired UK precision engineering group Chester Hall for £13.2 million, marking its strategic entry into high-value aerospace and space manufacturing. This acquisition by Belrise UK Holdings provides instant access to advanced capabilities and a platform to serve global aerospace OEMs.", "category": "Business", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117491", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "Physicswallah receives ₹263 crore income tax demand", "summary": "Edtech firm Physicswallah received a ₹263.34 crore income tax demand for AY 2023-24. The Income Tax Department treated investments from SEBI-registered Category II Alternative Investment Funds as taxable income. The company plans to challenge the assessment order, citing strong legal and factual grounds.", "category": "Business", "page": 11, "importance": 4, "telegram_url": "https://t.me/c/1877410077/117491", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "Pilot body demands rollback of Air India flight duty relaxations", "summary": "Pilots' group ALPA India urged DGCA to revoke temporary flight duty time limitation (FDTL) relaxations granted to Air India for two-pilot long-haul flights. The group claims pilots face \"unacceptable level of fatigue risk\" due to longer routes from West Asia conflict and lack of prior consultation, especially for Boeing 787 operations.", "category": "Business", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117491", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "BPM industry shifts to AI-literate workforce as roles transform", "summary": "The Business Process Management (BPM) industry is rewiring its workforce due to AI, shifting from headcount-led growth to productivity-driven models. AI isn't shrinking jobs but transforming roles, increasing demand for tech-enabled field teams. Highly repetitive tasks are vulnerable to automation, while roles requiring judgment and data interpretation are emerging.", "category": "Business", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117491", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "Nvidia reworks success strategy with new AI chips", "summary": "Nvidia launched new Vera Rubin and Groq 3 chips optimized to run AI, shifting strategy from training AI. This focus on power efficiency aims to drastically reduce AI running costs, preparing for mass adoption. This could impact India's data centers, potentially raising AI expenditure despite higher chip costs.", "category": "Business", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117443", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_19-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117443"}]}, {"headline": "Banks cut credit to solar module firms amid overcapacity fears", "summary": "Indian solar module manufacturers face a credit squeeze as banks reduce loan-to-cost ratios for new projects due to overcapacity risks and a preliminary 126% US tariff. The clean energy ministry urged caution on financing, leading lenders to intensify due diligence to avoid bad loans despite falling global prices.", "category": "Business", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117443", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_19-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117443"}]}, {"headline": "FFFAI seeks govt intervention on war risk surcharges", "summary": "The Federation of Freight Forwarders’ Associations in India (FFFAI) has sought government intervention regarding shipping lines imposing war risk surcharges (WRS) on shipments due to the West Asia crisis, impacting trade costs.", "category": "Business", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/117443", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_19-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117443"}]}, {"headline": "India probes anti-dumping on ethyl chloroformate imports", "summary": "The Directorate General of Trade Remedies has initiated an anti-dumping investigation into ethyl chloroformate imports from China. This follows a complaint from domestic producer Paushak, alleging the chemical is sold at unfairly low prices.", "category": "Business", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/117443", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_19-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117443"}]}, {"headline": "Govt mandates local solar wafer, ingot use from June 2028", "summary": "The government has mandated the use of locally manufactured solar wafers and ingots in large renewable energy projects and government-backed schemes from June 2028. This expands the ALMM scope to crucial import-reliant components, aiming to build a self-reliant solar manufacturing ecosystem.", "category": "Business", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117443", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_19-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117443"}]}, {"headline": "Disney’s Bengaluru GCC poses revenue risk for IT outsourcer Globant", "summary": "Walt Disney Co.'s new global capability centre (GCC) in Bengaluru raises concerns for IT outsourcer Globant, Disney's largest client since 2012. Disney is insourcing technology work, threatening up to 9% of Globant's revenue ($214 million in 2025) and signaling a broader industry shift as clients bring work in-house.", "category": "Business", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117443", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_19-03-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117443"}]}, {"headline": "Eternal stock falls amid competition and AI threats", "summary": "Eternal Ltd's stock fell 25% over 18 sessions due to concerns over new competition from Flipkart in food delivery and the rise of \"agentic AI.\" While JM Financial sees value, others project lower Ebitda. Investors fear agentic AI could enable users to compare platforms, impacting loyalty, especially for Blinkit.", "category": "Business", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117443", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_19-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117443"}]}, {"headline": "Gail’s shares decline due to West Asia conflict impacts", "summary": "Gail (India) Ltd’s shares declined 11% since the West Asia conflict began, hitting a 52-week low. The Strait of Hormuz blockade and QatarEnergy's production suspension threaten Gail’s transmission and marketing segments, which are heavily reliant on the region for LNG supplies.", "category": "Business", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117443", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_19-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117443"}]}, {"headline": "West Asia conflict erodes ₹6 trillion from PSU stocks", "summary": "Escalating West Asia tensions have halted the rally in public sector undertaking (PSU) stocks, eroding nearly ₹6 trillion from their market capitalization since 27 February. The BSE PSU index declined 7%, with oil marketing and public sector banks among the worst hit, despite robust fundamentals.", "category": "Business", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117443", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_19-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117443"}]}, {"headline": "Dairy products top India's counterfeit FMCG market", "summary": "Dairy products, like milk and ghee, are the top targets of adulteration and counterfeiting in India’s FMCG sector, with reported incidents increasing 2.5x to 187 in 2025. This issue is compounded by unorganized players, complex supply chains, and the difficulty of implementing anti-counterfeiting measures in a high-volume, low-margin business.", "category": "Business", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117443", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_19-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117443"}]}, {"headline": "BYD targets double-digit sales growth in India, plans local homologation", "summary": "Chinese EV giant BYD aims for double-digit sales growth in India in 2026 and is working to locally homologate models like Seal and Sealion. This will allow BYD to remove import limits (currently 2,500 units) and sell vehicles based on demand, signaling commitment to the Indian market.", "category": "Business", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117443", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_19-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117443"}]}, {"headline": "Design and tech transform India's home appliance market", "summary": "India’s home appliance market is seeing a surge of new entrants and D2C brands, redefining products with smart, multifunctional, and design-led features. Driven by lifestyle upgrades and tech adoption, startups like EDT, Nuuk, and Beyond Appliances are targeting urban consumers willing to experiment beyond established brands.", "category": "Business", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117443", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_19-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117443"}]}, {"headline": "Coal India unit CMPDIL raises ₹470 cr from anchor investors", "summary": "Central Mine Planning and Design Institute (CMPDIL), a Coal India arm, mobilized ₹470 crore from anchor investors ahead of its initial share sale. LIC, Nippon India MF, Edelweiss MF, and others invested, with CMPDIL allotting 27.3 million equity shares at ₹172 each.", "category": "Business", "page": 9, "importance": 4, "telegram_url": "https://t.me/c/1877410077/117443", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_19-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117443"}]}, {"headline": "NSE sets 0.65% advisory fees for $2.5 billion IPO", "summary": "National Stock Exchange of India (NSE) has set advisory fees at about 0.65% of its $2.5 billion IPO issue size, totaling $16.25 million, primarily for its six lead banks. This compares to an average of 1.86% paid by companies last year.", "category": "Business", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117443", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_19-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117443"}]}, {"headline": "Axis Bank to invest ₹15 billion ($162.28M) in Axis Finance", "summary": "Axis Bank will invest ₹15 billion ($162.28 million) in its consumer lending arm, Axis Finance, by March 2027. This follows Reuters reports of the bank rethinking a stake sale after RBI eased rules on bank-subsidiary overlapping activities, leading to this infusion for business growth.", "category": "Business", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117443", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_19-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117443"}]}, {"headline": "ReNew Energy Global to secure $800M foreign currency loan", "summary": "ReNew Energy Global Plc is set to secure an approximately $800 million foreign-currency loan, underwritten by Standard Chartered and Societe Generale. This five-year facility, India’s largest offshore financing so far this year, will refinance debt for an operational hybrid power project.", "category": "Business", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117443", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_19-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117443"}]}, {"headline": "SBI raises ₹6,051 crore via tier-II bond issuance", "summary": "State Bank of India (SBI) raised ₹6,051 crore through its second Basel III-compliant tier-II bond issuance at a 7.05% coupon rate. The 10-year bonds, with a call option after 5 years, saw bids nearly twice the base issue size from diverse institutional investors.", "category": "Business", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117443", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_19-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117443"}]}, {"headline": "Delay in IDBI Bank privatization is mystifying", "summary": "India's government reportedly halted IDBI Bank's privatization due to low bids, despite clear rationale for state divestment. The process, initiated in 2021 after LIC's stake acquisition, has seen repeated deadline breaches. The decision is puzzling, especially as foreign investors show increased interest in India's banking sector.", "category": "Business", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117443", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_19-03-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/117443"}]}, {"headline": "Prudential may exit insurance JV with ICICI Bank", "summary": "Prudential is exploring an exit from its life insurance joint venture, ICICI Prudential Life Insurance, where it holds 21.93%. Discussions are reportedly underway with Bharti Axa Life Insurance for a potential stake acquisition. ICICI Prudential Life is India’s third-largest private life insurer.", "category": "Business", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117469", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 19-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117469"}]}, {"headline": "AM/NS Andhra project to kick off, ~1.5 trn investment on cards", "summary": "ArcelorMittal Nippon Steel India (AM/NS India) will lay the foundation stone for a ~1.5 trillion greenfield integrated steel plant in Andhra Pradesh. The first phase, costing ~70,000 crore, aims for commissioning by late 2028 or early 2029, with a total capacity target of 24 million tonnes per annum. The project secured clearances in just 15 months.", "category": "Business", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117469", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 19-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117469"}]}, {"headline": "Mankind Pharma acquires Roche’s Rivotril brand for Indian market", "summary": "Mankind Pharma has acquired Roche’s Rivotril brand, used for treating epilepsy and anxiety, for the Indian market. The financial details of the acquisition were not disclosed. This move expands Mankind Pharma’s neuroscience portfolio in India.", "category": "Business", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/117469", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 19-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117469"}]}, {"headline": "Godrej Properties acquires 20 acre land parcel in Bengaluru", "summary": "Godrej Properties has acquired a 20-acre land parcel in North Bengaluru. The company plans to develop a residential project on this land, with an estimated developable potential of 1.7 million square feet, focusing on luxury housing.", "category": "Business", "page": 2, "importance": 3, "telegram_url": "https://t.me/c/1877410077/117469", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 19-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117469"}]}, {"headline": "Shipping Corp of India inks contract with MDL for Methanol dual-fuel vessel", "summary": "Shipping Corporation of India (SCI) has signed a contract with Mazagon Dock Shipbuilders Limited (MDL) for a Methanol dual-fuel platform supply vessel. This agreement marks a step towards greener shipping solutions and supports India's push for sustainable maritime practices.", "category": "Business", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/117469", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 19-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117469"}]}, {"headline": "Amritanshu Khaitan quits McLeod Russel board citing personal reasons", "summary": "Amritanshu Khaitan, a promoter family member, has resigned from the board of McLeod Russel India, citing personal reasons and other commitments. This move is seen as signaling a clearer demarcation of operational control and governance within the promoter group, as the company is undergoing debt resolution.", "category": "Business", "page": 2, "importance": 3, "telegram_url": "https://t.me/c/1877410077/117469", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 19-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117469"}]}, {"headline": "Gulshan group partners IHCL for Taj-branded residences in Noida", "summary": "Realty major Gulshan Group has partnered with Indian Hotels Company Limited (IHCL) to launch a ~1,000 crore Taj-branded hotel and residences in Noida. The 57-floor development will feature a 150-room Taj Hotel and 74 branded apartments, with completion expected by 2031. This is IHCL's first Taj-branded hotel in Noida.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117469", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 19-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117469"}]}, {"headline": "N Chandrasekaran receives UK knighthood for UK-India business relations", "summary": "Tata Sons Chairman N Chandrasekaran received the insignia of the Knight Commander of the Most Excellent Order of the British Empire (KBE) for his contributions to UK-India business relations. The honor was bestowed by the British High Commissioner to India in New Delhi.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117469", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 19-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117469"}]}, {"headline": "Apple CEO Tim Cook dismisses retirement rumours", "summary": "Apple CEO Tim Cook dismissed speculation about his retirement, stating he 'can't imagine his life without Apple'. He expressed deep love for his work and the people at Apple, highlighting the company's journey and his commitment ahead of Apple's 50th anniversary on April 1.", "category": "Business", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/117469", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 19-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117469"}]}, {"headline": "Dealers stare at cash squeeze as OMCs halt credit payment for fuel", "summary": "State-run oil marketing companies (OMCs) have halted credit payments for retail outlet dealers, potentially causing a cash crunch and forcing dealers to scale back fuel orders. With crude prices above $100/barrel and frozen retail prices, OMCs incur losses, indirectly curbing sales. Dealers warn of limited fuel supply at outlets.", "category": "Business", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117469", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 19-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117469"}]}, {"headline": "Microsoft considers legal action over $50 billion Amazon-OpenAI deal", "summary": "Microsoft is reportedly considering legal action against OpenAI and Amazon over a $50 billion deal making Amazon Web Services (AWS) the exclusive cloud provider for Frontier, OpenAI's enterprise AI platform. Microsoft believes this could violate its exclusive cloud agreement with OpenAI and is in talks to resolve the dispute.", "category": "Business", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117469", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 19-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117469"}]}, {"headline": "Tencent sales rise 13% in boost for broader AI ambitions", "summary": "Tencent Holdings reported a 13% rise in revenue, reaching $28.3 billion for the three months ending December, driven by strong performance in its gaming and advertising businesses. Net income rose 14%. This growth boosts Tencent’s efforts to capture the shift towards AI agents, potentially reshaping the internet landscape.", "category": "Business", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117469", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 19-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117469"}]}, {"headline": "Can companies buy their way into S&P 500?", "summary": "Research suggests that firms purchasing S&P credit ratings are significantly more likely to be added to the S&P 500 index, despite S&P's claim of independent index and ratings divisions. This raises questions about the objectivity of index membership, which offers substantial financial benefits and prestige, potentially putting the admission process's credibility at risk.", "category": "Business", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117469", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 19-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117469"}]}, {"headline": "Equity MF investors hold steady despite market correction", "summary": "Indian equity mutual fund (MF) investors maintained steady inflows despite a ~2.4 trillion market correction caused by the US-Israel war on Iran. Assets under management declined less severely than markets, indicating continued net inflows. Wealth managers advise staggered fresh investments, noting improved valuations in mid and smallcap segments. SIP inflows are also robust.", "category": "Business", "page": 13, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117469", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 19-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/117469"}]}, {"headline": "Sensex, Nifty extend gains to third day on easing oil volatility", "summary": "Indian equities extended their recovery for a third day, with Sensex up 633 points (0.8%) to 76,704 and Nifty gaining 197 points (0.8%) to 23,778. The rebound was broad-based, driven by IT, realty, and auto sectors, amid easing crude oil volatility. However, benchmarks remain down 5.6% since the Iran war began, with geopolitical tensions still a concern.", "category": "Business", "page": 13, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117469", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 19-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/117469"}]}, {"headline": "IT stocks rebound 2.8% as AI fears soften", "summary": "IT stocks rebounded 2.8% on Wednesday, snapping a six-day losing streak, as brokerages allayed concerns over AI disruption. CLSA found no evidence of increased pricing pressure in renewal contracts for Indian IT firms, with demand intact across key verticals like BFSI. HDFC Securities argued that deploying AI in complex enterprise environments limits near-term disruption.", "category": "Business", "page": 13, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117469", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 19-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/117469"}]}, {"headline": "Multiple triggers in MFI space may be offset by near-term headwinds", "summary": "The microfinance (MFI) segment shows recovery signs, driven by higher-ticket loans and improved asset quality, but faces headwinds from state elections, proposed Bihar legislation, geopolitics, and El Nino. NBFC-MFIs gained market share, while bank MFI exposures declined. Strict monitoring of MFI assets is crucial, given concerns over potential overleveraging and external impacts.", "category": "Business", "page": 13, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117469", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 19-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/117469"}]}, {"headline": "‘This is not a time to be bearish about mkts’", "summary": "Rishi Kohli, CIO of Jio BlackRock AMC, suggests current market volatility due to the West Asia crisis resembles the Russia-Ukraine war, where stock selection matters more than calling market bottoms. He expects a potential 5-10% further downside if the conflict prolongs, but advises investors to deploy some capital now, especially in largecaps or diversified funds, viewing valuations as interesting.", "category": "Business", "page": 13, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117469", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 19-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/117469"}]}, {"headline": "MMTC tops A-group gainers with 18.7% surge", "summary": "MMTC was the top A-group gainer on Wednesday, with its stock closing at ~63.1, up 18.7% over the previous close. Its trading volume surged 39 times over the two-week average.", "category": "Business", "page": 14, "importance": 2, "telegram_url": "https://t.me/c/1877410077/117469", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 19-03-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/117469"}]}, {"headline": "JBM Auto trading volume surged 140 times", "summary": "JBM Auto's stock closed at ~585.3, up 18.9% over the previous close. Its trading volume surged 140 times over the two-week average, indicating significant market activity.", "category": "Business", "page": 14, "importance": 2, "telegram_url": "https://t.me/c/1877410077/117469", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 19-03-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/117469"}]}, {"headline": "SBI Cards & Payment Services snaps 8-day losing streak", "summary": "SBI Cards & Payment Services snapped an 8-day losing streak, with its stock closing at ~717.7, up 3.6% over the previous close. The company's performance saw a positive turn after a period of decline.", "category": "Business", "page": 14, "importance": 2, "telegram_url": "https://t.me/c/1877410077/117469", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 19-03-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/117469"}]}, {"headline": "Karnataka Bank hits 18-month high at ~238", "summary": "Karnataka Bank's stock hit an around 18-month high at ~238. The share price surged 35% in the second half of the financial year 2026, indicating strong investor confidence.", "category": "Business", "page": 14, "importance": 2, "telegram_url": "https://t.me/c/1877410077/117469", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 19-03-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/117469"}]}, {"headline": "Centre’s directions: Curb extra fee for seat selection, airlines told", "summary": "The Civil Aviation Ministry directed airlines to make at least returns for farmers.", "category": "Business", "page": 16, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117435", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -19-03-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/117435"}]}, {"headline": "War forces rethink on travel insurance cover", "summary": "Geopolitical conflicts, such as the ongoing war, are prompting a re-evaluation of travel insurance policies, especially regarding coverage limits and exclusions for war zones. Underwriters are adjusting terms.", "category": "Business", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117455", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_19-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117455"}]}, {"headline": "Manipal Hospitals eyes ₹11,000-crore IPO", "summary": "Manipal Hospitals is planning an Initial Public Offer (IPO) to raise ₹11,000 crore, indicating a major expansion strategy and confidence in the healthcare sector's growth potential.", "category": "Business", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117455", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_19-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117455"}]}, {"headline": "KKR to invest $500mn in SBI Electro and Altiflex", "summary": "Global investment firm KKR is set to invest up to $500 million in SBI Electro and Altiflex, signaling major private equity interest in the Indian market and these specific companies.", "category": "Business", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117455", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_19-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117455"}]}, {"headline": "Centre fails to divest IDBI Bank after two attempts", "summary": "The Indian government has failed in two attempts to divest IDBI Bank, highlighting challenges in the privatization process for state-owned assets and potential buyer reluctance.", "category": "Business", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117455", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_19-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117455"}]}, {"headline": "Nazara to acquire 50% stake in European gaming co", "summary": "Nazara Technologies plans to acquire a 50% stake in a European gaming company for ₹918 crore, expanding its global footprint and strengthening its presence in the international gaming market.", "category": "Business", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117455", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_19-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117455"}]}, {"headline": "US Federal Reserve Holds Interest Rates Steady Amid West Asia Uncertainty", "summary": "The US Federal Reserve maintained benchmark interest rates at 3.5% to 3.75% on Wednesday. Officials cited increased economic uncertainty due to the ongoing conflict in the Middle East. While one rate cut is still expected this year, the committee emphasized a cautious approach to inflation and labour market risks.", "category": "Economy", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117498", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 19-03.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117498"}]}, {"headline": "Asian Refining Margins Turn Negative Amid West Asia Supply Disruptions", "summary": "Asian refining profitability has crashed into negative territory as the conflict in Iran halts crude supplies through the Strait of Hormuz. Benchmark Singapore margins dropped from $40 per barrel to negative $10. Increased freight costs and feedstock shortages have forced refiners across the region to cut operating rates significantly.", "category": "Economy", "page": 14, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117498", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 19-03.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/117498"}]}, {"headline": "Iran War Unlikely to Prolong, Create Lasting Issues: KV Kamath", "summary": "KV Kamath, Chairman of Jio Financial Services, believes the US-Israel and Iran war will not last long or create lasting issues for Indian businesses. He foresees normalisation soon, with India poised for long-term structural growth and a cleaner banking system than ever before.", "category": "Economy", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117476", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117476"}]}, {"headline": "LPG Allocation Linked to States' Piped Gas Rollout", "summary": "The Centre has linked an additional 10% commercial LPG allocation to states' efforts in rolling out piped natural gas (PNG) infrastructure. This aims to expedite the transition of LPG consumers to PNG, especially amid current LPG shortages due to the West Asian crisis.", "category": "Economy", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117476", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117476"}]}, {"headline": "Rupee Hits New Low as Brent Crude Nears $110", "summary": "The Indian rupee plunged to a lifetime low of 92.63/$ on Wednesday. This fall is driven by soaring Brent crude prices, nearing $110, and increased corporate dollar demand, amplified by geopolitical tensions and anticipation of the Fed's interest rate decision.", "category": "Economy", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117476", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117476"}]}, {"headline": "Global Reinsurers Shun West Asia Crude Imports, Higher Markup", "summary": "Global reinsurers are withdrawing cover for crude imports from West Asia due to the ongoing war, making it costlier and difficult to move cargo. India paid a $40 premium per barrel on average for crude imports on Tuesday, pushing up costs.", "category": "Economy", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117476", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117476"}]}, {"headline": "Fed Holds Interest Rates Steady, Forecasts Single Rate Cut", "summary": "The US Federal Reserve held interest rates steady on Wednesday, projecting a single rate cut for the year. This decision comes as officials assess economic risks from the war with Iran, with projections showing overnight rates falling by just a quarter percentage point by year-end.", "category": "Economy", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117476", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117476"}]}, {"headline": "War to Deepen Input Cost Pressures for Companies", "summary": "Companies face mounting cost pressures as the US-Israel-Iran war disrupts supply chains and production, pushing up raw material prices. Economists caution that rising energy costs and higher freight charges will squeeze margins across sectors, with SMEs most vulnerable, expecting higher WPI inflation.", "category": "Economy", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117476", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117476"}]}, {"headline": "Rebased GDP Growth Overestimated, India Faces Demand Problem", "summary": "Economist Rathin Roy argues that while MoSPI's GDP rebasing is honest, the higher real growth estimate (7.6%) appears overestimated due to a negative deflator and stagnant nominal growth. He asserts India faces a structural demand problem, not supply-side issues, hindering 'Viksit Bharat' goals.", "category": "Economy", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117476", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117476"}]}, {"headline": "India Must Scale Electrification for Industrial Growth", "summary": "Arijit Barman argues that the US-Israel war on Iran highlights the need for India to rethink its energy transition and scale up electrification for industry. India should leverage renewable energy with battery storage, reduce fossil fuel reliance, and invest in a robust electronics ecosystem to boost economic output.", "category": "Economy", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117476", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117476"}]}, {"headline": "Wall Street Dips as Inflation Rises, Brent Nears $110/bbl", "summary": "US stocks slipped on Wednesday after wholesale inflation unexpectedly accelerated to 3.4% in February and Brent crude prices climbed to $109.84. The war in Iran, disrupting the Persian Gulf's energy industry, fuels inflation concerns, cementing expectations for the Fed to hold rates.", "category": "Economy", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117476", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117476"}]}, {"headline": "Indian Market Rebound Fails to Boost Investor Confidence", "summary": "A three-day rebound in Indian markets after a sell-off in early March is seen as an \"unloved rally,\" marked by scepticism. Despite short covering and DII buying, investors lack optimism due to West Asia conflict uncertainty and unrelenting FII selling, casting doubts on the rally's durability.", "category": "Economy", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117476", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117476"}]}, {"headline": "Commodity Currency Carry Trades See Best Returns", "summary": "The carry trade strategy, borrowing in low-interest currencies to invest in high-interest ones, is seeing its best returns in three years. Rising oil prices from the Iran war and strong economic fundamentals in commodity-exporting economies like Brazil are boosting these trades, offsetting volatility.", "category": "Economy", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117476", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117476"}]}, {"headline": "Iran Considers Yuan for Oil Trades, Challenging Petrodollar", "summary": "Iran is reportedly considering settling oil transactions in Chinese yuan, bypassing sanctions and strengthening ties with China. This potential \"de-dollarisation\" move could cause global financial volatility, affecting US interest rates, inflation, and international trade, challenging the dollar's dominance.", "category": "Economy", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117476", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117476"}]}, {"headline": "Proposal to Exempt Small Firms from Audit Under Review", "summary": "The government is reconsidering a proposal to exempt companies with annual turnover up to ₹1 crore from mandatory statutory audits due to concerns over misuse and weak oversight. The threshold may be dropped or significantly reduced in the final amendments to the Companies Act.", "category": "Economy", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117476", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/117476"}]}, {"headline": "Scope to Add 1.95 Cr Beneficiaries Under Food Security Act", "summary": "The Centre stated there is scope to add 1.95 crore beneficiaries under the National Food Security Act (NFSA), which provides 5 kg of free foodgrains per person per month. Antyodaya Anna Yojana households receive 35 kg of free foodgrains per month.", "category": "Economy", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117476", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/117476"}]}, {"headline": "Ministries’ blame game over CAFE-2 dues stalls rollout of new fuel norms", "summary": "A PMO meeting revealed bureaucratic deadlock over ₹8,000 crore in unpaid CAFE-2 penalties from automakers. Ministries (Power, Road Transport, Heavy Industries, Petroleum) blamed each other, stalling recovery and the CAFE-3 rollout for April 1, 2027. Hyundai, Mahindra, Kia face largest fines. PMO demands consensus before CAFE-3 proceeds.", "category": "Economy", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/117491", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "Over 1.2 lakh PNG connections activated in 2 weeks", "summary": "Over 1.2 lakh piped natural gas (PNG) connections for domestic, commercial, industrial users, and CNG stations, have been activated in the last two weeks, as the West Asia conflict disrupts India’s LPG supplies. Commercial LPG users are encouraged to switch to PNG; domestic LPG production increased by 40%.", "category": "Economy", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117491", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "Indian-flagged Jag Laadki docks at Mundra Port with UAE crude oil", "summary": "The Indian-flagged crude oil tanker Jag Laadki arrived at Mundra Port with 80,886 tonnes of UAE crude, amid West Asia tensions around the Strait of Hormuz. This highlights India's efforts to ensure energy security. Two LPG tankers from West Asia also arrived after transiting the Strait.", "category": "Economy", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117491", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "India holds firm on food stockholding as WTO draft sidesteps key issues", "summary": "India will push for a permanent solution on public stockholding (PSH) and Special Safeguard Mechanism (SSM) at the upcoming WTO Ministerial Conference in Yaounde. The draft text sidesteps these, which are critical for India's MSP-based food security. The US's \"new approach\" to agriculture negotiations is seen as an attempt to dilute existing mandates.", "category": "Economy", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117491", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "CIBIL score monitoring hits 183 m in Dec", "summary": "The number of Indians actively self-monitoring their CIBIL score reached 183 million by December 2025, with first-time monitors growing 27% YoY, mainly from non-metro regions (75% of growth). Gen Z leads adoption, and women (38% YoY increase) are outpacing men in monitoring. Post-monitoring, Gen Z shifted to secured credit like gold and two-wheeler loans.", "category": "Economy", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117491", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "India slips up on the LPG front", "summary": "India faces a \"worrisome\" LPG supply situation due to relying on the Middle East for 90% of imports. Despite surplus refining, India imports 60% of LPG. The country lacks strategic storage (only 15 days capacity), unlike other nations. The author suggests diversification of sources, building more storage, and considering electric cooking as a long-term alternative.", "category": "Economy", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117491", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "For GDP growth that spurs happiness", "summary": "Economist Gurbachan Singh proposes four \"new\" industries to boost India's GDP and happiness: safety, cleanliness, relocation, and relaxation. He argues for expanding safety manpower, improving public cleanliness, addressing land prices to enable urban relocation, and increasing judiciary capacity for faster justice.", "category": "Economy", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117491", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "Equities gain for 3rd day, Nifty50 up 196.65 points", "summary": "Indian equities gained for the third consecutive day, with Nifty 50 up 196.65 points
