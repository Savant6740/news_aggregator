<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Inter', -apple-system, sans-serif;
  background: #0c0c0c; color: #fff; touch-action: none;
}
.outer { position: fixed; inset: 0; overflow: hidden; }
.h-track { display: flex; height: 100%; will-change: transform; }
.cat-panel { flex-shrink:0; width:100vw; height:100%; display:flex; flex-direction:column; overflow:hidden; }
.progress-row { flex-shrink:0; display:flex; gap:4px; padding:14px 16px 10px; background:#0c0c0c; position:relative; z-index:5; overflow:visible; }
.progress-row::after { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:80%; height:120px; background:radial-gradient(ellipse at top,color-mix(in srgb,var(--cc) 30%,transparent) 0%,transparent 70%); pointer-events:none; z-index:-1; }
.pseg { flex:1; height:2px; border-radius:1px; background:rgba(255,255,255,0.12); position:relative; overflow:hidden; }
.pseg::after { content:''; position:absolute; inset:0; background:var(--cc,#e8334a); transform:scaleX(0); transform-origin:left; transition:transform 0.25s ease; }
.pseg.done::after, .pseg.active::after { transform:scaleX(1); }
.v-feed { flex:1; overflow:hidden; position:relative; clip-path:inset(0); }
.v-track { display:flex; flex-direction:column; will-change:transform; }
.card { 
  width:100%; flex-shrink:0; background:#0c0c0c; display:flex; flex-direction:column; 
  overflow:hidden; position:relative; 
  scroll-margin-top: 80px;
}
.card.target-highlight {
  background: linear-gradient(135deg, #fff3cd22 0%, #ffeaa722 100%) !important;
  box-shadow: 0 0 30px rgba(255, 193, 7, 0.4);
  border: 2px solid #f39c12;
  animation: pulse-highlight 2s ease-in-out;
}
@keyframes pulse-highlight {
  0%, 100% { box-shadow: 0 0 30px rgba(255, 193, 7, 0.4); }
  50% { box-shadow: 0 0 50px rgba(255, 193, 7, 0.6); }
}
.card-content { flex:1; display:flex; flex-direction:column; padding:36px 20px 22px; min-height:0; position:relative; z-index:1; }
.card-toprow { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; flex-shrink:0; }
.cat-pill { display:inline-flex; align-items:center; gap:7px; background:#1c1c1e; border-radius:8px; padding:7px 12px 7px 10px; font-size:11.5px; font-weight:700; letter-spacing:0.07em; color:#d0d0d0; text-transform:uppercase; line-height:1; }
.pill-icon { width:16px; height:16px; background:#2e2e30; border-radius:3px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.pill-icon svg { display:block; }
.card-date { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:500; color:#666; letter-spacing:0.01em; }
.card-headline { font-size:28px; font-weight:800; line-height:1.18; color:#fff; letter-spacing:-0.03em; margin-bottom:20px; flex-shrink:0; }
.card-summary { font-size:15.5px; font-weight:400; line-height:1.62; color:#6b6b6b; flex:1; overflow:hidden; display:-webkit-box; -webkit-line-clamp:7; -webkit-box-orient:vertical; }
.card-divider { height:1px; background:#1e1e1e; margin:20px 0 16px; flex-shrink:0; }
.card-footer { display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.src-chip { display:inline-flex; align-items:center; gap:6px; background:#181818; border:1px solid #282828; border-radius:9px; padding:8px 13px; font-size:12.5px; font-weight:600; color:#c0c0c0; text-decoration:none; letter-spacing:0.005em; line-height:1; }
.src-chip-sep { color:#3a3a3a; font-weight:400; }
.src-chip-pg { color:#555; font-weight:500; }
.src-chip-ext { margin-left:2px; }
.src-chip-ext svg { display:block; }
.info-btn { width:36px; height:36px; border-radius:50%; border:1.5px solid #252525; background:#141414; display:flex; align-items:center; justify-content:center; color:#555; cursor:pointer; flex-shrink:0; }
.cat-flash { position:fixed; inset:0; z-index:600; pointer-events:none; opacity:0; transition:opacity 0.12s; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; }
.cat-flash.on { opacity:1; }
.cf-icon { font-size:34px; }
.cf-name { font-size:22px; font-weight:900; letter-spacing:-0.03em; text-transform:uppercase; }
.hint { position:fixed; display:flex; flex-direction:column; align-items:center; gap:5px; pointer-events:none; z-index:400; opacity:0; transition:opacity 0.6s ease; }
.hint.visible { opacity:1; }
.hint.gone { opacity:0 !important; transition:opacity 0.4s; }
.hint-pill { font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.55); background:rgba(255,255,255,0.07); backdrop-filter:blur(10px); padding:5px 13px; border-radius:100px; border:1px solid rgba(255,255,255,0.09); }
.hint-arr { font-size:16px; color:rgba(255,255,255,0.4); }
.h-up { bottom:28px; left:50%; transform:translateX(-50%); animation:bUp 2s ease-in-out infinite; }
.h-right { top:50%; right:14px; transform:translateY(-50%); animation:bRight 2s ease-in-out infinite 0.6s; }
@keyframes bUp { 0%,100% { bottom:28px; opacity:.65; } 50% { bottom:36px; opacity:1; } }
@keyframes bRight { 0%,100% { right:14px; opacity:.65; } 50% { right:6px; opacity:1; } }

<script>
const DIGEST   = {"date": "18 May 2026", "articles": [{"headline": "Adani Group to outsource operations to vendor network for rapid scaling", "summary": "The Adani Group is shifting to a model used by firms like Apple to outsource large portions of manufacturing and logistics to third-party vendors. The strategy aims to conserve management bandwidth for strategy and finance while flattening organizational layers. The group has committed over ₹2 trillion in annual capital expenditure over the next five years.", "category": "Business", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124067", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124067"}], "article_id": "42be91b3"}, {"headline": "Excess solar generation pushes exchange power prices to zero", "summary": "Surging daytime solar power generation has caused electricity prices on the Indian Energy Exchange to hit zero during multiple sessions in May. The trend underscores a mismatch between rising installed solar capacity (154.23 GW) and limited storage. This affects generators' revenues and forces distribution companies to sell excess power below procurement costs.", "category": "Economy", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124067", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124067"}], "article_id": "34c6e4cb"}, {"headline": "The paradox of thrift and its relevance to India's economy", "summary": "This analysis discusses how Keynesian austerity warnings apply to India. While consumers are urged to cut back on scarce goods, generalized austerity could hurt businesses struggling with flat real incomes. If aggregate demand slows despite low product penetration, the economy could face a slump driven by the paradox of thrift, where collective saving reduces total output.", "category": "Economy", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124067", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124067"}], "article_id": "b3998fab"}, {"headline": "Intel and Apple sign deal for AI chip manufacturing", "summary": "Intel has reportedly secured a preliminary deal to manufacture Apple-designed chips, validating its foundry turnaround strategy. The partnership helps Apple diversify its supply chain away from TSMC, which is currently strained by high demand from AI chipmakers like Nvidia. The deal highlights the growing role of US geopolitics in bringing advanced chip production back to the country.", "category": "Technology", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124067", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124067"}], "article_id": "5bd4e3bc"}, {"headline": "New two-wheeler safety norms to curb hands-off riding", "summary": "The Indian government is planning a three-layer safety system for bikes and scooters to detect if riders have removed their hands from the handlebars. The standards would require technology to prevent ignition, issue alerts, and slow down vehicles in case of hands-free riding. The sensors are expected to add ₹800–1,000 to the cost of a two-wheeler.", "category": "Infrastructure", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124067", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/124067"}], "article_id": "4fb8843f"}, {"headline": "India moves to eliminate toxic chemicals from drug manufacturing", "summary": "The Indian Pharmacopoeia Commission is crafting new standards to replace carcinogenic class-1 solvents like benzene and chloroform with safer alternatives. This green chemistry shift will affect India's $50 billion drug market and its supply of 20% of global generic medicines. The initiative also aims to reduce energy consumption and shorten testing times.", "category": "Health", "page": 5, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124067", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/124067"}], "article_id": "251b7601"}, {"headline": "Southwest monsoon advances towards Kerala with May 26 onset expected", "summary": "India's weather office reports favorable conditions for the southwest monsoon to advance over the Arabian Sea and Bay of Bengal. The monsoon is likely to reach the Kerala coast by May 26, slightly ahead of its normal June 1 onset. A timely monsoon is critical for India's kharif crops, including paddy and cotton, which account for 70% of annual precipitation.", "category": "Environment", "page": 6, "importance": 9, "telegram_url": "https://t.me/c/1877410077/124067", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/124067"}], "article_id": "2f9a475b"}, {"headline": "Easing of IPO size rules finds few takers among companies", "summary": "Despite Sebi allowing companies to reduce IPO fresh issue sizes by up to 50% without refiling draft papers, few firms have used the facility. Investment bankers note that issuers are prioritizing valuations over capital amounts. Recent IPOs remain oversubscribed despite market volatility, suggesting liquidity is sufficient for deals matching pricing expectations.", "category": "Business", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124067", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/124067"}], "article_id": "bc639f89"}, {"headline": "Venture capital investors pivot to non-IPO exits in India", "summary": "Indian VCs are increasingly using secondary transactions and M&A deals for liquidity as technology IPOs face delays. In 2025, there were 51 secondary VC transactions worth $1.1 billion. The shift reflects a tougher listing environment and a focus on partial exits as a routine portfolio management strategy rather than waiting for public market windows.", "category": "Business", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124067", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/124067"}], "article_id": "98e20400"}, {"headline": "Muthoot Finance profit doubles but AUM growth guidance moderates", "summary": "Muthoot Finance reported a doubling of Q4 net profit to ₹3,080 crore, aided by a significant rally in gold prices. However, the company has provided a moderated AUM growth guidance of 15% for FY27. Investors remain cautious about rising borrowing costs and intense competition from low-cost lenders in the gold loan market.", "category": "Business", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124067", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/124067"}], "article_id": "0cc48ea6"}, {"headline": "Government curbs silver bar imports to rein in forex demand", "summary": "The Indian government has moved silver bars from the 'free' to the 'restricted' import category, requiring a license for future imports. The move is aimed at conserving foreign exchange amid the West Asia conflict and rising current account pressures. Analysts expect silver ETFs to shift from trading at a discount to a premium over spot prices due to potential supply squeezes.", "category": "Economy", "page": 8, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124067", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/124067"}], "article_id": "4cbec21c"}, {"headline": "Chipmaker stocks emerge as primary driver of S&P 500 rally", "summary": "Shares of semiconductor companies now account for 18% of the S&P 500, the highest level in over two decades. Rallies in firms like Nvidia and Micron have powered the index to record highs despite geopolitical tensions. However, a recent selloff has raised concerns about the durability of the AI-led market surge.", "category": "Technology", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124067", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/124067"}], "article_id": "a78542d8"}, {"headline": "Investors warned to temper equity return expectations as costs rise", "summary": "Kotak Pension Fund's Nilesh Bharkada warns that rising capital costs and crude oil prices above $100 could pressure equity valuations. He notes that while large-cap valuations have corrected to long-term averages, higher inflation may hit consumer demand and lead to downward revisions in corporate earnings growth projections.", "category": "Economy", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124067", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/124067"}], "article_id": "96094780"}, {"headline": "Sattva Group expands premium hospitality pipeline across Indian cities", "summary": "Bengaluru-based Sattva Group plans to invest 10–20% of its turnover into the hotel business, targeting upscale projects in Bengaluru, Hyderabad, and Darjeeling. The expansion focuses on luxury properties and the growing weddings market. High room rates and strong post-pandemic travel demand have made hospitality an attractive asset class for real estate developers.", "category": "Business", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124067", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/124067"}], "article_id": "a3695497"}, {"headline": "Bollywood stars buy back rights to old hit movies", "summary": "Actors like Sanjay Dutt and Shah Rukh Khan are increasingly acquiring the rights to their iconic older films. The trend allows stars to monetize nostalgic intellectual property through remakes, sequels, and licensing on streaming platforms. For original producers, selling these rights provides immediate liquidity for legacy content that might otherwise remain underexploited.", "category": "Culture", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124067", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/124067"}], "article_id": "47977b33"}, {"headline": "Banks use surplus funds to bridge widening credit-deposit gap", "summary": "Public sector banks are utilizing surplus liquidity and short-term RBI borrowings to support loan growth as deposits lag behind. System-level credit grew 16.1% in FY26, while deposits rose only 13.5%. Lenders like SBI are relying on excess statutory liquidity ratio buffers to fund future credit demand while struggling with challenging deposit mobilization.", "category": "Economy", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124067", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/124067"}], "article_id": "e41a2d61"}, {"headline": "Vodafone Idea board approves ₹4,730 crore fund infusion from promoters", "summary": "Vodafone Idea's board has approved a ₹4,730 crore fund infusion from the Aditya Birla Group via equity-convertible warrants. While seen as a positive signal of promoter commitment, analysts say the company still faces a massive funding gap for spectrum liabilities and its ₹45,000-crore capex plan. The firm is still seeking ₹25,000 crore in bank funding.", "category": "Business", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124067", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/124067"}], "article_id": "cc9af2e7"}, {"headline": "Mid-cap IT firms less fearful of AI disruption than large peers", "summary": "India's mid-cap IT firms like Coforge and Persistent Systems outpaced the 'big six' in revenue growth last year. Executives argue that fewer organizational layers and deeper domain focus allow for faster AI adoption. Unlike larger peers who flag AI's deflationary impact on pricing, mid-caps see AI creating new demand areas and productivity reinvestment opportunities.", "category": "Technology", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124067", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/124067"}], "article_id": "ec070ea8"}, {"headline": "Tata Cliq focuses on luxury brands to lead e-commerce race", "summary": "Tata Group's e-commerce platform Tata Cliq is differentiating itself by focusing on premium international brands and luxury experiences. It plans to launch Lululemon stores in India and has hosted online auctions for high-end watches. The strategy targets affluent consumers to stand out in a market dominated by mass-market players like Amazon and Flipkart.", "category": "Business", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124067", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/124067"}], "article_id": "02bae144"}, {"headline": "IRFC plans ₹28,000 crore fundraising via external commercial borrowings", "summary": "Indian Railway Finance Corp (IRFC) intends to raise up to ₹28,000 crore through overseas borrowings in FY27. The funds will support infrastructure projects beyond railways, including metro rail and renewable energy. The company will focus on yen-denominated loans and zero-coupon bonds, leveraging its government backing and low overhead costs.", "category": "Infrastructure", "page": 11, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124067", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/124067"}], "article_id": "37b154eb"}, {"headline": "US regulators probe suspicious betting on political and military events", "summary": "The CFTC and US prosecutors are investigating suspicious wagers on prediction markets like Kalshi and Polymarket tied to political races and military operations. A recent case involved a US soldier betting on the ouster of Venezuela’s President. Regulators are concerned about the use of nonpublic government information and the lack of record-keeping on these exchanges.", "category": "Politics", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124067", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/124067"}], "article_id": "2f9f4ea6"}, {"headline": "Coal makes global comeback as Middle East war disrupts LNG", "summary": "Countries are returning to coal-fired power after the closure of the Strait of Hormuz cut off 20% of global LNG supplies. Taiwan is restarting idled coal plants, and South Korea has increased coal-based electricity by over a third. Spot coal prices have jumped 12% since the conflict began, threatening global climate goals as nations prioritize energy security.", "category": "Environment", "page": 12, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124067", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/124067"}], "article_id": "f5a4abf8"}, {"headline": "Oil shock causes $45 billion hit to the US economy", "summary": "Americans have spent $45 billion more on fuel during the Iran war compared to a year ago, according to OPIS data. The surge in costs is hitting low-income consumers hard while boosting profits for oil and gas companies. While high earners continue to spend on travel, lower-income households are pulling back, widening the economic divide in the US.", "category": "World", "page": 12, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124067", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/124067"}], "article_id": "4ec5a74b"}, {"headline": "Tata Electronics and ASML to build India's first chip fab", "summary": "Tata Electronics has signed a deal with Dutch equipment maker ASML to support India's first 300mm semiconductor fabrication plant in Gujarat. The $11 billion project in Dholera will produce chips for automotive, mobile, and AI sectors. The partnership is a major step in establishing a domestic semiconductor industry and reducing reliance on global supply chains.", "category": "Technology", "page": 13, "importance": 10, "telegram_url": "https://t.me/c/1877410077/124067", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/124067"}], "article_id": "cf182fa6"}, {"headline": "Uranium Corp of India to extract uranium from copper tailings", "summary": "UCIL will set up a recovery plant in Jharkhand to extract uranium from the tailings of state-owned Hindustan Copper Ltd. The project aims to augment domestic supplies of the strategic mineral used in nuclear power and defense. The move follows an understanding between the two public sector units to utilize waste material for mineral extraction.", "category": "Science", "page": 13, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124067", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/124067"}], "article_id": "bf90247f"}, {"headline": "Supreme Court refers Kapur family estate dispute to mediation", "summary": "The Supreme Court has sent a high-profile inheritance battle over the ₹30,000-crore estate of late Sunjay Kapur to mediation. The dispute involves Kapur's children from his marriage to Karisma Kapoor and his widow. The court's decision highlights a preference for resolving promoter-family battles outside traditional litigation through confidential negotiations.", "category": "Law", "page": 13, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124067", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/124067"}], "article_id": "b48cef7d"}, {"headline": "Can India drive on 100% ethanol? Biofuel push faces hurdles", "summary": "India is proposing higher ethanol blends like E85 and E100 for personal vehicles, following Brazil's model. However, experts warn that the transition requires a massive increase in feedstock crops like maize and rice. Concerns remain regarding water usage and the potential displacement of pulses and oilseeds, for which India already pays a massive import bill.", "category": "Environment", "page": 14, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124067", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/124067"}], "article_id": "0d20730d"}, {"headline": "Understanding the limits of Day-1 newborn health insurance coverage", "summary": "While many maternity plans promise newborn cover from birth, policyholders often face hidden 30-day waiting periods for non-emergency hospitalizations. Insurers are regulated to cover internal congenital diseases, but external conditions may still be excluded. Experts recommend these plans primarily for high-risk pregnancies or to ensure coverage without underwriting.", "category": "Health", "page": 15, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124067", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/124067"}], "article_id": "89545708"}, {"headline": "Market crisis from West Asia war damages structural capacity", "summary": "Dhirendra Kumar argues that unlike previous crises affecting sentiment, the current West Asia conflict is damaging physical oil refining capacity. This structural damage could keep prices high for years as infrastructure must be rebuilt. For investors, the impact will be seen in compressed corporate margins and sustained inflation, requiring a shift from the usual 'stay the course' playbook.", "category": "Economy", "page": 15, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124067", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/124067"}], "article_id": "3e2ccf09"}, {"headline": "Motor insurance tips for small fleet and logistics owners", "summary": "Small logistics businesses are advised to look beyond low premiums for commercial vehicle insurance. Essential add-ons include zero depreciation, engine protect, and 'loss of income' cover to minimize business disruption. For city deliveries, 'IMT 23' is valuable as it covers common exterior damage from heavy urban traffic and frequent stop-and-go movement.", "category": "Business", "page": 15, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124067", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/124067"}], "article_id": "2cfa8514"}, {"headline": "Build social capital to resolve India's gold demand dilemma", "summary": "Nitin Pai argues that India's high gold demand is a symptom of a 'social capital deficit' and distrust in civic institutions. While the government tries to discourage gold imports to manage the current account, citizens buy gold for stability. Resolving this requires strengthening accountability in governance and building institutional trust rather than just raising duties.", "category": "Politics", "page": 16, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124067", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/124067"}], "article_id": "08d3f733"}, {"headline": "Agentic AI is likely to transform capitalism and business roles", "summary": "Nitin Pai discusses how AI agents could take over specialized tasks and even management roles, potentially breaking the traditional industrial compact. If AI-driven productivity enriches capital while displacing labour, the state may need to intervene with redistributive policies like universal basic income to sustain overall consumer demand.", "category": "Technology", "page": 16, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124067", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/124067"}], "article_id": "a8b39979"}, {"headline": "Socialist 'people's dividend' talk risks hurting South Korea's stock market", "summary": "South Korea's benchmark Kospi fell following political proposals for an AI 'people's dividend' and windfall taxes on corporate profits. Analysts argue that such socialist rhetoric can stifle capital markets, as seen in China's previous 'common prosperity' drive. Korea's semiconductor boom should be allowed to flourish to attract global investors.", "category": "World", "page": 17, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124067", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/124067"}], "article_id": "052c761b"}, {"headline": "India needs austerity for the rich and security for vulnerable", "summary": "Rajrishi Singhal highlights the need for fiscal prudence as the Iran war's effects hit India's trade balance and inflation. While the PM has called for austerity, the column argues that the privileged should lead by reducing extravagance, such as private jet usage, while the government ensures a safety net for the poor who bear the brunt of rising fuel and food costs.", "category": "Economy", "page": 17, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124067", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/124067"}], "article_id": "91c89814"}, {"headline": "Chemical fertilizer cutbacks could improve Indian soil health and exports", "summary": "Excessive use of nitrogen-based fertilizers in India has led to severe soil degradation, with 82% of samples showing low organic carbon. Reducing chemical fertilizer use by 25–50% could help India meet strict EU sustainability standards and avoid export rejections. Improving soil health requires a shift toward bio-fertilizers and balanced nutrient management.", "category": "Environment", "page": 17, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124067", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint Delhi 18-05-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/124067"}], "article_id": "965a0148"}, {"headline": "India routes food exports via Oman to avoid Strait of Hormuz", "summary": "New Delhi is using Omani ports and land bridges to continue $11.8 billion in food exports to West Asia. The strategy bypasses the Strait of Hormuz amid regional conflict. Port of Salalah and Duqm are key accessible hubs. India's exports to the region fell 28% in April due to shipping disruptions.", "category": "Economy", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/124065", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 18-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124065"}], "article_id": "0b01f3a6"}, {"headline": "Government to notify final CAFE III fuel efficiency norms", "summary": "The Ministry of Power is expected to notify Corporate Average Fuel Economy (CAFE) III norms by May-end. The rules were recalibrated to align with India’s E25 ethanol roadmap. The norms will influence automaker investments in electric, hybrid, and flex-fuel vehicles through the end of the decade.", "category": "Environment", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124065", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 18-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124065"}], "article_id": "ee44c3ef"}, {"headline": "Indian automobile exports jump 38 percent in April", "summary": "India’s vehicle exports rose 38% year-on-year in April despite global trade tensions. Growth was driven by motorcycles, passenger vehicles, and three-wheelers. Two-wheelers performed strongly, with Hero MotoCorp and Bajaj Auto expanding in Africa and Latin America. Stabilized supply chains and demand for fuel-efficient vehicles aided the surge.", "category": "Economy", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124065", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 18-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124065"}], "article_id": "0d75ba3a"}, {"headline": "New Tamil Nadu government faces decision on Parandur greenfield airport", "summary": "The Tamilaga Vettri Kazhagam (TVK) government must decide whether to proceed with the ₹20,000 crore second airport for Chennai at Parandur. While the previous administration began land acquisition, residents and farmers are protesting. Scrapping the project could cause Chennai to lose industrial ground to Hyderabad and Bengaluru.", "category": "Infrastructure", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124065", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 18-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124065"}], "article_id": "7ba3447c"}, {"headline": "Muthoot FinCorp to use ₹4,000 crore IPO for business growth", "summary": "Muthoot FinCorp Ltd plans a ₹4,000 crore initial public offering to capitalize on strong gold loan growth and regulatory clarity. CEO Shaji Varghese stated the fresh issue proceeds will fund expansion. The company’s assets under management grew 75% to ₹56,185 crore in FY26, with net profits reaching ₹1,640 crore.", "category": "Business", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124065", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 18-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124065"}], "article_id": "2a2c303d"}, {"headline": "Speculation over second Bengaluru airport triggers land price surge", "summary": "Land activity has spiked in southern and western Bengaluru outskirts like Kanakapura Road and Nelamangala ahead of a location finalization for the city's second airport. Prices in the Harohalli belt have doubled in eight months. Investors and developers are banking on long-term infrastructure-led growth similar to the Devanahalli boom.", "category": "Infrastructure", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124065", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 18-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124065"}], "article_id": "195c3fc2"}, {"headline": "HFCL secures ₹106 crore overseas order for optical fibre cables", "summary": "Telecom equipment manufacturer HFCL has bagged a $11.07 million (₹106 crore) contract to supply optical fibre cables internationally. The project must be completed by August. HFCL exported 70% of its cable production in FY26 and recently secured a separate $1.1 billion long-term supply deal.", "category": "Business", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124065", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 18-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124065"}], "article_id": "abd24515"}, {"headline": "Government establishes advanced shoe testing laboratory in Ghaziabad", "summary": "The National Test House has set up a state-of-the-art footwear testing lab under the Department of Consumer Affairs. The facility provides high-precision testing for safety, industrial, and leather shoes. Located near manufacturing clusters in Agra and Kanpur, the lab aims to help MSMEs meet Indian quality standards for domestic and export markets.", "category": "India", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124065", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 18-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124065"}], "article_id": "b03bdfd7"}, {"headline": "Arvind Fashions repositions Flying Machine brand for Gen-Z consumers", "summary": "Legacy denim brand Flying Machine is pivoting to unisex styling and digital-first engagement to capture the youth market. Arvind Fashions, which recently bought back Flipkart's stake in the brand, plans to launch a D2C platform in late FY27. The brand saw double-digit retail growth in Q4 FY26 as Silhouettes shifted toward relaxed streetwear.", "category": "Business", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124065", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 18-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/124065"}], "article_id": "046117a4"}, {"headline": "Government approves ₹37,500 crore scheme for surface coal gasification", "summary": "India is revitalizing its coal gasification programme with a new ₹37,500 crore incentive scheme. The goal is to convert domestic coal into syngas for methanol, ammonia, and hydrogen production. Experts suggest utilizing non-slagging gasifiers for India's high-ash coal to achieve clean hydrogen production at an estimated cost of $1.25 per kg.", "category": "Science", "page": 7, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124065", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 18-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/124065"}], "article_id": "adf12288"}, {"headline": "IIT Kanpur develops metamaterial antennas for advanced military communication", "summary": "Researchers at IIT Kanpur are designing smaller, lighter antennas using specially engineered metamaterials to manipulate radio waves. These antennas are intended for military aircraft and vehicles, supporting high-speed data transmission and secure connectivity in difficult terrains. The technology also has applications in disaster management and radar systems.", "category": "Science", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124065", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 18-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/124065"}], "article_id": "7c9214d9"}, {"headline": "Bengaluru scientists develop energy-storing material that indicates charge via colour", "summary": "Scientists at the Centre for Nano and Soft Matter Sciences have created a molybdenum-tungsten oxide compound that changes from blue to transparent as it discharges. The material functions as a supercapacitor electrode with high stability over 10,000 cycles. It could lead to smart energy devices and windows that visually show battery levels.", "category": "Science", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124065", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 18-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/124065"}], "article_id": "12e93333"}, {"headline": "Sabari Rail project gets ₹505 crore allocation in Union Budget", "summary": "The 111-km Angamaly–Erumeli Sabari Rail project has received a fresh ₹505 crore allocation. Stalled for 25 years, the line would link central Travancore to the Sabarimala pilgrim center. The project is expected to boost local agro-industries like rubber and pineapple by providing cost-effective rail transport to north Indian markets.", "category": "Infrastructure", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124065", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 18-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/124065"}], "article_id": "0681e079"}, {"headline": "Successful seaplane trial landing completed at Agatti in Lakshadweep", "summary": "A DHC6-400 Twin Otter aircraft successfully landed at the Agatti Waterdrome, marking a step toward commercial seaplane services in Lakshadweep. The initiative seeks to link Cochin International Airport with several islands to boost tourism. Regular operations with 9-10 passenger capacity are expected to begin shortly under Skyhop management.", "category": "Infrastructure", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124065", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 18-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/124065"}], "article_id": "2b3acb3e"}, {"headline": "Biman Bangladesh Airlines orders 14 Boeing aircraft to modernize fleet", "summary": "Biman Bangladesh has placed its largest ever order for 10 Boeing 787 Dreamliners and four 737 MAX planes. The order includes eight 787-10 variants to serve high-demand West Asia routes. The expansion aims to modernize the state-owned carrier's fleet and increase passenger and cargo capacity across Europe, North America, and Asia.", "category": "Business", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124065", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 18-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/124065"}], "article_id": "38ce3a24"}, {"headline": "Indian drugmakers pursue global acquisitions to boost innovation portfolios", "summary": "Sun Pharmaceuticals recently acquired Organon for $12 billion, while Zydus Pharma bought Assertio Holdings for $166.4 million. These moves reflect a shift among Indian pharmaceutical firms to move beyond generic manufacturing into specialized cancer medicines and biologics. High cash reserves are enabling domestic firms to buy innovation in regulated markets.", "category": "Health", "page": 9, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124065", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 18-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/124065"}], "article_id": "d69bfa9d"}, {"headline": "FDA seeks input on repurposing approved drugs for new indications", "summary": "The US Food and Drug Administration is requesting scientific data to support new uses for existing approved drugs. Repurposing can address unmet medical needs in metabolic, neurodegenerative, and rare diseases by leveraging existing safety profiles. The move aims to update drug labeling and provide clinicians with more treatment options for various conditions.", "category": "Health", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124065", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 18-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/124065"}], "article_id": "63699daf"}, {"headline": "Gavi to invest $189 million in African vaccine manufacturing sector", "summary": "Gavi, the Vaccine Alliance, announced a $189 million investment to develop Africa's vaccine production capabilities. The African Vaccine Manufacturing Accelerator (AVMA) will provide demand guarantees and financial support for local producers. The first Africa-manufactured vaccines supported by this initiative are expected to be deployed as early as 2027.", "category": "Health", "page": 9, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124065", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 18-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/124065"}], "article_id": "b72a79c3"}, {"headline": "Nasscom chief urges Indian firms to double technology investment", "summary": "Srikanth Velamakanni, the new Nasscom Chairperson, stated that Indian companies must double their tech spending from 2.5% to 4.5% of GDP to remain competitive. He emphasized that the global demand for software will increase 1,000-fold in the AI age. Velamakanni also called for strategies that prioritize India's technological and AI sovereignty.", "category": "Technology", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124065", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 18-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/124065"}], "article_id": "7f05424c"}, {"headline": "AI and immigration policies threaten entry-level global tech jobs", "summary": "Tightening visa norms in the US, UK, and Canada, combined with AI automation, are making global employment harder for Indian graduates. Proposed H-1B wage-based selection processes favor experienced workers over entry-level candidates. Industry experts warn that routine software roles are increasingly vulnerable to AI, shifting immigration toward specialized skills.", "category": "Education", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124065", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 18-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/124065"}], "article_id": "ea41cecf"}, {"headline": "Indian firms monitor bid for Hambantota airport in Sri Lanka", "summary": "India is tracking Sri Lanka's offer to lease the Mattala Rajapaksa International Airport near the China-controlled Hambantota port. The 30-year build-operate-transfer model could provide Indian firms with a strategic foothold in the Indian Ocean. Expressions of interest are due by June 9 for the airport, which currently has low traffic volumes.", "category": "Infrastructure", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124065", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 18-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/124065"}], "article_id": "b4f22aba"}, {"headline": "KFC and Burger King report strong same-store sales growth", "summary": "Leading QSR chains reported robust performance in the March quarter. KFC India saw a 4.9% same-store sales growth, its highest in 14 quarters, while Burger King recorded a 6.3% increase. Expansion plans remain aggressive, with Westlife Foodworld (McDonald's) aiming for 60+ new restaurants annually. Growth is fueled by menu innovation and value offerings.", "category": "Business", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124065", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 18-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/124065"}], "article_id": "eed798b5"}, {"headline": "AIADMK leadership crisis deepens as rival faction challenges Palaniswami", "summary": "Edappadi K. Palaniswami is facing a major leadership challenge within the AIADMK, with more than half of the party’s 46 MLAs reportedly supporting a rival faction. The split became evident during a recent Confidence Motion. The Assembly Speaker's decision on the party whip's status will determine the next steps for the fractured opposition party in Tamil Nadu.", "category": "Politics", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124065", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 18-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124065"}], "article_id": "bda9b979"}, {"headline": "Experts say Rupee unlikely to breach 100 per dollar soon", "summary": "Market participants believe the Indian rupee is unlikely to touch the 100/$ mark in the next six months unless oil prices exceed $125 per barrel and foreign outflows persist. The currency hit a record closing low of 95.97 on May 15 due to surging crude prices and a widening trade deficit. Most analysts expect the rupee to stabilize between 94 and 97 in the near term.", "category": "Economy", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "840d316c"}, {"headline": "Centre urges Big Tech to invest in West Bengal data centres", "summary": "The central government has approached global firms like Google, Amazon, and Microsoft, along with Reliance and Adani, to invest in data centres and R&D hubs in West Bengal. The initiative aims to revive industrial growth in the state, which currently accounts for only 2.1% of India’s software exports. Investment announcements are expected to be finalized by June.", "category": "Economy", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "84ae9a2b"}, {"headline": "Dr Reddy's CEO predicts biosimilars to surpass generics by early 2030s", "summary": "Dr Reddy’s CEO Erez Israeli expects biosimilars to become a major growth engine, potentially overtaking traditional generics in the US market by the early 2030s. The company is focusing on semaglutide variants and peptides, with manufacturing capacity expected to ease by late 2026. Dr Reddy's is targeting oncology as a primary leadership area across more than 80 global markets.", "category": "Business", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "030b1e7e"}, {"headline": "Digital payments to receive real-time risk scores to curb fraud", "summary": "The Indian Digital Payment Intelligence Corporation will soon assign real-time risk scores to digital transactions to identify mule accounts. Developed by the RBI Innovation Hub, the 'mulehunter.ai' tool helps create a registry of suspect accounts shared among banks. The system aims to detect and prevent cyber frauds such as digital arrests and investment scams in real time.", "category": "Technology", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "a0be33df"}, {"headline": "States utilize only 77% of budgeted capex in FY26", "summary": "Analysis of 20 states shows combined capital expenditure utilization fell to 77.23% of budgeted estimates in FY26, down from 80.23% in FY25. Telangana led with 147.58% utilization, while West Bengal spent the least at 48.06%. The decline in spending pace occurred despite higher overall outlays. States collected 91.64% of their budgeted tax revenue during the same period.", "category": "Economy", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "4105ca27"}, {"headline": "Silver ETFs likely to trade at premium following import curbs", "summary": "Silver exchange-traded funds (ETFs) are expected to trade at a premium to spot prices due to anticipated supply constraints in the physical market. This follows new government restrictions on silver imports. When ETFs cannot procure enough physical silver to create new units, market prices often deviate from the underlying net asset value due to high investor demand.", "category": "Business", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "7ec0002d"}, {"headline": "India's top carmakers plan major capacity expansion for FY27", "summary": "Leading passenger vehicle makers are ramping up investments and capacity despite global headwinds. Maruti Suzuki is expanding annual capacity to 2.9 million units, while Hyundai invests Rs 6,800 crore in its Talegaon plant. Industry sales hit a record 4.66 million units in FY26, with 5-7% growth expected in FY27. Utility vehicles now account for 69% of the total market share.", "category": "Business", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "6e2eb2cd"}, {"headline": "India emerges as the largest global market for Nestlé KitKat", "summary": "India has surpassed other countries to become the biggest market for KitKat, driven by product innovation and aggressive marketing. A decade ago, India ranked 10th globally for the brand. KitKat is now the second Nestlé brand, after Maggi, for which India is the top market. The growth highlights India's increasing significance for global consumer goods companies.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "8429c4e1"}, {"headline": "Paramotor Digital Technology files confidential IPO papers with Sebi", "summary": "Fintech firm Paramotor Digital Technology has submitted draft papers for an initial public offering (IPO) via the confidential pre-filing route. This allows the company to keep financial details private until closer to the launch. Motilal Oswal and Equirus Capital are the lead managers. The route is increasingly favored by firms seeking flexibility in the listing process.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "a1048581"}, {"headline": "Migration for blue-collar jobs in India rises by 31%", "summary": "Job-related migration among blue- and grey-collar workers grew by 31.4% year-on-year during January-April 2026. A report by WorkIndia shows 8.6 million applications for out-of-city jobs, outpacing local job interest. The trend is driven by women and freshers seeking better pay in urban hubs. Cross-city worker movement is now expanding 1.5 times faster than same-city hiring.", "category": "India", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "f4f5fbd4"}, {"headline": "Cancer care infrastructure expands into India's Tier-II and Tier-III cities", "summary": "Hospitals and diagnostics firms are decentralizing oncology services to meet rising demand in smaller cities. Companies like 4baseCare are expanding into Srinagar and Guwahati to provide advanced genomic testing. The shift aims to reduce the financial burden on families traveling to metros. Non-medical expenses can account for nearly half the total treatment cost for rural patients.", "category": "Health", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "51602bb1"}, {"headline": "PM's work-from-home appeal boosts demand for flexible workspaces", "summary": "Prime Minister Narendra Modi’s call for work-from-home (WFH) to conserve fuel is driving demand for managed workspaces. Flex leasing rose 77% year-on-year in Q1 2026. Experts see this as a response to West Asia oil pressures rather than a structural shift. Companies are adopting hub-and-spoke models, placing smaller offices closer to employee residences to optimize costs.", "category": "Business", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "f0614f5a"}, {"headline": "LTTS aims for 500 AI patents within next three years", "summary": "L&T Technology Services (LTTS) plans to more than double its AI and Generative AI patent portfolio to 500 by 2029. The firm currently has 237 AI-related filings. The strategy focuses on software-defined vehicles, energy automation, and medical technologies. CTO Ashish Khushu noted that adoption in manufacturing is growing as firms move from proof-of-concept to implementation.", "category": "Technology", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "a57e0add"}, {"headline": "Industry body FAITH calls for international marketing to boost tourism", "summary": "FAITH Chairman Puneet Chhatwal stated that India must ramp up global marketing to increase foreign exchange earnings from tourism. While forex earnings have risen, foreign tourist arrivals remain below pre-pandemic levels. The government has reduced the overseas promotion budget for FY27 to Rs 3.5 crore, which industry leaders warn could hinder the goal of 100 million arrivals by 2047.", "category": "Economy", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "30d4581d"}, {"headline": "Ambuja Cements moderates FY27 capex amid project execution challenges", "summary": "Ambuja Cements will limit its FY27 capital expenditure to Rs 6,000-6,500 crore, down from Rs 7,500 crore, to focus on completing current projects. Director Karan Adani cited contractor issues and incomplete engineering as reasons for delays. The company is 'pausing and correcting' its strategy to ensure execution meets group standards before launching new expansion initiatives.", "category": "Business", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "a2a1308b"}, {"headline": "Power ministry develops framework to rationalize fixed electricity charges", "summary": "The Union power ministry is working on a national framework to help distribution utilities recover fixed costs more effectively. Fixed costs account for 56% of discom revenue requirements but only 9% of current recoveries. The proposal includes standardizing two-part tariffs and creating separate categories for net-metering consumers to address liquidity crises and stranded costs.", "category": "Infrastructure", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "cfb4a5ae"}, {"headline": "ULIPs dominate private life insurance product mix in FY26", "summary": "Unit-linked insurance plans (ULIPs) remain the largest contributor to annualised premium equivalent for major private insurers, despite a push for protection products. At SBI Life, ULIPs accounted for 60% of business. HDFC Life saw ULIP share rise to 44%. While GST exemptions have boosted retail protection demand, linked products continue to lead due to strong equity market appetite.", "category": "Business", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "23e71e2b"}, {"headline": "India needs Rs 25 trillion for 100 Gw nuclear target", "summary": "A report by TERI suggests India requires an investment of Rs 23-25 trillion to reach 100 Gw of nuclear power capacity by 2047. The country must add 4.5 Gw annually after 2030 to meet this goal. Current capacity stands at 8.8 Gw. The report recommends special purpose vehicles and private-sector participation to de-risk projects and build a competitive domestic supply chain.", "category": "Infrastructure", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "47ba21c2"}, {"headline": "Muthoot Fincorp plans Rs 4,000 crore IPO and stock split", "summary": "Muthoot Fincorp’s board has approved an initial public offering to raise up to Rs 4,000 crore through fresh equity. The board also approved a 1:5 stock split, reducing the face value of shares from Rs 10 to Rs 2. The NBFC reported a net profit of Rs 1,640 crore for FY26. Additionally, the company plans to raise funds via non-convertible debentures and commercial papers.", "category": "Business", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "94156fcd"}, {"headline": "LPG vessel reaches Gujarat after crossing Strait of Hormuz", "summary": "A vessel carrying 20,000 tonnes of Liquefied Petroleum Gas arrived at Kandla's Deendayal Port from Qatar, successfully navigating the Strait of Hormuz. The arrival comes amid heightened tensions and recent attacks on commercial shipping in the region. Indian officials reiterated that targeting civilian crews and impeding freedom of navigation is unacceptable.", "category": "Economy", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "f974b75b"}, {"headline": "Maharashtra to implement farm loan waiver before June 30", "summary": "Chief Minister Devendra Fadnavis announced that the Maharashtra government is in the final stages of preparing a farm loan waiver, to be rolled out by June 30. The cabinet has sought data from various districts to finalize the implementation. The move is expected to provide significant relief to the state's agricultural sector following recent cabinet discussions.", "category": "Politics", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "02b79d90"}, {"headline": "Vodafone Idea reports Rs 51,970 crore profit on exceptional gain", "summary": "Vodafone Idea posted a quarterly net profit of Rs 51,970 crore, primarily due to a one-time exceptional gain of Rs 58,116 crore. This gain followed the government's reduction of adjusted gross revenue (AGR) dues and a reassessment of future liabilities. Without this accounting adjustment, the telecom operator would have continued to report significant losses.", "category": "Business", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "922a9fd3"}, {"headline": "Government imposes license requirement for silver imports", "summary": "The Indian government has placed silver imports under the 'restricted' category, requiring a government-issued license for all shipments. This follows a recent duty hike on silver from 6% to 15%. The move aims to curb surging imports and manage the trade deficit. Commodities under this category cannot be imported freely by traders without specific authorization.", "category": "Economy", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "3539d22d"}, {"headline": "Andhra Pradesh CM promises cash aid for families with more children", "summary": "CM N Chandrababu Naidu announced incentives of Rs 30,000 for a third child and Rs 40,000 for a fourth child to counter the state's declining population growth. The policy aims to reverse demographic trends in Andhra Pradesh. This follows earlier proposals for incentives for second children, marking a shift in the state's population management strategy.", "category": "Politics", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "092fcbd6"}, {"headline": "CBSE mandates three-language study for Class 9 students", "summary": "The CBSE has made it compulsory for students in Class 9 to study three languages. The board clarified that while new textbooks are being prepared, students should use existing Class 6 textbooks for their chosen third language during the 2026-27 transition period. The move is part of the implementation of the new educational framework focusing on multilingualism.", "category": "Education", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "f3667b43"}, {"headline": "India's merchandise exports rise 13.8% in April to $43.56 billion", "summary": "India's goods exports grew to $43.56 billion in April, driven by a surge in shipments to smaller markets like Sri Lanka and Singapore. While exports to some West Asian nations declined due to conflict, strong growth was recorded in petroleum products and to markets like China and Australia. Singapore replaced the UAE as India’s second-largest export destination for the month.", "category": "Economy", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "f8d2e47f"}, {"headline": "Fertiliser imports from China jump 173% in FY26", "summary": "India's fertiliser imports from China reached 5.02 million tonnes in FY26, a massive 173% increase over the previous year. Russia remained the top exporter to India with 6.8 million tonnes. Meanwhile, Iran and Saudi Arabia continued to be the largest buyers of Indian basmati rice, with Iran increasing its purchase volume by 17% despite regional tensions.", "category": "Economy", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "07f261bb"}, {"headline": "CSB Bank to diversify growth beyond gold loans", "summary": "CSB Bank MD & CEO Pralay Mondal stated the bank will no longer depend solely on gold loans for growth as it enters its 'Scale' phase. The bank's net profit grew 6% in Q4, with gross NPAs improving to 1.66%. The strategy involves expanding retail and SME franchises while leveraging a new technology transformation to granularize its deposit base.", "category": "Business", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "e4426ca3"}, {"headline": "Meghalaya CM Sangma calls for localized Act East Policy", "summary": "Meghalaya CM Conrad Sangma emphasized that the Act East Policy must be zoned specifically for the Northeast to unlock its potential. He advocated for reopening trade routes with Bangladesh, such as the Hili-Mahendraganj stretch, to boost the regional economy. Sangma noted that his government's focus on ease of doing business has doubled the state's economy in five years.", "category": "Politics", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "2d0a4bcf"}, {"headline": "Proposed sugarcane rule changes spark farmer protests in UP", "summary": "New draft amendments to the Sugarcane (Control) Order have caused unease in western Uttar Pradesh. Farmer groups claim provisions requiring small jaggery and khandsari units to pay government-fixed rates could hurt local micro-enterprises. These units consume 15-25% of India's cane. Proponents of the rules seek to standardize payments and increase transparency in the unorganized sector.", "category": "Politics", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "f943d550"}, {"headline": "US considers tariffs on Chinese overcapacity exports", "summary": "US Trade Representative Jamieson Greer stated the Trump administration will consider tariffs and quotas if investigations prove Chinese industrial overcapacity is harming global trade. The US also expects a double-digit increase in Chinese purchases of American farm products following a recent summit. The move signals a return to aggressive trade probes to protect domestic industries.", "category": "World", "page": 8, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "4058fb7d"}, {"headline": "South Korea warns of massive losses from potential Samsung strike", "summary": "The South Korean government may use emergency arbitration to prevent a strike at Samsung Electronics, warning that a single day of suspension could cause $667 million in direct losses. As the tech giant accounts for nearly 25% of national exports, officials fear long-term economic damage. Mediation talks between the world's largest memory chip maker and the labor union are set to resume.", "category": "World", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "602e33c6"}, {"headline": "Turkey faces birthrate crisis as fertility falls to record low", "summary": "President Erdogan's push for larger families is failing as Turkey's fertility rate dropped to 1.48 in 2024, well below the replacement level of 2.1. Parents cite high inflation and the cost of living as primary barriers to having more children. Despite new government incentives, including expanded parental leave and monthly stipends, urban lifestyles and dual incomes are reshaping family sizes.", "category": "World", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "7e4355a6"}, {"headline": "Mutual funds' share in Indian stocks hits record 23%", "summary": "The mutual fund industry is consistently narrowing the gap with LIC in the Indian stock market. MFs now hold 22.92% of free-float market capitalization as of March 2026, up from 7.06% in 2012. Conversely, LIC’s share has dropped to 7.42% from 10.67% in the same period. This marks the fifth consecutive year of MFs increasing their lead over the state-run insurer in public equity holdings.", "category": "Business", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "b3cf1b8c"}, {"headline": "Active equity funds regain lead in new account additions", "summary": "Active equity mutual fund schemes added 1.5 million new folios between February and April 2026, overtaking commodity ETFs. Gold and silver ETFs saw a sharp slowdown in interest, with a net decline of 20,000 accounts in April alone. Flexicap, midcap, and smallcap funds remain the preferred choice for retail investors seeking entry points during recent market corrections.", "category": "Business", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "4ff81d71"}, {"headline": "PFRDA launches new retirement income options for NPS subscribers", "summary": "The PFRDA has introduced the Retirement Income Scheme (RIS) for NPS investors, offering lifecycle asset allocation during the withdrawal phase. Two drawdown options, SPR and SUR, allow for systematic payouts until age 85. Additionally, the regulator now permits the surrender of annuities in cases of critical illness, providing much-needed liquidity for medical emergencies.", "category": "Economy", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "b8f529db"}, {"headline": "Consumer court upholds insurance rejection due to lack of proof", "summary": "The National Consumer Commission dismissed a claim by a cold storage firm against Reliance General Insurance, ruling that a roof collapse could not be linked to insured risks like storms or floods. The commission noted the claimant failed to provide meteorological evidence of extreme weather. The case highlights the importance of establishing a direct link between the peril and the loss.", "category": "Law", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "18513de9"}, {"headline": "Dubai scraps minimum property value for residency visa eligibility", "summary": "Dubai has removed the 750,000 dirham minimum property value requirement for individual investors to qualify for a two-year residency visa. The move is expected to attract more Indian mid-income professionals. This change allows buyers of studios and one-bedroom apartments in mid-market areas like JVC to secure residency, broadening market participation beyond premium segments.", "category": "Business", "page": 20, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "5a7bfd45"}, {"headline": "Russian Su-57 seen as only rapid stealth option for IAF", "summary": "Defense sources indicate the Sukhoi Su-57 is the only viable option for the Indian Air Force to quickly acquire stealth capabilities amid regional military upgrades. While India's indigenous AMCA project continues, the Su-57 could bridge immediate gaps. However, finalizing the purchase of 114 Rafale jets remains the priority to arrest the decline in total fighter squadron strength.", "category": "India", "page": 20, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "8c21faec"}, {"headline": "CBSE slashes revaluation and answer sheet copy fees", "summary": "Following backlash over Class XII results and the new Online Scoring Mechanism, CBSE has reduced fees for marks verification to Rs 100 and re-evaluation to Rs 25 per question. Scanned copies of answer sheets will now cost Rs 100, down from Rs 700. The board also noted that fees will be refunded if marks increase, addressing concerns over unusually low scores and unchecked answers.", "category": "Education", "page": 20, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "c82cd0b1"}, {"headline": "RBI signals shift in fintech oversight toward stricter governance", "summary": "The Reserve Bank of India is moving toward regulating fintech activities similarly to banks, following the Paytm Payments Bank crisis. The regulator is prioritizing risk management and customer protection over aggressive growth. Fintech funding has slowed, with investors seeking profitability and capital efficiency. Experts warn that 'cleverness' can no longer substitute for a compliance-first culture.", "category": "Business", "page": 20, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124091", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 18-05-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/124091"}], "article_id": "ea970e0d"}, {"headline": "Delhi auto and taxi unions demand fare hike after CNG price rise", "summary": "Compressed natural gas (CNG) prices in Delhi rose to over ₹80 per kilogram following two hikes in 48 hours. Indraprastha Gas Ltd increased the rate to ₹80.09 per kg. Auto and taxi unions have called for a rollback or a fare revision, describing the increase as an unbearable financial burden. The price of piped natural gas for households remains unchanged for now.", "category": "Economy", "page": 1, "importance": 4, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "39fde498"}, {"headline": "Delhi government approves 10 new locations for air quality monitori
