ity on par with other metros.", "category": "Infrastructure", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117498", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 19-03.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117498"}]}, {"headline": "Bengaluru Dy CM Seeks Relaxation of Airport Building Norms", "summary": "Karnataka Deputy CM DK Shivakumar urged the Centre to relax building height restrictions around Bengaluru airports, citing impact on urban development and real estate. He seeks parity with cities like Hyderabad and Mumbai and will meet the defence minister.", "category": "Infrastructure", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117476", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117476"}]}, {"headline": "Karnataka Eyes Japan Partnership for Bengaluru Smart City Solutions", "summary": "Karnataka plans to explore collaboration with Japan on smart city initiatives in Bengaluru, focusing on water, waste, and energy management. The model will enable Japanese companies to partner with cities globally to design and implement urban solutions, backed by government support.", "category": "Infrastructure", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117476", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117476"}]}, {"headline": "Railways receives record ₹2.78 lakh crore allocation for 2026-27", "summary": "Railways Minister Ashwini Vaishnaw highlighted a record ₹2.78 lakh crore allocation for 2026-27 as the Lok Sabha cleared grants. He noted the merger of the railway budget with the general budget strengthened finances, enabling decisions and technology adoption. Infrastructure development and capacity expansion are key focus areas.", "category": "Infrastructure", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117491", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "Uranium projects in Rajasthan, Chhattisgarh near approval", "summary": "Union Minister Jitendra Singh informed the Lok Sabha that Uranium Corporation of India Ltd (UCIL) is establishing uranium mining and processing plants (2,500 TPD capacity) at Rohil (Rajasthan) and Jajwal (Chhattisgarh). These projects are in various stages of obtaining statutory clearances.", "category": "Infrastructure", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117491", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "Karnataka seeks fast-tracking of Bengaluru's 2nd airport, Sky Deck", "summary": "Karnataka Deputy CM DK Shivakumar urged Union Civil Aviation Minister Kinjarapu Rammohan Naidu to expedite a second airport for Bengaluru and a Sky Deck project. Traffic at the current airport is rising, but the new airport faces site selection and regulatory hurdles. Karnataka aims to strengthen aviation infrastructure.", "category": "Infrastructure", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117491", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "Centre to establish 100 plug-and-play industrial parks", "summary": "The Centre launched the ₹33,660-crore Bharat Audyogik Vikas Yojna (Bhavya) to create 100 industrial parks across 100-1,000 acres, starting FY27. These parks will offer ready land and infrastructure, aiming to generate 15 lakh direct jobs, boost manufacturing, and reduce project gestation periods in India.", "category": "Infrastructure", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117443", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_19-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117443"}]}, {"headline": "Cabinet clears ~33.7K cr BHAVYA scheme for 100 industrial parks", "summary": "The Union Cabinet approved a ~33,660 crore BHAVYA scheme to develop 100 world-class plug-and-play industrial parks across India. The Centre will fund up to ~1 crore per acre and 25% of external connectivity costs. States and private developers can participate through a challenge mode, focusing on high-quality infrastructure and green energy.", "category": "Infrastructure", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117469", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 19-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117469"}]}, {"headline": "Cabinet approves ~2,585 cr plan for small hydro power projects", "summary": "The Union Cabinet approved a ~2,585 crore scheme for small hydro power plants, aiming to set up 1,500 MW capacity over five years until 2031. It will attract ~15,000 crore investment, providing financial assistance capped at ~3.6 crore per MW for projects in north-eastern states and international border districts.", "category": "Infrastructure", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117469", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 19-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117469"}]}, {"headline": "Cabinet approves ~6,969 cr four-lane highway project in UP", "summary": "The Union Cabinet approved a ~6,969 crore project for a 101-kilometre four-lane national highway between Barabanki and Bahraich in Uttar Pradesh. The project will be undertaken in Hybrid Annuity Mode, where NHAI pays 40% upfront and the rest in annuities, accelerating infrastructure development.", "category": "Infrastructure", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117469", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 19-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117469"}]}, {"headline": "BMTC to roll out smart ticketing system with 11,000 digital ETM devices", "summary": "The BMTC is introducing 11,000 advanced smart ETMs for its bus network, enabling instant ticketing, QR code scanning, and cashless payments. The system aims to improve efficiency and commuter convenience.", "category": "Infrastructure", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117435", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -19-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117435"}]}, {"headline": "Procurement gaps hit transport corporations, says Minister", "summary": "Transport Minister Ramalinga Reddy stated that a lack of bus procurement between 2019-2023 has affected state transport corporations. He noted that 9,000 personnel have been recruited since 2023, and 1,173 buses allocated to Kalyana Karnataka region.", "category": "Infrastructure", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117435", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -19-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117435"}]}, {"headline": "Deadline for sleeper bus safety compliance extended", "summary": "The Karnataka Transport Department extended the deadline for sleeper bus safety compliance to March 31, 2026. Operators must adhere to NHRC road safety guidelines and submit compliance reports.", "category": "Infrastructure", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117435", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -19-03-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117435"}]}, {"headline": "Parliamentary Panel Recommends Education Spending Reach Six Percent of GDP", "summary": "A parliamentary committee has urged the Centre to increase public expenditure on education to 6% of the GDP by 2030, as targeted in NEP 2020. The panel highlighted that current spending stands at only 4.06%. It also flagged significant staff shortages at the UGC and AICTE and recommended more than doubling R&D investment to 1.5% of the GDP.", "category": "Education", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117498", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 19-03.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117498"}]}, {"headline": "The elite degree problem", "summary": "India's private higher education increasingly privileges PhDs from elite institutions (IITs, IIMs) for faculty recruitment, risking academic stratification. While these degrees are valuable, this trend devalues doctoral training from other institutions, despite regulatory mandates for uniform standards. The author advocates for transparent, performance-based evaluation over institutional pedigree.", "category": "Education", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117491", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "AI transforms efforts to educate out-of-school girls", "summary": "Safeena Husain, founder of Educate India, describes how AI revolutionized their approach to finding out-of-school girls. By using machine learning to predict villages with high numbers of vulnerable girls, Educate Girls shifted from door-to-door surveys to a more strategic, cost-effective method, accelerating their mission to get every girl into school.", "category": "Education", "page": 14, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117443", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_19-03-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/117443"}]}, {"headline": "Policy engine powers India-UK academic ties: British Council CEO", "summary": "India-UK academic collaboration is rapidly expanding due to a free-trade agreement and India's policy reforms, says Scott McDonald, British Council CEO. Nine UK universities received approval to set up in India, with 15 expected soon. This growth allows the UK to deliver high-quality university education as India becomes an education hub, benefiting both nations' stability.", "category": "Education", "page": 20, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117469", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 19-03-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/117469"}]}, {"headline": "Kristu Jayanti University receives global recognition", "summary": "Kristu Jayanti University's WiCyS Student Chapter was named International Student Chapter of the Year 2026 for fostering cybersecurity learning and promoting women's participation in the field.", "category": "Education", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117435", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -19-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117435"}]}, {"headline": "Kerala to make higher education free for all", "summary": "Kerala, renowned for its high literacy rates, plans to make higher education free for all students. This initiative aims to enhance access to education, reduce financial barriers, and further improve human development indices in the state.", "category": "Education", "page": 6, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117455", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_19-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117455"}]}, {"headline": "Other states' initiatives for education and skill development", "summary": "This section briefly highlights educational and skill development initiatives in other Indian states. It mentions scholarships for girls, support for backward communities, and programs aimed at increasing access to higher education.", "category": "Education", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117455", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_19-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117455"}]}, {"headline": "The quality question in higher education", "summary": "This subsection raises concerns about the quality of higher education despite increasing access. It discusses challenges like inadequate faculty, outdated curricula, and the need for reforms to ensure graduates are industry-ready.", "category": "Education", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117455", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_19-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117455"}]}, {"headline": "Bengaluru cabbie sells assets for son's US leap", "summary": "A Bengaluru cab driver sold his car and wife's gold to fund his son's education and athletic pursuits in the US. His son's exceptional long jump record earned him a scholarship, highlighting family sacrifice for aspirations.", "category": "Education", "page": 12, "importance": 4, "telegram_url": "https://t.me/c/1877410077/117455", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_19-03-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/117455"}]}, {"headline": "Maharashtra Assembly Passes New Wildlife Protection Bill", "summary": "The Maharashtra legislative assembly passed the Wildlife Protection (Maharashtra Amendment) Bill, 2026, aimed at facilitating better management of human-wildlife conflict. Forest minister Ganesh Naik clarified it wouldn't permit hunting wild animals.", "category": "Environment", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/117476", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117476"}]}, {"headline": "Accelerate Clean Energy Adoption Amid War-Fed Ecocide: Reader", "summary": "A reader suggests that wars disrupting fossil fuels may ironically make clean energy economically compelling. Indian businesses, facing volatile fuel prices, have an immediate incentive to accelerate electrification and renewable adoption, urging government support with faster clearances and incentives.", "category": "Environment", "page": 9, "importance": 2, "telegram_url": "https://t.me/c/1877410077/117476", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117476"}]}, {"headline": "India Makes Progress on Sustainable Development Goals", "summary": "India has advanced several SDGs, including clean water, climate action, affordable energy, and economic growth, according to statistics ministry reports. It achieved 100% ODF districts by 2019-20 and increased renewable energy to 22.13% of total installed capacity, with waste recycling infrastructure growth.", "category": "Environment", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117476", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/117476"}]}, {"headline": "Jayant Agro’s Pragati boosts yields, cuts water use in Gujarat castor farms", "summary": "Jayant Agro-Organics Ltd's Project Pragati initiatives in Gujarat's castor belt have certified over 13,500 farmers and 16,000 hectares, resulting in 32% higher yields and nearly 30% lower water consumption. The project strengthens India's position as a key castor supplier and ensures sustainable supply chains.", "category": "Environment", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/117491", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "Govt approves small hydropower policy", "summary": "The Union Cabinet approved a ₹2,584.60 crore small hydropower (SHP) development scheme for FY27-FY31, targeting 1,500 MW capacity. It will benefit hilly/North-Eastern states, leveraging indigenous plant/machinery, and generating 51 lakh person-days of employment. The scheme aims to boost clean energy and socio-economic development.", "category": "Environment", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117491", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "Natural farming shows no yield loss, some gains: Minister", "summary": "Union Agriculture Minister Shivraj Singh Chouhan told Parliament that scientific evidence confirms natural farming leads to no yield loss, and sometimes gains. Over 18 lakh farmers use natural farming on 8 lakh+ hectares. He announced new Pesticide and Seed Acts, and an AI-powered platform 'Bharat Vistaar' for farmer advice.", "category": "Environment", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117491", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "APEC Climate Center issues El Nino Watch, forecasts warming", "summary": "The APEC Climate Center (APCC) issued an El Nino Watch, forecasting a probable warming phase in coming months with above-normal temperatures globally. It predicts below-normal rainfall for parts of the North Pacific, tropical western Atlantic, and India, potentially weakening India's South West monsoon and impacting grain output/food inflation.", "category": "Environment", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117491", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "Grain Ethanol Manufacturers urge ethanol cookstoves rollout", "summary": "The Grain Ethanol Manufacturers Association (GEMA) urged the government to introduce ethanol-based cookstoves as a clean cooking solution for Indian households and commercial users. This diversification of India's clean cooking energy mix could enhance resilience and utilize domestically produced biofuels.", "category": "Environment", "page": 10, "importance": 4, "telegram_url": "https://t.me/c/1877410077/117491", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "Climate stress impacts corporate real-estate assets in India", "summary": "India’s corporate real estate expansion has largely ignored climate risk, leading to vulnerabilities from floods, extreme heat, and infrastructure breakdowns. Climate stress affects property economics through higher cooling and insurance costs, and reduced worker productivity. Companies are beginning to integrate climate hazard maps into site and building design decisions for resilience.", "category": "Environment", "page": 13, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117443", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_19-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/117443"}]}, {"headline": "India’s frogs find allies from citizen science to sanctuaries", "summary": "India has over 450 amphibian species, many threatened by climate change and habitat loss. Conservation efforts and citizen science projects like mapping and call recording are helping protect them.", "category": "Environment", "page": 20, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117435", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -19-03-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/117435"}]}, {"headline": "Drone Logistics May Reduce Need for Standalone Labs", "summary": "Dr. Devi Shetty of Narayana Health believes drone-based logistics could make standalone blood banks and small diagnostic labs obsolete. Narayana Health partnered with Airbound to transport blood samples via drones, reducing delays and improving efficiency, aiming to cut healthcare costs.", "category": "Science", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117476", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117476"}]}, {"headline": "Two Uranium Mine Projects in Clearance Stages", "summary": "Uranium Corporation of India, under Department of Atomic Energy, plans two new uranium mining projects in Sikar district, Rajasthan, and Jajwal, Chhattisgarh. These projects are under various stages of obtaining statutory clearances to increase indigenous uranium mining capability.", "category": "Science", "page": 12, "importance": 4, "telegram_url": "https://t.me/c/1877410077/117476", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/117476"}]}, {"headline": "Centre approves Iffco’s nano NPK fertilisers for commercial use", "summary": "The Centre has approved Iffco’s nano NPK complex fertilisers, including Nano NPK Liquid (8-8-20-10-10-10), for commercial use under the Fertiliser Control Order. These indigenously developed liquid fertilisers are designed for foliar nutrition, aiming to enhance agricultural productivity.", "category": "Science", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/117469", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 19-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117469"}]}, {"headline": "Large Hadron Collider discovers a new particle", "summary": "The Large Hadron Collider has discovered a new particle, 'Xi-cc-plus', which is similar to a proton but four times heavier. Scientists hope it will reveal more about quantum mechanics.", "category": "Science", "page": 20, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117435", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -19-03-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/117435"}]}, {"headline": "Progress in Reducing Child Mortality Slowing Globally", "summary": "A UN report indicates global progress in reducing child mortality is slowing, with 4.9 million children worldwide dying before age five in 2024. While deaths have fallen by more than half since 2000, the pace of decline has slowed by over 60% since 2015, with many deaths preventable.", "category": "Health", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117476", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117476"}]}, {"headline": "India Needs Regulation for Weight-Loss Drug Semaglutide", "summary": "With the patent for semaglutide (Ozempic/Wegovy) expiring, cheaper generics will surge, accelerating its shift from clinical to lifestyle use. India faces a metabolic health crisis, but proactive governance is needed to regulate prescribing, dispensing, and promotion to prevent misuse.", "category": "Health", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117476", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117476"}]}, {"headline": "Zydus, Torrent partner to co-market Semaglutide injection", "summary": "Zydus Lifesciences and Torrent Pharmaceuticals partnered to co-market semaglutide injection in India for diabetes and weight management. Zydus will manufacture and supply the drug, while Torrent Pharma will have semi-exclusive rights to co-market it under the brand Sembolic, leveraging its strong presence in chronic therapies.", "category": "Health", "page": 12, "importance": 4, "telegram_url": "https://t.me/c/1877410077/117491", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "Mankind Pharma acquires Roche’s Rivotril brand for India", "summary": "Mankind Pharma acquired Roche's Rivotril brand for the Indian market, securing exclusive rights for domestic manufacture, marketing, and distribution. This acquisition bolsters Mankind's neurological products portfolio.", "category": "Health", "page": 12, "importance": 3, "telegram_url": "https://t.me/c/1877410077/117491", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "DCGI urges uniform drug licensing rules across states", "summary": "India’s top drug regulator, DCGI, has reiterated the need for states to adopt uniform licensing guidelines for drug manufacturing. This aims to eliminate regional regulatory discrepancies and ensure consistent quality standards and product approvals nationwide.", "category": "Health", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117443", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_19-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117443"}]}, {"headline": "NABL accreditation for Bengaluru Medical College’s Microbiology Dept.", "summary": "The Department of Microbiology at Bangalore Medical College and Research Institute (BMCRI) secured NABL accreditation for four years, valid till 2030. This marks a significant milestone for the institution's testing capabilities.", "category": "Health", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117435", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -19-03-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117435"}]}, {"headline": "Two short workouts weekly keep you fit: Study", "summary": "A new study suggests that two short workout sessions per week are sufficient to maintain fitness. This finding could encourage more people to adopt regular physical activity, benefiting public health.", "category": "Health", "page": 13, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117455", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_19-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/117455"}]}, {"headline": "Cuba vows ‘unbreakable resistance’", "summary": "Cuba's leader stated the U.S. would face 'unbreakable resistance' if it attempted to take over the island nation, responding to U.S. President Trump's remarks. Cuba maintains its right to self-defense against any aggression.", "category": ": World", "page": 16, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117435", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -19-03-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/117435"}]}, {"headline": "Iran Warns Gulf States After Israel Hits South Pars Gas Field", "summary": "Iran declared energy assets in Saudi Arabia, Qatar, and the UAE as legitimate targets following an Israeli attack on its South Pars gas field and Bushehr nuclear plant. The conflict has surged Brent crude prices to over $108 per barrel, impacting global energy supplies and shipping through the Strait of Hormuz. Qatar called the strike \"dangerous and irresponsible.\"", "category": "World", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 19-03.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117498"}, {"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_19-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117443"}]}, {"headline": "Iranian government degraded but appears intact, says US intelligence chief", "summary": "US Director of National Intelligence Tulsi Gabbard stated that Iran's government, while degraded by recent events, \"appears intact.\" She cautioned that Iran and its proxies can still attack US and allied interests in West Asia and would seek to rebuild its missile and UAV forces if the regime survives.", "category": "World", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117491"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_19-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117455"}]}, {"headline": "Airlines Must Allocate 60% of Seats Free, Keep Families Together", "summary": "The civil aviation ministry directed airlines to offer at least 60% of flight seats for free selection and ensure passengers on the same booking are seated together. This move aims to curb arbitrary carrier practices regarding seat selection fees and increase transparency for passengers.", "category": "Business", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 19-03.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117498"}, {"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -19-03-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/117435"}]}, {"headline": "SpiceJet Granted Four Weeks to Deposit ₹144.5 Crore in Maran Dispute", "summary": "The Delhi High Court granted SpiceJet a final four-week extension to deposit ₹144.5 crore in its arbitration dispute with Kalanithi Maran and KAL Airways. The court rejected SpiceJet's plea to offer property instead of cash, citing liquidity issues exacerbated by Gulf route flight cancellations.", "category": "Business", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 19-03.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/117498"}, {"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_19-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117443"}]}, {"headline": "China-bound Russian Oil Tanker Diverted to India", "summary": "A Russian oil tanker, Aqua Titan, initially bound for China, has been diverted to India. This follows the US permitting India to increase Russian oil purchases, leading to at least seven tankers changing course from China to India, impacting global oil prices.", "category": "Business", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117476"}, {"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -19-03-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/117435"}]}, {"headline": "HDFC Bank Chairman Atanu Chakraborty Resigns Abruptly", "summary": "Atanu Chakraborty has resigned as HDFC Bank chairman, citing his \"personal values and ethics\" conflicting with \"happenings and practices\" at the bank. Keki Mistry has been approved as interim part-time chairman, raising investor concerns for India's second-largest company.", "category": "Business", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117476"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_19-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117455"}]}, {"headline": "Axis Bank to Infuse ₹1,500 Crore into NBFC Arm Axis Finance", "summary": "Axis Bank will infuse ₹1,500 crore into its NBFC arm, Axis Finance, via a rights issue by March 2027, following revised RBI guidelines allowing group entities to operate in the same business line. This capital will fuel growth for Axis Finance, which has a ₹4,500 crore AUM.", "category": "Business", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117476"}, {"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117491"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 19-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117469"}]}, {"headline": "Unilever Explores Potential Spinoff of Food Assets", "summary": "Unilever Plc is considering separating its food assets to focus on beauty, personal care, and wellbeing brands. The Anglo-Dutch company is consulting advisers on options, including a potential spinoff or sale of its food business, which could be valued at tens of billions of dollars.", "category": "Business", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/117476"}, {"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_19-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117443"}]}, {"headline": "KKR to Invest $310 Million in PMI Electro for Electric Bus Expansion", "summary": "KKR plans to invest $310 million in PMI Electro Mobility and its e-bus unit Allfleet. This marks KKR’s first climate transition investment in India, with the firm acquiring a majority stake in Allfleet and a minority stake in PMI Electro to boost electric bus manufacturing and expansion.", "category": "Business", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/117476"}, {"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_19-03-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117443"}]}, {"headline": "Bosch, Tata Autocomp Form JV to Manufacture EV Components in India", "summary": "Bosch and Tata Autocomp Systems will form a 50:50 joint venture to manufacture e-axles and electric traction motors in India. The JV, with up to ₹94 crore investment, aims to localize key EV drivetrain components and strengthen India's electric vehicle supply chain.", "category": "Business", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/117476"}, {"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "RBI Clears Bain Capital's ₹4,385 Crore Investment in Manappuram Finance Arms", "summary": "The RBI has approved Bain Capital's ₹4,385 crore investment in Manappuram Finance subsidiaries Asirvad Micro Finance and Manappuram Home Finance. This grants Bain Capital joint control with promoters, with the transaction, including a mandatory open offer, expected by March 31, 2026.", "category": "Business", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117491"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 19-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117469"}]}, {"headline": "Kotak, Federal Bank Eye Standard Chartered's Credit Card Portfolio", "summary": "Kotak Mahindra Bank and Federal Bank are reviewing offers to acquire Standard Chartered’s portfolio of up to 600,000 credit card customers in India. This move aligns with StanChart’s strategy to reduce focus on single-product clients.", "category": "Business", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117491"}, {"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_19-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117443"}]}, {"headline": "BSE Launches New Indices for Hedging Strategies", "summary": "BSE Index Services has launched four new indices: two Long-Short and two Inverse. These indices, including inverse trackers for BSE 200 and BSE 150 Midcap, aim to provide asset managers with tools for benchmarking and building resilient product offerings.", "category": "Business", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117491"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 19-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/117469"}]}, {"headline": "Cube Highways Trust Files for ₹5,000 Crore IPO", "summary": "Cube Highways Trust, an infrastructure investment trust (InvIT), has filed preliminary papers with Sebi for a ₹5,000 crore initial public offering (IPO). The proposed IPO is entirely an offer-for-sale, allowing current shareholders to divest their units in India's first public Invit.", "category": "Business", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117491"}, {"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_19-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117443"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 19-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117469"}]}, {"headline": "Burger Singh Raises ₹82 Crore in Series B Funding", "summary": "Homegrown restaurant chain Burger Singh has secured ₹82 crore in a Series B funding round, led by Artal Asia Pte Ltd, at a valuation of ₹520 crore. The capital will strengthen systems for its franchise-first growth platform.", "category": "Business", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117491"}, {"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_19-03-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117443"}]}, {"headline": "Nazara Technologies to Acquire 50% in Two Spanish Gaming Firms for $100 Million", "summary": "Nazara Technologies will acquire a 50% stake in Spain-based Bluetile Games and BestPlay Systems for $100.3 million, with an option for full ownership later. This marks Nazara's largest M&A deal, aiming to bolster its global gaming platform.", "category": "Business", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_19-03-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117443"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 19-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117469"}]}, {"headline": "Reliance Jio Hires 17 Investment Banks for IPO", "summary": "Reliance Jio Platforms has appointed 17 investment banks for its Mumbai stock listing, which will be an 'offer for sale'. This move allows existing shareholders, including KKR and Silver Lake, to monetize their stakes in the company valued at $180 billion by Jefferies.", "category": "Business", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_19-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117443"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 19-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/117469"}]}, {"headline": "Cabinet Approves ₹33,660 Crore Scheme for 100 Industrial Parks", "summary": "The Union Cabinet approved the Bharat Audyogik Vikas Yojna (BHAVYA) scheme with an outlay of ₹33,660 crore to establish 100 plug-and-play industrial parks. The initiative aims to boost manufacturing, attract investments, and create 15 lakh direct jobs by providing world-class infrastructure.", "category": "Economy", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 19-03.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117498"}, {"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117491"}]}, {"headline": "UAE Implements Measures to Protect War-Affected Economy", "summary": "The UAE Central Bank launched a five-pillar resilience package for banks, enabling them to tap up to 30% of cash reserves. These measures aim to support credit flow, stabilise sentiment, and cushion the economy against disruptions from the Iran-Israel-US conflict.", "category": "Economy", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117476"}]}, {"headline": "India's Direct Tax Collection Rises 7.2% to ₹22.8 Trillion in FY26", "summary": "Net direct tax collections grew 7.2% year-on-year to approximately ₹22.8 trillion as of March 17 in FY26, driven by stronger corporate tax inflows. While lagging the revised estimate, officials expect final filings to narrow the gap.", "category": "Economy", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117476"}, {"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_19-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117443"}]}, {"headline": "Centre Incentivizes States for Promoting Piped Natural Gas", "summary": "The Centre will provide states promoting piped natural gas (PNG) adoption with up to 10% more commercial LPG cylinders. This move aims to secure LPG supply amid West Asia conflict disruptions and encourage a shift from cylinders to PNG.", "category": "Economy", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL- Bangalore 19-03.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117491"}, {"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_19-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117443"}]}, {"headline": "RBI to Conduct ₹75,000 Crore VRR Auction to Infuse Liquidity", "summary": "The Reserve Bank of India will conduct a key market.", "category": "Technology", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_19-03-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117443"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 19-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117469"}]}, {"headline": "Over 100 Stock Brokers Settle Algo Trading Case with Sebi", "summary": "Around 111 stock brokers, including Zerodha and ICICI Securities, settled securities law violations with Sebi by paying a total of ₹1 crore. The case involved their association with algorithmic trading platforms that advertised guaranteed returns.", "category": "Law", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117476"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 19-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/117469"}]}, {"headline": "Kerala Polls: Congress to Contest 95 Seats, IUML 27", "summary": "The Congress-led UDF in Kerala has finalized its seat-sharing for the April 9 polls. The Congress will contest 95 seats, IUML 27, and the Kerala Congress (PJ) 8. The IUML will field two women candidates for the first time.", "category": "Politics", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 19-03.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117498"}, {"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117476"}]}, {"headline": "SC Questions Mamata Banerjee's Presence During ED Raid", "summary": "The Supreme Court criticized West Bengal CM Mamata Banerjee's presence at I-PAC offices during an ED raid, calling it \"not a happy situation\" and questioning if the ED can be left without remedy against obstruction of constitutional functions.", "category": "Politics", "sources": [{"newspaper": "Econo l": "https://t.me/c/1877410077/117435"}]}, {"headline": "Senegal Stripped of Africa Cup of Nations Title; Morocco Declared Champion", "summary": "Senegal has been stripped of its Africa Cup of Nations title, with Morocco declared champion by the CAF. The decision came after Senegalese players walked off the pitch during the final, and Senegal plans to appeal.", "category": "Sports", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -19-03-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/117435"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_19-03-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/117455"}]}, {"headline": "Cabinet Approves ₹33,660 Cr Scheme for 100 Industrial Parks", "summary": "The Union Cabinet approved the Bharat Audyogik Vikas Yojna (BHAVYA) scheme to develop 100 'plug-and-play' industrial parks by 2032, integrated with PM GatiShakti. The ₹33,660 crore plan aims to boost manufacturing and create 1.5 million direct jobs.", "category": "Infrastructure", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET-Bengaluru-19-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117476"}, {"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -19-03-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/117435"}]}]};
const CAT_META = {"Politics": {"color": "#e8334a", "icon": "🏛️"}, "Economy": {"color": "#f5a623", "icon": "📊"}, "Business": {"color": "#f0c040", "icon": "💼"}, "India": {"color": "#ff7043", "icon": "🇮🇳"}, "World": {"color": "#5c9eff", "icon": "🌍"}, "Sports": {"color": "#36c46f", "icon": "🏆"}, "Science": {"color": "#a78bfa", "icon": "🔬"}, "Technology": {"color": "#38bdf8", "icon": "💻"}, "Health": {"color": "#34d399", "icon": "🏥"}, "Law": {"color": "#fb923c", "icon": "⚖️"}, "Environment": {"color": "#4ade80", "icon": "🌿"}, "Education": {"color": "#e879f9", "icon": "📚"}, "Culture": {"color": "#f472b6", "icon": "🎭"}, "Infrastructure": {"color": "#94a3b8", "icon": "🏗️"}};

const allArts = [...DIGEST.articles].sort((a,b)=>(b.importance||0)-(a.importance||0));
const byCategory = {};
for (const art of allArts) {
  const c = art.category||"India";
  if (!byCategory[c]) byCategory[c]=[];
  byCategory[c].push(art);
}
const sortedCats = Object.keys(byCategory).sort(
  (a,b)=>(byCategory[b][0].importance||0)-(byCategory[a][0].importance||0)
);

let catIdx=0,vpW=0,vpH=0;
const panels=[];
const outer=document.getElementById('outer');
const hTrack=document.getElementById('hTrack');
const hintUp=document.getElementById('hintUp');
const hintRight=document.getElementById('hintRight');
const catFlash=document.getElementById('catFlash');
const cfIcon=document.getElementById('cfIcon');
const cfName=document.getElementById('cfName');

function buildAll() {
  vpW=outer.offsetWidth; vpH=outer.offsetHeight;
  hTrack.innerHTML=''; panels.length=0;
  sortedCats.forEach((cat,ci)=>{
    const m=CAT_META[cat]||{color:"#e8334a",icon:"📰"};
    const arts=byCategory[cat];
    const panel=document.createElement('div');
    panel.className='cat-panel';
    panel.style.setProperty('--cc',m.color);
    panel.innerHTML=`<div class="progress-row" id="prow-${ci}" style="--cc:${m.color}"></div><div class="v-feed" id="vfeed-${ci}"><div class="v-track" id="vtrack-${ci}"></div></div>`;
    hTrack.appendChild(panel);
    const pRow=panel.querySelector(`#prow-${ci}`);
    const vFeed=panel.querySelector(`#vfeed-${ci}`);
    const vTrack=panel.querySelector(`#vtrack-${ci}`);
    const cardH=vFeed.getBoundingClientRect().height||vpH;
    arts.forEach(art=>vTrack.appendChild(buildCard(art,cardH,m,cat)));
    panels.push({pRow,vFeed,vTrack,articles:arts,artIdx:0});
    buildPRow(ci);
  });
  hTrack.style.transition='none';
  hTrack.style.transform='translateX(0)';
  syncV(0,false);
}

function buildCard(art,h,m,cat) {
  const src=art.sources?.[0];
  const href=src?.pdf_filename?`pdfs/${src.pdf_filename}#page=${src.page}`:(src?.telegram_url||'#');
  const card=document.createElement('div');
  card.className='card';
  card.style.height=h+'px';
  card.style.setProperty('--cc',m.color);
  card.innerHTML=`
    <div class="card-content">
      <div class="card-toprow">
        <div class="cat-pill">
          <div class="pill-icon"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="1" y="1" width="8" height="2" rx="0.6" fill="#888"/><rect x="1" y="4.5" width="5" height="1.5" rx="0.6" fill="#666"/><rect x="1" y="7" width="6" height="1.5" rx="0.6" fill="#666"/></svg></div>
          ${cat.toUpperCase()}
        </div>
        <div class="card-date">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="2.5" width="11" height="9.5" rx="1.8" stroke="#555" stroke-width="1.2"/><path d="M4.5 1v3M8.5 1v3" stroke="#555" stroke-width="1.2" stroke-linecap="round"/><path d="M1 6h11" stroke="#555" stroke-width="1.2"/></svg>
          ${DIGEST.date}
        </div>
      </div>
      <div class="card-headline">${art.headline}</div>
      <div class="card-summary">${art.summary}</div>
      <div class="card-divider"></div>
      <div class="card-footer">
        ${src?`<a class="src-chip" href="${href}" target="_blank" onclick="event.stopPropagation()">${src.newspaper}<span class="src-chip-sep">&middot;</span><span class="src-chip-pg">Pg ${src.page}</span><span class="src-chip-ext"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M3.5 7.5L7.5 3.5M7.5 3.5H5M7.5 3.5V6" stroke="#555" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></span></a>`:'<div></div>'}
        <div class="info-btn"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6.5" stroke="#444" stroke-width="1.3"/><circle cx="7.5" cy="4.5" r="0.8" fill="#555"/><path d="M7.5 7v4" stroke="#555" stroke-width="1.5" stroke-linecap="round"/></svg></div>
      </div>
    </div>`;
  return card;
}

function buildPRow(ci) {
  const p=panels[ci],ai=p.artIdx;
  p.pRow.innerHTML='';
  p.articles.forEach((_,i)=>{
    const seg=document.createElement('div');
    seg.className='pseg'+(i<ai?' done':i===ai?' active':'');
    p.pRow.appendChild(seg);
  });
}

function syncV(ci,animated) {
  const p=panels[ci],h=p.vFeed.getBoundingClientRect().height;
  p.vTrack.style.transition=animated?'transform 0.35s cubic-bezier(0.4,0,0.2,1)':'none';
  p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;
  buildPRow(ci);
}

function goArt(d) {
  const p=panels[catIdx];
  const n=Math.max(0,Math.min(p.artIdx+d,p.articles.length-1));
  if(n===p.artIdx&&d!==0)return;
  p.artIdx=n; syncV(catIdx,true); dismiss();
}

function goCat(idx,animated=true) {
  idx=Math.max(0,Math.min(idx,sortedCats.length-1));
  if(idx===catIdx&&animated)return;
  const prev=catIdx; catIdx=idx;
  hTrack.style.transition=animated?'transform 0.38s cubic-bezier(0.4,0,0.2,1)':'none';
  hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;
  if(animated&&idx!==prev) {
    const m=CAT_META[sortedCats[idx]]||{color:"#e8334a",icon:"📰"};
    catFlash.style.background=m.color+'18';
    cfIcon.textContent=m.icon; cfName.textContent=sortedCats[idx]; cfName.style.color=m.color;
    catFlash.classList.add('on'); setTimeout(()=>catFlash.classList.remove('on'),500);
  }
  dismiss();
}

let dismissed=false;
function dismiss() {
  if(dismissed)return; dismissed=true;
  hintUp.classList.remove('visible'); hintRight.classList.remove('visible');
  hintUp.classList.add('gone'); hintRight.classList.add('gone');
}

(function initHints() {
  const KEY='dailyBriefHintSeen';
  if(!localStorage.getItem(KEY)) {
    localStorage.setItem(KEY,'1');
    setTimeout(()=>{ if(!dismissed){ hintUp.classList.add('visible'); hintRight.classList.add('visible'); } },2500);
  }
})();

let tsX=0,tsY=0,tcX=0,tcY=0,axis=null,drag=false;
outer.addEventListener('touchstart',e=>{
  tsX=e.touches[0].clientX; tsY=e.touches[0].clientY;
  tcX=0; tcY=0; axis=null; drag=true;
  hTrack.style.transition='none';
  const p=panels[catIdx]; if(p)p.vTrack.style.transition='none';
},{passive:true});
outer.addEventListener('touchmove',e=>{
  if(!drag)return;
  const dx=e.touches[0].clientX-tsX,dy=e.touches[0].clientY-tsY;
  tcX=dx; tcY=dy;
  if(!axis&&(Math.abs(dx)>8||Math.abs(dy)>8))axis=Math.abs(dx)>Math.abs(dy)?'h':'v';
  if(!axis)return;
  e.preventDefault();
  if(axis==='h'){
    const edge=(catIdx===0&&dx>0)||(catIdx===sortedCats.length-1&&dx<0);
    hTrack.style.transform=`translateX(${-catIdx*vpW+dx*(edge?.14:1)}px)`;
  }else{
    const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height;
    const edge=(p.artIdx===0&&dy>0)||(p.artIdx===p.articles.length-1&&dy<0);
    p.vTrack.style.transform=`translateY(${-p.artIdx*h+dy*(edge?.14:1)}px)`;
  }
},{passive:false});
outer.addEventListener('touchend',()=>{
  if(!drag)return; drag=false;
  if(axis==='h'){
    const t=vpW*.2;
    if(tcX<-t)goCat(catIdx+1);
    else if(tcX>t)goCat(catIdx-1);
    else{hTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;}
  }else if(axis==='v'){
    const t=vpH*.2;
    if(tcY<-t)goArt(1);
    else if(tcY>t)goArt(-1);
    else{const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height;p.vTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;}
  }
  axis=null;
},{passive:true});

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'||e.key===' '){e.preventDefault();goArt(1);}
  if(e.key==='ArrowUp'){e.preventDefault();goArt(-1);}
  if(e.key==='ArrowRight'){e.preventDefault();goCat(catIdx+1);}
  if(e.key==='ArrowLeft'){e.preventDefault();goCat(catIdx-1);}
});
let wl=false;
outer.addEventListener('wheel',e=>{
  e.preventDefault();if(wl)return;wl=true;
  Math.abs(e.deltaX)>Math.abs(e.deltaY)?goCat(catIdx+(e.deltaX>0?1:-1)):goArt(e.deltaY>0?1:-1);
  setTimeout(()=>wl=false,500);
},{passive:false});
window.addEventListener('resize',()=>{
  vpW=outer.offsetWidth;vpH=outer.offsetHeight;
  hTrack.style.transition='none';
  hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;
  panels.forEach(p=>{
    const h=p.vFeed.getBoundingClientRect().height;
    p.vTrack.querySelectorAll('.card').forEach(c=>c.style.height=h+'px');
    p.vTrack.style.transition='none';
    p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;
  });
});

buildAll();
</script>
