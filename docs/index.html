lve the standoff through diplomatic channels.", "category": "World", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "31f7ec15"}, {"headline": "Youth Congress rebuffs CJP's proposal for political coordination", "summary": "The Indian Youth Congress has reportedly rejected a proposal from the Cockroach Janta Party (CJP) for strategic political coordination in upcoming elections. Youth Congress leaders stated they would maintain their independent identity and do not see any value in an alliance with the new outfit. The move is seen as a consolidation of the Congress's strategy to contest elections on its own.", "category": "Politics", "page": 12, "importance": 4, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "7c427968"}, {"headline": "Woman stabbed 34 times by colleague in Mohali office", "summary": "In a shocking incident in Mohali, a 30-year-old woman was stabbed 34 times by her colleague inside their office premises. The attacker reportedly targeted her following a personal dispute. Despite being rushed to a hospital, the victim succumbed to her injuries. The police have arrested the suspect and are reviewing CCTV footage to understand the motive behind the brutal attack.", "category": "Law", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "069ef174"}, {"headline": "HC issues notice to Bengal police over accused paraded in innerwear", "summary": "The Calcutta High Court has issued a notice to the West Bengal police after a group of accused individuals were paraded through the streets in their innerwear. The court called the act a violation of human dignity and sought an explanation from the concerned officers. Legal experts argued that such actions by law enforcement are unconstitutional and undermine the judicial process.", "category": "Law", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "c4c54c3a"}, {"headline": "Supreme Court: OSA cannot be used to deny documents to accused", "summary": "The Supreme Court has ruled that the Official Secrets Act (OSA) cannot be used as a blanket reason to deny essential documents to an accused individual during a trial. The court emphasized that a fair trial is a fundamental right and relevant materials must be shared unless they pose a direct threat to national security. The ruling came in a case involving a retired senior official.", "category": "Law", "page": 15, "importance": 8, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "7ddb3927"}, {"headline": "Three Bihar hospital officials arrested in ICU fire case", "summary": "Police in Bihar have arrested three top officials of a private hospital following a fire in the ICU that claimed six lives. Investigations revealed several safety violations, including lack of fire extinguishers and blocked emergency exits. The hospital management has been booked for culpable homicide not amounting to murder. The state has ordered a safety audit of all private hospitals.", "category": "Law", "page": 15, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "1da4ca3d"}, {"headline": "DVAC corruption case against former TN minister stayed by HC", "summary": "The Madras High Court has stayed a corruption case filed by the DVAC against a former Tamil Nadu minister. The court noted that the investigation appeared to be politically motivated and lacked sufficient evidence at this stage. The stay will remain in effect until the next hearing in July. The minister had challenged the case, claiming it was an attempt to target the opposition.", "category": "Law", "page": 15, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "03344fde"}, {"headline": "HC grants bail to rape-murder accused with 'a heavy heart'", "summary": "In a rare decision, the Allahabad High Court granted bail to an accused in a rape-and-murder case, noting it did so with 'a heavy heart' due to lack of evidence. The court stated that despite the horrific nature of the crime, the prosecution failed to provide conclusive forensic proof linking the suspect to the act. The ruling has sparked a debate on the burden of proof in capital cases.", "category": "Law", "page": 15, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "fc508596"}, {"headline": "Death penalty for man who raped and murdered teen, killed 3 siblings", "summary": "A special court has sentenced a man to death for the rape and murder of a 14-year-old girl and the subsequent killing of her three younger siblings. The judge described the crime as 'rarest of rare,' noting the brutal and cold-blooded nature of the killings. The convict had reportedly targeted the family while they were alone at home. The court also ordered compensation for the relatives.", "category": "Law", "page": 15, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "61d22630"}, {"headline": "Amid fresh unrest, two COBRA units headed for Manipur", "summary": "The central government has deployed two additional COBRA commando units to Manipur following a fresh wave of violence in the state. The units, specialized in guerrilla warfare, will focus on neutralizing armed insurgent groups in the hilly terrains. The deployment comes as ethnic clashes continue to claim lives, despite the heavy presence of the army and paramilitary forces.", "category": "India", "page": 17, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "c56a3317"}, {"headline": "Four members of a family killed in Guwahati house fire", "summary": "A tragic fire in Guwahati's Basistha area claimed the lives of four members of a family, including two children. The fire reportedly broke out due to a short circuit at midnight while the victims were asleep. Firefighters took several hours to douse the flames, but the house was completely gutted. Local authorities have promised financial assistance to the surviving relatives.", "category": "India", "page": 17, "importance": 3, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "0d2531e4"}, {"headline": "Feature: The economic and social challenges of the first trillionaire", "summary": "As the world approaches the era of the first trillionaire, likely Elon Musk, experts are debating the immense influence such wealth will have on global politics and the economy. The concentration of power in a single individual's hands could challenge the sovereignty of nations and the foundations of democracy. The feature explores how such wealth could be used for both good and ill.", "category": "Economy", "page": 18, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "0f96e4cc"}, {"headline": "On the Road: Thousands find community at 6 AM city runs", "summary": "Early morning running has become a major social phenomenon in Indian cities, with thousands of people gathering at 6 AM for organized runs. Participants range from professional athletes to students and retirees, all seeking fitness and a sense of community. The movement has led to the growth of various running clubs and highlights a shifting urban focus toward health and wellness.", "category": "Culture", "page": 18, "importance": 3, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "89afa3a2"}, {"headline": "Science: The rise of cultivated meat without killing animals", "summary": "New advancements in biotechnology are making lab-grown or cultivated meat a viable reality for the future. By using animal cells to grow real meat in bioreactors, the process aims to reduce the environmental impact of traditional livestock farming. Several startups are now working on making these products affordable for mass consumption, potentially revolutionizing the global food industry.", "category": "Science", "page": 18, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "20c930a3"}, {"headline": "RBI cuts growth forecast to 6.6% as inflation risks rise", "summary": "The Reserve Bank of India has lowered its GDP growth projection for FY27 to 6.6% from the earlier 7.0%. The central bank cited rising inflation risks and global economic volatility, particularly in Asia, as key factors. While the repo rate remains unchanged at 5.25%, the RBI warned that persistent food prices and geopolitical tensions could lead to further economic slowdown.", "category": "Economy", "page": 19, "importance": 10, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 19, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "95dd5b44"}, {"headline": "Govt ready with more measures to insulate economy from shocks", "summary": "The central government has stated it is prepared to introduce more policy measures to protect the Indian economy from external shocks. Finance Ministry officials said they are closely monitoring the impact of the West Asia conflict and global trade disruptions. Potential steps include further adjustments to import duties and providing support to export-oriented sectors to maintain stability.", "category": "Economy", "page": 19, "importance": 9, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 19, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "1105f97f"}, {"headline": "G-Secs rally as RBI eases rules for foreign portfolio investors", "summary": "Indian government securities (G-Secs) saw a sharp rally after the RBI and government introduced new rules to attract foreign investment. The move includes tax exemptions for certain G-Secs and relaxed limits for foreign portfolio investors. The strategy aims to lower borrowing costs for the government and strengthen the rupee against the dollar amid global currency fluctuations.", "category": "Economy", "page": 19, "importance": 8, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 19, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "0b5037d4"}, {"headline": "RBI introduces new rules for more transparent bulk deposit pricing", "summary": "The RBI has issued new guidelines to make the pricing of bulk deposits more transparent and flexible for banks. The move requires banks to disclose their interest rate frameworks more clearly and allows for more frequent adjustments based on market conditions. The central bank stated that this will improve liquidity management and provide better options for large institutional depositors.", "category": "Economy", "page": 19, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 19, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "3634b151"}, {"headline": "Tata Trusts demands retraction of charges or Rs 1,000 cr", "summary": "Tata Trusts has served a legal notice to a former trustee, demanding a retraction of several allegations or the payment of Rs 1,000 crore in damages. The trust claimed the allegations have harmed its reputation and diverted attention from its philanthropic work. The legal battle is the latest in a series of internal disputes that have hit the country's largest charitable institution.", "category": "Law", "page": 19, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 19, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "67033be2"}, {"headline": "Manufacturing sector Q4 growth moderates to 7.3%", "summary": "India's manufacturing sector saw its growth moderate to 7.3% in the final quarter of the fiscal year, according to latest government data. While the sector remains a key driver of the economy, the slowdown from the previous quarter's 8.5% is attributed to rising raw material costs and cooling global demand. Economists suggest more policy support is needed to sustain the sector's momentum.", "category": "Economy", "page": 19, "importance": 8, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 19, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "f65b178a"}, {"headline": "Mutual fund houses restrict investments into gold ETFs and FoFs", "summary": "Several major mutual fund houses in India have placed restrictions on fresh investments into gold Exchange Traded Funds (ETFs) and Fund of Funds (FoFs). The decision follows recent volatility in global gold prices and a surge in domestic demand. Funds stated the move is temporary and aimed at protecting existing investors from potential sharp price corrections in the bullion market.", "category": "Economy", "page": 19, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 19, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "b597f496"}, {"headline": "Sahamati becomes first SRO for account aggregator ecosystem", "summary": "Sahamati has been officially recognized by the RBI as the first Self-Regulatory Organization (SRO) for the account aggregator ecosystem. The body will be responsible for setting standards and ensuring fair practices among various entities in the data-sharing network. This is seen as a major step toward building a more robust and secure digital financial infrastructure in India.", "category": "Business", "page": 19, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 19, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "9efae711"}, {"headline": "No peace deal in sight as Iran declares support for Hezbollah", "summary": "Hopes for a peace deal in the Middle East have dimmed as Iran officially declared its full military and political support for Hezbollah in its conflict with Israel. The Iranian leadership stated that any attack on Lebanon would be met with a decisive response. The statement has increased fears of a wider regional war, with the US and other world powers calling for immediate de-escalation.", "category": "World", "page": 20, "importance": 9, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "c4cb8244"}, {"headline": "US forces board oil tanker in the Indian Ocean", "summary": "The US Navy has reported boarding an oil tanker in the Indian Ocean on suspicion of transporting illicit Iranian oil. The operation, which involved special forces, was carried out after the vessel ignored several warnings. The move is part of the US's broader strategy to enforce sanctions on Iran's oil exports. The tanker is currently being diverted to a nearby port for further inspection.", "category": "World", "page": 20, "importance": 8, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "3a671677"}, {"headline": "US issues fresh sanctions on Iran-related companies and entities", "summary": "The United States has imposed a new round of sanctions on several companies and individuals allegedly linked to Iran's missile program and oil trade. The entities, located in various countries including the UAE and China, have been barred from the US financial system. The move is aimed at further squeezing Iran's economy and its ability to fund regional proxy groups.", "category": "World", "page": 20, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "c73e2099"}, {"headline": "UK researchers claim first human trial of AI-designed universal vaccine", "summary": "A team of researchers in the UK has announced the first human trial of a universal vaccine designed entirely by Artificial Intelligence. The vaccine aims to provide long-term protection against a wide range of viruses, including multiple strains of flu and coronaviruses. If successful, the AI-driven approach could revolutionize the speed and efficiency of vaccine development for future pandemics.", "category": "Science", "page": 20, "importance": 9, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "072ff3f3"}, {"headline": "Indians building entire HR depts in US, not stealing jobs", "summary": "A new report by the National Foundation for American Policy highlights that Indian-origin entrepreneurs are creating more jobs in the US than any other immigrant group. The study shows that these founders are building entire HR and tech departments, contributing significantly to the American economy. The report aims to counter the narrative that immigrants are taking jobs away from locals.", "category": "World", "page": 20, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "cc8b357f"}, {"headline": "Putin says there is currently no reason to meet Zelenskyy", "summary": "Russian President Vladimir Putin has stated that he sees no reason to meet with Ukrainian President Volodymyr Zelenskyy at this time. Speaking to reporters, Putin argued that Ukraine is not serious about peace negotiations and is continuing to seek a military solution with Western support. He reiterated that Russia will continue its military operations until all its objectives are met.", "category": "World", "page": 20, "importance": 8, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "548e93f6"}, {"headline": "Macron, Scholz, and Zelenskyy to discuss putting pressure on Russia", "summary": "The leaders of France, Germany, and Ukraine are scheduled to meet in Paris to discuss further diplomatic and economic pressure on Russia. The summit will focus on securing more military aid for Ukraine and coordinating on a long-term security pact. The leaders are also expected to discuss the latest peace proposals and the role of European nations in rebuilding Ukraine after the war.", "category": "World", "page": 20, "importance": 8, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "d4dda047"}, {"headline": "Ankara to strengthen cooperation in defense industry with Dhaka", "summary": "Turkey and Bangladesh have agreed to strengthen their cooperation in the defense industry following a visit by the Turkish Foreign Minister to Dhaka. The agreement includes the potential sale of Turkish drones and naval equipment to Bangladesh, as well as joint training and technology transfer. The move is seen as part of Turkey's efforts to expand its defense exports to South Asia.", "category": "World", "page": 20, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "e754566f"}, {"headline": "Brief evacuation alert on ISS due to air leak", "summary": "Astronauts on the International Space Station were briefly put on high alert following a minor air leak in one of the station's modules. The crew followed emergency procedures and prepared for evacuation to their transport crafts. However, the leak was quickly located and sealed by Russian cosmonauts, and NASA confirmed that the crew is no longer in danger. Operations have returned to normal.", "category": "Science", "page": 20, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "84b2bac9"}, {"headline": "James Handy, 'Maverick' actor, stabbed to death in Los Angeles", "summary": "Veteran actor James Handy, known for his roles in 'Top Gun' and 'Jumanji', was tragically stabbed to death at his home in Los Angeles. Police have arrested a suspect, reportedly a former business associate of the actor. The motive behind the attack remains unclear. The entertainment world has paid tribute to the actor's long and versatile career in both film and television.", "category": "World", "page": 20, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "6237c4c7"}, {"headline": "US lawmaker introduces bill to link H-1B to green card pathway", "summary": "A new bill has been introduced in the US Congress that aims to create a direct pathway from H-1B visas to green cards for high-skilled workers. The legislation proposes to remove the per-country cap for green cards and speed up the residency process for those in specialized fields like technology and medicine. If passed, the bill could benefit thousands of Indian tech professionals.", "category": "World", "page": 20, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "bdcb01dd"}, {"headline": "Italy introduces parental consent requirement for sex education in schools", "summary": "The Italian government has introduced a new law requiring parental consent for children to attend sex education classes in public schools. The move has been welcomed by conservative groups but criticized by educators who argue it will hinder children's access to essential health information. The government stated the law is aimed at respecting the primary role of parents in their children's upbringing.", "category": "World", "page": 20, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "f7128601"}, {"headline": "World Cup: Brazil searches for balance between flair and pragmatism", "summary": "As the World Cup approaches, the Brazilian national team is facing a debate over its playing style under coach Carlo Ancelotti. While fans desire the traditional 'samba' flair, the team is working on a more pragmatic defensive strategy to ensure success. Ancelotti emphasized that while creativity is important, a solid tactical foundation is necessary to win the world title.", "category": "Sports", "page": 21, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 21, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "0894e7e2"}, {"headline": "Leandro Trossard raring to start Belgium's World Cup campaign", "summary": "Arsenal winger Leandro Trossard has expressed his readiness to lead Belgium's attack in the upcoming World Cup. Speaking from the team's training camp, Trossard said he is in peak physical condition and eager to contribute to his nation's quest for glory. Belgium is considered one of the favorites for the tournament, with a squad full of experienced stars and young talent.", "category": "Sports", "page": 21, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 21, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "ca6730e8"}, {"headline": "France brushes off Ivory Coast loss as a 'timely reminder'", "summary": "The French national team has downplayed its recent surprise loss to Ivory Coast in a warm-up match, calling it a 'timely reminder' of the challenges ahead. Coach Didier Deschamps stated that the match provided valuable lessons and highlighted areas that need improvement before the tournament begins. France remains confident in its ability to defend its title despite the minor setback.", "category": "Sports", "page": 21, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 21, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "8bae50b8"}, {"headline": "Iran football players granted visas to enter US for tournament", "summary": "In a signifi nament, which features talent from across Karnataka, is scheduled to begin later this month and provides a platform for young cricketers to shine.", "category": "Sports", "page": 22, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 22, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "9132f165"}, {"headline": "Unnathi Bollanda betters 36-year-old state sprinting record", "summary": "At the Karnataka State Inter-Athletics Meet, Unnathi Bollanda set a new state record in the women's 200m sprint, breaking a 36-year-old mark. Her time of 23.4 seconds surpassed the previous record held by Ashwini Nachappa. Bollanda stated that she had been training specifically for this event and is now aiming for a podium finish at the upcoming national level championships.", "category": "Sports", "page": 22, "importance": 4, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 22, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "67ae7336"}, {"headline": "From tax waivers to free hedges, RBI and govt boost Rupee", "summary": "In a major coordinated effort, the RBI and the central government have introduced a series of tax waivers and financial incentives to attract foreign portfolio investment and strengthen the Indian Rupee. The measures include lowering hedging costs for banks and providing incentives for exporters. The move aims to stabilize the currency amid global economic uncertainty and rising oil prices.", "category": "Economy", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "73f6fdd2"}, {"headline": "India's GDP rose 7.7% in FY26 and 7.8% in Q4", "summary": "Latest government data shows that India's economy grew at a robust 7.7% in the 2025-26 fiscal year, with the final quarter recording a 7.8% growth. The performance was driven by strong gains in the manufacturing and service sectors. Despite the strong figures, the government has slightly lowered its projection for the next year to 6.6%, citing potential global economic headwinds.", "category": "Economy", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "ec7102ba"}, {"headline": "RBI holds repo rate steady, introduces measures to boost foreign capital", "summary": "The RBI's Monetary Policy Committee maintained the repo rate at 6.5% for the eighth consecutive meeting. Governor Shaktikanta Das announced new measures, including tax regime changes for FPI investments in government securities and a framework for index-linked bonds, aimed at attracting foreign capital to manage the balance of payments deficit amid global uncertainties.", "category": "Economy", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ⁰⁶⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126244"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126286"}, {"newspaper": "Business Line", "pdf_filename": "BL Bangalore 06~06~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126233"}], "importance": 10, "article_id": "1eea15e5"}, {"headline": "Annamalai quits BJP, plans new regional political party in Tamil Nadu", "summary": "K Annamalai has resigned from the BJP and announced plans to launch a new political outfit in Tamil Nadu. Citing a need for a 'new shift' and differences with BJP leadership, his departure follows the party's poor election performance. The new movement aims to build local leadership and contest elections independently, focusing on regional aspirations and local culture.", "category": "Politics", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ⁰⁶⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126244"}, {"newspaper": "Business Line", "pdf_filename": "BL Bangalore 06~06~2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/126233"}, {"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_06-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/126225"}], "importance": 8, "article_id": "28b70499"}, {"headline": "India-US interim trade deal likely by mid-July, says Commerce Minister", "summary": "Union Commerce Minister Piyush Goyal announced that the first phase of the India-US bilateral trade agreement is likely to be finalized by mid-July. Following productive discussions with a US delegation, the deal aims to resolve trade issues and grant preferential market access for Indian products, boosting the strategic economic partnership.", "category": "Economy", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ⁰⁶⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126244"}, {"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/126239"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 06-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126269"}, {"newspaper": "Business Line", "pdf_filename": "BL Bangalore 06~06~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126233"}, {"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_06-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126225"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126210"}], " a Chwalinska for their first Grand Slam titles.", "category": "Sports", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ⁰⁶⁰⁶²⁰²⁶.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/126244"}, {"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_06-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/126225"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 22, "telegram_url": "https://t.me/c/1877410077/126210"}], "importance": 7, "article_id": "2c2ea9bd"}, {"headline": "Praggnanandhaa takes lead in Norway Chess after defeating Gukesh", "summary": "Indian Grandmaster R Praggnanandhaa defeated compatriot D Gukesh to take the lead in the Norway Chess tournament. Meanwhile, Bibisara Assaubayeva secured the women's title. Praggnanandhaa is in a strong position to win the overall title.", "category": "Sports", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ⁰⁶⁰⁶²⁰²⁶.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/126244"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 22, "telegram_url": "https://t.me/c/1877410077/126286"}, {"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_06-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/126225"}], "importance": 7, "article_id": "21090ba8"}, {"headline": "Supreme Court stays Calcutta HC order cancelling 2016 teacher appointments", "summary": "The Supreme Court has stayed the Calcutta High Court's order cancelling the appointment of nearly 26,000 teachers and staff in 2016, citing potential hardship for employees pending further investigation into the alleged scam.", "category": "Law", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_06-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/126257"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 1, "telegram_url":       </div>
    </div>`;
  return card;
}

function buildPRow(ci) {
  const p=panels[ci],ai=p.artIdx;
  p.pRow.innerHTML='';
  p.articles.forEach((_,i)=>{
    const seg=document.createElement('div');
    seg.className='pseg'+(i<ai?' done':i===ai?' active':'');
    p.pRow.appendChild(seg);
  });
}

function syncV(ci,animated) {
  const p=panels[ci],h=p.vFeed.getBoundingClientRect().height;
 p.vTrack.style.transition=animated?'transform 0.35s cubic-bezier(0.4,0,0.2,1)':'none';
  p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;
  buildPRow(ci);
}

function applyDeepLink(target) {
  const ci = sortedCats.findIndex(cat =>
    byCategory[cat].some(art => art.article_id === target.hash)
  );
  if (ci === -1) return;
  goCat(ci, false);
  const ai = byCategory[sortedCats[ci]].findIndex(art => art.article_id === target.hash);
  if (ai === -1) return;
  panels[ci].artIdx = ai;
  syncV(ci, false);
  const card = document.getElementById('article-' + target.hash);
  if (card) { card.classList.add('target-highlight'); setTimeout(() => card.classList.remove('target-highlight'), 3000); }
}

function goArt(d) {
  const p=panels[catIdx];
  const n=Math.max(0,Math.min(p.artIdx+d,p.articles.length-1));
  if(n===p.artIdx&&d!==0)return;
  p.artIdx=n; syncV(catIdx,true); dismiss();
}

function goCat(idx,animated=true) {
  idx=Math.max(0,Math.min(idx,sortedCats.length-1));
  if(idx===catIdx&&animated)return;
  const prev=catIdx; catIdx=idx;
  hTrack.style.transition=animated?'transform 0.38s cubic-bezier(0.4,0,0.2,1)':'none';
  hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;
  if(animated&&idx!==prev) {
    const m=CAT_META[sortedCats[idx]]||{color:"#e8334a",icon:"📰"};
    catFlash.style.background=m.color+'18';
    cfIcon.textContent=m.icon; cfName.textContent=sortedCats[idx]; cfName.style.color=m.color;
    catFlash.classList.add('on'); setTimeout(()=>catFlash.classList.remove('on'),500);
  }
  dismiss();
}

let dismissed=false;
function dismiss() {
  if(dismissed)return; dismissed=true;
  hintUp.classList.remove('visible'); hintRight.classList.remove('visible');
  hintUp.classList.add('gone'); hintRight.classList.add('gone');
}

(function initHints() {
  const KEY='dailyBriefHintSeen';
  if(!localStorage.getItem(KEY)) {
    localStorage.setItem(KEY,'1');
    setTimeout(()=>{ if(!dismissed){ hintUp.classList.add('visible'); hintRight.classList.add('visible'); } },2500);
  }
})();

let tsX=0,tsY=0,tcX=0,tcY=0,axis=null,drag=false;
outer.addEventListener('touchstart',e=>{ tsX=e.touches[0].clientX; tsY=e.touches[0].clientY; tcX=0; tcY=0; axis=null; drag=true; hTrack.style.transition='none'; const p=panels[catIdx]; if(p)p.vTrack.style.transition='none'; },{passive:true});
outer.addEventListener('touchmove',e=>{ if(!drag)return; const dx=e.touches[0].clientX-tsX,dy=e.touches[0].clientY-tsY; tcX=dx; tcY=dy; if(!axis&&(Math.abs(dx)>8||Math.abs(dy)>8))axis=Math.abs(dx)>Math.abs(dy)?'h':'v'; if(!axis)return; e.preventDefault(); if(axis==='h'){ const edge=(catIdx===0&&dx>0)||(catIdx===sortedCats.length-1&&dx<0); hTrack.style.transform=`translateX(${-catIdx*vpW+dx*(edge ? 0.14 : 1)}px)`; }else{ const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height; const edge=(p.artIdx===0&&dy>0)||(p.artIdx===p.articles.length-1&&dy<0); p.vTrack.style.transform=`translateY(${-p.artIdx*h+dy*(edge ? 0.14 : 1)}px)`; } },{passive:false});
outer.addEventListener('touchend',()=>{ if(!drag)return; drag=false; if(axis==='h'){ const t=vpW*.2; if(tcX<-t)goCat(catIdx+1); else if(tcX>t)goCat(catIdx-1); else{hTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;} }else if(axis==='v'){ const t=vpH*.2; if(tcY<-t)goArt(1); else if(tcY>t)goArt(-1); else{const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height;p.vTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;} } axis=null; },{passive:true});
document.addEventListener('keydown',e=>{ if(e.key==='ArrowDown'||e.key===' '){e.preventDefault();goArt(1);} if(e.key==='ArrowUp'){e.preventDefault();goArt(-1);} if(e.key==='ArrowRight'){e.preventDefault();goCat(catIdx+1);} if(e.key==='ArrowLeft'){e.preventDefault();goCat(catIdx-1);} });
let wl=false;
outer.addEventListener('wheel',e=>{ e.preventDefault();if(wl)return;wl=true; Math.abs(e.deltaX)>Math.abs(e.deltaY)?goCat(catIdx+(e.deltaX>0?1:-1)):goArt(e.deltaY>0?1:-1); setTimeout(()=>wl=false,500); },{passive:false});
window.addEventListener('resize',()=>{ vpW=outer.offsetWidth;vpH=outer.offsetHeight; hTrack.style.transition='none'; hTrack.style.transform=`translateX(${-catIdx*vpW}px)`; panels.forEach(p=>{ const h=p.vFeed.getBoundingClientRect().height; p.vTrack.querySelectorAll('.card').forEach(c=>c.style.height=h+'px'); p.vTrack.style.transition='none'; p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`; }); });

buildAll();
</script>
</body>
</html>
