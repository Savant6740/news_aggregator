10077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Kannada Group Protests Governor’s Review of SSLC Language Policy", "summary": "The Karnataka Rakshana Vedike staged a protest demanding the recall of Governor Thaawarchand Gehlot, accusing him of overreach. The group objected to the Governor's office seeking a review of the state's decision to replace marks with grades for the third language in SSLC exams. The Governor's office had forwarded academic concerns to the state administration for detailed examination.", "category": "Politics", "page": 3, "importance": 4, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Home Minister Parameshwara Assures Siddaramaiah Will Complete Full Five-Year Term", "summary": "Karnataka Home Minister G Parameshwara asserted that Chief Minister Siddaramaiah will continue in his post for the full term under the current situation. He noted that any leadership change remains a decision for the Congress high command. The comments come amid ongoing speculation regarding a potential power-sharing agreement within the state's ruling party.", "category": "Politics", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Former CM Basavaraj Bommai Declines Honorary Doctorate from Haveri University", "summary": "BJP MP Basavaraj Bommai has declined an honorary doctorate from Haveri University, stating it is inappropriate to confer such honors on politicians. He emphasized that the love and trust of the people are the greatest rewards in public life. Bommai suggested that such degrees should be reserved for individuals providing distinguished service in specific fields over long periods.", "category": "Politics", "page": 3, "importance": 3, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Greater Bengaluru Authority to Tow Abandoned Vehicles from City Roads", "summary": "GBA Commissioner Maheshwar Rao has ordered towing operations to begin on April 7 to remove vehicles abandoned on Bengaluru's roads for months. Towing vehicles have been handed over to the traffic police. Additionally, Rao instructed officials to procure pothole-filling machines for each city corporation and strictly regulate parking on white-topped roads.", "category": "Infrastructure", "page": 3, "importance": 3, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Siddaramaiah Criticizes Deve Gowda Family’s Political Dominance in Davanagere Bypoll", "summary": "Campaigning for the Davanagere South by-election, CM Siddaramaiah questioned the continued political prominence of HD Deve Gowda’s family despite repeated electoral setbacks. He defended the Congress's welfare guarantees and dismissed JD(S) criticisms of industrial development. He also addressed internal party friction, specifically regarding Minister Zameer Ahmed Khan's campaign role.", "category": "Politics", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "BJP Claims Congress Intelligence Reports Predict Defeat in Karnataka Bypolls", "summary": "Leader of Opposition R Ashoka claimed that the Congress government's own intelligence suggests a loss in the upcoming Davanagere South and Bagalkot by-elections. Ashoka accused the ruling party of failing on development and delayed guarantee scheme payments. Bypolls were necessitated by the deaths of senior MLAs H Y Meti and Shamanur Shivashankarappa.", "category": "Politics", "page": 3, "importance": 4, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Pinarayi Vijayan Claims LDF Fulfilled 97 Percent of 2021 Election Promises", "summary": "Kerala CM Pinarayi Vijayan released a progress report ahead of the April 9 polls, claiming 97% of the LDF's 900 promises from 2021 have been implemented or are in progress. He highlighted housing completions under the LIFE Mission, the lifting of 64,000 families out of extreme poverty, and the distribution of land titles to 4.5 lakh families over the last decade.", "category": "Politics", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Priyanka Gandhi Alleges Secret Deal Between LDF and BJP in Kerala", "summary": "Congress leader Priyanka Gandhi Vadra accused the CPI(M)-led LDF of a 'secret deal' with the BJP to protect its leadership from central agency scrutiny. Campaigning in Wayanad, she pointed out that while Rahul Gandhi faces legal action, Kerala CM Pinarayi Vijayan has no such cases against him. She claimed both parties suppress dissent and compromise democratic values.", "category": "Politics", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Telangana District Reorganisation Put on Hold Until After 2029", "summary": "Telangana CM A Revanth Reddy announced that the state will not change the number of districts or mandals until 2029, following Central restrictions. Speaking in Adilabad, he laid the foundation for a ₹225 crore development project at the Basara Gnana Saraswati temple. He also confirmed progress on land acquisition for an airport and a new university in the region.", "category": "Politics", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Thirty Maoist Cadres Surrender to Telangana Police Including Senior Commander", "summary": "Nearly 30 CPI (Maoist) members, including PLGA Battalion deputy commander Sodi Keshalu, have surrendered to Telangana police. This follows the January surrender of commander Badse Sukka and 19 others. DGP B Shivadhar Reddy urged remaining underground cadres to renounce violence and join the democratic mainstream, offering safety and rehabilitation.", "category": "India", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Andhra Government Assures No Shortage of LPG, Petrol, or Fertilisers", "summary": "Civil Supplies Director Nupur Ajay Kumar confirmed that Andhra Pradesh has adequate stocks of LPG, petrol, diesel, and fertilisers. The state currently holds 14,000 tonnes of LPG, well above the daily 4,000-tonne demand. Kumar urged citizens to ignore social media rumors of shortages and confirmed that 100% home delivery of gas cylinders is being maintained.", "category": "Economy", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Palaniswami and Top BJP Leaders File Nominations for Tamil Nadu Polls", "summary": "AIADMK chief Edappadi K Palaniswami and prominent BJP leaders including L Murugan and Tamilisai Soundararajan filed their nomination papers on the final day for the April 23 Tamil Nadu elections. Over 7,000 candidates have filed so far. VCK chief Thol Thirumavalavan withdrew his candidacy to maintain alliance cohesion, nominating Jothimani in his place.", "category": "Politics", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Court Extends Custody for Five Suspects Linked to AQIS and ISIS", "summary": "A Vijayawada court extended the judicial custody of five terror suspects until April 20 and granted police five days for further questioning. The accused, including individuals from Hyderabad and Ballari, were arrested for alleged links to AQIS and ISIS. Investigators claim the group used social media to radicalize others and aimed to create a dedicated women's terror cell.", "category": "Law", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Three Men Drown in Pennar River During Short Film Shoot", "summary": "Three men, including an engineering student and a homeopathy college employee, drowned in the Pennar river in Andhra's Kadapa district while filming a short film. The victims were part of an eight-member team. Police recovered two bodies on Sunday night and the third on Monday morning. A case of accidental death has been registered.", "category": "India", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Nemom Constituency Set for High-Stakes Triangular Battle in Kerala", "summary": "The Nemom assembly seat is witnessing a fierce contest between CPI(M)’s V Sivankutty, BJP’s Rajeev Chandrasekhar, and Congress’s KS Sabarinadhan. Historically the BJP's only winning seat in Kerala, the contest is now a focal point for all three major alliances. While BJP banks on its urban base, the Congress hopes to flip the seat amid public anger against the LDF government.", "category": "Politics", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "PM Modi Pledges Global Recognition for Assam in Election Rally", "summary": "Addressing a rally in Barpeta, PM Narendra Modi promised to bring self-reliance and global recognition to Assam. He compared the BJP's 10-year track record of peace and higher MSP for rice to the previous Congress administration's struggles with insurgency and middlemen. Modi accused Congress of supporting illegal immigrants and endangering state identity for political gain.", "category": "Politics", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Supreme Court Directs NIA to Probe Mob Violence in West Bengal’s Malda", "summary": "The Supreme Court has handed over the investigation of mob violence in Malda, where seven judicial officers were held hostage, to the NIA. The court slammed the state administration's failure and 'obstinate' behavior by the chief secretary. The NIA is authorized to take over multiple FIRs related to the incident, which the court described as a pre-planned and instigated act.", "category": "Law", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Kharge Accuses PM Modi of Delaying Women's Quota for Political Gain", "summary": "Congress President Mallikarjun Kharge alleged that the Union government deliberately delayed the implementation of the women’s reservation law for 30 months to use it as a political tool for upcoming assembly elections. Speaking in Assam, he also accused the BJP of favoring corporate houses over ordinary citizens and using selective administrative actions like bulldozer drives.", "category": "Politics", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Data Shows 95 Percent of Deleted Nandigram Voters are Muslims", "summary": "An analysis of Election Commission data by the Sabar Institute reveals that 95.5% of voters removed from supplementary lists in West Bengal’s Nandigram are Muslims. Despite Muslims making up only 25% of the local population, they represent nearly all removals across seven lists. In contrast, earlier data from December 2025 showed a more proportional representation of deletions.", "category": "Politics", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "BJP Supporter Dies in Nagaland Pre-Poll Violence; Prohibitory Orders Imposed", "summary": "A BJP supporter, Imrongsungba Imchen, died following injuries sustained during clashes between supporters of an Independent and a BJP candidate in Nagaland’s Mokokchung district. The violence occurred ahead of the April 9 by-election for the Koridang seat. Authorities have imposed prohibitory orders in parts of the district to prevent further escalation.", "category": "Politics", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "BJP Expands Influence in Kerala Beyond Conventional Hindu Base", "summary": "The BJP is intensifying its push in Kerala for the 2026 assembly elections, targeting 30 to 40 key seats. By leveraging its power at the Centre and engaging in social engineering with the Ezhava and Christian communities, the party aims to break the state's traditional bipolar politics. Key candidates include Rajeev Chandrasekhar in Nemom and Shobha Surendran in Palakkad.", "category": "Politics", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Bangladesh Seeks Wheat Imports from India Amid Global Supply Tensions", "summary": "Bangladesh is negotiating to purchase wheat from India to meet domestic demand as the West Asia conflict disrupts global supply chains. India recently eased its export ban, allowing for 2.5 million tonnes of grain and 500,000 tonnes of wheat-based products to be shipped. High maritime shipment costs have made Indian wheat a more viable option for neighboring Bangladesh.", "category": "Business", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "IAF Chief AP Singh Begins Week-Long Defence Visit to United States", "summary": "Air Chief Marshal AP Singh has started a seven-day visit to the US to strengthen bilateral defence ties. Discussions are expected to focus on the delivery of F404 engines for the Tejas LCA Mk-1A and joint production of F414 engines. Singh’s visit coincides with US efforts to compete for an Indian contract for 60 medium transport aircraft.", "category": "Politics", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Five-Year-Old Found Dead in Bihar Residential School; Owner Detained", "summary": "A five-year-old student, Ashu Kumar, was found dead with multiple injuries at Gurukul Hostel in Bihar’s Jehanabad district. While the family alleges the boy was stabbed, school authorities claimed he died after falling from the first floor. Police have detained the school owner for interrogation and deployed additional forces due to local tension following the discovery.", "category": "India", "page": 7, "importance": 4, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Hearing Commences in Madhya Pradesh High Court Over Bhojshala Site Dispute", "summary": "The Indore Bench of the Madhya Pradesh High Court began hearings on five petitions concerning the 11th-century Bhojshala monument. Petitioners argue that evidence establishes the site as a temple dedicated to Goddess Saraswati. The hearing, lasting over two hours, is part of a long-standing legal battle regarding the site's religious identity and usage.", "category": "Culture", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Seven Foreigners Remanded to Judicial Custody in Terror Conspiracy Case", "summary": "A Delhi court has sent seven foreign nationals, including six Ukrainians, to 30-day judicial custody for their alleged involvement in a terror conspiracy. The NIA is investigating suspected links to ethnic rebel groups in India and Myanmar, as well as the provision of drone training. The group was arrested for breaching national security protocols.", "category": "Law", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Forest Department Probes Shooting Death of Leopard in Mysuru", "summary": "Karnataka forest officials are investigating the death of a leopard found with three bullet wounds in its body in Mysuru's Hunsur division. Forest Minister Eshwar Khandre ordered a thorough probe and promised punishment for those guilty. The postmortem confirmed the animal was killed by gunfire, leading to concerns over illegal poaching in the region.", "category": "Environment", "page": 7, "importance": 3, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Solar and Battery Power Now More Affordable Than Average Purchase Rates", "summary": "A study by energy think tank Ember finds that solar power combined with battery storage can now meet 90% of India's electricity demand at lower costs than current average purchase rates. Falling battery costs have made solar a reliable day-and-night option. In seven of India's largest states, the levelised cost of solar plus storage is already cheaper than prevailing coal power costs.", "category": "Environment", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Supreme Court Orders Home Secretary to Appear Over Ineffective CCTV Compliance", "summary": "The Supreme Court has summoned the Union home secretary to explain the 'disappointing' lack of progress in installing functional CCTVs in police stations and probe agencies. A bench noted that the Centre failed to provide effective responses during meetings with stakeholders. The court's 2021 judgment mandated nationwide CCTV coverage to ensure transparency in police conduct.", "category": "Law", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Japanese Tourist Molested by Five Men at Jaipur’s Jaigarh Fort", "summary": "A 32-year-old Japanese tourist was allegedly molested by five men at the Jaigarh Fort, a UNESCO World Heritage site. The woman fled and reported the incident to a guard and the Amer police station. An FIR has been registered under Section 74 (molestation). Police are currently reviewing CCTV footage from the surrounding area to identify the suspects.", "category": "India", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Three Arrested in Meerut After Cyanide Poisoning Kills Three Men", "summary": "Police in Meerut arrested three people, including the sister of one victim, for a premeditated cyanide poisoning that left three men dead. The motive was allegedly domestic abuse. Investigators discovered the prime suspect had researched cyanide administration on Google. The poisonous chemical was mixed into a pouch of country-made liquor and handed to the targets.", "category": "Law", "page": 7, "importance": 4, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Supreme Court Mandates Legal Studies Content Revision for All School Classes", "summary": "The Supreme Court has told the Centre that the revision of textbooks regarding legal studies and the judiciary should extend to all school classes, not just Class 8. An oversight committee headed by Justice (retd) Indu Malhotra will finalise the new curriculum. The move follows concerns over 'distorted images' of the judiciary presented to students at an impressionable age.", "category": "Education", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Mastermind of ₹22.31-Crore Bullet Train Land Fraud Arrested in Hyderabad", "summary": "The Mira-Bhayander-Vasai-Virar police arrested Harihar Rana for allegedly orchestrating a ₹22.31-crore fraud involving land compensation for the Mumbai-Ahmedabad High Speed Rail. Rana and his accomplices duped an illiterate woman by using fake SIM cards and deceptive tactics. Police are now tracking the money trail and investigating how the defrauded funds were spent.", "category": "Law", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Kirti Vardhan Singh to Represent India at Myanmar President’s Inauguration", "summary": "Minister of State for External Affairs Kirti Vardhan Singh will visit Myanmar from April 8-11 to attend the inauguration of President Min Aung Hlaing. Singh will hold bilateral talks on trade, economic cooperation, and development assistance. He is also scheduled to interact with the Indian diaspora in Yangon during the four-day diplomatic visit.", "category": "Politics", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Sunetra Pawar Files Nomination for Baramati Bypoll; Shiv Sena (UBT) Offers Support", "summary": "NCP leader Sunetra Pawar filed her nomination for the Baramati assembly bypoll, mandated by the death of her husband Ajit Pawar. Shiv Sena (UBT) MP Sanjay Raut extended best wishes, though a final decision on official MVA support rests with Uddhav Thackeray. The Congress has also fielded a candidate for the seat, potentially leading to a competitive contest.", "category": "Politics", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Government Extends Energy Efficiency Timeline for Induction Hobs", "summary": "The Ministry of Power has postponed the implementation of strict energy efficiency norms for counter-top induction hobs by six months to January 1, 2027. The move aims to boost electric cooking adoption as the West Asia crisis impacts LPG supplies. Induction hobs will eventually come under a mandatory star labelling regime to improve energy consumption standards.", "category": "Economy", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "NIA Adds Pahalgam Attack Handler Saifullah to Most Wanted List", "summary": "The National Investigation Agency has included Saifullah, alias Sajid Jatt, a leader of The Resistance Front, in its most wanted list. Saifullah is allegedly the main handler of the April 2025 Pahalgam terror attack that killed multiple people. A non-bailable warrant has been issued by a Jammu court, and the NIA is seeking information on his whereabouts in Pakistan.", "category": "India", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "One Worker Killed and Eight Injured in Jharkhand Steel Plant Explosion", "summary": "A furnace blast at a private steel plant in Jharkhand’s Ramgarh district killed one worker and left eight others injured, five of them in critical condition with severe burns. The incident occurred at a facility in Hesla. The industry department has ordered a thorough inquiry into the plant's safety protocols and the circumstances leading to the explosion.", "category": "India", "page": 9, "importance": 4, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Strait of Hormuz Transits Reach Post-War High as Iran Grants Exemptions", "summary": "Traffic through the Strait of Hormuz has risen to its highest level since the start of the war, with 21 ships transiting over the weekend. Tehran has granted exemptions for 'brotherly' Iraqi crude and some Indian LPG tankers. Despite the rise, traffic remains a fraction of pre-war levels. Iran is currently formalizing a law to govern control and fees for passage through the waterway.", "category": "World", "page": 11, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Dozens of Qatari LNG Tankers Idle Across Asia Due to War", "summary": "More than 48 Qatari liquefied natural gas tankers are idling in waters near India, Sri Lanka, and Singapore as the Strait of Hormuz remains largely closed. Qatar was forced to shut production at its largest plant following drone attacks. The disruption has caused massive shifts in the global LNG market, forcing energy-starved nations to cut consumption and seek alternative supplies.", "category": "Economy", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "UAE Halts Debt Rollover for Pakistan Adding Financial Strain", "summary": "Pakistan's economy faces a new crisis after the UAE failed to roll over a $3 billion loan for the first time in seven years. The loan represents about 18% of Pakistan's foreign exchange reserves, which stood at $16.4 billion in late March. The move adds to pressures from soaring oil prices and regional instability, leaving Islamabad with severely constrained fiscal space.", "category": "Economy", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Russian Attacks Kill Four in Ukraine as Drones Target Oil Infrastructure", "summary": "Russian drone strikes on Odesa killed two women and a toddler, while Ukrainian long-range drones targeted a key Russian Black Sea port used for oil exports. Shelling in Kherson also killed an elderly woman. The escalations continue as both nations target energy infrastructure and logistical hubs amid the ongoing conflict, with significant civilian casualties reported on both sides.", "category": "World", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Auto Dealers Warn of Vehicle Delivery Delays Due to War Disruptions", "summary": "The Federation of Automobile Dealers Associations (FADA) reported that 53.2% of surveyed dealers are experiencing supply disruptions linked to the US-Iran war. Delays of three weeks or more were reported by 17.1% of dealers, primarily affecting commercial vehicles. The shortage is attributed to redirected LPG and PNG supplies, which are critical for automobile manufacturing processes.", "category": "Business", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Finance Minister Sitharaman Warns of Permanent Volatility in Global Trade", "summary": "FM Nirmala Sitharaman stated that trade fragmentation and the West Asia conflict are moving the global economy toward a state of 'permanent volatility.' Speaking in Delhi, she noted that rising global public debt, reaching $106 trillion, constrains fiscal space for many advanced economies. However, she emphasized that India maintains sufficient fiscal room to support domestic growth.", "category": "Economy", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Smartphone Makers Hike Prices by 40 Percent Amid Component Scarcity", "summary": "Top smartphone brands including Samsung, Vivo, and Xiaomi have raised prices by up to 40% in India. The hikes are attributed to the West Asia war and a global scarcity of memory chips. Vivo's budget T4 Lite saw a 40% jump, while Samsung's Galaxy A series prices increased by over 30%. Retailers warned that these significant increases might only be the beginning of a larger pricing shift.", "category": "Business", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Hikaru Nakamura Blames Seconds Following Loss to Sindarov in Candidates", "summary": "World No.2 Hikaru Nakamura attributed his Round 5 loss at the Candidates tournament to his team of 'seconds,' claiming their preparation was flawed. Nakamura lost to 20-year-old Uzbek Grandmaster Javokhir Sindarov after a line in the Marshall Gambit caught him off guard. The incident highlights the evolving and high-pressure role of technical assistants in modern elite chess.", "category": "Sports", "page": 13, "importance": 4, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Election Commission rejects claims of 27 lakh doubtful voters in Bengal", "summary": "The Election Commission has rejected claims that 27 lakh voters in West Bengal were placed in a doubtful category. The electoral roll for the upcoming assembly polls has been finalized after a special intensive revision. TMC supporters had sought the inclusion of names they claimed were deleted, but judicial officers informed the Supreme Court that such additions cannot be made now.", "category": "Politics", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119559", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_07-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119559"}]}, {"headline": "Land issues and funding gaps stall Bengaluru suburban rail project", "summary": "The 148km Bengaluru Suburban Rail Project is facing delays due to persistent land acquisition issues and funding disagreements between the State and Centre. Only minor work has been completed on two of the four planned corridors. Recent arbitration rulings have further complicated the timeline, as K-RIDE seeks to revive stalled tenders and resolve financial disputes with contractors.", "category": "Infrastructure", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119559", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_07-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119559"}]}, {"headline": "Victoria Hospital ventilators remain broken for ten months in Bengaluru", "summary": "Eight electric ventilators in the ICU of Victoria Hospital have been non-functional since June 2025, severely impacting emergency operations. Hospital authorities claim a third-party service provider failed to maintain the equipment despite repeated notices. The Karnataka Lokayukta has taken suo motu cognizance of the matter, noting that patient care is being compromised.", "category": "Health", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119559", "sources": [{"newspaper": " rt dismissed an appeal by a former owner who claimed they had sold the vehicle but failed to update official records.", "category": "Law", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119559", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_07-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119559"}]}, {"headline": "Campaigning intensifies in Karnataka bypolls with focus on dynasty politics", "summary": "Electoral campaigning for the Bagalkot and Davanagere South bypolls has reached a fever pitch. Senior leaders from BJP and Congress are trading barbs over dynasty politics and caste-based voting patterns. CM Siddaramaiah and former CM Basavaraj Bommai have both hit the campaign trail, focusing on development promises and local legacy issues to sway voters before the final poll date.", "category": "Politics", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119559", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_07-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119559"}]}, {"headline": "Scam-ridden Mahadev app returns with new name for election betting", "summary": "The Mahadev betting app, currently under investigation for a ₹6,000-crore money laundering case, has reportedly resurfaced under the name ‘Mahadeev’. The platform is allegedly facilitating bets on the upcoming IPL and assembly elections in Bengal, Tamil Nadu, and Assam. Intelligence agencies are tracking the app's new servers and predicted outcomes designed to lure vulnerable punters.", "category": "India", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119559", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_07-04-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/119559"}]}, {"headline": "India supports ceasefire in talks with Iranian and West Asian counterparts", "summary": "External Affairs Minis function buildAll() {
  vpW=outer.offsetWidth; vpH=outer.offsetHeight;
  hTrack.innerHTML=''; panels.length=0;
  sortedCats.forEach((cat,ci)=>{
    const m=CAT_META[cat]||{color:"#e8334a",icon:"📰"};
    const arts=byCategory[cat];
    const panel=document.createElement('div');
    panel.className='cat-panel';
    panel.style.setProperty('--cc',m.color);
    panel.innerHTML=`<div class="progress-row" id="prow-${ci}" style="--cc:${m.color}"></div><div class="v-feed" id="vfeed-${ci}"><div class="v-track" id="vtrack-${ci}"></div></div>`;
    hTrack.appendChild(panel);
    const pRow=panel.querySelector(`#prow-${ci}`);
    const vFeed=panel.querySelector(`#vfeed-${ci}`);
    const vTrack=panel.querySelector(`#vtrack-${ci}`);
    const cardH=vFeed.getBoundingClientRect().height||vpH;
    arts.forEach(art=>vTrack.appendChild(buildCard(art,cardH,m,cat)));
    panels.push({pRow,vFeed,vTrack,articles:arts,artIdx:0});
    buildPRow(ci);
  });
  hTrack.style.transition='none';
  hTrack.style.transform='translateX(0)';
  syncV(0,false);
}

function buildCard(art,h,m,cat) {
  const src=art.sources?.[0];
  const href=src?.pdf_filename?`pdfs/${src.pdf_filename}#page=${src.page}`:(src?.telegram_url||'#');

        <div class="info-btn"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6.5" stroke="#444" stroke-width="1.3"/><circle cx="7.5" cy="4.5" r="0.8" fill="#555"/><path d="M7.5 7v4" stroke="#555" stroke-width="1.5" stroke-linecap="round"/></svg></div>

function buildPRow(ci) {
  const p=panels[ci],ai=p.artIdx;
  p.pRow.innerHTML='';
  p.articles.forEach((_,i)=>{
    const seg=document.createElement('div');
    seg.className='pseg'+(i<ai?' done':i===ai?' active':'');
    p.pRow.appendChild(seg);
  });
}

function syncV(ci,animated) {
  const p=panels[ci],h=p.vFeed.getBoundingClientRect().height;
  p.vTrack.style.transition=animated?'transform 0.35s cubic-bezier(0.4,0,0.2,1)':'none';
  p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;
  buildPRow(ci);
}

function goArt(d) {
  const p=panels[catIdx];
  const n=Math.max(0,Math.min(p.artIdx+d,p.articles.length-1));
  if(n===p.artIdx&&d!==0)return;
  p.artIdx=n; syncV(catIdx,true); dismiss();
}

function goCat(idx,animated=true) {
  idx=Math.max(0,Math.min(idx,sortedCats.length-1));
  if(idx===catIdx&&animated)return;
  const prev=catIdx; catIdx=idx;
  hTrack.style.transition=animated?'transform 0.38s cubic-bezier(0.4,0,0.2,1)':'none';
  hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;
  if(animated&&idx!==prev) {
    const m=CAT_META[sortedCats[idx]]||{color:"#e8334a",icon:"📰"};
    catFlash.style.background=m.color+'18';
    cfIcon.textContent=m.icon; cfName.textContent=sortedCats[idx]; cfName.style.color=m.color;
    catFlash.classList.add('on'); setTimeout(()=>catFlash.classList.remove('on'),500);
  }
  dismiss();
}

let dismissed=false;
function dismiss() {
  if(dismissed)return; dismissed=true;
  hintUp.classList.remove('visible'); hintRight.classList.remove('visible');
  hintUp.classList.add('gone'); hintRight.classList.add('gone');
}

(function initHints() {
  const KEY='dailyBriefHintSeen';
  if(!localStorage.getItem(KEY)) {
    localStorage.setItem(KEY,'1');
    setTimeout(()=>{ if(!dismissed){ hintUp.classList.add('visible'); hintRight.classList.add('visible'); } },2500);
  }
})();

let tsX=0,tsY=0,tcX=0,tcY=0,axis=null,drag=false;
outer.addEventListener('touchstart',e=>{

  const p=panels[catIdx]; if(p)p.vTrack.style.transition='none';
},{passive:true});
outer.addEventListener('touchmove',e=>{
  if(!drag)return;
  const dx=e.touches[0].clientX-tsX,dy=e.touches[0].clientY-tsY;
  tcX=dx; tcY=dy;
  if(!axis&&(Math.abs(dx)>8||Math.abs(dy)>8))axis=Math.abs(dx)>Math.abs(dy)?'h':'v';
  if(!axis)return;
  e.preventDefault();
  if(axis==='h'){
    const edge=(catIdx===0&&dx>0)||(catIdx===sortedCats.length-1&&dx<0);
    hTrack.style.transform=`translateX(${-catIdx*vpW+dx*(edge?.14:1)}px)`;
  }else{
    const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height;
    const edge=(p.artIdx===0&&dy>0)||(p.artIdx===p.articles.length-1&&dy<0);
    p.vTrack.style.transform=`translateY(${-p.artIdx*h+dy*(edge?.14:1)}px)`;
  }
},{passive:false});
outer.addEventListener('touchend',()=>{
  if(!drag)return; drag=false;
  if(axis==='h'){
    const t=vpW*.2;
    if(tcX<-t)goCat(catIdx+1);
    else if(tcX>t)goCat(catIdx-1);
    else{hTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;}
  }else if(axis==='v'){
    const t=vpH*.2;
    if(tcY<-t)goArt(1);
    else if(tcY>t)goArt(-1);
    else{const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height;p.vTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;}
  }
  axis=null;
},{passive:true});

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'||e.key===' '){e.preventDefault();goArt(1);}
  if(e.key==='ArrowUp'){e.preventDefault();goArt(-1);}
  if(e.key==='ArrowRight'){e.preventDefault();goCat(catIdx+1);}
  if(e.key==='ArrowLeft'){e.preventDefault();goCat(catIdx-1);}
});
let wl=false;
outer.addEventListener('wheel',e=>{
  e.preventDefault();if(wl)return;wl=true;
  Math.abs(e.deltaX)>Math.abs(e.deltaY)?goCat(catIdx+(e.deltaX>0?1:-1)):goArt(e.deltaY>0?1:-1);
  setTimeout(()=>wl=false,500);
},{passive:false});
window.addEventListener('resize',()=>{
  vpW=outer.offsetWidth;vpH=outer.offsetHeight;
  hTrack.style.transition='none';
  hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;
  panels.forEach(p=>{
    const h=p.vFeed.getBoundingClientRect().height;
    p.vTrack.querySelectorAll('.card').forEach(c=>c.style.height=h+'px');
    p.vTrack.style.transition='none';
    p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;
  });
});

buildAll();
</script>
</body>
</html>
