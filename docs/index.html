irst crewed mission into low Earth orbit.", "category": "Science", "page": 8, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123275", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 11-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/123275"}], "article_id": "10a72954"}, {"headline": "India retail inflation falls to four month low in June", "summary": "Official data reveals that India’s retail inflation eased to a four-month low in June. The Consumer Price Index (CPI) showed a moderation driven primarily by a cooling in food and fuel prices. Economic analysts suggest that while the drop is positive for the economy, the Reserve Bank of India may maintain a cautious stance on interest rates until inflation stabilizes further.", "category": "Economy", "page": 13, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123275", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 11-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/123275"}], "article_id": "61912f1e"}, {"headline": "England secures vital victory in T20 World Cup group stage", "summary": "The England cricket team secured a crucial win in their latest T20 World Cup group match, boosting their chances of qualifying for the knockout stages. The victory was defined by a strong performance from the middle-order batsmen and disciplined bowling in the death overs. The team now moves up the points table as they prepare for the upcoming matches against top-seeded rivals.", "category": "Sports", "page": 14, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123275", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 11-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/123275"}], "article_id": "d94a721b"}, {"headline": "PM Modi Calls for Pandemic-era Austerity Drive to Curb Imports", "summary": "Prime Minister Narendra Modi urged citizens and government bodies to adopt austerity measures similar to those used during the Covid-19 pandemic. The move aims to reduce the oil import bill and conserve foreign exchange reserves amid the West Asian crisis. Key areas for reduction include petrol and diesel consumption, as well as non-essential use of gold, pulses, and fertilisers.", "category": "Economy", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/123347", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_11-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123347"}], "article_id": "5151c180"}, {"headline": "Jio IPO Set to be Fully Fresh Funding; No OFS Planned", "summary": "Reliance Industries is restructuring the IPO for its telecom arm, Jio, to potentially feature a 100% fresh issue of shares instead of an offer-for-sale (OFS). This structure aims to satisfy existing investors regarding pricing while providing capital for future growth. The valuation is likely to be between $133 billion and $154 billion, with a listing expected by July 2026.", "category": "Business", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123347", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_11-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123347"}], "article_id": "7642de94"}, {"headline": "AICC Delays Kerala CM Declaration Amid Group Rivalries", "summary": "The Congress high command has delayed naming the next Chief Minister of Kerala to prevent public protests from rival factions. While VD Satheesan has the backing of several MLAs and alliance partners, Ramesh Chennithala and K Sudhakaran are also seen as contenders. The party leadership is holding discussions in New Delhi to resolve the leadership deadlock.", "category": "Politics", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123347", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_11-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123347"}], "article_id": "0034cdf6"}, {"headline": "India and Iran to Discuss Strait of Hormuz Ship Access", "summary": "India and Iran will hold talks this week to ensure the safe navigation of Indian-flagged ships through the Strait of Hormuz. Bilateral discussions on the sidelines of the BRICS Sherpa meeting follow recent drone attacks and rising tensions in the region. Around 40-50 India-bound ships are reportedly trapped or impacted by the current instability in the maritime corridor.", "category": "World", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123347", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_11-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123347"}], "article_id": "7882f488"}, {"headline": "India and UAE to Advance Defence Ties During PM Visit", "summary": "Prime Minister Narendra Modi's upcoming visit to the UAE will focus on advancing Strategic Defence Partnership agreements. Key areas of collaboration include manufacturing, technology transfer, and counter-terrorism efforts. The visit comes amid heightened West Asian tensions, and both nations seek to strengthen regional maritime security and intelligence sharing.", "category": "World", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123347", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_11-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123347"}], "article_id": "41f31a7f"}, {"headline": "India Allows Big Funds to Bid Directly for Road Projects", "summary": "The Ministry of Road Transport has relaxed eligibility norms for build-operate-transfer (BOT) road projects to attract sovereign wealth funds and pension funds. New rules allow these long-term capital providers to bid directly without needing a construction partner if they hire a qualified project management firm. The move aims to reduce the government's burden on public finances.", "category": "Infrastructure", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123347", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_11-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123347"}], "article_id": "63f6588a"}, {"headline": "Banks Seek Dynamic Net Open Position Caps from RBI", "summary": "Major Indian banks have requested the Reserve Bank of India (RBI) to replace the current $100 million limit on Net Open Positions (NOP) with a dynamic cap based on bank size and flows. The current fixed limit is seen as restrictive for managing unhedged foreign currency exposure. Bankers argue that a size-linked limit would allow better liquidity management in the offshore market.", "category": "Economy", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123347", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_11-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123347"}], "article_id": "15080da3"}, {"headline": "House Help Startup Bookings Surge Amid Urban Labour Shortage", "summary": "On-demand domestic service apps like Snabbit and Pronto saw bookings cross 3 million in April as urban households faced acute labour shortages. Growth was driven by post-discount average order values ranging from Rs 180 to Rs 200. The sector is seeing increased competition and rising venture capital interest, despite challenges in maintaining a stable pool of service professionals.", "category": "Business", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123347", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_11-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123347"}], "article_id": "c3bcc093"}, {"headline": "Noel Tata to Retire from Tata Company Boards in November", "summary": "Noel Tata, currently heading several Tata group companies, will retire from his executive roles in November 2026 as he turns 70. The group follows strict retirement norms for senior executives. Discussions are reportedly underway with top executives regarding leadership transitions for companies including Trent and Tata Investment Corp. He will continue to serve on the Tata Trusts.", "category": "Business", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123347", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_11-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123347"}], "article_id": "3557453b"}, {"headline": "Legal Firms Advise on $130 Billion Deals in FY26", "summary": "Indian legal firms advised on corporate actions and deals worth approximately $130 billion in the current fiscal year. The activity spanned private equity, M&A, and IPOs, generating over Rs 3,000 crore in fees. Top firms including Khaitan & Co and AZB & Partners led the charts. Experts note that despite geopolitical stress, domestic consumption and infra deals kept deal flow steady.", "category": "Law", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123347", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_11-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123347"}], "article_id": "59859c8e"}, {"headline": "Wingreens World Acquires Safe Harvest in Share-swap Deal", "summary": "Wingreens World has acquired Safe Harvest, an organic staples brand, in an all-stock transaction. This marks Wingreens' fifth acquisition as it seeks to expand its portfolio of farm-to-consumer healthy products. Safe Harvest works with thousands of small farmers to produce pesticide-free grains and pulses. Wingreens is targeting a public listing within the next two years.", "category": "Business", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123347", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_11-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123347"}], "article_id": "9d65919e"}, {"headline": "Indian Bank MD Predicts Drop in Net Interest Margins", "summary": "Indian Bank MD and CEO Binod Kumar stated that the current 3% net interest margins (NIM) enjoyed by Indian banks are a luxury that may not last. As the economy matures and deposit rates rise to meet credit demand, NIMs are expected to compress. He urged banks to focus on alternative income streams and fee-based services to maintain profitability in a competitive landscape.", "category": "Economy", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123347", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_11-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123347"}], "article_id": "b9cdb3ea"}, {"headline": "eGaming Companies Seek Clarity on New Regulatory Rules", "summary": "Online gaming companies in India are approaching the Ministry of Electronics and Information Technology (MeitY) for clarity on rules that took effect in April. The industry seeks more operational guidelines on game classification, compliance thresholds, and oversight. The lack of clear definitions for permissible online games has created uncertainty for platforms and investors.", "category": "Technology", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123347", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_11-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123347"}], "article_id": "37907988"}, {"headline": "Bangladesh and Pakistan Sign Anti-Narcotics Intelligence Pact", "summary": "Bangladesh and Pakistan have signed a 10-year memorandum of understanding to step up cooperation against drug trafficking. The agreement includes intelligence sharing and joint anti-drug operations. The move follows reports of senior Bangladeshi bureaucrats undergoing training in Lahore, signaling a shift in regional security ties despite historical complexities.", "category": "World", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123347", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_11-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123347"}], "article_id": "3859fe6d"}, {"headline": "SC to Review GST Applicability on Municipal Restoration Costs", "summary": "The Supreme Court will examine whether Goods and Services Tax (GST) can be levied on payments made by utility companies to municipal bodies for road restoration. The case follows a Gujarat High Court ruling that such payments were not a taxable service. The outcome will have significant financial implications for power distribution companies and local urban bodies across India.", "category": "Law", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123347", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_11-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123347"}], "article_id": "ce79e2e2"}, {"headline": "Iran Reports Delivering Reply to US Peace Proposal", "summary": "Iran has reportedly delivered its response to a US-backed peace proposal via Pakistan. The proposal aims to end the blockade of the Strait of Hormuz and de-escalate regional conflict. While details of the reply remain confidential, the development follows a US-led effort to broker a ceasefire. Geopolitical analysts remain cautious as hostiles continue to be detected in Gulf waters.", "category": "World", "page": 8, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123347", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_11-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/123347"}], "article_id": "a2d1326c"}, {"headline": "Israel Operated Covert Iraq Base for Iran Strikes: Report", "summary": "A report suggests that Israel established a secret military outpost in the Iraqi desert to support its air strikes against Iranian targets. The base was reportedly used to monitor Iranian drone movements and provide logistical support for Israeli special forces. Iraq has denied knowledge of the facility and filed a formal complaint with the UN regarding the violation of its territorial sovereignty.", "category": "World", "page": 8, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123347", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_11-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/123347"}], "article_id": "5c6d8bf2"}, {"headline": "Hantavirus Outbreak Leads to Ship Evacuation in Canary Islands", "summary": "Spanish authorities have begun evacuating passengers from a cruise ship docked in the Canary Islands following a Hantavirus outbreak. At least two British passengers are in intensive care. The WHO has recommended a 42-day quarantine for all passengers and crew. The ship, which arrived from South Africa, remains under strict medical lockdown to prevent further spread of the rare virus.", "category": "Health", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123347", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_11-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/123347"}], "article_id": "e712cfe0"}, {"headline": "Arsenal Defeat West Ham to Stay in Premier League Race", "summary": "Arsenal secured a crucial 1-0 victory against West Ham United, keeping their Premier League title hopes alive. A late goal from Leandro Trossard ensured the Gunners remain just two wins away from the title, depending on Manchester City's results. With 79 points from 36 games, Arsenal face a tense final two matches of the season in their pursuit of a first league trophy in two decades.", "category": "Sports", "page": 13, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123347", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_11-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/123347"}], "article_id": "3ac52d6a"}, {"headline": "Most Non-Consensual Intimate Images Now Removed Within Two Hours", "summary": "Social media platforms have significantly improved their response times, removing 75% of non-consensual intimate images (NCII) within two hours of being reported. This progress follows new guidelines from the IT ministry aimed at protecting victims of deepfake and AI-generated harassment. However, challenges remain in tracking images shared on encrypted messaging services and smaller forums.", "category": "Technology", "page": 12, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123347", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_11-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/123347"}], "article_id": "5ed134a4"}, {"headline": "PM pushes for cut in fuel, gold use to save forex", "summary": "PM Narendra Modi urged citizens to reduce fuel and gold consumption to preserve foreign exchange reserves. He suggested using public transport, carpooling, and reviving work-from-home practices. Additionally, he advised a 50% reduction in chemical fertilizer use and requested people to avoid unnecessary foreign travel to maintain national economic stability during global supply chain crises.", "category": "Economy", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/123329", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_11-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123329"}], "article_id": "85b3fa69"}, {"headline": "NDA comfortably placed for 2027 presidential elections after assembly wins", "summary": "The BJP-led NDA has significantly strengthened its position in the electoral college for the 2027 presidential polls following victories in West Bengal and Rajya Sabha seat gains. The alliance now holds a dominant lead, making the upcoming presidential selection almost certain for their candidate. This shift comes as small parties like the DMK lose ground in the national electoral math.", "category": "Politics", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123329", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_11-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123329"}], "article_id": "aa336f16"}, {"headline": "Probe ordered into alleged NEET-UG 2026 paper leak and malpractice", "summary": "The National Testing Agency (NTA) and local police have launched an investigation into alleged malpractices and paper leaks during the NEET-UG 2026 exam. Reports suggest similar question patterns were shared on social media and at coaching centers in Rajasthan and Maharashtra. While NTA initially denied a leak, further scrutiny is underway following the arrest of several suspects in Jaipur.", "category": "Education", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123329", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_11-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123329"}], "article_id": "f813ac6e"}, {"headline": "India and UAE plan pact for citizen evacuations via Fujairah", "summary": "India and the UAE are negotiating a strategic pact to facilitate the evacuation of Indian expatriates during regional conflicts through the Fujairah port. The plan aims to bypass the volatile Strait of Hormuz. In case of air traffic disruptions, citizens would be moved by sea from Fujairah to Indian ports. The agreement highlights the growing logistics cooperation between the two nations.", "category": "World", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123329", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_11-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123329"}], "article_id": "3cc684f5"}, {"headline": "Niti Aayog: Primary school enrollment rises but secondary dropouts persist", "summary": "A Niti Aayog report indicates that primary school enrollment in India has improved significantly, but the transition to higher secondary levels remains a challenge. The Gross Enrollment Ratio drops from 90.9% at the primary level to 58.4% at the higher secondary level. The report emphasizes the need for better infrastructure and teacher quality to ensure students complete their full education.", "category": "Education", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123329", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_11-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123329"}], "article_id": "12d0a287"}, {"headline": "Vande Bharat Chennai-Bengaluru route leads in ridership and revenue", "summary": "The Chennai-Mysuru Vande Bharat Express via Bengaluru has recorded a 119.8% booking rate, becoming the most popular route for the semi-high-speed train. Data from the South Western Railway shows the service generated over Rs 41.2 crore in revenue in one year. While the Chennai route is flourishing, other services like the Bengaluru-Belagavi line have seen mixed results with lower occupancy.", "category": "Infrastructure", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123329", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_11-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123329"}], "article_id": "e734e496"}, {"headline": "New waste processing plants planned for Bengaluru to tackle trash", "summary": "The Bengaluru Solid Waste Management Ltd (BSWML) will float tenders for three new material recovery facilities to process 350 tonnes of dry waste daily. The project, valued at Rs 125.5 crore, aims to reduce the city's dependence on landfills and improve segregation at source. These plants will utilize automated sorting technology to produce refuse-derived fuel and enhance recycling rates.", "category": "Infrastructure", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123329", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_11-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123329"}], "article_id": "d050e880"}, {"headline": "Suicides among daily wage earners hit decade high at 31%", "summary": "Suicides among daily wage earners accounted for 31% of total suicides in India in 2024, the highest in a decade. Data from the National Crime Records Bureau shows that 52,910 daily wagers died by suicide during the year. Experts point to economic distress, lack of social security, and family problems as leading causes. Tamil Nadu and Maharashtra reported the highest number of such cases.", "category": "India", "page": 7, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123329", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_11-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/123329"}], "article_id": "4e13d503"}, {"headline": "Vice-Admiral Sanjay Vatsayan appointed chief of Western Naval Command", "summary": "Vice-Admiral Sanjay Vatsayan has been appointed as the next chief of the Mumbai-based Western Naval Command. He will take over on June 1, succeeding Vice-Admiral Krishna Swaminathan. Vatsayan will oversee strategic maritime operations and security for India's western seaboard, including key energy routes and major offshore assets critical to the nation's economy and defense.", "category": "India", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123329", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_11-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/123329"}], "article_id": "97fee528"}, {"headline": "FPI outflows hit record Rs 2.06 lakh crore in early FY25", "summary": "Foreign Portfolio Investors (FPIs) have pulled out a record Rs 2.06 lakh crore from Indian stock markets in the first few weeks of the current fiscal year. The massive sell-off is attributed to geopolitical tensions in West Asia and a shift toward domestic bonds and higher-yielding US assets. Despite the outflow, domestic institutional investors have helped stabilize the market indices.", "category": "Business", "page": 9, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123329", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_11-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/123329"}], "article_id": "9de2a849"}, {"headline": "Iran sends reply to US peace plan for 10-week truce", "summary": "Iran has officially submitted its response to a US proposal aimed at ending a series of recent incidents and establishing a 10-week truce. While details remain confidential, Iranian state media indicated that any agreement must include the lifting of specific sanctions. The move is seen as a potential de-escalation of tensions in the region, though both sides remain cautious about a deal.", "category": "World", "page": 14, "importance": 10, "telegram_url": "https://t.me/c/1877410077/123329", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_11-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/123329"}], "article_id": "421640c5"}, {"headline": "Ukraine and Russia report continued drone attacks despite truce", "summary": "Both Ukraine and Russia have reported multiple drone and missile strikes despite entering the second day of a proposed three-day humanitarian truce. The ceasefire, intended to allow for civilian aid, has been largely ignored on several frontlines. International observers have expressed concern over the rising civilian casualties and the failure of diplomatic efforts to enforce the pause.", "category": "World", "page": 14, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123329", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_11-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/123329"}], "article_id": "ef70482a"}, {"headline": "Gig workers must complete 90 days work for social security", "summary": "New central government rules mandate that gig and platform workers must have worked for at least 90 days in the previous year with a registered aggregator to be eligible for social security benefits. The move aims to regulate the sector and provide health, disability, and accident insurance. Aggregators are required to register workers and contribute 1-2% of their turnover to a welfare fund.", "category": "Business", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123329", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_11-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/123329"}], "article_id": "9279a650"}, {"headline": "First non-binary Indian candidate elected to Scottish Parliament", "summary": "Dr Q Manivannan, a transgender person of Indian origin, has become the first non-binary person to be elected to the Scottish Parliament. Representing the Scottish Green Party, Manivannan campaigned on issues of migration, social equity, and transgender rights. Their victory is hailed as a historic milestone for representation in international politics and the global LGBTQ+ community.", "category": "World", "page": 14, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123329", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_11-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/123329"}], "article_id": "ef131d83"}, {"headline": "Cut fuel use, avoid foreign travel, urges PM amid global uncertainties", "summary": "Prime Minister Narendra Modi urged collective participation to help India withstand global economic uncertainties, supply chain disruptions, and inflationary pressures. He called for reducing fuel consumption, avoiding non-essential gold purchases, and promoting domestic tourism to conserve foreign exchange.", "category": "Economy", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "366cd108"}, {"headline": "Census 2027: 80% houses mapped in New Delhi district", "summary": "Enumerators in New Delhi district have surveyed nearly 60,000 households and mapped around 80% of Census houses for House Listing Operations (HLO) ahead of the May 15 deadline. The exercise is on track to be completed within the deadline.", "category": "India", "page": 2, "importance": 3, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "73db1101"}, {"headline": "L-G asks citizens to follow traffic rules, report violations", "summary": "Delhi Lieutenant-Governor Taranjit Singh Sandhu urged residents to follow traffic rules and report violations via the Traffic Prahari app to improve road safety and traffic discipline. Contributors can earn up to ₹50,000 monthly.", "category": "India", "page": 2, "importance": 2, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "0e0d09f0"}, {"headline": "Registrations to open in June for ‘Mahila Samriddhi Yojana’", "summary": "The Delhi government plans to open registrations in June for the 'Mahila Samriddhi Yojana', a scheme offering ₹2,500 monthly to eligible women, one of the BJP's poll promises ahead of the 2025 Delhi Assembly election.", "category": "Politics", "page": 2, "importance": 3, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "48480834"}, {"headline": "Two new projects to help ease traffic congestion in north-west Delhi", "summary": "Delhi CM Rekha Gupta announced Railways approval for widening the Haiderpur-Badli rail overbridge and an elevated loop between Shalimar Bagh and Sanjay Gandhi Transport Nagar. These projects aim to reduce traffic congestion and improve connectivity in north-west Delhi.", "category": "Infrastructure", "page": 2, "importance": 3, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "7d2f56a1"}, {"headline": "Attempts on to ‘suppress’ Janakpuri school rape case, alleges Bharadwaj", "summary": "AAP Delhi president Saurabh Bharadwaj alleged attempts to \"suppress\" the Janakpuri school rape case where a three-year-old girl was allegedly raped by a caretaker. The accused was granted bail, prompting police to plan an appeal against the order.", "category": "Law", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "e0a629d3"}, {"headline": "Six new faces inducted into U.P. Cabinet ahead of 2027 Assembly poll", "summary": "Uttar Pradesh CM Yogi Adityanath expanded his Cabinet, inducting six new Ministers and elevating two Ministers of State. The reshuffle, focusing on caste balance with OBC and SC leaders, is the last before the 2027 Assembly election. SP chief Akhilesh Yadav criticised it as a time-passing exercise.", "category": "Politics", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "0ecfffa6"}, {"headline": "In Kota, post-surgery complications claim another woman’s life", "summary": "A 22-year-old woman died from post-Caesarean complications at J.K. Lone Hospital in Kota, following two other deaths from C-section complications last week. Three more women remain critical.", "category": "Health", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "4b3060a0"}, {"headline": "End of fear, now era of trust: Bengal CM ahead of first Cabinet meeting", "summary": "West Bengal CM Suvendu Adhikari declared the \"air of fear\" has ended and \"trust has taken its place\" in the State. Ahead of his first Cabinet meeting, he vowed to rebuild West Bengal and announced the Cabinet may establish inquiry commissions into \"atrocities against women\" during the previous regime.", "category": "Politics", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "61c929cf"}, {"headline": "Patnaik kicks off fortnight-long campaign on women’s rights", "summary": "BJD chief Naveen Patnaik launched a 'Women’s Rights Campaign', attacking BJP over women’s reservation, accusing them of propaganda without concrete contributions. He spoke virtually on Mother's Day, reducing women to a vote bank.", "category": "Politics", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "5bf85915"}, {"headline": "Tejashwi attacks Bihar govt. over video of ‘assault’ by MLA", "summary": "RJD leader Tejashwi Yadav criticised Bihar's NDA government for not acting against a BJP MLA allegedly assaulting a man in his house, while police baton-charged teaching job aspirants and booked over 5,000 protesters.", "category": "Politics", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "8174ae07"}, {"headline": "4 policemen suspended as Crime Branch begins probe into Odisha lynching", "summary": "Four policemen and two home guards were suspended in Odisha after the Crime Branch began probing the May 7 lynching of a GRP constable, Soumya Ranjan Swain, by a mob after an alleged attempted rape. Police said 11 people have been arrested.", "category": "Law", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "da963624"}, {"headline": "‘Party structure destroyed’: Trinamool leaders blame I-PAC for election setback", "summary": "A section of Trinamool Congress leaders is blaming political consultancy firm I-PAC for the party's recent Assembly election defeat to the BJP, alleging I-PAC \"completely destroyed\" the party organization and criticizing Abhishek Banerjee's \"full dependency\" on the firm.", "category": "Politics", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "99e4cb44"}, {"headline": "The crumbling of Awadh", "summary": "A CAG report highlights extensive encroachment and neglect of Centrally Protected Monuments (CPMs) in Uttar Pradesh. Of 487 CPMs, 31 are untraceable, 96 encroached, and many lack proper ownership. Heritage conservationists fear losing Awadhi culture without intervention and demand stronger heritage laws.", "category": "Culture", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "27d19e8d"}, {"headline": "Young faces make a mark for Congress in Kerala poll", "summary": "About 30 young Congress workers, mostly first-time legislators, emerged victorious in the Kerala Assembly elections, accounting for nearly half the party's wins. This infusion of fresh blood, with leaders averaging 45 years, is seen as crucial for the party's future.", "category": "Politics", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "b3e40855"}, {"headline": "Gelatin sticks found on Modi’s convoy route in Bengaluru", "summary": "Police recovered a packet with two gelatin sticks near Prime Minister Narendra Modi’s convoy route in Bengaluru, minutes before it passed. A suspect has been detained, and a case registered, marking a potential security breach.", "category": "India", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "30c064f5"}, {"headline": "Chakankar appears before SIT in Kharat case, says she will cooperate", "summary": "NCP leader Rupali Chakankar appeared before an SIT for questioning regarding alleged association with self-styled godman Ashok Kharat, arrested in sexual exploitation cases. Chakankar, who resigned as Maharashtra women’s panel chief, vowed full cooperation.", "category": "Law", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "6a097312"}, {"headline": "Signal, film made by Vizag director, goes to Cannes, academy", "summary": "Visakhapatnam-born filmmaker Sagi Sree Hari Varma’s iPhone-shot short film \"Signal\" will be screened at the Cannes Film Festival’s Marché du Film on May 15 and later at the Academy of Motion Picture Arts and Sciences in Los Angeles.", "category": "Culture", "page": 6, "importance": 3, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "4db7c66d"}, {"headline": "A.P. plans ‘perfection hubs’ for global brand recognition", "summary": "The Andhra Pradesh government plans to develop Product Perfection Clusters (PPCs) in economic regions to elevate local manufacturing to international standards. The initiative includes logistics mapping, quality control, and sourcing advanced technologies to boost global brand recognition for various products.", "category": "Economy", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "2c0df7e0"}, {"headline": "The Governor who forgot his job", "summary": "The article criticizes Tamil Nadu Governor Rajendra Vishwanath Arlekar for demanding pre-swearing-in proof of majority from the TVK, the single largest party, deeming it constitutionally wrong. It argues for the floor of the House as the only test of majority and calls for clear guidelines on gubernatorial discretion.", "category": "Law", "page": 8, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "f8ee8a3c"}, {"headline": "Advancing India-South Korea defence innovation ties", "summary": "The launch of the Korea-India Defence Accelerator (KIND-X) aims to deepen bilateral defence innovation, co-development, and co-production between India and South Korea. This initiative seeks to connect businesses, start-ups, and academia to develop dual-use technologies, aligning with both countries' defence strategies.", "category": "Technology", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "bb9c7653"}, {"headline": "Cost to access medical care remains high", "summary": "The Union Labour Ministry's new scheme offering free annual health check-ups to workers aged 40+ via ESIC is commendable but faces challenges. The article highlights limited coverage, opportunity costs of accessing care, and unaddressed occupational disease risks, suggesting proactive measures like mobile units and compensation are needed.", "category": "Health", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "efa0e0bd"}, {"headline": "Political platform ignores the INDI Alliance", "summary": "A letter to the editor criticizes Mamata Banerjee's call for a new 'united platform' against BJP, deeming it untimely and questioning her role in the existing INDI Alliance, especially given BJP's rise in West Bengal.", "category": "Politics", "page": 8, "importance": 2, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "3e88a1b9"}, {"headline": "CM Vijay faces immense challenges in Tamil Nadu", "summary": "A letter to the editor expresses mixed feelings about C. Joseph Vijay becoming Tamil Nadu CM, noting the \"satisfaction and anxiety\" on his face. It highlights the challenge of fulfilling election promises without increasing debt and the high expectations from voters.", "category": "Politics", "page": 8, "importance": 2, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "45ebe2ec"}, {"headline": "The insidious return of separate electorates", "summary": "The article discusses the troubling communal segregation in Assam's State Assembly, where the ruling BJP has no Muslim MLAs and the Opposition is almost entirely Muslim. It draws parallels to the Morley-Minto Reforms of 1909, warning against the re-emergence of separate electorates in disguise.", "category": "Politics", "page": 9, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "cabb15a9"}, {"headline": "Kerala’s fiscal worries", "summary": "Kerala's new UDF government faces daunting fiscal challenges, with the Opposition claiming an \"empty treasury\" inherited from the LDF. The article highlights the State's high expenditures, limited own-tax revenues, and the impact of Union fiscal policies, posing a tough task for the new Finance Minister.", "category": "Economy", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "97b27370"}, {"headline": "Prevalence of fake currency still a reality post-demonetisation", "summary": "A decade after demonetisation, fake currency persists in India. Data shows ₹54.61 crore worth of fake notes seized in 2024, with Gujarat accounting for over half since 2017. Counterfeit ₹500 and ₹2,000 notes increased, indicating the move's limited impact on eradicating the problem.", "category": "Economy", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "441b4f04"}, {"headline": "Governor’s role in govt. formation", "summary": "The article explains constitutional provisions regarding the Governor's role in appointing a Chief Minister, especially in a hung Assembly. It discusses recommendations from various commissions and Supreme Court rulings, highlighting concerns over inconsistent application of discretionary powers and suggesting codifying rules.", "category": "Law", "page": 10, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "fe5367aa"}, {"headline": "What measures are needed to address Delhi’s heat crisis?", "summary": "Delhi and the NCR face intensifying heatwaves due to rapid urbanization, concrete infrastructure, and loss of natural cooling systems, creating an \"urban heat island effect.\" The article calls for structural changes in city building, green infrastructure, sustainable transport, and social protection measures to mitigate the crisis.", "category": "Environment", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "f8223dca"}, {"headline": "AI-enabled oversight layer for continuous electoral roll monitoring", "summary": "The article proposes an AI-enabled oversight layer for ECINet to continuously monitor electoral operations, detect anomalies, and discriminatory patterns in real-time. This aims to strengthen transparency, neutrality, and accountability in electoral roll management, addressing issues exposed by SIR 2.0.", "category": "Technology", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "0d1d3585"}, {"headline": "Kailash is tied to his wife’s apron strings", "summary": "This article explains the idiom \"tied to someone's apron strings,\" meaning to be controlled or dominated by another person, usually a mother or wife. It traces the origin to historical practices of mothers tying children to their aprons. It also explains the pronunciation of 'marquee'.", "category": "Culture", "page": 11, "importance": 1, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "280f254a"}, {"headline": "Manipur Naga bodies urge PM to rein in Kuki groups", "summary": "Three Naga civil society organizations in Manipur petitioned PM Modi to intervene against \"sustained violence and territorial aggression\" by Kuki groups, accusing them of cross-border military invasion and calling for operations to evict KNA-B members and expedite the Indo-Naga peace process.", "category": "Politics", "page": 12, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "72774683"}, {"headline": "2 arrested for using fake orders to free prisoners in Mizoram", "summary": "Mizoram police arrested two individuals, including an ambulance driver, for allegedly masterminding a racket that used forged court orders to release 17 prisoners, booked under serious criminal offenses, from a district jail between January and March.", "category": "Law", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "aab9605a"}, {"headline": "Marandi seeks NIA probe into ‘extortion network’", "summary": "Jharkhand Opposition Leader Babulal Marandi wrote to CM Hemant Soren, requesting an NIA probe into an alleged nexus between police and criminals in Dhanbad, citing allegations by gangster Prince Khan. He also demanded the removal of Dhanbad Senior Superintendent of Police.", "category": "Politics", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "702aafa5"}, {"headline": "Paper leaks, fake degrees, recruitment fraud: ED probes ₹4,000-cr scams", "summary": "The Enforcement Directorate is investigating alleged scams worth nearly ₹4,000 crore in the education sector across India. Cases involve paper leaks, fake admissions, scholarship fraud, fake degrees, and recruitment scams, with assets worth ₹1,500 crore attached and high-profile arrests made.", "category": "Law", "page": 12, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "8ffa9482"}, {"headline": "CII says private sector capex grew by 67% in September 2025", "summary": "India's private sector capital expenditure grew 67% to ₹7.7 lakh crore in September 2025, according to CII data, indicating a decisive turn in the investment cycle. CII urged industry to aid the economy by cutting fuel usage and front-loading FY27 investments.", "category": "Economy", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "4a25221d"}, {"headline": "M.P. govt. forms panel to probe boat tragedy", "summary": "The Madhya Pradesh government constituted a one-member judicial commission, led by retired High Court judge Sanjay Dwivedi, to probe the Bargi dam cruise boat tragedy that claimed 13 lives. The panel will examine causes, rescue measures, and boat certification.", "category": "Law", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "a13b739c"}, {"headline": "CM selection Cong. betrayed DMK in a democratic process, says Chennithala", "summary": "Senior Congress leader Ramesh Chennithala defended the delay in selecting Kerala's Chief Minister, emphasizing the party's democratic process. He dismissed BJP criticism, stating Congress doesn't act on \"directions from Nagpur\" and that decisions are made through democratic means.", "category": "Politics", "page": 13, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "a3228579"}, {"headline": "Congress flags granting J&K L-G powers over telecom", "summary": "J&K Congress chief Tariq Hameed Karra criticized the move to enhance LG Manoj Sinha’s powers in the UT’s telecommunications sector as \"another dent on democratic governance.\" He argued it centralizes authority despite promises of democratic empowerment.", "category": "Politics", "page": 13, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "5a274f74"}, {"headline": "Environment clearance to Nicobar Project lacked adequate study: Congress", "summary": "Congress general secretary Jairam Ramesh alleged that the environment clearance for the Great Nicobar Island Development project lacked statutory comprehensive studies. He demanded public release of the High-Powered Committee report, citing insufficient baseline data and EIA studies for ecologically sensitive regions.", "category": "Environment", "page": 13, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "1b70d554"}, {"headline": "Instagram blocked Rahul’s posts due to Ministry rules: Cong.", "summary": "The Congress claimed Instagram blocked Rahul Gandhi’s posts featuring him and actor-politician Vijay due to Ministry of Electronics and Information Technology (MeitY) rules. MeitY sources denied involvement, stating Meta’s internal system mistakenly flagged the posts.", "category": "Politics", "page": 13, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "2922673c"}, {"headline": "India-Trinidad pact to help diaspora ll out ₹14,231 cr.", "summary": "Foreign investors withdrew ₹14,231 crore from Indian equities so far this month, driven by global macroeconomic uncertainties. Total FPI outflow crossed ₹2 lakh crore in 2026, surpassing 2025's total.", "category": "Economy", "page": 14, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "a645bd16"}, {"headline": "PIL plea in SC seeks review of wages of priests, temple staff", "summary": "A PIL has been filed in the Supreme Court seeking judicial review of wages for priests and temple staff in state-controlled temples. It argues that once the state controls temples, an employer-employee relationship exists, and denying dignified wages violates the right to livelihood.", "category": "Law", "page": 14, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "41dcb922"}, {"headline": "Laughter in the Bar: S-G launches books on comic tales from courts", "summary": "Solicitor-General Tushar Mehta launched two books on courtroom humour, \"The Bench, The Bar and The Bizarre\" and \"The Lawful and The Awful.\" CJI Surya Kant, at the launch, lauded Mehta and jokingly urged him to write a third book on the Indian judicial system's quirks.", "category": "Culture", "page": 14, "importance": 2, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "6258652f"}, {"headline": "Webinar on allied health and nursing to be held today", "summary": "SRM Institute of Science & Technology and The Hindu will host the seventh webinar in their \"Future Ca mpact of inflation on savings, urging readers to ask crucial questions before faithfully waiting for financial security.", "category": "Economy", "page": 15, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "4f567267"}, {"headline": "Israel deports two foreign activists seized from Gaza-bound aid flotilla", "summary": "Israel deported two foreign activists, Saif Abu Keshek (Spanish) and Thiago Avila (Brazilian), who were seized and detained from a Gaza-bound aid flotilla on April 30. A rights group called the seizure an \"attack\" on a civilian mission.", "category": "World", "page": 16, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "988c7ee7"}, {"headline": "Starmer says his government is a 10-year project despite calls to quit", "summary": "British Prime Minister Keir Starmer vowed to fight on, describing his government as a \"10-year project,\" despite calls for him to quit after his Labour Party suffered significant losses in recent local elections, while Reform UK made gains.", "category": "Politics", "page": 16, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123283", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/123283"}], "article_id": "b6c70d6e"}, {"headline": "At least 69 people killed after raids by militia at villages in DR Congo", "summary": "A militia attack by Codeco, linked to the Lendu ethnic group, killed at least 69 people in villages in the Democratic Republic of Congo's Ituri province. The region has ongoing conflict between Hema and Lendu ethnic groups.", "category": "World", "page":  the seasonal rainfall deficit reached 26% between March and May. 15 of its 20 districts received deficient rainfall, with South Kashmir's Shopian and Kulgam worst hit, recording up to an 81% deficit. This severe lack of precipitation raises significant concerns about agricultural productivity, domestic water supply, and drinking water availability as the region approaches peak summer months.", "category": "Environment", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_11-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123352"}, {"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_11-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123347"}], "importance": 6, "article_id": "d939c2ab"}, {"headline": "PM Urges Citizens to Save Fuel, Foreign Exchange", "summary": "Prime Minister Narendra Modi, addressing a rally, urged citizens to reduce petrol/diesel consumption and avoid unnecessary gold purchases to conserve foreign exchange. He cited India's ₹10 lakh crore fuel import bill and rising global prices due to conflict. Modi suggested measures like carpooling, max EV use, working from home, and postponing foreign visits for one year to shield the economy and national resources.", "category": "Economy", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_11-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123352"}, {"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_11-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123306"}], "importance": 8, "article_id": "b5b2123c"}, {"headline": "Private Capital Expenditure Surges 67% in H1 FY26", "summary": "India's private sector capital expenditure surged 67% to ₹7.4-7.7 lakh crore in H1 FY26/by Sept 2025. Growth was led by manufacturing (₹3.8 lakh crore) and large projects in chemicals/services. The CII proposed a five-point roadmap to sustain momentum and navigate the West Asian crisis, including phased fuel excise cuts, MSME payment guarantees, and frontloading investments.", "category": "Economy", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_11-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123352"}, {"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_11-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/123347"}], "importance": 8, "article_id": "e08b5f9b"}, {"headline": "CCI Orders Probe into Pernod Ricard for Anti-Competitive Practices", "summary": "The Competition Commission of India (CCI) has ordered a detailed investigation into French liquor major Pernod Ricard and seven other entities for alleged anti-competitive practices/cartelization in the Delhi liquor market. CCI found prima-facie evidence of exclusive dealing agreements restricting retailers/wholesalers from stocking competing brands to boost market share, violating the Competition Act.", "category": "Law", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_11-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123352"}, {"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_11-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/123306"}], "importance": 7, "article_id": "a064e4f5"}, {"headline": "India, Trinidad & Tobago Sign 8 MoUs During Jaishankar Visit", "summary": "India and Trinidad and Tobago signed eight MoUs during External Affairs Minister S. Jaishankar's visit to Port of Spain. Agreements cover sectors including health, agriculture, Ayurveda, tourism, IT, and infrastructure. India provided $1 million machinery for an agro-processing facility and will establish an Ayurveda Chair at local universities. This concluded Jaishankar's three-nation Caribbean tour, deepening cooperation and cultural ties.", "category": "World", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_11-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/123352"}, {"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_11-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/123306"}, {"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_11-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123347"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/123283"}], "importance": 7, "article_id": "8e751a6f"}, {"headline": "Yogi Adityanath Inducts Six New Ministers in UP Cabinet Expansion", "summary": "Uttar Pradesh Chief Minister Yogi Adityanath expanded his State Cabinet, inducting six new ministers, including two of cabinet rank. This move aims to strengthen the BJP's social base and ensure caste balance ahead of the 2027 Assembly elections. The expansion fills existing vacancies and seeks to improve administrative efficiency across key regions in the state.", "category": "Politics", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi  11-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123358"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123283"}], "importance": 8, "article_id": "a39a4fdf"}, {"headline": "Punjab Minister Sanjeev Arora Remanded to ED Custody for GST Fraud", "summary": "Punjab Industries Minister Sanjeev Arora (AAP) was remanded to seven-day ED custody by a special PMLA court in Gurugram. He faces a multi-crore money laundering case linked to GST fraud, an offshoot of a FEMA inquiry into Hampton Sky Realty Ltd. The ED alleges shell companies were used for fraudulent mobile phone exports worth over ₹157 crore.", "category": "Law", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi  11-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123358"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123283"}], "importance": 7, "article_id": "786a9e5a"}, {"headline": "Delhi Launches Aftercare Scheme for Youth Leaving Childcare", "summary": "Delhi CM Rekha Gupta launched the \"Aftercare Scheme for Young Persons,\" earmarking ₹3.5 crore. The scheme assists youth transitioning out of orphanages and childcare institutions after turning 18, providing support for higher education, vocational training, skill development, employment, and monthly financial aid for independent living. It aims to offer a crucial safety net during their rehabilitation into society.", "category": "India", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi  11-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/123358"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123283"}], "importance": 4, "article_id": "f980500e"}, {"headline": "Himanta Biswa Sarma Reappointed as Assam Chief Minister", "summary": "Dr. Himanta Biswa Sarma was unanimously re-elected NDA legislature party leader and appointed Assam's Chief Minister for a second term. Governor Lakshman Prasad Acharya invited him to form the new government, backed by 102 MLAs. The swearing-in is scheduled for May 12 in Guwahati, with PM Modi expected. Sarma committed to continuing developmental work for a prosperous Assam.", "category": "Politics", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi  11-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/123358"}, {"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_11-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123347"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123283"}], "importance": 8, "article_id": "48083b73"}, {"headline": "NTPC Plans ₹56,000 Crore Nuclear Power Project in Bihar", "summary": "State-run NTPC is conducting feasibility studies for a ₹56,000 crore, 2.8-gigawatt nuclear power plant in Banka, Bihar, via its subsidiary. The project, initially two 700 MW units with potential expansion, marks NTPC's entry into nuclear energy. It aims for 2 GW nuclear capacity by 2032, diversifying its portfolio towards a 130 GW total by decade-end. India has 8.88 GW nuclear capacity, with 6.6 GW under construction.", "category": "Infrastructure", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi  11-05-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/123358"}, {"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_11-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/123306"}, {"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_11-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/123347"}], "importance": 8, "article_id": "5c436e5c"}, {"headline": "Indian Women Win Recurve Team Gold at Archery World Cup", "summary": "The Indian women’s recurve team of Deepika Kumari, Ankita Bhakat, and Kumkum Mohod (or Bhajan Kaur) clinched gold at the Archery World Cup Stage 2 in Shanghai. They defeated hosts and world champion China 5-4 in a dramatic shoot-off, making a comeback from 2-4. This marks their first gold in five years and followed a semi-final win over South Korea. India secured two medals at the event, boosting morale for upcoming international competitions.", "category": "Sports", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi  11-05-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/123358"}, {"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_11-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/123306"}, {"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_11-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/123347"}, {"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_11-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123329"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/123283"}], "importance": 9, "article_id": "e22ae797"}, {"headline": "Urvil Patel Hits Fastest Fifty in IPL History for CSK", "summary": "Chennai Super Kings' Urvil Patel equaled the record for the joint-fastest fifty in IPL history, reaching the milestone in just 13 balls against Lucknow Super Giants on Sunday. His explosive knock of 65 off 23 balls, featuring eight sixes, powered CSK to a five-wicket victory while chasing 204, securing their third consecutive win. He dedicated this performance to his father.", "category": "Sports", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi  11-05-2026.pdf", "page": 19, "telegram_url": "https://t.me/c/1877410077/123358"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/123283"}], "importance": 7, "article_id": "e87a8433"}, {"headline": "Air India Fires Over 1,000 Employees for Policy Violations", "summary": "Air India CEO Campbell Wilson announced the airline has terminated over 1,000 employees in the past three years due to ethical breaches, policy violations, and non-compliance, including misuse of staff travel benefits. Under Tata Group ownership, the airline maintains a zero-tolerance policy for misconduct, implementing cost-saving measures and cultural reforms among its 24,000 staff members.", "category": "Business", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_11-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123343"}, {"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_11-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/123306"}], "importance": 6, "article_id": "9277f07f"}, {"headline": "India Negotiates EU Seafood Market Access Amid US Tariffs", "summary": "Commerce Minister Piyush Goyal announced India is negotiating with the EU to open its markets for Indian seafood exporters. This aims to counter a recent 50% US tariff and secure long-term growth for the fisheries sector. The government is addressing trade barriers, regulatory bottlenecks, and quality control standards to delist previously restricted Indian fishing establishments.", "category": "Economy", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_11-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123343"}, {"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_11-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/123306"}], "importance": 7, "article_id": "eb68145f"}, {"headline": "Putin Hints at Negotiated End to Ukraine War", "summary": "Russian President Vladimir Putin has hinted at a negotiated settlement for the four-year war with Ukraine, suggesting the conflict is \"coming to an end.\" Moscow perceives itself in a strong position amid divisions among Kyiv’s NATO backers. Putin proposed former German Chancellor Gerhard Schroeder as a mediator for security arrangements, amidst mixed signals and ongoing ceasefire violations despite a U.S.-brokered pause.", "category": "World", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_11-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123306"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/123283"}], "importance": 9, "article_id": "2147440a"}, {"headline": "Suvendu Adhikari Sworn In as West Bengal Chief Minister", "summary": "BJP leader Suvendu Adhikari was sworn in as West Bengal's Chief Minister on Saturday after his party defeated the Trinamool Congress. Adhikari, following a high-intensity campaign, declared that the state's \"air of fear\" has ended, replaced by \"trust.\" He made these remarks in his hometown of Kanthi, ahead of his first Cabinet meeting as CM.", "category": "Politics", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_11-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123306"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123283"}], "importance": 10, "article_id": "dc702238"}, {"headline": "Karnataka Minister Sudhakar Passes Away at Age 66", "summary": "Karnataka Planning and Statistics Minister Dr. S. Sudhakar, 66, a three-time MLA from Hiriyur, passed away at a Bengaluru private hospital on Sunday. He was suffering from a lung infection and had recently undergone knee surgery. The state government declared a three-day mourning period and a holiday for schools as a mark of respect for the deceased leader.", "category": "Politics", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_11-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123329"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123283"}], "importance": 7, "article_id": "d5c241c8"}, {"headline": "Leopard Kills 10-Year-Old Boy in Karnataka Hills", "summary": "A 10-year-old boy from Bengaluru was killed by a leopard in the Nagamale forests of Male Mahadeshwara Hills, Chamarajanagar district, Karnataka. The attack occurred while his family visited a local temple; the leopard dragged him away. Forest officials launched a search to trap the animal. This marks the third fatal incident in the region within three months, prompting calls for better predator management.", "category": "Environment", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_11-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123329"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123283"}], "importance": 6, "article_id": "7a25e442"}, {"headline": "Congress Yet to Name Kerala Chief Minister", "summary": "Uncertainty continues over the Congress Chief Minister of Kerala, as the party high command has yet to make a final decision. This follows marathon discussions with State leadership in New Delhi. The delay has raised questions about internal party dynamics, highlighting a brewing three-way leadership tussle within the state unit.", "category": "Politics", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 11-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123283"}], "importance": 7, "article_id": "9750d73f"}]};
