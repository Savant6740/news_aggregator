<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {

.progress-row { flex-shrink:0; display:flex; gap:4px; padding:14px 16px 10px; background:#0c0c0c; position:relative; z-index:5; overflow:visible; }
.progress-row::after { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:80%; height:120px; background:radial-gradient(ellipse at top,color-mix(in srgb,var(--cc) 30%,transparent) 0%,transparent 70%); pointer-events:none; z-index:-1; }

.pseg.done::after, .pseg.active::after { transform:scaleX(1); }
.v-feed { flex:1; overflow:hidden; position:relative; clip-path:inset(0); }

  scroll-margin-top: 80px;
}
.card.target-highlight {

  box-shadow: 0 0 30px rgba(255, 193, 7, 0.4);
  border: 2px solid #f39c12;
  animation: pulse-highlight 2s ease-in-out;
}

f997f4"}, {"headline": "Latha Rajinikanth launches 'People’s Platform' to groom local leaders", "summary": "Latha Rajinikanth, wife of actor Rajinikanth, has launched a new social initiative called the 'People’s Platform.' The movement aims to identify and train grassroots leaders across Tamil Nadu to address local civic and social issues. While Latha emphasized the initiative is non-political, observers suggest it could serve as a precursor to a larger political entry.", "category": "Politics", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126244", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ⁰⁶⁰⁶²⁰²⁶.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/126244"}], "article_id": "41dc2765"}, {"headline": "Madras HC criticizes Supreme Court over delay in election plea", "summary": "The Madras High Court expressed strong disapproval of the Supreme Court for staying an order related to the 2016 Radhapuram assembly election. The court noted that 'protracted judicial delays' undermine democratic principles and disenfranchise voters. Justice Jayachandran stated that the SC's stay has prevented a final resolution on a case involving alleged counting irregularities.", "category": "Law", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126244", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ⁰⁶⁰⁶²⁰²⁶.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/126244"}], "article_id": "2249c20a"}, {"headline": "India condemns killing of UN peacekeeper from Serbia in Lebanon", "summary": "India has officially condemned the killing of a Serbian UN peacekeeper during an attack on a UNIFIL base in Lebanon. The Ministry of External Affairs called for a thorough investigation into the incident, which occurred amidst escalating cross-border fire between Israeli forces and Hezbollah. India reiterated its commitment to the safety of international peacekeeping personnel.", "ca sed US maritime enforcement of sanctions has significantly hindered Iran's ability to ship oil through the Strait of Hormuz. Analysts suggest this supply squeeze could lead to higher global fuel prices in the coming quarter.", "category": "Economy", "page": 13, "importance": 8, "telegram_url": "https://t.me/c/1877410077/126244", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ⁰⁶⁰⁶²⁰²⁶.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/126244"}], "article_id": "4f229751"}, {"headline": "US job growth beats expectations, fueling Fed rate hike fears", "summary": "The US Labor Department reported that non-farm payrolls increased by 172,000 in May, significantly exceeding market forecasts. The strong hiring data in the service and healthcare sectors has led investors to believe the Federal Reserve will likely hike interest rates again in June to curb persistent inflation, causing a surge in Treasury yields.", "category": "Economy", "page": 13, "importance": 8, "telegram_url": "https://t.me/c/1877410077/126244", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ⁰⁶⁰⁶²⁰²⁶.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/126244"}], "article_id": "bf6eadaf"}, {"headline": "Bot traffic surpasses human activity on the Internet for first time", "summary": "Data from Cloudflare reveals that automated 'bot' traffic accounted for 57.3% of all internet activity in late May, surpassing human-generated traffic for the first time in history. Experts attribute this shift to the rapid proliferation of AI agents, web scrapers, and automated API requests, raising concerns about server loads and the future of digital advertising metrics.", "category": "Technology", "page": 13, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126244", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ⁰⁶⁰⁶²⁰²⁶.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/126244"}], "article_id": "d9e60484"}, {"headline": "AirTrunk to invest $30 billion in Indian data centre expansion", "summary": "Global data centre operator AirTrunk has announced a massive $30 billion investment plan for the Indian market through 2030. The company intends to build large-scale hyperscale facilities in Mumbai, Chennai, and Hyderabad. The project, backed by global investment firms, aims to capitalize on India's booming cloud services and AI-driven data demands.", "category": "Infrastructure", "page": 14, "importance": 8, "telegram_url": "https://t.me/c/1877410077/126244", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ⁰⁶⁰⁶²⁰²⁶.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/126244"}], "article_id": "8e7ab375"}, {"headline": "Manisha and Neha win gold at Ulaanbaatar Open wrestling", "summary": "Indian wrestlers Manisha and Neha clinched gold medals in their respective categories at the Ulaanbaatar Open in Mongolia. Manisha dominated the women's 65kg division, while Neha secured the top spot in the 53kg category. The Indian contingent finished the tournament with a total of six medals, including two silvers and two bronzes, showing strong form ahead of the World Championships.", "category": "Sports", "page": 18, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126244", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ⁰⁶⁰⁶²⁰²⁶.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/126244"}], "article_id": "31935f83"}, {"headline": "RBI announces record Rs 2.11 lakh crore dividend for fiscal year 2024", "summary": "The Reserve Bank of India's board approved a record surplus transfer of Rs 2.11 lakh crore to the central government for FY24. This is more than double the previous year's transfer and significantly higher than the government's budget estimate of Rs 1.02 lakh crore, providing a major fiscal boost for infrastructure spending and deficit reduction targets in the upcoming union budget.", "category": "Economy", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/126257", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_06-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126257"}], "article_id": "32c9a962"}, {"headline": "Indian stock markets hit record highs as Sensex crosses 75,000 mark", "summary": "Domestic equity benchmarks Sensex and Nifty reached fresh all-time highs following the RBI's record dividend announcement. The Sensex surged over 1,100 points to close above 75,000, while the Nifty 50 ended near 23,000. Investor sentiment was bolstered by strong macroeconomic data and expectations of improved government fiscal health and continued capital expenditure.", "category": "Business", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/126257", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_06-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126257"}], "article_id": "f6c1d3e0"}, {"headline": "EC warns BJP and Congress against using religion in election campaigns", "summary": "The Election Commission of India issued directions to the presidents of BJP and Congress, asking them to ensure star campaigners refrain from making speeches on religious or communal lines. The poll body expressed dissatisfaction with responses regarding Model Code of Conduct violations and warned of stricter action for future breaches to maintain the integrity of the general elections.", "category": "Politics", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/126257", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_06-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126257"}], "article_id": "1d8da0d5"}, {"headline": "Prime Minister Modi highlights economic growth in final election campaign legs", "summary": "Prime Minister Narendra Modi highlighted India's status as the world's fastest-growing major economy and the RBI's record dividend transfer as proof of sound fiscal management. He promised further reforms and infrastructure development if voted back to power, while criticizing opposition parties for their economic policies and welfare spending promises during recent election rallies.", "category": "India", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/126257", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_06-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126257"}], "article_id": "1775921d"}, {"headline": "IndiGo reports 106 percent rise in Q4 net profit to 1,894 crore", "summary": "InterGlobe Aviation, the parent company of IndiGo, reported a consolidated net profit of Rs 1,894.8 crore for the fourth quarter ended March 2024, a 106% increase year-on-year. The airline attributed the growth to strong travel demand and improved yields, marking its sixth consecutive profitable quarter despite technical issues grounding a significant portion of its fleet.", "category": "Business", "page": 5, "importance": 8, "telegram_url": "https://t.me/c/1877410077/126257", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_06-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/126257"}], "article_id": "de16cae3"}, {"headline": "Zomato to invest 100 crore in its entertainment and ticketing business", "summary": "Food delivery giant Zomato announced plans to invest Rs 100 crore in its 'Going-out' business vertical, which includes movie and event ticketing. The investment aims to diversify revenue streams and strengthen its presence in the experiential entertainment market, competing with established players. Zomato has seen consistent growth in its dining-out and live events segment recently.", "category": "Business", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126257", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_06-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/126257"}], "article_id": "bcf4d8ac"}, {"headline": "CBSE to introduce new credit system for classes 6 to 12", "summary": "The Central Board of Secondary Education (CBSE) is planning to implement a new National Credit Framework from the 2024-25 academic session. This system will assign credits based on learning hours, including academic subjects, vocational training, and extracurricular activities. The move aims to provide more flexibility and mobility to students in line with the National Education Policy.", "category": "Education", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126257", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_06-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/126257"}], "article_id": "f9207049"}, {"headline": "Severe heatwave persists across North India as temperatures cross 48 degrees", "summary": "North India continues to grapple with a severe heatwave, with temperatures in parts of Rajasthan and Delhi-NCR crossing 48 degrees Celsius. The India Meteorological Department (IMD) has issued a red alert for several states, advising people to avoid outdoor activities during peak hours. The heatwave is expected to continue for several days due to dry westerly winds from the desert.", "category": "Environment", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126257", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_06-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/126257"}], "article_id": "21c72292"}, {"headline": "UK Prime Minister Rishi Sunak calls for general election on July 4", "summary": "In a surprise announcement, UK Prime Minister Rishi Sunak called for a general election to be held on July 4. Speaking outside 10 Downing Street, Sunak argued that his government's plan for the economy is working. The move comes as the Conservative party seeks to overturn a significant lead held by the Labour party in opinion polls amid economic challenges and immigration concerns.", "category": "World", "page": 10, "importance": 9, "telegram_url": "https://t.me/c/1877410077/126257", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_06-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/126257"}], "article_id": "c0b802ca"}, {"headline": "US Federal Reserve minutes suggest interest rates may remain high longer", "summary": "Minutes from the Federal Reserve's latest meeting revealed that officials are concerned about persistent inflation and believe it will take longer than previously thought to gain confidence for rate cuts. Some members even mentioned a willingness to tighten policy further if risks to inflation materialize, leading to cautious sentiment in global equity and bond markets.", "category": "Economy", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126257", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_06-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/126257"}], "article_id": "75680ddb"}, {"headline": "Adani Ports to invest 18,000 crore in expansion and capacity upgrades", "summary": "Adani Ports and Special Economic Zone announced plans to invest approximately Rs 18,000 crore in the current fiscal year to expand its port capacities and logistics footprint. The company aims to handle 500 million tonnes of cargo by 2025, focusing on automation and green energy initiatives across its various maritime facilities to maintain its market leadership in India.", "category": "Infrastructure", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126257", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_06-06-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/126257"}], "article_id": "1bc47f21"}, {"headline": "Awfis Space Solutions IPO subscribed 4.27 times on second day", "summary": "The initial public offering of Awfis Space Solutions was subscribed 4.27 times on the second day of bidding. The retail portion was subscribed 12 times, while the non-institutional investors category saw 6.8 times subscription. The company aims to raise Rs 599 crore through a fresh issue and an offer for sale, with a price band of Rs 364-383 per share to fund its expansion plans.", "category": "Business", "page": 14, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126257", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_06-06-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/126257"}], "article_id": "e3ec2abd"}, {"headline": "Microsoft unveils new Surface PCs with integrated artificial intelligence features", "summary": "Microsoft has announced its latest Surface Pro and Surface Laptop models, branded as Copilot+ PCs. These devices feature built-in artificial intelligence hardware and software, including a new Recall feature to track user activity. The launch marks Microsoft's significant push to compete with Apple by integrating AI directly into the Windows operating system and dedicated hardware.", "category": "Technology", "page": 14, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126257", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_06-06-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/126257"}], "article_id": "1dd6cfa4"}, {"headline": "Rajasthan Royals beat Royal Challengers Bengaluru to reach IPL Qualifier 2", "summary": "Rajasthan Royals defeated Royal Challengers Bengaluru by four wickets in the IPL 2024 Eliminator match. Chasing 173, RR reached the target with an over to spare, ending RCB's six-match winning streak. Rajasthan will now face Sunrisers Hyderabad in Qualifier 2 for a spot in the final, while Virat Kohli's RCB is knocked out of the tournament after a late-season surge.", "category": "Sports", "page": 22, "importance": 8, "telegram_url": "https://t.me/c/1877410077/126257", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_06-06-2026.pdf", "page": 22, "telegram_url": "https://t.me/c/1877410077/126257"}], "article_id": "ae3a1a8b"}, {"headline": "Mindful Shopping Trends Emerge as Consumers Reject Over-Consumption Habits", "summary": "As 'no-buy' challenges gain traction, Indian consumers are reassessing purchasing habits. Driven by concerns over textile waste—with 8 million tonnes generated annually in India—individuals are adopting strategies like six-month waiting lists and wardrobe scans. The psychological shift focuses on intentionality and personal style rather than emotional reflexes or social media-driven trends.", "category": "Culture", "page": 1, "importance": 4, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "c691fccc"}, {"headline": "RBI Holds Repo Rate and Eyes Foreign Capital to Support Rupee", "summary": "The Reserve Bank of India kept the repo rate unchanged at 5.25% as expected. To support the rupee and attract foreign capital, the RBI will absorb hedging costs for foreign currency deposits until September 2026. This move is expected to bring over $10 billion in inflows. Governor Sanjay Malhotra emphasized maintaining orderly market conditions amid global volatility and US-Iran tensions.", "category": "Economy", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "022cdc19"}, {"headline": "Nicholas Galitzine Stars in Surprisingly Sweet He-Man Reboot Film", "summary": "The muscley 1980s action franchise receives a light-footed reboot featuring Nicholas Galitzine in the titular role. The cast includes Idris Elba, Camila Mendes, and Jared Leto as the villainous Skeletor. This cinematic revival aims to bring a ditzy charm to the classic Masters of the Universe lore, targeting both nostalgic fans and new audiences.", "category": "Culture", "page": 2, "importance": 2, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "2c14345b"}, {"headline": "South Korean Action Series Explores Government License for School Discipline", "summary": "In the new Netflix series 'Teach You a Lesson,' a government agency is authorized to use physical and psychological force against delinquent students. Starring Kim Mu-yeol, Lee Sung-min, and Jin Ki-joo, the show delves into the dark side of educational reform and societal pressure through high-stakes action and moral conflict.", "category": "Culture", "page": 2, "importance": 2, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "1c7e85ba"}, {"headline": "Netflix Film México 86 Retells Bureaucratic Battle to Host World Cup", "summary": "Gabriel Ripstein’s fictional retelling, 'México 86,' stars Gabriel Luna as a bureaucrat determined to secure Mexico's bid for the 1986 World Cup. The film explores the political intrigue and high-pressure negotiations behind one of football's most iconic tournaments, highlighting the intersection of sport and national identity.", "category": "Culture", "page": 2, "importance": 2, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "0a8b5ad5"}, {"headline": "Jim Jarmusch Anthology Wins Golden Lion for Look at Fractured Families", "summary": "Director Jim Jarmusch’s latest film, 'Father Mother Sister Brother,' explores three fractured families across different countries. Featuring an ensemble cast including Adam Driver, Cate Blanchett, and Tom Waits, the anthology won the Golden Lion at the 2025 Venice Film Festival. The score is provided by British-German musician Anika with cinematography by Frederick Elmes and Yorick Le Saux.", "category": "Culture", "page": 2, "importance": 2, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "7c94f357"}, {"headline": "NCPA Celebrates Santoor Maestro Pandit Shivkumar Sharma Through Rare Archives", "summary": "The National Centre for the Performing Arts is hosting a listening session to celebrate the legacy of santoor master Pandit Shivkumar Sharma. Guided by disciples Dilip Kale and Takahiro Arai, the event features rare audio and video excerpts from the maestro's archives. The evening aims to explore Sharma's artistic journey and his profound impact on Indian classical music.", "category": "Culture", "page": 2, "importance": 3, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "2b6c5674"}, {"headline": "Exhibition at Latitude 28 Explores Textile as Armour and Emotional Memory", "summary": "The group show 'Lived-in Skin: Textile as Armour as Memory' features works by Sabeen Omar, Meenakshi Nihalani, and Anshu Singh. The exhibition positions cloth as a witness and archive of personal and historical narratives, including migration and labor. It draws inspiration from artists like Louise Bourgeois to examine the emotional residue inherited through garments.", "category": "Culture", "page": 2, "importance": 3, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "4f76e4bd"}, {"headline": "Natural Remedies Suggested to Soothe and Heal Tired Summer Skin", "summary": "Beauty expert Shahnaz Husain recommends natural remedies to counter the effects of harsh UV rays in India. Sun exposure can lead to dehydration, dullness, and sunburn. Simple compresses using common kitchen ingredients are highlighted as effective ways to restore hydration balance and soothe skin without the risks of quick-fix chemical products.", "category": "Health", "page": 2, "importance": 3, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "cf485ad8"}, {"headline": "Electric Appliances and Automation Transform the Modern Indian Kitchen", "summary": "Indian kitchens are shifting from gas to electricity as automated gadgets handle repetitive tasks like chopping and slow cooking. Moving beyond mixer-grinders, multi-cookers now accommodate complex Indian recipes and cooking styles. This transition is driven by the cultural insistence on fresh food combined with a decreasing availability of domestic help.", "category": "Technology", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "b1c81e57"}, {"headline": "Leaders Urged to Embrace Failure as Fuel for Corporate Success", "summary": "In an excerpt from 'Fail Smarter,' Dougal Shaw explains how modern leaders can harness failure for growth. By being open about mistakes and removing the stigma associated with professional setbacks, leaders find solutions that others miss. The approach encourages an organizational culture where failure is viewed as a learning value rather than a sign of incompetence.", "category": "Business", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "5b417c67"}, {"headline": "Construction Noise Pollution Linked to Severe Health Risks in Urban India", "summary": "Urban India faces dangerous noise levels from infrastructure projects, affecting heart health, sleep, and cognition. Doctors warn that regular exposure to deafening drills and excavators causes tinnitus, high blood pressure, and mental health issues. Experts suggest architectural and planning interventions to safeguard residents from the long-term effects of noise pollution.", "category": "Health", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "efa0b92c"}, {"headline": "Spider-Noir Series Reimagines Spider-Man as Depression-Era New York Detective", "summary": "Amazon's 'Spider-Noir' stars Nicolas Cage as Ben Reilly, a washed-up private investigator in a gorgeously old-school noir setting. Produced by Phil Lord and Christopher Miller, the series adopts a hard-boiled tone with 'authentic black and white' options. The story blends classic noir tropes with macabre superhero elements, featuring a weary protagonist struggling with his abilities.", "category": "Culture", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "767647d4"}, {"headline": "World Cup Nations Use Creative Digital Videos for Squad Announcements", "summary": "Participant nations in the 2026 World Cup are using pop-art, CGI, and celebrity narrators to unveil their teams. England released a video scored with Beatles music, while Scotland utilized actor Ewan McGregor. These creative efforts, including Norway's use of their King, highlight the deep emotional connection and high stakes athletes and fans associate with the tournament.", "category": "Sports", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "a425891e"}, {"headline": "Bengaluru Diners Brave Long Queues for Smash Guys and Pizza 4Ps", "summary": "High-demand eateries in Bengaluru like Smash Guys and Pizza 4P’s are drawing large crowds despite wait times exceeding one hour. Smash Guys has gained a reputation for its high-quality 'OG Buff' and 'chicken chilli cheese' smash burgers. The trend highlights the city's vibrant food scene where niche brands are achieving viral status through consistent quality and soft-bun burgers.", "category": "Business", "page": 4, "importance": 2, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "4511e3f8"}, {"headline": "Last Rhododendron Blossoms of the Season Found in Binsar Forests", "summary": "Nature enthusiasts in Uttarakhand have observed the final rhododendron blooms of the spring season. These flowers, which shift in color from bright red to white based on altitude, are a staple of the Himalayan spring landscape. The blossoms are not only a visual delight but also part of the wild flora that defines the region's seasonal transitions.", "category": "Environment", "page": 4, "importance": 2, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "19a715af"}, {"headline": "Netflix Binge-Watch Mating Season Offers Raunchy Adult Animated Comedy", "summary": "Created by the makers of 'Big Mouth,' the new Netflix series 'Mating Season' follows four animal friends navigating romantic misadventures. Starring voices like Nick Kroll and Zach Woods, the show uses grizzly bears, deer, and raccoons to satirize human relationship issues like fidelity and polyamory. The script is noted for its raunchy humor and inter-species dating scenarios.", "category": "Culture", "page": 4, "importance": 2, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "9efd96c5"}, {"headline": "Dismantling of Grotesque Kolkata Football Statue Sparks Debate on Public Art", "summary": "Kolkata's new sports minister has removed a 2017 football statue dubbed 'ugly-looking' by critics. Former CM Mamata Banerjee defended the 'Leg-alas' sculpture, which featured giant legs with a globe torso. The event highlights the lack of public engagement in commissioning Indian street art, which often prioritizes governmental messaging or 'plonk' art over aesthetic community value.", "category": "Culture", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "3b49cb83"}, {"headline": "Death of Model Divyanshu Joshi Exposes Safety Lapses in Fashion Industry", "summary": "Model Divyanshu Joshi drowned during a shoot at a dangerous, off-limits quarry in Kerala. The incident involving brand Kartik Research has sparked outrage over the lack of insurance and safety protocols for freelance models. Industry experts note that models are often the 'least protected' on set, working in hazardous conditions without contingency plans or basic medical kits.", "category": "Business", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "90c6c0df"}, {"headline": "Instagram Influencer Culture Reshapes Restaurant Design and Menu Engineering", "summary": "Modern restaurants are being designed with 'Instagrammable' water bodies and lighting to attract content creators. Chef Manish Mehrotra and others note that social media is now a vital, economical marketing tool. Dishes are being designed for visual appeal, such as the 'egg puff' at Nadoo which went viral. However, experts warn that food quality must remain the priority for long-term success.", "category": "Business", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "b432180b"}, {"headline": "Donyi Polo Tea Estate Empowers Small Farmers in Arunachal Pradesh", "summary": "The Donyi Polo tea estate has become a knowledge hub for 5,000 small growers in East Siang, Arunachal Pradesh. Headed by Omak Apang, the estate shares organic practices and artisanal techniques. Local farmers use tea income to build homes and micro-factories, turning the region into a significant producer of hand-rolled specialty teas like the record-priced Golden Needle.", "category": "Business", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "b0ef1faf"}, {"headline": "Bengal Gram Celebrated as Versatile Protein Source for Indian Kitchens", "summary": "Chana dal, or Bengal gram, remains a staple in Indian households for its high fiber and low glycaemic index. The lentil is versatile enough for both festive sweets and healthy savory dishes like quesadillas or salads. With 12-15g of fiber per 100g, it is increasingly recommended for blood-sugar control, rivaling chickpeas in global plant-forward culinary trends.", "category": "Culture", "page": 6, "importance": 2, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "22c4ee1d"}, {"headline": "Creative Director Aseem Kapoor Revives Satya Paul With Pop-Punk Energy", "summary": "Aseem Kapoor’s debut collection 'Untamed' for Satya Paul aims to recapture the brand's kitschy 1980s print mania. Shown at Lancaster House in London, the collection reimagined the sari in avant-garde forms alongside print-heavy menswear. Kapoor intends to prioritize intricate printmaking and emotion to make the legacy brand relevant for younger, global consumers seeking 'quirk.'", "category": "Business", "page": 7, "importance": 4, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "63ba2cc1"}, {"headline": "France and Spain Emerge as Favorites for Longest Ever World Cup", "summary": "As the 48-team World Cup approaches, France's 'golden generation' led by Kylian Mbappe remains the team to beat. European champions Spain, featuring 18-year-old Lamine Yamal, also pose a significant threat. The tournament, hosted by the US, Mexico, and Canada, faces logistical chaos including visa difficulties and high travel costs, but expectations for high-quality football remain high.", "category": "Sports", "page": 8, "importance": 8, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "54ad27d4"}, {"headline": "FIFA Expansion to 48 Teams Threatens World Cup Magic and Quality", "summary": "The 2026 World Cup will feature an unprecedented 104 matches, but experts worry the expansion dilutes the tournament's quality. With top players exhausted from intense European club seasons, international football often appears defensive and staid. FIFA's push for inclusivity adds new teams like Cape Verde and Curacao but moves the summit of excellence toward the Champions League.", "category": "Sports", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "94db06d4"}, {"headline": "End of Legendary FIFA Video Game Franchise Marks Shift in Fandom", "summary": "The 30-year partnership between EA Sports and FIFA has ended, leading to the rebrand 'EA Sports FC.' The game franchise was a cultural juggernaut, generating $2 billion annually through Ultimate Team. However, fans have criticized recent editions for 'pay-to-win' models and lack of innovation. This World Cup will be the first in three decades without a titular FIFA video game release.", "category": "Technology", "page": 10, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "bcc948cb"}, {"headline": "Rafael Nadal Documentary Rafa is a Profound Ode to Sporting Suffering", "summary": "The four-part Netflix documentary 'Rafa' offers a raw look at Rafael Nadal’s career-long battle with physical pain. From degenerative foot conditions to numbing injections at Roland Garros, the film explores the extreme endurance required to stay at the top. It portrays Nadal not as an invincible hero, but as a man of 'different material' who utilized psychiatrists to handle immense doubt.", "category": "Sports", "page": 10, "importance": 4, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "46a8473c"}, {"headline": "Shashwat Sachdev Fuses Industrial Beats with Qawwali in Dhurandhar Soundtrack", "summary": "Composer Shashwat Sachdev created a cohesive 28-song collage for the 'Dhurandhar' spy films in just six months. The soundtrack blends hip-hop, industrial rock, and classic qawwali, featuring international collaborators like Jordan Fish and Youngmin Kim. Despite losing a Queen track due to licensing issues, the album has achieved record-breaking success as part of India's top-grossing spy thriller.", "category": "Culture", "page": 11, "importance": 3, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "ceba831b"}, {"headline": "Exhibition Bombay Blooms Revives Forgotten Floral Art of Winifred Strangman", "summary": "The 'Bombay Blooms' show at sub:continent gallery features rediscovered oil paintings of Mumbai's flora by British artist Winifred Strangman. Active in early 20th-century Bombay, Strangman’s work captures gulmohar and hibiscus in incredible detail. The exhibition highlights the contribution of women botanical artists whose works were often dismissed as hobbies despite their scientific accuracy.", "category": "Culture", "page": 11, "importance": 4, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "a1976d82"}, {"headline": "Rahul Reddy Aims to Globalize South Asian Coffee Culture Through Subko", "summary": "Subko co-founder Rahul Reddy is building a craft coffee and cacao brand rooted in South Asian provenance. With 16 outlets and a Series B fundraise of ₹85 crore, Subko has expanded to Dubai and London. The brand aims for ₹100 crore in revenue this year, focusing on sourcing beans from Dima Hasao and Garo Hills to premiumize regional agriculture for a global audience.", "category": "Business", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "fd668641"}, {"headline": "U.S. Banks Plan Tokenized Deposit Network to Counter Crypto Threats", "summary": "JPMorgan, Citigroup, and other major U.S. banks plan to launch a tokenized deposit system in 2027 through the Clearing House. The network will allow traditional bank deposits to move instantly on blockchains 24/7. This move aims to keep deposits within the banking system as crypto firms attempt to siphoning funds using stablecoins under a more favorable regulatory environment.", "category": "Business", "page": 13, "importance": 8, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "1c083089"}, {"headline": "Anthropic Urges Global Pause in AI Development Warning of Self-Improvement Risk", "summary": "AI startup Anthropic is calling for a coordinated global slowdown in frontier AI development, warning that models are nearing 'recursive self-improvement.' This threshold, where AI improves without human intervention, could pose existential risks. The firm suggests an international verification regime for competitors, noting that training runs for powerful AI are currently 'at breakneck speed.'", "category": "Technology", "page": 13, "importance": 9, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "31013338"}, {"headline": "SpaceX Denied Fast Track Entry to S&P 500 Index After IPO", "summary": "S&P Dow Jones Indices has ruled that Elon Musk’s SpaceX must wait 12 months after going public before joining the S&P 500. This 'seasoning period' blocks immediate access to trillions in passive investment funds. The decision also affects other AI giants like OpenAI and Anthropic. To join, companies must also show a profit, though SpaceX may join the Nasdaq 100 much sooner.", "category": "Business", "page": 13, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "1d7a623c"}, {"headline": "Apple Plans AI Dominance by Fixing Siri Using Google Gemini Technology", "summary": "Apple is expected to unveil a modern Siri powered by generative AI at its upcoming developer conference. Built on Google’s Gemini technology, the new Siri will remember prior queries and access on-device data for personalized tasks like booking reservations. The strategy aims to reclaim Apple's position as a primary AI portal while maintaining strict user privacy standards.", "category": "Technology", "page": 13, "importance": 8, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "c3a0611d"}, {"headline": "Indian Markets Slip on Crude Oil Shocks and Weak Monsoon Forecast", "summary": "The Sensex and Nifty fell 0.7% this week as investors grew cautious over rising crude prices near $93 and a below-normal monsoon forecast. The RBI kept the repo rate at 5.25% but lowered the FY27 GDP growth forecast to 6.6%. Geopolitical tensions in West Asia and currency volatility have shifted market focus from domestic demand to external risks, leading to selling on recoveries.", "category": "Economy", "page": 14, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "7b5b1543"}, {"headline": "Bata India Q4 Revenue Growth Muted Despite Accelerated Strategic Initiatives", "summary": "Bata India reported a 5% year-on-year revenue increase to ₹827 crore in Q4FY26, its best performance in eight quarters. However, Ebitda declined 15% due to higher advertising spends and a drop in gross margins. The company is scaling its 'Zero-Base Merchandising' to improve store experience, but analysts remain cautious about a sustained return to pre-pandemic profitability levels.", "category": "Business", "page": 14, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "7dd83a3c"}, {"headline": "Digital Lenders See Improved Repayment Trends Despite Riskier Borrower Mix", "summary": "A report by FACE shows digital personal loans over 90 days overdue fell to 1.4% in FY26 from 3.3% in FY23. Despite the improvement, 60% of sanctioned value went to medium or high-risk borrowers. Digital NBFCs approved 132 million loans worth ₹2.15 trillion in FY26, with 58% of value going to borrowers under age 35. Average loan ticket sizes increased to ₹16,238.", "category": "Business", "page": 15, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "ef785de7"}, {"headline": "India Remains World's Fastest Growing Economy With 7.7 Percent FY26 Growth", "summary": "India's real GDP grew by 7.7% in FY26, according to provisional government estimates. The March quarter saw a strong 8.0% expansion. While the RBI lowered the FY27 forecast to 6.6% due to monsoon and West Asia risks, Chief Economic Adviser V. Anantha Nageswaran expressed confidence in the economy's resilience. Domestic demand remains a key driver despite emerging global supply shocks.", "category": "Economy", "page": 15, "importance": 10, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "02ce68fe"}, {"headline": "Top Gold Mutual Funds Cap Large-Ticket Inflows Amid Market Volatility", "summary": "Mutual funds including HDFC, Nippon India, and SBI are restricting large-ticket inflows into gold ETFs and Funds of Funds (FoF). HDFC has limited daily subscriptions to ₹25 crore per investor. The move targets corporate treasuries and family offices rather than retail investors. Experts say this is a precautionary measure to manage liquidity if gold import restrictions are ever applied.", "category": "Business", "page": 15, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "528832f1"}, {"headline": "Institutional Investors Red Flag Operations and Financials of Rajesh Exports", "summary": "LIC and Norway’s Norges Bank have raised concerns over the corporate governance of Rajesh Exports. Institutional investors rejected resolutions regarding financial statements and the reappointment of chairperson Rajesh Mehta. Issues cited include the clubbing of interest income with revenue and a lack of independence in audit committees. LGIM rejected all eight resolutions proposed by the firm.", "category": "Law", "page": 15, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "91f74e3e"}, {"headline": "Cricket Dominates Viewer Attention as Scripted Entertainment Faces Quality Crisis", "summary": "Sports, particularly cricket, is winning the battle for audience attention over scripted OTT content. Experts suggest a 'surfeit of good-enough content' has made excellence feel ordinary, while sports offers authentic, uninhibited collective emotion. Scripted entertainment also suffers from long gestation periods and 'subscription cycling,' where viewers drop services after a show ends.", "category": "Culture", "page": 15, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "983bfc50"}, {"headline": "Rupee Recovers 56 Paise Against Dollar Following RBI Support Measures", "summary": "The Indian rupee appreciated by 56 paise to close at 95.18 against the US dollar on Friday. The recovery was driven by RBI measures to support foreign capital inflows and strengthen forex liquidity. After opening at 95.72, the currency touched an intra-day high of 94.89. The central bank's intervention follows a period of significant depreciation due to regional geopolitical tensions.", "category": "Economy", "page": 15, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "4833d2a2"}, {"headline": "Government Considers Selling 2 Percent Stake in Hindustan Zinc", "summary": "The Indian government is weighing a sale of up to a 2% stake in Hindustan Zinc Ltd, which could raise approximately ₹50 billion ($525 million). The Department of Investment and Public Asset Management aims to launch the offering this month or in July. Deliberations are ongoing, and final details of the stake sale could change based on market conditions.", "category": "Economy", "page": 15, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "92384b72"}, {"headline": "Millennium Management to Start Onshore Trading Business in India", "summary": "Billionaire Izzy Englander’s Millennium Management is looking to establish an onshore investment management business in India. The move signals deepening institutional interest in India as one of the world's fastest-growing financial markets. The hedge fund joins a growing list of global firms seeking to expand their presence in the Indian secondary market.", "category": "Business", "page": 15, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "dba28186"}, {"headline": "Maruti Suzuki Considers Shielding Small Car Buyers from Price Hikes", "summary": "Maruti Suzuki is contemplating dealer requests to exempt entry-level car buyers from recent price hikes. While SUV models have seen price increases due to rising commodity costs like steel and platinum, the carmaker may protect 'small-car' customers to sustain demand. A financing scheme with AU Small Finance Bank was also introduced to assist with down payments for models like Alto K10.", "category": "Business", "page": 16, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "46e59b48"}, {"headline": "Bluestone Sets Five-Fold Growth Target Bet on Personal Luxury Boom", "summary": "Jewellery retailer Bluestone aims to reach ₹12,000 crore in revenue by FY30. The company is betting on a shift toward everyday 'personal luxury' like lighter gold and diamond pieces. Bluestone plans to increase its Ebitda margin to 14.67% and spend ₹1,578 crore on advertising over four years. It is also converting franchise-owned stores to company-owned models for better margins.", "category": "Business", "page": 16, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "9b2e4362"}, {"headline": "Chinese Demand for Indian Oil Meal Imports Surges 25-Fold", "summary": "India's oil meal exports to China hit $157 million in 2025, a massive increase from $6.1 million in 2024. The surge is driven by China's need to diversify its animal feed supply amid restrictions on Canadian canola. Indian rapeseed meal is competitively priced, leading to China accounting for 13.5% of India's global oil meal shipments, up from just 0.4% the previous year.", "category": "Economy", "page": 16, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "3da580f3"}, {"headline": "Solar Curtailment and Transmission Gaps Worry Renewable Energy Investors", "summary": "Nearly 470 GWh of renewable energy was curtailed in Q1 2026 due to transmission constraints, primarily in Northern and Western India. Experts warn that 'wasted capital' from curtailment stresses debt serviceability and lowers investor returns. The government is meeting with state and private transmission firms to accelerate grid capacity, which currently forces some solar plants to sit idle.", "category": "Environment", "page": 16, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "e92a74fc"}, {"headline": "Startup Policy Forum Asks Sebi to Ease NRI KYC Norms", "summary": "The Startup Policy Forum has urged the Finance Ministry and Sebi to simplify digital onboarding for NRIs. Key proposals include scrapping geo-tagging requirements for video KYC and allowing uploaded wet signatures. The forum argues that interoperable KYC systems between Sebi and IFSCA would improve foreign participation in Indian financial services and reduce operational hurdles.", "category": "Law", "page": 16, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "96dc2cee"}, {"headline": "RBI Absorbs Hedging Costs to Attract $10 Billion Foreign Deposits", "summary": "The RBI will bear the full hedging cost for banks raising 3-5 year foreign currency non-resident (FCNR) deposits until September 2026. This move provides a 3% advantage to banks, making it a 'game-changer' for attracting offshore capital. SBI and other lenders expect the banking system to mobilize upwards of $10 billion in new foreign currency flows through this window.", "category": "Economy", "page": 17, "importance": 8, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "980ac247"}, {"headline": "E85 Petrol Blend Cheaper by Twenty Rupees Per Litre Launched in Delhi", "summary": "Union Minister Hardeep Puri launched E85 high-ethanol petrol in Delhi, priced at ₹82.12 per litre. This is roughly ₹20 cheaper than regular E20 fuel to compensate for lower calorific value. The government aims to have 5,000 E85-compatible outlets by 2027 to reduce the $120 billion oil import bill and increase farmer income through domestic ethanol production.", "category": "Environment", "page": 17, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "ea523c03"}, {"headline": "RBI Eases Equity Investment Limits for NRIs and OCIs in Stock Market", "summary": "The RBI is doubling the individual investment limit for NRIs and OCIs in Indian equities to 10%, with an aggregate limit hike to 24%. The move aims to increase foreign capital and ease the rupee's slide. Experts suggest the change should be complemented by digital KYC reform to ensure significant inflows, as current NRI ownership of the Sensex remains low at 0.7%.", "category": "Economy", "page": 17, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "3141bbc8"}, {"headline": "AirTrunk Plans Thirty Billion Dollar Investment in India Data Centres", "summary": "Blackstone-backed AirTrunk plans to invest $30 billion in India by 2030 to build hyperscale data centres. With a pipeline of 600MW across Mumbai, Chennai, and Hyderabad, the company aims to support India's push for AI and cloud leadership. CEO Robin Khuda cited India's massive renewable energy potential and government support as key drivers for this large-scale market commitment.", "category": "Technology", "page": 17, "importance": 9, "telegram_url": "https://t.me/c/1877410077/126239", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_06-06-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/126239"}], "article_id": "f31dac08"}, {"headline": "India Q4 GDP Growth Hits 7.8 Per Cent Beating RBI Estimates", "summary": "India's economy grew by 7.8% in the January-March 2026 quarter, exceeding the RBI's estimate of 7%. The annual growth for FY26 reached 7.7%, up from previous estimates. Growth was driven by double-digit performance in the hotel and transport sectors (12.5%) and finance and real estate (10.4%), despite global geopolitical tensions and weather-related risks.", "category": "Economy", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/126269", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 06-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126269"}], "article_id": "dddea476"}, {"headline": "Rupee Strengthens to Highest Level Since May on RBI Measures", "summary": "The Indian rupee appreciated by 0.9% to close at 94.94 against the US dollar, its highest level since May 8. The surge followed the Reserve Bank of India’s announcement of measures to attract foreign capital. The rupee has now recovered most of its losses for the current financial year after previously closing at 95.79 per dollar.", "category": "Economy", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/126269", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 06-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126269"}], "article_id": "3aaed92f"}, {"headline": "SEBI Approves IPOs for Oyo Parent and Four Other Companies", "summary": "SEBI has granted approval for initial public offerings to five companies, including Oyo's parent Oravel Stays, Warburg Pincus-backed Home First Finance, and Reagand Developers. Other approved firms include Advanta Enterprises and Mehta Hitech Industries. Market experts estimate these five companies will collectively raise approximately Rs 10,000 crore from the capital markets.", "category": "Business", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126269", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 06-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126269"}], "article_id": "87a7b3cb"}, {"headline": "Indian Agencies Granted Limited Access to Anthropic Claude Mythos AI", "summary": "Select Indian government agencies, including I4C and CERT-In, will receive limited access to Anthropic's Claude Mythos AI for testing. The move follows meetings with MeitY and NASSCOM. The AI model will be used to identify digital infrastructure vulnerabilities and improve cybersecurity across power, water, and communication sectors using advanced engineering tools.", "category": "Technology", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/126269", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 06-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126269"}], "article_id": "e7fceb02"}, {"headline": "Acme Solar Raises Rs 2,800 Crore via Institutional Share Sale", "summary": "Acme Solar has raised Rs 2,800 crore through a Qualified Institutional Placement (QIP), marking its first major capital raise since listing. Participants included SBI Mutual Fund, HDFC Mutual Fund, BlackRock, and Goldman Sachs. The company plans to use the funds to reduce debt and strengthen its balance sheet for future renewable energy projects.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126269", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 06-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126269"}], "article_id": "5deb84f3"}, {"headline": "Maruti Suzuki Launches RD-Based Auto Loan Scheme for Small Cars", "summary": "Maruti Suzuki India has introduced a recurring deposit (RD) based auto loan scheme to help customers manage down payments. Targeted at Alto K10, S-Presso, Celerio, and Wagon R buyers, the scheme allows customers to save through monthly deposits for 3-6 months before qualifying for a loan. The initiative aims to improve credit accessibility for entry-level car buyers.", "category": "Business", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/126269", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 06-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126269"}], "article_id": "a9ae602b"}, {"headline": "Tata Motors CV Business Enters New Growth Phase Post-Demerger", "summary": "Tata Motors Chairman N. Chandrasekaran stated that the company's commercial vehicle business is entering a new growth phase following its separation from the passenger vehicle unit. While citing geopolitical and market volatility as challenges, he highlighted the demerger's role in allowing independent strategies and announced a Rs 925 crore investment in green energy initiatives.", "category": "Business", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126269", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 06-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126269"}], "article_id": "f6339530"}, {"headline": "Evonith Steel Acquires Indrajit Power for Rs 232 Crore", "summary": "Evonith Steel has completed the acquisition of Indrajit Power Private Limited for Rs 232 crore under the Insolvency and Bankruptcy Code. Indrajit Power operates an 85 MW thermal power asset in Wardha, Maharashtra. The acquisition is intended to secure energy supplies for Evonith's nearby 1.4 million-tonne steel manufacturing plant.", "category": "Business", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/126269", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 06-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126269"}], "article_id": "275db5eb"}, {"headline": "MG Motor India Installs 1,000 Community EV Chargers Across India", "summary": "JSW MG Motor India has reached a milestone of installing 1,000 community EV chargers across 470 locations in India. Under its 'MG Charge' initiative, the company has deployed chargers at residential societies, hospitals, and hotels. The company aims to bolster the country's EV infrastructure and currently uses 78% renewable energy at its Halol manufacturing plant.", "category": "Technology", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126269", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 06-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126269"}], "article_id": "5ca1cc30"}, {"headline": "Vingroup’s Green SM Launches Electric Taxi Service in Delhi-NCR", "summary": "Vietnam’s Vingroup has entered the Indian market with Green SM, an all-electric taxi service. Starting operations in Delhi-NCR using the VinFast VF e34 model, the service features in-car amenities and cameras for safety. The company is offering a 50% launch discount and plans to expand its fleet across major Indian cities with a focus on sustainable transport.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126269", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 06-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126269"}], "article_id": "5d4dfd23"}, {"headline": "IFC and Partners Invest $105 Million in Hygge Energy", "summary": "Hygge Energy has secured $105 million in equity investment from the International Finance Corporation (IFC), Siemens Financial Services, and Fullerton Carbon Action Fund. This marks the first direct green hydrogen investment in India by these entities. The capital will be used to scale Hygge’s 'Hydrogen-as-a-Service' model and develop multiple green hydrogen projects.", "category": "Environment", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126269", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 06-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126269"}], "article_id": "162e2776"}, {"headline": "STT Global Acquires Navi Mumbai Land for Rs 282 Crore", "summary": "STT Global Data Centres has purchased 14,093 square meters of land in Navi Mumbai from Repro India for Rs 282 crore. The acquisition includes an existing building and will be used to develop a new data center. This follows a trend of significant real estate deals by data center operators in the Mumbai Metropolitan Region to meet growing digital storage demand.", "category": "Infrastructure", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126269", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 06-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126269"}], "article_id": "3b07cbff"}, {"headline": "Investment Demand Grows While Private Consumption Remains Flat", "summary": "Fresh GDP data shows that investment demand (GFCF) grew from 31.6% to 31.9% of GDP in FY26. However, private final consumption expenditure (PFCE) saw a decline in the fourth quarter to 7.1%. Economists noted that while government capital expenditure has bolstered growth, consistent private consumption is needed for long-term economic stability.", "category": "Economy", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126269", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 06-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/126269"}], "article_id": "42beccf6"}, {"headline": "Agriculture Sector Growth Slows to 3 Per Cent in FY26", "summary": "The agriculture and allied sectors saw a growth rate of 3% in Gross Value Added (GVA) for FY26, according to recent government data. Although this is an improvement over earlier estimates of 2.4%, it remains lower than the 4.2% recorded in FY25. Declining prices in certain segments and weather risks, including El Nino, have contributed to the relative slowdown in the sector.", "category": "Economy", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126269", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 06-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/126269"}], "article_id": "e29de291"}, {"headline": "India Stays Sixth Largest Economy Despite Rupee Weakness", "summary": "India's nominal GDP reached Rs 346.36 lakh crore in FY26. In dollar terms, India remains the world's sixth-largest economy, behind the UK and Japan, as rupee depreciation impacted its global ranking. Although India had briefly surpassed the UK in FY25, the gap between the rupee and dollar performance has currently kept it in the sixth position globally.", "category": "Economy", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126269", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 06-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/126269"}], "article_id": "ba93ae09"}, {"headline": "PM Advisor Urges Shift to E25 Ethanol Blending", "summary": "Tarun Kapoor, advisor to the Prime Minister, stated that India must progress from E20 to E25 ethanol blending in petrol to reduce dependence on imported fossil fuels. Speaking at a SIAM event, he highlighted that achieving E100 or flex-fuel vehicle adoption is the ultimate goal. He noted that West Asia tensions and volatile oil prices make energy self-reliance critical for the economy.", "category": "Environment", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126269", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 06-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/126269"}], "article_id": "10cc01a9"}, {"headline": "RBI Governor Sanjay Malhotra Reaffirms 4 Per Cent Inflation Target", "summary": "RBI Governor Sanjay Malhotra emphasized that the 4% inflation target remains the primary focus of the Monetary Policy Committee. He stated that while the repo rate was held at 5.25%, the central bank will remain vigilant regarding food price shocks and supply chain disruptions. He added that the RBI will continue to support growth while ensuring price stability stays within the target.", "category": "Economy", "page": 6, "importance": 8, "telegram_url": "https://t.me/c/1877410077/126269", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 06-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/126269"}], "article_id": "a0a2e8fd"}, {"headline": "FDI Inflow to India May Exceed $100 Billion in FY27", "summary": "RBI Deputy Governor Poonam Gupta projected that Foreign Direct Investment (FDI) inflows could cross the $100 billion mark in FY27. Despite global uncertainties, India saw $95 billion in gross FDI during FY26. Gupta noted that private capital investment is rising and the investment-to-GDP ratio is trending upward, reflecting strong investor confidence in the Indian economy.", "category": "Economy", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126269", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 06-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/126269"}], "article_id": "a48c5f19"}, {"headline": "RBI Evaluates Proposal to Introduce Polymer Bank Notes", "summary": "RBI Governor Sanjay Malhotra confirmed that the central bank is considering a proposal to introduce polymer bank notes. The evaluation focuses on the pros and cons, including durability and security features. Currently, Indian notes are 100% cotton-based. A survey indicated that while digital payments are rising, cash remains a preferred mode of transaction for many citizens.", "category": "Economy", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126269", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 06-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/126269"}], "article_id": "5ed81788"}, {"headline": "ATM Cash Availability Remains Adequate Despite Minor Shortages", "summary": "The RBI stated that there is sufficient currency in the system to meet ATM demand, addressing concerns over localized cash shortages. Deputy Governor Swaminathan J noted that the central bank is working with banks to ensure ATMs are replenished promptly. Recent reports from ATM operators had suggested a gap between requested and supplied cash in some regions.", "category": "Economy", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126269", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 06-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/126269"}], "article_id": "70276426"}, {"headline": "Commercial Banks Raise Loan Rates Despite Steady Repo Rate", "summary": "Average lending rates on new loans rose by 10 basis points to 8.5% in April, even as the RBI kept the repo rate unchanged at 5.25%. The increase is attributed to strong credit demand, which grew by 16% year-on-year. Meanwhile, deposit rates for new savings fell slightly, indicating a widening spread as banks manage liquidity and credit growth balance.", "category": "Economy", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126269", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 06-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/126269"}], "article_id": "ac324609"}, {"headline": "RBI Allows Higher Interest Rates for FCNR(B) Deposits", "summary": "The RBI has introduced a scheme allowing banks to offer interest rates on Foreign Currency Non-Resident (Bank) deposits that are up to 100 basis points higher than current rates. Valid until September 30, 2026, the measure aims to attract more foreign currency inflows from NRIs and bridge the balance of payments gap, similar to a successful 2013 initiative.", "category": "Economy", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126269", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 06-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/126269"}], "article_id": "b8351928"}, {"headline": "Airtnk to Invest Rs 3 Lakh Crore in Indian Data Centers", "summary": "Technology firm Airtnk plans to invest over Rs 3 lakh crore in India by 2030 to develop digital infrastructure. CEO Robin Khuda met with PM Modi to discuss the plan, which includes building 5-gigawatt data center capacity. This investment is expected to create significant jobs and strengthen India's position as a global hub for AI and cloud computing.", "category": "Infrastructure", "page": 12, "importance": 9, "telegram_url": "https://t.me/c/1877410077/126269", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 06-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/126269"}], "article_id": "3936a944"}, {"headline": "PM Modi Inauguarates Projects Worth Rs 18,000 Crore in Gujarat", "summary": "Prime Minister Narendra Modi inaugurated and laid the foundation stones for development projects worth over Rs 18,000 crore in Surat, Gujarat. He emphasized that the global crisis highlights the importance of energy self-reliance. During his speech, he also criticized political opponents for questioning the 'Aatmanirbhar Bharat' initiative and for creating economic uncertainty.", "category": "Politics", "page": 12, "importance": 8, "telegram_url": "https://t.me/c/1877410077/126269", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 06-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/126269"}], "article_id": "80b3909b"}, {"headline": "RBI Relaxes Investment Rules for NRIs and OCI Cardholders", "summary": "The RBI has eased investment norms for Non-Resident Indians (NRIs) and Overseas Citizen of India (OCI) cardholders, allowing them to invest more in Indian listed companies without SEBI registration. Individual investment limits have been raised from 5% to 10%, while total group limits rose to 24%. The move aims to boost market liquidity and attract more foreign retail capital.", "category": "Economy", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126269", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 06-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/126269"}], "article_id": "7ea98343"}, {"headline": "Fertility Rates Decline in UP and Bihar; Rise in South", "summary": "According to NFHS-6 data, fertility rates have significantly dropped in Uttar Pradesh (2.2) and Bihar (2.7), moving closer to the national average. In contrast, southern states like Telangana, Andhra Pradesh, and Karnataka saw a slight increase in fertility rates to around 1.8-1.9. Experts suggest that improved education and family planning are narrowing the north-south demographic gap.", "category": "India", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126269", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 06-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/126269"}], "article_id": "1af4bb26"}, {"headline": "India’s GDP growth estimated at 7.7% for financial year 2025-26", "summary": "Government data released on Friday shows India’s GDP growth reached 7.7% in 2025-26, up from 7.1% the previous year. Fourth-quarter growth stood at 7.8%. Prime Minister Modi credited the results to successful reforms and national hard work. Manufacturing and services sectors recorded double-digit growth, though agricultural growth slowed to 3% in the final quarter.", "category": "Economy", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/126286", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126286"}], "article_id": "baf925a2"}, {"headline": "PM Modi criticizes Congress for creating chaos over past 12 years", "summary": "Addressing a public function in Gujarat, Prime Minister Narendra Modi accused the Congress party of spending 12 years attempting to create uncertainty to regain political space. He asserted that citizens have rejected the party’s \"parasitic politics.\" The PM inaugurated development projects worth ₹18,777 crore in Surat and emphasized the importance of self-reliance in the energy sector.", "category": "Politics", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/126286", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126286"}], "article_id": "cde6a9e3"}, {"headline": "Delhi CM orders sealing of high-rises violating safety norms", "summary": "Following the Malviya Nagar fire that killed 21 people, Delhi CM Rekha Gupta directed officials to seal high-rise buildings violating safety regulations. She identified fixed glass windows as a serious hazard and ordered that all buildings have openable balconies. The MCD has been instructed to use drone surveys and satellite imagery to update records of construction activities.", "category": "Politics", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126286", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 1, "t
