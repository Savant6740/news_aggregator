<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Inter', -apple-system, sans-serif;
  background: #0c0c0c; color: #fff; touch-action: none;
}
.outer { position: fixed; inset: 0; overflow: hidden; }
.h-track { display: flex; height: 100%; will-change: transform; }
.cat-panel { flex-shrink:0; width:100vw; height:100%; display:flex; flex-direction:column; overflow:hidden; }
.progress-row { flex-shrink:0; display:flex; gap:4px; padding:14px 16px 10px; background:#0c0c0c; position:relative; z-index:5; overflow:visible; }
.progress-row::after { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:80%; height:120px; background:radial-gradient(ellipse at top,color-mix(in srgb,var(--cc) 30%,transparent) 0%,transparent 70%); pointer-events:none; z-index:-1; }
.pseg { flex:1; height:2px; border-radius:1px; background:rgba(255,255,255,0.12); position:relative; overflow:hidden; }
.pseg::after { content:''; position:absolute; inset:0; background:var(--cc,#e8334a); transform:scaleX(0); transform-origin:left; transition:transform 0.25s ease; }
.pseg.done::after, .pseg.active::after { transform:scaleX(1); }
.v-feed { flex:1; overflow:hidden; position:relative; clip-path:inset(0); }
.v-track { display:flex; flex-direction:column; will-change:transform; }
.card { 
  width:100%; flex-shrink:0; background:#0c0c0c; display:flex; flex-direction:column; 
  overflow:hidden; position:relative; 
  scroll-margin-top: 80px;
}
.card.target-highlight {
  background: linear-gradient(135deg, #fff3cd22 0%, #ffeaa722 100%) !important;
  box-shadow: 0 0 30px rgba(255, 193, 7, 0.4);
  border: 2px solid #f39c12;
  animation: pulse-highlight 2s ease-in-out;
}
@keyframes pulse-highlight {
  0%, 100% { box-shadow: 0 0 30px rgba(255, 193, 7, 0.4); }
  50% { box-shadow: 0 0 50px rgba(255, 193, 7, 0.6); }
}
.card-content { flex:1; display:flex; flex-direction:column; padding:36px 20px 22px; min-height:0; position:relative; z-index:1; }
.card-toprow { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; flex-shrink:0; }
.cat-pill { display:inline-flex; align-items:center; gap:7px; background:#1c1c1e; border-radius:8px; padding:7px 12px 7px 10px; font-size:11.5px; font-weight:700; letter-spacing:0.07em; color:#d0d0d0; text-transform:uppercase; line-height:1; }
.pill-icon { width:16px; height:16px; background:#2e2e30; border-radius:3px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.pill-icon svg { display:block; }
.card-date { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:500; color:#666; letter-spacing:0.01em; }
.card-headline { font-size:28px; font-weight:800; line-height:1.18; color:#fff; letter-spacing:-0.03em; margin-bottom:20px; flex-shrink:0; }
.card-summary { font-size:15.5px; font-weight:400; line-height:1.62; color:#6b6b6b; flex:1; overflow:hidden; display:-webkit-box; -webkit-line-clamp:7; -webkit-box-orient:vertical; }
.card-divider { height:1px; background:#1e1e1e; margin:20px 0 16px; flex-shrink:0; }
.card-footer { display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.src-chip { display:inline-flex; align-items:center; gap:6px; background:#181818; border:1px solid #282828; border-radius:9px; padding:8px 13px; font-size:12.5px; font-weight:600; color:#c0c0c0; text-decoration:none; letter-spacing:0.005em; line-height:1; }
.src-chip-sep { color:#3a3a3a; font-weight:400; }
.src-chip-pg { color:#555; font-weight:500; }
.src-chip-ext { margin-left:2px; }
.src-chip-ext svg { display:block; }
.info-btn { width:36px; height:36px; border-radius:50%; border:1.5px solid #252525; background:#141414; display:flex; align-items:center; justify-content:center; color:#555; cursor:pointer; flex-shrink:0; }
.cat-flash { position:fixed; inset:0; z-index:600; pointer-events:none; opacity:0; transition:opacity 0.12s; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; }
.cat-flash.on { opacity:1; }
.cf-icon { font-size:34px; }
.cf-name { font-size:22px; font-weight:900; letter-spacing:-0.03em; text-transform:uppercase; }
.hint { position:fixed; display:flex; flex-direction:column; align-items:center; gap:5px; pointer-events:none; z-index:400; opacity:0; transition:opacity 0.6s ease; }
.hint.visible { opacity:1; }
.hint.gone { opacity:0 !important; transition:opacity 0.4s; }
.hint-pill { font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.55); background:rgba(255,255,255,0.07); backdrop-filter:blur(10px); padding:5px 13px; border-radius:100px; border:1px solid rgba(255,255,255,0.09); }
.hint-arr { font-size:16px; color:rgba(255,255,255,0.4); }
.h-up { bottom:28px; left:50%; transform:translateX(-50%); animation:bUp 2s ease-in-out infinite; }
.h-right { top:50%; right:14px; transform:translateY(-50%); animation:bRight 2s ease-in-out infinite 0.6s; }
@keyframes bUp { 0%,100% { bottom:28px; opacity:.65; } 50% { bottom:36px; opacity:1; } }
@keyframes bRight { 0%,100% { right:14px; opacity:.65; } 50% { right:6px; opacity:1; } }

<script>
const DIGEST   = {"date": "21 April 2026", "articles": [{"headline": "Eight Core Industries Output Falls Zero Point Four Percent in March", "summary": "Output of India's eight core industries declined by 0.4% in March 2026, the first drop in five months. Major contributors to the slump were coal, crude oil, fertilizer, and electricity. Consequently, FY26 growth for these sectors slowed to 2.6% compared to 4.5% in the previous fiscal year.", "category": "Economy", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121073", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 21-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121073"}], "article_id": "acfc51bf"}, {"headline": "FPIs Offload Shares Worth One Point Six Eight Trillion in 2026", "summary": "Foreign Portfolio Investors (FPIs) sold shares worth Rs 1.68 lakh crore in the first four months of 2026, exceeding the total net selling of previous years. March alone saw selling of Rs 1.1 lakh crore as the Iran-Israel conflict pushed oil prices to $90 per barrel, impacting investor sentiment towards the Indian market.", "category": "Economy", "page": 3, "importance": 9, "telegram_url": "https://t.me/c/1877410077/121073", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 21-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121073"}], "article_id": "b4eae920"}, {"headline": "Indian Government to Develop Legal Framework for AI Firms", "summary": "The Indian government plans to establish a comprehensive legal framework for Artificial Intelligence governance. The AI Governance Economic Group (AIGEG) will define global standards, regulatory sandboxes, and accountability measures for AI companies to prevent economic harm and ensure domestic law compliance.", "category": "Technology", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121073", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 21-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121073"}], "article_id": "1dc4e0d7"}, {"headline": "Maruti Suzuki to Increase Production to Clear Two Lakh Car Backlog", "summary": "Maruti Suzuki plans to ramp up production capacity to 5 lakh units by the end of FY27 to address a waiting list of 2 lakh cars. Chairman RC Bhargava stated that the expansion will involve new lines at Kharkhoda in Haryana and Gujarat plants. The company currently holds only one week of stock with dealers.", "category": "Business", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121073", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 21-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121073"}], "article_id": "d405cade"}, {"headline": "RBI Withdraws Restrictions on Rupee Linked Non Deliverable Forward Trades", "summary": "The Reserve Bank of India has withdrawn restrictions on banks offering rupee-indexed non-deliverable forwards (NDF) to related entities. The move comes as stability returned to the foreign exchange market. However, the $100 million limit on net open positions for offshore markets remains in effect.", "category": "Economy", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121073", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 21-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121073"}], "article_id": "6b58ec0d"}, {"headline": "Yes Bank MD Robin Vince Prioritizes Asset Quality and Retail Growth", "summary": "In an interview, Yes Bank MD & CEO Robin Vince and CFO Niranjan Banodkar emphasized that the bank will focus on retail loan growth while maintaining strict asset quality. The bank aims to leverage its digital infrastructure and branch network to improve margins and customer experience.", "category": "Business", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121073", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 21-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121073"}], "article_id": "83b2752a"}, {"headline": "BPTP Limited to Invest Eleven Hundred Crore in Faridabad Luxury Project", "summary": "Real estate firm BPTP Limited will invest approximately Rs 1,100 crore to develop 'Skynekt', a luxury residential project in Faridabad Sector-80. The project will feature 325 housing units with a starting price of Rs 5 crore per apartment, targeting a total revenue of Rs 1,800 crore.", "category": "Business", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/121073", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 21-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/121073"}], "article_id": "4d4d1061"}, {"headline": "Maruti Suzuki Reportedly Halts Production of Ignis Hatchback", "summary": "Maruti Suzuki has reportedly stopped production of its Ignis model. Dealers cite a shift in consumer demand towards SUVs and a lack of modern features like CNG options for the decline. Monthly sales of the model had dropped to below 2,500 units compared to higher-selling models like WagonR.", "category": "Business", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/121073", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 21-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/121073"}], "article_id": "0a7cac01"}, {"headline": "Jindal Stainless Enters Retail Market With Jindal Infinity Steel Rebars", "summary": "Jindal Stainless Limited (JSL) has announced its entry into the retail sector with the launch of 'Jindal Infinity' stainless steel rebars. Managing Director Abhyuday Jindal stated that this strategic move aims to provide high-quality, corrosion-resistant construction materials directly to builders and homeowners.", "category": "Business", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121073", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 21-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/121073"}], "article_id": "c5908b24"}, {"headline": "Lenders Raise Concerns Over Information Leaks in Jaypee Infratech Bidding", "summary": "The Committee of Creditors (CoC) for Jaypee Infratech (JAL) informed NCLAT that Vedanta modified its bid after gaining access to sensitive valuation data. Lenders expressed concern over potential information leaks, questioning the transparency of the insolvency process. Further hearings are scheduled.", "category": "Business", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121073", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 21-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/121073"}], "article_id": "9d94e06f"}, {"headline": "Vedanta Sets May First as Record Date for Planned Demerger", "summary": "Vedanta Limited has fixed May 1, 2026, as the effective and record date for its corporate demerger. The company’s board approved the timeline as part of a restructuring plan to split its diverse businesses into separate listed entities, aiming to simplify the corporate structure.", "category": "Business", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121073", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 21-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/121073"}], "article_id": "6995b902"}, {"headline": "GLP-1 Diabetes Drug Investments Surge in China and Japan", "summary": "Global pharmaceutical companies are ramping up investments in GLP-1 diabetes and obesity treatments in China and Japan. Eli Lilly plans to invest $3 billion in China over a decade. While India has a high diabetes population, high costs currently limit the commercial opportunity for these premium drugs.", "category": "World", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121073", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 21-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/121073"}], "article_id": "41411234"}, {"headline": "SML Mahindra Reports Q4 Net Profit Growth of Two Percent", "summary": "SML Mahindra Limited recorded a 2.4% year-on-year rise in net profit to Rs 54 crore for the fourth quarter of FY26. Total revenue increased 16.4% to Rs 898 crore, supported by improved market share in the cargo and passenger vehicle segments following its integration with the Mahindra Group.", "category": "Business", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/121073", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 21-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/121073"}], "article_id": "67308bc8"}, {"headline": "New Renault Duster Achieves Five Star Safety Rating in BNCAP", "summary": "Renault India announced that the new Duster model secured a 5-star safety rating for both adult and child protection in Bharat NCAP (BNCAP) tests. The vehicle scored 30.49 out of 32 for adult safety and 45 out of 49 for child safety, reflecting strong engineering and safety standards.", "category": "Business", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/121073", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 21-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/121073"}], "article_id": "a99653a8"}, {"headline": "Commercial Construction Activity Drops Thirty Six Percent Due to Uncertainty", "summary": "New commercial real estate project completions fell by 36% in Q1 2026 as developers adopted a cautious approach amid the West Asia conflict. Major hubs like Hyderabad and Mumbai saw significant drops. Despite the slowdown, office space absorption rose 20% compared to last year to 2.153 crore sq ft.", "category": "Infrastructure", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121073", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 21-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/121073"}], "article_id": "2188dbd9"}, {"headline": "SEBI Considers Expanding Collateral Scope for Margin Trading Facility", "summary": "The Securities and Exchange Board of India (SEBI) is discussing expanding the list of eligible collateral for Margin Trading Facility (MTF). The proposed changes may include government securities, mutual funds, ETFs, and REIT units, aiming to provide more flexibility to investors and increase trading volumes.", "category": "Business", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121073", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 21-04-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/121073"}], "article_id": "f1015796"}, {"headline": "IFSCA Approves First Foreign Family Investment Fund in GIFT City", "summary": "The International Financial Services Centres Authority (IFSCA) has approved the first foreign Family Investment Fund (FIF) in GIFT City. This approval, granted to London-based Purnima Asset Management, marks a significant milestone in establishing GIFT City as a global hub for family offices.", "category": "Economy", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121073", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 21-04-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/121073"}], "article_id": "297c08b8"}, {"headline": "Indian Rupee Strengthens to Ninety Two Point Nine Three Against Dollar", "summary": "The Indian Rupee appreciated to 92.93 against the US Dollar, supported by cooling crude oil prices and reduced dollar demand from state-run oil companies. Improved foreign exchange reserves, which surpassed $700 billion, also provided support to the local currency amid global geopolitical tensions.", "category": "Economy", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121073", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 21-04-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/121073"}], "article_id": "733bf524"}, {"headline": "Bank of Maharashtra Q4 Profit Jumps Thirty Five Percent", "summary": "Public sector lender Bank of Maharashtra reported a 35% growth in net profit to Rs 2,014 crore for the quarter ended March 2026. Total income rose to Rs 8,693 crore. The bank's asset quality improved significantly, with gross non-performing assets (NPAs) falling to 1.45% from 1.74% a year ago.", "category": "Business", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121073", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 21-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/121073"}], "article_id": "14818335"}, {"headline": "UP Government Allows Wheat Sale Without Mandatory Farmer Registry", "summary": "Uttar Pradesh Chief Minister Yogi Adityanath has relaxed wheat procurement rules, allowing farmers to sell their produce at government centers without the mandatory 'Farmer Registry'. The decision aims to help farmers facing technical difficulties with registration, ensuring they get the MSP for their crops.", "category": "India", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121073", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 21-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/121073"}], "article_id": "07f09ec2"}, {"headline": "Ten Indian Flagged Vessels Safely Cross the Strait of Hormuz", "summary": "The Ministry of External Affairs confirmed that 10 Indian-flagged ships successfully navigated the Strait of Hormuz despite the ongoing West Asia conflict. The government is prioritizing the safe movement of LPG tankers to prevent domestic cooking gas shortages, though some tankers face higher transport costs.", "category": "India", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121073", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 21-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/121073"}], "article_id": "fc34cd0c"}, {"headline": "Department of Posts Records Sixteen Percent Revenue Growth in FY26", "summary": "The Department of Posts earned Rs 15,296 crore in revenue during FY26, marking a 16% annual growth. Minister Jyotiraditya Scindia termed the year historic and set a revenue target of Rs 17,000 crore for FY27. India Post Payments Bank and life insurance segments were major contributors to the growth.", "category": "Economy", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121073", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 21-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/121073"}], "article_id": "975012a7"}, {"headline": "IMD Predicts Heatwave Conditions Across Multiple States Until April Twenty Five", "summary": "The India Meteorological Department (IMD) has forecast heatwave conditions in several parts of North, Central, and East India for the next 4 to 5 days. Affected areas include Delhi, Haryana, Punjab, Rajasthan, West Bengal, Odisha, and Jharkhand. Temperatures are expected to remain high through April 25.", "category": "Environment", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121073", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 21-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/121073"}], "article_id": "f0fb17b2"}, {"headline": "Jio Financial Services to Enter Insurance and Unsecured Loan Segments", "summary": "Jio Financial Services MD Hitesh Sethia announced that the company will enter the general and life insurance sectors through a joint venture with Allianz. The firm also plans to expand into unsecured credit products once it establishes a significant base in secured lending and reaches critical scale.", "category": "Business", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121073", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 21-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/121073"}], "article_id": "26dbe619"}, {"headline": "Editorial: High Valuations and Lack of Innovation Drive FPI Exit", "summary": "A detailed analysis suggests that Foreign Portfolio Investors (FPIs) are selling Indian equities due to exceptionally high valuations compared to other emerging markets. The editorial highlights that while India offers stable 15% growth, competitors like Korea and Taiwan are attracting capital through AI-led innovation.", "category": "Economy", "page": 8, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121073", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 21-04-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/121073"}], "article_id": "3db3875e"}, {"headline": "Amitabh Kant Urges Strategic Energy Shift to Ensure National Security", "summary": "Former NITI Aayog CEO Amitabh Kant writes that India must accelerate its renewable energy transition to mitigate geopolitical risks in the Strait of Hormuz. He proposes increasing the 2030 renewable target to 1,500 GW, focusing on battery storage, and developing domestic processing for critical minerals.", "category": "Environment", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121073", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 21-04-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/121073"}], "article_id": "8b084c93"}, {"headline": "Analysis: Tamil Nadu’s Financial Health Challenged by Election Welfare Vows", "summary": "An analysis of Tamil Nadu's fiscal situation reveals concerns over a rising revenue deficit predicted to hit 1.94% of GSDP by FY26. Despite being one of India's fastest-growing economies, the competitive welfare promises by DMK, AIADMK, and TVK ahead of elections could further strain state finances.", "category": "Economy", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121073", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 21-04-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/121073"}], "article_id": "450b686f"}, {"headline": "Government Plans ‘Korea Enclave’ to Attract Direct Investment", "summary": "Union Minister Piyush Goyal announced plans for a 'Korea Enclave' or a dedicated industrial township to facilitate South Korean companies' entry into India. The enclave will provide ready plug-and-play infrastructure, aiming to attract more small and medium enterprises and boost manufacturing investments.", "category": "Business", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121073", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 21-04-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/121073"}], "article_id": "1dde2e46"}, {"headline": "Feature: Uthiramerur’s Chola Era Governance Cited as Early Democracy", "summary": "The historic Kudavolai system in Uthiramerur, Tamil Nadu, serves as an ancient example of democratic local governance. Dating back to the 10th-century Chola era, the system involved electing representatives through secret ballots recorded on palm leaves, a heritage often highlighted by PM Narendra Modi.", "category": "Culture", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121073", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 21-04-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/121073"}], "article_id": "f4066222"}, {"headline": "SBI plans balance-sheet growth to 25% of GDP by 2030", "summary": "State Bank of India aims to expand its balance-sheet from 20% to 25% of India's GDP by 2030. The strategy includes increasing market share by 1% across 800 districts. The bank will focus on digital expansion via the YONO 2.0 app and deploy 'Seva Sarathis' in 10,000 branches. As of December 2025, SBI's balance-sheet stood at ₹71.62 lakh crore, serving approximately 53 crore customers.", "category": "Business", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/121011", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 21-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121011"}], "article_id": "cd130579"}, {"headline": "Half of Indians covered by health insurance as costs continue rising", "summary": "A Statistics Ministry survey reveals health insurance coverage in India reached 47.4% in rural and 44.3% in urban areas by 2025, largely driven by the Ayushman Bharat scheme. Despite wider coverage, out-of-pocket expenses remain high, averaging ₹50,508 in private hospitals compared to ₹6,631 in public facilities. Expert analysis suggests the scheme subsidizes private healthcare at a high cost.", "category": "Health", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/121011", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 21-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121011"}], "article_id": "0d5ad4e1"}, {"headline": "US-Iran ceasefire under strain after seizure of Iranian cargo ship", "summary": "Tensions escalated as the US military seized an Iranian cargo ship for allegedly running a blockade. Tehran vowed to retaliate and withdrew from the second round of peace negotiations. The conflict has disrupted marine traffic in the Strait of Hormuz, causing oil prices to climb. The US delegation for the talks was to be led by Vice-President JD Vance, but plans remain on shaky ground.", "category": "World", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/121011", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 21-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121011"}], "article_id": "5be98402"}, {"headline": "Government approves ₹460 crore loan to revive grounded Alliance Air fleet", "summary": "The Centre has sanctioned a ₹460 crore loan to help Alliance Air restore 11 grounded aircraft and revive operations. The financial aid will be disbursed in three tranches linked to operational milestones, with the first ₹150 crore already released. The state-owned airline, which holds a 0.4% market share, faces challenges in sourcing spare parts and meeting maintenance costs.", "category": "Business", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121011", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 21-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121011"}], "article_id": "838cca45"}, {"headline": "POSH complaints at Nifty 500 firms increase by 13% in FY25", "summary": "Sexual harassment complaints at India's top 500 listed companies rose 13% year-on-year to 2,583 in FY25. While higher numbers indicate better reporting awareness, experts warn of persistent under-reporting and structural barriers. Companies like TCS, Wipro, and ICICI Bank reported the highest absolute numbers. Approximately 66-69% of total complaints were upheld across the last three years.", "category": "India", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121011", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 21-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121011"}], "article_id": "f28f7fd3"}, {"headline": "Auto component makers set for windfall as CAFE III norms tighten", "summary": "The shift toward CAFE III fuel efficiency norms is expected to drive ₹61,500 crore to ₹1.48 lakh crore in investments in the auto component sector. Demand for electronics and hybrid systems will surge as manufacturers move away from traditional engine upgrades. Suppliers like Bosch India, Uno Minda, and Sona Comstar are positioned to benefit from the increased value per vehicle.", "category": "Business", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121011", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 21-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/121011"}], "article_id": "af6e99be"}, {"headline": "Tissot launches dedicated e-commerce platform for the Indian market", "summary": "Swiss watchmaker Tissot has launched its own digital platform in India to expand its presence among younger consumers. This marks the first brand under the Swatch Group to debut a direct e-commerce site in the country. CEO Sylvain Dolla stated the move aims to strengthen consumer connections and provide direct access to the brand's product portfolio, including the new Gentleman collection.", "category": "Business", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/121011", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 21-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/121011"}], "article_id": "0249f8e3"}, {"headline": "Mehli Mistry challenges Tata Trusts move to amend charitable deed", "summary": "Former trustee Mehli Mistry has challenged the bid to alter the eligibility clauses of the 103-year-old Bai Hirabai Jamsetji Tata Navsari Charitable Institution Trust. Mistry argues the original deed strictly limits trusteeship to practicing Zoroastrians residing in Mumbai or Navsari. He contends that seeking alterations is an admission of the deed's clarity and questions the current board.", "category": "Law", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121011", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 21-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/121011"}], "article_id": "e5323386"}, {"headline": "Consumer and retail sector records 146 M&A deals in Q1", "summary": "India's consumer and retail sector saw 146 merger and acquisition deals valued at $1.5 billion in the March quarter. While deal volumes rose by 21%, the total value declined by 59% due to an absence of large-ticket transactions. Investors are increasingly focusing on strategic, smaller deals and profitability-led growth in resilient segments like personal care and food processing.", "category": "Economy", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121011", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 21-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/121011"}], "article_id": "d0166775"}, {"headline": "Suzlon Energy enters renewable energy pact with Korean firm GS E&C", "summary": "Suzlon Energy and South Korea's GS E&C signed an initial pact for mutual cooperation in India's renewable energy sector. The partnership focuses on project development and optimization of related solutions, with an estimated project size of KRW 80 billion. The agreement aims to create approximately 300 direct and indirect jobs while strengthening bilateral business ties.", "category": "Business", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121011", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 21-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/121011"}], "article_id": "57527447"}, {"headline": "Philips Personal Health doubles down on Gen Z and digital sales", "summary": "Philips is reshaping its India strategy to target Gen Z, with digital and quick commerce channels now accounting for 40% of sales. The company dominates the male grooming segment with a 40-50% market share and is expanding into mother and child care and oral healthcare. Approximately 40% of products sold in India are now manufactured locally as the market enters Philips' top-five growth drivers.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121011", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 21-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/121011"}], "article_id": "152e7f5d"}, {"headline": "JSW Steel and Posco sign pact for Odisha steel plant", "summary": "JSW Steel and South Korea's Posco have signed a joint venture agreement to establish a 6 mtpa greenfield integrated steel plant in Odisha. The project, expected to be commissioned by 2031, will produce high-grade flat steel for the automotive sector. The JV will leverage Posco's technological expertise and JSW's project execution strengths to serve the high-growth Indian market.", "category": "Business", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121011", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 21-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/121011"}], "article_id": "aa15e309"}, {"headline": "India in touch with Iranian authorities for safe ship passage", "summary": "The Ministry of External Affairs is coordinating with Iran to ensure the safe exit of Indian vessels through the Strait of Hormuz following a recent firing incident. Currently, three Indian and 14 foreign vessels are awaiting transit. The government emphasized the welfare of seafarers as a high priority and has maintained fuel supplies despite the geopolitical crisis in West Asia.", "category": "India", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121011", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 21-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121011"}], "article_id": "c614c6d5"}, {"headline": "Disruptions at Russian ports may impact Indian refinery operations", "summary": "Drone strikes on three major Russian crude loading ports on the Baltic and Black Seas could significantly alter oil supplies to India. According to the IEA, these ports accounted for 68% of Russia's seaborne exports in 2025. Reduced loading volumes and re-routing challenges may have repercussions for India, which is the world's fourth-largest crude refiner and a major buyer of Russian oil.", "category": "Economy", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121011", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 21-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121011"}], "article_id": "71ac75e0"}, {"headline": "Government buys back G-secs worth ₹12,687 crore via auction", "summary": "The Indian government repurchased government securities worth ₹12,686.974 crore in a switch auction conducted by the RBI. The buyback involved several securities maturing later this financial year, including GS 2026 and GS 2027 bonds. Simultaneously, the government issued new bonds worth ₹13,311.383 crore to manage its debt profile and liquidity.", "category": "Economy", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121011", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 21-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121011"}], "article_id": "9c04d82c"}, {"headline": "MCA proposes overhaul of corporate filing framework for ease of compliance", "summary": "The Corporate Affairs Ministry has proposed a revamp of the MCA21 filing system to transition toward a data-centric architecture. Key proposals include form consolidation, expanded straight-through processing, and an interaction-based interface. The reform aims to lower the compliance burden for businesses and align India’s regulatory architecture with international benchmarks for a $30 trillion economy.", "category": "Law", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121011", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 21-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121011"}], "article_id": "4274f853"}, {"headline": "IEX shares fall 8% after CERC draft on market coupling", "summary": "Shares of the Indian Energy Exchange (IEX) plummeted nearly 8% following CERC's draft notification on market coupling. The proposal to appoint Grid India as a uniform price-discovering operator threatens IEX's dominant 84% market share. Analysts warn that the shift dilutes IEX's competitive moat, potentially compressing earnings and valuation multiples as it transitions to a bid-collection front end.", "category": "Business", "page": 6, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121011", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 21-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/121011"}], "article_id": "7d61b991"}, {"headline": "BSE subsidiary launches index to track housing finance companies", "summary": "BSE Index Services has introduced the BSE Housing Finance Index, designed to track the performance of companies in the housing finance industry. Derived from the BSE 1,000 Index, the new index will undergo semi-annual reconstitution. It is intended to support passive investment strategies, including exchange-traded funds and index funds, providing a benchmark for the segment.", "category": "Business", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121011", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 21-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/121011"}], "article_id": "aa82b82b"}, {"headline": "Women's safety and voter list revision become key West Bengal poll issues", "summary": "Ahead of the West Bengal Assembly polls, issues such as the Special Intensive Revision (SIR) of electoral rolls, the RG Kar Hospital case, and women's safety have taken center stage. The Trinamool Congress has fielded 52 women candidates, while the BJP has fielded 33. TMC alleges a conspiracy behind the deletion of names from voter lists, while the BJP promises job reservations for women.", "category": "Politics", "page": 7, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121011", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 21-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/121011"}], "article_id": "40cf99d3"}, {"headline": "Rahul Gandhi alleges BJP set Manipur on fire in Tirunelveli rally", "summary": "Congress leader Rahul Gandhi criticized the BJP for threatening minorities and causing unrest in Manipur during an election rally in Tamil Nadu. He described the current election as a clash between two visions of India—one where States run themselves and another where they are subservient to a single organization. He further characterized the AIADMK as a 'hollow shell' compromised by the BJP.", "category": "Politics", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121011", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 21-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/121011"}], "article_id": "32c1eb44"}, {"headline": "Cauvery delta farmers voice grievances against DMK government policies", "summary": "Farmers in Tamil Nadu's Thanjavur and surrounding districts have expressed dissatisfaction with the ruling DMK over delayed paddy procurement and irrigation issues. Allegations include corruption at procurement centers, mandatory purchase of micronutrients with fertilizers, and lack of flood relief. Farmers also noted problems with crop insurance claims and inadequate seed stocks from state agencies.", "category": "India", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121011", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 21-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/121011"}], "article_id": "09dfc14f"}, {"headline": "RBI partially rolls back restrictions on rupee derivative contracts", "summary": "The Reserve Bank of India has decided to partially reverse measures that limited Authorised Dealers from offering rupee-involved foreign exchange derivatives. The rollback allows the cancellation and rebooking of contracts and restores access to non-deliverable forwards (NDF). The move aims to improve price discovery, restore flexibility, and stabilize the onshore FX market liquidity.", "category": "Economy", "page": 8, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121011", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 21-04-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/121011"}], "article_id": "cf6ffb0c"}, {"headline": "Acko lays off 60 employees in AI-focused structural realignment", "summary": "Digital insurer Acko has terminated approximately 60 roles, representing 5% of its workforce, as part of a restructuring to embed artificial intelligence deeper into operations. The move coincides with the departure of Chief Marketing Officer Ashish Mishra. Acko, which recently reduced its consolidated losses, is shifting toward AI-native workflows to improve underwriting and customer engagement.", "category": "Business", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121011", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 21-04-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/121011"}], "article_id": "6aabc9f7"}, {"headline": "Lilavati Hospital to invest ₹1,200 crore in Mauritius healthcare hub", "summary": "Mumbai-based Lilavati Hospital is launching its first international venture with a 200-bed hospital and medical education facility in Mauritius. The ₹1,200 crore project aims to create a strategic healthcare hub for the Africa region, leveraging proximity to the Indian diaspora. Construction is underway and expected to be completed within 18 months, offering tertiary care and academic capacity.", "category": "Health", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121011", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 21-04-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/121011"}], "article_id": "745a6184"}, {"headline": "Wheat export quota doubled to 5 million tonnes by government", "summary": "The Indian government has approved doubling the wheat export quota to 5 million tonnes following a comprehensive review of production and stock levels. While a domestic export ban remains in effect, shipments are permitted to friendly nations via diplomatic requests. The move is intended to ensure remunerative returns for farmers as rabi season harvesting continues across the country.", "category": "Economy", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121011", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 21-04-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/121011"}], "article_id": "e42d7e6c"}, {"headline": "Gold prices hit one-week low amid US-Iran retaliatory threats", "summary": "Gold prices declined to a one-week low as a strengthening US dollar and rising oil prices dampened demand. The takeover of an Iranian cargo vessel by the US triggered retaliation threats, increasing geopolitical uncertainty. However, the price drop prompted a surge in domestic jewellery demand in India, with Akshaya Tritiya sales estimated at 18-20 tonnes across the country.", "category": "Economy", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121011", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 21-04-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/121011"}], "article_id": "b98b4c23"}, {"headline": "IIT-Madras and FedEx complete India's first intra-city drone delivery trials", "summary": "FedEx and IIT-Madras successfully concluded trials for intra-city drone deliveries in Bengaluru. The tests demonstrated that a 53-km road journey, which normally takes over an hour, could be reduced to a 21-minute aerial route. This landmark trial establishes the potential for drone technology to bypass urban traffic and enhance the efficiency of logistics and middle-mile delivery services.", "category": "Technology", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121011", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 21-04-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/121011"}], "article_id": "e8a7a4d7"}, {"headline": "Fake Mounjaro weight-loss drug seized in Gurugram enforcement drive", "summary": "Haryana drug regulators seized fake versions of the weight-loss drug Mounjaro valued at ₹70 lakh in Gurugram. Innovator Eli Lilly is supporting the investigation into the counterfeit products. The seizure comes amid a global surge in demand for obesity treatments and follows international reports of tampered supply chains. Regulators are increasing vigilance against substandard and spurious drugs.", "category": "Health", "page": 11, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121011", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 21-04-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/121011"}], "article_id": "2662e951"}, {"headline": "TCS Nashik unit engineer reveals harrowing sexual harassment and coercion", "summary": "A woman engineer at a TCS unit in Nashik has filed FIRs alleging a prolonged pattern of sexual harassment, stalking, and religious coercion by five accused. The victim claimed her harasser justified violence against women for not wearing burqas and made derogatory remarks about Hindu deities. Nashik Police arrested eight persons and are tracing additional suspects involved in the case.", "category": "India", "page": 12, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121011", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 21-04-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/121011"}], "article_id": "83066db6"}, {"headline": "Supreme Court asks NCLAT to decide on Supertech project monitoring", "summary": "The Supreme Court has asked the National Company Law Appellate Tribunal (NCLAT) to decide if a court-appointed committee should monitor all 30 projects of Supertech Limited or only the 16 already handed to NBCC. The firm is currently under financial stress. The decision will impact thousands of homebuyers awaiting delivery across multiple real estate developments.", "category": "Law", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "ed81a130"}, {"headline": "Delhi businessman shot dead over parking dispute in Preet Vihar", "summary": "A 34-year-old businessman was shot dead by his brother's neighbor in East Delhi's Preet Vihar following an argument over parking. The incident occurred in the early hours of Monday. Police have arrested the neighbor and are investigating the escalating series of disputes that led to the violence.", "category": "India", "page": 1, "importance": 4, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "c8481277"}, {"headline": "Delhi power bills may rise as tribunal rejects regulator plea", "summary": "The Appellate Tribunal for Electricity rejected a plea by the Delhi Electricity Regulatory Commission regarding pending dues. The tribunal directed the commission to begin liquidation of regulatory asset dues exceeding ₹38,000 crore. This move is expected to cause a significant rise in power tariffs for consumers in the capital to cover the costs.", "category": "Infrastructure", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "3851facb"}, {"headline": "Hospitalisation in India becomes more expensive and privatised since 2017", "summary": "NSO data reveals that hospitalisation in India has become more privatised and expensive between 2017 and 2025. Average non-childbirth hospitalisation costs rose to ₹34,604, about 1.64 times the average monthly household spend. Out-of-pocket spending has outpaced health inflation despite increased coverage by government-sponsored insurance schemes.", "category": "Health", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "4208eba4"}, {"headline": "West Bengal Muslim population share returns to pre-independence levels", "summary": "A data analysis shows the Muslim population share in West Bengal reached 27% in 2011, returning to pre-independence levels after a dip in 1951. The study notes that the rising share is primarily due to slower growth in the Hindu population rather than migration. 1.8% of the state's population reported Urdu as their mother tongue.", "category": "Politics", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "4d3155ab"}, {"headline": "Iran reviews participation in US peace talks in Pakistan", "summary": "Iran is reviewing its participation in peace talks with the U.S. in Islamabad after Pakistan moved to end a U.S. blockade of Iranian ports. While a senior Iranian official mentioned a 'positive review,' no final decision has been made. A two-week ceasefire is set to expire this week, and the U.S. has indicated it is unlikely to extend the truce.", "category": "World", "page": 3, "importance": 9, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "c263e0b7"}, {"headline": "Iran military vows response to US seizure of tanker in Gulf", "summary": "Iran's military vowed a swift response after U.S. forces seized an Iranian-flagged cargo ship, the M/V Touska, in the Gulf of Oman. Tehran denounced the act as maritime piracy and a violation of the current ceasefire. U.S. Central Command released video of Marines boarding the vessel after it failed to comply with warnings over a six-hour period.", "category": "World", "page": 3, "importance": 9, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "643f771d"}, {"headline": "Fire at Rajasthan refinery causes PM Modi to defer visit", "summary": "A major fire broke out in the Crude Distillation Unit at the HPCL Rajasthan Refinery in Balotra, just a day before its scheduled inauguration. No casualties were reported, but Prime Minister Narendra Modi's visit to dedicate the facility has been deferred. Over 30 fire tenders were used to control the blaze. An investigation has been launched.", "category": "Infrastructure", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "43bc5bc9"}, {"headline": "India fertiliser production hits five-year low amid West Asia war", "summary": "India's fertiliser production dropped 24.6% in March, reaching its lowest level in five years. The decline was caused by input shortages resulting from the conflict in West Asia and a 30% reduction in natural gas supplies. The core sector index contracted by 0.4% overall, also dragged down by falling output in coal, crude oil, and electricity generation.", "category": "Economy", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "895fb7a9"}, {"headline": "Hormuz shipping traffic slows as tensions rise between US and Iran", "summary": "Shipping traffic through the Strait of Hormuz slowed to a trickle after Iran rejected a continuing U.S. naval blockade and moved to seal the waterway again. Despite earlier hopes of reopening for commercial vessels, only four tankers moved through the strait in 12 hours. The on-off nature of traffic highlights the difficulty in restoring global oil flows.", "category": "World", "page": 3, "importance": 9, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "a77e2a4d"}, {"headline": "Pro-Russian former President Radev wins Bulgaria election in landslide", "summary": "Pro-Russian former President Rumen Radev’s Progressive Bulgaria party won the parliamentary election with 44.6% of the vote. The landslide victory may end years of political instability in the EU and NATO member state. Both Russia and the European Union welcomed the result, with the Kremlin expressing hope for pragmatic talks to resolve bilateral issues.", "category": "World", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "7efef09d"}, {"headline": "FBI Director Kash Patel files defamation lawsuit against The Atlantic", "summary": "FBI Director Kash Patel filed a $250 million defamation lawsuit against The Atlantic and author Sarah Fitzpatrick. The suit alleges a recent article contained false claims about Patel's drinking habits and professional conduct. Patel asserts the piece was a malicious attempt to destroy his reputation and force him from office.", "category": "World", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "8f02a3b2"}, {"headline": "Noida factory workers protest stagnant wages amid rising inflation", "summary": "Factory workers in Noida and Greater Noida are protesting stagnant wages that have failed to keep pace with inflation. While Haryana recently hiked minimum wages, many workers in Uttar Pradesh report receiving only ₹9,000-10,000 through contractors. The unrest has led to violent protests, arrests, and a recent 21% wage hike announcement by the UP government.", "category": "Economy", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "4b3888f4"}, {"headline": "Rare sighting of tiger, leopard, and cheetah in Ranthambore", "summary": "A tiger, a leopard, and an African cheetah were spotted simultaneously in Rajasthan's Ranthambore Tiger Reserve. Experts called the event 'rare and unprecedented.' The cheetah, identified as KP-2, had wandered from Madhya Pradesh's Kuno National Park and crossed the Chambal River into Rajasthan. Forest officials are using advanced equipment to monitor the feline.", "category": "Environment", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "fe53439e"}, {"headline": "Pocso accused found dead in Kalaburagi; family alleges murder", "summary": "A 26-year-old goods auto driver, recently released on bail in a Pocso case, was found dead in a field in Karnataka’s Kalaburagi district. His family alleges he was murdered by the girl's relatives. The man had reportedly married the girl in Gujarat after she turned 18. Police have registered a case of unnatural death and are coordinating with Telangana authorities.", "category": "India", "page": 5, "importance": 4, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "faf4d321"}, {"headline": "Karnataka convenes special Cabinet meet on internal SC reservation", "summary": "The Karnataka government scheduled a special Cabinet meeting for April 24 to discuss internal reservation for Scheduled Castes. The meeting was previously delayed by the election model code of conduct. Finalising the quota is considered essential for filling approximately 65,000 vacant government posts and addressing unrest among unemployed youth.", "category": "Politics", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "3102b10a"}, {"headline": "Gandhi statue vandalised in Haveri; investigation underway", "summary": "A two-foot-tall statue of Mahatma Gandhi was vandalised by unidentified individuals on MG Road in Haveri, Karnataka. Police have registered a case and are examining CCTV footage to identify the suspects. State Minister Priyank Kharge condemned the act, stating that those acting with malicious intent would be dealt with according to the law.", "category": "India", "page": 5, "importance": 4, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "b912c088"}, {"headline": "Three injured in road accident on Mysuru-Bengaluru Highway", "summary": "Three people were injured after a private tourist bus rammed into a car on the Mysuru-Bengaluru Highway near Budanur. The bus was en route to Kerala when it hit the car from behind and crashed into a roadside barrier. The injured were shifted to a local hospital for treatment. Mandya Rural police have seized the bus and registered a case.", "category": "India", "page": 5, "importance": 2, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "dfd5ca9b"}, {"headline": "Basavanna's principles remain relevant against caste system, says Siddaramaiah", "summary": "Karnataka CM Siddaramaiah stated that the principles of 12th-century reformer Basavanna will remain relevant as long as the rigid caste system exists. Speaking at Basava Jayanti in Mysuru, he called for rational education to eradicate superstition. The CM also announced a ₹5 crore grant for Basava Bhavan and emphasized that all professions carry equal dignity.", "category": "Culture", "page": 5, "importance": 3, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "47c1af19"}, {"headline": "Industry gives mixed response to Karnataka liquor tax overhaul", "summary": "The Karnataka government's proposal to overhaul liquor taxation to an alcohol-based (AIB) system received mixed reactions. The Brewers Association of India welcomed the move as a global best practice. However, the Karnataka Brewers and Distillers Association warned that the shift could increase retail prices for standard 180ml bottles by ₹10-15, affecting consumers.", "category": "Economy", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "c709ac68"}, {"headline": "Siddaramaiah questions Prime Minister over delay in women's reservation", "summary": "CM Siddaramaiah criticized Prime Minister Narendra Modi for the delay in implementing the women's reservation law passed in 2023. He questioned why the reservation was linked to a fresh census and delimitation, suggesting it should have been rolled out immediately. The CM accused the PM of being against social justice and handling the issue in a political manner.", "category": "Politics", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "824a34a8"}, {"headline": "Amendment bill defeat is BJP's first embarrassment in Parliament: Alva", "summary": "Senior Congress leader Margaret Alva termed the defeat of the constitution amendment bill in the Lok Sabha as the BJP government's first major embarrassment in Parliament. She alleged the BJP lacks real concern for women's reservation. Alva noted that her 1989 report on women's dignity emphasized that political empowerment is essential for progress.", "category": "Politics", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "ca31cc74"}, {"headline": "Victims' kin allege safety violations in TN firecracker factory blast", "summary": "Grieving relatives of the 25 victims killed in the Virudhunagar firecracker factory blast alleged the unit ignored safety norms. They claimed rooms were overcrowded and excessive raw materials were stored improperly. The blast occurred while workers were seeking extra pay before an election holiday. CM Stalin ordered a high-level probe and ₹5.5 lakh ex-gratia.", "category": "India", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "92c5da2b"}, {"headline": "PV Anvar severs ties with Trinamool to launch new party", "summary": "Former Nilambur MLA PV Anvar severed ties with the Trinamool Congress and announced plans to launch a new regional party in Kerala. Anvar claimed the AITC national leadership failed to support the unique political situation in the state. He intends to align his new party with the Congress-led United Democratic Front (UDF) by mid-May.", "category": "Politics", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "54ff681d"}, {"headline": "Rahul Gandhi accuses BJP of trying to rule TN by proxy", "summary": "At an election rally in Kanyakumari, Rahul Gandhi accused the BJP of trying to rule Tamil Nadu through the AIADMK 'by proxy.' He cited the Manipur conflict as evidence of the Centre's disregard for the federal structure and the Constitution. Gandhi stated the DMK and Congress represent the integrity of Tamil culture against Delhi's attempt at control.", "category": "Politics", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "3515cc30"}, {"headline": "Kerala issues new safety guidelines for hospital surgical procedures", "summary": "Kerala’s health department issued new surgical safety protocols following incidents of medical negligence, including instruments being left inside patients. The guidelines mandate colour-coded wristbands for patients and strict documentation of all surgical tools used. Hospitals must conduct root cause analysis within 24 hours of any adverse event or lapse.", "category": "Health", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "ca502d9a"}, {"headline": "Woman arrested for killing relative in Palakkad tribal settlement", "summary": "A 60-year-old man died after being attacked with a stone at a tribal settlement in Palakkad, Kerala. Police arrested a female relative, Chithra, for the assault. Investigators believe the woman held a grudge against the victim, Kaliyappan, after he complained about her behavior and frequently scolded her. The victim sustained fatal head and face injuries.", "category": "India", "page": 6, "importance": 2, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "c695e857"}, {"headline": "Telangana CM Reddy seeks CBI probe into Kaleshwaram project irregularities", "summary": "Telangana CM Revanth Reddy demanded a CBI investigation into irregularities in the construction of the Kaleshwaram lift irrigation project. He accused the previous BRS government of 'politically motivated redesigning' that led to structural failures. Reddy stated that the ₹1 lakh crore project failed to irrigate even 1 lakh acres and that those responsible would be held.", "category": "Infrastructure", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "6e7f4e64"}, {"headline": "KCR accuses Telangana Congress government of ruining state economy", "summary": "BRS president K. Chandrashekar Rao accused the Congress government of ruining Telangana's economy and failing farmers. Speaking at a rally in Jagtial, he claimed that the Rythu Bandhu scheme assistance was not reaching farmers and that the state faced bankruptcy. KCR alleged that every section of society was unhappy with the current administration's betrayal.", "category": "Politics", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "d7519ef3"}, {"headline": "Election rallies intensify in Tamil Nadu and West Bengal", "summary": "Campaigning for the April 23 polls in Tamil Nadu and West Bengal reached a fever pitch. Rahul Gandhi, Mamata Banerjee, and Rajnath Singh held multiple rallies. Gandhi attacked the BJP's centralising tendencies, while Banerjee accused PM Modi of staging 'scripted dramas.' Rajnath Singh urged Bengal voters to opt for change after 15 years of TMC rule.", "category": "Politics", "page": 7, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "ccdd6e87"}, {"headline": "Pawan Khera moves Gauhati HC seeking pre-arrest bail", "summary": "Congress leader Pawan Khera moved the Gauhati High Court for anticipatory bail regarding allegations that he holds multiple passports and foreign properties. This follows the Supreme Court staying a previous transit bail granted by the Telangana High Court. Khera is facing an FIR in Guwahati under various sections of the Bharatiya Nyaya Sanhita and other acts.", "category": "Law", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "2a2ba7ac"}, {"headline": "EC takes 106 offenders into preventive detention in West Bengal", "summary": "The Election Commission took 106 people with criminal backgrounds into preventive detention in West Bengal ahead of Phase 1 polling on April 23. The crackdown covered Murshidabad, Cooch Cooch Behar, and South 24 Parganas. The EC has also deployed 2,193 Quick Response Teams to ensure violence-free voting and warned local police of suspension if explosives are found.", "category": "Politics", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "f07e53f7"}, {"headline": "I-PAC director representative appears before ED in laundering case", "summary": "A legal representative of I-PAC director Rishi Raj Singh appeared before the Enforcement Directorate in Delhi to assist in evidence gathering. The agency is taking data dumps from electronic gadgets seized during earlier raids. The probe involves alleged falsification of accounts and laundering of ₹50 crore, which ED officials link to a broader coal scam investigation.", "category": "Law", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "0dbe0c63"}, {"headline": "Citizens write to EC alleging PM's address violated MCC", "summary": "Over 700 citizens, including former civil servants and activists, filed a complaint with the Election Commission against Prime Minister Narendra Modi. They allege his April 18 national address, broadcast on official platforms, violated the Model Code of Conduct. The signatories claimed the address amounted to partisan propaganda during the election period.", "category": "Politics", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "e3e237bf"}, {"headline": "AIADMK chief promises caste survey if voted to power", "summary": "AIADMK general secretary Edappadi K. Palaniswami promised to conduct a caste survey in Tamil Nadu if his party returns to power. Speaking at a rally in Salem, he stated the survey would fulfill a central government announcement and help implement welfare measures. The AIADMK's election manifesto includes 297 promises aimed at various social groups.", "category": "Politics", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "80c6d6d6"}, {"headline": "Manipur police arrest 21 for violence; Meitei group member held", "summary": "Manipur police arrested 21 people for violence in Imphal West that injured three security personnel. Additionally, a member of the Arambai Tengol group was arrested for instigating the public through provocative social media posts. The region remains tense following shutdowns called by various organisations to protest recent killings by suspected militants.", "category": "India", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "ce63147a"}, {"headline": "Indian regulators seize fake obesity drug pens linked to Alibaba", "summary": "Indian drug regulators seized over 260 suspected counterfeit pens of the obesity drug Mounjaro near New Delhi. The main accused allegedly ordered raw materials from Alibaba vendors in China and sold the fakes on IndiaMART at a 27% discount. Officials recovered packaging labels and raw materials valued at ₹7 million from a private property.", "category": "Health", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "68f1cb43"}, {"headline": "Top court raps Centre for logistical lapse in varsity audit", "summary": "The Supreme Court reprimanded the Centre for failing to provide logistical support to a court-appointed committee auditing private universities. The committee reported being given dilapidated office space slated for demolition. The court issued a contempt notice to the Union Education Secretary, calling the lack of infrastructure an 'affront' to the judicial process.", "category": "Education", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "c1ab1c45"}, {"headline": "UP government to pay ₹5 lakh for wrongful juvenile incarceration", "summary": "The Supreme Court ordered the Uttar Pradesh government to pay ₹5 lakh in compensation to a man wrongfully incarcerated with adult inmates while he was a juvenile. The court slammed the 'inhumane approach' and insensitivity of officials. A standard operating procedure has been recorded to prevent such violations of child protection laws in the future.", "category": "Law", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "b0581846"}, {"headline": "UK pharmacist fights extradition over mother-in-law's alleged poisoning", "summary": "A UK-based pharmacist, Ajith Kumar Mupparapu, is fighting extradition to India for allegedly poisoning his ex-wife's family with arsenic. Indian prosecutors claim he arranged for tainted chilli powder to be sent to Hyderabad, resulting in his mother-in-law's death. Mupparapu's lawyers argue there is insufficient evidence and a risk of torture if extradited.", "category": "World", "page": 10, "importance": 4, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "a917f471"}, {"headline": "Supreme Court acquits man in 2017 headmistress rape-murder case", "summary": "The Supreme Court acquitted Moinul Haque in the 2017 rape and murder of a school headmistress in Assam, citing a lack of evidence. The court upheld the Gauhati High Court's decision, noting that the defendant's arrest was 'shrouded in a cloud of doubt.' The apex court exercised its appellate powers to ensure justice despite the lack of a cross-appeal.", "category": "Law", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "259f35ee"}, {"headline": "High Court junks Unnao victim's plea against Kuldeep Sengar", "summary": "The Delhi High Court dismissed a plea by the Unnao rape victim seeking a sentence enhancement for former MLA Kuldeep Singh Sengar regarding her father's custodial death. The court refused to condone a 1,945-day delay in filing the appeal, stating the reasons provided—including financial constraints and threats—were vague and lacked documentary support.", "category": "Law", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "401b9477"}, {"headline": "Cybercrimes require systemic and coordinated response, says CJI", "summary": "Chief Justice of India Surya Kant called for a systemic and coordinated response to cybercrime, noting that isolated adjudications are inefficient against organised networks. Delivering the DP Kohli Memorial Lecture, the CJI suggested briefly pausing fund transfers to foreign accounts for verification. He emphasized that bail jurisprudence must consider the scale of fraud.", "category": "Law", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121031", "
