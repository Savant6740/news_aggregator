sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "cac8c9f3"}, {"headline": "India Post logs 16% revenue growth in 2025-26 fiscal", "summary": "India Post reported a 16% revenue growth for the 2025-26 fiscal year, reaching ₹15,296 crore. Union Minister Jyotiraditya Scindia noted that the department is successfully shifting from a cost centre to a profit-making entity. The growth was driven by a 70% jump in parcel revenue and strong performance in savings bank and citizen-centric services.", "category": "Business", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "94485bc1"}, {"headline": "Study: Nearly 13% Indian women with breast cancer experienced metastasis", "summary": "A study published in The Lancet Regional Health Southeast Asia found that nearly 13% of 76,000 Indian women with breast cancer experienced metastasis. Bone was the most frequent site for cancer spread. Researchers noted that the risk was higher for diagnoses between 2015-2020 and emphasized the impact of tumour biology over patient age in driving metastatic risk.", "category": "Health", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "992e4a28"}, {"headline": "RBI eases foreign exchange hedging rules for banks", "summary": "The Reserve Bank of India eased foreign exchange rules for banks by allowing certain related-party hedging transactions. The move clarifies that genuine risk-offsetting trades between domestic and overseas branches will not be treated as speculative. While the $100 million net open position limit remains, the relaxation addresses industry operational challenges.", "category": "Economy", "page": 14, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "e475338d"}, {"headline": "Tata affiliate trust clause change will not validate current board", "summary": "Mehli Mistry stated that Tata Trusts' plan to amend eligibility clauses for the Bai Hirabai Trust is an admission that its current board is non-compliant. Mistry, who challenged the appointment of non-Zoroastrian trustees, argued that any amendment can only apply prospectively. The dispute involves the eligibility of Venu Srinivasan and Vijay Singh as trustees.", "category": "Business", "page": 14, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "a2d77743"}, {"headline": "Government keeps options open for future AI legal framework", "summary": "A MeitY official stated that India has not ruled out separate legislation for Artificial Intelligence but currently views it as unnecessary. The government has formed two high-level committees to advise on AI governance and policy development. For now, the focus is on innovation-driven growth, with existing IT rules addressing limited aspects of AI-generated content.", "category": "Technology", "page": 14, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "8c143526"}, {"headline": "India widens list of Russian insurers for energy shipments", "summary": "India has added more Russian insurers to its approved list for vessels calling at its ports to ensure energy security amid the Hormuz Strait blockade. Eleven Russian insurers are now permitted to provide cover, up from eight. The move aims to facilitate continued crude oil flows from Moscow, which refiners are increasingly relying on as Gulf shipments are disrupted.", "category": "Economy", "page": 14, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "252cbdb8"}, {"headline": "NITI Aayog prepares overhaul of India's informal transport system", "summary": "NITI Aayog is developing a national framework for first- and last-mile mobility to overhaul India's informal transit systems. The framework aims to regulate the 200-300 million daily trips made via e-rickshaws, tempos, and minibuses. The goal is to reduce traffic congestion, lower environmental costs from private vehicles, and fill gaps in public transport networks.", "category": "Infrastructure", "page": 14, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "e5755ab2"}, {"headline": "Sawan Barwal breaks 48-year-old Indian national marathon record", "summary": "Sawan Barwal broke the 48-year-old Indian national marathon record with a timing of 2:11:58. The previous record of 2:12:00 was held by the late Shivnath Singh since 1978. While the achievement marks a milestone for Indian athletics, experts noted the significant gap remaining between the national mark and the world record of 2:00:35.", "category": "Sports", "page": 15, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "7db37c64"}, {"headline": "Punjab FC secure 3-0 victory over Inter Kashi in ISL", "summary": "Punjab FC secured a 3-0 victory over Inter Kashi in their Indian Super League match at the Jawaharlal Nehru Stadium. Goals from Samir Zeljkovic, Nsungusi Jnr, and Bede Osuji sealed the win. The result keeps Punjab FC in seventh place in the 14-team table, while Inter Kashi remains in eighth.", "category": "Sports", "page": 16, "importance": 3, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "3d2514cf"}, {"headline": "Nahid Rana haul leads Bangladesh to ODI victory over NZ", "summary": "Pacer Nahid Rana's 5/32 haul led Bangladesh to a six-wicket victory over New Zealand in the second ODI, leveling the three-match series at 1-1. Bangladesh bowled out New Zealand for 198 and chased down the target with 14.3 overs to spare. Opener Tanzid Tamim top-scored with 76, supported by Najmul Hossain Shanto’s 50.", "category": "Sports", "page": 16, "importance": 4, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "cbb4f41f"}, {"headline": "Aditi Ashok finishes tied 51st at JM Eagle LA Championship", "summary": "Indian golfer Aditi Ashok finished tied for 51st at the LPGA Tour's JM Eagle LA Championship. A triple bogey on the fifth hole hampered her final round, where she carded a four-over 76. Aditi finished with a 1-under total for the tournament. The performance followed rounds of 70, 72, and 69 earlier in the week.", "category": "Sports", "page": 16, "importance": 3, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "c4067a33"}, {"headline": "Guardiola warns Man City that title race is not over", "summary": "Manchester City manager Pep Guardiola warned that the Premier League title race is not over despite a vital 2-1 win over Arsenal. City now sit three points behind the leaders with a game in hand. Guardiola emphasized that his team currently lacks the top spot and a better goal difference, urging focus as they prepare to face Burnley.", "category": "Sports", "page": 16, "importance": 4, "telegram_url": "https://t.me/c/1877410077/121031", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/121031"}], "article_id": "32c21cf6"}, {"headline": "US seizes Iran ship but both sides say talks in Pak are on", "summary": "The US Central Command seized an Iranian ship, the M/V Touska, in the Gulf of Oman, alleging it carried dual-use items for Iran's missile program. Despite this escalation, diplomatic sources indicate that negotiations for a two-week ceasefire between Iran and Israel, currently hosted in Islamabad, Pakistan, remain active with representatives from both nations present.", "category": "World", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "a6dbf553"}, {"headline": "The stiffer the drink, the more you pay in Karnataka", "summary": "The Karnataka government has revised its liquor taxation policy, introducing eight slabs based on alcohol by volume (ABV) content. Beverages with higher ABV will now attract higher taxes compared to lower-strength variants. The move aims to compress excise duty slabs from 16 to 8 and is expected to impact market prices for beer and spirits based on their potency.", "category": "Economy", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "82740a09"}, {"headline": "After decades, India’s carbon discharge falls", "summary": "India's carbon dioxide emissions have recorded a decline for the first time in nearly three decades, excluding the 2020 pandemic year. The reduction is attributed to a combination of a prolonged monsoon season, which increased hydroelectric output, and a significant 60% surge in renewable energy capacity. Coal-fired power generation saw a rare 3% dip as a result.", "category": "Environment", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "12fc3706"}, {"headline": "Hry commando dies in boxing accident in HP", "summary": "A 26-year-old commando from the Haryana Police's Special Forces died following a training accident at a school in Himachal Pradesh. The officer sustained critical head injuries during a boxing match and was declared dead after being rushed to the hospital. A case of accidental death has been registered by local police.", "category": "India", "page": 1, "importance": 4, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "5475dd4f"}, {"headline": "2 die in US as fight in park blows up", "summary": "Two people were killed and several others injured during a shooting incident at a park in North Carolina. The violence erupted following a fight among a group of people who had gathered at the park. Local police have launched a manhunt for multiple suspects involved in the shooting, which they described as a targeted attack.", "category": "World", "page": 1, "importance": 3, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "885ce0c3"}, {"headline": "RBI curbs on rupee derivatives eased", "summary": "The Reserve Bank of India has eased emergency curbs on rupee derivative trading that were introduced to prevent extreme volatility. The central bank has permitted banks and recognized stock exchanges to restart non-deliverable forward contracts in the domestic market, marking a shift back to normal market conditions while maintaining oversight on speculative positions.", "category": "Economy", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "9ff82b90"}, {"headline": "Nepal’s tighter levy squeezes India border biz", "summary": "New tax rules in Nepal have led to a 5% to 80% increase in levies on various Indian goods, significantly impacting cross-border trade. Traders in border towns report a sharp decline in business as prices of essential commodities and electronics have surged. The move is seen as an effort by Nepal to boost domestic revenue and manage its trade deficit.", "category": "Economy", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "79b60eef"}, {"headline": "Onion prices take a beating as eateries shut", "summary": "Onion prices in Karnataka have crashed to as low as Rs 500-1,000 per quintal due to the closure of several eateries and a sudden supply glut. Farmers in the onion-growing belt are facing distress as wholesale prices have fallen below production costs. Reduced demand from the food service sector and hitches in exports have exacerbated the situation.", "category": "Economy", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "78eca429"}, {"headline": "First heatstroke death? Errand turns fatal in Bidar", "summary": "A 20-year-old youth in Bidar collapsed and died while out on an errand, marking what is suspected to be the season's first heatstroke death in the region. Temperatures in the district have consistently stayed above 40°C. Local authorities have issued a heatwave alert and advised residents to restrict outdoor activities during peak afternoon hours.", "category": "Health", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "e0432883"}, {"headline": "Bengaluru Corporations Can Learn From Around The World", "summary": "As Bengaluru considers replacing the BBMP with multiple smaller corporations, experts suggest looking at global models like London, New York, and Seoul. These cities balance decentralization with a strong central authority for metropolitan-level coordination. The key challenge remains ensuring equitable revenue distribution and efficient service delivery across new divisions.", "category": "Politics", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "a88b65bb"}, {"headline": "Court upholds cheque-bounce case sentence", "summary": "The High Court of Karnataka upheld the conviction of a teacher in a cheque-bounce case, rejecting the defense that the cheque was stolen. The court noted that the accused failed to provide credible evidence of theft and had an existing debt. The teacher has been ordered to pay a fine and faces a potential prison term if the payment is not made.", "category": "Law", "page": 2, "importance": 3, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "1cb77d13"}, {"headline": "Hotels explore biogas to curb LPG reliance", "summary": "Faced with rising LPG prices and waste disposal challenges, hotels in Bengaluru are increasingly adopting biogas plants. These onsite facilities convert food waste into fuel for cooking, helping establishments reduce their carbon footprint and operating costs. The Bruhat Bengaluru Mahanagara Palike is encouraging bulk waste generators to adopt such sustainable solutions.", "category": "Environment", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "3a67ecf1"}, {"headline": "Bescom threatens power cut after flat owner’s complaint", "summary": "Bescom issued a disconnection notice to an apartment complex in Jaya Nagar after a resident complained about a hazardous transformer installation. The resident alleged that the transformer was placed too close to a children's play area. Bescom has given the apartment association time to relocate the equipment to a safer spot before cutting power supply.", "category": "Infrastructure", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "bcdc6713"}, {"headline": "Digital wellbeing in focus at Let’s D-Stress today", "summary": "An interactive session titled 'Digital D-Stress' is being organized at Vidyashilp University to address the impact of excessive screen time on students' mental health. Experts from NIMHANS will discuss strategies for digital detox and mindful technology use. The event aims to help students recognize signs of digital fatigue and improve their academic focus.", "category": "Education", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "aa421d64"}, {"headline": "Milk vendor dies in bus-scooter crash", "summary": "A 61-year-old milk vendor was killed after his scooter was hit by a speeding BMTC bus in north Bengaluru. The victim was delivering milk when the accident occurred near Kannamangala. The bus driver has been arrested for rash and negligent driving. Local residents staged a protest demanding improved road safety measures in the area.", "category": "India", "page": 2, "importance": 3, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "9d8a9580"}, {"headline": "Mango prices soar as production dips", "summary": "Mango prices in Karnataka have seen a sharp increase as unseasonal weather has led to a significant drop in production this year. Key varieties like Badami and Alphonso are currently retailing at Rs 150-200 per kg. Exports have also been hit by the shortage. Trade experts predict that supply will remain tight until the mid-season harvest arrives in May.", "category": "Economy", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "164ca84a"}, {"headline": "7 yrs in making, Victoria Hosp’s 10-storey Q-block to open soon", "summary": "The long-awaited 10-storey Q-block at Victoria Hospital is set to be inaugurated soon, seven years after its foundation was laid. The facility will house a dedicated outpatient department, emergency services, and advanced surgical units. The expansion is expected to significantly increase the hospital's capacity to handle the high volume of daily patients.", "category": "Health", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "9cd627c8"}, {"headline": "Cong MLA team to aid amputee student", "summary": "A team led by a Congress MLA has stepped in to provide financial and medical assistance to a Class 10 student who lost her leg in an accident. The girl's father had offered to sell his kidney to pay for her prosthetic leg. The MLA's team has assured that the government will cover all medical expenses and facilitate her education.", "category": "Politics", "page": 3, "importance": 4, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "2704b05b"}, {"headline": "Rottweiler attacks cop during phone call", "summary": "A police constable was severely injured after being attacked by a Rottweiler while he was on a phone call in Bengaluru. The dog, which was reportedly unleashed, bit the officer on his legs and arms. A case has been registered against the dog's owner for negligence. The incident has sparked renewed concerns over the management of aggressive pet breeds in residential areas.", "category": "India", "page": 3, "importance": 3, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "64c3f9ce"}, {"headline": "HC: Advance bail valid even after new charges are added", "summary": "The High Court of Karnataka has ruled that anticipatory bail granted to an accused remains valid even if additional charges or sections are added to the FIR later. The court clarified that the bail cannot be automatically cancelled without a specific order from a higher court, providing relief to individuals facing evolving criminal investigations.", "category": "Law", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "35209f23"}, {"headline": "Govt files review plea on court’s SSLC exam order", "summary": "The Karnataka government has filed a review petition in the High Court against its recent order regarding the evaluation of SSLC third language exams. The government argues that the court's direction to include grace marks would lead to academic inconsistency. The court has agreed to hear the matter and has temporarily stayed the implementation of the previous order.", "category": "Education", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "08ecdfba"}, {"headline": "Innovation park to come up on GKVK campus", "summary": "An innovation park dedicated to agricultural and life sciences is set to be established on the GKVK campus in Bengaluru. The project, supported by the state government and private partners, aims to provide a platform for startups and researchers to develop sustainable farming technologies. The park will include specialized labs and incubation centers.", "category": "Science", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "c172cbaa"}, {"headline": "Fraudster poses as top cop on WA, seeks money", "summary": "Bengaluru police are investigating a case where a fraudster used a top police officer's photo as his WhatsApp display picture to solicit money from various contacts. Several individuals reported receiving messages asking for urgent financial assistance. Authorities have warned the public to verify the identity of individuals requesting funds over messaging apps.", "category": "Law", "page": 3, "importance": 3, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "bd48bd52"}, {"headline": "Export hit, eatery closures deepen onion price crash", "summary": "A combination of reduced demand due to the closure of eateries and a halt in exports has led to a major crash in onion prices across Karnataka. Wholesale prices have dropped significantly, causing severe distress to farmers. Agricultural experts are calling for government intervention through minimum support prices and the exploration of new export markets.", "category": "Economy", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "0d615bbc"}, {"headline": "Special cabinet meet to examine pro-rata matrix", "summary": "The Karnataka cabinet will hold a special meeting to discuss the implementation of a pro-rata matrix for government recruitments. The matrix aims to ensure proportional representation for various communities in accordance with recent court orders. The move is seen as an attempt to resolve long-standing issues related to reservation quotas in state services.", "category": "Politics", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "b762b24e"}, {"headline": "Will increase of LS seats be boon or bane for K’taka?", "summary": "Experts are divided over the potential impact of increasing Lok Sabha seats for Karnataka following the upcoming delimitation exercise. While some believe it will provide better representation for the growing population, others fear it could lead to political imbalances. The debate centers on how the new boundaries will affect the influence of regional parties and urban voters.", "category": "Politics", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "70750570"}, {"headline": "Void deeds: Update docs within 4 weeks, says HC", "summary": "The High Court of Karnataka has directed the state registration department to update records regarding void or cancelled deeds within four weeks of receiving a court order. The ruling aims to prevent the misuse of invalid property documents and protect the interests of genuine buyers. The court emphasized the need for a transparent and time-bound process for record updates.", "category": "Law", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "511c26be"}, {"headline": "Bidar restricts biz hrs from 8am to 2pm", "summary": "Due to extreme heatwave conditions, the Bidar district administration has ordered all businesses to operate only between 8 am and 2 pm. The restriction aims to minimize public exposure to high temperatures during peak afternoon hours. Exemptions have been made for essential services, but residents are urged to stay indoors as temperatures cross 42°C.", "category": "Health", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "3aec28bf"}, {"headline": "Driver falls unconscious, dies after car hits man", "summary": "A car driver died after reportedly falling unconscious behind the wheel and hitting a pedestrian in Udupi. The vehicle veered off the road and crashed into a tree after the initial impact. The pedestrian sustained minor injuries, while the driver was declared dead on arrival at the hospital. Police suspect a sudden cardiac arrest led to the accident.", "category": "India", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "79ec7eaa"}, {"headline": "Cops recover snatched phone within mins", "summary": "Bengaluru police managed to recover a snatched mobile phone within minutes of the incident and arrested the accused. The quick response was possible due to the alertness of a patrolling unit that spotted the suspect fleeing on a bike. The victim's phone was returned immediately after the arrest was made.", "category": "India", "page": 4, "importance": 2, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "98a36144"}, {"headline": "Concessional rates to continue for defence & paramilitary canteens", "summary": "The Karnataka government has decided to continue providing concessional excise rates for liquor sold in defence and paramilitary canteens. The decision follows a review of the recent tax revisions, ensuring that personnel in the armed forces are not adversely affected by the overall increase in liquor prices in the state.", "category": "Economy", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "85df3dd4"}, {"headline": "SC: Fair criticism of judges OK, but not baseless allegations", "summary": "The Supreme Court observed that while fair criticism of judicial orders is permissible in a democracy, making baseless allegations against judges is unacceptable. The court warned that such actions could undermine public confidence in the judiciary. The observation came during the hearing of a contempt case involving allegations of bias in a High Court ruling.", "category": "Law", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "1dff4dfa"}, {"headline": "Judge who modified Rahul order recuses", "summary": "A judge of the Allahabad High Court, who had modified a previous order in a case involving Rahul Gandhi, has recused himself from further hearings. The judge cited recent social media posts questioning his impartiality as the reason for his decision. The case, which pertains to Gandhi's citizenship status, will now be heard by a different bench.", "category": "Law", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "00f8ab77"}, {"headline": "Bail denied to nat’l tennis player in drug peddling case", "summary": "A Hyderabad court denied bail to a national-level tennis player arrested for his alleged involvement in an international drug peddling ring. The police argue that the accused was part of a network supplying high-end synthetic drugs to elite clients. The court noted that the investigation is at a crucial stage and granting bail could hinder the probe.", "category": "Law", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "b6dd661d"}, {"headline": "T’gana gang trafficking newborns busted in Guj", "summary": "Gujarat police have busted a child trafficking gang that allegedly operated across Telangana and Gujarat. The gang was involved in kidnapping newborns and selling them to childless couples for large sums of money. Eight infants were rescued during the operation, and several individuals, including a suspected kingpin from Hyderabad, have been arrested.", "category": "India", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "86f8515f"}, {"headline": "Man tries to settle DJs’ fight, killed", "summary": "A 22-year-old man was killed in Madhya Pradesh after he tried to mediate a fight between two rival DJ groups during a wedding procession. The victim was allegedly attacked with sharp weapons during the clash. Police have arrested three suspects and are questioning others involved in the brawl, which reportedly started over a trivial issue regarding music volume.", "category": "India", "page": 6, "importance": 3, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "c3cc1199"}, {"headline": "Baraat goes to DM over high power bill", "summary": "In a unique protest, a wedding procession in Uttar Pradesh marched to the District Magistrate's office to complain about an inflated electricity bill. The family of the groom alleged that they were being harassed for a payment that had already been made. The DM has ordered an inquiry into the matter and directed the power department to resolve the issue promptly.", "category": "India", "page": 6, "importance": 3, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "ff2dd346"}, {"headline": "Trade, tech ties get a boost as Modi hosts Korean Prez", "summary": "Prime Minister Narendra Modi and South Korean President Lee Jae Myung held high-level talks in New Delhi to strengthen bilateral trade and technology cooperation. The two nations signed several MoUs in areas including semiconductors, artificial intelligence, and green energy. The leaders also discussed regional security and the expansion of the CEPA agreement.", "category": "Politics", "page": 7, "importance": 9, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "e4ebcd48"}, {"headline": "Heatwave to prevail in parts of India for 4-5 days, warns IMD", "summary": "The IMD has issued a heatwave warning for several parts of north and central India for the next 4-5 days. Temperatures are expected to rise by 2-4 degrees Celsius, with some areas likely to see heatwave to severe heatwave conditions. The public has been advised to avoid outdoor exposure during peak hours and take necessary precautions to stay hydrated.", "category": "Environment", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "5322ec54"}, {"headline": "Maha to set up task force to counter likely El Niño impact", "summary": "The Maharashtra government has decided to set up a dedicated task force to prepare for the potential impact of El Niño on this year's monsoon. The task force will monitor water levels in reservoirs and develop contingency plans for agriculture and drinking water supply. Experts have warned that El Niño could lead to deficient rainfall in parts of the state.", "category": "Environment", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "3d754be9"}, {"headline": "Noida violence: 2 workers’ outfits members held", "summary": "Two members of local workers' unions have been arrested in Noida for their alleged involvement in a violent protest that led to property damage. The protest was triggered by the dismissal of several workers from a manufacturing unit. Police are reviewing CCTV footage to identify other individuals involved in the rioting and arson.", "category": "India", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "0c022bf5"}, {"headline": "SC surprised educated still falling for ‘digital arrest’ scams", "summary": "The Supreme Court expressed concern over the rising number of educated individuals falling prey to 'digital arrest' scams. The court noted that fraudsters are using sophisticated techniques to impersonate law enforcement officials. The observations came during the hearing of a plea seeking more effective measures to tackle cybercrime and protect innocent citizens.", "category": "Law", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "af997c78"}, {"headline": "Officials suspect hydrocarbon leak behind Raj refinery fire", "summary": "A preliminary investigation into the fire at a Rajasthan oil refinery suggests that a hydrocarbon leak from a pipeline was the primary cause. The fire, which broke out over the weekend, caused significant damage to one of the processing units. Officials are working to ensure that the leak is fully contained before restarting operations at the facility.", "category": "Infrastructure", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "2b7a97e5"}, {"headline": "Graft case: Court exonerates former CBI judge, four others", "summary": "A special court has exonerated a former CBI judge and four others in a corruption case that had been ongoing for several years. The court found that the prosecution failed to provide sufficient evidence to support the charges of bribery and misuse of power. The former judge had been accused of accepting illegal gratifications to influence a high-profile case.", "category": "Law", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "758a871b"}, {"headline": "Ganga wiped out homes thrice, SIR erased names", "summary": "Villagers along the banks of the Ganga in West Bengal are facing a dual crisis of river erosion and administrative issues with the Special Institutional Review (SIR) for electoral rolls. Many families have lost their homes multiple times due to erosion, and their names have reportedly been removed from the voter list during the SIR process, leaving them disenfranchised.", "category": "Environment", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "33e2cac5"}, {"headline": "Exasperated CJI: May need a special bench for SIR cases", "summary": "The Chief Justice of India expressed frustration over the high volume of petitions related to the Special Institutional Review (SIR) in West Bengal. He noted that the court might need to constitute a special bench to handle these cases, which involve allegations of mass voter deletion. The CJI urged the Election Commission to ensure a fair and transparent review process.", "category": "Law", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "f9b57f52"}, {"headline": "Nashik court remands two accused to judicial custody", "summary": "A Nashik court has remanded two individuals to judicial custody for 14 days in connection with a local assault case. The accused were arrested following a complaint filed by a local resident. The court denied their bail application, citing the potential for the accused to influence witnesses if released at this stage of the investigation.", "category": "Law", "page": 9, "importance": 4, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "edb4dfab"}, {"headline": "Left out of ‘cash-for-votes’, TN villagers block road", "summary": "Villagers in a district in Tamil Nadu blocked a major highway in protest after reportedly being 'left out' of a local cash-for-votes distribution by a political party. The protesters alleged that only a few households received money, while others were ignored. Police had to intervene to clear the blockade, and an investigation into the allegations has been launched.", "category": "Politics", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "f28206a8"}, {"headline": "Courtroom cannot become a theatre of perception: HC", "summary": "A High Court judge observed that courtrooms should not be used for creating political narratives or influencing public perception. The judge emphasized that legal proceedings must be based on facts and law rather than rhetoric. The remarks came during the hearing of a high-profile case involving a political leader, where both sides were accused of using the platform for optics.", "category": "Law", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "f07f518f"}, {"headline": "A crisis that didn’t end: Pahalgam hospital still under strain", "summary": "One year after a major terror attack in Pahalgam, the local hospital continues to face a shortage of critical equipment and staff. The facility, which was the first point of care for the victims, is struggling to meet the healthcare needs of both residents and tourists. Health officials have called for urgent government funding to upgrade the hospital's infrastructure.", "category": "Health", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "546cb18b"}, {"headline": "How customised health plans help, and what to keep in mind", "summary": "Insurance experts are highlighting the benefits and potential pitfalls of highly customized health insurance plans. While these plans offer flexibility and can be more cost-effective by allowing users to choose specific riders, they can also lead to confusion. Consumers are advised to carefully read the fine print and ensure they have adequate coverage for critical illnesses.", "category": "Health", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "87e9234a"}, {"headline": "Can new labour codes, tax rules rejig impact your take-home salary?", "summary": "The potential implementation of new labour codes and revised income tax rules is expected to impact the take-home salaries of millions of employees in India. The new codes could change how components like basic pay and provident fund contributions are calculated. Experts suggest that employees should prepare for adjustments in their monthly budgets once the changes take effect.", "category": "Economy", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "bb7b0474"}, {"headline": "Robots Are Coming: AI’s rapid strides may pose existential crisis", "summary": "This editorial discusses the rapid advancements in robotics and artificial intelligence, suggesting that these technologies could eventually replace humans in various sectors. While AI offers immense potential for productivity, it also poses challenges for the workforce and ethical concerns. The piece calls for a balanced approach to AI development and integration into society.", "category": "Technology", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "f47cae2f"}, {"headline": "Groww’s March qtr profit more than doubles", "summary": "Online investment platform Groww reported a significant increase in its net profit for the March quarter, which more than doubled to Rs 686 crore. The growth was driven by a surge in trading activity and an increase in the number of active users. The company also saw a substantial rise in its revenue from operations during the same period.", "category": "Business", "page": 13, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "6025c69a"}, {"headline": "Oil rises 5%, US markets snap 13-day winning streak", "summary": "Global oil prices rose by 5% amid renewed tensions in West Asia, leading to concerns over potential supply disruptions. This surge in oil prices contributed to a decline in US stock markets, which snapped their 13-day winning streak. Investors are closely monitoring the geopolitical situation and its potential impact on global inflation and economic growth.", "category": "Economy", "page": 13, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "90cd62dc"}, {"headline": "Israel, Lebanon to talk again in US on Thursday", "summary": "Representatives from Israel and Lebanon are set to hold another round of US-mediated talks on Thursday to discuss their maritime border dispute. Previous rounds have seen some progress, but key issues regarding gas exploration rights in the Mediterranean remain unresolved. The US is hopeful that a final agreement can be reached soon to prevent further tensions in the region.", "category": "World", "page": 14, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "3df500df"}, {"headline": "Bulgaria’s ex-prez, who’s pro-Russia, wins landslide polls", "summary": "In a major political shift, Bulgaria's former president, known for his pro-Russia stance, has won the presidential election by a landslide. The win is expected to significantly impact Bulgaria's foreign policy and its relations with both the EU and Russia. Critics fear that the new leadership could lead to a rollback of democratic reforms in the country.", "category": "World", "page": 14, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "ddc7811d"}, {"headline": "Japan warns of increased risk of mega-quake after 7.7 temblor", "summary": "Japan's meteorological agency has issued a warning about an increased risk of a mega-quake following a 7.7 magnitude earthquake that triggered a small tsunami. While the immediate threat has subsided, scientists are concerned about potential seismic activity in the Nankai Trough. Residents in coastal areas have been advised to stay alert and follow evacuation protocols.", "category": "World", "page": 14, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "af83379e"}, {"headline": "Alcaraz, Sabalenka win Laureus Sportspersons of the Year awards", "summary": "Tennis stars Carlos Alcaraz and Aryna Sabalenka were named the Laureus World Sportsman and Sportswoman of the Year, respectively, at a gala event in Madrid. Alcaraz was recognized for his historic rise to world number one, while Sabalenka's consistent performance at Grand Slams earned her the top honor. Other winners included the Spanish women's football team.", "category": "Sports", "page": 16, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121051", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_21-04-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/121051"}], "article_id": "3e8dc96a"}, {"headline": "First Tranche of India-US Trade Deal Almost Finalised, Says Piyush Goyal", "summary": "Union Commerce Minister Piyush Goyal announced that India and the United States have nearly finalised the first phase of their bilateral trade agreement. Negotiators in Washington are discussing preferential market access and labor standards. This marks the first in-person trade talks between the two nations since October, aiming to strengthen economic ties and trade mechanisms.", "category": "Economy", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/121044", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_21-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121044"}], "article_id": "f49f686a"}, {"headline": "RBI Eases Rules on NDF Contracts to Provide Lenders Breathing Space", "summary": "The Reserve Bank of India has withdrawn its April 1 circular that barred banks from offering non-deliverable forward contracts to clients. The move allows lenders to rebook contracts and offsets previous restrictions that led to significant losses. The central bank aims to arrest the rupee's plunge and ensure normal hedging activity in the volatile foreign exchange market.", "category": "Economy", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121044", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_21-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121044"}], "article_id": "b25599de"}, {"headline": "South Korean Conglomerates Meet PM Modi to Expand High-Tech Manufacturing Investments", "summary": "Top executives from South Korean giants, including Samsung Electronics, LG, and Hyundai, met Prime Minister Narendra Modi to discuss fresh investments in India. The discussions focused on expanding exports, semiconductors, electric vehicle manufacturing, and display modules. The leaders signaled plans to use India as a key global hub for the next round of manufacturing growth.", "category": "Business", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/121044", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_21-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121044"}], "article_id": "81682f64"}, {"headline": "IPL Teams Seek Lower GST Rate for Tickets to Boost Sport", "summary": "Indian Premier League franchises have requested the Finance Ministry to reduce the GST on match tickets from 40% to 18%. The teams argue that cricket should be treated as a sporting event rather than entertainment. A lower tax rate would bring match levies in line with international fixtures and could improve the financial viability of franchises and venue affordability.", "category": "Economy", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121044", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_21-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121044"}], "article_id": "c56e9350"}, {"headline": "Bain Capital Leads Race to Acquire UK-based Nutraceutical Giant Vitabiotics", "summary": "Bain Capital has emerged as the frontrunner to acquire UK-based Vitabiotics for an estimated 900 million pounds. The deal would expand Bain's presence in the growing global health and wellness sector. Other contenders like TPG Capital and EQT are believed to have withdrawn from the bidding process as the company looks to leverage India as a key manufacturing and export market.", "category": "Business", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121044", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_21-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121044"}], "article_id": "5806cbb3"}, {"headline": "Telcos Plan Small Tariff Hikes Before Significant Increases Post-General Elections", "summary": "Bharti Airtel and Vodafone Idea have implemented minor price hikes of 5-10% on select prepaid packs. Industry analysts view these moves as a strategy to test market reactions before implementing more substantial tariff increases expected after the 2024 general elections. Reliance Jio has not yet announced similar changes, but a broader industry-wide hike is anticipated by mid-year.", "category": "Business", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121044", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_21-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121044"}], "article_id": "9e4719fe"}, {"headline": "UAE Hotels Utilize War Lull to Accelerate Luxury Property Renovations", "summary": "Major luxury hotels in Dubai, including the Burj Al Arab and Atlantis The Palm, are using a slowdown in travel caused by regional tensions to accelerate major renovation projects. At least seven premium properties have announced temporary closures or partial suspensions of services to upgrade facilities and security, anticipating a recovery in international tourism later this year.", "category": "Business", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121044", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_21-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121044"}], "article_id": "bff23a84"}, {"headline": "Manipur Shutdowns Persist as Authorities Order Action Against Absent Employees", "summary": "Normal life remains affected in Manipur's valley districts due to ongoing shutdowns called by local groups. The state government has directed heads of departments to take strict action against employees who remain absent from work without authorized leave during the strike. Security forces have been deployed in large numbers to maintain law and order across the state.", "category": "India", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121044", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_21-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/121044"}], "article_id": "6e7a2b91"}, {"headline": "Heavy Rain Inundates Guwahati Leaving One Dead and Homes Flooded", "summary": "At least one person died and several homes were flooded following heavy overnight rain in Guwahati. The downpour caused severe waterlogging in several parts of the city, paralyzing traffic and disrupting essential services. Local authorities have launched relief operations and issued warnings to residents in low-lying areas as more rain is predicted in the next 24 hours.", "category": "Environment", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121044", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_21-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/121044"}], "article_id": "f0e1b0d0"}, {"headline": "Congress Urges All-Party Meeting for Women’s Reservation Bill in Monsoon Session", "summary": "The Congress party has demanded that the government convene an all-party meeting on April 29 to discuss the implementation of the women's reservation law. The party wants the law, which mandates a 33% quota for women in the Lok Sabha and state assemblies, to be discussed and cleared during the upcoming monsoon session of Parliament to ensure its timely execution.", "category": "Politics", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121044", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_21-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/121044"}], "article_id": "5e82bac3"}, {"headline": "Karnataka Distillers Seek Review of Proposed Alcohol Excise Duty Structure", "summary": "Alcoholic beverage manufacturers in Karnataka have requested a review of the state's proposed new excise duty structure. The industry fears that the proposed high fees and levies, modeled after European systems, could negatively impact sales and production. Distillers met with Chief Minister Siddaramaiah to present their concerns and suggest modifications to the tax plan.", "category": "Economy", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121044", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_21-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121044"}], "article_id": "d95d4ef7"}, {"headline": "Supreme Court Seeks Report on Functioning of West Bengal Tribunals", "summary": "The Supreme Court has directed the Chief Justice of the Calcutta High Court to submit a report on the functioning of appellate tribunals in West Bengal. The order follows a petition alleging that the tribunals are not effectively hearing appeals related to the special intensive revision of electoral rolls. The court aims to ensure that citizens' rights to appeal are not compromised.", "category": "Law", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121044", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_21-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121044"}], "article_id": "378935f7"}, {"headline": "Jobs and Welfare Schemes Dominate Election Narrative in West Bengal's Purulia", "summary": "In the Purulia Lok Sabha constituency, unemployment, migration, and state welfare schemes have emerged as the primary election issues. While the BJP highlights its focus on infrastructure and central schemes, the Trinamool Congress is banking on its state-level social security programs to win over voters. Local issues like water scarcity and industrial stagnation also remain critical.", "category": "Politics", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121044", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_21-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121044"}], "article_id": "348253b4"}, {"headline": "Tamil Nadu Firecracker Unit Explosion Death Toll Rises to 11", "summary": "The death toll from an explosion at a firecracker manufacturing unit in Tamil Nadu's Virudhunagar district has increased to 11. Several others remain hospitalized with severe burn injuries. Local authorities have ordered a thorough investigation into the cause of the blast and are checking for safety violations at the facility. Compensation for the victims' families has been announced.", "category": "India", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121044", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_21-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121044"}], "article_id": "27d1a22e"}, {"headline": "ECI Identifies 8000 Sensitive Polling Booths in West Bengal for Phase 1", "summary": "The Election Commission of India has identified over 8,000 polling booths in West Bengal as 'super sensitive' for the first phase of the general elections. Extra security measures, including the deployment of central paramilitary forces, will be implemented to ensure peaceful voting. The Commission is closely monitoring areas with a history of electoral violence and malpractice.", "category": "Politics", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121044", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_21-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121044"}], "article_id": "6b77dec5"}, {"headline": "Rural Development Ministry Reviews Key Schemes Including MGNREGS and Rural Housing", "summary": "The Ministry of Rural Development is reviewing its flagship programs, including the MGNREGS and Pradhan Mantri Awas Yojana-Gramin. The review aims to assess the impact of regional conflicts on supply chains and project timelines. The government is focusing on ensuring steady funding and timely completion of projects to support rural livelihoods amid global economic uncertainties.", "category": "Economy", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121044", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_21-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/121044"}], "article_id": "b2de15e2"}, {"headline": "Niti Aayog Expresses Concern Over Widening CAD Amid Middle East Conflict", "summary": "Niti Aayog Vice-Chairman Suman Bery has raised concerns about India's widening current account deficit (CAD) due to the ongoing conflict in the Middle East. Rising energy prices and potential trade disruptions are exerting pressure on the rupee and inflation. The government is monitoring the situation closely and considering measures to diversify trade and strengthen the external sector.", "category": "Economy", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121044", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_21-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/121044"}], "article_id": "47e1f6a5"}, {"headline": "India Inc Maintains Leadership Hiring Momentum Despite Global Geopolitical Uncertainties", "summary": "Hiring for senior leadership positions in Indian companies remains steady, according to industry reports. While some firms in sectors like technology and finance have seen a slight pullback due to global geopolitical tensions, industrial and manufacturing companies continue to hire aggressively. Domestic consumption growth is cited as a key driver for sustained executive recruitment.", "category": "Business", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121044", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_21-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/121044"}], "article_id": "e182de46"}, {"headline": "Maharashtra Considers Fertiliser Rationing for Farmers Due to Erratic Monsoon Forecasts", "summary": "The Maharashtra government is considering a plan to ration fertiliser for farmers in the upcoming Kharif season. The move is a precautionary measure against potential shortages caused by erratic monsoon forecasts and global supply chain issues. Agriculture officials are using digital data to estimate local needs and prevent hoarding, aiming to ensure fair distribution of supplies.", "category": "Economy", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121044", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_21-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/121044"}], "article_id": "049e3b26"}, {"headline": "HPCL Refinery Fire in Rajasthan Delays Prime Minister’s Scheduled Inauguration", "summary": "A fire at an HPCL refinery in Rajasthan has led to the postponement of its planned inauguration by Prime Minister Narendra Modi. The blaze, which broke out in the refinery's distillation unit, was brought under control within hours, and no casualties were reported. An investigation into the cause of the fire is underway, and the new inauguration date will be announced soon.", "category": "Infrastructure", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121044", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_21-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/121044"}], "article_id": "af71a784"}, {"headline": "Significant Talent Gap Hinders Growth of AI GCCs in India", "summary": "A report by Quess Corp highlights a 40% talent gap in India's Global Capability Centres (GCCs) specializing in artificial intelligence. The shortage of skilled professionals in areas like machine learning, data science, and cloud computing is slowing the expansion plans of several multinational firms. Industry experts call for urgent reforms in education and vocational training to address the gap.", "category": "Technology", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121044", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_21-04-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/121044"}], "article_id": "6554f142"}, {"headline": "Elon Musk Summoned by Paris Prosecutors in Ongoing X Platform Investigation", "summary": "Parisian prosecutors have summoned billionaire Elon Musk for questioning as part of an investigation into the X platform's compliance with French laws on data privacy and content moderation. The probe follows allegations that the platform failed to take adequate measures against illegal content and misinformation. Musk's legal team is expected to represent him at the hearing next month.", "category": "Business", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121044", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_21-04-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/121044"}], "article_id": "78f2a564"}, {"headline": "Google Develops Custom AI Chips to Compete with Market Leader Nvidia", "summary": "Google is reportedly developing its own custom chips designed specifically for artificial intelligence tasks as it seeks to reduce its reliance on Nvidia. The new chips are expected to power Google's data centers and improve the performance of its AI-driven services. The move highlights the intensifying competition in the semiconductor market as tech giants race to build AI infrastructure.", "category": "Technology", "page": 8, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121044", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_21-04-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/121044"}], "article_id": "f5da6bad"}, {"headline": "RBI Governor Vows Agility to Protect Economy from Global Supply Shocks", "summary": "Reserve Bank of India Governor Shaktikanta Das stated that the central bank will remain agile and take necessary actions to protect the Indian economy from the impact of global supply shocks. Speaking at an event, Das emphasized that while India's macroeconomic fundamentals remain strong, the central bank is prepared to manage any volatility in the financial markets and ensure price stability.", "category": "Economy", "page": 9, "importance": 9, "telegram_url": "https://t.me/c/1877410077/121044", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_21-04-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/121044"}], "article_id": "34ec3754"}, {"headline": "SFIO Summons Auditors of IndusInd Bank for Investigation into Alleged Irregularities", "summary": "The Serious Fraud Investigation Office (SFIO) has summoned the auditors of IndusInd Bank as part of a probe into suspected financial irregularities. The investigation is reportedly focused on certain loans and transactions that may have violated corporate governance standards. The bank has stated that it is cooperating with the authorities and maintains that its operations follow all regulations.", "category": "Business", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121044", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_21-04-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/121044"}], "article_id": "a2187648"}, {"headline": "Gold ETF Inflows Surge 4.5 Times to Record 68,867 Crore", "summary": "Net inflows into gold exchange-traded funds (ETFs) in India jumped 4.5 times to reach a record 68,867 crore in the last financial year. The surge is attributed to rising global gold prices and increased investor demand for safe-haven assets amid geopolitical uncertainties. Gold ETFs have significantly increased their share in the overall mutual fund industry, reflecting a shift in investor preference.", "category": "Economy", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121044", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_21-04-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/121044"}], "article_id": "658dd375"}, {"headline": "Tata Neu Revamps Strategy to Focus on Loyalty and Financial Services", "summary": "Tata Neu, the super-app from the Tata Group, is revamping its business strategy to focus more on customer loyalty programs and financial services. The app will prioritize high-frequency categories like grocery and pharmacy while integrating more banking and insurance products. The move aims to increase user engagement and drive sustainable growth for the platform in a competitive market.", "category": "Business", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121044", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_21-04-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/121044"}], "article_id": "78bc3770"}, {"headline": "Toxic Metals Found in Silver Offerings at Vaishno Devi Shrine", "summary": "An investigation has revealed the presence of toxic metals, including lead and cadmium, in silver coins and ornaments offered by devotees at the Vaishno Devi shrine. The adulteration was discovered during a routine quality check by the shrine board. Authorities have seized a significant amount of contaminated silver and are investigating the suppliers to ensure the safety of devotees.", "category": "Health", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121044", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_21-04-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/121044"}], "article_id": "4ffcb4f0"}, {"headline": "Experts Explore Nuclear Power as Geopolitical Moat for AI Infrastructure", "summary": "Industry experts and researchers are exploring the potential of nuclear power to provide stable and carbon-neutral energy for large-scale artificial intelligence infrastructure. Small modular reactors are being considered as a viable option to meet the growing energy demands of AI data centers. The development could strengthen India's technological self-reliance and geopolitical position.", "category": "Science", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121044", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_21-04-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/121044"}], "article_id": "f79772c8"}, {"headline": "OpenAI Faces Leadership Shakeup as Senior Executives Depart the Company", "summary": "Artificial intelligence startup OpenAI has seen the departure of several senior executives, including its chief operating officer and head of product. The shakeup comes amid reports of internal disagreements over the company's future direction and speed of commercialization. Despite the exits, OpenAI remains a dominant player in the AI market and continues to attract significant investment.", "category": "Technology", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/121044", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_21-04-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/121044"}], "article_id": "c09bd88d"}, {"headline": "Drug Regulator Transfers 95 Officials in Routine Reshuffle Across India", "summary": "The Central Drugs Standard Control Organisation has transferred 95 officials in a routine nationwide reshuffle. The move is intended to prevent the development of vested interests and improve the efficiency of drug regulation in the country. The transfers include senior drug inspectors and administrative staff at various regional offices, part of a periodic administrative exercise.", "category": "Health", "page": 13, "importance": 6, "telegram_url": "https://t.me/c/1877410077/121044", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_21-04-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/121044"}], "article_id": "6c049f13"}, {"headline": "Iran and Pakistan Discuss Ceasefire as US Team Heads to Islamabad", "summary": "Iran and Pakistan have initiated talks to establish a ceasefire following recent border tensions. A high-level US delegation is also traveling to Islamabad to participate in the discussions and facilitate a peaceful resolution. The talks aim to de-escalate the situation and address security concerns on both sides of the border, which have impacted regional trade and stability.", "category": "World", "page": 16, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121044", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_21-04-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/121044"}], "article_id": "0ca3abcc"}, {"headline": "Israel Foils Alleged Iranian Plot to Sabotage Pipeline in Azerbaijan", "summary": "Israeli intelligence agencies have reportedly foiled an Iranian-backed plot to sabotage a key oil pipeline in Azerbaijan. The operation, which involved the seizure of explosives and the arrest of several suspects, was carried out in coordination with local authorities. The incident highlights the ongoing shadow war between the two nations and the high risk of attacks on energy infrastructure.", "category": "World", "page": 16, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121044", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_21-04-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/121044"}], "article_id": "2d64b295"}, {"headline": "World Athletics Designates India as Extremely High Risk for Doping", "summary": "World Athletics has designated India as an 'extremely high risk' country for doping, following a high number of anti-doping rule violations by Indian athletes. The designation will lead to more stringent testing protocols and increased monitoring of Indian sports persons at international events. Indian sports authorities have vowed to implement stricter measures to curb the menace of doping.", "category": "Sports", "page": 17, "importance": 8, "telegram_url": "https://t.me/c/1877410077/121044", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_21-04-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/121044"}], "article_id": "1fc31c07"}, {"headline": "Fire breaks out at HPCL Rajasthan refinery ahead of PM inauguration", "summary": "A fire erupted near the crude distillation unit of HPCL's Pachpadra refinery in Rajasthan's Balotra district. The blaze was controlled within two hours with no casualties reported. Consequently, the scheduled inauguration by Prime Minister Narendra Modi has been postponed. Authorities have ordered a probe into the incident, while the Congress party alleged safety lapses in project execution.", "category": "Infrastructure", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 21-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121073"}, {"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 21-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121011"}], "importance": 8, "article_id": "d870314a"}, {"headline": "At least 21 killed in Udhampur bus accident", "summary": "A private bus carrying 63 passengers fell 100 feet down a hill in Jammu and Kashmir's Udhampur district before hitting an auto-rickshaw. At least 21 people were killed and 57 injured. Most victims were daily commuters, students, and office-goers. PM Modi and CM Omar Abdullah announced ex-gratia of ₹2 lakh for the families of the deceased.", "category": "India", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 21-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/121073"}, {"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 21-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/121031"}], "importance": 10, "article_id": "6761633a"}, {"headline": "Reliance and Essar emerge as top bidders for CBM blocks", "summary": "Reliance Industries and Essar Group led the bidding for 16 coal-bed methane (CBM) blocks across two consecutive
