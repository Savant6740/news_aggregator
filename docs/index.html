<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Inter', -apple-system, sans-serif;
  background: #0c0c0c; color: #fff; touch-action: none;
}
.outer { position: fixed; inset: 0; overflow: hidden; }
.h-track { display: flex; height: 100%; will-change: transform; }
.cat-panel { flex-shrink:0; width:100vw; height:100%; display:flex; flex-direction:column; overflow:hidden; }
.progress-row { flex-shrink:0; display:flex; gap:4px; padding:14px 16px 10px; background:#0c0c0c; position:relative; z-index:5; overflow:visible; }
.progress-row::after { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:80%; height:120px; background:radial-gradient(ellipse at top,color-mix(in srgb,var(--cc) 30%,transparent) 0%,transparent 70%); pointer-events:none; z-index:-1; }
.pseg { flex:1; height:2px; border-radius:1px; background:rgba(255,255,255,0.12); position:relative; overflow:hidden; }
.pseg::after { content:''; position:absolute; inset:0; background:var(--cc,#e8334a); transform:scaleX(0); transform-origin:left; transition:transform 0.25s ease; }
.pseg.done::after, .pseg.active::after { transform:scaleX(1); }
.v-feed { flex:1; overflow:hidden; position:relative; clip-path:inset(0); }
.v-track { display:flex; flex-direction:column; will-change:transform; }
.card { 
  width:100%; flex-shrink:0; background:#0c0c0c; display:flex; flex-direction:column; 
  overflow:hidden; position:relative; 
  scroll-margin-top: 80px;
}
.card.target-highlight {
  background: linear-gradient(135deg, #fff3cd22 0%, #ffeaa722 100%) !important;
  box-shadow: 0 0 30px rgba(255, 193, 7, 0.4);
  border: 2px solid #f39c12;
  animation: pulse-highlight 2s ease-in-out;
}
@keyframes pulse-highlight {
  0%, 100% { box-shadow: 0 0 30px rgba(255, 193, 7, 0.4); }
  50% { box-shadow: 0 0 50px rgba(255, 193, 7, 0.6); }
}
.card-content { flex:1; display:flex; flex-direction:column; padding:36px 20px 22px; min-height:0; position:relative; z-index:1; }
.card-toprow { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; flex-shrink:0; }
.cat-pill { display:inline-flex; align-items:center; gap:7px; background:#1c1c1e; border-radius:8px; padding:7px 12px 7px 10px; font-size:11.5px; font-weight:700; letter-spacing:0.07em; color:#d0d0d0; text-transform:uppercase; line-height:1; }
.pill-icon { width:16px; height:16px; background:#2e2e30; border-radius:3px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.pill-icon svg { display:block; }
.card-date { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:500; color:#666; letter-spacing:0.01em; }
.card-headline { font-size:28px; font-weight:800; line-height:1.18; color:#fff; letter-spacing:-0.03em; margin-bottom:20px; flex-shrink:0; }
.card-summary { font-size:15.5px; font-weight:400; line-height:1.62; color:#6b6b6b; flex:1; overflow:hidden; display:-webkit-box; -webkit-line-clamp:7; -webkit-box-orient:vertical; }
.card-divider { height:1px; background:#1e1e1e; margin:20px 0 16px; flex-shrink:0; }
.card-footer { display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.src-chip { display:inline-flex; align-items:center; gap:6px; background:#181818; border:1px solid #282828; border-radius:9px; padding:8px 13px; font-size:12.5px; font-weight:600; color:#c0c0c0; text-decoration:none; letter-spacing:0.005em; line-height:1; }
.src-chip-sep { color:#3a3a3a; font-weight:400; }
.src-chip-pg { color:#555; font-weight:500; }
.src-chip-ext { margin-left:2px; }
.src-chip-ext svg { display:block; }
.info-btn { width:36px; height:36px; border-radius:50%; border:1.5px solid #252525; background:#141414; display:flex; align-items:center; justify-content:center; color:#555; cursor:pointer; flex-shrink:0; }
.cat-flash { position:fixed; inset:0; z-index:600; pointer-events:none; opacity:0; transition:opacity 0.12s; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; }
.cat-flash.on { opacity:1; }
.cf-icon { font-size:34px; }
.cf-name { font-size:22px; font-weight:900; letter-spacing:-0.03em; text-transform:uppercase; }
.hint { position:fixed; display:flex; flex-direction:column; align-items:center; gap:5px; pointer-events:none; z-index:400; opacity:0; transition:opacity 0.6s ease; }
.hint.visible { opacity:1; }
.hint.gone { opacity:0 !important; transition:opacity 0.4s; }
.hint-pill { font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.55); background:rgba(255,255,255,0.07); backdrop-filter:blur(10px); padding:5px 13px; border-radius:100px; border:1px solid rgba(255,255,255,0.09); }
.hint-arr { font-size:16px; color:rgba(255,255,255,0.4); }
.h-up { bottom:28px; left:50%; transform:translateX(-50%); animation:bUp 2s ease-in-out infinite; }
.h-right { top:50%; right:14px; transform:translateY(-50%); animation:bRight 2s ease-in-out infinite 0.6s; }
@keyframes bUp { 0%,100% { bottom:28px; opacity:.65; } 50% { bottom:36px; opacity:1; } }
@keyframes bRight { 0%,100% { right:14px; opacity:.65; } 50% { right:6px; opacity:1; } }

tivities during peak afternoon hours to prevent heatstroke and related health risks.", "category": "Environment", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/122733", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 06-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122733"}], "article_id": "7087ada2"}, {"headline": "Spain, Norway, and Ireland announce formal recognition of a Palestinian state", "summary": "In a coordinated move, Norway, Ireland, and Spain announced they will formally recognize a Palestinian state on May 28. Leaders stated the move aims to revive the two-state solution for peace in the Middle East. Israel responded by immediately recalling its ambassadors from the three nations, calling the decision a reward for terrorism following the October 7 attacks by Hamas.", "category": "World", "page": 12, "importance": 10, "telegram_url": "https://t.me/c/1877410077/122733", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 06-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/122733"}], "article_id": "52d6e129"}, {"headline": "Rajasthan Royals beat RCB in Eliminator to reach IPL 2024 Qualifier 2", "summary": "Rajasthan Royals ended Royal Challengers Bengaluru’s six-match winning streak with a four-wicket victory in the IPL 2024 Eliminator at Ahmedabad. Chasing 173, RR reached the target with an over to spare despite late pressure. Virat Kohli crossed 8,000 runs in IPL history during the match. RR will now face Sunrisers Hyderabad for a spot in the final scheduled for Sunday.", "category": "Sports", "page": 16, "importance": 8, "telegram_url": "https://t.me/c/1877410077/122733", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 06-05-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/122733"}], "article_id": "702ca9fa"}, {"headline": "Election Commission transfers senior officials in Andhra Pradesh and Odisha", "summary": "The Election Commission of India directed the immediate transfer of several senior police and administrative officers in Andhra Pradesh and Odisha ahead of the final voting phases. The move follows reports of election-related violence and complaints of administrative bias. The EC emphasized the need for a neutral environment to ensure a free and fair polling process in sensitive districts.", "category": "Politics", "page": 5, "importance": 8, "telegram_url": "https://t.me/c/1877410077/122733", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 06-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/122733"}], "article_id": "df37ae94"}, {"headline": "India and Iran sign 10-year contract for Chabahar Port operations", "summary": "India and Iran have signed a long-term agreement for the management of the Shahid Beheshti terminal at Chabahar Port. The deal ensures 10 years of Indian operations at the strategic port, facilitating trade with Central Asia while bypassing Pakistan. India has committed to a 120 million dollar investment for equipment and a 250 million dollar credit window for further infrastructure projects.", "category": "Infrastructure", "page": 9, "importance": 8, "telegram_url": "https://t.me/c/1877410077/122733", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 06-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/122733"}], "article_id": "a5e55de7"}, {"headline": "SEBI proposes relaxed listing norms to encourage startups on Indian exchanges", "summary": "The Securities and Exchange Board of India released a consultation paper suggesting relaxed regulations for new-age technology companies listing on the Main Board. Proposals include reducing the minimum holding period for pre-issue capital and easing disclosure requirements. The goal is to boost the domestic startup ecosystem and prevent companies from seeking listings in overseas markets.", "category": "Business", "page": 13, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122733", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 06-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/122733"}], "article_id": "21dfd035"}, {"headline": "Global tech giants expand semiconductor research and development centers in India", "summary": "Major global semiconductor firms are increasing their footprint in India through new R&D facilities in Bengaluru and Hyderabad. The expansion follows government incentives under the India Semiconductor Mission. These centers will focus on advanced chip design and manufacturing processes, aiming to integrate India into the global supply chain and reduce long-term reliance on technology imports.", "category": "Technology", "page": 14, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122733", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 06-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/122733"}], "article_id": "90b1a703"}, {"headline": "New study links extreme air pollution to rising cardiovascular cases in Delhi", "summary": "A multi-city study led by Indian researchers found a significant correlation between long-term exposure to PM2.5 pollutants and increased heart disease risk. The data shows that even a small increase in average pollution levels leads to higher rates of hypertension and cardiac arrest. Researchers emphasized that urban air quality interventions are critical to reducing non-communicable diseases.", "category": "Health", "page": 15, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122733", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 06-05-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/122733"}], "article_id": "e4336d32"}, {"headline": "UGC allows students with four-year degrees to sit for NET directly", "summary": "The University Grants Commission announced that students completing a four-year undergraduate program can now directly appear for the National Eligibility Test (NET). Previously, a Master’s degree was mandatory. This change aligns with the National Education Policy 2020, allowing high-performing students to pursue PhD programs earlier and streamlining the path into higher education research.", "category": "Education", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122733", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 06-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122733"}], "article_id": "c786b382"}, {"headline": "AI trims international flights in May as rising ATF costs bite", "summary": "Air India reduced international flight frequencies in May, particularly to N. America, Europe, and S-E Asia, due to rising jet fuel costs, currency exchange rates, and airspace closures caused by geopolitical disruptions in West Asia. IndiGo maintains capacity.", "category": "Business", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "c971e09c"}, {"headline": "Cabinet approves ₹2.55 lakh crore credit support for MSMEs, airlines", "summary": "Union Cabinet approved the 5th edition of ECLGS with ₹2.55 lakh crore credit support, including ₹5,000 crore for airlines. MSMEs get up to 20% of Q4 working capital, airlines 100% up to ₹1,500 crore. Loans sanctioned until March 2027 eligible, with capped interest rates for MSMEs.", "category": "Economy", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/122762", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 06~05~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122762"}], "article_id": "b9acfadf"}, {"headline": "M&M Q4 profit surges 42% on strong SUV, EV demand", "summary": "M
