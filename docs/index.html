<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Inter', -apple-system, sans-serif;
  background: #0c0c0c; color: #fff; touch-action: none;
}
.outer { position: fixed; inset: 0; overflow: hidden; }
.h-track { display: flex; height: 100%; will-change: transform; }
.cat-panel { flex-shrink:0; width:100vw; height:100%; display:flex; flex-direction:column; overflow:hidden; }
.progress-row { flex-shrink:0; display:flex; gap:4px; padding:14px 16px 10px; background:#0c0c0c; position:relative; z-index:5; overflow:visible; }
.progress-row::after { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:80%; height:120px; background:radial-gradient(ellipse at top,color-mix(in srgb,var(--cc) 30%,transparent) 0%,transparent 70%); pointer-events:none; z-index:-1; }
.pseg { flex:1; height:2px; border-radius:1px; background:rgba(255,255,255,0.12); position:relative; overflow:hidden; }
.pseg::after { content:''; position:absolute; inset:0; background:var(--cc,#e8334a); transform:scaleX(0); transform-origin:left; transition:transform 0.25s ease; }
.pseg.done::after, .pseg.active::after { transform:scaleX(1); }
.v-feed { flex:1; overflow:hidden; position:relative; clip-path:inset(0); }
.v-track { display:flex; flex-direction:column; will-change:transform; }
.card { 
  width:100%; flex-shrink:0; background:#0c0c0c; display:flex; flex-direction:column; 
  overflow:hidden; position:relative; 
  scroll-margin-top: 80px;
}
.card.target-highlight {
  background: linear-gradient(135deg, #fff3cd22 0%, #ffeaa722 100%) !important;
  box-shadow: 0 0 30px rgba(255, 193, 7, 0.4);
  border: 2px solid #f39c12;
  animation: pulse-highlight 2s ease-in-out;
}
@keyframes pulse-highlight {
  0%, 100% { box-shadow: 0 0 30px rgba(255, 193, 7, 0.4); }
  50% { box-shadow: 0 0 50px rgba(255, 193, 7, 0.6); }
}
.card-content { flex:1; display:flex; flex-direction:column; padding:36px 20px 22px; min-height:0; position:relative; z-index:1; }
.card-toprow { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; flex-shrink:0; }
.cat-pill { display:inline-flex; align-items:center; gap:7px; background:#1c1c1e; border-radius:8px; padding:7px 12px 7px 10px; font-size:11.5px; font-weight:700; letter-spacing:0.07em; color:#d0d0d0; text-transform:uppercase; line-height:1; }
.pill-icon { width:16px; height:16px; background:#2e2e30; border-radius:3px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.pill-icon svg { display:block; }
.card-date { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:500; color:#666; letter-spacing:0.01em; }
.card-headline { font-size:28px; font-weight:800; line-height:1.18; color:#fff; letter-spacing:-0.03em; margin-bottom:20px; flex-shrink:0; }
.card-summary { font-size:15.5px; font-weight:400; line-height:1.62; color:#6b6b6b; flex:1; overflow:hidden; display:-webkit-box; -webkit-line-clamp:7; -webkit-box-orient:vertical; }
.card-divider { height:1px; background:#1e1e1e; margin:20px 0 16px; flex-shrink:0; }
.card-footer { display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.src-chip { display:inline-flex; align-items:center; gap:6px; background:#181818; border:1px solid #282828; border-radius:9px; padding:8px 13px; font-size:12.5px; font-weight:600; color:#c0c0c0; text-decoration:none; letter-spacing:0.005em; line-height:1; }
.src-chip-sep { color:#3a3a3a; font-weight:400; }
.src-chip-pg { color:#555; font-weight:500; }
.src-chip-ext { margin-left:2px; }
.src-chip-ext svg { display:block; }
.info-btn { width:36px; height:36px; border-radius:50%; border:1.5px solid #252525; background:#141414; display:flex; align-items:center; justify-content:center; color:#555; cursor:pointer; flex-shrink:0; }
.cat-flash { position:fixed; inset:0; z-index:600; pointer-events:none; opacity:0; transition:opacity 0.12s; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; }
.cat-flash.on { opacity:1; }
.cf-icon { font-size:34px; }
.cf-name { font-size:22px; font-weight:900; letter-spacing:-0.03em; text-transform:uppercase; }
.hint { position:fixed; display:flex; flex-direction:column; align-items:center; gap:5px; pointer-events:none; z-index:400; opacity:0; transition:opacity 0.6s ease; }
.hint.visible { opacity:1; }
.hint.gone { opacity:0 !important; transition:opacity 0.4s; }
.hint-pill { font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.55); background:rgba(255,255,255,0.07); backdrop-filter:blur(10px); padding:5px 13px; border-radius:100px; border:1px solid rgba(255,255,255,0.09); }
.hint-arr { font-size:16px; color:rgba(255,255,255,0.4); }
.h-up { bottom:28px; left:50%; transform:translateX(-50%); animation:bUp 2s ease-in-out infinite; }
.h-right { top:50%; right:14px; transform:translateY(-50%); animation:bRight 2s ease-in-out infinite 0.6s; }
@keyframes bUp { 0%,100% { bottom:28px; opacity:.65; } 50% { bottom:36px; opacity:1; } }
@keyframes bRight { 0%,100% { right:14px; opacity:.65; } 50% { right:6px; opacity:1; } }

const DIGEST   = {"date": "27 May 2026", "articles": [{"headline": "Quad announces energy initiative and Fiji port project", "summary": "Foreign ministers of the Quad (India, US, Japan, Australia) met in New Delhi to launch initiatives for the Indo-Pacific. Key projects include a clean energy supply chain initiative and a port construction project in Fiji. The group aims to bolster regional infrastructure, maritime surveillance, and resilience in critical minerals while countering regional dominance.", "category": "Politics", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/125088", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁷⁰⁵²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125088"}], "article_id": "02eab06e"}, {"headline": "SC seeks MP government reply on Chambal illegal mining", "summary": "The Supreme Court has taken note of a Hindustan Times report regarding large-scale illegal sand mining in the National Chambal Gharial Sanctuary. The court directed the Madhya Pradesh government to explain why such activities persist despite previous bans. Authorities have been asked to provide an effective monitoring plan using GPS and drones.", "category": "Environment", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125088", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁷⁰⁵²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125088"}], "article_id": "03578998"}, {"headline": "CBSE ignored calls for wider trials of on-screen marking", "summary": "The CBSE reportedly bypassed its own board's advice to conduct wider pilot projects before rolling out its online screen marking system for Class 10 and 12 exams. Records show a two-day trial with only 100 teachers preceded the full rollout. Critics argue this led to technical glitches, unreadable scanned copies, and errors in student marking.", "category": "Education", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125088", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁷⁰⁵²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125088"}], "article_id": "321b367d"}, {"headline": "SC to deliver verdict on Bihar SIR exercise challenge", "summary": "The Supreme Court is set to deliver its verdict on the validity of the Special Intensive Revision (SIR) conducted by the Election Commission in Bihar. The exercise, which aimed to purge undocumented and ineligible voters from the rolls, was challenged over concerns regarding the mass exclusion of genuine voters without proper verification.", "category": "Law", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125088", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁷⁰⁵²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125088"}], "article_id": "cb241725"}, {"headline": "AAIB to release interim report on Air India crash", "summary": "The Aircraft Accident Investigation Bureau (AAIB) is preparing to release an interim report on the Air India Express flight crash in Kozhikode ahead of its anniversary. The report will provide preliminary findings on the cause of the accident, which claimed 21 lives. A final report is expected to take longer as officials coordinate with international agencies.", "category": "Infrastructure", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125088", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁷⁰⁵²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125088"}], "article_id": "c097a42b"}, {"headline": "Dera chief Gurmeet Ram Rahim gets 16th parole", "summary": "Dera Sacha Sauda chief Gurmeet Ram Rahim Singh, serving a 20-year sentence for rape, has been granted a 30-day parole. This marks the 16th time he has been released from jail in nine years. The frequent paroles have frequently sparked controversy and criticism from political rivals and social activists regarding legal leniency.", "category": "Law", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125088", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁷⁰⁵²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125088"}], "article_id": "edc4f5d2"}, {"headline": "Ferrari unveils its first all-electric supercar", "summary": "Ferrari has launched the 'Luce', its first-ever fully electric vehicle, priced at 550,000 euros. The four-seater marks a significant shift for the luxury brand, featuring advanced aerodynamics and a range of 530km. The launch comes as high-end carmakers face pressure to transition to clean energy while maintaining high-performance standards.", "category": "Business", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125088", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁷⁰⁵²⁰²⁶.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125088"}], "article_id": "dbc1ed60"}, {"headline": "Migrants head to Bangladesh border amid Bengal crackdown", "summary": "Dozens of undocumented Bangladeshi migrants gathered at the border in West Bengal's North 24 Parganas district, seeking to return home following a crackdown by state authorities. The BSF has intensified patrols after the state government directed magistrates to set up holding centers for undocumented immigrants pending deportation.", "category": "India", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125088", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁷⁰⁵²⁰²⁶.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125088"}], "article_id": "09d453c9"}, {"headline": "Centre says state hate speech bill may be unnecessary", "summary": "The Union Home Ministry informed the Karnataka government that a separate state law to curb 'hate speech' might be redundant given existing provisions in the Bharatiya Nyaya Sanhita. The Centre suggested that enacting separate state legislation could lead to duplication and legal inconsistencies across the country.", "category": "Law", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125088", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁷⁰⁵²⁰²⁶.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125088"}], "article_id": "759b0e3e"}, {"headline": "Karnataka working toward AI-enabled governance model", "summary": "Karnataka IT-BT Secretary Shalini Rajneesh stated that the state is integrating Artificial Intelligence into public administration to improve efficiency. Speaking at an AI conference, she highlighted the state's vision to use AI for better service delivery, data-driven decision-making, and enhancing transparency across government departments.", "category": "Technology", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125088", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁷⁰⁵²⁰²⁶.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125088"}], "article_id": "df76822a"}, {"headline": "Madurai hill boundary survey begins after Madras HC order", "summary": "The Archaeological Survey of India (ASI) has commenced a survey of the boundary of Madurai's Thirupparankundram hill. The survey, ordered by the Madras High Court, aims to identify encroachments near the historic Subramanya Swamy Temple and surrounding ancient structures. Drones and GPS technology are being used to map the heritage zone.", "category": "Culture", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125088", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁷⁰⁵²⁰²⁶.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125088"}], "article_id": "84b9239b"}, {"headline": "Telangana DGP says 47 Maoists remain underground", "summary": "Telangana's Director General of Police stated that 47 Maoists from the state are still operating underground, despite a wave of recent surrenders. The police have urged the remaining members to join the mainstream under the government's surrender and rehabilitation policy, noting that over 800 Maoists have surrendered across the country since 2024.", "category": "India", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125088", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁷⁰⁵²⁰²⁶.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125088"}], "article_id": "d9f11b24"}, {"headline": "Five lions dead within 10 days in Gir sanctuary", "summary": "Five Asiatic lions, including two cubs, have died in Gujarat's Gir forest within a span of 10 days. While the state government has denied any disease outbreak, samples have been sent for forensic testing. Authorities suspect the deaths were caused by territorial infighting and natural causes, but monitoring has been intensified across the sanctuary.", "category": "Environment", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125088", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁷⁰⁵²⁰²⁶.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125088"}], "article_id": "2aac908c"}, {"headline": "Monsoon misses Kerala onset date says IMD", "summary": "The India Meteorological Department (IMD) reported that the southwest monsoon has missed its expected onset date in Kerala. While several stations recorded rainfall, the criteria for a formal onset declaration have not yet been met. Forecasters predict the monsoon will likely set over Kerala within the next 48 hours as weather conditions become more favorable.", "category": "Environment", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125088", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁷⁰⁵²⁰²⁶.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125088"}], "article_id": "10c61e36"}, {"headline": "Seven dead as bus overturns on Unnao expressway", "summary": "Seven people, including a police sub-inspector, were killed and 25 others injured when a double-decker bus overturned on the Agra-Lucknow Expressway in Unnao. The bus was traveling from Bihar to Delhi when the driver reportedly lost control. The injured have been shifted to local hospitals, and an investigation into the cause of the accident is underway.", "category": "India", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125088", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁷⁰⁵²⁰²⁶.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125088"}], "article_id": "8db82c34"}, {"headline": "Archaeology doyen Shereen Ratnagar passes away at 82", "summary": "Renowned archaeologist Shereen Ratnagar, known for her extensive work on the Indus Valley Civilization and its trade links with Mesopotamia, has died at the age of 82. A former professor at JNU, she was a vocal advocate for scientific rigor in archaeology and authored several influential books that shaped the understanding of ancient Indian history.", "category": "Culture", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125088", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁷⁰⁵²⁰²⁶.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125088"}], "article_id": "dcfb735e"}, {"headline": "Salmonella poisoning risk linked to climate change", "summary": "A new study published in The Lancet Planetary Health suggests a rising risk of salmonella poisoning due to climate change. Researchers found that higher temperatures and changing rainfall patterns facilitate the growth and spread of the bacteria. The study warns that antibiotic resistance in salmonella strains is also increasing under high-emission scenarios.", "category": "Health", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125088", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁷⁰⁵²⁰²⁶.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125088"}], "article_id": "0ec2732a"}, {"headline": "Israel expands ground operations in southern Lebanon", "summary": "The Israeli military has pushed further into southern Lebanon, clashing with Hezbollah militants. Official reports state that at least 12 people were killed in the latest strikes. Prime Minister Benjamin Netanyahu has authorized more intense raids, citing the need to secure Israel's northern border and dismantle Hezbollah's storage facilities and observation posts.", "category": "World", "page": 11, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125088", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁷⁰⁵²⁰²⁶.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125088"}], "article_id": "2fb2bc18"}, {"headline": "Alireza Firouzja defeats Magnus Carlsen in Norway Chess", "summary": "The 22-year-old Grandmaster Alireza Firouzja defeated World No. 1 Magnus Carlsen in a dramatic classical game at the Norway Chess tournament. The win places Firouzja at the top of the leaderboard, while Carlsen faces a setback in his home tournament. This victory is seen as a major statement by the younger generation of chess players.", "category": "Sports", "page": 14, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125088", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁷⁰⁵²⁰²⁶.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/125088"}], "article_id": "180872ff"}, {"headline": "Auto PLI Scheme Faces Increased Localization Scrutiny for EV Makers", "summary": "Testing agencies like ARAI and ICAT are seeking deeper localization details for the ₹25,938-crore auto PLI scheme. EV makers are concerned as they must now trace sourcing to tier-IV and tier-V suppliers for raw materials like chemicals and processed metals. Industry body SIAM is discussing potential representations to the government regarding these complex compliance requirements.", "category": "Business", "page": 5, "importance": 9, "telegram_url": "https://t.me/c/1877410077/125083", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_27-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125083"}], "article_id": "7899e8ac"}, {"headline": "Cognizant Financed $2 Billion Share Buyback Through Bank Credit Line", "summary": "Cognizant Technology Solutions is using a $1.85 billion revolving credit facility to fund a $2 billion share repurchase. This departure from the IT industry's standard practice of using cash reserves highlights the pressure to return capital to shareholders while maintaining funds for acquisitions. The move follows feedback from investors regarding the company's share valuation.", "category": "Business", "page": 5, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125083", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_27-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125083"}], "article_id": "8e39851a"}, {"headline": "Japanese Beauty Brands Gain Traction Among Young Indian Consumers", "summary": "Japanese beauty products, or J-beauty, are emerging as a major trend in India, challenging the dominance of K-beauty. Retailers like Myntra and Amazon report a surge in demand for minimalist, efficacy-led products focused on long-term skin health. Sales of Japanese sunscreens and hair masks have nearly tripled over the past year, driven by Gen Z shoppers and tier-two city demand.", "category": "Business", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125083", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_27-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125083"}], "article_id": "26c7cbfe"}, {"headline": "Third Wave Coffee Raising $100 Million in Round Led by Existing Backers", "summary": "Bengaluru-based café chain Third Wave Coffee is nearing an $80-100 million funding round led by WestBridge Capital and Creaegis. The deal, expected to close within weeks, involves both primary and secondary share sales. The internal round could value the firm at $400-500 million. Funds will be used for pan-India expansion and strengthening supply chain and technology capabilities.", "category": "Business", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125083", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_27-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125083"}], "article_id": "ec2a11bd"}, {"headline": "Supreme Court Allows RIL and Government Conciliation in Gas Dispute", "summary": "The Supreme Court has allowed a Reliance Industries-led consortium and the Union government to pursue conciliation in the 13-year-old KG-D6 gas migration dispute. The nearly $3-billion case involves allegations that Reliance extracted gas belonging to ONGC blocks. The court had previously declined the request but shifted its stance after hearing arguments on international arbitration.", "category": "Law", "page": 5, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125083", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_27-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125083"}], "article_id": "211f0bea"}, {"headline": "Serum Institute Partners With Oxford to Produce Bundibugyo Ebola Vaccine", "summary": "The Serum Institute of India has tied up with the University of Oxford and CEPI to manufacture a vaccine for the Bundibugyo strain of Ebola. Utilizing the ChAdOx1 viral-vector platform, SII aims to produce doses within a 20-30 day window to combat a growing outbreak in Central Africa. The WHO has reported over 900 suspected cases and 220 deaths in the Democratic Republic of the Congo.", "category": "Science", "page": 6, "importance": 9, "telegram_url": "https://t.me/c/1877410077/125083", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_27-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125083"}], "article_id": "f12be7a2"}, {"headline": "Government Plans ₹1,000 Crore Corpus to Boost Domestic Silk Output", "summary": "The textiles ministry is preparing a ₹1,000-crore plan to expand India’s silk economy and reduce reliance on imports. The initiative aims to increase raw silk output to 44,500 tonnes by FY27 and boost the incomes of nearly 10 million workers. The plan focuses on technology upgrades and quality improvement in cocoon cultivation and weaving to tap into strong global demand.", "category": "Economy", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125083", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_27-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125083"}], "article_id": "c5815d5a"}, {"headline": "India Develops Standard-Gauge Vande Bharat Trains for Global Export Markets", "summary": "The Indian Railways and RITES are designing a standard-gauge version of the Vande Bharat Express to target international markets. Most global railway networks use standard-gauge tracks, and potential interest has come from countries in Southeast Asia, Africa, and Latin America. The move aims to position India as a cost-competitive supplier of modern, high-speed rail products.", "category": "Infrastructure", "page": 6, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125083", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_27-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125083"}], "article_id": "52adb428"}, {"headline": "RBI and Rating Agencies Assess Potential Stress From US-Iran War", "summary": "The Reserve Bank of India has held discussions with local credit-rating agencies to evaluate the potential impact of the US-Iran conflict on borrowers. The consultations focus on identifying financial stress caused by rising oil prices and supply chain disruptions. Authorities aim to ensure they are prepared for economic fallout if the geopolitical situation in West Asia worsens.", "category": "Economy", "page": 6, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125083", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_27-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125083"}], "article_id": "04550dc1"}, {"headline": "CNG Prices in National Capital Hiked by ₹2 Per Kilogram", "summary": "Indraprastha Gas Ltd has raised compressed natural gas (CNG) prices in Delhi and surrounding cities by ₹2 per kg. This marks the fourth price increase in less than two weeks, driven by rising input costs. CNG now costs ₹83.09 per kilogram in the national capital.", "category": "Economy", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125083", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_27-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125083"}], "article_id": "6ae9f43e"}, {"headline": "Fintech Startups Race for GIFT City Licences to Lure NRI Investors", "summary": "Startups like Belong and Vested Finance are securing GIFT City licences to create investment platforms for non-resident Indians. Demand has surged from the Middle East, with inflows nearly doubling in March and April due to regional instability. Fintechs are offering dollar-denominated fixed deposits and access to Indian and US markets through a single regulated stack.", "category": "Business", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125083", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_27-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125083"}], "article_id": "9b1e8d7c"}, {"headline": "EU Planning Hefty Antitrust Fine for Google Over Search Dominance", "summary": "The European Union is reportedly preparing to impose a high triple-digit million euro fine on Google for breaching the Digital Markets Act. The investigation focuses on whether Google unfairly favors its own services in search results. The penalty, expected before the summer break, would be the largest since the new tech regulations took effect to curb the power of Big Tech.", "category": "World", "page": 7, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125083", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_27-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125083"}], "article_id": "0ba62163"}, {"headline": "KPI Green Energy Targets $1 Billion Raise via Renewable InvIT", "summary": "KPI Green Energy plans to launch an infrastructure investment trust (InvIT) backed by solar and wind assets. The trust targets an initial raise of $838 million to $1.05 billion. The launch is planned for the end of FY28 as the company looks to scale its green energy portfolio and attract institutional investors seeking long-term yields from renewable energy projects.", "category": "Business", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125083", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_27-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125083"}], "article_id": "9f6b5cc4"}, {"headline": "NTPC Green Energy Arm Powers Parent Company's Future Growth Prospects", "summary": "While NTPC's standalone thermal business shows flat growth, its green energy subsidiary is expected to triple capacity to 34 GW by FY29. NTPC Green's competitive bidding model and shorter project gestation periods are attracting ESG-focused investors. Analysts note that while thermal power remains a stable cash cow, the renewable arm is the primary driver for future valuation gains.", "category": "Business", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125083", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_27-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125083"}], "article_id": "fcef0000"}, {"headline": "STT Hike and Cooling Volatility Lead to Drop in Options Volume", "summary": "Average daily premium turnover for Nifty and Sensex index options fell 13% in May compared to March levels. The decline follows a 50% increase in the Securities Transaction Tax (STT) that took effect on 1 April. Additionally, a 15% drop in the India Vix 'fear gauge' has reduced trading activity as market participants respond to higher costs and lower volatility.", "category": "Economy", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125083", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_27-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125083"}], "article_id": "c2a4dc0c"}, {"headline": "Seafood Exporters Show Resilience Despite Red Sea and Hormuz Disruptions", "summary": "Indian seafood exporters like Apex Frozen Foods and Avanti Feeds have outperformed the market, as most shipments bypass the Gulf via the Malacca Strait. While rising fuel surcharges and logistics costs remain a risk, record exports of ₹72,325 crore in FY26 and strong demand from the US and China provide a cushion against geopolitical tensions in West Asia.", "category": "Business", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125083", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_27-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125083"}], "article_id": "bf482da6"}, {"headline": "US Forces Strike Iranian Missile Sites and Mine-Laying Boats", "summary": "US Central Command conducted 'self-defence' strikes against missile launch sites and boats in southern Iran, threatening a fragile ceasefire. The attacks occurred as negotiators arrived in Doha for peace talks. The escalation has caused oil price fluctuations and cast doubt on a potential deal to reopen the Strait of Hormuz, which remains blocked by an Iranian naval presence.", "category": "World", "page": 8, "importance": 10, "telegram_url": "https://t.me/c/1877410077/125083", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_27-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125083"}], "article_id": "1ee22cbd"}, {"headline": "Nine Anonymous Crypto Whales Effectively Control Polymarket Dispute Outcomes", "summary": "Analysis reveals that just nine anonymous cryptocurrency wallets control roughly half of the voting power on Polymarket’s dispute resolution mechanism. These 'whales' decide the winners of billions of dollars in wagers on global events by holding UMA tokens. Critics argue this concentration of power undermines the platform's claim to be a decentralized 'global truth machine.'", "category": "Technology", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125083", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_27-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125083"}], "article_id": "0c855e0b"}, {"headline": "Fertilizer Subsidy Bill May Surge to ₹3 Trillion Due to War", "summary": "India's fertilizer subsidy bill could nearly double from its ₹1.71 trillion budget allocation if West Asia disruptions persist. A sharp rise in global prices for urea and DAP is putting fiscal pressure on the government. Officials state that while current stocks of 20 million tonnes are sufficient, the cost of procurement through long-term agreements has escalated significantly.", "category": "Economy", "page": 9, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125083", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_27-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125083"}], "article_id": "2fb6f491"}, {"headline": "Rupee Plummets to 95.71 Per Dollar Amid Middle East Tensions", "summary": "The Indian rupee depreciated by 45 paise to end at a record low of 95.71 against the US dollar on Tuesday. Renewed geopolitical conflict in West Asia and rising crude oil prices pressured the currency. Despite interventions by the Reserve Bank of India to sell dollars, the rupee remained weak due to domestic market outflows and a strengthening American currency.", "category": "Economy", "page": 9, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125083", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_27-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125083"}], "article_id": "d545ced9"}, {"headline": "AI Training Gurus Charge Wall Street Banks $25,000 Per Day", "summary": "Former SoftBank fund managers are commanding high fees to train Wall Street bankers on generative AI tools. Their startup, Wall Street Prompt, runs sessions for firms like Citigroup and Bank of America, demonstrating how AI can analyze earnings calls and founder pitches. The service addresses a growing 'AI angst' as banks look to automate labor-intensive research and analysis roles.", "category": "Business", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125083", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_27-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/125083"}], "article_id": "ec1380c5"}, {"headline": "India’s Fertility Rate Drops to 1.9 Amid Regional Demographic Shift", "summary": "The 2024 Sample Registration System report shows India's total fertility rate has fallen to 1.9, below the replacement level of 2.1. While states like Bihar remain high at 2.9, urban centers like Delhi have dropped to 1.2. The rapid decline signals a future workforce contraction and an aging society, prompting calls for a national policy response to address the long-term economic impact.", "category": "India", "page": 12, "importance": 9, "telegram_url": "https://t.me/c/1877410077/125083", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_27-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/125083"}], "article_id": "7e284b68"}, {"headline": "Climate Change Threatens Corporate Productivity as Heat and Floods Intensify", "summary": "Extreme heat and flooding are increasingly impacting India’s workforce productivity, especially in construction, logistics, and manufacturing. Research shows a sharp drop in income and work hours for informal workers during heatwaves. Experts urge businesses to invest in heat-safe workplaces and flood-resilient logistics to ensure operational continuity in a changing climate.", "category": "Environment", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125083", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_27-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/125083"}], "article_id": "eaebefe2"}, {"headline": "The 'Whimsical Web' Rises as Users Rebel Against AI Slop", "summary": "A growing counter-culture of internet users is rejecting algorithm-driven feeds in favor of 'whimsical' websites that offer human-centric, quirky experiences. Movements like 'Your AI Slop Bores Me' highlight fatigue with machine-made content. Users are seeking out playful, unoptimized spaces that prioritize human delight and accidental discovery over commercial efficiency.", "category": "Culture", "page": 14, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125083", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_27-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/125083"}], "article_id": "1efb4566"}, {"headline": "ITC Q2 net profit rises 3% to Rs 5,078 crore", "summary": "ITC reported a 3.1% year-on-year increase in consolidated net profit for the September quarter. Revenue grew 16% to Rs 20,735 crore, driven by the hotel and agribusiness segments. The cigarette business saw stable volume growth, while the FMCG-Others segment faced inflationary pressures and muted demand in rural markets, offset by growth in the digital and luxury segments.", "category": "Business", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/125099", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_27-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125099"}], "article_id": "3ff120bf"}, {"headline": "IndusInd Bank shares tank 19% on weak Q2 asset quality", "summary": "Shares of IndusInd Bank plummeted nearly 19% after the private lender reported a 39% drop in net profit for the September quarter. The bank's performance was marred by a significant spike in provisions and deteriorating asset quality, particularly in the microfinance and credit card portfolios. Net interest income grew 5% but fell short of analyst estimates, sparking a sector-wide sell-off.", "category": "Business", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/125099", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_27-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125099"}], "article_id": "56f7bd52"}, {"headline": "PM Modi calls for global cooperation against terror at BRICS", "summary": "During the BRICS Summit in Kazan, Prime Minister Narendra Modi emphasized the need for active cooperation to tackle terrorism and its financing. He welcomed the Kazan Declaration and held a significant bilateral meeting with Chinese President Xi Jinping, marking a turning point in India-China relations following the recent border patrolling agreement reached between the two nations.", "category": "World", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/125099", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_27-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125099"}], "article_id": "892264ec"}, {"headline": "NTPC Q2 consolidated net profit jumps 14% to Rs 5,380 crore", "summary": "State-owned power giant NTPC reported a 14% rise in consolidated net profit for the quarter ending September 2024. Total income stood at Rs 45,197 crore. The company's board approved an interim dividend of Rs 2.50 per share. The growth was supported by increased power generation and improved operational efficiency across its thermal and renewable energy plants.", "category": "Business", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125099", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_27-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125099"}], "article_id": "d5068c35"}, {"headline": "Sensex falls 900 points as FII selling continues unabated", "summary": "Indian equity benchmarks Sensex and Nifty extended their losing streak as foreign institutional investors pulled out funds amid high valuations and disappointing corporate earnings. Financial and auto stocks led the decline, with IndusInd Bank and M&M among the top losers. The Nifty slipped below the 24,200 level, reflecting cautious sentiment regarding mid-cap stability.", "category": "Economy", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/125099", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_27-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125099"}], "article_id": "696802e4"}, {"headline": "German Chancellor Olaf Scholz arrives in Delhi for strategic visit", "summary": "German Chancellor Olaf Scholz arrived in New Delhi to co-chair the 7th Inter-Governmental Consultations with PM Narendra Modi. The visit focuses on expanding strategic ties, defense cooperation, and clean energy. Discussions include the Russia-Ukraine conflict, skilled labor migration, and a potential free trade agreement between India and the European Union to boost bilateral trade.", "category": "Politics", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125099", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_27-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125099"}], "article_id": "a6511104"}, {"headline": "Government issues fresh advisory against rising digital arrest scams", "summary": "The Ministry of Home Affairs and I4C warned citizens against 'digital arrest' frauds where scammers pose as law enforcement officers to extort money via video calls. The advisory clarifies that police never use Skype or WhatsApp for arrests or judicial custody. Citizens are urged to report suspicious calls on the 1930 helpline or the national cybercrime portal immediately.", "category": "India", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125099", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_27-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125099"}], "article_id": "615b7af0"}, {"headline": "Maha Vikas Aghadi finalizes seat-sharing for 255 assembly seats", "summary": "The opposition alliance Maha Vikas Aghadi reached an agreement on 255 seats for the upcoming Maharashtra Assembly elections. The Congress, Shiv Sena (UBT), and NCP (SP) will contest 85 seats each. Discussions for the remaining 33 seats are ongoing. The alliance aims to present a united front against the ruling Mahayuti coalition in the state elections scheduled for November 20.", "category": "Politics", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125099", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_27-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125099"}], "article_id": "38109eef"}, {"headline": "Yotta Data Services to deploy Nvidia chips for IndiaAI Mission", "summary": "The government's IndiaAI Mission is progressing with plans to procure 10,000 GPUs to boost the local AI ecosystem. Yotta Data Services and other partners are finalizing deals to deploy Nvidia H100 chips. The initiative aims to provide computing power to startups and researchers at subsidized rates, helping reduce the cost of developing indigenous Large Language Models.", "category": "Technology", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125099", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_27-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125099"}], "article_id": "58c4a7e3"}, {"headline": "Education Ministry launches SATHEE portal for entrance exam preparation", "summary": "The Ministry of Education introduced the SATHEE portal to provide free coaching for JEE and NEET aspirants. The platform offers video lectures, mock tests, and AI-driven feedback. Aimed at helping students from rural areas who cannot afford private coaching, the portal is available in multiple regional languages to ensure inclusive access to top-tier competitive exam resources.", "category": "Education", "page": 14, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125099", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_27-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/125099"}], "article_id": "6b5de29f"}, {"headline": "CBSE Exam Portal Under Audit Following Hack Claims and Discrepancies", "summary": "The government has ordered an IIT audit of the CBSE's On-Screen Marking (OSM) system after reports of answer-sheet mix-ups and scoring errors. An ethical hacker claimed to discover a 'master password' capable of bypassing authentication to edit marks. CBSE denied that production data was compromised, claiming the vulnerabilities existed only on a testing site with sample data.", "category": "Education", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/125114", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125114"}], "article_id": "c0a954f8"}, {"headline": "Quad Nations Mobilise $20 Billion for Strategic Critical Minerals Framework", "summary": "India, the US, Australia, and Japan have announced a $20 billion framework to secure critical mineral supply chains and reduce reliance on any single country. The Quad Critical Minerals Framework aims to counter market coercion and supply disruptions. The ministers also launched a maritime surveillance collaboration to boost information sharing and secure industrial supply chains.", "category": "Economy", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/125114", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125114"}], "article_id": "929786b4"}, {"headline": "Education Loan Portfolios Hit Decade-High 15% Growth in FY26", "summary": "Bank education loans surged to ₹8.58 lakh crore in FY26, driven by rising tuition fees and growing aspirations for overseas education. Lenders are expanding participation beyond professional courses to the wider education sector. Experts attribute the growth to rupee depreciation making foreign studies more expensive and a greater willingness among families to borrow for higher education.", "category": "Economy", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125114", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125114"}], "article_id": "169f05de"}, {"headline": "Hike in Fuel Prices Expected to Squeeze Cement Industry Margins", "summary": "Recent fuel price hikes of ₹7.50 per litre are expected to increase logistics costs for cement companies by ₹60-90 per tonne. While companies attempted price increases in May, intense competition and upcoming monsoon rains may limit their ability to pass on costs. Analysts warn that rising imported coal and pet coke prices will further pressure overall production expenses.", "category": "Economy", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125114", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125114"}], "article_id": "31b725f0"}, {"headline": "Refex Industries Reports Consolidated Q4 Profit Double to ₹100 Crore", "summary": "Refex Industries saw its consolidated profit after tax reach ₹100 crore for the quarter ended March 2026, up from ₹46 crore in the previous year. For the full fiscal year, profit stood at ₹204 crore. The company board has recommended a dividend of ₹1 per share for FY26, subject to shareholder approval.", "category": "Business", "page": 2, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125114", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125114"}], "article_id": "c1915bb8"}, {"headline": "EID Parry Reports ₹287 Crore Q4 Loss on Exceptional Charges", "summary": "Murugappa Group's EID Parry posted a consolidated net loss of ₹287 crore for Q4FY26 due to exceptional charges totaling ₹478 crore. These charges included asset impairments at three cash-generating units and costs related to closing the Parry Sugars Refinery India subsidiary. Despite the quarterly loss, the company reported a net profit of ₹1,380 crore for the full fiscal year.", "category": "Business", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125114", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125114"}], "article_id": "33bfe406"}, {"headline": "TVS Supply Chain Optimistic for FY27 Growth on India Freight Rebound", "summary": "TVS Supply Chain Solutions aims for growth in FY27 supported by strong momentum in India and a turnaround in its European operations. The company saw a 34.8 per cent rise in its Global Forwarding Solutions volumes in Q4. Management is focusing on an 'account-centric' strategy to deepen relationships with large industrial and automotive customers despite global geopolitical volatility.", "category": "Business", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125114", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125114"}], "article_id": "e013c1dd"}, {"headline": "Urban Middle Class Increasingly Adopting E-Cycles for Daily Commutes", "summary": "Rising fuel prices are driving a shift toward electric cycles for short urban trips, with sales doubling to 60,000-70,000 units per month. Consumers are opting to keep petrol vehicles for long trips while using e-cycles for daily work travel to reduce monthly fuel expenditure. The trend is most prominent in the ₹30,000-₹55,000 mass-premium category.", "category": "Business", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125114", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125114"}], "article_id": "b05b343b"}, {"headline": "Pocket FM CFO Anurag Sharma Resigns to Pursue Entrepreneurship", "summary": "Anurag Sharma, Chief Financial Officer of audio entertainment platform Pocket FM, has stepped down after five years to start his own venture. During his tenure, he led a $103 million Series D funding round and assisted in international expansion into the US market. He was previously with Ninjacart before joining Pocket FM in 2023.", "category": "Business", "page": 2, "importance": 2, "telegram_url": "https://t.me/c/1877410077/125114", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125114"}], "article_id": "7d9cad3d"}, {"headline": "Man Industries Q4 Profit Declines 25% Amid Higher Operating Costs", "summary": "Large-diameter pipe manufacturer Man Industries reported a 25 per cent drop in March quarter net profit to ₹51 crore. Revenue also slipped 5 per cent to ₹1,157 crore. The company maintains an EBITDA margin guidance of 13-15 per cent for FY27 and expects its Jammu greenfield stainless steel plant to begin commercial production by March 2027.", "category": "Business", "page": 2, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125114", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125114"}], "article_id": "b70abc08"}, {"headline": "CCI Approves Tata International and Mercuria Energy Joint Venture", "summary": "The Competition Commission of India (CCI) has cleared a proposal for a joint venture between Tata International Singapore and Mercuria Energy Netherlands. The partnership, announced in February, involves two of the world's largest integrated energy and commodities groups. The venture aims to leverage combined capabilities in the global commodities market.", "category": "Law", "page": 3, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125114", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125114"}], "article_id": "f5d7e14e"}, {"headline": "Quad Launches Initiative to Strengthen Indo-Pacific Energy Security", "summary": "Quad partners have launched a new initiative focused on Indo-Pacific energy security to address disruptions caused by the West Asia crisis. The program will coordinate emergency responses and improve supply resilience for energy products and downstream derivatives like fertilizers. The ministers emphasized maintaining open, stable markets to ensure regional prosperity.", "category": "World", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125114", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125114"}], "article_id": "868ff516"}, {"headline": "Petroleum Product Share in Total Exports Slips to Decade Low", "summary": "The share of petroleum products in India's total exports fell to 8.8 per cent in FY26, the lowest level in over a decade excluding the pandemic period. Diesel exports declined for the third straight year, dropping 2.5 per cent, while jet fuel exports fell over 20 per cent. Rising domestic demand and refinery maintenance contributed to the decline in outbound shipments.", "category": "Economy", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125114", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125114"}], "article_id": "cdc9b66e"}, {"headline": "RBI Dollar-Rupee Swap Auction Receives Strong Market Response", "summary": "The Reserve Bank of India's three-year dollar-rupee swap auction was subscribed twice over, with banks offering $9.80 billion against a notified amount of $5 billion. The auction is a tool to manage foreign exchange market volatility. Participants bid a weighted average premium of 920.64 paisa for the buy/sell swap intended to stabilize the rupee.", "category": "Economy", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125114", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125114"}], "article_id": "7f9f2ca9"}, {"headline": "CleanMax Raises $575 Million to Expand Renewable Energy Portfolio", "summary": "Clean Max Enviro Energy Solutions secured approximately $575 million in funding from domestic and international lenders to expand its renewable projects. The financing will support 1 gigawatt of central transmission utility-connected solar and wind projects in Rajasthan and Karnataka. The funding includes external commercial borrowings and foreign currency non-resident facilities.", "category": "Business", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125114", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125114"}], "article_id": "314ec609"}, {"headline": "Nifty and Sensex Decline While Mid-Cap Index Scales New Peak", "summary": "Benchmark indices Sensex and Nifty closed lower on Tuesday as Taiwan displaced India as the fifth-largest market by capitalisation. However, the Nifty Midcap 100 hit a fresh all-time high, reflecting domestic investor resilience. Metal stocks emerged as gainers due to rising global commodity prices, while private banks faced selling pressure from monthly contract expiries.", "category": "Economy", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125114", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125114"}], "article_id": "e2a6cc94"}, {"headline": "Union Bank Board Approves ₹8,000 Crore Capital Raising Plan", "summary": "Union Bank of India has received board approval to raise up to ₹8,000 crore through a combination of equity and debt. The plan includes ₹3,000 crore from equity issuance and ₹5,000 crore through Basel III-compliant bonds. The capital raise is intended to strengthen the bank's Tier-1 and Tier-2 capital base to support future growth.", "category": "Business", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125114", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125114"}], "article_id": "f0917ed8"}, {"headline": "Renewable Projects Awarded via Competitive Bidding Qualify as PPPs", "summary": "SEBI clarified that renewable energy projects awarded by government entities to special purpose vehicles of Infrastructure Investment Trusts (InvITs) through competitive bidding are considered Public Private Partnership (PPP) projects. This clarification ensures such assets fall under the 'infrastructure' sub-sector as defined by the Finance Ministry.", "category": "Law", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125114", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125114"}], "article_id": "efdbc33f"}, {"headline": "Pine Labs Shares Drop 8% After Q4 Results Miss Estimates", "summary": "Shares of Pine Labs fell over 8 per cent on the NSE after the company reported quarterly results that failed to meet market expectations. Despite the drop, the company posted a 17 per cent year-on-year revenue growth. Major brokerage Morgan Stanley maintained an 'Equal-weight' rating on the stock with a target price of ₹245.", "category": "Business", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125114", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125114"}], "article_id": "b1bea5f3"}, {"headline": "Nomura and Global Institutions Buy 5.3% Stake in Premier Energies", "summary": "Global financial institutions including Nomura Asset Management and Capital Group acquired a 5.3 per cent stake in Premier Energies for ₹2,291 crore through open market transactions. Following the deal, the company's shares rose over 3 per cent. Domestic funds such as HDFC MF and Kotak Mahindra MF also participated in the bulk share purchase.", "category": "Business", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125114", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125114"}], "article_id": "420f8392"}, {"headline": "IIT Madras Team to Perform Cybersecurity Check on CBSE Portal", "summary": "A team from IIT Madras is in Delhi to conduct a 'third-party health check-up' of the CBSE's evaluation tech platform following reports of glitches. Director V Kamakoti stated the team will analyze the site's complex layers to determine if problems were due to cyberattacks or high traffic load. The audit is critical for students awaiting results for JEE and other admissions.", "category": "Education", "page": 7, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125114", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125114"}], "article_id": "29869b65"}, {"headline": "Digital Bank Slice Achieves Turnaround with ₹20 Crore Q4 Profit", "summary": "Slice reported a net profit of ₹20 crore in the fourth quarter of FY26, rebounding from a net loss of ₹89 crore in the previous year. For the full fiscal year, the bank posted a profit of ₹48.4 crore. Annual income surged by 132 per cent to ₹1,402 crore, driven by growth in its digital banking services and lending portfolio.", "category": "Business", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125114", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125114"}], "article_id": "09ab4436"}, {"headline": "Inflation Targeting Should Include Exchange Rate Stability, says Subbarao", "summary": "Former RBI Governor Duvvuri Subbarao argued that India's inflation targeting framework should formally include exchange rate stability. He noted that monetary, exchange rate, and macroprudential policies are interconnected. Subbarao also suggested the government issue a tax regime discussion paper to attract foreign capital and address current demand issues in the growth story.", "category": "Economy", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125114", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125114"}], "article_id": "4dc84692"}, {"headline": "Zee Entertainment to Launch Four Dedicated Linear Sports Channels", "summary": "Zee Entertainment announced 'Unite8 Sports', a new bouquet of four sports channels to broadcast events across football, cricket, badminton, and wrestling. The company is reportedly in talks with FIFA for the broadcasting rights to the 2026 World Cup. The move is part of Zee's strategy to diversify its content portfolio and capture increasing demand for live sporting action.", "category": "Business", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125114", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125114"}], "article_id": "f0fe83f2"}, {"headline": "Major Insolvency Reforms Under IBC 2.0 Take Effect from May 26", "summary": "The government has notified 57 clauses of the Insolvency and Bankruptcy Code (Amendment) Act, marking the rollout of 'IBC 2.0'. Key changes include creditor-led resolution mechanisms, stricter 180-day timelines for liquidation, and faster admission of insolvency cases. The reforms aim to reduce procedural delays and increase accountability for promoters and guarantors.", "category": "Law", "page": 8, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125114", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125114"}], "article_id": "1e714b9f"}, {"headline": "AI-Polished Resumes Weakening CV Value as a Hiring Signal", "summary": "Recruiters report that the surge in AI-generated resumes is making it harder to identify genuine talent as candidates use templates to bypass tracking systems. Data shows over 70 per cent of white-collar candidates now use AI for resume drafting. Hiring teams are shifting toward holistic assessments, domain expertise, and skill-based interviews to differentiate candidates.", "category": "Technology", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125114", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125114"}], "article_id": "bdc26f5d"}, {"headline": "Non-Implementation of Anti-Dumping Duties Costs Industry ₹11,938 Crore", "summary": "A report by Re-D-E Research and the Centre for WTO Studies claims the failure to implement recommended anti-dumping duties has led to significant annual economic losses. Imposing these levies on 56 products could generate ₹28,540 crore annually. The Finance Ministry currently takes the final call on these duties following investigations by the Directorate General of Trade Remedies.", "category": "Economy", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125114", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125114"}], "article_id": "279daaca"}, {"headline": "Cotton Association Projects 7% Rise in Sowing Area for 2026-27", "summary": "The Cotton Association of India (CAI) expects cotton acreage to grow by 7 per cent in the upcoming season as farmers respond to remunerative prices. The government has increased the Minimum Support Price for medium staple cotton by ₹557 per quintal. Domestic demand for cotton is pegged at 338 lakh bales, representing a 7.6 per cent increase over the previous year.", "category": "Economy", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125114", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125114"}], "article_id": "a3e80d10"}, {"headline": "UPL Receives FCO Registration for Flagship Biostimulant Bioclassic", "summary": "UPL subsidiary SWAL has secured Fertilizer Control Order (FCO) registration for Bioclassic, a biostimulant designed to improve crop vigour and mitigate heat and alkaline soil stress. The product can be applied using conventional sprayers or drone-based platforms. UPL has also secured approvals for four other biostimulants as it expands its sustainable biosolutions portfolio in India.", "category": "Business", "page": 9, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125114", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125114"}], "article_id": "db82ad86"}, {"headline": "GCC Growth Expands to Tier-2 Indian Cities Attracting Global Firms", "summary": "Global Capability Centres (GCCs) are increasingly expanding into tier-2 cities like Navi Mumbai, Coimbatore, and Bhubaneswar. These locations now house over 220 of India's 1,900 GCCs, offering 20-30 per cent lower talent acquisition and real estate costs. Coordinated policy frameworks and the availability of STEM talent are driving this strategic distribution beyond major metros.", "category": "Business", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125114", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125114"}], "article_id": "28dd001e"}, {"headline": "Brewing Storm Over Bay of Bengal Delays Kerala Monsoon Onset", "summary": "The India Meteorological Department indicates that a classical monsoon onset over Kerala is unlikely before June 5. The delay is caused by disrupted wind patterns linked to a developing storm system in the east Bay of Bengal. Additionally, a lack of support from the Madden-Julian Oscillation pulse has left the Arabian Sea branch without its usual atmospheric momentum.", "category": "Environment", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125114", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/125114"}], "article_id": "8a9d98ec"}, {"headline": "Signs of El Nino Emergence by June Reported by Australian Bureau", "summary": "The Australian Bureau of Meteorology reports that sea surface temperatures in the tropical Pacific could cross El Nino thresholds by June. While current conditions are neutral, models suggest at least a moderate-strength event is likely. Past El Nino events have historically led to late monsoons or deficient rainfall in India, though the Indian Ocean Dipole remains neutral for now.", "category": "Environment", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125114", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/125114"}], "article_id": "64190d5f"}, {"headline": "India Cancels Soymeal Export Deals Due to Soaring Domestic Prices", "summary": "Indian traders have cancelled 25,000 tonnes of soymeal export contracts and booked 80,000 tonnes of soybean imports from African countries. This reversal of trade flows comes as high domestic prices make Indian exports uncompetitive. The shift is expected to benefit soymeal suppliers in North and South America as they fill the gap for traditional Asian buyers of Indian meal.", "category": "Economy", "page": 10, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125114", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/125114"}], "article_id": "7c5c006d"}, {"headline": "Kerala Launches Project Zero to Eradicate Administrative Corruption", "summary": "Kerala Home Minister Ramesh Chennithala announced 'Project Zero,' a public-participation initiative aimed at removing corruption from all levels of state administration. The project will strengthen vigilance measures to ensure citizens can access government services without paying bribes. The minister emphasized that the objective is to bring total transparency to the state's bureaucracy.", "category": "Politics", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125114", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125114"}], "article_id": "377da301"}, {"headline": "Trucking Sector Faces Crisis Amid Diesel Rationing and Price Hikes", "summary": "The freight network is under severe pressure as diesel price hikes and rationing force up to 30 per cent of the trucking fleet off the roads. Fuel stations in some regions have restricted sales to 50 litres per truck, causing significant transit delays. The crisis is impacting manufacturing supply chains in western industrial corridors and squeezing small fleet operators' margins.", "category": "Infrastructure", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125114", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125114"}], "article_id": "40de7b14"}, {"headline": "Land Inflation in Bengaluru Outpacing Construction Cost Escalation", "summary": "Land prices in Bengaluru's key IT and emerging corridors are rising faster than construction costs, creating strategic challenges for real estate developers. Metro connectivity and infrastructure upgrades have driven significant appreciation in areas like Whitefield and Sarjapur. Developers are now looking toward peripheral stretches in the North and North-East for future growth.", "category": "Infrastructure", "page": 11, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125114", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125114"}], "article_id": "81a2bb53"}, {"headline": "BluJ Aerospace Unveils Heavy-Payload Hydrogen-Ready Prototype Aircraft", "summary": "Hyderabad-based BluJ Aerospace has showcased its Gen #2 prototype aircraft designed for heavy-payload logistics. The fully battery-powered aircraft features a 200 kg active payload target and uses a unique lift-plus-cruise configuration. The prototype is currently undergoing payload testing and evaluation for early customer missions as the company expands its aerial systems platform.", "category": "Technology", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125114", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/125114"}], "article_id": "e1568d00"}, {"headline": "Om Birla elected Lok Sabha Speaker for second consecutive term", "summary": "Om Birla was elected as the Speaker of the 18th Lok Sabha through a voice vote, defeating opposition candidate K Suresh. Prime Minister Narendra Modi and Opposition Leader Rahul Gandhi escorted him to the chair. This marks Birla's second consecutive term in the role, a rare feat in Indian parliamentary history.", "category": "Politics", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/125029", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE-Delhi-May-27-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125029"}], "article_id": "f146e5aa"}, {"headline": "Court sends Arvind Kejriwal to CBI custody in excise policy case", "summary": "A Delhi court has remanded Chief Minister Arvind Kejriwal to three-day CBI custody in connection with the excise policy case. The CBI arrested Kejriwal in court after the high court stayed his bail in the ED case. The agency seeks to question him regarding the formulation and implementation of the now-scrapped liquor policy.", "category": "Law", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/125029", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE-Delhi-May-27-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125029"}], "article_id": "65dcb1f1"}, {"headline": "President Droupadi Murmu to address joint session of Parliament", "summary": "President Droupadi Murmu is scheduled to address a joint session of both Houses of Parliament. Her speech is expected to outline the government's roadmap for the next five years, focusing on economic growth, social welfare, and the vision for Viksit Bharat by 2047. This is the first address since the formation of the 18th Lok Sabha.", "category": "Politics", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/125029", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE-Delhi-May-27-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125029"}], "article_id": "1008cf73"}, {"headline": "CBI arrests two individuals in Patna over NEET-UG paper leak", "summary": "The Central Bureau of Investigation made its first arrests in the NEET-UG paper leak case, taking Manish Kumar and Ashutosh Kumar into custody in Patna. The duo allegedly provided safe houses for candidates and distributed leaked question papers. The move follows a nationwide probe into irregularities in the medical entrance examination.", "category": "Education", "page": 7, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125029", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE-Delhi-May-27-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125029"}], "article_id": "5c4ed979"}, {"headline": "RBI warns against high growth in unsecured loans in stability report", "summary": "The Reserve Bank of India released its Financial Stability Report, noting that while the Indian banking system remains resilient, there is a need for vigilance regarding the rapid growth of unsecured retail loans. The Gross NPA ratio of scheduled commercial banks fell to a 12-year low of 2.8% in March 2024, reflecting improved asset quality.", "category": "Economy", "page": 17, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125029", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE-Delhi-May-27-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/125029"}], "article_id": "42893bce"}, {"headline": "Cabinet approves significant hike in MSP for 14 Kharif crops", "summary": "The Union Cabinet has approved an increase in the Minimum Support Price (MSP) for 14 Kharif crops for the 2024-25 marketing season. Paddy MSP saw a raise of Rs 117 to Rs 2,300 per quintal. The government stated the move aims to ensure remunerative prices for farmers and encourage crop diversification toward oilseeds and pulses.", "category": "Economy", "page": 6, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125029", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE-Delhi-May-27-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125029"}], "article_id": "49de8a6e"}, {"headline": "India faces England in T20 World Cup semifinal clash at Guyana", "summary": "India is set to play England in the second semifinal of the ICC T20 World Cup 2024 in Guyana. Rohit Sharma’s side remains unbeaten in the tournament, while England looks to defend their title. Rain threats loom over the venue, with no reserve day scheduled, meaning India would progress if the match is washed out due to their higher group finish.", "category": "Sports", "page": 22, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125029", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE-Delhi-May-27-2026.pdf", "page": 22, "telegram_url": "https://t.me/c/1877410077/125029"}], "article_id": "2d9d9787"}, {"headline": "Mark Rutte appointed as next NATO Secretary General", "summary": "NATO allies have officially selected outgoing Dutch Prime Minister Mark Rutte as the next Secretary General. Rutte will succeed Jens Stoltenberg on October 1. His appointment comes at a critical time as the alliance navigates the ongoing conflict in Ukraine and seeks to strengthen its eastern flank against Russian influence.", "category": "World", "page": 14, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125029", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE-Delhi-May-27-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/125029"}], "article_id": "a15b12a9"}, {"headline": "BJP observes Black Day on 49th anniversary of the Emergency", "summary": "The BJP observed a Black Day to mark the 49th anniversary of the 1975 Emergency. Prime Minister Narendra Modi and senior leaders criticized the Congress party, stating the period remains a dark blot on democracy. The party organized nationwide events to educate the youth about the suspension of civil liberties during that era.", "category": "Politics", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125029", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE-Delhi-May-27-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125029"}], "article_id": "8fcf5b7c"}, {"headline": "Quad Announces Maritime Surveillance Initiatives Amid Hormuz and South China Sea Tensions", "summary": "At the 11th Quad Foreign Ministers’ Meeting, members launched the Indo-Pacific Maritime Surveillance Collaboration to enhance information sharing. The move addresses conflicts in the Persian Gulf and the South China Sea. U.S. Secretary of State Marco Rubio announced that India will host the next 'Quad at Sea' mission, bringing together regional Coast Guards on a single vessel.", "category": "Politics", "page": 3, "importance": 9, "telegram_url": "https://t.me/c/1877410077/125036", "sources": [{"newspaper": "The
