<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Inter', -apple-system, sans-serif;
  background: #0c0c0c; color: #fff; touch-action: none;
}
.outer { position: fixed; inset: 0; overflow: hidden; }
.h-track { display: flex; height: 100%; will-change: transform; }
.cat-panel { flex-shrink:0; width:100vw; height:100%; display:flex; flex-direction:column; overflow:hidden; }
.progress-row { flex-shrink:0; display:flex; gap:4px; padding:14px 16px 10px; background:#0c0c0c; position:relative; z-index:5; overflow:visible; }
.progress-row::after { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:80%; height:120px; background:radial-gradient(ellipse at top,color-mix(in srgb,var(--cc) 30%,transparent) 0%,transparent 70%); pointer-events:none; z-index:-1; }
.pseg { flex:1; height:2px; border-radius:1px; background:rgba(255,255,255,0.12); position:relative; overflow:hidden; }
.pseg::after { content:''; position:absolute; inset:0; background:var(--cc,#e8334a); transform:scaleX(0); transform-origin:left; transition:transform 0.25s ease; }
.pseg.done::after, .pseg.active::after { transform:scaleX(1); }
.v-feed { flex:1; overflow:hidden; position:relative; clip-path:inset(0); }
.v-track { display:flex; flex-direction:column; will-change:transform; }
.card { 
  width:100%; flex-shrink:0; background:#0c0c0c; display:flex; flex-direction:column; 
  overflow:hidden; position:relative; 
  scroll-margin-top: 80px;
}
.card.target-highlight {
  background: linear-gradient(135deg, #fff3cd22 0%, #ffeaa722 100%) !important;
  box-shadow: 0 0 30px rgba(255, 193, 7, 0.4);
  border: 2px solid #f39c12;
  animation: pulse-highlight 2s ease-in-out;
}
@keyframes pulse-highlight {
  0%, 100% { box-shadow: 0 0 30px rgba(255, 193, 7, 0.4); }
  50% { box-shadow: 0 0 50px rgba(255, 193, 7, 0.6); }
}
.card-content { flex:1; display:flex; flex-direction:column; padding:36px 20px 22px; min-height:0; position:relative; z-index:1; }
.card-toprow { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; flex-shrink:0; }
.cat-pill { display:inline-flex; align-items:center; gap:7px; background:#1c1c1e; border-radius:8px; padding:7px 12px 7px 10px; font-size:11.5px; font-weight:700; letter-spacing:0.07em; color:#d0d0d0; text-transform:uppercase; line-height:1; }
.pill-icon { width:16px; height:16px; background:#2e2e30; border-radius:3px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.pill-icon svg { display:block; }
.card-date { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:500; color:#666; letter-spacing:0.01em; }
.card-headline { font-size:28px; font-weight:800; line-height:1.18; color:#fff; letter-spacing:-0.03em; margin-bottom:20px; flex-shrink:0; }
.card-summary { font-size:15.5px; font-weight:400; line-height:1.62; color:#6b6b6b; flex:1; overflow:hidden; display:-webkit-box; -webkit-line-clamp:7; -webkit-box-orient:vertical; }
.card-divider { height:1px; background:#1e1e1e; margin:20px 0 16px; flex-shrink:0; }
.card-footer { display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.src-chip { display:inline-flex; align-items:center; gap:6px; background:#181818; border:1px solid #282828; border-radius:9px; padding:8px 13px; font-size:12.5px; font-weight:600; color:#c0c0c0; text-decoration:none; letter-spacing:0.005em; line-height:1; }
.src-chip-sep { color:#3a3a3a; font-weight:400; }
.src-chip-pg { color:#555; font-weight:500; }
.src-chip-ext { margin-left:2px; }
.src-chip-ext svg { display:block; }
.info-btn { width:36px; height:36px; border-radius:50%; border:1.5px solid #252525; background:#141414; display:flex; align-items:center; justify-content:center; color:#555; cursor:pointer; flex-shrink:0; }
.cat-flash { position:fixed; inset:0; z-index:600; pointer-events:none; opacity:0; transition:opacity 0.12s; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; }
.cat-flash.on { opacity:1; }
.cf-icon { font-size:34px; }
.cf-name { font-size:22px; font-weight:900; letter-spacing:-0.03em; text-transform:uppercase; }
.hint { position:fixed; display:flex; flex-direction:column; align-items:center; gap:5px; pointer-events:none; z-index:400; opacity:0; transition:opacity 0.6s ease; }
.hint.visible { opacity:1; }
.hint.gone { opacity:0 !important; transition:opacity 0.4s; }
.hint-pill { font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.55); background:rgba(255,255,255,0.07); backdrop-filter:blur(10px); padding:5px 13px; border-radius:100px; border:1px solid rgba(255,255,255,0.09); }
.hint-arr { font-size:16px; color:rgba(255,255,255,0.4); }
.h-up { bottom:28px; left:50%; transform:translateX(-50%); animation:bUp 2s ease-in-out infinite; }
.h-right { top:50%; right:14px; transform:translateY(-50%); animation:bRight 2s ease-in-out infinite 0.6s; }
@keyframes bUp { 0%,100% { bottom:28px; opacity:.65; } 50% { bottom:36px; opacity:1; } }
@keyframes bRight { 0%,100% { right:14px; opacity:.65; } 50% { right:6px; opacity:1; } }
</style>

<script>
const DIGEST   = {"date": "15 June 2026", "articles": [{"headline": "US begins repatriating $10 billion in reciprocal tariff refunds to India", "summary": "The process of returning over $10 billion in tariff refunds to Indian exporters has started following US Customs guidelines and RBI clarifications. The refunds stem from tariffs levied in 2025-26 that were later struck down by the US Supreme Court. Digital payment providers are offering lower-cost channels for these inflows, helping exporters avoid traditional banking hurdles.", "category": "Economy", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/127243", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127243"}], "article_id": "a958c4f0"}, {"headline": "SEBI board likely to restore open-market buybacks in June meeting", "summary": "SEBI is expected to approve measures to ease business operations during its June 19 board meeting. Key proposals include reintroducing open-market buybacks through stock exchanges and speeding up the rollout of Alternative Investment Fund schemes. The regulator may also simplify securities transmission for heirs and improve price discovery for IPOs and re-listed companies.", "category": "Business", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127243", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127243"}], "article_id": "ad4972a5"}, {"headline": "India allows all non-resident individuals to invest in listed companies", "summary": "The Finance Ministry has amended rules to allow all non-resident individuals to invest in Indian listed companies under the Portfolio Investment Scheme. Previously, this was restricted to NRIs and OCIs. While the move aims to deepen capital markets, the government maintains scrutiny over beneficial ownership from countries sharing land borders with India to ensure national security.", "category": "Economy", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127243", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127243"}], "article_id": "c369000d"}, {"headline": "Nearly 43 per cent of urban Indian women now overweight or obese", "summary": "Latest NFHS-6 data reveals a significant rise in obesity among urban women in India, increasing from 33 per cent to 43 per cent. Experts attribute the trend to lifestyle changes, stress, and cheaper high-calorie foods. The study suggests India is approaching a demographic crisis where half of all urban women aged 15-49 will have a Body Mass Index (BMI) above 25.", "category": "Health", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127243", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127243"}], "article_id": "556437df"}, {"headline": "India issues first ship recycling credit note to promote green shipbuilding", "summary": "The Directorate General of Shipping has issued India’s first ship recycling credit note to a Liberia-based firm. Under the scheme, ship owners receive credit equivalent to 40 per cent of scrap value for using certified Indian yards. The notes can be redeemed for new vessels built in India, aiming to strengthen the circular economy and boost the domestic shipbuilding industry's global share.", "category": "Infrastructure", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127243", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127243"}], "article_id": "76f5808d"}, {"headline": "New book chronicles nine decades of Bengal’s enduring entrepreneurial legacy", "summary": "A new compendium titled \"Brands of Bengal: 90 Not Out\" was launched in Kolkata to celebrate iconic regional brands over 90 years old. The book highlights the journeys of companies like Britannia, Dabur, Boroline, and several heritage clubs and restaurants. It aims to document the state's commercial history and inspire the next generation of entrepreneurs to build national brands.", "category": "Culture", "page": 1, "importance": 4, "telegram_url": "https://t.me/c/1877410077/127243", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127243"}], "article_id": "544dba7f"}, {"headline": "India urged to deploy thorium resources to ensure clean energy security", "summary": "Former Atomic Energy Commission Chairman Anil Kakodkar has advocated for the immediate deployment of India’s vast thorium resources. He suggests using thorium-based Molten Salt Reactors to transition the country from an energy importer to a clean energy provider. As global uranium supplies face potential shortages, leveraging thorium is seen as a critical step for India's energy future.", "category": "Science", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127243", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127243"}], "article_id": "7b7c65a8"}, {"headline": "LIC focuses on strengthening market leadership and national development", "summary": "LIC CEO R. Doraiswamy stated that the company remains committed to maintaining its dominant market share, which currently stands at nearly 60 per cent. Managing assets worth over ₹57 lakh crore, the 70-year-old insurer aims to align its growth with India's expanding economy. LIC also manages a significant real estate portfolio valued at approximately ₹60,000 crore.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127243", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127243"}], "article_id": "ccdc2444"}, {"headline": "Kerala Health Minister reports no new Nipah cases after recent outbreak", "summary": "Kerala Health Minister K. Muraleedharan confirmed that no fresh Nipah cases have been reported following a review meeting in Kozhikode. He defended the government’s response, stating that the lone patient is receiving advanced treatments including monoclonal antibodies and Remdesivir. The Minister urged the public to remain calm, asserting that there is no cause for panic.", "category": "Health", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/127243", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127243"}], "article_id": "f08eafe7"}, {"headline": "Cockroach Janata Party protests in Bengaluru and Hyderabad over NEET leaks", "summary": "The newly-formed Cockroach Janata Party held protests in Hyderabad and Bengaluru demanding accountability for the NEET paper leak. Over 1,000 people, including activists and celebrities, joined the demonstrations calling for the resignation of Union Education Minister Dharmendra Pradhan. The movement, which went viral on social media, seeks reform in the national examination system.", "category": "Politics", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127243", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127243"}], "article_id": "d07f3be4"}, {"headline": "Honda says differential fuel pricing is key for flex-fuel vehicle adoption", "summary": "Honda Motorcycle and Scooter India (HMSI) CEO Tsutsumu Otani stated that differential fuel pricing and availability are primary factors for the success of the flex-fuel ecosystem. While the government recently exempted certain ethanol blends from excise duty, HMSI emphasized that actual adoption will depend on cost-per-kilometre benefits for customers and technology optimization.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127243", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127243"}], "article_id": "bfaab365"}, {"headline": "Indian tractor sales cross one lakh units for third consecutive month", "summary": "Domestic tractor sales remained strong in May 2026, reaching 1,08,229 units, a 20 per cent year-on-year increase. The growth is supported by positive rural sentiment and improved farm economics. Exports also recovered, exceeding 10,000 units for the first time this year. Analysts note that monsoon progression will be crucial for maintaining this momentum through the rest of the fiscal year.", "category": "Economy", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127243", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127243"}], "article_id": "ea34b2d5"}, {"headline": "Ipca Laboratories partners with Bhami Research for monoclonal antibody development", "summary": "Ipca Laboratories has signed a licensing agreement with Bhami Research Laboratories to access a proprietary biologics delivery platform. The collaboration aims to develop and commercialize affordable monoclonal antibody products for oncology and inflammatory diseases. Under the deal, Ipca will handle development, while Bhami Research will receive licensing fees and royalties on future sales.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/127243", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127243"}], "article_id": "341830a9"}, {"headline": "Dana and Eaton $5.1 billion merger to impact Indian EV supply", "summary": "The $5.1 billion combination of Dana Inc and Eaton Corporation’s mobility businesses is expected to reshape India’s commercial vehicle and electric vehicle supply chains. The deal creates a systems-integrated supplier capable of offering unified powertrain solutions. Experts believe this will accelerate localization and help manufacturers develop EVs better suited for Indian conditions.", "category": "Business", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127243", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127243"}], "article_id": "ea85d0de"}, {"headline": "Indian Army drops colonial-era dress customs and archaic terminology", "summary": "The Indian Army has issued a new uniform pamphlet for 2026, removing several colonial-era vestiges. Changes include the introduction of the indigenous Bandi jacket for formal wear, restricting the carriage of swords to specific ceremonial events, and dropping the term \"Royal.\" The move is part of a broader effort to align military traditions with India’s national identity and sovereign ethos.", "category": "India", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127243", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127243"}], "article_id": "088e1617"}, {"headline": "Jio Platforms enters global top 20 for patent filings in 2026", "summary": "Reliance Industries’ Jio Platforms has ranked among the top 20 global entities for patent filings under the Patent Co-operation Treaty. According to the World Intellectual Property Organisation, Jio has filed 6,817 patents as of March 2026. This achievement places the Indian firm alongside global tech leaders like Google and Apple, highlighting India’s growing role in tech innovation.", "category": "Technology", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127243", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/127243"}], "article_id": "512acdc1"}, {"headline": "Cognizant’s India listing plans delayed by market volatility and AI impact", "summary": "Cognizant’s proposal for a primary and secondary listing in India has seen little progress ten months after its initial announcement. Sources cite market volatility, a decline in Nasdaq-listed share prices, and the company's ouster from the Nasdaq-100 index as key factors. Despite the delays, the company maintains that it is continuing to evaluate the potential offering for its shareholders.", "category": "Business", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127243", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/127243"}], "article_id": "30450770"}, {"headline": "Sharp fall in gold prices expected to squeeze Indian jewellers’ margins", "summary": "Gold prices in India have dropped by 14 per cent from recent highs, falling to approximately ₹1,44,782 per 10 grams. Analysts expect this decline to pressure the margins of jewellery companies in the June quarter due to high-cost inventory. While the price drop usually stimulates demand, many buyers are reportedly postponing purchases in anticipation of further price corrections.", "category": "Economy", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127243", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/127243"}], "article_id": "f9ddd623"}, {"headline": "Indian banks face hedging costs while seeking fresh foreign currency deposits", "summary": "Banks may face financial challenges in attracting Foreign Currency Non-Resident (Bank) deposits despite new RBI measures. With interest rates hiked to 6-7 per cent to stabilize the rupee, existing depositors may prematurely close old accounts to roll over into higher-yielding fresh deposits. Bankers are concerned about who will bear the hedging costs for these rolled-over funds.", "category": "Business", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127243", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/127243"}], "article_id": "c034f235"}, {"headline": "India’s floriculture sector reaches record acreage despite North-East production decline", "summary": "India's flower cultivation area hit a record 4 lakh hectares in 2025-26, driven by high output in states like Tamil Nadu and Madhya Pradesh. However, the industry is witnessing a decline in the North-East, particularly in Arunachal Pradesh and Mizoram, due to infrastructure gaps and shifts to other crops. The sector's gross value added reached ₹51,643 crore in 2023-24.", "category": "Economy", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127243", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/127243"}], "article_id": "23256b29"}, {"headline": "US government funding cuts predicted to significantly slow global cancer research", "summary": "A study from the University of Southampton indicates that a 40.6 per cent reduction in US central funding for agencies like the NIH could devastate global cancer science. The US is a primary hub for R&D and clinical trials; its removal from the funding ecosystem could cause a 50 per cent loss in research efficiency. Researchers suggest BRICS nations and the EU must fill this gap.", "category": "Science", "page": 7, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127243", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/127243"}], "article_id": "1455238f"}, {"headline": "Researchers use sound waves to create low-power magnetic information circuits", "summary": "Scientists at the Institute of Nano Science and Technology, Mohali, have discovered a method to control magnetic signals using sound waves. By using \"magnons\" instead of electric charges, the technique could lead to electronic devices that generate less heat and consume significantly less power. This theoretical model offers a practical alternative to conventional charge-based circuits.", "category": "Science", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127243", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/127243"}], "article_id": "3b747031"}, {"headline": "German researchers develop ultra-fast energy-efficient memory for AI applications", "summary": "Researchers in Germany have developed a new ferroelectric random-access memory (FRAM) using hafnium oxide. The technology retains data without power and operates at high speeds with low energy consumption. Designed for industrial-scale manufacturing, this memory is particularly suited for battery-powered devices and \"edge AI\" applications that process information locally.", "category": "Technology", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127243", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/127243"}], "article_id": "7fea13fa"}, {"headline": "Scientists produce first global map of massive underground fungal networks", "summary": "Scientists have mapped a vast underground network of fungi that supports land plants and absorbs 4.3 billion tonnes of carbon dioxide annually. The study found that nearly 40 per cent of fungal biomass is located in the top 15 cm of soil. However, modern farming practices are significantly reducing fungal density, threatening these critical natural carbon sinks.", "category": "Environment", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127243", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/127243"}], "article_id": "3887f653"}, {"headline": "New AI assistant NyayaAI developed to decode complex Indian legal statutes", "summary": "Researchers at UPES Dehradun have developed NyayaAI, an AI-powered legal assistant designed to answer questions about Indian law in plain language. Using a multi-agent architecture, the system can summarize documents, identify precedents, and draft preliminary legal papers. The tool aims to improve legal accessibility for the public where professional consultation is often costly.", "category": "Technology", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127243", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/127243"}], "article_id": "7af99442"}, {"headline": "RITES deploys AI-powered VISTAR tool to improve railway safety inspections", "summary": "RITES has launched an AI-based visual inspection tool called VISTAR to enhance the precision of railway track safety audits. The system uses machine learning to identify vulnerable areas by analyzing historical data, allowing inspectors to focus on high-risk spots. The initiative is part of a broader push to integrate technology across the PSU’s 13 verticals to boost service and revenue.", "category": "Infrastructure", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127243", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/127243"}], "article_id": "15c4aab8"}, {"headline": "UK regulator launches London sandbox to test AI-powered healthcare technologies", "summary": "The UK’s MHRA has announced a regulatory sandbox called \"London Region I\" to safely deploy AI-enabled medical devices in clinical settings. The initiative aims to provide patients with faster access to innovative healthcare solutions while maintaining safety standards. Up to 10 manufacturers will be selected to participate, generating real-world evidence to support future NHS adoption.", "category": "Health", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127243", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/127243"}], "article_id": "5f6da30b"}, {"headline": "UNAIDS warns funding cuts and human rights pushback threaten HIV response", "summary": "A new UNAIDS report reveals that a 23 per cent drop in global development assistance in 2025 is jeopardizing years of gains in the AIDS response. Funding cuts, combined with the criminalization of marginalized groups and reduced civic space, have created a \"perfect storm.\" Nearly 9 million people currently lack access to treatment, making the success of global HIV programs fragile.", "category": "World", "page": 9, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127243", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/127243"}], "article_id": "fc64dbc1"}, {"headline": "International Day of Yoga 2026 to focus on healthy ageing", "summary": "The United Nations announced that the 12th International Day of Yoga on June 21 will center on the theme \"Yoga for Healthy Ageing.\" The initiative highlights how yoga practices, including mindfulness and gentle movement, can help older adults maintain independence, strength, and mental well-being. The theme aims to encourage lifelong engagement with yoga to support global health goals.", "category": "India", "page": 9, "importance": 4, "telegram_url": "https://t.me/c/1877410077/127243", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/127243"}], "article_id": "3c5920e7"}, {"headline": "India advises shipping firms to restrict seafarer deployment in Persian Gulf", "summary": "The Directorate General of Shipping has issued an advisory asking fleet owners to restrict the deployment of Indian seafarers to the Persian Gulf. This follows lethal strikes on commercial vessels that resulted in the deaths of three Indian seafarers. While emergency crew changes are permitted with consent, masters are urged to maintain high vigilance and implement strict security protocols.", "category": "Politics", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127243", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/127243"}], "article_id": "60dae52a"}, {"headline": "Flipkart moves Kolkata High Court seeking GST exemption on delivery charges", "summary": "E-commerce major Flipkart has filed a petition in the Kolkata High Court to treat its delivery services as those of a \"goods transport agency.\" The company is seeking exemption from GST on delivery charges, which would impact approximately ₹300-350 crore in tax revenue. This follows a ruling by the West Bengal Appellate Authority for Advance Ruling that rejected Flipkart's claim.", "category": "Law", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127243", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_15-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/127243"}], "article_id": "728abc37"}, {"headline": "Vedanta Resources Plans to Relist in US; Targets $100 Billion Value", "summary": "Anil Agarwal plans to relist Vedanta Resources, likely in the US, as part of a $100 billion investment plan for Indian metals and minerals. The group is demerging its commodities conglomerate into five listed entities. Agarwal noted that a US listing is an option to raise significant funds to meet soaring global demand for resources.", "category": "Business", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/127272", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore  15-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127272"}], "article_id": "f101d7cf"}, {"headline": "India to Review AI Mission; Local Infrastructure Scaling Underway", "summary": "The Indian government is working to scale up domestic AI infrastructure to ensure sovereignty and reduce dependence on foreign models. Niti Aayog is reviewing the IndiaAI Mission to identify gaps. Plans include a pool of skilled talent and targeted fiscal incentives. The move follows restrictions on access to overseas foundation models.", "category": "Technology", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/127272", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore  15-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127272"}], "article_id": "3adaee7b"}, {"headline": "DBS Chief Optimistic About India's Long-term Structural Growth", "summary": "Su Shan Tan, CEO of DBS Bank, views India as a long-term structural growth story. She noted that the country could benefit from the global surge in demand for AI-related hardware and chips. DBS is investing in people and digital capabilities to capitalize on this opportunity, despite market jitters from regional geopolitical tensions.", "category": "Economy", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127272", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore  15-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127272"}], "article_id": "7a85cdfb"}, {"headline": "Residents Tempted to Gatecrash FCNR Party for NRIs", "summary": "Well-heeled Indian residents are using the RBI's Liberalised Remittance Scheme (LRS) to transfer funds to NRI relatives for investment in Foreign Currency Non-Resident (FCNR(B)) deposits. These deposits offer attractive dollar returns and are tax-free for NRIs. The move aims to lock in higher interest rates amid domestic currency fluctuations.", "category": "Business", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127272", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore  15-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127272"}], "article_id": "092e758d"}, {"headline": "Hormuz Disruption Stalls Rice and Tea Shipments to West Asia", "summary": "The US-Israel conflict with Iran has halted rice and tea exports to West Asia. Traders report that the Strait of Hormuz is shut, with three vessels carrying 100,000 tonnes of basmati rice stuck at Kandla Port. Exporters are concerned about the impact on contracts and are monitoring the situation for any signs of a peace deal.", "category": "Economy", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127272", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore  15-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127272"}], "article_id": "4f7295e8"}, {"headline": "Centre Urges States to Accelerate Nuclear Power Plants and RE Storage", "summary": "The Union government has asked states to expedite clearances for 12 nuclear power plant sites and battery storage systems. The push aims to meet energy security goals amid growing demand from AI and data centres. Several states, including Bihar and Jharkhand, have already initiated feasibility studies for new power plants to bolster the national grid.", "category": "Infrastructure", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127272", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore  15-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127272"}], "article_id": "db89a368"}, {"headline": "Trump Set to Meet Modi in France During G7 Summit Sidelines", "summary": "The White House announced that US President Donald Trump will meet Prime Minister Narendra Modi on the sidelines of the G7 summit in France. This follows reports of an Indian-flagged dhow sinking off the Oman coast due to technical failure, where all 14 crew members were rescued. Diplomatic channels are coordinating the high-level meeting.", "category": "Politics", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127272", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore  15-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127272"}], "article_id": "df5cdb41"}, {"headline": "Congress Questions PM's Silence on Sailors Killed in US Strike", "summary": "Congress president Mallikarjun Kharge criticized Prime Minister Modi for his silence following the death of three Indian seafarers in a US strike off the Oman coast. The opposition party accused the government of failing to protect citizens and ignoring the incident while pursuing diplomatic meetings with foreign leaders. Rahul Gandhi also joined the criticism.", "category": "Politics", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127272", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore  15-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127272"}], "article_id": "a7bc61c1"}, {"headline": "Seventy Percent of Looted Weapons Recovered in Manipur: DGP", "summary": "Manipur's Director General of Police announced that 70% of the weapons looted during the ethnic violence have been recovered. Security forces are continuing search operations for the remaining arms. The DGP warned of strict action against those still holding illegal weapons, emphasizing that the situation in the state is gradually returning to normal.", "category": "Politics", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127272", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore  15-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127272"}], "article_id": "2d4f5064"}, {"headline": "Finance Minister States India's Growth Belies Opposition's Doom Predictions", "summary": "Finance Minister Nirmala Sitharaman asserted that India's sustained economic growth has proven opposition predictions of a crisis wrong. Speaking in Bengaluru, she highlighted the success of the Jan Aushadhi scheme and digital initiatives. She criticized the Karnataka state government for alleged congress-led pettiness regarding central welfare programs.", "category": "Politics", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127272", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore  15-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/127272"}], "article_id": "7a89fd29"}, {"headline": "Indian IT Packing Bags for Europe Amid US Demand Shift", "summary": "Indian IT service providers are aggressively expanding in Europe as growth in the North American market slows. Firms like TCS, HCLTech, and LTIMindtree are opening new delivery centers across the continent. Europe now accounts for over a third of new delivery centers opened by top Indian IT companies, driven by demand for AI, cloud, and digital transformation.", "category": "Technology", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127272", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore  15-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127272"}], "article_id": "2fd63628"}, {"headline": "Instant House-help Apps Burn $15m as Discounts Surge in May", "summary": "Home-help segment apps like Snabbit, Pronto, and Urban Company collectively burned an estimated $15 million in May. The cash burn was driven by deep discounts and aggressive marketing to capture market share. While total orders rose, the high cost of customer acquisition through promo codes has raised concerns among venture capital investors about long-term viability.", "category": "Business", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127272", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore  15-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127272"}], "article_id": "a2a9f30a"}, {"headline": "EU Panel Reviews Impact of US Ban on Anthropic AI Models", "summary": "The European Commission is assessing the implications of the US export control directive that restricted access to Anthropic's Claude 3 model for foreign nationals. The panel warned that such measures should not be discriminatory against partners. The move has triggered concerns about the fragmentation of the global AI ecosystem and the impact on international research.", "category": "Technology", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127272", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore  15-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127272"}], "article_id": "9ff771c5"}, {"headline": "China Operators Manipulating US AI Debates to Influence Public Opinion", "summary": "OpenAI revealed that clusters of ChatGPT accounts originating from China attempted to manipulate public debate about AI in the US. The first cluster sought to generate social media comments suggesting US AI data centers would increase electricity prices. The second cluster promoted Chinese technology as superior to American counterparts in a coordinated campaign.", "category": "Technology", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127272", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore  15-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127272"}], "article_id": "458ec8f3"}, {"headline": "Noida Airport Opens with Caution as High Fuel Prices Impact Airlines", "summary": "The Noida International Airport has become operational, but airlines are maintaining a cautious approach due to high fuel costs. IndiGo and Akasa Air have launched initial flights, but high operating costs have led to some flight reductions. Airport officials are confident of a long-term recovery, expecting traffic to reach 12 million passengers annually in the first phase.", "category": "Infrastructure", "page": 5, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127272", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore  15-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/127272"}], "article_id": "9dcf9404"}, {"headline": "Telcos and Banks Spar Over New SMS Consent Regime for Calls", "summary": "Telecom operators and banks are at odds over the implementation of a new digital consent regime for commercial calls and SMS. While telcos want full control over the mandates, banks fear high costs and administrative burdens. Trai's new rules aim to curb spam, but the industry remains divided on who should manage and verify customer consent to receive messages.", "category": "Business", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127272", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore  15-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/127272"}], "article_id": "73e8f3a2"}, {"headline": "Tech Layoff Wave Floods Job Market as Indian Professionals Seek Opportunities", "summary": "A surge in global tech layoffs has led to a flood of jobseekers in the Indian market, with many professionals looking for positions at up to 4x their previous salaries. Data from Xpheno shows that over 56,000 Indian professionals from top tech firms are actively seeking new roles. However, hiring activity remains cautious due to global economic and geopolitical uncertainties.", "category": "Business", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127272", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore  15-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/127272"}], "article_id": "e84aca6a"}, {"headline": "Electronics Manufacturers Warn of Output Shrinkage Due to War and Costs", "summary": "Consumer electronics and appliance makers in India are facing a 20% reduction in output due to global supply chain disruptions caused by war. Costs for components like printed circuit boards and semiconductors have spiked. Industry leaders like Haier and Whirlpool noted that delays in shipments and rising logistics costs are deflating stock levels and delaying new product launches.", "category": "Business", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127272", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore  15-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/127272"}], "article_id": "05234f0a"}, {"headline": "AI Adoption Turns Professionals into 'Ghosts' as UK Job Postings Fall", "summary": "A report indicates that AI is significantly impacting the job market for white-collar professionals like coders, lawyers, and analysts. In the UK, job postings for these roles have fallen by almost half as companies increasingly use AI for tasks like legal research and financial analysis. Experts warn that even high-skilled roles are being automated, leading to career displacement.", "category": "Technology", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127272", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore  15-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/127272"}], "article_id": "1aa9a824"}, {"headline": "Law Firms Embrace 'Boomerang' Hiring to Recapture Seasoned Talent", "summary": "Indian law firms are increasingly rehiring former employees who left for other opportunities, a trend known as 'boomerang' hiring. Firms like Shardul Amarchand Mangaldas and JSA find that rehiring seasoned hands saves time and costs associated with training and culture fit. This strategy helps firms fill senior roles quickly in a tight market for specialized legal talent.", "category": "Law", "page": 10, "importance": 5, "telegram_url": "https://t.me/c/1877410077/127272", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore  15-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/127272"}], "article_id": "89a46a79"}, {"headline": "Bulls Return to Banking Stocks Following RBI's FCNR(B) Initiative", "summary": "Banking stocks surged as investors reacted positively to the RBI's initiative to allow banks to raise foreign currency deposits through the FCNR(B) scheme. The move is expected to improve dollar liquidity and provide banks with cheaper funding. Major lenders like ICICI Bank, HDFC Bank, and Kotak Mahindra Bank saw significant gains as market sentiment turned bullish for the sector.", "category": "Business", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127272", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore  15-06-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/127272"}], "article_id": "f263077b"}, {"headline": "Expert AI Control Directive Suspends Access to Advanced Foundation Models", "summary": "A new 'expert control directive' has forced the suspension of access to advanced AI models like Fable 5 and Mythos 5 for users outside the US. The measure aims to protect national security and prevent the misuse of high-end AI capabilities by foreign actors. The move has drawn criticism from global AI developers and researchers who argue it hampers international innovation.", "category": "Technology", "page": 12, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127272", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore  15-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/127272"}], "article_id": "c198ba90"}, {"headline": "India's Statistical System Set for AI Overhaul; Data as Strategic Asset", "summary": "The Ministry of Statistics (MoSPI) is planning a major overhaul of India's statistical infrastructure by integrating AI and machine learning. A new sub-committee will explore treating official data as a national economic asset and implementing the UN System of National Accounts 2025. The goal is to provide real-time, data-driven insights for economic policy and improve data quality.", "category": "Technology", "page": 13, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127272", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore  15-06-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/127272"}], "article_id": "c0967450"}, {"headline": "Iran Questions US Peace Deal Following Israeli Strikes in Lebanon", "summary": "Iran has cast doubt on a proposed US peace deal after Israel conducted air strikes on southern Lebanon. The strikes, targeting Hezbollah positions, have heightened tensions and overshadowed diplomatic efforts to end the conflict. Iranian officials stated that the deal would not be legitimate if it did not address the root causes of the regional instability and protect their allies.", "category": "World", "page": 14, "importance": 9, "telegram_url": "https://t.me/c/1877410077/127272", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore  15-06-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/127272"}], "article_id": "5b19f594"}, {"headline": "Gaza Death Toll Surpasses 73,000 as Conflict Enters New Phase", "summary": "The health ministry in Gaza reported that the total number of deaths since the conflict began in October 2023 has exceeded 73,000. Despite international calls for a ceasefire, Israeli military operations continue in southern Gaza. The humanitarian situation remains dire, with more than 173,200 people injured and significant damage to infrastructure across the territory.", "category": "World", "page": 14, "importance": 9, "telegram_url": "https://t.me/c/1877410077/127272", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore  15-06-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/127272"}], "article_id": "8a8db669"}, {"headline": "New York Knicks Win First NBA Title in Fifty-Three Years", "summary": "The New York Knicks ended a 53-year championship drought by winning the NBA title, defeating the San Antonio Spurs in the finals. The victory sparked massive celebrations across New York City. The series concluded with a 94-90 win on Saturday night, marking a historic moment for the franchise which had last won the championship in 1973 under coach Red Holzman.", "category": "Sports", "page": 15, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127272", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bangalore  15-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/127272"}], "article_id": "f6e3ea2b"}, {"headline": "Top Six Audit Firms to Face NFRA Quality Inspections in 2027", "summary": "The National Financial Reporting Authority (NFRA) will inspect India's top six audit firms, including Deloitte and PwC, in FY2027. Under new guidelines, firms must submit improvement plans within three months of findings. The move aims to increase financial statement reliability and investor confidence by addressing systemic deficiencies and promoting professional accountability.", "category": "Business", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/127295", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127295"}], "article_id": "a655dabe"}, {"headline": "SEBI Targets Five Day FPI Registration Through Digital Onboarding", "summary": "SEBI is working to reduce Foreign Portfolio Investor (FPI) registration time from one month to five days. The regulator is collaborating with RBI and the Income Tax department to fully digitize the Common Application Form and allow electronic signatures. This move aims to improve market efficiency and attract foreign investment by simplifying KYC and banking procedures.", "category": "Economy", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127295", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127295"}], "article_id": "b2f9f275"}, {"headline": "Government Considers New EPF Pension Scheme for All Indian Workers", "summary": "The Ministry of Labour is mulling a 'Unified Pension Scheme' for both formal and informal sector workers. Managed by EPFO, the scheme will allow flexible contributions not tied to a specific employer, allowing workers to deposit funds whenever possible. Returns are expected to be linked to annual EPF interest rates, providing a universal retirement safety net.", "category": "Economy", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127295", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127295"}], "article_id": "dff134f3"}, {"headline": "Inflation and Federal Reserve Stance to Dictate Market Trends", "summary": "Indian stock markets will be guided this week by wholesale inflation data, the US Federal Reserve's interest rate announcements, and global crude oil prices. Investors are closely monitoring domestic WPI figures for May. While geopolitical uncertainties persist, the market's direction will depend on foreign capital flows and India's import dependency on oil and gold.", "category": "Business", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127295", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127295"}], "article_id": "49058b92"}, {"headline": "AI Integration to Increase Global Cross Border Payment Opportunities", "summary": "Global AI firms like OpenAI and Anthropic are creating new opportunities for Indian fintech companies in the cross-border payments sector. Industry experts predict that the share of international payments in fintech revenue could rise from 9% to 25% by 2027. Partnerships with global AI players are helping domestic firms improve transaction success rates and customer trust.", "category": "Technology", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127295", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127295"}], "article_id": "7b8768e4"}, {"headline": "Magicpin to Grow Merchant Base via AI Assistant Vera", "summary": "Magicpin aims to exceed one million merchants by the end of 2026 using its AI assistant 'Vera'. The tool has already simplified over 5 million business processes for 500,000 restaurants and retailers. Vera provides real-time order data and operational insights, helping small businesses manage demand and improve efficiency within three months of adoption.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127295", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127295"}], "article_id": "d231f1a8"}, {"headline": "Green SM Expands Electric Ride Hailing Services Across India", "summary": "VinhFast-backed Green SM is launching its second phase of expansion in India, deploying electric vehicles for ride-hailing and corporate mobility. The company plans to offer airport transfers and subscription services to build customer trust. Unlike competitors, Green SM manages its own fleet and driver training to ensure high service standards and passenger safety.", "category": "Infrastructure", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127295", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127295"}], "article_id": "75c1d66c"}, {"headline": "Amazon Brings AI Tools to Empower Small Indian Sellers", "summary": "Amazon is introducing AI-driven tools to help small-town Indian sellers compete in global markets. The 'Seller Assistant' tool automates product listing, demand forecasting, and daily operations. The initiative targets vendors in Tier-2 and Tier-3 cities, aiming to reduce operational burdens and help them scale their businesses for the upcoming Prime Day sales.", "category": "Technology", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127295", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127295"}], "article_id": "3d6ddf02"}, {"headline": "Embassy Developers to Invest Two Thousand Crore in Housing Projects", "summary": "Embassy Developers Limited plans to invest ₹2,000 crore in various residential projects during the current financial year. The investment aims to ensure timely completion of ongoing construction. Managing Director Aditya Virani stated that the firm is focusing on strengthening its presence in South and West India following a ₹1,200 crore investment in the previous year.", "category": "Business", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127295", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127295"}], "article_id": "8574aa4b"}, {"headline": "Saltstage to Add Twenty Two Properties to Hospitality Portfolio", "summary": "Hospitality firm Saltstage plans to add over 22 new properties to its portfolio this year, bringing its total to 55 hotels. The expansion focuses on mid-tier to premium segments in Western and Southern India. Co-founder Gaurav Gupta noted that the firm is targeting high-growth travel hubs to cater to increasing domestic tourism demand.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127295", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127295"}], "article_id": "9c2cf3a7"}, {"headline": "Tata Electronics iPhone Parts Unit Complies With Environmental Norms", "summary": "Tata Electronics has responded to a show-cause notice from the Tamil Nadu Pollution Control Board regarding alleged wastewater discharge. The company stated that independent laboratory tests confirm its iPhone components factory follows all regulatory standards. Tata emphasized its commitment to environmental conservation and responsible business practices in the Krishnagiri district.", "category": "Business", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127295", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127295"}], "article_id": "a0ec7799"}, {"headline": "Piramal Pharma Distances Itself From GLP One Peptide Race", "summary": "Piramal Pharma is shifting its focus away from generic GLP-1 obesity drugs toward more specialized, high-margin peptide opportunities. Chairperson Nandini Piramal stated that the firm wants to avoid overcrowded markets with low margins. Instead, it is investing in its CDMO business, targeting antibody-drug conjugates and sterile injectables to drive double-digit revenue growth.", "category": "Business", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127295", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127295"}], "article_id": "f3385a87"}, {"headline": "Strong Growth in Domestic Sales Benefits Torrent Pharma", "summary": "Torrent Pharma's shares gained as analysts highlighted its strong 16% operational profit growth in Q4. Domestic sales grew by 15%, significantly outpacing the overall Indian pharma market. Analysts maintain a positive outlook for FY2027, citing the firm's focus on chronic therapy segments and the successful integration of its Curatio acquisition.", "category": "Business", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127295", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/127295"}], "article_id": "462d86e5"}, {"headline": "Nifty Finds Support at Twenty Three Thousand Three Hundred Mark", "summary": "Despite a volatile week, Nifty 50 ended 1.1% higher, breaking a two-week losing streak. Technical analysts identify 23,350-23,300 as a crucial support zone. Market sentiment improved as crude oil prices dropped below $90, but investors remain cautious about foreign fund flows and geopolitical tensions in West Asia.", "category": "Business", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127295", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/127295"}], "article_id": "91f2f522"}, {"headline": "Zerodha Restarts Referral Program Following Regulatory Clarity", "summary": "Stockbroker Zerodha has resumed its referral program after a temporary halt due to regulatory uncertainties regarding brokerage-sharing incentives. The program, which was paused in early 2024, is a key driver for Zerodha's 'word-of-mouth' growth strategy. The move comes as new account openings slowed across the discount brokerage industry.", "category": "Business", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/127295", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/127295"}], "article_id": "7f92a42c"}, {"headline": "Signs of Slowdown in Global AI Investment Theme Says Elara", "summary": "A report by Elara Capital suggests that the global AI investment theme is showing signs of cooling for the first time since May 2025. Investors are rotating away from AI infrastructure and supply chain companies. While core AI firms still hold trust, emerging market funds in Taiwan and South Korea have seen significant outflows totaling $10 billion over six weeks.", "category": "Business", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127295", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/127295"}], "article_id": "26cbae53"}, {"headline": "Royalty Rate Reversal Negative for ONGC and Oil India", "summary": "The government's decision to restore standard royalty rates of up to 20% on onshore oil blocks is expected to hit earnings for ONGC and Oil India. Analysts predict a 5-6% drop in EPS for Oil India, which has significant onshore production. The reversal of a May decision to cut rates aims to protect state government revenues from natural resource extraction.", "category": "Economy", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127295", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/127295"}], "article_id": "c505ba68"}, {"headline": "NLC India to Extract Rare Earth Minerals From Fly Ash", "summary": "NLC India is inviting tenders for a first-of-its-kind project to extract rare earth elements like Samarium and Gadolinium from lignite fly ash. Developed with BARC, the ₹600 crore pilot project aims to secure critical materials for the defense and electronics sectors. Success could lead to a ₹5,000 crore commercial facility, reducing India's reliance on Chinese imports.", "category": "Science", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127295", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127295"}], "article_id": "261a617a"}, {"headline": "High Speed Diesel Ban Affects MSME Operations and Costs", "summary": "A government order restricting the purchase of high-speed diesel from retail outlets for commercial use has hit MSMEs. Small industries using diesel generator sets lack the infrastructure to buy in bulk or store fuel as required for institutional buyers. Industry body FISME plans to petition the Petroleum Ministry to allow mobile dispensers for small-scale units.", "category": "Business", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127295", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127295"}], "article_id": "b705d67a"}, {"headline": "Four Madhya Pradesh Products Awarded Prestigious GI Tags", "summary": "Four traditional products from Madhya Pradesh, including Khajuraho Metal Craft and Sarangpur Handloom Sarees, have received Geographical Indication (GI) tags. Supported by NABARD, the tags also cover Bhopali Batua and Zari-Zardozi work. This recognition aims to protect the unique identity of these crafts and improve the socio-economic status of local artisans.", "category": "Culture", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127295", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127295"}], "article_id": "a8a2dc3d"}, {"headline": "Foreign Currency Borrowing Options to Lower Bank Interest Costs", "summary": "RBI has introduced a foreign currency swap facility to help banks raise funds through overseas borrowings more cheaply. The move could lower borrowing costs by 40-50 basis points compared to domestic deposits. By providing a discounted swap rate until December 2026, the RBI aims to increase dollar inflows and ease the pressure on banks to hike domestic deposit rates.", "category": "Economy", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127295", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127295"}], "article_id": "d4db1371"}, {"headline": "Maharashtra Bans Hospitals From Forcing Medicine Purchases from Internal Pharmacies", "summary": "The Maharashtra Food and Drug Administration (FDA) has prohibited hospitals and doctors from forcing patients to buy medicines only from their in-house pharmacies. A new order mandates that hospitals must provide prescriptions directly to patients to allow external purchases. The move follows complaints that patients were being overcharged by restricted hospital-run pharmacies.", "category": "Health", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127295", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127295"}], "article_id": "dce7274f"}, {"headline": "Modi at Twelve Years Facing Five Major Strategic Challenges", "summary": "As PM Modi completes 12 years in office, his leadership faces five critical challenges: moving past his legacy comparisons with Nehru, managing ties with a potential Trump administration, stabilizing the West Asian crisis, reviving private investment, and managing internal party dynamics and allies in a coalition-style governance system.", "category": "Politics", "page": 5, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127295", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/127295"}], "article_id": "7e07b082"}, {"headline": "Rethink Required on National AI Policy Amid Global Shifts", "summary": "US export controls on powerful AI models like Claude 5 have forced a rethink of India's AI strategy. India must transition from being a mere user of foreign models to a developer of domestic foundations. Treating AI as a strategic sovereign asset is essential for national security and economic independence, moving beyond purely commercial considerations.", "category": "Technology", "page": 5, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127295", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/127295"}], "article_id": "7c2925d6"}, {"headline": "Rising Crisis of Fake AI Music and Video Plays Globally", "summary": "The music industry is battling 'fake plays' generated by AI bots, which divert 10-20% of streaming revenue away from real artists. AI tools now allow scammers to create fake songs and inflate view counts on platforms like YouTube and Spotify. While subscription services have some protection, short-video platforms and independent music creators are increasingly vulnerable.", "category": "Technology", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127295", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/127295"}], "article_id": "e9538190"}, {"headline": "Experts Divided on RBI Status Quo in New Monetary Policy", "summary": "Market analysts and industry leaders have expressed mixed views on the RBI's decision to maintain the repo rate at 5.25%. While some praise the stability provided to borrowers, others worry about the downward revision of GDP growth to 6.6% and rising inflation risks. The policy focuses on attracting foreign capital while keeping a close watch on crude oil prices and monsoon patterns.", "category": "Economy", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127295", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/127295"}], "article_id": "60d3da43"}, {"headline": "Sitharaman Accuses Rahul Gandhi of Undermining India Global Achievements", "summary": "Finance Minister Nirmala Sitharaman criticized Rahul Gandhi for undervaluing India's economic progress and achievements. Speaking in Bengaluru, she stated that despite global crises like COVID-19 and West Asian conflicts, India remains the fastest-growing major economy. She argued that the opposition creates a false narrative of crisis that hurts the country's international image.", "category": "Politics", "page": 9, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127295", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/127295"}], "article_id": "563a141d"}, {"headline": "PM Modi and President Macron Discuss Defense and Nuclear Issues", "summary": "In a bilateral meeting in Nice, PM Narendra Modi and French President Emmanuel Macron agreed to strengthen ties in defense, emerging technology, and civil nuclear energy. Macron expressed interest in collaborating on Small Modular Reactors (SMRs). Both leaders reaffirmed their commitment to the 'India-France Innovation Year 2026' and sovereign technology development.", "category": "World", "page": 10, "importance": 9, "telegram_url": "https://t.me/c/1877410077/127295", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/127295"}], "article_id": "c53fb613"}, {"headline": "Prime Minister Narendra Modi to Visit Slovakia Today", "summary": "PM Modi will begin an official visit to Slovakia today, the first by an Indian PM since the country's independence. Discussions will focus on defense manufacturing, digital technology, and civil nuclear energy. Slovakia has emerged as a key strategic partner for India in Central Europe, particularly after its assistance in evacuating Indian students from Ukraine in 2022.", "category": "World", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127295", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/127295"}], "article_id": "1e3e6425"}, {"headline": "Fourteen Indian Sailors Rescued off Oman Coast from Disabled Ship", "summary": "The Indian Mission in Muscat confirmed that 14 crew members of the Indian-flagged vessel MSV Virat-1 were rescued after its engine failed in the Gulf of Oman. Separately, the mission is working to repatriate the body of Nishant Uyirthnathan, an Indian sailor who died of natural causes aboard the MT Celestia at Duqm port. Indian authorities are providing full support.", "category": "India", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127295", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/127295"}], "article_id": "44814967"}, {"headline": "Army Strength to Grow Under Leadership of General Dhiraj Seth", "summary": "Lieutenant General Dhiraj Seth is set to take over as the new Army Chief on June 30. His tenure is expected to focus on modernization, integrating AI into artillery, and the 'Aatmanirbharta' initiative in defense. Seth has previously held key roles in strategic planning and procurement, emphasizing the development of Integrated Battle Groups for modern warfare.", "category": "India", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127295", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/127295"}], "article_id": "ebd87224"}, {"headline": "Brands Launch Major Promotions as Football World Cup Fever Rises", "summary": "Global and domestic brands like Nike, Decathlon, and Hisense are launching football-themed products and campaigns to capitalize on the 2026 FIFA World Cup. Demand for team jerseys and large-screen TVs has spiked in major cities like Kolkata and Kochi. Companies are using experiential marketing and in-store fan engagement to drive sales among India's growing youth football fanbase.", "category": "Sports", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127295", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 15-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/127295"}], "article_id": "c48c9fa9"}, {"headline": "Noida International Airport Set to Begin Commercial Flight Operations", "summary": "Noida International Airport in Jewar is scheduled to commence flight operations on June 15, 2026. The project is a key infrastructure milestone for the National Capital Region. The airport is projected to reach an annual passenger handling capacity of 30 million by 2031, providing a significant boost to regional connectivity and economic activity in Uttar Pradesh.", "category": "Infrastructure", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127236", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_15-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127236"}], "article_id": "3e0ea69c"}, {"headline": "Election Commission Schedules Rajya Sabha Polls for 24 Seats in June", "summary": "Elections for 24 Rajya Sabha seats across 10 different states will be held on June 18, 2026. These polls are critical for the balance of power in the upper house of Parliament. Political parties are finalizing candidates as the results will influence legislative capabilities and political alliances heading into the next half of the government's term.", "category": "Politics", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127236", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_15-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127236"}], "article_id": "52bcac50"}, {"headline": "Nationwide NEET UG 2026 Re-Examination Scheduled for June 21", "summary": "The National Testing Agency will conduct the NEET UG 2026 re-examination across India on June 21. The move follows administrative decisions regarding the initial examination process. Thousands of medical aspirants are expected to appear for the test, which remains the primary gateway for admission to undergraduate medical courses in the country.", "category": "Education", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127236", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_15-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127236"}], "article_id": "ad07def4"}, {"headline": "NSE Top Investors Expected to Trim Stakes in ₹30,000 Crore IPO", "summary": "The National Stock Exchange (NSE) is expected to file draft IPO documents this week. Major institutional investors, including SBI, Bank of Baroda, and several foreign funds, plan to sell roughly 10% of their holdings via an offer for sale. At a projected valuation of ₹5.14 trillion, the issue size could reach ₹30,000 crore, making it one of India's largest ever share sales.", "category": "Business", "page": 3, "importance": 10, "telegram_url": "https://t.me/c/1877410077/127236", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_15-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/127236"}], "article_id": "e9354e28"}, {"headline": "Auto Parts Makers Shift Strategy to Increase Content Per Vehicle", "summary": "Indian auto component firms are focusing on supplying more products per vehicle to drive growth. Companies like Belrise Industries, Bosch India, and SJS Enterprises report content value increases of 60-100% over 18 months. This shift toward system integration helps automakers manage fewer suppliers and improve operational efficiency as they transition toward electric vehicles.", "category": "Business", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127236", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_15-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/127236"}], "article_id": "ef48ff8f"}, {"headline": "India Ramps Up Jammu and Kashmir Hydropower Projects Totalling $3 Billion", "summary": "India has commenced work on three hydropower projects in Jammu and Kashmir with a combined investment of $3 billion. The projects on the Chenab and Jhelum rivers have a total capacity of 2.35 GW. The initiative aims to use excess water domestically for electricity generation rather than allowing it to flow into Pakistan, following tensions surrounding the Indus Waters Treaty.", "category": "Infrastructure", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127236", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_15-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127236"}], "article_id": "e8318e19"}, {"headline": "Nirmala Sitharaman Attributes Rupee Volatility to Global Factors and Oil Imports", "summary": "Finance Minister Nirmala Sitharaman stated that rupee fluctuations against the US dollar are driven by geopolitical uncertainty, foreign capital movements, and India's dependence on imported crude, gold, and fertilizers. She clarified that the RBI intervenes only to curb excessive volatility and not to fix the exchange rate, using foreign exchange reserves sparingly.", "category": "Economy", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127236", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_15-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127236"}], "article_id": "16eaa4d7"}, {"headline": "IMD Forecasts Heavy Rainfall for North-East and Eastern India Regions", "summary": "The India Meteorological Department (IMD) predicts isolated heavy to very heavy rainfall in West Bengal, Sikkim, Arunachal Pradesh, Assam, and Meghalaya over the next five days. The southwest monsoon has already covered Kerala, Tamil Nadu, and parts of Karnataka and Maharashtra. Conditions remain favorable for further advancement into central and eastern India.", "category": "Environment", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127236", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_15-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127236"}], "article_id": "a7560710"}, {"headline": "BIS Sets Safety Standards and Screening Rules for Siddha Medical Therapies", "summary": "The Bureau of Indian Standards (BIS) has issued new codes of practice for Siddha therapies like Pugai (fumigation) and Poti Timirtal (powder rubbing). The rules mandate pre-treatment screening, written informed consent, and adverse-event reporting. While aimed at boosting consumer safety and wellness tourism, some practitioners argue against applying allopathic-style protocols.", "category": "Health", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/127236", "sources": [{"newspaper": "Mint", "pdf_f
