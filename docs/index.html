": "Hindustan Times", "pdf_filename": "HT-Bangalore - 26-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/118218"}]}, {"headline": "India resumes Iranian LPG imports to secure energy supplies", "summary": "India has purchased its first cargo of Iranian liquefied petroleum gas (LPG) since 2019 after the US temporarily eased sanctions. The cargo was bought in rupees to mitigate supply disruptions in the Strait of Hormuz caused by the West Asia war. While the government aims to diversify sources, the move reflects the urgent need to secure cooking gas supplies for the domestic market.", "category": "Business", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/118218", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 26-03-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/118218"}]}, {"headline": "India raises clean-energy ambition with 60% non-fossil fuel power goal by 2035", "summary": "India pledged that by 2035, 60% of its installed electric capacity will comprise non-fossil sources. The country also aims to reduce emission intensity by 47% per GDP unit from 2005 levels and increase its carbon sink to 3.5 billion tonnes, updating its Nationally Determined Contribution (NDC).", "category": "Environment", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/118166", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -26-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/118166"}]}, {"headline": "Cauvery basin to face dry spell until 2050, says study", "summary": "A study suggests the Cauvery basin may face a 3.5% decline in water by 2050, unlike northern rivers expected to face floods. Researchers warn that water sharing could become tougher, citing historical disputes and failed negotiations.", "category": "Environment", "page": 7, "importance": 8, "telegram_url": "https://t.me/c/1877410077/118166", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -26-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/118166"}]}, {"headline": "An energy transition driven by ethics", "summary": "The article argues that dependence on fossil fuels hinders national security and sovereignty. It highlights critical mineral supply chain bottlenecks and the need for ethical considerations in energy transition, rather than just economic benefits.", "category": "Environment", "page": 9, "importance": 8, "telegram_url": "https://t.me/c/1877410077/118166", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -26-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/118166"}]}, {"headline": "West Asia conflict: how finding oil changed the Persian Gulf ’s ecology", "summary": "The article explores the ecological transformation of the Persian Gulf due to oil exploration and geopolitical tensions. Increased urbanization, pollution, and industrial activities have severely impacted its fragile ecosystems, including mangroves, coral reefs, and dugong populations.", "category": "Environment", "page": 20, "importance": 8, "telegram_url": "https://t.me/c/1877410077/118166", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -26-03-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/118166"}]}, {"headline": "How do human activities contribute to Chennai’s microplastic problem?", "summary": "Research shows Chennai's beach sediments have microplastics, primarily nylon fibres, linked to fishing, synthetic clothes, tourism, and sewage. These pose ecological risks to marine life and potentially human health via contaminated seafood.", "category": "Environment", "page": 22, "importance": 7, "telegram_url": "https://t.me/c/1877410077/118166", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -26-03-2026.pdf", "page": 22, "telegram_url": "https://t.me/c/1877410077/118166"}]}, {"headline": "India approves enhanced climate targets for 2031-2035 period", "summary": "The Union cabinet approved revised climate goals as part of its Nationally Determined Contribution. India aims to reduce the emissions intensity of its GDP by 47% by 2035 from 2005 levels. Other targets include drawing 60% of installed electricity capacity from non-fossil sources and increasing carbon sinks to absorb up to 4 billion tonnes of CO2 equivalent by 2035.", "category": "Environment", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/118218", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 26-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/118218"}]}, {"headline": "Meet on Deendayal Upadhyaya begins despite cancellation order", "summary": "A three-day conference on Deendayal Upadhyaya commenced at Karnataka State Open University (KSOU) in Mysuru despite official directives to cancel it due to protocol violations. KSOU accounts have also been frozen by the government.", "category": "Culture", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/118166", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -26-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/118166"}]}, {"headline": "Zubeen Garg’s death ruled accidental drowning by Singapore court", "summary": "A coroner’s court in Singapore ruled that the death of Assam singer Zubeen Garg was an accidental drowning with no evidence of foul play. The court found high levels of alcohol in his blood but no indication of coercion. The findings contradict conspiracy claims made by the singer's family and supporters following the incident during a cultural festival in Singapore.", "category": "Culture", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/118218", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 26-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/118218"}]}, {"headline": "Bengali writer Ramkumar Mukhopadhyay selected for Saraswati Samman", "summary": "Eminent Bengali novelist Ramkumar Mukhopadhyay has been selected for the prestigious 35th Saraswati Samman (2025) for his work 'Hara Parbati Katha'. The novel reimagines the story of Parvati and Shiva through a modern lens. The award, instituted by the KK Birla Foundation, includes a ₹15 lakh prize. Mukhopadhyay has authored numerous novels and short story collections.", "category": "Culture", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/118218", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 26-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/118218"}]}, {"headline": "City corporations to present budgets on March 27, 28", "summary": "Bengaluru's five city corporations will present their budgets on March 27 and 28, with a total outlay expected to exceed ₹21,000 crore. The State government will provide financial assistance to corporations facing budget deficits.", "category": "Infrastructure", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/118166", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -26-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/118166"}]}, {"headline": "BMRCL extends metro services till 2 a.m. for IPL match at Chinnaswamy stadium on March 28", "summary": "Bengaluru Metro Rail Corporation Ltd. (BMRCL) will extend services until 2 a.m. on March 28 for the TATA IPL T20 match. Last trains from terminal stations will depart later, with extra parking facilities provided at metro stations to ease traffic congestion.", "category": "Infrastructure", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/118166", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -26-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/118166"}]}, {"headline": "Toll charges in Karnataka to rise from April 1", "summary": "Vehicle users in Karnataka will likely face increased toll charges from April 1 due to NHAI's annual revision linked to WPI. The hike is expected to be moderate, around 5%, and will apply to most toll plazas, with some seeing the increase later.", "category": "Infrastructure", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/118166", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -26-03-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/118166"}]}, {"headline": "MoPNG issues directions to strengthen natural gas infra", "summary": "The Ministry of Petroleum and Natural Gas has introduced reforms to accelerate piped natural gas network expansion and improve last-mile connectivity. Reforms include faster approvals for laying pipelines and investor-friendly networks.", "category": "Infrastructure", "page": 14, "importance": 6, "telegram_url": "https://t.me/c/1877410077/118166", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -26-03-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/118166"}]}, {"headline": "Government approves ₹28,840 crore for revamped UDAN air scheme", "summary": "The Union cabinet approved a revamped UDAN regional air connectivity scheme with an outlay of ₹28,840 crore for 10 years. The plan includes developing 100 new airports and 200 modern helipads. It provides viability gap funding to airlines to operate routes in underserved and remote regions, targeting 40 million passengers over the next decade.", "category": "Infrastructure", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/118218", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 26-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/118218"}]}, {"headline": "Ghaziabad administration prepares for Noida International Airport inauguration", "summary": "The Ghaziabad administration has requisitioned 800 buses to transport people to the inauguration of the Noida International Airport on March 28. To manage the expected crowds and traffic, authorities have also ordered schools in the district to conduct online classes. The airport is a major infrastructure project for the National Capital Region.", "category": "Infrastructure", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/118218", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 26-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/118218"}]}, {"headline": "Bengaluru waste collection resumes following dispute over segregation rules", "summary": "Garbage collection in Bengaluru returned to normal after a day of disruption caused by a conflict between contractors and civic authorities. Contractors had resisted new directives regarding manual waste segregation. While services resumed, the administration registered several FIRs against contractors for neglect of duty under the Essential Services Maintenance Act.", "category": "Infrastructure", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/118218", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 26-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/118218"}]}, {"headline": "Andhra CM sets target of 50,000 new hotel rooms", "summary": "Andhra Pradesh Chief Minister N Chandrababu Naidu directed officials to ensure the construction of 50,000 hotel rooms by 2029 to boost tourism. The plan includes 10,000 homestay facilities and new amusement parks in Visakhapatnam and Tirupati. Naidu called for the acceleration of projects approved by the State Investment Promotion Board to enhance hospitality infrastructure.", "category": "Infrastructure", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/118218", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 26-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/118218"}]}, {"headline": "Andhra Pradesh requests central approval for Polavaram project designs", "summary": "Andhra Pradesh Irrigation Minister Nimmala Ramanaidu met with central officials to request immediate approval for pending designs of the Polavaram irrigation project. The state is seeking reimbursement for canal work and support for river embankment strengthening. A high-level team from the Jal Shakti ministry inspected the site following concerns flagged by foreign experts.", "category": "Infrastructure", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/118218", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 26-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/118218"}]}, {"headline": "India’s first repository of major psychiatric disorders launched in Bengaluru", "summary": "CALM-Brain, India's first digital repository of data on brain structure and function from psychiatric disorders, has been launched in Bengaluru. Built on Indian patient data, it will be open-source for clinicians and researchers to study neuropsychiatric disorders.", "category": "Science", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/118166", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -26-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/118166"}]}, {"headline": "Antiprotons take a ride in novel test by CERN scientists", "summary": "CERN scientists successfully transported antiprotons in a specially designed trap on a truck for a road test. This experiment aims to compare matter and antimatter, seeking differences by testing the trap's ability to contain antiprotons during transport.", "category": "Science", "page": 20, "importance": 7, "telegram_url": "https://t.me/c/1877410077/118166", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -26-03-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/118166"}]}, {"headline": "What is mineral water and how does it naturally contain dissolved minerals?", "summary": "Mineral water originates from protected underground reservoirs, acquiring natural minerals over time. Unlike treated tap water, it retains its unique mineral composition, which varies by region and affects taste and bodily functions.", "category": "Science", "page": 21, "importance": 6, "telegram_url": "https://t.me/c/1877410077/118166", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -26-03-2026.pdf", "page": 21, "telegram_url": "https://t.me/c/1877410077/118166"}]}, {"headline": "Study finds world’s oldest dog DNA in modern-day Turkey", "summary": "New research suggests the bond between humans and dogs dates back nearly 16,000 years, which is 5,000 years earlier than previously believed. The findings are based on the discovery of the world's oldest canine DNA in Pinarbasi, Turkey. The study provides fresh insights into the domestication of dogs and their long-standing relationship with human civilizations across the globe.", "category": "Science", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/118218", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 26-03-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/118218"}]}, {"headline": "HC: Venues serving liquor must initiate rigorous age verification protocols", "summary": "The High Court of Karnataka ruled that establishments serving liquor must implement strict age verification, like Aadhaar checks, and re-verify when liquor is ordered by youthful individuals. Managements will be held accountable for minors gaining entry and consuming alcohol.", "category": "Law", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/118166", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -26-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/118166"}]}, {"headline": "One Bill to reintroduce ballot papers in local body polls passed amid walkout", "summary": "A Bill to reintroduce ballot papers in local body polls was passed in the Karnataka Legislative Council amid an Opposition walkout. The Bill also proposes stricter measures against electoral malpractices and aims to strengthen local governance by taxing un-authorized properties.", "category": "Law", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/118166", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -26-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/118166"}]}, {"headline": "DC summoned over delay in providing office space to MLC", "summary": "Legislative Council Chairman Basavaraj Horatti summoned the Bidar Deputy Commissioner over the failure to provide office space to MLC Bhimrao Patil for four years, calling it an affront to the House's dignity.", "category": "Law", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/118166", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -26-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/118166"}]}, {"headline": "The Transgender Persons Amendment Bill, a flawed fix", "summary": "The Transgender Persons Amendment Bill 2026 is criticized for narrowing definitions, conflating sex and gender identity, ignoring intersex rights, and perpetuating colonial structures like the hijra jamath-gharana system. It also lacks intersectional analysis and fails to grant civil/marriage rights.", "category": "Law", "page": 8, "importance": 9, "telegram_url": "https://t.me/c/1877410077/118166", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -26-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/118166"}]}, {"headline": "Vande Mataram advisory ‘not a threat to conform’", "summary": "The Supreme Court stated the advisory on playing the National Song Vande Mataram is not a threat to conform and does not violate freedoms. The court noted that while individual conscience is respected, refusal to sing or stand carries a burden. It termed the petition challenging the advisory as premature.", "category": "Law", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/118166", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -26-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/118166"}]}, {"headline": "Bill strikes dustbin on gender rights amid uproar", "summary": "The Rajya Sabha passed the Transgender Persons Amendment Bill 2026 amid uproar, with two NCTP members resigning citing it as a step backward. The Bill removes self-determination of gender and mandates medical boards for identification, drawing criticism for discrimination.", "category": "Law", "page": 13, "importance": 8, "telegram_url": "https://t.me/c/1877410077/118166", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -26-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/118166"}]}, {"headline": "Supreme Court warns litigant for trying to influence judicial proceedings", "summary": "Chief Justice Surya Kant took exception to an attempt to improperly influence the court after a litigant's father allegedly called the CJI's brother to question a court order. The CJI warned of possible criminal contempt action, stating that judicial decisions cannot be dictated by outside parties. The case involved a petitioner seeking minority benefits through religious conversion.", "category": "Law", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/118218", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 26-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/118218"}]}, {"headline": "UK High Court refuses to reopen Nirav Modi extradition case", "summary": "The High Court of Justice in London rejected fugitive Nirav Modi's bid to reopen his extradition case. The ruling accepted assurances from the Indian government that Modi would not be interrogated by specific agencies and would receive proper medical care. This decision appears to exhaust Modi's legal options in the UK, clearing the path for his return to India after seven years.", "category": "Law", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/118218", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 26-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/118218"}]}, {"headline": "Supreme Court forms SIT to probe minor's assault in Gurugram", "summary": "The Supreme Court established a Special Investigation Team to probe the alleged sexual assault of a four-year-old girl in Gurugram. The court expressed shock at the insensitivity of the local police during the initial investigation and the trauma caused to the victim. The SIT was mandated to ensure a sensitive and professional investigation into the crime.", "category": "Law", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/118218", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 26-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/118218"}]}, {"headline": "Allahabad High Court grants anticipatory bail to Swami Avimukteshwaranand", "summary": "The Allahabad High Court granted anticipatory bail to Swami Avimukteshwaranand Saraswati and a disciple in a case registered under the POCSO Act. The case involved allegations of sexual exploitation of minor disciples. The Swami has previously been in the news for public confrontations with the Uttar Pradesh government regarding his treatment during the Magh Mela.", "category": "Law", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/118218", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 26-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/118218"}]}, {"headline": "Karnataka legislature passes bill to prevent crimes in name of honor", "summary": "The Karnataka Legislative Council passed the Freedom of Choice in Marriage Bill, aimed at preventing violence and honor killings. The legislation makes family or clan consent unnecessary once two adults agree to marry. It introduces a minimum five-year prison sentence for honor killings and mandates police protection for threatened couples within six hours of a complaint.", "category": "Law", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/118218", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 26-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/118218"}]}, {"headline": "Autorickshaw driver arrested for fatal hit-and-run in Bengaluru", "summary": "Bengaluru police arrested a 50-year-old autorickshaw driver for a fatal hit-and-run incident. After striking a 50-year-old woman near Kengeri, the driver allegedly attempted to take her to a hospital but dumped her body in a heap of garbage after she died. The suspect was traced using CCTV footage and technical evidence. The victim was returning from her hometown.", "category": "Law", "page": 3, "importance": 3, "telegram_url": "https://t.me/c/1877410077/118218", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 26-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/118218"}]}, {"headline": "High Court quashes land encroachment FIR against Ravi Shankar", "summary": "The Karnataka High Court set aside an FIR against Art of Living founder Ravi Shankar concerning alleged encroachment of government land in Bengaluru South. The court observed that there were no specific allegations against him in the complaint. The FIR had been registered following a public interest litigation seeking the demolition of structures on the disputed land.", "category": "Law", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/118218", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 26-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/118218"}]}, {"headline": "AAP MLA Harmeet Singh Pathanmajra arrested in rape case", "summary": "Punjab Police arrested AAP MLA Harmeet Singh Pathanmajra from Gwalior, Madhya Pradesh, after he spent six months on the run. Pathanmajra faces charges of rape, cheating, and criminal intimidation following a complaint by a woman who alleged he misrepresented his marital status. The MLA had been declared a proclaimed offender and was caught despite using multiple mobile numbers.", "category": "Law", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/118218", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 26-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/118218"}]}, {"headline": "Supreme Court rules Vande Mataram protocol is advisory", "summary": "The Supreme Court dismissed a petition challenging the government's circular on the national song Vande Mataram, clarifying it is \"advisory in nature.\" The court ruled there is no legal penalty for choosing not to sing the song. The bench stated that the circular merely sets protocol for respect and decorum, and judicial intervention is not required unless coercive action occur.", "category": "Law", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/118218", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 26-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/118218"}]}, {"headline": "Government introduces FCRA amendment to manage assets of cancelled NGOs", "summary": "The Foreign Contribution (Regulation) Amendment Bill, 2026, was introduced in the Lok Sabha, granting the government powers to manage assets created with foreign funds by NGOs whose licenses are cancelled. The bill aims to prevent the misuse of foreign funding for activities detrimental to national interest. It also proposes fixing timelines for the utilization of foreign funds.", "category": "Law", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/118218", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 26-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/118218"}]}, {"headline": "Rajya Sabha clears Transgender Persons Amendment Bill", "summary": "The Rajya Sabha passed the Transgender Persons (Protection of Rights) Amendment Bill 2026 by voice vote. Minister Virendra Kumar stated the bill ensures dignity for the community. However, opposition members and activists expressed concern that the bill's narrow definitions violate constitutional rights to self-determination and privacy, and pleaded for wider community consultation.", "category": "Law", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/118218", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 26-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/118218"}]}, {"headline": "Supreme Court upholds retrospective compensation for highway land acquisition", "summary": "The Supreme Court refused to review its ruling that grants solatium and interest to landowners whose property was acquired for national highways between 1997 and 2015. Despite the NHAI citing a potential ₹29,000-crore liability, the court held that fiscal considerations cannot override the constitutional guarantee of just compensation for land-losers.", "category": "Law", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/118218", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 26-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/118218"}]}, {"headline": "‘AI is not just a tech wave, it is a reordering of global capability’", "summary": "M.R. Rangaswami stated that AI is reshaping every sector, with Indian startups collectively raising $3.6 billion. He highlighted India's advantage in the AI era and the reordering of global capability driven by Indian talent. AI is seen as transforming industry and innovation.", "category": "Technology", "page": 5, "importance": 8, "telegram_url": "https://t.me/c/1877410077/118166", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -26-03-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/118166"}]}, {"headline": "US judge questions govt.’s motives for labelling Anthropic as a security threat", "summary": "A federal judge questioned the government's motives for designating AI company Anthropic a national security risk. The judge expressed skepticism, suggesting it could be retaliation for Anthropic criticizing government contracting positions.", "category": "Technology", "page": 15, "importance": 7, "telegram_url": "https://t.me/c/1877410077/118166", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -26-03-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/118166"}]}, {"headline": "California jury finds social media platforms liable for child addiction", "summary": "In a first-of-its-kind ruling, a California jury held Instagram and YouTube responsible for design features that addicted a young user, awarding the plaintiff $3 million. The lawsuit claimed the platforms ignored mental health risks. The verdict could influence thousands of similar lawsuits filed against social media companies regarding their impact on the well-being of minors.", "category": "Technology", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/118218", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 26-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/118218"}]}, {"headline": "Union cabinet approves ₹1,800 crore for IVFRT immigration project", "summary": "The Union cabinet approved ₹1,800 crore for the continuation of the Immigration, Visa, Foreigners Registration & Tracking (IVFRT) project for five years. The project integrates functions related to visa issuance and the registration of foreigners to facilitate legitimate travel while strengthening national security. It maintains a database of arrivals and hotel stays across India.", "category": "Technology", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/118218", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 26-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/118218"}]}, {"headline": "Donald Trump appoints tech leaders to new presidential AI council", "summary": "Donald Trump has established a Council of Advisors on Science and Technology to focus on artificial intelligence policy. The council includes industry leaders such as Mark Zuckerberg, Larry Ellison, and Jensen Huang. Chaired by venture capitalist David Sacks, the group will advise the administration on science-related issues and the development of AI frameworks for the United States.", "category": "Technology", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/118218", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 26-03-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/118218"}]}, {"headline": "System of apprenticeship has ‘completely changed’", "summary": "T.K. Kurien noted that the apprenticeship system has fundamentally changed, with professionals needing to understand the 'why' of operations, not just the 'what'. He urged educational systems to adapt to this shift towards co-creation and real-world complexity.", "category": "Education", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/118166", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -26-03-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/118166"}]}, {"headline": "Indian universities double presence in global top 50 subject rankings", "summary": "The number of Indian higher education institutions ranked in the top 50 globally for specific subjects rose to 27 in the 2026 QS World University Rankings. IIT Bombay and IIT Delhi broke into the top 50 for computer science. While overall participation increased, some premier institutions saw slight rank drops in broad engineering categories due to rising global competition.", "category": "Education", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/118218", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 26-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/118218"}]}, {"headline": "‘State better placed than its neighbours in fiscal deficit’", "summary": "Chief Minister Siddaramaiah claimed Karnataka's fiscal deficit is within limits and better than neighbouring states. He blamed Centre's policies for revenue deficits and stated loans are utilized for public welfare. Debt is high in developed economies, he noted.", "category": "Politics", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/118166", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -26-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/118166"}]}, {"headline": "Banter over CM’s shawl presented at ‘auspicious’ time", "summary": "Chief Minister Siddaramaiah's shawl choice and presenting the budget at an 'auspicious' time sparked a light-hearted exchange in the Assembly. He defended his choices and invoked social reformer Basavanna, drawing laughter.", "category": "Politics", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/118166", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -26-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/118166"}]}, {"headline": "Mahadayi, Upper Krishna projects raise debate", "summary": "The Mahadayi drinking water project triggered a debate between CM Siddaramaiah and LoP Arvind Bellad. Bellad questioned the Congress's commitment to Mahadayi, while Siddaramaiah accused the BJP of stalling the project. Both sides traded barbs over fiscal deficit and project completion.", "category": "Politics", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/118166", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -26-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/118166"}]}, {"headline": "Govt. furnishes 96% replies after eviction of encroachers deadline", "summary": "The government provided responses to 96% of the 1,573 questions raised during the Budget session before the Chairman's deadline, improving compliance. Chairman Basavaraj Horatti had warned of action against officials for delays.", "category": "Politics", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/118166", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -26-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/118166"}]}, {"headline": "Democracy, dissent and the ‘national image’ debate", "summary": "The article discusses the tension between dissent and the state in democracies, arguing that protests demonstrating democratic credentials can be misconstrued as anti-national. It highlights how the government and mass media often blur the lines between criticism of policy and disloyalty to the nation.", "category": "Politics", "page": 8, "importance": 8, "telegram_url": "https://t.me/c/1877410077/118166", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -26-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/118166"}]}, {"headline": "Tidings from Kejriwal’s comeback", "summary": "The article discusses Arvind Kejriwal's return to Delhi's political scene after his discharge from a liquor policy case. It highlights the challenges for the BJP government in Delhi and the potential impact of Kejriwal's reappearance on state politics.", "category": "Politics", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/118166", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -26-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/118166"}]}, {"headline": "Rural Telangana’s verdict on the Congress, BRS and BJP", "summary": "The analysis of Telangana's rural local body elections shows the Congress winning 53.7% of gram panchayats, BRS 27.7%, and BJP 5.5%. MLA defections significantly impacted BRS performance, while the Congress showed strength in tribal and Dalit seats.", "category": "Politics", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/118166", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -26-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/118166"}]}, {"headline": "Cong. gets notice to vacate its iconic 24 Akbar Road office", "summary": "The Congress has been issued a notice to vacate its 24 Akbar Road office by March 28. The party is considering its strategy and legal options, while sources indicate it may not vacate the premises.", "category": "Politics", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/118166", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -26-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/118166"}]}, {"headline": "Congress questions Modi govt.’s ‘U-turn’ on women’s quota law", "summary": "The Congress accused the Modi government of a U-turn on the women's reservation law, demanding immediate implementation after delimitation and census. They criticized the move as a 'weapon of mass diversion' from policy failures.", "category": "Politics", "page": 13, "importance": 6, "telegram_url": "https://t.me/c/1877410077/118166", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -26-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/118166"}]}, {"headline": "FM defends Centre’s right to levy cess, says Constitution allows it", "summary": "Finance Minister Nirmala Sitharaman reiterated the Centre's constitutional right to levy cesses and surcharges, stating that over the last six years, the Centre spent 105% of its collections on States. She rejected claims of unfair levies.", "category": "Politics", "page": 14, "importance": 7, "telegram_url": "https://t.me/c/1877410077/118166", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -26-03-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/118166"}]}, {"headline": "Seven CAPF personnel removed from poll duty for attending Iftar", "summary": "The Election Commission removed seven Central Armed Police Forces personnel from election duty in West Bengal. The action was taken after they allegedly attended an Iftar gathering hosted by a local politician in Murshidabad district, which violated neutrality guidelines. The incident came to light after photographs of the event were circulated on social media.", "category": "Politics", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/118218", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 26-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/118218"}]}, {"headline": "AIADMK releases first list of 23 candidates for Tamil Nadu", "summary": "The AIADMK announced its first list of 23 candidates for the Tamil Nadu assembly elections. General Secretary Edappadi K Palaniswami will contest from Edappadi. The party will contest 169 seats, while its NDA allies will contest 65. The party's manifesto promises monthly allowances for women and free cooking gas cylinders to offset rising costs.", "category": "Politic     const seg=document.createElement('div');
    seg.className='pseg'+(i<ai?' done':i===ai?' active':'');
    p.pRow.appendChild(seg);
  });
}

function syncV(ci,animated) {
  const p=panels[ci],h=p.vFeed.getBoundingClientRect().height;
  p.vTrack.style.transition=animated?'transform 0.35s cubic-bezier(0.4,0,0.2,1)':'none';
  p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;
  buildPRow(ci);
}

function goArt(d) {
  const p=panels[catIdx];
  const n=Math.max(0,Math.min(p.artIdx+d,p.articles.length-1));
  if(n===p.artIdx&&d!==0)return;
  p.artIdx=n; syncV(catIdx,true); dismiss();
}

function goCat(idx,animated=true) {
  idx=Math.max(0,Math.min(idx,sortedCats.length-1));
  if(idx===catIdx&&animated)return;
  const prev=catIdx; catIdx=idx;
  hTrack.style.transition=animated?'transform 0.38s cubic-bezier(0.4,0,0.2,1)':'none';
  hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;
  if(animated&&idx!==prev) {
    const m=CAT_META[sortedCats[idx]]||{color:"#e8334a",icon:"📰"};
    catFlash.style.background=m.color+'18';
    cfIcon.textContent=m.icon; cfName.textContent=sortedCats[idx]; cfName.style.color=m.color;
    catFlash.classList.add('on'); setTimeout(()=>catFlash.classList.remove('on'),500);
  }
  dismiss();
}

let dismissed=false;
function dismiss() {
  if(dismissed)return; dismissed=true;
  hintUp.classList.remove('visible'); hintRight.classList.remove('visible');
  hintUp.classList.add('gone'); hintRight.classList.add('gone');
}

(function initHints() {
  const KEY='dailyBriefHintSeen';
  if(!localStorage.getItem(KEY)) {
    localStorage.setItem(KEY,'1');
    setTimeout(()=>{ if(!dismissed){ hintUp.classList.add('visible'); hintRight.classList.add('visible'); } },2500);
  }
})();

let tsX=0,tsY=0,tcX=0,tcY=0,axis=null,drag=false;
outer.addEventListener('touchstart',e=>{
  tsX=e.touches[0].clientX; tsY=e.touches[0].clientY;
  tcX=0; tcY=0; axis=null; drag=true;
  hTrack.style.transition='none';
  const p=panels[catIdx]; if(p)p.vTrack.style.transition='none';
},{passive:true});
outer.addEventListener('touchmove',e=>{
  if(!drag)return;
  const dx=e.touches[0].clientX-tsX,dy=e.touches[0].clientY-tsY;
  tcX=dx; tcY=dy;
  if(!axis&&(Math.abs(dx)>8||Math.abs(dy)>8))axis=Math.abs(dx)>Math.abs(dy)?'h':'v';
  if(!axis)return;
  e.preventDefault();
  if(axis==='h'){
    const edge=(catIdx===0&&dx>0)||(catIdx===sortedCats.length-1&&dx<0);
    hTrack.style.transform=`translateX(${-catIdx*vpW+dx*(edge?.14:1)}px)`;
  }else{
    const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height;
    const edge=(p.artIdx===0&&dy>0)||(p.artIdx===p.articles.length-1&&dy<0);
    p.vTrack.style.transform=`translateY(${-p.artIdx*h+dy*(edge?.14:1)}px)`;
  }
},{passive:false});
outer.addEventListener('touchend',()=>{
  if(!drag)return; drag=false;
  if(axis==='h'){
    const t=vpW*.2;
    if(tcX<-t)goCat(catIdx+1);
    else if(tcX>t)goCat(catIdx-1);
    else{hTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;}
  }else if(axis==='v'){
    const t=vpH*.2;
    if(tcY<-t)goArt(1);
    else if(tcY>t)goArt(-1);
    else{const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height;p.vTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;}
  }
  axis=null;
},{passive:true});

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'||e.key===' '){e.preventDefault();goArt(1);}
  if(e.key==='ArrowUp'){e.preventDefault();goArt(-1);}
  if(e.key==='ArrowRight'){e.preventDefault();goCat(catIdx+1);}
  if(e.key==='ArrowLeft'){e.preventDefault();goCat(catIdx-1);}
});
let wl=false;
outer.addEventListener('wheel',e=>{
  e.preventDefault();if(wl)return;wl=true;
  Math.abs(e.deltaX)>Math.abs(e.deltaY)?goCat(catIdx+(e.deltaX>0?1:-1)):goArt(e.deltaY>0?1:-1);
  setTimeout(()=>wl=false,500);
},{passive:false});
window.addEventListener('resize',()=>{
  vpW=outer.offsetWidth;vpH=outer.offsetHeight;
  hTrack.style.transition='none';
  hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;
  panels.forEach(p=>{
    const h=p.vFeed.getBoundingClientRect().height;
    p.vTrack.querySelectorAll('.card').forEach(c=>c.style.height=h+'px');
    p.vTrack.style.transition='none';
    p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;
  });
});

buildAll();
</script>
</body>
</html>
