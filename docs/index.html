engaluru_Mint_13-03-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "Tencent Plans Renewed Investment in India Following Eased FDI Rules", "summary": "Chinese tech giant Tencent has signaled a renewed appetite for India’s digital economy after the relaxation of Press Note 3. The firm aims to support innovations in technology, video gaming, and digital content. While the relaxation is limited and large restrictions remain, industry experts expect improved capital inflow and the revival of stalled deals across the startup ecosystem.", "category": "Business", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "Seed Funding Remains Robust While Late-Stage Startup Funding Shrinks", "summary": "RTP Global partner Nishit Garg states that while seed and early-stage startup funding in India remain active, late-stage funding has slowed significantly. AI technologies have shrunk product development timelines, but winning customers and scaling takes longer. Investors are rejecting simple AI wrappers, looking instead for deep tech solutions with defensible global market advantages.", "category": "Business", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "Oracle’s Stake in TikTok US Joint Venture Valued at 2 Billion Dollars", "summary": "A regulatory filing shows Oracle’s stake in TikTok’s US business is worth approximately $2 billion. This follows a deal where Chinese parent ByteDance set up a majority-owned American joint venture to avoid a ban. Under the agreement, US and global investors hold an 80.1% stake in the TikTok USDS joint venture, while ByteDance retains 19.9% ownership.", "category": "Business", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "Coal India Sales Decline as Renewable Energy Generation Grows 23 Percent", "summary": "Coal India Ltd faces a structural decline in demand as India adds significant renewable energy capacity. Thermal power generation fell 4.4% in the first 11 months of FY26, while renewable generation grew 23%. Although global price hikes provide temporary support for e-auctions, the company's sales volumes and market share are under pressure from captive mines and green energy shifts.", "category": "Business", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "Ambuja Cements Shifts Strategy Toward Value Over Rapid Volume Expansion", "summary": "Ambuja Cements is pivoting to a value-over-volume strategy, prioritizing profit margins over rapid capacity additions. The management aims to improve utilization from 70% to 85% before pursuing further expansion. The shift includes increasing the share of premium products and implementing cost-reduction measures at acquired units like Sanghipuram to boost overall profitability.", "category": "Business", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "West Asia War Intensifies Pressure on India’s Multi-Year IPO Boom", "summary": "The escalating conflict in West Asia threatens to slow India's IPO market in 2026. High-profile listings for startups and renewable firms may be delayed as market sentiment turns cautious. Listing gains have already dropped significantly, with 2026 IPOs averaging just 0.3% premium. Institutional and retail participation has declined due to weak recent performances and geopolitical uncertainty.", "category": "Business", "page": 8, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "Aster DM Healthcare and Quality Care to Merge in 7 Billion Dollar Deal", "summary": "Aster DM Healthcare India has secured approval to merge with Blackstone-backed Quality Care India. The deal, expected to close in Q1 FY27, will create a hospital giant valued at over $7 billion. Blackstone will become the largest shareholder with a 30.7% stake. The merged entity, Aster DM Quality Care, will leverage Blackstone’s global scale to expand its digital health and real estate operations.", "category": "Business", "page": 9, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "IndiGo CEO Pieter Elbers Exits as Founder Rahul Bhatia Takes Interim Charge", "summary": "IndiGo CEO Pieter Elbers has stepped down with immediate effect, leading founder Rahul Bhatia to take over as interim chief. Despite the sudden exit, the airline's shares remained resilient as Bhatia promised to rebuild passenger trust following operational lapses in December. Analysts expect the airline's growth strategy to remain intact while the board searches for a permanent successor.", "category": "Business", "page": 9, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "HCLTech and Infosys Offer Remote Work Amid LPG Supply Disruptions", "summary": "Major IT firms HCLTech and Infosys have issued advisories to employees in Chennai and Bengaluru, offering work-from-home options as a cooking gas shortage disrupts cafeteria operations. The LPG crunch, exacerbated by the West Asia conflict, has forced several vendors to halt operations. India Inc is increasingly feeling the ripple effects of energy supply chain disruptions.", "category": "Business", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "Luxury Market Splits as Ultra-Rich Keep Spending While Aspirational Buyers Cut Back", "summary": "India's luxury market is seeing a divergence, with ultra-luxury brand Hermes reporting 32.9% revenue growth while mid-tier labels like Gucci and Dior face declines. Aspirational consumers are cutting back due to inflation and job insecurity, while the ultra-wealthy remain resilient. Weakening rupee and high import tariffs have also made international luxury brands significantly costlier in India.", "category": "Business", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "Papa John’s Draws Takeover Interest from Qatari Backed Investment Fund", "summary": "A Qatari-backed fund, Irth Capital Management, has submitted a $1.5 billion bid to take pizza chain Papa John’s International private. The offer price of $47 per share represents a 50% premium. Papa John’s has struggled with increasing competition and declining sales in recent years. The fund is supported by Brookfield Asset Management and members of the Qatari royal family.", "category": "Business", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "NSE Picks 20 Banks and 8 Law Firms for Mega IPO", "summary": "The National Stock Exchange has finalized its team of intermediaries for a proposed IPO that could raise up to $2.5 billion. The selection includes global banks like Morgan Stanley and JP Morgan alongside major domestic firms. Eight law firms have also been appointed to advise on the sale. The IPO would involve selling a 4-4.5% stake and could take eight months to complete.", "category": "Business", "page": 13, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "Packaged Water Manufacturers Hike Prices as War Costs Disrupt Supply Chains", "summary": "Approximately 2,000 small packaged water makers in India have increased reseller prices by 5% as war-linked disruptions drive up material costs. The cost of plastic bottle material has jumped 50%, while cap prices have doubled. While retail prices for major brands remain stable for now, manufacturers warn of further hikes as the West Asia conflict impacts the $5 billion market.", "category": "Business", "page": 13, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "Yes Bank Appoints Vinay Muralidhar Tonse as New CEO and MD", "summary": "Yes Bank has appointed Vinay Muralidhar Tonse as its managing director and CEO for a three-year term starting April 6. Tonse succeeds Prashant Kumar, who led the bank through its 2020 reconstruction. The appointment follows the Reserve Bank of India's approval and coincides with Sumitomo Mitsui Banking Corp's acquisition of a 24.2% stake in the private sector lender.", "category": "Business", "page": 13, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "Furniture Rental Market Booms as Urban Mobility and Flexibility Needs Grow", "summary": "Renting furniture and appliances is becoming a popular choice for urban professionals who prioritize mobility over ownership. Platforms like Furlenco and RentoMojo offer lower upfront costs and maintenance ease, though experts warn that renting for over a year can exceed the purchase price. The \"subscription lifestyle\" appeals particularly to people in shared housing or temporary city stays.", "category": "Business", "page": 15, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "Multi-Asset Allocation Funds See Record Inflows Amid Market Volatility", "summary": "Multi-asset funds recorded their highest-ever monthly inflows of ₹8,476 crore in February as investors sought diversification. These funds invest across equity, debt, and commodities like gold or industrial metals. Experts note that while they may not match equity peaks, they offer lower volatility and tax-efficient rebalancing, serving as a core portfolio holding for conservative investors.", "category": "Business", "page": 15, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "Mini Cooper S Convertible Offers Quirky Indulgence for Urban DINK Life", "summary": "The new Mini Cooper S Convertible caters to the \"Double Income No Kids\" (DINK) demographic, prioritizing driving joy over practical needs. The compact car features a 2.0-litre turbo petrol engine and high-end digital interiors, including personal profile memory. While impractical for large families or cargo, it targets urban buyers seeking agile performance and a premium lifestyle experience.", "category": "Business", "page": 18, "importance": 4, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "Gig Worker Welfare Fee: IAMAI Urges Karnataka to Defer Levy", "summary": "The Internet and Mobile Association of India (IAMAI) has requested the Karnataka government to postpone the levy of a welfare fee on e-commerce platforms. The proposed fee, between 1% and 2% of annual turnover, is intended for gig worker social security. IAMAI argues that the center and state must first align on a mechanism to avoid double taxation and operational hurdles.", "category": "Business", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116780", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "La Caisse to Deploy $3 Billion More in India's Green Energy", "summary": "Canada’s second-largest pension fund, CDPQ (La Caisse), plans to invest an additional $3 billion in India over the next 4-5 years. CEO Charles Emond stated the fund is focusing on green energy, infrastructure, and real estate. Emond praised India's political stability and consistent policy environment, noting that 10% of the fund's global portfolio is now allocated to the APAC region.", "category": "Business", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116780", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "Bandhan Financial Looks to Provide Exit for Long-Term Investors", "summary": "Bandhan Financial Services, the promoter of Bandhan Bank, is exploring options including a private stake sale or an IPO to provide an exit for long-term investors like GIC and IFC. These investors have held stakes since 2011 and 2015. The move comes as the microfinance institution looks to strengthen its capital base and manage its shareholding structure under regulatory guidelines.", "category": "Business", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116780", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "Food Delivery and QSR Stocks Slip Amid Commercial LPG Shortage", "summary": "Shares of Quick Service Restaurants (QSRs) and food delivery firms like Zomato and Swiggy declined following reports of a commercial LPG shortage. The supply disruption, caused by the conflict in the Gulf, has forced some restaurants to shift to alternative fuels or reduce menus. Investors fear that prolonged shortages could impact operational margins and consumer demand in the quarter.", "category": "Business", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116780", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "Bayer CEO Calls for Stronger IP Protection to Draw Investment", "summary": "In an interview, Bayer CEO Bill Anderson emphasized that stronger intellectual property (IP) protection and regulatory data exclusivity are crucial for drawing global investment into India's life sciences sector. He stated that while India is a key growth market for Bayer's agriculture and pharma businesses, clear legal frameworks would accelerate the introduction of cutting-edge medicines.", "category": "Business", "page": 13, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116780", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "Capgemini to Set Up 15,000-Seat Delivery Center in Vizag", "summary": "Global IT services major Capgemini is planning to establish a large-scale delivery center in Visakhapatnam with a capacity for 15,000 employees. The move is part of the company's 'follow the talent' strategy to expand beyond major metropolitan hubs. The center will focus on digital engineering, cloud services, and AI, potentially creating 20,000 jobs in the Andhra Pradesh region.", "category": "Business", "page": 14, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116780", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "Packaged Food Companies Slash Production Amid LPG Supply Crunch", "summary": "Major food manufacturers, including makers of snacks and biscuits, have significantly reduced production due to a shortage of commercial LPG. The supply chain disruptions from the Gulf have caused some firms to switch to charcoal or electric ovens. Industry experts warn that prolonged fuel scarcity could lead to price hikes and product shortages on retail shelves in the coming weeks.", "category": "Business", "page": 15, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116780", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "Accel Leads Fund Likely to Join Rapido's $600 Million Round", "summary": "US-based Accel is reportedly leading a $550-600 million funding round for Indian bike-taxi startup Rapido. The investment is expected to value the company at approximately $3 billion. Existing investors Prosus and WestBridge Capital are also participating. The funds will be used to expand Rapido’s fleet and strengthen its position in the competitive urban mobility and food delivery sectors.", "category": "Business", "page": 17, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116780", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "Flipkart and Amazon Expand Dark Stores to Protect Quick Commerce", "summary": "E-commerce giants Flipkart and Amazon are rapidly expanding their network of 'dark stores' to compete with rising quick commerce players like Zepto and Blinkit. Amazon is planning to set up 500 such stores, while Flipkart aims to add 100 new centers every month. The move signals a shift in strategy as larger players look to capture the growing demand for 10-minute grocery delivery.", "category": "Business", "page": 17, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116780", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "Chip Firms Tap Gujarat Government for Free Trade Zones", "summary": "Major semiconductor equipment manufacturers, including Lam Research and Applied Materials, have approached the Gujarat government to set up exclusive free trade zones and shared warehouses. These zones would allow companies to import and store components without paying import duties, streamlining the supply chain for India's emerging semiconductor manufacturing ecosystem in Dholera.", "category": "Business", "page": 17, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116780", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "Liberia-flagged crude carrier Shenlong transits Hormuz Strait to Mumbai", "summary": "A Liberia-flagged Suezmax tanker, Shenlong, delivered Saudi Arabian crude to Mumbai port after transiting the Strait of Hormuz. This marks the first India-bound crude shipment to clear the critical energy choke point since shipping traffic dropped due to the West Asia war. The vessel reportedly switched off its AIS tracking while crossing the high-risk zone.", "category": "Business", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116770", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 13~03~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116770"}]}, {"headline": "LPG shortage threatens wedding functions across major Indian cities", "summary": "A severe shortage of 19-kg commercial LPG cylinders is impacting catering services during the peak wedding season. In Chennai, caterers report open-market prices jumping from ₹2,000 to nearly ₹8,000 per cylinder. Some service providers are considering switching to firewood stoves, while others are trimming menus and reducing live food stations to manage limited stocks.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116770", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 13~03~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/116770"}]}, {"headline": "Bunker fuel price surge hits Indian exporters following Hormuz closure", "summary": "Global shipping lines including Maersk and Hapag-Lloyd are introducing emergency fuel surcharges as bunker fuel prices crossed $1,000 per metric tonne. The additional charges, ranging from $70 to $225 per container, come as the closure of the Strait of Hormuz disrupts 20% of global fuel shipments, significantly increasing logistics costs for Indian cargo movements to Europe and the US.", "category": "Business", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116770", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 13~03~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/116770"}]}, {"headline": "Medical tourism from West Asian markets faces early signs of disruption", "summary": "The ongoing West Asia conflict is impacting India's medical tourism sector, with footfalls from the region dropping by up to 75% at some facilities. Hospitals like Fortis and SRM Global reported delays and postponements due to flight cancellations and airspace restrictions. Healthcare majors are now looking to diversify their patient base to Africa and Southeast Asia.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116770", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 13~03~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/116770"}]}, {"headline": "Corporate canteens rationalise menus and switch to electric cooking", "summary": "Major institutional catering firms like Rassense and Compass Group are redesigning corporate menus to reduce reliance on LPG. Measures include introducing 'business continuity menus' featuring steamed foods and using induction cooktops or boilers. Infosys has asked some employees to work from home and realigned food court operations at its Pune and Bengaluru campuses.", "category": "Business", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116770", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 13~03~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/116770"}]}, {"headline": "West Asia crisis threatens India's $260 million tyre export market", "summary": "The Automotive Tyre Manufacturers Association (ATMA) warned that geopolitical tensions could disrupt tyre exports worth $260 million annually to West Asian markets. The industry is facing rising raw material costs as crude oil derivatives account for 70% of production costs. ATMA has urged the government to increase duty drawback rates and facilitate easier natural rubber imports.", "category": "Business", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116770", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 13~03~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/116770"}]}, {"headline": "Bengaluru's Oterra hotel dodges LPG crisis with electric induction systems", "summary": "Five-star hotel The Oterra in Bengaluru has remained insulated from the commercial LPG shortage by utilizing industrial induction cooktops powered by renewable energy. The luxury business hotel shifted from gas-based cooking as part of a sustainability strategy, limiting its daily LPG usage to just one or two cylinders for specialized equipment.", "category": "Business", "page": 3, "importance": 3, "telegram_url": "https://t.me/c/1877410077/116770", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 13~03~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/116770"}]}, {"headline": "NSE active investor base grows by 3.56 lakh in February", "summary": "Retail participation in equity markets showed signs of revival as the National Stock Exchange added 3.56 lakh active investors in February. Groww led the additions with 2.66 lakh new clients. Market analysts suggest the uptick reflects a long-term shift toward market-linked investments and investors returning to the market during recent price corrections.", "category": "Business", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116770", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 13~03~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/116770"}]}, {"headline": "GSP Crop Science to launch ₹478 crore IPO on Monday", "summary": "Ahmedabad-based agrochemical manufacturer GSP Crop Science will open its initial public offering on March 16 with a price band of ₹304-320. The issue comprises a fresh issue of ₹240 crore and an offer for sale of ₹238 crore. Proceeds will be used for debt repayment and working capital requirements. The promoters plan to dilute their holding to approximately 74%.", "category": "Business", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116770", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 13~03~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/116770"}]}, {"headline": "Infosys expands Mohali development centre to support AI-led solutions", "summary": "Infosys held a groundbreaking ceremony for a new 3.5-lakh-sq-ft software development block at its Mohali campus. The expansion will seat an additional 3,000 employees and focus on designing and deploying AI-led solutions for global clients. The Punjab government noted the investment will strengthen the state's position as an emerging innovation hub.", "category": "Business", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/116770", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 13~03~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/116770"}]}, {"headline": "Air India seeks pilot flight duty relaxation amid airspace closures", "summary": "The DGCA is reviewing a request from Air India for a 90-115 minute relaxation in pilot flight duty time limits. The airline cited operational constraints caused by the closure of Iranian and Iraqi airspace, which has forced longer flight routings via Egypt and Greece. Outbound flights to the US currently require technical stops in Rome and Vienna.", "category": "Business", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116770", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 13~03~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/116770"}]}, {"headline": "ED attaches land worth ₹581 crore in Reliance Group probe", "summary": "The Enforcement Directorate provisionally attached 31 immovable properties worth ₹581.65 crore linked to Reliance Home Finance and Reliance Commercial Finance. The agency alleges that public funds totaling over ₹11,000 crore were diverted to various Reliance Group companies. Total attachments in the Anil Ambani-linked case have now reached ₹16,310 crore.", "category": "Business", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "Demand for instant tea rises amid LPG supply concerns", "summary": "The Guwahati Tea Auction Buyers’ Association reported an increase in sales of instant tea and tea bags following government alerts about LPG shortages. Manufacturers noted that instant tea is more energy-efficient as it requires less boiling time compared to traditional tea. Vendors hope this trend will open new export opportunities for value-added tea products.", "category": "Business", "page": 13, "importance": 3, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "U.S. probes India and 15 others over discriminatory trade policies", "summary": "The United States has launched Section 301 investigations into 16 economies, including India and China, to determine if their policies burden U.S. commerce. The probe focuses on structural excess capacity in sectors like steel, textiles, and solar modules. This move follows the Supreme Court's striking down of reciprocal tariffs and could lead to new trade barriers.", "category": "Business", "page": 15, "importance": 9, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "AC industry insulated from supply chain shocks by local manufacturing", "summary": "Despite rising energy costs and metal prices, major air conditioner manufacturers in India remain protected from supply chain disruptions due to increased localization. While the cost of copper and other raw materials has risen, technical societies note that the shift of manufacturing units to India has provided a buffer against geopolitical instability in West Asia.", "category": "Business", "page": 15, "importance": 4, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "Synthetic fiber industry hit by PTA and MEG price surge", "summary": "Prices for PTA and MEG, key raw materials for synthetic fibers, surged following disruptions in West Asian supply chains. The war has caused crude oil price volatility, leading to a ₹20.48/kg price hike in a single day. Downstream textile industries are struggling to absorb the costs, with manufacturers of polyester yarn gradually passing the burden to the market.", "category": "Business", "page": 15, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "Food delivery firms Zomato and Swiggy may face Q4 revenue dip", "summary": "Brokerage reports suggest food delivery platforms could see a moderation in order volumes as restaurants shut down or reduce menus due to commercial LPG shortages. About 60% of India's LPG is imported, and supply disruptions typically impact kitchen operations within 72 hours. Most restaurants maintain only 2-6 days of fuel inventory, creating a bottleneck for the delivery sector.", "category": "Business", "page": 15, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "Sensex Hits Record High Following RBI Surplus Transfer News", "summary": "The Indian stock market indices, Sensex and Nifty, hit all-time highs following the RBI's announcement of a record surplus transfer to the government. Investor sentiment was bolstered by the prospect of improved fiscal health and increased public spending. Banking and financial stocks led the rally, with major conglomerates also seeing significant gains.", "category": "Business", "page": 14, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116738", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 13~03~2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/116738"}]}, {"headline": "Centre adds precursor chemical for mephedrone to list of controlled substances", "summary": "The Union government issued a notification adding the chemical 2-Bromo-4-Methylpropiophenone to the list of controlled substances under the NDPS Act. The precursor chemical is extensively used by drug cartels to manufacture mephedrone, also known as \"meow meow.\" The move aims to shut down clandestine drug laboratories that have mushroomed across several Indian states.", "category": "Health", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Medical tourism in India drops 30% amid West Asia regional tensions", "summary": "Hospital chains including Fortis and Aster DM report a significant decline in international patient inflows due to the West Asia conflict. Patients from the region, typically seeking heart surgeries and transplants, have seen a 75% footfall drop in early March. Industry sources estimate a 20% hit to international medical tourism revenue this month as travel disruptions persist.", "category": "Health", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116815", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 13-03-2026 .pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/116815"}]}, {"headline": "Hospitals activate contingency plans amid cooking gas shortage", "summary": "Major hospitals in Bengaluru, including Victoria and Bowring, have stocked emergency food and fuel sources to handle potential LPG disruptions. Kitchens are exploring alternative fuels like electricity and firewood, and some have adjusted menus to include more steamed or cold items to ensure patient nutrition is not compromised.", "category": "Health", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116795", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "Some Nandini milk samples found with 0.2% adulteration", "summary": "Karnataka Animal Husbandry Minister K Venkatesh informed the state council that 0.2% of Nandini milk samples tested showed signs of adulteration. Tests conducted across 15 districts found substances like salt and neutralizers in some batches. The government has directed stricter quality checks at dairy cooperatives to ensure consumer safety.", "category": "Health", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116795", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "Govt justifies barring transgender people from donating blood", "summary": "The Centre justified its policy of barring transgender people and sex workers from donating blood, citing health studies that show a higher risk of HIV and Hepatitis infections in these groups. The government stated the policy is based on scientific evidence and international standards to ensure the safety of the national blood supply.", "category": "Health", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116795", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "FSSAI Mandates Registration for All Milk Producers to Combat Adulteration", "summary": "The Food Safety and Standards Authority of India (FSSAI) has made it mandatory for all milk producers and vendors to obtain registration certificates. The directive aims to tackle growing reports of milk adulteration across the country. Only members of dairy cooperative societies are exempt, as the regulator seeks to strengthen safety standards in the fragmented dairy sector.", "category": "Health", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "Government advisory restricts aggressive promotions for weightloss drugs", "summary": "The Central Drugs Standard Control Organisation (CDSCO) issued a stern advisory against 'disease awareness' campaigns that mislead the public about prescription-only weightloss drugs. Doctors welcomed the move, noting that cut-throat competition among generic manufacturers could lead to unauthorized use of GLP-1 receptor agonists and potential adverse health events.", "category": "Health", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116770", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 13~03~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/116770"}]}, {"headline": "Heated debate in Gujarat Assembly over child malnutrition figures", "summary": "The BJP and Congress sparred in the Gujarat Assembly over child malnutrition rates. Congress MLA Jignesh Mevani cited NFHS data claiming 40% of children are malnourished, particularly in tribal areas. Minister Manisha Vakil countered by stating the opposition was using outdated 2019 figures and claimed the Congress was itself suffering from political 'malnutrition' in the House.", "category": "Health", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "Centre defends blood donation ban for transgender people and sex workers", "summary": "The Union government told the Supreme Court that its guidelines excluding transgender individuals, men having sex with men, and sex workers from donating blood are based on expert public health perspectives. The Centre argued that these groups are 'at-risk' populations and that public safety sometimes outweighs individual rights. The court will hear the case in detail later.", "category": "Health", "page": 14, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "India leads global growth in Generative AI course enrollments on Coursera", "summary": "Coursera reports that India has the fastest global adoption rate for AI and GenAI courses, with one enrollment occurring every 20 seconds. Roughly 4 million Indians have enrolled in these modules to capitalize on a projected $1.7 trillion economic opportunity. The platform is using AI to localize content and translate modules into regional languages to meet high domestic demand.", "category": "Education", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116815", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 13-03-2026 .pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/116815"}]}, {"headline": "Indian students flee West Asia for costlier European education hubs", "summary": "Escalating conflict in West Asia is forcing Indian students to abandon affordable study destinations in the UAE and Qatar for Europe and Southeast Asia. Consultancies estimate that shifting to Germany or Ireland could increase education budgets by 25-50%. Fears over security and aviation disruptions have led to a projected 20% drop in Indian enrollments in West Asian universities.", "category": "Education", "page": 20, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116815", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 13-03-2026 .pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/116815"}]}, {"headline": "BU panel recommends revised college hours to help students earn", "summary": "A Bangalore University panel has suggested making college hours more flexible to allow students to work and earn while studying. The recommendations include introducing more evening and weekend classes, expanding online courses, and developing a work-study model. The move aims to improve student diversity and help those from weaker economic backgrounds.", "category": "Education", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116795", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "Parliamentary Panel Seeks Higher Stipend for PM Internship Scheme", "summary": "A parliamentary standing committee has recommended increasing the monthly stipend for the PM Internship scheme. The panel suggested raising the allowance from Rs 5,000 to Rs 6,000 to better support candidates from rural or remote areas. Additionally, the committee proposed relaxing the age limit for participants to expand the scheme's reach to more graduates and diploma holders.", "category": "Education", "page": 14, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116780", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "Akshaya Patra shifts to biogas to maintain school meal supply", "summary": "Amid the LPG shortage, the Akshaya Patra Foundation in Andhra Pradesh has switched to alternative energy sources like biogas and diesel to feed 80,000 beneficiaries. Its kitchens in Visakhapatnam have halved their LPG consumption. This shift ensures that mid-day meals for 338 government schools and patients in state hospitals continue without disruption.", "category": "Education", "page": 7, "importance": 4, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "Lord's collaborating with CMET for radiation-free cancer detection", "summary": "Lord's Mark Industries has partnered with the Centre for Materials for Electronics Technology (CMET) to develop a radiation-free breast cancer detection device. The technology uses thermal sensors and AI-driven mapping to identify abnormalities in a non-invasive manner. The partnership aims to provide affordable and accessible diagnostic tools for women globally.", "category": "Science", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116795", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "Government Approves 271 Crore for 6G Tech Research and Development", "summary": "New Delhi: The government has approved 104 projects worth ₹271 crore for research and development of 6G technology under the Telecom Technology Development Fund. Minister of state for telecommunications Chandra Sekhar Pemmasani informed Parliament that the projects align with the Bharat 6G Vision Document, as India aims to become a leader in the next generation of mobile connectivity.", "category": "Science", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "ISRO successfully conducts sea-level hot test of CE20 cryogenic engine", "summary": "The Indian Space Research Organisation (ISRO) tested its CE20 cryogenic engine at a 22-tonne thrust level using a nozzle protection system. The test at Mahendragiri aims to enhance the payload capability of the LVM3 launch vehicle. Future LVM3 missions are planned to operate with an uprated stage powered by this 22-tonne thrust engine.", "category": "Science", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116770", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 13~03~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/116770"}]}, {"headline": "Researchers publish first comprehensive checklist of Indian fireflies", "summary": "A study in the journal Zootaxa has compiled the first-ever checklist of fireflies in India, documenting 92 species across 27 genera. The research, spanning records from 1881 to 2025, reveals that over 60% of these species are endemic. Many species have not been recorded since their original 19th-century descriptions, highlighting significant gaps in modern Indian firefly taxonomy.", "category": "Science", "page": 7, "importance": 3, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "ISRO and AIIMS sign MoU for space medicine research", "summary": "ISRO and AIIMS have partnered to advance human health and safety for future space missions. The collaboration involves ground and space-based studies to develop medical devices and protocols for extreme environments. The research aims to enhance multidisciplinary space medicine expertise, which will also have terrestrial healthcare applications for the nation.", "category": "Science", "page": 14, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "India reviews fuel supply requests from neighboring countries", "summary": "India is reviewing fuel and electricity supply requests from Bangladesh, Sri Lanka, and the Maldives amid global disruptions in the Strait of Hormuz. While diesel exports to Bangladesh have been ongoing since 2017, the MEA is now assessing domestic availability and refining capacity to meet new demands for gas, refined petroleum products, and electricity from its neighbors.", "category": "India", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/116780"}, {"newspaper": "Business Line", "pdf_filename": "BL Bangalore 13~03~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/116770"}]}, {"headline": "RN Ravi takes oath as 22nd Governor of West Bengal", "summary": "Former IPS officer RN Ravi was sworn in as the 22nd Governor of West Bengal by Calcutta High Court Chief Justice Sujoy Paul. The ceremony, attended by CM Mamata Banerjee, took place at Lok Bhawan. Ravi, a 1976 batch officer, succeeds ahead of assembly elections. Simultaneously, Rajendra Vishwanath Arlekar took oath as the new Governor of Tamil Nadu amid regional political transitions.", "category": "Politics", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116832"}, {"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "Speaker Om Birla defends House rules against opposition protests", "summary": "Speaker Om Birla asserted that all MPs, including LoP Rahul Gandhi, must follow House rules and have no special privilege to speak out of turn. Following a defeated removal motion, Birla defended advising the PM to avoid a session due to security concerns after women MPs gathered near the PM's seat. He called for order and dignity, emphasizing the need for a positive parliamentary chapter.", "category": "Politics", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/116832"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "PM Modi discusses West Asia crisis with Iranian President Pezeshkian", "summary": "PM Narendra Modi held a telephonic conversation with Iranian President Masoud Pezeshkian to discuss the escalating West Asia crisis. Modi emphasized the safety of Indian nationals and the necessity of unhindered maritime transit for goods and energy. Reiterating India's commitment to dialogue and diplomacy, the talks addressed regional stability following threats to crucial trade routes.", "category": "Politics", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/116780"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "CBI serves notice to K. Kavitha in Delhi liquor policy case", "summary": "The CBI served notices to BRS leader K. Kavitha and businessmen Arun Ramachandra Pillai and Abhishek Boinpally regarding the Delhi liquor policy case. Kavitha, daughter of former CM KCR, is asked to appear before the Delhi High Court on March 16. The notice follows a CBI appeal against a trial court's decision to discharge several accused. Kavitha has expressed her intent to cooperate.", "category": "Law", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/116832"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "Kerala High Court disqualifies Vellappally Natesan from SNDP Yogam posts", "summary": "The Kerala High Court disqualified SNDP Yogam general secretary Vellappally Natesan and other office-bearers for failing to file audited accounts for three consecutive years, violating the Companies Act, 2013. The court directed the state government to appoint interim directors to prevent the organization's activities from being paralyzed and ruled the respondents ineligible for reappointment.", "category": "Law", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/116832"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "Supreme Court to examine validity of Digital Personal Data Protection Act", "summary": "The Supreme Court has issued a notice to the Centre regarding the constitutional validity of the Digital Personal Data Protection (DPDP) Act, 2023. Petitioners raise concerns over state surveillance, lack of judicial oversight, and potential blocks to the Right to Information. The court will examine the balance between individual privacy and the public’s right to know about high-office matters.", "category": "Law", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/116832"}, {"newspaper": "Business Line", "pdf_filename": "BL Bangalore 13~03~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/116770"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "Supreme Court grants bail to Kashmiri separatist Shabir Ahmad Shah", "summary": "The Supreme Court granted bail to 72-year-old Kashmiri separatist leader Shabir Ahmad Shah in a terror funding case, citing his long incarceration since 2017 and failing health. The bench noted the NIA's slow trial pace and irregularities in proceedings. Shah’s family welcomed the move, noting he has spent 39 years in prison without a single conviction despite the lengthy legal battle.", "category": "Law", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/116832"}, {"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/116780"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "ED attaches ₹581 crore assets of Anil Ambani’s Reliance firms", "summary": "The Enforcement Directorate attached land parcels worth ₹581.65 crore belonging to Reliance Home Finance and Reliance Commercial Finance, units of Anil Ambani’s Reliance Group. The assets, spread across 11 states including Goa, Maharashtra, and Kerala, are linked to a FEMA case and loan defaults. This action follows search operations related to Reliance Power and multiple bank complaints.", "category": "Law", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/116786"}, {"newspaper": "Business Line", "pdf_filename": "BL Bangalore 13~03~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/116770"}]}, {"headline": "Netflix launches Eyeline Studios in Hyderabad for global VFX production", "summary": "Telangana CM Revanth Reddy inaugurated Netflix’s Eyeline Studios in Hyderabad, a 32,000-square-foot facility for advanced VFX and virtual production. As Netflix’s fifth global location and second in India, the studio uses hybrid cloud infrastructure and generative effects. The move signals growing Hollywood interest in the region's animation and gaming ecosystem for global film projects.", "category": "Technology", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/116832"}, {"newspaper": "Business Line", "pdf_filename": "BL Bangalore 13~03~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/116770"}]}, {"headline": "India plans $11 billion fund to bolster domestic semiconductor ecosystem", "summary": "The Indian government plans to launch a ₹1 lakh crore ($10.8 billion) fund within three months to provide subsidies for domestic semiconductor manufacturing, design, and equipment. The initiative aims to reduce dependence on imported electronics and transform India into a global hub, catching up with leaders like Taiwan and South Korea by complementing existing smartphone component subsidies.", "category": "Technology", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/116786"}, {"newspaper": "Business Line", "pdf_filename": "BL Bangalore 13~03~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/116770"}]}, {"headline": "India’s February retail inflation rises to 3.21% on food costs", "summary": "India's retail inflation rose to 3.21% in February, an 11-month high, driven by a low base effect and higher food costs (3.47%). Sharp price hikes were seen in vegetables like coconut, tomato, and cauliflower, alongside gold and silver. While core inflation is at 3.4%, the ongoing West Asia crisis and fuel disruptions may lead the RBI to keep interest rates unchanged in the April meeting.", "category": "Economy", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 13-03-2026 .pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116815"}, {"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116795"}, {"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/116786"}, {"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116780"}, {"newspaper": "Business Line", "pdf_filename": "BL Bangalore 13~03~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116770"}]}, {"headline": "IEA to release 400 million barrels of oil to ease supply", "summary": "The IEA announced a record release of 400 million barrels of oil from strategic reserves to cool rising prices and ease supply disruptions. While this move—double the 2022 release—aims to stabilize local energy costs, experts warn global supply remains threatened by the Strait of Hormuz crisis. India, as a first-time large-scale beneficiary, expects the move to ease refinery pressures.", "category": "Economy", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/116786"}, {"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "Indian Rupee settles at record low of 92.25 against US Dollar", "summary": "The Indian rupee settled at a record low of 92.25 against the US d ", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/116832"}, {"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/116795"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "Trump cites safety concerns to discourage Iran from World Cup", "summary": "US President Donald Trump stated it is not \"appropriate\" for Iran’s national soccer team to participate in the upcoming World Cup co-hosted by the US, citing \"life and safety\" concerns amid the ongoing war. This stance appears to contradict earlier FIFA assurances that all qualified teams would be welcome. Trump urged FIFA to exclude the team due to the risks posed by the regional conflict.", "category": "Sports", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/116832"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "Sumit Antil wins javelin gold at World Para Athletics Grand Prix", "summary": "Double Paralympic champion Sumit Antil won javelin gold (F64) at the World Para Athletics Grand Prix in New Delhi with a 69.25m throw. India dominated the event, with Mohit Pal (400m) and Rohit Kumar (shot put) also taking gold. Due to the West Asia conflict, participation was limited to only six foreign nations, but Antil maintained his form ahead of silver medalist Pushpendra Singh.", "category": "Sports", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/116832"}, {"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/116795"}, {"n ent with Sebi within two months. This significant listing, offering a 2.5% to 5% stake, signals progress toward a public debut after a decade of regulatory delays and robust demand.", "category": "Business", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 13-03-2026 .pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/116815"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "Honda forecasts historic annual loss on global electric vehicle downturn", "summary": "Honda Motor Co. forecasts a historic annual loss of up to ¥690 billion ($15.7 billion) due to a downturn in the EV market and intense competition from Chinese makers. The carmaker is canceling three planned EV models for North America following the suspension of subsidies and volatile demand. This strategic shift reflects the rapid unraveling of the global electric vehicle transition.", "category": "Business", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/116786"}, {"newspaper": "Business Line", "pdf_filename": "BL Bangalore 13~03~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/116770"}]}]};
const CAT_META = {"Politics": {"color": "#e8334a", "icon": "🏛️"}, "Economy": {"color": "#f5a623", "icon": "📊"}, "Business": {"color": "#f0c040", "icon": "💼"}, "India": {"color": "#ff7043", "icon": "🇮🇳"}, "World": {"color": "#5c9eff", "icon": "🌍"}, "Sports": {"color": "#36c46f", "icon": "🏆"}, "Science": {"color": "#a78bfa", "icon": "🔬"}, "Technology": {"color": "#38bdf8", "icon": "💻"}, "Health": {"color": "#34d399", "icon": "🏥"}, "Law": {"color": "#fb923c", "icon": "⚖️"}, "Environment": {"color": "#4ade80", "icon": "🌿"}, "Education": {"color": "#e879f9", "icon": "📚"}, "Culture": {"color": "#f472b6", "icon": "🎭"}, "Infrastructure": {"color": "#94a3b8", "icon": "🏗️"}};

const allArts = [...DIGEST.articles].sort((a,b)=>(b.importance||0)-(a.importance||0));
const byCategory = {};
for (const art of allArts) {
  const c = art.category||"India";
  if (!byCategory[c]) byCategory[c]=[];
  byCategory[c].push(art);
}
const sortedCats = Object.keys(byCategory).sort(
  (a,b)=>(byCategory[b][0].importance||0)-(byCategory[a][0].importance||0)
);

let catIdx=0,vpW=0,vpH=0;
const panels=[];
const outer=document.getElementById('outer');
const hTrack=document.getElementById('hTrack');
const hintUp=document.getElementById('hintUp');
const hintRight=document.getElementById('hintRight');
const catFlash=document.getElementById('catFlash');
const cfIcon=document.getElementById('cfIcon');
const cfName=document.getElementById('cfName');

function buildAll() {
  vpW=outer.offsetWidth; vpH=outer.offsetHeight;
  hTrack.innerHTML=''; panels.length=0;
  sortedCats.forEach((cat,ci)=>{
    const m=CAT_META[cat]||{color:"#e8334a",icon:"📰"};
    const arts=byCategory[cat];
    const panel=document.createElement('div');
    panel.className='cat-panel';
    panel.style.setProperty('--cc',m.color);
    panel.innerHTML=`<div class="progress-row" id="prow-${ci}" style="--cc:${m.color}"></div><div class="v-feed" id="vfeed-${ci}"><div class="v-track" id="vtrack-${ci}"></div></div>`;
    hTrack.appendChild(panel);
    const pRow=panel.querySelector(`#prow-${ci}`);
    const vFeed=panel.querySelector(`#vfeed-${ci}`);
    const vTrack=panel.querySelector(`#vtrack-${ci}`);
    const cardH=vFeed.getBoundingClientRect().height||vpH;
    arts.forEach(art=>vTrack.appendChild(buildCard(art,cardH,m,cat)));
    panels.push({pRow,vFeed,vTrack,articles:arts,artIdx:0});
    buildPRow(ci);
  });
  hTrack.style.transition='none';
  hTrack.style.transform='translateX(0)';
  syncV(0,false);
}

function buildCard(art,h,m,cat) {
  const src=art.sources?.[0];
  const href=src?.pdf_filename?`pdfs/${src.pdf_filename}#page=${src.page}`:(src?.telegram_url||'#');
  const card=document.createElement('div');
  card.className='card';
  card.style.height=h+'px';
  card.style.setProperty('--cc',m.color);
  card.innerHTML=`
    <div class="card-content">
      <div class="card-toprow">
        <div class="cat-pill">
          <div class="pill-icon"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="1" y="1" width="8" height="2" rx="0.6" fill="#888"/><rect x="1" y="4.5" width="5" height="1.5" rx="0.6" fill="#666"/><rect x="1" y="7" width="6" height="1.5" rx="0.6" fill="#666"/></svg></div>
          ${cat.toUpperCase()}
        </div>
        <div class="card-date">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="2.5" width="11" height="9.5" rx="1.8" stroke="#555" stroke-width="1.2"/><path d="M4.5 1v3M8.5 1v3" stroke="#555" stroke-width="1.2" stroke-linecap="round"/><path d="M1 6h11" stroke="#555" stroke-width="1.2"/></svg>
          ${DIGEST.date}
        </div>
      </div>
      <div class="card-headline">${art.headline}</div>
      <div class="card-summary">${art.summary}</div>
      <div class="card-divider"></div>
      <div class="card-footer">
        ${src?`<a class="src-chip" href="${href}" target="_blank" onclick="event.stopPropagation()">${src.newspaper}<span class="src-chip-sep">&middot;</span><span class="src-chip-pg">Pg ${src.page}</span><span class="src-chip-ext"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M3.5 7.5L7.5 3.5M7.5 3.5H5M7.5 3.5V6" stroke="#555" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></span></a>`:'<div></div>'}
        <div class="info-btn"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6.5" stroke="#444" stroke-width="1.3"/><circle cx="7.5" cy="4.5" r="0.8" fill="#555"/><path d="M7.5 7v4" stroke="#555" stroke-width="1.5" stroke-linecap="round"/></svg></div>
      </div>
    </div>`;
  return card;
}

function buildPRow(ci) {
  const p=panels[ci],ai=p.artIdx;
  p.pRow.innerHTML='';
  p.articles.forEach((_,i)=>{
    const seg=document.createElement('div');
    seg.className='pseg'+(i<ai?' done':i===ai?' active':'');
    p.pRow.appendChild(seg);
  });
}

function syncV(ci,animated) {
  const p=panels[ci],h=p.vFeed.getBoundingClientRect().height;
  p.vTrack.style.transition=animated?'transform 0.35s cubic-bezier(0.4,0,0.2,1)':'none';
  p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;
  buildPRow(ci);
}

function goArt(d) {
  const p=panels[catIdx];
  const n=Math.max(0,Math.min(p.artIdx+d,p.articles.length-1));
  if(n===p.artIdx&&d!==0)return;
  p.artIdx=n; syncV(catIdx,true); dismiss();
}

function goCat(idx,animated=true) {
  idx=Math.max(0,Math.min(idx,sortedCats.length-1));
  if(idx===catIdx&&animated)return;
  const prev=catIdx; catIdx=idx;
  hTrack.style.transition=animated?'transform 0.38s cubic-bezier(0.4,0,0.2,1)':'none';
  hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;
  if(animated&&idx!==prev) {
    const m=CAT_META[sortedCats[idx]]||{color:"#e8334a",icon:"📰"};
    catFlash.style.background=m.color+'18';
    cfIcon.textContent=m.icon; cfName.textContent=sortedCats[idx]; cfName.style.color=m.color;
    catFlash.classList.add('on'); setTimeout(()=>catFlash.classList.remove('on'),500);
  }
  dismiss();
}

let dismissed=false;
function dismiss() {
  if(dismissed)return; dismissed=true;
  hintUp.classList.remove('visible'); hintRight.classList.remove('visible');
  hintUp.classList.add('gone'); hintRight.classList.add('gone');
}

(function initHints() {
  const KEY='dailyBriefHintSeen';
  if(!localStorage.getItem(KEY)) {
    localStorage.setItem(KEY,'1');
    setTimeout(()=>{ if(!dismissed){ hintUp.classList.add('visible'); hintRight.classList.add('visible'); } },2500);
  }
})();

let tsX=0,tsY=0,tcX=0,tcY=0,axis=null,drag=false;
outer.addEventListener('touchstart',e=>{
  tsX=e.touches[0].clientX; tsY=e.touches[0].clientY;
  tcX=0; tcY=0; axis=null; drag=true;
  hTrack.style.transition='none';
  const p=panels[catIdx]; if(p)p.vTrack.style.transition='none';
},{passive:true});
outer.addEventListener('touchmove',e=>{
  if(!drag)return;
  const dx=e.touches[0].clientX-tsX,dy=e.touches[0].clientY-tsY;
  tcX=dx; tcY=dy;
  if(!axis&&(Math.abs(dx)>8||Math.abs(dy)>8))axis=Math.abs(dx)>Math.abs(dy)?'h':'v';
  if(!axis)return;
  e.preventDefault();
  if(axis==='h'){
    const edge=(catIdx===0&&dx>0)||(catIdx===sortedCats.length-1&&dx<0);
    hTrack.style.transform=`translateX(${-catIdx*vpW+dx*(edge?.14:1)}px)`;
  }else{
    const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height;
    const edge=(p.artIdx===0&&dy>0)||(p.artIdx===p.articles.length-1&&dy<0);
    p.vTrack.style.transform=`translateY(${-p.artIdx*h+dy*(edge?.14:1)}px)`;
  }
},{passive:false});
outer.addEventListener('touchend',()=>{
  if(!drag)return; drag=false;
  if(axis==='h'){
    const t=vpW*.2;
    if(tcX<-t)goCat(catIdx+1);
    else if(tcX>t)goCat(catIdx-1);
    else{hTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;}
  }else if(axis==='v'){
    const t=vpH*.2;
    if(tcY<-t)goArt(1);
    else if(tcY>t)goArt(-1);
    else{const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height;p.vTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;}
  }
  axis=null;
},{passive:true});

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'||e.key===' '){e.preventDefault();goArt(1);}
  if(e.key==='ArrowUp'){e.preventDefault();goArt(-1);}
  if(e.key==='ArrowRight'){e.preventDefault();goCat(catIdx+1);}
  if(e.key==='ArrowLeft'){e.preventDefault();goCat(catIdx-1);}
});
let wl=false;
outer.addEventListener('wheel',e=>{
  e.preventDefault();if(wl)return;wl=true;
  Math.abs(e.deltaX)>Math.abs(e.deltaY)?goCat(catIdx+(e.deltaX>0?1:-1)):goArt(e.deltaY>0?1:-1);
  setTimeout(()=>wl=false,500);
},{passive:false});
window.addEventListener('resize',()=>{
  vpW=outer.offsetWidth;vpH=outer.offsetHeight;
  hTrack.style.transition='none';
  hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;
  panels.forEach(p=>{
    const h=p.vFeed.getBoundingClientRect().height;
    p.vTrack.querySelectorAll('.card').forEach(c=>c.style.height=h+'px');
    p.vTrack.style.transition='none';
    p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;
  });
});

buildAll();
</script>
