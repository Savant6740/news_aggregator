<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Inter', -apple-system, sans-serif;
  background: #0c0c0c; color: #fff; touch-action: none;
}
.outer { position: fixed; inset: 0; overflow: hidden; }
.h-track { display: flex; height: 100%; will-change: transform; }
.cat-panel { flex-shrink:0; width:100vw; height:100%; display:flex; flex-direction:column; overflow:hidden; }
.progress-row { flex-shrink:0; display:flex; gap:4px; padding:14px 16px 10px; background:#0c0c0c; position:relative; z-index:5; overflow:visible; }
.progress-row::after { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:80%; height:120px; background:radial-gradient(ellipse at top,color-mix(in srgb,var(--cc) 30%,transparent) 0%,transparent 70%); pointer-events:none; z-index:-1; }
.pseg { flex:1; height:2px; border-radius:1px; background:rgba(255,255,255,0.12); position:relative; overflow:hidden; }
.pseg::after { content:''; position:absolute; inset:0; background:var(--cc,#e8334a); transform:scaleX(0); transform-origin:left; transition:transform 0.25s ease; }
.pseg.done::after, .pseg.active::after { transform:scaleX(1); }
.v-feed { flex:1; overflow:hidden; position:relative; clip-path:inset(0); }
.v-track { display:flex; flex-direction:column; will-change:transform; }
.card { 
  width:100%; flex-shrink:0; background:#0c0c0c; display:flex; flex-direction:column; 
  overflow:hidden; position:relative; 
  scroll-margin-top: 80px;
}
.card.target-highlight {
  background: linear-gradient(135deg, #fff3cd22 0%, #ffeaa722 100%) !important;
  box-shadow: 0 0 30px rgba(255, 193, 7, 0.4);
  border: 2px solid #f39c12;
  animation: pulse-highlight 2s ease-in-out;
}
@keyframes pulse-highlight {
  0%, 100% { box-shadow: 0 0 30px rgba(255, 193, 7, 0.4); }
  50% { box-shadow: 0 0 50px rgba(255, 193, 7, 0.6); }
}
.card-content { flex:1; display:flex; flex-direction:column; padding:36px 20px 22px; min-height:0; position:relative; z-index:1; }
.card-toprow { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; flex-shrink:0; }
.cat-pill { display:inline-flex; align-items:center; gap:7px; background:#1c1c1e; border-radius:8px; padding:7px 12px 7px 10px; font-size:11.5px; font-weight:700; letter-spacing:0.07em; color:#d0d0d0; text-transform:uppercase; line-height:1; }
.pill-icon { width:16px; height:16px; background:#2e2e30; border-radius:3px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.pill-icon svg { display:block; }
.card-date { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:500; color:#666; letter-spacing:0.01em; }
.card-headline { font-size:28px; font-weight:800; line-height:1.18; color:#fff; letter-spacing:-0.03em; margin-bottom:20px; flex-shrink:0; }
.card-summary { font-size:15.5px; font-weight:400; line-height:1.62; color:#6b6b6b; flex:1; overflow:hidden; display:-webkit-box; -webkit-line-clamp:7; -webkit-box-orient:vertical; }
.card-divider { height:1px; background:#1e1e1e; margin:20px 0 16px; flex-shrink:0; }
.card-footer { display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.src-chip { display:inline-flex; align-items:center; gap:6px; background:#181818; border:1px solid #282828; border-radius:9px; padding:8px 13px; font-size:12.5px; font-weight:600; color:#c0c0c0; text-decoration:none; letter-spacing:0.005em; line-height:1; }
.src-chip-sep { color:#3a3a3a; font-weight:400; }
.src-chip-pg { color:#555; font-weight:500; }
.src-chip-ext { margin-left:2px; }
.src-chip-ext svg { display:block; }
.info-btn { width:36px; height:36px; border-radius:50%; border:1.5px solid #252525; background:#141414; display:flex; align-items:center; justify-content:center; color:#555; cursor:pointer; flex-shrink:0; }
.cat-flash { position:fixed; inset:0; z-index:600; pointer-events:none; opacity:0; transition:opacity 0.12s; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; }
.cat-flash.on { opacity:1; }
.cf-icon { font-size:34px; }
.cf-name { font-size:22px; font-weight:900; letter-spacing:-0.03em; text-transform:uppercase; }
.hint { position:fixed; display:flex; flex-direction:column; align-items:center; gap:5px; pointer-events:none; z-index:400; opacity:0; transition:opacity 0.6s ease; }
.hint.visible { opacity:1; }
.hint.gone { opacity:0 !important; transition:opacity 0.4s; }
.hint-pill { font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.55); background:rgba(255,255,255,0.07); backdrop-filter:blur(10px); padding:5px 13px; border-radius:100px; border:1px solid rgba(255,255,255,0.09); }
.hint-arr { font-size:16px; color:rgba(255,255,255,0.4); }
.h-up { bottom:28px; left:50%; transform:translateX(-50%); animation:bUp 2s ease-in-out infinite; }
.h-right { top:50%; right:14px; transform:translateY(-50%); animation:bRight 2s ease-in-out infinite 0.6s; }
@keyframes bUp { 0%,100% { bottom:28px; opacity:.65; } 50% { bottom:36px; opacity:1; } }
@keyframes bRight { 0%,100% { right:14px; opacity:.65; } 50% { right:6px; opacity:1; } }
</style>

<script>
const DIGEST   = {"date": "02 June 2026", "articles": [{"headline": "India may roll back ECLGS 5.0 after ₹35,000 cr sanctioned due to Gulf crisis", "summary": "The Centre sanctioned over ₹35,000 crore in loans to 79,950 units under ECLGS 5.0 (Emergency Credit Line Guarantee Scheme 5.0) for MSMEs and airlines, approved in May 2025. The scheme helps businesses manage liquidity mismatches due to the West Asia conflict. The total applications for loans of ₹1.71 lakh crore have been received from 2.63 lakh entities.", "category": "Economy", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "a11391cd"}, {"headline": "India considers rolling back FTA concessions due to UK steel curbs", "summary": "India is considering withdrawing some market access concessions, possibly on Scotch whisky, from the FTA with the UK. This is in response to new UK steel safeguard measures, effective July 1, which will slash tariff-free import quotas and double duties on shipments exceeding quotas. Commerce Minister Piyush Goyal will discuss this with UK Secretary of State for Business and Trade Peter Kyle.", "category": "Economy", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "de038211"}, {"headline": "Indian IT increases R&D spend, still lags global tech giants", "summary": "Indian IT services firms like Infosys (₹1,093 crore in FY26) and TCS (₹2,814 crore in FY26, 1.3% of turnover) are increasing R&D spending. However, their investments remain modest compared to global technology peers, such as Microsoft ($32.5 billion) and IBM ($8.3 billion), highlighting a gap in innovation budgets in the AI era.", "category": "Technology", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "dc17c84c"}, {"headline": "Electric four-wheeler registrations surge 82% in May due to high fuel prices", "summary": "Registrations of electric four-wheelers (e4W) increased 82% year-on-year in May 2026 to 25,509 units, driven by rising fuel prices, new model launches, and growing consumer confidence. Tata Passenger Electric Mobility leads the segment, while Mahindra Electric Automobile shows the fastest growth. This marks a 45% jump from FY26 monthly averages.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "c45ba5f4"}, {"headline": "Nifty 50 valuations tested as global capital seeks higher earnings growth", "summary": "India's Nifty 50 remains one of the most expensive emerging market indices despite weak earnings growth (1.3% YTD) in 2026, trailing peers like South Korea (56.1%) and Taiwan (19.5%). Its P/E ratio of 19.88 is the third-highest. Investors are increasingly rewarding markets with accelerating profit growth, especially those linked to the AI supply chain.", "category": "Economy", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "09d68c77"}, {"headline": "Rising fuel costs decrease petrol two-wheeler sales by 8.6% in May", "summary": "India's two-wheeler market shows a paradox: overall sales grew 7.4% Y-o-Y in May 2026, but petrol-powered vehicle sales fell 8.6% M-o-M. EV two-wheeler registrations surged 62.5% Y-o-Y. Rising fuel costs are reshaping buying behavior, with electric vehicles increasingly offsetting the slowdown in conventional scooters and motorcycles.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "18f27ac3"}, {"headline": "Carmakers report strong May demand despite West Asia disturbances", "summary": "Despite West Asia geopolitical tensions, automobile companies reported positive year-on-year growth in domestic sales for May. Maruti Suzuki India (40% Y-o-Y) and Tata Motors (42% Y-o-Y) saw strong growth. Overall PV sales grew 26% Y-o-Y to 4.4 lakh units. Carmakers expect continued demand, supported by new launches and improved vehicle inventory.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "f4a27f70"}, {"headline": "Berkshire Hathaway acquires Taylor Morrison Home Corp for $6.8 billion", "summary": "Berkshire Hathaway will acquire Taylor Morrison Home Corp in an all-cash deal worth $6.8 billion ($72.50 per share), marking the first major purchase under CEO Greg Abel and a vote of confidence in the US housing market. This is the largest deal since Berkshire bought Occidental Petroleum Corp's petrochemical business in January.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "227617e5"}, {"headline": "Fire at Mobis India facility to disrupt Hyundai Motors production", "summary": "A fire at Mobis India Ltd's Chennai manufacturing facility is expected to temporarily disrupt production at Hyundai Motor's plant, as Mobis supplies critical components. Hyundai is exploring alternative sourcing and supply continuity measures to minimize impact. The fire, which originated in the soldering line, spread rapidly but caused no fatalities.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "f6fb3f9c"}, {"headline": "CNG and EV demand surge post PM's fossil fuel call", "summary": "Maruti Suzuki India Ltd (MSIL) reports a sharp rise in CNG and EV sales/bookings after PM Modi's call for alternative transport. May saw record 78,000 CNG vehicle sales and two-fold growth in EV bookings. MSIL has overcome supply issues from new plants, with pending bookings of 1.5 lakh units, and notes a trend of two-wheeler customers upgrading to cars.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "12db462e"}, {"headline": "Sanjay Lohiya appointed Secretary, Department of Financial Services", "summary": "Sanjay Lohiya, a 1994 batch IAS officer and former Special Secretary in the Department of Financial Services (DFS), assumed charge as Secretary of DFS. He succeeds M Nagaraju, who superannuated on May 31. The DFS administers banking, insurance, and pension sector acts.", "category": "Politics", "page": 3, "importance": 2, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "537d0d5c"}, {"headline": "IPMA urges government to include paper in Asean-India FTA exclusion list", "summary": "The Indian Paper Manufacturers Association (IPMA) has asked the government to add paper and paperboard to the exclusion list of the Asean-India Trade in Goods Agreement. This move aims to prevent predatory imports. IPMA suggests invoking the termination clause if the review doesn't address industry concerns.", "category": "Economy", "page": 3, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "7196e267"}, {"headline": "India's fiscal deficit doubles in April, meets FY26 target", "summary": "India's fiscal deficit nearly doubled in April due to a 21% fall in tax revenue and a 23% rise in expenditure, reaching over 21% of budget estimates. However, the government met its FY26 target of 4.4% of GDP. Economists anticipate continued focus on enhancing tax revenue buoyancy to meet the FY27 target of 4.3% of GDP, despite fiscal risks.", "category": "Economy", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "0ed61fd0"}, {"headline": "Hedge funds boost US equity purchases as S&P 500 rallies", "summary": "Hedge funds bought US equities at the fastest pace in six months last week, driving the S&P 500's winning streak. Trading flows saw long buys and short covering, with financial stocks being the largest beneficiary of the rotation. This reflects renewed risk appetite, fueled by AI infrastructure spending and stronger earnings, with US long/short net leverage rising to 55.3%.", "category": "Business", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "b1972b2c"}, {"headline": "Mutual funds' equity investments surge 58% in May", "summary": "Mutual fund investments in equity markets jumped 58% to over ₹48,247 crore in May, compared to April, as investors capitalized on market dips. Despite geopolitical tensions, surging crude prices, and FPI selling, domestic retail participation, especially through SIPs, remains a strong and consistent capital source, supporting equities.", "category": "Economy", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "db458122"}, {"headline": "ConsumerX Ventures launches ₹150 crore early-stage AIF", "summary": "ConsumerX Ventures launched a SEBI-registered Category II Alternative Investment Fund (AIF) with a target corpus of ₹150 crore. The fund will back pre-seed and seed-stage consumer start-ups, focusing on product-market fit, brand differentiation, and scalable business models, addressing a funding and support gap in the sector.", "category": "Business", "page": 6, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "5619602f"}, {"headline": "Nifty declines for fourth day amid geopolitical tensions", "summary": "The Nifty 50 closed lower for the fourth consecutive session, settling at 23,382.60, down 165.15 points, its lowest since May 12. Geopolitical uncertainty from West Asia hostilities, surging crude oil prices, and persistent foreign selling contributed to the decline. FMCG, PSU Banks, Realty, Auto, and Financials saw sectoral selloffs, while IT gained.", "category": "Economy", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "43281445"}, {"headline": "GenXAI Analytics plans ₹55 crore IPO on NSE Emerge", "summary": "GenXAI Analytics, an enterprise performance and analytics solutions provider, aims to raise ₹55 crore via an IPO on the NSE Emerge platform. The company will issue 47.28 lakh shares at ₹110-116 each. Proceeds will fund capital expenditure for new products, working capital, and general corporate purposes. The anchor bidding opens Thursday.", "category": "Business", "page": 6, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "b62e9277"}, {"headline": "SEBI considers easing cash-flow rules for road InvITs", "summary": "SEBI proposed allowing road-focused Infrastructure Investment Trusts (InvITs) to add back debt-funded major maintenance expenses when calculating Net Distributable Cash Flow (NDCF). This aims to boost payouts to unitholders and ease business. The proposal, made after industry representations, includes extensive disclosure requirements and applies only to road and bridge infrastructure projects.", "category": "Economy", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "c043b20f"}, {"headline": "IndiGo shares rise despite Q4 loss on bullish brokerage outlook", "summary": "InterGlobe Aviation shares gained on Monday despite reporting a consolidated loss of ₹2,536.9 crore for Q4 March 2026. Investors and brokerages focused on positive long-term earnings outlook, driven by aviation supply shortages, rising fares, and IndiGo's market share gains. Many brokerages maintained 'Buy' ratings, citing leadership and growth strategy despite near-term headwinds.", "category": "Business", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "297ddb63"}, {"headline": "IPO market poised for selective revival in June", "summary": "India's primary market expects a pickup in June after two subdued months, with Hexagon Nutrition (₹139 crore) and CMR Green Technologies (₹630 crore) scheduled. While 161 companies with SEBI approvals (₹2.42 lakh crore) await launch, issuers are becoming more comfortable with stable investor demand and acceptable valuations despite geopolitical uncertainty.", "category": "Economy", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "1f61caf5"}, {"headline": "CSR mandate to boost funding for Social Stock Exchanges", "summary": "A recent amendment by the Ministry of Corporate Affairs, allowing companies to channel up to 10% of their mandatory CSR budgets into listed zero-coupon bonds issued by NGOs on Social Stock Exchanges (SSE), is expected to unlock hundreds of crores in institutional funding. This move aims to address past hurdles of limited scale and compliance burden for SSEs.", "category": "Business", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "f63f8111"}, {"headline": "India seeks US trade deal offering competitive advantage", "summary": "India is willing to accept a bilateral trade deal with the US only if it provides New Delhi a distinct advantage over developing country rivals in the American market, potentially with tariffs locked in at around 18%. Discussions are ongoing, including addressing Section 301 penalties. India's objective is a deal that gives it a definite edge over competitors like Vietnam and Bangladesh.", "category": "Economy", "page": 7, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "3f425475"}, {"headline": "OMCs incur ₹30/litre under-recovery on domestic jet fuel", "summary": "State-owned oil marketing companies (OMCs) face a ₹30 per litre under-recovery on domestic aviation turbine fuel (ATF) sales due to high international prices. While domestic ATF prices were kept unchanged in June, international rates were reduced. Airlines are adjusting schedules to manage costs, with international booking values rising sharply from February to May.", "category": "Business", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "2e7fcfbe"}, {"headline": "OMCs face ₹650 under-recovery per domestic LPG cylinder", "summary": "State-controlled OMCs are incurring an under-recovery of around ₹650 per 14.2 kg domestic LPG cylinder due to geopolitical headwinds. Current demand is lower than normal at 72,000 TPD, partly due to summer and migration to piped natural gas (PNG). India's LPG production hit a record 52,000 TPD last week.", "category": "Business", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "9df052e9"}, {"headline": "IRDAI fines Nissan Renault Financial ₹1 crore for guideline violations", "summary": "The Insurance Regulatory and Development Authority of India (IRDAI) imposed a ₹1 crore penalty on Nissan Renault Financial Services India for violating motor insurance service guidelines. The corporate agent was directed to present the order to its Board and submit an action taken report within 90 days.", "category": "Law", "page": 8, "importance": 2, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "ad15aeab"}, {"headline": "Bank savings deposits decline, term deposits rise in India", "summary": "Indian scheduled commercial banks (SCBs) saw a structural shift in deposits over the last five years: savings deposits fell from 34.6% to 28.7% by March 2026, while term deposits rose from 55.2% to 61.6%. This is linked to declining savings deposit rates (2.7-3.0% to 2.5%) and rising term deposit rates (5.0-5.6% to 6.0-6.6%).", "category": "Economy", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "2ac16d62"}, {"headline": "Persistent Systems expands into East Europe via Estonian firm tie-up", "summary": "Persistent Systems is expanding its Eastern European presence through an agreement to integrate a team of over 90 professionals from Estonian IT consulting firm Concise. This transaction will establish strategic delivery centers in Tallinn and Tartu, leveraging Estonia’s digital ecosystem for AI-led transformation and strengthening Persistent’s global delivery network.", "category": "Technology", "page": 8, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "1fcc95fa"}, {"headline": "Gujarat Energy's PNG demand soars 20x as Morbi ceramic hub reopens", "summary": "Gujarat Energy Ltd (GEL) saw a dramatic revival in PNG demand from the Morbi ceramic cluster, with consumption jumping over 20-fold from 0.36 mmscmd in March to 8 mmscmd by late May. This follows a disruption earlier this year when gas shortages forced 700+ units to shut. The number of gas-consuming units rose from 83 to 710.", "category": "Business", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "1a7dd427"}, {"headline": "Indian IT firms increase R&D spending, still trail global Big Tech", "summary": "Indian IT services firms like Infosys (₹1,093 cr, 0.73% revenue in FY26) and TCS (₹2,814 cr, 1.3% turnover in FY26) increased R&D spending. However, their investments are modest compared to global peers (e.g., Microsoft $32.5 bn). Experts warn underinvestment in innovation, especially for AI, cloud, and cybersecurity, could weaken long-term competitiveness, despite margin expansion.", "category": "Technology", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "b8dae7a7"}, {"headline": "Avaada Group secures ₹9,000 crore for renewable energy projects", "summary": "The Avaada Group secured $950 million (₹9,000 crore) in finance from a Dubai consortium of banks. This successful financial closure is for its firm and dispatchable renewable energy (FDRE) project in Bikaner, Rajasthan, marking India’s largest financing transaction in the FDRE segment.", "category": "Environment", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "2f2e4aef"}, {"headline": "Fino Payments Bank partners Ezee.ai to strengthen lending ecosystem", "summary": "Fino Payments Bank partnered with fintech platform Ezee.ai to build a lending ecosystem ahead of its transition to a Small Finance Bank. Ezee.ai will deploy its AI-enabled Loan Origination System, Business Rules Engine, and Collections Management Platform to support Fino Bank’s lending operations.", "category": "Business", "page": 9, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "b09c20d5"}, {"headline": "Tractor Junction's FY26 revenue jumps 62% to ₹198 crore", "summary": "Tractor Junction, a rural auto-fintech platform, reported a 62% revenue increase to ₹198.4 crore in FY26 and attracted over 6 crore visitors. The company aims to double growth to ₹400 crore revenue in FY27 and announced its second ESOP liquidity program worth ₹3 crore for 80 eligible employees, recognizing their contribution and conviction in future growth.", "category": "Business", "page": 9, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "62b53323"}, {"headline": "Cognizant creates new AI-focused job roles for next-gen talent", "summary": "Cognizant introduced \"frontier certified engineer\" and \"frontier business operator\" job categories, purpose-built for the AI era. These roles, developed through SkillSpring, address the urgency for talent to lead AI-led transformations and manage blended human-digital workforces. CEO Ravi Kumar S highlights the \"AI velocity gap\" and opportunity for those ready to act.", "category": "Technology", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "14cd316a"}, {"headline": "Crude oil prices rise on escalating geopolitical tensions", "summary": "Crude oil prices increased over 3% after Iran and the US exchanged strikes and Israel advanced into Lebanon. Brent futures rose $2.68 to $93.80 a barrel, and US WTI rose $3.03 to $90.39. These rising geopolitical tensions are fueling concerns about global oil supply.", "category": "Economy", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "4d7968c1"}, {"headline": "Aluminium prices hit 4-year high on Middle East supply risks", "summary": "Aluminium prices soared to their highest in over four years on the LME, trading 0.5% higher at $3,685 a tonne. This surge is due to escalating Middle East supply risks after US and Iran traded military strikes, as the region accounts for 9% of global smelting capacity. Copper was also up 1.5% at $13,840.", "category": "Economy", "page": 10, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "88fdb90f"}, {"headline": "India's seafood exports reach record $8.46 billion in FY26", "summary": "Defying global headwinds, India's seafood exports reached a record high of ₹73,890.46 crore ($8.46 billion) in FY26, a 13.44% increase in value, with volumes at 19.72 lakh tonnes. Frozen shrimp was the top export (₹49,037.93 crore). The US was the largest market by value ($2.33 billion), while China led by volume (4,90,369 tonnes).", "category": "Economy", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "bddfd3d7"}, {"headline": "Domestic cotton prices ease as government suspends import duty", "summary": "Domestic cotton prices eased after the government suspended import duty from June 1 to October 30. This provides buyers more options, potentially making Indian cotton less sensitive to rising ICE futures. The CCI reduced its sale price by ₹700 per candy. While ICE futures gained 47% since February, domestic prices had surged, prompting mills to book imports.", "category": "Economy", "page": 10, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "45b08ab3"}, {"headline": "Government's wheat procurement exceeds revised buffer stock target", "summary": "The Union government's wheat procurement for buffer stocks reached 34.99 million tonnes (mt) by May 31, surpassing the revised target of 34.5 mt. This is up 17% from last year, despite localized damage from unseasonal rains. Procurement included significant quantities under relaxed quality specifications, particularly in Punjab and Madhya Pradesh. Central pool stock now stands at 51.3 mt against a buffer norm of 27.5 mt.", "category": "Economy", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "9677b620"}, {"headline": "Augmont launches AI-powered gold evaluation machine in Chennai", "summary": "Augmont, a digital gold platform, debuted an AI-powered robotic gold purity evaluation machine at its Poonamallee branch in Chennai. This technology allows customers to instantly, transparently, and non-invasively assess gold purity for recycling, selling, or loans. This innovation strengthens consumer confidence and supports India's evolving gold ecosystem by reducing import dependence.", "category": "Technology", "page": 10, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "faf454e6"}, {"headline": "Corteva introduces Mavilon for rice pest management in India", "summary": "Corteva launched Mavilon, a granular insecticide, for rice pest management in India. It offers up to 60 days of control against Brown Planthopper (BPH) and stem borer with a single application 30-35 days post-transplanting. This proactive solution helps prevent significant yield losses, reduces reliance on repeated sprays, and improves farmer efficiency and profitability.", "category": "Science", "page": 10, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "981dd6c1"}, {"headline": "RBI's mobile wallet curbs may impact high-volume use cases", "summary": "The RBI's proposed tightening of mobile wallet regulations, including capping P2P transfers at ₹25,000/month and restricting minimum-KYC wallets to payments for goods/services, could undermine the viability of many wallet-led offerings. Industry executives warn these changes may disrupt adoption, impact existing domestic transfer models, and require a deferred rollout for adaptation.", "category": "Economy", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "dbe425f7"}, {"headline": "Karnataka Bank hosts annual auditors conference", "summary": "Karnataka Bank hosted its annual conference for Concurrent Auditors and Internal Auditors in Mangaluru for 2026-27. MD and CEO Raghavendra S Bhat emphasized auditors' critical role in promoting transparency, enhancing risk management, and ensuring regulatory compliance. The conference discussed strengthening audit practices and regulatory adherence.", "category": "Business", "page": 11, "importance": 2, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "037cbe8a"}, {"headline": "AIONOS and Black Box partner to enhance AI applications", "summary": "Black Box and AIONOS announced a strategic alliance to help enterprises evolve large-scale digital infrastructure and globally integrated operations. The pact, with a key focus on India’s Global Capability Centre ecosystem, aims to develop AI applications and services critical for customers across India, North America, EMEA, and APAC.", "category": "Technology", "page": 11, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "66daac1a"}, {"headline": "Kedarnath helicopter operators seek fuel surcharge after price hike", "summary": "Helicopter operators providing Kedarnath shuttle services have requested the Uttarakhand government to introduce a fuel surcharge due to increased aviation turbine fuel (ATF) prices. Approved ticket rates, set through a bid process, were finalized before the fuel hike, making operations unsustainable and threatening service continuity during the peak season.", "category": "Business", "page": 11, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "59606142"}, {"headline": "ARAI expands testing capability for new mobility norms", "summary": "India’s largest automotive testing agency, Pune-based ARAI, is expanding its testing and certification capabilities beyond cars and trucks to include EV battery testing, metro components, and vehicle crash safety. This move is driven by tightening mobility norms like CAFE III, AIS-156, Bharat NCAP, and new structural safety standards for buses, aiming to support industry compliance.", "category": "Technology", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "a21fb660"}, {"headline": "Puravankara to develop ₹1,100 crore housing project in Bengaluru", "summary": "Realty developer Puravankara signed a joint development agreement for an 11.23-acre land parcel in North Bengaluru, with an estimated gross development value (GDV) of ₹1,100 crore. The project will have 0.74 million sq ft developable area. This adds to the company's Bengaluru development pipeline of over ₹13,800 crore, as it targets ₹11,200 crore sales in FY27.", "category": "Business", "page": 11, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "dfb7f9ce"}, {"headline": "Uri-I Stage-II hydropower project in Kashmir begins tunnel excavation", "summary": "Construction advanced at the Uri-I Stage-II Hydroelectric Project in north Kashmir with the first controlled blast for tunnel excavation. The NHPC-developed project, costing over ₹2,700 crore, will add 240 MW to Jammu and Kashmir's generation capacity (two 120 MW units), crucial for reducing electricity import dependence, especially in winter.", "category": "Infrastructure", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "18c9aa03"}, {"headline": "Anthropic to deploy AI tool Mythos with first EU body", "summary": "Anthropic will give the European Union’s cybersecurity body (ENISA) access to Mythos, its powerful AI tool. This marks the first EU agency to participate in Project Glasswing, an initiative allowing key organizations to test Mythos before its wider release. Officials fear the AI tool could be used to exploit vulnerabilities in critical computer systems.", "category": "Technology", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "2ef0757e"}, {"headline": "IIT-M study projects 2 million XR jobs in India by 2030", "summary": "An IIT-Madras study by the Experiential Technology Innovation Centre (XTIC) forecasts 2 million high-value jobs in Extended Realities (XR) by 2030 in India. It recommends creating an \"XR Corridor\" combining innovation, skill development, and manufacturing. The report urges leveraging Tamil Nadu's electronics corridors for indigenous hardware capabilities, reducing import dependence, and making academia an XR innovation anchor.", "category": "Technology", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "a40e2f85"}, {"headline": "PE-VC deal flows see marginal slowdown in May", "summary": "Private equity and venture capital (PE-VC) deal flows saw a marginal slowdown in May, reaching $2.2 billion (vs $1.8 billion in May 2025) across 82 deals (vs 92). While early-stage deals grew, growth-stage deal flow slowed. Mega deals like Rapido ($240 million) boosted the total. Geopolitical uncertainty and high-value deals on hold contribute to investor caution.", "category": "Business", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "4aac76c6"}, {"headline": "Brands and retailers focus on premiumisation strategy", "summary": "Leading brands and retailers in footwear, apparel, accessories, and beauty are increasingly adopting premiumisation strategies. Companies like Bata India and Shoppers Stop are observing higher growth rates in premium categories, as Indian consumers are willing to spend more on value-added products. This shift, driven by evolving shopping behaviors, prompts focus on product assortment and marketing investments.", "category": "Business", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "25abfc29"}, {"headline": "Experimental Ebola vaccines advance to trials with $61.8 million funding", "summary": "Vaccine developers are pushing three experimental shots against the Bundibugyo Ebola strain spreading in DR Congo. The Coalition for Epidemic Preparedness Innovations (CEPI) committed $61.8 million to fund candidates from IAVI, Moderna, and Oxford University (with Serum Institute of India production). The outbreak has expanded to 22 zones, making effective vaccines crucial for control.", "category": "Health", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "63ba134f"}, {"headline": "Screenless wristbands gain traction for distraction-free health tracking", "summary": "Screenless wrist wearables are a fast-growing segment in India's wearables market, making up less than 1% but expected to double. Consumers increasingly seek distraction-free devices with advanced health and fitness tracking, like Whoop, Polar, and Amazfit. This trend, aided by influencer endorsements, focuses on comfort, continuous sensing, and wellness insights, distinct from smartwatches.", "category": "Technology", "page": 12, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125760", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/125760"}], "article_id": "6e61809b"}, {"headline": "Power outage at Sonia Vihar plant deepens Delhi's water woes", "summary": "A power outage at the Sonia Vihar water treatment plant in Delhi has caused fresh water shortages, leading to complaints from south and east Delhi residents. This adds to existing issues from the Yamuna's dipping water levels, impacting the capital's water supply.", "category": "Infrastructure", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "715585a1"}, {"headline": "Collapsed Delhi building was \"booked\" but no action taken", "summary": "The six-storey building that collapsed in Saidulajab, killing six, was among over 125,000 Delhi properties \"booked\" by MCD for violations but faced no action. In Nov 2025, the Delhi government allowed power connections to such properties, reversing a long-standing penalty.", "category": "India", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "459e5fa6"}, {"headline": "Aviation turbine fuel prices cut, commercial LPG rates up", "summary": "Aviation turbine fuel (ATF) for international airlines was cut by 27%, while commercial LPG (19kg cylinder) increased by ₹42. Free-trade 5kg LPG cylinders also saw an ₹11 hike. Domestic ATF and household LPG prices remained unchanged. State-owned firms are losing ₹30/litre on domestic ATF, leading to price stability for consumers.", "category": "Economy", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "fd11a64d"}, {"headline": "Education ministry seeks CBSE report on OSM tender amid scrutiny", "summary": "The Union education ministry requested a detailed report from CBSE on its On-Screen Marking (OSM) system procurement process for Class 12 answer scripts, amid scrutiny over the platform's rollout and alleged irregularities.", "category": "Education", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "df5cdae0"}, {"headline": "Coempt undercut TCS by 60% for CBSE OSM contract", "summary": "Hyderabad-based Coempt Edu Teck won the CBSE On-Screen Marking contract for digital scanning and e-evaluation, outbidding TCS by nearly 60%. Coempt's bid was ₹384.6 crore versus TCS's ₹951.3 crore, despite a marginal technical score difference.", "category": "Business", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "ed52e916"}, {"headline": "CBSE misses deadline for Class 12 re-evaluation portal", "summary": "CBSE failed to reopen its Class 12 verification and re-evaluation portal on June 1 as announced, citing \"final security audits\" for the delay. The actual re-evaluation will occur on Coempt's OnMark platform, same as initial evaluation.", "category": "Education", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "13428844"}, {"headline": "ICC trials pink ball in Test matches for bad light", "summary": "The ICC has approved a trial to introduce pink balls in Test matches during bad light conditions, with prior agreement from teams, to maximize play. Other rule changes include enabling Hawk-Eye data for bowling actions and coach consultations during drinks breaks.", "category": "Sports", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "63731dcd"}, {"headline": "Nepal's RSP seeks new economic strategy with India", "summary": "Nepal's Rastriya Swatantra Party (RSP) advocates for a renewed Nepal-India partnership focused on development diplomacy, shifting from past anxieties. RSP chair Rabi Lamichhane emphasizes linking economies, enhancing infrastructure, and fostering trust for a shared prosperous future.", "category": "Politics", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "ea6cc2ac"}, {"headline": "Rahul Gandhi assured me cabinet spot, says Yathindra", "summary": "Yathindra Siddaramaiah expressed confidence in joining Karnataka's cabinet, stating Rahul Gandhi assured him a position. He dismissed deputy CM speculations. Yathindra and outgoing CM Siddaramaiah are in Delhi to consult Congress leadership on cabinet formation ahead of Wednesday's swearing-in.", "category": "Politics", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "767ce35e"}, {"headline": "Siddaramaiah left \"broken-down\" admin: R Ashoka", "summary": "Karnataka LoP R Ashoka criticized outgoing CM Siddaramaiah, claiming he left a \"broken-down lorry\" administration burdened with debt. Ashoka accused Siddaramaiah of resigning under Rahul Gandhi's pressure and predicted new CM Shivakumar would impose more taxes.", "category": "Politics", "page": 3, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "727155f6"}, {"headline": "Chipko Movement inspired Appiko for forest protection", "summary": "Inspired by the 1974 Chipko Movement in the Himalayas, the Appiko Movement began in 1983 in Karnataka's Western Ghats. Led by Panduranga Hegde, villagers hugged trees to protest deforestation, leading to a state-wide ban on felling green trees in natural forests by 1990.", "category": "Environment", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "fed2c23d"}, {"headline": "Rain lashes Chikkamagaluru, impacting daily life", "summary": "Chikkamagaluru experienced heavy rainfall on Monday.", "category": "India", "page": 3, "importance": 1, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "2670b093"}, {"headline": "Police probe man's protest against VIP traffic halts", "summary": "Bengaluru police initiated an inquiry into a man's sit-in protest on Old Airport Road against traffic halts for the governor's convoy. He claimed his pregnant wife was stuck. The incident occurred amid heavy congestion due to underpass construction.", "category": "India", "page": 3, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "e29144d0"}, {"headline": "BJP protests withdrawal of Aland violence cases in Karnataka", "summary": "Karnataka BJP protested the state government's decision to withdraw cases related to the 2022 communal violence at Ladle Mashak Dargah in Aland. State BJP chief BY Vijayendra demanded re-registration, accusing Congress of appeasing \"anti-social elements\" and insulting Hindus.", "category": "Politics", "page": 3, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "375bc6a2"}, {"headline": "Karnataka forms task force for quantum technology hub", "summary": "Karnataka government established a 16-member 'Quantum Task Force,' chaired by Prof Arindam Ghosh (IISc), to make the state a national quantum technology hub. The task force will implement the 'Karnataka Quantum Hub Roadmap,' develop infrastructure like a 'Quantum City,' and guide research and innovation.", "category": "Technology", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "7f4abb52"}, {"headline": "IPL final shift deprived fans, not RCB: DK Shivakumar", "summary": "Karnataka CM-designate DK Shivakumar stated the decision to move the IPL 2026 final from Bengaluru to Ahmedabad deprived local fans, not RCB, of a home match opportunity. He criticized BCCI's decision, which followed RCB's title retention after defeating Gujarat Titans.", "category": "Sports", "page": 3, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "9728c367"}, {"headline": "SC orders clean-up of Agasthyamalai, penalizes officials", "summary": "The Supreme Court ordered immediate removal of encroachers and illegal structures in the Agasthyamalai landscape, a biodiversity hotspot. It mandated strict disciplinary, penal, and criminal action against officials facilitating violations and quarterly compliance reports, threatening paramilitary deployment if states fail to act.", "category": "Environment", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "f3533eec"}, {"headline": "Annamalai's Delhi visit fuels BJP exit rumours", "summary": "Former Tamil Nadu BJP president K Annamalai's Delhi visit sparks speculation of his departure from the party, possibly to launch a new outfit. The visit coincides with Rajya Sabha candidate finalization and follows his disagreements with state leadership and AIADMK alliance strategy.", "category": "Politics", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "95b33da3"}, {"headline": "CM Vijay rejects horse-trading, slams rivals", "summary": "Tamil Nadu Chief Minister C Joseph Vijay rejected opposition's horse-trading accusations, claiming DMK and AIADMK tried to form government to \"loot.\" He accused DMK of \"family politics\" for their election defeat and announced a women's safety unit.", "category": "Politics", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "044effa2"}, {"headline": "AIADMK leader dies by suicide over poll defeat", "summary": "A 32-year-old AIADMK functionary died by suicide in Thanjavur due to distress over the party's electoral setbacks, urging party factions to unite. General secretary Palaniswami visited his family, announcing ₹55 lakh aid and sponsoring his daughter's education.", "category": "Politics", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "e3116ac1"}, {"headline": "LGBTQ community holds Pride event in Chennai", "summary": "Members and supporters of the LGBTQ community held a colorful Pride event in Chennai on Monday.", "category": "Culture", "page": 4, "importance": 2, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "963dfb49"}, {"headline": "Telangana bans cash wages, raises minimum pay", "summary": "Telangana banned cash wage payments in private sectors and extended minimum wage protections to gig and platform workers. Monthly minimum wages increased from ₹12,750 to ₹16,000 for unskilled, up to ₹20,000 for highly skilled workers, with equal rates for all genders.", "category": "Economy", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "b2a692be"}, {"headline": "Kerala HC reserves order on CMRL's ED probe plea", "summary": "The Kerala High Court reserved its verdict on Cochin Minerals and Rutile Limited's (CMRL) appeal against an ED probe into money-laundering charges related to allegedly fraudulent payments to ex-CM Pinarayi Vijayan's daughter's firm. The court orally asked ED not to precipitate the issue until judgment on June 5.", "category": "Law", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "73a72212"}, {"headline": "Won't tolerate Andhra leaders' interference in Telangana: Kavitha", "summary": "TRS president K Kavitha warned against Andhra Pradesh political leaders interfering in Telangana's affairs, threatening to \"break all statues and send them by parcel to Andhra\" if \"cultural dominance\" continues.", "category": "Politics", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "043cbaa3"}, {"headline": "Telangana CM threatens \"war\" on Centre over paddy procurement", "summary": "Telangana CM A Revanth Reddy threatened a \"war\" on the Centre after June 15 if it fails to buy paddy and other crops from the state. He urged Union minister G Kishan Reddy to take responsibility for purchasing agricultural produce, including rainwater-soaked paddy.", "category": "Politics", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "01deb07d"}, {"headline": "Suvendu Adhikari orders probe into Bengal welfare scheme fraud", "summary": "West Bengal CM Suvendu Adhikari ordered an SIT probe into alleged fraud in previous TMC regime's welfare schemes, claiming three million ineligible beneficiaries receive aid. This follows arrests in Murshidabad uncovering a wider misuse network, impacting financial assistance.", "category": "Politics", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "4e2a3f59"}, {"headline": "Kabaddi player killed over ₹3.6K dispute; vendor held", "summary": "A 17-year-old national-level kabaddi player, Anushka Pal, was allegedly murdered by fast-food vendor Shyam Dhanak in Meerut over a ₹3,600 debt. Dhanak was detained after a six-week investigation following Pal's disappearance on April 16.", "category": "India", "page": 5, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "32d54663"}, {"headline": "Shivakumar, Siddaramaiah submit cabinet lists to Congress", "summary": "Karnataka CM-designate DK Shivakumar and former CM Siddaramaiah submitted their lists of ministerial candidates to Congress state in-charge Randeep Surjewala. A high-level meeting will finalize the cabinet, with deputy CM slots still unresolved, as Parameshwara and Priyank Kharge eye the post.", "category": "Politics", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "7c59e1f0"}, {"headline": "AI Gandhi against Partition, silent on assassin", "summary": "An AI-powered 3D avatar of Mahatma Gandhi at Pradhanmantri Sangrahalaya tells visitors he opposed Partition but declines to comment on his assassin. This interactive HoloBox, using generative AI and motion-tracking, answers questions based on Gandhi's documented views in Hindi and English.", "category": "Culture", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "ba5856e7"}, {"headline": "CBI recreates death scene of actress Twisha Sharma", "summary": "CBI recreated the death scene of former model and actress Twisha Sharma at her Bhopal marital home, using an 80 kg dummy. The two-hour reconstruction involved her mother-in-law and husband to test the sequence of events in the alleged suicide case.", "category": "India", "page": 5, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "7fca4d9f"}, {"headline": "Three killed, two critical after inhaling toxic fumes", "summary": "Three workers, including a father and son, died and two others were hospitalized after inhaling toxic fumes while cleaning a sewage line at a Ludhiana factory. The factory owner has been booked for criminal negligence, and a judicial inquiry is ordered.", "category": "India", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "399fc4db"}, {"headline": "India to host 2nd BRICS Culture Working Group meeting", "summary": "India will host the second BRICS Culture Working Group meeting in Varanasi on June 4-5. The meeting, themed \"Building for Resilience, Innovation, Cooperation and Sustainability,\" will feature five thematic panel discussions across the group's priority areas for 2026.", "category": "Culture", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "55c75a9d"}, {"headline": "Govt to retain AI labelling rule, schedule mandatory advisories", "summary": "The government will mandate continuous labelling of AI-generated content on social media and plans to schedule which MeitY advisories will be mandatory for intermediaries. This is part of IT Rules amendments, aiming to enhance compliance and oversight.", "category": "Technology", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "51ec1c59"}, {"headline": "India-Oman free trade pact takes effect", "summary": "The India-Oman CEPA became operational on Monday, granting Indian exporters duty-free access to 99.38% of shipments to Oman. Union Commerce Minister Piyush Goyal highlighted its milestone significance for farmers, fishermen, and SMEs, aiming to forge beneficial trade partnerships.", "category": "Economy", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "abd1d42e"}, {"headline": "Man wanted for killing student leader shot dead", "summary": "Asif Ali, accused of killing an 18-year-old AASU leader and injuring a minor girl in Assam's Nalbari district, was shot dead in a police encounter. Ali allegedly tried to flee and attack police during an operation. The girl's condition remains critical.", "category": "Law", "page": 7, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "0ebdf7fc"}, {"headline": "Punjab Vigilance DG's reader surrenders in graft case", "summary": "OP Rana, reader to the Punjab Director General of Vigilance, surrendered to a Chandigarh court and was sent to seven-day CBI remand in a ₹13 lakh bribery case. He failed to get high court relief.", "category": "Law", "page": 7, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "ee13b638"}, {"headline": "Ten injured in firing at mining protesters in Rajasthan", "summary": "Ten people were injured, three critically, when unidentified individuals fired upon villagers protesting illegal mining and deep-hole blasting near residential areas in Rajasthan’s Kotputli-Behror district.", "category": "India", "page": 7, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "f1254a94"}, {"headline": "Four held, two minors detained for raping 12-year-old girl", "summary": "Four people were arrested and two minors detained in Assam's Majuli district for allegedly raping and impregnating a 12-year-old girl. The victim's pregnancy is nearly 28 weeks.", "category": "Law", "page": 7, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "4d4fcbb1"}, {"headline": "Gavi commits $50mn to combat Bundibugyo ebolavirus outbreak", "summary": "Gavi, the Vaccine Alliance, pledged nearly $50 million from its First Response Fund to support the Bundibugyo ebolavirus outbreak response in central Africa. Most funding ($40M) targets vaccine development and access, with $10M for outbreak response.", "category": "Health", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "43507916"}, {"headline": "India needs new economic strategy, move beyond 1991 reforms", "summary": "The author argues India needs a new economic strategy, asserting that post-1991 liberal economics has failed. Citing China's faster growth and trade surplus, the article calls for building depth in India's industrial base, increasing domestic incomes, and creating dignified opportunities for youth, moving away from a free trade-reliant approach.", "category": "Economy", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "7252dd4b"}, {"headline": "Delhi's invisible, illegal buildings cause fatal disasters", "summary": "The editorial highlights Delhi's pervasive issue of illegal, structurally unsafe buildings, exemplified by the Saidulajab collapse. It criticizes perfunctory official responses, blaming decades of regulatory failure, politician's amnesty drives, and lack of affordable public housing for perpetuating the dangerous environment.", "category": "India", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "8e51c2a7"}, {"headline": "Quad faces challenges despite increasing cooperation", "summary": "The article discusses the Quad's shifting relevance, noting its recent foreign ministers' meeting. While highlighting cooperation in areas like satellite data, maritime security, and critical minerals, it argues that unilateral US actions, Chinese opposition, and members' caution prevent Quad from being consistently seen as a serious enterprise.", "category": "Politics", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "262f449c"}, {"headline": "Papers on Mandelson's Russia-linked US envoy role released", "summary": "Thousands of documents related to Peter Mandelson's US ambassador appointment were released, revealing his pledge not to disappoint but also sharp criticism of PM Keir Starmer's government. Mandelson, whose Russia links sparked controversy, called Starmer's cabinet lacking \"verve.\"", "category": "World", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "023c4146"}, {"headline": "China patrols near Taiwan after Japan-Philippines maritime talks", "summary": "China's Coast Guard conducted \"law enforcement\" patrols east of Taiwan in response to Japan and the Philippines planning talks on their maritime boundary, which overlaps with Chinese claims. Taiwan condemned the move, reporting two Chinese ships south-east without entering restricted waters.", "category": "World", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "b5c1fffe"}, {"headline": "China tightens overseas investment rules after Meta-Manus block", "summary": "China issued sweeping new rules, effective July 1, tightening control over overseas deals involving Chinese investors, technology, data, and national security. This follows Beijing's order for Meta to unwind its acquisition of AI startup Manus.", "category": "Business", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "3456a8f2"}, {"headline": "Bangladesh raises fuel prices again amid Middle East conflict", "summary": "Bangladesh increased fuel prices for the second time in six weeks to ease pressure on state finances, heavily impacted by the Middle East conflict. Kerosene and petrol prices rose, but diesel remained unchanged, as the country imports 95% of its fuel.", "category": "World", "page": 11, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "e05d5b3c"}, {"headline": "SoftBank plans €75bn investment in French AI data centers", "summary": "SoftBank Group plans to invest up to €75 billion to build 5 gigawatts of AI data center capacity in France. The initial phase involves a €45 billion investment for 3.1 gigawatts in the Hauts-de-France region by 2031.", "category": "Business", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "579f0b9f"}, {"headline": "Drone strikes kill 67 in Sudan's Kordofan region", "summary": "At least 67 people were killed in Sudan’s Kordofan region in two recent drone attacks, according to a rights group and local leader. The pace of drone attacks by the paramilitary Rapid Support Forces (RSF) and the Sudanese army has increased.", "category": "World", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "19064013"}, {"headline": "Abiy Ahmed expected to win Ethiopia's re-election", "summary": "Ethiopian Prime Minister Abiy Ahmed is expected to win a landslide re-election. Abiy, ruling since 2018 and a Nobel Peace Prize laureate, faces criticism for authoritarianism despite earlier mending ties with Eritrea.", "category": "World", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "4ceaa07a"}, {"headline": "Banks can't prosecute borrower after settlement: SC", "summary": "The Supreme Court ruled that banks cannot initiate criminal prosecution against a borrower after voluntarily settling a dispute, as it demonstrates a lack of good faith and abuses legal process. Such prosecutions undermine confidence in negotiated commercial settlements.", "category": "Law", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "4ffbcb64"}, {"headline": "Brazil relies on Neymar despite fitness concerns", "summary": "Brazil continues to build its World Cup project around 34-year-old Neymar, despite his injury history and recent physiotherapy. The article questions this reliance, highlighting his past burdens, inconsistent form, and Brazil's failure to truly decentralize its team around younger talents like Vinícius Júnior.", "category": "Sports", "page": 13, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "d9f0d019"}, {"headline": "PSG's Dembele raises UCL trophy at French Open", "summary": "Ousmane Dembele and his PSG teammates, Bradley Barcola, Warren Zaire-Emery, and Desire Doue, brought their Champions League trophy to the French Open. They received a standing ovation from tennis fans on Philippe-Chatrier court, with Dembele shouting \"Ici c'est Paris!\"", "category": "Sports", "page": 13, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "d4bbe98f"}, {"headline": "Three young stars shine at French Open quarterfinals", "summary": "The 2026 French Open sees a new wave of talent with teenagers Joao Fonseca (Brazil), Rafael Jodar (Spain), and Jakub Mensik (Czech Republic) reaching the men's singles quarterfinals. This marks a rare occasion with three players under 21 in the Slam's last eight.", "category": "Sports", "page": 13, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "7b6949d3"}, {"headline": "IPL 2026: Top performers across key categories", "summary": "A summary of the IPL 2026 season's leading players. Sai Sudharsan (GT) led in most fours (75), Shubman Gill (GT) in most runs (733) and orange cap. Kagiso Rabada (GT) led in most wickets (29) and purple cap. Vaibhav Sooryavanshi (RR) hit most sixes (72) and dot balls (172).", "category": "Sports", "page": 14, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "69cbd228"}, {"headline": "Kohli's T20 revamp fuels RCB's IPL title win", "summary": "Virat Kohli's personal transformation in T20 batting, adapting to modern demands with a higher strike rate (675 runs at 165.84 SR), has been central to RCB's IPL success. His game sense and leadership, especially in crucial moments, cemented his role as the team's primal force, complementing a balanced squad.", "category": "Sports", "page": 14, "import
