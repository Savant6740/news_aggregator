<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Inter', -apple-system, sans-serif;
  background: #0c0c0c; color: #fff; touch-action: none;
}
.outer { position: fixed; inset: 0; overflow: hidden; }
.h-track { display: flex; height: 100%; will-change: transform; }
.cat-panel { flex-shrink:0; width:100vw; height:100%; display:flex; flex-direction:column; overflow:hidden; }
.progress-row { flex-shrink:0; display:flex; gap:4px; padding:14px 16px 10px; background:#0c0c0c; position:relative; z-index:5; overflow:visible; }
.progress-row::after { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:80%; height:120px; background:radial-gradient(ellipse at top,color-mix(in srgb,var(--cc) 30%,transparent) 0%,transparent 70%); pointer-events:none; z-index:-1; }
.pseg { flex:1; height:2px; border-radius:1px; background:rgba(255,255,255,0.12); position:relative; overflow:hidden; }
.pseg::after { content:''; position:absolute; inset:0; background:var(--cc,#e8334a); transform:scaleX(0); transform-origin:left; transition:transform 0.25s ease; }
.pseg.done::after, .pseg.active::after { transform:scaleX(1); }
.v-feed { flex:1; overflow:hidden; position:relative; clip-path:inset(0); }
.v-track { display:flex; flex-direction:column; will-change:transform; }
.card { 
  width:100%; flex-shrink:0; background:#0c0c0c; display:flex; flex-direction:column; 
  overflow:hidden; position:relative; 
  scroll-margin-top: 80px;
}
.card.target-highlight {
  background: linear-gradient(135deg, #fff3cd22 0%, #ffeaa722 100%) !important;
  box-shadow: 0 0 30px rgba(255, 193, 7, 0.4);
  border: 2px solid #f39c12;
  animation: pulse-highlight 2s ease-in-out;
}
@keyframes pulse-highlight {
  0%, 100% { box-shadow: 0 0 30px rgba(255, 193, 7, 0.4); }
  50% { box-shadow: 0 0 50px rgba(255, 193, 7, 0.6); }
}
.card-content { flex:1; display:flex; flex-direction:column; padding:36px 20px 22px; min-height:0; position:relative; z-index:1; }
.card-toprow { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; flex-shrink:0; }
.cat-pill { display:inline-flex; align-items:center; gap:7px; background:#1c1c1e; border-radius:8px; padding:7px 12px 7px 10px; font-size:11.5px; font-weight:700; letter-spacing:0.07em; color:#d0d0d0; text-transform:uppercase; line-height:1; }
.pill-icon { width:16px; height:16px; background:#2e2e30; border-radius:3px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.pill-icon svg { display:block; }
.card-date { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:500; color:#666; letter-spacing:0.01em; }
.card-headline { font-size:28px; font-weight:800; line-height:1.18; color:#fff; letter-spacing:-0.03em; margin-bottom:20px; flex-shrink:0; }
.card-summary { font-size:15.5px; font-weight:400; line-height:1.62; color:#6b6b6b; flex:1; overflow:hidden; display:-webkit-box; -webkit-line-clamp:7; -webkit-box-orient:vertical; }
.card-divider { height:1px; background:#1e1e1e; margin:20px 0 16px; flex-shrink:0; }
.card-footer { display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.src-chip { display:inline-flex; align-items:center; gap:6px; background:#181818; border:1px solid #282828; border-radius:9px; padding:8px 13px; font-size:12.5px; font-weight:600; color:#c0c0c0; text-decoration:none; letter-spacing:0.005em; line-height:1; }
.src-chip-sep { color:#3a3a3a; font-weight:400; }
.src-chip-pg { color:#555; font-weight:500; }
.src-chip-ext { margin-left:2px; }
.src-chip-ext svg { display:block; }
.info-btn { width:36px; height:36px; border-radius:50%; border:1.5px solid #252525; background:#141414; display:flex; align-items:center; justify-content:center; color:#555; cursor:pointer; flex-shrink:0; }
.cat-flash { position:fixed; inset:0; z-index:600; pointer-events:none; opacity:0; transition:opacity 0.12s; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; }
.cat-flash.on { opacity:1; }
.cf-icon { font-size:34px; }
.cf-name { font-size:22px; font-weight:900; letter-spacing:-0.03em; text-transform:uppercase; }
.hint { position:fixed; display:flex; flex-direction:column; align-items:center; gap:5px; pointer-events:none; z-index:400; opacity:0; transition:opacity 0.6s ease; }
.hint.visible { opacity:1; }
.hint.gone { opacity:0 !important; transition:opacity 0.4s; }
.hint-pill { font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.55); background:rgba(255,255,255,0.07); backdrop-filter:blur(10px); padding:5px 13px; border-radius:100px; border:1px solid rgba(255,255,255,0.09); }
.hint-arr { font-size:16px; color:rgba(255,255,255,0.4); }
.h-up { bottom:28px; left:50%; transform:translateX(-50%); animation:bUp 2s ease-in-out infinite; }
.h-right { top:50%; right:14px; transform:translateY(-50%); animation:bRight 2s ease-in-out infinite 0.6s; }
@keyframes bUp { 0%,100% { bottom:28px; opacity:.65; } 50% { bottom:36px; opacity:1; } }
@keyframes bRight { 0%,100% { right:14px; opacity:.65; } 50% { right:6px; opacity:1; } }
</style>

<script>
const DIGEST   = {"date": "14 June 2026", "articles": [{"headline": "India Market Diversification Stands Apart Amid Global Single-Stock Concentration", "summary": "Data from MSCI country indices reveal India's equity market is less concentrated than global peers like Taiwan, South Korea, and the Netherlands. While those markets are driven by single tech giants like TSMC or Samsung, India’s largest stock, HDFC Bank, holds only a 6.4% weight. This diversification offers stability to investors despite slower projected earnings growth compared to AI-led peers.", "category": "Economy", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/127120", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_14-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127120"}], "article_id": "b52c2f42"}, {"headline": "Investors Advised to Accumulate EIH Shares Gradually on Market Dips", "summary": "EIH, the owner of Oberoi and Trident hotel brands, has seen a 32% correction from its 2025 high. Trading at 21 times FY27 estimated earnings, valuations are now more attractive than peers like Indian Hotels. Despite weak FY26 earnings, a strong hotel pipeline and net-cash balance sheet support a medium-term recovery, though investors should watch for capex and foreign tourist arrival risks.", "category": "Business", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127120", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_14-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127120"}], "article_id": "50f4a01e"}, {"headline": "Start-ups Commercialize Freeze-Dried Comfort Food for Global Indian Travellers", "summary": "Indian D2C brands like DryM Foods and Bowlful Foods are using freeze-dry technology to offer shelf-stable traditional meals like rajma chawal and idli. The market is projected to reach $315 million by 2033, driven by outbound travel and students. Unlike established giants, these startups leverage social media and niche travel communities, with some securing deals for Vande Bharat trains.", "category": "Business", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127120", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_14-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127120"}], "article_id": "df1a2dfc"}, {"headline": "New Expected Credit Loss Model to Impact Bank Borrowing Costs", "summary": "Starting FY28, Indian banks will shift from an incurred loss model to an Expected Credit Loss (ECL) model for bad loan provisioning. This proactive approach requires higher reserves for loans showing significant credit risk increases. Borrowers with declining credit scores or frequent inquiries could face higher interest rates or loan rejections as banks adjust to tighter regulatory floors.", "category": "Economy", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127120", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_14-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127120"}], "article_id": "95c2f333"}, {"headline": "Summer Consumption Stocks Underperform Despite Revival in Seasonal Demand", "summary": "Despite heatwaves reviving demand for ACs, fans, and beverages since mid-April, most summer-linked stocks have declined. Out of 18 stocks analyzed, 11 reported falls, with Wonderla Holidays and Havells India dropping over 9%. High valuations (P/E ratios) and inventory overhangs are tempering investor enthusiasm, even as companies like Varun Beverages report strong seasonal offtake.", "category": "Business", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127120", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_14-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/127120"}], "article_id": "f724f5f9"}, {"headline": "Factor-Based Investing Offers Diversification Across Varying Market Cycles", "summary": "Factor investing strategies, focusing on low volatility, momentum, value, and quality, show meaningful performance dispersion in India. Low volatility indices provided better downside protection during the 2020 crash, while momentum and value strategies typically lead during recoveries. Blending these factors can help investors create more resilient portfolios across different environments.", "category": "Business", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127120", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_14-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/127120"}], "article_id": "a45c1b59"}, {"headline": "Indian Overseas Bank Increases Interest Rates for Non-Callable Fixed Deposits", "summary": "Indian Overseas Bank (IOB) has revised interest rates upward for its domestic non-callable fixed deposits. The decision, made during a recent Asset-Liability Committee meeting, involves a 10 basis points (0.10%) hike across three specific time-frames. This move follows similar competitive rate adjustments in the banking sector to attract domestic term deposits.", "category": "Business", "page": 3, "importance": 4, "telegram_url": "https://t.me/c/1877410077/127120", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_14-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/127120"}], "article_id": "7ed345fb"}, {"headline": "Bank of India Mid & Small Cap Fund Offers Unique Hybrid Strategy", "summary": "The Bank of India Mid & Small Cap Equity & Debt Fund stands out as the only category peer avoiding large-cap stocks. It maintains 70-78% exposure to mid and small-cap companies while using high-quality debt for downside protection. The fund has delivered a 22% CAGR over three years, making it suitable for high-risk investors seeking growth without full small-cap volatility.", "category": "Business", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127120", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_14-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127120"}], "article_id": "bb8b40e7"}, {"headline": "ICICI Prudential Launches Nifty Smallcap 250 Index Tracking ETF", "summary": "ICICI Prudential Mutual Fund has opened the NFO for its Nifty Smallcap 250 ETF, closing June 16. The fund aims to replicate the performance of companies ranked 251-500 by market capitalization. The index covers nearly 20 sectors, including financial services and healthcare. The minimum application amount is ₹1,000, and the fund is managed by Nishit Patel, Ashwini Bharucha, and Venus Ahuja.", "category": "Business", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/127120", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_14-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127120"}], "article_id": "570d3125"}, {"headline": "SAMCO Securities Obtains Licence for Global Investing Platform via GIFT City", "summary": "SAMCO Securities has launched a global investing offering after receiving a broker-dealer licence from the GIFT City regulator. This allows Indian investors to trade over 700 US-listed stocks and ETFs through a regulated, research-backed platform. The solution integrates quantitative research, target prices, and stop-loss frameworks for constituents of the S&P 500 and NASDAQ 100.", "category": "Business", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/127120", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_14-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127120"}], "article_id": "2775d6e5"}, {"headline": "Retail and ETF Demand Surges Ahead of Anticipated SpaceX Public Debut", "summary": "Speculative frenzy surrounding the SpaceX IPO has led to over $100 billion in orders and the filing of 20 SpaceX-linked ETFs. One leveraged ETF surged 80% before being halted due to regulatory concerns. Investors unable to secure direct allocations are seeking exposure through alternative trading venues and pre-IPO funds, highlighting a shift in how retail investors access major private deals.", "category": "World", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127120", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_14-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127120"}], "article_id": "45735439"}, {"headline": "Investors Advised to Book Partial Profits in Polycab India", "summary": "Polycab India has returned 33% since August 2025, supported by infrastructure spending and a strong 31% market share in cables. However, with the stock trading at 43 times forward earnings—a 16% premium to its five-year average—and potential headwinds from higher copper prices and rate hikes, partial profit booking is recommended as growth may moderate from a high base.", "category": "Business", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127120", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_14-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/127120"}], "article_id": "a9b4dce3"}, {"headline": "Nifty and Bank Nifty Regain Footing as Bearish Sentiment Moderates", "summary": "Benchmark indices showed recovery last week, with Nifty 50 and Nifty Bank gaining 1.1% and 4.3% respectively. Derivatives data suggests short covering and improving option sentiment. FIIs reduced net short positions on index call options by 24%, though they remain net short on index futures. Nifty Bank outperformed by breaking key resistance at 55,800, indicating strengthening upside momentum.", "category": "Economy", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127120", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_14-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/127120"}], "article_id": "c1f1827c"}, {"headline": "Derivative Outlook Remains Neutral for Life Insurance Corporation of India", "summary": "LICI stock has been consolidating in a narrow range of ₹360-440. Technical indicators suggest that only a breakout above ₹432 will trigger a clear upward trend toward new highs. Currently, support remains valid at ₹383. Traders are advised to monitor the ₹410 resistance level, while long positions on June futures are suggested with a target of ₹411 and a stop-loss at ₹393.", "category": "Business", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/127120", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_14-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/127120"}], "article_id": "f3b56a13"}, {"headline": "Gold Futures Signal Bearishness While Silver Shows Relative Strength", "summary": "Domestic gold futures closed the week below ₹1,52,000, which is considered a bearish signal. However, a recovery from the 200-day moving average at ₹1,46,750 keeps recovery hopes alive. Silver outperformed gold marginally, finding support at ₹2,30,000. Traders are advised to wait for a gold breakout above ₹1,57,000 or a silver breakout above ₹2,60,000 to confirm a positive outlook.", "category": "Economy", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127120", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_14-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/127120"}], "article_id": "d6704713"}, {"headline": "Crude Oil Prices Test Key Supports Amid Downtrend Signals", "summary": "Brent crude futures broke below the $90 support level, indicating a potential fresh leg of the downtrend. Domestic crude oil futures also closed lower at ₹7,968. While a minor corrective rise to ₹8,300 is possible, technical charts suggest a further decline toward ₹7,250. Shorting July contracts is recommended for fresh positions with a target of ₹7,250 and a stop-loss at ₹8,800.", "category": "Economy", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127120", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_14-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/127120"}], "article_id": "8740ae8a"}, {"headline": "Benchmark Indices Show Recovery Signs Despite Heavy FPI Selling", "summary": "Nifty 50 and Sensex recovered from initial weekly losses, gaining 1.1% and 1.7% respectively. Nifty Bank outperformed with a 4% surge. Foreign Portfolio Investors (FPIs) remain heavy sellers, with a net outflow of $6.59 billion in just two weeks. Nifty needs a sustained rise above 23,800 to target 24,700, while Sensex eyes 86,000 in the medium term if current supports hold.", "category": "Economy", "page": 7, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127120", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_14-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/127120"}], "article_id": "797626bf"}, {"headline": "Medium-Term Outlook Weakens for Mahindra & Mahindra Shares", "summary": "M&M shares are struggling to breach the ₹3,400 mark, indicating a lack of fresh buying interest. Technical analysis suggests that a break below the ₹2,750 support level could see prices tumble toward ₹2,400 by the end of the year. Investors are advised to exit at current levels and consider re-entering around ₹2,400, unless the stock manages a decisive rise above ₹3,500.", "category": "Business", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/127120", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_14-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/127120"}], "article_id": "35c53da0"}, {"headline": "US Markets Await Federal Reserve Stance Under New Chairman Kevin Warsh", "summary": "Global markets are focused on Wednesday’s US Federal Reserve meeting, the first under new Chairman Kevin Warsh. With high inflation shifting expectations toward a rate hike, the dollar index is testing the 100 level. The Dow Jones recently bounced from the 50,000 psychological level, but technical analysts warn of potential corrective falls if the US-Iran peace deal talks fail.", "category": "World", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127120", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_14-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/127120"}], "article_id": "e36edd39"}, {"headline": "Lupin and Ramkrishna Forgings Show Signs of Potential Technical Breakouts", "summary": "Lupin has been consolidating since March, and technical analysts expect a swift rally to ₹2,700 soon. Similarly, Ramkrishna Forgings has formed a higher base at ₹550, confirming a double-bottom pattern that could lift the stock to ₹780. In contrast, Grasim Industries may see further correction before regaining traction, with a potential fresh rally target of ₹3,450.", "category": "Business", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/127120", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_14-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/127120"}], "article_id": "c0f030f5"}, {"headline": "Comprehensive Health Insurance and Riders Essential for Cancer Financial Protection", "summary": "With one in ten Indians likely to face a cancer diagnosis, traditional insurance covers are often insufficient. Advanced treatments like CAR-T and gene therapy can cost up to ₹30 lakh. Experts recommend high sum insured policies (>₹50 lakh) and critical illness riders that provide lump-sum payouts upon diagnosis to cover non-medical costs and income loss for patients and caregivers.", "category": "Health", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127120", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_14-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/127120"}], "article_id": "a425f631"}, {"headline": "BSE Technologies Launches ‘StAR NPS’ for Digital Subscriber Onboarding", "summary": "BSE Technologies has operationalized the ‘StAR NPS’ platform to facilitate wider digital access to the National Pension System. The technology-enabled platform is designed for use by Points of Presence (PoPs) and various pension agents to streamline the assisted onboarding journey for subscribers, supporting the government's push for digital financial inclusion.", "category": "Business", "page": 9, "importance": 4, "telegram_url": "https://t.me/c/1877410077/127120", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_14-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/127120"}], "article_id": "89e84491"}, {"headline": "Tata Trusts CEO Pushes Back Against Perceptions of Leadership Chaos", "summary": "Tata Trusts CEO Siddharth Sharma addressed recent media focus on boardroom developments, urging a shift to the group's philanthropic work. He noted that Tata Trusts spent ₹1,600 crore on charitable activities in FY26, with plans to increase this to ₹2,000 crore this year. As the principal shareholder of Tata Sons, the trust continues to fund healthcare and cancer care across several Indian states.", "category": "Business", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127120", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_14-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/127120"}], "article_id": "86479766"}, {"headline": "Dr Reddy’s Laboratories Launches Generic Cancer Treatment Tablets in US", "summary": "Dr Reddy’s has launched Bosutinib tablets, a generic equivalent of Bosulif, in the US market. Developed in collaboration with MSN Laboratories, the product was a first-to-file launch, granting it 180 days of generic drug exclusivity. This expansion of the oncology portfolio aims to broaden access and lower costs for patients and healthcare providers in North America.", "category": "Health", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127120", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_14-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/127120"}], "article_id": "5c482ccb"}, {"headline": "Hexaware Technologies Inaugurates New TechFin Center at GIFT City", "summary": "IT services firm Hexaware Technologies has opened a new hub in GIFT City with 250 employees. The company aims to scale this workforce to 1,000 over the next three years to serve global banking, financial services, and insurance (BFSI) clients. The center will focus on software engineering, cloud transformation, and AI-led projects for the US and European markets.", "category": "Technology", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/127120", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_14-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/127120"}], "article_id": "564ba9ca"}, {"headline": "Antwerp Vice Mayor Discusses Diamond Trade and Clean Fuel with India", "summary": "Johan Klaps, Vice Mayor of Antwerp, met with Indian traders to discuss simplifying immigration for diamond polishers and sourcing clean fuels. Antwerp seeks to regain leadership in the diamond trade amid sanctions on Russia and competition from Dubai. The port is also exploring partnerships, including with the Adani Group, to import green energy to support Belgium's energy transition.", "category": "Business", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127120", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_14-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/127120"}], "article_id": "8599528e"}, {"headline": "In a first, AI model pulled offline after US govt intervenes", "summary": "Anthropic disabled its most powerful AI models, Fable 5 and Mythos 5, following a US national security directive. The order barred all foreign nationals from accessing the models, forcing a full shutdown. This marks the first time a leading AI company has pulled a deployed model under government orders, citing risks related to \"jailbroken\" models and potential misuse in hacking.", "category": "Technology", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/127142", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁴⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127142"}], "article_id": "ab7a0e22"}, {"headline": "TMC on brink as another MP indicates switch to rebel group", "summary": "Veteran Trinamool Congress leader Sudip Bandyopadhyay met senior BJP leader Pralhad Joshi, fueling speculation of a split in the party. Bandyopadhyay was accompanied by dissident MP Satabdi Roy. Rebel MPs are reportedly seeking recognition as a separate parliamentary group. The move follows TMC chief Mamata Banerjee removing Bandyopadhyay from his post as North Kolkata president.", "category": "Politics", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/127142", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁴⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127142"}], "article_id": "50101c7d"}, {"headline": "Trump, Modi meeting on cards; PM lands in France", "summary": "Prime Minister Narendra Modi arrived in Nice, France, for the G7 summit where he is expected to meet US President Donald Trump. The bilateral meeting will focus on trade, defense, and security cooperation. US officials indicated that a trade agreement could be concluded by mid-July. Modi will also participate in outreach sessions with other global leaders on energy and conflict issues.", "category": "Politics", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/127142", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁴⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127142"}], "article_id": "55acb235"}, {"headline": "Trump says peace blueprint set to be signed today", "summary": "US President Donald Trump announced that a peace blueprint between the US and Iran is set to be signed on Sunday, potentially ending weeks of conflict. However, Iranian officials have remained silent, and the state-run news agency stated the Strait of Hormuz remains open. The deal aims to curb Iran's nuclear program in exchange for sanctions relief. Global markets await official confirmation.", "category": "World", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/127142", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁴⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127142"}], "article_id": "7c4199f0"}, {"headline": "EAM protests seafarers' deaths, Rubio defends US actions", "summary": "External Affairs Minister S Jaishankar protested the deaths of three Indian seafarers in US attacks on ships in the Strait of Hormuz. US Secretary of State Marco Rubio defended the actions, stating the US would not tolerate violations of its blockade on Iranian ports. The exchange highlights rising tensions between India and the US over maritime security and trade with Iran.", "category": "World", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/127142", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁴⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127142"}], "article_id": "fe3889f7"}, {"headline": "Delhi HC collegium withdraws judge pick after name sent", "summary": "The Delhi High Court collegium has taken the rare step of withdrawing the name of a lawyer recommended for judgeship after the proposal had been sent to the Supreme Court Collegium. This mid-course correction in the judicial appointment process is seen as unusual. No specific reasons were provided for the withdrawal of the recommendation.", "category": "Law", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127142", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁴⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127142"}], "article_id": "5eaab2cd"}, {"headline": "Masked woman on CCTV lends twist to Tughlakabad blaze", "summary": "Delhi Police are investigating a fire in Tughlakabad Extension that killed three family members. CCTV footage shows a masked woman entering the building minutes before the blaze started and leaving shortly after a flash was seen inside. The fire may have originated from an electric scooter being charged. Forensic teams are examining the site to determine the cause.", "category": "India", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/127142", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁴⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127142"}], "article_id": "470862d1"}, {"headline": "Army revamps dress code: ‘Bandi’ jackets in, pouch belts out", "summary": "The Indian Army introduced new dress regulations to shed colonial-era traditions. Changes include authorizing closed-neck 'bandi' jackets in formal settings, removing ceremonial pouch belts, and allowing officers to carry swords on parade. A new winter dress, 'Dress 3B', has also been introduced. The move aims to align the force with national identity and ethos.", "category": "India", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127142", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁴⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127142"}], "article_id": "ed3de102"}, {"headline": "Govt dept takes control of Jaipur Polo Club land", "summary": "The Centre’s Land and Development Office (L&DO) took possession of the 15-acre Jaipur Polo Ground in Delhi. The move follows a Delhi court's refusal to stay the government’s eviction notice. The club has been a fixture in the capital's sporting scene for decades. The takeover is part of a larger plan to reclaim government-owned land for public use.", "category": "Law", "page": 1, "importance": 4, "telegram_url": "https://t.me/c/1877410077/127142", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁴⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127142"}], "article_id": "35b15c80"}, {"headline": "Delhi Zoo undertakes wildlife matchmaking drive", "summary": "Delhi's National Zoological Park is seeking mates for at least 15 animal and bird species to boost breeding and genetic diversity. Partners are being sought for species including the ostrich, Rhea, Egyptian vulture, and several types of hornbills and monkeys. The zoo is exploring exchange programs with facilities in Chhatbir, Ranchi, Rohtak, and Bilaspur.", "category": "Environment", "page": 1, "importance": 3, "telegram_url": "https://t.me/c/1877410077/127142", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁴⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127142"}], "article_id": "de20b18f"}, {"headline": "Vizag steel plant blast toll rises to 10", "summary": "The death toll from the explosion at the Visakhapatnam steel plant has risen to 10. The incident occurred when molten steel leaked from a ladle during operations. Authorities have suspended 22 officials pending a full investigation into safety lapses. The Rashtriya Ispat Nigam Ltd (RINL) management has promised compensation for the victims' families.", "category": "India", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127142", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁴⁰⁶²⁰²⁶.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127142"}], "article_id": "8800eec7"}, {"headline": "Ex-AIADMK minister, BJP leader join Vijay's TVK", "summary": "Five prominent leaders, including a former AIADMK minister and a BJP district secretary, have joined the Tamilaga Vettri Kazhagam (TVK) led by actor Vijay. The inductions took place at the TVK headquarters in Chennai. The move is seen as a boost for the fledgling party ahead of the 2026 assembly elections. Vijay welcomed the new members, emphasizing the party's inclusive vision.", "category": "Politics", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127142", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁴⁰⁶²⁰²⁶.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127142"}], "article_id": "24b86cae"}, {"headline": "DMK chief attacks CM Vijay over Delhi visit", "summary": "MK Stalin, the DMK president and Tamil Nadu Chief Minister, criticized TVK leader Vijay for his recent visit to Delhi. Stalin questioned Vijay's meeting with central leaders and suggested it was an attempt to seek favor from the BJP. The TVK has dismissed the criticism, stating the visit was to discuss issues relevant to Tamil Nadu's development and not for political alliances.", "category": "Politics", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127142", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁴⁰⁶²⁰²⁶.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127142"}], "article_id": "c2159b1d"}, {"headline": "US missionary group booked in Naxal funding case", "summary": "Bengaluru police registered a case against a US-based missionary group and six individuals for allegedly funding Naxal activities. The investigation was initiated based on a complaint by the Enforcement Directorate. Officials found over 1,000 foreign debit cards linked to the group. The accused have been booked under the Unlawful Activities (Prevention) Act.", "category": "Law", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127142", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁴⁰⁶²⁰²⁶.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127142"}], "article_id": "1aef0d55"}, {"headline": "Jagan accuses TDP-led govt of deception and scams", "summary": "YSRCP leader YS Jagan Mohan Reddy accused the TDP-led Andhra Pradesh government of widespread deception and financial fraud. Jagan alleged that the current administration is dismantling welfare schemes introduced by his government. The opposition leader called for a public protest against the government's policies. The TDP has denied the allegations, calling them baseless.", "category": "Politics", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127142", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁴⁰⁶²⁰²⁶.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127142"}], "article_id": "ea41fe95"}, {"headline": "CM Revanth to meet CM Fadnavis in July", "summary": "Telangana Chief Minister Revanth Reddy is scheduled to meet Maharashtra Deputy CM Devendra Fadnavis in July to discuss the inter-state Tummidihatti barrage project. The project aims to provide irrigation to several districts in Telangana. The meeting will focus on resolving land acquisition and environmental clearance issues. Both states seek a mutually beneficial agreement.", "category": "Infrastructure", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127142", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁴⁰⁶²⁰²⁶.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127142"}], "article_id": "e80ddbc8"}, {"headline": "Two dead after car crashes into bridge in Bengaluru", "summary": "Two young men were killed when their car crashed into a bridge on the outskirts of Bengaluru. The accident occurred on the Bengaluru-Chennai Expressway when the driver lost control at high speed. The victims were returning to the city after a meal. Police have registered a case and are investigating whether the driver was under the influence of alcohol.", "category": "India", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/127142", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁴⁰⁶²⁰²⁶.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127142"}], "article_id": "f6bfb2c9"}, {"headline": "AIADMK urges TVK to block K'taka's Mekedatu dam push", "summary": "The AIADMK called on the TVK to oppose Karnataka’s plans to construct the Mekedatu dam across the Cauvery river. AIADMK leader Edappadi K Palaniswami urged TVK chief Vijay to use his political influence to protect Tamil Nadu’s water rights. The dam project has been a long-standing point of contention between the two states, with Tamil Nadu citing potential water shortages.", "category": "Politics", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127142", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁴⁰⁶²⁰²⁶.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127142"}], "article_id": "6ede360f"}, {"headline": "Woman killed in Bengaluru after falling near pothole", "summary": "A 42-year-old woman was killed in Bengaluru after she fell from her two-wheeler while trying to avoid a pothole and was run over by a bus. The incident occurred on the Marathahalli-Sarjapur road. Residents have expressed outrage over the poor condition of roads and lack of maintenance by civic authorities. Police have arrested the bus driver.", "category": "India", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/127142", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁴⁰⁶²⁰²⁶.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127142"}], "article_id": "5b1ce22f"}, {"headline": "New anti-drug campaigns in schools: Chennithala", "summary": "Congress leader Ramesh Chennithala announced that several new anti-narcotic campaigns will be launched in schools across Kerala. The initiative aims to raise awareness among students about the dangers of drug abuse. The campaign will include workshops and seminars involving experts and law enforcement. Chennithala emphasized the need for a collaborative effort to combat the drug menace.", "category": "Education", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/127142", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁴⁰⁶²⁰²⁶.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/127142"}], "article_id": "296d411f"}, {"headline": "Greer to visit India after G7 summit", "summary": "US Trade Representative Jamieson Greer will visit India next week to discuss a bilateral trade deal. The visit follows the G7 summit where PM Modi and President Trump are meeting. The senior official indicated that a trade agreement could be concluded by mid-July. Both nations aim to strengthen economic ties through preferential tariffs and increased market access.", "category": "Economy", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127142", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁴⁰⁶²⁰²⁶.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/127142"}], "article_id": "42880fe7"}, {"headline": "Rahul Gandhi to launch anti-paper leak campaign from Kota", "summary": "Congress leader Rahul Gandhi will launch a nationwide campaign against government issues from Rajasthan's Kota on June 17. The campaign will focus on the \"Agnipath\" scheme and recent paper leak scandals affecting millions of students. Kota was chosen as the starting point due to its status as a major coaching hub. The campaign aims to address grievances related to unemployment.", "category": "Politics", "page": 3
