 Hindu", "pdf_filename": "TH Delhi 27-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125036"}], "article_id": "c47d3f5f"}, {"headline": "Fourth AIADMK MLA Resigns to Join Vijay's Tamilaga Vettri Kazhagam", "summary": "Ambasamudram MLA Esakki Subaya resigned from his Assembly membership and the AIADMK to join C. Joseph Vijay’s TVK. He is the fourth legislator to quit the party in two days. The AIADMK faction led by Edappadi K. Palaniswami has petitioned the Speaker to withdraw the acceptance of previous resignations, citing pending disqualification proceedings under the Tenth Schedule.", "category": "Politics", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125036", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 27-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125036"}], "article_id": "eaa4591b"}, {"headline": "Centre Constitutes High-Level Committee to Study Illegal Immigration and Demographic Change", "summary": "The Centre has formed a committee headed by retired Supreme Court judge Prakash Prabhakar Navlekar to study demographic changes caused by illegal immigration. The panel is tasked with recommending institutional mechanisms for population stabilization and streamlining the deportation of illegal immigrants. The committee includes the Census Commissioner and must report within a year.", "category": "Politics", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125036", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 27-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125036"}], "article_id": "9d265a47"}, {"headline": "U.S. Conducts Self-Defence Strikes in Iran as Ceasefire Tensions Escalate", "summary": "Iran accused the U.S. of breaching a ceasefire after overnight strikes targeted missile sites and boats near the Strait of Hormuz. The U.S. Central Command described the bombings as self-defence to protect troops from Iranian threats. Brent oil prices rose by 3% following the news. Despite the strikes, U.S. officials maintain that a deal to end the regional war remains within reach.", "category": "World", "page": 3, "importance": 10, "telegram_url": "https://t.me/c/1877410077/125036", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 27-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125036"}], "article_id": "20d55b16"}, {"headline": "NIA Arrests 15 in West Bengal Judicial Officer Detention Case", "summary": "The National Investigation Agency arrested 15 individuals for allegedly detaining judicial officers and blocking roads in Malda district during electoral roll revisions in April. The incidents occurred ahead of the West Bengal Assembly elections. The NIA took over the probe following Supreme Court intervention to unveil a larger conspiracy behind the coordinated blockades.", "category": "India", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125036", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 27-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125036"}], "article_id": "9777f704"}, {"headline": "Four Kuki Men Arrested for Abduction of Naga Civilians in Manipur", "summary": "Security forces in Manipur arrested four Kuki men suspected of involvement in the abduction of six Naga civilians, including church leaders. The victims have been missing from Kangpokpi district since May 13. The arrests followed a joint operation by the police and Assam Rifles. The state government has recommended that the case be handed over to the NIA for further investigation.", "category": "India", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125036", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 27-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125036"}], "article_id": "6ed233fe"}, {"headline": "Lull in ITeS Hiring Shifts Tech Talent Demand in Bengaluru", "summary": "The Indian IT job market is experiencing a structural slowdown, with tech's contribution to total active talent demand falling below 50%. Experts suggest a shift toward specialized AI and data science roles, resulting in flat headcount growth for major firms. Entry-level openings have dropped significantly, as companies increasingly use AI interview tools for technical screenings.", "category": "Economy", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125036", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 27-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125036"}], "article_id": "9b76e7d5"}, {"headline": "Onion Farmers and MVA Leaders Protest in Nashik for Higher MSP", "summary": "Onion growers and opposition leaders staged a highway blockade in Nashik, demanding a minimum support price of ₹24 per kg. Despite the Centre increasing the procurement rate to ₹1,580 per quintal, farmers argue the cost of production remains much higher. Several leaders were detained during the demonstration. The government claims procurement centers are already operational.", "category": "Economy", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125036", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 27-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125036"}], "article_id": "f466c594"}, {"headline": "CPI(M) and BJP Oppose Appointment of Himachal Pradesh Chief Secretary", "summary": "Opposition parties in Himachal Pradesh have opposed the appointment of Sanjay Gupta as Chief Secretary, citing allegations of involvement in benami land transactions. The CPI(M) and BJP claimed the move compromises government integrity just days before the officer's scheduled retirement. Chief Minister Sukhvinder Singh Sukhu has faced criticism for the decision from the opposition.", "category": "Politics", "page": 5, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125036", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 27-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125036"}], "article_id": "a9fef8ba"}, {"headline": "Two Gir Lion Cubs Die from Suspected Tick-Borne Parasite Infection", "summary": "The Gujarat Forest Department reported the deaths of two Asiatic lion cubs in Gir National Park due to suspected Babesia, a tick-borne parasite. Three other lions died from natural causes and territorial fighting. Officials stated there is no evidence of a widespread outbreak, and veterinary teams are monitoring the landscape to manage the health of the remaining population.", "category": "Environment", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125036", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 27-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125036"}], "article_id": "3ed3e40f"}, {"headline": "Assam Tables UCC Bill Exempting Tribal and Adivasi Communities", "summary": "Assam Chief Minister Himanta Biswa Sarma introduced the Uniform Civil Code Bill, 2026, in the Assembly. The Bill seeks to provide social security to minority women but exempts Scheduled Tribes and Adivasi communities. Opposition members questioned the 'uniformity' of the law due to these exemptions, while the CM claimed it fulfills a key electoral commitment for the state.", "category": "Politics", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125036", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 27-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125036"}], "article_id": "e1408fe9"}, {"headline": "Suvendu Adhikari Announces Low-Cost Canteens and Liquor Restrictions in Bengal", "summary": "West Bengal's Suvendu Adhikari announced that 'maach-bhaat' will be available for ₹5 in 400 canteens. He also mandated that no liquor shops operate within 1 km of schools and temples. Administrative reforms include converting state health schemes to the central Ayushman Bharat program and introducing free bus rides for women to ensure transparency and better public services.", "category": "Politics", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125036", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 27-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125036"}], "article_id": "dcc2e048"}, {"headline": "Gurugram Sex Ratio Dips to 862; DC Orders Intensive Awareness Campaign", "summary": "Gurugram Deputy Commissioner Uttam Singh ordered a crackdown on illegal sex determination tests after the district's sex ratio at birth fell to 862 girls per 1,000 boys. Officials were directed to intensify monitoring under the PC-PNDT Act. Three FIRs were registered in 2025 for violations, and several ultrasound machines were sealed as part of the 'Beti Bachao, Beti Padhao' campaign.", "category": "Health", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125036", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 27-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125036"}], "article_id": "e944501a"}, {"headline": "Kerala Seeks Central Support for Key Infrastructure Projects and Borrowing", "summary": "Kerala Chief Minister V.D. Satheesan met PM Narendra Modi and Finance Minister Nirmala Sitharaman to seek support for state projects and an increased borrowing limit. The state requested the exclusion of its share for national highway land acquisition from borrowing caps. A white paper on Kerala's financial situation is expected in June to prioritize upcoming budgetary allocations.", "category": "Infrastructure", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125036", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 27-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125036"}], "article_id": "703f1dea"}, {"headline": "AMMA Imposes Gag Order on Members Following Character Assassination Allegations", "summary": "The Association of Malayalam Movie Artists (AMMA) issued a gag order to its executive committee following public controversies. Former joint secretary Ansiba Hassan recently alleged character assassination and communal remarks by fellow members. The organization also faced backlash over a sponsorship pact involving a controversial middleman and is currently facing internal dissent.", "category": "Culture", "page": 7, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125036", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 27-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125036"}], "article_id": "9b4eab0e"}, {"headline": "High Court Rejects Argument That Resignation Erases Taint of Defection", "summary": "A legal analysis of a 2019 Supreme Court ruling clarifies that an MLA’s resignation does not 'vaporize' the consequences of defection. While a Speaker must accept a voluntary resignation, they can still adjudicate pending disqualification complaints. Disqualified members remain barred from holding ministerial or remunerative political offices until re-election or the end of the term.", "category": "Law", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125036", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 27-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125036"}], "article_id": "3915a72d"}, {"headline": "CNG Prices Hiked for Fourth Time in Eleven Days in Delhi", "summary": "CNG prices were increased by ₹2 per kg in Delhi and parts of North India due to rising input gas costs and the West Asia conflict. The cumulative hike over 11 days has reached ₹6 per kg. Prices in Noida and Ghaziabad rose to ₹91.70 per kg. Analysts suggest distributors are passing on costs as contribution margins narrow despite the government's attempts to cushion the impact.", "category": "Economy", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125036", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 27-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/125036"}], "article_id": "9be30e4f"}, {"headline": "Special Court Frames Charges Against Seven Accused in Zubeen Garg Case", "summary": "A special fast-track court in Guwahati framed charges including criminal conspiracy and murder against seven accused in the death of cultural icon Zubeen Garg. The 52-year-old died in Singapore in 2025, which the coroner ruled accidental, but Assam police allege murder. The trial is set to begin on June 8 and will proceed on a daily basis to ensure a timely verdict.", "category": "Law", "page": 10, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125036", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 27-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/125036"}], "article_id": "3947bcc1"}, {"headline": "Supreme Court Directs States to Grant Prosecution Immunity to Forest Guards", "summary": "The Supreme Court directed Rajasthan, Uttar Pradesh, and Madhya Pradesh to consider granting forest guards immunity from prosecution for bona fide actions taken against illegal sand miners. The order follows the brutal murders of guards in the Chambal sanctuary. The court emphasized that guards need protection similar to the armed forces to effectively combat superior miner firepower.", "category": "Law", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125036", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 27-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/125036"}], "article_id": "b5da3fb6"}, {"headline": "SC Examines Constitutional Validity of New Wetland Protection Rules", "summary": "The Supreme Court is examining a challenge to the Wetlands Rules, 2017, which allegedly exclude most human-made and historically developed wetlands from protection. Petitioners argue the definition violates the Ramsar Convention and dilutes state accountability. By carving out exclusions for irrigation and aquaculture waterbodies, the rules reportedly remove most of India's wetlands from the law.", "category": "Environment", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125036", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 27-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/125036"}], "article_id": "46c266c7"}, {"headline": "CBSE Denies Vulnerability of On-Screen Marking Portal After Hacker Claims", "summary": "The CBSE rejected claims that its on-screen marking portal was compromised by an ethical hacker. The board clarified that the URL mentioned in social media posts was a testing site with sample data, not the live evaluation system. Despite student complaints of incorrect marking for Class 12 exams, CBSE maintains that actual evaluation data remains secure and untampered.", "category": "Technology", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125036", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 27-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/125036"}], "article_id": "d3d26ad8"}, {"headline": "Coal India Assures Adequate Buffer Stock to Meet Summer Power Demand", "summary": "Coal India reported a buffer stock of 168 million tonnes, including 47.6 million tonnes at thermal power plants, to meet peak summer electricity demand. The current stock is sufficient for 19 days of consumption. The miner noted that production is being augmented, with 113.5 million tonnes of extracted coal ready for dispatch at mine sites, marking a 10% increase over last year.", "category": "Business", "page": 13, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125036", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 27-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/125036"}], "article_id": "30bf79c9"}, {"headline": "India's Tallest Commercial Building to Feature World's Fastest High-Rise Elevators", "summary": "The Prestige at Mahalaxmi, Mumbai, will install elevators traveling at 10 meters per second, similar to those in the Burj Khalifa. Elevator maker Otis India will provide the super-fast units, including the country's first double-deck elevators with two cabins in a single shaft. The project, expected to be completed by 2027-28, aims to maximize rental space and passenger capacity.", "category": "Infrastructure", "page": 13, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125036", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 27-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/125036"}], "article_id": "bee66e82"}, {"headline": "Mojtaba Khamenei Warns Regional Nations Will Not Shield U.S. Bases", "summary": "Iran’s Supreme Leader Ayatollah Mojtaba Khamenei stated that regional countries will no longer serve as 'shields' for American military installations. In a holiday message, he asserted that the U.S. no longer has a 'safe haven' for aggression in the region. The remarks come amid ongoing Iranian efforts to negotiate the release of $24 billion in frozen assets to end regional hostilities.", "category": "World", "page": 14, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125036", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 27-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/125036"}], "article_id": "e05b2e26"}, {"headline": "Israeli Strike in Eastern Lebanon Kills Twelve as Military Mobilizes Troops", "summary": "An Israeli air strike on the Lebanese village of Mashghara killed 12 people, according to state media. The attack followed Israeli PM Benjamin Netanyahu's authorization of intensive strikes against Hezbollah. An Israeli official confirmed that an additional military battalion has been called up to Lebanon. The escalation occurs just days before planned direct talks in Washington.", "category": "World", "page": 14, "importance": 9, "telegram_url": "https://t.me/c/1877410077/125036", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 27-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/125036"}], "article_id": "24b07dd7"}, {"headline": "North Korea Launches Ballistic Missile Following China-Russia Opposition to Western Pressure", "summary": "North Korea fired a close-range ballistic missile and multiple rocket launch systems toward the sea. The launch follows a joint statement from Russia and China opposing Western pressure on Pyongyang. The South Korean military is monitoring the situation, as regional tensions remain high following the collapse of recent diplomatic efforts and increased military cooperation in the North.", "category": "World", "page": 14, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125036", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 27-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/125036"}], "article_id": "73ff71bf"}, {"headline": "Gukesh and Praggnanandhaa Secure Wins in Norway Chess Opening Round", "summary": "Indian Grandmaster D. Gukesh defeated Vincent Keymer in an Armageddon tie-break after a draw in their classical game at Norway Chess 2026. R. Praggnanandhaa beat American Wesley So to open his campaign with a victory. In the women's section, Divya Deshmukh stunned World champion Ju Wenjun in an Armageddon match, while Koneru Humpy suffered a defeat against Bibisara Assaubayeva.", "category": "Sports", "page": 16, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125036", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 27-05-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/125036"}], "article_id": "b7490718"}, {"headline": "Gurindervir Singh Sets New 100m National Record with Sub-10.10 Clocking", "summary": "Gurindervir Singh became the first Indian to record a sub-10.10 time in the 100m, clocking 10.09 seconds at the Federation Cup in Ranchi. He broke the previous National Record held by Animesh Kujur. The 25-year-old sprinter cited religious Punjabi songs as motivation for the feat and expressed a desire to prove that Indian athletes can compete with the world's best sprinters.", "category": "Sports", "page": 20, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125036", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 27-05-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/125036"}], "article_id": "614be932"}, {"headline": "Scientific Study Traces Significant Dog Brain Shrinkage to Early Domestication", "summary": "Research published in Royal Society Open Science shows domestic dog brains shrank by 46% relative to wolves as far back as 5,000 years ago. The study suggests that human-provided food and protection lowered cognitive demands for survival. While modern breeding has an impact, the core reduction occurred when agricultural societies became widespread in the Late Neolithic period.", "category": "Science", "page": 21, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125036", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 27-05-2026.pdf", "page": 21, "telegram_url": "https://t.me/c/1877410077/125036"}], "article_id": "1a4d964c"}, {"headline": "Climate Change Altering Earth's Rotation Speed and Day Length", "summary": "A new study in JGR Solid Earth suggests that melting ice and changing water distribution are increasing the length of a day on Earth. Researchers found that modern climate change is affecting rotation at a rate of 1.33 milliseconds per century. This phenomenon is compared to a spinning skater slowing down by extending their arms, with impacts exceeding previous scientific expectations.", "category": "Science", "page": 21, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125036", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 27-05-2026.pdf", "page": 21, "telegram_url": "https://t.me/c/1877410077/125036"}], "article_id": "3d6946eb"}, {"headline": "Quad launches $20 bn critical minerals initiative to limit dependence on China", "summary": "Quad partners launched a Critical Minerals Initiative to mobilize up to $20 billion in support, strengthening supply chains across mining, processing, and recycling to reduce reliance on China. Foreign ministers also expressed \"grave concerns\" over economic coercion and stressed navigational freedom in key corridors.", "category": "Politics", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "cc98819d"}, {"headline": "Mcap race: Taiwan, Nvidia overtake India amid AI frenzy", "summary": "Taiwan became the world's fifth-largest stock market, surpassing India. Nvidia, valued at $5.2 trillion, exceeds the combined mcap of all listed Indian firms. South Korea is also closing on India's market capitalization, reflecting global AI boom's impact on equity markets.", "category": "Economy", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "cc774e4c"}, {"headline": "Income survey lessons from other nations offer a blueprint for India", "summary": "India's NHIS 2026 faces sensitivity with income questions. The article examines data collection methods from the US (monetary incentives), Australia (online forms, administrative records), Canada (tax records), and South Africa (monthly household visits) as potential models for India.", "category": "Economy", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "8da6c51f"}, {"headline": "OpenAI chief Altman says AI unlikely to cause ‘jobs apocalypse’", "summary": "OpenAI CEO Sam Altman stated that AI's rapid development is unlikely to cause a \"jobs apocalypse,\" acknowledging his prior concerns were \"pretty wrong.\" He noted the enduring \"human part\" of employment that AI cannot outsource, despite its increasing role in industries.", "category": "Technology", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "b39fc122"}, {"headline": "Sebi plans test run of corporate bond tokenisation", "summary": "Sebi plans a pilot project for corporate bond tokenisation using Distributed Ledger Technology (DLT) within 6-9 months. The goal is faster settlement, enhanced traceability, automated servicing, and greater transparency, while also addressing associated risks.", "category": "Business", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "6c5b6920"}, {"headline": "AIA Engineering Q4FY26 net profit surges 64% to ~148 crore", "summary": "AIA Engineering reported a 64% surge in net profit to ~148 crore for Q4FY26, attributed to strong performance. Its stock closed 3.7% up after the announcement.", "category": "Business", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "06a3263b"}, {"headline": "Marksans Pharma Q4FY26 net profit soars around 8x to ~61 crore", "summary": "Marksans Pharma's Q4FY26 net profit increased by approximately eight times to ~61 crore, indicating significant growth. The company's stock closed 15.5% up following the impressive financial results.", "category": "Business", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "139b1693"}, {"headline": "Diamond Power Infra Q4FY26 net profit jumps 38% to ~393 crore", "summary": "Diamond Power Infra's net profit jumped 38% to ~393 crore in Q4FY26, showing a strong financial quarter. The company's stock rose 5.3% after the announcement of its performance.", "category": "Business", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "4587ca7c"}, {"headline": "Balu Forge Industries Bags first US order from Alpha Aircraft Systems", "summary": "Balu Forge Industries secured its first US order from Alpha Aircraft Systems, marking a new international business milestone. This development led to the company's stock closing 6.4% up.", "category": "Business", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "86c351d5"}, {"headline": "Titan MD: 'Too early to assess impact of gold curbs'", "summary": "Titan MD Ajoy Chawla stated it's too early to assess the impact of gold consumption curbs and import duty hikes, expecting clarity by mid-June. Despite volatile macroeconomics, Titan will continue investments in tech, retail, and production, adapting to consumer shifts towards lower carat gold.", "category": "Business", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "28973f4b"}, {"headline": "Pronto's use of customer data early test of DPDP Act implementation", "summary": "Instant home-services startup Pronto's use of customer data for AI model training is an early test of India's DPDP Act. Experts question if fresh, explicit consent is needed for data repurposing. Meity is investigating legality, while rivals Urban Company and Snabbit distance themselves from such practices.", "category": "Technology", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "c6c885f1"}, {"headline": "Slice SFB posted first ever ~48.4 crore net profit in FY26", "summary": "Slice Small Finance Bank reported its first net profit of ~48.4 crore for FY26, a turnaround from a ~216.7 crore loss in FY25, following its merger with North East Small Finance Bank. Total income more than doubled to ~1,402.7 crore, with 94.2% of deposits from retail term and CASA.", "category": "Business", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "523896da"}, {"headline": "Crude price spike pushes helmet manufacturing cost by 20%", "summary": "Indian helmet manufacturing costs rose 20% due to surging crude-linked raw material prices, forcing organised players to raise prices 5-10%. Steelbird MD Rajeev Kapur also highlighted the challenge of fake helmets, which make up nearly 50% of the market.", "category": "Business", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "23a224f1"}, {"headline": "CNG prices rise by ~2 a kg in Delhi, fourth hike in 2 weeks", "summary": "City gas companies IGL and MGL hiked CNG prices by ~2 per kg in Delhi-NCR and Mumbai for the fourth time in two weeks. This is due to elevated energy prices caused by the West Asia conflict and a depreciating rupee, impacting commercial users.", "category": "Economy", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "25cc1a98"}, {"headline": "Govt to sell up to 2% stake in Coal India via offer for sale", "summary": "The Centre will sell up to a 2% stake in Coal India (CIL) through an offer for sale (OFS) at a floor price of ~412 apiece, aiming to raise ~5,000 crore. The OFS will open for non-retail investors on May 27 and for retail investors on May 29.", "category": "Business", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "57a9f9eb"}, {"headline": "Anti-dumping duties can save India $3 bn per year in forex", "summary": "A report states India can save $3 billion in forex annually by imposing pending anti-dumping duties recommended by DGTR. It argues these duties on intermediate inputs would support domestic industry without significantly impacting headline inflation, unlike higher US/China duties.", "category": "Economy", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "1f48b095"}, {"headline": "India rejects references to J&K in China-Pak joint statement", "summary": "India strongly rejected \"unwarranted\" references to Jammu & Kashmir in a joint statement by China and Pakistan. The External Affairs Ministry spokesperson reiterated that J&K and Ladakh are integral parts of India, and no other nation has the locus standi to comment.", "category": "Politics", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "2e548a52"}, {"headline": "CIL allays coal crisis fears, says 168 mt buffer available", "summary": "Coal India Ltd (CIL) confirmed a total coal buffer of 168 million tonnes (mt) is available across mines, power plants, and transit points to meet rising summer power demand. This reassures against shortages, despite a natural reduction in plant inventories.", "category": "Economy", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "5450cf56"}, {"headline": "MobiKwik secures RBI nod for offline payment aggregator licence", "summary": "Fintech firm MobiKwik received in-principle RBI approval for a Payment Aggregator-Physical (PA-P) licence. The company targets 10x growth in merchant business by FY28, focusing on small businesses, oil & gas outlets, and organised retail.", "category": "Business", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "3bd466d2"}, {"headline": "Delhi govt to credit ‘digital currency’ to ration card holders", "summary": "The Delhi government will credit \"digital currency\" to Aadhaar-linked bank accounts of ration card holders for essential purchases. The annual family income cap for ration cards will be raised to ~2.5 lakh from ~1.2 lakh, expanding public distribution system beneficiaries.", "category": "India", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "7cc52e01"}, {"headline": "GST 2.0 guidelines fail to resolve refund delays: Experts", "summary": "Despite GST 2.0 guidelines, businesses, especially large taxpayers, face difficulties obtaining inverted duty structure (IDS) refunds. Experts cite subjective interpretations at state GST levels, extra scrutiny, and lack of accountability as reasons for persistent delays and \"risky\" flagging of applications.", "category": "Economy", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "08d4c3b8"}, {"headline": "Physis Cap closes its maiden ~400 cr fund", "summary": "Growth-stage venture capital firm Physis Capital made the final close of its maiden ~400 crore fund, raised from institutional investors, family offices, and senior corporate leaders. The firm invests in pre-Series A to Series B startups and plans a larger Fund II in Q4 2026.", "category": "Business", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "ac77d8ea"}, {"headline": "NGT notice to govt, NINL on capacity expansion", "summary": "The National Green Tribunal (NGT) issued notices to the Centre, Odisha government, and Neelachal Ispat Nigam (NINL) regarding the expansion of its Kalinganagar steel plant from 981,000 to 6.2 million tonnes. The petition challenged environmental clearance over inadequate impact studies.", "category": "Environment", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "45f75af3"}, {"headline": "Grade-A office vacancies may fall up to 16% in FY27", "summary": "Crisil Ratings projects India's Grade-A commercial office market vacancy levels to decline by 50 basis points to 15.5-16% by FY27. This is driven by healthy net leasing growth and scheduled project completions, though global uncertainties and AI pose risks.", "category": "Business", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "b1a4732f"}, {"headline": "Slow cap demand hitting commercial realty: Report", "summary": "India's commercial real estate leads Asia Pacific in occupier demand. However, slow institutional capital deployment, with only $2.3 billion in AIF dry powder, can fund just 14% of the 86.4 million sq ft annual office supply needed by 2025, creating a significant demand-supply gap.", "category": "Business", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "81a691dd"}, {"headline": "Loan limit for large MFIs increased to ~1,000 crore", "summary": "The NCGTC increased the loan limit for large microfinance institutions (MFIs) (AUM > ~2,000 crore) to ~1,000 crore from ~300 crore under its credit guarantee scheme. This aims to restore lender confidence and improve credit flow to MFIs, which saw funding decline 70%.", "category": "Economy", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "c2fe5510"}, {"headline": "Growth in protection products drives new biz value for life insurers", "summary": "Major life insurers saw near double-digit VNB growth in FY26, boosted by high-margin protection and non-participating (non-par) products. This accelerated in H2 FY26 after GST rationalization on individual life premiums, leading to a healthier, more profitable product mix.", "category": "Business", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "f80f1edd"}, {"headline": "Moderation in revenue growth, margin looms for textile MSMEs", "summary": "India's readymade garment (RMG) sector, dominated by MSMEs, expects revenue growth to slow to 4-6% in FY27 (from 6-8% in FY26). Profit margins may decline by 100-150 basis points due to rising input costs, weak domestic demand, and the West Asia crisis.", "category": "Economy", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "3f838fc6"}, {"headline": "NHPC raises ~2,000 cr through 15-year bonds", "summary": "National Hydroelectric Power Corporation (NHPC) raised ~2,000 crore through 15-year bonds at a 7.67% coupon rate. The tightly priced issue saw ~8,700 crore in bids, reflecting strong institutional appetite for high-quality, long-duration assets despite volatile markets.", "category": "Business", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "9a8c1318"}, {"headline": "Weather takes a toll on Alphonso crop", "summary": "Maharashtra's Alphonso mango crop suffered 85-90% losses due to extreme weather, including warmer winter and hotter spring, exacerbated by El Nino. This severely impacted farmers like Komal Walke, forcing them to source fruit from larger farms to meet orders.", "category": "Economy", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "c61868c6"}, {"headline": "Rupee snaps three-day gaining streak as oil prices rise", "summary": "The Indian rupee depreciated by 0.48% to 95.66/$ on Tuesday, ending a three-day gain. The fall was driven by rising international oil prices (Brent nearing $100/bbl) due to fresh US attacks on Iran, impacting risk sentiment and adding pressure on the currency.", "category": "Economy", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "5aa6b41f"}, {"headline": "RBI’s $5 bn FX swap subscribed nearly twice", "summary": "The RBI's three-year dollar/rupee buy-sell FX swap auction drew strong demand, receiving bids of nearly $10 billion, almost twice the $5 billion offering. The central bank accepted 141 bids, with a premium cut-off of ~9.10, injecting rupee liquidity into the banking system.", "category": "Economy", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "b6648249"}, {"headline": "Govt preparing interim report on A-I crash", "summary": "Indian officials are preparing an interim report on last year's Air India crash that killed 260 people. The investigation found the Dreamliner's engine fuel switches flipped almost simultaneously, starving engines of fuel. An interim report allows authorities to delay sharing findings with the US.", "category": "India", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "76bceb15"}, {"headline": "US considers downsizing bombers, warships to Nato", "summary": "The US plans to significantly reduce military contributions, including fighter jets and warships, available to assist European allies in a crisis. This move, reported by German news outlet Spiegel, underscores unprecedented strain on NATO amid US foreign policy shifts towards the American hemisphere and West Asia.", "category": "Politics", "page": 8, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "f22fb2e8"}, {"headline": "WHO: Congo’s Ebola outbreak ‘outpacing’ response measures", "summary": "The WHO warned that Ebola is spreading faster in Democratic Republic of Congo (DRC) than responders can contain it, with over 100 confirmed infections, 930 suspected cases, and 221 suspected deaths. The epidemic is outpacing current response measures, stressing health officials.", "category": "Health", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "1cd05422"}, {"headline": "Sonny Rollins, giant of the jazz saxophone, signs out at 95", "summary": "Legendary jazz saxophonist Sonny Rollins, renowned for his powerful and imaginative playing, died at 95. A dominant figure in post-WWII jazz, he won multiple Grammys and prestigious awards, retiring in 2012 due to pulmonary fibrosis, but remained grateful for his musical life.", "category": "Culture", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "ca4236a9"}, {"headline": "Xiaomi Q1 profit sinks 43% on higher memory chip costs", "summary": "China's Xiaomi reported a 43% slump in Q1 net profit to 6.1 billion yuan ($899 million) due to soaring memory chip costs. Despite growth in its electric-vehicle business, heavy investment and lower margins continued to drag on overall earnings.", "category": "Business", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "86969156"}, {"headline": "Russia threatens strikes on Kyiv sites, urges foreigners to leave", "summary": "Russia announced plans for \"systematic strikes\" on Ukrainian military and decision-making centers in Kyiv, warning foreigners to leave. This follows what Russia termed \"terrorist attacks\" by the Kyiv regime, escalating the ongoing conflict. Ukraine urged allies not to yield to Russian blackmail.", "category": "Politics", "page": 8, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "9238d098"}, {"headline": "Samsung non-chip union asks court to block vote on pay deal", "summary": "A Samsung Electronics union representing consumer electronics workers asked a South Korean court to block a pay deal vote. They argue the agreement disproportionately benefits chip division workers, whose profits soared amid the AI boom, causing an 18-day strike.", "category": "Business", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "2014fe0c"}, {"headline": "China, Pakistan agree to ‘unswervingly safeguard’ bilateral ties", "summary": "Pakistan and China agreed to \"unswervingly safeguard\" and develop bilateral relations, working to build a shared future. A joint statement followed PM Shehbaz Sharif's visit, reaffirming broad consensus on deepening their All-Weather Strategic Cooperative Partnership.", "category": "Politics", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "4afa07bf"}, {"headline": "Taiwan tracks second Chinese ‘combat’ patrol in a week", "summary": "Taiwan deployed ships and fighter jets to monitor China's second \"joint combat readiness patrol\" near the island in a week. A senior Taiwanese security official stated this demonstrates China is the sole source of regional instability, amidst increased military presence.", "category": "Politics", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "85853e18"}, {"headline": "Quad controls: Shifting US geopolitical priorities affecting its relevance", "summary": "The Quad faces declining relevance as US foreign policy prioritizes the American hemisphere and West Asia. The US-China détente and withdrawal of US defense assets to the Iran war diminish US focus on the Indo-Pacific, raising concerns among Quad allies.", "category": "Politics", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "11b1f1f4"}, {"headline": "Powering transition: India needs resilient electric-mobility infrastructure", "summary": "India's EV transition is slow, particularly for cars, due to inadequate charging infrastructure and high battery costs. Dependence on imported critical minerals creates supply chain vulnerabilities. A coordinated strategy for rapid charging network expansion and domestic battery manufacturing is crucial for net-zero goals.", "category": "Environment", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "68deb11c"}, {"headline": "Wealth erosion will deepen slowdown", "summary": "Rising fuel prices from the West Asia crisis, coupled with slow income growth, are poised to deepen India's consumer slowdown. Over ~40 trillion in stock market wealth erosion, affecting 127-130 million investors, will significantly impact spending on goods like cars and holidays.", "category": "Economy", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "81f5e76b"}, {"headline": "Policies to raise India’s FTA utilisation rates", "summary": "India needs to boost FTA utilization by reviewing its high tariff structure and simplifying complex rules of origin, which currently deter firms. A comprehensive approach, including state-provided technical and financial assistance, and dedicated information portals, is crucial to maximize FTA benefits.", "category": "Economy", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "96293e51"}, {"headline": "Open Intelligence: Education Between Art and Artificial (Book Review)", "summary": "Saikat Majumdar's book \"Open Intelligence: Education Between Art and Artificial\" questions human distinctiveness in the AI era. It explores how intersubjective networks shape history, highlights human biases in AI, and advocates for innovative education to preserve humanity's unique narrative and consciousness.", "category": "Education", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "34379ebf"}, {"headline": "Centre forms committee on demographic change", "summary": "Union Home Minister Amit Shah announced a high-level committee, chaired by Justice Prakash Prabhakar Naolekar (retd), to comprehensively assess demographic changes in India due to illegal immigration and \"unnatural causes.\" The initiative aims to address challenges to national security, social structure, and tribal society.", "category": "Politics", "page": 16, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "9ac71faf"}, {"headline": "FM forgot fourth F — falling private investment: Congress", "summary": "The Congress criticized Finance Minister Nirmala Sitharaman for omitting \"falling private investment\" from her \"3Fs\" focus. It highlighted declining FDI and private corporate investment as % of GDP, linking it to decelerating economy, slow income growth, and a lack of broad-based consumer demand.", "category": "Politics", "page": 16, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "ba2416d0"}, {"headline": "HC junks GEEC plea over bid for coalfield methane block", "summary": "The Delhi High Court dismissed Great Eastern Energy Corporation's (GEEC) petition seeking to validate its bid or order a fresh process for a Raniganj Coalfield methane block. The court found no systemic malfunction in the e-bidding portal as claimed by GEEC for its submission failure.", "category": "Law", "page": 16, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "f3658efa"}, {"headline": "SC seeks AG’s help over ITAT vacant posts", "summary": "The Supreme Court voiced concern over prolonged vacancies in the administrative wing of the Income Tax Appellate Tribunal (ITAT), stating it was \"surprised\" by the situation. The court will seek the Attorney General's intervention to expedite appointments to crucial, long-vacant positions.", "category": "Law", "page": 16, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "26e2a0ce"}, {"headline": "Anti-infiltration drive triggers ‘exodus’ in West Bengal", "summary": "West Bengal's BJP government's \"detect, delete and deport\" policy against infiltrators, including plans for district-level holding centers, has caused a \"reverse exodus.\" Scores of alleged Bangladeshi infiltrators are gathering at Hakimpur checkpoint, seeking to return home.", "category": "Politics", "page": 16, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "df62f3c0"}, {"headline": "A gap women’s cricket must bridge", "summary": "Despite the 2025 Women’s ODI World Cup generating 5.2 billion video views, women's T20 and ODI World Cups have largely remained loss-making for the ICC. This contrasts sharply with men's cricket events, which are cash cows, highlighting a significant financial gap to bridge.", "category": "Sports", "page": 16, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "10274523"}, {"headline": "Not the BoP but structural", "summary": "India's rupee weakness signals deep structural issues, not just BoP. Weak manufacturing growth, declining global share, and AI's impact on services deter private investment, which has halved as % of GDP. Addressing this requires confronting core government instincts affecting business risks and fostering inclusive growth.", "category": "Economy", "page": 17, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "6f36685f"}, {"headline": "India’s policy mix needs a rethink", "summary": "India's monetary policy, keeping interest rates low amidst external imbalances, has inadvertently worsened rupee weakness and distorted capital formation. This approach hinders attracting foreign debt, pushes domestic savings into volatile equities, and delays debt market development. A holistic policy engagement across interest rates, capital flows, and exchange rates is urged.", "category": "Economy", "page": 17, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "7e1a036d"}, {"headline": "Art gets wings at Noida airport", "summary": "Noida International Airport integrates cultural art into its modern infrastructure, featuring Padma Shri artist Paresh Maity's six paintings depicting UP's spiritual landmarks and a \"Mystic Abode\" installation of 8,000 brass bells. The design reflects local heritage, blending traditional motifs with contemporary elements.", "category": "Culture", "page": 18, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "e17b9625"}, {"headline": "Ferrari’s flat EV foray", "summary": "Ferrari NV unveiled Luce, its first fully electric vehicle, designed with Jony Ive. However, the company's shares fell nearly 8% after disappointing reviews, indicating market skepticism about its EV strategy.", "category": "Business", "page": 18, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "b38483b9"}, {"headline": "AI firms brace for self-improving systems", "summary": "AI firms are preparing for self-improving systems capable of writing code and automating research. This raises concerns about control, oversight, and managing rapidly accelerating development cycles, as these systems could potentially outpace human oversight.", "category": "Technology", "page": 18, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "eb3daed8"}, {"headline": "DGCA issues Ebola SOP for airlines, mandates passenger screening", "summary": "India's DGCA mandated airlines ensure passengers from Ebola-stricken Uganda and DRC fill self-declaration forms and report symptoms upon arrival. Airlines must also broadcast health announcements and designate specific crew for symptomatic patients, following WHO's health emergency declaration.", "category": "Health", "page": 18, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "ff0281ba"}, {"headline": "Dazzle your moment (Jewellery)", "summary": "A curated bouquet of exquisite jewellery pieces, showcasing traditional Indian kundan-meena, polki diamonds, carved emeralds, and intricate designs. Featuring creations from Rambhajo ChandBegum, Neety Singh, Ankit Lodha, and Tiffany and Co., these pieces blend heritage with modern artistry for personal narratives.", "category": "Culture", "page": 19, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 19, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "2f5910d4"}, {"headline": "Art of scarcity: Rarity is the ultimate currency", "summary": "This article explores how rarity has become the ultimate currency in luxury. Brands like Rolex and Hublot create limited editions for milestones or collaborations, leveraging exclusivity, artisanal craftsmanship, and unique materials. Access is often invitation-only, prioritizing loyal clients and high-net-worth individuals.", "category": "Business", "page": 21, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 21, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "46773dac"}, {"headline": "Your signature, on wheels: The ‘few-offs’ prove coachbuilder age never ended", "summary": "The article highlights limited-edition and bespoke automobiles from coachbuilders like Rolls-Royce, showcasing custom craftsmanship and unique designs. These \"few-offs\" demonstrate a continued demand for exclusive, personalized automotive artistry in the luxury market.", "category": "Business", "page": 21, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 21, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "b860079a"}, {"headline": "Keepsakes: Kalamkaris to vintage denim", "summary": "Fifteen designers, including Rimple & Harpreet Narula, Vaishali S, and Arjun Khanna, share their personal favorite outfits. The pieces embody unique craftsmanship, cultural heritage, and modern interpretations, ranging from architecturally inspired lehengas to Maheshwari silk saris and vintage dungarees.", "category": "Culture", "page": 21, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 21, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "fbca8f88"}, {"headline": "Eight watches worth the wait", "summary": "A selection of technically ambitious and rare luxury watches from Watches and Wonders Geneva, featuring extreme complications and unique designs. Highlights include pieces from H. Moser & Cie, IWC, Grand Seiko, Credor, Ulysse Nardin, A. Lange & Söhne, and Jaeger-LeCoultre, epitomizing haute horology.", "category": "Business", "page": 21, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 21, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "5e4ea790"}, {"headline": "Collector’s vault: Inside the world of bespoke souvenirs", "summary": "The article explores the market for highly valuable collectibles, such as rare Pokémon cards, Action Comics #1, diamond chess sets, and celebrity memorabilia. Their value is driven by rarity, historical significance, and emotional connection to ownership, commanding multi-million-dollar prices at auctions.", "category": "Culture", "page": 21, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 21, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "7391fe0c"}, {"headline": "It takes time to create time (Shona Taine)", "summary": "Profile of Shona Taine, the youngest and first woman member of the Académie Horlogère des Créateurs Indépendants. Her watches, like the Khemea, blend technical rigor with artistic sensitivity, emphasizing patience, self-discipline, and deep personal connection, with only six pieces produced annually.", "category": "Culture", "page": 23, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 23, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "216813a8"}, {"headline": "All in due… Laurent Ferrier, swiss watchmaker", "summary": "Profile of Swiss watchmaker Laurent Ferrier, who inherited his craft and founded his maison at 63 with his son, emphasizing a \"project of transmission.\" His watches embody craftsmanship, precision, endurance, and emotional integrity, with limited production reflecting dedication to high standards.", "category": "Culture", "page": 23, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 23, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "920914ff"}, {"headline": "Artistry in residence", "summary": "Homes are transforming into \"liveable art\" spaces, with artists like Anjali Singh and Meeta Bedi creating concrete artworks that integrate into daily life. This trend moves beyond traditional art to functional pieces steeped in nostalgia and creativity, reflecting a demand for mindful, personality-driven decor.", "category": "Culture", "page": 25, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125117", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 25, "telegram_url": "https://t.me/c/1877410077/125117"}], "article_id": "972d9e77"}, {"headline": "Congress brass offers Siddaramaiah Rajya Sabha seat in Karnataka transition plan", "summary": "The Congress high command has offered Karnataka CM Siddaramaiah a Rajya Sabha seat and a cabinet role to facilitate a leadership change. Deputy CM DK Shivakumar is the likely successor. Siddaramaiah has been asked to respond within a week following discussions in New Delhi aimed at preventing internal friction and ensuring a smooth transition ahead of the 2028 assembly elections.", "category": "Politics", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/125062", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_27-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125062"}], "article_id": "52f1d3e8"}, {"headline": "Four dead as train crashes into school minivan in Belgium town", "summary": "A train collided with a school minivan at a level-crossing in the Belgian town of Buggenhout, resulting in four fatalities. The victims include two special needs children aged 12 and 15 and two staff members. Authorities are investigating the cause of the accident, which occurred despite the crossing being equipped with functional warning systems and barriers.", "category": "World", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125062", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_27-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125062"}], "article_id": "bfb3faf6"}, {"headline": "D Gukesh defeats Vincent Keymer in GCT Romania classical leg", "summary": "Indian Grandmaster D Gukesh defeated GCT Romania classical leg winner Vincent Keymer during the Armageddon stage of the tournament. The victory marks a significant achievement for Gukesh, who continues to show strong form in international chess. In the same event, Magnus Carlsen and Humpy Koneru were the only players to lose their classical games on the same day.", "category": "Sports", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125062", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_27-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125062"}], "article_id": "486845ef"}, {"headline": "US strikes Iranian vessels in Strait of Hormuz after drone attacks", "summary": "The US military launched strikes against Iranian vessels in the Strait of Hormuz following drone attacks on US warships. The action comes amid rising tensions in the region and follows reports of Iran attempting to enforce a blockade. US officials stated the strikes were necessary to protect maritime commerce and military assets, while Tehran warned of severe consequences for the escalation.", "category": "World", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/125062", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_27-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125062"}], "article_id": "a134543a"}, {"headline": "Gene therapy study shows 62% reduction in 'bad' cholesterol levels", "summary": "A clinical trial published in the New England Journal of Medicine has revealed that a new gene therapy can reduce 'bad' LDL cholesterol by up to 62%. The experimental treatment, VERVE-101, works by permanently switching off the PCSK9 gene in the liver. While results are promising for patients with high genetic risk, researchers emphasize the need for larger, long-term studies.", "category": "Health", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125062", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_27-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125062"}], "article_id": "c951dcfa"}, {"headline": "Loose overhead cable kills man in Bengaluru on engagement day", "summary": "A 30-year-old fruit trader, Vishal M Lunawat, died in Bengaluru after a loose overhead cable entangled with his motorcycle, causing him to crash. The incident occurred as he was returning home after his own engagement celebrations. The victim's family and local residents have blamed civic apathy and the failure of authorities to clear dangerous dangling wires for the tragedy.", "category": "Infrastructure", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125062", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_27-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125062"}], "article_id": "f5dfbe47"}, {"headline": "CBSE students face confusion over missing and mismatched answer scripts", "summary": "Class 12 students in Bengaluru have reported significant discrepancies in their CBSE board exam results, with some finding their answer scripts missing or mismatched. The issues emerged during the re-evaluation process, where students discovered scanned scripts that did not belong to them. Parents and students are demanding a thorough probe into the board's digital marking system.", "category": "Education", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125062", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_27-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125062"}], "article_id": "262b326d"}, {"headline": "Smoke detection prompts emergency evacuation of Chennai-bound flight", "summary": "Over 230 passengers were evacuated from an IndiGo flight at Bengaluru's Kempegowda International Airport after smoke was detected in the cabin during taxiing. The flight was bound for Chennai. Emergency slides were deployed, and two passengers sustained minor injuries during the process. Authorities are investigating the source of the smoke, suspected to be an electronic device.", "category": "Infrastructure", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125062", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_27-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125062"}], "article_id": "89648884"}, {"headline": "Ugandan woman isolated in Bengaluru with suspected Ebola symptoms", "summary": "A 28-year-old Ugandan woman has been isolated at the Epidemic Diseases Hospital in Bengaluru after showing signs of Ebola, including fever. She arrived at Kempegowda International Airport on May 23. Health officials have sent her blood samples to the National Institute of Virology in Pune for confirmation. The woman is currently in stable condition as authorities monitor the situation.", "category": "Health", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125062", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_27-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125062"}], "article_id": "5fce80f9"}, {"headline": "BMTC suburban AC bus services earn 1.3 crore in first month", "summary": "The Bangalore Metropolitan Transport Corporation (BMTC) has reported earnings of ₹1.3 crore from its newly launched suburban air-conditioned bus services. Since March, these buses have served over 1.5 lakh passengers across various routes, including Kanakapura and Chikkaballapur. The success of the pilot project has prompted BMTC to consider further expanding its suburban AC network.", "category": "Economy", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125062", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_27-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125062"}], "article_id": "c9f7f152"}, {"headline": "Hope Farm Underpass work begins after 11-year project delay", "summary": "Construction has finally commenced on the Hope Farm Junction underpass in Bengaluru, a project that was delayed for over 11 years. The ₹35-crore project aims to provide signal-free movement at one of the city's busiest junctions. While commuters have welcomed the start, many remain skeptical about the 200-day completion deadline given the project's long history of hurdles.", "category": "Infrastructure", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125062", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_27-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125062"}], "article_id": "cea0b6ea"}, {"headline": "SC: In-laws cannot be prosecuted for merely being passive spectators", "summary": "The Supreme Court has ruled that in-laws cannot be prosecuted in marital disputes for simply being passive spectators of the couple's life. The court clarified that allegations of cruelty or dowry harassment must involve specific, active roles to justify criminal liability. The bench quashed a case where relatives were named in a complaint without evidence of direct involvement or instigation.", "category": "Law", "page": 5, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125062", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_27-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125062"}], "article_id": "54f622c7"}, {"headline": "Archaeologist rejects ASI order to modify Keeladi excavation report", "summary": "Amarnath Ramakrishna, the archaeologist who led the Keeladi excavations, has rejected an order from the Archaeological Survey of India (ASI) to modify his findings. Ramakrishna stated he would not change his report, which has provided significant insights into the ancient Sangam age civilization. The standoff has drawn attention to the independence of scientific research in government bodies.", "category": "Culture", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125062", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_27-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125062"}], "article_id": "6f116d7a"}, {"headline": "Iran partially restores internet after three-month shutdown amid protests", "summary": "Authorities in Iran have partially restored internet access following a near three-month shutdown that was implemented to quell nationwide protests. The blackout had severely impacted the economy and communication. While some services are back online, access to global social media platforms remains restricted. Human rights groups have condemned the shutdown as a tool of repression.", "category": "World", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125062", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_27-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/125062"}], "article_id": "99ebb58a"}, {"headline": "Sebi proposes corporate bond reforms to reduce reliance on bank loans", "summary": "The Securities and Exchange Board of India (Sebi) has proposed reforms to the corporate bond market to encourage companies to move away from heavy bank borrowing. The proposals include easing disclosure norms for debt-only issuers and improving market liquidity. Sebi Chairman Madhabi Puri Buch emphasized that a robust bond market is essential for financing India's infrastructure needs.", "category": "Economy", "page": 14, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125062", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_27-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/125062"}], "article_id": "28a6a100"}, {"headline": "Digantara: Bengaluru startup leading global traffic management in outer space", "summary": "Bengaluru-based startup Digantara is developing a global traffic management system for outer space to prevent collisions among the thousands of satellites in orbit. The company uses a network of ground-based and space-based sensors to track debris and active satellites in real-time. Their platform provides critical data to satellite operators and space agencies to ensure orbital safety.", "category": "Technology", "page": 15, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125062", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_27-05-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/125062"}], "article_id": "3f8fed68"}, {"headline": "US Strikes in Iraq Stall Iran Peace Talks, Boost Oil", "summary": "US defensive strikes against Iranian-backed groups in Iraq have stalled ceasefire talks in Qatar. Iran deemed the actions a \"gross violation,\" demanding billions in frozen assets and threatening Strait of Hormuz shipping. This further complicates regional peace efforts, pushing up oil prices and causing supply shocks.", "category": "World", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁷⁰⁵²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125088"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125117"}], "importance": 9, "article_id": "9ca3dd72"}, {"headline": "Siddaramaiah Considers Rajya Sabha Amid Karnataka Leadership Speculation", "summary": "Karnataka CM Siddaramaiah met the Congress high command in Delhi amid leadership change speculation, including a potential power-sharing pact with Deputy CM DK Shivakumar. Siddaramaiah, a prominent OBC face, was offered a Rajya Sabha seat and is expected to announce his decision by May 28. Official talks focused on upcoming elections.", "category": "Politics", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁷⁰⁵²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125088"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 27-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125036"}], "importance": 8, "article_id": "1fc13f48"}, {"headline": "India, US, Quad Pact on Critical Minerals Counters China", "summary": "India and the US signed a framework for critical minerals and rare earths cooperation to diversify supply chains and counter China's dominance. The Quad nations (India, US, Japan, Australia) also launched an initiative to mobilize $20 billion in public and private support for new projects, securing minerals essential
