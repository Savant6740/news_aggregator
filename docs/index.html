ng stations", "summary": "The Delhi government has approved the installation of 10 new air quality monitoring stations in areas including Vikaspuri, Shastri Park, and Vasundhara Enclave. These stations will help provide more localized data on pollution levels. Three additional spots are being finalized. This expansion aims to strengthen the city's ability to track and manage its chronic air pollution issues.", "category": "Environment", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "bf727ffc"}, {"headline": "Allahabad High Court warns against throwing non-vegetarian waste into Ganga", "summary": "The Allahabad High Court observed that throwing non-vegetarian food waste into the Ganga could hurt the religious sentiments of the Hindu community. The court made these remarks while granting bail to eight men arrested for holding an Iftar gathering on a boat in Varanasi. The applicants expressed apology for their actions and the pain caused to society at large.", "category": "Law", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "f2c949cc"}, {"headline": "Indian Navy to commission three indigenous vessels to strengthen maritime edge", "summary": "The Indian Navy is set to commission three new indigenous vessels: the stealth frigate Dunagiri, an anti-submarine warfare craft Agray, and the survey ship Sanshodhak. Built by Garden Reach Shipbuilders & Engineers, these additions aim to boost India's presence in the Indian Ocean Region. The navy aims for full self-reliance by 2047, with 60 more warships currently under construction.", "category": "Science", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "b7bb9a68"}, {"headline": "Self-styled godman arrested for murder of woman and friend in Maharashtra", "summary": "A self-styled godman was arrested in Maharashtra’s Dhule district for allegedly murdering a woman and her friend at his ashram. The woman had approached him for remedies to family and job problems. Police allege the accused killed her after an attempted sexual assault and then murdered her friend. A dog squad helped trace the scent to the ashram, leading to the recovery of the bodies.", "category": "India", "page": 1, "importance": 3, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "59732186"}, {"headline": "2011 MHA fire safety recommendations for Delhi remain largely unimplemented", "summary": "A 2011 assessment by the Union Ministry of Home Affairs flagging severe gaps in Delhi’s firefighting infrastructure remains mostly ignored. The report recommended large-scale expansion and modernization of staffing and equipment. While the number of fire stations has increased, coverage in peripheral and congested areas still falls short of the suggested safety standards.", "category": "Infrastructure", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "bc8d6de7"}, {"headline": "NCB busts Dehradun lab manufacturing banned 'jihadi drug' Captagon", "summary": "The Narcotics Control Bureau dismantled a lab in Dehradun used by a Syrian national to manufacture Captagon, a banned synthetic stimulant known as the \"jihadi drug.\" One Indian national was arrested for leasing the property. The raid followed the seizure of a massive consignment worth ₹182 crore. This is the first time a clandestine Captagon production facility has been found in India.", "category": "Law", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "bba78a6d"}, {"headline": "India’s merchandise trade deficit remains high despite economic reforms", "summary": "India's trade deficit has risen significantly since the 1991 reforms, now consistently exceeding 4% of GDP. The gap is largely driven by non-oil imports. While China runs a surplus due to high value-added exports, India’s export growth has lagged in capital and consumer goods. Analysts suggest India needs to increase investment and manufacturing to stabilize its external accounts.", "category": "Economy", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "d433ddf7"}, {"headline": "UK Labour Party faces leadership challenge after local election losses", "summary": "Wes Streeting has announced he will stand in a future leadership contest to unseat UK Prime Minister Keir Starmer. The move comes after Labour suffered significant losses in local council elections to Reform UK and the Green Party. Internal divides have sharpened over Starmer's vision and Brexit, with critics calling for a \"battle of ideas\" to regain voter confidence.", "category": "Politics", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "fda71a90"}, {"headline": "Karnataka becomes first state to implement alcohol-content based excise duty", "summary": "Karnataka has introduced an Alcohol-in-Beverage (AIB) based excise duty structure, linking taxes directly to alcohol content. The move aims to rationalize pricing and align with neighboring states. While premium and imported liquors are expected to become cheaper by 16-20%, lower-priced spirits could see price hikes of up to 30%. The state targets ₹45,000 crore in excise revenue.", "category": "Economy", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "e7c03122"}, {"headline": "CID probes ₹400 crore investment fraud by Shivam Associates in Belagavi", "summary": "Karnataka's CID has taken over the investigation into a massive investment scam involving Shivam Associates. The firm's owner, Shivanand Neelannavar, was arrested for allegedly duping thousands of investors with promises of 3% monthly returns. Preliminary findings suggest transactions worth ₹300-₹400 crore. Authorities have seized financial documents and are conducting a forensic audit.", "category": "Law", "page": 3, "importance": 4, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "e1f9962f"}, {"headline": "JD(S) seeks amendments to One Nation-One Election constitutional bill", "summary": "The JD(S) has requested the BJP to modify provisions in the proposed 129th Constitutional Amendment Bill regarding 'One Nation-One Election'. The party expressed concerns over the Election Commission’s power to postpone state polls and sought legal safeguards for coalition governments and regional parties. The suggestions were made during a Parliamentary Joint Committee meeting in Bengaluru.", "category": "Politics", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "c231f02c"}, {"headline": "Two men arrested for stalking woman and attacking husband in Bengaluru", "summary": "Bengaluru police arrested two men for stalking a woman and assaulting her husband near Hesaraghatta. The victim alleged the men photographed her without consent and blocked her car. When her husband confronted them, he was pushed and attacked with a stone. The accused, identified as Mahesh and Govindaraju, have been charged with stalking and attempt to murder.", "category": "Law", "page": 3, "importance": 2, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "a9437a2a"}, {"headline": "Karnataka Youth Congress to march against alleged NEET-UG paper leak", "summary": "The Karnataka Youth Congress will organize a \"Raj Bhavan Chalo\" protest in Bengaluru on May 21 over the NEET-UG paper leak controversy. Leaders alleged the Central government failed to take responsibility for the leak. They demanded that no re-examination be held in states where no leaks were reported. Senior Congress leaders are expected to participate in the agitation.", "category": "Politics", "page": 3, "importance": 4, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "4915043d"}, {"headline": "IMD issues yellow alert for Bengaluru with heavy rain forecast", "summary": "The India Meteorological Department has forecast continued rain and thunderstorms for Bengaluru through May 21. A yellow alert has been issued for South Interior Karnataka. Civic authorities have been directed to ensure emergency response systems are ready for potential waterlogging and flooding. Residents are advised to be cautious during afternoon and evening hours.", "category": "Environment", "page": 3, "importance": 3, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "ea2cbb23"}, {"headline": "HD Kumaraswamy criticizes Karnataka government over fuel tax and price hikes", "summary": "Union Minister HD Kumaraswamy attacked the Congress-led Karnataka government for \"misleading the public\" by raising fuel prices and taxes to fund guarantee schemes. He argued that the state has continuously increased costs for electricity and bus fares. Kumaraswamy also noted that international oil supply issues are influenced by global conflicts, keeping Indian prices relatively lower.", "category": "Politics", "page": 3, "importance": 4, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "ed790052"}, {"headline": "Expelled AMMK MLA Kamaraj faces disqualification after supporting TVK government", "summary": "AMMK chief TTV Dhinakaran stated that former party MLA S Kamaraj would face disqualification after being expelled for supporting the TVK government during a floor test. Kamaraj was the party's lone representative in the Tamil Nadu assembly. Dhinakaran called the TVK's acceptance of support \"legally questionable\" and vowed to oppose the move as horse-trading.", "category": "Politics", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "9c77cd0d"}, {"headline": "Kamal Haasan meets Tamil Nadu CM, demands state-owned OTT platform", "summary": "Actor-politician Kamal Haasan met Tamil Nadu CM C Joseph Vijay to submit a memorandum for the film industry. Key demands include launching a state-owned OTT platform for independent films, abolishing local entertainment tax, and forming a dedicated anti-piracy team. Haasan also requested an eight-week theatrical window before films are released on digital platforms.", "category": "Culture", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "df2e646e"}, {"headline": "One killed and five injured in lightning strikes across Kerala", "summary": "One person died and five others were injured in two separate lightning strike incidents in Kerala's Kozhikode district on Sunday. The deceased was identified as Jason. The injured were rushed to nearby hospitals for treatment. The incident occurred as parts of the state experienced heavy pre-monsoon rainfall and thunderstorm activity.", "category": "India", "page": 4, "importance": 2, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "8164c596"}, {"headline": "Fire breaks out at Yadadri Thermal Power Station in Andhra Pradesh", "summary": "A fire erupted in one of the units of the Yadadri Thermal Power Station in Nalgonda district on Sunday. Six fire tenders successfully brought the flames under control, and no casualties or injuries were reported. Preliminary assessments suggest the blaze was caused by a short circuit. The incident did not result in major power supply disruptions.", "category": "Infrastructure", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "96f50851"}, {"headline": "Cabinet expansion is CM's prerogative, says Tamil Nadu minister Sengottaiyan", "summary": "Tamil Nadu Finance Minister KA Sengottaiyan stated that expanding the state cabinet is the Chief Minister's prerogative and may occur in phases. He noted that forming a small initial cabinet is a long-standing political practice. Sengottaiyan dismissed speculation, citing historical examples of phased expansions under previous administrations.", "category": "Politics", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "45fcee03"}, {"headline": "Landslide survivors begin moving into new government township in Wayanad", "summary": "Families who survived the 2024 Mundakkai-Chooralmala landslide disaster have started moving into a new government-built township in Kalpetta. Out of 327 houses constructed, keys for 178 were recently handed over. Former CM Pinarayi Vijayan spoke with families, describing the safe homes as symbols of hope and a new beginning for those who lost everything in the disaster.", "category": "India", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "d94d5763"}, {"headline": "BRS demands removal of Union Minister Bandi Sanjay after son's arrest", "summary": "Bharat Rashtra Samiti leader KT Rama Rao called for the removal of Union Minister Bandi Sanjay Kumar following the arrest of his son, Bhageerath, in a POCSO case. Rama Rao argued that the minister's position could hinder an impartial investigation. The son was remanded to judicial custody after the Telangana high court refused to grant interim protection.", "category": "Politics", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "0f200ad4"}, {"headline": "Man lynched by mob after killing woman in Telangana's Mahabubnagar", "summary": "A 30-year-old man died in a hospital after being attacked by a mob for allegedly killing a 21-year-old woman. The man had stabbed the woman in Jadcherla town after she rejected his romantic advances. Local residents chased and assaulted him before he was taken into custody. Both the victim and the accused are now deceased.", "category": "Law", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "094a4c20"}, {"headline": "Aadhaar and voter cards found in West Bengal TMC offices", "summary": "Hundreds of Aadhaar cards, voter IDs, and MNREGA job cards were allegedly recovered from Trinamool Congress offices in West Bengal. BJP workers claimed the documents were taken from voters to facilitate fake voting. Recoveries were reported in Bidhan Nagar, Birbhum, and West Midnapore. TMC officials denied the allegations, suggesting they were fabricated by the opposition.", "category": "Politics", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "fd78237e"}, {"headline": "Dismembered body of unidentified woman found on train in Lucknow", "summary": "A woman’s dismembered torso and limbs were found stuffed in a bag and box inside a sleeper coach of the Gomti Nagar Express in Lucknow. The victim, aged between 25 and 35, has not been identified as her head was missing. Railway police and forensic teams are investigating the case as a murder and attempting to trace the origin of the luggage.", "category": "India", "page": 5, "importance": 4, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "9e0d52bf"}, {"headline": "Amit Shah urges Gujarat to reach top three in service sector", "summary": "Union Home Minister Amit Shah stated that Gujarat, after success in manufacturing and green energy, must now aim for a top-three spot in the service sector. Speaking at the inauguration of a tech park in Ahmedabad, Shah highlighted the need for world-class IT infrastructure to compete with hubs like Bengaluru and Hyderabad. The Million Minds Tech Park was built at a cost of ₹1,100 crore.", "category": "Economy", "page": 5, "importance": 4, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "1d0bfb90"}, {"headline": "Economic and demographic divides fuel India's parliamentary delimitation dilemma", "summary": "Analysts highlight the growing tension in India over parliamentary delimitation, which pits population-based representation against federal balance. Southern states, which have successfully lowered fertility rates, fear losing political voice to northern states. The debate is intrinsically linked to how fiscal resources are distributed, with wealthier states acting as net contributors.", "category": "Politics", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "59ef62f6"}, {"headline": "Thaw in India-China relations offers new avenues for climate cooperation", "summary": "A report by the Centre for Social and Economic Progress suggests that improving India-China ties could lead to collaboration on climate policy. Recent meetings between climate envoys indicate a shift toward joint efforts in \"low-politics\" areas like energy efficiency and sustainable agriculture. However, strategically sensitive sectors like electric vehicles remain complex.", "category": "Environment", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "299a54ca"}, {"headline": "Disabled and transgender workers face high exclusion from MGNREGA employment", "summary": "A Ministry of Rural Development report shows that 70% of registered disabled workers and over 90% of transgender workers received no employment under MGNREGA in FY 2025-26. West Bengal reported zero person-days for these groups. While Tamil Nadu employed 48.7% of its registered transgender workers, states like Maharashtra and Gujarat saw exclusion rates near 99%.", "category": "India", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "91e3917c"}, {"headline": "PM Modi to visit Norway to boost digital and green energy ties", "summary": "Prime Minister Narendra Modi arrives in Norway on Monday, the first Indian premier to visit since 1983. He will co-chair the third India-Nordic Summit and meet PM Jonas Gahr Støre. Discussions will focus on digital public goods, health, space, and implementing the recent trade agreement with EFTA. Nearly 20 business-to-business agreements are expected to be signed.", "category": "Politics", "page": 7, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "21ca753f"}, {"headline": "India dismisses concerns over decline in media freedom and minority rights", "summary": "Senior diplomat Sibi George rejected claims of declining media freedom in India made by Dutch PM Rob Jetten. George described India as a vibrant democracy that has achieved economic growth without compromising principles. He noted that India’s minority population has grown from 11% to over 20% since independence and highlighted high voter turnout in recent elections.", "category": "Politics", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "582dab12"}, {"headline": "Goddess Saraswati deity installed at Bhojshala complex following court order", "summary": "A formal worship ceremony was held at the Bhojshala complex in Madhya Pradesh to install a deity of Goddess Saraswati. The move follows a High Court order establishing the religious character of the site as a temple. Hindu organizations have banned non-Hindus from entering the complex for security reasons. Former CM Digvijaya Singh criticized the move, citing the site's protected status.", "category": "Culture", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "213d6872"}, {"headline": "Bajrang Dal activists target Muslim staff at Dehradun footwear showroom", "summary": "Right-wing activists in Dehradun stormed a footwear shop, accusing Muslim staff of discriminating against Hindu employees. A viral video showed activists writing \"jihadi\" on the name badges of Muslim staffers. While police have not received a formal complaint, they stated that action would be taken if one is filed. The incident has drawn criticism on social media.", "category": "India", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "003eddcc"}, {"headline": "Security forces launch operations to rescue hostages in Manipur", "summary": "Security forces in Manipur have begun operations to rescue civilians held captive by Kuki and Naga groups. The hostage crisis follows a May 13 attack that killed four people. Over 300 vehicles are currently stranded on National Highway 2 due to shutdowns in Kangpokpi. While some individuals have been released, many remain in custody as tensions between the communities persist.", "category": "India", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "25fc6888"}, {"headline": "Delhi High Court attaches Rohini judge to academy after courtroom spat", "summary": "The Delhi High Court has attached a Rohini district judge to the Delhi Judicial Academy following a viral video of a verbal altercation with a lawyer. The scuffle allegedly began over an adjournment request. While bar associations called for a strike in solidarity with the lawyer, the Judicial Service Association condemned the recording of proceedings as an attempt to browbeat officers.", "category": "Law", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "d1737ad3"}, {"headline": "Iran promises normal transit through Strait of Hormuz after conflict ends", "summary": "Iranian President Masoud Pezeshkian stated that commercial shipping through the Strait of Hormuz will return to normal once hostilities with the US and Israel cease. Currently, transit remains largely frozen due to a US naval blockade. Iran insists on maintaining control over the vital energy waterway. Meanwhile, the US continues to divert ships to avoid potential Iranian seizures.", "category": "World", "page": 11, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "cf4a2919"}, {"headline": "India flags concerns at UN over attacks on commercial vessels", "summary": "India's UN representative Parvathaneni Harish termed the targeting of commercial shipping in the Strait of Hormuz \"unacceptable.\" Speaking at a UN meeting, he highlighted risks to civilian crews and global supply chains. The remarks follow recent attacks on India-flagged vessels. Harish called for international cooperation to safeguard energy and fertilizer flows during the West Asia crisis.", "category": "Politics", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "a98e2984"}, {"headline": "Iran's parliament speaker Mohammad Ghalibaf to oversee relations with China", "summary": "Iranian parliament speaker Mohammad Bagher Ghalibaf has been appointed to manage the country's strategic relations with China. The appointment, approved by Supreme Leader Ayatollah Mojtaba Khamenei, aims to strengthen ties amid ongoing conflict with the West. Ghalibaf has recently emerged as a key negotiator for Iran in international discussions regarding regional security and trade.", "category": "World", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "ce4b8555"}, {"headline": "US Senate parliamentarian blocks taxpayer funding for White House ballroom", "summary": "A Senate official has removed a provision for $1 billion in security funding for President Trump's planned White House ballroom from a spending package. Democrats criticized the project as a frivolous expense during high inflation. While Trump claims the ballroom will be funded by private donations, Republicans sought taxpayer money for Secret Service upgrades associated with the site.", "category": "World", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "fef8d097"}, {"headline": "Centre plans safety tech to prevent hands-off driving on two-wheelers", "summary": "The Indian government is proposing new standards requiring two-wheelers to install \"hands-free\" detection technology. The system would prevent ignition or slow down the vehicle if a rider's hands are not on the handlebars. Aimed at reducing stunts and accidents, the tech could add ₹800-1,000 to vehicle costs. Consultations are underway with major manufacturers like Hero and Bajaj.", "category": "Infrastructure", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "236a3292"}, {"headline": "India’s gems and jewellery exports decline 9% amid regional conflicts", "summary": "India's gems and jewellery exports fell to $2.22 billion in April, a 9% drop compared to the previous year. The Gem & Jewellery Export Promotion Council attributed the decline to the West Asia conflict and lack of clarity on tariffs in major markets like the US. Cut and polished diamond exports specifically saw a nearly 20% decrease during the same period.", "category": "Business", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "7dae52e2"}, {"headline": "Factor investing gains traction in India as AUM reaches ₹50,875 crore", "summary": "Rules-based factor investing strategies, including momentum, value, and quality, are seeing rapid growth in the Indian market. Total assets under management for factor funds have surged from ₹781 crore in 2021 to over ₹50,000 crore in 2026. While momentum strategies led returns in recent years, value and low-volatility indices have also outperformed traditional benchmarks like the Nifty 50.", "category": "Business", "page": 12, "importance": 4, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "5e26fb01"}, {"headline": "Chelsea appoints Xabi Alonso as new manager on four-year deal", "summary": "Chelsea has named Spaniard Xabi Alonso as their new head coach following the club's FA Cup final loss to Manchester City. Alonso is tasked with improving the fortunes of the London club, which currently sits ninth in the Premier League. He replaces the previous management after a disappointing season for the Blues.", "category": "Sports", "page": 13, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "ba452aa1"}, {"headline": "Finn Allen’s 93 keeps KKR’s IPL title hopes alive", "summary": "New Zealander Finn Allen scored a 35-ball 93 to lead Kolkata Knight Riders to a 29-run victory over Gujarat Titans. After a lean run, Allen’s aggressive yet mature knock helped KKR rediscover their rhythm. The win restores balance to KKR's batting order as they push for a high seed in the playoffs. Allen credited a change in mental approach for his recent form.", "category": "Sports", "page": 14, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "b3d1df66"}, {"headline": "Mohun Bagan and East Bengal play out draw in pulsating Kolkata Derby", "summary": "The ISL Kolkata Derby ended in a 1-1 draw before a crowd of 62,000 at Salt Lake Stadium. Edmund Lalrindika put East Bengal ahead in the 85th minute, but Jason Cummings scored an equalizer for Mohun Bagan in the 89th minute. The result keeps the race for the ISL title open, with both teams tied on 23 points heading into the final matchday on Thursday.", "category": "Sports", "page": 14, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "ddd625ed"}, {"headline": "Alex Marquez hospitalized after horror crash at Catalunya MotoGP", "summary": "Ducati rider Alex Marquez suffered fractures to a cervical vertebra and his right clavicle after a horrific crash during the Catalunya MotoGP. The race was red-flagged twice following multiple accidents. Marquez was flipped off his bike after contact with Pedro Acosta. Fabio Di Giannantonio eventually won the race after it was restarted with 12 laps remaining.", "category": "Sports", "page": 14, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "a08d7efd"}, {"headline": "Bruno Fernandes equals Premier League assist record in Manchester United win", "summary": "Bruno Fernandes recorded his 20th assist of the season, equaling the Premier League record, as Manchester United beat Nottingham Forest 3-2. The win secured third place for United and a return to the Champions League. Bryan Mbeumo scored United's third goal from a Fernandes cross. Forest guaranteed their top-flight survival despite the loss at Old Trafford.", "category": "Sports", "page": 14, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124125", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 18-05.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/124125"}], "article_id": "bae4b7fb"}, {"headline": "CBI arrests Arvind Kejriwal in Tihar over Delhi excise policy", "summary": "The CBI formally arrested Delhi CM Arvind Kejriwal in the excise policy case after questioning him in Tihar Jail. A Delhi court granted the agency three-day custody. The agency claims Kejriwal was involved in the alleged scam, while his legal team argued the arrest was a 'hit and run' tactic to prevent his release following a recent bail order in the ED's parallel investigation.", "category": "Law", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/124027", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE-Delhi-May-18-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124027"}], "article_id": "2b93baae"}, {"headline": "President Droupadi Murmu to address joint session of Parliament", "summary": "President Droupadi Murmu is scheduled to deliver her first address to the joint session of the 18th Lok Sabha and Rajya Sabha. The speech will outline the NDA government's policy roadmap for its third term. Key expected themes include economic stability, infrastructure development, and the government's stance on the recent paper leak controversies.", "category": "Politics", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124027", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE-Delhi-May-18-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124027"}], "article_id": "1008cf73"}, {"headline": "Southwest Monsoon advances into Delhi and more parts of North India", "summary": "The India Meteorological Department (IMD) confirmed that the Southwest Monsoon has reached Delhi and progressed into parts of Rajasthan, Haryana, and Punjab. Heavy rainfall was reported across the national capital region, significantly reducing the prevailing heatwave conditions. IMD predicts widespread rainfall activity over Northwest India for the next four days.", "category": "Environment", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124027", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE-Delhi-May-18-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/124027"}], "article_id": "3dc9e877"}, {"headline": "ISRO successfully completes third landing test for 'Pushpak' reusable vehicle", "summary": "ISRO successfully conducted the RLV LEX-03 landing mission for its reusable launch vehicle 'Pushpak' at the Aeronautical Test Range in Karnataka. The vehicle demonstrated high-speed autonomous landing under difficult cross-wind conditions. This third consecutive success proves India's capability in developing cost-effective space access technologies for the future.", "category": "Science", "page": 7, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124027", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE-Delhi-May-18-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/124027"}], "article_id": "4f147918"}, {"headline": "Julian Assange returns to Australia after 14-year legal battle", "summary": "WikiLeaks founder Julian Assange landed in Canberra as a free man after pleading guilty to one felony count of conspiring to obtain and disclose national defense information. The plea deal with the US Department of Justice, finalized in a Saipan court, ended his five-year imprisonment in the UK. Assange was greeted by family and supporters at the airport.", "category": "World", "page": 12, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124027", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE-Delhi-May-18-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/124027"}], "article_id": "be65ae0c"}, {"headline": "Kenya President Ruto rejects Finance Bill after deadly tax protests", "summary": "Following violent protests in Nairobi that left several dead and saw Parliament set on fire, Kenyan President William Ruto announced he would not sign the controversial Finance Bill 2024. The bill proposed tax hikes on essential goods. Ruto acknowledged the public outcry and stated that the government would now look for alternative ways to manage the country's debt crisis.", "category": "World", "page": 12, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124027", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE-Delhi-May-18-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/124027"}], "article_id": "5d40b06b"}, {"headline": "SEBI approves stricter rules for 'finfluencers' and retail investment", "summary": "The Securities and Exchange Board of India (SEBI) approved a framework to restrict its regulated entities from associating with unregistered financial influencers. The move aims to protect retail investors from biased or misleading financial advice on social media. SEBI also approved changes to the eligibility criteria for derivatives trading to ensure market stability.", "category": "Business", "page": 15, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124027", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE-Delhi-May-18-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/124027"}], "article_id": "49316ce7"}, {"headline": "India prepares for T20 World Cup semi-final against England in Guyana", "summary": "India is set to face defending champions England in the second semi-final of the ICC Men's T20 World Cup. Rohit Sharma’s undefeated side seeks to break a decade-long ICC trophy drought. The match in Guyana faces a significant threat of rain; if washed out, India will progress to the final based on their higher seeding in the Super 8 stage.", "category": "Sports", "page": 16, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124027", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE-Delhi-May-18-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/124027"}], "article_id": "65751ebd"}, {"headline": "Delhi High Court reserves order on Bibhav Kumar's bail plea", "summary": "The Delhi High Court has reserved its decision on the bail application of Bibhav Kumar, an aide to CM Arvind Kejriwal, in the Swati Maliwal assault case. The prosecution argued that Kumar is influential and could tamper with evidence if released. Kumar's defense team claimed the allegations were exaggerated and that his continued detention is unnecessary.", "category": "Law", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124027", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE-Delhi-May-18-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124027"}], "article_id": "011164bb"}, {"headline": "India Hits Road to Asset Monetisation for ₹35kcr Raise", "summary": "NHAI has identified 28 national highway stretches, covering 1,800 km, for its FY27 asset recycling program. The government aims to raise approximately ₹35,000 crore to fund new infrastructure. The projects, primarily in Haryana and Uttar Pradesh, will be monetised through Toll-Operate-Transfer and Infrastructure Investment Trust models.", "category": "Infrastructure", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "244905f2"}, {"headline": "Micron Warns of Prolonged Global AI Memory Chip Shortage", "summary": "Micron Technology's CBO, Sumit Sadana, stated that the AI-driven boom has triggered a global semiconductor memory shortage that could last until 2028. Demand for High-Bandwidth Memory (HBM) and DRAM is significantly outstripping supply. Sadana warned that Indian firms risk being caught unprepared if they do not secure long-term procurement commitments.", "category": "Technology", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "1fc7a5bd"}, {"headline": "CBI Identifying Source of NEET-UG 2026 Paper Leak", "summary": "The CBI is working to identify the origin of the NEET-UG paper leak following the arrest of nine individuals, including alleged kingpins. Investigators are scrutinizing digital devices and financial records to unearth the larger conspiracy. The agency has sought custody of the accused to trace the leakage point and other members of the syndicate.", "category": "Law", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "901125ce"}, {"headline": "India and Netherlands Upgrade Ties to Strategic Level", "summary": "PM Narendra Modi and Dutch PM Rob Jetten have elevated bilateral relations to a strategic level. The partnership focuses on political dialogue, defense, water management, maritime security, and emerging technologies. Both nations agreed to facilitate easier mobility for students and professionals and increase bilateral trade, which reached $7.75 billion in 2025.", "category": "Politics", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "a55d2bce"}, {"headline": "New Export Markets Fetch Over $202m for India", "summary": "India's export diversification strategy added $202.2 million in FY26 by targeting new regions like North-East Asia and Latin America. Key growth sectors included ships, telecom instruments, and marine products. The strategy helped mitigate the impact of traditional commodity market fluctuations and geopolitical tensions affecting existing trade routes.", "category": "Economy", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "7592e415"}, {"headline": "RBI Increases Scrutiny on Corporate Overseas Direct Investments", "summary": "The Reserve Bank of India has stepped up monitoring of overseas direct investments (ODI) to ensure funds are used for bona fide business purposes. Regulatory authorities are scrutinizing the intent, rationale, and governance structures behind these investments. The move comes as total annual ODI outflows rose to nearly $27 billion in FY26.", "category": "Economy", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "b59931a2"}, {"headline": "Ambuja Cement Submits ₹580cr Bid for Jaypee Cement", "summary": "Adani Group-backed Ambuja Cements has emerged as a key bidder for the bankrupt Jaypee Cement with a ₹580 crore offer. The bid is currently below the liquidation value of ₹880 crore, leading to negotiations for a higher offer. The insolvency resolution process follows Jaypee's default on substantial creditor claims totaling over ₹3,361 crore.", "category": "Business", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "dad3f2e1"}, {"headline": "JLR Outlines Recovery Strategy Focused on Costs and Digital", "summary": "Jaguar Land Rover (JLR) has announced a recovery plan targeting £1.7 billion in cost savings by FY27. The strategy includes a digital transformation of internal systems and a focus on high-margin premium models. The move follows JLR reporting its worst annual net loss in nearly five years, driven by mounting geopolitical and economic pressures.", "category": "Business", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "7071f115"}, {"headline": "Nvidia in Talks to Lead $20m Round for Simplismart", "summary": "Nvidia is reportedly in discussions to lead a $20 million funding round for Simplismart, an Indian generative AI startup. Existing investor Accel may also participate in the round, which could value the startup at $100 million. Simplismart provides tools that help enterprises build and optimize AI models within their own infrastructure.", "category": "Technology", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "4b2af5ab"}, {"headline": "War Eroded GST Gains, Says Dabur Global CEO Malhotra", "summary": "Dabur Global CEO Mohit Malhotra stated that geopolitical tensions and inflation have offset the benefits of reduced GST on consumer goods. Despite these challenges, the company is betting on digital-first brands and volume growth. Dabur is focusing on premium products and expanding its rural distribution network to maintain margins amidst rising costs.", "category": "Business", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "c04b6de9"}, {"headline": "Myanmar-Based Drug Trafficker Arrested in Guwahati", "summary": "The NCB arrested Ali Tuanga, a high-profile Myanmar-based drug trafficker, in Guwahati. He was allegedly operating a major supply chain for methamphetamine and heroin across the border. This arrest is considered a significant blow to international drug cartels operating in Northeast India.", "category": "Law", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "53f0817c"}, {"headline": "CBSE Defends On-Screen Marking as Fair and Transparent", "summary": "School Education Secretary Sanjay Kumar defended CBSE's use of the On-Screen Marking (OSM) system for Class 12 exams. Despite concerns about a 3% drop in overall pass percentage, the government maintains the system is transparent and reduces errors. The system, resumed this year after a hiatus, aims to align Indian board standards with international norms.", "category": "Education", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "4e8eb0a0"}, {"headline": "Modi and Kristersson Discuss Boosting Trade and Defense", "summary": "PM Narendra Modi held talks with Swedish counterpart Ulf Kristersson to enhance bilateral cooperation in trade, technology, and defense. The leaders explored new avenues for economic engagement beyond the existing $7.75 billion trade volume. Discussions also touched upon regional security and collaborative efforts in sustainable technology.", "category": "Politics", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "fdb6bd0c"}, {"headline": "Satheesan Finalises Kerala Cabinet; Five Ministers from IUML", "summary": "Kerala Chief Minister-designate VD Satheesan has submitted his list of ministers to the state governor. The new cabinet includes five ministers from the Indian Union Muslim League (IUML). The ministerial team reflects a balance of regional and social representation within the alliance, focusing on implementing the coalition's common agenda.", "category": "Politics", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "4814399d"}, {"headline": "Bengaluru Suburban Rail Project Gaining Momentum, Says Vaishnaw", "summary": "Railway Minister Ashwini Vaishnaw stated that the Bengaluru Suburban Railway Project is progressing well with several key hubs under development. Alignment has been jointly approved by the state and railways for various corridors. The project, which includes upgrading stations under the Amrit Bharat Scheme, aims to significantly improve urban mobility in Bengaluru.", "category": "Infrastructure", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "0331ecf0"}, {"headline": "Indian National Killed in Moscow Drone Strike", "summary": "An Indian national was killed and three others injured during a large-scale kamikaze drone strike in Moscow. The Indian Embassy is coordinating relief and identifying the victims. Local authorities are releasing further details as the investigation continues into the attack, which targeted residential and commercial areas in the Russian capital.", "category": "World", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "32171473"}, {"headline": "UP Government Plans to Increase Indigenous Milk Production", "summary": "The Uttar Pradesh government has prepared a major dairy master plan to boost milk production from indigenous cow breeds. Four specific schemes have been implemented to strengthen the rural economy and promote high-yielding cattle breeds. The initiative aims to support dairy farmers and enhance the state's position as a leading milk producer in India.", "category": "Economy", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "a7e2febf"}, {"headline": "Karnataka Congress Prepares for 3-Year Leadership Bash", "summary": "The Karnataka Congress is gearing up to celebrate three years in power, with speculation rising about a potential leadership change. Supporters of various senior leaders, including DK Shivakumar and G Parameshwara, are positioning their candidates for the CM post. The high command is expected to take a final decision based on performance and party stability.", "category": "Politics", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "0d8e7122"}, {"headline": "Karnataka Introduces New Alcohol Policy Based on Volume", "summary": "The Karnataka government has introduced a new excise policy that taxes beverages based on alcohol content. The move aims to deregulate the pricing of premium brands while keeping prices stable for popular segments. While some consumers may see lower prices for light beverages, the industry remains cautious about the overall impact on market demand and revenue.", "category": "Politics", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "711329dc"}, {"headline": "Deloitte India Plans Workforce Expansion to 100,000 by 2028", "summary": "Deloitte India aims to become a 100,000-strong professional services firm by 2028, up from its current 15,000 workforce. The company is focusing on AI, cloud, and digital transformation services to drive growth. This expansion is part of a broader strategy to support the Indian government's 'Viksit Bharat' goal and serve global enterprises from India.", "category": "Business", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "41daa93d"}, {"headline": "Diageo India Bets on Premium Demand Amidst Inflation", "summary": "Diageo India is shifting its focus towards premium alcohol brands as high-end demand remains resilient despite inflationary pressures. The company reported strong double-digit growth in its prestige and luxury segments. This strategy aims to improve margins and cater to the evolving tastes of affluent Indian consumers in key states.", "category": "Business", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "55635ef1"}, {"headline": "Jio Studios to Invest ₹5,000cr in Content Production", "summary": "Jio Studios plans to invest ₹5,000 crore over the next three years to produce a diverse range of 40-50 films and web series. The content strategy focuses on building successful movie franchises and local language programming. The investment aims to solidify Jio's position in the rapidly growing Indian digital and theatrical content market.", "category": "Business", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "501695d9"}, {"headline": "Top Law Firms Face High Talent Churn and Competition", "summary": "Indian law firms are experiencing significant talent churn as senior lawyers move between top-tier firms for better roles and compensation. Firms like AZB, JSA, and Khaitan & Co. are competing to attract high-profile teams to strengthen their practices in M&A, private equity, and disputes. This movement is driven by a limited pool of experienced senior partners.", "category": "Law", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "3385de93"}, {"headline": "Hero MotoCorp Plans ₹1,500cr Capex for New Projects", "summary": "Hero MotoCorp has earmarked ₹1,500 crore for capital expenditure in FY27 to develop new models and enhance its electric vehicle lineup. The funding will also support the expansion of manufacturing facilities and R&D for next-generation mobility solutions. The company aims to strengthen its market position amidst growing competition in the premium segment.", "category": "Business", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "7d92e705"}, {"headline": "Signature Global to Invest ₹3,500cr in Gurugram Projects", "summary": "Real estate firm Signature Global plans to invest ₹3,500 crore in residential projects in Gurugram over the next few years. The investment will focus on high-end and mid-segment housing to meet the rising demand in the National Capital Region. The company remains optimistic about the long-term growth of the Indian real estate sector.", "category": "Business", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "bcc57655"}, {"headline": "India Extends Ban on Sugar Exports to Manage Stock", "summary": "The government has extended the ban on sugar exports beyond September to ensure adequate domestic supply and manage prices. Lower-than-expected production due to erratic monsoon conditions has led to tight inventory levels. The move aims to prevent a domestic price surge and maintain a buffer for national consumption requirements.", "category": "Economy", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "636e5ced"}, {"headline": "Monsoon Arrives Early in Kerala; 92% Rainfall Forecast", "summary": "The southwest monsoon has arrived early in Kerala, nearly a week ahead of schedule. The IMD has forecast seasonal rainfall at 92% of the long-period average, which is on the lower side of 'normal'. This early onset is crucial for Indian agriculture, which depends heavily on monsoon rains for kharif crop production.", "category": "Environment", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "112e5104"}, {"headline": "Global Demand for Sand Surges to 50 Billion Tonnes", "summary": "Global demand for construction sand has exceeded 50 billion tonnes annually, driven by rapid urbanization and infrastructure development. Scientists warn that sand is being extracted at a rate far higher than it can be naturally replenished. This has led to environmental degradation and calls for more sustainable alternatives in the construction industry.", "category": "Environment", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "321761e7"}, {"headline": "India Strategically Navigates Ties with US and China", "summary": "India is carefully balancing its strategic partnerships with the US and its complex relationship with China. Analyzing the 'G-Minus-2' dynamic, experts suggest India is positioning itself as a key power in the Indo-Pacific. This diplomatic maneuvering is essential for India's economic growth and regional security interests amidst shifting global alliances.", "category": "Politics", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "630adab3"}, {"headline": "JSW Steel Targets 37 Million Tonnes Capacity by 2027", "summary": "JSW Steel plans to increase its production capacity to 37 million tonnes by 2027 by focusing on brownfield expansions and operational efficiencies. The company aims to maintain its 40% market share in India while navigating global steel market volatility. JSW is also investing in sustainable green steel technologies to meet future environmental regulations.", "category": "Business", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "d80df045"}, {"headline": "Credit Card Profitability Under Pressure as Repayments Rise", "summary": "Indian banks are facing lower profitability in their credit card business as more customers choose to pay their balances in full. The share of 'revolvers'—customers who carry a balance and pay interest—has dropped from pre-pandemic levels. This structural shift is forcing lenders to find new ways to generate revenue from their card portfolios through fees and value-added services.", "category": "Business", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "f35c2484"}, {"headline": "ENIL Revenue Grows 4% to ₹565cr in FY26", "summary": "Entertainment Network India Limited (ENIL), which operates Radio Mirchi, reported a 4% revenue growth to ₹565 crore in FY26. The company's digital business saw a significant surge of 84%, contributing nearly 23% to total revenue. ENIL maintained a healthy cash balance and declared a dividend of ₹2 per share for its investors.", "category": "Business", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "8aa365b9"}, {"headline": "Telangana Cinema Exhibitors Seek Revenue Share from Producers", "summary": "Cinema exhibitors in Telangana are demanding a percentage-based revenue-sharing model from film producers due to a weak box office performance. Current fixed-rental models are becoming unsustainable for theatre owners facing rising operating costs. This dispute has led to calls for a more equitable distribution of theatrical earnings between different stakeholders.", "category": "Business", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "44ba54f0"}, {"headline": "AI Shift in Hiring Favours Senior Over Junior Workers", "summary": "A global survey indicates that CEOs are planning to cut junior roles and shift hiring towards senior and mid-level positions as AI automates entry-level tasks. Over 40% of leaders believe AI tools can now handle roles previously performed by junior staff. This trend is forcing a rethinking of talent management and career progression within many organizations.", "category": "Technology", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "383a1caf"}, {"headline": "NPCI Developing Interoperable Soundbox for All Payment Apps", "summary": "The National Payments Corporation of India (NPCI) is developing a single soundbox platform that will work across all UPI-based payment apps. This interoperable system will allow merchants to use one device for notifications from various apps like PhonePe, BharatPe, and Paytm. The move aims to simplify digital payments for millions of small merchants in India.", "category": "Technology", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "8106eed8"}, {"headline": "Bill Ackman's Pershing Square Takes $2.1b Stake in Microsoft", "summary": "Bill Ackman's hedge fund, Pershing Square, has built a $2.1 billion stake in Microsoft, betting on the company's strong position in the AI race. Ackman cited Microsoft's diversified revenue streams and leadership in cloud computing as key reasons for the investment. This stake reflects growing investor confidence in established tech giants dominating the AI landscape.", "category": "Business", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "18d20ef6"}, {"headline": "SBI Ventures to Manage ₹20,000cr Maritime Infrastructure Fund", "summary": "The government has tasked SBI Ventures with managing a new ₹20,000 crore Maritime Investment Fund (MIF). The fund will provide long-term, low-cost financing for port infrastructure, shipping, and inland water projects. This initiative is part of a broader plan to transform India's maritime sector and improve global logistics competitiveness.", "category": "Economy", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "332efe9d"}, {"headline": "Liquid Fund Inflows Hit 7-Year High in April", "summary": "Liquid funds saw a record net inflow of ₹46,448 crore in April, the highest in seven years, as investors sought safety amidst market volatility. Surplus liquidity in the banking system and geopolitical tensions have driven corporate and individual investors towards these low-risk schemes. This surge reflects a cautious approach to the current economic environment.", "category": "Economy", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "7dc00b58"}, {"headline": "SBI Funds Management Plans ₹13,000cr IPO in Mid-May", "summary": "SBI Funds Management, India's largest mutual fund house, is preparing for a ₹13,000 crore initial public offering in mid-May. The IPO will involve a secondary sale of shares by SBI and its partner Amundi. The fund house is valued at approximately ₹1.55 lakh crore, and the IPO is expected to attract significant interest from institutional and retail investors.", "category": "Business", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "c544c137"}, {"headline": "RBI Elevates Five Senior Officers to Executive Director Rank", "summary": "The Reserve Bank of India has promoted five senior officers—Gunveer Singh, Monisha Chakraborty, Suman Ray, Sudhakar Malli, and Ravi Shankar—to the post of Executive Director. These officers will oversee various key departments, including monetary policy, supervision, and human resources. The promotions are part of the central bank's periodic leadership restructuring.", "category": "Economy", "page": 10, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "3396829f"}, {"headline": "Growth of Smaller Indian Cities Remains Work in Progress", "summary": "Despite the trend of people moving to Tier-2 and Tier-3 cities for a better quality of life, infrastructure and job opportunities in these areas still lag behind major metros. While living costs are lower, many professionals face challenges in finding high-paying roles and quality healthcare. Bridging this gap remains a key challenge for balanced regional development in India.", "category": "India", "page": 10, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "d0aebae8"}, {"headline": "NTPC Chief Urges Diversification of Nuclear Technology Sources", "summary": "NTPC Chairman Gurdeep Singh emphasized the need for India to avoid over-reliance on a single supplier for nuclear technology. He advocated for a diverse mix of technologies from multiple global partners to ensure long-term energy security. This strategy aims to mitigate risks associated with supply chain disruptions and geopolitical shifts.", "category": "Infrastructure", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "440b82ad"}, {"headline": "Current Account Deficit Expected to Widen in FY27", "summary": "Economists predict India's current account deficit will widen in FY27 due to higher energy prices and a slowdown in global demand for exports. While strong remittances and services exports provide a buffer, the rising import bill for oil and electronics remains a concern. Maintaining balance of payments stability will be a key challenge for policymakers.", "category": "Economy", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "d905f002"}, {"headline": "Optimistic Outlook Linked to Lower Heart Disease Risk", "summary": "A growing body of research suggests that maintaining a positive and optimistic outlook can significantly reduce the risk of cardiovascular disease. Studies show that optimism leads to better biological responses, such as lower cortisol levels and improved insulin resistance. Researchers recommend small daily habits like gratitude journaling to build mental resilience and protect heart health.", "category": "Health", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "d68107c1"}, {"headline": "Titanic Victim's Gold Watch to be Auctioned for £60,000", "summary": "An 18-carat gold pocket watch that belonged to a victim of the Titanic disaster is set to be auctioned, with an estimated price of £60,000. The watch, which was allegedly used as a bribe for a lifeboat spot, has a controversial history. It remains a rare and significant piece of memorabilia from the 1912 sinking that killed over 1,500 people.", "category": "Culture", "page": 12, "importance": 3, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "d7d0485d"}, {"headline": "UAE Urges Restraint After Drone Strike Near Nuclear Plant", "summary": "The UAE has called for 'maximum restraint' following a drone strike that caused a fire near its Barakah nuclear power plant. While radiological safety levels remained unaffected, the incident has raised concerns about the security of critical infrastructure in the region. UAE officials have not yet officially attributed the attack to any specific group.", "category": "World", "page": 12, "importance": 8, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "1dabce07"}, {"headline": "Rare 11,000-Carat Ruby Discovered in Myanmar Region", "summary": "A massive 11,000-carat ruby has been discovered in a remote mining town in Myanmar's Sagaing region. Described as one of the largest and highest-quality rubies ever found, it has a purplish-red hue and high transparency. The find has attracted international attention, although mining in the conflict-affected area remains challenging.", "category": "Science", "page": 12, "importance": 4, "telegram_url": "https://t.me/c/1877410077/124087", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_18-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/124087"}], "article_id": "c15797fd"}, {"headline": "PM Narendra Modi visits Norway to discuss trade and energy supplies", "summary": "Prime Minister Narendra Modi arrived in Norway for a bilateral visit, the first by an Indian PM in 43 years. Key agenda items include trade, energy security, and technological collaborations. Modi will hold talks with Norwegian PM Jonas Gahr Støre and participate in the third Nordic-India summit on Tuesday, involving leaders from Sweden, Finland, Iceland, and Denmark.", "category": "Politics", "page": 3, "importance": 9, "telegram_url": "https://t.me/c/1877410077/124037", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124037"}], "article_id": "0f4477c3"}, {"headline": "Karnataka extends National Census 2027 Phase I houselisting deadline to May 22", "summary": "The Karnataka government extended the Phase I houselisting exercise for the 2027 National Census until May 22. Originally set to end on May 15, the extension allows officials to verify nearly 1.25 lakh locked houses, particularly in the Greater Bengaluru Authority limits. The exercise records housing conditions and basic amenities but does not collect individual population data yet.", "category": "India", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/124037", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124037"}], "article_id": "627b0308"}, {"headline": "Adani Group begins geotechnical surveys for Bengaluru Twin Tunnel Road project", "summary": "Adani Enterprises Limited has initiated soil testing and geotechnical investigation works for the controversial Bengaluru Twin Tunnel Road. While the contract has not been officially awarded and negotiations continue, the firm obtained permissions for surveys to understand implementation challenges. The project aims to decongest Bengaluru by connecting northern and southern parts via tunnels.", "category": "Infrastructure", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/124037", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/124037"}], "article_id": "bf5a8960"}, {"headline": "BMRCL to install 5,000 advertisement panels across Namma Metro corridors", "summary": "Bangalore Metro Rail Corporation Limited has floated a tender for static and digital advertisement panels on over 5,000 piers and portals. The project covers the Purple, Green, Yellow, Pink, and Blue lines, spanning over 1.04 lakh sq ft of space. The move targets a minimum annual revenue of ₹83.03 crore to boost non-fare box income, which grew 168% over the last year.", "category": "Infrastructure", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/124037", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124037"}], "article_id": "d530aeb7"}, {"headline": "Tea vendor clubbed to death in Bengaluru over 200 rupee debt", "summary": "A tea stall vendor in Dyavasandra village was allegedly murdered by a customer for demanding pending dues of ₹200. The accused, Muniyappa, reportedly assaulted the victim, Manjunath, with a club during a heated argument. The Doddaballapur police have arrested Muniyappa and registered a case of murder.", "category": "India", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/124037", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH -Bangalore -18-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/124037"}], "article_id": "5a44f40e"
