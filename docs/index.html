 for clean and advanced technology.", "category": "Economy", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁷⁰⁵²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125088"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_27-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125062"}], "importance": 9, "article_id": "8e83f21b"}, {"headline": "IndiGo Flight Evacuated in Bengaluru After Smoke Detection", "summary": "An IndiGo A320neo flight from Bengaluru to Chennai was safely evacuated on the taxiway after smoke was detected in the cockpit and cabin. All passengers and crew deplaned unhurt via emergency slides and were moved to the terminal. The DGCA is probing the technical failure, and an alternative aircraft was arranged.", "category": "Infrastructure", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁷⁰⁵²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125088"}, {"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/125114"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125117"}], "importance": 5, "article_id": "3ea5cf89"}, {"headline": "Murder Charges Framed in Assamese Singer Zubeen Garg Case", "summary": "A fast-track court in Guwahati has framed murder charges under Section 302 of the Bharatiya Nyaya Sanhita against four individuals in the Zubeen Garg death case. The Assamese singer's death, initially reported as an accidental boat capsizing, followed new evidence after a year-long investigation. The high-profile trial begins June 8.", "category": "Law", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁷⁰⁵²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125088"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_27-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125062"}], "importance": 7, "article_id": "1d137616"}, {"headline": "Kerala HC Clears ED Probe into CMRL Money Laundering Case", "summary": "The Kerala High Court has cleared the Enforcement Directorate to investigate Cochin Minerals and Rutile Limited (CMRL) in a PMLA money laundering case. The court dismissed pleas to halt the probe into alleged illegal payments, including transactions with Exalogic Solutions, owned by the former CM's daughter. Company officials must cooperate.", "category": "Law", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁷⁰⁵²⁰²⁶.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125088"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 27-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125036"}], "importance": 7, "article_id": "9fcc4e2d"}, {"headline": "Centre Forms Panel to Study India's Demographic Changes", "summary": "The Union Home Ministry has formed a high-level committee, chaired by Prakash Prabhakar Naokar, to study demographic changes across India, especially in border regions. The panel will examine the impact of migration, varied population growth rates, illegal immigration, and internal migration on national security, with a report due in six months.", "category": "India", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁷⁰⁵²⁰²⁶.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125088"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_27-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125062"}], "importance": 8, "article_id": "82443678"}, {"headline": "Taiwan Overtakes India as World's Fifth-Largest Stock Market", "summary": "Taiwan's stock market has overtaken India's, becoming the world's fifth-largest by market capitalization, reaching approximately $4.95 trillion. This surge is driven by the global AI boom, significantly benefiting Taiwan's semiconductor industry, particularly tech giant TSMC, reflecting massive investor interest in AI hardware and technology supply chains.", "category": "Business", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁷⁰⁵²⁰²⁶.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/125088"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_27-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125062"}], "importance": 7, "article_id": "3c61de80"}, {"headline": "Rajat Patidar Powers RCB to IPL Final with Record Knock", "summary": "Rajat Patidar's unbeaten 93 off 33 balls powered Royal Challengers Bengaluru (RCB) to a 92-run victory over Gujarat Titans in IPL Qualifier 1, securing their spot in the final. RCB posted a record playoff total of 254-5, with contributions from Kohli and Pandya. Gujarat was bowled out for 162. RCB will face either Rajasthan Royals or Sunrisers Hyderabad next.", "category": "Sports", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁷⁰⁵²⁰²⁶.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/125088"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 27-05-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/125036"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_27-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125062"}], "importance": 10, "article_id": "d5791014"}, {"headline": "Tata Sons Board Reviews Loss-Making Ventures, Outlines New Strategy", "summary": "The Tata Sons board, including Chairman N. Chandrasekaran and Noel Tata, held a six-hour meeting to review loss-making new ventures like Air India and Tata Digital. Chandrasekaran presented a long-term roadmap and announced plans to invest over $100 billion in emerging sectors like semiconductors, aiming for a turnaround and greater clarity on their $11 billion investment.", "category": "Business", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_27-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125083"}, {"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125114"}], "importance": 9, "article_id": "9653a600"}, {"headline": "India, US, Quad Fortify Critical Minerals Supply Chains", "summary": "India and the U.S. signed a bilateral framework for critical minerals and rare earths, aiming to diversify supply chains and counter China's export controls through cooperation in mining, processing, and recycling. The Quad alliance (India, US, Australia, Japan) further plans to mobilize $20 billion to secure global supply chains for these strategic materials.", "category": "Economy", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_27-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125083"}, {"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125114"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 27-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125036"}], "importance": 10, "article_id": "5d2b4232"}, {"headline": "Airtel's 5G Priority Plans Spark Net Neutrality Debate", "summary": "Bharti Airtel’s 'Priority Postpaid' 5G plans sparked a net neutrality dispute with rivals Jio and Vi, who argue network slicing may disadvantage prepaid users. Airtel defends compliance, citing underutilized capacity and no service degradation. A parliamentary committee has asked DoT and TRAI to study the impact of these plans on net neutrality.", "category": "Technology", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_27-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125083"}, {"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/125114"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125117"}], "importance": 8, "article_id": "1367c236"}, {"headline": "Delhi High Court Halts Forcible Takeover of Gymkhana Club", "summary": "The Union government assured the Delhi High Court it will not forcibly take possession of the 113-year-old Delhi Gymkhana Club on June 5, promising lawful procedures. The court granted interim protection to members challenging the eviction notice for the 27.3-acre premises on Safdarjung Road, noting fears were premature as no eviction had begun.", "category": "Law", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_27-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125083"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/125117"}], "importance": 7, "article_id": "e6fb5b4e"}, {"headline": "SEBI Plans Blockchain Pilot for Corporate Bond Tokenization", "summary": "SEBI is planning a pilot project to tokenize corporate bonds using Distributed Ledger Technology (DLT) to deepen debt markets with faster settlement and transparency. Chairman Tuhin Kanta Pandey stated the regulator will cautiously proceed, also exploring bond ETFs and derivatives to boost retail participation, with the pilot possibly launching in 6-9 months.", "category": "Technology", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_27-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125083"}, {"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125114"}], "importance": 8, "article_id": "386cee97"}, {"headline": "India, Canada Target Early Conclusion of Free Trade Deal", "summary": "India and Canada are fast-tracking Comprehensive Economic Partnership Agreement (CEPA) negotiations, aiming to conclude by November/end-2026. Commerce Minister Piyush Goyal led a business delegation, targeting a trade increase from $8.5 billion to $50 billion by 2030, focusing on energy, mining, technology, and food security to reset economic ties.", "category": "Economy", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_27-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125083"}, {"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125114"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 27-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/125036"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/125117"}], "importance": 8, "article_id": "dad491f3"}, {"headline": "Government to Sell 2% Stake in Coal India for ₹5,000 Cr", "summary": "The government plans to offload up to a 2% stake in state-run Coal India Ltd (CIL) via an Offer for Sale, aiming to raise over ₹5,000 crore. The floor price is set at ₹412 per share. This divestment is part of the FY27 target, with the OFS opening for non-retail investors on May 27 and retail investors on May 29.", "category": "Economy", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_27-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125083"}, {"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125114"}], "importance": 8, "article_id": "bbab822f"}, {"headline": "Severe Heatwave Persists Across North, Central India", "summary": "Severe heatwave conditions are persisting across large parts of North-West and Central India, with temperatures exceeding 45°C in regions like Delhi and Rajasthan. The IMD warns the heatwave will continue for 3-4 days, with relief expected from May 29, as the southwest monsoon's progress has slowed, leading to increased heat-related illnesses.", "category": "Environment", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_27-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125083"}, {"newspaper": "Indian Express", "pdf_filename": "IE-Delhi-May-27-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125029"}], "importance": 7, "article_id": "3b7c8348"}, {"headline": "China Restricts Overseas Travel for Private AI Professionals", "summary": "Beijing has expanded travel restrictions to include top AI professionals at private firms like Alibaba and DeepSeek, requiring government approval for overseas travel. This move aims to safeguard strategic technology and prevent talent loss as China competes with the US in AI, though it risks complicating talent recruitment and retention for Chinese AI firms.", "category": "World", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_27-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125083"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125117"}], "importance": 8, "article_id": "7aef9187"}, {"headline": "ONGC Q4 Profit Up 3% to ₹6,650 Crore, Declares Dividend", "summary": "State-owned ONGC reported a 3% rise in Q4FY26 net profit to ₹6,649.97 crore, driven by higher oil and gas prices despite a dip in output. Revenue rose marginally to ₹35,928.18 crore, offsetting a ₹4,876.75 crore write-off for dry wells. The board also recommended a ₹1 final dividend per share.", "category": "Business", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_27-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125083"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125117"}], "importance": 8, "article_id": "a3ad0e44"}, {"headline": "Adani Green Commissions World's Largest Single-Location BESS", "summary": "Adani Green Energy has commissioned the world's largest single-location Battery Energy Storage System (BESS) at Khavda, Gujarat, scaling capacity to 3.37 GWh. This deployment, the largest outside China, can power nearly 1 million homes daily. The company plans to add 10GWh in FY27, aiming for 50GWh in five years, boosting renewable infrastructure.", "category": "Infrastructure", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_27-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125083"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125117"}], "importance": 8, "article_id": "207b80ed"}, {"headline": "Dish TV Narrows Loss, Zuari Widens in Q4", "summary": "Dish TV India narrowed its Q4 net loss to ₹303.95 crore despite a 29.27% revenue decline to ₹243.07 crore, navigating a challenging market. Conversely, Zuari Industries' consolidated net loss widened to ₹31 crore due to higher tax expenses, though total income marginally rose to ₹299.54 crore.", "category": "Business", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125114"}], "importance": 3, "article_id": "6e5d5824"}, {"headline": "JK Tyre Plans ₹4,980 Cr Expansion After Profit Jump", "summary": "JK Tyre & Industries approved a ₹4,980 crore investment for radical capacity expansion of passenger car and truck/bus radial tires at its Chennai and Mysuru plants by 2030, increasing current capacity by 24%. The company also reported an 81% jump in Q4 net profit to ₹203.14 crore, driven by robust demand and improved economic activity.", "category": "Business", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125114"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125117"}], "importance": 5, "article_id": "62114ad9"}, {"headline": "IRDAI Links Insurer Executive Pay to Customer Service", "summary": "IRDAI has mandated insurers to link CEO and top management remuneration to customer-centric outcomes like claim responsiveness and grievance redressal from FY27. The new guidelines aim to enhance transparency, ensure financial soundness, emphasize policyholder outcomes, and remove \"dark patterns,\" requiring monthly/quarterly disclosure of customer satisfaction metrics.", "category": "Business", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125114"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125117"}], "importance": 7, "article_id": "127d6c3d"}, {"headline": "Cash Logistics Industry Seeks Demand-Led ATM Loading", "summary": "India's cash logistics industry faces sharp cost escalations from rising fuel prices and up to 35% minimum wage hikes. The Currency Cycle Association seeks a demand-led ATM replenishment model and timely pricing realignments with banks to reduce unnecessary cash-van movements, aligning loading with withdrawal patterns to absorb logistics shocks.", "category": "Business", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125114"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125117"}], "importance": 7, "article_id": "2bcc5a84"}, {"headline": "Government Sells IMPCL to Skymap Pharmaceuticals for ₹121 Cr", "summary": "The government has approved the strategic sale of Indian Medicines Pharmaceutical Corporation Ltd (IMPCL) to Skymap Pharmaceuticals for over ₹121 crore. Skymap was the highest bidder for the 100% stake in the Ministry of Ayush's ayurvedic and unani medicine manufacturer, concluding a disinvestment process initiated in 2017.", "category": "Business", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125114"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125117"}], "importance": 5, "article_id": "6631aa0b"}, {"headline": "Nandan Nilekani Backs ₹3,000 Cr AI/Deeptech Fund", "summary": "Fundamentum Partnership co-founder Ashish Kumar launched F2A (Fundamentum Frontier Advisors), a platform backed by Nandan Nilekani, to support AI and deeptech startups. With a total corpus of ₹3,000 crore (including Sebi-approved Fundamentum III, a ₹2,000 crore fund), it will invest in consumer, enterprise, and physical AI startups, aiming to build global tech solutions from India.", "category": "Business", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125114"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125117"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_27-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/125062"}], "importance": 7, "article_id": "7f54aa88"}, {"headline": "SC Dismisses TN Plea on Mekedatu; CM Urges PM Rejection", "summary": "The Supreme Court dismissed Tamil Nadu's review plea against Karnataka's Mekedatu project, deeming it 'premature' as the DPR is under expert review. While Karnataka's Deputy CM welcomed the ruling, Tamil Nadu CM Joseph Vijay wrote to PM Modi urging rejection, citing violation of a 2018 SC judgment on Cauvery water sharing and need for lower riparian state concurrence.", "category": "Politics", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 27~05~2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125114"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 27-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125036"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_27-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125062"}], "importance": 8, "article_id": "d89b5b8d"}, {"headline": "Maruti Suzuki Adopts Austerity Measures Amid West Asia Conflict", "summary": "Maruti Suzuki India has implemented austerity measures, including work-from-home and restricted foreign/domestic travel, to minimize petroleum use and foreign currency expenditure. This responds to PM Modi's call for austerity amidst the West Asia conflict and global energy crisis, aiming to reduce the national economic burden by conducting business efficiently.", "category": "Business", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 27-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/125036"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125117"}], "importance": 6, "article_id": "304c60fc"}, {"headline": "Tata Sons Board Reviews Loss-Making Ventures; Sets 3-Year Roadmap", "summary": "Tata Sons' board, prompted by chairman Noel Tata's concerns, reviewed financial plans for loss-making ventures like Air India, Tata Digital, and Tata Electronics. Chairman N Chandrasekaran unveiled a three-year roadmap to narrow losses through operational efficiency and financial discipline, with future capital expenditure also discussed during the marathon meeting.", "category": "Business", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 27-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125117"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_27-05-2026.pdf", "page": 1,   const cleanHash = hash.startsWith('#article-') ? hash.slice(9) : hash.slice(1);
  const targetArticle = DIGEST.articles.find(art => art.article_id === cleanHash);
  
  if (targetArticle) {
    deepLinkTarget = {article: targetArticle, hash: cleanHash};
  }
}
handleDeepLink();

let catIdx=0,vpW=0,vpH=0;
const panels=[];
const outer=document.getElementById('outer');
const hTrack=document.getElementById('hTrack');
const hintUp=document.getElementById('hintUp');
const hintRight=document.getElementById('hintRight');
const catFlash=document.getElementById('catFlash');
const cfIcon=document.getElementById('cfIcon');
const cfName=document.getElementById('cfName');

function buildAll() {
  vpW=outer.offsetWidth; vpH=outer.offsetHeight;
  hTrack.innerHTML=''; panels.length=0;
  sortedCats.forEach((cat,ci)=>{
    const m=CAT_META[cat]||{color:"#e8334a",icon:"📰"};
    const arts=byCategory[cat];
    const panel=document.createElement('div');
    panel.className='cat-panel';
    panel.id=`cat-panel-${ci}`;
    panel.style.setProperty('--cc',m.color);
    panel.innerHTML=`<div class="progress-row" id="prow-${ci}" style="--cc:${m.color}"></div><div class="v-feed" id="vfeed-${ci}"><div class="v-track" id="vtrack-${ci}"></div></div>`;
    hTrack.appendChild(panel);
    const pRow=panel.querySelector(`#prow-${ci}`);
    const vFeed=panel.querySelector(`#vfeed-${ci}`);
    const vTrack=panel.querySelector(`#vtrack-${ci}`);
    const cardH=vFeed.getBoundingClientRect().height||vpH;
    
    arts.forEach((art,ai)=>{
      const card = buildCard(art, cardH, m, cat, ai);
      card.id = `article-${art.article_id}`;
      card.dataset.articleId = art.article_id;
      vTrack.appendChild(card);
    });
    
    panels.push({pRow,vFeed,vTrack,articles:arts,artIdx:0});
    buildPRow(ci);
  });
  
  hTrack.style.transition='none';
  hTrack.style.transform='translateX(0)';
  syncV(0,false);
  
  // FIXED: Apply deep link after build
  if (deepLinkTarget) {
    setTimeout(() => applyDeepLink(deepLinkTarget), 100);
  }
}

function buildCard(art,h,m,cat,articleIndex) {
  const src=art.sources?.[0];
  const href=src?.pdf_filename?`pdfs/${src.pdf_filename}#page=${src.page}`:(src?.telegram_url||'#');
  const card=document.createElement('div');
  card.className='card';
  card.dataset.articleId = art.article_id;
  card.style.height=h+'px';
  card.style.setProperty('--cc',m.color);
  card.innerHTML=`
    <div class="card-content">
      <div class="card-toprow">
        <div class="cat-pill">
          <div class="pill-icon"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="1" y="1" width="8" height="2" rx="0.6" fill="#888"/><rect x="1" y="4.5" width="5" height="1.5" rx="0.6" fill="#666"/><rect x="1" y="7" width="6" height="1.5" rx="0.6" fill="#666"/></svg></div>
          ${cat.toUpperCase()}
        </div>
        <div class="card-date">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="2.5" width="11" height="9.5" rx="1.8" stroke="#555" stroke-width="1.2"/><path d="M4.5 1v3M8.5 1v3" stroke="#555" stroke-width="1.2" stroke-linecap="round"/><path d="M1 6h11" stroke="#555" stroke-width="1.2"/></svg>
          ${DIGEST.date}
        </div>
      </div>
      <div class="card-headline">${art.headline}</div>
      <div class="card-summary">${art.summary}</div>
      <div class="card-divider"></div>
      <div class="card-footer">
        ${src?`<a class="src-chip" href="${href}" target="_blank" onclick="event.stopPropagation()">${src.newspaper}<span class="src-chip-sep">&middot;</span><span class="src-chip-pg">Pg ${src.page}</span><span class="src-chip-ext"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M3.5 7.5L7.5 3.5M7.5 3.5H5M7.5 3.5V6" stroke="#555" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></span></a>`:'<div></div>'}
        <div class="info-btn"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6.5" stroke="#444" stroke-width="1.3"/><circle cx="7.5" cy="4.5" r="0.8" fill="#555"/><path d="M7.5 7v4" stroke="#555" stroke-width="1.5" stroke-linecap="round"/></svg></div>
      </div>
    </div>`;
  return card;
}

function buildPRow(ci) {
  const p=panels[ci],ai=p.artIdx;
  p.pRow.innerHTML='';
  p.articles.forEach((_,i)=>{
    const seg=document.createElement('div');
    seg.className='pseg'+(i<ai?' done':i===ai?' active':'');
    p.pRow.appendChild(seg);
  });
}

function syncV(ci,animated) {
  const p=panels[ci],h=p.vFeed.getBoundingClientRect().height;
 p.vTrack.style.transition=animated?'transform 0.35s cubic-bezier(0.4,0,0.2,1)':'none';
  p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;
  buildPRow(ci);
}

function applyDeepLink(target) {
  const ci = sortedCats.findIndex(cat =>
    byCategory[cat].some(art => art.article_id === target.hash)
  );
  if (ci === -1) return;
  goCat(ci, false);
  const ai = byCategory[sortedCats[ci]].findIndex(art => art.article_id === target.hash);
  if (ai === -1) return;
  panels[ci].artIdx = ai;
  syncV(ci, false);
  const card = document.getElementById('article-' + target.hash);
  if (card) { card.classList.add('target-highlight'); setTimeout(() => card.classList.remove('target-highlight'), 3000); }
}

function goArt(d) {
  const p=panels[catIdx];
  const n=Math.max(0,Math.min(p.artIdx+d,p.articles.length-1));
  if(n===p.artIdx&&d!==0)return;
  p.artIdx=n; syncV(catIdx,true); dismiss();
}

function goCat(idx,animated=true) {
  idx=Math.max(0,Math.min(idx,sortedCats.length-1));
  if(idx===catIdx&&animated)return;
  const prev=catIdx; catIdx=idx;
  hTrack.style.transition=animated?'transform 0.38s cubic-bezier(0.4,0,0.2,1)':'none';
  hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;
  if(animated&&idx!==prev) {
    const m=CAT_META[sortedCats[idx]]||{color:"#e8334a",icon:"📰"};
    catFlash.style.background=m.color+'18';
    cfIcon.textContent=m.icon; cfName.textContent=sortedCats[idx]; cfName.style.color=m.color;
    catFlash.classList.add('on'); setTimeout(()=>catFlash.classList.remove('on'),500);
  }
  dismiss();
}

let dismissed=false;
function dismiss() {
  if(dismissed)return; dismissed=true;
  hintUp.classList.remove('visible'); hintRight.classList.remove('visible');
  hintUp.classList.add('gone'); hintRight.classList.add('gone');
}

(function initHints() {
  const KEY='dailyBriefHintSeen';
  if(!localStorage.getItem(KEY)) {
    localStorage.setItem(KEY,'1');
    setTimeout(()=>{ if(!dismissed){ hintUp.classList.add('visible'); hintRight.classList.add('visible'); } },2500);
  }
})();

let tsX=0,tsY=0,tcX=0,tcY=0,axis=null,drag=false;
outer.addEventListener('touchstart',e=>{ tsX=e.touches[0].clientX; tsY=e.touches[0].clientY; tcX=0; tcY=0; axis=null; drag=true; hTrack.style.transition='none'; const p=panels[catIdx]; if(p)p.vTrack.style.transition='none'; },{passive:true});
outer.addEventListener('touchmove',e=>{ if(!drag)return; const dx=e.touches[0].clientX-tsX,dy=e.touches[0].clientY-tsY; tcX=dx; tcY=dy; if(!axis&&(Math.abs(dx)>8||Math.abs(dy)>8))axis=Math.abs(dx)>Math.abs(dy)?'h':'v'; if(!axis)return; e.preventDefault(); if(axis==='h'){ const edge=(catIdx===0&&dx>0)||(catIdx===sortedCats.length-1&&dx<0); hTrack.style.transform=`translateX(${-catIdx*vpW+dx*(edge ? 0.14 : 1)}px)`; }else{ const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height; const edge=(p.artIdx===0&&dy>0)||(p.artIdx===p.articles.length-1&&dy<0); p.vTrack.style.transform=`translateY(${-p.artIdx*h+dy*(edge ? 0.14 : 1)}px)`; } },{passive:false});
outer.addEventListener('touchend',()=>{ if(!drag)return; drag=false; if(axis==='h'){ const t=vpW*.2; if(tcX<-t)goCat(catIdx+1); else if(tcX>t)goCat(catIdx-1); else{hTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;} }else if(axis==='v'){ const t=vpH*.2; if(tcY<-t)goArt(1); else if(tcY>t)goArt(-1); else{const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height;p.vTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;} } axis=null; },{passive:true});
document.addEventListener('keydown',e=>{ if(e.key==='ArrowDown'||e.key===' '){e.preventDefault();goArt(1);} if(e.key==='ArrowUp'){e.preventDefault();goArt(-1);} if(e.key==='ArrowRight'){e.preventDefault();goCat(catIdx+1);} if(e.key==='ArrowLeft'){e.preventDefault();goCat(catIdx-1);} });
let wl=false;
outer.addEventListener('wheel',e=>{ e.preventDefault();if(wl)return;wl=true; Math.abs(e.deltaX)>Math.abs(e.deltaY)?goCat(catIdx+(e.deltaX>0?1:-1)):goArt(e.deltaY>0?1:-1); setTimeout(()=>wl=false,500); },{passive:false});
window.addEventListener('resize',()=>{ vpW=outer.offsetWidth;vpH=outer.offsetHeight; hTrack.style.transition='none'; hTrack.style.transform=`translateX(${-catIdx*vpW}px)`; panels.forEach(p=>{ const h=p.vFeed.getBoundingClientRect().height; p.vTrack.querySelectorAll('.card').forEach(c=>c.style.height=h+'px'); p.vTrack.style.transition='none'; p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`; }); });

buildAll();
</script>
</body>
</html>
