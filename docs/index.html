ance": 6, "telegram_url": "https://t.me/c/1877410077/125791", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/125791"}], "article_id": "9abe1474"}, {"headline": "Consumer firm deal sizes shrinking despite more transactions", "summary": "A Grant Thornton report shows consumer/retail M&A deals up in volume but down 63% in value to $1.4 billion (Jan-March). Investors now prefer health-focused, premium wellness brands with clear profitability paths, avoiding early-stage, wild bets, and seeking sustainable unit economics. Top 5 deals accounted for 57% of total value.", "category": "Business", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "9c44c061"}, {"headline": "State Assemblies: Bihar, Gujarat, Andhra Pradesh clear bills fastest", "summary": "A PRS Legislative report for 2025 indicates Bihar, Gujarat, and Andhra Pradesh cleared all bills introduced within a day. Uttar Pradesh, Maharashtra, and West Bengal also show significant rates of quick bill passings among the 10 most populous states. The data reflects varying legislative efficiency across states.", "category": "Politics", "page": 1, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "409f8620"}, {"headline": "India's health profile shifts: child marriage down, C-sections, obesity up", "summary": "NFHS-6 (2022-23) reveals India's health transition: child marriage declined to 20%; C-section deliveries surged to 27% (private facilities driving increase); immunization coverage rose to 83%. Malnutrition persists (35.5% stunted, 19.3% wasted), while obesity (30.7% women, 27.3% men) and diabetes (17.8% women, 20.9% men) rapidly rise among adults aged 15-49.", "category": "Health", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "774e54f2"}, {"headline": "Securities, housing laws likely for monsoon session reforms", "summary": "The Centre plans to overhaul securities markets and housing finance laws in the July-August monsoon session. New Securities Market Code replaces three existing laws. NHB Act amendments will give RBI greater authority over housing finance companies (HFCs), managing over ₹9.5 trillion, consolidating regulatory powers and clarifying NHB's developmental role.", "category": "Law", "page": 3, "importance": 9, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "755bf4b8"}, {"headline": "Indian exporters seek US tariff refunds after Supreme Court ruling", "summary": "Indian exporters, including Ceat and Gokaldas Exports, are scrambling to recover Trump administration tariffs, ruled illegal by the US Supreme Court. Uncertainty persists regarding eligibility, timelines, and a potential federal appeal, complicating the refund process for duties paid between April 2025 and February 2026, when reciprocal tariffs of 50% were imposed.", "category": "Economy", "page": 3, "importance": 9, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "0972b065"}, {"headline": "India's Q4 GDP growth likely slowed to 7.3%, poll shows", "summary": "A Mint poll of 15 economists forecasts India's GDP growth at 7.3% year-on-year for Q4FY26, down from 7.8% in Q3. Despite the slowdown, resilient domestic demand, government spending, and improved agriculture kept the economy on solid footing, projecting 7.6% growth for full-year FY26. Data to be released on 5 June.", "category": "Economy", "page": 3, "importance": 10, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "4d2b2d4b"}, {"headline": "India, US confident of signing first tranche of BTA soon", "summary": "Commerce and industry minister Piyush Goyal expressed confidence that India and the US will finalize the first tranche of a bilateral trade agreement (BTA) soon, with only minor issues remaining. A US delegation is expected for fresh talks from 2-4 June to conclude the pact.", "category": "Economy", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "d7370b5f"}, {"headline": "Rupee drops 34 paise to 95.19 against US dollar", "summary": "The Indian rupee depreciated by 34 paise, closing at 95.19 against the US dollar on Monday. This decline was attributed to renewed US-Iran tensions and a surge in crude oil prices. The rupee had opened at 94.93 and touched an intraday low of 95.03.", "category": "Economy", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "e8d83b98"}, {"headline": "India's power consumption up 11.55% in May amid heatwave", "summary": "India's power consumption increased by 11.55% year-on-year to 164.98 billion units (BU) in May, driven by heatwave conditions boosting demand for cooling appliances. The country's peak power demand also jumped to an all-time record high of 270.82GW last month.", "category": "Infrastructure", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "0d1f6eff"}, {"headline": "India, Myanmar to fast-track trilateral highway project", "summary": "India and Myanmar agreed to accelerate infrastructure projects to strengthen economic ties, including the India-Myanmar-Thailand trilateral highway. This was announced after Prime Minister Narendra Modi hosted Myanmar President Min Aung Hlaing on his first overseas trip since taking office.", "category": "Infrastructure", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "7c1a017f"}, {"headline": "India's industrial output grows 4.9% in April with new base year", "summary": "India's industrial output (IIP) grew 4.9% year-on-year in April, based on the new 2022-23 base year, replacing 2011-12. Manufacturing expanded 6.2%, though mining contracted 5.1%. This first estimate under the revised series reflects the evolving industrial economy and sustained momentum. Economists expect growth to moderate in FY27.", "category": "Economy", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "bde92dea"}, {"headline": "India's fiscal deficit surges to ₹3.62 trillion in April", "summary": "India’s fiscal deficit nearly doubled to ₹3.62 trillion in April, reaching 21.4% of the ₹16.96 trillion budget target for FY27. This surge was primarily driven by a 23.8% decline in revenue receipts, partly from excise duty cuts, and a 23.5% jump in government spending in the first month of the financial year.", "category": "Economy", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "24d464f5"}, {"headline": "Hitachi Energy India targets 30% of data centre market", "summary": "Hitachi Energy India aims to capture 30% of India's data centre spending, up from 10-15%, by offering a broad \"grid-to-rack\" power solution. India's data centre market, valued at $5.55 billion in 2025, is projected to reach $13.11 billion by 2034, driven by digital transformation and AI workloads.", "category": "Technology", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "65dda94e"}, {"headline": "AirTrunk to invest $21 billion in Maharashtra data centre", "summary": "Australia's AirTrunk has signed a letter of intent for land allotment in Maharashtra to build a 3 GW data centre, with an investment of $21.05 billion. The facility will be located in the Raigad Penn Growth Centre, which lies on the outskirts of Mumbai, making it a significant foreign investment.", "category": "Infrastructure", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "b1435826"}, {"headline": "Cyient's $218 million Tao Digital Solutions acquisition highlights mid-tier IT M&As", "summary": "Cyient Ltd's $218 million acquisition of AI-native Tao Digital Solutions, its largest deal, signals a trend of buyouts among India’s mid-sized tech services firms to address growth gaps. The deal is expected to add $80 million to Cyient's revenue and expand its AI capabilities and market access.", "category": "Business", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "244a4768"}, {"headline": "Private deals gaining traction amidst IPO market slowdown", "summary": "Deloitte South Asia president Rohit Berry states that global uncertainty and a soft IPO market are pushing more companies towards private market transactions. Investors are scrutinizing valuations more sharply, leading to fewer deal closures but sustained appetite for private equity and credit, especially as large IPOs are deferred.", "category": "Business", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "170ff894"}, {"headline": "Marengo Asia Healthcare seeks ₹400-500 crore fundraise", "summary": "Marengo Asia Healthcare, backed by Samara Capital and family offices, plans to raise ₹400-500 crore through a 10% stake dilution. LeapFrog Investments, IFC, and NIIF are evaluating the investment, which will fund inorganic growth and capacity expansion in Delhi-NCR and western India, aiming to add 1,000-1,500 beds.", "category": "Business", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "d1d24805"}, {"headline": "Concor attracts buyers despite weak Q4 results, WDFC link key", "summary": "Container Corporation of India Ltd (Concor) is drawing investor interest despite a Q4 net profit dip of 12.4% year-on-year to ₹262.65 crore. Analysts expect the commissioning of the Western Dedicated Freight Corridor (WDFC) link to JNPT, due in June, to accelerate cargo shift from road to rail, boosting future growth and modal share.", "category": "Business", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "0e710eb1"}, {"headline": "Cummins India's growth powered by data centres; valuation concerns arise", "summary": "Cummins India's Q4FY26 revenue rose 23% year-on-year to ₹3,000 crore, driven by robust power generation revenues, particularly from data centres (30-35% of domestic revenue). Despite strong performance and 70% capacity utilization, analysts question its 57x FY27 earnings valuation amidst flat industrial revenue and export concerns.", "category": "Business", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "a9875cf2"}, {"headline": "Rupee depreciation deters FPIs from Indian bond market", "summary": "The rupee's depreciation and narrow yield gap between Indian and US government bonds have made foreign portfolio investors (FPIs) wary of Indian debt. FPIs have been net sellers in general debt routes. Rising oil prices, hedging costs, and global capital becoming more selective further complicate the attractiveness of Indian assets.", "category": "Economy", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "b0c21885"}, {"headline": "Trai unlikely to find Airtel's 5G priority plan violating net neutrality", "summary": "India’s telecom regulator, Trai, is unlikely to deem Bharti Airtel’s new ‘priority’ postpaid plans, based on 5G slicing technology, a breach of net-neutrality norms. Preliminary analysis showed no adverse impact on service quality for non-priority users, but Trai will continue to monitor the service quality, officials said.", "category": "Technology", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "487677fc"}, {"headline": "DMart founder's firm leases Mumbai luxury flat for ₹27.5 lakh/month", "summary": "Derive Trading and Resorts Pvt. Ltd, linked to DMart founder Radhakishan Damani, has leased a 6,831 sq. ft luxury apartment in Mumbai’s Three Sixty West for ₹27.5 lakh per month. The five-year lease, signed on 27 May, involves an annual rent of ₹3.3 crore with yearly escalations, including four car parks.", "category": "Business", "page": 6, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "c87fad96"}, {"headline": "Wockhardt aims for commercial success after FDA nod for Zaynich", "summary": "Wockhardt secured US FDA approval for Zaynich, an antibiotic for complicated UTI, a first for an Indian drug without a foreign partner. After an $800-million R&D bet, Wockhardt plans US launch in 6-8 months, and India launch in five months, expecting peak global sales of $1.5 billion. It's building a new commercial organization.", "category": "Health", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "cbea033c"}, {"headline": "Maruti Suzuki prioritizes CNG vehicles, delays EV production scale-up", "summary": "Maruti Suzuki India will prioritize CNG vehicle production, whose bookings hit a record high, and delay scaling up EV production beyond 2,000 units/month until H2 FY27. This decision comes amidst rising natural gas prices slower than petrol/diesel, and strong rival EV sales. The company cited prior commitments for the delay.", "category": "Business", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "d84efadb"}, {"headline": "Indian auto industry reports strong sales growth in May", "summary": "Indian carmakers, including Maruti Suzuki and Kia India, reported healthy sales growth in May. Maruti Suzuki's domestic sales surged to 193,535 units (up 42%), driven by mini and compact segments, partly due to impending price hikes. Tata Motors and M&M also saw significant increases, despite fuel price concerns.", "category": "Business", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "ab71ca52"}, {"headline": "Trump seeks Arab recognition of Israel, complicating Iran deal", "summary": "President Trump proposes Arab states recognize Israel via Abraham Accords as part of an Iran deal, but the war has made this harder. Gulf states are wary of antagonizing Iran and distrustful of the US/Israel, with Arab populations less inclined to accept deeper ties. Riyadh linked normalization to a Palestinian state pathway, a Qatari official said.", "category": "World", "page": 8, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "716bfd05"}, {"headline": "US bombs Iranian military sites in retaliatory strikes after drone downing", "summary": "The US bombed radar and drone sites in Iran after Tehran shot down an American drone. Iran claimed a strike in response, and Kuwait reported incoming fire. This escalation tests a nominal ceasefire as both sides negotiate an end to the war, impacting global energy supplies via the Strait of Hormuz. The US military confirmed strikes.", "category": "World", "page": 8, "importance": 9, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "8e4c5bcb"}, {"headline": "Chinese luxury market rebounds as stock rally boosts consumer sentiment", "summary": "Chinese consumers are showing a renewed appetite for high-end beauty and fashion, fueled by a stock market rally. Brands like Louis Vuitton and Burberry saw sales growth in Q1, while Gucci narrowed declines. This early rebound, linked to shifting wealth from property to stocks, helps stabilize margins for global luxury brands.", "category": "Economy", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "14ecb8b5"}, {"headline": "Former Fed Chair Powell warns against removing central bank officials", "summary": "Former Federal Reserve Chair Jerome Powell, now a governor, warned against removing Fed officials over policy disagreements, emphasizing the central bank's independence from political pressure. His remarks hint at his reasons for remaining on the board and defending the Fed's structure amidst calls for reform and vigilance against 'model monocultures' risk.", "category": "Politics", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "08406d8d"}, {"headline": "CEPI to provide $60 million for Ebola Bundibugyo vaccine development", "summary": "The Coalition for Epidemic Preparedness Innovations (CEPI) will grant $60 million to Moderna and two other groups to accelerate vaccine development for Ebola Bundibugyo. The virus has caused 282 confirmed cases and 42 deaths in the Democratic Republic of Congo, with no approved vaccines or treatments currently available.", "category": "Health", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "025345dc"}, {"headline": "Centre to sell up to 6% stake in NHPC via OFS", "summary": "The Indian government will sell up to a 6% stake in NHPC Ltd through an Offer for Sale (OFS), comprising a 3% base offer and an option for an additional 3%. The floor price is set at ₹71 per share, implying an 8% discount. This is part of the government's ₹80,000 crore divestment target for FY27.", "category": "Business", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "00e8f731"}, {"headline": "Bombay HC grants HDFC AMC injunction in cyber theft case", "summary": "The Bombay High Court granted a temporary injunction to HDFC Asset Management Co. Ltd (HDFC AMC) against ransomware group \"Morpheus,\" preventing distribution of stolen confidential data. The court also directed the Union government to block and disable accounts related to the stolen data, citing potential irreparable damage.", "category": "Law", "page": 9, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "4518504c"}, {"headline": "Amazon Music introduces three-tiered pricing strategy in India", "summary": "Amazon Music India is launching a three-tiered pricing strategy, including a free ad-supported tier, an ad-inclusive Prime tier, and a premium \"Unlimited\" tier (₹99/month for Prime users, ₹119/month for non-Prime) offering HD audio and offline downloads. This aims to attract more non-Prime users into its fold.", "category": "Technology", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "7f7c0919"}, {"headline": "High-cost lending apps adapt to survive RBI's crackdown", "summary": "Despite RBI's efforts, high-cost lending apps persist by shifting distribution to social media ads, web apps, and direct downloads. Borrowers face annualized rates exceeding 600% and aggressive recovery. The market thrives on high volumes of small-ticket loans (often below ₹10,000), where tough unit economics lead to steep upfront fees and opaque pricing, challenging RBI oversight.", "category": "Economy", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "e9b8dd42"}, {"headline": "Diversification crucial to wealth-building, says investor Devina Mehra", "summary": "Investor Devina Mehra, whose global equity portfolio returned 39% last year, advocates diversification over chasing market winners, citing the 1997 Asian financial crisis. She keeps only 7% equity in India, is underweight on the US, and wary of AI hype, emphasizing asset allocation and risk management for long-term wealth, avoiding real estate.", "category": "Business", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "8d610208"}, {"headline": "AI boom: market both right and wrong, instability risk emerges", "summary": "The US market's high Shiller CAPE ratio (40.8) and record-low consumer sentiment coexist, reflecting AI's benefit for capital (compressing labor costs) versus its threat to workers. Analysis suggests implausible financial arithmetic for hyperscalers and systemic risks from \"model monocultures,\" indicating potential instability for the global economy when the hype fades.", "category": "Technology", "page": 13, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "4f53b006"}, {"headline": "Mira Rajput Kapoor's Dhun Wellness offers urban self-care", "summary": "Mira Rajput Kapoor founded Dhun Wellness in Mumbai, offering week-long programs like gut restoration and sleep management for time-crunched city dwellers. Her research revealed 63% of Mumbai women prioritize sleep over workouts, shaping her holistic approach to wellness, which integrates Ayurvedic and contemporary tech-led therapies in a luxurious setting.", "category": "Health", "page": 14, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "bb093cac"}, {"headline": "ASMR videos offer calm and connection to beat micro stressors", "summary": "ASMR (Autonomous Sensory Meridian Response) videos provide relaxation and stress relief through soft, repetitive sounds and gentle speech. Research supports ASMR's ability to modulate the parasympathetic nervous system, offering bite-sized calm amidst digital chaos, and has become a mainstream phenomenon, even augmented by AI, promoting stillness and slowness.", "category": "Health", "page": 14, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "a3fd071c"}, {"headline": "Naimita Jagasia's self-care journey to manage adenomyosis, PCOS", "summary": "Naimita Jagasia, 31, was diagnosed with advanced adenomyosis and PCOS after years of misdiagnosis. She transformed her health by prioritizing self-care, stabilizing blood sugar, incorporating supplements, and switching to Pilates and walking. Her journey involved addressing inflammation, chronic stress, and changing her relationship with her body and daily routines.", "category": "Health", "page": 14, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125726", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/125726"}], "article_id": "908cda78"}, {"headline": "Investors SIP Down on Slippery Street", "summary": "Retail investor additions to Systematic Investment Plans hit a three-year low in April as market returns prompted a reassessment. SIP stoppages outpaced new registrations, reflecting a slowing trend in new investor additions despite resilient mainstay domestic investments.", "category": "Economy", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/125764", "sources": [{"newspaper": "Economic he Tamil Nadu government to take action against 118 government officials ('babus') for alleged involvement in forest encroachments. The court emphasized the need to protect forest land and ensure accountability.", "category": "Law", "page": 16, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125742", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_02-06-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/125742"}], "article_id": "a8455aca"}, {"headline": "IN-SPACE invites pvt firms for ground stations", "summary": "IN-SPACE has invited private firms to establish ground stations at ISRO's National Remote Sensing Centre (NRSC), promoting private sector involvement in space infrastructure and data utilization. This initiative boosts India's space economy.", "category": "Technology", "page": 16, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125742", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_02-06-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/125742"}], "article_id": "eb1588b3"}, {"headline": "Industrial output slows to 4.9% in revised data series", "summary": "India's industrial output (IIP) grew 4.9% in April 2026, slower than 5.8% last year, under a new base year of 2022-23 (from 2011-12). Mining output declined over 5%, while manufacturing grew 6.2%. The new series broadens coverage, including water supply and waste management, and uses 1,042 products for calculation.", "category": "Economy", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "e0c0f3ba"}, {"headline": "Myanmar President assures India against anti-India elements", "summary": "Visiting Myanmar President Min Aung Hlaing assured PM Modi that his country's territory won't be used by groups threatening Indian security. Modi also urged dialogue between the junta and pro-democracy opposition. The issue of Aung San Suu Kyi's detention was discussed during the broad-spectrum conversations.", "category": "World", "page": 3, "importance": 9, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "bf7519ad"}, {"headline": "Students protest against exam irregularities in Delhi", "summary": "Student organizations protested outside the Education Ministry in Delhi against alleged irregularities in CUET, NEET, and technical issues in CBSE Class 12 results. Protesters, including AISA and KYS, demanded the resignation of Union Education Minister Dharmendra Pradhan and the dissolution of the NTA. 25 students were detained.", "category": "Education", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "a05f1f2e"}, {"headline": "Susan Elias appointed first woman principal of St. Stephen’s", "summary": "Susan Elias became the 14th principal of St. Stephen's College, the first woman to hold the post since 1881. Her appointment faced objections from Delhi University (DU) over UGC regulations. However, the Delhi High Court previously ruled that the college, as a minority institution, could appoint its own principal if qualifications were met.", "category": "Education", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "0c85be2e"}, {"headline": "Delhi Cabinet approves higher compensation for rain-damaged crops", "summary": "Delhi Cabinet approved compensation of ₹75,000 per hectare for nearly 10,000 farmers whose crops were damaged by heavy rain and waterlogging last year. This amount is significantly higher than the previous ₹20,000 per acre, reflecting the rise in agricultural costs over the past 10 years.", "category": "India", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "98472bb9"}, {"headline": "Madhya Pradesh CM urges public suggestions for UCC rollout", "summary": "M.P. Chief Minister Mohan Yadav announced plans to implement a Uniform Civil Code (UCC) soon, launching a website for public suggestions. A high-level panel, headed by retired Supreme Court Justice Ranjana Prasad Desai, is touring the State to gather opinions and will submit a draft Bill along with findings within 60 days.", "category": "Politics", "page": 5, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "842facbb"}, {"headline": "Government can reclaim leased land for public purposes", "summary": "Union Housing and Urban Affairs Minister Manohar Lal stated that the government could take back leased land, even before lease expiry, for any other purpose. This follows the Ministry's request to the Delhi Gymkhana Club to hand over its premises by June 5 for \"strengthening and securing defence infrastructure.\"", "category": "Politics", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "2feef1df"}, {"headline": "Delhi L-G calls for time-bound plan to improve air quality", "summary": "Delhi Lieutenant-Governor Taranjit Singh Sandhu urged a time-bound action plan to improve NCR air quality, identifying road dust, vehicular emissions, biomass burning, and industrial pollution as key sources. He called for expanded mechanical sweeping, road repair, dust control, and accelerating EV adoption before the upcoming winter season.", "category": "Environment", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "b87057d9"}, {"headline": "ED attaches ₹1,000 crore properties in Chhattisgarh liquor scam", "summary": "The Directorate of Enforcement (ED) provisionally attached properties with a market value of over ₹1,000 crore in connection with the alleged liquor scam in Chhattisgarh. The attached properties include a Goa hotel for which ₹110 crore was paid in unaccounted cash. Chaitanya Baghel, son of former CM Bhupesh Baghel, is an accused.", "category": "Law", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "ee93629d"}, {"headline": "Shopkeeper shot dead in Punjab market area", "summary": "A shopkeeper, Gurcharan Singh Gaba, was shot dead on Monday by two unidentified attackers on a motorcycle in Makhu town, Ferozepur, Punjab. The assailants fired multiple rounds before fleeing. Gurcharan was rushed to a nearby hospital but was declared dead shortly after arrival.", "category": "India", "page": 6, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "b0468303"}, {"headline": "Suvendu Adhikari’s Ministry reaches 41 with 35 new MLAs", "summary": "Thirty-five BJP MLAs were sworn in as Ministers in the West Bengal government, increasing Chief Minister Suvendu Adhikari's Ministry strength to 41. The expansion prioritizes geographical, ethnic, and gender considerations, including seven women Ministers and ten from North Bengal.", "category": "Politics", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "2e5297ea"}, {"headline": "High drama on last day of Maharashtra MLC poll nominations", "summary": "High drama was witnessed on the last day of nominations for Maharashtra's Legislative Council elections (17 seats) on June 18. The ruling Mahayuti fielded candidates for all seats, but rebel filings and internal rumblings in both Mahayuti and Maha Vikas Aghadi (opposition) were observed. Deputy CM Eknath Shinde said rebels will be asked to withdraw.", "category": "Politics", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "2b95a09c"}, {"headline": "T.N. CM Joseph Vijay vows corruption-free, secular government", "summary": "Tamil Nadu Chief Minister C. Joseph Vijay declared that the TVK-led government would be \"a government for all\" and would never compromise on secularism, State rights, river water-sharing, or social justice. He promised a corruption-free administration and reaffirmed TVK's opposition to DMK.", "category": "Politics", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "75961f29"}, {"headline": "RJD questions allotment of bungalows to NDA MPs in Patna", "summary": "The Rashtriya Janata Dal (RJD) questioned the \"allotment of ministerial bungalows to several Bihar MPs\" in Patna, alleging rules were violated. The Opposition party also criticized the merger of the Chief Minister’s official residence at 1, Anne Marg with 5, Deshratna Marg, claiming the CM's bungalow is larger than the Prime Minister's residence.", "category": "Politics", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "8f83a009"}, {"headline": "Villagers attacked during anti-illegal mining protest in Rajasthan", "summary": "Villagers protesting against alleged illegal mining in Ajitpura-Kujeta, Rajasthan, were attacked with stones and fired upon by unidentified persons on Monday, leaving at least six injured. The protest had been ongoing for several months. Police deployed additional force and formed teams to identify and arrest those involved in the attack.", "category": "Environment", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "00f203a5"}, {"headline": "Southern Railway to run special trains between Palani and Kerala", "summary": "Southern Railway will operate special trains between Thiruvananthapuram in Kerala and Podanur Junction in Coimbatore, Tamil Nadu, via Palani. Train No. 06079 Thiruvananthapuram North–Podanur Junction Express Special will depart on Wednesdays, and Train No. 06080 will leave Podanur on Thursdays.", "category": "Infrastructure", "page": 7, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "08da8830"}, {"headline": "Andhra Pradesh spent ₹65,887 crore on pensions since July 2024", "summary": "Andhra Pradesh Chief Minister N. Chandrababu Naidu announced that the State government distributed over ₹65,887 crore under the NTR Bharosa pension programme since July 2024, with about ₹32,000 crore spent annually on pensions alone. In June, ₹2,729 crore has been allocated for pensions to 62.34 lakh beneficiaries.", "category": "Economy", "page": 7, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "152d6e08"}, {"headline": "Karnataka Cabinet formation talks postponed to today", "summary": "Discussions for Karnataka's new Cabinet formation have been extended by a day, with senior Congress leaders now expected to meet today after Monday's meeting was postponed. Lobbying for berths has reached a crescendo with a large number of contenders camping in Delhi, awaiting decisions from central leaders.", "category": "Politics", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "8855a8b2"}, {"headline": "Release of abducted Kuki civilians halted amid Naga protests", "summary": "The scheduled release of 14 Kuki civilians held captive by a Naga outfit in Manipur was \"cancelled\" on Monday following protests by a section of Nagas. The Nagas were against the release unless six Nagas, allegedly held hostage by Kuki extremists, were released simultaneously. The hostage crisis followed the killing of three church leaders.", "category": "India", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "459b03ef"}, {"headline": "Kerala HC directs status quo in CMRL-Exalogic pay-off case", "summary": "A Division Bench of the Kerala High Court ordered the Enforcement Directorate (ED) to maintain status quo till Friday in the Cochin Minerals and Rutile Ltd. (CMRL)-Exalogic Solutions pay-off case. CMRL challenged proceedings related to alleged misappropriation of public funds, arguing the ED invoked PMLA without an FIR or complaint.", "category": "Law", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "9335b451"}, {"headline": "Mahbubnagar MLA deposes in phone tapping case", "summary": "Mahbubnagar MLA Yennam Srinivas Reddy deposed before the Special Investigation Team (SIT) probing the alleged phone tapping case in Telangana. Reddy had lodged a complaint alleging his phone was tapped by the Telangana State Level Agency during the previous BRS government's tenure. This was his second appearance before the SIT.", "category": "Law", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "cde88c4a"}, {"headline": "Divisions deepen in Kerala artistes’ group AMMA", "summary": "Internal bickering in the Association of Malayalam Movie Artistes (AMMA) seems to be worsening. Actor Ansiba Hassan, who raised allegations against office-bearers for \"character assassination and communal remarks,\" did not appear before the executive committee, demanding an independent panel. Vice-president Lakshmipriya appeared before police regarding Hassan’s complaint.", "category": "Culture", "page": 7, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "fa3b5ce6"}, {"headline": "Ancient rock formations destroyed for Secunderabad real estate", "summary": "The Society to Save Rocks highlighted the destruction of billions-of-years-old rock formations in Ammuguda, Secunderabad Cantonment, for a real estate project. Despite being defence land, bulldozers and blasting were observed. Local residents say that attempts to encroach the land are not new.", "category": "Environment", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "33a79e1c"}, {"headline": "Explainer: Why do cities get polluted in summer?", "summary": "Delhi and other Indian cities experience summer air pollution driven by PM10 and ozone. Factors include dust storms, construction, road dust, vehicular emissions, and industrial pollution. Heat and sunlight promote ozone formation. Cities need year-round air quality management plans, including forecasting, public health advisories, and emission control, treating both winter and summer with equal seriousness.", "category": "Environment", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "c0e68f34"}, {"headline": "FemTech industry's approach to Polyendocrine Metabolic Ovarian Syndrome", "summary": "The formal renaming of PCOS to Polyendocrine Metabolic Ovarian Syndrome (PMOS) reflects its multisystem nature. India's FemTech industry had already begun treating it as such, offering integrated care. However, these platforms' reliance on affordability, investor confidence, and lack of regulatory safeguards creates vulnerabilities, highlighting the need for broader public healthcare reforms.", "category": "Health", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "f05f7b88"}, {"headline": "Visakhapatnam data centre faces environmental, infrastructure challenges", "summary": "The Google Cloud India AI Hub in Visakhapatnam signifies India's move to owning digital infrastructure. While offering economic gains and direct subsea cable connectivity, it poses challenges: increased dependence on a foreign provider, high power demand (1 GW, 20 million litres/day water), and potential environmental strain in a water-stressed region. India needs to codify environmental safeguards.", "category": "Technology", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "121fcad4"}, {"headline": "Remittances crucial for Indian rupee and external balances", "summary": "India's rupee has depreciated nearly 12% against the U.S. dollar since May 2025, with declining net Foreign Direct Investment (FDI) and net Foreign Portfolio Investment (FPI) flows. However, remittances ($138 billion in 2024) consistently finance most of India's trade deficit and are more stable than FDI/FPI, but their importance is often underestimated in economic discussions.", "category": "Economy", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "8d9f7a9f"}, {"headline": "Meghalaya, Nagaland CMs call for release of Manipur hostages", "summary": "Meghalaya CM Conrad K. Sangma and Nagaland CM Neiphiu Rio appealed for the early release of 20 civilians (14 Kukis, 6 Nagas) held hostage in Manipur after three church leaders were killed. Sangma wrote to UNC and KIM, urging humanitarian action. Rio sought Home Minister Amit Shah’s intervention, expressing Naga concerns over the abductions.", "category": "India", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "a4cdd83c"}, {"headline": "BSF, Bangladesh border force to hold talks next week", "summary": "The first biannual Director-General-level talks between India's Border Security Force (BSF) and Bangladesh's Border Guards Bangladesh (BGB) are expected in Delhi from June 8-11. Discussions will cover trans-border crimes, assaults on BSF personnel, construction of single-row fencing, and action against Indian Insurgent Groups operating in Bangladesh.", "category": "India", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "f5411421"}, {"headline": "Air Marshal Tarun Chaudhry assumes Central Air Command leadership", "summary": "Air Marshal Tarun Chaudhry assumed charge as the Air Officer Commanding-in-Chief (AOC-in-C) of the Indian Air Force’s Central Air Command on Monday. Commissioned in December 1989, Air Marshal Chaudhry is a highly accomplished officer with extensive experience in operational, staff, and diplomatic assignments.", "category": "Politics", "page": 10, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "97f070a1"}, {"headline": "Telangana CM to discuss governance at The Hindu Huddle", "summary": "Telangana Chief Minister Revanth Reddy will converse with N. Ram, Director, The Hindu Group, at a \"Huddle\" session on June 6. He will share views on governance, development, welfare delivery, the Congress government's achievements since 2023, industrial policies, fiscal crisis, and social justice initiatives, including free bus travel for women and housing schemes.", "category": "Politics", "page": 11, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "2f645c04"}, {"headline": "Congress slams CBSE over evaluation flaws, demands Pradhan's resignation", "summary": "Congress intensified its attack on the Modi government over CBSE's On-Screen Marking (OSM) system flaws, demanding Union Education Minister Dharmendra Pradhan's resignation. Rahul Gandhi criticized the \"financialisation\" of education and cost of re-evaluation. Pawan Khera alleged the CBSE ignored warnings from teachers and experts about 36 major flaws in the digital evaluation system.", "category": "Education", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "a0f2dd27"}, {"headline": "Parliamentary panel bars doctors' body from NEET meet", "summary": "The United Doctors’ Front (UDF) was barred from deposing before the Parliamentary Standing Committee on Education regarding NEET-UG and NTA functioning, after protests from BJP MPs. BJP members argued the UDF's position on NTA dissolution was well known and they were not neutral witnesses. UDF demands NTA's dissolution and creation of a new, accountable body.", "category": "Education", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "75c46bb0"}, {"headline": "Sonam Wangchuk alleges Centre backtracking on Ladakh draft", "summary": "Members of the Ladakh civil society alleged the Centre is backtracking from its promise made on May 22 on \"granting supreme powers to elected representatives over bureaucracy\" in the Union Territory. Climate activist Sonam Wangchuk claimed the draft shared by the Home Ministry was \"watered down\" and did not reflect what was agreed upon.", "category": "Politics", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "42873c85"}, {"headline": "Gujarat cyberfraud bust: 638 arrested in Operation Mule Hunt", "summary": "In one of Gujarat’s largest crackdowns on cybercrime-linked financial networks, State police uncovered cyberfraud worth ₹2,289 crore and took action against 913 mule bank accounts during \"Operation Mule Hunt 1.0.\" The operation led to the registration of 565 FIRs and the arrest of 638 accused.", "category": "Law", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "873e1a5f"}, {"headline": "Centre, ISRO partner for water research initiatives", "summary": "The Ministry of Jal Shakti and ISRO signed a memorandum of understanding (MoU) to strengthen the use of satellite technology and space-based applications for water resource management in India. They will collaborate in 24 key research areas, including reservoir monitoring, water-spread assessment, river-flow analysis, and satellite-based water quality assessment.", "category": "Science", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "cf86a78b"}, {"headline": "Supreme Court seeks Centre's response on disability rights gaps", "summary": "The Supreme Court sought the Centre’s response on a public interest litigation (PIL) alleging that widespread non-compliance with the recommendations of disability commissions was reducing disability rights to “illusory promises.” The plea seeks the top court’s intervention to address “existing gaps” in the “oversight bodies” and ensure “meaningful” protection of disability rights across India.", "category": "Law", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "fd6eda26"}, {"headline": "Ethical AI use in culture to be BRICS focus", "summary": "The ethical use of artificial intelligence in the cultural space will be one of the focus areas for discussion during the BRICS culture working group meetings beginning Thursday. Creative economy, culture climate and sustainable development, and cultural and creative industries are some of the other areas of deliberation. Varanasi is set to host the second CWG meeting.", "category": "Culture", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "7c5cc0d1"}, {"headline": "Suzlon Energy shares fall 6% after SEBI penalty", "summary": "Suzlon Energy Ltd shares tanked almost 6% after market regulator SEBI imposed a fine of ₹28.6 crore on the company and its top brass. SEBI alleged the company inflated its net worth through circular transactions and misled investors, which allowed it to raise equity share capital and avail loan restructuring from banks.", "category": "Business", "page": 13, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "e048b0de"}, {"headline": "NMDC’s May iron ore output up 20%, sales decline", "summary": "State-owned miner NMDC’s iron ore production in May rose almost 20% year on year to 5.31 million tonne, while sales declined to 4.04 MT (from 4.34 MT in the previous year). For April, NMDC had reported a 16% increase in production to 4.64 MT. In FY26, it achieved a record 53.15 MT output.", "category": "Business", "page": 13, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "c7f34430"}, {"headline": "Government cuts urea, DAP requirements amid El Nino threat", "summary": "Amid expectations of lowered monsoon with looming threats about an El Nino, the Department of Agriculture and Family Welfare cut back on requirement for both urea and diammonium phosphate (DAP). The Department cut down on requirement of urea for the Kharif season this year from 194.04 lakh metric tonne (LMT) to 190.32 LMT and DAP from 59.17 LMT to 56.23 LMT.", "category": "Economy", "page": 13, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "fb049e45"}, {"headline": "Maruti, Tata lead passenger vehicle wholesales in May", "summary": "Auto wholesales gained momentum with many OEMs reporting record sales in May. The Passenger Vehicles (PV) industry is estimated to have sold 4.4 lakh units. PV market leader Maruti Suzuki India Ltd. reported total wholesales of 2,42,688 units, up 35% year-on-year. Tata Motors Passenger Vehicles Ltd. reported domestic wholesales of 59,090 units, up 42% YoY.", "category": "Business", "page": 13, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "8d1432c1"}, {"headline": "India, U.K. to discuss steel, CBAM in trade pact talks", "summary": "India and the U.K. will discuss Britain's steel safeguard measure and carbon border adjustment mechanism (CBAM) this week, as these issues have become a sticking point in the implementation of the bilateral free trade pact. U.K. Minister of State for Trade Policy Chris Bryant will hold a bilateral meeting with Commerce and Industry Minister Piyush Goyal.", "category": "Economy", "page": 13, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "2a173df2"}, {"headline": "India achieves fiscal deficit target for 2025-26", "summary": "The Union government has achieved its fiscal deficit target of 4.4% of the GDP for the year 2025-26, according to the data released by the Controller General of Accounts on Monday.", "category": "Economy", "page": 13, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "6fcfc52c"}, {"headline": "West Asia war's broader economic impact to be felt soon", "summary": "The economic impact of the West Asia conflict will be felt more strongly in India over the next few quarters, according to Vineet Agarwal, MD, Transport Corporation of India Ltd. He foresees a shift from road to rail freight due to rising fuel costs and disruptions in gas-dependent industries, affecting production levels and cargo volumes.", "category": "Economy", "page": 13, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "c672dad6"}, {"headline": "Iran halts U.S. talks over Israel’s Lebanon strikes", "summary": "Iran suspended exchanges with the U.S. over a preliminary agreement aimed at ending the war, citing Israel’s escalating military strikes in Lebanon. Iran’s Foreign Minister Abbas Araghchi and Parliament Speaker Mohammad Bagher Ghalibaf warned of consequences for these ceasefire violations. U.S. President Donald Trump later claimed both sides agreed to stop attacking.", "category": "World", "page": 14, "importance": 9, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "58c7e3a6"}, {"headline": "Pro-Trump nominee leads Colombia presidential first round", "summary": "Abelardo de la Espriella, a supporter of U.S. President Donald Trump, pulled ahead in Colombia’s race for the presidency in the first round of elections, winning nearly 44% of the vote. He surpassed progressive senator Iván Cepeda, who won less than 41%. The two are slated to continue on to a run-off election on June 21.", "category": "World", "page": 14, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "2eaa478a"}, {"headline": "U.K. blocks U.S. commentators' visit over controversial views", "summary": "Two left-wing U.S. political commentators, Cenk Uygur and Hasan Piker, have been barred from entering the U.K. for speaking engagements. The U.K. Home Office confirmed their travel permits were cancelled because their presence would \"not be conducive to the public good,\" citing past controversial comments on 9/11, Hamas, and derogatory language towards Orthodox Jews.", "category": "World", "page": 14, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "70169ae5"}, {"headline": "NYC Mayor Mamdani skips 'Israel Day' parade", "summary": "New York City Mayor Zohran Mamdani did not attend an annual parade honoring Israel on Sunday, breaking with a decades-long political custom. His absence is linked to his support of Palestinian rights and has given fresh fuel to opponents who view his criticism of the Israeli government as antisemitic.", "category": "World", "page": 14, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "2f27d395"}, {"headline": "Patidar praises Sooryavanshi for dominating top bowlers", "summary": "RCB captain Rajat Patidar praised teammate Vaibhav Sooryavanshi as the standout player of IPL 2026, noting the teenager \"dominated every top bowler\" with his shots. Patidar highlighted Sooryavanshi's amazing performance and youth, emphasizing his significant contribution to the team's success.", "category": "Sports", "page": 15, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "dbf9d271"}, {"headline": "Solanki: 180 runs would have challenged in IPL final", "summary": "GT Director of Cricket Vikram Solanki believes 180 runs would have been a challenging total for Gujarat Titans in the IPL final against RCB, suggesting a \"slight miscalculation\" of the pitch's nature. He stated he didn't think it was a 200-plus pitch, implying a lower target might have been more defensible.", "category": "Sports", "page": 15, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "01def82f"}, {"headline": "Krunal Pandya: Winning trophies is biggest motivation", "summary": "RCB all-rounder Krunal Pandya shared his joy after winning his fifth IPL title, stating that \"Winning trophies has always been my biggest motivation in cricket because there’s no feeling quite like lifting a championship.\" He emphasized that while individual performances and wins bring happiness, winning a tournament is something truly special.", "category": "Sports", "page": 15, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "5a27d134"}, {"headline": "RCB’s Tim David suspended for IPL 2027 opener", "summary": "RCB’s Tim David has been fined 50% of his match fee for breaching Level 1 of IPL’s Code of Conduct during the final against GT. He has now accumulated five demerit points, which result in a one-game suspension. He will be suspended for RCB’s first game of the next season or the first game of the franchise he represents in IPL 2027.", "category": "Sports", "page": 15, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "211c12df"}, {"headline": "RCB wins IPL 2026 due to squad depth, clear roles", "summary": "Royal Challengers Bengaluru secured back-to-back IPL titles, transforming into a powerhouse due to squad depth and clarity of roles. Captain Rajat Patidar led calmly, while Virat Kohli remained the highest run-scorer with infectious energy. Teenager Vaibhav Sooryavanshi's confident hitting also stood out, emphasizing collective excellence over star power.", "category": "Sports", "page": 15, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "e29b502b"}, {"headline": "Patidar eyes hat-trick after \"best birthday gift\" IPL win", "summary": "RCB captain Rajat Patidar celebrated his 33rd birthday with back-to-back IPL titles, calling it the \"best gift.\" He confirmed the team's focus will now shift to achieving a hat-trick of trophies. Patidar also spoke about working on his batting and drawing inspiration from former captain Faf du Plessis for leadership qualities.", "category": "Sports", "page": 15, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "92e53a09"}, {"headline": "Andy Flower redefined RCB's legacy from despair to triumph", "summary": "RCB head coach Andy Flower transformed the team from a difficult IPL 2024 start (7 losses in 8 games) to back-to-back titles. He credited the tough phase for providing clarity and shaping RCB into a formidable presence, enabling strategic improvements. Flower praised Virat Kohli's inspiring hunger and drive for setting high team standards.", "category": "Sports", "page": 15, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "5f8affca"}, {"headline": "ICC Board suspends Cricket Canada over membership breaches", "summary": "The ICC Board suspended Cricket Canada with immediate effect due to \"serious breaches of its membership obligations\" after the conclusion of its Board meetings in Ahmedabad. Canadian national representative teams will continue to be eligible for ICC events. Cricket Canada will access ICC funding through a controlled mechanism for approved national team programmes.", "category": "Sports", "page": 16, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "96c4004d"}, {"headline": "Divyanshi Bhowmick youngest Indian to win WTT Feeder title", "summary": "Fifteen-year-old Divyanshi Bhowmick became the youngest Indian to win a WTT Feeder women’s singles title at Prishtina in Kosovo. The World No. 211 Divyanshi stunned Chinese Taipei’s Yeh Yi-Tian in a thrilling final. She is also the second-youngest player in the world, after Japan’s Miwa Harimoto, to capture a WTT Feeder women’s crown. Divyanshi also clinched the women’s doubles title.", "category": "Sports", "page": 16, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "fd795105"}, {"headline": "Former England midfielder James Milner retires from football", "summary": "Former England midfielder James Milner announced his retirement from football at the age of 40 after a 24-year Premier League career. Milner, who spent the past three seasons at Brighton, won three Premier League titles—two with Manchester City and one with Liverpool. He also helped Liverpool win the Champions League in 2019.", "category": "Sports", "page": 16, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "b0fa35f8"}, {"headline": "Nepal’s Kushal Bhurtel hits six sixes in T20I over", "summary": "Nepal’s Kushal Bhurtel became the sixth player to smash six sixes in an over in a T20I match. Bhurtel achieved the feat against China during the Asian Games Qualifier opener in Singapore. He dispatched left-arm spinner Chen Zhuo Yue over the boundary six times off six consecutive deliveries.", "category": "Sports", "page": 16, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "b4bd4361"}, {"headline": "Shai Hope to lead West Indies in ODI series against Sri Lanka", "summary": "West Indies has announced a 15-member squad for its upcoming ODI series against Sri Lanka from June 3 to 8. Shai Hope will continue to lead the side, which includes players such as Ackeem Auguste, John Campbell, Keacy Carty, Roston Chase, and Alzarri Joseph.", "category": "Sports", "page": 16, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "e9d552f4"}, {"headline": "Dhruv Singh scores century in Lala Raghubir Singh tournament", "summary": "Dhruv Singh starred with an unbeaten 111 as Bal Bhavan Dwarka marched to the final of the Lala Raghubir Singh hot weather cricket tournament after defeating Rann Star CC by 171 runs at Modern School on Monday.", "category": "Sports", "page": 16, "importance": 1, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "e48906e4"}, {"headline": "Synthetic biology brings power and peril, says K. VijayRaghavan", "summary": "Humans are learning to 'write new versions of life' through synthetic biology, understanding DNA and genomes. This progress offers extraordinary insights into life's history and potential for engineered cells/organisms, creating chemicals, drugs, and even new life forms. However, it poses a \"genie conundrum\": immense power that needs wise regulation to prevent unforeseen problems.", "category": "Science", "page": 18, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "493a9e1b"}, {"headline": "Tylosaurus rex, the T. rex of the sea, identified as distinct species", "summary": "Scientists identified Tylosaurus rex, a fearsome marine reptile, as a distinct species, rivalling Tyrannosaurus rex in size and ferocity during the Cretaceous Period. The \"T. rex of the sea\" prowled an inland sea that split North America, characterized by fine serrations on its teeth, powerful jaws, and certain anatomical nuances, growing up to 13.2m long.", "category": "Science", "page": 18, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125710", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/125710"}], "article_id": "78d250c7"}, {"headline": "Iran and US exchange strikes; Kuwait condemns aggression as diplomacy falters", "summary": "Iran and the US reported military strikes against each other, both accusing aggression, as diplomatic efforts to end three months of war falter. The US targeted Iranian air defenses and drones, while Iran's IRGC claimed to hit a US-used air base. Kuwait activated air defenses, denouncing Iranian attacks as undermining regional peace, while oil prices rose 3%.", "category": "World", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125760"}], "importance": 10, "article_id": "ff1ebdb5"}, {"headline": "Wipro to acquire additional 20% stake in Aggne Global", "summary": "Wipro announced it will acquire an additional 20% stake in insurance technology specialist Aggne Global Inc for $28.5 million, increasing its shareholding to 80%. The transaction is expected to close by June 5, carried out through its subsidiary Wipro IT Services, LLC.", "category": "Technology", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125760"}, {"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_02-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125764"}], "importance": 6, "article_id": "aef38878"}, {"headline": "Simple Energy raises ₹250 crore in Series B funding", "summary": "IPO-bound two-wheeler maker Simple Energy secured ₹250 crore in Series B funding (debt and equity) to scale production and expand capacity. The round was led by Arokiaswamy Velumani's family office, with participation from founder Suhas Rajkumar, CFO Ankit Gupta, HDFC Bank, and Capitar Ventures.", "category": "Business", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125760"}, {"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125726"}], "importance": 4, "article_id": "e8b97b54"}, {"headline": "India's factory output grows 4.9% in April despite challenges", "summary": "India's factory output, measured by the new Index of Industrial Production (IIP) with base year 2022-23, grew 4.9% in April. This is higher than 3.2% in March, driven by stronger manufacturing (6.2%) and electricity production (4.9%). Experts warn of rising costs from the West Asia conflict, which could subdue industrial production ahead.", "category": "Economy", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125760"}, {"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/125791"}], "importance": 7, "article_id": "7648c1ef"}, {"headline": "GST collections exceed ₹1.94 lakh crore in May from strong consumption", "summary": "Gross Goods and Services Tax (GST) collections in May rose 3.2% to over ₹1.94 lakh crore. Excluding a one-time telecom payment, revenue grew 9%, driven by broad-based growth across goods (26.9% taxable supply) and services (22.2% taxable supply) sectors. Experts call for structural changes to GST, particularly regarding inverted duty structures and refund processes.", "category": "Economy", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125760"}, {"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/125791"}, {"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125726"}, {"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_02-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125764"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/125710"}], "importance": 8, "article_id": "c79da505"}, {"headline": "India's Manufacturing PMI reaches 55 in May, three-month high", "summary": "India's Manufacturing Purchasing Manager’s Index (PMI) rose to a three-month high of 55 in May (April: 54.7), driven by domestic demand strength, infrastructure projects, and new business gains. Output growth accelerated, and job creation increased. However, cost burdens remained high due to the West Asia conflict, potentially squeezing manufacturers' margins.", "category": "Economy", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125760"}, {"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/125791"}, {"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125726"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/125710"}], "importance": 6, "article_id": "93f65ab8"}, {"headline": "India and Myanmar to deepen cooperation in critical minerals, rare earths", "summary": "India and Myanmar agreed to maintain close engagement on critical minerals and rare earths during Myanmar President U Min Aung Hlaing's visit to New Delhi. Both nations aim to take bilateral cooperation forward in these strategic sectors. Foreign Secretary Vikram Misri also highlighted India's focus on defense collaboration through training and capacity building for Myanmar troops.", "category": "World", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125760"}, {"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125791"}],
