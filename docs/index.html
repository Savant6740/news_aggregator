Sukhbir Singh Badal Over 2015 Behbal Kalan Firing Case", "summary": "The Special Investigation Team (SIT) has summoned Shiromani Akali Dal (SAD) president Sukhbir Singh Badal for questioning on July 20 regarding the 2015 Behbal Kalan police firing. The case involves the killing of two protesters following Guru Granth Sahib sacrilege incidents. Badal has accused the AAP government of \"enacting a drama\" for electoral gains while stating he would cooperate.", "category": "Law", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁷⁰⁷²⁰²⁶.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/130777"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/130693"}], "importance": 6, "article_id": "4f2d32c8"}, {"headline": "Worker Killed in Concrete Ceiling Collapse at Silkyara Tunnel Construction Site", "summary": "A 22-year-old worker from Jharkhand, Naresh Ganjhu, was killed after a concrete ceiling portion collapsed inside the Silkyara-Barkot tunnel in Uttarakhand. The accident occurred 900 metres from the Barkot end, raising fresh safety concerns at the project site that saw a major collapse in 2023. Fellow workers halted operations to protest, demanding better safety and compensation.", "category": "India", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁷⁰⁷²⁰²⁶.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130777"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/130693"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130764"}], "importance": 6, "article_id": "c557a13c"}, {"headline": "Border Infrastructure as Critical as Advanced Weaponry, Says Rajnath Singh", "summary": "Defence Minister Rajnath Singh, addressing a BRO conclave, stated that robust border infrastructure like roads and tunnels is critical to national security and the outcome of modern conflicts. Reaffirming the government's commitment to strategic projects, he praised the BRO for using niche technologies to strengthen India's reach by 2047, calling road builders guardians of security.", "category": "Infrastructure", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁷⁰⁷²⁰²⁶.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130777"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/130789"}], "importance": 7, "article_id": "70549cc1"}, {"headline": "Amit Shah Reviews Border Security in Bengal and Meets Gujarat Leadership", "summary": "Union Home Minister Amit Shah conducted high-level reviews during visits to West Bengal and Gujarat. In Bengal, he began a three-day visit to discuss border security with BSF officials and political strategies with state leaders. In Gujarat, after attending the 149th Rath Yatra in Ahmedabad, Shah met CM Bhupendra Patel and party leadership to review organizational activities.", "category": "Politics", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁷⁰⁷²⁰²⁶.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130777"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130693"}], "importance": 6, "article_id": "e44a3bb4"}, {"headline": "Supreme Court Orders States to Frame Early Release Policy for Terminally Ill", "summary": "The Supreme Court has directed all states and Union Territories to formulate a uniform, transparent policy for the premature release of aged and terminally ill prisoners within three months. Citing the right to dignity and humanitarian grounds, the Bench emphasized a \"humane and time-bound mechanism\" for remission, involving medical boards to certify cases of advanced vulnerability.", "category": "Law", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁷⁰⁷²⁰²⁶.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/130777"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 19, "telegram_url": "https://t.me/c/1877410077/130693"}], "importance": 7, "article_id": "694ad7c6"}, {"headline": "Hundreds of Rohingya Refugees Feared Dead After Boats Capsize in Bay", "summary": "At least 530 Rohingya refugees—and potentially up to 900—are feared dead after two overcrowded boats capsized in the Bay of Bengal during monsoon rains. The vessels, which left Myanmar’s Rakhine state in late June for Southeast Asia, lost contact in dangerous conditions. The UN reports it as one of the deadliest maritime incidents for the persecuted minority this year.", "category": "World", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁷⁰⁷²⁰²⁶.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/130777"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130789"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 32, "telegram_url": "https://t.me/c/1877410077/130764"}], "importance": 9, "article_id": "08f9e01e"}, {"headline": "Government Relaxes Fuel Efficiency Targets in New Draft CAFE III Policy", "summary": "The Centre has softened Corporate Average Fuel Efficiency (CAFE) III targets for carmakers by 7-10% in its latest draft policy. The new norms allow manufacturers to purchase credits from the regulator to meet targets while maintaining a supercredit multiplier of 3 for electric vehicles. The policy also introduces carbon-neutrality factors for biofuels and extends transition deadlines.", "category": "Economy", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁷⁰⁷²⁰²⁶.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/130777"}, {"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/130732"}], "importance": 8, "article_id": "fd06c59b"}, {"headline": "Tech Mahindra Outshines Wipro With Strong Profit Growth in First Quarter", "summary": "Tech Mahindra reported a strong first quarter with net profit jumping up to 31.6% to ₹1,486 crore, bolstered by $1,078 million in new deals. Conversely, Wipro faced its weakest Q1 in three years, with revenue falling 1.4% and net profit dropping 4.7% to ₹3,352 crore. While Tech Mahindra saw broad-based growth, Wipro's operating margins slipped to a 15-quarter low of 14.4%.", "category": "Business", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁷⁰⁷²⁰²⁶.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/130777"}, {"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/130732"}, {"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130739"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/130693"}], "importance": 9, "article_id": "e3fc7ed1"}, {"headline": "Serum Institute Partners With Gates MRI to Manufacture New TB Vaccine", "summary": "The Serum Institute of India (SII) has partnered with the Bill & Melinda Gates Medical Research Institute to manufacture the M72/AS01E tuberculosis vaccine candidate. Currently in Phase III clinical trials, the vaccine could benefit millions globally. SII will invest over $100 million in manufacturing capacity to supply high-burden, low-income countries at affordable prices.", "category": "Health", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁷⁰⁷²⁰²⁶.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/130777"}, {"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/130739"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130789"}], "importance": 8, "article_id": "b51db803"}, {"headline": "Maruti Suzuki Challenges Court Order to Replace Vehicle Over E20 Fuel", "summary": "Maruti Suzuki is contesting a Raipur consumer court order directing the replacement of a Grand Vitara with a new E20-compatible model. The customer alleged recurring engine issues linked to E20 fuel, but Maruti maintains the vehicle was already E20-compatible per the manual. The company argues the damage resulted from external fuel contamination rather than a manufacturing defect.", "category": "Law", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁷⁰⁷²⁰²⁶.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/130777"}, {"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130739"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130789"}], "importance": 5, "article_id": "b644ac12"}, {"headline": "Jio Financial Services Net Profit Zooms 156% to ₹830 Crore in Q1", "summary": "Jio Financial Services reported a consolidated net profit of ₹830 crore for the June quarter, a 156% increase from ₹324 crore a year ago. Growth was driven by strong digital lending, insurance broking, and asset management, with interest income rising 165% to ₹962 crore. The Reliance-backed firm's assets under management reached ₹11,665 crore as it scales through the Jio ecosystem.", "category": "Business", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁷⁰⁷²⁰²⁶.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/130777"}, {"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/130732"}, {"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130739"}], "importance": 8, "article_id": "f606876b"}, {"headline": "Argentina and Spain Set for World Cup Final Clash in New Jersey", "summary": "The FIFA World Cup final in New Jersey will feature a multi-generational showdown between Lionel Messi (39) and Spain's 19-year-old star Lamine Yamal. Defending champions Argentina reached the final after a 2-1 comeback win against England, while Spain returns for the first time in 16 years. Messi aims for a second consecutive title to cement his legacy as a two-time world winner.", "category": "Sports", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁷⁰⁷²⁰²⁶.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/130777"}, {"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/130732"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 22, "telegram_url": "https://t.me/c/1877410077/130693"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/130764"}], "importance": 10, "article_id": "2700973f"}, {"headline": "England Pacers Restrict India to 233 Despite Fifties From Kohli and Iyer", "summary": "In the second ODI at Cardiff, England's pace attack dismantled India's batting lineup, bowling them out for 233. Gus Atkinson took three wickets as India's top three collapsed early. Virat Kohli (65) and Shreyas Iyer (66) provided the only major resistance for the visitors on a warm afternoon at Sophia Gardens, leaving India with a difficult total to defend.", "category": "Sports", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁷⁰⁷²⁰²⁶.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/130777"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 23, "telegram_url": "https://t.me/c/1877410077/130693"}], "importance": 8, "article_id": "d3d27884"}, {"headline": "PV Sindhu Upsets World No. 5 Han Yue to Reach Japan Open Quarters", "summary": "India's PV Sindhu secured a dominant 21-16, 21-14 victory over World No. 5 Han Yue to storm into the quarterfinals of the Japan Open Super 750. Sindhu showcased top form to overcome the Chinese second seed in just 35 minutes and will next face Japan's Nozomi Okuhara. Meanwhile, the Indian mixed doubles pair of Tanisha Crasto and Dhruv Kapila were eliminated by the top seeds.", "category": "Sports", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁷⁰⁷²⁰²⁶.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/130777"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 23, "telegram_url": "https://t.me/c/1877410077/130693"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130764"}], "importance": 7, "article_id": "176e5146"}, {"headline": "Sports Ministry Orders IOA Probe Into Hockey India Sexual Harassment Claims", "summary": "The Union Sports Ministry has directed the Indian Olympic Association (IOA) to form a neutral committee to investigate allegations of sexual harassment and intimidation within Hockey India. The move follows formal complaints by former captain Asunta Lakra against secretary general Bholanath Singh. Hockey India President Dilip Tirkey requested the independent probe to ensure impartiality.", "category": "Sports", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁷⁰⁷²⁰²⁶.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/130777"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 23, "telegram_url": "https://t.me/c/1877410077/130693"}], "importance": 6, "article_id": "873be3af"}, {"headline": "BRICS Nations Sign Pact to Collaborate on Global Product Standardization", "summary": "National standards bodies from BRICS nations, including India, China, and Russia, signed a memorandum of understanding in Bengaluru to enhance cooperation in standardization. Hosted by the Bureau of Indian Standards, the pact aims to reduce technical trade barriers and coordinate at international bodies. The move is seen as a step toward challenging Western dominance in global standards.", "category": "Economy", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130732"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/130764"}], "importance": 8, "article_id": "f7ca151a"}, {"headline": "Government Hikes Windfall Tax on Diesel and Aviation Fuel Export", "summary": "The Indian government has increased windfall taxes on exports of diesel and aviation turbine fuel (ATF) effective July 16. The duty on diesel rose to ₹15.5 per litre from ₹8.5, while the ATF duty increased to ₹14.5 per litre from ₹7.5. Conversely, the export duty on petrol was reduced to ₹2.5 per litre. The changes aim to capture supernormal profits amid surging global oil prices.", "category": "Economy", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130732"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/130789"}], "importance": 8, "article_id": "1f8e2e43"}, {"headline": "Skyroot Aerospace Set to Launch India’s First Private Orbital Rocket Saturday", "summary": "Hyderabad-based Skyroot Aerospace is scheduled to conduct the \"Aagamaan\" mission from Sriharikota on Saturday, launching Vikram-1, India’s first fully privately developed orbital-class rocket. The seven-storey rocket, featuring all-carbon composite structures and 3D-printed engines, targets a 450 km orbit to deploy multiple micro-satellites, marking a milestone for India's space sector.", "category": "Science", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/130732"}, {"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/130739"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/130789"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130764"}], "importance": 9, "article_id": "3a53ac27"}, {"headline": "JSW MG Motor India Unveils Multi-Powertrain MG Adapt Vehicle Platform", "summary": "JSW MG Motor India has introduced \"MG Adapt,\" a modular vehicle architecture developed with China's SAIC Motor that supports electric, hybrid, and plug-in hybrid technologies. The JV aims to launch one electric SUV and one plug-in hybrid SUV in FY27 based on this platform. The strategy intends to reduce development costs by over a third while addressing India's diverse energy goals.", "category": "Business", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/130732"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130789"}], "importance": 7, "article_id": "3663ee83"}, {"headline": "HCLTech Acquires Guardian Life’s India Operations for $10.5 Million", "summary": "HCL Technologies has announced a $10.5 million acquisition of Guardian India Operations, the global capability centre of US-based Guardian Life Insurance. Under a seven-year partnership, approximately 2,000 employees will transition to HCLTech. The tech giant will take a 100% stake in the entity, strengthening its presence in the insurance technology and business process operations segment.", "category": "Business", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/130732"}, {"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/130739"}], "importance": 6, "article_id": "27520f6d"}, {"headline": "Aurum PropTech Acquires Housing.com from REA Group in ₹458 Crore Deal", "summary": "Aurum PropTech Ltd has entered a binding agreement to acquire real estate platform Housing.com from Australia’s REA Group in an all-equity deal valued at ₹458 crore. Aurum aims to integrate the platform into an AI-native real estate operating system. Post-transaction, REA Group will hold a stake of up to 24.9% in Aurum, consolidating Aurum's position in India’s digital property market.", "category": "Business", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/130732"}, {"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130739"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130789"}], "importance": 6, "article_id": "b0c778d5"}, {"headline": "NTPC-NPCIL Joint Venture Invites ₹28,000 Crore Bids for Rajasthan Nuclear Project", "summary": "Anushakti Vidhyut Nigam Ltd, a joint venture of NPCIL and NTPC, has invited bids for a ₹28,000 crore contract to build the nuclear island for the 4x700MW Mahi Banswara project in Rajasthan. This marks India’s largest-ever indigenous nuclear island EPC package and is the first such project not entirely owned by NPCIL, supporting the government’s plan to scale up nuclear capacity.", "category": "Infrastructure", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/130732"}, {"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130739"}], "importance": 9, "article_id": "b2882ff2"}, {"headline": "PM Modi to Flag Off India’s First Hydrogen-Powered Train in Haryana", "summary": "Prime Minister Narendra Modi will flag off India’s first hydrogen fuel cell passenger train on the Jind-Sonipat route in Haryana. Developed by Medha Servo Drives and ICF Chennai, the 10-coach train uses fuel cells to convert hydrogen into electricity, emitting only water vapour. The launch is part of a larger ₹25,000 crore infrastructure package covering rail, road, and health sectors.", "category": "Science", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/130732"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130693"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130789"}], "importance": 9, "article_id": "4e8e5747"}, {"headline": "Hero MotoCorp Enters German Market Through Partnership With KSR Group", "summary": "India’s Hero MotoCorp has announced its entry into Germany through a distribution partnership with the KSR Group. Marking the company’s 53rd global market and its fifth in Europe, Hero will introduce its premium product portfolio, including the XPulse 200 4V series. The move reflects the company’s long-term commitment to expanding its presence in Europe’s largest economy.", "category": "Business", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/130732"}, {"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130739"}], "importance": 7, "article_id": "ed0f5598"}, {"headline": "RBI Directs Banks to Sell Non-Financial Assets Within Seven Years", "summary": "The Reserve Bank of India has directed banks to dispose of non-financial assets, such as immovable properties acquired through debt settlement, within seven years. Additionally, the RBI denied requests from lenders to acquire such assets before a borrower is classified as non-performing (NPA). The move ensures banks maintain a focus on core operations and comply with the Banking Regulation Act.", "category": "Business", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/130732"}, {"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/130739"}], "importance": 8, "article_id": "0230a45d"}, {"headline": "NSE to Launch Nifty India FPI 150 Derivatives From August 12", "summary": "The National Stock Exchange (NSE) has received regulatory approval to launch derivative contracts based on the Nifty India FPI 150 Index starting August 12. The index tracks the top 150 stocks selected from the Nifty 500 that are popular with Foreign Portfolio Investors. NSE will offer three monthly serial index futures and options, providing new hedging tools for global institutional capital.", "category": "Business", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/130732"}, {"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130739"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/130789"}], "importance": 7, "article_id": "da7bcce9"}, {"headline": "Government Lists Five New Bills for Parliament’s Upcoming Monsoon Session", "summary": "The Indian government has listed five new bills for the Parliament's monsoon session starting July 20. Key legislations include the Prevention of Insults to National Honour (Amendment) Bill, 2026—making insults to Vande Mataram punishable—and amendments to the MSME Development Act to resolve payment disputes. Other bills concern FCRA changes, income tax, and increasing the number of Supreme Court judges.", "category": "Politics", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_17-07-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/130732"}, {"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/130739"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/130693"}], "importance": 9, "article_id": "7c5822af"}, {"headline": "Trump Administration Plans to Limit International Student Visas to Fixed Terms", "summary": "The Trump administration has proposed new rules to limit the duration of stay for international students on F-1 visas and journalists to a fixed time limit, ending the previous \"duration of status\" model. The change aims to reduce visa overstays and increase oversight, though it may increase costs and uncertainty for thousands of Indian students and media professionals in the United States.", "category": "World", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130739"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130764"}], "importance": 9, "article_id": "5c15f58c"}, {"headline": "SBI Funds Management IPO Subscribed 41.6 Times on Final Day", "summary": "The SBI Funds Management IPO closed with massive demand, being subscribed 41.66 times on its final day. Driven by Qualified Institutional Buyers (QIBs) who bid 140 times their quota, the offer received total bids worth ₹2.98 lakh crore against a size of ₹9,813 crore. The company raised ₹2,663 crore from anchor investors like BlackRock, marking a successful debut for India's largest AMC.", "category": "Business", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130739"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/130789"}], "importance": 8, "article_id": "767b8aae"}, {"headline": "ITC Hotels Reports 36% Profit Jump and Acquires Ahmedabad Property", "summary": "ITC Hotels reported a 36% year-on-year increase in net profit to ₹182 crore for the first quarter of FY27, with revenue growing 8% to ₹936 crore. Growth was driven by leisure locations and improved business travel. The company also approved the acquisition of GHK Hospitality & Infrastructures (Welcomhotel Ahmedabad) for ₹155 crore to expand its owned-asset portfolio in Gujarat.", "category": "Business", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130739"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130789"}], "importance": 7, "article_id": "04cf0979"}, {"headline": "CBDT Notifies Cost Inflation Index at 384 for Fiscal Year 2027", "summary": "The Central Board of Direct Taxes (CBDT) has notified the Cost Inflation Index (CII) for FY27 at 384, a 2.2% increase from 376 in FY26. While the index is used to calculate long-term capital gains by adjusting asset purchase prices for inflation, its utility is now limited after the Finance Act telegram_url": "https://t.me/c/1877410077/130789"}], "importance": 7, "article_id": "533cdb2c"}, {"headline": "India’s Pharma Exports to UK Projected to Reach $981 Million", "summary": "India’s pharmaceutical exports to the United Kingdom are projected to grow by 8.6% to reach $981 million in FY27 as the Comprehensive Economic and Trade Agreement (CETA) becomes operational. The deal provides zero-duty access for 56 pharmaceutical tariff lines, eliminating tariffs on nearly all products. Drug formulations and biologicals currently account for 90% of this bilateral trade.", "category": "Business", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/130739"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130789"}], "importance": 7, "article_id": "d6935b42"}, {"headline": "South Indian Bank Q1 Net Profit Rises 17% as Asset Quality Improves", "summary": "South Indian Bank reported a 17.3% year-on-year increase in net profit for Q1 FY27, reaching ₹378 crore. Growth was supported by a 23% rise in net interest income and a significant improvement in asset quality, with the gross NPA ratio falling to 1.38% from 3.15%. Gross advances grew 17% to ₹1,09,368 crore, while provisions excluding tax declined by nearly 65%.", "category": "Business", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/130739"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130789"}], "importance": 7, "article_id": "8dd8ee40"}, {"headline": "ISRO Restricts Voluntary Retirement for Scientists Working on Gaganyaan Mission", "summary": "The Department of Space has issued a memorandum tightening rules for the resignation and voluntary retirement of scientists and engineers working on critical projects like Gaganyaan. The move aims to curb an exodus after approximately 100 personnel recently left ISRO. The directive states that retirement requests from key staff should no longer be accepted as routine to ensure project continuity.", "category": "Science", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/130739"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130693"}], "importance": 8, "article_id": "d2cafb4c"}, {"headline": "Uber to Acquire Germany’s Delivery Hero in $15 Billion Global Deal", "summary": "Uber has agreed to acquire Germany-based food-delivery company Delivery Hero, including its Foodora brand, in a deal valued at approximately $14.8 billion. The acquisition will create the largest food-delivery group outside of China, spanning 99 countries with a combined valuation near $25 billion. The deal is expected to face significant antitrust scrutiny as Uber consolidates its global position.", "category": "Business", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/130739"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130789"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/130764"}], "importance": 8, "article_id": "46139ffd"}, {"headline": "EU Forces Google to Share Search Data and Open Android to Rivals", "summary": "The European Union has issued new rules requiring Google to share its search data with third-party developers and provide rival AI services fair access to the Android operating system. Part of a broader effort to curb the dominance of tech giants, these measures aim to prevent anti-competitive behavior, promote innovation, and ensure diversity within the digital ecosystem.", "category": "Technology", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_17-07-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/130739"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130789"}], "importance": 8, "article_id": "b302b533"}, {"headline": "Delhi HC Orders Health Monitoring for Activist Sonam Wangchuk on Hunger Strike", "summary": "The Delhi High Court has directed the Union and Delhi governments to ensure regular medical monitoring for activist Sonam Wangchuk on the 19th day of his hunger strike. Doctors warn his health is critical after a 9 kg weight loss and potential organ damage. The court asserted that every citizen's life is precious as Wangchuk protests over issues including NEET exam irregularities.", "category": "India", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/130693"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/130789"}], "importance": 9, "article_id": "ed9c7ffd"}, {"headline": "Government Denies Safety Risk Following Kudankulam Nuclear Plant Data Breach", "summary": "Union Minister Jitendra Singh stated that a data breach involving 14.3 GB of leaked electronic files linked to the Kudankulam nuclear plant poses no risk to nuclear security. The breach affected systems belonging to contractor Reliance Infrastructure. While NPCIL confirms the \"nuclear island\" is safe, the exposure of \"Balance of Plant\" blueprints could assist actors in mapping operational dependencies.", "category": "Infrastructure", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/130693"}], "importance": 8, "article_id": "b0a322a9"}, {"headline": "Over 11 Lakh Candidates Qualify in NEET-UG 2026 Re-Examination", "summary": "The National Testing Agency announced that 11.21 lakh candidates qualified in the NEET-UG 2026 re-test. Two candidates, Panshul Bansal and Aryan Gupta, topped with scores of 715, while 19 students scored above 700. Women outperformed men, accounting for 58% of the qualified pool. Data shows a strong first-attempt success rate, with nearly 93% of top scorers aged between 17 and 19.", "category": "Education", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/130693"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130764"}], "importance": 9, "article_id": "606f8394"}, {"headline": "Centre Unveils Third Draft of CAFE III Fuel Efficiency Norms", "summary": "The Union government has released the third draft of CAFE III fuel efficiency norms, set for implementation in April 2027. The proposal introduces Carbon Neutrality Factors for biofuels like ethanol and super credits for electric vehicles. By retaining a flatter weight-adjustment curve, the framework reduces compliance advantages for heavy SUVs. Stakeholders have until August to provide feedback.", "category": "Environment", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 17-07-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/130693"}, {"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130789"}], "importance": 8, "article_id": "d71a3bf6"}, {"headline": "Government to Take Equity Stakes in Semiconductor Design Startups Under ISM 2.0", "summary": "The Indian government is redesigning its support framework for semiconductor startups, shifting from grants to equity-linked investments under the ISM 2.0 program. India Semiconductor Mission CEO Amitesh Kumar Sinha stated the move aims to provide patient capital and instill confidence in venture capital firms. The government will not seek management board seats or permanent investments.", "category": "Technology", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130789"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130764"}], "importance": 9, "article_id": "cf1eea2a"}, {"headline": "Protests Erupt in Ukraine Following Dismissal of Defense Minister Mykhailo Fedorov", "summary": "Ukrainian President Volodymyr Zelenskyy has dismissed 35-year-old Defense Minister Mykhailo Fedorov, a tech expert known for military reforms, following disputes over leadership and strategy. The move triggered street protests and reflects deepening tensions between political leaders and military generals during the ongoing conflict with Russia, amid concerns over procurement transparency.", "category": "World", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130789"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/130764"}], "importance": 8, "article_id": "b51d5fcc"}, {"headline": "Indian National Stabbed 15 Times in Utah Religion-Motivated Hate Crime", "summary": "Syed Sohailuddin, an Indian national, was allegedly stabbed 15 times at a shopping mall in West Valley City, Utah. US police are investigating the incident as a targeted hate crime after the suspect, Peter Michael Larsen, reportedly questioned the victim about his faith before the attack. The suspect has been arrested and charged, sparking significant concern in the Indian-American community.", "category": "World", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 17-07-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/130789"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_17-07-2026.pdf", "page": 21, "telegram_url": "https://t.me/c/1877410077/130764"}], "importance": 8, "article_id": "35e2b0f9"}]};
const CAT_META = {"Politics": {"color": "#e8334a", "icon": "🏛️"}, "Economy": {"color": "#f5a623", "icon": "📊"}, "Business": {"color": "#f0c040", "icon": "💼"}, "India": {"color": "#ff7043", "icon": "🇮🇳"}, "World": {"color": "#5c9eff", "icon": "🌍"}, "Sports": {"color": "#36c46f", "icon": "🏆"}, "Science": {"color": "#a78bfa", "icon": "🔬"}, "Technology": {"color": "#38bdf8", "icon": "💻"}, "Health": {"color": "#34d399", "icon": "🏥"}, "Law": {"color": "#fb923c", "icon": "⚖️"}, "Environment": {"color": "#4ade80", "icon": "🌿"}, "Education": {"color": "#e879f9", "icon": "📚"}, "Culture": {"color": "#f472b6", "icon": "🎭"}, "Infrastructure": {"color": "#94a3b8", "icon": "🏗️"}};

// FIXED: Pre-build data structures IMMEDIATELY for deep linking
const allArts = [...DIGEST.articles].sort((a,b)=>(b.importance||0)-(a.importance||0));
const byCategory = {};
for (const art of allArts) {
  const c = art.category||"India";
  if (!byCategory[c]) byCategory[c]=[];
  byCategory[c].push(art);
}
const sortedCats = Object.keys(byCategory).sort(
  (a,b)=>(byCategory[b][0].importance||0)-(byCategory[a][0].importance||0)
);

// FIXED DEEP LINK HANDLER - Runs IMMEDIATELY
let deepLinkTarget = null;
function handleDeepLink() {
  const hash = window.location.hash;
  if (!hash || !sortedCats.length) return;
  
  const cleanHash = hash.startsWith('#article-') ? hash.slice(9) : hash.slice(1);
  const targetArticle = DIGEST.articles.find(art => art.article_id === cleanHash);
  
  if (targetArticle) {
    deepLinkTarget = {article: targetArticle, hash: cleanHash};
  }
}
handleDeepLink();

let catIdx=0,vpW=0,vpH=0;
const panels=[];
const outer=document.getElementById('outer');
const hTrack=document.getElementById('hTrack');
const hintUp=document.getElementById('hintUp');
const hintRight=document.getElementById('hintRight');
const catFlash=document.getElementById('catFlash');
const cfIcon=document.getElementById('cfIcon');
const cfName=document.getElementById('cfName');

function buildAll() {
  vpW=outer.offsetWidth; vpH=outer.offsetHeight;
  hTrack.innerHTML=''; panels.length=0;
  sortedCats.forEach((cat,ci)=>{
    const m=CAT_META[cat]||{color:"#e8334a",icon:"📰"};
    const arts=byCategory[cat];
    const panel=document.createElement('div');
    panel.className='cat-panel';
    panel.id=`cat-panel-${ci}`;
    panel.style.setProperty('--cc',m.color);
    panel.innerHTML=`<div class="progress-row" id="prow-${ci}" style="--cc:${m.color}"></div><div class="v-feed" id="vfeed-${ci}"><div class="v-track" id="vtrack-${ci}"></div></div>`;
    hTrack.appendChild(panel);
    const pRow=panel.querySelector(`#prow-${ci}`);
    const vFeed=panel.querySelector(`#vfeed-${ci}`);
    const vTrack=panel.querySelector(`#vtrack-${ci}`);
    const cardH=vFeed.getBoundingClientRect().height||vpH;
    
    arts.forEach((art,ai)=>{
      const card = buildCard(art, cardH, m, cat, ai);
      card.id = `article-${art.article_id}`;
      card.dataset.articleId = art.article_id;
      vTrack.appendChild(card);
    });
    
    panels.push({pRow,vFeed,vTrack,articles:arts,artIdx:0});
    buildPRow(ci);
  });
  
  hTrack.style.transition='none';
  hTrack.style.transform='translateX(0)';
  syncV(0,false);
  
  // Apply deep link after build — 200ms ensures card heights are measured
  if (deepLinkTarget) {
    setTimeout(() => applyDeepLink(deepLinkTarget), 200);
  }
}

function buildCard(art,h,m,cat,articleIndex) {
  const src=art.sources?.[0];
  // Direct PDF link with #page=N - respected by all modern browser PDF viewers
  // when the file is opened via a link click (Chrome, Firefox, Safari, Edge).
  // Falls back to the Telegram source URL if no PDF is available.
  const href = src?.pdf_filename
    ? ('pdfs/' + src.pdf_filename + '#page=' + (src.page || 1))
    : (src?.telegram_url || '#');
  const card=document.createElement('div');
  card.className='card';
  card.dataset.articleId = art.article_id;
  card.style.height=h+'px';
  card.style.setProperty('--cc',m.color);
  card.innerHTML=`
    <div class="card-content">
      <div class="card-toprow">
        <div class="cat-pill">
          <div class="pill-icon"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="1" y="1" width="8" height="2" rx="0.6" fill="#888"/><rect x="1" y="4.5" width="5" height="1.5" rx="0.6" fill="#666"/><rect x="1" y="7" width="6" height="1.5" rx="0.6" fill="#666"/></svg></div>
          ${cat.toUpperCase()}
        </div>
        <div class="card-date">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="2.5" width="11" height="9.5" rx="1.8" stroke="#555" stroke-width="1.2"/><path d="M4.5 1v3M8.5 1v3" stroke="#555" stroke-width="1.2" stroke-linecap="round"/><path d="M1 6h11" stroke="#555" stroke-width="1.2"/></svg>
          ${DIGEST.date}
        </div>
      </div>
      <div class="card-headline">${art.headline}</div>
      <div class="card-summary">${art.summary}</div>
      <div class="card-divider"></div>
      <div class="card-footer">
        ${src?`<a class="src-chip" href="${href}" target="_blank" onclick="event.stopPropagation()">${src.newspaper}<span class="src-chip-sep">&middot;</span><span class="src-chip-pg">Pg ${src.page}</span><span class="src-chip-ext"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M3.5 7.5L7.5 3.5M7.5 3.5H5M7.5 3.5V6" stroke="#555" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></span></a>`:'<div></div>'}
        <div class="info-btn"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6.5" stroke="#444" stroke-width="1.3"/><circle cx="7.5" cy="4.5" r="0.8" fill="#555"/><path d="M7.5 7v4" stroke="#555" stroke-width="1.5" stroke-linecap="round"/></svg></div>
      </div>
    </div>`;
  return card;
}

function buildPRow(ci) {
  const p=panels[ci],ai=p.artIdx;
  p.pRow.innerHTML='';
  p.articles.forEach((_,i)=>{
    const seg=document.createElement('div');
    seg.className='pseg'+(i<ai?' done':i===ai?' active':'');
    p.pRow.appendChild(seg);
  });
}

function syncV(ci,animated) {
  const p=panels[ci],h=p.vFeed.getBoundingClientRect().height;
 p.vTrack.style.transition=animated?'transform 0.35s cubic-bezier(0.4,0,0.2,1)':'none';
  p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;
  buildPRow(ci);
}

function applyDeepLink(target) {
  const ci = sortedCats.findIndex(cat =>
    byCategory[cat].some(art => art.article_id === target.hash)
  );
  if (ci === -1) return;

  // Set catIdx BEFORE calling goCat so the horizontal track lands correctly
  catIdx = ci;
  hTrack.style.transition = 'none';
  hTrack.style.transform = `translateX(${-ci * vpW}px)`;

  const ai = byCategory[sortedCats[ci]].findIndex(art => art.article_id === target.hash);
  if (ai === -1) return;
  panels[ci].artIdx = ai;
  syncV(ci, false);

  const card = document.getElementById('article-' + target.hash);
  if (card) {
    card.classList.add('target-highlight');
    setTimeout(() => card.classList.remove('target-highlight'), 3000);
  }
}

function goArt(d) {
  const p=panels[catIdx];
  const n=Math.max(0,Math.min(p.artIdx+d,p.articles.length-1));
  if(n===p.artIdx&&d!==0)return;
  p.artIdx=n; syncV(catIdx,true); dismiss();
}

function goCat(idx,animated=true) {
  idx=Math.max(0,Math.min(idx,sortedCats.length-1));
  if(idx===catIdx&&animated)return;
  const prev=catIdx; catIdx=idx;
  hTrack.style.transition=animated?'transform 0.38s cubic-bezier(0.4,0,0.2,1)':'none';
  hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;
  if(animated&&idx!==prev) {
    const m=CAT_META[sortedCats[idx]]||{color:"#e8334a",icon:"📰"};
    catFlash.style.background=m.color+'18';
    cfIcon.textContent=m.icon; cfName.textContent=sortedCats[idx]; cfName.style.color=m.color;
    catFlash.classList.add('on'); setTimeout(()=>catFlash.classList.remove('on'),500);
  }
  dismiss();
}

let dismissed=false;
function dismiss() {
  if(dismissed)return; dismissed=true;
  hintUp.classList.remove('visible'); hintRight.classList.remove('visible');
  hintUp.classList.add('gone'); hintRight.classList.add('gone');
}

(function initHints() {
  const KEY='dailyBriefHintSeen';
  if(!localStorage.getItem(KEY)) {
    localStorage.setItem(KEY,'1');
    setTimeout(()=>{ if(!dismissed){ hintUp.classList.add('visible'); hintRight.classList.add('visible'); } },2500);
  }
})();

let tsX=0,tsY=0,tcX=0,tcY=0,axis=null,drag=false;
outer.addEventListener('touchstart',e=>{ tsX=e.touches[0].clientX; tsY=e.touches[0].clientY; tcX=0; tcY=0; axis=null; drag=true; hTrack.style.transition='none'; const p=panels[catIdx]; if(p)p.vTrack.style.transition='none'; },{passive:true});
outer.addEventListener('touchmove',e=>{ if(!drag)return; const dx=e.touches[0].clientX-tsX,dy=e.touches[0].clientY-tsY; tcX=dx; tcY=dy; if(!axis&&(Math.abs(dx)>8||Math.abs(dy)>8))axis=Math.abs(dx)>Math.abs(dy)?'h':'v'; if(!axis)return; e.preventDefault(); if(axis==='h'){ const edge=(catIdx===0&&dx>0)||(catIdx===sortedCats.length-1&&dx<0); hTrack.style.transform=`translateX(${-catIdx*vpW+dx*(edge ? 0.14 : 1)}px)`; }else{ const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height; const edge=(p.artIdx===0&&dy>0)||(p.artIdx===p.articles.length-1&&dy<0); p.vTrack.style.transform=`translateY(${-p.artIdx*h+dy*(edge ? 0.14 : 1)}px)`; } },{passive:false});
outer.addEventListener('touchend',()=>{ if(!drag)return; drag=false; if(axis==='h'){ const t=vpW*.2; if(tcX<-t)goCat(catIdx+1); else if(tcX>t)goCat(catIdx-1); else{hTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;} }else if(axis==='v'){ const t=vpH*.2; if(tcY<-t)goArt(1); else if(tcY>t)goArt(-1); else{const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height;p.vTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;} } axis=null; },{passive:true});
document.addEventListener('keydown',e=>{ if(e.key==='ArrowDown'||e.key===' '){e.preventDefault();goArt(1);} if(e.key==='ArrowUp'){e.preventDefault();goArt(-1);} if(e.key==='ArrowRight'){e.preventDefault();goCat(catIdx+1);} if(e.key==='ArrowLeft'){e.preventDefault();goCat(catIdx-1);} });
let wl=false;
outer.addEventListener('wheel',e=>{ e.preventDefault();if(wl)return;wl=true; Math.abs(e.deltaX)>Math.abs(e.deltaY)?goCat(catIdx+(e.deltaX>0?1:-1)):goArt(e.deltaY>0?1:-1); setTimeout(()=>wl=false,500); },{passive:false});
window.addEventListener('resize',()=>{ vpW=outer.offsetWidth;vpH=outer.offsetHeight; hTrack.style.transition='none'; hTrack.style.transform=`translateX(${-catIdx*vpW}px)`; panels.forEach(p=>{ const h=p.vFeed.getBoundingClientRect().height; p.vTrack.querySelectorAll('.card').forEach(c=>c.style.height=h+'px'); p.vTrack.style.transition='none'; p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`; }); });

buildAll();
</script>
</body>
</html>
