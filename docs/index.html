ent Trump pledges to declassify UFO files", "summary": "US President Donald Trump pledged to declassify closely guarded secrets regarding Unidentified Anomalous Phenomena (UAP), or UFOs. He stated his administration would release \"a lot of things\" that are \"very interesting to people.\"", "category": "World", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122244", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/122244"}], "article_id": "b24b5e8a"}, {"headline": "Anthropic considers funding offers exceeding $900 billion valuation", "summary": "Anthropic, a PBC, is reportedly weighing new funding offers that would value the AI developer at over $900 billion, potentially leapfrogging rival OpenAI as the world's most valuable AI startup.", "category": "Technology", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122244", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/122244"}], "article_id": "dad18fe6"}, {"headline": "Editorial: The many political lives of Uddhav Thackeray", "summary": "The editorial analyzes Uddhav Thackeray's political trajectory, noting his shift from a reluctant politician to CM. His withdrawal from council polls suggests his legislative stint may end, with son Aditya potentially taking over, recalibrating the Shiv Sena-UBT's role.", "category": "Politics", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122244", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/122244"}], "article_id": "28887166"}, {"headline": "Heat action plans need to go beyond emergencies", "summary": "A conservation biologist argues heat action plans must evolve beyond episodic emergency responses to address systemic urban design failures, advocating for long-term interventions like shade trees, cool roofs, and integrating plans into city planning for vulnerable populations.", "category": "Environment", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122244", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/122244"}], "article_id": "8fe2b689"}, {"headline": "Stronger Indo-German ties vital for industry, strategy", "summary": "Defence minister Rajnath Singh's Germany visit signifies a shift in Indo-German defence ties towards industrial collaboration and technological co-creation. The Project-75I submarine programme is a key anchor, aligning with strategic interests in the Indo-Pacific.", "category": "Politics", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122244", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/122244"}], "article_id": "42467695"}, {"headline": "India’s AI ambition risks outrunning its readiness", "summary": "India's AI market is advancing rapidly, but institutional readiness, governance, and regulatory frameworks are lagging. While strong in talent and digital infrastructure, the country risks erosion of trust and structural faults if oversight doesn't match innovation speed.", "category": "Technology", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122244", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/122244"}], "article_id": "582c42be"}, {"headline": "State EV subsidy rollback impacts sales momentum", "summary": "The expiration of electric vehicle (EV) subsidies in four key states, alongside new EV taxes in Karnataka and MP, creates hurdles for carmakers. Experts warn that losing these incentives could stall EV adoption by driving up upfront costs.", "category": "Business", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122244", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/122244"}], "article_id": "36ad29c1"}, {"headline": "NBFC, HFC cost of funds may rise in medium term", "summary": "India Ratings and Research predicts a marginal increase in the cost of funds for non-banking finance companies (NBFCs) and housing finance companies (HFCs) over the medium term due to geopolitical tensions and cautious capital markets.", "category": "Economy", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122244", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/122244"}], "article_id": "505083dd"}, {"headline": "Truck rentals fall as industrial activity declines", "summary": "Truck rentals in India dropped by 4-5% in April, following a 9-10% decline in March, due to the Iran war and low supplies from manufacturing hubs. Dispatches from SMEs, accounting for 70% of cargo, fell by 15-20%.", "category": "Economy", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122244", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/122244"}], "article_id": "27350cb5"}, {"headline": "IPL 2026: Bat-ball imbalance, high scores challenge cricket's norm", "summary": "IPL 2026 has seen a record 10 200-plus run chases, making high scores the norm. Experts debate bat-ball imbalance, with SRH coach Muttiah Muralitharan attributing increased aggression to the Impact Player rule. Despite concerns, fans still favor entertainment.", "category": "Sports", "page": 14, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122244", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/122244"}], "article_id": "e1aa7c95"}, {"headline": "OCA welcomes India’s bid for 2038 Asian Games in Ahmedabad", "summary": "The Olympic Council of Asia (OCA) welcomed India's official bid to host the 2038 Asian Games in Ahmedabad. An expert committee will review infrastructure and logistical plans. India previously hosted in 1951 and 1982.", "category": "Sports", "page": 14, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122244", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/122244"}], "article_id": "88ef30e0"}, {"headline": "India likely to bid for Gukesh-Sindarov World Chess Championship", "summary": "India is likely to bid to host the youngest-ever World Chess Championship match between D Gukesh and Javokhir Sindarov (both 20) in November-December. The All India Chess Federation is keen to host, with both Indians contenders in title matches.", "category": "Sports", "page": 14, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122244", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 01-05.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/122244"}], "article_id": "d10ce9e3"}, {"headline": "India plans ₹51,000-crore vessel acquisition to secure energy fleet", "summary": "India plans a ₹51,000-crore vessel acquisition by FY27 for 62 vessels (2.85 million GT capacity) to reduce reliance on foreign-flagged ships amid geopolitical tensions and strengthen its logistics ecosystem. State-run SCI and ONGC will float tenders for 28 and 25 vessels, respectively, with a focus on domestic manufacturing.", "category": "Infrastructure", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "a24f3b27"}, {"headline": "Rupee hits record low on rising oil prices, FPI outflows", "summary": "The rupee closed at a record low of 94.91 against the US dollar on Thursday, breaching 95 intra-day due to surging crude oil prices (peaked at $126/barrel), $201 million FPI outflows in equities, and increased importer dollar demand. RBI intervention slowed the fall, ending down 6 paise from the previous close.", "category": "Economy", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "e4992de8"}, {"headline": "HUL Q4 revenue grows fastest in twelve quarters, up 8% to ₹16,207 cr", "summary": "Hindustan Unilever Ltd (HUL) reported 8% YoY revenue growth to ₹16,207 crore in Q4 FY26, its fastest in 12 quarters, driven by home-care (9%), beauty & wellbeing (8%), and foods & personal care (5%). Net profit rose 21% to ₹2,992 crore, aided by a one-time gain, despite elevated 8-10% cost inflation.", "category": "Business", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "d880f421"}, {"headline": "India Inc aggressively pursues global deals for market access, capabilities", "summary": "Indian companies are increasingly pursuing global acquisitions to expand market access and enhance capabilities, with over 70 international deals worth $17.3 billion in the first four months of 2026. Sectors like IT, pharma, healthcare, and renewable energy are leading, leveraging better balance sheets and financing options.", "category": "Business", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "3e4542c7"}, {"headline": "Laurus Labs Q4 net profit rises 19% to ₹279 crore", "summary": "Laurus Labs reported a 19% rise in Q4 FY26 net profit to ₹279 crore, with total revenue up 5% to ₹1,812 crore. For the full year, revenue grew 23% to ₹6,813 crore, and net profit more than doubled to ₹889 crore.", "category": "Business", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "bf8c6d69"}, {"headline": "Not all auto firms keen on 100% ethanol due to market, fuel concerns", "summary": "The regulatory push for high-blend ethanol (E100, E85) and hydrogen-CNG fuels faces scepticism from luxury auto manufacturers, who question technical feasibility, low market volumes, and inconsistent fuel availability. Mercedes-Benz noted the luxury car segment is only 1% of the total PV market.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "2c5fdb34"}, {"headline": "E2W market starts FY27 with 34% growth; TVS widens lead, Ola slips", "summary": "The electric two-wheeler (E2W) market grew 34% YoY in April to 1.39 lakh units. TVS Motor Company widened its lead, while Ola Electric saw a sharp volume drop. Legacy OEMs like TVS and Bajaj Auto gained market share, driven by improved distribution and product reliability.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "da931ad7"}, {"headline": "Centre mandates domestic manufacturing of EV truck electronic parts", "summary": "The Ministry of Heavy Industries mandated domestic manufacturing of key electronic components (BMS, DC-DC converters, VCUs) in electric trucks from September 1, 2026, as a condition for subsidies under the ₹500 crore e-truck incentive program. This aims to shift from basic assembly to component-level manufacturing.", "category": "Technology", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "e2aebb5b"}, {"headline": "Adani Ports reports strong Q4, FY26 earnings on record cargo volumes", "summary": "Adani Ports and Special Economic Zone reported strong Q4 and full-year FY26 earnings, driven by record cargo volumes of 500 million metric tonnes, a 25% revenue increase to ₹38,736 crore, and 20% EBITDA growth to ₹22,851 crore. The company targets to double revenue to ₹90,000 crore and EBITDA to ₹50,000 crore by FY31.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "1bdcc4b9"}, {"headline": "Sundram Fasteners Q4 net profit up 30% on robust demand", "summary": "Sundram Fasteners Ltd reported a 30% increase in Q4 FY26 consolidated net profit to ₹161 crore, driven by robust domestic demand and operational efficiencies. Full-year net profit was ₹593 crore on revenue of ₹6,368 crore. Non-auto segments like wind energy, aerospace, and railways show strong momentum.", "category": "Business", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "2f8cffd7"}, {"headline": "ACC Q4 net profit down 68% due to higher costs", "summary": "ACC, an Adani Group company, reported a 68% decrease in Q4 net profit to ₹238 crore due to higher costs and lower realisation, despite an 18% revenue rise to ₹7,124 crore. The company plans to add 3.4 mtpa capacity by June, increase green power share, and strengthen cost-mitigation measures.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "9fd6cb4d"}, {"headline": "Liberalised FDI rules for land border nations await final nod", "summary": "Liberalised FDI norms for countries sharing a land border with India, including China, await final notification from the Finance Ministry under FEMA law. While the Cabinet cleared DPIIT's proposal to ease beneficial ownership rules, inter-departmental consultations are ongoing. Specific sub-sectors will benefit from expedited 60-day processing.", "category": "Economy", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "62dc0e4b"}, {"headline": "SEZs must shift to strategic industrial engines: CEA Nageswaran", "summary": "CEA V Anantha Nageswaran stated that India's SEZs need a fundamental reset, moving from tax-driven export enclaves to strategic industrial ecosystems focused on innovation and globally contested sectors. He highlighted structural inefficiencies, urging diversification from IT-ITeS dominance and increased R&D investment.", "category": "Economy", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "ff26b59b"}, {"headline": "Hostile global environment could make growth targets hard to achieve", "summary": "CEA V Anantha Nageswaran warned that India's ambitious growth targets ($7-8 trillion GDP by 2032, $30 trillion by 2047) will be harder to achieve due to a hostile global environment. He stressed the need for technology-led growth, frontier research, and addressing low R&D spending (<1% of GDP) and weak industry-academia links.", "category": "Economy", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "b8b56ea0"}, {"headline": "Lagarde signals ECB to consider June hike after latest hold", "summary": "ECB President Christine Lagarde indicated a possible interest-rate hike in June after policymakers debated but rejected the idea on Thursday due to \"insufficient information.\" The ECB kept the deposit rate at 2%, mindful of upside inflation risks and downside growth risks in the euro zone.", "category": "Economy", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "cc0c5c7c"}, {"headline": "Sensex, Nifty end 7% higher in April despite FPI outflows", "summary": "Indian equity benchmarks Nifty and Sensex surged 7% in April, despite FPI outflows of ₹60,000 crore, a depreciating rupee, and rising crude oil prices due to the West Asia conflict. Broader indices outperformed, with Nifty SmallCap 100 up 18.5%, driven by investor confidence and better-than-expected earnings.", "category": "Economy", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "3f6b49cd"}, {"headline": "SEBI penalises Axis Trustee for flouting disclosure norms", "summary": "SEBI fined Axis Trustee Services Ltd ₹10 lakh for disclosure and governance lapses related to Embassy Office Parks REIT. The trustee delayed disclosing a NFRA order against the REIT's former CEO and failed to independently assess his 'fit and proper' status.", "category": "Law", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "9266420c"}, {"headline": "Shift in control at RBL Bank gets SEBI nod for Dubai's Emirates NBD", "summary": "SEBI approved a change of control at RBL Bank, paving the way for Dubai's Emirates NBD to acquire a majority stake. This marks a key regulatory milestone for one of India's largest cross-border financial sector deals.", "category": "Business", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "3c42c7ec"}, {"headline": "Hindustan Lab, RK Steel get SEBI nod to float IPOs", "summary": "Generic drug maker Hindustan Laboratories and steel tubes and pipes manufacturer RK Steel Manufacturing Company received SEBI's approval to launch initial public offerings (IPOs). Hindustan Laboratories' IPO includes a fresh issue of 50 lakh shares, while RK Steel's is entirely a fresh issue of up to 2 crore shares.", "category": "Business", "page": 6, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "4a35d5e4"}, {"headline": "Navin Fluorine hits 52-week high on strong Q4 earnings", "summary": "Navin Fluorine International shares surged over 6.5% to a 52-week high on strong Q4 earnings and upbeat growth visibility, with standalone net profit up 76.2% YoY to ₹135.03 crore and revenue growing 29% to ₹626.51 crore. Global brokerages had mixed views on the stock.", "category": "Business", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "cf36ab35"}, {"headline": "AVI Polymers’ promoters plan to hike stake by 5%", "summary": "Promoters of AVI Polymers plan to acquire up to 5% of the company's equity via open market transactions, demonstrating confidence in its long-term growth as it transitions into an AI-driven technology enterprise. The acquisition will be phased, complying with SEBI's regulations.", "category": "Business", "page": 6, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "e8e2f1e9"}, {"headline": "KFin Technologies plunges 8% after Q4 profit declines 4.5%", "summary": "KFin Technologies shares dropped over 8% after its consolidated net profit declined 4.5% YoY to ₹81.14 crore in Q4 FY26, despite a 23% revenue rise to ₹347.33 crore. Brokerages maintained 'Buy' ratings, citing structural tailwinds but noted the profit decline.", "category": "Business", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "1dde4bdb"}, {"headline": "Thomas Cook forex card expands to 28 currencies", "summary": "Thomas Cook (India) expanded its prepaid forex card to 28 currencies, adding 16 new options, making it one of the widest currency offerings in India. Customers can load forex via retail, digital platforms, WhatsApp, or Blinkit for quick delivery.", "category": "Business", "page": 8, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "72f70708"}, {"headline": "Banking built on judgment, not just financial models, says RBI Dy Governor", "summary": "RBI Deputy Governor J Swaminathan emphasized the critical need for judgment, institutional discipline, and responsibility in banking, despite increasing digitization. He noted that numbers tell a story, but understanding the underlying context is crucial, particularly for credit decisions and ensuring finance serves a public purpose.", "category": "Economy", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "d81bb18e"}, {"headline": "Central Bank Q4 profit dips 30% on one-time deferred tax recognition", "summary": "Central Bank of India reported a 30% YoY decline in Q4 FY26 net profit to ₹724 crore due to a one-time deferred tax asset (DTA) recognition impact of ₹632 crore. Full-year profit rose 15% to ₹4,369 crore. Gross advances grew 19% and loan loss provisions declined 22%.", "category": "Business", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "14e6fad4"}, {"headline": "Aster DM Healthcare posts strong Q4 with 18% revenue rise", "summary": "Healthcare major Aster DM Healthcare reported an 18% YoY rise in Q4 FY26 revenue to ₹1,182 crore, with operating EBITDA up 31% to ₹253 crore, driven by patient volumes and margin expansion. Proforma Q4 revenues grew 18% to ₹2,361 crore, with operating EBITDA up 25% to ₹517 crore.", "category": "Business", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "3e087ced"}, {"headline": "Equitas SFB Q4 profit surges to ₹213 crore", "summary": "Equitas Small Finance Bank reported a Q4 FY26 net profit of ₹213 crore, significantly up from ₹42 crore last year, driven by broad-based business growth. Gross advances grew 22% YoY, led by a 180% rise in gold loans. Asset quality improved, and cost of funds reduced.", "category": "Business", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "eb4e257c"}, {"headline": "Cholamandalam Q4 profit up 30% on AUM growth", "summary": "Cholamandalam Investment and Finance reported a 30% YoY rise in Q4 FY26 net profit to ₹1,641 crore, and a 23% increase to ₹5,220 crore for the full fiscal. Assets under management grew 21% to ₹2,42,630 crore, with strong growth in loan against property and home loan businesses.", "category": "Business", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "34668a14"}, {"headline": "ESAF SFB posts profit in Q4 after previous year's loss", "summary": "ESAF Small Finance Bank reported a net profit of ₹24 crore for Q4 FY26, recovering from a ₹183 crore loss last year. Total business grew 14.8% to ₹48,276 crore, with gross advances up 19.4% to ₹22,426 crore. Gold loans emerged as a key growth driver, expanding 54.5% to ₹8,858 crore.", "category": "Business", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "c629785a"}, {"headline": "Indian IT firms see patchy demand in Q4 driven by BFSI", "summary": "Indian IT services firms experienced uneven Q4 demand, with growth concentrated in AI-led, non-discretionary segments like BFSI, energy, and life sciences. Manufacturing, telecom, and retail lagged due to macro and tariff pressures. Europe is emerging as a new growth lever driven by sovereign AI and regulatory demand.", "category": "Business", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "f707ed56"}, {"headline": "Eveready Industries posts 9.4% jump in revenue growth in March quarter", "summary": "Eveready Industries India reported a 9.4% rise in Q4 revenue to ₹327.2 crore, marking its sixth consecutive quarter of growth. Net profit for Q4 stood at ₹141.8 crore, including an exceptional income of ₹102.7 crore from transferring Noida plant leasehold rights. The new alkaline battery plant in Jammu was inaugurated.", "category": "Business", "page": 9, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "0113800e"}, {"headline": "Infosys plans Vizag development centre with 7,000 seats", "summary": "IT major Infosys plans to establish a development centre in Visakhapatnam with a capacity for 7,000 employees. The Andhra Pradesh government has allocated 20 acres for the centre, building on Infosys's existing and rapidly expanding workforce in the city.", "category": "Technology", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "fe5990ca"}, {"headline": "Indo National to acquire Aidin Technologies, enters defence sector", "summary": "Indo National, known for Nippo batteries, will acquire a 51% stake in Aidin Technologies for about ₹78 crore across two tranches. This acquisition marks Indo National's entry into the high-potential aerospace and defence sector.", "category": "Business", "page": 9, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "65534993"}, {"headline": "Cognizant pre-leases 6.5 lakh sq ft in Chennai for US Bancorp GCC", "summary": "Cognizant Technology Solutions has pre-leased 6.5 lakh sq ft of office space at Embassy Splendid TechZone in Chennai to establish a Global Capability Centre (GCC) for US Bancorp. The deal, significant for Chennai's GCC ecosystem, reflects growing traction for flexible GCC models.", "category": "Business", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "2e9dd2af"}, {"headline": "Reliance Retail acquires Priyanka Chopra Jonas's haircare brand Anomaly", "summary": "Reliance Retail has acquired Anomaly, the haircare brand founded by Priyanka Chopra Jonas, gaining full ownership of its trademarks, digital assets, and IP. This expands Reliance Retail’s beauty portfolio, with India as the priority market for scaling the brand through its extensive store network and Tira platform.", "category": "Business", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "09cbd3bf"}, {"headline": "Edelweiss Financial Q4 profit falls 16% to ₹132 crore", "summary": "Edelweiss Financial Services reported a 16.65% decline in consolidated net profit to ₹132 crore for Q4 FY26, down from ₹158.32 crore a year ago. Total income also decreased to ₹1,969.28 crore. The board recommended a dividend of ₹1.5 per share.", "category": "Business", "page": 9, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "eccf756f"}, {"headline": "Gold on track for 2nd straight monthly decline", "summary": "Gold prices rose over 2% on Thursday due to a softer US dollar and easing oil prices, but remain on track for a second consecutive monthly decline amid inflation concerns. Spot gold was up 2.2% at $4,639.26 per ounce.", "category": "Economy", "page": 10, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "a1e97f1d"}, {"headline": "Textile Ministry pushes for temporary cut in cotton import duties", "summary": "The Textile Ministry proposed a temporary cut or removal of import duties on raw cotton to ease input costs for apparel exporters, citing rising cotton prices due to geopolitical factors and supply constraints. The Agriculture Ministry is cautious due to potential impact on cotton farmers, leading to ongoing inter-ministerial consultations.", "category": "Business", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "d6146174"}, {"headline": "Buy zinc at the current level of ₹336", "summary": "Zinc futures are in a steady uptrend since March 23, with the May contract trading at ₹340 per kg. A potential support level is at ₹336 (21-day moving average), with subsequent support at ₹330. Traders are advised to buy on dips for a potential rally to ₹360, maintaining a stop-loss at ₹326.", "category": "Business", "page": 10, "importance": 2, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "b3f310a3"}, {"headline": "Nickel set for best month in 2 years on tighter supply", "summary": "Nickel prices are poised for their biggest monthly jump in two years, driven by tighter supply from Indonesia. Benchmark three-month copper on the LME was up 0.6% to $11,085 a tonne, heading for a 13.9% gain this month.", "category": "Economy", "page": 10, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "cb938fa5"}, {"headline": "Rising nitrogen-based fertilizer prices threaten food inflation", "summary": "A secondary wave of global food inflation is looming due to soaring nitrogen-based fertilizer prices, driven by the West Asia conflict. US Gulf Urea prices climbed 50% between February and April, and West Asia contracts rose 76%, tightening global markets and disproportionately affecting lower-income emerging markets.", "category": "Economy", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "6d9c926f"}, {"headline": "Sugar output up 7% at 275.28 lakh tonnes till end-April", "summary": "India's sugar production for the 2025-26 season rose 7% to 275.28 lakh tonnes (lt) by end-April. Uttar Pradesh's output was slightly lower, but Maharashtra and Karnataka saw gains. The industry is advocating for an early hike in the minimum selling price (MSP) due to rising production costs and cane arrears.", "category": "Business", "page": 10, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "68192fe2"}, {"headline": "Industry welcomes govt’s move to allow 100% ethanol vehicles", "summary": "Distillers, sugar millers, and traders welcomed the government's move allowing vehicles to run on up to 100% ethanol, paving the way for flexi-fuel vehicles. This is expected to boost demand for surplus grains, strengthen farm incomes, and enhance India’s energy security, with calls for infrastructure development and a 15-year policy.", "category": "Business", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "d1691570"}, {"headline": "Rain, thunderstorms likely as western disturbance crosses into N-W India", "summary": "A western disturbance has entered North-West India, causing cyclonic circulations over Pakistan/Kashmir and Punjab, with a successor disturbance expected by Saturday. This will bring pre-monsoon weather, including rain, thunderstorms, occasional lightning, and possible hail, putting a lid on mercury levels.", "category": "Environment", "page": 10, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "0c8b61e6"}, {"headline": "Kerala planters oppose duty cut on natural rubber", "summary": "The Association of Planters of Kerala (APK) opposed the tyre industry's demand to cut import duties on natural rubber, warning it could depress domestic prices and hurt 12 lakh farmers. APK stressed long-term measures like lowering production costs and improving productivity over duty relief.", "category": "Business", "page": 10, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "0ded6945"}, {"headline": "Marine fish landings post 3% rise in 2025 at 35.7 lakh tonnes", "summary": "India's marine fish production rose a modest 3% to 35.7 lakh tonnes (lt) in 2025, according to CMFRI. Tamil Nadu became the top state with 6.85 lt, surpassing Gujarat. Indian mackerel remained the top species, followed by cephalopods, which saw robust growth.", "category": "Economy", "page": 10, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "7c589a9f"}, {"headline": "Smartphone prices face year-long spike amid memory chip shortfall", "summary": "The Indian smartphone market faces a challenging year, with shipments projected to decline 10-13% in CY26. Sustained component cost inflation, especially a sharp surge in memory chip prices due to AI demand diverting HBM production, will impact affordability, extend replacement cycles, and disproportionately affect entry-level segments.", "category": "Technology", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "16283bdc"}, {"headline": "US FDA proposes new curbs on weightloss drug compounding", "summary": "The US FDA proposed excluding active ingredients for Novo Nordisk and Eli Lilly’s weight-loss drugs (Wegovy, Ozempic, Mounjaro) from the list of drugs outsourcing facilities can compound. If finalized, this would limit compounding unless the drugs are on the agency's shortage list, impacting supply and access.", "category": "Health", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "d3467365"}, {"headline": "Private airports call for increasing user fees to offset losses", "summary": "Private airport operators (APAO) urged the Civil Aviation Ministry to increase user development fees for international passengers to offset revenue loss from a 25% reduction in landing and parking charges for domestic flights. APAO highlighted the significant impact on cash flow and debt servicing due to tariff reduction.", "category": "Business", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "0a859fd1"}, {"headline": "IHCL expands its premium homestay business, adding 10 bungalows", "summary": "Indian Hotels Company Limited (IHCL) is expanding its premium homestay business under the 'ama Stays & Trails' brand, signing 10 new bungalows in the Andaman & Nicobar Islands with a ₹100 crore investment. This expansion caters to evolving preferences for experience-led stays.", "category": "Business", "page": 12, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "a1df95b8"}, {"headline": "SpiceJet flight chaos hits flyers; three Mumbai flights cancelled", "summary": "SpiceJet faced significant disruptions on Wednesday, cancelling three Mumbai flights and delaying two others due to \"operational reasons\" and adverse weather at other airports. Sources cited delayed payments to Mumbai airport and delayed staff salaries, with the airline's on-time performance at Mumbai being only 29%.", "category": "Business", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "8462d1e5"}, {"headline": "Chocolate purchases online surge, driven by quick commerce trends", "summary": "Online penetration in the chocolate segment jumped 65-70% within a year (to ~13%) due to quick commerce, reshaping consumer behavior. Demand is shifting from bulk purchases to high-frequency, bite-sized indulgence, with nearly 20% of orders placed post-9 pm, leading brands to adapt product and pricing strategies.", "category": "Business", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "fffc13ca"}, {"headline": "Products seized in Haryana are counterfeit Mounjaro, says Eli Lilly", "summary": "Eli Lilly and Company confirmed that products recently seized by Haryana drug control authority, falsely branded as its global weight-loss drug Mounjaro (tirzepatide), were counterfeit. The company warned of significant risks to patient safety and urged people to buy only from authorized distributors and licensed pharmacies with a valid prescription.", "category": "Health", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122212", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 01~05~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/122212"}], "article_id": "7cb38d64"}, {"headline": "Spotlight on Fuel Prices as Global Barrels Hit $126", "summary": "Oil marketing companies are seeking urgent hikes in petrol, diesel, and ATF prices as Brent crude surged to $126 per barrel. Despite mounting losses for state-run retailers, the Indian government remains hesitant to allow a price pass-through to consumers to avoid fueling inflation. Global oil markets remain volatile due to escalating tensions in the West Asia region.", "category": "Economy", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/122231", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_01-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122231"}], "article_id": "69060b40"}, {"headline": "Amend Pregnancy Termination Law for Rape Survivors, says SC", "summary": "The Supreme Court urged the Centre to amend abortion laws to prioritize the dignity and rights of rape survivors over rigid time limits. Hearing a plea for a 30-week pregnancy termination, the bench stated that legal frameworks must evolve to reflect the trauma faced by victims, suggesting that statutory limits should not be absolute in cases of sexual assault.", "category": "Law", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/122231", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_01-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122231"}], "article_id": "8a39c2f0"}, {"headline": "War Whispers Spook Rupee, Call Bears to Markets", "summary": "Indian stock indices tumbled and the rupee hit a life-time low of 95.33 against the US dollar before recovering slightly. The market volatility is driven by rising crude prices and rumors of military action in West Asia. The RBI reportedly intervened in the currency market to prevent a further rout as investors shifted toward safe-haven assets.", "category": "Economy", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/122231", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_01-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122231"}], "article_id": "4ec31a38"}, {"headline": "HUL Growth Fastest in 3 Years Amid Commodity Cost Surge", "summary": "Hindustan Unilever Limited (HUL) reported its fastest volume growth in three years for the March quarter. However, the company warned of fresh price hikes as crude oil and palm oil prices rise due to the West Asian conflict. Underlying sales grew by 7%, while profit after tax before exceptional items rose 4% to ₹2,711 crore.", "category": "Business", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/122231", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_01-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122231"}], "article_id": "e5ac5b85"}, {"headline": "More Indians Opt for Rs 1 Crore Health Insurance Cover", "summary": "A growing number of Indians are choosing health insurance policies with a sum insured of ₹1 crore or more. This shift is driven by rising medical inflation and a reduction in GST rates on premium payments for high-value covers. Insurers like Star Health and HDFC Ergo report that these high-value policies now account for nearly a quarter of new business.", "category": "Health", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122231", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_01-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122231"}], "article_id": "27fb5796"}, {"headline": "Govt Pares Vodafone Idea AGR Liabilities by 27%", "summary": "The Department of Telecommunications has cut Vodafone Idea's adjusted gross revenue (AGR) liabilities by 27% following a reassessment. This move provides significant financial relief to the cash-strapped telco, which is in the process of raising funds. The total AGR debt now stands at approximately ₹64,046 crore, down from earlier estimates.", "category": "Technology", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/122231", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_01-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122231"}], "article_id": "18199af4"}, {"headline": "India Flags Italy's Past Defense Supplies to Pakistan", "summary": "During bilateral talks, India's Defense Minister Rajnath Singh informed his Italian counterpart Guido Crosetto that defense technology shared with Italy must not be leaked to Pakistan. India cited historical instances of Italian firms supplying equipment to Pakistan as a concern for future co-development of next-generation weapons systems under the 'Make in India' initiative.", "category": "Politics", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122231", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_01-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/122231"}], "article_id": "1747fb64"}, {"headline": "Amazon and Future Group End Multi-Front Legal Battle", "summary": "Amazon and the Kishore Biyani-led Future Group have agreed to withdraw all legal proceedings against each other, ending a bitter four-year battle. The settlement comes after both parties informed various courts and tribunals of their intent to drop litigation. The dispute originally centered on Future Retail's proposed deal with Reliance Retail.", "category": "Business", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122231", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_01-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/122231"}], "article_id": "7699dfd2"}, {"headline": "ECI Announces QR-Based ID Entry at Counting Centers", "summary": "The Election Commission of India (ECI) has introduced a new QR-based identification system to strengthen security at counting centers for the upcoming poll results. Authorized personnel and polling agents will be issued barcodes to verify their identity through a three-tier security check. The move aims to ensure transparency and efficiency during the counting process.", "category": "Politics", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122231", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_01-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/122231"}], "article_id": "ced076a9"}, {"headline": "Small Caps Rebound in April with Best Month in Decade", "summary": "India's small-cap stocks staged a sharp recovery in April, marking their strongest monthly gain in over ten years. The Nifty Smallcap 250 index jumped 17.1% as investors returned to the segment following a major correction in March. Analysts noted that despite the rally, many small-cap valuations remain attractive compared to large-cap peers.", "category": "Economy", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122231", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_01-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/122231"}], "article_id": "2fcc7ed7"}, {"headline": "RBI Repatriates More Gold from UK to Domestic Vaults", "summary": "The Reserve Bank of India has moved approximately 100 metric tonnes of gold from the UK back to its domestic vaults. This is the first time since the early 1990s that India has moved such a large quantity of gold reserves. The move is seen as part of a strategy to diversify storage locations and manage geopolitical risks more effectively.", "category": "Economy", "page": 12, "importance": 9, "telegram_url": "https://t.me/c/1877410077/122231", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_01-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/122231"}], "article_id": "157a1d9c"}, {"headline": "Air India to Cut 80 Flights Daily as Fuel Costs Bite", "summary": "Air India is set to cancel approximately 80 flights per day as surging jet fuel prices pressure the airline's margins. The cuts primarily affect domestic routes, though some international short-haul flights may also be impacted. The airline cited a nearly 80% increase in fuel costs since February as the primary reason for the capacity reduction.", "category": "Business", "page": 11, "importance": 8, "telegram_url": "https://t.me/c/1877410077/122231", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_01-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/122231"}], "article_id": "94aa95d9"}, {"headline": "IT Firms Expand AI-Smart Entry Level Hiring Playbook", "summary": "Mid-tier and large IT firms are shifting their recruitment focus toward freshers with specialized skills in Artificial Intelligence. Companies like TCS and Infosys are planning to hire over 20,000 freshers each in FY27 to manage costs and build a future-ready workforce. This comes as lateral hiring for middle-management roles remains subdued across the industry.", "category": "Technology", "page": 16, "importance": 8, "telegram_url": "https://t.me/c/1877410077/122231", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_01-05-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/122231"}], "article_id": "13e19cf8"}, {"headline": "Govt Meets Industry on Mythos AI Cybersecurity Risks", "summary": "Government officials from the Ministry of Electronics and Information Technology met with tech industry leaders to discuss the security implications of Anthropic's 'Mythos' AI. The discussions focused on how advanced AI models could potentially identify vulnerabilities in national digital infrastructure and the need for robust domestic defense mechanisms.", "category": "Technology", "page": 16, "importance": 8, "telegram_url": "https://t.me/c/1877410077/122231", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_01-05-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/122231"}], "article_id": "63bf52d9"}, {"headline": "NALCO Reports Record Performance with Net Profit Surge", "summary": "National Aluminium Company Limited (NALCO) achieved a historic milestone in FY26, reporting a net profit of ₹5,816 crore. The company saw its revenue from operations rise to ₹17,843 crore, driven by higher production volumes and efficient cost management. The board has recommended a final dividend of ₹2.50 per share for the fiscal year.", "category": "Business", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122231", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_01-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/122231"}], "article_id": "a1fac0f1"}, {"headline": "Hyderabad Cops Urge RBI to Plug Gaps in Cybercrime", "summary": "The Hyderabad Police Commissioner has written to the RBI Governor highlighting gaps in the banking system that facilitate cybercrime. The letter identifies the misuse of 'mule accounts' to launder defrauded money and calls for stricter KYC norms and real-time monitoring of suspicious transactions. In 2024 alone, the city reported cyber losses of ₹340.71 crore.", "category": "Law", "page": 16, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122231", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_01-05-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/122231"}], "article_id": "cb144413"}, {"headline": "BJP seeks early polls in J&K, says people want change", "summary": "The Bharatiya Janata Party (BJP) has called for early Assembly elections in Jammu and Kashmir, stating that the people of the Union Territory desire a change in governance.", "category": "Politics", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/122177", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 01-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122177"}], "article_id": "025228fc"}, {"headline": "PM Modi to inaugurate Bhumi Pujan for Kanpur Metro, flag off Kanpur-Biawar highway", "summary": "Prime Minister Narendra Modi will perform the 'Bhumi Pujan' for the Kanpur Metro project and inaugurate the Kanpur-Biawar highway, a significant infrastructure development.", "category": "Infrastructure", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/122177", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 01-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/122177"}], "article_id": "bdea55d5"}, {"headline": "Farmers' protest continues, talks with government inconclusive", "summary": "The ongoing farmers' protest against the new farm laws remains unresolved, with the latest round of talks between farmer leaders and the government failing to yield a breakthrough.", "category": "Politics", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/122177 Cong. backs Shiv Sena (UBT) nominee Ambadas Danve", "summary": "The Congress agreed to support Shiv Sena (UBT) nominee Ambadas Danve for the Maharashtra Legislative Council election after marathon meetings. This decision prevents a direct MVA alliance fight. Nine candidates, eight from Mahayuti and one from MVA, are set to be elected unopposed on May 12.", "category": "Politics", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "55f8a166"}, {"headline": "Vijay holds meeting with TVK candidates ahead of poll results", "summary": "Tamilaga Vettri Kazhagam (TVK) president C. Joseph Vijay met with party office-bearers and candidates ahead of the May 4 Assembly election results. Mr. Vijay instructed candidates on counting procedures and sought feedback on victory prospects, despite most exit polls predicting a DMK-led alliance victory.", "category": "Politics", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "7be2d0ce"}, {"headline": "Bihar trapped in vicious cycle of corruption: Tejashwi Yadav", "summary": "Bihar's Leader of Opposition Tejashwi Yadav criticized the BJP-led State government, alleging rampant corruption, collapsed law and order, and financial mismanagement. He stated the NDA administration has wasted six months and lacks clear goals, with power-hungry leaders making \"arbitrary decisions.\"", "category": "Politics", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "866d3de4"}, {"headline": "Maharashtra govt. tells HC it only revoked lapsed Muslim quota ordinance", "summary": "The Maharashtra government informed the Bombay High Court that a February GR did not scrap the 5% reservation for Muslims but only revoked a July 2014 ordinance that lapsed in December 2014. The quota was not implemented after the ordinance lapsed, making certificate issuance redundant.", "category": "Law", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "7e6bee40"}, {"headline": "Union Minister stalling CBI probe into ex-INLD Haryana chief’s murder: family", "summary": "Two years after INLD Haryana president Nafe Singh Rathee was shot dead, his family alleged the CBI investigation is stalled due to \"pressure from a Union Minister.\" His wife, Sheila Rathee, expressed dissatisfaction, and son Bhupender claimed a CBI official privately confirmed external pressure, despite nine individuals named in the FIR.", "category": "Law", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "c72d4d71"}, {"headline": "Road, borewell reach Naxal-hit hamlets on Maharashtra Day", "summary": "On Maharashtra Day, residents of Binagunda, a remote tribal hamlet in Naxal-affected Gadchiroli, celebrate new road connectivity and an electric borewell. Police built a motorable road under protection and installed a deep borewell, improving daily life and reducing reliance on Laheri, 18 km away.", "category": "Infrastructure", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "6eb72d23"}, {"headline": "Jain temple in U.P. issues dress code for women", "summary": "A Digambar Jain temple in Baghpat, Uttar Pradesh, issued a dress code for women devotees, asking them to avoid \"western outfits\" and wear \"modest clothes\" with covered heads. This aims to maintain sanctity, though a Jain conference general secretary termed it a \"publicity stunt.\"", "category": "Culture", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "4a10756a"}, {"headline": "Noida workers’ agitation: arrests push families to brink", "summary": "Families of migrant workers arrested after a violent Noida protest for wage hikes face financial distress. Daman's brother Bablu, a gig worker, was booked for rioting. Balbir, another manufacturing unit employee and sole breadwinner, was also arrested. Families claim \"illegal\" arrests, while police deny wrongdoing.", "category": "India", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "82e6547f"}, {"headline": "Siddaramaiah orders suspension of engineer after Bowring tragedy", "summary": "Karnataka Chief Minister Siddaramaiah ordered the suspension of an executive engineer after seven people died in the Bowring and Lady Curzon Hospital wall collapse. The Lokayukta registered a suo motu case. The city police filed an unnatural death report, not an FIR, amid concerns over negligence.", "category": "Law", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "e6977d56"}, {"headline": "The contradictions and consolidation of power in AAP", "summary": "A feature traces Arvind Kejriwal's 13-year political journey, from anti-corruption crusader to welfarist with Hindu symbolism. The Aam Aadmi Party (AAP) has seen power consolidated around Kejriwal, with founding members expelled and the party's constitution amended. It discusses AAP's electoral success, national party status, and recent challenges like MP defections.", "category": "Politics", "page": 8, "importance": 8, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "70679da4"}, {"headline": "GLP-1 drugs recast obesity, raising body positivity concerns", "summary": "GLP-1 weight-loss drugs are gaining ground in India, challenging traditional body positivity messages as celebrities and individuals opt for them. The drugs recast obesity as a chronic condition, but concerns arise over misuse, the potential for idolizing extreme thinness, and the lack of robust drug regulatory systems in India.", "category": "Health", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "8fa11296"}, {"headline": "Two-day festival showcases Hindustani classical music gharanas", "summary": "A two-day festival, \"Gharanon Ki Swarnim Raaganjali,\" organised by Pracheen Kala Kendra, will feature leading voices of Hindustani classical music. The event will focus on distinct gharana styles through vocal recitals and a jugalbandi, while also recognising senior artistes across traditions.", "category": "Culture", "page": 9, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "4fff4939"}, {"headline": "Exhibition revisits Indian modernism through AA Raiba's work", "summary": "A focused exhibition, \"Master Artist AA Raiba: A Unilateral Eclectic,\" revisits a pivotal phase in Indian modernism, showcasing paintings and drawings by AA Raiba from the 1950s and 1960s. Known for his strong linear style, Raiba's work synthesizes multiple artistic traditions.", "category": "Culture", "page": 9, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "2afc8cfe"}, {"headline": "Stuart Robertson exhibition explores themes of care at hospital", "summary": "A new exhibition by Stuart Robertson, \"Through The Artist’s Eye,\" showcases works created during a residency at Dr Shroff’s Charity Eye Hospital. Using photography, drawing, bronze, and cyanotype, Robertson explores themes of care, observation, and sight within the hospital environment.", "category": "Culture", "page": 9, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "07241107"}, {"headline": "Rajat Kapoor’s ‘Everybody Loves Sohrab Handa’ explores relationships", "summary": "Rajat Kapoor’s murder-mystery \"Everybody Loves Sohrab Handa,\" starring Vinay Pathak and Ranvir Shorey, is streaming on ZEE5. The film, which relies heavily on dialogue and features a theatrical, real-time setting, is a psychological study of a bully, exploring complex relationships between friends, couples, and family.", "category": "Culture", "page": 9, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "15326bb8"}, {"headline": "Explainer: How is the next UN chief being chosen?", "summary": "The election for the next UN Secretary-General is underway, with four candidates having presented their platforms to the General Assembly. The role is crucial as the UN faces deep financial and political crises, Security Council paralysis, and rising global conflicts. The next chief must rejuvenate the organization by focusing on conflict prevention, reform, and sustainable development goals.", "category": "World", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "a9087793"}, {"headline": "Explainer: What happened to Komagata Maru passengers in 1914?", "summary": "In 1914, the Komagata Maru, carrying 376 British subjects from Punjab, was denied entry into Canada under discriminatory laws, leading to a two-month standoff. Upon return to India, passengers faced police firing near Calcutta, killing 20. The incident fuelled India's anti-colonial Ghadar movement and prompted a formal apology from Canada in 2016.", "category": "India", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "47931ac6"}, {"headline": "A century after legal recognition, Indian workers still lack real protection", "summary": "A century after India's Trade Union Act gave workers legal recognition, explainer says that despite the law's intent, procedural constraints and silence on platform workers continue to limit their ability to organise and act. The 2020 labour codes, which replaced 29 laws, preserve some protections but introduce hurdles like long strike notices and high union recognition thresholds.", "category": "India", "page": 13, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "b63b7ef6"}, {"headline": "Greater Nicobar Island project has strategic value, says ex-IAF chief", "summary": "Former Indian Air Force chief R.K.S. Bhadauria (retd), now a BJP member, stated the Greater Nicobar Island project is \"important for India’s military footprint\" due to its strategic location near China’s energy shipment route. He addressed environmental concerns, saying they are mitigated in such projects.", "category": "Infrastructure", "page": 14, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "ec62170b"}, {"headline": "EC to implement QR code-based access at counting centres", "summary": "The Election Commission introduced a QR code-based photo identity card system for entry to counting centres, aiming to eliminate unauthorized persons. This three-tier security mechanism will be applied for the upcoming Assembly elections and all future polls, ensuring transparency and security.", "category": "Politics", "page": 15, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "cb1c1356"}, {"headline": "Congress demands right to vote be made a fundamental right", "summary": "The Congress party called for the right to vote to be made a fundamental, justiciable right in India, arguing it is currently under threat. Congress criticized the Election Commission as \"compromised\" and reiterated demands for Chief Election Commissioner Gyanesh Kumar's removal.", "category": "Politics", "page": 15, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "7ece2f26"}, {"headline": "Parties engage in one-upmanship over women’s reservation bill", "summary": "BJP, BJD, and Congress engaged in political one-upmanship during a special Odisha Assembly session on women's participation in Indian democracy. While CM Majhi (BJP) said the Nari Shakti Vandan Act would be implemented from 2029, former CM Patnaik (BJD) demanded immediate implementation of 33% reservation under existing strength.", "category": "Politics", "page": 15, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "fafd46b7"}, {"headline": "SC asks for first-generation copy of leaked Manipur audio for forensic lab", "summary": "The Supreme Court directed a petitioner-NGO to provide a \"first generation copy\" of leaked audiotapes, allegedly implicating former Manipur CM N. Biren Singh in ethnic violence, to a national forensics lab. Forensic reports on copies have been inconclusive, and the court seeks original evidence.", "category": "Law", "page": 15, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "9af1650f"}, {"headline": "Empty LNG ship enters Strait of Hormuz for loading, signaling normalcy", "summary": "LNG carrier Umm Al Ashtan, which unloaded in Dahej, Gujarat, is heading to cross the Strait of Hormuz to load cargo at Das Island in the UAE. This is one of the first empty ships to transit the strait since the war, giving hope of normalcy returning and indicating LNG production starting at Das Island.", "category": "Economy", "page": 15, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "988fb8c5"}, {"headline": "Gujarat HC asks IIT Gandhinagar to ‘show sympathy’ to student", "summary": "The Gujarat High Court advised IIT Gandhinagar to \"show sympathy\" towards a postgraduate student after she faced exception for her attire. The court noted the student, in her 20s, may not fully understand consequences and had already complied with measures.", "category": "Education", "page": 16, "importance": 3, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "7415ba6e"}, {"headline": "SC asks government to lift abortion time limit for minor rape survivors", "summary": "The Supreme Court asked the Union government to amend the abortion law to remove the time limit for medical termination of pregnancies in minor rape cases. The CJI emphasized protecting the child survivor and called for trials in such cases to be completed within a week, with accused property given to victims.", "category": "Law", "page": 16, "importance": 8, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "63ae05bf"}, {"headline": "₹10,000 airfare increase for Haj pilgrims draws flak", "summary": "The Haj Committee of India's decision to raise Haj airfare by ₹10,000 per pilgrim has drawn criticism from applicants and political leaders. The increase, effective May 15, follows airline requests due to rising aviation fuel prices. Minority Affairs Minister Kiren Rijiju defended the hike as restricted despite steep airline demands.", "category": "India", "page": 16, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "116da689"}, {"headline": "India’s first green methanol plant to convert invasive weed into marine fuel", "summary": "India's first green methanol production plant in Kutch will use the invasive Prosopis juliflora weed as feedstock to produce marine fuel. The plant, built by Thermax Energy and Ankur Scientific, will produce five tonnes daily, cutting vessel CO2 emissions by up to 95%, and supporting India's \"green ports\" policy.", "category": "Science", "page": 16, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "c5ed2443"}, {"headline": "Foreign investors dump ₹60,847 cr. in April, rupee devalues further", "summary": "Foreign investors sold ₹60,847 crore in Indian stocks in April 2026, continuing a two-year capital outflow trend. This outflow contributed to the rupee depreciating by 5.5% between January and April, touching a low of ₹95 a dollar, exacerbated by increasing import bills and global risk sentiment.", "category": "Economy", "page": 17, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "574dd108"}, {"headline": "DIPAM approves NLC India Renewables listing; ₹4,000 cr. IPO in FY27", "summary": "DIPAM has approved the listing of NLC India’s renewable energy arm, NLC India Renewables Ltd (NIRL), with a ₹4,000 crore IPO expected in FY27. This move aligns with the National Monetisation Pipeline and aims to augment NIRL's renewable energy capacity towards 10.11 GW by 2030 and 32 GW by 2047.", "category": "Business", "page": 17, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "5a6bbc9b"}, {"headline": "Invest India grounds $6.1 bn projects in FY26", "summary": "Invest India facilitated the grounding of 60 projects worth over $6.1 billion during FY 2025-26, primarily in chemicals, pharmaceuticals, biotechnology, and food processing. DPIIT Secretary Amardeep Singh Bhatia stated this reflects India's regulatory strength and economic transformation.", "category": "Business", "page": 17, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "de415bc8"}, {"headline": "Apartment prices rise 8-20% in Q1 across top 7 cities", "summary": "Apartment prices rose 8-20% in January-March across India's top seven cities due to increased input costs, according to JLL. Sales grew 8% to 70,631 units, and new supply increased 13% to 90,023 units, suggesting continued appreciation, albeit at a slower pace.", "category": "Business", "page": 17, "importance": 4, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "85a021e9"}, {"headline": "Auto PLI scheme disadvantages EV startups, says Ather Energy CEO", "summary": "EV startups are calling for tweaks to India's auto Production Linked Incentive (PLI) scheme, arguing current eligibility criteria favor legacy OEMs and put new EV manufacturers at a 13-16% cost disadvantage. Ather Energy CEO Tarun Mehta urged more flexible criteria rewarding innovation and R&D.", "category": "Business", "page": 17, "importance": 5, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "68f46abb"}, {"headline": "Zelenskyy seeks details of Putin’s May 9 ceasefire proposal", "summary": "Ukrainian President Volodymyr Zelenskyy is seeking details of a short-term truce Russia proposed to U.S. President Donald Trump. Russian President Vladimir Putin had proposed a May 9 ceasefire to coincide with Victory Day in Russia during a phone call with Mr. Trump.", "category": "World", "page": 18, "importance": 7, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "693ea701"}, {"headline": "EU states U.S. troop deployments in Europe are in U.S. interest", "summary": "EU spokeswoman Anitta Hipper affirmed that U.S. troop deployment in Europe serves U.S. interests by supporting its global role and contributing to Europe's security. This statement follows U.S. President Donald Trump's threat to cut force numbers in Germany.", "category": "World", "page": 18, "importance": 6, "telegram_url": "https://t.me/c/1877410077/122186", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 01-05-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/122186"}], "article_id": "8b70ba22"}, {"headline": "NYC Mayor Mamdani calls on King Charles to return Koh-i-Noor diamond", "summary": "New York City Mayor Zohran Mamdani called for King Charles to \"return\" the Koh-i-Noor diamond, taken by the British Empire from the Indian subcontinent, during th
