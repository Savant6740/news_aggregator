<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Inter', -apple-system, sans-serif;
  background: #0c0c0c; color: #fff; touch-action: none;
}
.outer { position: fixed; inset: 0; overflow: hidden; }
.h-track { display: flex; height: 100%; will-change: transform; }
.cat-panel { flex-shrink:0; width:100vw; height:100%; display:flex; flex-direction:column; overflow:hidden; }
.progress-row { flex-shrink:0; display:flex; gap:4px; padding:14px 16px 10px; background:#0c0c0c; position:relative; z-index:5; overflow:visible; }
.progress-row::after { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:80%; height:120px; background:radial-gradient(ellipse at top,color-mix(in srgb,var(--cc) 30%,transparent) 0%,transparent 70%); pointer-events:none; z-index:-1; }
.pseg { flex:1; height:2px; border-radius:1px; background:rgba(255,255,255,0.12); position:relative; overflow:hidden; }
.pseg::after { content:''; position:absolute; inset:0; background:var(--cc,#e8334a); transform:scaleX(0); transform-origin:left; transition:transform 0.25s ease; }
.pseg.done::after, .pseg.active::after { transform:scaleX(1); }
.v-feed { flex:1; overflow:hidden; position:relative; clip-path:inset(0); }
.v-track { display:flex; flex-direction:column; will-change:transform; }
.card { 
  width:100%; flex-shrink:0; background:#0c0c0c; display:flex; flex-direction:column; 
  overflow:hidden; position:relative; 
  scroll-margin-top: 80px;
}
.card.target-highlight {
  background: linear-gradient(135deg, #fff3cd22 0%, #ffeaa722 100%) !important;
  box-shadow: 0 0 30px rgba(255, 193, 7, 0.4);
  border: 2px solid #f39c12;
  animation: pulse-highlight 2s ease-in-out;
}
@keyframes pulse-highlight {
  0%, 100% { box-shadow: 0 0 30px rgba(255, 193, 7, 0.4); }
  50% { box-shadow: 0 0 50px rgba(255, 193, 7, 0.6); }
}
.card-content { flex:1; display:flex; flex-direction:column; padding:36px 20px 22px; min-height:0; position:relative; z-index:1; }
.card-toprow { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; flex-shrink:0; }
.cat-pill { display:inline-flex; align-items:center; gap:7px; background:#1c1c1e; border-radius:8px; padding:7px 12px 7px 10px; font-size:11.5px; font-weight:700; letter-spacing:0.07em; color:#d0d0d0; text-transform:uppercase; line-height:1; }
.pill-icon { width:16px; height:16px; background:#2e2e30; border-radius:3px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.pill-icon svg { display:block; }
.card-date { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:500; color:#666; letter-spacing:0.01em; }
.card-headline { font-size:28px; font-weight:800; line-height:1.18; color:#fff; letter-spacing:-0.03em; margin-bottom:20px; flex-shrink:0; }
.card-summary { font-size:15.5px; font-weight:400; line-height:1.62; color:#6b6b6b; flex:1; overflow:hidden; display:-webkit-box; -webkit-line-clamp:7; -webkit-box-orient:vertical; }
.card-divider { height:1px; background:#1e1e1e; margin:20px 0 16px; flex-shrink:0; }
.card-footer { display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.src-chip { display:inline-flex; align-items:center; gap:6px; background:#181818; border:1px solid #282828; border-radius:9px; padding:8px 13px; font-size:12.5px; font-weight:600; color:#c0c0c0; text-decoration:none; letter-spacing:0.005em; line-height:1; }
.src-chip-sep { color:#3a3a3a; font-weight:400; }
.src-chip-pg { color:#555; font-weight:500; }
.src-chip-ext { margin-left:2px; }
.src-chip-ext svg { display:block; }
.info-btn { width:36px; height:36px; border-radius:50%; border:1.5px solid #252525; background:#141414; display:flex; align-items:center; justify-content:center; color:#555; cursor:pointer; flex-shrink:0; }
.cat-flash { position:fixed; inset:0; z-index:600; pointer-events:none; opacity:0; transition:opacity 0.12s; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; }
.cat-flash.on { opacity:1; }
.cf-icon { font-size:34px; }
.cf-name { font-size:22px; font-weight:900; letter-spacing:-0.03em; text-transform:uppercase; }
.hint { position:fixed; display:flex; flex-direction:column; align-items:center; gap:5px; pointer-events:none; z-index:400; opacity:0; transition:opacity 0.6s ease; }
.hint.visible { opacity:1; }
.hint.gone { opacity:0 !important; transition:opacity 0.4s; }
.hint-pill { font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.55); background:rgba(255,255,255,0.07); backdrop-filter:blur(10px); padding:5px 13px; border-radius:100px; border:1px solid rgba(255,255,255,0.09); }
.hint-arr { font-size:16px; color:rgba(255,255,255,0.4); }
.h-up { bottom:28px; left:50%; transform:translateX(-50%); animation:bUp 2s ease-in-out infinite; }
.h-right { top:50%; right:14px; transform:translateY(-50%); animation:bRight 2s ease-in-out infinite 0.6s; }
@keyframes bUp { 0%,100% { bottom:28px; opacity:.65; } 50% { bottom:36px; opacity:1; } }
@keyframes bRight { 0%,100% { right:14px; opacity:.65; } 50% { right:6px; opacity:1; } }
</style>

<script>
const DIGEST   = {"date": "11 May 2026", "articles": [{"headline": "India plans UPI-style common network for EV charging", "summary": "The Ministry of Heavy Industries will meet on May 12 to discuss a unified platform for electric vehicle charging. Similar to UPI, the network aims to allow EV owners to locate, access, and pay at any charging station regardless of the operator. The initiative seeks to fix the structural imbalance in India’s charging infrastructure, where most chargers are currently slow-speed.", "category": "Infrastructure", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123352", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_11-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123352"}], "article_id": "5a96c057"}, {"headline": "I-T Dept mulls profiling districts for better revenue and compliance", "summary": "The Income Tax Department is planning to profile districts based on net positive or negative revenue to improve collection and compliance. The strategy involves analyzing various industrial sectors and expanding the tax net by monitoring new specified financial transactions. Initial data indicates Maharashtra is the top revenue contributor, followed by Karnataka and Delhi.", "category": "Economy", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123352", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_11-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123352"}], "article_id": "ac9ccaae"}, {"headline": "5G use-cases stuck in labs as monetisation eludes telcos", "summary": "Four years after the 5G spectrum auction, Indian telecom operators are struggling to monetize the technology. Most use-cases remain confined to testing labs, while revenue is currently driven only by fixed wireless access and 5G slicing. Telcos invested ₹1.61 lakh crore in spectrum but are facing challenges in identifying scaled industrial applications for high-speed connectivity.", "category": "Technology", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123352", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_11-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123352"}], "article_id": "860ee2ff"}, {"headline": "Beverage brands focus on zero-sugar products to meet rising demand", "summary": "Major beverage companies including Coca-Cola, PepsiCo, and Varun Beverages are expanding their zero-sugar and low-sugar portfolios in India. Driven by rising health consciousness among young consumers, brands are launching zero-calorie variants of popular drinks like Thums Up, Sprite, and local favorites like Lahori Zeera. The shift reflects a growing trend toward 'healthier' soft drinks.", "category": "Business", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123352", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_11-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123352"}], "article_id": "35841b31"}, {"headline": "TVK government's first orders focus on free power and safety", "summary": "Immediately after taking office, CM Joseph Vijay signed three key orders fulfilling poll promises. These include providing 100 units of free electricity every two months to domestic consumers, establishing 65 anti-narcotic task forces, and forming the 'Pengal Padai' dedicated women’s protection force. The power subsidy is expected to benefit households consuming less than 500 units.", "category": "Politics", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123352", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_11-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123352"}], "article_id": "782984a8"}, {"headline": "Month-long delay in PAN issuance hits FPI onboarding", "summary": "Foreign Portfolio Investors (FPIs) are facing a month-long halt in the issuance of Permanent Account Numbers (PAN) due to changes in the Common Application Form (CAF) process. Without a PAN, new FPIs cannot open trading or demat accounts, effectively preventing them from investing in Indian securities. Over 20 newly registered FPIs are currently awaiting their allotment.", "category": "Economy", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123352", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_11-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123352"}], "article_id": "cd74cc89"}, {"headline": "RBI and ECB sign MoU to strengthen central banking cooperation", "summary": "The Reserve Bank of India and the European Central Bank have signed a new Memorandum of Understanding to enhance cooperation in central banking. The agreement updates a 2015 framework and focuses on regular policy dialogue and technical information exchange between the two institutions. The move is aimed at fostering international financial stability and institutional learning.", "category": "Economy", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123352", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_11-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123352"}], "article_id": "6686a308"}, {"headline": "Rolls-Royce to increase sourcing from Indian suppliers", "summary": "Rolls-Royce is set to expand its supply chain in India by increasing sourcing from local partners for its aerospace engines. The company recently inaugurated its third co-managed manufacturing unit in Hosur with Sashi Mukundan. Rolls-Royce currently relies on three major Indian suppliers and has a 50:50 joint venture with Hindustan Aeronautics Limited for engine components.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123352", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_11-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123352"}], "article_id": "f463ed47"}, {"headline": "India to resume tourist visas and trade talks with Bangladesh", "summary": "India is set to resume tourist visa services for Bangladeshi nationals as early as late May or June, signaling a normalization of ties. High-level engagements have also restarted following the swearing-in of the new interim government in Dhaka. Discussions are expected to cover trade, border management, and the renewal of the 18-month interim tenure of the Mujibnagar-Kolkata rail link.", "category": "World", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123352", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_11-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123352"}], "article_id": "41da6e59"}, {"headline": "SEBI proposes stricter rules for open-market share buybacks", "summary": "SEBI has proposed a new set of rules to tighten the framework for open-market share buybacks through stock exchanges. The regulator suggests that companies must complete the buyback within 66 working days and utilize at least 40% of the earmarked amount in the first half of the offer period. The move aims to protect shareholder interests and prevent market manipulation.", "category": "Economy", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123352", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_11-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123352"}], "article_id": "7fe34e46"}, {"headline": "PM-Kusum scheme aims for agri-energy security by 2027", "summary": "The Ministry of New and Renewable Energy has extended the PM-KUSUM scheme until March 31, 2027. The project aims to de-dieselise the agricultural sector through solar pumps and grid-connected solar power. As India receives abundant sunlight, the scheme encourages farmers to become 'prosumers' by generating their own electricity and selling excess power back to the grid.", "category": "Infrastructure", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123352", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_11-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123352"}], "article_id": "09c864a8"}, {"headline": "CERC explores capacity markets for better power purchase management", "summary": "The Central Electricity Regulatory Commission (CERC) has issued a staff paper on introducing 'capacity markets' in India. The concept aims to compensate power generators for being available to supply electricity when needed, rather than just for the energy produced. This is intended to ensure grid stability and resource adequacy as the share of variable renewable energy grows.", "category": "Infrastructure", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123352", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_11-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123352"}], "article_id": "a8c14445"}, {"headline": "India exceeds E20 blending target as ethanol hedge pays off", "summary": "India's ethanol blending program has reached a significant milestone, with ethanol production capacity now exceeding the requirement for E20 blending. The shift toward higher blending has helped reduce oil import bills and provided a hedge against global supply disruptions. The government is now moving toward E85 fuel standards and the promotion of flex-fuel vehicles.", "category": "Economy", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123352", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_11-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123352"}], "article_id": "ca609865"}, {"headline": "Liquidation of regulatory assets to aid industrial renewable energy use", "summary": "The Supreme Court's direction to distribution companies to liquidate their regulatory assets is expected to boost the use of renewable energy by industrial consumers. Experts believe this move will lead to more transparent electricity tariffs and encourage C&I sectors to shift toward solar and wind power. Regulatory assets currently represent nearly ₹3 lakh crore in unrecovered costs.", "category": "Infrastructure", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123352", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_11-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123352"}], "article_id": "c886d387"}, {"headline": "Indian IT majors shift focus to AI-first service models", "summary": "Top Indian IT firms, including TCS, Infosys, and Wipro, are pivoting toward AI-first strategies to transform their business models. Companies are moving beyond traditional labor arbitrage to offer integrated AI platforms and generative AI solutions. This shift involves retraining thousands of employees and redesigning service delivery to focus on productivity and high-value outcomes.", "category": "Technology", "page": 7, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123352", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_11-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/123352"}], "article_id": "a1da2a14"}, {"headline": "Pirojsha Godrej emphasizes performance-driven leadership at Godrej Group", "summary": "Godrej Industries Group Chairman-designate Pirojsha Godrej has stated that his leadership will be strictly performance-oriented. As the 129-year-old group undergoes a generational transition, Pirojsha aims to simplify the conglomerate's structure and focus on high-growth areas like real estate and consumer goods. He emphasized that non-performing business units would face scrutiny.", "category": "Business", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123352", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_11-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/123352"}], "article_id": "27d37d3a"}, {"headline": "Adobe opens its seventh India office in Bengaluru", "summary": "Software giant Adobe has inaugurated its seventh office in India, located in Bengaluru. The new facility will serve as a hub for innovation and growth, supporting Adobe's 8,000-strong workforce in the country. The campus is designed to promote employee collaboration and will play a critical role in advancing the company’s AI-driven product ecosystem.", "category": "Business", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123352", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_11-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/123352"}], "article_id": "b415eeca"}, {"headline": "Indian cricketers increasingly invest in and mentor startup founders", "summary": "Indian cricketers like MS Dhoni, Virat Kohli, and KL Rahul are moving beyond brand endorsements to become strategic investors in startups. Players are building diverse portfolios in sectors ranging from health-tech to gaming and smart-home solutions. This trend reflects a shift where athletes leverage their personal brands to create long-term wealth and participate in the startup economy.", "category": "Business", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123352", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_11-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/123352"}], "article_id": "60d233e9"}, {"headline": "Sthyr Energy develops zinc-air battery system for off-grid power", "summary": "Chennai-based startup Sthyr Energy has developed a rechargeable zinc-air battery system designed to store renewable energy for long durations. Unlike lithium-ion batteries, this system uses zinc as an energy carrier and does not self-discharge, making it suitable for seasonal energy storage. The technology aims to provide a cost-effective solution for off-grid industrial and rural use.", "category": "Science", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123352", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_11-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/123352"}], "article_id": "20d29d1b"}, {"headline": "Central Bank of India targets ₹10-lakh crore business by 2028", "summary": "The Central Bank of India (CBoI) has set an ambitious target to cross the ₹10-lakh crore business mark by March 2028. MD and CEO Kalyan Kumar stated that the bank will focus on digital transformation and expanding its branch network to drive growth. The bank aims to grow its non-interest income and maintain a healthy credit-to-deposit ratio while targeting the MSME and retail sectors.", "category": "Business", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123352", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_11-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/123352"}], "article_id": "bc731d57"}, {"headline": "Indian money market sees shift toward CD issuance", "summary": "The Indian money market is experiencing a significant shift as banks increasingly rely on Certificate of Deposit (CD) issuance to manage liquidity. This change is driven by a slowdown in bank credit growth and shifts in investor behavior within the mutual fund industry. Narrowing spreads between 3-month CDs and T-bills reflect evolving supply-demand dynamics in the short-term market.", "category": "Economy", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123352", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_11-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/123352"}], "article_id": "cb25d1ec"}, {"headline": "CBDT introduces Nudge 2.0 to improve foreign asset reporting", "summary": "The Central Board of Direct Taxes (CBDT) has launched 'Nudge 2.0', a program that uses automated e-portal alerts to remind taxpayers to report foreign assets and income correctly. The initiative aims to reduce offshore tax evasion by using data-driven insights. SMSS and emails are being sent to individuals where discrepancies are identified in their previous income tax returns.", "category": "Economy", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123352", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_11-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/123352"}], "article_id": "bb683d92"}, {"headline": "Noida Airport airfares remain high despite lower fuel taxes", "summary": "Ticket prices for flights from the upcoming Noida International Airport are currently at par with Delhi's IGI Airport, despite Uttar Pradesh offering a lower tax on aviation turbine fuel. Industry experts suggest that high aeronautical charges and user development fees at the new airport are offsetting the benefits of lower fuel taxes, making it difficult for airlines to offer lower fares.", "category": "Infrastructure", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123352", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_11-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/123352"}], "article_id": "4496fcee"}, {"headline": "PM Modi Urges Austerity Measures Amid Global Energy Crisis", "summary": "Prime Minister Narendra Modi called on Indians to reduce fuel consumption, avoid gold purchases for one year, and postpone foreign travel. Speaking in Hyderabad, he framed these measures as a national duty to save foreign exchange as India grapples with the economic fallout of the West Asian energy crisis. He also encouraged a return to work-from-home protocols to conserve resources.", "category": "Economy", "page": 5, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123358", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi  11-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123358"}], "article_id": "147f9e98"}, {"headline": "Congress and Left Reject Mamata’s Offer for Anti-BJP Front", "summary": "In West Bengal, the Congress and Left parties have officially rejected Trinamool Congress chief Mamata Banerjee's proposal to form a united platform against the BJP. Banerjee had called for all opposition parties, NGOs, and student groups to unite, but rivals cited deep-seated political differences and issues with her previous governance as reasons for the rejection.", "category": "Politics", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123358", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi  11-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123358"}], "article_id": "a55080b7"}, {"headline": "Madras HC Raps Election Commission Over Disputed Postal Ballot", "summary": "The Madras High Court has directed the Election Commission to explain its failure to respond to representations by DMK leader KR Periyakaruppan. The candidate lost the Tiruppattur seat by a single vote and alleges a postal ballot was wrongly sent to a different constituency and rejected. The court questioned why the EC remained silent after the results were declared.", "category": "Law", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123358", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi  11-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123358"}], "article_id": "0cbc5ed3"}, {"headline": "Netanyahu Says Iran War Requires Removal of Enriched Uranium", "summary": "Israeli Prime Minister Benjamin Netanyahu stated that the conflict with Iran cannot end until the country's stockpile of enriched uranium is removed and its enrichment sites are dismantled. In an interview, he suggested that while he prefers a diplomatic agreement, physical removal of the nuclear material is a necessary condition for permanent peace.", "category": "World", "page": 5, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123358", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi  11-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123358"}], "article_id": "928ac978"}, {"headline": "Tehran Responds to US Truce Plan via Pakistani Mediators", "summary": "Iran has submitted its response to the latest US ceasefire proposal through Pakistan. Tehran is seeking a permanent end to the war on all fronts, including Lebanon, and guarantees for the security of shipping in the region. The White House has not yet commented on the specific terms, while US officials indicate a desire for diplomacy before returning to hostilities.", "category": "World", "page": 5, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123358", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi  11-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123358"}], "article_id": "ba7ade3b"}, {"headline": "PM Modi Accuses Congress of Backstabbing Longtime Ally DMK", "summary": "Addressing BJP workers in Bengaluru, PM Narendra Modi attacked the Congress for severing ties with the DMK in Tamil Nadu. He labeled the Congress a 'parasitic' party that abandons regional allies once its immediate political interests are met. He also claimed the Karnataka government is too focused on internal power struggles to manage effective governance.", "category": "Politics", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123358", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi  11-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123358"}], "article_id": "295def01"}, {"headline": "Student Suicides in India Reach Decade High of 14,488", "summary": "According to new NCRB data, student suicides in India rose by 4.3% in 2024, reaching the highest level in ten years. While overall suicides in the country saw a marginal decline, the student crisis deepened, with Maharashtra, Uttar Pradesh, and Madhya Pradesh reporting the highest numbers. Experts point to academic pressure and weak mental health support systems as primary drivers.", "category": "Health", "page": 5, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123358", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi  11-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123358"}], "article_id": "aa5c4815"}, {"headline": "IMD Issues Yellow Alert for Rain and Wind in Delhi", "summary": "The India Meteorological Department has issued a yellow alert for Delhi NCR as a fresh western disturbance is expected to bring light rain and gusty winds up to 50 km/hr. Temperatures are forecast to remain below normal, ranging between 35-39°C through Wednesday, providing a brief respite from the summer heat before mercury levels rise again toward the weekend.", "category": "Environment", "page": 5, "importance": 4, "telegram_url": "https://t.me/c/1877410077/123358", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi  11-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123358"}], "article_id": "70a42849"}, {"headline": "Delhi Orders Removal of Dangerous Trees Before Monsoon Season", "summary": "The Delhi government has mandated an immediate survey and removal of trees at risk of collapse along the 1,400-km PWD road network. Zonal officials must complete the survey by May 15 and remove hazards by May 31. The order aims to prevent fatal accidents caused by uprooted trees during heavy rains and thunderstorms, following multiple deaths reported last year.", "category": "Infrastructure", "page": 5, "importance": 4, "telegram_url": "https://t.me/c/1877410077/123358", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi  11-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123358"}], "article_id": "f952f718"}, {"headline": "Delhi Women to Receive ₹2,500 Monthly Aid from June 1", "summary": "The Delhi government is set to launch its flagship welfare scheme providing ₹2,500 monthly to eligible women starting June 1. The program targets women over 18 from families earning less than ₹2.5 lakh annually. Only one woman per household is eligible, and applicants must not be government employees or currently receiving other state pensions.", "category": "India", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123358", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi  11-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123358"}], "article_id": "f44b0312"}, {"headline": "Gorakhpur Wedding Clash Over Spilled Curry Leaves One Dead", "summary": "A dispute over chicken curry spilling on a guest's clothes at a wedding in Uttar Pradesh's Gorakhpur district escalated into a violent clash, resulting in one death and six injuries. Seven people have been arrested in connection with the incident. Local police officials have suspended an outpost in-charge following the tragedy.", "category": "India", "page": 5, "importance": 3, "telegram_url": "https://t.me/c/1877410077/123358", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi  11-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123358"}], "article_id": "9f8e39d1"}, {"headline": "UK Labour Party Faces Historic Losses in Local Elections", "summary": "Keir Starmer's Labour government suffered a major blow in the 2026 UK local elections, with its projected national vote share falling to 17%, its lowest since 1982. Reform UK and the Green Party made significant gains, eating into Labour's traditional support base. Voters expressed deep dissatisfaction with the government's handling of the economy, health, and immigration.", "category": "Politics", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123358", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi  11-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123358"}], "article_id": "8090f339"}, {"headline": "Fifteen Security Officials Killed in Pakistan Suicide Bombing", "summary": "At least 15 security personnel were killed and several others injured in a suicide vehicle attack and subsequent ambush at a police post in Bannu, Khyber Pakhtunkhwa. A newly formed militant group claimed responsibility for the blast, which razed the police post and nearby houses. Heavy exchange of fire followed the explosion as militants launched a ground assault.", "category": "World", "page": 6, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123358", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi  11-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123358"}], "article_id": "2039b06c"}, {"headline": "Caspian Sea Shipping Routes Vital to Iran’s War Supplies", "summary": "With the Strait of Hormuz effectively blockaded, Iran and Russia are increasingly using the Caspian Sea as a maritime bridge for trade and military transfers. The US reports that drone components are being moved through this route. The waterway's unique geography makes it difficult for Western navies to monitor, allowing for sanctioned goods to move discreetly between ports.", "category": "World", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123358", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi  11-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123358"}], "article_id": "5f04768c"}, {"headline": "Global Ocean Temperatures Near Record Highs as El Nino Approaches", "summary": "Average global sea surface temperatures reached 21°C this April, the second-highest ever recorded for the month. Data from the Copernicus Climate Change Service shows rapid warming in the central equatorial Pacific. This trend signals a strong upcoming El Nino event, which typically correlates with harsher summers and weaker monsoons in India.", "category": "Environment", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123358", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi  11-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123358"}], "article_id": "1d2edd5e"}, {"headline": "Delhi Teachers Flag Conflict Over Census and Remedial Duties", "summary": "The Delhi Government Schools Teachers’ Association has written to the education minister regarding overlapping schedules for remedial classes and census enumeration duties. Both assignments are set to run concurrently in mid-May, with teachers arguing it is technically unfeasible to perform both effectively. The government has granted principals flexibility to manage the overlap locally.", "category": "Education", "page": 7, "importance": 3, "telegram_url": "https://t.me/c/1877410077/123358", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi  11-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/123358"}], "article_id": "cafb6d19"}, {"headline": "Delhi Plans ₹21,068 Crore Drainage Overhaul to Stop Waterlogging", "summary": "The Delhi government has finalized the first phase of its drainage master plan, allocating ₹21,068 crore over three years. The project involves six departments and aims to remodel 18,958km of drains across the Najafgarh, Barapullah, and Trans-Yamuna basins. Priority interventions will focus on chronic waterlogging points to prepare the city for future monsoon seasons.", "category": "Infrastructure", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123358", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi  11-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/123358"}], "article_id": "eaf300bf"}, {"headline": "Helmet Violations Top Traffic Complaints on Delhi Citizen App", "summary": "Delhi Traffic Police reported over 1.25 lakh violations through the 'Traffic Prahari' app in early 2026. Riding without a helmet accounted for nearly 61,000 complaints, followed by driving against the flow of traffic. The citizen-participation initiative has reached 10 lakh registered users, allowing residents to report dangerous driving and illegal parking directly via smartphones.", "category": "Infrastructure", "page": 8, "importance": 2, "telegram_url": "https://t.me/c/1877410077/123358", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi  11-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/123358"}], "article_id": "492ab425"}, {"headline": "Railways Approves Key Road Projects to Decongest Northwest Delhi", "summary": "The Northern Railways has granted in-principle approval for widening the Haiderpur-Badli railway bridge and constructing an elevated loop connecting Shalimar Bagh to Sanjay Gandhi Transport Nagar. These projects target major bottlenecks at Mukarba Chowk and Outer Ring Road. Construction will follow strict safety standards to ensure no disruption to railway operations.", "category": "Infrastructure", "page": 9, "importance": 4, "telegram_url": "https://t.me/c/1877410077/123358", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi  11-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/123358"}], "article_id": "17742076"}, {"headline": "Rare Albino Nilgai Spotted in Wilderness of JNU Campus", "summary": "An adult female albino nilgai, featuring a striking white coat due to a rare genetic mutation, has been spotted by researchers inside the Jawaharlal Nehru University campus. Experts believe this is the only such individual in the National Capital Region. The university is taking steps to protect the animal from campus traffic and stray dogs in its southern Ridge habitat.", "category": "Science", "page": 9, "importance": 3, "telegram_url": "https://t.me/c/1877410077/123358", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi  11-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/123358"}], "article_id": "db9ddd96"}, {"headline": "India’s Demographic Dividend at Risk Due to High Graduate Unemployment", "summary": "A new report by Azim Premji University warns that India's large youth population is not translating into economic gains. Data shows a significant influx of graduates into a labor market that lacks suitable high-earning jobs. Consequently, entry-level salaries for young men have stagnated or fallen, with many forced into low-productivity sectors like construction and retail.", "category": "Economy", "page": 13, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123358", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi  11-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/123358"}], "article_id": "f22d3191"}, {"headline": "Aramco CEO Warns of Prolonged Global Oil Supply Disruption", "summary": "Saudi Aramco CEO Amin Nasser stated that the world has lost 1 billion barrels of oil supply due to the Strait of Hormuz closure. He warned that even if the waterway reopens immediately, it would take months for the market to rebalance. The company reported a 26% jump in quarterly profits as it utilizes alternate pipelines to bypass the conflict zone.", "category": "Business", "page": 17, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123358", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi  11-05-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/123358"}], "article_id": "e0315bf3"}, {"headline": "EPFO Mandates Equal Benefits for Private Trust Employees", "summary": "The Employees' Provident Fund Organisation has issued a new standard operating procedure for over 1,250 private PF trusts. These trusts, which manage life savings for 3.2 million workers, must now offer benefits at least equal to the government-run scheme. Non-compliance will lead to the immediate cancellation of their exemption status and a transfer of funds to the central pool.", "category": "Business", "page": 18, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123358", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Delhi  11-05-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/123358"}], "article_id": "b81991fd"}, {"headline": "Edtech firm Adda247 lays off 20% of its workforce", "summary": "Gurugram-based edtech startup Adda247 has laid off approximately 200 employees, nearly 20% of its 1,000-member workforce. The job cuts primarily affected the CUET and UPSC teaching units. Backed by Google and WestBridge Capital, the company is reportedly streamlining operations and cutting costs ahead of a planned stock market listing.", "category": "Business", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123343", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_11-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123343"}], "article_id": "5e56ebf0"}, {"headline": "Coal India to invest ₹1 lakh crore for diversification by 2031", "summary": "Coal India Limited (CIL) plans to invest ₹1 lakh crore through FY2031 on mine modernization, coal gasification, and renewable energy. Chairman B. Sairam stated the company is shifting to a demand-based production strategy to reduce pithead stocks from 13 crore tonnes to 5 crore tonnes. CIL may also explore the debt market for the first time for these projects.", "category": "Business", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123343", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_11-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123343"}], "article_id": "e80bd006"}, {"headline": "Infrastructure projects worth ₹1.5 lakh crore stalled in West Bengal", "summary": "Over 84 central infrastructure projects, including railways and the Kolkata Metro, are stalled in West Bengal due to land acquisition hurdles. The estimated cost is ₹1.5 lakh crore. The Railway Ministry identified 17 major projects facing delays, with some seeing cost escalations of over ₹11,000 crore. Tajpur Port development is also expected to see movement.", "category": "Infrastructure", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123343", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_11-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123343"}], "article_id": "3d200bb2"}, {"headline": "Petrol and diesel prices likely to rise amid global tensions", "summary": "Fuel prices in India may increase as oil marketing companies (OMCs) face losses of ₹30,000 crore monthly due to rising crude costs linked to the West Asia conflict. Crude prices have crossed $100 per barrel. Experts suggest a 20% hike in retail prices may be necessary to offset financial pressure, though the government has tried to maintain price stability so far.", "category": "Economy", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123343", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_11-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123343"}], "article_id": "bfe1619e"}, {"headline": "Balrampur Chini Mills raises ₹450 crore for bioplastic project", "summary": "Balrampur Chini Mills has raised ₹450 crore in equity to fund its new Poly Lactic Acid (PLA) bioplastic plant in Uttar Pradesh. The facility will have an annual capacity of 80,000 tonnes. This marks the company's strategic entry into the sustainable bioplastic manufacturing sector as part of its capital expenditure plans.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123343", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_11-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123343"}], "article_id": "83b92f0a"}, {"headline": "Pidilite Industries considers price hikes due to rising costs", "summary": "Pidilite Industries, the manufacturer of Fevicol, is evaluating price increases for its adhesives and construction chemicals. The move follows a surge in raw material prices and logistics costs caused by the geopolitical crisis in West Asia. The company aims to protect its margins against inflationary pressure on its supply chain.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123343", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_11-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123343"}], "article_id": "661b366c"}, {"headline": "Auto industry faces supply chain hurdles from West Asia conflict", "summary": "The Indian automobile industry is grappling with rising commodity prices and logistics delays due to West Asia tensions. Manufacturers like Bajaj Auto and Hero MotoCorp have flagged concerns over increased costs for metals and battery materials. The situation is impacting profit margins and export schedules as shipping costs rise.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123343", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_11-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123343"}], "article_id": "aea0db66"}, {"headline": "SIAM seeks extension for Delhi EV Policy feedback", "summary": "The Society of Indian Automobile Manufacturers (SIAM) plans to request more time from the Delhi government regarding its draft EV policy. The draft proposes a ban on registering new CNG three-wheelers by January 2027, mandating a shift to electric vehicles. SIAM members are currently deliberating on a unified stance regarding this transition.", "category": "Environment", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123343", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_11-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123343"}], "article_id": "cc0f3d21"}, {"headline": "India’s M&A market expected to remain strong: Rajesh Singhi", "summary": "Rajesh Singhi of Standard Chartered Bank states that India's merger and acquisition (M&A) market remains resilient despite global volatility. Annual deal activity is expected to hover around $200 billion, driven by sovereign wealth funds and investments in energy transition and digital infrastructure. Cross-border deals are also gaining momentum.", "category": "Business", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123343", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_11-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123343"}], "article_id": "6819c8ff"}, {"headline": "Flipkart uses AI to support small-town sellers", "summary": "E-commerce giant Flipkart is deploying AI tools to help 1.4 million sellers in small towns with demand forecasting and pricing. These tools, available in Hindi and regional languages, provide analysis of market trends. The initiative aims to strengthen the nationwide reach of local entrepreneurs and artisans through the digital marketplace.", "category": "Technology", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123343", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_11-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123343"}], "article_id": "6373d8fd"}, {"headline": "FMCG companies plan price hikes to tackle rising input costs", "summary": "Major FMCG companies are preparing for phased price increases for soaps, biscuits, and packaged foods. Rising costs of packaging, chemicals, and fuel have pressured margins. While companies have already raised prices by up to 5%, further hikes or reduced pack sizes (grammage cuts) are expected to offset ongoing inflationary trends.", "category": "Economy", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123343", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_11-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123343"}], "article_id": "03a52c57"}, {"headline": "Titan reports 81% revenue growth driven by jewelry demand", "summary": "Titan Company recorded a consolidated revenue increase of 81% in Q4, primarily fueled by its jewelry division. Despite high gold prices, demand remained strong with an 8% increase in customers. However, margins were pressured due to high marketing expenses for CaratLane and losses in international operations.", "category": "Business", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123343", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_11-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123343"}], "article_id": "19a6780b"}, {"headline": "Active equity schemes’ share in mutual fund AUM declines", "summary": "The share of active equity schemes in the mutual fund industry's Assets Under Management (AUM) has dropped from 44.8% to 43.4%. Data from AMFI shows that passive funds and hybrid schemes are gaining popularity, while active schemes saw a decline for the first time since the pandemic. Investors are increasingly favoring low-cost index funds and ETFs.", "category": "Business", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123343", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_11-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123343"}], "article_id": "fcc42912"}, {"headline": "NSE to launch RTCM mechanism to curb circular trading", "summary": "The National Stock Exchange (NSE) will implement a 5-day rolling Reverse Trade Cancellation Mechanism (RTCM) from Monday. The system is designed to identify and cancel trades that indicate circular or non-genuine volume creation within a specific period. This move aims to enhance market integrity and monitor intra-day trading patterns more effectively.", "category": "Business", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123343", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_11-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123343"}], "article_id": "be4c0c67"}, {"headline": "Coal India plans to list BCCL and CMPDI subsidiaries", "summary": "In an interview, Coal India CMD B. Sairam confirmed plans to list its subsidiaries BCCL and CMPDI on the stock exchange. CIL is targeting an August-September timeline for clarity on the stake sale, potentially divesting 25%. This is part of a broader reform strategy involving 60 operational improvements including AI integration in coal exploration.", "category": "Business", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123343", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_11-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123343"}], "article_id": "097cf9ad"}, {"headline": "NTPC to seek AEC approval for 1,400 MW nuclear plants", "summary": "NTPC Limited will approach the Atomic Energy Commission (AEC) for approval to set up indigenous 1,400 MW Pressurized Heavy Water Reactors (PHWR). The company aims to reach 30 GW nuclear capacity by 2047. Sites in 14 states are being evaluated, with Bihar's Banka district already granting permission for a new nuclear power plant.", "category": "Infrastructure", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123343", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_11-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123343"}], "article_id": "5afce06a"}, {"headline": "CMS Info Systems wins ₹400 crore contract from HDFC Bank", "summary": "CMS Info Systems has secured a 5-year contract from HDFC Bank worth ₹400 crore for integrated ATM management. The company will manage 6,000 ATMs, providing maintenance, logistics, and AI-driven security solutions. This deal marks a significant shift toward integrated outsourcing for banking payment infrastructure.", "category": "Business", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123343", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_11-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123343"}], "article_id": "7f1138c1"}, {"headline": "CII urges government to cut excise duty on petrol and diesel", "summary": "The Confederation of Indian Industry (CII) has requested the central government to reduce the special additional excise duty on petrol and diesel by ₹10 per litre. CII argues that as crude prices stabilize, a phased reduction over six months will lower input costs for the industry and provide relief to consumers without causing fiscal shocks.", "category": "Economy", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123343", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_11-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123343"}], "article_id": "51a963dc"}, {"headline": "Government to restrict manual editing in GST returns", "summary": "The Finance Ministry is planning to ban manual editing of auto-populated data in GSTR-3B forms. The goal is to ensure data consistency between GSTR-1 (sales) and GSTR-2B (purchases) to prevent tax evasion. This shift toward a non-editable automated return system will be reviewed by the Law Committee before being presented to the GST Council.", "category": "Economy", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123343", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_11-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123343"}], "article_id": "fc884b9a"}, {"headline": "Final rules for four new Labour Codes notified by Centre", "summary": "The central government has notified the final draft rules for four labour codes: Wages, Industrial Relations, Social Security, and Occupational Safety. This completes the legislative framework six years after parliamentary approval. The rules redefine salary components, affect gratuity and PF calculations, and set standards for overtime and worker health checks.", "category": "Law", "page": 4, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123343", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_11-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123343"}], "article_id": "25282afe"}, {"headline": "New COVID-like virus discovered in Thai horseshoe bats", "summary": "Researchers in Thailand have discovered a new strain of Sarbecovirus in horseshoe bats that shares similarities with SARS-CoV-2. A study published in 'Cell' indicates that the virus can bind to human ACE2 receptors. While no human infections are reported, scientists recommend close monitoring of animal viruses to prevent future pandemics.", "category": "Health", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123343", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_11-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/123343"}], "article_id": "e136970b"}, {"headline": "PM Modi inaugurates projects worth ₹9,400 crore in Telangana", "summary": "Prime Minister Narendra Modi inaugurated and laid foundations for projects worth ₹9,400 crore in Telangana, including the PM MITRA Mega Textile Park in Warangal. He called for the efficient use of petroleum products given the West Asia crisis. He also inaugurated several railway and highway expansions to modernize the state's infrastructure.", "category": "Politics", "page": 10, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123343", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_11-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/123343"}], "article_id": "054cbf4a"}, {"headline": "Trump and Xi Jinping to Hold Two-Day Summit in Beijing", "summary": "US President Donald Trump and Chinese President Xi Jinping will meet in Beijing on 14-15 May. The summit aims to stabilize relations amidst trade disruptions, US tariffs, and geopolitical tensions over Taiwan and the South China Sea. Trump seeks commitments for Chinese purchases of US agricultural products and Boeing aircraft, while China seeks predictability in trade tariffs.", "category": "World", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/123306", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_11-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123306"}], "article_id": "764c7c71"}, {"headline": "India Fertilizer Subsidy Bill Risks Surge Amid US-Iran War", "summary": "Disruptions from the US-Israel military strikes on Iran have caused global urea prices to surge by 81%. While India reports sufficient stocks for the kharif season, it remains heavily dependent on West Asian imports for urea, DAP, and natural gas. Historical data suggests global price spikes nearly double India's subsidy bill, which is budgeted at ₹1.7 trillion for 2026-27.", "category": "Economy", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123306", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_11-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123306"}], "article_id": "36847411"}, {"headline": "Centre Explores IPO for Jawaharlal Nehru Port Authority", "summary": "The Indian government has engaged investment banks to initiate an initial public offering (IPO) for JNPA, the country's largest container port. Part of the National Monetisation Pipeline, the share sale follows JNPA's 52% jump in net profit to ₹2,053 crore in FY25. The process is in preliminary stages, requiring approvals from the ports ministry and the port authority.", "category": "Business", "page": 3, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123306", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_11-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123306"}], "article_id": "fb473dae"}, {"headline": "Sebi Panel Backs Cash Settlements for Select Agri Derivatives", "summary": "A Sebi working group has recommended allowing cash settlements up to fixed thresholds for specific agricultural commodities like pepper, turmeric, and guar. Currently, physical delivery is mandatory for all farm derivatives. The move aims to deepen the sector and increase participation, which has remained thin compared to the booming metals and energy derivatives segments.", "category": "Economy", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123306", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_11-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123306"}], "article_id": "9e1e0c0d"}, {"headline": "Automakers Scramble to Contain Surging Raw Material Costs", "summary": "Indian automakers are cutting discounts, delaying discretionary spending, and stockpiling supplies to offset a 40-50% rise in commodity prices. Firms like Hero MotoCorp and Bajaj Auto fear that passing on costs to consumers could derail demand. Prices of key materials like aluminum and platinum group metals have surged since the start of the US-Iran conflict.", "category": "Business", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123306", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_11-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123306"}], "article_id": "a6ee1f94"}, {"headline": "India's Retail Inflation Expected to Rise to 3.8% in April", "summary": "A Mint poll of 20 economists predicts retail inflation rose to 3.8% in April from 3.4% in March. The increase is attributed to firming food prices, specifically edible oils and vegetables, and fading base effects. While core inflation remains stable, economists warn of upside risks from global crude prices and weather-related disruptions to the upcoming monsoon.", "category": "Economy", "page": 3, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123306", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_11-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123306"}], "article_id": "cc80d190"}, {"headline": "Govt Capex Triggers Revival in Private Investment, Says CII", "summary": "The Confederation of Indian Industry (CII) reported that government infrastructure spending has successfully crowded in private capital expenditure. Private capex rose 67% year-on-year to ₹7.7 trillion in the year to September 2025. Manufacturing led the growth, contributing ₹3.8 trillion, while factory capacity utilization rose to 75.6% in the second quarter of FY26.", "category": "Economy", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123306", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_11-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123306"}], "article_id": "5afc4f27"}, {"headline": "India to Crack Down on Illegal Sexual Enhancement Drugs", "summary": "The Drugs Controller General of India (DCGI) has ordered a crackdown on the unauthorized sale of sexual enhancement medicines like sildenafil and tadalafil. The regulator cited public health risks and social concerns regarding unregulated sales to youth. Action includes raids on illegal clinics and online platforms, alongside stricter monitoring of prescription compliance.", "category": "Health", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123306", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_11-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123306"}], "article_id": "9a369054"}, {"headline": "Centre Sets Modest 10,000km Highway Construction Target for FY27", "summary": "The government aims to construct 10,000km of highways in FY27, maintaining the same target as the previous year. The focus is on clearing delayed projects and reviving private investment through the build-operate-transfer (BOT) model. The ministry expects approximately 2,500km of the planned awards to be bid out under the BOT model, totaling over ₹1 trillion.", "category": "Infrastructure", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123306", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_11-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123306"}], "article_id": "fd467297"}, {"headline": "Resonance Eduventures Completes 90% of Debt Resolution Exercise", "summary": "Kota-based test prep firm Resonance Eduventures is nearing the end of its debt resolution, with over 90% of lenders selling their exposure to ACRE. The restructuring could see lenders take a near 80% haircut on principal claims. Founder Ram Kishan Verma expects the recovery of offline coaching demand and student enrollments to drive a fresh growth phase for the brand.", "category": "Business", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123306", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_11-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123306"}], "article_id": "04f6d9c9"}, {"headline": "Rolls-Royce Pursues Strategic Partnerships for Defense and Nuclear Sectors", "summary": "Aerospace giant Rolls-Royce aims to make India its fourth home market by embedding itself in the country's industrial ecosystem. The firm is competing to power India's Advanced Medium Combat Aircraft (Amca) and is open to transferring technology and developing intellectual property locally. CEO Tufan Erginbilgic has reportedly indicated plans to invest up to $10 billion in India.", "category": "Business", "page": 5, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123306", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_11-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123306"}], "article_id": "df568ee6"}, {"headline": "BigBasket Prioritizes Profitability Over Market Share in Quick Commerce", "summary": "Tata-owned BigBasket is focusing on improving profitability even if it requires surrendering market share to rivals like Blinkit and Zepto. Co-founder Vipul Parekh stated that being profitable is more important than being a top-three player. The company’s revenue fell 1.9% to ₹9,866.7 crore in FY25, while its net loss widened to ₹2,006.8 crore as it shifts focus to BB Now.", "category": "Business", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123306", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_11-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123306"}], "article_id": "3ef014b8"}, {"headline": "Pidilite Implements Price Hikes to Protect Margins Amid Cost Inflation", "summary": "Adhesives maker Pidilite Industries has raised prices by 5-7% in May to offset a surge in vinyl acetate monomer (VAM) costs, which jumped from $840 to $1,800 per tonne. Despite higher input costs, the firm is confident of maintaining Ebitda margins in the 20-24% range. Volume growth remains strong, with the consumer and bazaar segment growing 15.4% in the fourth quarter.", "category": "Business", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123306", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_11-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123306"}], "article_id": "571d8982"}, {"headline": "Alphabet Nears Nvidia as World's Largest Company by Market Cap", "summary": "Alphabet Inc. is on the brink of overtaking Nvidia Corp. in market valuation, reaching $4.8 trillion after a 43% stock surge over the last six months. Investors are betting on Alphabet's dominant position across the AI ecosystem, including its Gemini model and TPU chips. The company posted stronger-than-expected growth in its search and cloud businesses during recent earnings.", "category": "Technology", "page": 6, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123306", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_11-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123306"}], "article_id": "f30fdcb0"}, {"headline": "Axis Bank Remains Selective on Corporate Credit to Protect Margins", "summary": "Axis Bank is focusing on high-growth sectors like data centers and renewables while avoiding aggressively priced loans to state-run firms. The bank reported 38% growth in corporate loans in the March quarter. Group executive Vijay Mulbagal emphasized that the bank will not participate in \"bidding games\" for low-yield PSU loans as it seeks to maintain its risk-adjusted return on capital.", "category": "Business", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123306", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_11-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123306"}], "article_id": "c2f99754"}, {"headline": "Jupiter Wagons Eyes Global Expansion Through BESS and Freight Exports", "summary": "Rail engineering firm Jupiter Wagons plans to double its revenue by 2028-29 by scaling exports of battery energy storage systems (BESS) and freight wagons. The company targets 20-25% of its revenue from exports in the coming years. It is also entering the passenger coach and metro train manufacturing segments through international partnerships to tap the global market.", "category": "Infrastructure", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123306", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_11-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123306"}], "article_id": "59967a34"}, {"headline": "Sports Goods Hubs Face Mounting Costs from West Asia War", "summary": "Manufacturing hubs in Jalandhar and Meerut are struggling with a 50% rise in petrochemical-based raw material prices. The cost of HDPE has risen to ₹160 per kg, and rubber to ₹235 per kg, squeezing margins for equipment like helmets and hockey sticks. Manufacturers are cutting production or raising prices, which may impact India's $2 billion sports goods export market.", "category": "Business", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123306", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_11-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/123306"}], "article_id": "c820337a"}, {"headline": "Delhi High Court Reserves Verdict on C-DOT Emergency Alert System", "summary": "The Delhi High Court has reserved its judgment on a plea by Germany’s Utimaco Technologies challenging the government's appointment of C-DOT as the sole vendor for India's emergency cell broadcast system. The government argues the indigenous project is a strategic asset for national security, while the petitioner seeks a competitive bidding process for the disaster management tool.", "category": "Law", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123306", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_11-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/123306"}], "article_id": "2a78e18d"}, {"headline": "Heatwave Conditions to Intensify Across North-West and Central India", "summary": "The IMD has forecast intensifying heatwave conditions for Rajasthan, Gujarat, and Madhya Pradesh through 14 May, with temperatures potentially rising by 3-5°C. Simultaneously, a low-pressure area over the Bay of Bengal may bring thunderstorms and scattered rain to northern and southern India. Barmer in Rajasthan recorded the highest maximum temperature of 45.7°C on Saturday.", "category": "Environment", "page": 9, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123306", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_11-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/123306"}], "article_id": "76c3eb87"}, {"headline": "Nalco Alumina Exports Hit by Geopolitical Tensions in West Asia", "summary": "National Aluminium Co. Ltd (Nalco) reported that alumina shipments have been affected by regional conflict, as West Asia accounts for nearly half of its exports. Chairman Brijendra Pratap Singh noted that global spot alumina prices have fallen to $305-310 per tonne due to shifting export destinations and oversupply in certain regions.", "category": "Business", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123306", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_11-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/123306"}], "article_id": "22ccb9f8"}, {"headline": "Auto Firms Fail to Meet Vehicle Scrapping Targets for FY26", "summary": "Indian automakers fell 70% short of the steel-equivalent vehicle scrapping commitments set under the environment ministry's end-of-life vehicle rules. Industry executives criticized the policy as unrealistic, while recent draft amendments removed the provision for using 'other steel scrap' to meet extended producer responsibility (EPR) obligations.", "category": "Environment", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123306", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_11-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/123306"}], "article_id": "b2fdeaa4"}, {"headline": "FMCG Companies Prepare for Price Hikes Amid Inflationary Pressure", "summary": "Leading FMCG firms, including Dabur and Britannia, are planning price increases of 4-5% to offset rising packaging, fuel, and logistics costs. Geopolitical disruptions and currency depreciation are squeezing margins across food and personal care sectors. Companies are balancing these hikes with reduced grammage in smaller pack sizes to maintain sales volumes.", "category": "Business", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123306", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_11-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/123306"}], "article_id": "f1b78463"}, {"headline": "CDSCO Mandates Safety Reports from Date of Drug Launch", "summary": "The Central Drugs Standard Control Organisation (CDSCO) has directed drug manufacturers to submit periodic safety update reports (PSURs) based on the actual marketing date rather than the regulatory approval date. The move aims to capture critical post-marketing safety insights and ensure patient safety once medicines are commercially available.", "category": "Health", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123306", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_11-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/123306"}], "article_id": "2ecefe50"}, {"headline": "Domestic Bookings Drive Airbnb's Strong Growth in India", "summary": "Airbnb reported a 50% year-on-year increase in bookings from India, with domestic travel now accounting for 80% of its business in the country. The platform has expanded to 115,000 listings in India as millennials and Gen Z seek unique, experience-led stays. Despite growth, Airbnb faces challenges including inbound tourism stagnation and local housing society restrictions.", "category": "Business", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123306", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_11-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/123306"}], "article_id": "a3a2daf3"}, {"headline": "Palantir Faces Threat of Replacement by Cheaper AI Models", "summary": "Palantir Technologies is facing skepticism as investors worry that large language models from OpenAI and Google could render its expensive data platform less necessary. While Palantir reported record revenue and profit, its stock has fallen nearly 20% this year. Experts suggest AI labs are building platforms that structure data in ways that compete directly with Palantir’s core offerings.", "category": "Technology", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123306", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_11-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/123306"}], "article_id": "6990c96b"}, {"headline": "Chip Stocks Hit Records as AI Demand Broadens to CPUs", "summary": "The semiconductor market has seen a $3.8 trillion surge in market cap over six weeks, with Intel and Sandisk reaching record highs. Demand for traditional CPUs and memory chips has spiked alongside GPUs as AI agents generate massive data. Some analysts warn the vertical move resembles the dot-com era, though current firms are underpinned by strong earnings and blowout profits.", "category": "Technology", "page": 12, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123306", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_11-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/123306"}], "article_id": "54fa0883"}, {"headline": "Iran Conflict Triggers Global Shortage of Sulfuric Acid", "summary": "The war in the Persian Gulf and Chinese export restrictions have sent sulfuric acid prices soaring. As the world's most consumed chemical, it is vital for fertilizer, copper leaching, and semiconductor manufacturing. Choked supplies at the Strait of Hormuz have forced nickel and copper producers in Indonesia and Chile to consider production cuts, threatening global food and metal supplies.", "category": "Economy", "page": 12, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123306", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_11-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/123306"}], "article_id": "f36bae17"}, {"headline": "Prime Minister Narendra Modi concludes high level official visit to Austria", "summary": "Prime Minister Narendra Modi visited Austria, marking the first visit by an Indian leader in 41 years. The visit focused on deepening bilateral cooperation in technology, trade, and innovation. Modi met with Chancellor Karl Nehammer to discuss global peace and security initiatives, emphasizing that India and Austria aim to build a strategic partnership for the 21st century.", "category": "Politics", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/123275", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 11-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123275"}], "article_id": "438a5cd6"}, {"headline": "Supreme Court directs states to strictly follow administrative guidelines", "summary": "The Supreme Court of India has issued a directive to all state governments to ensure strict compliance with established administrative guidelines. The court noted that delays in implementation affect governance. The bench warned that any further deviations from the prescribed legal framework would invite judicial censure and possible penalties for responsible officials.", "category": "Law", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123275", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 11-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123275"}], "article_id": "1dd6304d"}, {"headline": "Vikas Singh elected as President of Supreme Court Bar Association", "summary": "Senior advocate Vikas Singh has been elected as the President of the Supreme Court Bar Association (SCBA). In a competitive election held in New Delhi, Singh secured a majority of votes against his rivals. His leadership is expected to address long-standing issues regarding lawyer welfare and the infrastructure of the Supreme Court premises.", "category": "Law", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123275", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 11-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123275"}], "article_id": "c7b698f6"}, {"headline": "Government approves new financial incentives for semiconductor manufacturing sector", "summary": "The Union Cabinet has approved a significant financial package to bolster semiconductor and display manufacturing in India. The scheme provides fiscal support to companies to set up fabrication plants locally. This move is part of the 'India Semiconductor Mission' which aims to make the country a key player in the global electronics supply chain and reduce import dependency.", "category": "Technology", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123275", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 11-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123275"}], "article_id": "2b094d94"}, {"headline": "ISRO successfully conducts key propulsion tests for Gaganyaan mission", "summary": "The Indian Space Research Organisation (ISRO) has achieved a milestone by successfully testing the propulsion system for the Gaganyaan human spaceflight mission. The tests, conducted at the Mahendragiri facility, verified the performance of the engines under various conditions. This success brings India closer to its goal of sending its f
