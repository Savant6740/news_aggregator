"importance": 7, "article_id": "7a705b23"}, {"headline": "India and Oman energize new economic corridor with CEPA", "summary": "The India-Oman Comprehensive Economic Partnership Agreement (CEPA) aims to strengthen bilateral ties, expanding trade beyond traditional commodities to engineering goods, pharmaceuticals, and IT services. It offers duty-free access for 98.08% of Indian exports to Oman and preferential market access for Oman's core exports to India, while protecting sensitive sectors. It also includes provisions for professional mobility and addresses non-tariff barriers.", "category": "Economy", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125760"}, {"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125726"}], "importance": 7, "article_id": "afe4e99c"}, {"headline": "Commercial LPG price hiked by ₹42, 5-kg LPG up by ₹11", "summary": "Prices of commercial LPG (19-kg cylinder) were hiked by ₹42 to ₹3,113.50 in Delhi, and 5-kg free-trade LPG (FTL) cylinders by ₹11 to ₹821.50, in line with global benchmarks. However, the price of 14.2-kg domestic cooking gas remains unchanged since March at ₹913, reflecting government efforts to shield household consumers from rising import costs.", "category": "Business", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125760"}, {"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125726"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_02-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125742"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125710"}], "importance": 7, "article_id": "8267b7c9"}, {"headline": "UPI achieves record transaction volume and value in May", "summary": "Unified Payments Interface (UPI) transactions reached a record high in May, with value rising 3% to ₹29.90 trillion and volume up 4% to 23.20 billion transactions. This growth is attributed to summer travel, IPL, and seasonal consumption. PhonePe and Google Pay continue to dominate the ecosystem, while Paytm remains third. UPI is now live in seven countries.", "category": "Technology", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125760"}, {"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125726"}], "importance": 7, "article_id": "29b85b1c"}, {"headline": "Govt cuts kharif fertilizer demand due to below-normal monsoon forecast", "summary": "India's Agriculture Ministry lowered kharif fertilizer demand estimates, with urea reduced to 19 mt from 19.4 mt, following the IMD's \"below normal\" monsoon forecast and El Nino threat. Already, 20% of the FY27 fertilizer subsidy (₹1.71 lakh crore) has been used. The subsidy may exceed ₹3 lakh crore if the West Asia crisis and high global prices persist.", "category": "Economy", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/125760"}, {"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125726"}], "importance": 7, "article_id": "aa364c06"}, {"headline": "Gold prices fall as inflation concerns escalate", "summary": "Gold prices dropped nearly 2% to $4,451.65 per ounce on Monday, with US gold futures falling 2.5% to $4,479.20. Escalating Middle East tensions heightened inflation concerns and reinforced expectations that central banks may keep monetary policy tighter for longer. Silver also fell 1.7% to $73.96.", "category": "Economy", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/125760"}, {"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125726"}], "importance": 5, "article_id": "b469f90e"}, {"headline": "West Bengal CM expands Cabinet to 41, portfolio allocation pending", "summary": "West Bengal Chief Minister Suvendu Adhikari expanded his Council of Ministers by inducting 35 newly-elected legislators, bringing the total to 41 members. Portfolio allocation is expected tomorrow. Adhikari also called for SITs to probe alleged fake beneficiaries of the \"Lakshmir Bhandar\" scheme and forgery of MLAs’ signatures in a letter to the Speaker.", "category": "Politics", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125760"}, {"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_02-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125764"}], "importance": 7, "article_id": "4ba3936c"}, {"headline": "South Coast Railway zone with Visakhapatnam HQ begins operations", "summary": "The 18th Zone of Indian Railways, South Coast Railway (SCoR), formally commenced operations on Monday, with Visakhapatnam as its headquarters. The Ministry of Railways issued a gazette notification on May 4, 2026, for its full operationalisation from June 1, 2026, establishing a new administrative entity for the railway network.", "category": "Infrastructure", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125760"}, {"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125791"}], "importance": 5, "article_id": "1e5e6953"}, {"headline": "Coal India cuts May output due to subdued demand and high stockpiles", "summary": "Coal India Ltd cut May production by almost 12% as demand lagged supply, leaving high stockpiles (114 million tonnes). Output since April declined 11% year-on-year. This underscores challenges as the energy market diversifies, eroding Coal India's near-monopoly status and signaling demand issues despite high electricity use.", "category": "Business", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125760"}, {"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125726"}], "importance": 6, "article_id": "b047c3b5"}, {"headline": "CBSE re-evaluation portal remains inactive despite promises", "summary": "The CBSE’s re-evaluation portal, set for a much-awaited launch on June 1, remained inaccessible to users till late evening. The delay follows severe criticism over the board’s expanded On-Screen Marking (OSM) system for Class 12 examinations, which had glitches. The CBSE has promised that all re-evaluation fees will be fully refunded if a student’s marks increase after review.", "category": "Education", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125760"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/125710"}], "importance": 6, "article_id": "c9da426c"}, {"headline": "Zee Entertainment secures FIFA World Cup broadcasting rights until 2034", "summary": "Zee Entertainment Enterprises Ltd secured an 8-year agreement with FIFA to broadcast events including the FIFA World Cups 2026 and 2030, FIFA Women’s World Cup 2027, youth tournaments, and docu-series in India until 2034. The content will also stream on Zee5. The deal, estimated at $25-80 million, positions Zee as a serious player in sports broadcasting.", "category": "Business", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/125760"}, {"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125791"}, {"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125726"}, {"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_02-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/125764"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_02-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125742"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/125710"}], "importance": 8, "article_id": "51d74e22"}, {"headline": "Nvidia challenges Intel in PC market with new AI chip", "summary": "Nvidia launched its new RTX Spark Superchip for PCs, combining microprocessor and graphics chip technology built with MediaTek, to run Microsoft's Windows for Arm OS. This move targets Intel's dominance in the PC market and aims to modernize machines for the AI era, with first laptops expected this fall.", "category": "Technology", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/125760"}, {"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125726"}], "importance": 7, "article_id": "916e9ffa"}, {"headline": "IAF chief visits France for Rafale acquisition talks", "summary": "Air Chief Marshal A.P. Singh visited France on a four-day visit amid India's move to acquire 114 Rafale fighter jets in a deal estimated to be worth ₹3.25 lakh crore. This is one of the Indian Air Force's (IAF) largest-ever fighter aircraft procurement programmes. The visit follows a formal Letter of Request issued by the Union Ministry of Defence.", "category": "Technology", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/125760"}, {"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125791"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/125710"}], "importance": 8, "article_id": "d69b60a5"}, {"headline": "Wockhardt to market novel antibiotic Zaynich globally independently", "summary": "Wockhardt will independently market Zaynich, its novel intravenous antibiotic for complicated urinary tract infections (cUTI), after receiving USFDA approval—a first for an Indian-developed new chemical entity. The company plans to roll out the drug, with an estimated peak annual sales potential of $1.5 billion, in the US and India later this year, setting up a new business operation in the US.", "category": "Health", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 02~06~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/125760"}, {"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_02-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125764"}], "importance": 7, "article_id": "79abf09f"}, {"headline": "Trump claims Lebanon truce, power restored as Mideast talks falter", "summary": "US President Donald Trump claimed Israel and Hezbollah agreed to a Lebanon truce, with power restored, amidst Mideast talks. This follows Iran shooting down a US drone and US strikes on Iranian military sites. Iran threatened northern Israel if attacks on Lebanon continue, with Mideast truce talks remaining fragile.", "category": "World", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125791"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_02-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125742"}], "importance": 9, "article_id": "824f9300"}, {"headline": "56,880 qualify for IITs in JEE Advanced; Shubham Kumar AIR 1", "summary": "A total of 56,880 candidates qualified for admission to the Indian Institutes of Technology (IITs), according to the Joint Entrance Examination (Advanced), 2026, results. Shubham Kumar from the IIT-Delhi zone clinched the all-India rank 1 (AIR 1). The Madras zone registered the most successful candidates overall, with 14,294 qualifiers. Counselling begins June 2.", "category": "Education", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125791"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/125710"}], "importance": 8, "article_id": "a6366cad"}, {"headline": "Centre clears five new Supreme Court judges, strength reaches 37", "summary": "The Centre cleared the appointment of five new Supreme Court judges, including Justice Sheel Nagu and Justice Shree Chandrashekhar, raising the court's strength to 37, close to its revised sanctioned strength of 38. This follows the Collegium's May 27 recommendation and an increase in the Supreme Court's sanctioned strength in May 2026.", "category": "Law", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125791"}, {"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125726"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/125710"}], "importance": 7, "article_id": "d6db3bc9"}, {"headline": "Saket building owner arrested; MCD to seal illegal structures", "summary": "Delhi police arrested 71-year-old Karamveer Singh, owner of a collapsed five-storey building in Saidulajab that killed six. MCD identified six nearby buildings for norm violations and plans an inspection drive across the South Zone to identify and seal unauthorized constructions. AAP seeks an SIT probe.", "category": "India", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125791"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125710"}], "importance": 7, "article_id": "8bec94d5"}, {"headline": "Cockroach Janta Party transitions from satire to movement", "summary": "CJP founder Abhijeet Dipke announced the \"Cockroach Janta Party\" is transitioning from a satirical political outfit into a movement, with plans for a peaceful protest at Jantar Mantar on June 6. He reiterated demands for Union Education Minister Dharmendra Pradhan's resignation over exam controversies and highlighted alleged attempts to suppress CJP's social media presence.", "category": "Politics", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125791"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125710"}], "importance": 5, "article_id": "40115242"}, {"headline": "Delhi High Court recognizes 'right to be forgotten' in judicial records", "summary": "The Delhi High Court held that the \"right to be forgotten\" flows from the constitutional right to privacy and enables individuals to seek removal of personal information from the public digital domain, especially judicial records. Justice Sachin Datta laid down a framework for de-indexing and masking personal identifiers from publicly accessible court records.", "category": "Law", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125791"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_02-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125742"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/125710"}], "importance": 8, "article_id": "cd8c882b"}, {"headline": "Lionel Messi statue in Kolkata removed over safety concerns", "summary": "A 70-foot-high statue of Argentinian football legend Lionel Messi, installed in Kolkata’s Lake Town area in 2025 by the previous Trinamool Congress government, was removed by the Public Works Department due to safety concerns. Residents expressed concerns over safety as the statue was seen swaying in the wind and found to be structurally unstable after a recent storm.", "category": "India", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125791"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/125710"}], "importance": 3, "article_id": "88aa7afa"}, {"headline": "Anthropic Files Confidentially for US Initial Public Offering", "summary": "AI startup Anthropic has filed for a confidential IPO in the United States, signaling a major move in the artificial intelligence sector. The company was last valued at $965 billion, and its listing is one of the most anticipated in the tech industry.", "category": "Technology", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125791"}, {"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_02-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125764"}], "importance": 7, "article_id": "eb460e53"}, {"headline": "Saurabh Vijay Appointed as CEO of India AI Mission", "summary": "Aadhaar head Saurabh Vijay has been given additional charge as the CEO of the India AI Mission. The Rs 10,371 crore initiative aims to build a comprehensive indigenous artificial intelligence ecosystem in India.", "category": "Technology", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125791"}, {"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_02-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125764"}], "importance": 6, "article_id": "91080bb8"}, {"headline": "Karnataka Cong leaders deny involvement in 'bypoll' audio clip", "summary": "Karnataka minister Zameer Ahmed Khan and Congress leader Mohammed Siraj denied their involvement in a purported audio clip discussing by-election voting and money distribution. Both claimed the clip was fake and politically motivated, emerging after divisions within the party in Davanagere South by-election.", "category": "Politics", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125791"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_02-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125742"}], "importance": 5, "article_id": "a3fd98c8"}, {"headline": "CID busts multi-State online betting network, 11 arrested", "summary": "Telangana CID’s Special Investigation Team (SIT) arrested 11 persons for allegedly operating a multi-State illegal online betting network linked to the Dafabet platform. The arrests followed an investigation into the loss of nearly ₹10 lakh by a software engineer. Three luxury vehicles, eight laptops, 26 mobile phones, five passports, and ₹3,21,900 in cash were seized.", "category": "Law", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125791"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125710"}], "importance": 5, "article_id": "fe4a8714"}, {"headline": "Supreme Court denies plea for NEET re-test in CBT format", "summary": "The Supreme Court declined to direct the National Testing Agency to conduct the NEET-UG, 2026 re-test in a computer-based test (CBT) format, observing that altering the mode of examination at this stage would pose practical difficulties. The original NEET-UG, 2026, held on May 3, was cancelled due to a paper leak, and a fresh examination is scheduled for June 21.", "category": "Law", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125791"}, {"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_02-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125764"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/125710"}], "importance": 8, "article_id": "a66832a8"}, {"headline": "Trinamool Congress expels two MLAs for anti-party activities", "summary": "Trinamool Congress expelled MLAs Ritabrata Banerjee and Sandipan Saha for \"anti-party activities\" after they alleged their signatures were forged in a party letter to the Speaker. Mamata Banerjee accused police of threatening her MLAs to break the party. The Bengal CID is probing the alleged forgery.", "category": "Politics", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125791"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_02-06-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/125742"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125710"}], "importance": 6, "article_id": "2b744656"}, {"headline": "India, Australia advance defence, maritime security cooperation", "summary": "Defence Minister Rajnath Singh and Australian Deputy PM Richard Marles co-chaired the second India-Australia Defence Ministers’ Dialogue, reaffirming their commitment to strengthen defence and security cooperation across the Indo-Pacific. Focus areas include maritime security, defence industry collaboration, interoperability, and emerging technologies. They aim to finalize a Joint Maritime Security Collaboration Road Map.", "category": "Politics", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125791"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/125710"}], "importance": 7, "article_id": "c73c1d51"}, {"headline": "UK business secretary Peter Kyle to visit India for FTA talks", "summary": "UK business and trade secretary Peter Kyle will visit New Delhi this week to accelerate the implementation of the India-UK Comprehensive Economic and Trade Agreement (CETA). He is scheduled for talks with commerce and industry minister Piyush Goyal to provide a timely boost for both economies.", "category": "Economy", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125791"}, {"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125726"}], "importance": 7, "article_id": "785ec39e"}, {"headline": "France seizes Russian-linked tanker with U.K. support", "summary": "The French Navy, with support from the U.K., intercepted the oil tanker 'Tagor' in the Atlantic, linked to Russia and under international sanctions. French President Emmanuel Macron stated the action aims to counter illegal circumvention of sanctions that finance Russia's war in Ukraine. Kremlin spokesman Dmitry Peskov called such actions illegal and bordering on piracy.", "category": "World", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125791"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/125710"}], "importance": 8, "article_id": "9b966acb"}, {"headline": "Tata Digital valuation cut after ₹17,000 crore in losses", "summary": "Tata Sons infused capital into Tata Digital at a lower valuation of $10.3 billion in April, a 5.5% markdown, due to significant cash burn and weak consumer acceptance. The group has invested ₹26,306 crore, resulting in nearly ₹17,000 crore in losses over seven years for its super-app ambition. This prompted a board reassessment.", "category": "Business", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/125791"}, {"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_02-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125726"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_02-06-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125742"}], "importance": 8, "article_id": "019dbe80"}, {"headline": "Carlsen avenges Firouzja loss; Indians struggle at Norway Chess", "summary": "In Norway Chess 2026, all four Indian players (D. Gukesh, R. Praggnanandhaa, Koneru Humpy, Divya Deshmukh) suffered losses in the sixth round. D. Gukesh succumbed to Germany’s Vincent Keymer, and R. Praggnanandhaa’s adventurous approach cost him against American Wesley So. World No. 1 Magnus Carlsen exacted revenge on Frenchman Alireza Firouzja.", "category": "Sports", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/125791"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/125710"}], "importance": 5, "article_id": "0b3571b0"}, {"headline": "Serena Williams announces return to tennis in doubles", "summary": "Serena Williams confirmed her return to tennis after an absence of nearly four years on Monday, with the American great set to play women’s doubles at Queen’s Club from June 8. The 44-year-old has not played competitively since a third-round loss at the 2022 U.S. Open, where she fell short of the all-time record of 24 Grand Slam singles titles.", "category": "Sports", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/125791"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_02-06-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/125742"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/125710"}], "importance": 7, "article_id": "d59ef9fe"}, {"headline": "Kohli, Bhuvneshwar led RCB's back-to-back IPL title win", "summary": "Royal Challengers Bengaluru secured a second consecutive IPL title, fueled by veterans Virat Kohli and Bhuvneshwar Kumar, alongside captain Rajat Patidar. Kohli (37) finished as RCB’s top run-scorer (675) with improved strike rate. Bhuvneshwar (37) led the bowling with 28 scalps. Patidar's calm leadership and aggressive batting (501 runs, SR 192.69) were crucial.", "category": "Sports", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 02-06.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/125791"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/125710"}], "importance": 8, "article_id": "ec736412"}, {"headline": "April Industrial Output Growth Reaches 4.9% Under New Series", "summary": "India's industrial production grew by 4.9% in April 2026, according to the newly introduced 2022-23 base series. Growth was driven by the manufacturing sector and strong output in capital goods and consumer durables.", "category": "Economy", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_02-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125764"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_02-06-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125742"}], "importance": 7, "article_id": "ed4a2948"}, {"headline": "Malaysia Bans Social Media for Children Under 16", "summary": "The Malaysian government has begun enforcing new regulations that prohibit children under the age of 16 from holding social media accounts. The move is intended to protect minors from online harassment and harmful content.", "category": "World", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_02-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/125764"}, {"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_02-06-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/125742"}], "importance": 7, "article_id": "cc6cd71e"}, {"headline": "India-UK strategic dialogue held", "summary": "The India-UK strategic dialogue took place, focusing on bilateral cooperation in trade, defense, and climate change. Both nations reaffirmed their commitment to shared goals.", "category": "World", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 02-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125701"}], "importance": 9, "article_id": "5e564908"}, {"headline": "Supreme Court to hear pleas on farm laws", "summary": "The Supreme Court will hear multiple petitions challenging tps://t.me/c/1877410077/125701"}], "importance": 8, "article_id": "12c8fc1b"}, {"headline": "New drug shows promise for respiratory illness", "summary": "A new drug has shown promise in clinical trials for respiratory illnesses, offering a potential new treatment option. Further studies are planned.", "category": "Health", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 02-06-2026.pdf", "page": 36, "telegram_url": "https://t.me/c/1877410077/125701"}], "importance": 8, "article_id": "c9a705d0"}, {"headline": "New industrial zone development project", "summary": "A new industrial zone development project has begun, aiming to attract investment and create jobs. The initiative involves infrastructure development and land allocation.", "category": "Infrastructure", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 02-06-2026.pdf", "page": 36, "telegram_url": "https://t.me/c/1877410077/125701"}], "importance": 7, "article_id": "f03d3944"}, {"headline": "Annamalai may quit BJP, float 'Tamizh only' outfit", "summary": "Tamil Nadu BJP president K. Annamalai is reportedly considering resigning and forming a new political outfit focused solely on Tamil interests, amid internal party feuds. This potential move could reshape regional politics significantly.", "category": "Politics", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_02-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125742"}], "importance": 6, "article_id": "2523440a"}, {"headline": "Odisha Police suspended, IPS officer transferred after custodial death", "summary": "Three police personnel were suspended and an IPS officer transferred after Susant Sahu died from injuries allegedly sustained during custodial torture in Odisha’s Ganjam district. His wife alleged police torture following his May 25 arrest. Odisha Police's Human Rights Protection Cell has been ordered to probe the charges.", "category": "Law", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_02-06-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/125742"}, {"newspaper": "The Hindu", "pdf_filename": "TH Delhi 02-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125710"}], "importance": 6, "article_id": "65f96b7f"}]};
const CAT_META = {"Politics": {"color": "#e8334a", "icon": "🏛️"}, "Economy": {"color": "#f5a623", "icon": "📊"}, "Business": {"color": "#f0c040", "icon": "💼"}, "India": {"color": "#ff7043", "icon": "🇮🇳"}, "World": {"color": "#5c9eff", "icon": "🌍"}, "Sports": {"color": "#36c46f", "icon": "🏆"}, "Science": {"color": "#a78bfa", "icon": "🔬"}, "Technology": {"color": "#38bdf8", "icon": "💻"}, "Health": {"color": "#34d399", "icon": "🏥"}, "Law": {"color": "#fb923c", "icon": "⚖️"}, "Environment": {"color": "#4ade80", "icon": "🌿"}, "Education": {"color": "#e879f9", "icon": "📚"}, "Culture": {"color": "#f472b6", "icon": "🎭"}, "Infrastructure": {"color": "#94a3b8", "icon": "🏗️"}};

// FIXED: Pre-build data structures IMMEDIATELY for deep linking
const allArts = [...DIGEST.articles].sort((a,b)=>(b.importance||0)-(a.importance||0));
const byCategory = {};
for (const art of allArts) {
  const c = art.category||"India";
  if (!byCategory[c]) byCategory[c]=[];
  byCategory[c].push(art);
}
const sortedCats = Object.keys(byCategory).sort(
  (a,b)=>(byCategory[b][0].importance||0)-(byCategory[a][0].importance||0)
);

// FIXED DEEP LINK HANDLER - Runs IMMEDIATELY
let deepLinkTarget = null;
function handleDeepLink() {
  const hash = window.location.hash;
  if (!hash || !sortedCats.length) return;
  
  const cleanHash = hash.startsWith('#article-') ? hash.slice(9) : hash.slice(1);
  const targetArticle = DIGEST.articles.find(art => art.article_id === cleanHash);
  
  if (targetArticle) {
    deepLinkTarget = {article: targetArticle, hash: cleanHash};
  }
}
handleDeepLink();

let catIdx=0,vpW=0,vpH=0;
const panels=[];
const outer=document.getElementById('outer');
const hTrack=document.getElementById('hTrack');
const hintUp=document.getElementById('hintUp');
const hintRight=document.getElementById('hintRight');
const catFlash=document.getElementById('catFlash');
const cfIcon=document.getElementById('cfIcon');
const cfName=document.getElementById('cfName');

function buildAll() {
  vpW=outer.offsetWidth; vpH=outer.offsetHeight;
  hTrack.innerHTML=''; panels.length=0;
  sortedCats.forEach((cat,ci)=>{
    const m=CAT_META[cat]||{color:"#e8334a",icon:"📰"};
    const arts=byCategory[cat];
    const panel=document.createElement('div');
    panel.className='cat-panel';
    panel.id=`cat-panel-${ci}`;
    panel.style.setProperty('--cc',m.color);
    panel.innerHTML=`<div class="progress-row" id="prow-${ci}" style="--cc:${m.color}"></div><div class="v-feed" id="vfeed-${ci}"><div class="v-track" id="vtrack-${ci}"></div></div>`;
    hTrack.appendChild(panel);
    const pRow=panel.querySelector(`#prow-${ci}`);
    const vFeed=panel.querySelector(`#vfeed-${ci}`);
    const vTrack=panel.querySelector(`#vtrack-${ci}`);
    const cardH=vFeed.getBoundingClientRect().height||vpH;
    
    arts.forEach((art,ai)=>{
      const card = buildCard(art, cardH, m, cat, ai);
      card.id = `article-${art.article_id}`;
      card.dataset.articleId = art.article_id;
      vTrack.appendChild(card);
    });
    
    panels.push({pRow,vFeed,vTrack,articles:arts,artIdx:0});
    buildPRow(ci);
  });
  
  hTrack.style.transition='none';
  hTrack.style.transform='translateX(0)';
  syncV(0,false);
  
  // FIXED: Apply deep link after build
  if (deepLinkTarget) {
    setTimeout(() => applyDeepLink(deepLinkTarget), 100);
  }
}

function buildCard(art,h,m,cat,articleIndex) {
  const src=art.sources?.[0];
  const href=src?.pdf_filename?`pdfs/${src.pdf_filename}#page=${src.page}`:(src?.telegram_url||'#');
  const card=document.createElement('div');
  card.className='card';
  card.dataset.articleId = art.article_id;
  card.style.height=h+'px';
  card.style.setProperty('--cc',m.color);
  card.innerHTML=`
    <div class="card-content">
      <div class="card-toprow">
        <div class="cat-pill">
          <div class="pill-icon"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="1" y="1" width="8" height="2" rx="0.6" fill="#888"/><rect x="1" y="4.5" width="5" height="1.5" rx="0.6" fill="#666"/><rect x="1" y="7" width="6" height="1.5" rx="0.6" fill="#666"/></svg></div>
          ${cat.toUpperCase()}
        </div>
        <div class="card-date">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="2.5" width="11" height="9.5" rx="1.8" stroke="#555" stroke-width="1.2"/><path d="M4.5 1v3M8.5 1v3" stroke="#555" stroke-width="1.2" stroke-linecap="round"/><path d="M1 6h11" stroke="#555" stroke-width="1.2"/></svg>
          ${DIGEST.date}
        </div>
      </div>
      <div class="card-headline">${art.headline}</div>
      <div class="card-summary">${art.summary}</div>
      <div class="card-divider"></div>
      <div class="card-footer">
        ${src?`<a class="src-chip" href="${href}" target="_blank" onclick="event.stopPropagation()">${src.newspaper}<span class="src-chip-sep">&middot;</span><span class="src-chip-pg">Pg ${src.page}</span><span class="src-chip-ext"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M3.5 7.5L7.5 3.5M7.5 3.5H5M7.5 3.5V6" stroke="#555" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></span></a>`:'<div></div>'}
        <div class="info-btn"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6.5" stroke="#444" stroke-width="1.3"/><circle cx="7.5" cy="4.5" r="0.8" fill="#555"/><path d="M7.5 7v4" stroke="#555" stroke-width="1.5" stroke-linecap="round"/></svg></div>
      </div>
    </div>`;
  return card;
}

function buildPRow(ci) {
  const p=panels[ci],ai=p.artIdx;
  p.pRow.innerHTML='';
  p.articles.forEach((_,i)=>{
    const seg=document.createElement('div');
    seg.className='pseg'+(i<ai?' done':i===ai?' active':'');
    p.pRow.appendChild(seg);
  });
}

function syncV(ci,animated) {
  const p=panels[ci],h=p.vFeed.getBoundingClientRect().height;
 p.vTrack.style.transition=animated?'transform 0.35s cubic-bezier(0.4,0,0.2,1)':'none';
  p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;
  buildPRow(ci);
}

function applyDeepLink(target) {
  const ci = sortedCats.findIndex(cat =>
    byCategory[cat].some(art => art.article_id === target.hash)
  );
  if (ci === -1) return;
  goCat(ci, false);
  const ai = byCategory[sortedCats[ci]].findIndex(art => art.article_id === target.hash);
  if (ai === -1) return;
  panels[ci].artIdx = ai;
  syncV(ci, false);
  const card = document.getElementById('article-' + target.hash);
  if (card) { card.classList.add('target-highlight'); setTimeout(() => card.classList.remove('target-highlight'), 3000); }
}

function goArt(d) {
  const p=panels[catIdx];
  const n=Math.max(0,Math.min(p.artIdx+d,p.articles.length-1));
  if(n===p.artIdx&&d!==0)return;
  p.artIdx=n; syncV(catIdx,true); dismiss();
}

function goCat(idx,animated=true) {
  idx=Math.max(0,Math.min(idx,sortedCats.length-1));
  if(idx===catIdx&&animated)return;
  const prev=catIdx; catIdx=idx;
  hTrack.style.transition=animated?'transform 0.38s cubic-bezier(0.4,0,0.2,1)':'none';
  hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;
  if(animated&&idx!==prev) {
    const m=CAT_META[sortedCats[idx]]||{color:"#e8334a",icon:"📰"};
    catFlash.style.background=m.color+'18';
    cfIcon.textContent=m.icon; cfName.textContent=sortedCats[idx]; cfName.style.color=m.color;
    catFlash.classList.add('on'); setTimeout(()=>catFlash.classList.remove('on'),500);
  }
  dismiss();
}

let dismissed=false;
function dismiss() {
  if(dismissed)return; dismissed=true;
  hintUp.classList.remove('visible'); hintRight.classList.remove('visible');
  hintUp.classList.add('gone'); hintRight.classList.add('gone');
}

(function initHints() {
  const KEY='dailyBriefHintSeen';
  if(!localStorage.getItem(KEY)) {
    localStorage.setItem(KEY,'1');
    setTimeout(()=>{ if(!dismissed){ hintUp.classList.add('visible'); hintRight.classList.add('visible'); } },2500);
  }
})();

let tsX=0,tsY=0,tcX=0,tcY=0,axis=null,drag=false;
outer.addEventListener('touchstart',e=>{ tsX=e.touches[0].clientX; tsY=e.touches[0].clientY; tcX=0; tcY=0; axis=null; drag=true; hTrack.style.transition='none'; const p=panels[catIdx]; if(p)p.vTrack.style.transition='none'; },{passive:true});
outer.addEventListener('touchmove',e=>{ if(!drag)return; const dx=e.touches[0].clientX-tsX,dy=e.touches[0].clientY-tsY; tcX=dx; tcY=dy; if(!axis&&(Math.abs(dx)>8||Math.abs(dy)>8))axis=Math.abs(dx)>Math.abs(dy)?'h':'v'; if(!axis)return; e.preventDefault(); if(axis==='h'){ const edge=(catIdx===0&&dx>0)||(catIdx===sortedCats.length-1&&dx<0); hTrack.style.transform=`translateX(${-catIdx*vpW+dx*(edge ? 0.14 : 1)}px)`; }else{ const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height; const edge=(p.artIdx===0&&dy>0)||(p.artIdx===p.articles.length-1&&dy<0); p.vTrack.style.transform=`translateY(${-p.artIdx*h+dy*(edge ? 0.14 : 1)}px)`; } },{passive:false});
outer.addEventListener('touchend',()=>{ if(!drag)return; drag=false; if(axis==='h'){ const t=vpW*.2; if(tcX<-t)goCat(catIdx+1); else if(tcX>t)goCat(catIdx-1); else{hTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;} }else if(axis==='v'){ const t=vpH*.2; if(tcY<-t)goArt(1); else if(tcY>t)goArt(-1); else{const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height;p.vTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;} } axis=null; },{passive:true});
document.addEventListener('keydown',e=>{ if(e.key==='ArrowDown'||e.key===' '){e.preventDefault();goArt(1);} if(e.key==='ArrowUp'){e.preventDefault();goArt(-1);} if(e.key==='ArrowRight'){e.preventDefault();goCat(catIdx+1);} if(e.key==='ArrowLeft'){e.preventDefault();goCat(catIdx-1);} });
let wl=false;
outer.addEventListener('wheel',e=>{ e.preventDefault();if(wl)return;wl=true; Math.abs(e.deltaX)>Math.abs(e.deltaY)?goCat(catIdx+(e.deltaX>0?1:-1)):goArt(e.deltaY>0?1:-1); setTimeout(()=>wl=false,500); },{passive:false});
window.addEventListener('resize',()=>{ vpW=outer.offsetWidth;vpH=outer.offsetHeight; hTrack.style.transition='none'; hTrack.style.transform=`translateX(${-catIdx*vpW}px)`; panels.forEach(p=>{ const h=p.vFeed.getBoundingClientRect().height; p.vTrack.querySelectorAll('.card').forEach(c=>c.style.height=h+'px'); p.vTrack.style.transition='none'; p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`; }); });

buildAll();
</script>
</body>
</html>
