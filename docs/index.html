 "Politics", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/117999", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "Bangalore_HT_24-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117999"}]}, {"headline": "West Bengal releases first supplementary voter list for assembly polls", "summary": "Election officials in West Bengal have disposed of 2.9 million out of 6 million names under adjudication for the state's electoral rolls. The first supplementary voter list was released late Monday as preparations for the assembly elections continue.", "category": "Politics", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117999", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "Bangalore_HT_24-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117999"}]}, {"headline": "Former Punjab minister Laljit Singh Bhullar arrested in suicide probe", "summary": "Laljit Singh Bhullar was arrested in Fatehgarh Sahib in connection with the alleged suicide of a state warehousing corporation official. The victim purportedly left a video accusing Bhullar of harassment. CM Bhagwant Mann stated strict action would be taken against anyone violating the law regardless of their position.", "category": "Politics", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117999", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "Bangalore_HT_24-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117999"}]}, {"headline": "Rebel candidate enters Davangere South bypoll against Congress nominee", "summary": "Sadiq Pailwan filed his nomination as an independent candidate for the Davangere South by-election after the Congress fielded Samarth Shamanur. The move reflects discontent within the minority community over ticket distribution. Over 20 minority leaders have defected to the BJP in protest.", "category": "Politics", "page": 3, "importance": 5, "telegra ers to subordinate legislation without enough guidance.", "category": "Politics", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "Kerala Assembly Polls Set For Intense Three Cornered Contest", "summary": "The BJP-led NDA is attempting to disrupt the traditional LDF-UDF duopoly in Kerala by positioning itself as a viable third alternative. After capturing the Thiruvananthapuram Corporation in local polls, the BJP hopes to reach a double-digit seat tally in the Assembly. The incumbent LDF aims for a historic third term while the UDF fights to reclaim lost territory amid leadership wrangling.", "category": "Politics", "page": 8, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "Chennithala Allegess Secret Understanding Between BJP and CPI(M)", "summary": "Senior Congress leader Ramesh Chennithala has alleged a secret candidate-selection pact between the BJP and the CPI(M) aimed at preventing the Congress from winning in Kerala. He claimed that votes for the BJP would effectively benefit the ruling Left coalition. Chennithala also criticized the Chief Minister for avoiding criticism of the Centre while targeting Rahul Gandhi.", "category": "Politics", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "Election Commission Seal Row Erupts In Kerala Politics", "summary": "A political row erupted in Kerala after an official Election Commission letter was found carrying the seal of the BJP Kerala unit. The CPI(M) and Congress flagged the issue on social media, questioning the independence of the poll body. The Election Commission described the incident as a 'purely clerical error' that was rectified immediately after being noticed.", "category": "Politics", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "Candidates Face Namesake Challenges Across Kerala Constituencies", "summary": "As the Kerala nomination deadline ended, several prominent candidates including Minister P Rajeev and TMC leader PV Anvar found themselves facing independent candidates with identical names. Such namesake candidates are often used to confuse voters at the ballot. More cases are expected to emerge as the Election Commission continues to upload nomination details to its official website.", "category": "Politics", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "Chennithala Uses Kochi Indira Canteen For Voter Outreach", "summary": "Congress leader Ramesh Chennithala launched a direct outreach program at Kochi’s new Indira Canteen, which offers ₹10 breakfasts. The canteen has become a vital resource as local hotels shut down due to an LPG shortage. Chennithala used the visit to criticize the LDF government’s failure to provide for citizens while highlighting the UDF's action plan for affordable food.", "category": "Politics", "page": 8, "importance": 3, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "CAPF General Administration Bill Deferred In Rajya Sabha Amid Opposition", "summary": "The government deferred the introduction of the CAPF (General Administration) Bill after opposition members protested a lack of notice. Critics argue the Bill violates a Supreme Court verdict regarding cadre restructuring for personnel in the CRPF and BSF. The Bill aims to address significant promotion delays for officers and is expected to be introduced following further deliberations.", "category": "Politics", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "PM Modi Urges Unity and Preparedness Amid West Asia Conflict", "summary": "Prime Minister Narendra Modi called for national unity as the West Asia conflict creates difficult global conditions. In his first Lok Sabha statement since hostilities began, Modi compared the crisis to the Covid-19 pandemic. He stated an inter-ministerial group is assessing import-export difficulties daily and emphasized that India's economic fundamentals remain strong to face the challenge.", "category": "Politics", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "Congress and BJP Debate Petrol Prices and Corporate Tax Collection", "summary": "The Congress party accused the government of delaying petrol price hikes due to upcoming assembly elections during a debate on the Finance Bill. BJP members rejected the charge, praising the government for diversifying energy sources. The opposition also highlighted that corporate tax collections have remained lower than income tax collecti e could increase Lok Sabha seats from 543 to 816, with 273 reserved for women. The government intends to ensure existing seat proportions between States are maintained.", "category": "Politics", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/117941", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -24-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117941"}]}, {"headline": "Karnataka to Discuss Legislation Restricting Social Media Use for Children", "summary": "The Karnataka government will introduce guidelines to curb social media access for children below 16 years in the next legislature session. School Education Minister Madhu Bangarappa stated that a committee has been formed to study the issue. The government is reviewing similar bans globally and intends to consult parents to protect children from the ill effects of social media.", "category": "Politics", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117941", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -24-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117941"}]}, {"headline": "BJP Nominees Richer Than Congress Counterparts in Bagalkot and Davangere Bypolls", "summary": "Asset affidavits for the Bagalkot and Davangere South bypolls show BJP candidates possess higher wealth than Congress rivals. BJP’s Charantimath reported ₹17.3 crore in assets, while Congress’s Umesh Meti declared ₹8.65 crore. In Davangere South, BJP’s Srinivas Dasakariyappa declared ₹5.76 crore against Congress nominee Samarth Mallikarjun’s ₹4.25 crore.", "category": "Politics", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117941", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -24-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117941"}]}, {"headline": "State Government Halts Hindutva Ideologue Event on KSOU Campu 26.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "Sugar Futures Fall Sharply Following Global Oil Price Slump", "summary": "Raw sugar futures on the ICE fell as global oil prices slumped after the US postponed strikes on Iran. Lower oil prices reduce the incentive for Brazilian mills to produce ethanol, potentially leading to higher sugar output. Prices fell 1 per cent to 15.55 cents per lb, retreating from a five-month high reached earlier in the session.", "category": "Economy", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "Crude Oil Plunges Thirteen Percent On Iran Strike Pause", "summary": "Global crude oil prices crashed by more than 13 per cent on Monday after US President Donald Trump announced a five-day pause on planned strikes against Iranian power plants. Brent crude hit a session low of $96 a barrel before recovering slightly. The sudden shift caught traders off guard, as they had previously been pricing in prolonged supply uncertainty from the region.", "category": "Economy", "page": 9, "importance": 10, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "Ethanol Producers Urge Government To Increase Blending To Thirty Percent", "summary": "The All India Distillers Association (AIDA) has recommended that the government increase ethanol blending in fuel from 20 per cent to 30 per cent. The industry body noted that higher blending would reduce crude oil imports and strengthen energy security amid West Asia volatility. AIDA also proposed promoting ethanol-based cooking stoves and flex-fuel vehicles.", "category": "Economy", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "Unseasonal Rain Threatens Eight Percent Loss In Wheat Crop", "summary": "Some wheat-growing states in India may face a 6-8 per cent crop loss due to recent unseasonal rains and high winds. Heavy winds caused about 60% of nearly mature plants to fall in parts of Uttar Pradesh. While the government expects a record harvest of 120.21 million tonnes, farmers fear yield and quality losses if sunshine does not return soon to water-logged farms.", "category": "Economy", "page": 9, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "Rabi Pulse Prices Ease On Improved Mandi Arrivals", "summary": "Average wholesale prices of rabi pulses like chana (gram) and lentils have eased as arrivals increase in major producing regions. Chana prices fell to ₹5,042 per quintal, staying below the minimum support price. Experts suggest prices will remain range-bound due to comfortable supply and high landed costs for imports resulting from a weaker rupee and West Asia tensions.", "category": "Economy", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "RBI Staffers Call For Monitoring Of Evolving Geopolitical Situation", "summary": "The RBI’s latest monthly bulletin notes that the Indian economy's resilience to external shocks has strengthened, but West Asia conflict requires close monitoring. Staffers emphasized that surging energy prices and potential transport disruptions pose upside risks to inflation. Proactive policy measures including domestic fuel refining and safe passage initiatives are underway.", "category": "Economy", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "RBI Announces Monetary Policy Committee Meeting Schedule For Fiscal Year 2027", "summary": "The Reserve Bank of India has announced the calendar for its bi-monthly monetary policy committee (MPC) meetings for the 2026-27 financial year. The first meeting is scheduled for April 6-8, 2026. The six-member rate-setting panel, led by the RBI Governor, will hold a total of six meetings throughout the year to review and determine national interest rates.", "category": "Economy", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "Andhra Pradesh Minister Nara Lokesh Vows To Expedite All Major Investments", "summary": "Andhra Pradesh IT Minister Nara Lokesh stated that the government is personally monitoring 760 projects entered into via pacts over the last 20 months. He highlighted the state's cluster-based approach and the construction of a new international airport at Bhogapuram. Lokesh noted that the state has attracted 25.3% of total domestic investments recently due to a pro-development image.", "category": "Economy", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "Government Restores Full Export Benefits Under RoDTEP Scheme", "summary": "The government has restored full benefits under the RoDTEP scheme, reversing a sharp 50% cut announced last month. The decision provides relief to exporters in the textile, engineering, and chemical sectors currently facing West Asia trade disruptions. Exporters welcomed the move, stating that stable incentives are critical for long-term planning and global competitiveness.", "category": "Economy", "page": 11, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "Income Tax Department Portal To Facilitate Compliance During Transition", "summary": "The I-T Department announced that its e-filing portal will allow taxpayers to use old forms for assessments and returns pertaining to the period before the new Income Tax Act, 2025. Taxpayers filing returns in July 2026 will still use the old prescribed forms for the 2026-27 assessment year, while advance tax payments for the new year will be handled under the new Act.", "category": "Economy", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "RBI Negotiates CBDC Remittance Rails with Five Countries", "summary": "The Reserve Bank of India is in talks with central banks from 4-5 countries to develop cross-border Central Bank Digital Currency (CBDC) transaction rails. The initiative aims to reduce the cost and complexity of remittances for both wholesale and retail segments. India is a leading recipient of inward remittances, receiving over $107 billion so far in FY26.", "category": "Economy", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "Indian Rupee Hits Fresh All-Time Low Against US Dollar", "summary": "The Indian rupee closed at a record low of 93.97 against the US dollar on Monday. Heightened West Asia tensions and surging crude oil prices put significant pressure on the currency. Traders reported the RBI intervened to defend the 94-per-dollar level. A State Bank of India report suggests the rupee could breach the 96 mark if the conflict persists for another month.", "category": "Economy", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "RBI Bulletin Urges Proactive Measures to Limit West Asia Spillovers", "summary": "The Reserve Bank of India’s 'State of the Economy' report warns that proactive measures are needed to blunt the impact of global fuel supply disruptions. With India importing 80% of its oil, the conflict requires close monitoring despite the economy's strengthened resilience. The report suggests an Economic Stabilisation Fund could provide fiscal headroom to respond to global headwinds.", "category": "Economy", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "Finance Minister Rules Out Complete Loan Waiver for Farmers", "summary": "Finance Minister Nirmala Sitharaman informed Parliament that the central government is not considering any proposal for a complete loan waiver for farmers. She highlighted existing measures to support the sector, such as the Kisan Credit Card scheme providing crop loans up to ₹3 lakh at subsidized rates and enhanced collateral-free agricultural loans.", "category": "Economy", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "Gold Loan Companies Seek Delay in RBI’s New Lending Norms", "summary": "The Association of Gold Loan Companies has requested the RBI to defer the implementation of revised gold and silver collateral lending guidelines by six months. The new framework is currently set for April 1, 2026. The association cited global uncertainties and potential risks to credit access for borrowers as reasons for seeking a postponement.", "category": "Economy", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "Delhi Per Capita Income Projected to Reach ₹5.31 Lakh", "summary": "Delhi's per capita income is estimated to grow by 7.92% to reach ₹5,31,610 in FY26, according to the state’s economic survey. This figure is roughly 2.5 times higher than the national average. Chief Minister Rekha Gupta tabled the report in the Delhi Assembly, highlighting the capital's sustained economic growth compared to national levels.", "category": "Economy", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "RBI Becomes Net Buyer of Dollars for First Time in Eight Months", "summary": "The Reserve Bank of India net-bought $2.52 billion in January 2026, marking its first net purchase in eight months. The central bank's monthly bulletin showed it bought $27.99 billion and sold $25.47 billion during the month. The maturity profile of outstanding forwards suggests a shift toward longer-tenor contracts to manage external shocks.", "category": "Economy", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "Net Foreign Direct Investment Remains Negative for Fifth Consecutive Month", "summary": "Net FDI in India remained in negative territory in January 2026, weighed down by high repatriation and outbound investments by domestic firms. While gross inflows were stable at $5.67 billion, repatriation by foreign investors reached $4.92 billion. Net FDI for the April-January period stood at $1.65 billion, down from $2.16 billion in the same period last year.", "category": "Economy", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "Outward Remittances Under LRS Scheme Decline Slightly in January", "summary": "Outward remittances under the Liberalised Remittance Scheme (LRS) dropped 3.19% year-on-year to $2.68 billion in January. Remittances for overseas education fell by over 27%, while funds for immovable property and equity investments saw significant growth of 67% and 70% respectively. International travel continues to account for over 60% of total LRS outflows.", "category": "Economy", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "NRI Deposit Flows Fall 26% During April-January Period", "summary": "Inflows into non-resident Indian (NRI) deposit schemes dropped to $10.61 billion during the April-January FY26 period, compared to $14.31 billion a year ago. Foreign Currency Non-Resident (FCNR) deposits saw the sharpest decline in flows. However, the total outstanding NRI deposits reached $165.78 billion as of January 2026, up from $161.21 billion in the previous year.", "category": "Economy", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "Bond Yields Moderate Following Trump’s Iranian Strike Postponement", "summary": "The 10-year benchmark government bond yield eased to 6.84% after spiking to 6.88% earlier in the day. The cooling followed US President Trump's announcement of a five-day pause in military actions against Iran. Domestic yields remain sensitive to US Treasury movements and crude oil prices, which have fluctuated significantly due to the ongoing West Asia conflict.", "category": "Economy", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "Global Oil Prices Plunge as US Pauses Iran Strikes", "summary": "Benchmark Brent crude fell over 10% to around $96 per barrel following US President Trump's decision to postpone strikes on Iranian infrastructure. The Indian basket of crude has averaged $119 so far in March. Two Indian-flagged LPG tankers successfully crossed the Strait of Hormuz during the brief window of de-escalation, heading toward Indian ports with 92,000 tonnes of fuel.", "category": "Economy", "page": 6, "importance": 10, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "Indian Remittances Projected to Hit Record $140 Billion in FY26", "summary": "A State Bank of India report forecasts that inward remittances will reach a record $137-140 billion in FY26. Despite West Asia tensions, flows have seen a 30-35% surge in March as expatriates make 'precautionary' transfers. India remains the world's top recipient of remittances, with the US, UAE, and UK being the primary source countries.", "category": "Economy", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "Indian Sugar Mills Lock in Export Deals as Rupee Hits Low", "summary": "Sugar mills in India have signed deals to export 100,000 metric tons in a week, capitalising on a record low rupee and high global prices. The West Asia crisis has increased expectations that Brazil will divert more sugarcane to ethanol, pushing global sugar prices up. African nations and Sri Lanka are the primary buyers for April and May shipments.", "category": "Economy", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "Coal Minister Warns Against Profiteering in Retail Coal Market", "summary": "Union Minister G Kishan Reddy directed state governments to prevent price hikes and profiteering in the retail coal market. As the West Asia crisis squeezes LPG supplies, many consumers are switching to coal, creating upward price pressure. Reddy stated the Centre has written to Chief Ministers to ensure price stability for alternative fuels during the energy disruption.", "category": "Economy", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "Banking System Liquidity Slips into Deficit Due to Tax Outflows", "summary": "India's banking system liquidity fell into a deficit of approximately ₹65,395 crore due to significant advanced tax and GST outflows totaling ₹3 trillion. This marks the first deficit in two months. Experts believe the situation is temporary, with liquidity expected to return to a surplus by the first week of April as government expenditure resumes.", "category": "Economy", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "Govt Restores Full Rodtep Export Benefits Amid West Asia Crisis", "summary": "The central government has restored full duty benefits under the Remission of Duties and Taxes on Exported Products (Rodtep) scheme. The move reverses a previous decision to halve the rates, following concerns from the exporting community about global trade disruptions. The restored rates apply to all eligible products from February 23 until the end of March 2026.", "category": "Economy", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "High GDP Growth Not Translating into Job Creation, Says Economist", "summary": "Economist Jayati Ghosh stated that India's high growth rate has failed to produce meaningful employment, calling the pattern a 'global outlier.' She noted that formal employment has seen virtually no expansion between 2012 and 2024. Ghosh highlighted that real wages have stagnated and women's paid employment has declined, despite India growing at 6-8% over a long period.", "category": "Economy", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "Attacks on Energy Infrastructure Pose Long-Term Global Economic Risks", "summary": "Experts at the CERAWeek energy conference warned that recent attacks on Persian Gulf energy facilities could have multi-year consequences. Unlike temporary transit blockades, damage to LNG processing plants in Qatar and Iran may take up to five years to repair. Economists speculate that such disruptions could lead to sustained global inflation and push several economies into recession.", "category": "Economy", "page": 8, "importance": 9, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "US Energy Secretary States Oil Prices Not Yet at Demand Destruction Level", "summary": "US Energy Secretary Chris Wright said at CERAWeek that current oil prices above $100 have not yet caused significant demand destruction. He announced the US will release up to 1.5 million barrels per day from the Strategic Petroleum Reserve to stabilize markets. Wright prioritized supplying Asian refineries to prevent downturns in the region's industrial output.", "category": "Economy", "page": 8, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "New ATM and UPI Cash Withdrawal Rules to Start April 1", "summary": "Starting April 2026, several banks will count UPI-based cardless cash withdrawals toward a customer's monthly free ATM transaction limit. Once the limit is exhausted, a fee of ₹23 plus taxes will apply. Additionally, Punjab National Bank is reducing daily ATM withdrawal limits on several card variants. These changes aim to standardize fees across different cash withdrawal methods.", "category": "Economy", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "RBI approves record ₹2.11 lakh crore dividend for the Central Government", "summary": "The Reserve Bank of India board approved a record-high dividend payout of ₹2.11 lakh crore to the Central Government for the 2023-24 fiscal year. This massive surplus transfer, more than double the previous year's amount, is expected to provide significant fiscal relief to the government and help in meeting its deficit targets.", "category": "Economy", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/117932", "sources": [{"newspaper": "Indian Express", "pdf_filename": "cleaned_IE Delhi 24-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117932"}]}, {"headline": "Center to procure 5 lakh tonnes of onions for buffer stock", "summary": "The Central Government has directed agencies to begin the procurement of 5 lakh tonnes of onions from the rabi season for the national buffer stock. This move is designed to prevent price spikes during the lean season and ensure a steady supply in domestic markets. Procurement will be handled by agencies like NCCF and NAFED.", "category": "Economy", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117932", "sources": [{"newspaper": "Indian Express", "pdf_filename": "cleaned_IE Delhi 24-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117932"}]}, {"headline": "Cabinet approves hike in minimum support price for 2024-25 kharif crops", "summary": "The Union Cabinet has approved an increase in the Minimum Support Price (MSP) for 14 Kharif crops for the 2024-25 marketing season. The hike is aimed at ensuring remunerative prices for farmers and encouraging crop diversification, particularly towards oilseeds and pulses to reduce import dependency.", "category": "Economy", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117932", "sources": [{"newspaper": "Indian Express", "pdf_filename": "cleaned_IE Delhi 24-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117932"}]}, {"headline": "Minister Muniyappa Announces Increased LPG Supply for Karnataka Hotels", "summary": "Food and Civil Supplies Minister K.H. Muniyappa announced that 10,000 commercial LPG cylinders will be supplied daily to Karnataka’s hotel industry to ease a severe shortage. This accounts for roughly 20% of the industry's daily needs. Educational institutions will receive 4,200 cylinders. The Minister urged hotels to explore sustainable energy sources like solar and biomass.", "category": "Economy", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117941", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -24-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117941"}]}, {"headline": "Centre Unveils Plans to Boost Creative Orange Economy", "summary": "Union Minister Ashwini Vaishnaw launched three initiatives to strengthen India's media and digital sector. These include a National AI Skilling Initiative with Google and YouTube, the MyWAVES citizen creator platform, and the rollout of in-built satellite tuners in TV sets for DD Free Dish. The initiatives aim to make technology affordable and help creators master AI tools.", "category": "Economy", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117941", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -24-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117941"}]}, {"headline": "LPG Shortage Forces Small Eateries to Buy Domestic Cylinders for High Prices", "summary": "Ongoing LPG supply disruptions in Bengaluru have forced small eateries to buy domestic cylinders on the black market for up to ₹5,000. Many hoteliers reported that alternatives like induction stoves and firewood are not viable for commercial use. The shortage has also impacted roadside ironing stalls, with some workers paying four times the normal rate for gas.", "category": "Economy", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117941", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -24-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117941"}]}, {"headline": "GBA to Take Over Properties of Chronic Tax Defaulters", "summary": "The Greater Bengaluru Authority (GBA) announced it will begin taking over properties of chronic tax defaulters as a last resort. This decision follows failed recovery attempts and unsuccessful auctions. The GBA will purchase the properties at the notified upset price, settle dues from the proceeds, and refund any surplus to the original owners. Defaulters have one month to clear arrears.", "category": "Economy", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117941", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -24-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117941"}]}, {"headline": "Minister Krishna Byre Gowda Defends Subsidies as Economic Drivers", "summary": "Revenue Minister Krishna Byre Gowda told the Karnataka Legislative Assembly that subsidies for the poor strengthen the economy by boosting consumer demand. He noted that Karnataka tops the country in GST revenue growth and per capita income. He argued against 'criminalising' subsidies, stating that funds provided to the poor circulate multiple times, creating a positive ripple effect.", "category": "Economy", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117941", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -24-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117941"}]}, {"headline": "Indian Stock Markets Poised for Relief Rally as War Fears Recede", "summary": "Indian equity indices are set for a 3-4% rebound following Donald Trump’s conciliatory remarks on the Iran conflict. The Nifty, which had hit a one-year low of 22,512.65, is expected to recover as oil prices ease and capital flight risks diminish. Analysts suggest a relief rally led by short covering, though they warn of continued volatility if tensions flare again in the Strait of Hormuz.", "category": "Economy", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/117990", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_24-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117990"}]}, {"headline": "Sebi Board Approves Tighter Conflict Code and Easier FPI Settlement", "summary": "The Sebi board has approved a new conflict-of-interest code that classifies chairpersons of listed firms and whole-time board members as insiders, restricting their trade during sensitive periods. Additionally, the regulator eased settlement norms for foreign portfolio investors (FPIs), a move intended to simplify the operational framework for global funds investing in Indian markets.", "category": "Economy", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117990", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_24-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117990"}]}, {"headline": "RBI Warns of Need for Proactive Steps to Limit War Spillovers", "summary": "The Reserve Bank of India (RBI) emphasized the need for vigilant monitoring and proactive measures to protect the Indian economy from adverse spillovers of the West Asia conflict. While India’s forex reserves are at a comfortable $729 billion, the RBI warned that a sustained rise in oil prices could impact the current account deficit and put downward pressure on the rupee.", "category": "Economy", "page": 12, "importance": 9, "telegram_url": "https://t.me/c/1877410077/117990", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_24-03-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/117990"}]}, {"headline": "IEA Chief Warns Global Economy Faces Major Threat from Iran War", "summary": "Fatih Birol, Executive Director of the International Energy Agency (IEA), warned that the global economy faces a 'major threat' if the Iran-US conflict continues to escalate. He highlighted the vulnerability of global oil and gas markets, particularly the potential closure of the Strait of Hormuz, which could trigger an energy crisis similar to those of the 1970s.", "category": "Economy", "page": 15, "importance": 9, "telegram_url": "https://t.me/c/1877410077/117990", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_24-03-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/117990"}]}, {"headline": "India's Strategic Oil Reserves Only Sufficient for About 5 Days", "summary": "The Ministry of Petroleum informed Parliament that India’s strategic petroleum reserves (SPR) are currently 64% full, holding approximately 5.33 million metric tonnes of crude. At current consumption rates, this stockpile would only last about five days in the event of a total supply disruption, highlighting the country's vulnerability to prolonged energy shocks in West Asia.", "category": "Economy", "page": 16, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117990", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_24-03-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/117990"}]}, {"headline": "K’taka tops GST growth rate, lags behind Maha in collection", "summary": "Karnataka recorded a nation-high GST growth rate of 11.7% for 2025-26, collecting ₹1.44 lakh crore. However, it trails Maharashtra, which collected ₹3.28 lakh crore with 8% growth. Bihar followed Karnataka with an 11.4% growth rate. The figures reflect post-settlement GST data and highlight the economic performance of major Indian states.", "category": "Economy", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/118010", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_24-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/118010"}]}, {"headline": "B’luru’s bajji-bonda shops in hot as black market boils over", "summary": "A shortage of commercial LPG cylinders in Bengaluru has forced small eateries to use firewood or buy cylinders at black market prices up to ₹10,000. The crisis, linked to West Asia tensions, has hit the hospitality sector hard. The government is conducting raids to check the illegal diversion of domestic LPG cylinders for commercial use.", "category": "Economy", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/118010", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_24-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/118010"}]}, {"headline": "Your next LPG refill could be 10kg instead of 14.2kg", "summary": "Oil marketing companies are considering a proposal to deliver 10kg LPG cylinders instead of the standard 14.2kg to domestic consumers. The move aims to manage limited supplies and ensure more equitable distribution during the current shortage. Petroleum ministry officials say the proposal is under discussion but no final decision has been made yet.", "category": "Economy", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/118010", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_24-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/118010"}]}, {"headline": "Independent directors must act responsibly, says Sebi chief", "summary": "Sebi chairperson Madhabi Puri Buch emphasized that independent directors must act as custodians of minority shareholders' interests and ensure good corporate governance. The regulator is closely monitoring board conduct, especially in cases involving high-profile corporate disputes. Buch stated that directors must ensure transparency and accountability in their roles.", "category": "Economy", "page": 13, "importance": 8, "telegram_url": "https://t.me/c/1877410077/118010", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_24-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/118010"}]}, {"headline": "Rupee closes at record low of 93.98 against dollar", "summary": "The Indian rupee hit a record closing low of 93.98 against the US dollar, pressured by the West Asia conflict and rising oil prices. The currency even slipped past the 94-level in intraday trade. Investors' concerns over a widening trade deficit and capital outflows from emerging markets have contributed to the rupee's ongoing weakness.", "category": "Economy", "page": 13, "importance": 8, "telegram_url": "https://t.me/c/1877410077/118010", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_24-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/118010"}]}, {"headline": "Delhi lowers per capita water requirement estimate to 50 gallons", "summary": "Authorities have reduced Delhi's per capita water requirement benchmark from 60 to 50 gallons per day for a projected population of 25 million. The estimate could drop further to 40 gallons in future surveys. This comes as the city grapples with resource management and a growing population.", "category": "Infrastructure", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117999", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "Bangalore_HT_24-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117999"}]}, {"headline": "Andhra CM Naidu lays foundation for ₹1.5L cr AMNS steel plant", "summary": "Andhra Pradesh CM Chandrababu Naidu laid the foundation stone for ArcelorMittal Nippon Steel India’s mega greenfield plant in Anakapalli. The project involves a ₹1.5 lakh crore investment and is expected to generate 100,000 jobs. The facility aims to produce 17.8 million metric tonnes of steel per annum.", "category": "Infrastructure", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117999", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "Bangalore_HT_24-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117999"}]}, {"headline": "SC raps West Bengal for stalling Kolkata Metro work", "summary": "The Supreme Court dismissed a plea by the West Bengal government to postpone construction of the Orange Line Metro route. The court criticized the state for its 'obstinate' attitude and for using the election code as an excuse to stall development. The state is duty-bound to provide logistical support for the project.", "category": "Infrastructure", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117999", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "Bangalore_HT_24-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117999"}]}, {"headline": "Air India flight diverted to Jeddah due to technical issue", "summary": "An Air India Boeing 787-8 flying from Bengaluru to London was diverted to Jeddah as a precautionary measure following a technical fault. The aircraft was airborne for six hours before the diversion. All passengers and crew are safe, and the plane is undergoing inspections in accordance with safety protocols.", "category": "Infrastructure", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117999", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "Bangalore_HT_24-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117999"}]}, {"headline": "Oil Marketing Companies Plan More LPG Storage Amid West Asia Conflict", "summary": "Indian oil marketing companies are aggressively pursuing plans to set up new underground cavern storage sites for liquefied petroleum gas (LPG). The decision aims to bolster energy security as the West Asia conflict impacts imports. India currently has two caverns with a 1.40 lakh tonne capacity and is looking to build more to ensure strategic autonomy and stable supply for 33 crore consumers.", "category": "Infrastructure", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "Telangana Sets Up Panel To Expedite Musi River Rejuvenation Project", "summary": "Telangana Chief Minister A Revanth Reddy announced a Cabinet Sub-Committee to oversee the rejuvenation of the Musi River. The project includes plans for an underpass at Begumpet airport and the expansion of the Metro rail. The government assured that all residents displaced by the river development will be rehabilitated and provided with proper housing.", "category": "Infrastructure", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "AM/NS India Begins Work on ₹1.36 Trillion Andhra Steel Plant", "summary": "ArcelorMittal Nippon Steel India (AM/NS India) has started work on a massive greenfield integrated steel plant in Anakapalli, Andhra Pradesh. The project involves a total investment of ₹1.36 trillion across phases and a ₹11,198 crore captive port. The plant will have an ultimate capacity of 17.8 million tonnes per annum, creating up to 100,000 direct and indirect jobs.", "category": "Infrastructure", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "LPG Supply Gap Persists Despite New Saudi Arabian Route", "summary": "India's LPG receipts for March are expected to fall 1 million tonnes short of February levels as the Strait of Hormuz remains risky for non-Iranian tankers. While a new route via Saudi Arabia’s Yanbu terminal has opened, it is currently insufficient to meet the deficit. The government is attempting to secure more spot cargoes from the US to prevent domestic rationing in April.", "category": "Infrastructure", "page": 6, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "India’s Energy Security Ambitions Falter as Import Dependence Rises", "summary": "Despite a decade-old goal to reduce energy imports, India's dependence on foreign crude oil has increased from 80% in 2015 to nearly 89% in 2026. Domestic production remains stagnant due to aging assets and high-risk exploration conditions. The current LPG crisis underscores the vulnerability of India's energy supply, which relies heavily on imports passing through the Strait of Hormuz.", "category": "Infrastructure", "page": 18, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "Govt Orders PNG Connectivity for Educational Institutions Within Five Days", "summary": "The Petroleum and Natural Gas Regulatory Board (PNGRB) has directed city gas distribution firms to provide piped natural gas (PNG) connections to schools, colleges, and hostels within five days. The priority mandate aims to protect vulnerable sections from the ongoing LPG shortage. State governments have also been asked to streamline local approvals to fast-track the laying of infrastructure.", "category": "Infrastructure", "page": 19, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 19, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "Water level in Yamuna falls below normal due to lack of rainfall", "summary": "The water level in the Yamuna River has dropped significantly below the normal mark at the Wazirabad pond, affecting the production of treated water in the capital. Authorities have urged residents to use water judiciously as the city deals with an unprecedented heatwave and rising demand from the local population.", "category": "Infrastructure", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117932", "sources": [{"newspaper": "Indian Express", "pdf_filename": "cleaned_IE Delhi 24-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117932"}]}, {"headline": "Chinnaswamy Stadium Holds Readiness Drill Ahead of IPL 2026", "summary": "An expert committee conducted a full-fledged drill at M. Chinnaswamy Stadium to assess its readiness for IPL 2026 matches. The overhaul followed recommendations from the Justice Michael Cunha report, focusing on CCTV placement, queue management, and technical upgrades. A final functionality drill is scheduled for March 26, two days before the first match in Bengaluru.", "category": "Infrastructure", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117941", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -24-03-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117941"}]}, {"headline": "Karnataka to Install CCTVs in 20,000 Ration Shops to Stop Leakage", "summary": "Food and Civil Supplies Minister K.H. Muniyappa announced a tender to install CCTV cameras in 20,000 Public Distribution System (PDS) shops. The initiative includes GPS tracking for transport vehicles and a central command centre. These measures are intended to prevent the diversion of food grains to the black market and ensure transparency in the distribution system.", "category": "Infrastructure", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117941", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -24-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117941"}]}, {"headline": "Telangana to Build Underground Traffic Tunnel Beneath Begumpet Airport", "summary": "Telangana Chief Minister A. Revanth Reddy announced plans to construct a traffic tunnel beneath the runway of Hyderabad’s Begumpet Airport to ease congestion. The project has received permission from the Airports Authority of India. The Chief Minister claimed this is a first-of-its-kind project globally involving an operational airport runway.", "category": "Infrastructure", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117941", "sources": [{"newspaper": "The Hindu", "pdf_filename": "cleaned_TH -Bangalore -24-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117941"}]}, {"headline": "Naval Group Offers Rapid Production of Scorpene Submarines for India", "summary": "French manufacturer Naval Group has proposed a 'rapid, low-risk solution' to add more Scorpene-class submarines to the Indian Navy's fleet. The company aims to utilize the existing infrastructure at Mazagon Dock Shipbuilders for indigenous production, potentially making India a hub for submarine upgrades and maintenance for friendly partner nations.", "category": "Infrastructure", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117990", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_24-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117990"}]}, {"headline": "Two Indian LPG Vessels Cross Strait of Hormuz Amid Tensions", "summary": "Two Indian-flagged vessels carrying LPG, Jag Vasant and Pine Gas, successfully crossed the Strait of Hormuz despite the ongoing conflict. The transit was closely monitored by Indian naval authorities. The successful passage provided some relief to India's domestic gas supply chain, which has been under strain due to maritime security concerns in the Persian Gulf.", "category": "Infrastructure", "page": 16, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117990", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_24-03-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/117990"}]}, {"headline": "FIRs against contractors over garbage collection halt in Bengaluru", "summary": "BBMP has filed FIRs against waste management contractors after garbage collection was halted in 76 localities. The strike by workers was sparked by disputes over waste segregation and working conditions. The suspension of services led to public health concerns and accumulation of waste, prompting the civic body to take legal action against the vendors.", "category": "Infrastructure", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/118010", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_24-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/118010"}]}, {"headline": "Safety takes back seat as 1k+ killed in bus accidents", "summary": "Over 1,127 people have died in private bus accidents in Karnataka over the last six years. Fatalities rose sharply from 117 in 2021 to 242 in 2024. Despite thousands of inspections and crores in fines, violations like speeding and driver negligence remain high. The transport department has issued new safety guidelines to curb the rising death toll.", "category": "Infrastructure", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/118010", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_24-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/118010"}]}, {"headline": "Quadrupling of Whitefield-Bangarpet section notified to ease congestion", "summary": "South Western Railway has notified the quadrupling of the 42-km Whitefield-Bangarpet rail stretch. The ₹1,481-crore project will add two new lines, effectively doubling capacity and reducing delays for trains between Bengaluru and Chennai. The expansion is expected to benefit both passenger and freight traffic once completed.", "category": "Infrastructure", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/118010", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_24-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/118010"}]}, {"headline": "SWR reports year free of major accidents in fiscal 2025-26", "summary": "South Western Railway reported no major train accidents resulting in fatalities or serious injuries during the 2025-26 fiscal year. While six derailments occurred, they were classified as non-serious. The zone attributes its safety record to improved track maintenance and the implementation of advanced safety protocols across its network.", "category": "Infrastructure", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/118010", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_24-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/118010"}]}, {"headline": "CAG warns of public health risk as Delhi groundwater fails tests", "summary": "A CAG report found that over 50% of groundwater samples tested in Delhi between 2017 and 2022 were unfit for drinking. The findings indicate a 'serious risk' to public health, highlighting significant contamination issues in the capital's water table.", "category": "Health", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117999", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "Bangalore_HT_24-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117999"}]}, {"headline": "Patient dies at RG Kar hospital after being denied assistance", "summary": "A 61-year-old man died at Kolkata’s state-run RG Kar Medical College and Hospital after his family alleged he was forced to walk 50 meters to a toilet without a wheelchair or trolley. The patient had been admitted for chest pain and respiratory issues. Hospital authorities have sought a report on the incident.", "category": "Health", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117999", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "Bangalore_HT_24-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117999"}]}, {"headline": "CDSCO Flags 194 Drugs for Quality Failure in February 2026", "summary": "The Central Drugs Standard Control Organisation (CDSCO) identified four drug batches as spurious and 194 others as 'not of standard quality' (NSQ) during routine surveillance. Spurious items included antibiotics (Amoxycillin and Potassium Clavulanate) and liver ailment treatments. The regulator also flagged batches of antibacterial creams used for eczema and psoriasis.", "category": "Health", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "Indian Pharma Firms Launch Generic Semaglutide After Patent Expiry", "summary": "Ten Indian pharmaceutical companies, including Zydus, Sun Pharma, and Alkem, have launched branded generic versions of semaglutide following its patent expiry. The drug is used to treat diabetes and obesity. Generic versions are being priced significantly lower than the innovator's market rate. Analysts expect the Indian semaglutide market to grow to ₹12,000 crore in five years.", "category": "Health", "page": 12, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117995", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 24-03-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/117995"}]}, {"headline": "Health ministry warns against rising heatstroke cases amidst record temperatures", "summary": "The Health Ministry has directed state governments to strengthen hospital preparedness for heat-related illnesses as temperatures soar across India. Hospitals are advised to set up dedicated heatstroke rooms and ensure a steady supply of essential medicines and fluids to treat vulnerable patients suffering from extreme heat exposure.", "category": "Health", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117932", "sources": [{"newspaper": "Indian Express", "pdf_filename": "cleaned_IE Delhi 24-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117932"}]}, {"headline": "Stigma and lack of awareness delay endometriosis treatment", "summary": "Doctors highlight that social stigma and a lack of awareness are delaying the diagnosis of endometriosis, which affects 10% of women. Symptoms like severe menstrual pain are often dismissed as normal, leading to years of suffering. Early intervention is crucial to manage the chronic condition and prevent complications like infertility and chronic pain.", "category": "Health", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/118010", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_24-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/118010"}]}, {"headline": "Barracks turn nursery for children of women inmates", "summary": "Bengaluru Central Prison has set up a child-care centre within its barracks for the children of women inmates. the centre provides a child-friendly environment with toys, education, and psychological counseling. It aims to ensure that the children's development and well-being are not compromised while they remain with their mothers in the facility.", "category": "Health", "page": 5, "importance": 4, "telegram_url": "https://t.me/c/1877410077/118010", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_24-03-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/118010"}]}, {"headline": "Tamil Nadu leads India’s fast-food consumption, triggers health concerns", "summary": "A study found that Tamil Nadu has the highest per capita spending on fast food in India, followed by Karnataka and Telangana. The trend is linked to rising rates of obesity and diabetes. Experts call for region-specific public health strategies and better food labeling to address the health risks associated with high consumption of ultra-processed foods.", "category": "Health", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/118010", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_24-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/118010"}]}, {"headline": "India rejigs defense attache network to boost military exports", "summary": "India has reshuffled its defense attache network to focus on nations likely to purchase Indian-made weapons rather than traditional suppliers. CDS General Anil Chauhan stated the move aims to meet a ₹50,000 crore export target by 2029-30. Visibility is being increased in Southeast Asia, Africa, and Latin America.", "category": "Business", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117999", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "Bangalore_HT_24-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117999"}]}, {"headline": "OnlyFans owner Leonid Radvinsky dies of cancer at 43", "summary": "Leonid Radvinsky, the billionaire owner of adult content platform OnlyFans, has died at age 43 after a battle with cancer. Radvinsky purchased a majority stake in 2018, transforming the company into a cultural and financial powerhouse for content creators.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117999", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "Bangalore_HT_24-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117999"}]}, {"headline": "Police bust Q-Net money circulation racket; 32 arrested across states", "summary": "Hyderabad police arrested 32 people for running an illegal multi-level marketing scheme under the brand Q-Net. The racket, which allegedly targeted software employees and businessmen with high-return investment promises, operated in Telangana, Andhra Pradesh, and Karnataka.", "category": "Business", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117999", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "Bangalore_HT_24-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117999"}]}, {"headline": "Centre restores full RoDTEP export benefits amid maritime disruptions", "summary": "The government has rolled back a February decision that halved rebate rates for exporters under the RoDTEP scheme. The restoration aims to support Indian exporters facing high freight costs and volatility due to the West Asia war. Rates will revert to those in force as of February 22 for all eligible products.", "category": "Business", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117999", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "Bangalore_HT_24-03-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117999"}]}, {"headline": "Former Google executive Matt Brittin named new BBC director-general", "summary": "Matt Brittin, a former Google executive, has been confirmed as the new director-general of the BBC. His appointment was approved by the BBC board and aims to bring digital expertise to the public broadcaster. An official announcement is expected later this week.", "category": "Business", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117999", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "Bangalore_HT_24-03-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/117999"}]}, {"headline": "Global selloff wipes ₹14 trillion off BSE as Sensex dives", "summary": "Indian stock markets crashed in line with global indices, with the Sensex falling 1,837 points (2.46%) and the Nifty tanking 2.6%. BSE's market capitalization fell by ₹14 trillion. Smallcap and midcap indices entered bear market territory, down over 20% from their peaks, as geopolitical tensions and oil volatility spooked investors.", "category": "Business", "page": 12, "importance": 9, "telegram_url": "https://t.me/c/1877410077/117999", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "Bangalore_HT_24-03-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/117999"}]}, {"headline": "March FPI outflows exceed Covid-era records at $79 billion", "summary": "Foreign portfolio investors (FPIs) pulled $79 billion from Indian markets in the first half of March, surpassing the peak selling seen during the 2020 pandemic. FPI ownership in NSE-listed companies has hit a 15-year low of 16.7%. The exodus is attributed to rising oil prices and a shift to safe-haven dollar assets.", "category": "Business", "page": 12, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117999", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "Bangalore_HT_24-03-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/117999"}]}, {"headline": "SEBI Approves Net Settlement Of Funds For Foreign Portfolio Investors", "summary": "Markets regulator SEBI has approved fund netting for Foreign Portfolio Investors (FPIs) in the cash market. This move is designed to reduce funding costs and foreign exchange outflows by allowing FPIs to settle the net difference between buy and sell positions rather than each trade separately. The new framework is expected to be implemented by December 31, 2026.", "category": "Business", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "Sharp Partners With Amber Enterprises For Local Air Conditioner Production", "summary": "Sharp Business Systems (India) has tied up with Amber Enterprises to locally manufacture air conditioners. The partnership aims to capture a 2-3 per cent share of the Indian AC market over the next five years. This move supports Sharp's expansion in India’s rapidly growing cooling market, which recently crossed the annual sales mark of 1 crore units.", "category": "Business", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "INOX India Targets Sixteen Hundred Crore Revenue In Fiscal Year 2026", "summary": "Cryogenic equipment maker INOX India aims to reach ₹1,600 crore in revenue for FY26 by diversifying into industrial gases and specialized engineering. The company currently derives 31% of its order book from LNG infrastructure but is expanding into hydrogen, semiconductor purity gases, and maritime defense systems. Exports currently account for 62% of the company's total revenue.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "SK Minerals Eyes Joint Ventures In Saudi Arabia Japan And Korea", "summary": "SK Minerals & Additives is seeking joint venture partnerships in Saudi Arabia, Japan, and South Korea to develop technical expertise and tap into export markets for halogen-free flame retardants. The company aims to scale its manufacturing capacity five-fold to 19,000 metric tonnes per annum by March 2027 to meet high demand in the automotive, construction, and electronics sectors.", "category": "Business", "page": 2, "importance": 3, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "Entry Threshold For Social Impact Funds Cut To One Thousand Rupees", "summary": "SEBI has slashed the minimum investment threshold for individual investors in Social Impact Funds (SIFs) from ₹2 lakh to just ₹1,000. This change aligns SIFs with instruments listed on Social Stock Exchanges. By lowering the entry barrier, the regulator aims to attract more retail investors to channel capital toward non-profit social enterprises in education and healthcare.", "category": "Business", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "Innovision Stock Slumps Twenty Eight Percent On Listing Day", "summary": "Shares of Innovision made a weak debut on the stock exchanges, listing at a 10% discount and ending the day 28% below its offer price of ₹519. The stock hit the lower circuit on the BSE at ₹372.80. The IPO had seen moderate interest with a 3.32 times subscription after the company previously extended its closing date and trimmed its price band.", "category": "Business", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "SEBI Eases Winding Up Norms For Alternative Investment Funds", "summary": "SEBI has permitted Alternative Investment Funds (AIFs) to retain liquidation proceeds beyond their permissible life in specific cases involving litigation or pending tax notices. Funds with no active management can now enter a new 'inoperative funds' category subject to lighter compliance norms. The retention period for such proceeds is capped at three years from the end of the fund's life.", "category": "Business", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "Regulator Relaxes Operational Rules For InvITs And REITs", "summary": "SEBI has amended regulations to allow InvITs to continue holding investments in special purpose vehicles even after underlying infrastructure projects conclude. The regulator also broadened investment avenues for surplus funds and relaxed borrowing norms for trusts with higher leverage. Trusts can now raise fresh debt for capital expenditure and maintenance of road projects.", "category": "Business", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "Marquee Investors Back Swan Defence Five Hundred Crore Stake Sale", "summary": "Promoters of Mumbai-based Swan Defence and Heavy Industries raised ₹500 crore through an Offer for Sale (OFS) that was subscribed 1.2 times. High-profile investors including Zerodha's Nikhil Kamath and Quant Mutual Fund participated in the stake sale. The shipyard at Pipavav recently secured orders for chemical tankers and defense refit projects for the Indian Coast Guard and Oman Navy.", "category": "Business", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "Indian Sugar Mills Lock In Export Deals As Rupee Weakens", "summary": "Indian sugar mills have signed deals for 1,00,000 tonnes of exports in a single week as a record-low rupee and high global prices made overseas sales profitable. Dealers noted that Asian and African consumers are booking shipments for April and May to secure supply. The resumption of export activity follows several weeks of dormancy in the Indian sugar market.", "category": "Business", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "Government To Notify Maximum Retail Price For Bt Cottonseed Soon", "summary": "The Union Agriculture Ministry will soon declare the MRP for Bt cottonseed varieties for the upcoming kharif season. While industry sources expect prices to remain unchanged from last year's ₹900 per packet, a final decision is pending. About 95 per cent of India's cotton cultivation area is occupied by Bt cotton, though resistance to pink bollworm remains a concern.", "category": "Business", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "Natural Rubber Demand To Grow Over Three Percent In India", "summary": "India's natural rubber demand is projected to grow by 3.6 per cent this year, driven by the automotive and electric vehicle sectors. All India Rubber Industries Association President Anay Gupta stated that India is emerging as a reliable sourcing alternative to China. The global market is expected to face a supply deficit of 4 lakh tonnes in 2026 due to adverse weather and diseases.", "category": "Business", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "EKA Mobility Wins Order For Nine Hundred Electric Buses In Hyderabad", "summary": "Pune-based technology firm EKA Mobility has received a Letter of Award for the supply and deployment of 915 electric buses in Hyderabad. The project will be executed under the Government of India’s CESL-led PM E-DRIVE scheme. The deal underscores the accelerating transition to clean public transport in major Indian metropolitan areas.", "category": "Business", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117983", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_BL - Bangalore  - 24-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117983"}]}, {"headline": "Deep Tech Player Pranos Fusion Raises Seven Million Dollars In Funding", "summary": "Pranos Fusion has raised $6.8 million in an early-stage funding round co-led by pi Ventures and Ankur Capital. The capital will be used to advance fusion technology, including the commissioning of a tokamak and development of magnet systems. This investment highlights growing institutional interest in Indian deep-tech startups focusing on clean energy design and control.", "category": "Business", "page": 10, "importance": 5, "telegram_url": "https://t.me/c/1877410077/11798
