<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Inter', -apple-system, sans-serif;
  background: #0c0c0c; color: #fff; touch-action: none;
}
.outer { position: fixed; inset: 0; overflow: hidden; }
.h-track { display: flex; height: 100%; will-change: transform; }
.cat-panel { flex-shrink:0; width:100vw; height:100%; display:flex; flex-direction:column; overflow:hidden; }
.progress-row { flex-shrink:0; display:flex; gap:4px; padding:14px 16px 10px; background:#0c0c0c; position:relative; z-index:5; overflow:visible; }
.progress-row::after { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:80%; height:120px; background:radial-gradient(ellipse at top,color-mix(in srgb,var(--cc) 30%,transparent) 0%,transparent 70%); pointer-events:none; z-index:-1; }
.pseg { flex:1; height:2px; border-radius:1px; background:rgba(255,255,255,0.12); position:relative; overflow:hidden; }
.pseg::after { content:''; position:absolute; inset:0; background:var(--cc,#e8334a); transform:scaleX(0); transform-origin:left; transition:transform 0.25s ease; }
.pseg.done::after, .pseg.active::after { transform:scaleX(1); }
.v-feed { flex:1; overflow:hidden; position:relative; clip-path:inset(0); }
.v-track { display:flex; flex-direction:column; will-change:transform; }
.card { 
  width:100%; flex-shrink:0; background:#0c0c0c; display:flex; flex-direction:column; 
  overflow:hidden; position:relative; 
  scroll-margin-top: 80px;
}
.card.target-highlight {
  background: linear-gradient(135deg, #fff3cd22 0%, #ffeaa722 100%) !important;
  box-shadow: 0 0 30px rgba(255, 193, 7, 0.4);
  border: 2px solid #f39c12;
  animation: pulse-highlight 2s ease-in-out;
}
@keyframes pulse-highlight {
  0%, 100% { box-shadow: 0 0 30px rgba(255, 193, 7, 0.4); }
  50% { box-shadow: 0 0 50px rgba(255, 193, 7, 0.6); }
}
.card-content { flex:1; display:flex; flex-direction:column; padding:36px 20px 22px; min-height:0; position:relative; z-index:1; }
.card-toprow { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; flex-shrink:0; }
.cat-pill { display:inline-flex; align-items:center; gap:7px; background:#1c1c1e; border-radius:8px; padding:7px 12px 7px 10px; font-size:11.5px; font-weight:700; letter-spacing:0.07em; color:#d0d0d0; text-transform:uppercase; line-height:1; }
.pill-icon { width:16px; height:16px; background:#2e2e30; border-radius:3px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.pill-icon svg { display:block; }
.card-date { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:500; color:#666; letter-spacing:0.01em; }
.card-headline { font-size:28px; font-weight:800; line-height:1.18; color:#fff; letter-spacing:-0.03em; margin-bottom:20px; flex-shrink:0; }
.card-summary { font-size:15.5px; font-weight:400; line-height:1.62; color:#6b6b6b; flex:1; overflow:hidden; display:-webkit-box; -webkit-line-clamp:7; -webkit-box-orient:vertical; }
.card-divider { height:1px; background:#1e1e1e; margin:20px 0 16px; flex-shrink:0; }
.card-footer { display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.src-chip { display:inline-flex; align-items:center; gap:6px; background:#181818; border:1px solid #282828; border-radius:9px; padding:8px 13px; font-size:12.5px; font-weight:600; color:#c0c0c0; text-decoration:none; letter-spacing:0.005em; line-height:1; }
.src-chip-sep { color:#3a3a3a; font-weight:400; }
.src-chip-pg { color:#555; font-weight:500; }
.src-chip-ext { margin-left:2px; }
.src-chip-ext svg { display:block; }
.info-btn { width:36px; height:36px; border-radius:50%; border:1.5px solid #252525; background:#141414; display:flex; align-items:center; justify-content:center; color:#555; cursor:pointer; flex-shrink:0; }
.cat-flash { position:fixed; inset:0; z-index:600; pointer-events:none; opacity:0; transition:opacity 0.12s; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; }
.cat-flash.on { opacity:1; }
.cf-icon { font-size:34px; }
.cf-name { font-size:22px; font-weight:900; letter-spacing:-0.03em; text-transform:uppercase; }
.hint { position:fixed; display:flex; flex-direction:column; align-items:center; gap:5px; pointer-events:none; z-index:400; opacity:0; transition:opacity 0.6s ease; }
.hint.visible { opacity:1; }
.hint.gone { opacity:0 !important; transition:opacity 0.4s; }
.hint-pill { font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.55); background:rgba(255,255,255,0.07); backdrop-filter:blur(10px); padding:5px 13px; border-radius:100px; border:1px solid rgba(255,255,255,0.09); }
.hint-arr { font-size:16px; color:rgba(255,255,255,0.4); }
.h-up { bottom:28px; left:50%; transform:translateX(-50%); animation:bUp 2s ease-in-out infinite; }
.h-right { top:50%; right:14px; transform:translateY(-50%); animation:bRight 2s ease-in-out infinite 0.6s; }
@keyframes bUp { 0%,100% { bottom:28px; opacity:.65; } 50% { bottom:36px; opacity:1; } }
@keyframes bRight { 0%,100% { right:14px; opacity:.65; } 50% { right:6px; opacity:1; } }
</style>

<script>
const DIGEST   = {"date": "28 May 2026", "articles": [{"headline": "Foodgrain production in 2025-26 estimated to rise by 5%", "summary": "India's foodgrain production for the 2025-26 crop year is projected to reach 376.56 million tonnes, a 5% increase. Rice production is expected to hit a record high of 154 million tonnes. The growth is attributed to favourable monsoons and expanded area under cultivation across various crop categories including pulses and oilseeds.", "category": "Economy", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125185", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_28-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125185"}], "article_id": "66a05605"}, {"headline": "HDFC Bank may face scrutiny for alleged violation of RBI rules", "summary": "HDFC Bank shares fell 2.63% following reports of possible regulatory scrutiny by the RBI. The investigation concerns the alleged disguising of interest payments as marketing expenses for deposits placed by a Maharashtra government entity. The bank maintains it has robust internal audit controls and adheres to all regulatory principles.", "category": "Business", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125185", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_28-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125185"}], "article_id": "40b8de72"}, {"headline": "RBI's forex intervention in spot and forward market hits decadal high", "summary": "The Reserve Bank of India recorded its highest net sale of foreign currency in 15 years to defend the rupee against US tariff-related volatility. The RBI sold a net $25.52 billion in the spot market in FY26. Its outstanding net forward position also dropped to a record negative $103.06 billion as it actively intervened to prevent the rupee's sharp depreciation.", "category": "Economy", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125185", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_28-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125185"}], "article_id": "a1e1207a"}, {"headline": "JSW Steel begins work on ₹65,000 crore integrated plant at Paradeep", "summary": "JSW Steel has commenced work on a 13.2-million-tonne integrated steel plant in Odisha with an investment of ₹65,000 crore. The project includes a power plant and a dedicated jetty. The move is part of the company's strategy to expand its presence in Eastern India and leverage the state's logistical advantages for domestic and international markets.", "category": "Infrastructure", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125185", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_28-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125185"}], "article_id": "5c4cb086"}, {"headline": "HMIL to raise car prices by up to ₹12,800 from June", "summary": "Hyundai Motor India will increase prices across its vehicle lineup by up to ₹12,800 starting June 1, 2026. The company cited rising input costs, high commodity prices, and increased operational expenses as primary reasons for the hike. This follows similar price adjustment trends among major Indian automakers in the current fiscal year.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125185", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_28-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125185"}], "article_id": "f287503e"}, {"headline": "Maruti Suzuki services record 2.84 crore vehicles in FY26", "summary": "Maruti Suzuki India Limited serviced a record 2.84 crore vehicles in the fiscal year 2026. This milestone was supported by an expanded service network of 5,926 touchpoints across India. The company attributed the achievement to its focus on tech-enabled operations and reaching customers in smaller towns through improved infrastructure.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125185", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_28-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125185"}], "article_id": "94ae1b18"}, {"headline": "Woodfield to export first India-made LNG marine loading arm", "summary": "Woodfield Systems has manufactured India's first LNG marine loading arm at its facility in Gujarat. The equipment, previously imported, is part of a shipment destined for a leading oil and gas company in West Asia. The company aims to achieve revenues of $20-30 million from its marine loading arm business by FY27 by leveraging local manufacturing cost advantages.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125185", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_28-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125185"}], "article_id": "cade7ea8"}, {"headline": "Coal gasification push a structural shift for Coal India", "summary": "Coal India Limited (CIL) is transitioning from a coal supplier to a diversified clean energy producer through coal gasification. The company aims to set up three major projects to produce chemicals like ammonium nitrate. The strategy helps reduce industrial dependence on imports and aims to boost the country's energy security while meeting emission standards.", "category": "Business", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125185", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_28-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125185"}], "article_id": "0e5c0e23"}, {"headline": "Govt to begin formal marketing for $1 billion LIC stake sale", "summary": "The Indian government is set to begin marketing a fresh stake sale in the Life Insurance Corporation of India (LIC) to raise approximately $1 billion. The offer for sale (OFS) is expected to launch in late June or early July. Investment banks including Goldman Sachs and JP Morgan have been engaged to manage the transaction, targeting institutional investors.", "category": "Economy", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125185", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_28-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125185"}], "article_id": "81bc749e"}, {"headline": "Nothing introduces Essential Voice feature for Essential Key", "summary": "Nothing has launched 'Essential Voice', a software feature for the Essential Key on its smartphones. The feature allows users to dictate text directly into structured text fields by long-pressing the key. It uses AI to remove filler words and offers translation capabilities for over 100 languages, aiming to replace traditional typing with a more efficient voice-to-text system.", "category": "Technology", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125185", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_28-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125185"}], "article_id": "fd0b4fa2"}, {"headline": "Apple Watch rolls out sleep apnea notifications in India", "summary": "Apple has launched sleep apnea notifications for Apple Watch users in India. The feature uses the device's accelerometer to track breathing disturbances during sleep. If the algorithm detects consistent signs of moderate to severe sleep apnea over a 30-day period, it alerts the user. The tool is designed to encourage early medical consultation for the prevalent sleep disorder.", "category": "Health", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125185", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_28-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125185"}], "article_id": "55683322"}, {"headline": "UCB cooling-off rules may lead to boardroom manipulation", "summary": "The RBI's mandate for a three-year cooling-off period for Urban Cooperative Bank (UCB) directors is facing criticism for potential loopholes. Experts warn that board members may manipulate appointments by placing 'proxy' candidates to maintain indirect control during their hiatus. The policy was intended to strengthen governance by preventing long-term dominance by specific individuals.", "category": "Economy", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125185", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_28-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125185"}], "article_id": "f80bb63f"}, {"headline": "SBI sees strong opportunities to build low-cost deposit base", "summary": "State Bank of India Chairman Challa Sreenivasulu Setty stated the bank is focused on expanding its low-cost deposit base through digital onboarding and transaction banking. The bank's 'Project SARAL' aims to simplify banking for customers and improve operational efficiency using AI. SBI intends to leverage its vast physical and digital infrastructure to deepen customer engagement.", "category": "Business", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125185", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_28-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125185"}], "article_id": "04b9073a"}, {"headline": "CBSE online evaluation fiasco highlights major security flaws", "summary": "The CBSE's shift to digital evaluation of answer sheets has been criticized following reports of poorly scanned sheets and missing marks. An ethical hacker claimed the system lacked adequate testing and used a hardwired master password that could bypass authentication. The committee overseeing the shift has been urged to revert to traditional evaluation until security is fixed.", "category": "Education", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125185", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_28-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125185"}], "article_id": "8c96c72b"}, {"headline": "FPIs leading the sell-off due to Taiwan, Korea fund shifts", "summary": "Foreign Portfolio Investors (FPIs) have sold Indian stocks worth over ₹2.26 lakh crore since September 2024. Analysis shows a significant portion of these withdrawals comes from funds being reallocated to markets like Taiwan and South Korea. High valuations in India and the depreciation of the rupee are also cited as primary reasons for the sustained selling pressure.", "category": "Economy", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125185", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_28-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125185"}], "article_id": "ac67662e"}, {"headline": "IBC needs institutional boost to improve recovery rates", "summary": "Experts argue that the Insolvency and Bankruptcy Code (IBC) requires significant institutional reforms to move from paternalistic rehabilitation to market-driven resolution. Despite improving recovery rates compared to previous laws, delays in the NCLT process and legal bottlenecks remain hurdles. Suggestions include increasing judicial strength and promoting out-of-court settlements.", "category": "Law", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125185", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_28-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125185"}], "article_id": "55c794ed"}, {"headline": "Iran could open Strait of Hormuz within a month with pact", "summary": "Iran may restore transit through the Strait of Hormuz to pre-war levels within a month if a framework deal with the US is reached. A draft memorandum of understanding suggests a naval blockade could be lifted in exchange for US military pullbacks. The news has already impacted global oil markets, with prices falling nearly 5% on prospects of eased regional tensions.", "category": "World", "page": 9, "importance": 9, "telegram_url": "https://t.me/c/1877410077/125185", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_28-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125185"}], "article_id": "650c96f0"}, {"headline": "GCC enablement market pegged at $12-15 billion by 2030", "summary": "The market for setting up Global Capability Centres (GCCs) in India is projected to reach $12-15 billion by 2030. A report by UnearthInsight highlights that firms are shifting from basic low-cost assembly to high-value technology and R&D operations. India currently hosts over 2,100 GCCs, with new centers increasingly being established in tier-2 cities to access diverse talent.", "category": "Business", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125185", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_28-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125185"}], "article_id": "b2807001"}, {"headline": "China rejects Indian rice again over alleged GMO presence", "summary": "China has continued to reject non-basmati rice shipments from India, citing the presence of Genetically Modified Organisms (GMO). Over 70 consignments have been returned or blocked. Indian exporters claim the move is a trade barrier as India does not commercially cultivate GM rice. The standoff is creating uncertainty for Indian rice exports in one of its largest markets.", "category": "World", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125185", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_28-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/125185"}], "article_id": "9c78d3ca"}, {"headline": "Monsoon arrives over Sri Lanka, clearing path for Kerala", "summary": "The South-West Monsoon has officially set in over Sri Lanka, which is the final milestone before its arrival in India. Conditions are favorable for the monsoon to advance into the South Arabian Sea and Kerala within the next 3-4 days. Weather models suggest a strong onset, which is crucial for the Indian agricultural sector following a period of intense heatwaves.", "category": "Environment", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125185", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_28-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/125185"}], "article_id": "8d93be06"}, {"headline": "PM directs departments to act to mitigate heatwave impact", "summary": "Prime Minister Narendra Modi chaired a high-level meeting to review the heatwave situation across India. He directed various ministries to ensure proactive measures for fire safety and health services. The PM urged citizens to take precautions and instructed local authorities to ensure adequate drinking water and medical supplies are available in high-risk zones.", "category": "Environment", "page": 11, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125185", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL_Bangalore_28-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125185"}], "article_id": "db88cdc5"}, {"headline": "Govt to act against diversion of cheap diesel to industries", "summary": "The Ministry of Petroleum is tracking the illegal diversion of retail-priced diesel from pump outlets to industrial consumers. Industrial units are reportedly buying cheaper fuel intended for retail consumers like farmers and households to avoid higher bulk prices. The government has warned g ₹550 cr. daily losses amid ATF disruptions", "summary": "Public-sector oil marketing companies are absorbing nearly ₹550 crore daily losses from diesel, petrol, and LPG sales due to rising crude prices, the government stated.", "category": "Business", "page": 15, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125136", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 28-05-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/125136"}], "article_id": "bf6ab6fd"}, {"headline": "ONGC’s new-well gas to spur profitability", "summary": "ONGC expects new-well gas output to rise significantly, contributing more to profitability. New-well gas is priced at 12% of crude oil prices, making it more profitable.", "category": "Business", "page": 15, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125136", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 28-05-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/125136"}], "article_id": "8729e451"}, {"headline": "Record-seeking Djokovic battles into third round; Starodubtseva dumps Rybakina", "summary": "Novak Djokovic advanced to the French Open third round, while women's second seed Elena Rybakina was eliminated. Iga Swiatek and Elina Svitolina also progressed.", "category": "Sports", "page": 17, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125136", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 28-05-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/125136"}], "article_id": "7c6513ad"}, {"headline": "Gukesh goes down to So; Firouzja too good for Pragg", "summary": "In the Norway Chess tournament, D. Gukesh lost to Wesley So in Armageddon, and R. Praggnanandhaa was defeated by Alireza Firouzja. Magnus Carlsen earned his first points with a win.", "category": "Sports", "page": 18, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125136", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 28-05-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/125136"}], "article_id": "f5b0721b"}, {"headline": "Whole body scans: why investors love them but doctors hate them", "summary": "Elective whole-body MRI screening lacks proven benefits and carries risks like overdiagnosis. Despite no medical society recommendation, the commercial sector is growing due to misaligned incentives.", "category": "Health", "page": 19, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125136", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 28-05-2026.pdf", "page": 19, "telegram_url": "https://t.me/c/1877410077/125136"}], "article_id": "251162d4"}, {"headline": "Why does gold not rust? Its surface may have the clue", "summary": "Researchers suggest gold's resistance to oxidation is due to its reconstructed surface atoms. This arrangement makes it difficult for oxygen molecules to split and react with the metal.", "category": "Science", "page": 19, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125136", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 28-05-2026.pdf", "page": 19, "telegram_url": "https://t.me/c/1877410077/125136"}], "article_id": "a6d500d9"}, {"headline": "Chaos in Canada", "summary": "The Canadian Grand Prix saw intense rivalry between Mercedes teammates Antonelli and Russell, highlighting Mercedes' challenge in managing two title contenders. Hamilton delivered a strong drive for Ferrari.", "category": "Sports", "page": 20, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125136", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 28-05-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/125136"}], "article_id": "d68b1ff1"}, {"headline": "US team to visit India in June for trade deal discussions", "summary": "An American trade delegation led by Assistant USTR Brendan Lynch will visit India from June 1-4 for talks on an interim bilateral trade agreement (BTA). USTR Jamieson Greer expressed hope for finalization, calling it historic. The discussions follow previous meetings aimed at a broader BTA, covering market access and economic security.", "category": "Economy", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "b73d9288"}, {"headline": "White House rejects Iran report on Hormuz shipping deal", "summary": "President Trump dismissed an Iranian state TV report of a framework deal to restore shipping through the Strait of Hormuz and lift a US naval blockade. Trump stated issues remain, and the deal \"has got to be perfect,\" adding the Strait would open immediately after an agreement, which Washington is not yet satisfied with.", "category": "World", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "ed3fe25d"}, {"headline": "Nikki Bhati's family and in-laws reach settlement in dowry death case", "summary": "Nine months after Nikki Bhati died of burn injuries in Greater Noida, her family settled with her in-laws, who were accused of dowry-related murder. Her parents-in-law agreed to transfer property to Nikki's son as part of the settlement.", "category": "India", "page": 1, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "b290a313"}, {"headline": "Delhi amends fire safety rules, introduces third-party audits", "summary": "Delhi has amended the Delhi Fire Service Rules, 2010, replacing department-led inspections with mandatory annual third-party audits by empanelled fire safety auditors. These auditors will issue certificates, subject to random verification by the Delhi Fire Service (DFS).", "category": "India", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "df557868"}, {"headline": "Delhi likely to get heatwave relief with forecast rainfall", "summary": "The India Meteorological Department (IMD) forecasts thunderstorms, dust storms, and light rain for Delhi over the next three days, potentially bringing relief from heatwave conditions starting Thursday evening. On Wednesday, the city recorded a maximum temperature of 44.3°C, with some areas exceeding 45°C.", "category": "Environment", "page": 1, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "6a94b7a3"}, {"headline": "Summer pollution spike linked to Aravallis' diminished dust barrier role", "summary": "Delhi's air quality index has spiked to winter levels due to dust from Rajasthan's deserts carried by winds. Experts link this unusual severity to the destruction of the Aravalli ranges, traditionally a natural barrier. Decades of mining and encroachment have breached the ridgeline, allowing dust to pass unimpeded.", "category": "Environment", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "00710266"}, {"headline": "Analysis questions India's economic inequality data reliability", "summary": "This analysis examines India's economic inequality, noting a discrepancy between anecdotal evidence of rising wealth disparity and official consumption expenditure survey (CES) data showing a decline. The article suggests CES data might undercount the super-rich, especially regarding luxury goods and air travel, raising questions about its representativeness for inequality estimates.", "category": "Economy", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "81800b5e"}, {"headline": "PDS revamp extended, AI to identify beneficiaries and track food grain", "summary": "The Cabinet approved a ₹25,530 crore extension for the 'Sarthak-PDS' scheme until March 2031, modernizing India's public distribution system. It will integrate AI for real-time beneficiary identification, track food grain movement, and handle citizen complaints via WhatsApp and phone calls, using India AI Mission support.", "category": "Technology", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "f22fd24a"}, {"headline": "SC Collegium recommends five names for apex court judgeship", "summary": "The Supreme Court collegium recommended four high court chief justices (Sheel Nagu, Shree Chandrashekhar, Sanjeev Sachdeva, Arun Palli) and senior advocate V Mohana for elevation as apex court judges. This follows the increase in sanctioned SC strength to 37 and aims to balance regional representation, seniority, merit, and gender diversity.", "category": "Law", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "ed10c85b"}, {"headline": "Bodhghat dam survey restarts in Dantewada, raises displacement fears", "summary": "The Chhattisgarh government resumed a survey for the long-stalled Bodhghat Multipurpose Project on the Indravati river in Dantewada. The ₹30,000 crore dam could submerge up to 56 villages, affecting thousands of tribals. Local groups oppose the project, citing displacement, forest loss, and lack of rehabilitation plans for affected communities.", "category": "Infrastructure", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "2476fd08"}, {"headline": "MP directs action against illegal sandmining vehicles", "summary": "Madhya Pradesh Chief Secretary Anurag Jain directed authorities to confiscate and auction vehicles used in illegal sand mining without number plates, following a Supreme Court cognizance of continued activity in the Chambal region. He also ordered reviewing pending criminal cases to expedite convictions.", "category": "Environment", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "293275f1"}, {"headline": "Karnataka CM defends Congress welfare record, cites scheme success", "summary": "Karnataka CM Siddaramaiah defended the Congress government’s welfare programs, stating they fulfilled all electoral promises. He highlighted Anna Bhagya (free food grain, ₹18,897 crore spent for 42.6 million beneficiaries), Gruha Jyothi (free electricity up to 200 units for 16.4 million families, ₹26,115 crore), and Yuva Nidhi (unemployment aid to 0.338 million youth, ₹950 crore).", "category": "Politics", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "c5627e85"}, {"headline": "Race for Karnataka Congress chief intensifies amid CM succession buzz", "summary": "Amid speculation of a leadership change for Karnataka CM, the race to succeed DK Shivakumar as Karnataka Pradesh Congress Committee (KPCC) president is gaining traction. Satish Jarkiholi, Industries minister M B Patil, and D K Suresh are informally discussed as potential contenders to manage organizational cohesion and election preparation.", "category": "Politics", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "6a0760ec"}, {"headline": "Seven women arrested for running prostitution racket in Bengaluru", "summary": "Seven women were arrested in Bengaluru for allegedly running a prostitution racket from rented houses, following raids by the Central Crime Branch’s Women Protection Squad. Five women involved in prostitution activities were rescued. Cases registered at Kamakshipaalya, Vidyaranyapura, and Basaveshwaranagar police stations.", "category": "India", "page": 5, "importance": 2, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "0b952853"}, {"headline": "14 evacuated after fire at Bengaluru hospital", "summary": "Fourteen patients, including ICU occupants, were safely evacuated from Aveksha Hospital in Bengaluru after a fire broke out early Wednesday morning. No injuries reported. Fire tenders brought the blaze, suspected from an electrical cable in the basement duct, under control.", "category": "India", "page": 5, "importance": 2, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "5f79429e"}, {"headline": "Jagan Reddy calls for statewide protest against TDP-led government", "summary": "YSR Congress Party president Jagan Mohan Reddy announced an eight-day statewide protest campaign, \"Two Years of Backstabbing,\" from June 4-12. The agitation aims to highlight the alleged failures of the TDP-led coalition government in Andhra Pradesh to implement its pre-election promises.", "category": "Politics", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "eb590420"}, {"headline": "Ex-BRS MP Suman criticized for advocating 'militant activity'", "summary": "Former BRS MP Balka Suman faced criticism for advising trade union activists in Singareni Collieries to engage in \"militant activity,\" including burning down offices and cutting railway tracks, to win workers' confidence. Union Coal Minister G Kishan Reddy and Congress leaders slammed his \"dangerous and irresponsible\" comments.", "category": "Politics", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "a4d53ca1"}, {"headline": "12-year-old boy killed in wild elephant attack in Tamil Nadu", "summary": "A 12-year-old boy was killed by a wild elephant near Gudalur, Nilgiris district, Tamil Nadu, while returning home from a shop. Villagers rescued him, but he succumbed to injuries at a hospital in Pandalur.", "category": "Environment", "page": 6, "importance": 2, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "dfb80524"}, {"headline": "ED raids part of crackdown on Opposition: Kerala CM Vijayan", "summary": "Former Kerala CM Pinarayi Vijayan alleged ED raids at his premises were part of a targeted crackdown on opposition leaders by the BJP-led Centre. He stated such actions wouldn't weaken him or CPI(M) and hinted at \"mental satisfaction\" for Rahul Gandhi. State Home Minister Ramesh Chennithala denied police awareness of raids.", "category": "Politics", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "80688633"}, {"headline": "TN invokes Goondas Act against accused in girl's murder case", "summary": "The Tamil Nadu government invoked the Goondas Act against K Karthi and R Mohan, accused in the abduction, sexual assault, and murder of a 10-year-old girl in Sulur near Coimbatore. Chief Minister C Joseph Vijay directed fast-tracking investigations into sexual crimes.", "category": "Law", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "a7a8c31b"}, {"headline": "Union Minister Bandi Sanjay's son taken into custody in POCSO case", "summary": "Bandi Bageerath, son of Union Minister Bandi Sanjay Kumar, was taken into police custody from Cherlapally Central Prison for questioning in a POCSO case. A local court granted police two days' custody. Bageerath was arrested on May 16 after a 17-year-old girl's mother alleged he was in a relationship with and sexually assaulted her daughter.", "category": "Law", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "1ac80ff5"}, {"headline": "Mid-sea collision off Nellore coast kills two fishermen", "summary": "A mid-sea collision between two boats off the Nellore coast in Kavali, Andhra Pradesh, left two fishermen dead. The fate of two others, who were on board the second boat, remains unknown.", "category": "India", "page": 6, "importance": 2, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "d09a4880"}, {"headline": "DySP officer caught taking bribe in Kerala", "summary": "A DySP-rank officer of Kerala police, Anil Kumar, was arrested by Vigilance officials after a chase in Cherthala for allegedly accepting a ₹50,000 bribe. He sought ₹2 lakh to release a seized waste removal vehicle and asked for an advance at his residence.", "category": "Law", "page": 6, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "99e6579e"}, {"headline": "SC: Right to vote not absolute, allows ECI electoral roll verification", "summary": "The Supreme Court upheld the ECI's special intensive revision (SIR) of electoral rolls, stating the right to vote, while constitutional, is not absolute and subject to reasonable regulations for accurate rolls. The judgment clarified SIR is a \"limited enquiry into citizenship\" for electoral purposes, not a final determination under the Citizenship Act.", "category": "Politics", "page": 7, "importance": 9, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "11565ed5"}, {"headline": "Congress questions SC SIR verdict, BJP calls it Opposition's defeat", "summary": "The Supreme Court's ruling on electoral roll revision (SIR) drew mixed reactions. Congress leader Abhishek Manu Singhvi questioned the verdict, citing \"as many questions as it answers\" regarding implementation and post-election data. BJP hailed it as the \"defeat of Congress,\" urging Rahul Gandhi to introspect.", "category": "Politics", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "8ac797ca"}, {"headline": "Jharkhand migrants can update voter details via phone for SIR", "summary": "Jharkhand's Chief Electoral Officer K Ravi Kumar announced migrant voters can update details by calling booth-level officers (BLOs) or submitting forms online/via WhatsApp to stay on the electoral roll during the special intensive revision. Approx. 27% of Jharkhand's 25.7 million voters remain unmapped.", "category": "Politics", "page": 7, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "c19d646e"}, {"headline": "Cabinet approves AI for PDS beneficiary selection and delivery", "summary": "The Union Cabinet approved using Artificial Intelligence (AI) to identify beneficiaries and modernize the public distribution system (PDS) under the extended 'Sarthak-PDS' scheme. Three AI-enabled systems (NIRMAL, ASHA, SAKSHAM) will create real-time registries, handle multilingual grievances, and optimize supply-chain management with vehicle tracking and demand forecasting.", "category": "Technology", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "71540d46"}, {"headline": "West Bengal CM claims 3 million fake beneficiaries in TMC scheme", "summary": "West Bengal CM Suvendu Adhikari alleged that three million fake beneficiaries received monthly financial assistance under the \"Lakshmir Bhandar\" scheme during the previous Trinamool Congress regime. He claimed individuals with deleted electoral rolls or non-appealed CAA cases were receiving aid, demanding financial transparency.", "category": "Politics", "page": 7, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "707b1905"}, {"headline": "Centre invites 3 bidders for 5 AMCA fighter jet prototypes", "summary": "The Defence Ministry issued Request for Proposals (RFPs) to Tata Advanced Systems, L&T+BEL, and Bharat Forge+BEML for developing five Advanced Medium Combat Aircraft (AMCA) prototypes at ₹15,000 crore. This aims for a second fighter jet production facility, with the first prototype expected by early 2027, complementing the DRDO's ADA design expertise.", "category": "Technology", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "34a00dc9"}, {"headline": "IMD warns of continued heatwave; PM urges precautions", "summary": "The IMD predicts heatwave to severe heatwave conditions in Central and Northwest India for 2-3 days, with prolonged hot spells and warm nights. PM Narendra Modi urged citizens to take precautions, stay hydrated, and help vulnerable people and animals. UN climate chief Simon Stiell linked the heat to climate change and fossil fuel burning.", "category": "Environment", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "44f6a36f"}, {"headline": "Bengali director Anik Dutta dies after falling from roof, suicide suspected", "summary": "Renowned Bengali movie director Anik Dutta died after falling from the roof of a Kolkata apartment building; police suspect suicide, finding a note. His wife lives in the building. Dutta's 2012 debut, 'Bhooter Bhabishyat,' was a hit, and his 2022 film 'Aparajito' received critical acclaim.", "category": "Culture", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "e33443c3"}, {"headline": "ASI seeks probe into 'kirtan' video at Taj Mahal", "summary": "The Archaeological Survey of India (ASI) requested a report from CISF after a video showed visitors, including one in saffron attire, performing what appeared to be kirtan on the Chameli Farshe near the Taj Mahal's main tomb. Singing and clapping is prohibited inside the monument.", "category": "Culture", "page": 8, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "da658055"}, {"headline": "US firm delivers 3 engines for India's delayed trainer aircraft", "summary": "US firm Honeywell delivered the first three TPE331-12B turboprop engines for India's indigenous HTT-40 basic trainer aircraft to HAL, aimed at overcoming supply chain bottlenecks. India's air force ordered 70 trainers three years ago, but deliveries were stalled due to engine unavailability. HAL expects to produce 20 HTT-40s annually.", "category": "Technology", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "8ef057ac"}, {"headline": "FAC clears 3,000 ha forest land for infra projects", "summary": "The Forest Advisory Committee (FAC) granted in-principle approval to divert over 3,000 hectares of forest land for key infrastructure projects, including a 680 MW hydroelectric project in Arunachal Pradesh, a 9 million tonne/annum coal mine in Chhattisgarh, and iron ore mines in Goa and Odisha. Conditions include compensatory afforestation and wildlife management.", "category": "Infrastructure", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "7e12f8df"}, {"headline": "SC urges speedy trial in Manipur violence cases", "summary": "The Supreme Court directed CBI to ensure speedy trials in 2023 Manipur violence cases to build confidence among victims, noting a fresh spurt of violence and many pending trials. The court referred to a report by former DGP Dattatraya Padsalgikar indicating precarious law and order.", "category": "Law", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "63815440"}, {"headline": "BMS urges Odisha CM to halt removal of contractual govt employees", "summary": "The Bharatiya Mazdoor Sangh (BMS) wrote to Odisha CM Mohan Charan Majhi, urging him to halt the removal of thousands of contractual government employees across sectors. BMS warned of intensified protests if the demands remain unaddressed, citing severe effects on public utility and industrial sectors.", "category": "Politics", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "ce4f962d"}, {"headline": "Rahul Gandhi demands SIT probe into 'CBSE exam scam'", "summary": "Rahul Gandhi demanded a judicial inquiry and SIT probe into an alleged \"CBSE exam scam,\" accusing the Centre of ignoring \"massive tampering\" in board results linked to Coempt Edutech Pvt Ltd. He alleged the company, previously known as Globarena, was involved in similar controversies in Telangana. CBSE denied allegations.", "category": "Education", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "6b60bcc2"}, {"headline": "SC seeks replies on feasibility of CBSE 3-language policy", "summary": "The Supreme Court questioned the Centre, CBSE, and NCERT on the practical feasibility of implementing the new three-language policy, specifically regarding adequate teachers and textbooks. The court issued notices on petitions challenging the policy, expressing concern over potential \"hardship\" for students and schools from July 1.", "category": "Education", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "74699d0c"}, {"headline": "EAM Jaishankar meets Ukrainian FM in Cyprus, discusses conflict", "summary": "External Affairs Minister S Jaishankar met Ukrainian counterpart Andrii Sybiha in Cyprus, discussing the Ukraine conflict and bilateral cooperation. Jaishankar is attending the EU Gymnich Forum. Sybiha stated Ukraine remains determined to end the war despite Russian terror tactics. Jaishankar also met Saudi FM.", "category": "World", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "da61feb7"}, {"headline": "IPS officer's adopted daughter dies by suicide in Bhopal", "summary": "The 17-year-old adopted daughter of an IPS officer was found dead at her Bhopal residence, suspected to be suicide. Police recovered a note apologizing to her parents and are verifying the handwriting.", "category": "India", "page": 9, "importance": 2, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "e06b8a47"}, {"headline": "Cash-filled sacks, suitcase dug out from West Bengal field", "summary": "West Bengal police recovered five sacks and a suitcase full of suspected cash from a jute field after interrogating Dipankar Bhattacharya, Baduria municipality chairman. Bhattacharya was arrested earlier after a raid on his property found relief materials and ₹80 lakh in unaccounted cash.", "category": "India", "page": 9, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "06b201f3"}, {"headline": "I-T return filings plateau as exemption thresholds rise", "summary": "India's lower-income taxpayers are exiting the return-filing net after tax relief measures raised the basic exemption threshold. Return filings for individuals earning up to ₹5 lakh fell by more than half to 27.6 million in 2025-26 from 56.5 million in 2023-24. Higher exemption limits and auto-tax scrutiny are reshaping the taxpayer profile.", "category": "Economy", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "1deaed06"}, {"headline": "India's foodgrain output to hit record 376.56 mn tonnes in 2025-26", "summary": "India's foodgrain production is estimated to reach a record 376.56 million tonnes in 2025-26, driven by all-time high output of rice (154.02 mn tonnes), wheat (120.65 mn tonnes), and maize. Improved monsoon rains and government initiatives like higher MSP contributed to this historic achievement, surpassing 357.73 million tonnes from the previous year.", "category": "Economy", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "12be89a1"}, {"headline": "Israel kills Hamas military wing chief Mohammed Odeh in Gaza", "summary": "Israel confirmed it killed Mohammed Odeh, the new leader of Hamas' military wing, in airstrikes in Gaza City, less than two weeks after his predecessor Ezzedine al-Haddad was killed. Hamas confirmed Odeh's death along with his wife, son, daughter, and another woman. The attack came on Eid al-Adha eve.", "category": "World", "page": 11, "importance": 8, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "3db759b3"}, {"headline": "US Senator Graham questions Pakistan's reliability as Iran mediator", "summary": "US Senator Lindsey Graham questioned Pakistan’s reliability as a mediator in the US-Iran conflict, citing its animosity towards Israel and alleged housing of Iranian military aircraft. He urged Pakistan to diplomatically recognize Israel through the Abraham Accords, suggesting its past rhetoric against Israel is \"disturbing.\"", "category": "World", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "ef0c5b18"}, {"headline": "Israel intensifies strikes on Lebanon, 31 dead amid ceasefire fragility", "summary": "Israel launched broad strikes on Lebanon, including near Tyre, killing at least 31 people, as Hezbollah fighters clashed with Israeli forces. This escalation comes ahead of talks between Lebanese and Israeli military delegations in Washington and new negotiations to end hostilities, despite a fragile ceasefire.", "category": "World", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "6156d213"}, {"headline": "S Korean probe suggests Iran-made missiles hit ship near Hormuz", "summary": "South Korea's investigation into a cargo vessel attack near the Strait of Hormuz suggested the projectiles were likely Iran-made anti-ship missiles, specifically Noor-series. Debris analysis matched characteristics of Iran's missile family. First Vice Foreign Minister Park Yoonjoo stated this finding Wednesday.", "category": "World", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "76e57184"}, {"headline": "WHO warns of 'catastrophic collision' of Ebola and war in Congo", "summary": "The WHO chief Tedros Adhanom Ghebreyesus warned that conflict in eastern DR Congo is severely complicating efforts to contain a deadly Ebola outbreak, fearing a \"catastrophic collision of disease and conflict.\" Neighbouring Uganda closed its border, and Canada and Bahamas temporarily banned DRC, Uganda, and South Sudan residents.", "category": "Health", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "60b3e1a5"}, {"headline": "Indian envoy denies criticizing Canada's security establishment", "summary": "India’s High Commissioner to Canada, Dinesh Patnaik, refuted a Canadian daily report citing him criticizing Canada’s security establishment as \"compromised.\" Patnaik expressed \"disappointment\" with the \"misleading allegations,\" stating strong faith in Canadian institutions and rejecting the out-of-context, selective quotations.", "category": "World", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "09c2016c"}, {"headline": "Russia allows financial firms to down drones, arm staff", "summary": "Russia passed a law allowing its central bank and other financial institutions to operate their own drone defense systems and arm staff to repel attacks. This follows a Ukrainian missile strike on the central bank's office in Sevastopol. Companies are ready to finance weapons and electronic systems for defense.", "category": "World", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "60ef11e9"}, {"headline": "Five found alive in flooded Laos cave, two still missing", "summary": "Specialist divers found five of seven gold miners trapped for a week in a flooded cave in central Xaysomboun province, Laos, alive and in good spirits. Rescue efforts are ongoing to extract them and search for the two missing individuals, facing \"constant restrictions, flood waters, collapse hazards and high risk of contaminated air quality.\"", "category": "World", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "8a7e19f5"}, {"headline": "Amazon deforestation at lowest since 2019 under Lula", "summary": "Deforestation in the Brazilian Amazon fell by 20.6% last year to its lowest level since 2019 (985,000 hectares), according to MapBiomas. President Lula da Silva made fighting deforestation a central tenet, pledging to eradicate illegal logging by 2030, marking good news for climate efforts.", "category": "Environment", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "f8ee9c46"}, {"headline": "Cristiano Ronaldo aims for World Cup dream in record sixth finals", "summary": "Cristiano Ronaldo, at 41, is set to play in a record sixth World Cup, leading a talented Portugal team. Coach Roberto Martinez sees his leadership and psychological strength as vital. Despite critics questioning his World Cup record, Ronaldo remains a global sports icon, aiming for his first World Cup win to add to Euro and Nations League titles.", "category": "Sports", "page": 13, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "0e37a976"}, {"headline": "Depay included, Frimpong out of Dutch squad for Euros", "summary": "Netherlands coach Ronald Koeman included Memphis Depay in the squad, despite recent injury, citing his class. However, Liverpool wing-back Jeremie Frimpong missed out. Several other players are absent due to injury, including Xavi Simons, Matthijs De Ligt, and Stefan De Vrij.", "category": "Sports", "page": 13, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "d8c6ac44"}, {"headline": "Messi statue in Kolkata deemed unsafe, set for removal", "summary": "A 70-foot golden-colored statue of Lionel Messi in Kolkata, unveiled during his GOAT Tour of India, has been deemed unsafe by West Bengal government engineers and will be removed. State legislator Sharadwat Mukherjee stated the sculpture, showing Messi raising the World Cup trophy, is \"swaying in the wind.\"", "category": "Sports", "page": 13, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "48669e5b"}, {"headline": "Firouzja leads Norway Chess despite injury, questions on ambition", "summary": "Alireza Firouzja, despite a leg injury, leads Norway Chess with two wins, including one against Magnus Carlsen. His coach Ivan Cheparinov notes Firouzja's \"freakishly talented\" but suggests he lacks the \"burning ambition\" of a world champion, which might affect his tournament performance despite his talent.", "category": "Sports", "page": 15, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "26182ff2"}, {"headline": "Harmanpreet and Manpreet return to India hockey squad", "summary": "India skipper Harmanpreet Singh and Manpreet Singh have been recalled to the 24-member India hockey squad for the European leg of the FIH Pro League. The team will play four matches each against Netherlands, Germany, England, and Pakistan in June.", "category": "Sports", "page": 15, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "0b143e4a"}, {"headline": "India women's hockey team beats Australia in shootout, levels series", "summary": "The Indian women’s hockey team came from behind to draw 1-1 with Australia before securing a 4-2 win in the shootout, leveling the four-match friendly series at 1-1. Olivia Downes scored for Australia, and Sushila Chanu equalized for India.", "category": "Sports", "page": 15, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "dd6a3f04"}, {"headline": "Female coaches remain rare in professional tennis", "summary": "Female coaches are uncommon in professional tennis, even for women players. Despite some progress, cultural and societal factors, along with the demanding lifestyle, contribute to this imbalance. The WTA has a program to increase female coaches, aiming for 19% by 2025.", "category": "Sports", "page": 15, "importance": 5, "telegram_url": "https://t.me/c/1877410077/125223", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 28-05.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/125223"}], "article_id": "c1c9b5de"}, {"headline": "Democracy is about eligible voters: SC validates Bihar SIR", "summary": "The Supreme Court validated the Bihar State Information Commission (SIR) by a 3:2 majority. It ruled that the right to participate in governance rests with eligible voters, not exclusively registered ones. Dissenting judges argued only registered voters can contest/vote, impacting electoral processes and voter identification in Bihar.", "category": "Politics", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/125198", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_28-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125198"}], "article_id": "93f8ff67"}, {"headline": "K'taka Shakti scheme boosts women's bank a/cs", "summary": "Karnataka's Shakti scheme, offering free bus travel to women, has led to a significant increase in women opening bank accounts. Since June 2023, over 1.9 crore women opened accounts, with 95.2 lakh being Jan Dhan accounts, enhancing financial inclusion and empowerment.", "category": "Economy", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125198", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_28-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/125198"}], "article_id": "3de0812d"}, {"headline": "NEET, Latour doc in CBI arrest case", "summary": "The CBI arrested Dr. Sourabh, an assistant professor from Latour Medical College, for allegedly accepting Rs 10 lakh to manipulate NEET-PG exam results. He is accused of facilitating fraudulent means for candidates to pass the national medical entrance examination.", "category": "Law", "page": 1, "importance": 6, "telegram_url": "https://t.me ance": 4, "telegram_url": "https://t.me/c/1877410077/125198", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_28-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125198"}], "article_id": "a967c304"}, {"headline": "Exit may hurt Congress' Ahinda support base", "summary": "A potential exit of AHINDA (minorities, backward classes, Dalits) leaders from the Congress could significantly impact the party's support base in Karnataka. The AHINDA vote has been crucial for Congress victories, especially ahead of local elections.", "category": "Politics", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125198", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_28-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125198"}], "article_id": "2461c3f1"}, {"headline": "Shivakumar much wins may give Priyanka much thanks", "summary": "Karnataka Deputy CM D.K. Shivakumar's political victories and influence are seen as a factor that could greatly benefit Priyanka Gandhi's potential entry into electoral politics in Karnataka, leveraging his strong organizational skills and popularity.", "category": "Politics", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/125198", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_28-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/125198"}], "article_id": "3d641de7"}, {"headline": "Siddaramaiah clears caste survey hurdle", "summary": "Karnataka CM Siddaramaiah confirmed that the controversial caste survey report will be accepted. After delays and debate, the report, which provides data on social and educational conditions, is expected to influence state policies and reservations.", "category": "Politics", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/125198", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_28-05-2026.pdf", "pa ion and streamline traffic flow during peak hours.", "category": "Infrastructure", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125198", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_28-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125198"}], "article_id": "5aba210c"}, {"headline": "HC sets aside suspension of health dept engineer", "summary": "The Karnataka High Court set aside the suspension of a health department engineer, citing a lack of proper inquiry and due process. The engineer was suspended following a complaint, but the court found procedural irregularities.", "category": "Law", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/125198", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_28-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125198"}], "article_id": "39b8e4b2"}, {"headline": "Visit to ex-lover's home leads painter his life", "summary": "A painter tragically died in Bengaluru after falling from the first floor of his ex-lover's house. He had visited her despite their breakup, and police are investigating whether it was suicide or an accidental fall.", "category": "Law", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125198", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_28-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/125198"}], "article_id": "bfe4d248"}, {"headline": "Couple held for stealing friend's ornaments from cupboard locker", "summary": "A couple in Bengaluru was arrested for allegedly stealing gold ornaments worth Rs 5.8 lakh from their friend's cupboard locker. They reportedly used a duplicate key during a visit and later pawned the jewellery for cash.", "category": "Law", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/125198", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Banga
