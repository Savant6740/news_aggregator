<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Inter', -apple-system, sans-serif;
  background: #0c0c0c; color: #fff; touch-action: none;
}
.outer { position: fixed; inset: 0; overflow: hidden; }
.h-track { display: flex; height: 100%; will-change: transform; }
.cat-panel { flex-shrink:0; width:100vw; height:100%; display:flex; flex-direction:column; overflow:hidden; }
.progress-row { flex-shrink:0; display:flex; gap:4px; padding:14px 16px 10px; background:#0c0c0c; position:relative; z-index:5; overflow:visible; }
.progress-row::after { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:80%; height:120px; background:radial-gradient(ellipse at top,color-mix(in srgb,var(--cc) 30%,transparent) 0%,transparent 70%); pointer-events:none; z-index:-1; }
.pseg { flex:1; height:2px; border-radius:1px; background:rgba(255,255,255,0.12); position:relative; overflow:hidden; }
.pseg::after { content:''; position:absolute; inset:0; background:var(--cc,#e8334a); transform:scaleX(0); transform-origin:left; transition:transform 0.25s ease; }
.pseg.done::after, .pseg.active::after { transform:scaleX(1); }
.v-feed { flex:1; overflow:hidden; position:relative; clip-path:inset(0); }
.v-track { display:flex; flex-direction:column; will-change:transform; }
.card { 
  width:100%; flex-shrink:0; background:#0c0c0c; display:flex; flex-direction:column; 
  overflow:hidden; position:relative; 
  scroll-margin-top: 80px;
}
.card.target-highlight {
  background: linear-gradient(135deg, #fff3cd22 0%, #ffeaa722 100%) !important;
  box-shadow: 0 0 30px rgba(255, 193, 7, 0.4);
  border: 2px solid #f39c12;
  animation: pulse-highlight 2s ease-in-out;
}
@keyframes pulse-highlight {
  0%, 100% { box-shadow: 0 0 30px rgba(255, 193, 7, 0.4); }
  50% { box-shadow: 0 0 50px rgba(255, 193, 7, 0.6); }
}
.card-content { flex:1; display:flex; flex-direction:column; padding:36px 20px 22px; min-height:0; position:relative; z-index:1; }
.card-toprow { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; flex-shrink:0; }
.cat-pill { display:inline-flex; align-items:center; gap:7px; background:#1c1c1e; border-radius:8px; padding:7px 12px 7px 10px; font-size:11.5px; font-weight:700; letter-spacing:0.07em; color:#d0d0d0; text-transform:uppercase; line-height:1; }
.pill-icon { width:16px; height:16px; background:#2e2e30; border-radius:3px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.pill-icon svg { display:block; }
.card-date { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:500; color:#666; letter-spacing:0.01em; }
.card-headline { font-size:28px; font-weight:800; line-height:1.18; color:#fff; letter-spacing:-0.03em; margin-bottom:20px; flex-shrink:0; }
.card-summary { font-size:15.5px; font-weight:400; line-height:1.62; color:#6b6b6b; flex:1; overflow:hidden; display:-webkit-box; -webkit-line-clamp:7; -webkit-box-orient:vertical; }
.card-divider { height:1px; background:#1e1e1e; margin:20px 0 16px; flex-shrink:0; }
.card-footer { display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.src-chip { display:inline-flex; align-items:center; gap:6px; background:#181818; border:1px solid #282828; border-radius:9px; padding:8px 13px; font-size:12.5px; font-weight:600; color:#c0c0c0; text-decoration:none; letter-spacing:0.005em; line-height:1; }
.src-chip-sep { color:#3a3a3a; font-weight:400; }
.src-chip-pg { color:#555; font-weight:500; }
.src-chip-ext { margin-left:2px; }
.src-chip-ext svg { display:block; }
.info-btn { width:36px; height:36px; border-radius:50%; border:1.5px solid #252525; background:#141414; display:flex; align-items:center; justify-content:center; color:#555; cursor:pointer; flex-shrink:0; }
.cat-flash { position:fixed; inset:0; z-index:600; pointer-events:none; opacity:0; transition:opacity 0.12s; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; }
.cat-flash.on { opacity:1; }
.cf-icon { font-size:34px; }
.cf-name { font-size:22px; font-weight:900; letter-spacing:-0.03em; text-transform:uppercase; }
.hint { position:fixed; display:flex; flex-direction:column; align-items:center; gap:5px; pointer-events:none; z-index:400; opacity:0; transition:opacity 0.6s ease; }
.hint.visible { opacity:1; }
.hint.gone { opacity:0 !important; transition:opacity 0.4s; }
.hint-pill { font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.55); background:rgba(255,255,255,0.07); backdrop-filter:blur(10px); padding:5px 13px; border-radius:100px; border:1px solid rgba(255,255,255,0.09); }
.hint-arr { font-size:16px; color:rgba(255,255,255,0.4); }
.h-up { bottom:28px; left:50%; transform:translateX(-50%); animation:bUp 2s ease-in-out infinite; }
.h-right { top:50%; right:14px; transform:translateY(-50%); animation:bRight 2s ease-in-out infinite 0.6s; }
@keyframes bUp { 0%,100% { bottom:28px; opacity:.65; } 50% { bottom:36px; opacity:1; } }
@keyframes bRight { 0%,100% { right:14px; opacity:.65; } 50% { right:6px; opacity:1; } }

<script>
const DIGEST   = {"date": "28 June 2026", "articles": [{"headline": "Will old adage of 'dump money' return to market?", "summary": "Rising market sentiment and past trends suggest retail investors, often called 'dump money,' might re-enter the market. Experts warn of potential overvaluation despite strong returns in the last year. Small-cap stocks have significantly outperformed large-caps, but sustained growth depends on earnings. Historical data indicates a potential for retail frenzy, raising concerns about market correction.", "category": "Economy", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/128645", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_28-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/128645"}], "article_id": "4d86e2f8"}, {"headline": "Jemneco Clean Air India recommended as accumulate", "summary": "Anand Rathi suggests accumulating Jemneco Clean Air India (JCAI) shares, projecting a 20% upside. JCAI, a provider of air quality solutions, saw strong growth with revenue up 40.5% and PAT up 54.4% in FY24, driven by a robust order book. The company has diversified into new product lines like water purifiers, offering healthy growth prospects.", "category": "Business", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128645", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_28-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/128645"}], "article_id": "9c3c946f"}, {"headline": "MSMEs must move beyond comfort zone for growth", "summary": "MSMEs need to move beyond comfort zones, innovate, and adopt new technologies to become globally competitive. Industry leaders stressed the importance of R&D, digital transformation, and strong governance for sustainable growth. Skill development and access to finance are critical for MSMEs to scale up and become part of global supply chains.", "category": "Business", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128645", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_28-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/128645"}], "article_id": "d6dd7fd0"}, {"headline": "MSMEs lack awareness of financing schemes despite govt initiatives", "summary": "A survey by Tally Solutions reveals that 65% of MSMEs are unaware of government financing schemes, hindering growth despite positive intent. Only 35% applied for schemes like CGTMSE and MUDRA, with 21% approvals. Lack of awareness and complex application processes remain key barriers to accessing crucial funding for expansion.", "category": "Economy", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128645", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_28-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/128645"}], "article_id": "9bfd3d88"}, {"headline": "Danfoss India President urges 'make new money'", "summary": "Ravichandran Purushothaman, President of Danfoss Industries Pvt Ltd., emphasized creating new revenue streams by innovating and entering emerging markets, rather than solely optimizing existing operations. He stressed leveraging technology like AI to enhance competitiveness, address climate change, and capitalize on digital transformation for sustainable long-term growth and resilience.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128645", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_28-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/128645"}], "article_id": "8c7fd41f"}, {"headline": "Kerala MD pitches Palakkad Cluster for TN's MSMEs", "summary": "The MD of Kerala State Industrial Development Corporation (KSIDC) highlighted Kerala's industrial growth model to Tamil Nadu's MSMEs. He pitched the Palakkad industrial cluster as an opportunity for expansion, citing its strategic location, infrastructure, and incentives. The presentation focused on Kerala's support for MSME development and attracting investments from neighboring states.", "category": "Business", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128645", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_28-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/128645"}], "article_id": "9a5094f4"}, {"headline": "MSMEs urged to capture clean mobility value chain", "summary": "Experts advised MSMEs to invest in R&D and product development to capitalize on the clean mobility sector, including EVs. This shift requires technology adoption, skill development, and collaboration to secure a global footprint in the evolving automotive industry. The focus is on moving up the value chain for sustainable growth.", "category": "Business", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128645", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_28-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/128645"}], "article_id": "6363bfab"}, {"headline": "India Inc. CAPEX growth poised for revival", "summary": "Corporate India's CAPEX cycle is showing signs of revival, with investment-to-sales ratios improving. Experts foresee a strong turnout of private sector CAPEX in FY25, driven by de-leveraged balance sheets and supportive government policies, despite global uncertainties. High profit margins and capacity utilization are fueling the investment cycle, promising future economic growth.", "category": "Economy", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/128645", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_28-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/128645"}], "article_id": "731ef388"}, {"headline": "Choosing between self, practitioner or CA for tax-filing", "summary": "Taxpayers face a trilemma in selecting between self-filing, using a practitioner, or a Chartered Accountant. The choice depends on complexity, cost, and personal comfort with tax rules, each option offering varying levels of convenience and expertise. Self-filing suits simple cases, while complex situations benefit from professional guidance.", "category": "Economy", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128645", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_28-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/128645"}], "article_id": "3dae7380"}, {"headline": "Diversification key strategy for H1 2026 asset class", "summary": "Data shows diversification across asset classes and market caps yielded superior returns in H1 2026. Gold, silver, and small-cap stocks outperformed, emphasizing the benefits of a broad portfolio for mitigating risk and maximizing gains. The findings underscore the importance of dynamic asset allocation over concentrated bets in volatile market conditions.", "category": "Business", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128645", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_28-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/128645"}], "article_id": "6682e532"}, {"headline": "UTI Aggressive Hybrid Fund shows balanced growth", "summary": "UTI Aggressive Hybrid Fund combines disciplined stock selection with a quality debt component. It aims for balanced growth by investing across equity, debt, and international assets, focusing on long-term capital appreciation and moderate risk. The fund maintains a flexible asset allocation strategy, adapting to market conditions to optimize returns.", "category": "Business", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128645", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_28-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/128645"}], "article_id": "fce59380"}, {"headline": "Tata Multi-sector Passive FoF NFO launched", "summary": "Tata Asset Management has launched a New Fund Offer (NFO) for a multi-sector passive Fund of Funds. It aims to provide diversified exposure to various sectors through underlying passive schemes. The NFO allows investors to participate in multiple market segments with minimal active management, aligning with thematic growth opportunities.", "category": "Business", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128645", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_28-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/128645"}], "article_id": "8a00c79b"}, {"headline": "JM Financial launches Multi Asset Allocation Fund NFO", "summary": "JM Financial Asset Management has launched a Multi Asset Allocation Fund NFO, seeking to provide diversified exposure across various asset classes including equity, debt, and gold, targeting long-term capital growth. The fund aims to mitigate volatility by dynamically rebalancing its portfolio based on market conditions and valuation metrics.", "category": "Business", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128645", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_28-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/128645"}], "article_id": "7bb070d0"}, {"headline": "SpaceX bond loss stuns traders, impacts investments", "summary": "SpaceX's bond values plummeted by over 20% in the last month, leaving traders stunned. This significant drop, fueled by weak demand and market uncertainties, has impacted investors in secondary markets, raising concerns about its valuation. The decline signals potential challenges for the company's private debt offerings amid a tightening financial landscape.", "category": "Business", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128645", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_28-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/128645"}], "article_id": "aefacc26"}, {"headline": "Auto components, exhaust systems suppliers gain", "summary": "Auto component, exhaust system suppliers, and Clean Air India are positioned for growth from next-gen emissions norms. Companies like Minda Corp and UNO Minda are expected to benefit from new regulations and increased demand for advanced solutions. Robust order books and strategic investments are driving their revenue growth and profitability.", "category": "Business", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128645", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_28-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/128645"}], "article_id": "45b79d05"}, {"headline": "Wonderla Holidays stock offers revisit opportunity", "summary": "Wonderla Holidays, an amusement park operator, presents a potential revisit opportunity for investors. Despite recent price drops, strong booking trends, CAPEX plans, and margin expansion could drive future growth. The company's unique business model and expansion into new parks position it for long-term recovery and value creation.", "category": "Business", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128645", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_28-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/128645"}], "article_id": "7c10b25f"}, {"headline": "Derivatives position favors bulls, market rally likely", "summary": "Futures & Options data suggests a bullish bias in the market. Nifty's open interest indicates strong support at 23,750-23,800, with a rally likely if resistance at 24,100 is breached. Bank Nifty also shows strong support at 52,200. Traders are advised to monitor key levels for potential upside movements.", "category": "Economy", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128645", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_28-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/128645"}], "article_id": "44224374"}, {"headline": "Futures OI signals provide clues for trading", "summary": "Open Interest (OI) analysis helps discern trading signals. Long-unwinding or short-covering suggests profit booking or strength, while long-buildup or short-buildup indicates fresh positions. Traders should monitor OI changes to confirm market trends and make informed decisions, using options data to identify potential support and resistance levels.", "category": "Economy", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128645", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_28-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/128645"}], "article_id": "adaa7dcc"}, {"headline": "Crude prices show room for rebound", "summary": "Crude oil futures indicate a potential rebound. Despite recent declines, the short-term trend suggests support levels around $76.8/barrel. A break above $81.5/barrel could signal a significant upward move. Traders are advised to watch for signs of accumulation to confirm a bullish reversal and position accordingly.", "category": "Economy", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128645", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_28-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/128645"}], "article_id": "2998751f"}, {"headline": "Tech Mahindra dividend adjustments in F&O", "summary": "Tech Mahindra's stock (TECHM) underwent a 2x adjustment in F&O due to a special dividend declared. Traders should adjust positions accordingly, as derivative contracts now reflect the revised dividend. This technical adjustment is crucial for accurate  Despite short-term fluctuations, the underlying demand for electronic components and devices remains robust, indicating a promising future for the industry.", "category": "Technology", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128645", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_28-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/128645"}], "article_id": "a872019f"}, {"headline": "Bandu's Blockbusters: Investment strategy insights", "summary": "A reader's personal investment strategy, \"Bandu's Blockbusters,\" highlights stock picks and performance, offering insights into individual stock selection and market timing based on personal experience. The column shares portfolio details, including entry/exit points and rationale for various investments, providing a practical perspective for retail investors.", "category": "Business", "page": 9, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128645", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_28-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/128645"}], "article_id": "de7aad4c"}, {"headline": "Valuation Radar for stock selection strategy", "summary": "Valuation Radar provides insights into stock selection by categorizing companies as \"Good,\" \"Bad,\" or \"Ugly\" based on financial metrics like P/E, EPS, ROE, and debt. This helps investors identify potential outperformers or underperformers, guiding strategic investment decisions based on fundamental valuations and market trends.", "category": "Business", "page": 10, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128645", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_28-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/128645"}], "article_id": "1bfe78c0"}, {"headline": "Glide Path Funds for long-term investing", "summary": "Long-term mutual fund Life Cycle Funds automatically
