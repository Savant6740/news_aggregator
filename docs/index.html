ilename": "Bengaluru_Mint_15-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127236"}], "article_id": "f1d92266"}, {"headline": "India Drives Regional Diplomacy Through Electric Bus Exports to Neighbors", "summary": "India is using electric bus exports as a diplomatic tool in the Global South. Bhutan will receive 45 e-buses from Switch Mobility, while CESL has tendered for 20 units for Nepal. In FY26, India exported 132 e-buses to countries including Mauritius and Tanzania. The outreach leverages India's growing clean mobility expertise to strengthen ties under its 'neighbourhood first' policy.", "category": "Business", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127236", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_15-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127236"}], "article_id": "66ec347f"}, {"headline": "Chamundi Die Cast Promoters Explore ₹1,500 Crore Private Equity Deal", "summary": "Promoters of Chamundi Die Cast are seeking to raise ₹1,200–1,500 crore through a stake sale and have appointed KPMG as an advisor. The manufacturer of machined aluminium castings for the auto industry plans to use the funds for growth and professionalization. The firm earns 40% of its revenue from the US and reported operating income of ₹440.69 crore in FY25.", "category": "Business", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127236", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_15-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/127236"}], "article_id": "263d7e9b"}, {"headline": "Zepto Roadshow Reveals Shift in Marketing Metrics and Dark Store Efficiency", "summary": "Zepto's investor roadshow shows digital marketing costs per order fell to ₹1 in Q4 FY26 from ₹10.8 in FY24. However, the implied customer acquisition cost rose to ₹1,448 per new user in FY26 as new additions slowed. The company is focusing on its 9.2 million weekly transacting users and increasing dark store utilization, with average daily orders per store rising to 1,677.", "category": "Business", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127236", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_15-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/127236"}], "article_id": "e901868e"}, {"headline": "Indian Power Sector Stocks Surge as Peak Demand Hits Record Highs", "summary": "India's power demand rose 11.6% in May, with peak demand reaching 270GW. The surge, driven by intense heat, has boosted capacity utilization for thermal generators like NTPC and Tata Power. Renewable energy capacity also expanded by 51GW in FY26. Battery storage firms are seeing high returns from spot market arbitrage as evening demand pushes prices to the ₹10 per unit exchange cap.", "category": "Business", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127236", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_15-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/127236"}], "article_id": "15db8fc1"}, {"headline": "Mutual Fund Distributors Seek Tax Relief Under Reverse Charge Mechanism", "summary": "Distributors have urged the Association of Mutual Funds in India (Amfi) to bring their services under the reverse charge mechanism (RCM). This move follows revised total expense ratio (TER) rules that impacted income. Under RCM, the liability to pay GST would shift to the asset management company, similar to the current tax treatment for insurance agents.", "category": "Economy", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/127236", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_15-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/127236"}], "article_id": "5af648a3"}, {"headline": "Hotel Chains Expand Resort Portfolios Amid Growing Domestic Leisure Demand", "summary": "Hospitality firms like IHCL, Marriott, and Radisson are increasing resort signings as experiential travel grows. Leisure properties now account for up to 50% of new development pipelines for some groups. High room rates at luxury wildlife and spiritual destinations, often exceeding ₹50,000 per night, are making these projects more attractive than traditional urban hotels.", "category": "Business", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127236", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_15-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/127236"}], "article_id": "4623297b"}, {"headline": "Indian Box Office Revenue Rises 10-15 Percent in First Half of 2026", "summary": "India's theatrical box office is on track for a strong H1 2026, with action-drama 'Dhurandhar' leading with ₹1,100 crore in domestic collections. While regional Marathi and Telugu cinema performed well, trade experts expressed concern over the lack of mid-budget Hindi hits. Cumulative collections reached approximately ₹5,723 crore, driven by a few large tentpole releases.", "category": "Culture", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127236", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_15-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/127236"}], "article_id": "2c9ef2e1"}, {"headline": "NMDC Targets 20 Percent Revenue From Non-Iron Minerals by 2030", "summary": "India’s largest iron ore producer, NMDC, aims to diversify its business to reduce dependence on its core commodity. The firm targets 20% revenue from minerals like coal, manganese, and lithium, and 10% from overseas assets by 2030. NMDC plans to invest up to ₹50,000 crore to raise iron ore capacity to 110 million tonnes while scouting for mines in Africa and Latin America.", "category": "Business", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127236", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_15-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/127236"}], "article_id": "6b3c8dea"}, {"headline": "Swiss Voters Reject Proposal to Cap National Population at 10 Million", "summary": "Switzerland has rejected a radical proposal to cap its population at 10 million people, with 55% of voters opposing the plan. Proponents argued the cap was necessary for sustainability and lower rents. However, business leaders warned that strict immigration curbs would cut off access to vital foreign labor. Switzerland's current population stands at approximately 9.1 million.", "category": "World", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127236", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_15-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/127236"}], "article_id": "867c650e"}, {"headline": "AI Deepfake Tools Fuel New Forms of Harassment Among School Students", "summary": "The proliferation of AI 'nudify' tools is enabling a surge in deepfake-related bullying in schools. Recent surveys show over 50% of US teens have used such tools to create nonconsensual imagery. Victims often struggle to get content removed as laws lag behind tech. The incident highlights the vulnerability of anyone with an online presence and the lack of clear school policies on AI misuse.", "category": "Technology", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127236", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_15-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/127236"}], "article_id": "f0311d94"}, {"headline": "Myanmar Displaces Bangladesh as India’s Top Source for Hilsa Fish", "summary": "Myanmar accounted for 98% of India's hilsa imports in FY26, while Bangladesh's share fell to 2%. Periodic export restrictions in Bangladesh and lower prices in Myanmar drove the shift. Total imports rose 69% in volume over five years, but the value of Bangladeshi imports fell by 88%. Some experts suggest Bangladeshi-origin fish may be reaching India via Myanmar to bypass quotas.", "category": "Economy", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/127236", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_15-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/127236"}], "article_id": "f3b7cc05"}, {"headline": "India Remained Second Largest Buyer of Russian Fossil Fuels in May", "summary": "India imported an estimated €5.8 billion worth of Russian hydrocarbons in May, maintaining its position as the world's second-largest buyer. Crude oil accounted for 83% of these imports, valued at €4.8 billion. Russian oil arrivals saw a 21% month-on-month increase as refiners stepped up purchases. Total crude import volumes in India recorded an 8% increase during the month.", "category": "Economy", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127236", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_15-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/127236"}], "article_id": "92e384ac"}, {"headline": "Nykaa Fashion Shifts Focus to Premium Categories to Drive Profitability", "summary": "Nykaa Fashion is pivoting away from mass-market competition to focus on premium consumers and exclusive global brands like Nike. The vertical reported its first positive Ebitda margin of 0.3% in Q4 FY26. GMV grew 30% to ₹4,954 crore for the full year. The strategy involves doubling down on owned brands and high-growth segments like men's apparel and kids' fashion to improve margins.", "category": "Business", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127236", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_15-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/127236"}], "article_id": "f259302c"}, {"headline": "Modi and Macron meet in Nice to double trade in five years", "summary": "Prime Minister Modi and French President Emmanuel Macron met in Nice to discuss expanding their strategic partnership. Key goals include doubling bilateral trade within five years and enhancing cooperation in defense, civil nuclear energy, and technology. Macron praised India’s industrial base, while Modi invited French companies to participate in the 'Make in India' initiative.", "category": "Politics", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/127252", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_15-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127252"}], "article_id": "82b758a1"}, {"headline": "India defeats Pakistan by 64 runs in T20 World Cup opener", "summary": "India's women's team started their T20 World Cup campaign with a 64-run victory over arch-rivals Pakistan in Birmingham. Smriti Mandhana scored a crucial half-century to help India reach 171/7. In response, Pakistan was bowled out for 107, with Deepti Sharma taking a career-best five-wicket haul for 10 runs. Shreyanka Patil also contributed significantly with three wickets.", "category": "Sports", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/127252", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_15-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127252"}], "article_id": "0ea4321f"}, {"headline": "Mechanical and civil engineering students see surge in core sector placements", "summary": "Engineering colleges in Bengaluru are reporting a significant increase in placements for mechanical and civil engineering students in core companies. Institutes like UVCE and PES University have seen nearly 100% placement in these sectors. This trend marks a shift as more core industries adopt AI and automation, requiring traditional engineering skills with digital literacy.", "category": "Education", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127252", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_15-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127252"}], "article_id": "ee449f32"}, {"headline": "ED files case against US missionary group for Naxal funding", "summary": "The Enforcement Directorate (ED) has registered a case against a US-based Christian missionary organization for allegedly funding Naxal activities in India. The agency claims that over ₹95 crore was illegally diverted through various channels to support extremist groups in Chhattisgarh and other regions. Investigations are ongoing into foreign contribution regulation violations.", "category": "Law", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127252", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_15-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/127252"}], "article_id": "cdbdb312"}, {"headline": "Karnataka government surveys 3.5 lakh hectares of land for clean titles", "summary": "The Karnataka revenue department is conducting a survey of 3.5 lakh hectares of land to resolve long-standing disputes and provide clear titles to owners. The project uses advanced mapping technology to identify land parcels and update records. This initiative aims to benefit farmers and marginalized communities by ensuring their land rights are legally recognized and documented.", "category": "Infrastructure", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/127252", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_15-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127252"}], "article_id": "305d5dd7"}, {"headline": "Sitharaman warns West Asia crisis and imports are hurting Indian rupee", "summary": "Finance Minister Nirmala Sitharaman stated that the ongoing West Asia crisis and high import costs for crude oil and fertilizers are putting pressure on the Indian rupee. Despite global volatility, she emphasized that India's economy remains stable with robust foreign exchange reserves. She dismissed concerns over job losses due to AI, stating the tech will actually help labor.", "category": "Economy", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127252", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_15-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/127252"}], "article_id": "98dcb4ce"}, {"headline": "Karnataka exports projected to grow by 9.5 percent in FY26", "summary": "Karnataka's export sector is expected to grow by 9.5% in the 2025-26 fiscal year, driven by strong performance in software and services. Bengaluru remains the primary hub, contributing significantly to merchandise and services exports. Key sectors include electronics, petroleum products, and agriculture. The state government is introducing new incentives to maintain this momentum.", "category": "Economy", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/127252", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_15-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/127252"}], "article_id": "7dd28e70"}, {"headline": "FPI selling in Indian markets reaches 32,853 crore in June", "summary": "Foreign Portfolio Investors (FPIs) have withdrawn ₹32,853 crore from Indian equities in the first two weeks of June. The sell-off is attributed to high valuations and global economic uncertainty. Analysts suggest that while FPIs are selling, domestic institutional investors are providing support to the market, preventing a major crash despite the significant foreign outflow.", "category": "Economy", "page": 11, "importance": 8, "telegram_url": "https://t.me/c/1877410077/127252", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_15-06-2026.pdf", "page": 11, "telegr const allArts = [...DIGEST.articles].sort((a,b)=>(b.importance||0)-(a.importance||0));
const byCategory = {};
for (const art of allArts) {
  const c = art.category||"India";
  if (!byCategory[c]) byCategory[c]=[];
  byCategory[c].push(art);
}
const sortedCats = Object.keys(byCategory).sort(
  (a,b)=>(byCategory[b][0].importance||0)-(byCategory[a][0].importance||0)
);

// FIXED DEEP LINK HANDLER - Runs IMMEDIATELY
let deepLinkTarget = null;
function handleDeepLink() {
  const hash = window.location.hash;
  if (!hash || !sortedCats.length) return;
  
  const cleanHash = hash.startsWith('#article-') ? hash.slice(9) : hash.slice(1);
  const targetArticle = DIGEST.articles.find(art => art.article_id === cleanHash);
  
  if (targetArticle) {
    deepLinkTarget = {article: targetArticle, hash: cleanHash};
  }
}
handleDeepLink();

let catIdx=0,vpW=0,vpH=0;

function buildAll() {
  vpW=outer.offsetWidth; vpH=outer.offsetHeight;
  hTrack.innerHTML=''; panels.length=0;
  sortedCats.forEach((cat,ci)=>{
    const m=CAT_META[cat]||{color:"#e8334a",icon:"📰"};
    const arts=byCategory[cat];
    const panel=document.createElement('div');

    panel.id=`cat-panel-${ci}`;

    panel.innerHTML=`<div class="progress-row" id="prow-${ci}" style="--cc:${m.color}"></div><div class="v-feed" id="vfeed-${ci}"><div class="v-track" id="vtrack-${ci}"></div></div>`;
    hTrack.appendChild(panel);
    const pRow=panel.querySelector(`#prow-${ci}`);
    const vFeed=panel.querySelector(`#vfeed-${ci}`);
    const vTrack=panel.querySelector(`#vtrack-${ci}`);
    const cardH=vFeed.getBoundingClientRect().height||vpH;
    
    arts.forEach((art,ai)=>{
      const card = buildCard(art, cardH, m, cat, ai);
      card.id = `article-${art.article_id}`;
      card.dataset.articleId = art.article_id;
      vTrack.appendChild(card);
    });
    
    panels.push({pRow,vFeed,vTrack,articles:arts,artIdx:0});
    buildPRow(ci);
  });
  
  hTrack.style.transition='none';
  hTrack.style.transform='translateX(0)';
  syncV(0,false);
  
  // Apply deep link after build — 200ms ensures card heights are measured
  if (deepLinkTarget) {
    setTimeout(() => applyDeepLink(deepLinkTarget), 200);
  }
}

function buildCard(art,h,m,cat,articleIndex) {
  const src=art.sources?.[0];
  // Direct PDF link with #page=N - respected by all modern browser PDF viewers
  // when the file is opened via a link click (Chrome, Firefox, Safari, Edge).
  // Falls back to the Telegram source URL if no PDF is available.
  const href = src?.pdf_filename
    ? ('pdfs/' + src.pdf_filename + '#page=' + (src.page || 1))
    : (src?.telegram_url || '#');
  const card=document.createElement('div');
  card.className='card';
  card.dataset.articleId = art.article_id;
  card.style.height=h+'px';
  card.style.setProperty('--cc',m.color);
  card.innerHTML=`
    <div class="card-content">

          ${cat.toUpperCase()}
        </div>
        <div class="card-date">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="2.5" width="11" height="9.5" rx="1.8" stroke="#555" stroke-width="1.2"/><path d="M4.5 1v3M8.5 1v3" stroke="#555" stroke-width="1.2" stroke-linecap="round"/><path d="M1 6h11" stroke="#555" stroke-width="1.2"/></svg>
          ${DIGEST.date}
        </div>
      </div>
      <div class="card-headline">${art.headline}</div>
      <div class="card-summary">${art.summary}</div>
      <div class="card-divider"></div>
      <div class="card-footer">
        ${src?`<a class="src-chip" href="${href}" target="_blank" onclick="event.stopPropagation()">${src.newspaper}<span class="src-chip-sep">&middot;</span><span class="src-chip-pg">Pg ${src.page}</span><span class="src-chip-ext"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M3.5 7.5L7.5 3.5M7.5 3.5H5M7.5 3.5V6" stroke="#555" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></span></a>`:'<div></div>'}
        <div class="info-btn"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6.5" stroke="#444" stroke-width="1.3"/><circle cx="7.5" cy="4.5" r="0.8" fill="#555"/><path d="M7.5 7v4" stroke="#555" stroke-width="1.5" stroke-linecap="round"/></svg></div>
      </div>
    </div>`;
  return card;
}

function buildPRow(ci) {
  const p=panels[ci],ai=p.artIdx;
  p.pRow.innerHTML='';
  p.articles.forEach((_,i)=>{
    const seg=document.createElement('div');
    seg.className='pseg'+(i<ai?' done':i===ai?' active':'');
    p.pRow.appendChild(seg);
  });
}

function syncV(ci,animated) {
  const p=panels[ci],h=p.vFeed.getBoundingClientRect().height;
 p.vTrack.style.transition=animated?'transform 0.35s cubic-bezier(0.4,0,0.2,1)':'none';
  p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;
  buildPRow(ci);
}

function applyDeepLink(target) {
  const ci = sortedCats.findIndex(cat =>
    byCategory[cat].some(art => art.article_id === target.hash)
  );
  if (ci === -1) return;

  // Set catIdx BEFORE calling goCat so the horizontal track lands correctly
  catIdx = ci;
  hTrack.style.transition = 'none';
  hTrack.style.transform = `translateX(${-ci * vpW}px)`;

  const ai = byCategory[sortedCats[ci]].findIndex(art => art.article_id === target.hash);
  if (ai === -1) return;
  panels[ci].artIdx = ai;
  syncV(ci, false);

  const card = document.getElementById('article-' + target.hash);
  if (card) {
    card.classList.add('target-highlight');
    setTimeout(() => card.classList.remove('target-highlight'), 3000);
  }
}

function goArt(d) {
  const p=panels[catIdx];
  const n=Math.max(0,Math.min(p.artIdx+d,p.articles.length-1));
  if(n===p.artIdx&&d!==0)return;
  p.artIdx=n; syncV(catIdx,true); dismiss();
}

function goCat(idx,animated=true) {
  idx=Math.max(0,Math.min(idx,sortedCats.length-1));
  if(idx===catIdx&&animated)return;
  const prev=catIdx; catIdx=idx;
  hTrack.style.transition=animated?'transform 0.38s cubic-bezier(0.4,0,0.2,1)':'none';
  hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;
  if(animated&&idx!==prev) {
    const m=CAT_META[sortedCats[idx]]||{color:"#e8334a",icon:"📰"};
    catFlash.style.background=m.color+'18';
    cfIcon.textContent=m.icon; cfName.textContent=sortedCats[idx]; cfName.style.color=m.color;
    catFlash.classList.add('on'); setTimeout(()=>catFlash.classList.remove('on'),500);
  }
  dismiss();
}

let dismissed=false;
function dismiss() {
  if(dismissed)return; dismissed=true;
  hintUp.classList.remove('visible'); hintRight.classList.remove('visible');
  hintUp.classList.add('gone'); hintRight.classList.add('gone');
}

(function initHints() {
  const KEY='dailyBriefHintSeen';
  if(!localStorage.getItem(KEY)) {
    localStorage.setItem(KEY,'1');
    setTimeout(()=>{ if(!dismissed){ hintUp.classList.add('visible'); hintRight.classList.add('visible'); } },2500);
  }
})();

let tsX=0,tsY=0,tcX=0,tcY=0,axis=null,drag=false;
outer.addEventListener('touchstart',e=>{ tsX=e.touches[0].clientX; tsY=e.touches[0].clientY; tcX=0; tcY=0; axis=null; drag=true; hTrack.style.transition='none'; const p=panels[catIdx]; if(p)p.vTrack.style.transition='none'; },{passive:true});
outer.addEventListener('touchmove',e=>{ if(!drag)return; const dx=e.touches[0].clientX-tsX,dy=e.touches[0].clientY-tsY; tcX=dx; tcY=dy; if(!axis&&(Math.abs(dx)>8||Math.abs(dy)>8))axis=Math.abs(dx)>Math.abs(dy)?'h':'v'; if(!axis)return; e.preventDefault(); if(axis==='h'){ const edge=(catIdx===0&&dx>0)||(catIdx===sortedCats.length-1&&dx<0); hTrack.style.transform=`translateX(${-catIdx*vpW+dx*(edge ? 0.14 : 1)}px)`; }else{ const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height; const edge=(p.artIdx===0&&dy>0)||(p.artIdx===p.articles.length-1&&dy<0); p.vTrack.style.transform=`translateY(${-p.artIdx*h+dy*(edge ? 0.14 : 1)}px)`; } },{passive:false});
outer.addEventListener('touchend',()=>{ if(!drag)return; drag=false; if(axis==='h'){ const t=vpW*.2; if(tcX<-t)goCat(catIdx+1); else if(tcX>t)goCat(catIdx-1); else{hTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;} }else if(axis==='v'){ const t=vpH*.2; if(tcY<-t)goArt(1); else if(tcY>t)goArt(-1); else{const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height;p.vTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;} } axis=null; },{passive:true});
document.addEventListener('keydown',e=>{ if(e.key==='ArrowDown'||e.key===' '){e.preventDefault();goArt(1);} if(e.key==='ArrowUp'){e.preventDefault();goArt(-1);} if(e.key==='ArrowRight'){e.preventDefault();goCat(catIdx+1);} if(e.key==='ArrowLeft'){e.preventDefault();goCat(catIdx-1);} });
let wl=false;
outer.addEventListener('wheel',e=>{ e.preventDefault();if(wl)return;wl=true; Math.abs(e.deltaX)>Math.abs(e.deltaY)?goCat(catIdx+(e.deltaX>0?1:-1)):goArt(e.deltaY>0?1:-1); setTimeout(()=>wl=false,500); },{passive:false});
window.addEventListener('resize',()=>{ vpW=outer.offsetWidth;vpH=outer.offsetHeight; hTrack.style.transition='none'; hTrack.style.transform=`translateX(${-catIdx*vpW}px)`; panels.forEach(p=>{ const h=p.vFeed.getBoundingClientRect().height; p.vTrack.querySelectorAll('.card').forEach(c=>c.style.height=h+'px'); p.vTrack.style.transition='none'; p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`; }); });

buildAll();
</script>
</body>
</html>
