 quality education. The reforms are projected to benefit over 50 million students.", "category": "Education", "page": 16, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128413", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_26-06-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/128413"}], "article_id": "0c4aa993"}, {"headline": "National Budget Prioritizes Growth and Social Spending", "summary": "The recently announced national budget prioritizes economic growth and increased social spending, with significant allocations for healthcare, education, and infrastructure development. The budget totals $1 trillion, marking a 7% increase.", "category": "Economy", "page": 18, "importance": 9, "telegram_url": "https://t.me/c/1877410077/128413", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_26-06-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/128413"}], "article_id": "7676bfa2"}, {"headline": "Government Outlines Key Focus Areas for Next Quarter", "summary": "The government has outlined its key focus areas for the upcoming quarter, including economic reforms, infrastructure development, social welfare, and technological advancements. Specific targets set for each sector. Public transparency is emphasized.", "category": "Politics", "page": 18, "importance": 8, "telegram_url": "https://t.me/c/1877410077/128413", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_26-06-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/128413"}], "article_id": "b617c057"}, {"headline": "Policy Initiatives Focus on Healthcare, Education, and Environment", "summary": "Specific policy initiatives detailed include enhanced healthcare provisions, reforms in the education system, and new environmental protection measures, reflecting a broad policy agenda. $20 billion allocated for these sectors.", "category": "Politics", "page": 18, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128413", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_26-06-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/128413"}], "article_id": "0e84ed8c"}, {"headline": "Business Environment to be Boosted with Technology Adoption", "summary": "The government plans to boost the business environment through technology adoption incentives, supporting SMEs and fostering innovation for competitive growth. Tax breaks offered for digital transformation investments. Aim is to increase SME competitiveness.", "category": "Business", "page": 18, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128413", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_26-06-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/128413"}], "article_id": "b269980a"}, {"headline": "Leading Financial Institution Reports Strong Annual Results", "summary": "A prominent financial institution has reported robust annual results, exceeding profit forecasts and announcing an expansion of its investment banking division. Net profit rose by 18%, reaching $3.5 billion. Shareholder dividends increased.", "category": "Business", "page": 19, "importance": 8, "telegram_url": "https://t.me/c/1877410077/128413", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_26-06-2026.pdf", "page": 19, "telegram_url": "https://t.me/c/1877410077/128413"}], "article_id": "e08814a6"}, {"headline": "Global Economic Recovery Gains Momentum Despite Challenges", "summary": "The global economic recovery is gaining momentum, supported by strong demand and vaccination progress. However, supply chain disruptions pose ongoing challenges. Global GDP growth is projected at 4.5% for the current year.", "category": "Economy", "page": 19, "importance": 8, "telegram_url": "https://t.me/c/1877410077/128413", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_26-06-2026.pdf", "page": 19, "telegram_url": "https://t.me/c/1877410077/128413"}], "article_id": "901fc41b"}, {"headline": "Multilateral Trade Talks Advance on Contentious Issues", "summary": "Multilateral trade talks have made significant progress on several contentious issues, paving the way for potential new agreements to liberalize global commerce. Key areas of discussion included agricultural subsidies and intellectual property rights.", "category": "World", "page": 19, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128413", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_26-06-2026.pdf", "page": 19, "telegram_url": "https://t.me/c/1877410077/128413"}], "article_id": "0077d338"}, {"headline": "Corporate Sustainability Report Shows Progress in Green Initiatives", "summary": "A new corporate sustainability report highlights significant progress in adopting green initiatives and reducing environmental footprint across major industries. Over 100 companies participated, collectively reducing emissions by 15%.", "category": "Environment", "page": 19, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128413", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_26-06-2026.pdf", "page": 19, "telegram_url": "https://t.me/c/1877410077/128413"}], "article_id": "10bd86b1"}, {"headline": "Community Development Projects Achieve Significant Impact", "summary": "Several community development projects have achieved considerable social impact, improving living conditions and empowering local populations through various initiatives. Projects focused on sanitation, clean water, and education.", "category": "India", "page": 19, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128413", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_26-06-2026.pdf", "page": 19, "telegram_url": "https://t.me/c/1877410077/128413"}], "article_id": "0a9485fc"}, {"headline": "Biotech Sector Sees Rapid Advancements in Genetic Research", "summary": "The biotech sector is witnessing rapid advancements in genetic research, promising new therapies and agricultural improvements. Ethical considerations are also being addressed. CRISPR technology sees new applications.", "category": "Science", "page": 21, "importance": 8, "telegram_url": "https://t.me/c/1877410077/128413", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_26-06-2026.pdf", "page": 21, "telegram_url": "https://t.me/c/1877410077/128413"}], "article_id": "b3ab117a"}, {"headline": "National Health Policy Focuses on Preventive Care", "summary": "A new national health policy has been launched, emphasizing preventive care and early detection to reduce the burden of chronic diseases and improve public health outcomes. Campaigns target lifestyle diseases.", "category": "Health", "page": 21, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128413", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_26-06-2026.pdf", "page": 21, "telegram_url": "https://t.me/c/1877410077/128413"}], "article_id": "33e6f391"}, {"headline": "Vocational Training Programs Address Youth Unemployment", "summary": "New vocational training programs are being implemented to address youth unemployment, equipping young people with essential skills for emerging industries. Partnerships with private sector companies ensure job placement for graduates.", "category": "Education", "page": 21, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128413", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_26-06-2026.pdf", "page": 21, "telegram_url": "https://t.me/c/1877410077/128413"}], "article_id": "6922a595"}, {"headline": "Major Corporations Boost ESG Initiatives for Sustainability", "summary": "Leading corporations are intensifying their Environmental, Social, and Governance (ESG) initiatives, reflecting a growing commitment to sustainability and ethical business practices. Investment in green technologies is up by 25%.", "category": "Business", "page": 21, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128413", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_26-06-2026.pdf", "page": 21, "telegram_url": "https://t.me/c/1877410077/128413"}], "article_id": "f11c0ed5"}, {"headline": "International Body Pledges Support for Climate Resilience", "summary": "An international organization has pledged substantial support for climate resilience projects in vulnerable regions, aiming to build adaptive capacities and reduce disaster risks. Funding of $500 million committed to coastal protection.", "category": "World", "page": 21, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128413", "sources": [{"newspaper": "Financial Express", "pdf_filename": "Bangalore_FE_26-06-2026.pdf", "page": 21, "telegram_url": "https://t.me/c/1877410077/128413"}], "article_id": "e1b4d569"}, {"headline": "EVs: Battery recycling norms to raise prices, impact sales", "summary": "Society of Indian Automobile Manufacturers (SIAM) warns new battery recycling norms could increase EV prices by 3-5%, potentially impacting sales. Manufacturers are mandated to collect 70% of batteries after 8 years, increasing to 82% later. Compliance costs for collection, storage, handling, and identification systems will add ₹8,000-₹25,000 to battery costs.", "category": "Business", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128448", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 26-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/128448"}], "article_id": "51305b41"}, {"headline": "Banks cautious on dollar bonds despite RBI swap window", "summary": "Following RBI's special swap window, HDFC Bank raised $750M at a lower rate. Other banks like Axis Bank and PFC also raised capital. Investors seek higher returns, widening spreads on Indian dollar bonds. Banks are adopting a cautious, strategic approach to tapping foreign bond markets, avoiding a flood of issuances as initially anticipated by investors.", "category": "Economy", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/128448", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 26-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/128448"}], "article_id": "6f6f0152"}, {"headline": "Integrated command center planned for AI cybersecurity threats", "summary": "The government plans an integrated command center to tackle cybersecurity threats from AI and general-purpose AI models. This initiative, to be led by the Ministry of Electronics and Information Technology, aims to unify the response and coordination between central and state government departments for timely cyber security measure implementation.", "category": "Technology", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/128448", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 26-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/128448"}], "article_id": "3391cec1"}, {"headline": "Commercial LPG restrictions lifted amid improved fuel supply", "summary": "The government lifted restrictions on liquefied petroleum gas (LPG) distribution for industrial and commercial consumers. This decision follows improved fuel supply due to the reopening of the Strait of Hormuz. Bulk LPG supply, previously halted during the crisis, has also partially resumed, restoring availability to pre-crisis levels.", "category": "Economy", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128448", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 26-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/128448"}], "article_id": "f6ed7e88"}, {"headline": "MF investors increase IT exposure despite market uncertainty", "summary": "Mutual fund investors are leveraging market dips to increase their IT sector investments via passive funds. Assets under management (AUM) for Nifty IT tracking passive funds grew 23% to ₹5,800 crore over the last year, despite a 30% fall in the Nifty IT index. However, many wealth managers remain 'underweight' on the sector.", "category": "Business", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128448", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 26-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/128448"}], "article_id": "357d8068"}, {"headline": "Hero MotoCorp and WeWork lease large office spaces in Delhi", "summary": "Hero MotoCorp and co-working firm WeWork have jointly leased 3.5 lakh square feet of office space in Bharti Realty's Worldmark complex in Delhi. Hero MotoCorp secured 2.3 lakh sq ft for nine years, while WeWork leased 1.1 lakh sq ft for ten years, with total rent expenses expected to reach ₹950 crore.", "category": "Business", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128448", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 26-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/128448"}], "article_id": "f2d31595"}, {"headline": "Commercial vehicle industry at 'crucial turning point'", "summary": "Tata Motors predicts India's commercial vehicle (CV) industry will see single-digit growth in FY27, reaching a 'crucial turning point'. Government incentives, rising road freight demand, infrastructure spending, and electrification are expected to drive long-term growth, with EV share projected to hit double digits by 2030.", "category": "Business", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128448", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 26-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/128448"}], "article_id": "1f8d20c6"}, {"headline": "TVS iQube electric scooter production crosses 1 million units", "summary": "TVS Motor Company announced a milestone, producing its 10-lakhth iQube electric scooter at its Hosur plant. Launched in January 2020, the iQube is the best-selling electric scooter in India, with TVS reporting a 65% year-on-year growth in monthly sales to 42,459 units in May 2026.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128448", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 26-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/128448"}], "article_id": "a8dc5182"}, {"headline": "Indian fintechs expanding globally with new licenses", "summary": "Indian fintech companies are actively seeking new licenses in North America, West Asia, and Southeast Asia to broaden their cross-border operations. Skydo, a cross-border fintech, recently secured a payment license in Canada, marking its first licensed market outside India, enabling two-way payment flows.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128448", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 26-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/128448"}], "article_id": "92c7d421"}, {"headline": "India tech funding up 12% in H1 2026, but deal volume falls", "summary": "Indian tech startups raised $7.2 billion in H1 2026, a 12% increase from the previous year, but the total number of deals dropped by 43% to 652. Funding largely concentrated in a few large rounds. AI-focused startups contributed to new unicorn status, while traditional IT outsourcing faces pressure from AI spending.", "category": "Technology", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128448", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 26-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/128448"}], "article_id": "d927b503"}, {"headline": "Rupee strengthens as crude oil prices decline and FPI rises", "summary": "The rupee strengthened to 94.40 against the dollar due to falling crude oil prices and increased foreign portfolio investment (FPI) in debt. FPI inflows in debt reached ₹8,109 crore on June 24, the highest single-day inflow this year, boosting market sentiment.", "category": "Economy", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128448", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 26-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/128448"}], "article_id": "56b2e882"}, {"headline": "Indian markets record longest weekly gain of the year", "summary": "Sensex and Nifty recorded their third consecutive weekly gain, marking the longest streak since December 2025. Sensex rose 109 points to 77,100.47, and Nifty gained 34 points to 24,056. Falling crude oil prices and strong FPI inflows into debt markets bolstered investor sentiment.", "category": "Business", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128448", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 26-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/128448"}], "article_id": "55386244"}, {"headline": "Indian stocks' underperformance phase nearing end: ICICI Securities", "summary": "ICICI Securities predicts an end to the prolonged underperformance of Indian equities. Factors like high valuations, slow nominal GDP growth, FPI selling, and geopolitical tensions previously pressured markets, but these conditions are improving. Strong balance sheets of major tech companies and robust demand outlook provide protection against further downturns.", "category": "Business", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128448", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 26-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/128448"}], "article_id": "e0ad059a"}, {"headline": "Trent strengthens with expansion plans and new formats", "summary": "Retail giant Trent Ltd. maintains its revenue and profit targets, focusing on robust expansion. It aims to open 200-250 new Zudio stores and 50 Westside stores annually. The company is diversifying its business to cater to different customer segments, expecting improved like-for-like (LFL) growth after a challenging FY26.", "category": "Business", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128448", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 26-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/128448"}], "article_id": "10ccdf68"}, {"headline": "NRIs may get up to 9x leverage on FCNR(B) deposits", "summary": "RBI's clarification on special swap window for FCNR(B) deposits could allow banks to offer NRIs up to 9x leverage, potentially yielding 12-18% effective returns. Banks can lend against these deposits, with the exact leverage depending on their capacity. This initiative aims to attract foreign capital and support the rupee.", "category": "Economy", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128448", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 26-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/128448"}], "article_id": "c0d51460"}, {"headline": "Q1 FY27 disinvestment proceeds surpass last fiscal's total", "summary": "Government disinvestment proceeds for Q1 FY27 have already exceeded ₹18,000 crore, surpassing the entire FY26 total of ₹16,886 crore. This includes stake sales in IRFC, Coal India, Central Bank of India, NLC India, NHPC, and General Insurance Corporation of India. This strong start suggests the FY27 target may be exceeded.", "category": "Economy", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/128448", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 26-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/128448"}], "article_id": "cd91bc73"}, {"headline": "Power equipment industry hit by rising aluminium, copper costs", "summary": "India's power equipment and renewable energy sectors face significant cost pressures from surging aluminium and copper prices, intensified by the West Asia crisis. Aluminium prices rose over 65% in 2024-26, while copper hit a record $13,000/ton. This impacts infrastructure projects and manufacturing costs.", "category": "Business", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128448", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 26-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/128448"}], "article_id": "c246909c"}, {"headline": "Government sets new performance targets for public general insurers", "summary": "The government has introduced new key performance indicators (KPIs) for public sector general insurance companies for the next five years. Targets include achieving an incurred claims ratio (ICR) of 85% by FY27 (from 97.3% in FY25) and growing retail health market share by at least 5% annually.", "category": "Business", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128448", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 26-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/128448"}], "article_id": "c138cae6"}, {"headline": "The expensive politics of freebies and fiscal strain", "summary": "This editorial argues that the growing culture of freebies by political parties, both central and state, poses a serious threat to fiscal stability and the quality of public expenditure. It highlights the significant opportunity cost, diverting funds from productive investments in physical and human capital, essential for long-term growth.", "category": "Politics", "page": 5, "importance": 8, "telegram_url": "https://t.me/c/1877410077/128448", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 26-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/128448"}], "article_id": "ece596d8"}, {"headline": "Why young bankers are leaving public sector banks", "summary": "This opinion piece explores why talented young officers are leaving Public Sector Banks (PSBs). Reasons include lower salaries compared to private banks, rigid hierarchy, slow promotion, frequent transfers away from home states, and a 'vigilance' culture that discourages initiative, leading to frustration despite job security.", "category": "Economy", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128448", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 26-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/128448"}], "article_id": "c3f770b8"}, {"headline": "S&P projects India's economic growth to slow to 6.6% in FY27", "summary": "Global rating agency S&P forecasts India's economic growth to decelerate to 6.6% in FY27 from 7.7% in FY26. Despite global challenges like West Asia tensions, India's large domestic market, young population, digital economy, and strong entrepreneurship remain key strengths. Continued structural reforms are crucial for sustainable growth.", "category": "Economy", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128448", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 26-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/128448"}], "article_id": "be31e057"}, {"headline": "Footpaths must be safe and free from encroachment", "summary": "A letter to the editor argues for safe footpaths as a fundamental right, citing Supreme Court directives. It points out the absence of footpaths in industrial areas and widespread encroachment by vendors, calling for government action to clear them while providing alternative spaces for hawkers to protect their livelihoods.", "category": "India", "page": 5, "importance": 3, "telegram_url": "https://t.me/c/1877410077/128448", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 26-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/128448"}], "article_id": "a1a54804"}, {"headline": "Severe floods in Arunachal Pradesh wash away homes and roads", "summary": "Continuous heavy rainfall in Arunachal Pradesh caused severe floods in Die Panyor district on Thursday. The deluge resulted in numerous houses and roads being washed away, highlighting the impact of natural disasters in the region.", "category": "Environment", "page": 5, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128448", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 26-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/128448"}], "article_id": "d46586d9"}, {"headline": "Jaishankar calls for new, strong multipolarity in fragmenting world", "summary": "External Affairs Minister S. Jaishankar emphasized the need for a \"new and strong multipolarity\" to maintain a rules-based global order amid increasing fragmentation. He advocated for reducing economic risks by diversifying production and supply chains, especially in finance and technology, to avoid undue pressure or dependency on a few nations.", "category": "World", "page": 10, "importance": 9, "telegram_url": "https://t.me/c/1877410077/128448", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 26-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/128448"}], "article_id": "42385ea7"}, {"headline": "Speculations of Union cabinet reshuffle as Amit Shah meets President", "summary": "Home Minister Amit Shah met President Droupadi Murmu, following a similar meeting by PM Narendra Modi, fueling speculations of a potential Union cabinet reshuffle. These meetings come after senior BJP leader V. Muraleedharan resigned from the cabinet, with his Rajya Sabha term concluding.", "category": "Politics", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128448", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 26-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/128448"}], "article_id": "d7120e9f"}, {"headline": "India's Ambassador to Bangladesh granted Cabinet Minister status", "summary": "India has conferred the rank equivalent to a Cabinet Minister on its Ambassador to Bangladesh, Dinesh Trivedi. This move signals the high importance New Delhi places on its relations with Bangladesh, particularly with the new government led by the Bangladesh Nationalist Party, and in enhancing bilateral ties.", "category": "Politics", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128448", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 26-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/128448"}], "article_id": "96928742"}, {"headline": "Former IAS officer Sujata Rout Kartikeyan joins Biju Janata Dal", "summary": "Sujata Rout Kartikeyan, wife of former bureaucrat V K Pandian and a former IAS officer, formally joined the Biju Janata Dal (BJD) in Odisha. Chief Minister Naveen Patnaik welcomed her, announcing she would lead the party in the upcoming elections. Kartikeyan, a 2000-batch IAS officer, resigned from civil service in March 2025.", "category": "Politics", "page": 10, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128448", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 26-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/128448"}], "article_id": "5dcac3d5"}, {"headline": "Venezuela earthquake death toll rises to 164; India offers aid", "summary": "Two powerful earthquakes in Venezuela have caused at least 164 deaths and 971 injuries. Acting President Delcy Rodríguez declared a state of emergency, with La Guaira most affected. Rescue operations are ongoing, and the main airport remains closed. PM Narendra Modi expressed condolences and offered all possible assistance from India.", "category": "World", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/128448", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi H 26-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/128448"}], "article_id": "c614aad1"}, {"headline": "India races to become global AI data centre hub, raising water concerns", "summary": "India aims to be a global AI data centre hub with tax breaks, but these facilities consume vast amounts of water for cooling, raising environmental concerns in water-stressed states like Maharashtra. Mumbai dominates capacity, while new cities are emerging to address water scarcity. Major investments from Amazon, Google, Microsoft, Adani, and Reliance are driving growth, but water woes could hurt expansion. Tech fixes like closed-loop liquid cooling offer solutions.", "category": "Technology", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "03d94e0d"}, {"headline": "Quick Edit: Round-tripping games and RBI's crisis playbook", "summary": "The 'Quick Edit' discusses how under-invoiced exports and over-invoiced imports were used to stash wealth abroad, evolving into 'round-tripping' games. Recent RBI actions, allowing non-residents high returns on dollar deposits, may inadvertently tempt round-trippers. This highlights the need for continued vigilance against such creative financial maneuvers, despite the initial intent to attract dollars and address capital controls.", "category": "Economy", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "79055b92"}, {"headline": "FASTag collections rise 2.8% to ₹5,720 crore in April 2026", "summary": "FASTag collections reached ₹5,720 crore in April 2026, marking a 2.8% year-on-year increase. Heavy trucks remain the largest contributor (45.2%), followed by passenger vehicles, jeeps, and vans (21.2%), making them the second-largest segment. Buses and trucks contributed 20.8%, 3-axle vehicles 9.2%, light commercial vehicles 3.6%, and oversized vehicles 0.1%.", "category": "Infrastructure", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "78447115"}, {"headline": "India’s core infrastructure growth slows to 0.5% in May 2026", "summary": "India's core infrastructure output grew 0.5% year-on-year in May, its weakest in seven months, slowing from 1.8% in April. Five of eight core industries contracted, with coal down 9.3%. Electricity led growth at 8.7%, followed by cement (8.4%) and steel (5%). Refinery products (-8.7%), natural gas (-4.9%), crude oil (-4.6%), and fertilizers (-0.9%) all saw contractions, dampening overall growth.", "category": "Economy", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "a31f5bd4"}, {"headline": "India’s Russian crude imports rise above 50% in June", "summary": "India's average crude imports from Russia reached 2.66 million barrels per day (mbpd) in the first three weeks of June, increasing Russia's share of India's oil purchases above 50%. This surge follows refiners buying discounted barrels, with imports up from 1.91 mbpd in May and 1.04 mbpd in February. UAE and Saudi Arabia remain key suppliers, but Russian dominance is growing despite US sanctions disruptions.", "category": "Economy", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "5564a768"}, {"headline": "Kharif sowing gathers pace despite weaker monsoon forecast", "summary": "India is preparing for a weaker monsoon, with the agriculture ministry drawing up contingency plans for 111 vulnerable districts. Despite a prolonged pause in monsoon rainfall, kharif sowing reached 11.99 million hectares by 19 June, up 1.7% from a year ago. Most crops show higher acreage, but cotton, soybean, and urad lag. The India Meteorological Department expects rainfall to revive soon.", "category": "Economy", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "e038454e"}, {"headline": "India secures 13th rank in QS World Future Skills Index 2027", "summary": "India ranks 13th among 89 economies in the QS World Future Skills Index 2027, measuring AI future readiness. With an 89.42 score, India leads all lower-middle-income economies, surpassing the Philippines and Uzbekistan, and ranks ahead of advanced economies like Sweden and Japan. The report highlights the challenge of aligning higher education with employer needs.", "category": "Technology", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "f50e994b"}, {"headline": "Briefs: ADB financing, semiconductor incentives, data center pipeline, LPG imports", "summary": "The Asian Development Bank will provide $1 billion in direct financing to India this year. The government plans ₹7,100 crore in FY27 incentives for semiconductor projects. India's future data center pipeline is estimated at 8.33GW, over five times current capacity. India is expected to import a record 1 million tonnes of LPG from the US in June. Over 11,000 sailors are stranded in the Strait of Hormuz.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "a1afd3b1"}, {"headline": "IPO fundraising trends: OFS share expected to drop below 50% in 2026", "summary": "India’s IPOs have been dominated by Offer for Sale (OFS), with proceeds going to existing shareholders. OFS accounted for over half of IPO fundraising since 2012, peaking at 87% in 2020. However, Jio Platforms' ₹35,000-crore IPO, primarily a fresh issue, is expected to push OFS's share below 50% in 2026. Analysts view this as a one-off due to deal size, not a structural shift.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "f581e716"}, {"headline": "Indian refiners eye concessions as Iranian crude imports resume", "summary": "Indian refiners expect sweeter terms, including deferred payments and longer credit periods, from Iran as a temporary US sanctions waiver revives large-scale crude imports. With global oil supply projected to rebound, refiners anticipate a buyer's market where Iran will offer discounts to compete with other suppliers. Clarity on payment mechanisms and long-term durability of peace talks are awaited.", "category": "Economy", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "22f0ffb5"}, {"headline": "Airlines race to restore West Asia flights as geopolitical tensions ease", "summary": "Indian airlines are rapidly restoring flights to West Asia, a key international market, after disruptions from the US-Iran war. IndiGo, Air India Express, and Air India are leading the rebound, restoring 70-80% of last year's June capacity. While demand is intact, elevated jet fuel costs continue to weigh on airline economics. West Asia accounts for nearly a third of Indian carriers' international traffic.", "category": "Business", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "65fb3f50"}, {"headline": "Vedanta's Navin Agarwal invests ₹1,250 crore in rare earth magnets", "summary": "Navin Agarwal, Vedanta’s executive vice-chairman, is investing ₹1,250 crore in his personal capacity in NAN MagneTech Pvt. Ltd. to produce rare earth permanent magnets (REPMs). The firm, a subsidiary of NAN GreenMet Pvt. Ltd., plans to apply for government PLI schemes. It has secured land in Andhra Pradesh and will initially have a capacity of 1,200 tonnes of NdFeB magnets, with plans to expand.", "category": "Business", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "f46d2e29"}, {"headline": "Govt considers disbanding 37-year-old Digital Communications Commission (DCC)", "summary": "The government is considering disbanding the 37-year-old Digital Communications Commission (DCC), formerly the Telecom Commission. The move aims for agility due to work overlap between DoT members and advisers, and delays in policy decisions. Finance ministry has taken control of budget approvals. Member retirements with no succession plan suggest a shift in structure. Full disbandment may take months.", "category": "Politics", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "9f808c4c"}, {"headline": "Indian super rich eye private US frontier-tech, AI companies", "summary": "Indian family offices and ultra-high net worth individuals (UHNIs) are significantly increasing investments in private US frontier-tech and AI companies, seeking to replicate the success seen with SpaceX. Investors are targeting AI, defence tech, semiconductors, autonomous technology, and firms like Stripe, Whoop, Revolut, Shield AI, Epic Games, and Kraken, often through offshore pooled vehicles for diversified opportunities.", "category": "Business", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "e3aecdd5"}, {"headline": "Crypto exchange CoinEx used as hub for illicit Iranian cash", "summary": "Crypto exchange CoinEx has facilitated over $3.84 billion in transactions linked to Iran since 2019, enabling the country to evade US sanctions. Investigations found funds from the Central Bank of Iran and North Korean hackers flowed through CoinEx. The exchange has processed transactions for sanctioned individuals and entities connected to Iran's Revolutionary Guard. CoinEx denies facilitating direct illicit transactions and has recently taken steps to distance itself from the Iranian market.", "category": "Law", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "98f5ab5d"}, {"headline": "Drug regulator cracks down on smuggled, unapproved medicines", "summary": "India's drug regulator, DCGI, has launched a nationwide crackdown on smuggled and unapproved medicines, citing a rise in illegal entry from neighboring countries like Bangladesh. The directive targets logistics hubs, pharmacies, and digital supply chains. It follows concerns over 90 unapproved fixed-dose combination drugs and 16 irrational FDC drugs. The move aims to protect public health and secure the pharmaceutical supply chain.", "category": "Health", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "49e523af"}, {"headline": "Govt relaxes curbs on LPG sales to commercial users", "summary": "The government relaxed restrictions on LPG sales to commercial users, lifting curtailments imposed during the West Asia crisis. Bulk LPG supply, previously restricted to 50% of pre-crisis levels, is now fully restored. The move aims to bring relief to restaurants, hotels, and industries. Domestic LPG booking restrictions, including minimum refill intervals, remain in place. This follows a US-Iran peace deal prospect.", "category": "Economy", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "14450a10"}, {"headline": "Govt asks private banks to boost accident insurance enrolments", "summary": "The finance ministry has urged private sector banks to increase customer enrolment in the Pradhan Mantri Suraksha Bima Yojana (PMSBY), especially those lagging annual targets. The low-cost scheme provides ₹2 lakh accident cover for ₹20 annually. The push aims to widen social security amid rising road fatalities. HDFC Bank and IDBI Bank exceeded targets, while IndusInd Bank and Yes Bank underperformed.", "category": "Economy", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "632ae090"}, {"headline": "PSU banks asked to deepen rural reach, expand in unbanked villages", "summary": "The finance ministry has directed public sector banks (PSBs) to accelerate rural expansion and ensure access in villages with over 3,000 residents. The initiative aims to strengthen financial inclusion and protect PSBs' customer base from private and digital competitors. Banks were asked to open 576 branches in such villages in FY26, with 511 already operational. Rural branches are crucial for deposits, lending, and government schemes.", "category": "Economy", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "683f77c8"}, {"headline": "Sebi resolves over 5,500 investor complaints in May via SCORES", "summary": "The Securities and Exchange Board of India (Sebi) resolved over 5,500 investor complaints through its online grievance redressal platform SCORES in May. The regulator received 4,918 new complaints during the month.", "category": "Business", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "7a45184b"}, {"headline": "India initiates anti-dumping probe against three Chinese products", "summary": "India has launched an anti-dumping investigation against thermal paper, Biaxially Oriented Polyamide (BOPA) film, and certain antioxidants imported from China, following complaints from domestic manufacturers. Probes also involve Korea, Singapore, US, and Thailand for some products.", "category": "Economy", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "c3f5e9f3"}, {"headline": "Stainless steel MSMEs seek QCO reintroduction amid Chinese import surge", "summary": "Over 100 stainless steel sector MSMEs have urged the Centre to reintroduce the quality control order (QCO), citing a surge in Chinese imports. The steel ministry suspended the QCO in April to ease raw material sourcing for domestic manufacturers. MSMEs fear adverse impact on local industry.", "category": "Business", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "b19b69fc"}, {"headline": "India’s $55 bn green energy pipeline faces escalating climate damage", "summary": "The majority of India’s planned renewable energy infrastructure, valued at $55 billion, will be exposed to escalating climate hazards by 2030, according to Zurich Insurance Group AG. This puts 239 GW of proposed solar, wind, and hydropower capacity across 10 states at risk of damage.", "category": "Environment", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "2d90ca4f"}, {"headline": "India needs to build foundational AI models, says BharatGen director", "summary": "Ganesh Ramakrishnan, founding director of BharatGen, urges India to build its own foundational AI models or risk becoming a mere consumer. BharatGen, India’s only not-for-profit AI entity, received a ₹1,058.82 crore grant and is developing sovereign LLMs. It has released Param-2, a 17-billion-parameter model, and is scaling up. The AI Alliance has invited BharatGen to Project Tapestry.", "category": "Technology", "page": 5, "importance": 8, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "5fe46847"}, {"headline": "Edtech platform Toddle eyes $50-100 million funding round", "summary": "B2B edtech platform Toddle is seeking $50-100 million in funding through primary and secondary transactions. The Bengaluru-based company, which provides classroom management and assessment software to K-12 schools globally, has hired US investment bank Brown Gibbons Lang & Company. Its revenue rose 60% to ₹114.4 crore in FY25, and losses narrowed. Toddle was valued at $136 million in early 2023.", "category": "Business", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "c0939c27"}, {"headline": "Indian stock markets end week with modest gains, FPIs remain sellers", "summary": "Indian stock markets saw modest gains this week, extending a three-week winning streak, despite investor caution. The Sensex rose 0.4% to 77,100.5, and the Nifty 50 gained 0.2% to 24,056. Easing geopolitical tensions and lower crude prices improved sentiment. However, Foreign Portfolio Investors (FPIs) continued their selling spree, pulling out ₹53,022 crore in June, marking the fourth consecutive month of net outflows.", "category": "Economy", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "f52665d0"}, {"headline": "Amazon pledges $13 billion more for India AI and cloud infrastructure", "summary": "Amazon.com Inc. has added $13 billion to its planned India investments, accelerating its AI and cloud infrastructure buildout. This fresh outlay will expand Amazon Web Services' data centre capacity in Mumbai and Hyderabad. The company also plans to open over 20 new fulfilment centres and 100+ delivery stations across India this year, bringing its total India investments from 2010-2030 to over $88 billion.", "category": "Technology", "page": 5, "importance": 9, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "db9c1176"}, {"headline": "NSE stake sale may boost New India Assurance’s FY27 profit", "summary": "New India Assurance Co. (NIACL) stock surged after NSE filed IPO papers showing NIACL as a seller. NIACL's 35 million shares are valued at ₹7,000 crore based on NSE's unlisted price. Despite 40% profit growth in FY26, its underwriting loss remains high. Investors anticipate capital gains of ₹2,000 crore in FY27 from the sale, but profitability from volatile capital gains affects valuation multiples.", "category": "Business", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "f2efaddc"}, {"headline": "C-Suite Appointments", "summary": "A weekly list of C-Suite appointments: Abhishek Kapoor (CFO, Saregama India), Aditi Krishnan (India Lead, External Communications, L'Oreal), Aditya Kankaria (Sr Director, Integrated Operations, Coca Cola India), Arun Kakatkar (Global CPO, Cipla), Atul Sinha (President, Metro Brands), D. Lakshmi Narayanan (Head, Operations, CSB Bank), Deepti Hegde (Director, HR, Teva Pharmaceuticals), Gaurav Kochar (Chief of Business, NPCI BHIM Services), Girish Bhunje (Sr VP, Operations, Intas Pharmaceuticals), Hemen Bhatia (Head, Passives, Aditya Birla Sun Life Mutual Fund), Manish Kulkarni (MD, Manitou South Asia), Marshall Correia (GM—India & South Asia, SUSE), Maumita Sarkar (HR Head—Global Digital Hub, BASF), Minesh Jani (CEO, Gallagher Re), Mukesh Batra (CHRO, Technico Industries), Pulkit Goyal (CFO, Otis Elevators India), Rachita Marwaha (Head, HR, APAC, Advent), Rahul Dwivedi (Sales Director India, Benevolve), Rajib Bhattacharjee (President, Deepak Fertilisers), Sumit Jain (Group CFO, INA Solar), Yogita Shetty (Head, HR, UNI Klinger).", "category": "Business", "page": 6, "importance": 2, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "22894f0c"}, {"headline": "Tata AutoComp expands EV footprint, eyes premium automotive interiors", "summary": "Tata AutoComp is deepening its presence in EV components and premium automotive interiors through recent acquisitions, JVs, and engineering centre expansions. Working with Tata Motors and JLR, it aims to capitalize on EV demand. The company inked JVs with Jahwa Electronics (EV thermal management), Bosch (e-axles), and Katcon Global (lightweight components), and acquired IAC Slovakia (vehicle interiors). It expects to double its revenue to ₹26,000 crore by FY30.", "category": "Business", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "8d4a161f"}, {"headline": "India can still build AI winners despite US, China lead: Accel's Mitra", "summary": "Subrata Mitra, founding partner of Accel’s India arm, believes India can produce globally significant AI companies despite US and China's lead in LLMs. He states 'winning is company-specific' and depends on differentiating for specific problem statements. Accel, which invested in Anthropic, is deploying capital across AI, consumer, fintech, and manufacturing from its new $650 million India fund. Indian deeptech funding reached $1.23 billion this year.", "category": "Technology", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "c95decbb"}, {"headline": "JSW Ventures plans ₹500 crore third fund for startup investments", "summary": "Early-stage VC firm JSW Ventures is raising its third fund, targeting ₹400-500 crore to back a concentrated portfolio of 14-16 startups at Pre-series A to Series A+ stages. The fund will write larger cheques (₹10-20 crore initially) and add capital in follow-on rounds. Backed by the JSW Family Office, it will now source most corpus from external investors, focusing on consumer-tech, enterprise tech, health tech, deep tech, fintech, and sustainability.", "category": "Business", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "55bdc612"}, {"headline": "Bollywood films struggle for box office success in South India", "summary": "Bollywood films have seen uneven box office success in South India, with unimpressive numbers from Tamil Nadu and Kerala, even for big hits. Andhra Pradesh and Telangana show stronger acceptance for large-scale Hindi movies due to screen density and audience receptiveness. Experts suggest Hindi filmmakers need to focus on content with wider, pan-India appeal, localized marketing, and deeper alignment with regional exhibition partners.", "category": "Culture", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "29dccfbb"}, {"headline": "Adani plans ₹20,000 crore investment in Changi-inspired airport cities", "summary": "Adani Airport City Ltd. unveiled plans to develop integrated airport cities across its network, investing over ₹20,000 crore in the first phase. The project covers 655 acres across six airports in five states, with 70% concentrated in Mumbai and Navi Mumbai. These 'airport districts' will integrate hospitality, retail, entertainment, convention, and commercial infrastructure, inspired by global models like Singapore's Changi. Adani also signed a deal with IHG Hotels & Resorts.", "category": "Infrastructure", "page": 7, "importance": 8, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "dc833a2c"}, {"headline": "Alphabet’s Dow debut highlights index’s tech-driven evolution", "summary": "Alphabet Inc.'s addition to the Dow Jones Industrial Average marks another step in the benchmark’s effort to catch up with a tech-driven market. The search giant’s parent company will replace Verizon Communications Inc. on 29 June, becoming the sixth-largest member. This reflects the increasing influence of technology and AI, years after many considered it indispensable. The Dow, a price-weighted index, adapts after the market transformation.", "category": "Business", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "909e92b3"}, {"headline": "Netanyahu faces political blow after US-Iran deal", "summary": "The US-Iran deal may be a decisive blow to Israeli PM Benjamin Netanyahu's political brand, built on influencing Washington's Iran policy. Analysts say he's now forced to accept US policy, losing his 'American whisperer' status. The pact, aimed at ending the Iran war, has sidelined Israel from key decisions. Netanyahu is now isolated internationally, domestically constrained, and vulnerable ahead of autumn elections, with Trump prioritizing US interests.", "category": "Politics", "page": 8, "importance": 9, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "81e86392"}, {"headline": "Rubio ends Gulf tour amid allies' concerns over Iran deal", "summary": "US Secretary of State Marco Rubio assured Gulf allies that any deal with Iran would consider their interests, as he concluded a Middle East trip. Gulf states expressed serious concerns and sought information on the peace accord. Rubio emphasized seeking enduring peace without undermining regional security, and confirmed that fees for Strait of Hormuz passage would not be part of any deal. Allies fear the deal could lead to US normalization with Iran.", "category": "Politics", "page": 8, "importance": 8, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "c6b638f1"}, {"headline": "News in Numbers: FPI outflows, Brent forecast, RBI compensation, CBI searches, IT issues", "summary": "FPIs sold $67 billion in financial services in first-half June. Macquarie forecasts Brent at $80/barrel for Q3. RBI allows 85% compensation (capped ₹25,000) for fraudulent banking losses up to ₹50,000. CBI conducted coordinated searches in 20,000 locations for digital arrest scams. IT Department identified 20,000 cases of taxpayers altering deductions/exemptions in revised ITRs.", "category": "Economy", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "ef1ca03a"}, {"headline": "Air Suvidha portal relaunched for Ebola surveillance", "summary": "An upgraded Air Suvidha, India's air passenger health self-declaration portal, has been launched to enhance public health surveillance amid the Ebola outbreak in parts of Africa. Developed by the civil aviation ministry and DIAL in collaboration with the health ministry, Air Suvidha 2.0 requires international arriving passengers to submit a mandatory online health self-declaration 24 hours in advance, covering travel history, exposure, and symptoms.", "category": "Health", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "10bb0645"}, {"headline": "Railways to allow industry to design commodity-specific wagons", "summary": "Indian Railways will unveil a new wagon design policy within 15 days, empowering industries to design specialized freight wagons tailored to their commodity needs. This aims to increase rail's share in freight transport to 45% by 2030, up from 26-27%. The move follows industry consultations and successful specialized wagons for cement and salt. Safety approvals will remain with RDSO and CCRS.", "category": "Infrastructure", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "987c01f8"}, {"headline": "BRICS energy ministers reaffirm commitment to energy security", "summary": "BRICS energy ministers reaffirmed that energy security is central to their cooperation, emphasizing the need for diversified, resilient, and transparent energy systems and supply chains. Meeting in Gurugram, they adopted the 11th BRICS energy ministers’ joint communiqué and launched a digital centre of excellence for smart grids and energy storage to facilitate knowledge sharing and capacity building.", "category": "Economy", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "8cf02623"}, {"headline": "CV demand will overcome war hit in long term: Tata Motors CEO", "summary": "Tata Motors MD and CEO Girish Wagh stated that the West Asia war's implications, like diesel price hikes, will have a short-term impact on domestic commercial vehicle (CV) demand, with single-digit growth expected this fiscal. However, he believes India's macroeconomic growth story will lead to increased road freight and CV demand in the long term, dismissing rising fuel and commodity costs as 'cyclical headwinds'.", "category": "Business", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "68aad8a6"}, {"headline": "Iraq warns of quitting Opec if denied higher oil production quota", "summary": "Iraq warned it might consider leaving Opec if its demand for a higher oil production quota is not met, just months after the UAE quit for similar reasons. Oil ministry spokesman Salim Al-Rikabi stated that while withdrawal is not currently intended, a decision would be made if aspirations aren't granted. Such a departure would further fragment Opec, potentially leading to a price war.", "category": "World", "page": 9, "importance": 8, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "15814239"}, {"headline": "JSW Infra’s QIP attracts sevenfold demand, bids exceed ₹50,350 crore", "summary": "JSW Infrastructure’s qualified institutional placement (QIP) received bids totaling over ₹50,350 crore, nearly seven times the indicative issue size of ₹7,503 crore. The QIP, launched on 22 June, saw strong participation from domestic and global institutional investors, highlighting appetite for India’s ports and logistics sector. The company plans to raise up to ₹7,502.7 crore through fresh equity and an offer for sale.", "category": "Business", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "2db42aef"}, {"headline": "Electric mobility platform BLive to invest ₹100 crore in mini-trucks", "summary": "Electric mobility platform BLive announced an investment of over ₹100 crore to deploy 1,000 electric mini-trucks over the next two years. The 'BLive PRIME' 4-wheeler franchise model aims to drive large-scale electric fleet adoption for green delivery. Expansion will begin in Bengaluru and extend to key urban markets including Delhi, Chennai, and Hyderabad.", "category": "Technology", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "d6a0fec5"}, {"headline": "India to resume tourist visas for Bangladesh on 28 June", "summary": "India will resume issuing tourist visas for Bangladesh on 28 June, its envoy to Dhaka, Dinesh Trivedi, announced. This decision aims to strengthen people-to-people ties, nearly two years after relations were strained following the overthrow of New Delhi’s ally, Sheikh Hasina. Hasina has been in hiding in India since the August 2024 uprising.", "category": "Politics", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "cb80aa3d"}, {"headline": "India's rare earth magnet race fails to attract global giants", "summary": "India's ₹7,280-crore PLI scheme for rare earth permanent magnets struggles to attract major bids despite India holding large rare earth deposits. China's dominance and export curbs highlighted India's vulnerability. While the smartphone PLI succeeded, the magnet scheme lacks similar tailwinds. High global equipment prices, stringent net-worth thresholds, and lack of guaranteed buyers deter serious players. Key technical players like Shiva Kumar face capital constraints.", "category": "Business", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "095d71b3"}, {"headline": "RBI's new framework protects customers from bank mis-selling", "summary": "RBI's new framework aims to protect customers from mis-selling by banks, covering insurance, loans, and investment products via branches and digital platforms. It bans sales-linked incentives, forced bundling, and deceptive digital prompts. Banks must ensure need-based selling, obtain explicit consent, and assess product suitability. If mis-selling occurs, banks must refund the amount and compensate losses. Compliance deadline is 1 January 2027.", "category": "Law", "page": 11, "importance": 8, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "5db8cb4c"}, {"headline": "The opportunity cost of waiting for perfect trade", "summary": "The column argues that waiting for the 'perfect moment' to invest can lead to significant opportunity costs, much like waiting for a perfect job. It highlights that missing even a few best trading days can drastically reduce long-term returns, citing a PGIM India analysis showing ₹10,000 growing to ₹3.25 lakh in 24 years, but only ₹11,550 if 50 best days were missed. Timing the market is difficult, and staying present for opportunities is key.", "category": "Economy", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "22f35e6e"}, {"headline": "Deductibles not a barrier to portability, says HDFC Ergo CEO", "summary": "Parthanil Ghosh, HDFC Ergo CEO, defends deductibles in health insurance portability, stating they are not a barrier but an effective tool for long-term affordability, especially with rising medical inflation. He emphasizes balancing underwriting discipline with inclusive growth, covering riskier segments and impaired lives. HDFC Ergo aims to contribute to 'Insurance for All by 2047' by addressing awareness, trust, and affordability barriers.", "category": "Health", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "3d45835b"}, {"headline": "Careful planning needed for India’s inflation challenges", "summary": "India faces rising inflation challenges, with CPI food inflation at 4.9% (rural 4.3%) and WPI at 9.7% in May. Forecasts indicate worsening El Niño, leading to deficient monsoon rainfall (43% below average as of 23 June), which will drive food inflation and increase input costs. The government must ensure adequate supply of essential food items, support rural incomes, and strengthen employment guarantee programs, as monetary policies are ineffective against food price-driven inflation.", "category": "Economy", "page": 12, "importance": 8, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "e973f65a"}, {"headline": "Simplify investment for non-investors, drive economic inclusion", "summary": "The column advocates for a public service ad campaign to simplify investment concepts for non-investors in India, promoting economic inclusion beyond basic banking. It suggests starting with concept selling of risk-return options, similar to Amfi’s 'Sahi hai' mutual fund campaign. The goal is to acquaint people with basic investment principles, including risk nuances, to enable upward mobility and align with pro-investor measures from regulators.", "category": "Education", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "6834fe49"}, {"headline": "Low-hanging fruit could give India outsized trade gains", "summary": "India must grow dollar inflows through exports amid new globalization waves. Reducing trade costs, particularly for SMEs, is key. Greater adoption of cross-border paperless trade (UNESCAP CPTA) can cut costs by 25%, boosting export competitiveness. India's IT sector can export trade-tech services, building common platforms across Asia-Pacific. Legal and technical infrastructure like BharatTradeNet stack and Digital Trade Facilitation Bill are already in progress.", "category": "Economy", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "906f838d"}, {"headline": "Did forex reserves position warrant RBI’s crisis playbook?", "summary": "The column questions RBI's recent interventions to attract dollars, given India's robust forex reserves ($682 billion, 11 months import cover) and strong Guido-Greenspan ratio (2.9). While reserves declined due to the Iran war and capital outflows, the net liquidity buffer of $337 billion remained adequate. RBI's risk-shielded FCNR(B) deposit scheme for NRIs offers high returns (12-19% with leverage) but its cost is debated, especially with reserves already comfortable.", "category": "Economy", "page": 13, "importance": 8, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "12e4a866"}, {"headline": "Meta’s ‘super-app’: will Kunal Shah finally make it happen?", "summary": "Meta's $900 million investment in Cred and hiring its founder Kunal Shah to lead WhatsApp globally signal a renewed push for a 'super-app' in India. Despite WhatsApp's 500 million+ users, it lags in payments (under 1% UPI share). Shah, known for building Cred around exclusivity for high credit-score users, faces the challenge of shifting from a niche business to empowering hundreds of millions in the middle of the pyramid, requiring a focus on fair, engaging commercial portals.", "category": "Technology", "page": 13, "importance": 8, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "134984d0"}, {"headline": "India Inc should make queer inclusion an imperative", "summary": "The column advocates for LGBTQIA+ inclusion in Indian workplaces, noting that while workplaces have been engines of inclusion, queer individuals still face hostility. Openly gay executives are rare, and many fear social and economic costs of coming out. A 2014 World Bank report highlighted economic costs of homophobia. The private sector, as a systemic actor, must prioritize inclusion at the intersection of ethics and enterprise value, with robust accountability and training for leaders.", "category": "Business", "page": 13, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "4df89f03"}, {"headline": "Five reasons to go glamping in Utah, USA", "summary": "A road trip through Utah, USA, offers hallucinatory landscapes and unforgettable experiences. Key highlights include sleeping under the Milky Way in Valley of the Gods, skydiving over Moab (a mix of dread and delight), dune bashing and sandboarding at Coral Pink Sand Dunes State Park, getting lost among the hoodoos of Goblin Valley State Park, and hiking to the majestic Fisher Towers at sunset. The natural beauty and solitude offer profound engagement.", "category": "Culture", "page": 14, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "afb722d4"}, {"headline": "Bengaluru: The Burger Fest at Monkey Bar till 25 July", "summary": "Monkey Bar in Bengaluru is hosting 'The Burger Fest' until 25 July, offering a variety of burgers including Peri Peri Fried Chicken, Truffle Shroom Melt, and Bombay Chilli Cheese Aloo Burger. The festival runs from Noon to 1am daily.", "category": "Culture", "page": 14, "importance": 3, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "071903fa"}, {"headline": "Bengaluru: 'All About Our Famila' documentary screening on 27 June", "summary": "A screening of 'All About Our Famila,' a 2012 documentary by Chalam Bennurakar, will be held on 27 June at MAP Bengaluru. The film offers an intimate look into the lives, vulnerabilities, and resilience of transgender individuals in Bengaluru. The event runs from 5:30 PM to 7:30 PM.", "category": "Culture", "page": 14, "importance": 3, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "61a5b721"}, {"headline": "Mumbai: 'Eden Creek, Bengal' play on 28 June at NMACC", "summary": "'Eden Creek, Bengal,' an English play adapted and directed by Kaizaad Kotwal and Mahabanoo Mody-Kotwal, will be staged on 28 June at The Studio Theatre, NMACC. Set in 1940s Bengal during the Great Bengal Famine, the production explores resilience, sacrifice, and motherhood through the lives of five women, against the backdrop of India’s freedom struggle. Show from 7-8:30 PM.", "category": "Culture", "page": 14, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "f91efa15"}, {"headline": "Congolese chefs put gourmet spin on traditional recipes", "summary": "A new generation of chefs in the Democratic Republic of Congo is reimagining traditional recipes, like yam gratin and caterpillar sauce, to highlight the country's culinary heritage. Chefs like Noushka Teixeira, founder of 'Zaire' restaurant, and Archi Dimosi, a catering business owner, use local ingredients and blend Congolese flavors with European techniques. They aim to combat negative perceptions of DRC and address challenges like supply shortages and lack of culinary schools.", "category": "Culture", "page": 14, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128428", "sources": [{"newspaper": "Mint", "pdf_filename": "BENGALURU_Mint_26-06-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/128428"}], "article_id": "df792448"}, {"headline": "Twin quakes ravage Venezuela, 188 killed", "summary": "Two powerful earthquakes, measuring 7.2 and 7.5 magnitude, struck the northern coast of Venezuela, causing widespread destruction. Officials confirmed at least 188 deaths, with over 200 people still missing. The quakes damaged infrastructure and housing across the La Guaira and Caracas regions, prompting an international humanitarian response.", "category": "World", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/128437", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁶⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/128437"}], "article_id": "53245acb"}, {"headline": "NCERT Class 9 textbook adds new section on the Emergency", "summary": "A new NCERT Class 9 Social Science textbook now includes a dedicated section on the 1975-77 Emergency. The text replaces previous mentions with a focus on institutional independence and constitutional powers. This change has sparked a political debate between the BJP and Congress over the portrayal of internal disturbances and democratic history.", "category": "Education", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128437", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁶⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/128437"}], "article_id": "88bbaa84"}, {"headline": "Army keeps Cheetal helicopters flying amid Leh crash probe", "summary": "The Indian Army continues to operate its fleet of Cheetal helicopters while an investigation proceeds into a recent crash in the Siachen glacier region. Preliminary findings suggest a technical failure in the transmission system of the single-engine aircraft. The Cheetals remain vital for high-altitude operations and logistics in the Ladakh sector.", "category": "India", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128437", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁶⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/128437"}], "article_id": "ab9a7daf"}, {"headline": "Kolkata building collapse toll rises to 11 as CM blames TMC", "summary": "The death toll from the collapse of a warehouse in Kolkata has risen to 11. Chief Minister Mamata Banerjee stated that the building's plan was sanctioned during the previous TMC-led municipal board but lacked proper oversight. Local authorities have arrested five individuals, including the building's owner and project supervisors, for culpable homicide.", "category": "India", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128437", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁶⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/128437"}], "article_id": "2f0f01c5"}, {"headline": "India resumes tourist visa services for Bangladesh nationals", "summary": "India has officially resumed its visa operations in Bangladesh after a two-year hiatus caused by
