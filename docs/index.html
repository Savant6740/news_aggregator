 civil unrest. High Commissioner Dinesh Trivedi announced that tourist visas will now be accepted at multiple application centers. The move is expected to restore person-to-person ties and boost tourism, as Bangladesh is a primary source of visitors to India.", "category": "India", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128437", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁶⁰⁶²⁰²⁶.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/128437"}], "article_id": "110904e0"}, {"headline": "Centre clarifies passport is never a citizenship document", "summary": "Union government officials clarified that a passport is a travel document and not conclusive proof of Indian citizenship. The statement came amid political debate regarding the verification of citizenship status. Officials emphasized that no rule changes have been made in the last 12 years regarding the legal standing of passports in relation to citizenship.", "category": "India", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128437", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁶⁰⁶²⁰²⁶.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/128437"}], "article_id": "405150fc"}, {"headline": "CM inaugurates 33 spillway gates of Tungabhadra Dam", "summary": "Karnataka Chief Minister Siddaramaiah inaugurated 33 newly replaced spillway gates at the Tungabhadra Dam in Koppal. The project, aimed at ensuring the dam's structural integrity after an old gate failed last year, was completed through a consensus between Karnataka, Andhra Pradesh, and Telangana. The project secures irrigation for farmers across all three states.", "category": "Infrastructure", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128437", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁶⁰⁶²⁰²⁶.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/128437"}], "article_id": "10f55359"}, {"headline": "BJP seeks CBI probe into Karnataka's Gruha Lakshmi scheme", "summary": "The BJP in Karnataka has demanded a CBI investigation into the state government's flagship Gruha Lakshmi cash transfer scheme. The demand follows a CAG report that allegedly identified irregularities, including payments to deceased beneficiaries and duplicate bank accounts. The opposition claims a large-scale cybercrime has led to the misappropriation of public funds.", "category": "Politics", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128437", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁶⁰⁶²⁰²⁶.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/128437"}], "article_id": "edb281da"}, {"headline": "Karnataka reports 42% rain deficit amid water crisis", "summary": "Karnataka is facing a severe water crisis with an overall 42% rainfall deficit this season. Over 826 villages are experiencing critical drinking water shortages as groundwater levels have declined significantly. The state government has allocated ₹117 crore for relief measures, including drilling new borewells and supplying water via tankers.", "category": "Environment", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128437", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁶⁰⁶²⁰²⁶.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/128437"}], "article_id": "169ccd01"}, {"headline": "CM Vijay flags off 300 new public transport buses", "summary": "Tamil Nadu Chief Minister MK Stalin flagged off 300 new buses as part of an effort to modernize the state's public transport fleet. The buses, costing approximately ₹127 crore, will be deployed across Chennai and various districts. The initiative aims to reduce travel time and improve passenger comfort, with 64% of the new fleet being low-floor accessible buses.", "category": "Infrastructure", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128437", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁶⁰⁶²⁰²⁶.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/128437"}], "article_id": "8119be78"}, {"headline": "Tamil Nadu white paper reveals ₹2.47-L cr power debt", "summary": "A white paper released by the Tamil Nadu government highlights a massive debt of ₹2,47,130 crore in the state's power sector as of March 2026. Energy Minister V Senthil Balaji stated that high interest rates and operational inefficiencies in TANGEDCO are the primary causes. The government plans to upgrade infrastructure and improve fiscal management without increasing tariffs.", "category": "Economy", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128437", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁶⁰⁶²⁰²⁶.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/128437"}], "article_id": "67bbf445"}, {"headline": "Tamil Nadu ammonia gas leak death toll rises to 11", "summary": "The death toll following an ammonia gas leak at a private food processing plant in Tiruvallur has reached 11. State health officials confirmed that several others remain under medical treatment. Preliminary investigations suggest the leak occurred due to a failure in the emergency alarm system and poor maintenance of the ammonia storage unit.", "category": "Health", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128437", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁶⁰⁶²⁰²⁶.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/128437"}], "article_id": "ee12b471"}, {"headline": "PM to visit Seychelles, will hand over patrol vessel", "summary": "Prime Minister Narendra Modi is scheduled to visit Seychelles from June 27-29 to participate in the nation's golden jubilee celebrations. During the visit, India will formally hand over a new patrol vessel to the Seychelles Coast Guard to boost entral Bureau of Investigation conducted a massive operation across 80 locations in 16 states and Union Territories to dismantle a global cybercrime network. The raids targeted individuals involved in international tech support scams and fraudulent financial transactions. Authorities seized digital devices and documents, and two key suspects were arrested in the crackdown.", "category": "India", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128437", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁶⁰⁶²⁰²⁶.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/128437"}], "article_id": "be9b2dc7"}, {"headline": "Ship struck in Hormuz as oil supertankers turn back", "summary": "Tensions in the Strait of Hormuz spiked after an unidentified vessel was hit by a projectile, leading multiple oil supertankers to divert from the key waterway. The incident caused a temporary surge in global oil prices. US and UK maritime agencies are monitoring the situation, as several shipping firms have suspended transits through the chokepoint due to security risks.", "category": "World", "page": 11, "importance": 9, "telegram_url": "https://t.me/c/1877410077/128437", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ²⁶⁰⁶²⁰²⁶.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/128437"}], "article_id": "4f0c6fc1"}, {"headline": "US top court backs Trump's restrictive immigration policy", "summary": "The US Supreme Court has upheld a restrictive immigration policy introduced during the Trump administration that limits the ability of certain asylum seekers to stay in the country. In a 6-3 ruling, the court allowed the federal government to resume mass deportations of specific groups. The decision is seen as a significant win for conservative legal challenges to immigration reform.", "category": "World", "page": 11, "importance": 8, "telegram_url": "https://t.me/c/1877410077/128437", "sources": [{"newspa unced a new team for Uttar Pradesh, including regional presidents and general secretaries. This move by state president Bhupendra Singh Chaudhary aims to strengthen the party ahead of the 2024 Lok Sabha elections and prepare for the 2027 state assembly polls.", "category": "Politics", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/128434", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_26-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/128434"}], "article_id": "858d4596"}, {"headline": "Colonel, Major Among Army Men Named In FIR For Barging Into PS, Assaulting J&K Cops", "summary": "A colonel, major, and other army personnel have been named in an FIR for allegedly barging into a police station in Jammu & Kashmir's Kupwara district and assaulting officers. The incident stemmed from the police registering a kidnapping case against a Territorial Army jawan, leading to a confrontation over his custody.", "category": "India", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128434", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_26-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/128434"}], "article_id": "942a5e50"}, {"headline": "BJP Councillor Suffers Injury In Stray Cattle Attack In East Delhi", "summary": "BJP councillor Parvesh Sharma was injured in an attack by stray cattle in East Delhi, highlighting the growing menace in the capital. He was inspecting flood-affected areas when the incident occurred, raising concerns about animal control.", "category": "India", "page": 2, "importance": 3, "telegram_url": "https://t.me/c/1877410077/128434", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_26-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/128434"}], "article_id": "a2e6cf2c"}, {"headline": "Digital Arrest Case: Over 80 Locations Searched; 2 Held", "summary": "The CBI conducted searches s the need for both legal precision and public clarity on citizenship laws. It argues that the government should ensure citizens understand their rights and obligations under various laws like the Passport Act and Citizenship Act, avoiding confusion and ensuring due process.", "category": "Law", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128434", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_26-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/128434"}], "article_id": "c523c303"}, {"headline": "Why India Should Chill With Chile", "summary": "India should strengthen its strategic partnership with Chile, focusing on economic cooperation, technology transfer, and joint initiatives, particularly in renewable energy, mining, and space. Chile offers access to Latin American markets and is a stable democratic partner.", "category": "World", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128434", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_26-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/128434"}], "article_id": "e54ae790"}, {"headline": "Aim For Trusted Interdependence", "summary": "India should pursue \"trusted interdependence\" in its foreign policy, focusing on reliable partnerships in critical sectors like defense, energy, and technology. This approach prioritizes resilience against global shocks and aligns with initiatives like the Indo-Pacific Economic Framework and QUAD.", "category": "Politics", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128434", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_26-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/128434"}], "article_id": "cb4b0aab"}, {"headline": "Good For Goose, Good For Gander?", "summary": "This piece questions why global efforts to impose carbon taxes often exempt developed nations while targeting developing ones. It argues for equitable climate policies, including mechanisms that benefit developing countries through technology transfer and fair burden-sharing.", "category": "Environment", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128434", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_26-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/128434"}], "article_id": "95cdf061"}, {"headline": "On The Editorial Page - Only Chronology Mat Samajhiye", "summary": "This article criticizes the government's approach to investigations and justice, suggesting a selective application of \"chronology\" in legal processes. It argues that the public is often left confused by inconsistent timelines and actions, highlighting a lack of transparency and accountability in governance.", "category": "Politics", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128434", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_26-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/128434"}], "article_id": "28e6fc62"}, {"headline": "ET GADGETECH - Going To The Cinema During The Monsoon?", "summary": "This article explores how technology and streaming services are impacting cinema attendance, especially during the monsoon season. It discusses how OTT platforms offer convenience and a wide range of content, challenging traditional movie-going experiences and the future of film consumption.", "category": "Technology", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128434", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_26-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/128434"}], "article_id": "cea78183"}, {"headline": "Just In Jest Breaking News: No Breaking News!", "summary": "This satirical piece humorously reflects on the current state of news media, where sensationalism often overshado /c/1877410077/128434", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_26-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/128434"}], "article_id": "7f569abd"}, {"headline": "RBI Issues Final Rules On Credit Derivatives", "summary": "The RBI issued final guidelines for credit derivative products, aiming to develop a robust market while managing risks. The regulations cover eligible participants, product types, and reporting requirements, aligning with international best practices.", "category": "Economy", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128434", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_26-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/128434"}], "article_id": "07f08772"}, {"headline": "Indices Gain For A 3rd Week As Oil Recedes; Dips Are Likely To Attract Buying Interest", "summary": "Indian equity indices rose for a third consecutive week, driven by receding oil prices and expectations of sustained foreign investor interest. Market analysts suggest that any dips will likely be met with buying, indicating underlying bullish sentiment.", "category": "Economy", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128434", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_26-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/128434"}], "article_id": "e9359d68"}, {"headline": "Monsoon A Key Variable But Even A 15% Deficit May Not Trigger A Big Correction", "summary": "Despite concerns about monsoon deficits, market experts believe a 15% shortfall may not trigger a significant market correction. They argue that other factors like corporate earnings and global cues will cushion the impact, though volatility may increase.", "category": "Economy", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128434", "sources": [{"newspaper": "Economic Times", "pdf_filena       <div class="card-divider"></div>
      <div class="card-footer">
        ${src?`<a class="src-chip" href="${href}" target="_blank" onclick="event.stopPropagation()">${src.newspaper}<span class="src-chip-sep">&middot;</span><span class="src-chip-pg">Pg ${src.page}</span><span class="src-chip-ext"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M3.5 7.5L7.5 3.5M7.5 3.5H5M7.5 3.5V6" stroke="#555" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></span></a>`:'<div></div>'}
        <div class="info-btn"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6.5" stroke="#444" stroke-width="1.3"/><circle cx="7.5" cy="4.5" r="0.8" fill="#555"/><path d="M7.5 7v4" stroke="#555" stroke-width="1.5" stroke-linecap="round"/></svg></div>
      </div>
    </div>`;
  return card;
}

function buildPRow(ci) {
  const p=panels[ci],ai=p.artIdx;
  p.pRow.innerHTML='';
  p.articles.forEach((_,i)=>{
    const seg=document.createElement('div');
    seg.className='pseg'+(i<ai?' done':i===ai?' active':'');
    p.pRow.appendChild(seg);
  });
}

function syncV(ci,animated) {
  const p=panels[ci],h=p.vFeed.getBoundingClientRect().height;
 p.vTrack.style.transition=animated?'transform 0.35s cubic-bezier(0.4,0,0.2,1)':'none';
  p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;
  buildPRow(ci);
}

function applyDeepLink(target) {
  const ci = sortedCats.findIndex(cat =>
    byCategory[cat].some(art => art.article_id === target.hash)
  );
  if (ci === -1) return;

  // Set catIdx BEFORE calling goCat so the horizontal track lands correctly
  catIdx = ci;
  hTrack.style.transition = 'none';
  hTrack.style.transform = `translateX(${-ci * vpW}px)`;

  const ai = byCategory[sortedCats[ci]].findIndex(art => art.article_id === target.hash);
  if (ai === -1) return;
  panels[ci].artIdx = ai;
  syncV(ci, false);

  const card = document.getElementById('article-' + target.hash);
  if (card) {
    card.classList.add('target-highlight');
    setTimeout(() => card.classList.remove('target-highlight'), 3000);
  }
}

function goArt(d) {
  const p=panels[catIdx];
  const n=Math.max(0,Math.min(p.artIdx+d,p.articles.length-1));
  if(n===p.artIdx&&d!==0)return;
  p.artIdx=n; syncV(catIdx,true); dismiss();
}

function goCat(idx,animated=true) {
  idx=Math.max(0,Math.min(idx,sortedCats.length-1));
  if(idx===catIdx&&animated)return;
  const prev=catIdx; catIdx=idx;
  hTrack.style.transition=animated?'transform 0.38s cubic-bezier(0.4,0,0.2,1)':'none';
  hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;
  if(animated&&idx!==prev) {
    const m=CAT_META[sortedCats[idx]]||{color:"#e8334a",icon:"📰"};
    catFlash.style.background=m.color+'18';
    cfIcon.textContent=m.icon; cfName.textContent=sortedCats[idx]; cfName.style.color=m.color;
    catFlash.classList.add('on'); setTimeout(()=>catFlash.classList.remove('on'),500);
  }
  dismiss();
}

let dismissed=false;
function dismiss() {
  if(dismissed)return; dismissed=true;
  hintUp.classList.remove('visible'); hintRight.classList.remove('visible');
  hintUp.classList.add('gone'); hintRight.classList.add('gone');
}

(function initHints() {
  const KEY='dailyBriefHintSeen';
  if(!localStorage.getItem(KEY)) {
    localStorage.setItem(KEY,'1');
    setTimeout(()=>{ if(!dismissed){ hintUp.classList.add('visible'); hintRight.classList.add('visible'); } },2500);
  }
})();

let tsX=0,tsY=0,tcX=0,tcY=0,axis=null,drag=false;
outer.addEventListener('touchstart',e=>{ tsX=e.touches[0].clientX; tsY=e.touches[0].clientY; tcX=0; tcY=0; axis=null; drag=true; hTrack.style.transition='none'; const p=panels[catIdx]; if(p)p.vTrack.style.transition='none'; },{passive:true});
outer.addEventListener('touchmove',e=>{ if(!drag)return; const dx=e.touches[0].clientX-tsX,dy=e.touches[0].clientY-tsY; tcX=dx; tcY=dy; if(!axis&&(Math.abs(dx)>8||Math.abs(dy)>8))axis=Math.abs(dx)>Math.abs(dy)?'h':'v'; if(!axis)return; e.preventDefault(); if(axis==='h'){ const edge=(catIdx===0&&dx>0)||(catIdx===sortedCats.length-1&&dx<0); hTrack.style.transform=`translateX(${-catIdx*vpW+dx*(edge ? 0.14 : 1)}px)`; }else{ const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height; const edge=(p.artIdx===0&&dy>0)||(p.artIdx===p.articles.length-1&&dy<0); p.vTrack.style.transform=`translateY(${-p.artIdx*h+dy*(edge ? 0.14 : 1)}px)`; } },{passive:false});
outer.addEventListener('touchend',()=>{ if(!drag)return; drag=false; if(axis==='h'){ const t=vpW*.2; if(tcX<-t)goCat(catIdx+1); else if(tcX>t)goCat(catIdx-1); else{hTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;} }else if(axis==='v'){ const t=vpH*.2; if(tcY<-t)goArt(1); else if(tcY>t)goArt(-1); else{const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height;p.vTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;} } axis=null; },{passive:true});
document.addEventListener('keydown',e=>{ if(e.key==='ArrowDown'||e.key===' '){e.preventDefault();goArt(1);} if(e.key==='ArrowUp'){e.preventDefault();goArt(-1);} if(e.key==='ArrowRight'){e.preventDefault();goCat(catIdx+1);} if(e.key==='ArrowLeft'){e.preventDefault();goCat(catIdx-1);} });
let wl=false;
outer.addEventListener('wheel',e=>{ e.preventDefault();if(wl)return;wl=true; Math.abs(e.deltaX)>Math.abs(e.deltaY)?goCat(catIdx+(e.deltaX>0?1:-1)):goArt(e.deltaY>0?1:-1); setTimeout(()=>wl=false,500); },{passive:false});
window.addEventListener('resize',()=>{ vpW=outer.offsetWidth;vpH=outer.offsetHeight; hTrack.style.transition='none'; hTrack.style.transform=`translateX(${-catIdx*vpW}px)`; panels.forEach(p=>{ const h=p.vFeed.getBoundingClientRect().height; p.vTrack.querySelectorAll('.card').forEach(c=>c.style.height=h+'px'); p.vTrack.style.transition='none'; p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`; }); });

buildAll();
</script>
</body>
</html>
