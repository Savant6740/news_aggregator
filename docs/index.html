", "summary": "The Andhra Pradesh LPG Distributors Association appealed to domestic consumers to stop selling their subsidized cylinders to hotels at inflated prices. The body stated that restricting gas to household use would help the state survive the current supply shortage for a month. Authorities recently seized 170 domestic cylinders from commercial establishments following raids.", "category": "Economy", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Subsidised canteens and mid-day meals disrupted by LPG shortage", "summary": "Commercial LPG shortages are disrupting mid-day meals and subsidized canteens across India. In Karnataka, Indira Canteens face closure, while West Bengal's Maa Canteens have seen kitchen shutdowns. Some schools have switched to wood-fired ovens or simplified menus. The crisis, linked to the West Asia conflict, is affecting the delivery of hot meals to millions of students.", "category": "Economy", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Government confirms surplus food grain stocks despite ongoing conflict", "summary": "Indian government officials stated the country has surplus grain stocks and the West Asian conflict hasn't impacted essential food items like pulses or edible oils. Retail rates for seasonal vegetables like tomatoes fell by 10% in February. The consumer affairs department is monitoring prices and availability to prevent disruptions to domestic food security.", "category": "Economy", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "US launches Section 301 tariff investigations against India and 15 nations", "summary": "The United States Trade Representative initiated probes against 16 partners, including India, China, and the EU. The investigations target 'structural excess capacity' in sectors like steel, semiconductors, and electronics. The US claims overproduction in these nations burdens American trade. If confirmed, the findings could lead to retaliatory tariffs or trade restrictions.", "category": "Economy", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/116815", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 13-03-2026 .pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116815"}]}, {"headline": "House panel urges inclusion of startups in automobile PLI schemes", "summary": "A parliamentary committee has recommended that the Ministry of Heavy Industries relax eligibility conditions for the automobile Production-Linked Incentive scheme. The panel noted that high thresholds currently exclude domestic startups. It also called for extending consumer subsidies to electric four-wheelers under the PM E-Drive scheme to accelerate the adoption of green mobility.", "category": "Economy", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116815", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 13-03-2026 .pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/116815"}]}, {"headline": "Extended stay for Indians returning from West Asia triggers tax concerns", "summary": "Tax experts warn that Indian professionals fleeing West Asia due to conflict may see their tax residency status change if their stay in India exceeds 182 days. This could expose their global income to Indian taxation and require mandatory foreign asset disclosures. Concerns also exist for foreign companies whose employees working remotely from India might create a taxable presence.", "category": "Economy", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116815", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 13-03-2026 .pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/116815"}]}, {"headline": "Remittances from West Asia surge 30% in March amid regional anxiety", "summary": "Inward remittances from the Indian diaspora in West Asia have risen by 20-30% in March as families send money home amid growing security concerns. The trend is bolstered by the rupee's depreciation past 92 against the dollar. However, industry insiders warn that a prolonged conflict could eventually lead to job losses in the hospitality and construction sectors, impacting future flows.", "category": "Economy", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116815", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 13-03-2026 .pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/116815"}]}, {"headline": "Nabard and REC withdraw bond issues totaling ₹11,000 crore", "summary": "State-owned entities Nabard and REC cancelled planned bond issuances after receiving limited bids at yields higher than acceptable levels. Market activity remains selective, with issuers struggling to raise funds at favorable rates in the short-term segment due to global uncertainties. Nabard is expected to re-tap the market soon with shorter-term papers to meet liquidity needs.", "category": "Economy", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116815", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 13-03-2026 .pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/116815"}]}, {"headline": "LPG crisis: Panic bookings and server crashes trigger chaos", "summary": "A domestic LPG shortage has led to panic bookings and server crashes across digital platforms in India. Despite government directives to prioritize domestic supply, consumers faced delays and technical glitches in IVRS and online booking systems. Dealers reported that commercial supply has halted completely while domestic stocks remain low.", "category": "Economy", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116795", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "Bengaluru wedding menus slim down due to gas pinch", "summary": "Caterers in Bengaluru are reducing the number of dishes at weddings from 20 to 15 to cope with the LPG shortage. The lack of commercial gas cylinders has forced many to use firewood for large-scale cooking. Hostels and PGs are also altering menus, removing gas-intensive items like dosa and puri in favor of simpler alternatives.", "category": "Economy", "page": 3, "importance": 4, "telegram_url": "https://t.me/c/1877410077/116795", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "Centre tells states to lift foodgrains till June in advance", "summary": "The Union government has directed states to lift foodgrain stocks for three months in advance to ensure sufficient availability during the upcoming harvest season. The move aims to clear space in central warehouses for new wheat procurement. States are encouraged to distribute these grains promptly to beneficiaries under the National Food Security Act.", "category": "Economy", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116795", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "Pentagon spent over $11 billion in first six days of war", "summary": "The US Pentagon informed Congress that military operations in the first six days of the conflict cost over $11.3 billion. The spending includes high costs for munitions, deployment of aircraft carriers, and intelligence support. Some lawmakers have raised concerns about the long-term financial impact and the need for a transparent funding plan.", "category": "Economy", "page": 14, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116795", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "Global oil prices surge by 50% since start of conflict", "summary": "Benchmark oil prices have risen nearly 50% since February 28, reaching over $110 a barrel. The surge is driven by fears of a total blockade of the Strait of Hormuz and potential damage to production facilities. Analysts warn that sustained high prices could trigger a global economic slowdown and significantly impact inflation rates worldwide.", "category": "Economy", "page": 14, "importance": 9, "telegram_url": "https://t.me/c/1877410077/116795", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "Government Relaxes Press Note 3 Rules for Land Border FDI", "summary": "The Indian government has relaxed FDI norms for countries sharing land borders, primarily targeting Chinese investment. Investors with less than 10% beneficial ownership can now invest via the automatic route, provided they hold no board seats. Approval for specific sectors like electronics and capital goods will be processed within 60 days to improve supply chains.", "category": "Economy", "page": 3, "importance": 9, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "Vietnam Surges Ahead of India in Emerging Markets Tracker", "summary": "Vietnam has topped Mint's Emerging Markets Tracker in three of the past four months, fueled by rapid economic growth and strong exports. While India maintains a narrow lead over 12 months, recent weakness in the rupee and stock markets has hurt its ranking. India benefits from GDP growth and manufacturing, but faces stiff competition from Vietnam's rising market cap.", "category": "Economy", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "India’s February E-Way Bill Generation Grows 18.8 Percent Year-on-Year", "summary": "GST Network data shows e-way bill generation reached 132 million in February, an 18.8% year-on-year increase. While the figure fell 3.1% sequentially due to the shorter month, the growth indicates resilient economic activity across factories and retail networks. Experts expect a further pickup in March as businesses accelerate transactions before the financial year-end.", "category": "Economy", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "Government Permits Alternative Fuels as Gas Scarcity Hits Hospitality Sector", "summary": "The environment ministry has advised state pollution boards to permit the use of biomass, kerosene, and coal for one month to assist the hospitality sector during the LPG crunch. The petroleum ministry is activating alternate fuel sources and increasing kerosene allocations to states. The move follows reports of hotels and restaurants shutting down due to gas supply disruptions.", "category": "Economy", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "Rice Exports From India Slow Amid Rising Freight and Insurance Costs", "summary": "India's rice exports, which account for 40% of global trade, are slowing due to increased freight and insurance costs linked to the West Asia conflict. Maritime traffic through the Strait of Hormuz has nearly halted, making it difficult for exporters to secure vessels. The disruption threatens global food supply chains as India is a major supplier to multiple continents.", "category": "Economy", "page": 6, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "India Requests Urea Supplies from China Amid Gas Crunch", "summary": "India has asked China to facilitate urea sales as the West Asia conflict curtails domestic fertilizer production by restricting gas supplies. The move signals the unusual measures being taken to secure essential commodities as the blockade of the Strait of Hormuz snarls global trade. Fertilizer production is a critical priority for India’s agricultural sector during the supply crisis.", "category": "Economy", "page": 6, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "India’s February Palm Oil Imports Jump 11 Percent to Six-Month High", "summary": "India's palm oil imports rose to 847,689 tonnes in February, a six-month high, as a wider discount versus rival oils prompted refiners to boost purchases. The Solvent Extractors’ Association of India stated that imports increased from 766,384 tonnes in January. The surge reflects India's ongoing reliance on vegetable oil imports to meet domestic demand amidst changing global price dynamics.", "category": "Economy", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "Handloom Products Must Carry Mandatory Authenticity Tag from October 2026", "summary": "The government has proposed a new regulatory framework making the 'Handloom Mark' label mandatory for all handwoven goods from October 1, 2026. The move aims to curb the misuse of the handloom tag and build globally recognized brands for traditional Indian textiles. The regulation, notified to the WTO, follows the launch of the premium Kasturi Cotton Bharat brand.", "category": "Economy", "page": 13, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "Oil Prices Exceed $100 as Iran Threatens to Close Hormuz Strait", "summary": "Global oil prices surged past $100 per barrel as Iran's Supreme Leader Ayatollah Khamenei threatened to shut the Strait of Hormuz. The move comes amid intensifying attacks on tankers and heightening regional tensions. Domestic markets reacted sharply, with the Indian rupee falling to a record low of 92.36 against the US dollar while the BSE Sensex dropped 1.1% to close at 76,034.", "category": "Economy", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/116780", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "US Launches Trade Probe into India's Industrial Capacity and Tariffs", "summary": "The United States has initiated a trade probe under Section 301 of the Trade Act into the industrial capacity of 16 major trading partners, including India. The investigation focuses on alleged excess capacity and state-subsidized exports in sectors like steel, chemicals, and textiles. The USTR claims India's trade surplus in goods poses a risk to US markets and domestic manufacturing.", "category": "Economy", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116780", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "India Market Crash: Nifty Slips 1% as Rupee Hits Record Low", "summary": "Indian equity markets faced a significant sell-off as the Nifty 50 slipped 1% to an 11-month low due to surging oil prices and global volatility. The BSE Sensex closed down 829 points. Simultaneously, the Indian rupee plunged to an all-time low of 92.36 against the US dollar. Analysts cited the widening trade deficit and investor anxiety over Middle East tensions as primary drivers.", "category": "Economy", "page": 9, "importance": 9, "telegram_url": "https://t.me/c/1877410077/116780", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "Revised LCR Norms Expected to Help Banks Expand Credit", "summary": "The Reserve Bank of India’s proposed revisions to Liquidity Coverage Ratio (LCR) norms could allow banks to expand credit by approximately 7%. The new framework aims to improve the management of liquid assets and funding stability. Analysts suggest that the change will particularly benefit public sector banks, which currently maintain higher surplus liquidity compared to private peers.", "category": "Economy", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116780", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "Kenneth Rogoff: West Asia War Bigger Geopolitical Threat Than Iran-US", "summary": "Renowned economist Kenneth Rogoff warns that the current West Asia conflict is a 'geopolitical chess game' involving Russia and China, with deeper implications than a bilateral Iran-US war. He notes that rising oil prices and fossil fuel energy are ironically needed to build future AI infrastructure. Rogoff highlights that China faces significant risks due to its heavy reliance on oil imports.", "category": "Economy", "page": 12, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116780", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "Income and Arbitrage Funds Gain Popularity in Volatile Markets", "summary": "Investment advisors report a surge in interest for income and arbitrage mutual funds as equity markets face extreme volatility. These funds are perceived as safer, tax-efficient alternatives to traditional equity schemes. The category saw net inflows as investors look to park capital in assets that offer stability amidst the geopolitical tensions affecting domestic stock indices.", "category": "Economy", "page": 13, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116780", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "Government Urges Banks to Devise Low-Interest Loans for Retail, MSMEs", "summary": "The Union government has asked banks to develop specialized low-interest loan products for retail consumers and micro-enterprises. The initiative aims to push credit growth, which slowed to 14.6% recently. Banks are encouraged to use the Jan Suraksha portal and simplify credit assessment for self-help groups and street vendors to foster financial inclusion in the next fiscal year.", "category": "Economy", "page": 14, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116780", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "Overseas Crypto Earnings of Moonlighters Under Income Tax Scrutiny", "summary": "The Income Tax department has identified several IT professionals and moonlighters who received payment for overseas consulting in cryptocurrencies without reporting them. Officials are scanning foreign assets and stablecoin transactions held in offshore wallets. The move is part of a broader effort to track unreported income and ensure compliance with the 30% tax on virtual digital assets.", "category": "Economy", "page": 14, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116780", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "Moscow's Oil Export Revenue in February Lowest Since Ukraine War", "summary": "Russia's oil export revenue fell to $9.5 billion in February 2026, its lowest level since the start of the conflict with Ukraine. Western sanctions and increased competition in Asian markets have forced the Kremlin to offer deeper discounts on its crude. The IEA reports that Russian production has remained steady, but falling global prices and high transport costs have eroded profits.", "category": "Economy", "page": 16, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116780", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "Government ensures commercial units receive 20% of monthly LPG demand", "summary": "Petroleum Minister Hardeep Singh Puri announced that commercial establishments will receive 20% of their average monthly LPG requirement to prevent hoarding. To combat the fuel crisis triggered by the West Asia conflict, State Pollution Control Boards have been advised to allow eateries to temporarily use biomass pellets, coal, and kerosene for cooking operations for one month.", "category": "Economy", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/116770", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 13~03~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116770"}]}, {"headline": "Shadow fleet tankers with Russian oil divert to Indian ports", "summary": "Several tankers carrying Russian crude, including those from the 'shadow fleet' operating outside conventional regulations, are heading to India following a US import waiver. Vessel-tracking data indicates at least four tankers loading before March 6 have altered course from East Asian destinations toward India, potentially easing near-term domestic supply pressures.", "category": "Economy", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/116770", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 13~03~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116770"}]}, {"headline": "High-level panel to review banking reserve ratios and licensing norms", "summary": "The proposed High-Level Committee on Banking for Viksit Bharat is expected to examine reserve ratio requirements like CRR and SLR to improve India's credit-to-GDP ratio. The panel will also review bank licensing frameworks and the transition of small finance banks and NBFCs, marking the first major financial sector review since the Narasimham committees in the 1990s.", "category": "Economy", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116770", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 13~03~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116770"}]}, {"headline": "US opens Section 301 probe into India over manufacturing capacities", "summary": "The US Trade Representative has launched an investigation into India and 15 other economies over alleged 'structural excess capacity' in sectors including textiles, solar modules, steel, and automotive goods. The move could slow negotiations for the India-US bilateral trade agreement and lead to fresh tariffs by July 2025 as existing reciprocal duties are set to lapse.", "category": "Economy", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/116770", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 13~03~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116770"}]}, {"headline": "Panic buying grips Delhi CNG stations amid supply crunch fears", "summary": "Long queues of private vehicles were seen at CNG stations in Delhi-NCR as owners anticipated fuel shortages due to the West Asia crisis. Although distributors like Indraprastha Gas Ltd (IGL) reported no current shortage, consumers are stocking up as the joint US-Israel attack on Iran continues to disrupt global energy supply chains.", "category": "Economy", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116770", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 13~03~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/116770"}]}, {"headline": "Analysis: Prolonged war threatens Indian agriculture through fertilizer supply risks", "summary": "India's heavy reliance on fertilizer imports, particularly urea and DAP from the Gulf, leaves it vulnerable to the Hormuz blockage. Saudi Arabia and Oman supply roughly 25% of India's urea and DAP requirements. Supply chain disruptions have already raised urea prices by $80 per tonne, potentially straining the fiscal budget and increasing food inflation due to higher input costs.", "category": "Economy", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116770", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 13~03~2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/116770"}]}, {"headline": "Cotton procurement at MSP rises 4% to 104 lakh bales", "summary": "State-run Cotton Corporation of India (CCI) has procured 104.01 lakh bales of cotton for the 2025-26 marketing season, up 4% from last year. Telangana led the procurement with 31.70 lakh bales, followed by Maharashtra. The CCI has also begun liquidating stocks, selling about 17.5 lakh bales from the current crop so far.", "category": "Economy", "page": 10, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116770", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 13~03~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/116770"}]}, {"headline": "Hardeep Singh Puri assures secure crude supply and no fuel shortage", "summary": "Union Petroleum Minister Hardeep Singh Puri informed the Lok Sabha that India’s crude oil supply is secure despite the West Asia conflict. To prevent hoarding and black marketing, oil marketing companies will allocate 20% of monthly commercial LPG requirements. The Minister emphasized that domestic supplies for 33 crore families remain the government's foremost priority.", "category": "Economy", "page": 3, "importance": 9, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "LPG crisis hits railway station restaurants in Karnataka", "summary": "Food vendors at major railway stations in Karnataka, including Bengaluru, are struggling with a shortage of LPG cylinders. Some restaurants have reduced their menus, focusing on items that require less gas, such as tea and packaged snacks. While onboard catering on trains remains largely unaffected, IRCTC has advised units to adopt induction stoves where possible.", "category": "Economy", "page": 7, "importance": 4, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "Saudi oil tanker Shenlong reaches Mumbai amid West Asia conflict", "summary": "The Liberian-flagged tanker Shenlong, carrying one million barrels of Saudi Arabian crude oil, successfully docked in Mumbai after crossing the volatile Strait of Hormuz. This is the first oil tanker to reach India from West Asia since hostilities escalated on February 28. Another large vessel carrying Iraqi crude is also expected to reach Paradip port shortly.", "category": "Economy", "page": 13, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "Retail inflation quickens to 10-month high of 3.2% in February", "summary": "India's retail inflation rose to 3.2% in February, driven by higher food and tobacco prices. Inflation in the food and beverages segment reached 3.35%. Personal care and miscellaneous goods also saw significant price increases. Economists warn that fuel supply disruptions from the West Asia conflict could further push up headline inflation in the coming months.", "category": "Economy", "page": 15, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "RBI Board Approves Record Dividend Transfer of Rs 2.11 Lakh Crore", "summary": "The Reserve Bank of India board approved a record surplus transfer of Rs 2,10,874 crore to the central government for the fiscal year 2023-24. This represents a 141% increase from the previous year. The move is expected to help the government reduce its fiscal deficit and provide additional space for infrastructure spending while maintaining market liquidity.", "category": "Economy", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/116738", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 13~03~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116738"}]}, {"headline": "Iran Supreme Leader vows to keep Hormuz shut and attack Gulf", "summary": "Iran's new Supreme Leader, Ayatollah Mojtaba Khamenei, issued his first public statement vowing to maintain the closure of the Strait of Hormuz as leverage against the US and Israel. He promised to avenge those killed in the war and continue attacks on Gulf Arab states. The move signals a persistence in conflict that has disrupted global energy supplies and pushed oil prices up.", "category": "World", "page": 3, "importance": 10, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Bangladesh parliament convenes for first session since 2024 uprising", "summary": "Bangladesh’s parliament met for the first time since a 2024 uprising led to the ousting of the previous government. The new administration, led by Prime Minister Tarique Rahman of the Bangladesh Nationalist Party, took over following February 12 elections. Rahman vowed to make the parliament the center of national debate and restore democratic practices after years of fascist rule.", "category": "World", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Falling drone causes smoke and panic in Dubai financial district", "summary": "A drone crashed near Dubai’s financial district on Thursday following Iranian threats against economic targets. Several major firms, including Citibank and PwC, evacuated offices or told employees to work from home as a precaution. Authorities confirmed no casualties from the crash on Sheikh Zayed Road, but the incident underscores rising tensions in the Gulf financial hub.", "category": "World", "page": 13, "importance": 9, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "China codifies ethnic unity law mandating CCP education for all", "summary": "China has approved an expansive new 'ethnic unity' law that makes the assimilation of minorities a responsibility for all of society. The law mandates that Mandarin be the primary language of instruction and requires parents to guide children to love the Communist Party. It also makes it illegal to oppose marriages on ethnic or religious grounds, aiming to forge a single national identity.", "category": "World", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116815", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 13-03-2026 .pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/116815"}]}, {"headline": "Ukraine hits Russian oil export pipeline hub in Krasnodar", "summary": "A Ukrainian drone attack caused a fire at a major oil export pipeline hub in Krasnodar, Russia. The strike targeted a terminal in Tikhoretsk where an oil depot and pumping station are located. This marks a significant escalation in Ukraine's strategy to disrupt Russia's energy infrastructure and export capabilities.", "category": "World", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116795", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "Russia urges Israel and US to end war with Iran", "summary": "Russia has called on Israel and the United States to cease military actions against Iran and return to diplomatic negotiations. The Russian Foreign Ministry warned that the current path of escalation could lead to a catastrophic regional war. Moscow emphasized the need to protect civilian populations and resolve conflicts through peaceful means.", "category": "World", "page": 14, "importance": 9, "telegram_url": "https://t.me/c/1877410077/116795", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "Hezbollah fires 200 rockets at Israel in major barrage", "summary": "Hezbollah launched a barrage of 200 rockets and drones at Israeli military positions, marking one of the largest attacks since the conflict began. Israel responded with air strikes on Hezbollah targets in southern Lebanon and Beirut. The escalation has forced over 800,000 people to flee their homes as fears of a full-scale war grow.", "category": "World", "page": 14, "importance": 10, "telegram_url": "https://t.me/c/1877410077/116795", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "Iran warns against any attack on its key islands", "summary": "Iranian officials have warned that any military action against its islands in the Persian Gulf would trigger a 'provocative new level of warfare.' The statement followed reports that Israeli and US forces might be targeting strategic locations. Iran asserted it will defend its territorial integrity and respond with all available military assets.", "category": "World", "page": 14, "importance": 9, "telegram_url": "https://t.me/c/1877410077/116795", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "China OKs controversial ethnic unity law for minority regions", "summary": "China has approved new 'ethnic unity' legislation aimed at fostering a national identity among minority groups. The law mandates the use of Mandarin in education and public life while discouraging distinct cultural practices in regions like Xinjiang and Tibet. Human rights groups have criticized the move as an attempt to further assimilate minorities.", "category": "World", "page": 14, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116795", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "West Asia Conflict Triggers Sharpest Rise in Global Crude Prices", "summary": "Oil prices surged 34% in 12 days following the West Asia conflict, briefly crossing $100 per barrel. Data analysis indicates this is the sharpest rise among major oil-shock episodes since 1990. While prices eased to $98, fears remain over the Strait of Hormuz, which carries 20% of global supply, potentially triggering a prolonged global economic shock.", "category": "World", "page": 4, "importance": 9, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "Trump Administration Launches New Probes into Unfair Trade and Forced Labor", "summary": "The Trump administration is launching trade investigations into 16 major trading partners, including India, China, and the EU, over excess industrial capacity. The probes could lead to new tariffs by this summer. Additionally, a Section 301 investigation will target goods produced with forced labor from over 60 countries, following a Supreme Court ruling that overturned previous programs.", "category": "World", "page": 6, "importance": 9, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "Hormuz Crisis Risks Prolonged Closure Choking Global Energy Transport", "summary": "The Strait of Hormuz faces a potential prolonged closure as Iran targets cargo ships and the US holds off on military escorts. Traffic is paralyzed in the world’s most important energy route, with over 600 ships stuck in the Persian Gulf. The shutdown has caused global oil prices to spike and is forcing major producers like Saudi Arabia and Kuwait to cut production significantly.", "category": "World", "page": 12, "importance": 10, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "US-Iran War Poses Risk of Prolonged Global Economic Disruption", "summary": "The conflict following the US attack on Iran on February 28 has effectively closed the Strait of Hormuz, threatening 15% of global oil and 20% of gas demand. Experts warn that even if the war ends immediately, supply chains will take months to normalize. India faces significant supply and price risks for oil, gas, and essential fertilizers like urea and phosphate.", "category": "World", "page": 14, "importance": 10, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "India Joins 140 Nations at UNSC to Condemn Iran's Attacks", "summary": "India was among 140 countries that co-sponsored a UN Security Council resolution condemning Iran’s regional attacks. The resolution, adopted with 13 votes in favor, demands an immediate cessation of hostilities and protection of territorial integrity. China and Russia abstained. The international community called for an end to residential strikes and threats to global maritime trade.", "category": "World", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116780", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "UAE Better Insulated From Regional Shocks Than Gulf Neighbors", "summary": "Economic analysts suggest the United Arab Emirates is better positioned to withstand the current regional conflict compared to its neighbors. The UAE's diversified non-oil economy and large sovereign wealth buffers provide a significant fiscal cushion. While other Gulf nations face higher deficits and trade disruptions, the UAE’s strategic investments in services and technology offer stability.", "category": "World", "page": 15, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116780", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "Iran to Continue Attacks on Neighbors Says Ayatollah Khamenei", "summary": "Iran’s Supreme Leader has vowed to continue military operations against neighboring states until the 'threat of war' is removed. Khamenei called for the closure of the Strait of Hormuz to US-allied ships and demanded reparations for recent air strikes. The statement signaled a significant escalation in regional hostilities, affecting global trade and energy security.", "category": "World", "page": 16, "importance": 10, "telegram_url": "https://t.me/c/1877410077/116780", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "Donald Trump Says US Gains as Oil Prices Rise", "summary": "Former US President Donald Trump stated that the United States is a net beneficiary of rising oil prices while urging for a complete halt to Iran's nuclear program. Trump argued that higher energy costs would hurt geopolitical rivals more than the US economy. He also proposed temporary waivers for the Jones Act to allow non-US ships to transport fuel to ease domestic shortages.", "category": "World", "page": 16, "importance": 9, "telegram_url": "https://t.me/c/1877410077/116780", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "US Navy May Escort Ships Through Hormuz by April", "summary": "US Energy Secretary Chris Wright indicated that the US Navy could begin escorting commercial tankers through the Strait of Hormuz by April to protect global energy supplies. The plan follows increased Iranian aggression toward maritime trade. Wright emphasized that securing the narrow waterway is a top priority for the administration to prevent a global energy crisis and price shocks.", "category": "World", "page": 16, "importance": 9, "telegram_url": "https://t.me/c/1877410077/116780", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "Beijing Tightens Export Curbs on Refined Oil Products", "summary": "China has implemented stricter export controls on refined oil products, including gasoline and diesel, to ensure domestic supply during the regional energy crisis. The move is expected to impact global fuel markets, especially in Southeast Asia. Analysts suggest Beijing is prioritizing internal stability as high energy costs threaten its manufacturing and industrial sectors.", "category": "World", "page": 16, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116780", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "Iranian Drone Hits Residential Tower in Dubai Amid Rising Tensions", "summary": "A residential building in Dubai was struck by a drone launched from Iran, escalating fears of a wider conflict in the Gulf. No fatalities were immediately reported, but the attack caused significant damage and triggered flight diversions at Dubai International Airport. The incident marks the first time a residential target in the UAE has been directly hit during the current wave of hostilities.", "category": "World", "page": 16, "importance": 9, "telegram_url": "https://t.me/c/1877410077/116780", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_13-03-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/116780"}]}, {"headline": "Iran’s new Supreme Leader vows to keep Strait of Hormuz closed", "summary": "In his first public comments, Ayatollah Mojtaba Khamenei vowed to keep the Strait of Hormuz closed and demanded reparations for war losses. He urged neighboring Arab countries to shut U.S. bases immediately. Meanwhile, President Masoud Pezeshkian set three conditions for ending the conflict, including firm guarantees against future aggression and the payment of reparations.", "category": "World", "page": 3, "importance": 10, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "Israeli strike in Beirut kills eight as military threatens expansion", "summary": "An Israeli strike on Beirut’s seafront killed eight people and wounded 31. Israeli Defense Minister Israel Katz ordered troops to prepare for expanded operations in Lebanon to seize territory if Hezbollah attacks do not cease. Hezbollah recently launched its largest rocket barrage since the war began, involving 200 rockets and 20 drones targeting Israeli positions.", "category": "World", "page": 16, "importance": 9, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "Trump and Iran exchange threats as West Asia war escalates", "summary": "President Donald Trump vowed to stop Iran from obtaining nuclear weapons and played down the impact of rising oil prices on the U.S. economy. In response, Iran's National Security Council warned it could plunge the entire region into darkness if its electricity grid is targeted. Iran also launched hypersonic missiles at Tel Aviv and U.S. regional bases in a major retaliatory strike.", "category": "World", "page": 16, "importance": 10, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "U.S. Intel suggests Iranian leadership not at risk of immediate collapse", "summary": "Despite two weeks of intense U.S. and Israeli bombardment, U.S. intelligence reports indicate that Iran's leadership remains intact. The analysis suggests the clerical regime retains control over the public and is not in danger of imminent collapse. Overthrowing the government would likely require a ground offensive, as the current air campaign has not destabilized the state hierarchy.", "category": "World", "page": 16, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "China passes law promoting 'Sinicization' and national ethnic unity", "summary": "China’s legislature passed the 'Promoting Ethnic Unity and Progress' law, which mandates Mandarin as the basic language of instruction and requires religions to adhere to 'Sinicization.' Critics argue the law erodes minority identities by pushing for assimilation through integration in housing, education, and culture. The law also targets foreign organizations deemed to undermine unity.", "category": "World", "page": 16, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "Russia accuses Ukraine of drone strikes on major gas pipeline", "summary": "The Kremlin accused Ukraine of 'reckless' drone attacks targeting the Russkaya compressor station, a key facility for a gas pipeline supplying Turkiye. Russian officials stated that the pipeline is an international facility essential for Turkish energy security. Ukraine has not officially commented on the specific allegations regarding the compressor station strikes.", "category": "World", "page": 16, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "Norway Ireland and Spain Formally Recognize State of Palestine", "summary": "Norway, Ireland, and Spain formally recognized the State of Palestine in a landmark diplomatic move. The three European nations stated that the decision aims to revive the two-state solution and promote regional peace. Israel reacted sharply by recalling its ambassadors, while the Palestinian Authority hailed the step as a significant moral and political victory.", "category": "World", "page": 6, "importance": 9, "telegram_url": "https://t.me/c/1877410077/116738", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 13~03~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/116738"}]}, {"headline": "Chef Rene Redzepi steps down from Noma following abuse allegations", "summary": "Danish chef Rene Redzepi announced he is stepping away from his world-renowned restaurant Noma. The resignation follows reports from 35 former employees alleging years of bullying, physical abuse, and public humiliation. Redzepi apologized in an Instagram post, taking responsibility for his actions as the restaurant recently opened a new pop-up location in Los Angeles.", "category": "Culture", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Hollywood Remains Difficult Arena for Established Indian Actors to Crack", "summary": "Despite more diverse casting, Indian stars struggle to secure significant Hollywood roles due to lack of access and demanding audition cultures. Established actors often find it difficult to balance domestic projects with long-term US commitments. While some find roles in international biopics or digital series, the operational costs of maintaining a US presence remain a significant barrier.", "category": "Culture", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "Major South Indian temples seek uninterrupted LPG supply for prasadams", "summary": "Temple managements including Tirumala Tirupati Devasthanams (TTD) have requested continuous LPG supplies on spiritual grounds. TTD uses roughly 10 tonnes of cooking gas daily for its prasadam kitchens to prepare four lakh laddus. While solar steam systems handle some cooking, gas is essential for deep-frying laddus and other daily food offerings for over one lakh devotees.", "category": "Culture", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/116770", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL Bangalore 13~03~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/116770"}]}, {"headline": "ASI approves new excavation at Bihar’s neglected Balirajgarh Fort", "summary": "The Archaeological Survey of India has granted fresh approval for excavations at the centrally protected Balirajgarh Fort in Madhubani, Bihar. The site, representing Mithila’s early urban civilization from the Maurya to Pala periods, has suffered from decades of neglect. Previous digs were abandoned due to environmental constraints, but officials hope this new effort reaches a conclusion.", "category": "Culture", "page": 6, "importance": 3, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "TTD secures fuel reserves for Tirumala temple amid West Asia crisis", "summary": "The Tirumala Tirupati Devasthanams has fortified its LPG reserves to ensure the uninterrupted production of Tirumala laddus and free meals. The temple consumes six tonnes of fuel daily. TTD has established five storage tanks with a combined capacity of over 40 tonnes. Indian Oil Corporation has also assured the temple of a steady supply despite global energy anxieties.", "category": "Culture", "page": 7, "importance": 4, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "21st Asian Women’s Film Festival begins in New Delhi", "summary": "The three-day Asian Women’s Film Festival opened at the India International Centre in Delhi, featuring 75 films by female filmmakers from across Asia. Organized by IAWRT India, the event includes documentaries, fiction, and animation. The festival opened with the Bhutanese film 'I, the Song' and aims to provide a platform for diverse women’s voices and cinematic storytelling.", "category": "Culture", "page": 7, "importance": 3, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "Mumbai Indians aim for IPL success with return of Surya", "summary": "Despite not winning an IPL title since 2020, Mumbai Indians enter the new season with high expectations following the return of Suryakumar Yadav. Led by Hardik Pandya, the franchise seeks to balance its star-studded batting lineup with a bowling attack spearheaded by Jasprit Bumrah. The team's strategy focuses on leveraging T20 World Cup experience to reclaim their status.", "category": "Sports", "page": 15, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "BCCI confirms IPL schedule remains on track despite conflict", "summary": "BCCI Secretary Devajit Saikia stated that the ongoing war in West Asia will not disrupt the upcoming IPL season. Despite global air travel complications and LPG shortages, the board is moving forward with the announced schedule. The ICC also confirmed that all teams from the recent World Cup have safely returned to their respective countries, closing a complex logistical operation.", "category": "Sports", "page": 15, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Top seeds Satwik-Chirag advance to Swiss Open quarterfinals", "summary": "Indian men's doubles pair Satwiksairaj Rankireddy and Chirag Shetty defeated Japanese pair Hiroki Okamura and Kyohei Yamashita to reach the Swiss Open quarterfinals. The top-seeded duo won 21-15, 15-21, 28-26 in a hard-fought match lasting 74 minutes. Meanwhile, Kiran George exited the men’s singles competition after a three-set loss to Hong Kong’s Jason Gunawan.", "category": "Sports", "page": 15, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Yuki Bhambri reaches ATP Masters 1000 doubles semi-final", "summary": "Indian tennis player Yuki Bhambri and his Swedish partner Andre Goransson reached their first ATP Masters 1000 semi-final at Indian Wells. They defeated the pair of Alexander Erler and Andrea Vavassori in straight sets, 6-3, 7-6. The duo will face France's Arthur Rinderknech and Monaco's Valentin Vacherot for a place in the final.", "category": "Sports", "page": 15, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "BCCI imposes lifetime ban on video analyst Raja Reddy for corruption", "summary": "The BCCI Ombudsman has banned video analyst Raja Reddy for life following a corrupt approach during a 2024 Ranji Trophy match. Reddy allegedly offered player Girinath Reddy ₹5 lakh to bowl a specific way for betting purposes. The inquiry found evidence of betting accounts and digital wallets on Reddy’s phone, leading to his permanent ineligibility from all cricket activities.", "category": "Sports", "page": 15, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Reduced shooter quotas create selection challenges for upcoming Asian Games", "summary": "Organizers for the Aichi-Nagoya Asian Games have reduced shooter quotas, allowing India only 15 spots each for men and women. This change forces selectors to prioritize \"common shooters\" who can compete in multiple events to maximize medal chances. Rankings from domestic trials and performance in international World Cups will be used to finalize the squad for the September games.", "category": "Sports", "page": 16, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Wrestling Federation of India flags fake documents used for visa applications", "summary": "The Wrestling Federation of India (WFI) alerted authorities after individuals posing as wrestlers submitted forged documents to the Hungarian Embassy for visas. The suspected human trafficking attempt involved letters claiming participation in a Budapest competition. WFI clarified the documents were fake and that no such delegation had been authorized for travel.", "category": "Sports", "page": 16, "importance": 4, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "ICC provisionally suspends Javon Searles and others for corruption breaches", "summary": "The International Cricket Council (ICC) provisionally suspended fast-bowling all-rounder Javon Searles and two individuals linked to a franchise for multiple breaches of the anti-corruption code. The charges relate to the 2023-24 Bim10 event in Barbados. Titans team owner Chitranjan Rathod and official Trevon Griffith were also named in the suspension for code violations.", "category": "Sports", "page": 15, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Abrar Ahmed becomes first Pakistan player signed by Indian-owned Hundred franchise", "summary": "Sunrisers Leeds, owned by the Sun Group, signed Pakistani leg-spinner Abrar Ahmed for £190,000 at The Hundred men’s auction. This marks a significant moment as he is the first Pakistani player acquired by an Indian-owned franchise in the tournament. The signing comes amid scrutiny over whether Indian investors would avoid Pakistani players due to geopolitical tensions.", "category": "Sports", "page": 15, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Mission Olympic Cell sanctions 30 lakh rupee grants for Bhambri and Nagal", "summary": "India's Mission Olympic Cell sanctioned approximately ₹30 lakh each to tennis players Yuki Bhambri and Sumit Nagal to support their training and competition schedules. Additionally, rising player Dhakshineswar Suresh was included in the Target Asian Games Group to bolster preparations for the 2026 Asian Games and Davis Cup Qualifiers.", "category": "Sports", "page": 15, "importance": 4, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Sanju Samson and Ishan Kishan top ODI World Cup candidates", "summary": "Following India's T20 World Cup success, selectors are looking at Sanju Samson and Ishan Kishan as key candidates for the next ODI World Cup. Both players have shown strong performances in domestic cricket and limited opportunities. The management faces a dilemma in balancing the batting order as new talent emerges for the 50-over format.", "category": "Sports", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116795", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "Jasprit Bumrah relishes taking responsibility in pressure situations", "summary": "Indian pacer Jasprit Bumrah stated he enjoys the challenge of leading the bowling attack in difficult conditions. Recalling the T20 World Cup win, he emphasized that taking responsibility for the team's performance is the most fulfilling part of his job. Bumrah's consistency continues to make him a vital asset across all formats of the game.", "category": "Sports", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116795", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "Shubman Gill set to receive BCCI Cricketer of the Year award", "summary": "India's Test and ODI captain Shubman Gill is set to be named Cricketer of the Year at the BCCI's annual awards in Delhi. The 26-year-old had a stellar 2025, amassing 983 runs in Tests and leading India to several series wins. The award recognizes his consistent performance and leadership qualities throughout the season.", "category": "Sports", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116795", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "Trump warns Iran sports teams against traveling to US", "summary": "Former US President Donald Trump stated that Iranian sports teams would be 'risking their own lives' if they travel to North America for international events. His comments came amid heightened tensions between the two nations and a month after FIFA included Iran in the 2026 World Cup co-hosted by the US, Canada, and Mexico.", "category": "Sports", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116795", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "Unbeaten India to face Italy in hockey tournament", "summary": "The Indian women's hockey team, currently unbeaten, is set to face Italy in their final qualifying match. After topping Pool B on goal difference, India is looking to secure a spot in the semifinals and strengthen their position for World Cup qualification. Coach Schopman praised the team's composure and discipline throughout the event.", "category": "Sports", "page": 10, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116795", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "Kiran George shocks Loh Kean Yew in Swiss Open first round", "summary": "Indian shuttler Kiran George pulled off a massive upset by defeating former world champion Loh Kean Yew 23-21, 21-19 in the Swiss Open. However, former world number one K. Srikanth bowed out after a loss to Hong Kong’s Jason Gunawan. In mixed doubles, the pair of Dhruv Kapila and Tanisha Crasto also advanced after stunning the fourth-seeded Danish duo.", "category": "Sports", "page": 18, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116747", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 13-03-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/116747"}]}, {"headline": "Rajasthan Royals Face Sunrisers Hyderabad in IPL 2024 Qualifier Two", "summary": "Rajasthan Royals are set to face Sunrisers Hyderabad in the second qualifier of IPL 2024 at Chennai's Chepauk Stadium. After eliminating RCB, the Royals look to reach their second final in three years. Sunrisers, known for their aggressive batting, seek to bounce back from their previous loss. The winner will play Kolkata Knight Riders in the tournament finale.", "category": "Sports", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116738", "sources": [{"newspaper": "Indian Express", "pdf_filename": "IE Delhi 13~03~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/116738"}]}, {"headline": "First oil tanker to transit Hormuz since war starts reaches Mumbai", "summary": "The Liberia-flagged tanker Shenlong reached Mumbai after transiting the Strait of Hormuz without GPS, relying on manual navigation. It delivered 1.35 lakh metric tonnes of crude from Saudi Arabia. The ship is now set to return to Fujairah. The crew reported GPS jamming and spoofing during the journey, highlighting the extreme challenges of maritime transport in the conflict zone.", "category": "Business", "page": 7, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Indian equities show resilience despite valuation concerns amid war", "summary": "Despite geopolitical tensions and foreign investor outflows, Indian stock market valuations remain premium. Analysis of 3,400 BSE-listed companies shows that while large-cap P/E multiples have slightly moderated to 22.7x, many stocks still trade at high earnings multiples. Mid-cap indices have seen more limited corrections, indicating that India remains an attractive destination.", "category": "Business", "page": 14, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Packaged water prices set to rise as raw material costs surge", "summary": "The West Asia conflict has driven up the cost of polymer and plastic materials used for water bottles and caps. Small-scale manufacturers in India have already increased rates by ₹1 per bottle, with further hikes expected. The cost of bottle materials rose to ₹170 per kg, threatening to disrupt a $5 billion market just before the high-demand summer season.", "category": "Business", "page": 14, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Major IT firms increase India headcount to boost margins", "summary": "Global IT services firms Capgemini, Cognizant, and EPAM have significantly increased their workforce in India to protect margins and leverage skilled talent in AI and cloud services. Capgemini’s India hiring accounted for 73% of its total global headcount rise. This trend contrasts with some Indian peers who are trimming staff as global firms move more work offshore.", "category": "Business", "page": 14, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116832", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 13-03.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/116832"}]}, {"headline": "Nifty enters correction territory as Iran conflict escalates market volatility", "summary": "Indian equities fell for a second session with the Nifty dropping 1% to 23,639, entering a technical correction phase. The Sensex declined 829 points to 76,034 as Iran's attacks on ships dampened hopes of a quick end to the West Asia conflict. Brent crude touched $100 a barrel, sparking concerns over oil flow disruptions. Total BSE market capitalization eroded by ₹1.8 trillion in one day.", "category": "Business", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116815", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 13-03-2026 .pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116815"}]}, {"headline": "RBI considers fixed tenures for upper-layer NBFC managing directors", "summary": "The Reserve Bank of India may implement fixed tenures for top executives at 'upper-layer' non-banking financial companies to improve governance. The proposal includes appointing at least two whole-time directors, aligning NBFC rules with private bank standards. The move is seen as preparation for large NBFCs that are hopeful of transitioning into universal banks in the future.", "category": "Business", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116815", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 13-03-2026 .pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116815"}]}, {"headline": "RBI-Esma pact face reboot over EU audit demands on Indian counterparties", "summary": "The agreement between the RBI and European Securities and Markets Authority may be renegotiated if concerns over extraterritoriality are not resolved. The dispute stems from the EU regulator's demand to audit the books of Indian central counterparties like the Clearing Corporation of India. The RBI has refused to grant foreign entities audit rights, citing regulatory sovereignty.", "category": "Business", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116815", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 13-03-2026 .pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116815"}]}, {"headline": "West Asia conflict disrupts LPG supply for Indian AC manufacturers", "summary": "The air conditioner industry is facing production constraints due to a shortage of commercial LPG cylinders used in brazing and powder-coating. Manufacturers like Godrej and Blue Star report restricted supplies and rising costs of raw materials like polypropylene. With copper prices up 25%, the sector faces significant headwinds just as the peak summer sales season begins.", "category": "Business", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116815", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 13-03-2026 .pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/116815"}]}, {"headline": "Cooking gas shortage hits food delivery partners and cloud kitchens", "summary": "Gig workers for Zomato and Swiggy report a 60% drop in order fulfillment as commercial LPG shortages force restaurants to shut down. Union leaders state that street vendors and dhabas are scaling back operations due to cylinder rationing. Delivery partners see daily earnings shrink significantly as they struggle to meet order targets amid the supply chain disruption.", "category": "Business", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116815", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 13-03-2026 .pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/116815"}]}, {"headline": "India Gas Exchange volumes hit by price uncertainty and supply curbs", "summary": "Natural gas trading at the IGX is facing constraints as market participants hesitate due to high spot prices ranging from $17 to $25 per MMBtu. The government recently invoked the Essential Commodities Act to divert gas to priority sectors following the halt of shipments through the Strait of Hormuz. High prices and limited offers from marketers have significantly impacted demand.", "category": "Business", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116815", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 13-03-2026 .pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/116815"}]}, {"headline": "Tiruppur textile hub faces fresh threats from West Asia conflict", "summary": "Just as Tiruppur's knitwear exporters began recovering from high US tariffs, the Iran conflict has escalated logistics and insurance costs. The UAE remains India's fourth-largest textile market, and disruptions in the region are putting narrow margins under pressure. Despite the risks, exporters report a 20-30% increase in enquiries from the US following recent tariff renegotiations.", "category": "Business", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116815", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 13-03-2026 .pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/116815"}]}, {"headline": "Honda forecasts first annual loss in 70 years on EV restructuring", "summary": "Japan's Honda expects a hit of $15.7 billion after canceling three electric vehicle models planned for production in the US. The automaker cited weaker-than-expected demand for EV technology and the end of US government support as primary reasons. The massive write-down will result in the company's first annual loss since it became a listed entity nearly seven decades ago.", "category": "Business", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/116815", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS Delhi 13-03-2026 .pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/116815"}]}, {"headline": "US launches trade inquiries on India and 14 other countries", "summary": "The US Trade Representative has launched Section 301 investigations against 15 countries, including India, to address structural excess capacity and production in manufacturing sectors like textiles, chemicals, and steel. The probe follows a US Supreme Court rejection of reciprocal tariffs, potentially leading to new trade penalties.", "category": "Business", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/116795", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "Low cooking gas supply troubles Bengaluru's craft beer industry", "summary": "Bengaluru’s craft breweries are facing production slowdowns due to a shortage of commercial LPG. Boilers used in the brewing process rely heavily on gas, and several microbreweries are worried about meeting demand during the peak summer season. Some establishments have already paused production as cylinder suppliers prioritize domestic needs.", "category": "Business", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116795", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "LPG supply for Bengaluru eateries may resume soon", "summary": "Hoteliers in Bengaluru received assurance that domestic LPG supply will resume soon, easing the disruption caused by the ongoing gas crisis. The Bangalore Hotels’ Association noted that while only 13% of gas is currently used in the city, many establishments have shifted to using induction stoves and firewood to maintain operations.", "category": "Business", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/116795", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_13-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/116795"}]}, {"headline": "LPG Shortage Drives Surge in Induction Stove Searches and Sales", "summary": "Concerns over LPG scarcity due to the West Asia conflict have led to a surge in Google searches for induction stoves in India. E-commerce platforms report sales volumes jumping up to 30 times as households and restaurants switch to electric cooking equipment. Kitchen appliance makers are ramping up production to meet the sudden shift in consumer demand.", "category": "Business", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "Non-Renewable Energy Sector Records Highest Startup Shutdown Rate", "summary": "Approximately 6,800 recognized startups in India have shut down as of January 2026, representing 3.2% of the total. Non-renewable energy ventures saw the highest closure rate at 8.1%, followed by social networking at 7.8% and dating platforms at 6.3%. Experimental segments like AR/VR and Internet of Things also faced high churn, indicating shifting investor priorities.", "category": "Business", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "Indian Equities Face Correction as West Asia Tensions Weigh on Valuations", "summary": "Geopolitical tensions and FPI outflows have triggered a correction in Indian stock markets, though many stocks still trade at premium multiples. A Mint analysis of 3,400 BSE-listed firms shows 11% of stocks still trade above 80x earnings. While large-cap valuations have moderated, mid-caps and small-caps continue to trade at elevated levels compared to their historical averages.", "category": "Business", "page": 5, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_13-03-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/116786"}]}, {"headline": "Corporate Bond Yields Surge as Rising Oil Prices Stall Borrowing Plans", "summary": "Corporate bond markets are experiencing a \"March chill\" as rising crude oil prices drive up yields, prompting issuers to defer plans. Major entities like Nabard and REC Ltd withdrew planned bond sales after receiving bids at unexpectedly high rates. Corporate bond yields have climbed alongside government securities, disrupting the typical rush of end-of-fiscal-year sales.", "category": "Business", "page": 5, "importance": 8, "telegram_url": "https://t.me/c/1877410077/116786", "sources": [{"newspaper": "Mint", "pdf_filename": "B
