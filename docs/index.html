<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Inter', -apple-system, sans-serif;
  background: #0c0c0c; color: #fff;
}
button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
a { color: inherit; }

/* ── Screens ─────────────────────────────────────────────────────────── */
.screen { position: fixed; inset: 0; opacity: 0; pointer-events: none; transition: opacity 0.18s ease; }
.screen.active { opacity: 1; pointer-events: auto; }

/* ── Index screen ────────────────────────────────────────────────────── */
#indexScreen { display: flex; flex-direction: column; background: #0c0c0c; }

.masthead { flex-shrink: 0; padding: 22px 20px 14px; }
.masthead-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; }
.masthead-kicker { font-size: 10.5px; font-weight: 800; letter-spacing: 0.16em; color: #c9a66b; text-transform: uppercase; margin-bottom: 5px; }
.masthead-date { font-size: 25px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.1; }
.masthead-meta { margin-top: 9px; font-size: 12.5px; font-weight: 500; color: #666; }
.start-btn {
  display: inline-flex; align-items: center; gap: 6px; flex-shrink: 0; white-space: nowrap;
  background: #c9a66b; color: #14110a; font-weight: 700; font-size: 12.5px;
  padding: 10px 14px; border-radius: 100px; letter-spacing: 0.005em;
}

.chip-nav {
  flex-shrink: 0; display: flex; gap: 8px; padding: 12px 20px;
  overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid #1a1a1a;
}
.chip-nav::-webkit-scrollbar { display: none; }
.chip {
  display: inline-flex; align-items: center; gap: 6px; flex-shrink: 0; white-space: nowrap;
  background: #141414; border: 1px solid #232323; border-radius: 100px;
  padding: 7px 13px 7px 11px; font-size: 12.5px; font-weight: 600; color: #999;
  transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
}
.chip-count { color: #555; font-weight: 500; }
.chip.active { color: #fff; border-color: var(--cc); background: color-mix(in srgb, var(--cc) 18%, #141414); }
.chip.active .chip-count { color: color-mix(in srgb, var(--cc) 65%, #fff); }

.index-list { flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 32px; }
.cat-section { display: flex; flex-direction: column; }

.section-head { display: flex; align-items: center; gap: 8px; padding: 20px 20px 8px; }
.sh-icon { font-size: 14px; }
.sh-name { font-size: 12.5px; font-weight: 800; letter-spacing: 0.07em; text-transform: uppercase; color: var(--cc); }
.sh-count { margin-left: auto; font-size: 11.5px; font-weight: 600; color: #444; }

.row {
  display: flex; flex-direction: column; width: 100%; text-align: left; gap: 5px;
  padding: 13px 20px; border-bottom: 1px solid #131313; position: relative;
}
.row::before { content: ''; position: absolute; left: 0; top: 10px; bottom: 10px; width: 3px; border-radius: 2px; background: var(--cc); opacity: 0.6; }
.row:active { background: #111; }
.row-top { display: flex; align-items: center; gap: 6px; min-height: 14px; }
.row-flame { font-size: 11px; line-height: 1; }
.row-source { margin-left: auto; font-size: 11.5px; font-weight: 600; color: #5e5e5e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 70%; }
.row-more { color: #444; font-weight: 500; }
.row-headline { font-size: 15px; font-weight: 700; line-height: 1.32; color: #eee; letter-spacing: -0.01em; }
.row-summary { font-size: 12.5px; line-height: 1.5; color: #666; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 6px; padding: 40px 24px; text-align: center; }
.empty-state-icon { font-size: 34px; opacity: 0.55; margin-bottom: 6px; }
.empty-state-title { font-size: 14.5px; font-weight: 700; color: #888; }
.empty-state-sub { font-size: 12px; color: #454545; }

/* ── Reader screen (swipe cards) — unchanged from the original design ──── */
.outer { position: fixed; inset: 0; overflow: hidden; touch-action: none; }
.h-track { display: flex; height: 100%; will-change: transform; }
.cat-panel { flex-shrink:0; width:100vw; height:100%; display:flex; flex-direction:column; overflow:hidden; }
.progress-row { flex-shrink:0; display:flex; gap:4px; padding:14px 16px 10px; background:#0c0c0c; position:relative; z-index:5; overflow:visible; }
.progress-row::after { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:80%; height:120px; background:radial-gradient(ellipse at top,color-mix(in srgb,var(--cc) 30%,transparent) 0%,transparent 70%); pointer-events:none; z-index:-1; }
.pseg { flex:1; height:2px; border-radius:1px; background:rgba(255,255,255,0.12); position:relative; overflow:hidden; }
.pseg::after { content:''; position:absolute; inset:0; background:var(--cc,#e8334a); transform:scaleX(0); transform-origin:left; transition:transform 0.25s ease; }
.pseg.done::after, .pseg.active::after { transform:scaleX(1); }
.v-feed { flex:1; overflow:hidden; position:relative; clip-path:inset(0); }
.v-track { display:flex; flex-direction:column; will-change:transform; }
.card {
  width:100%; flex-shrink:0; background:#0c0c0c; display:flex; flex-direction:column;
  overflow:hidden; position:relative;
  scroll-margin-top: 80px;
}
.card.target-highlight {
  background: linear-gradient(135deg, #fff3cd22 0%, #ffeaa722 100%) !important;
  box-shadow: 0 0 30px rgba(255, 193, 7, 0.4);
  border: 2px solid #f39c12;
  animation: pulse-highlight 2s ease-in-out;
}
@keyframes pulse-highlight {
  0%, 100% { box-shadow: 0 0 30px rgba(255, 193, 7, 0.4); }
  50% { box-shadow: 0 0 50px rgba(255, 193, 7, 0.6); }
}
.card-content { flex:1; display:flex; flex-direction:column; padding:36px 20px 22px; min-height:0; position:relative; z-index:1; }
.card-toprow { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; flex-shrink:0; }
.cat-pill { display:inline-flex; align-items:center; gap:7px; background:#1c1c1e; border-radius:8px; padding:7px 12px 7px 10px; font-size:11.5px; font-weight:700; letter-spacing:0.07em; color:#d0d0d0; text-transform:uppercase; line-height:1; }
.pill-icon { width:16px; height:16px; background:#2e2e30; border-radius:3px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.pill-icon svg { display:block; }
.card-date { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:500; color:#666; letter-spacing:0.01em; }
.card-headline { font-size:28px; font-weight:800; line-height:1.18; color:#fff; letter-spacing:-0.03em; margin-bottom:20px; flex-shrink:0; }
.card-summary { font-size:15.5px; font-weight:400; line-height:1.62; color:#6b6b6b; flex:1; overflow:hidden; display:-webkit-box; -webkit-line-clamp:7; -webkit-box-orient:vertical; }
.card-divider { height:1px; background:#1e1e1e; margin:20px 0 16px; flex-shrink:0; }
.card-footer { display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.src-chip { display:inline-flex; align-items:center; gap:6px; background:#181818; border:1px solid #282828; border-radius:9px; padding:8px 13px; font-size:12.5px; font-weight:600; color:#c0c0c0; text-decoration:none; letter-spacing:0.005em; line-height:1; }
.src-chip-sep { color:#3a3a3a; font-weight:400; }
.src-chip-pg { color:#555; font-weight:500; }
.src-chip-ext { margin-left:2px; }
.src-chip-ext svg { display:block; }
.info-btn { width:36px; height:36px; border-radius:50%; border:1.5px solid #252525; background:#141414; display:flex; align-items:center; justify-content:center; color:#555; flex-shrink:0; }

.back-btn {
  position: fixed; top: 16px; left: 16px; z-index: 500;
  width: 38px; height: 38px; border-radius: 50%;
  background: rgba(20,20,20,0.72); backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center; color: #ddd;
}

.cat-flash { position:fixed; inset:0; z-index:600; pointer-events:none; opacity:0; transition:opacity 0.12s; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; }
.cat-flash.on { opacity:1; }
.cf-icon { font-size:34px; }
.cf-name { font-size:22px; font-weight:900; letter-spacing:-0.03em; text-transform:uppercase; }
.hint { position:fixed; display:flex; flex-direction:column; align-items:center; gap:5px; pointer-events:none; z-index:400; opacity:0; transition:opacity 0.6s ease; }
.hint.visible { opacity:1; }
.hint.gone { opacity:0 !important; transition:opacity 0.4s; }
.hint-pill { font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.55); background:rgba(255,255,255,0.07); backdrop-filter:blur(10px); padding:5px 13px; border-radius:100px; border:1px solid rgba(255,255,255,0.09); }
.hint-arr { font-size:16px; color:rgba(255,255,255,0.4); }
.h-up { bottom:28px; left:50%; transform:translateX(-50%); animation:bUp 2s ease-in-out infinite; }
.h-right { top:50%; right:14px; transform:translateY(-50%); animation:bRight 2s ease-in-out infinite 0.6s; }
@keyframes bUp { 0%,100% { bottom:28px; opacity:.65; } 50% { bottom:36px; opacity:1; } }
@keyframes bRight { 0%,100% { right:14px; opacity:.65; } 50% { right:6px; opacity:1; } }

/* ── Accessibility & responsive ──────────────────────────────────────── */
button:focus-visible, a:focus-visible { outline: 2px solid #c9a66b; outline-offset: 2px; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
}

@media (min-width: 640px) {
  .masthead, .chip-nav, .cat-section { max-width: 640px; margin-inline: auto; }
}
</style>

 "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130958", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁹⁰⁷²⁰²⁶.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130958"}], "article_id": "c5ce5c01"}, {"headline": "CM Shivakumar Calls Emergency Meeting Over Karnataka Drought Crisis", "summary": "Karnataka Deputy CM D.K. Shivakumar has summoned an emergency cabinet meeting to address the worsening drought in the state. He directed officials to prioritize drinking water and avoid releasing dam water for agriculture until monsoons stabilize. The state will seek a central team from the Union government to assess crop damage.", "category": "Environment", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130958", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁹⁰⁷²⁰²⁶.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130958"}], "article_id": "bc6801f7"}, {"headline": "Five Villagers Drown During Fishing Trip in Godavari River", "summary": "Five tribal villagers, including three women, drowned in the Godavari River in Andhra Pradesh's Polavaram district. The group was swept away by a sudden surge in water while fishing. Rescue teams have recovered all five bodies. Police registered a case of accidental death and are investigating the circumstances.", "category": "India", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/130958", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT Bengaluru ¹⁹⁰⁷²⁰²⁶.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/130958"}], "article_id": "1ca0d3bb"}, {"headline": "DMK Moves Adjournment Motions in Parliament Over Mekedatu Project", "summary": "The DMK has submitted adjournment motions in both houses of Parliament regarding the Mekedatu dam project. The party is protesting Karnataka's plan to build the dam on the Cauvery River, citing potential water shortages for Tamil Nadu far stioned whether the massive infrastructure spending by tech giants on artificial intelligence will yield immediate profitable results.", "category": "Business", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130979", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_19-07-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/130979"}], "article_id": "1c636999"}, {"headline": "New Income Tax Return forms show widening gap in complexity", "summary": "A comparison of ITR-1 (Sahaj) and ITR-2 forms for the latest assessment year reveals diverging levels of detail. While ITR-1 remains streamlined for simple income sources, ITR-2 has become more complex, requiring extensive disclosures on capital gains, foreign assets, and virtual digital assets.", "category": "Economy", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130979", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_19-07-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/130979"}], "article_id": "fd3702e3"}, {"headline": "Building a hybrid portfolio for low to moderate risk appetite", "summary": "Analysis of the ICICI Prudential Regular Savings Fund highlights the advantages of hybrid investing. By balancing equity (15-25%) with high-quality debt, the fund aims for superior risk-adjusted returns over the long term, focusing on large-cap stocks and stable income from debt instruments.", "category": "Business", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/130979", "sources": [{"newspaper": "Business Line", "pdf_filename": "Bangalore_BL_19-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130979"}], "article_id": "71ae627f"}, {"headline": "bl.portfolio Star Track Mutual Fund Ratings updated for June 2024", "summary": "The latest mutual fund ratings evaluated 488 schemes across 32 categories based on rolling returns and risk-adjusted metrics. Key upgrades i ted by a lower court to Shiv Sena corporator Ramesh Mhatre, accused of assaulting doctors at a municipal hospital in Thane district, calling the lower court's decision \"perverse\" and noting his criminal antecedents.", "category": "Law", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "970915c4"}, {"headline": "Ayodhya Ram temple donation theft creates trust crisis", "summary": "Allegations of donation theft at Ayodhya's Ram temple have triggered a crisis of trust among pilgrims and residents. While faith in Lord Ram remains, many devotees are now cautious about donating. Eight persons are accused, and ₹80 lakh cash seized, impacting local tourism.", "category": "India", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "861ed5ad"}, {"headline": "Delimitation Bill a matter of national concern: K.C. Venugopal", "summary": "Congress general secretary K.C. Venugopal stated the Constitution (131st Amendment) Bill on delimitation is a national concern, not just a party issue, as it threatens India's constitutional framework. He opposed attempts to alter federalism and democratic representation and demanded an all-party meeting.", "category": "Politics", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "77f45e7a"}, {"headline": "Panels on Ministers' removal, VBSA Bills defer meetings", "summary": "Joint Parliamentary Committees examining the Constitution Amendment Bill on Ministers' removal and the Viksit ous and stable. Wangchuk refused intravenous fluids and medications, and his wife requested discharge to a facility of her choice.", "category": "Health", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "86cefa1d"}, {"headline": "NC expels Akhoon amid Kargil CEC rotational agreement row", "summary": "The National Conference (NC) expelled Dr. Mohammad Jaffer Akhoon for six years due to \"anti-party activities\" after he refused to step down as Chief Executive Councillor of LAHDC-Kargil, violating a rotational agreement with ally Congress.", "category": "Politics", "page": 10, "importance": 4, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "da38989b"}, {"headline": "Invasive plants turn hosts for butterflies in Assam park", "summary": "A Bodoland University study in Raimona National Park found that invasive plant species like Lantana camara and Chromolaena odorata, often excluded from forest management, serve as major nectar and larval host plants for butterflies, highlighting their unexpected ecological role.", "category": "Environment", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "b355a281"}, {"headline": "Mumbai Police probing threat against Aamir Khan from Bishnoi associates", "summary": "Mumbai Police are investigating a threat issued against Bollywood actor Aamir Khan, purportedly from associates of jailed gangster Lawrence Bishnoi. The threat, circulated via social media, accused Khan of promoting 'love jihad'. No formal complaint has been lodged.", "category": "India", "page": 11, "importance": 4, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "11844817"}, {"headline": "Five injured in blast at Bengal sponge iron factory", "summary": "A furnace exploded at a sponge iron factory in Paschim Bardhaman district, West Bengal, injuring at least five workers. The blast, audible from a kilometre away, caused a fire, making rescue operations difficult.", "category": "India", "page": 11, "importance": 3, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "f25f2db0"}, {"headline": "BCI lays down social media norms for advocates, law students", "summary": "The Bar Council of India (BCI) issued strict social media guidelines, prohibiting advocates and law students from creating content that sensationalises court proceedings or ridicules judges. It also bans AI-generated images, deepfake videos, and undisclosed AI legal content.", "category": "Law", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "4b856f59"}, {"headline": "Couple, three children found dead in Raipur house", "summary": "A couple and their three minor children were found dead in their rented house in Raipur, Chhattisgarh. Preliminary investigations suggest the man poisoned his family before hanging himself; forensic analysis will confirm the cause of death.", "category": "India", "page": 11, "importance": 3, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "34f9827e"}, {"headline": "Vaishno Devi, Amarnath yatras paused for safety reviews", "summary": "Authorities in Jammu and Kashmir temporarily suspended the Amarnath and Vaishno Devi yatras from July 19 due to an inclement weather forecast issued by the IMD, citing precautionary measures to ensure pilgrim safety.", "category": "India", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "a12411c9"}, {"headline": "NMC limits routine faculty eligibility reviews for medical colleges", "summary": "The National Medical Commission (NMC) will no longer process routine requests from faculty and medical colleges for eligibility reviews for teaching positions, shifting responsibility primarily to the appointing authority. More complicated cases require a ₹25,000 fee.", "category": "Health", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "13e308b7"}, {"headline": "PNB Q1 profit surges threefold to ₹5,253 crore", "summary": "Punjab National Bank (PNB) reported over a threefold jump in standalone net profit to ₹5,253 crore for the quarter ended June 30, mainly due to a ₹3,358 crore reduction in tax payment from migrating to a new tax regime.", "category": "Business", "page": 12, "importance": 4, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "36fb8ac8"}, {"headline": "Promoters earned less from listing firms in CY26: Report", "summary": "Promoters and venture capitalists earned a lower share (84%) of total offer for sale (OFS) proceeds from stock market listings in H1 2026 (₹10,696 crore) compared to 95.5% in H1 2025. This indicates a potential shift in capital deployment.", "category": "Economy", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "ddecae67"}, {"headline": "India Inc. CSR spend up 17% to ₹40,794 cr. in FY25", "summary": "Corporate India's CSR spending rose 17% year-on-year to ₹40,794 crore in FY25, with cumulative investment reaching ₹2.61 lakh crore over a decade. The report by Fulcrum showed 72,233 projects, with Reliance Industries Ltd. as the highest spender.", "category": "Economy", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "79462080"}, {"headline": "Gujarat tops NITI Aayog's Investment Friendliness Index 2026", "summary": "Gujarat emerged as India’s leading investment destination, topping NITI Aayog’s first-ever Investment Friendliness Index 2026 with 56.6 points, ahead of Maharashtra and Tamil Nadu. The index assessed 17 major states across 84 indicators.", "category": "Economy", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "bf95af35"}, {"headline": "Skyroot faces steep climb to prove Vikram-1 commercial viability", "summary": "Following the successful orbital launch of Vikram-1, Skyroot Aerospace faces challenges in proving commercial viability in a competitive, evolving small-satellite launch market. The NEWS ANALYSIS highlights low-margin services, competition from rideshares and ISRO, and the need for international customers to sustain growth.", "category": "Technology", "page": 12, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "7c4359a1"}, {"headline": "Power grids face unexpected slow-burn threat from solar storms", "summary": "A new study in Space Weather reveals solar storms pose an unexpected \"slow-burn\" threat to power grids, which existing tools may not fully capture. It cites a 2015 geomagnetic storm in New Zealand that induced prolonged, low-level currents, potentially causing transformer overheating.", "category": "Science", "page": 13, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "82d7e14d"}, {"headline": "Surprise found in why some ancient brains don’t decay", "summary": "A new study found that in wet, low-oxygen environments, certain brain proteins bind into stable structures that resist decay, explaining the preservation of human brains in archaeological sites. These proteins are also involved in brain ageing and Alzheimer's.", "category": "Science", "page": 13, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "ab3f987a"}, {"headline": "Non-animal testing key to next phase of pharma growth", "summary": "Adopting non-animal testing models (NAMs) is crucial for India's pharmaceutical growth, enhancing drug discovery, reducing attrition, and accelerating development. Despite existing capabilities, a unified national strategy and regulatory clarity are needed to integrate NAMs and improve global competitiveness.", "category": "Health", "page": 13, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "37b28c5d"}, {"headline": "New monkey species found in Central Africa: Colobus congoensis", "summary": "A new species of African monkey, Colobus congoensis or 'Likweli', was confirmed in Lomami National Park, Central Africa. Small and black, it is distinguished by an orange-cream patch around its mouth and a white tail patch. Proposed as 'endangered'.", "category": "Science", "page": 13, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "fe641fa5"}, {"headline": "Imbalance breaks open soggy physics puzzle: reverse sprinkler", "summary": "Scientists found that a reverse lawn sprinkler, sucking fluid in, rotates opposite to a regular sprinkler. This is due to centrifugal forces creating slight asymmetry in water flow through curved arms, generating angular momentum.", "category": "Science", "page": 13, "importance": 4, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "a8c0fb61"}, {"headline": "Knowledge work in the age of agentic AI", "summary": "This article discusses how agentic AI systems, capable of pursuing goals and sequencing decisions without constant human oversight, are transforming knowledge work. It suggests that human value will shift towards defining tasks well and checking AI output, requiring judgment and contextual understanding.", "category": "Technology", "page": 13, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "33201428"}, {"headline": "Why does our body scent change distinctly as we age?", "summary": "The distinct body scent associated with ageing is primarily caused by 2-nonenal, an unsaturated aldehyde. Around 40, the body's antioxidant defenses weaken, allowing fats on the skin to break down and produce this compound, which resists standard soaps.", "category": "Science", "page": 13, "importance": 4, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "7cdd6010"}, {"headline": "How does India's newly launched hydrogen-powered train work?", "summary": "India's first hydrogen fuel cell-powered train operates on an 89-km route in Haryana, generating electricity onboard from hydrogen and oxygen. It emits only water vapour and heat. The article details its technology, refuelling process, safety features, and future plans for heritage railways.", "category": "Technology", "page": 14, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "38b3ff9f"}, {"headline": "What goals does Semicon 2.0 aim to achieve?", "summary": "Semicon 2.0, with a ₹1.27 lakh crore outlay, aims to encourage semiconductor fabrication, assembly, and packaging. It expands beyond phase 1 to cover chip design, capital machinery, chemicals, and R&D, targeting 28nm chips to boost domestic electronics manufacturing and reduce import reliance.", "category": "Technology", "page": 14, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "82e4ad10"}, {"headline": "Ahmad Vahidi, Iran's commander of asymmetric warfare", "summary": "Brigadier General Ahmad Vahidi, former IRGC spymaster and Defence Minister, now leads Iran's military response to relentless U.S. bombardment. An architect of Iran’s 'Axis of Resistance' and a proponent of asymmetric warfare, he faces his greatest test amid war and leadership changes.", "category": "World", "page": 15, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "5a943e9f"}, {"headline": "Tamil political groups launch common platform in Sri Lanka", "summary": "Prominent political parties and groups representing Sri Lanka’s Tamil-speaking ethnic minorities launched a \"common platform\" to voice shared concerns. Their specific programme focuses on a new Constitution, Provincial Council elections, and resolving land disputes for war-affected Tamils and Malaiyaha Tamils.", "category": "World", "page": 15, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "0de47400"}, {"headline": "Sonam Wangchuk: face of CJP's protest for NEET accountability", "summary": "Educationist Sonam Wangchuk, after a 21-day fast, has emerged as the face of the Cockroach Janta Party's protest in Delhi, demanding the Union Education Minister's resignation and accountability for NEET examination blunders. His health is a growing concern.", "category": "Politics", "page": 15, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "1a9a1d76"}, {"headline": "IRGC says two oil tankers explode after hitting mines in Hormuz", "summary": "Iran’s Revolutionary Guards claimed two oil tankers hit mines and exploded in the Strait of Hormuz, a claim disputed by the U.S. military. The IRGC warned sailors against entering the \"minefield\" for their safety and capital.", "category": "World", "page": 16, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "6754b8d0"}, {"headline": "Two U.S. troops dead, one missing after Iran hits Jordan base", "summary": "The U.S. military reported two troop deaths and one missing after an Iranian attack on a base in Jordan on Friday, marking the first direct Iranian fire casualties since the war's opening days. Since the war began, 16 U.S. service members have been killed.", "category": "World", "page": 16, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "43a33268"}, {"headline": "Lebanon's President Aoun departs for Washington to meet Trump", "summary": "Lebanese President Joseph Aoun left Beirut for Washington to meet Donald Trump, following talks between Lebanon and Israel in Italy. This marks the first visit by a Lebanese head of state to Washington since 2009.", "category": "World", "page": 16, "importance": 5, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "a9c39cb1"}, {"headline": "Hezbollah holds mass funeral for fighters in south Lebanon", "summary": "Hezbollah held a mass funeral in Majdal Selm, south Lebanon, for dozens of people, primarily fighters killed in recent clashes with Israel. They buried 44 individuals, including 39 fighters and four civilians.", "category": "World", "page": 16, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "9c8840f4"}, {"headline": "Iran 'suspends commitments' to interim agreement with U.S.", "summary": "Iran's Deputy Foreign Minister stated Tehran suspended its commitments to an interim deal with the U.S., citing U.S. violations. This came as U.S. and Iran exchanged strikes, with significant damage reported in Kuwait from Iranian strikes on a desalination plant and oil facility.", "category": "World", "page": 16, "importance": 8, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "b0390b15"}, {"headline": "Nine killed in Ukrainian drone attack on Russian regions", "summary": "Nine people were killed and over 80 wounded in Russia by Ukrainian drone attacks overnight and Saturday. Warehouses of online retailer Wildberries were hit, along with an oil depot in Noginsk, causing fires and evacuations.", "category": "World", "page": 16, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "e0b27629"}, {"headline": "Venezuela quake toll crosses 5,000; IMF supports relief efforts", "summary": "Twin earthquakes in Venezuela last month killed over 5,000 people, primarily in La Guaira. Interim President Delcy Rodriguez announced the country tapped $346 million from the IMF for reconstruction efforts, with 16,740 people injured.", "category": "World", "page": 16, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "6131ecab"}, {"headline": "New York Mayor Mamdani mulling Netanyahu's arrest during UN meet", "summary": "New York Mayor Zohran Mamdani is considering whether to arrest Israeli Prime Minister Benjamin Netanyahu during an upcoming UN summit, calling him a \"war criminal.\" Netanyahu's camp sharply rebuked Mamdani, who admitted uncertainty about his power to order the arrest.", "category": "World", "page": 16, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "4b3deeeb"}, {"headline": "Cuban Ambassador calls for lifting U.S. energy blockade", "summary": "Cuban Ambassador to India Juan Carlos Marsan Aguilera called for lifting the U.S. oil blockade against Cuba, stating it caused \"unprecedented suffering\" and a humanitarian crisis. He cited over 100,000 pending medical surgeries and increased infant mortality due to frequent power cuts.", "category": "World", "page": 16, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "41413155"}, {"headline": "Spain is a great team, everything worries me: Scaloni", "summary": "Argentina head coach Lionel Scaloni expressed wariness about Spain, calling them a \"great team\" and saying everything about them worries him ahead of the World Cup final. He hopes for a win but acknowledges the incredible journey regardless.", "category": "Sports", "page": 17, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "30deecfc"}, {"headline": "We will use all our 'weapons' to beat Argentina: de la Fuente", "summary": "Spain head coach Luis de la Fuente declared his team would use \"all our weapons\" to win the World Cup final against Argentina. He highlighted his team's adaptability and acknowledged Argentina's strong performance in recent years.", "category": "Sports", "page": 17, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "02a74221"}, {"headline": "This will be the most physical match: Rodri on title decider", "summary": "Spain captain Rodri anticipates the World Cup final against Argentina to be the \"most physical match.\" He noted his team's varied playstyle across games and emphasized their readiness to attack, defend, or counter.", "category": "Sports", "page": 17, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "5cd00372"}, {"headline": "I hope Yamal and Spain don't have a good game: Messi", "summary": "Argentina skipper Lionel Messi expressed admiration for Lamine Yamal but cheekily hoped Yamal and Spain wouldn't perform well in the World Cup final against Argentina. Messi acknowledged Yamal's potential to achieve something historic.", "category": "Sports", "page": 17, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "94586ebe"}, {"headline": "Sobers stood out among the greats, says Michael Holding", "summary": "Former West Indies fast bowler Michael Holding described the late Garry Sobers as outstanding even among cricket's greats, noting his humility despite impressive Test statistics (8,032 runs, 235 wickets). Holding recounted Ian Chappell calling Sobers \"the best cricketer that ever lived.\"", "category": "Sports", "page": 18, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "3e77a243"}, {"headline": "'No concerns with the way Rohit is batting': Morkel", "summary": "India bowling coach Morne Morkel defended Rohit Sharma's form, stating he has \"no worries and concerns at all\" about the premier batter. Morkel emphasized Rohit's experience and calming influence, expecting him to overcome recent struggles.", "category": "Sports", "page": 18, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "e88ca936"}, {"headline": "Joe Root an ideal role model for England team: Brook", "summary": "England captain Harry Brook praised Joe Root as an \"ideal role model\" for the team, highlighting his ability to make batting look easy and rotate strike effectively. Brook anticipated a challenging Lord's pitch requiring strong new-ball performance and strike rotation.", "category": "Sports", "page": 18, "importance": 6, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "01ce2dfd"}, {"headline": "Pogacar wins 14th stage, extends Tour de France lead", "summary": "Tadej Pogacar won the 14th stage of the Tour de France in the Vosges, extending his overall lead over Jonas Vingegaard to more than four minutes. This was Pogacar's fourth stage win in this edition.", "category": "Sports", "page": 19, "importance": 4, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 19, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "a0f54762"}, {"headline": "V.S. Rathanvel becomes India's 99th Chess Grandmaster", "summary": "V.S. Rathanvel became India's 99th Grandmaster after crossing the 2500 Elo mark at the 3rd Guwahati Smart City International Open. The Coimbatore-born player had secured three norms in 2022.", "category": "Sports", "page": 19, "importance": 4, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 19, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "150f5a25"}, {"headline": "Herbert, Burns tie Major championship record with 62s at Open", "summary": "Lucas Herbert and Sam Burns tied the Major championship record with 62s in the British Open's second round. Bryson DeChambeau received a two-shot penalty for improving his swing path. Jon Rahm also received a conduct warning.", "category": "Sports", "page": 19, "importance": 7, "telegram_url": "https://t.me/c/1877410077/130987", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 19-07-2026.pdf", "page": 19, "telegram_url": "https://t.me/c/1877410077/130987"}], "article_id": "6cdc4b41"}, {"headline": "Venue concerns addressed for World Championships: Badminton India", "summary": "The Badminton Association of India (BAI) confirmed that venue concerns, including poor air quality, cleanliness, and animal intrusions, raised during the India Open have been rectified for the upcoming World C const CAT_META = {"Politics": {"color": "#e8334a", "icon": "🏛️"}, "Economy": {"color": "#f5a623", "icon": "📊"}, "Business": {"color": "#f0c040", "icon": "💼"}, "India": {"color": "#ff7043", "icon": "🇮🇳"}, "World": {"color": "#5c9eff", "icon": "🌍"}, "Sports": {"color": "#36c46f", "icon": "🏆"}, "Science": {"color": "#a78bfa", "icon": "🔬"}, "Technology": {"color": "#38bdf8", "icon": "💻"}, "Health": {"color": "#34d399", "icon": "🏥"}, "Law": {"color": "#fb923c", "icon": "⚖️"}, "Environment": {"color": "#4ade80", "icon": "🌿"}, "Education": {"color": "#e879f9", "icon": "📚"}, "Culture": {"color": "#f472b6", "icon": "🎭"}, "Infrastructure": {"color": "#94a3b8", "icon": "🏗️"}};
const DEFAULT_META = { color: "#636e72", icon: "📰" };

// ── Safety helpers ───────────────────────────────────────────────────────
// Article text comes from Gemini's reading of the newspaper PDFs, so it is
// technically external content (e.g. "AT&T", "R&D", or worse). Escape every
// dynamic string before it goes into innerHTML.
function esc(str) {
  const d = document.createElement('div');
  d.textContent = str == null ? '' : String(str);
  return d.innerHTML;
}
function slugify(s) {
  return String(s).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '') || 'cat';
}

// ── Shared data (used by both Index and Reader) ─────────────────────────
const allArts = [...DIGEST.articles].sort((a, b) => (b.importance || 0) - (a.importance || 0));
const byCategory = {};
for (const art of allArts) {
  const c = art.category || "India";
  (byCategory[c] || (byCategory[c] = [])).push(art);
}
const sortedCats = Object.keys(byCategory).sort(
  (a, b) => (byCategory[b][0].importance || 0) - (byCategory[a][0].importance || 0)
);

// ── Screen switching ─────────────────────────────────────────────────────
const indexScreen  = document.getElementById('indexScreen');
const readerScreen = document.getElementById('readerScreen');

function showIndex() {
  readerScreen.classList.remove('active');
  indexScreen.classList.add('active');
}
function showReader() {
  indexScreen.classList.remove('active');
  readerScreen.classList.add('active');
  initHintsOnce();
}

// ── Index screen ─────────────────────────────────────────────────────────
function buildIndex() {
  const chipNav      = document.getElementById('chipNav');
  const indexList    = document.getElementById('indexList');
  const mastheadDate = document.getElementById('mastheadDate');
  const mastheadMeta = document.getElementById('mastheadMeta');
  const startBtn     = document.getElementById('startBtn');

  mastheadDate.textContent = DIGEST.date || 'Today';
  const totalArticles = DIGEST.total_articles ?? allArts.length;
  const totalPapers   = (DIGEST.newspapers || []).length;
  mastheadMeta.textContent = totalArticles
    ? `${totalArticles} article${totalArticles === 1 ? '' : 's'} · ${totalPapers} newspaper${totalPapers === 1 ? '' : 's'}`
    : 'No articles yet';

  if (!allArts.length) {
    startBtn.style.display = 'none';
  } else {
    startBtn.addEventListener('click', () => openReader(allArts[0].article_id));
  }

  chipNav.innerHTML = '';
  indexList.innerHTML = '';

  if (!sortedCats.length) {
    indexList.innerHTML =
      '<div class="empty-state">' +
        '<div class="empty-state-icon">📭</div>' +
        '<div class="empty-state-title">No articles yet</div>' +
        '<div class="empty-state-sub">Check back after the next digest run</div>' +
      '</div>';
    return;
  }

  const chips = [];
  sortedCats.forEach((cat, ci) => {
    const m    = CAT_META[cat] || DEFAULT_META;
    const arts = byCategory[cat];
    const slug = 'sec-' + slugify(cat);

    const chip = document.createElement('button');
    chip.type = 'button';
    chip.className = 'chip' + (ci === 0 ? ' active' : '');
    chip.style.setProperty('--cc', m.color);
    chip.innerHTML = `<span>${m.icon}</span><span>${esc(cat)}</span><span class="chip-count">${arts.length}</span>`;
    chip.addEventListener('click', () => {
      const sec = document.getElementById(slug);
      if (sec) sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    chipNav.appendChild(chip);
    chips.push(chip);

    const section = document.createElement('section');
    section.className = 'cat-section';
    section.id = slug;

    const head = document.createElement('div');
    head.className = 'section-head';
    head.style.setProperty('--cc', m.color);
    head.innerHTML = `<span class="sh-icon">${m.icon}</span><span class="sh-name">${esc(cat)}</span><span class="sh-count">${arts.length}</span>`;
    section.appendChild(head);

    arts.forEach(art => section.appendChild(buildRow(art, m)));
    indexList.appendChild(section);
  });

  setupChipObserver(chips);
}

function buildRow(art, m) {
  const src   = art.sources && art.sources[0];
  const extra = (art.sources && art.sources.length > 1) ? art.sources.length - 1 : 0;
  const srcLabel = src
    ? `${esc(src.newspaper || '')} · Pg ${src.page || 1}${extra ? ` <span class="row-more">+${extra} more</span>` : ''}`
    : '';
  const flame = (art.importance || 0) >= 8 ? '<span class="row-flame">🔥</span>' : '';

  const row = document.createElement('button');
  row.type = 'button';
  row.className = 'row';
  row.style.setProperty('--cc', m.color);
  row.dataset.articleId = art.article_id;
  row.innerHTML = `
    <div class="row-top">
      ${flame}
      <span class="row-source">${srcLabel}</span>
    </div>
    <div class="row-headline">${esc(art.headline)}</div>
    <div class="row-summary">${esc(art.summary)}</div>
  `;
  row.addEventListener('click', () => openReader(art.article_id));
  return row;
}

let chipObserver = null;
function setupChipObserver(chips) {
  const indexList = document.getElementById('indexList');
  const sections  = sortedCats.map(cat => document.getElementById('sec-' + slugify(cat)));
  if (chipObserver) chipObserver.disconnect();
  chipObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const idx = sections.indexOf(entry.target);
      if (idx === -1) return;
      chips.forEach(c => c.classList.remove('active'));
      chips[idx].classList.add('active');
      chips[idx].scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    });
  }, { root: indexList, rootMargin: '-10% 0px -75% 0px', threshold: 0 });
  sections.forEach(s => s && chipObserver.observe(s));
}

// ── Reader screen (swipe-based; logic unchanged from the original) ──────
let catIdx = 0, vpW = 0, vpH = 0;
const panels    = [];
const outer     = document.getElementById('outer');
const hTrack    = document.getElementById('hTrack');
const hintUp    = document.getElementById('hintUp');
const hintRight = document.getElementById('hintRight');
const catFlash  = document.getElementById('catFlash');
const cfIcon    = document.getElementById('cfIcon');
const cfName    = document.getElementById('cfName');
const backBtn   = document.getElementById('backBtn');

function buildAllReaderPanels() {
  vpW = outer.offsetWidth; vpH = outer.offsetHeight;
  hTrack.innerHTML = ''; panels.length = 0;

  sortedCats.forEach((cat, ci) => {
    const m    = CAT_META[cat] || DEFAULT_META;
    const arts = byCategory[cat];
    const panel = document.createElement('div');
    panel.className = 'cat-panel';
    panel.id = `cat-panel-${ci}`;
    panel.style.setProperty('--cc', m.color);
    panel.innerHTML = `<div class="progress-row" id="prow-${ci}" style="--cc:${m.color}"></div><div class="v-feed" id="vfeed-${ci}"><div class="v-track" id="vtrack-${ci}"></div></div>`;
    hTrack.appendChild(panel);

    const pRow   = panel.querySelector(`#prow-${ci}`);
    const vFeed  = panel.querySelector(`#vfeed-${ci}`);
    const vTrack = panel.querySelector(`#vtrack-${ci}`);
    const cardH  = vFeed.getBoundingClientRect().height || vpH;

    arts.forEach((art, ai) => {
      const card = buildCard(art, cardH, m, cat, ai);
      card.id = `article-${art.article_id}`;
      vTrack.appendChild(card);
    });

    panels.push({ pRow, vFeed, vTrack, articles: arts, artIdx: 0 });
    buildPRow(ci);
  });

  hTrack.style.transition = 'none';
  hTrack.style.transform = 'translateX(0)';
  if (panels.length) syncV(0, false);
}

function buildCard(art, h, m, cat, articleIndex) {
  const src = art.sources && art.sources[0];
  // Direct PDF link with #page=N - respected by all modern browser PDF viewers
  // when the file is opened via a link click (Chrome, Firefox, Safari, Edge).
  // Falls back to the Telegram source URL if no PDF is available.
  const href = (src && src.pdf_filename)
    ? ('pdfs/' + src.pdf_filename + '#page=' + (src.page || 1))
    : ((src && src.telegram_url) || '#');
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.articleId = art.article_id;
  card.style.height = h + 'px';
  card.style.setProperty('--cc', m.color);
  card.innerHTML = `
    <div class="card-content">
      <div class="card-toprow">
        <div class="cat-pill">
          <div class="pill-icon"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="1" y="1" width="8" height="2" rx="0.6" fill="#888"/><rect x="1" y="4.5" width="5" height="1.5" rx="0.6" fill="#666"/><rect x="1" y="7" width="6" height="1.5" rx="0.6" fill="#666"/></svg></div>
          ${esc(cat.toUpperCase())}
        </div>
        <div class="card-date">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="2.5" width="11" height="9.5" rx="1.8" stroke="#555" stroke-width="1.2"/><path d="M4.5 1v3M8.5 1v3" stroke="#555" stroke-width="1.2" stroke-linecap="round"/><path d="M1 6h11" stroke="#555" stroke-width="1.2"/></svg>
          ${esc(DIGEST.date)}
        </div>
      </div>
      <div class="card-headline">${esc(art.headline)}</div>
      <div class="card-summary">${esc(art.summary)}</div>
      <div class="card-divider"></div>
      <div class="card-footer">
        ${src ? `<a class="src-chip" href="${href}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(src.newspaper)}<span class="src-chip-sep">&middot;</span><span class="src-chip-pg">Pg ${src.page || 1}</span><span class="src-chip-ext"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M3.5 7.5L7.5 3.5M7.5 3.5H5M7.5 3.5V6" stroke="#555" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></span></a>` : '<div></div>'}
        <div class="info-btn"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6.5" stroke="#444" stroke-width="1.3"/><circle cx="7.5" cy="4.5" r="0.8" fill="#555"/><path d="M7.5 7v4" stroke="#555" stroke-width="1.5" stroke-linecap="round"/></svg></div>
      </div>
    </div>`;
  return card;
}

function buildPRow(ci) {
  const p = panels[ci], ai = p.artIdx;
  p.pRow.innerHTML = '';
  p.articles.forEach((_, i) => {
    const seg = document.createElement('div');
    seg.className = 'pseg' + (i < ai ? ' done' : i === ai ? ' active' : '');
    p.pRow.appendChild(seg);
  });
}

function syncV(ci, animated) {
  const p = panels[ci], h = p.vFeed.getBoundingClientRect().height;
  p.vTrack.style.transition = animated ? 'transform 0.35s cubic-bezier(0.4,0,0.2,1)' : 'none';
  p.vTrack.style.transform = `translateY(${-p.artIdx * h}px)`;
  buildPRow(ci);
}

// General-purpose jump: used by row taps, the Start button, and deep links.
function openReader(articleId, isDeepLink) {
  const ci = sortedCats.findIndex(cat => byCategory[cat].some(a => a.article_id === articleId));
  if (ci === -1) return;
  const ai = byCategory[sortedCats[ci]].findIndex(a => a.article_id === articleId);
  if (ai === -1) return;

  catIdx = ci;
  hTrack.style.transition = 'none';
  hTrack.style.transform = `translateX(${-ci * vpW}px)`;
  panels[ci].artIdx = ai;
  syncV(ci, false);

  showReader();
  history.replaceState(null, '', '#article-' + articleId);

  if (isDeepLink) {
    const card = document.getElementById('article-' + articleId);
    if (card) {
      card.classList.add('target-highlight');
      setTimeout(() => card.classList.remove('target-highlight'), 3000);
    }
  }
}

function closeReader() {
  showIndex();
  history.replaceState(null, '', window.location.pathname + window.location.search);
}

function goArt(d) {
  const p = panels[catIdx];
  if (!p) return;
  const n = Math.max(0, Math.min(p.artIdx + d, p.articles.length - 1));
  if (n === p.artIdx && d !== 0) return;
  p.artIdx = n; syncV(catIdx, true); dismiss();
}

function goCat(idx, animated = true) {
  idx = Math.max(0, Math.min(idx, sortedCats.length - 1));
  if (idx === catIdx && animated) return;
  const prev = catIdx; catIdx = idx;
  hTrack.style.transition = animated ? 'transform 0.38s cubic-bezier(0.4,0,0.2,1)' : 'none';
  hTrack.style.transform = `translateX(${-catIdx * vpW}px)`;
  if (animated && idx !== prev) {
    const m = CAT_META[sortedCats[idx]] || DEFAULT_META;
    catFlash.style.background = m.color + '18';
    cfIcon.textContent = m.icon; cfName.textContent = sortedCats[idx]; cfName.style.color = m.color;
    catFlash.classList.add('on'); setTimeout(() => catFlash.classList.remove('on'), 500);
  }
  dismiss();
}

let dismissed = false;
function dismiss() {
  if (dismissed) return; dismissed = true;
  hintUp.classList.remove('visible'); hintRight.classList.remove('visible');
  hintUp.classList.add('gone'); hintRight.classList.add('gone');
}

// Hints are scheduled once, the first time the reader ever opens (not on
// page load) — the parent #readerScreen sits at opacity:0 while inactive,
// so even if this timer fires while the index is showing, the hint stays
// invisible; it will simply appear next time the reader is open.
let hintsInitialized = false;
function initHintsOnce() {
  if (hintsInitialized) return;
  hintsInitialized = true;
  const KEY = 'dailyBriefHintSeen';
  try {
    if (!localStorage.getItem(KEY)) {
      localStorage.setItem(KEY, '1');
      setTimeout(() => { if (!dismissed) { hintUp.classList.add('visible'); hintRight.classList.add('visible'); } }, 2500);
    }
  } catch (e) { /* localStorage unavailable (e.g. private browsing) — skip hints */ }
}

backBtn.addEventListener('click', closeReader);

// ── Gestures — scoped to #outer, so they're automatically inert whenever
// the reader screen is inactive (pointer-events:none redirects hit-testing
// to the Index screen beneath it; no extra guard needed). ──────────────────
let tsX = 0, tsY = 0, tcX = 0, tcY = 0, axis = null, drag = false;
outer.addEventListener('touchstart', e => {
  tsX = e.touches[0].clientX; tsY = e.touches[0].clientY; tcX = 0; tcY = 0; axis = null; drag = true;
  hTrack.style.transition = 'none';
  const p = panels[catIdx]; if (p) p.vTrack.style.transition = 'none';
}, { passive: true });

outer.addEventListener('touchmove', e => {
  if (!drag) return;
  const dx = e.touches[0].clientX - tsX, dy = e.touches[0].clientY - tsY;
  tcX = dx; tcY = dy;
  if (!axis && (Math.abs(dx) > 8 || Math.abs(dy) > 8)) axis = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
  if (!axis) return;
  e.preventDefault();
  if (axis === 'h') {
    const edge = (catIdx === 0 && dx > 0) || (catIdx === sortedCats.length - 1 && dx < 0);
    hTrack.style.transform = `translateX(${-catIdx * vpW + dx * (edge ? 0.14 : 1)}px)`;
  } else {
    const p = panels[catIdx], h = p.vFeed.getBoundingClientRect().height;
    const edge = (p.artIdx === 0 && dy > 0) || (p.artIdx === p.articles.length - 1 && dy < 0);
    p.vTrack.style.transform = `translateY(${-p.artIdx * h + dy * (edge ? 0.14 : 1)}px)`;
  }
}, { passive: false });

outer.addEventListener('touchend', () => {
  if (!drag) return; drag = false;
  if (axis === 'h') {
    const t = vpW * .2;
    if (tcX < -t) goCat(catIdx + 1);
    else if (tcX > t) goCat(catIdx - 1);
    else { hTrack.style.transition = 'transform 0.3s cubic-bezier(.4,0,.2,1)'; hTrack.style.transform = `translateX(${-catIdx * vpW}px)`; }
  } else if (axis === 'v') {
    const t = vpH * .2;
    if (tcY < -t) goArt(1);
    else if (tcY > t) goArt(-1);
    else { const p = panels[catIdx], h = p.vFeed.getBoundingClientRect().height; p.vTrack.style.transition = 'transform 0.3s cubic-bezier(.4,0,.2,1)'; p.vTrack.style.transform = `translateY(${-p.artIdx * h}px)`; }
  }
  axis = null;
}, { passive: true });

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (readerScreen.classList.contains('active')) { e.preventDefault(); closeReader(); }
    return;
  }
  if (!readerScreen.classList.contains('active')) return;
  if (e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); goArt(1); }
  if (e.key === 'ArrowUp') { e.preventDefault(); goArt(-1); }
  if (e.key === 'ArrowRight') { e.preventDefault(); goCat(catIdx + 1); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); goCat(catIdx - 1); }
});

let wl = false;
outer.addEventListener('wheel', e => {
  e.preventDefault(); if (wl) return; wl = true;
  Math.abs(e.deltaX) > Math.abs(e.deltaY) ? goCat(catIdx + (e.deltaX > 0 ? 1 : -1)) : goArt(e.deltaY > 0 ? 1 : -1);
  setTimeout(() => wl = false, 500);
}, { passive: false });

window.addEventListener('resize', () => {
  vpW = outer.offsetWidth; vpH = outer.offsetHeight;
  hTrack.style.transition = 'none';
  hTrack.style.transform = `translateX(${-catIdx * vpW}px)`;
  panels.forEach(p => {
    const h = p.vFeed.getBoundingClientRect().height;
    p.vTrack.querySelectorAll('.card').forEach(c => c.style.height = h + 'px');
    p.vTrack.style.transition = 'none';
    p.vTrack.style.transform = `translateY(${-p.artIdx * h}px)`;
  });
});

// ── Init ──────────────────────────────────────────────────────────────────
// No hash → show the Index immediately. A #article-<id> hash (from a push
// notification) → skip the Index entirely and jump straight into the
// Reader once layout has settled (200ms, same as the original deep-link
// timing) so card heights are measured correctly before the jump.
function init() {
  buildIndex();
  buildAllReaderPanels();

  const hash  = window.location.hash;
  const rawId = hash.startsWith('#article-') ? hash.slice(9) : (hash ? hash.slice(1) : '');
  const target = rawId && DIGEST.articles.find(a => a.article_id === rawId);

  if (target) {
    setTimeout(() => openReader(target.article_id, true), 200);
  } else {
    showIndex();
  }
}

init();
</script>
</body>
</html>
