<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;

  background: #0c0c0c; color: #fff; touch-action: none;
}
.outer { position: fixed; inset: 0; overflow: hidden; }

.cat-panel { flex-shrink:0; width:100vw; height:100%; display:flex; flex-direction:column; overflow:hidden; }
.progress-row { flex-shrink:0; display:flex; gap:4px; padding:14px 16px 10px; background:#0c0c0c; position:relative; z-index:5; overflow:visible; }
.progress-row::after { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:80%; height:120px; background:radial-gradient(ellipse at top,color-mix(in srgb,var(--cc) 30%,transparent) 0%,transparent 70%); pointer-events:none; z-index:-1; }
.pseg { flex:1; height:2px; border-radius:1px; background:rgba(255,255,255,0.12); position:relative; overflow:hidden; }
.pseg::after { content:''; position:absolute; inset:0; background:var(--cc,#e8334a); transform:scaleX(0); transform-origin:left; transition:transform 0.25s ease; }
.pseg.done::after, .pseg.active::after { transform:scaleX(1); }
.v-feed { flex:1; overflow:hidden; position:relative; clip-path:inset(0); }

.card { width:100%; flex-shrink:0; background:#0c0c0c; display:flex; flex-direction:column; overflow:hidden; position:relative; }
.card-content { flex:1; display:flex; flex-direction:column; padding:36px 20px 22px; min-height:0; position:relative; z-index:1; }
.card-toprow { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; flex-shrink:0; }
.cat-pill { display:inline-flex; align-items:center; gap:7px; background:#1c1c1e; border-radius:8px; padding:7px 12px 7px 10px; font-size:11.5px; font-weight:700; letter-spacing:0.07em; color:#d0d0d0; text-transform:uppercase; line-height:1; }
.pill-icon { width:16px; height:16px; background:#2e2e30; border-radius:3px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.pill-icon svg { display:block; }
.card-date { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:500; color:#666; letter-spacing:0.01em; }
.card-headline { font-size:28px; font-weight:800; line-height:1.18; color:#fff; letter-spacing:-0.03em; margin-bottom:20px; flex-shrink:0; }
.card-summary { font-size:15.5px; font-weight:400; line-height:1.62; color:#6b6b6b; flex:1; overflow:hidden; display:-webkit-box; -webkit-line-clamp:7; -webkit-box-orient:vertical; }
.card-divider { height:1px; background:#1e1e1e; margin:20px 0 16px; flex-shrink:0; }

.src-chip { display:inline-flex; align-items:center; gap:6px; background:#181818; border:1px solid #282828; border-radius:9px; padding:8px 13px; font-size:12.5px; font-weight:600; color:#c0c0c0; text-decoration:none; letter-spacing:0.005em; line-height:1; }

.cat-flash { position:fixed; inset:0; z-index:600; pointer-events:none; opacity:0; transition:opacity 0.12s; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; }
.cat-flash.on { opacity:1; }
.cf-icon { font-size:34px; }
.cf-name { font-size:22px; font-weight:900; letter-spacing:-0.03em; text-transform:uppercase; }

const DIGEST   = {"date": "07 April 2026", "articles": [{"headline": "Local Car Makers Reclaim Market Share From Foreign Rivals", "summary": "Indian carmakers are reclaiming market share from foreign rivals, reaching nearly 27% in FY26. Local companies like Tata Motors and Mahindra have gained ground by responding to demand for sport utility vehicles. Annual vehicle registration data indicates local manufacturers have reached a five-year high in the world's third-largest passenger vehicle market.", "category": "Business", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119534", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_07-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119534"}]}, {"headline": "Tech Firms Reduce Hiring Pace Amid AI Implementation", "summary": "India's tech sector saw active job openings fall 8% to 110,000 in March from 119,000 in February. Companies are slowing hiring for low-value roles while focusing on high-skill strategic and digital capabilities. Recruitment has been sluggish for four consecutive quarters as firms emphasize AI-led efficiency and niche roles over entry-level staffing.", "category": "Technology", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119534", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_07-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119534"}]}, {"headline": "India Negotiates with US and Iran Over Chabahar Port", "summary": "India is engaging with both the US and Iran to secure its strategic interests in Chabahar Port. New Delhi seeks an extension of the sanctions waiver from Washington as the current one expires at the end of the month. Talks are also underway with Tehran for a long-term arrangement with a local entity to manage the port once sanctions are eventually lifted.", "category": "Politics", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/119534", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_07-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119534"}]}, {"headline": "Mistrust at Tata Trusts Over Resignations of Vice-Chairmen", "summary": "The CEO of Tata Trusts requested vice-chairmen Venu Srinivasan and Vijay Singh to resign last week, alleging material information was concealed. The trustees claim the CEO misrepresented facts to secure the resignations. Legal opinions suggest the eligibility criteria for trustees were concealed. Tata Sons chairman Ratan Tata had previously obtained legal clarity on trustee qualifications.", "category": "Business", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119534", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_07-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119534"}]}, {"headline": "PM Modi Highlights BJP Agenda and One Nation-One Poll", "summary": "On the BJP's 47th foundation day, PM Modi emphasized the party's commitment to implementing a uniform civil code and one nation-one election. He stated that the mission continues with a focus on national progress and inclusive development. Modi recounted the party's journey from its inception to the current focus on a 'Viksit Bharat' and ending political violence in various states.", "category": "Politics", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119534", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_07-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119534"}]}, {"headline": "High Court Seeks CBI Response on Kejriwal Judge Recusal", "summary": "The Delhi High Court issued a notice to the CBI on a plea by former Delhi CM Arvind Kejriwal seeking the recusal of Justice Swarana Kanta Sharma from the excise policy case. Kejriwal's application claims the judge should not hear the matter. The Solicitor General strongly objected to the recusal request, and the case will be heard again on April 13.", "category": "Politics", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119534", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_07-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119534"}]}, {"headline": "Puducherry CM Confident of Winning Second Consecutive Term", "summary": "N Rangasamy, Chief Minister of Puducherry and leader of the All India NR Congress, expressed confidence in winning enough seats to form the government again. He highlighted his government's focus on welfare programs and effective governance. Rangasamy noted that the party has run a good government for five years and remains positive about its prospects in the upcoming elections.", "category": "Politics", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/119534", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_07-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119534"}]}, {"headline": "Shah Claims Opposition Divided While NDA Remains United", "summary": "Union Home Minister Amit Shah criticized the opposition alliance in Puducherry, stating the INDIA bloc is divided with Congress and CPI(M) contesting against each other in some areas. He contrasted this with the unity of the NDA. Shah emphasized that the Puducherry government is no longer run from Delhi but is now an expression of local will, promising full statehood if elected.", "category": "Politics", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119534", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_07-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119534"}]}, {"headline": "55 Percent of Excluded Bengal Voters Still Out After Review", "summary": "The Supreme Court was informed that about 55% of the 60 lakh people excluded from West Bengal's electoral rolls still stand excluded after adjudication. Senior Advocate Kapil Sibal noted that appellate tribunals were yet to be fully operational. The bench decided not to set a deadline for the special intensive revision but left it to the appellate tribunals to follow procedures.", "category": "India", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119534", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_07-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119534"}]}, {"headline": "Bengal Migrant Workers Halt Work to Secure Voting Rights", "summary": "Migrant workers from West Bengal's Malda and Murshidabad districts are returning home in large numbers ahead of the assembly polls to ensure their names stay on the electoral rolls. Fearing they might be categorized as 'doubtful' if they don't vote, workers are prioritizing their voter IDs and Aadhaar cards over work. Contractors are now requiring proof of identity for job placement.", "category": "India", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119534", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_07-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119534"}]}, {"headline": "Telecom Operators Seek Tariff Hikes Amid Subdued Q4 Earnings", "summary": "Mobile telecom operators in India are expected to report muted earnings for the March quarter due to lack of tariff hikes and rising costs. Analysts project a tariff hike of 10-20% after the general elections to improve ARPU and sustain investment in 5G. While subscriber growth remains steady, profit margins are being squeezed by higher network-related expenses and inflation.", "category": "Business", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119534", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_07-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119534"}]}, {"headline": "SC Clears Adani Group's 14.5k-Cr Bid for JAL Assets", "summary": "The Supreme Court has cleared the way for the Adani Group's Rs 14,500-crore resolution plan for Jaiprakash Associates Ltd (JAL), rejecting a challenge by Vedanta. The court saw no reason to interfere with the NCLAT order allowing the implementation of the plan. This decision follows a long-running insolvency process and provides clarity for the creditors and the bidding process.", "category": "Business", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119534", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_07-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119534"}]}, {"headline": "Coal Ministry Monitors Stocks as Industry Demand Increases", "summary": "The coal ministry is closely monitoring stock levels at power plants as industrial demand rises. Coal India has been asked to increase supplies to the non-regulated sector, including small industries like brick kilns that have faced supply constraints. Current stocks stand at 115 million tonnes, and the government aims to ensure no shortage during the peak summer demand months.", "category": "Economy", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119534", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_07-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119534"}]}, {"headline": "Unseasonal Rains Hit Wheat Output and Quality in North", "summary": "Recent unseasonal rains and hailstorms in North India have reduced wheat output by 3-4% and hit grain quality. The industry had previously projected record production for the 2024-25 season, but the weather has led to significant losses in states like Punjab, Haryana, and Rajasthan. Flour millers expect prices to remain stable for now, though supply could tighten in the coming months.", "category": "Economy", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119534", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_07-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119534"}]}, {"headline": "Everstone Leads $150 Million Round in SaaS Firm Wingify", "summary": "Singapore-based private equity firm Everstone Capital has led a $150 million (Rs 1,250 crore) funding round for software company Wingify. The investment included contributions from existing shareholders and new investors. Wingify, founded in 2010, will use the capital to expand its product offerings and global presence. This is one of the largest cash buyouts in the Indian enterprise software sector.", "category": "Business", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119534", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_07-04-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/119534"}]}, {"headline": "US Prediction Market Platforms Eye Indian IPL Fans", "summary": "US-based prediction market platforms like Polymarket and Kalshi are gaining traction among Indian IPL fans, allowing users to bet on match outcomes and player performances. While the legality of such platforms in India remains a gray area, they are popular among urban, tech-savvy users. These platforms use source-crowded probability to set prices for various event outcomes.", "category": "Technology", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119534", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_07-04-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/119534"}]}, {"headline": "Nilekani and Varma Propose Global AI Rails for Commerce", "summary": "Nandan Nilekani and Pramod Varma are developing an open digital fabric to power global commerce using AI. The goal is to build a universal, open network that represents identity, money, and assets in a machine-readable format. This 'agentic' architecture would allow AI agents to navigate and execute transactions across borderless ecosystems, aiming for a more inclusive digital economy.", "category": "Technology", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119534", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_07-04-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/119534"}]}, {"headline": "Wipro Acquires Mindprint for $375 Million in Large Deal", "summary": "Wipro has signed an agreement to acquire Mindprint, a US-based clinical trial solution provider, for $375 million. The deal includes an $800 million committed spend over eight years. This acquisition is part of Wipro's strategy to strengthen its presence in the healthcare and life sciences sector, integrating Mindprint's specialized AI-driven solutions into its existing platform.", "category": "Business", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119534", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_07-04-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/119534"}]}, {"headline": "Govt Ties State Capital Expenditure Loans to Fiscal Discipline", "summary": "The Centre has tied Rs 1.75 lakh crore of the Rs 5 lakh crore interest-free loan for states to specific fiscal reforms. States must meet targets such as improving digital infrastructure and fiscal transparency to unlock the full funding. The scheme encourages states to undertake structural reforms while providing long-term capital for infrastructure projects and social sector spending.", "category": "Economy", "page": 7, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119534", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_07-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/119534"}]}, {"headline": "Govt to Cap Prices for ONGC's New Well Gas", "summary": "The government is considering a price cap on gas from ONGC's 'new wells' to protect consumers from high prices. The proposed cap of $12.91 per mmBtu is aimed at city gas distributors who have been facing high input costs. While this may impact ONGC's revenues, it is seen as a necessary move to keep CNG and piped natural gas affordable for households and the transport sector.", "category": "Economy", "page": 7, "importance": 9, "telegram_url": "https://t.me/c/1877410077/119534", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_07-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/119534"}]}, {"headline": "AI Chatbots Diverting Users From Websites, Brands Cry Foul", "summary": "Companies across sectors are raising concerns that AI platforms like ChatGPT are diverting users from their official websites by providing AI-generated summaries without recourse. This trend is leading to a decline in organic search traffic and potential loss of revenue. Legal experts are calling for a regulatory framework to address data scraping and ensure fair compensation for content creators.", "category": "Technology", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119534", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_07-04-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119534"}]}, {"headline": "Enterprises Raise Alarm Over AI's Growing Defence Push", "summary": "Top Indian enterprises are expressing concerns over the rapid integration of AI in defense and security systems, citing risks to data privacy and ethical standards. Nearly 40% of decision-makers worry about how AI models expose sensitive data. Companies are increasingly calling for more disciplined and risk-aware AI deployment strategies to mitigate potential security breaches and biases.", "category": "Technology", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119534", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_07-04-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119534"}]}, {"headline": "Nifty Rebounds 1 Percent as Ceasefire Hopes Calm Markets", "summary": "Indian stock markets rebounded 1% from early losses as hopes for a ceasefire in West Asia calmed investor nerves. The Nifty closed at 22,958, gaining over 200 points. The market recovery was also supported by domestic institutional buying and a relative stability in global oil prices. However, volatility remains high as the VIX index dipped slightly but stays above long-term averages.", "category": "Economy", "page": 9, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119534", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_07-04-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/119534"}]}, {"headline": "RBI Expands Oversight on Offshore Rupee Forward Markets", "summary": "The RBI is increasing its oversight of offshore non-deliverable forward (NDF) markets to curb volatility in the rupee. By restricting banks' participation and tightening norms, the central bank aims to have more control over the currency's exchange rate. The rupee has faced pressure recently, falling nearly 10% against the dollar in FY26, prompting more active intervention by the RBI.", "category": "Economy", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119534", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_07-04-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/119534"}]}, {"headline": "Auto Market Reaches Record Sales in FY26", "summary": "The Indian automobile industry recorded its highest-ever annual sales of 29.67 million units in FY26, a 13% year-on-year growth. Three-wheelers and passenger vehicles led the surge, with record-setting numbers across five of the six vehicle categories. While small cars saw muted growth, the demand for SUVs and premium models remained robust throughout the fiscal year.", "category": "Business", "page": 12, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119534", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_07-04-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/119534"}]}, {"headline": "Snack Companies Struggle to Reduce Sugar Content", "summary": "Indian snack manufacturers are finding it difficult to reduce sugar in their products as low-sugar options made up just 0.9% of total sales last year. Despite health concerns, consumers continue to prefer traditional high-sugar snacks. Companies are trying to reformulate products for better nutrition without compromising on taste, as the 'sugar-free' segment remains a niche market.", "category": "Business", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119534", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_07-04-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/119534"}]}, {"headline": "Ye's Music Festival Loses Major Sponsors Amid Controversy", "summary": "Major sponsors including Pepsi have withdrawn their support for Kanye West's (Ye) upcoming music festival in London. The move follows a series of controversial and anti-semitic remarks made by the artist. Other brands are also expected to follow suit, as the festival faces growing calls for cancellation. The backlash highlights the increasing pressure on brands to distance themselves from hate speech.", "category": "Culture", "page": 13, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119534", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_07-04-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/119534"}]}, {"headline": "Banks expected to report steady Q4 results on healthy credit growth", "summary": "Indian banks are projected to report a steady fourth quarter for FY26, driven by 13.8% year-on-year loan growth and controlled slippages. Analysts expect working capital demand and retail loans to lead growth. HDFC Bank reported a 14.4% rise in deposits, while Bank of Baroda saw a 16.23% jump in advances. Net interest income is believed to have bottomed out despite funding cost pressures.", "category": "Business", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119504", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 07-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119504"}]}, {"headline": "Godrej Consumer expects 6-9% cost surge due to commodity inflation", "summary": "Godrej Consumer Products Ltd anticipates a 6-9% rise in input costs driven by crude-linked commodity prices. The company plans to address this through pricing actions and cost efficiency programs. Despite inflationary pressure, it expects steady double-digit revenue growth. Additionally, the firm has expanded into the men's facewash market by acquiring the 'Muuchstac' brand.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119504", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 07-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119504"}]}, {"headline": "Government analyzes vehicle-level carbon emission data ahead of CAFE-3", "summary": "The Petroleum Ministry has submitted vehicle-specific carbon footprint data to the PMO as India prepares for CAFE-3 norms starting April 2027. Data shows Maruti Suzuki models generally have lower emissions than competitors in the hatchback and SUV segments. The move aims to reduce fuel consumption and enhance energy security amid global energy volatility from the West Asia conflict.", "category": "Environment", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119504", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 07-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119504"}]}, {"headline": "India's automobile retail sales hit record 2.96 crore units in FY26", "summary": "Automobile retail sales reached an all-time high of 2,96,71,064 units in FY26, a 13.3% year-on-year growth. FADA reported that two-wheelers reclaimed pre-Covid peaks with 2.14 crore units. Passenger vehicles crossed the 47-lakh mark for the first time, while tractors also hit a record high of over 10 lakh units, supported by a strong monsoon and improved farm economics.", "category": "Business", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119504", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 07-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119504"}]}, {"headline": "CNG and electric vehicles capture 26% of Indian car market", "summary": "One in four cars sold in India now runs on CNG or electric powertrains, up from 22% last year. Combined CNG and EV sales reached 12.3 lakh units in FY26. EVs alone grew their market share to 4.25% from 2.61%. Mass-market manufacturers are leading the CNG push, while hybrids have pushed the total cleaner-fuel market share to over one-third of all passenger vehicle sales.", "category": "Business", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119504", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 07-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119504"}]}, {"headline": "Nykaa targets ₹10,000 crore revenue milestone after strong Q4", "summary": "FSN E-Commerce Ventures (Nykaa) expects 27-29% revenue growth in the March quarter, its fastest in 12 quarters. The growth is fueled by a rebound in the fashion vertical and steady performance in beauty and personal care. For the full year FY26, revenue is estimated between ₹9,900-10,100 crore. The company added 26 stores in the quarter, reaching a total store count of 313.", "category": "Business", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119504", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 07-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119504"}]}, {"headline": "Drools invests ₹180 crore to enter fresh pet food segment", "summary": "Pet food company Drools is foraying into the fresh pet food market with a ₹180-crore investment in processing and packaging. It has partnered with Tetra Pak to introduce shelf-stable fresh food formats using Tetra Recart technology. India's pet food market is currently estimated at $700-900 million and is growing at an annual rate of 11-16%.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119504", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 07-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119504"}]}, {"headline": "Reliance unit buys heavy crude oil directly from Venezuela's PDVSA", "summary": "A unit of Reliance Industries has started loading a 2-million-barrel cargo of Venezuelan heavy crude bought directly from state-run PDVSA. The supertanker Helios is currently loading at the Jose terminal on Venezuela's coast and is bound for India's Sikka port. This marks a significant direct purchase after a period of restricted transactions.", "category": "Business", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119504", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 07-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119504"}]}, {"headline": "India's daily LPG production falls to 46,000 tonnes amid war", "summary": "Average daily LPG production in India has dropped to 46,000-47,000 tonnes from 50,000 tonnes in late March. The decline is partly due to shifting crude mixes and an upcoming maintenance shutdown at Nayara Energy's refinery. The government has secured 8 lakh tonnes of imports and is encouraging consumers to switch to piped natural gas to prevent domestic shortages.", "category": "Economy", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119504", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 07-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119504"}]}, {"headline": "Jaishankar discusses navigation freedom with Qatar and Iranian counterparts", "summary": "External Affairs Minister S Jaishankar spoke with Qatari and Iranian ministers to discuss regional stability and the importance of ensuring freedom of navigation in the Strait of Hormuz. Qatar emphasized the need to halt attacks on civilian infrastructure. The calls come after US President Donald Trump issued an ultimatum to Iran regarding the closure of the strategic trade route.", "category": "Politics", "page": 3, "importance": 9, "telegram_url": "https://t.me/c/1877410077/119504", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 07-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119504"}]}, {"headline": "Finance Minister warns of uncertainties in rabi fertilizer procurement", "summary": "Nirmala Sitharaman acknowledged that buying fertilizer via tenders for the rabi season faces uncertainty due to unclear pricing and logistics in West Asia. However, she assured that kharif stocks are adequate and India has sufficient fiscal space to support impacted sectors. She noted India's debt-to-GDP ratio of 81% is among the lowest in major economies.", "category": "Economy", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119504", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 07-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119504"}]}, {"headline": "Indian textiles market grows to ₹15 lakh crore in 2024", "summary": "The Indian textiles market size has reached ₹14.95 lakh crore in 2024, representing an 8.3% CAGR since 2010. Man-made fiber and blended products contribute 52.2% to the basket, while cotton-based products account for 41.2%. Demand for man-made fiber grew significantly from ₹1.47 lakh crore to ₹4.47 lakh crore during the survey period.", "category": "Business", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119504", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 07-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119504"}]}, {"headline": "West Asia conflict raises costs for Indian leather industry", "summary": "India's leather industry is facing a double blow from shipping delays and rising petroleum-based raw material costs due to the West Asia conflict. Exports worth $200 million are at risk as vessels are rerouted. Input costs for chemicals and packaging have risen by 40-60%. Production in non-leather footwear hubs has dropped by nearly 50% due to material shortages.", "category": "Business", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119504", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 07-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119504"}]}, {"headline": "Government assures adequate foodgrain stocks and directs anti-hoarding action", "summary": "The Centre clarified that buffer stocks of wheat (222 lakh tonnes) and rice (380 lakh tonnes) are nearly three times above mandatory norms. Despite disruptions in West Asia, there is no unusual volatility in essential commodity prices. States have been directed to act aggressively against hoarding and black marketing to maintain price stability for edible oils and pulses.", "category": "India", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119504", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 07-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119504"}]}, {"headline": "SEBI and CII host summit to improve boardroom governance", "summary": "At the 19th Governance Summit, SEBI Chairman Tuhin Kanta Pandey noted a 'gap in translation' of governance norms. He stated that boards must evolve from compliance-driven reviews to value-driven discussions. The regulator is tracking variations in how independent directors challenge management, especially during periods of global price shocks and market volatility.", "category": "Business", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119504", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 07-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/119504"}]}, {"headline": "Indian stock markets recover on reports of potential ceasefire", "summary": "The BSE Sensex gained 787 points to close at 74,107, while the Nifty 50 rose 255 points to end at 22,968. The recovery was driven by short covering and reports of a potential Middle East ceasefire framework. Trent, Shriram Finance, and Axis Bank were top gainers. However, foreign institutional investors offloaded shares worth ₹8,167 crore during the session.", "category": "Economy", "page": 6, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119504", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 07-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/119504"}]}, {"headline": "Bajaj Alternate receives SEBI approval for portfolio management services", "summary": "Bajaj Alternate Investment Management, a subsidiary of Bajaj Finserv, has been granted a license by SEBI to commence portfolio management services (PMS). The move allows the firm to expand its footprint in listed equities and diversify its platform beyond alternative investment funds. The company aims to provide customized solutions for discerning investors.", "category": "Business", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119504", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 07-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/119504"}]}, {"headline": "NSE to launch Dated Brent crude futures with S&P Global", "summary": "The National Stock Exchange of India will launch Dated Brent Crude Oil futures contracts on April 13. The derivatives are based on the Platts physical spot market benchmark. The initiative follows SEBI approval and aims to provide Indian market participants with efficient tools for price discovery and risk management aligned with global standards.", "category": "Business", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119504", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 07-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/119504"}]}, {"headline": "Matua community in Bengal expresses resentment over electoral roll revision", "summary": "Members of the Matua community in Thakurnagar feel politically neglected following the Special Intensive Revision (SIR) of electoral rolls. Many claim legitimate names have been deleted from the lists. The community, West Bengal's second-largest SC population, remains divided between the BJP and TMC over the implementation of the CAA and the granting of citizenship.", "category": "Politics", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119504", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 07-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/119504"}]}, {"headline": "Piyush Goyal accuses DMK of failing to implement Central schemes", "summary": "Union Minister Piyush Goyal alleged that the MK Stalin-led DMK government in Tamil Nadu has not effectively utilized central funds. He cited delays in housing schemes and irregularities in the Jal Jeevan Mission. Goyal stated that while central grants to the state have doubled, political differences are hindering welfare delivery to eligible citizens.", "category": "Politics", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119504", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 07-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/119504"}]}, {"headline": "Amit Shah conducts roadshow in Kerala ahead of elections", "summary": "Union Home Minister Amit Shah held a major roadshow in Alappuzha to bolster the BJP's presence in Kerala. He also attended the party's 47th foundation day event in Thiruvananthapuram. During the visit, Shah highlighted the dedication of party workers and criticized the state's traditional political fronts as the BJP looks to gain seats in the upcoming Assembly elections.", "category": "Politics", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119504", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 07-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/119504"}]}, {"headline": "Rahul Gandhi promises women's safety shield at Kerala election rally", "summary": "Leader of the Opposition Rahul Gandhi addressed a UDF rally in Thrissur, promising to strengthen social and healthcare systems to protect Keralites. He warned of rising prices due to global conflicts in Ukraine and Iran. Gandhi criticized both the LDF and NDA governments for 'arrogance' and highlighted high youth unemployment rates in Kerala.", "category": "Politics", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119504", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 07-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/119504"}]}, {"headline": "Vinay Muralidhar Tonse takes charge as MD and CEO of Yes Bank", "summary": "Vinay Muralidhar Tonse has officially assumed the role of Managing Director and CEO of Yes Bank for a three-year term. He succeeds Prashant Kumar, who demitted office on April 5. Tonse, a former SBI Managing Director, previously served as an Administrator for Yes Bank during its 2020 reconstruction. His appointment was approved by the bank's board earlier this year.", "category": "Business", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119504", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 07-04-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119504"}]}, {"headline": "GeM portal upgraded for multi-currency bidding and global sellers", "summary": "Government e-Marketplace (GeM) has introduced multi-currency bidding to allow international entities from FTA partner countries to participate in government procurement. GeM CEO Mihir Kumar reported that while FY26 GMV dipped 7.4% to ₹5.03 lakh crore, the portal intensified its 'price sanity' drive, removing 6,700 abnormal offer prices using AI tools.", "category": "Economy", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119504", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 07-04-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119504"}]}, {"headline": "CAIT seeks relief for MSMEs impacted by West Asia crisis", "summary": "The Confederation of All India Traders (CAIT) has urged the Finance Ministry to implement relief measures for MSMEs and small traders. The body requested loan repayment extensions, a special credit guarantee line, and interest subvention for sectors hit by rising freight and insurance costs. CAIT also recommended forming a 'West Asia Impact Assessment & Response Task Force.'", "category": "Economy", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119504", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 07-04-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119504"}]}, {"headline": "Tanishq enters gemstones segment as gold prices remain volatile", "summary": "Jewellery retailer Tanishq has launched its new 'Hues' collection featuring over 200 gemstone designs to offer affordable options amid high gold prices. CEO Arun Narayan noted that gold exchange transactions now account for over 50% of business. The company is focusing on lightweight jewellery and 14-carat formats to attract customers during the upcoming Akshaya Tritiya festival.", "category": "Business", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119504", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 07-04-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119504"}]}, {"headline": "Microsoft Catalyst VP highlights India's lead in global AI hub", "summary": "In an interview, Microsoft's Jason R. Graefe stated that India is in the leadership quadrant for AI innovation due to its talent pool and hunger for new ideas. He noted that start-ups are adopting AI faster than large enterprises by 'vibe coding' prototypes in hours. Sectors like financial services and healthcare in India are seeing rapid adoption of generative AI solutions.", "category": "Technology", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119504", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 07-04-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119504"}]}, {"headline": "Bitcoin reclaims $70,000 mark on hopes of Middle East ceasefire", "summary": "Bitcoin jumped above $70,000 for the first time in nearly two weeks as investors weighed reports of potential ceasefire negotiations in the West Asia war. The original cryptocurrency rose as much as 3.5%, while Ether gained 5.1%. The rally follows a weekend of high tension triggered by US threats of infrastructure strikes in Iran, which had previously suppressed risk sentiment.", "category": "Economy", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119504", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 07-04-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/119504"}]}, {"headline": "Oracle appoints Hilary Maxson as new Chief Financial Officer", "summary": "Oracle has named Hilary Maxson as its CFO, succeeding as the company ramps up spending on AI and cloud infrastructure. Maxson previously served as Group CFO at Schneider Electric. Her experience in energy and infrastructure management is expected to help Oracle steer its massive capital expenditure projects and manage the debt load taken on to fuel AI service demand.", "category": "Business", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119504", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 07-04-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/119504"}]}, {"headline": "Coffee exports reach record $2.13 billion in FY26", "summary": "India's coffee exports grew 17% to a record $2.136 billion in FY26, driven by higher global prices and a 4.65% increase in volume. Total export volume crossed 4.07 lakh tonnes. While shipments to West Asia have slowed due to the war, demand from Europe and the Russian Federation remains firm. Per-unit value realized by exporters rose 17% to ₹4.64 lakh per tonne.", "category": "Business", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119504", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 07-04-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/119504"}]}, {"headline": "Government may restrict sugar exports to boost ethanol blending", "summary": "The government is considering a ban on sugar exports to facilitate higher ethanol blending with petrol beyond the current 20% (E20) mandate. A report by BMI suggests this move would help control domestic prices. Sugarcane arrears totaling ₹16,918 crore remain a concern, even as oil marketing companies increase ethanol orders from sugar factories to meet green fuel targets.", "category": "Economy", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119504", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 07-04-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/119504"}]}, {"headline": "GITAM develops IoT-based sericulture model for mulberry farmers", "summary": "GITAM University and the Department of Science and Technology have developed an IoT model to help sericulture farmers improve decision-making. The system uses soil sensors and a micro-weather station to provide real-time data on crop conditions. The project aims to improve input efficiency and income stability for backward community rural mass mulberry farmers in Karnataka.", "category": "Technology", "page": 10, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119504", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 07-04-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/119504"}]}, {"headline": "Thermal coal prices jump 18% as LNG supply disruptions persist", "summary": "Thermal coal prices at Newcastle port have climbed 18% as the West Asia conflict forces Asian countries to shift from expensive LNG. Research agency BMI expects prices to rise further to $115 per tonne. Japan, Korea, and Taiwan may need an additional 2 million tonnes of coal monthly if Qatari gas exports remain blocked by the closure of the Strait of Hormuz.", "category": "Economy", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119504", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 07-04-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/119504"}]}, {"headline": "Defence Minister calls for indigenous medical trials and health security", "summary": "Rajnath Singh advocated for self-reliance in the pharmaceutical sector and indigenous clinical research during the Army Medical Corps' 262nd Raising Day. He emphasized that a nation's growth is measured by its people's health. Singh also urged the creation of medical institutions at par with Army Hospital (R&R) in all four corners of India to provide regional care for soldiers.", "category": "Health", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119504", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 07-04-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/119504"}]}, {"headline": "Government extends quality control deadline for electrical appliances by six months", "summary": "The Department for Promotion of Industry and Internal Trade has extended the implementation of mandatory quality control orders (QCO) for household electrical appliances until October 1, 2026. The move aims to allow manufacturers more time to ramp up production of induction heaters and compatible utensils as domestic demand rises due to LPG availability concerns.", "category": "Business", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119504", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 07-04-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/119504"}]}, {"headline": "Andhra Pradesh to speed up road connectivity for Bhogapuram Airport", "summary": "The Andhra Pradesh government is developing seven key roads to connect Visakhapatnam to the upcoming Bhogapuram International Airport. The greenfield project, developed by GMR Group with a ₹5,000 crore investment, is set to start operations by August. The government has acquired 2,200 acres for the project, which will initially handle 6 million passengers per year.", "category": "Infrastructure", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119504", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 07-04-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/119504"}]}, {"headline": "Amazon expands quick commerce service AmazonNow to 15 cities", "summary": "Amazon is set to expand its 10-minute delivery service, AmazonNow, to 10-15 cities while discontinuing Amazon Fresh in top urban centers. A report by UBS indicates that AmazonNow is adding two dark stores daily, approaching 450 total units. The service currently clocks 1,000-1,100 orders per dark store in Bengaluru, trailing Blinkit and Swiggy Instamart in total daily volume.", "category": "Business", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119504", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 07-04-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/119504"}]}, {"headline": "TRAI seeks views on regulatory framework for FAST streaming channels", "summary": "The Telecom Regulatory Authority of India has released a consultation paper on Free Ad-Supported Streaming Television (FAST) services. The paper addresses concerns about unregulated growth and regulatory disparity between app-based linear TV distribution and traditional operators. Stakeholders are invited to submit comments by May 4 on issues of content accountability and data practices.", "category": "Technology", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119504", "sources": [{"newspaper": "Business Line", "pdf_filename": "BL - Bangalore  - 07-04-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/119504"}]}, {"headline": "Automakers report record 30 million retail sales in FY26", "summary": "India’s automobile retail sales reached a record high in FY26, with five of six vehicle categories posting historic annual figures. Total sales neared 30 million units, a 13% increase from FY25. The growth was driven by the GST 2.0 boost. Tractors crossed the 1 million unit mark for the first time, while passenger vehicles exceeded 4.7 million units and two-wheelers hit 21.4 million.", "category": "Economy", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119547", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_07-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119547"}]}, {"headline": "Top real estate developers likely to report mixed Q4 performance", "summary": "Listed realtors expect varied pre-sales results for Q4FY26 due to launch delays and softer demand linked to West Asia tensions. Nomura analysts expect growth for Lodha, DLF, and Oberoi on a low base, but declines for Godrej Properties and Prestige Estates. Construction costs have risen 10-15%, which could compress margins by 1-2 percentage points if geopolitical uncertainty persists.", "category": "Business", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119547", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_07-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119547"}]}, {"headline": "Indian banks report rising Casa ratios in Q4 business updates", "summary": "Commercial banks, including HDFC, Axis, and Union Bank of India, reported a sequential rise in current account savings account (Casa) deposits for Jan-Mar. This shift comes after a two-year decline, as West Asia tensions drive investors toward less risky assets. While Casa ratios improved quarterly to reduce costs of funds, many remain below the levels recorded in the previous year.", "category": "Business", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119547", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_07-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119547"}]}, {"headline": "Howrah foundry belt faces production slowdown due to fuel crisis", "summary": "West Bengal's engineering hub in Howrah is struggling as the West Asia war disrupts gas supplies and shipping routes. Exports of manhole covers to the Gulf have stalled, and specialized heat treatment units have cut production by up to 80%. Rising fuel costs and shipping delays are stretching workdays thinner for the cluster's 90,000 direct and indirect employees.", "category": "Business", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119547", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_07-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119547"}]}, {"headline": "India Inc salary increments projected at 9.1% for 2026", "summary": "A Deloitte India report predicts average salary hikes will remain stable at 9.1% in 2026, slightly up from 9% in 2025. The survey indicates a shift toward a 'buyer's market' in skills, with companies focusing on productivity. Attrition marginally increased to 17.6%, while only 7% of the workforce received the highest performance rating compared to 10% in the previous year.", "category": "Economy", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119547", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_07-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119547"}]}, {"headline": "Early gold jewellery demand rises ahead of wedding season", "summary": "Titan's jewellery division reports that customers are advancing purchases to avoid future gold price spikes following the West Asia conflict. Despite high prices, Akshaya Tritiya interest remains strong, though 50% of customers are exchanging old jewellery to mitigate costs. Titan is also launching 'Hues,' a collection of 200 designs using natural gemstones to attract younger buyers.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119547", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_07-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119547"}]}, {"headline": "Nykaa expects highest quarterly revenue growth in three years", "summary": "FSN E-Commerce (Nykaa) projects its Q4FY26 consolidated net revenue to grow in the high 20% range, its best in 12 quarters. Net sales value is estimated to grow in the early 30% range. The firm also confirmed discussions to potentially acquire a stake in Deepika Padukone's skincare brand 82°E, though no final agreement has been reached. Shares rose 2.7% on the news.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119547", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_07-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119547"}]}, {"headline": "BMW India quarterly registrations edge past Mercedes-Benz", "summary": "In Q1CY26, BMW India recorded 4,944 registrations, an 11% increase, slightly overtaking Mercedes-Benz India's 4,863 units. While the luxury car market remained largely flat with 13,336 total registrations, competition is intensifying as BMW expands into emerging cities. Mercedes-Benz however maintained a slight lead in total sales for the full financial year FY26.", "category": "Business", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119547", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_07-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119547"}]}, {"headline": "D2C startups use AI to improve delivery in Tier-II cities", "summary": "Direct-to-consumer startups are seeing an 11% improvement in delivery completion rates by using AI for last-mile logistics. Velocity Shipping data shows AI helps with address verification, risk scoring, and workflow optimization in smaller markets. This intervention is helping digital-first brands mitigate higher last-mile costs and inconsistent fulfillment reliability in rural areas.", "category": "Technology", "page": 3, "importance": 4, "telegram_url": "https://t.me/c/1877410077/119547", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_07-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119547"}]}, {"headline": "Hyatt signs deal with Brigade for Bengaluru serviced apartments", "summary": "Hyatt Hotels has signed a management agreement with Brigade Group's BCV Developers for Hyatt House Bengaluru Devanahalli. The 135-room serviced apartment project is scheduled to open in 2027, targeting both extended-stay travelers and short getaways. Hyatt currently sees strong demand for hospitality in Chennai and Bengaluru, previously signing Grand Hyatt Chennai ECR.", "category": "Business", "page": 3, "importance": 4, "telegram_url": "https://t.me/c/1877410077/119547", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_07-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119547"}]}, {"headline": "Only two Indian LPG vessels remain in Strait of Hormuz", "summary": "The Indian government reported that safe transit of LPG tankers remains a priority, with the vessel 'Green Asha' recently crossing the Strait of Hormuz. Only two LPG vessels currently remain in the Persian Gulf. Overall, sixteen Indian-flagged vessels are still in the region. Refineries have postponed maintenance to maximize domestic cooking gas production during the crisis.", "category": "Infrastructure", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119547", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_07-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119547"}]}, {"headline": "Government restores 90% gas supplies to domestic fertilizer units", "summary": "The Centre has increased natural gas supplies to fertilizer plants to 90% of requirements, up from 70% earlier, ahead of the kharif planting season. Indian firms are sourcing gas from the US, Australia, and Russia as Qatari supplies remain suspended. Additionally, Indian Potash Ltd has issued a tender to import 2.5 million tonnes of urea to offset local production dips.", "category": "Economy", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119547", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_07-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119547"}]}, {"headline": "Petroleum excise duty cuts may cause Rs 1.32 trillion loss", "summary": "If recent excise duty cuts on petrol and diesel continue through FY27, the exchequer could lose Rs 1.32 trillion, nearly one-third of budget estimates. Current revisions resulted in a net loss of Rs 5,500 crore over a fortnight. While Customs duty hit is smaller at Rs 7,200 crore, the overall fiscal impact depends on how long the government maintains these West Asia war relief measures.", "category": "Economy", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119547", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_07-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119547"}]}, {"headline": "Customs duty exemptions fail to lower plastic manufacturing costs", "summary": "Plastics manufacturers say the Centre's full Customs duty exemption on petrochemical imports has not yet lowered raw material prices significantly. While PVC and PET resin prices saw minor corrections, other feedstocks remain up to 75% higher than last month due to West Asia disruptions. Small units have halted production as costs for food containers have more than doubled.", "category": "Economy", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119547", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_07-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119547"}]}, {"headline": "Kerala tourist hotspots face 80% business loss due to war", "summary": "Tourism in Thiruvananthapuram's Varkala and Kovalam regions has been hit hard by the West Asia conflict, with foreign tourist business down 70-80%. Disrupted flight routes via the Gulf and a shortage of commercial LPG have forced restaurants to switch to wood-fired cooking. Flight cancellations and high alternative airfares have deterred travelers from Russia, the UK, and Europe.", "category": "Economy", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119547", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_07-04-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/119547"}]}, {"headline": "Indian banks expected to deliver stable Q4 performance", "summary": "Banks are likely to show steady results for the final quarter of FY26, supported by 13.8% systemic credit growth and stable asset quality. Net profit for the banking sector is projected to grow 5% year-on-year. While net interest margins are expected to be range-bound, analysts are monitoring potential stress in MSME and commercial vehicle portfolios due to West Asia's economic spillovers.", "category": "Business", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119547", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_07-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/119547"}]}, {"headline": "Bank certificate of deposit issuances jump 30% to Rs 5.27 trillion", "summary": "Banks raised over Rs 5.27 trillion through certificates of deposit (CDs) in Q4FY26 as credit growth continued to outpace deposit mobilization. Outstanding CDs rose nearly 33% year-on-year. Tight system liquidity forced lenders like HDFC and PNB to use these short-term instruments at high interest rates (7.25-7.60%) to bridge funding gaps and manage balance sheets before the fiscal year-end.", "category": "Business", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119547", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_07-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/119547"}]}, {"headline": "Finance Minister flags 'dharm sankat' over small savings rates", "summary": "Finance Minister Nirmala Sitharaman highlighted the dilemma of protecting small savers' interest income while managing the government's rising cost of borrowing from the National Small Savings Fund. The government kept rates unchanged for schemes like PPF and NSC for the eighth straight quarter despite the Shyamala Gopinath panel's formula suggesting a need for alignment with market yields.", "category": "Economy", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119547", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_07-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/119547"}]}, {"headline": "Railways approves Rs 1,364 crore for Kavach safety upgrade", "summary": "Indian Railways has sanctioned projects worth Rs 1,364.45 crore to enhance safety and signaling. This includes installing the Kavach anti-collision system on 232 Southern Railway locomotives at a cost of Rs 208 crore. Additionally, over Rs 400 crore was allocated for strengthening optical fiber cable networks in the Northern Railway divisions of Ambala, Delhi, and Lucknow.", "category": "Infrastructure", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119547", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_07-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/119547"}]}, {"headline": "Odisha to auction 100,000 tonnes of surplus rice in market", "summary": "For the first time, the Odisha government will hold an open-market auction for 100,000 tonnes of surplus rice following record procurement. The state has a surplus exceeding 200,000 tonnes as paddy lifting hit a historic high of 7.34 million tonnes in the kharif season. The move follows the Centre enhancing the state's procurement target to 5.8 million tonnes for the 2024-25 season.", "category": "Economy", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119547", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_07-04-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/119547"}]}, {"headline": "BJP uses immigrant narrative to influence Assam assembly polls", "summary": "Ahead of the single-phase Assam polls on April 9, the BJP is focusing on a narrative of driving out 'infiltrators' from indigenous lands. While the party has not fielded any Muslim candidates, its ally AGP has fielded 13. The entry of JMM and TMC in the polls creates triangular contests in Upper Assam, potentially affecting the vote share in seats traditionally dominated by tea tribes.", "category": "Politics", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119547", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_07-04-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/119547"}]}, {"headline": "Jamie Dimon warns of war-driven oil and commodity price shocks", "summary": "JPMorgan Chase CEO Jamie Dimon warned that the conflict in Iran could lead to significant oil price shocks, keeping inflation 'sticky' and pushing interest rates higher than markets expect. In his annual shareholder letter, Dimon noted that while the US economy remains resilient, global supply chain reshaping and government deficit spending pose ongoing risks to economic stability.", "category": "Economy", "page": 8, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119547", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_07-04-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119547"}]}, {"headline": "OpenAI proposes public wealth fund and four-day work weeks", "summary": "OpenAI has released a set of policy recommendations to navigate the 'Intelligence Age,' including the creation of a public wealth fund to distribute cash to citizens. Other ideas include incentivizing four-day work weeks to share efficiency gains and increasing social assistance for workers displaced by AI. The document aims to serve as a starting point for discussions on AI superintelligence.", "category": "Technology", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119547", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_07-04-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119547"}]}, {"headline": "UAE's $3 billion loan repayment demand strains Pakistan's economy", "summary": "Pakistan faces economic pressure as the UAE declined to roll over a $3 billion loan, demanding repayment for the first time in seven years. The loan represents 18% of Pakistan's foreign exchange reserves, which currently stand at $16.4 billion. Analysts expect the central bank may be forced to restrict imports or raise interest rates to manage the resulting fund outflow.", "category": "World", "page": 8, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119547", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_07-04-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/119547"}]}, {"headline": "Indian equity markets rise 1% on West Asia ceasefire hopes", "summary": "The Sensex rose 787 points to 74,107 while the Nifty gained 255 points to close at 22,968 on Monday. The rally was driven by reports that regional mediators are pushing for a ceasefire between the US and Iran, causing Brent crude to ease to $105. Banking stocks led the gains following positive quarterly updates. However, analysts remain cautious as foreign investors sold Rs 8,167 crore.", "category": "Business", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119547", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_07-04-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/119547"}]}, {"headline": "Pharma stocks emerge as defensive hedge amid market volatility", "summary": "The Nifty Pharma index has fallen only 3% year-to-date compared to a 12% drop in the Nifty 50, as investors seek safety. Domestically focused firms are benefiting from a 12.4% market growth in February and rupee depreciation. However, proposed US tariffs on branded drugs and higher freight costs due to Iran tensions remain key risks for export-oriented pharmaceutical companies.", "category": "Business", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119547", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_07-04-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/119547"}]}, {"headline": "Madurai Court Awards Death Penalty to Nine Cops in Custodial Killing", "summary": "A Madurai court has sentenced nine policemen to death for the 2020 custodial torture and murder of P Jayaraj and his son J Bennix in Sathankulam. Terming it the 'rarest of rare' case, Judge G Muthukumaran also imposed a ₹1.40 crore fine. The victims were arrested for allegedly violating Covid-19 shop timing norms. One of the original 10 accused died during the trial process.", "category": "Law", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Trump Threatens Iran With Destruction as Ceasefire Deadline Approaches", "summary": "President Donald Trump warned Iran that its entire country 'can be taken out in one night' if a deal is not reached by his Tuesday 8pm ET deadline. Iran rejected a 45-day ceasefire proposal, demanding a permanent end to hostilities. Meanwhile, Israel attacked Iran’s South Pars gas field, and the US stepped up pressure to reopen the Strait of Hormuz or face attacks on civilian targets.", "category": "World", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "West Bengal to Delete 2.7 Million Voters Following Logical Discrepancy Scrutiny", "summary": "Around 45% of 6 million voters flagged under a 'logical discrepancy' category are likely to be deleted from West Bengal's electoral rolls. Chief Electoral Officer Manoj Kumar Agarwal stated deletions follow adjudication by judicial officers. Murshidabad and Malda districts show the highest discrepancy numbers. Appellate tribunals have been set up to hear appeals from rejected voters.", "category": "Politics", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Trump Threatens Jail for Journalist Over Missing Airman News Report", "summary": "US President Donald Trump has threatened to jail the journalist who first reported on US forces searching for a weapons officer shot down in Iran. Trump claimed the leak tipped off Iranian forces, endangering the officer and rescuers. He demanded the journalist reveal their sources, calling the leaker a 'sick person' and asserting that the individual will face prison time.", "category": "World", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Centre Increases Gas Allocation for Fertiliser Sector to 90 Percent", "summary": "The Union government has raised natural gas allocation for the fertiliser sector from 70% to 90% starting Monday. The supply will be drawn from domestically produced natural gas to ensure feedstock availability. This move comes as India expects two LPG cargos totaling over 62,000 tonnes this week to meet fuel demand for 332 million households despite regional supply crunches.", "category": "Economy", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Mental Health Issues Suspected After Man Breaches Delhi Assembly Security", "summary": "A man identified as Sarabjit Singh was arrested after breaching security at the Delhi Legislative Assembly. He allegedly drove through barricades, damaged iron gates, and placed a bouquet in the Speaker’s car boot before leaving. The incident lasted five minutes. Police stated Singh appears to be suffering from mental illness, though his specific motive remains under investigation.", "category": "Politics", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Centre Urges Supreme Court to Uphold Women's Entry Ban at Sabarimala", "summary": "The Union government has asked the Supreme Court to uphold age-based restrictions on women entering the Sabarimala temple, arguing the issue is a matter of religious faith beyond judicial review. The government also challenged the 2018 Joseph Shine judgment on adultery, claiming the concept of 'constitutional morality' used to strike down the law is vague and indeterminate.", "category": "Law", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Kerala Government Supports Petitioners Seeking Review of Sabarimala Order", "summary": "The Kerala government informed the Supreme Court of its support for petitioners seeking a review of the 2018 judgment that allowed women of all ages into the Sabarimala temple. Represented by senior advocate Jaideep Gupta, the state has requested time to present arguments. This marks a shift from the state's previous stance welcoming the original 2018 top court order.", "category": "Politics", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Businessman’s Son Arrested in Goa After Fatal Mini Cooper Crash", "summary": "Goa police arrested 21-year-old Darius Dias after his speeding Mini Cooper S allegedly rammed into a motorcycle in Panjim, killing 23-year-old hotel employee Diksha Parwadkar. Her colleague D Arunkumar was seriously injured. The accused, son of a local businessman, faces charges of causing death by negligence and reckless driving. Preliminary alcohol tests returned negative.", "category": "India", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Nepal Supreme Court Orders Release of Former PM KP Sharma Oli", "summary": "Nepal’s Supreme Court has ruled that the detention of former Prime Minister KP Sharma Oli and ex-home minister Ramesh Lekhak should not be extended. The duo was arrested following a deadly crackdown on demonstrations last year. The court directed authorities to complete the investigation without further extensions, clearing the way for their release later this week.", "category": "World", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Women Candidates Comprise Small Fraction of Party Lists in Five States", "summary": "An HT analysis reveals that women's representation in candidate lists for upcoming elections falls far short of the 33% quota goal. In the BJP's lists, women account for just 7% in Assam, 11.5% in West Bengal, and 14% in Kerala. While some parties claim preference for 'winnability' and caste arithmetic, activists highlight the gap between legislative support for quotas and actual fieldings.", "category": "Politics", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Karnataka Minister Defends MLA IPL Ticket Use Amid Misuse Allegations", "summary": "State Home Minister G Parameshwara dismissed allegations of IPL ticket misuse by Karnataka MLAs, stating that tickets are booked online and marked as 'non-transferable.' He clarified that only MLAs or their family members attend the matches. The statement follows Deputy CM DK Shivkumar's announcement that three tickets for RCB matches would be provided to each MLA and MP.", "category": "Politics", "page": 3, "importance": 3, "telegram_url": "https://t.me/c/1877410077/119512", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "HT-Bangalore - 07-04-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/119512"}]}, {"headline": "Karnataka Government to Hold High-Level Meet Over Auto LPG Shortage", "summary": "Food and Civil Supplies Minister KH Muniyappa has scheduled a high-level meeting for April 10 to address the auto LPG shortage and price disparity in Bengaluru. Private suppliers are reportedly charging up to ₹105 per litre compared to ₹89.52 at PSU stations. Drivers have rejected a suggestion to switch to petrol, citing sustainability issues, and warned of protests if not resolved.", "category": "Infrastructure", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/18774
