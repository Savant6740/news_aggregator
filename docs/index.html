", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "f8a06ad5"}, {"headline": "MoSPI to develop statistical tools to measure India's creative economy", "summary": "The Ministry of Statistics and Programme Implementation is preparing new tools to capture the economic contribution of intellectual property, digital content, and cultural industries. Secretary Saurabh Garg stated that the creative economy is among the fastest-growing segments of India's services-led growth, emphasizing that culture and commerce are now deeply intertwined.", "category": "Economy", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "8946159d"}, {"headline": "Indian state refiners consider fuel price hike to curb losses", "summary": "State-owned oil marketing companies may raise petrol and diesel prices by approximately ₹5 per litre to mitigate daily losses of ₹1,000 crore. The government is attempting to balance consumer needs with the financial impact of the ongoing conflict in the Persian Gulf. A sharper hike is reportedly needed to fully cover losses but may be avoided due to economic and political risks.", "category": "Economy", "page": 11, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "d0a7627a"}, {"headline": "Sebi proposes green channel for faster alternative investment fund launches", "summary": "The Securities and Exchange Board of India has proposed a green channel mechanism to allow private funds to launch schemes within 10 working days of filing. Schemes restricted to accredited investors could be launched immediately. The move aims to enable more efficient and faster deployment of capital, reducing the current time-consuming review process for alternative investment funds.", "category": "Business", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "76974920"}, {"headline": "Canara Bank reports 10% decline in Q4 standalone net profit", "summary": "State-owned Canara Bank posted a standalone net profit of ₹4,506 crore for the March quarter, down from ₹5,002.66 crore in the previous year. Total income also saw a marginal decline of 1.85%. However, asset quality showed improvement as gross non-performing assets fell to 1.84%. The bank recommended a dividend of ₹4.20 per equity share for the 2025-26 fiscal year.", "category": "Business", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "bc5b4dcf"}, {"headline": "Commerce Secretary emphasizes need for synergy between industrial policy and FTAs", "summary": "Commerce Secretary Rajesh Agarwal stated that India’s industrial policies and free trade agreements must move in tandem to leverage economic opportunities. Speaking at the CII summit, he called for all stakeholders to 'walk the talk' to build a stronger industrial ecosystem. He noted that trade agreements can only deliver results if businesses actively capitalize on the created pathways.", "category": "Business", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "b1c987d8"}, {"headline": "Indian IT companies adopt austerity measures amid West Asia crisis", "summary": "Nasscom reports that Indian technology firms are implementing prudent energy management and remote work models to navigate the ongoing West Asia tensions. Measures include optimizing campus consumption and rationalizing facility services. The industry body is monitoring the evolving situation to ensure a coordinated and responsible response to geopolitical and energy shocks.", "category": "Technology", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "324a2bb4"}, {"headline": "Indian Railways utilized 98% of FY26 budget for massive expansion", "summary": "Union Minister Ashwini Vaishnaw announced that Indian Railways used nearly its entire budget by early March, highlighting rapid project execution. He noted that 49,000km of tracks have been electrified, more than the entire German network. New corridors are being developed, including a Mumbai-Pune route that will reduce travel time to just 28 minutes, challenging airlines.", "category": "Infrastructure", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "75483fae"}, {"headline": "United Breweries targets double-digit revenue growth through premiumization in FY27", "summary": "United Breweries expects 6-7% volume growth in the next fiscal year, leading to double-digit revenue expansion. Despite inflationary pressures and supply disruptions, the company remains optimistic due to network expansion and strong consumer demand for premium products. Sales in the premium segment grew 16% in FY26, while overall market demand rose between 8% and 9%.", "category": "Business", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "39e0dd65"}, {"headline": "Afcons Infrastructure wins major Croatian rail project, entering European market", "summary": "Afcons Infrastructure has been selected for the rehabilitation and construction of a railway line in Croatia, marking its largest international order and first entry into Europe. The project demonstrates the company's ability to deliver complex infrastructure solutions globally. Afcons previously executed landmark projects such as the Chenab bridge and the Kolkata under-river tunnel.", "category": "Infrastructure", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "4efa2398"}, {"headline": "Fintech upstarts and legacy firms battle for India's MF market", "summary": "India's mutual fund industry has grown to ₹74 trillion, with SIP inflows surging to over ₹32,000 crore. The market is witnessing a fierce contest between 50+ asset management companies, including digital-first players like JioBlackRock and Zerodha. New entrants are experimenting with proprietary trading data and direct digital distribution to challenge the 56% share held by the top five firms.", "category": "Business", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "2ddec947"}, {"headline": "Bjorn Lomborg warns emission cuts could harm global food security", "summary": "Climate researcher Bjorn Lomborg argues that radical emission cuts targeting fossil fuel-based fertilizers could lead to widespread hunger. He claims artificial fertilizers currently support half the global population's calories. Lomborg suggests that economic growth and reliable energy access are far more effective at reducing hunger than aggressive climate policies that inflate farming costs.", "category": "Environment", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "af8d24bf"}, {"headline": "Editorial: Indian policy must hasten energy shift away from crude", "summary": "Following PM Modi's call to reduce fuel use, Mint’s view emphasizes that policy moves must accelerate electric mobility and shift road cargo to rail. Currently, 55% of diesel is consumed by trucks; moving this traffic to India's electrified rail network could significantly reduce oil dependence. The editorial calls for greater private participation in rail to improve efficiency and competition.", "category": "Economy", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "74893d1e"}, {"headline": "Indian youth face longer job searches as education-job mismatch grows", "summary": "Last year, 6.8 million Indians in their 20s had been job hunting for over a year, reflecting a mismatch between aspirations and available roles. In states like Kerala, graduate unemployment reached 23.6%. Experts warn that the advent of AI will shrink entry-level coding jobs, requiring young people to build expertise in integrative thinking, negotiation, and judgment rather than simple degrees.", "category": "Education", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "47560204"}, {"headline": "V. Anantha Nageswaran warns of 'unknown unknowns' in autonomous AI agents", "summary": "Chief Economic Advisor Nageswaran highlights the hazardous 'unknown unknowns' of agentic AI systems that can act autonomously. He notes that systemic failures often emerge that developers cannot predict, such as AI agents disclosing private data or entering resource-consuming loops. He argues the burden of proof should lie with deployment, requiring adversarial sandbox testing before broad use.", "category": "Technology", "page": 13, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "6a3d359f"}, {"headline": "Mihir Sharma notes disappointing private sector investment despite high profits", "summary": "Columnist Mihir Sharma discusses the stagnation of private capital formation in India, which has dropped 10 percentage points from its peak. Despite corporate tax cuts and infrastructure spending, firms are hesitant to invest. He suggests that administrative and political unpredictability may be driving wealth toward family offices abroad rather than domestic productive assets.", "category": "Economy", "page": 13, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "b184659a"}, {"headline": "Siddharth Pai warns of 'code bloat' from AI-driven 'vibe coding'", "summary": "Technology consultant Siddharth Pai explores the risks of non-technical managers using AI to create software applications. This 'vibe coding' creates digital black boxes that lack unified architecture or documentation, leading to systemic fragility. He suggests the future of Indian IT will shift from manual coding to 'forensic plumbing'—diagnosing and fixing failures in AI-generated systems.", "category": "Technology", "page": 13, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "002e8809"}, {"headline": "Investors cautioned on trade-offs of high-interest online fixed deposits", "summary": "Digital FD platforms offer higher interest rates, often from small finance banks, but users face challenges with customer support and premature withdrawals. While deposits up to ₹5 lakh are insured by the RBI, NBFC deposits carry no such cover. Advisers suggest these platforms are best for short-term goals in lower tax brackets, but emphasize that trust remains a primary factor in finance.", "category": "Business", "page": 13, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "8a25a721"}, {"headline": "Clarification on tax clearance requirements for NRIs departing India", "summary": "Non-resident Indians visiting India for purposes not connected with business or employment do not require an income-tax clearance certificate before returning abroad. For those who come to India for work and derive income locally, an undertaking must be furnished to the authorities. The provision aims to ensure all applicable taxes are paid before a person leaves the country.", "category": "Law", "page": 13, "importance": 4, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "5db32511"}, {"headline": "Hotels integrate 'soft wellness' to offer restoration without rigid routines", "summary": "A new trend of 'soft wellness' is emerging in Indian hospitality, with luxury hotels in Ladakh, Himachal, and Maharashtra offering restorative experiences without the schedules of traditional retreats. Activities include tea meditation, lakeside yoga, and forest bathing. These properties allow guests to experience well-being at their own pace, focusing on sleep, nature, and sensory attention.", "category": "Culture", "page": 14, "importance": 4, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "2a819200"}, {"headline": "Gym training for bouldering focuses on grip and pulling strength", "summary": "Bouldering is gaining popularity as an alternative to conventional weightlifting, requiring specialized gym training. Key focus areas include core stability, forearm endurance, and grip strength. Exercises like the Farmer's Walk and dead hangs are recommended to strengthen the tendons and muscles needed for technical climbing. Training with a 'talon grip' helps activate specific finger flexors.", "category": "Sports", "page": 14, "importance": 3, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "1bfeb519"}, {"headline": "Modi repeats call for reducing imports amid global turmoil", "summary": "Prime Minister Narendra Modi appealed to citizens in Vadodara to support the government's efforts against global economic disruptions by reducing import dependence. He urged the public to avoid activities involving excessive foreign exchange outflow and suggested personal restraint in consuming imported products to IE Delhi 12-05-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/123372"}], "article_id": "78fd3592"}, {"headline": "Govt: No reason to panic, follow PM’s energy pointers", "summary": "Following a call by PM Modi, the central government issued energy conservation measures to protect foreign exchange reserves and avoid fuel rationing. Steps include encouraging work-from-home, exploring solar energy, and reducing personal consumption of imported goods to maintain economic stability amid West Asia tensions and high global crude oil prices.", "category": "Politics", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123424", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_12-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123424"}], "article_id": "383414b8"}, {"headline": "SC: To expedite bail hearing, HCs can dispense with notice", "summary": "The Supreme Court stated that High Courts can dispense with the requirement of issuing notice to the state in bail pleas to speed up decisions. The court emphasized that personal liberty is a fundamental right and that the current practice of serving advance copies to the state prosecution should enable immediate hearings on the first day of filing.", "category": "Law", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123424", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_12-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123424"}], "article_id": "d40af4fc"}, {"headline": "Niti: 22% teacher crunch in Karnataka govt schools", "summary": "A Niti Aayog report reveals that nearly 22% of teaching positions in Karnataka government schools are vacant. Out of a sanctioned strength of 1,78,935 teachers across 41,088 schools, there is a shortage of 38,163 staff. The state is trailing behind Kerala and Delhi, which reported no teacher vacancies. The recruitment process for 15,000 teachers is yet to begin.", "category": "Education", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123424", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_12-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123424"}], "article_id": "9feaa7c8"}, {"headline": "Sensex tumbles 1,313 pts, rupee hits a fresh low", "summary": "The Sensex dropped 1,313 points and the Indian rupee hit an all-time low of 95.31 against the US dollar due to escalating West Asia tensions and rising crude oil prices. Foreign funds have withdrawn over Rs 8,400 crore this month, leaving investors poorer by nearly Rs 6 lakh crore as market capitalization fell sharply on Monday.", "category": "Business", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/123424", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_12-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123424"}], "article_id": "a5a93e88"}, {"headline": "Hayabusa bike at 160kmph crashes into car, 5 dead", "summary": "A high-speed motorcycle crash in Mahabubnagar involving a Suzuki Hayabusa and a sedan resulted in five deaths, including two children. Police reported the bike was traveling at approximately 160 kmph when it collided with a car performing a turn. The bike rider and four occupants of the car died, while three others were injured.", "category": "India", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123424", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_12-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123424"}], "article_id": "c95e7924"}, {"headline": "High-speed rail to disrupt aviation market: Vaishnaw", "summary": "Railway Minister Ashwini Vaishnaw stated that upcoming high-speed rail corridors, including the Hyderabad-Bengaluru route, will significantly disrupt the domestic aviation market. He noted that reducing travel time to around 2 hours for these routes will make rail travel more attractive, potentially leading to a shift where 'nobody will fly' on shorter regional air routes.", "category": "Infrastructure", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123424", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_12-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123424"}], "article_id": "77c0dbcd"}, {"headline": "SC: Show us port plan not opposed by green lobby", "summary": "The Supreme Court has asked the Gujarat government and developers to present a plan for the expansion of Pipavav port that is not opposed by environmentalists. The court emphasized that infrastructure development cannot come at the cost of the environment, specifically citing concerns about marine mammals, Olive Ridley turtles, and local mangrove ecosystems.", "category": "Law", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123424", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_12-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123424"}], "article_id": "79bdeed2"}, {"headline": "Desilting hits pause at Ulsoor Lake amid eco concerns", "summary": "The Rs 25-crore desilting and rejuvenation project at Ulsoor Lake in Bengaluru has paused due to concerns raised by environmental activists. Citizens have protested against the construction of a concrete walkway on the lake bed, arguing it destroys the natural ecosystem and damages trees. About 60% of desilting has been completed so far.", "category": "Environment", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123424", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_12-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123424"}], "article_id": "3ee3750c"}, {"headline": "Industrial borewells rise 10%, deepen groundwater worries", "summary": "Karnataka has seen a 10.3% increase in industrial borewells in 2024-25, despite overall groundwater depletion. Statistics show 37,137 industrial borewells are now active, extracting 0.2 BCM of water annually. Activists and authorities expressed concern over unregulated extraction as industries increasingly rely on private water sources due to unreliable supply.", "category": "Environment", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123424", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_12-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123424"}], "article_id": "05350edf"}, {"headline": "Wait gets longer for Cantt-Whitefield rail quadrupling project", "summary": "The deadline for the 19-km rail quadrupling project between Bengaluru Cantonment and Whitefield has been pushed to March 2027. Originally sanctioned in 2018 with an estimated cost of Rs 492 crore, the project is only 25% complete. Delays are attributed to land acquisition issues and shifting of utilities in one of the city's busiest rail corridors.", "category": "Infrastructure", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123424", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_12-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123424"}], "article_id": "6759e2b9"}, {"headline": "Chennai factory to supply 153 AC Metro-type coaches", "summary": "The Integral Coach Factory (ICF) in Chennai has been awarded a contract to supply 153 air-conditioned coaches for the Bengaluru Suburban Rail Project. The procurement, valued at Rs 1,514 crore, is part of a deal to provide rolling stock for the Chikkabanavara-Yeshwantpur section. Delivery is expected to commence by mid-2025 to meet project deadlines.", "category": "Infrastructure", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123424", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_12-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123424"}], "article_id": "37d09b81"}, {"headline": "Cong support for Vijay sours relations with TN DMK", "summary": "Political relations between the Congress in Karnataka and the DMK in Tamil Nadu have reportedly strained after Karnataka Congress leaders supported Tamil actor Vijay's political entry. While the move was aimed at local outreach, it has caused friction with the DMK, which views the actor's party as a potential rival in Tamil Nadu politics.", "category": "Politics", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123424", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_12-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123424"}], "article_id": "f2beee4a"}, {"headline": "Liquor sales in Karnataka hit 13-year April high", "summary": "Karnataka recorded its highest liquor sales for April in 13 years, with revenue reaching Rs 3,668 crore. The surge is attributed to early stocking by consumers ahead of new tax implementation and increased activity surrounding local body elections. Sales of Indian Made Foreign Liquor (IMFL) rose significantly compared to the previous year.", "category": "Economy", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123424", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_12-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123424"}], "article_id": "4d1d1c2f"}, {"headline": "Kukke Subramanya remains Karnataka’s richest temple", "summary": "Kukke Subramanya Temple in Dakshina Kannada has been declared the richest temple in Karnataka for the 15th consecutive year. The temple generated an annual income of Rs 167.8 crore in 2024-25, an increase of Rs 12 crore over the previous year. Most revenue comes from hundi collections and special rituals performed by devotees.", "category": "Culture", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123424", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_12-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123424"}], "article_id": "e0241a9f"}, {"headline": "Experts cite oversupply for distress sales of tomatoes", "summary": "A study by NABCONS indicates that tomato farmers in Karnataka are facing heavy losses due to a massive oversupply and lack of cold storage infrastructure. Post-harvest losses are as high as 13.2% in the state. Experts recommend crop diversification and better processing facilities to prevent farmers from selling produce at extremely low prices during peak seasons.", "category": "Economy", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123424", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_12-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123424"}], "article_id": "ca6141d0"}, {"headline": "Late insurance filing need not cost health claims", "summary": "Recent court rulings and IRDAI guidelines emphasize that health insurance claims should not be rejected solely due to late filing or intimation. The Mumbai High Court and Supreme Court have held that if the claim is genuine and the delay is explained reasonably, insurers must process it. Policyholders are encouraged to use internal grievance mechanisms before approaching courts.", "category": "Law", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123424", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_12-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/123424"}], "article_id": "6e6e4148"}, {"headline": "Vijay met Stalin in Chennai, rewrites political civility", "summary": "Tamil actor and leader of TVK, Vijay, met with Tamil Nadu Chief Minister M.K. Stalin in Chennai. The meeting is seen as a significant gesture of political civility, departing from the historical trend of animosity between rival political leaders in the state. Both leaders reportedly discussed various state issues and shared a warm exchange.", "category": "Politics", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123424", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_12-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/123424"}], "article_id": "e908d2d1"}, {"headline": "PM recalls Pokhran-II, says global pressure didn't bend India", "summary": "Marking the anniversary of the 1998 Pokhran-II nuclear tests, PM Modi stated that India stood firm against international pressure and sanctions. He emphasized that the tests, conducted under PM Atal Bihari Vajpayee, demonstrated India's strategic strength and self-reliance. Modi added that current policies continue to prioritize national security and scientific progress.", "category": "Politics", "page": 8, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123424", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_12-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/123424"}], "article_id": "3661e4a9"}, {"headline": "Palaniswami’s leadership claim sparks AIADMK rift", "summary": "Internal tensions in the AIADMK have escalated as rival factions challenge Edappadi K. Palaniswami’s authority as general secretary. Opposing groups have questioned his leadership after the party's recent electoral losses. The dispute has led to a vertical split in some district units, with supporters and rebels clashing over party control and legislative positions.", "category": "Politics", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123424", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_12-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/123424"}], "article_id": "3589078f"}, {"headline": "CPIM defends Pinarayi, says it’s wrong to single him out", "summary": "The CPIM state committee in Kerala defended Chief Minister Pinarayi Vijayan following the party's poor performance in the assembly polls. The leadership stated that the defeat was a collective failure and not the responsibility of a single individual. The party plans to conduct a thorough review of its campaign and organizational strategies to address the losses.", "category": "Politics", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123424", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_12-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/123424"}], "article_id": "bb3df9fc"}, {"headline": "Bangladesh border force on alert over India’s fencing plan", "summary": "Bangladesh has placed its border guards on high alert after reports that India plans to extend barbed-wire fencing in sensitive sectors of the West Bengal border. Bangladeshi officials stated they would not be intimidated by the move and would take necessary steps to protect their territorial interests. Both nations are monitoring the border situation closely.", "category": "World", "page": 9, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123424", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_12-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/123424"}], "article_id": "ff0319bf"}, {"headline": "Kuno National Park releases two more cheetahs into wild", "summary": "Two more cheetahs, both females brought from Botswana, have been released into the wild at Kuno National Park in Madhya Pradesh. This brings the total number of cheetahs in the park to nine. Authorities stated that the animals are being monitored and have shown good signs of adaptation to the Indian environment as part of the reintroduction project.", "category": "Environment", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123424", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_12-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/123424"}], "article_id": "2b3917e3"}, {"headline": "No complacency, RBI to ensure macroeconomic stability: Das", "summary": "RBI Governor Shaktikanta Das stated that India will not be complacent regarding economic reforms and will continue to prioritize macroeconomic stability. He emphasized the need for self-reliance in global supply chains and noted that the central bank is monitoring inflation and growth trends closely to maintain a resilient financial system amid global uncertainties.", "category": "Economy", "page": 11, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123424", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_12-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/123424"}], "article_id": "afea93d7"}, {"headline": "India must build its own AI models: Sarvam AI", "summary": "AI startup Sarvam AI has urged India to develop its own large-scale language models to ensure technological sovereignty and economic independence. The company argued that relying on foreign models could pose strategic risks. They highlighted that India needs significant investment in AI research and computing infrastructure to compete globally in the emerging AI landscape.", "category": "Technology", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123424", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_12-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/123424"}], "article_id": "8796cedf"}, {"headline": "Kamikaze drones built by DRDO pass crucial tests", "summary": "The DRDO has successfully developed and tested two types of kamikaze drones, or loitering munitions, for the Indian Army. These drones, designed for high-precision strikes, can carry warheads and loiter over a target area before attacking. The successful tests mark a significant step toward self-reliance in advanced drone technology for the Indian armed forces.", "category": "Technology", "page": 13, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123424", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_12-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/123424"}], "article_id": "9333cac0"}, {"headline": "Mahela says MI performance ‘not good enough’", "summary": "Mumbai Indians coach Mahela Jayawardene admitted the team's performance this season was not good enough after they were knocked out of the IPL playoff race. He stated that while the team had opportunities, they failed to execute in key moments. Jayawardene emphasized that the squad needs to regroup and address core issues to return stronger next season.", "category": "Sports", "page": 15, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123424", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_12-05-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/123424"}], "article_id": "1571b7a6"}, {"headline": "Barca clinches La Liga title with Clasico win", "summary": "Barcelona secured their 29th La Liga championship after a 2-0 victory over Real Madrid. The win gives Barca an insurmountable lead in the points table with several games left in the season. Fans celebrated across the city as the team, led by coach Hansi Flick, returned to the top of Spanish football after a gap of several years.", "category": "Sports", "page": 16, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123424", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_12-05-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/123424"}], "article_id": "b8c896b6"}, {"headline": "Ukraine, Russia fight on despite mediated ceasefire", "summary": "Reports of continued fighting between Ukrainian and Russian forces emerged despite a brief ceasefire mediated by international partners. Both sides have accused each other of violating the agreement with drone and artillery strikes along the frontline. Diplomatic observers expressed concern that the fragile truce may completely collapse without further intervention.", "category": "World", "page": 23, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123424", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_12-05-2026.pdf", "page": 23, "telegram_url": "https://t.me/c/1877410077/123424"}], "article_id": "26861bad"}, {"headline": "Google researchers: Hackers used AI to find software flaw", "summary": "Google's security team reported that a criminal hacking group used artificial intelligence to discover and exploit a zero-day vulnerability in popular software. This marks one of the first confirmed cases of generative AI being used to automate the discovery of complex security flaws. Google has since patched the vulnerability and warned of increasing AI-driven threats.", "category": "Technology", "page": 23, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123424", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_12-05-2026.pdf", "page": 23, "telegram_url": "https://t.me/c/1877410077/123424"}], "article_id": "63187625"}, {"headline": "Musk, Cook to join Trump for Xi summit", "summary": "Tech leaders Elon Musk and Tim Cook are scheduled to participate in a high-stakes summit between President Trump and Chinese President Xi Jinping at the White House. The discussions are expected to focus on trade, technology transfers, and the role of US companies in the Chinese market. The summit is seen as a critical effort to de-escalate ongoing economic tensions.", "category": "World", "page": 23, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123424", "sources": [{"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_12-05-2026.pdf", "page": 23, "telegram_url": "https://t.me/c/1877410077/123424"}], "article_id": "a6a5376a"}, {"headline": "Wingreens Farms Acquires Safe Harvest and Secures Series D Funding", "summary": "Packaged food and beverage company Wingreens has acquired Safe Harvest in a share-swap deal. Simultaneously, the firm secured approximately ₹120 crore ($12.6 million) in a Series D funding round. The move aims to strengthen its position in the sustainable food segment.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123400", "sources": [{"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123400"}], "article_id": "17f631b3"}, {"headline": "Prime Minister Lauds Bajaj Group on its 100th Anniversary", "summary": "The diversified Bajaj Group, with interests in automotive and financial services, celebrated its centenary on Monday. PM Narendra Modi congratulated the group, praising its role in nation-building through job creation, innovation, and community development over the past century.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123400", "sources": [{"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123400"}], "article_id": "75b0d729"}, {"headline": "Gautam Adani Advocates for Sovereign Artificial Intelligence Infrastructure in India", "summary": "Adani Group Chairman Gautam Adani emphasized that India must build, power, and own its own AI infrastructure rather than renting it. He announced a ₹60,000 crore commitment toward education, healthcare, and skilling, with a focus on AI integration. Adani stated that control over energy and data compute will define national power in the coming decades.", "category": "Technology", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123400", "sources": [{"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123400"}], "article_id": "c7af5d15"}, {"headline": "PVR INOX Reports ₹186 Crore Net Profit in March Quarter", "summary": "Multiplex giant PVR INOX returned to profitability in Q4FY26, posting a net profit of ₹186.4 crore compared to a loss of ₹125.3 crore a year ago. Revenue rose 25.8% to ₹1,547.3 crore. The company added 93 screens in the fiscal year and plans to continue adding 100 screens annually, focusing on southern India and asset-light models.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123400", "sources": [{"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123400"}], "article_id": "548c1df4"}, {"headline": "BSE Launches Futures and Options Contracts on Focused IT Index", "summary": "The BSE has launched derivatives on its Focused IT Index, which comprises 14 leading technology companies. This makes BSE the only Indian exchange to offer F&O for the IT sector. The launch, coinciding with National Technology Day, saw participation from 172 members and a first-day turnover of ₹148 crore.", "category": "Business", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123400", "sources": [{"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123400"}], "article_id": "1b47868e"}, {"headline": "Jewellery and Travel Stocks Plunge While Electric Vehicle Shares Rally", "summary": "PM Modi’s call for import reduction led to a sell-off in jewellery and tourism stocks, with Kalyan Jewellers falling over 9% and InterGlobe Aviation down 5%. Conversely, EV stocks like Ather Energy and JBM Auto rose by up to 6% as the government pushes for fuel conservation and reduced oil dependence.", "category": "Business", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123400", "sources": [{"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123400"}], "article_id": "ab30ee37"}, {"headline": "BofA Securities Settles Insider Trading Case with SEBI for ₹58.5 Lakh", "summary": "SEBI has settled proceedings against BofA Securities India after the merchant banker paid ₹58.5 lakh. The case involved an alleged failure to maintain a Structured Digital Database as required under the Prohibition of Insider Trading (PIT) regulations. The settlement concludes the adjudication initiated by the market regulator.", "category": "Law", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123400", "sources": [{"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123400"}], "article_id": "09a0bd7f"}, {"headline": "Northern Arc Capital Shares Jump 8% After Triple Net Profit Increase", "summary": "Northern Arc Capital shares hit a 52-week high of ₹321.70 after the NBFC reported a nearly three-fold increase in Q4 net profit to ₹139 crore. Analysts from Motilal Oswal and DAM Capital gave the stock a buy rating, citing strong interest income growth and improved asset quality with a gross NPA ratio moderating to 1.2%.", "category": "Business", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123400", "sources": [{"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123400"}], "article_id": "2915f267"}, {"headline": "SEBI Proposes Using 5% of Depository IPF Interest for Expenses", "summary": "The market regulator SEBI has proposed allowing depositories to use up to 5% of interest or income from their Investor Protection Fund (IPF) to meet administrative and statutory expenses. Currently, all expenses must be borne by the depositories from their own income, unlike the provisions applicable to stock exchanges.", "category": "Business", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123400", "sources": [{"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123400"}], "article_id": "7e55acda"}, {"headline": "UPL Profit Rises 20% to ₹1,294 Crore on Strong Demand", "summary": "Diversified agriculture company UPL Ltd reported a 20% increase in March quarter net profit, supported by better margins and higher sales in crop protection and seeds. Revenue rose 18% to ₹18,335 crore. The company is in the process of demerging into two listed entities and noted that demand in the US and Europe remains stable despite global trade tensions.", "category": "Business", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123400", "sources": [{"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/123400"}], "article_id": "9f85e20c"}, {"headline": "Tata Consumer to Invest ₹160 Crore in New Instant Tea Facility", "summary": "Tata Consumer Products is expanding its instant tea capacity with a new 2,000-tonne facility in India. CEO Sunil D’Souza stated that growth businesses now contribute nearly one-third of the India portfolio. While urban discretionary demand remains uneven, the company is focusing on premiumization and scaling innovation through acquisitions like Capital Foods.", "category": "Business", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123400", "sources": [{"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/123400"}], "article_id": "37615898"}, {"headline": "Supreme Court Refuses to Interfere in Tamil Nadu Transformer Scam Probe", "summary": "The Supreme Court declined to stay a Madras High Court order directing a CBI probe into an alleged ₹397-crore scam involving the procurement of distribution transformers. The case concerns irregularities during V Senthil Balaji's tenure as Electricity Minister between 2021 and 2023. The investigation will proceed independently of high court observations.", "category": "Law", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123400", "sources": [{"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/123400"}], "article_id": "779f77bb"}, {"headline": "SICCI Recommends Policy Revamp to New Tamil Nadu Government", "summary": "The Southern India Chamber of Commerce & Industry (SICCI) urged the new TN government to refresh industrial, MSME, and cybersecurity policies. Recommendations include establishing an export facilitation centre and focusing on emerging sectors such as green hydrogen, space technology, and drones to maintain the state's global competitiveness.", "category": "Economy", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123400", "sources": [{"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/123400"}], "article_id": "e2c16bb4"}, {"headline": "Persistent Systems Receives NCLT Approval for Arrka Merger", "summary": "IT services firm Persistent Systems announced that the National Company Law Tribunal has approved the merger of its wholly-owned subsidiary, Arrka Infosec Private Ltd, with the parent company. The company has received the certified true copy of the order from the Mumbai bench of the NCLT.", "category": "Business", "page": 9, "importance": 4, "telegram_url": "https://t.me/c/1877410077/123400", "sources": [{"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/123400"}], "article_id": "acc2c730"}, {"headline": "Paradeep Phosphates Q4 Net Profit Dips to ₹156 Crore", "summary": "Fertilizer manufacturer PPL reported a 9.63% decline in consolidated net profit for the fourth quarter, weighed down by elevated expenses. Total income for the January-March quarter rose to ₹4,701.97 crore from ₹4,193.96 crore in the previous year, according to regulatory filings.", "category": "Business", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123400", "sources": [{"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/123400"}], "article_id": "b83404e2"}, {"headline": "Crown Worldwide Plans $30 Million Total Investment in India by 2030", "summary": "Hong Kong-based logistics firm Crown Worldwide Group will double its India investment to $30 million over the next two years. The company inaugurated a new 4.5-acre facility in Coimbatore and is targeting ₹500 crore in annual revenue from India by 2030, driven by demand for document digitization and data-governance solutions from global capability centres.", "category": "Business", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123400", "sources": [{"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/123400"}], "article_id": "f899320f"}, {"headline": "Policy Push and Defense Outlay to Strengthen Thales India Operations", "summary": "Ankur Kanaglekar, Vice-President at Thales, stated that the ₹7.85 lakh crore defense allocation and proposed PLI schemes for aero components will lift India's manufacturing ecosystem. Thales plans to deepen partnerships with local industry, focusing on avionics, in-flight entertainment, and counter-drone technologies as India's MRO market targets $4 billion by 2031.", "category": "Business", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123400", "sources": [{"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/123400"}], "article_id": "193bda6e"}, {"headline": "Shailesh Chaturvedi Launches Neopolis Brands with ₹90 Crore Funding", "summary": "Fashion industry veteran Shailesh Chaturvedi has launched Neopolis Brands to bring international women’s fashion and accessory labels to India. The venture raised ₹90 crore from investors including Ashish Kacholia and Brandix Sri Lanka. The firm targets brands capable of reaching ₹500 crore in revenue with a retail footprint across 50 cities.", "category": "Business", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123400", "sources": [{"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/123400"}], "article_id": "fcd52c79"}, {"headline": "Gold Prices Reverse Course to Edge Higher Amid US-Iran Diplomacy", "summary": "Spot gold rose 0.3% to $4,730.49 per ounce after earlier falling 1%. Investors are balancing volatile developments in West Asia with upcoming US inflation data. Domestically, PM Modi’s appeal to avoid gold purchases for a year remains a concern for traders, though global prices continue to fluctuate on geopolitical news.", "category": "Economy", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123400", "sources": [{"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/123400"}], "article_id": "7e61faad"}, {"headline": "Copper Touches Three-Month Peak on Supply Shortage Worries", "summary": "Copper prices rose to $13,715 a tonne on the London Metal Exchange, their highest since January. Supply shortages outweighed concerns about lower demand resulting from the West Asia conflict. The metal has gained about 10% so far this year, though it remains below its January peak of over $14,500.", "category": "Economy", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123400", "sources": [{"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/123400"}], "article_id": "0686c6c6"}, {"headline": "Fertilizer Sales Jump 25% in April; Government Assures Ample Stocks", "summary": "Combined sales of key fertilizers urea, DAP, MOP, and complex nutrients rose to 23.59 lakh tonnes in April 2026. Despite PM Modi’s call to cut chemical fertilizer use by 50% to save foreign exchange and soil health, the government stated that stock levels currently exceed 51% of total Kharif season demand.", "category": "Economy", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123400", "sources": [{"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/123400"}], "article_id": "b8f4d0a3"}, {"headline": "Myanmar Forecasts Normal Monsoon Onset as Bay of Bengal Turns Active", "summary": "Myanmar’s met agency expects the 2026 southwest monsoon to set in between May 13 and May 22. Two low-pressure systems are threatening to develop into depressions over the Bay of Bengal. India’s IMD confirmed a low-pressure area off the north Sri Lanka coast and warned of intense rain spells across the southern peninsula in the coming week.", "category": "Environment", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123400", "sources": [{"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/123400"}], "article_id": "cc4479be"}, {"headline": "Efforts Urged to Stop Cashew Apple Wastage and Boost Value-Addition", "summary": "India produces 60 lakh tonnes of cashew apples annually, but most are wasted. Industry experts at a festival in Mangaluru called for the adoption of Brazilian models to produce non-alcoholic juices and vegan meat. Innovative packaging has already helped Kasaragod farmers improve the shelf life of zero-additive cashew apple pulp.", "category": "Business", "page": 10, "importance": 4, "telegram_url": "https://t.me/c/1877410077/123400", "sources": [{"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/123400"}], "article_id": "869a8215"}, {"headline": "Solvent Extractors’ Association Endorses Prime Minister’s Views on Edible Oil", "summary": "The SEA stated that reducing edible oil consumption is vital for long-term national interest given climate risks like El Nino and global biodiesel mandates. Landed costs of palm and soybean oil have jumped by over $80-100 a tonne due to the West Asia conflict. The association supports sacrificial consumption habits to reduce import vulnerability.", "category": "Economy", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123400", "sources": [{"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/123400"}], "article_id": "c1deec4b"}, {"headline": "UPASI Urges Centre to Maintain Current Import Duty on Natural Rubber", "summary": "The United Planters’ Association of Southern India requested the government not to lower import duties on natural rubber, citing the livelihood of 13.2 lakh growers. UPASI noted that domestic prices remain subdued and rising input costs are offsetting price gains, while compound rubber now accounts for 40% of total rubber imports.", "category": "Economy", "page": 10, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123400", "sources": [{"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/123400"}], "article_id": "36399c2c"}, {"headline": "Election Commission to Roll Out Phase III of SIR in Twenty-Two States", "summary": "The EC will launch the third phase of the Special Intensive Revision (SIR) for nearly 40 crore voters across 22 states and UTs. The rollout was previously delayed by assembly elections in states like Kerala and West Bengal. So far, the clean-up exercise has covered 60 crore voters to ensure accurate electoral rolls.", "category": "India", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123400", "sources": [{"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/123400"}], "article_id": "b32d07de"}, {"headline": "Mundka-Bakkarwala Toll Plaza in Delhi Becomes Fully Barrier-Free", "summary": "Road Transport Minister Nitin Gadkari inaugurated the second multi-lane free-flow tolling system at Delhi’s Mundka-Bakkarwala Plaza. Once implemented nationwide, the barrier-less system is expected to save the government ₹6,000 crore annually in plaza operations and provide a seamless travel experience for highway users.", "category": "Infrastructure", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123400", "sources": [{"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/123400"}], "article_id": "800ec00d"}, {"headline": "Retail Sales of Construction Equipment Decline in April", "summary": "Construction equipment sales fell 2.25% year-on-year to 6,348 units in April. Sequentially, sales were lower than the 6,906 units sold in March 2026. JCB India maintained market leadership with a 45% share. ICRA noted that while April was muted, the domestic infrastructure execution outlook remains supported by a ₹12.2 lakh crore government capital outlay.", "category": "Business", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123400", "sources": [{"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/123400"}], "article_id": "803f6b9e"}, {"headline": "Telangana Farmers’ Commission Pushes for Crop Diversification and Price Support", "summary": "The Commission recommended shifting from monocropping of paddy and cotton to pulses, oilseeds, and horticultural crops. It called for the state government to provide insurance cover and set up 'vegetable clusters' similar to those in Maharashtra. Paddy cultivation area in the state has grown four-fold since 2013, reaching 1.27 crore acres.", "category": "India", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123400", "sources": [{"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/123400"}], "article_id": "1b218786"}, {"headline": "PM Modi Urges Diaspora to Promote Statue of Unity to Foreign Families", "summary": "Addressing the diaspora in Vadodara, PM Modi encouraged Indians living abroad to motivate at least five foreign families to visit India and the Statue of Unity. He suggested Ekta Nagar as a premier hub for destination weddings and domestic tourism to help mitigate the economic dangers posed by the West Asia crisis and foreign exchange pressure.", "category": "India", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123400", "sources": [{"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/123400"}], "article_id": "c3e98107"}, {"headline": "Trackerwave Plans to Expand Location Tracking Technology in Government Hospitals", "summary": "Chennai-based Trackerwave, which builds Real-Time Location Systems (RTLS) for hospitals, targets expanding its footprint to 300 facilities. The company, which closed FY26 with ₹11 crore in revenue, sees a huge market in greenfield government hospitals for managing patient movement and medical equipment availability through centralized systems.", "category": "Technology", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123400", "sources": [{"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/123400"}], "article_id": "ed557cbd"}, {"headline": "Severe Rainfall Deficit in Kashmir Raises Fears for Paddy Yields", "summary": "Kashmir has recorded a 26% deficit in seasonal rainfall, with Kulgam witnessing a 53% drop. Farmers are concerned that drying irrigation canals will undermine paddy cultivation, which has already shrunk from 162,000 hectares in 2012 to 129,000 hectares. Many are now forced to use costly groundwater pumping systems.", "category": "Environment", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123400", "sources": [{"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/123400"}], "article_id": "8db76bf1"}, {"headline": "Akasa Air to Launch Daily Flights from Noida Airport in June", "summary": "Akasa Air will become the second airline to operate from Noida International Airport starting June 16. The carrier will provide daily connections to Bengaluru and Navi Mumbai. The airline also plans to establish a Maintenance, Repair, and Overhaul (MRO) facility within the airport premises. Commercial operations at the airport begin June 15.", "category": "Business", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123400", "sources": [{"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/123400"}], "article_id": "df31696f"}, {"headline": "Travel Body FAITH Urges Visa Easing to Attract More Foreign Tourists", "summary": "The Federation of Associations in Indian Tourism and Hospitality (FAITH) has called for simplified visa norms and increased global marketing. The body noted that India attracts only two crore foreign tourists annually and emphasized that strengthening tourism promotion could help the government's goal of conserving foreign exchange reserves.", "category": "Business", "page": 12, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123400", "sources": [{"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/123400"}], "article_id": "30cb6dbe"}, {"headline": "Rupee Hits Record Low Amidst Global Tensions and Austerity Calls", "summary": "The Indian rupee plunged to a record low of 95.31 against the US dollar, driven by the collapse of US-Iran peace talks and massive FPI outflows. Brent crude prices spiked over $100/barrel, increasing India's dollar demand. PM Modi appealed for austerity, urging reduced fuel and gold consumption to protect foreign exchange reserves.", "category": "Economy", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123443"}, {"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123400"}], "importance": 10, "article_id": "ff3223bb"}, {"headline": "Alphabet Plans First Yen Bonds to Fund AI Infrastructure Expansion", "summary": "Google parent Alphabet plans its first yen-denominated bond issuance, expected to total several hundred billion yen, to fund its artificial intelligence infrastructure. This reflects a growing trend of tech giants tapping debt markets to finance the substantial capital and power demands of AI development.", "category": "Technology", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123443"}, {"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123410"}], "importance": 6, "article_id": "996dc8d8"}, {"headline": "Three Arrested in Murder of Suvendu Adhikari's Aide", "summary": "West Bengal Police arrested three individuals from Uttar Pradesh and Bihar in connection with the murder of Chandranath Rath, personal assistant to Suvendu Adhikari. A suspected contract killer is among the arrestees, and investigators believe at least eight people were involved.", "category": "Politics", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123443"}, {"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 12-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123462"}], "importance": 6, "article_id": "d5073253"}, {"headline": "NEET 'Guess Paper' Investigation: 410 Questions Under Scanner", "summary": "Rajasthan Police are probing claims that a 410-question 'guess paper' circulated before the NEET exam contained 120 identical Chemistry questions. Twelve individuals are being interrogated across districts as authorities verify cheating allegations.", "category": "Education", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123443"}, {"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 12-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123462"}], "importance": 7, "article_id": "64a03f48"}, {"headline": "Former Minister Sujit Bose Arrested in Civic Body Recruitment Scam", "summary": "The Enforcement Directorate arrested former West Bengal minister Sujit Bose in connection with a civic body recruitment scam. Accused of corruption in recruitments between 2014-2018, Bose was taken into custody under the Prevention of Money Laundering Act.", "category": "Law", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123443"}, {"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 12-05.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/123462"}], "importance": 6, "article_id": "0defe14c"}, {"headline": "Manoj Agarwal Appointed West Bengal Chief Secretary; Cabinet Portfolios Assigned", "summary": "Manoj Agarwal, former Chief Electoral Officer, is the new Chief Secretary of West Bengal. The cabinet also assigned portfolios: Dilip Ghosh (Rural Development), Agnimitra Paul (Women & Child Welfare), and Nishit Pramanik (North Bengal Development).", "category": "Politics", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123443"}, {"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 12-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123462"}, {"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 12~05~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/123401"}, {"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_12-05-2026.pdf", "page": 24, "telegram_url": "https://t.me/c/1877410077/123424"}, {"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/123400"}], "importance": 8, "article_id": "c7adf882"}, {"headline": "New Bengal Govt Approves BSF Land Transfer for Border Fencing", "summary": "In its first cabinet meeting, the new West Bengal government approved land transfer to the BSF for border fencing. The cabinet also greenlit the Ayushman Bharat scheme and initiated census operations, aiming to curb infiltration and improve public health.", "category": "Politics", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123443"}, {"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 12-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123462"}, {"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 12~05~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/123401"}, {"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/123400"}], "importance": 9, "article_id": "911ed8eb"}, {"headline": "Himanta Biswa Sarma Takes Oath as Assam Chief Minister for Second Term", "summary": "Himanta Biswa Sarma was sworn in as Assam Chief Minister for a second consecutive term, leading a five-member cabinet. Ranjeet Kumar Dass was named NDA's candidate for Speaker of the state Assembly.", "category": "Politics", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123443"}, {"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_12-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123424"}], "importance": 7, "article_id": "644ce6f1"}, {"headline": "Bengal Suburban Rail Project Orders 153 AC Coaches for ₹1,514 Crore", "summary": "Bi-RIDE has ordered 153 air-conditioned coaches from ICF for Corridors 2 & 4 of the Bengaluru Suburban Rail Project. The ₹1,514 crore deal includes deliveries within 18 months for a targeted inauguration.", "category": "Infrastructure", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123443"}, {"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 12-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123462"}], "importance": 7, "article_id": "d99879a2"}, {"headline": "PM Modi to Visit Norway for Energy and Maritime Deal Talks", "summary": "PM Modi will visit Norway, the first by an Indian PM in 43 years, for LPG supply deals and maritime partnerships. He will also attend the India-Nordic summit in Oslo to discuss climate and energy cooperation.", "category": "Politics", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123443"}, {"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 12-05.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/123462"}], "importance": 8, "article_id": "455b4bca"}, {"headline": "Toyota to Invest ₹20,000 Crore in New Maharashtra Plant by 2029", "summary": "Toyota Kirloskar Motor plans a new greenfield plant in Maharashtra's Bidkin Industrial Area with an initial investment of ₹20,000 crore. Production for a new SUV is slated for early 2029, adding one lakh annual capacity.", "category": "Business", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123443"}, {"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/123410"}, {"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123400"}], "importance": 8, "article_id": "a5ba770c"}, {"headline": "Trump Rejects Iran Peace Proposal, Crude Oil Prices Surge", "summary": "US President Donald Trump rejected Iran's peace proposal, calling it 'unacceptable,' causing Brent crude to surge over $104/barrel amid fears of prolonged conflict. Global markets reacted sharply to the stalled diplomatic efforts.", "category": "World", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/123443"}, {"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_12-05-2026.pdf", "page": 23, "telegram_url": "https://t.me/c/1877410077/123424"}, {"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/123400"}], "importance": 10, "article_id": "3424e4ae"}, {"headline": "Hantavirus Outbreak on Cruise Ship; Indian Crew Evacuated", "summary": "Two Indian crew members from the MV Hondius cruise ship tested positive for hantavirus, with three deaths reported. Evacuees are quarantined, and authorities confirm a low risk of human-to-human transmission, with extensive contact tracing underway.", "category": "Health", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/123443"}, {"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_12-05-2026.pdf", "page": 23, "telegram_url": "https://t.me/c/1877410077/123424"}, {"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/123400"}], "importance": 8, "article_id": "fc666c52"}, {"headline": "Sebi Proposes 'Green Channel' to Speed Up AIF Fundraising", "summary": "Sebi proposed a 'green channel' mechanism for Alternative Investment Funds (AIFs), aiming to reduce fundraising timelines from 30 to 10 days by relying on disclosures and undertakings, accelerating capital deployment.", "category": "Economy", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/123443"}, {"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123400"}], "importance": 7, "article_id": "15cc162e"}, {"headline": "Groww Early Investors to Sell Stake Worth ₹4,750 Crore", "summary": "Peak XV Partners, Sequoia Capital, and Y Combinator-affiliated entities plan to sell a 4.3% stake in Groww's parent company via a block deal worth ₹4,750 crore, with a floor price of ₹177 per share.", "category": "Business", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/123443"}, {"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123410"}, {"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123400"}], "importance": 7, "article_id": "f529081c"}, {"headline": "Canara Bank Q4 Profit Drops 10% on Treasury Losses; Full Year Up", "summary": "Canara Bank reported a 10% Q4 net profit decline to ₹4,506 crore due to treasury losses, though full-year profit rose 12.7%. Global business grew 12.11%, and domestic deposits increased nearly 8%.", "category": "Business", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/123443"}, {"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/123400"}], "importance": 7, "article_id": "062ade60"}, {"headline": "Shaktikanta Das Urges India Inc to Build Resilience Amid Global Volatility", "summary": "Principal Secretary Shaktikanta Das advised Indian firms to diversify supply chains, strengthen balance sheets, and invest in R&D to build resilience against global shocks. He outlined seven strategies for long-term economic strength.", "category": "Economy", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/123443"}, {"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/123410"}, {"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 12~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123401"}, {"newspaper": "Business Line", "pdf_filename": "TH BL Delhi 12~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123400"}], "importance": 8, "article_id": "242a81ab"}, {"headline": "India to Shrink Nuclear Reactor Exclusion Zones for Expansion Plans", "summary": "The Department of Atomic Energy plans to halve land requirements for nuclear reactor expansions by reducing exclusion zones, aiming to attract private investment and reach 100 GW nuclear capacity by 2047.", "category": "Infrastructure", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/123443"}, {"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123410"}], "importance": 8, "article_id": "81a2f70a"}, {"headline": "NCW Reports Pervasive Sexual Harassment at TCS Nashik Unit", "summary": "The National Commission for Women found 'systemic bullying' and zero POSH Act compliance at TCS Nashik. TCS plans to contest the findings, while the NCW recommended action under the Bharatiya Nyaya Sanhita.", "category": "Business", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/123443"}, {"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 12-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123462"}, {"newspaper": "Times of India", "pdf_filename": "TOI_Bangalore_12-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/123424"}], "importance": 8, "article_id": "bb33b3f2"}, {"headline": "PVR Inox Swings to Profit on Strong Content and Screen Expansion", "summary": "PVR Inox reported a ₹186 crore net profit in Q4FY26, a turnaround from last year's loss, driven by successful films and adding 93 screens. Revenue grew 25.8% to ₹1,547.3 crore.", "category": "Business", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/123443"}, {"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/123410"}, {"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 12~05~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123401"}], "importance": 6, "article_id": "06c5fc3f"}, {"headline": "PM Modi Calls for National Austerity Amid Global Economic Pressures", "summary": "Prime M
