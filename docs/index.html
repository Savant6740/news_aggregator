mbledon are striving to achieve perfection despite successful seasons. They aim to refine their game, overcome minor weaknesses, and secure Grand Slam titles with flawless performances.", "category": "Sports", "page": 10, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128663", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_28-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/128663"}], "article_id": "9ae09bc2"}, {"headline": "Iran says U.S. violated peace deal, both sides trade fire", "summary": "Iran accused the U.S. of violating their peace deal to end the war after Washington launched strikes on Iranian territory, and Tehran responded with attacks on U.S. targets in the Gulf. This exchange of fire, following a U.S. accusation of an attack on a cargo ship, casts doubt on efforts to keep the Strait of Hormuz open amid negotiations. Iran called U.S. strikes a 'blatant violation' and warned of broader response.", "category": "World", "page": 13, "importance": 10, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "239b0417"}, {"headline": "Maharashtra TET postponed over alleged paper leak", "summary": "The Maharashtra government postponed the Teacher Eligibility Test (TET) 2026 due to alleged 'paper leak' discovered by Bhiwandi Police, impacting six lakh candidates. This decision was made to ensure exam transparency. Opposition criticized the government, demanding a thorough probe. New dates will be announced later; no re-registration fee for existing candidates. Deputy CM Shinde called for MCOCA charges against the accused.", "category": "Education", "page": 6, "importance": 8, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "577bd688"}, {"headline": "Screenplay maestro K. Bhagyaraj passes away at 73", "summary": "Renowned Tamil actor, director, writer, and screenwriter K. Bhagyaraj died on Saturday at 73 from a massive heart attack. Known for his mastery over screenplay and creating relatable characters in hits like 'Mounageethangal' and 'Antha Ezhu Naatkal', he redefined the Tamil film hero. His funeral will be held on Sunday with State honours. He also ventured into politics and authored novels.", "category": "Culture", "page": 6, "importance": 8, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "2ccd1301"}, {"headline": "BJP-ruled States question rural job scheme financial burden", "summary": "Bihar and Madhya Pradesh, along with Jharkhand, have raised concerns over the increased financial burden under the Viksit Bharat-Guarantee for Rozgar and Aajeevika Mission (Gramin) (VB-G RAM G), effective July 1. States must bear 40% of expenditure, unlike the 100% Centre-funded MGNREGA. Bihar estimates a ₹15,939 crore burden for 125 work days, with the interim allocation only covering 41 days.", "category": "Economy", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "14ec36ac"}, {"headline": "Elephant conservation aids forests in carbon storage", "summary": "A new study reveals that protecting Asiatic elephants indirectly helps safeguard India’s forests, which act as powerful carbon stores. The research found that increased elephant reserves led to a 38% rise in carbon storage, primarily through enhanced forest protection. However, it warns that merely declaring reserves isn't enough; improving habitat quality and wildlife corridors is crucial for long-term carbon stabilization and biodiversity.", "category": "Environment", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "94035ba5"}, {"headline": "Fake patents poison India’s academic excellence race", "summary": "A new trend of 'fake patents' is raising concerns, with firms selling U.K. design registrations to Indian academics to artificially boost institutional rankings. These registrations, often granted in 11 days without novelty checks, are misrepresented as international patents. Experts warn this unethical practice, fueled by quantitative ranking metrics, undermines research integrity. Calls are made to curb this menace by stopping rankings based solely on quantitative data.", "category": "Science", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "28a0184e"}, {"headline": "FCRA amendment changes NGO foreign donation rules", "summary": "The Union Ministry of Home Affairs notified the Foreign Contribution (Regulation) Amendment Rules, 2026, marking the tenth amendment since 2011. The rules impose stricter scrutiny on foreign donations to NGOs, requiring them to disclose social media accounts, websites, and publications. New regulations also mandate specifying the purpose and geographical scope of activities, imposing higher registration fees for multi-sector/region operations, and setting penalties for violations.", "category": "Law", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "ae294677"}, {"headline": "India meets Australia, needs a win to make it to the semifinal", "summary": "India faces high-flying Australia in the last league match of the T20 World Cup, needing a must-win to secure a semifinal spot, with South Africa expected to beat Bangladesh. Australia, with a superior Net Run Rate, is almost certain to advance. India seeks to avenge previous whitewashes by the Australians, emphasizing aggressive play and strong opening partnerships from Mandhana and Shafali Verma.", "category": "Sports", "page": 14, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "92ea2da6"}, {"headline": "Manipur Naga body seeks PM’s help in ending ‘proxy war’", "summary": "The United Naga Council (UNC), representing 21 Naga tribes in Manipur, has urged PM Narendra Modi to intervene in the state's deteriorating situation, particularly in Naga areas. The UNC alleges a 'proxy war' by armed Kuki extremist groups, violating the 2015 Framework Agreement and threatening India's frontier security. They demand a court-monitored probe into the abduction and killing of six Naga civilians, reflecting distrust in state/union governments.", "category": "India", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "24b4112f"}, {"headline": "Miles of roads, missing walkways derailed by design", "summary": "Hyderabad's pedestrian infrastructure is critically lacking, despite a Supreme Court ruling affirming the 'right to walk'. Decades of vehicle-centric planning have left only 430 km of usable footpaths out of a required 1,600 km, many encroached or broken. This forces pedestrians into traffic, contributing to 30-40% of road fatalities. The city's focus on wide roads and flyovers, instead of public transport and pedestrian amenities, needs a fundamental rethink to improve urban mobility and safety.", "category": "Infrastructure", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "152699de"}, {"headline": "Cong.’s Karan Singh bats for Statehood to Kashmir", "summary": "Veteran Congress leader and former Jammu and Kashmir 'Sadr-e-Riyasat' Karan Singh advocated for the restoration of statehood to the Union Territory, stating that the people should not have to 'beg' the Centre for it. He highlighted that J&K was once the biggest state and the government had promised its restoration.", "category": "Politics", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "c90cadcc"}, {"headline": "32 licensed weapons missing from Faridabad police station", "summary": "Thirty-two licensed weapons were stolen from the malkhana (armoury room) of the Sector-8 police station in Faridabad. A case of theft has been registered against malkhana in-charge, ASI Bijendra Singh, who has been suspended, and a departmental inquiry initiated. Local residents had deposited these weapons for safekeeping.", "category": "India", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "cf5e5c46"}, {"headline": "Badal hits out at AAP govt. over ‘power shortage’", "summary": "Shiromani Akali Dal (SAD) president Sukhbir Singh Badal criticized the Aam Aadmi Party (AAP) government in Punjab, alleging its failure to provide adequate electricity to farmers, industries, and the public. He claimed the state’s agricultural economy is suffering due to prolonged power cuts, and that six of 10 thermal power units are shut due to technical faults.", "category": "Politics", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "42ab850f"}, {"headline": "Congress open to alliance for Goa 2027 poll", "summary": "The Congress party in Goa is open to alliances with like-minded parties for the 2027 Assembly election, provided they share a common program and ideology against the ruling BJP. AICC Goa in-charge Manikrao Thakare stated that State unit chief Girish Chodankar is authorized to hold talks and the party is expediting organizational strengthening across the state.", "category": "Politics", "page": 5, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "f5d83d14"}, {"headline": "BJP protests against Himachal govt. delaying local body polls", "summary": "Leader of Opposition Jai Ram Thakur accused the Himachal Pradesh Congress government of undermining democracy by delaying local body elections and manipulating outcomes. BJP workers protested statewide, demanding immediate poll dates for chairpersons/vice-chairpersons. Thakur warned of legal challenges against officers acting under political pressure, alleging the government sought to postpone elections after failing in court.", "category": "Politics", "page": 5, "importance": 3, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "352e9094"}, {"headline": "Assam includes tea landholding in farmers’ registry portal", "summary": "The Assam government has included tea and plantation landholdings in its farmers’ registry portal, a move hailed by CM Himanta Biswa Sarma as 'game-changing' for small tea growers (STGs). The portal aims to provide STGs with a Farmer ID, ensuring timely access to fertilizers, government scheme benefits, and better credit terms, benefiting over six lakh people and eliminating middlemen.", "category": "Economy", "page": 5, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "28bb0e2f"}, {"headline": "Zubeen Garg’s death probe moving in right direction: wife", "summary": "Garima Saikia Garg, wife of deceased singer Zubeen Garg, stated that the investigation and court proceedings into his death appear to be progressing positively, expressing hope for a 'positive result'. Garg drowned in mysterious circumstances in Singapore in September. Assam Police CID filed a chargesheet naming seven accused, four facing murder charges, though Singapore Police found no foul play.", "category": "India", "page": 5, "importance": 3, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "f09b759d"}, {"headline": "Jharkhand arranging return of workers from T.N.", "summary": "The Jharkhand government is arranging for the safe return of 34 migrant workers stranded in Tamil Nadu's Tiruvallur district after an ammonia gas leak at their seafood export company. One worker from Dhanbad died, and another is hospitalised. The State Migrant Control Cell established contact, and their return via Railways to respective districts is being arranged.", "category": "India", "page": 5, "importance": 2, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "b8f34fdf"}, {"headline": "Goa withdraws urban areas proposal letter", "summary": "The Goa government withdrew its letter to village panchayats seeking suggestions on notifying rural pockets as 'urban areas'. This decision followed widespread opposition from various political parties, including the Congress, Goa Forward Party, and Aam Aadmi Party, who protested against the proposal.", "category": "Politics", "page": 5, "importance": 3, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "c1211329"}, {"headline": "Gehlot questions elusive justice in Kanhaiya Lal murder case", "summary": "Congress leader Ashok Gehlot stated that justice remains 'elusive' in the Kanhaiya Lal murder case, four years after the incident. He accused the BJP of using the issue for electoral gains but now remaining silent on securing punishment. Gehlot highlighted slow progress in the NIA investigation despite BJP governments at the Centre and State, alleging a deliberate attempt to prolong the matter.", "category": "Politics", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "287174c1"}, {"headline": "Manickam Tagore appointed new T.N. Congress chief", "summary": "Three-time Lok Sabha MP and Rahul Gandhi loyalist B. Manickam Tagore was appointed president of the Tamil Nadu Congress Committee (TNCC), replacing K. Selvaperunthagai. Tagore's appointment comes as Congress aligns with the Tamilaga Vettri Kazhagam (TVK). He has been a vocal critic of the DMK, the former ally, and advocated for 'share in power'.", "category": "Politics", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "28d01cec"}, {"headline": "Nihang Sikhs granted bail in Karnprayag clash", "summary": "A District and Sessions Court in Chamoli granted bail to four Nihang Sikhs arrested for a violent clash in Karnaprayag on June 16. The minor dispute escalated into an alleged sword attack, injuring several people. The accused were released on a personal bond of ₹50,000 each and two sureties, with their defence counsel arguing false implication.", "category": "Law", "page": 6, "importance": 3, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "fcb76e84"}, {"headline": "R.C.P. Singh meets Nitish, fuels JD(U) return speculation", "summary": "Former Union Minister Ram Chandra Prasad Singh met JD(U) national president Nitish Kumar in Patna after four years, sparking speculation about his return to the party. Singh, who quit JD(U) in 2022 to join BJP, described the meeting as cordial. Senior JD(U) leaders had previously opposed his return, but Health Minister Nishant Kumar reportedly facilitated the meeting.", "category": "Politics", "page": 6, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "f8ec1c29"}, {"headline": "Pune police unravel murder plot at Lohagad Fort", "summary": "Pune Rural Police allege that Ketan Agarwal's death at Lohagad Fort was a premeditated murder, not an accident. His fiancée, Siya Goyal, and her boyfriend, Chetan Babulal Chaudhary, have been arrested. Police claim the murder was planned over months, with a previous attempt. The case highlights concerns about compulsory endogamous marriage systems and the limited agency of young women.", "category": "India", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "ad610b3c"}, {"headline": "Bhadrachalam temple redevelopment work begins", "summary": "Phase-I redevelopment works commenced at the Sree Seetha Ramachandra Swamy temple in Bhadrachalam, Telangana, after the State government sanctioned ₹351 crore. A comprehensive master plan, approved in three phases, aims to rejuvenate the historic 17th-century temple.", "category": "Culture", "page": 7, "importance": 3, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "4d99e7b7"}, {"headline": "Five youth fined, car seized for reckless driving in Munnar", "summary": "Five youths were fined and their car seized in Munnar for reckless driving, including hanging out of windows and sunroof, on the Gap Road highway. Munnar Dy.SP S. Chandrakumar intercepted the vehicle; an awareness class will also be conducted for the offenders.", "category": "India", "page": 7, "importance": 1, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "fcb3cc64"}, {"headline": "No grounds to book Tiny Tom: Kerala police", "summary": "Kerala police decided not to register a case against actor Tiny Tom following a complaint by actor Ansiba Hassan, who accused him of making communal and defamatory remarks. A preliminary investigation found no solid grounds for an FIR, according to a report submitted to the Assistant Commissioner of Police, Ernakulam Central.", "category": "Law", "page": 7, "importance": 2, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "d032701d"}, {"headline": "Uddhav calls for ‘BJP-mukt’ Ram, slams ‘temple-looting Hindutva’", "summary": "Shiv Sena (UBT) chief Uddhav Thackeray criticized the BJP over alleged swindling of Ram Mandir donations, accusing the party of betraying Hindus and Hindutva. He rejected BJP’s 'Hindutva of looting temples' and called for 'BJP-mukt Ram'. Thackeray questioned the BJP’s stance on citizenship proof and accused it of trying to finish off the Opposition, appealing to Maharashtra voters.", "category": "Politics", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "e0e7b144"}, {"headline": "Akhilesh vows to develop Ayodhya as ‘unique religious city’", "summary": "Samajwadi Party president Akhilesh Yadav pledged to develop Ayodhya as a 'unique and exemplary religious city' and 'Siyaram-Dham' if his party forms the government. Amid the Ram Temple embezzlement case, he vowed to restore Ayodhya's 'eternal glory' as a centre of faith, devotion, and true spirituality, emphasizing the socialist ideals of Lord Ram and Ram Manohar Lohia.", "category": "Politics", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "614caac7"}, {"headline": "Sujata Rout’s entry key to BJD’s revival push", "summary": "Sujata Rout, wife of V.K. Pandian, was inducted into the Biju Janata Dal (BJD) by supremo Naveen Patnaik, initially as an 'ordinary' member. However, her quick prominence, including temple visits with senior leaders and meetings with influential party members, suggests she's positioned for a key leadership role in the party's regrouping efforts after its 2024 election defeat.", "category": "Politics", "page": 7, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "ad54e1f9"}, {"headline": "Raj Thackeray criticizes IPS officer over RSS praise", "summary": "Maharashtra Navnirman Sena chief Raj Thackeray slammed IPS officer Vishwas Nangre Patil for praising the Rashtriya Swayamsevak Sangh (RSS) on its platform. Thackeray questioned CM Devendra Fadnavis about the 'dual loyalty' of an IPS officer and suggested Patil resign and join the RSS or BJP if he wished to speak publicly about his affection for the Sangh.", "category": "Politics", "page": 7, "importance": 3, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "200b6348"}, {"headline": "Sabarimala gold theft case report to HC tomorrow", "summary": "The Kerala High Court-appointed Special Investigation Team (SIT) probing the Sabarimala gold theft case is set to submit its report on Monday. The SIT reportedly re-questioned prime accused Unnikrishnan Potti regarding the Travancore Devaswom Board’s (TDB) decision to resend the temple’s gold-plated copper panels for replating, despite a 40-year warranty from a previous refurbishment in 2019.", "category": "Law", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "5357e73a"}, {"headline": "ED seeks cancellation of bail in attack case", "summary": "The Directorate of Enforcement (ED) has petitioned the Kerala High Court to cancel bail granted to Harish Kumar, the ninth accused in the attack on ED officials during a raid at former Chief Minister Pinarayi Vijayan’s residence. The ED suspects the Sessions Court may have been misinformed and that other leaders involved in calling for the attack have not been investigated. A CBI probe is also pending.", "category": "Law", "page": 7, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "c8e8702d"}, {"headline": "Farmers block YSRCP leaders in Amaravati protest", "summary": "Farmers in Amaravati, Andhra Pradesh, blocked YSR Congress Party (YSRCP) leaders, including Perni Venkataramaiah, from entering their villages. They protested against the YSRCP's claims of fighting on their behalf, accusing them of creating unrest for political gains and of previously meting out injustices to farmers who gave land for Amaravati. The situation grew tense with stone-pelting.", "category": "Politics", "page": 7, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "4e112e9a"}, {"headline": "Puttur artist wins Amaravati riverfront logo contest", "summary": "Ramprasad K., a 25-year-old artist from Puttur, Karnataka, won the logo design contest for the Viksit Bharat-Guarantee for Rozgar and Ajeevika Mission Gramin (VB-G RAM G). He will be felicitated by Union Minister Shivraj Singh Chouhan. The contest, held by the Rural Development Ministry and MyGov, aimed to create a distinctive visual identity for the Act.", "category": "Culture", "page": 7, "importance": 2, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "b615f617"}, {"headline": "Global bids invited for Amaravati riverfront plan", "summary": "The Amaravati Growth and Infrastructure Corporation Limited (AGICL) has invited global bids for a consultant to prepare a master plan, DPR, and financial plan for the Amaravati Riverfront Development Project along the Krishna River. The project covers 27 km, including seven river islands, with a pilot project targeted for completion before Krishna Pushkaralu-2028.", "category": "Infrastructure", "page": 7, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "ea9d276c"}, {"headline": "Telangana launches e-autos for disabled persons", "summary": "The Telangana government launched e-autos for 14 neighbourhood centres, aimed at easing travel for persons with disabilities (PwD) and providing free door-to-step transport for children needing therapy. Minister Dansari Anasuya stated that more than 13,000 PwD Self-Help Groups exist, and the Community Managed Rehabilitation Services program is expanding across 26 districts.", "category": "Health", "page": 7, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "075e49a1"}, {"headline": "U.S. sanctions Indian firm, CEO over Sudan civil war", "summary": "The U.S. Treasury Department sanctioned eight persons and entities, including Raipur-based SBL Energy Limited and its CEO Alok Choudhari, for allegedly fueling the civil war in Sudan. The firm, also known as Amin Explosive Private Limited, reportedly supplied over 200 shipments of explosives to a company maintaining the Sudanese Armed Forces' arsenal, contributing to the 'world’s worst humanitarian crisis'.", "category": "World", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "d6605e8e"}, {"headline": "India launches ‘Op Amistad’ for quake-hit Venezuela", "summary": "India launched ‘Operation Amistad’, deploying two IAF C-17 Globemaster aircraft with relief supplies and a 41-member rescue team to assist quake-hit Venezuela. The 7.2 and 7.5-magnitude earthquakes caused 920 deaths and 3,360 injuries, prompting India to stand in solidarity with Venezuela during this difficult period, according to the Ministry of External Affairs.", "category": "World", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "2dabed52"}, {"headline": "Lightning strikes kill 4, injure 8 in Madhya Pradesh", "summary": "Four people were killed and eight injured in two separate lightning strike incidents in Madhya Pradesh's Chhindwara district. Victims included Satish Walke (19), Lucky Meravi (18), Jhaam Singh Taram (34), and Chandravati Pusam (39). Seriously injured individuals were hospitalized, with four undergoing treatment at Baihar Hospital.", "category": "India", "page": 8, "importance": 2, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "f603ea6d"}, {"headline": "Assam police arrest 2 ULFA(I) members, avert terror strike", "summary": "Assam police arrested two members of the banned United Liberation of Asom (Independent) (ULFA(I)), Humenjyoti Baruah and Papu Moran, in Tinsukia district, thwarting a major terror strike. Two AK-56 rifles, two hand grenades, 172 AK ammunition rounds, opioids, and jungle survival kits were recovered. The duo were tasked to kill people in Tinsukia to create terror.", "category": "India", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "0620655a"}, {"headline": "Kharge: Centre denying fuel relief despite falling global prices", "summary": "Congress president Mallikarjun Kharge accused the Narendra Modi government of refusing to pass on the benefit of falling global crude oil prices to consumers. He highlighted that despite international crude oil prices returning to pre-West Asia war levels, petrol and diesel prices remain high, alleging the Centre is 'looting and pickpocketing' the public instead of providing relief.", "category": "Economy", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "dfaf4016"}, {"headline": "Govt. defends Defence Minister’s remarks on Operation Sindoor", "summary": "The Union government rejected claims that Defence Minister Rajnath Singh misled Parliament about no Indian military casualties during Operation Sindoor. It clarified that his remarks were taken out of context, specifically countering a false narrative about IAF pilots killed. The MoD stated Singh's address highlighted the operation's success in eliminating over 100 terrorists, not denying soldier sacrifices which were officially released later.", "category": "Politics", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "9d300469"}, {"headline": "SIR enumeration begins in Delhi, four States June 30", "summary": "The enumeration phase for the special intensive revision (SIR) of electoral rolls will begin on June 30 in Karnataka, Meghalaya, Maharashtra, Jharkhand, and Delhi. Over 3.94 lakh Booth Level Officers will verify 36.73 crore electors. The final voter lists for these regions will be published on October 7. The Supreme Court recently upheld the constitutional validity of the SIR.", "category": "India", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "ecb7ea16"}, {"headline": "Kishan accuses Congress, BRS of politicising SIR", "summary": "Union Minister G. Kishan Reddy accused the Congress and Bharat Rashtra Samithi (BRS) of politicizing Telangana's special intensive revision (SIR) of electoral rolls. He dismissed their 'unnecessary fears' and questioned their opposition, asserting SIR is a routine constitutional process for free and fair elections. Reddy criticized CM Revanth Reddy for provocative statements linking SIR to religion and citizenship.", "category": "Politics", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "95d0a525"}, {"headline": "SC plea seeks fire safety protocol for high-risk buildings", "summary": "A Supreme Court petition seeks a National Minimum Fire and Life Safety Framework for high-risk public buildings like schools, hospitals, and commercial complexes, following recent fatal fires in Delhi and Lucknow. The plea argues recurring fatalities are a systemic constitutional failure, requesting mandatory audits, digital portals for safety certificates, and strict liability compensation for fire victims.", "category": "Law", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "1436bc24"}, {"headline": "Govt. to launch affordable digital system for clinics", "summary": "The Union Health Ministry is launching e-Sushrut@Clinic, a lightweight, cloud-based Hospital Management Information System (HMIS), to help small outpatient clinics digitize operations. Developed by C-DAC, it simplifies patient registration, billing, etc., and is user-friendly. Costing ₹299/month (after discount), it addresses challenges faced by clinics lacking affordable digital solutions. Over 800 health facilities are already onboarded.", "category": "Technology", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "09b65a46"}, {"headline": "CGHS enhances financial powers for quicker treatment", "summary": "The Union Health Ministry has substantially increased the financial powers of senior CGHS officials to approve cashless treatment and settle medical reimbursement claims. Additional directors heading CGHS cities/zones can now sanction up to ₹15 lakh, directors up to ₹25 lakh, and Additional Secretary and DG up to ₹50 lakh. This aims to reduce delays, particularly benefiting pensioners and elderly beneficiaries.", "category": "Health", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "6d06cc1a"}, {"headline": "Accenture’s revenue guidance cut shocks tech industry", "summary": "Accenture’s recent downward revision of its full-year 2026 revenue growth guidance to 3-4% from 3-5% has sent shockwaves through the global tech services industry. Analysts predict this will impact growth valuations and order books for Indian IT firms, signaling widespread deal slippage and slower pipeline-to-revenue conversion rates due to macroeconomic shocks and increased scrutiny on digital initiatives.", "category": "Business", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "ec88b56c"}, {"headline": "External review clears HDFC Bank of ex-chairman’s concerns", "summary": "HDFC Bank announced that an independent legal review by two external law firms found no evidence to substantiate concerns raised by former chairman Atanu Chakraborty in his resignation letter. Chakraborty cited ethical concerns for his mid-term departure. The review examined bank records and whether any dissent from him was addressed. Chakraborty declined to participate in the review.", "category": "Business", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "1186c6ea"}, {"headline": "U.S. judge won’t dismiss charges against Adani immediately", "summary": "A U.S. judge ordered the Justice Department to justify its decision to drop criminal charges against Indian billionaire Gautam Adani, declining to immediately rule on Adani's lawyers' request to formally dismiss the case. Adani was charged in 2024 with bribing Indian government officials and misleading U.S. investors; his group has consistently denied wrongdoing.", "category": "Business", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "9e9a22ff"}, {"headline": "Amber Group eyes $2-bn revenue milestone", "summary": "Leading electronics and consumer durables manufacturer Amber Group expects to reach $2 billion in revenue soon, driven by strong growth in its consumer durables, electronics, and railway/defence businesses. The group, which reported ₹12,306.63 crore (approx. $1.3 billion) in FY26, held a groundbreaking ceremony for new manufacturing facilities at YEIDA, with a total investment of ₹6,785 crore.", "category": "Business", "page": 9, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "e6773ee9"}, {"headline": "New hardy coffee hybrid may be future brew", "summary": "A newly identified coffee hybrid, Coffea x libex (Libex), could be the brew of the future due to its resilience to rising temperatures and erratic rainfall, unlike Arabica or Robusta. Research from Kew Gardens confirmed Liberica and Excelsa hybridization. The Indian version of Libex is a 'delicious coffee' with better yield and processing efficiency, offering hope for farmers.", "category": "Science", "page": 10, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "a3858830"}, {"headline": "New technique tests TB drugs in 50 hours", "summary": "Scientists developed Raman-DIP, a rapid single-cell imaging technique, to test for drug resistance in tuberculosis-causing bacteria in just 50 hours. This method tracks how cells process heavy water to determine if antibiotics inhibit them, achieving 100% accuracy against four major drugs and various strains. Traditional phenotypic tests require four to eight weeks for results.", "category": "Science", "page": 10, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "ed21d585"}, {"headline": "Hominin body sizes did not steadily increase", "summary": "Analysis of nearly 400 hominin fossils across 21 species shows no steady increase in body size over time. Instead, researchers found strong evidence for a sudden, significant jump in size among later Homo genus members (excluding H. habilis), likely with species like H. erectus. This suggests human body size transitioned distinctly among more recent ancestors.", "category": "Science", "page": 10, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "d24f1c22"}, {"headline": "Scientists bottle sunlight for later use", "summary": "Researchers at UC Santa Barbara have developed molecular photo-switches that capture solar thermal energy for later use. Molecules like 2-pyrimidone isomerize upon absorbing sunlight, storing heat up to 1.65 million joules per kg. This 'molecular solar thermal' (MOST) technology could offer an efficient way to store solar energy from home panels for water heating, cooking, and other needs, making India greener.", "category": "Science", "page": 10, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "5dec1cdb"}, {"headline": "Why wet paper tears easily", "summary": "Wet paper tears easily because water molecules penetrate and disrupt the hydrogen bonds holding cellulose fibers together. Water forms its own hydrogen bonds, competing with the existing ones, and causes fibers to swell, loosening the network. This reduces friction and allows fibers to slide past each other more easily, requiring less force to tear.", "category": "Science", "page": 10, "importance": 3, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "2e2db7dd"}, {"headline": "Delhi’s EV Policy 2.0 faces opposition", "summary": "Delhi’s revised EV Policy 2.0, proposing a ban on new ICE three-wheelers from 2027 and two-wheelers from 2028, faces industry opposition. Manufacturers cite concerns about scaling EV production, market readiness, and charging infrastructure gaps. Critics also highlight the need for reskilling ICE-dependent service networks. Proponents argue regulation is crucial for Delhi’s air quality, while studies suggest the grid can handle demand with smart charging.", "category": "Environment", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "6577a21a"}, {"headline": "Which document proves Indian citizenship?", "summary": "The Indian passport is not conclusive proof of citizenship, but rather a travel document and evidence of nationality. Aadhaar cards are only proof of identity/address. Citizenship is governed by the Citizenship Act, 1955, acquired by birth, descent, registration, naturalisation, or territory incorporation. Most Indians are citizens by birth or descent, lacking specific certificates, relying on documents proving date/place of birth or parentage.", "category": "Law", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "50ca553c"}, {"headline": "The story of a shipwrecked hegemon", "summary": "The U.S.-Israel war on Iran has reached a fragile pause with a preliminary agreement, but it has diminished America's regional presence. The conflict, which began with devastating strikes on Iran, failed to collapse the regime. Iran retaliated by regionalizing the war and closing the Strait of Hormuz, forcing the U.S. into negotiations. Gulf countries are now seeking a new modus vivendi with Tehran, while Israel feels isolated and strategically set back.", "category": "World", "page": 12, "importance": 9, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "d3efd1ee"}, {"headline": "Trump unveils new U.S. passport with his picture", "summary": "U.S. President Donald Trump unveiled a rendering of a new limited-edition U.S. passport to mark the country’s 250th anniversary of independence, featuring his stern-faced likeness. He posted on Truth Social: 'The U.S.A.’s New Passport, which says, ‘Welcome, but be good!’'", "category": "Politics", "page": 13, "importance": 3, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "b28703e7"}, {"headline": "Six Kenyan protesters found dumped, tortured after arrest", "summary": "Six Kenyan protesters, arrested during the second anniversary of the 'Gen Z' uprising, were found 'dumped and tortured' on Saturday, a rights group reported. Families of those killed by security forces in June 2024 held a memorial march in Nairobi on Thursday to protest police killings.", "category": "World", "page": 13, "importance": 3, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "79ae676b"}, {"headline": "Indonesian police arrest dozens after anti-government protest", "summary": "Indonesian police arrested dozens of protesters following a rally against President Prabowo Subianto’s policies in Surabaya, the country’s second-largest city. A rights group, KontraS Surabaya, reported 24 arrests among approximately 100 protestors.", "category": "World", "page": 13, "importance": 3, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "44bb6241"}, {"headline": "U.S. authorises limited access to Mythos AI model", "summary": "Anthropic announced that it received U.S. government authorization for a small group of U.S. cybersecurity firms to access its powerful AI model, Mythos 5. Access to Mythos 5 had previously been blocked by U.S. authorities due to national security concerns.", "category": "Technology", "page": 13, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "9cd3f7db"}, {"headline": "Ukraine, Russia air strikes kill 5, injure dozens", "summary": "Russian strikes killed two and wounded over 20 in Ukraine, while Ukrainian retaliatory strikes on Russian-held territory and inside Russia killed three and wounded dozens. Dnipropetrovsk and Sumy regions were hit in Ukraine. Ukrainian President Zelenskyy reported a successful FP-5 Flamingo missile strike on Russia’s Titan-Barrikady industrial complex in Volgograd, alleging it produces artillery systems components.", "category": "World", "page": 13, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "3a38c0b0"}, {"headline": "Pak. emerged as ‘peacemaker’ after Iran-U.S. deal: Sharif", "summary": "Prime Minister Shehbaz Sharif stated that Pakistan has emerged as a 'peacemaker' after its efforts culminated in the U.S.-Iran agreement. He cited Iranian President Masoud Pezeshkian's recent visit as an acknowledgment of Pakistan's role in promoting regional peace. Sharif highlighted Pakistan's navigation through conflicts and security challenges, including international and internal threats.", "category": "World", "page": 13, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "0c880446"}, {"headline": "Venezuela quake rescue window narrows, 920 dead", "summary": "The window for rescuing victims is narrowing as Venezuela enters the third day after devastating 7.2 and 7.5-magnitude earthquakes. The death toll climbed to at least 920 dead and over 51,000 missing. Chaotic conditions, poor roads, and heavy traffic are hampering search efforts. The UN estimates close to seven million people may have been impacted.", "category": "World", "page": 13, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "0a8e47f3"}, {"headline": "Chinese military planes enter S. Korea air defence zone", "summary": "South Korea deployed fighter jets after over 10 Chinese and Russian military aircraft entered its Air Defence Identification Zone (KADIZ) over the East Sea and South Sea. The Joint Chiefs of Staff stated they detected the aircraft and prepared for contingencies, though the planes did not violate South Korean airspace. A KADIZ is a buffer for identifying approaching aircraft.", "category": "World", "page": 13, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "c3f347df"}, {"headline": "Senegal routs Iraq, France powers past Norway", "summary": "Ousmane Dembele scored a first-half hat-trick, leading France to a 4-1 victory over Norway, securing top spot in World Cup Group I. Dembele scored in the seventh, 20th, and 32nd minutes. Senegal thumped Iraq 5-0, sealing its knockout spot. France will face one of the best third-placed teams in the last 32, while Norway will play Ivory Coast.", "category": "Sports", "page": 14, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "7c25306d"}, {"headline": "Flawless Belgium, nervy Egypt advance in World Cup", "summary": "Belgium defeated New Zealand 5-1, securing its first World Cup win and topping Group G on goal difference. Goals from Leandro Trossard (2), Kevin De Bruyne, Romelu Lukaku, and Alexis Saelemaekers carried them into the last 32. Egypt claimed the runner-up spot after a nervy 1-1 draw with Iran, which finished third.", "category": "Sports", "page": 14, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "49078a4c"}, {"headline": "Dominant India thrashes Pakistan 7-1 in Pro League", "summary": "A dominant India crushed arch-rival Pakistan 7-1 in their return-leg FIH Pro League match in London. Despite Pakistan taking an early lead in the 13th minute, India retaliated strongly with goals from Sukhjeet, Harmanpreet, Hardik, Jugraj, Abhishek, Rajkumar, and Dilpreet. India will face England in its final match on Sunday. In their previous meeting, India won 4-3.", "category": "Sports", "page": 14, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "be2355a1"}, {"headline": "Technical goof-up forces hurdler to do solo re-run", "summary": "Due to a technical goof-up, Tamil Nadu hurdler R. Harshitha had to run alone in a re-run of her 400m hurdles heats at the National inter-State athletics meet. She initially ran without a fifth hurdle, impacting her rhythm. Harshitha clocked 1:02.54, narrowly missing the final. The AFI has issued a show-cause notice to two technical officials responsible.", "category": "Sports", "page": 15, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "350990de"}, {"headline": "India eyes improved batting to level Ireland T20I series", "summary": "India’s star-studded batting line-up is under pressure to perform better in the second and final T20I against Ireland, aiming to level the series after a shock defeat. The team suffered a batting collapse in the opener, with Sanju Samson, Ishan Kishan, and Shreyas Iyer scoring low. Despite batting concerns, bowlers like Harshit Rana (3/24) showed promise. Ireland, brimming with confidence, seeks to script more history.", "category": "Sports", "page": 15, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "ebc9d309"}, {"headline": "Coach Nooshin aims to build U-19 women’s bench strength", "summary": "India U-19 women’s team coach Nooshin Al Khadeer, fresh from a 3-0 whitewash over Sri Lanka, aims to build strong bench strength for future World Cup crowns. With a current camp in Bengaluru, she plans to monitor domestic seasons, tours, and the proposed Asia Cup to finalize the World Cup squad, emphasizing that these players are set to 'steal the show' and potentially field two Indian teams.", "category": "Sports", "page": 15, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "366fa89d"}, {"headline": "Russell grabs pole for Austrian GP in Mercedes", "summary": "George Russell secured pole position for Sunday’s Austrian Grand Prix in Spielberg, producing a dramatic late and contentious fastest lap in his Mercedes. He will start ahead of the two Ferraris. The starting grid places Charles Leclerc second and Lewis Hamilton third.", "category": "Sports", "page": 15, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "d716d527"}, {"headline": "Nabi’s four-wicket burst puts India-A in control", "summary": "Pacer Auqib Nabi’s four-wicket burst propelled India-A into the driver’s seat with an overall lead of 170 runs against Sri Lanka-A on day three of the first unofficial Test in Galle. India-A declared at 452/6 and finished the day at 48/0 in 17 overs, in response to Sri Lanka-A’s 330.", "category": "Sports", "page": 15, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "cc57554a"}, {"headline": "Neeraj Chopra confirmed for Asian Games", "summary": "Indian javelin throw superstar Neeraj Chopra will compete in the Asian Games in Japan in September-October, aiming to defend his title, confirmed AFI selection committee chairman Adille Sumariwalla. Recovering from a lower-back injury, Neeraj had a strong start to the season with an 85.69m throw. He is also confirmed for the Commonwealth Games, with Pakistan’s Arshad Nadeem expected to make the Asian Games highly competitive.", "category": "Sports", "page": 15, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "31fcdf73"}, {"headline": "Indonesia beats India, reaches AVC Cup final", "summary": "Indonesia halted India’s five-match winning streak in the AVC Men’s Volleyball Cup, defeating them 15-25, 26-24, 25-20, 19-25, 15-13 in the semifinal in Ahmedabad on Saturday. Indonesia will now play in the title decider.", "category": "Sports", "page": 15, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "e92138b0"}, {"headline": "Jr Indian shuttlers enter Asian mixed team quarters", "summary": "India sealed a spot in the quarterfinals of the Badminton Asia junior mixed team championships, securing a 2-0 (55-31, 55-21) victory over Kazakhstan in its Group-C opener in Yatsushiro, Japan. Notable wins included Devika Sihag and K. Srikanth.", "category": "Sports", "page": 15, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "705e9424"}, {"headline": "Jangoo and Chase keep WI in hunt for lead", "summary": "Amir Jangoo (78 batting) and captain Roston Chase (42 batting) brought the West Indies within reach of Sri Lanka’s first innings total, ending day two of the first Test in North Sound at 271 for five. Sri Lanka had scored 308 in its first innings.", "category": "Sports", "page": 15, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "c111a062"}, {"headline": "India’s karting scene revs up with packed grids", "summary": "India’s motorsport culture is gaining momentum, particularly in karting, with a record 75 drivers across four categories competing in the opening round of the Meco FMSCI National Karting Championship. This surge in participation, including disciplined young talents as young as eight, reflects growing professionalism and quality coaching. Teams are adapting with international tuners, coaches, and mechanics, signaling excellent growth for the sport.", "category": "Sports", "page": 15, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "9e1a17a6"}, {"headline": "Khukuri: a symbol of courage and loyalty", "summary": "The khukuri knife, an iconic symbol of Gorkha soldiers and Nepal, represents strength, courage, bravery, and loyalty. Its distinctive curved blade, 16-18 inches, serves as both a weapon and a tool. Historically crucial in Nepal's unification, it is still used by the Nepal Army for combat, training, and ceremonial events. The sharpening of the khukuri is a ritual symbolizing duty and honor, and it is worshipped during festivals.", "category": "Culture", "page": 17, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128593", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Mumbai 28-06-2026.pdf", "page": 17, "telegram_url": "https://t.me/c/1877410077/128593"}], "article_id": "54d24a88"}, {"headline": "Properties at risk of losing ‘waqf’ tag", "summary": "Properties marked as waqf could lose the tag if not registered with the state waqf board by July 31, 2022. This could affect 1.35 lakh properties, creating an opportunity for squatters. The state waqf board has eased norms, allowing self-registration to avoid forfeiture.", "category": "Law", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/128625", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_28-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/128625"}], "article_id": "8bc6a85f"}, {"headline": "Ayodhya donation theft: Bank officials under lens", "summary": "Two bank officials are under investigation for alleged involvement in the theft of donations made for the Ram Temple in Ayodhya. A suspect, Champaat Rai, a member of the trust, has initiated proceedings. The trust has faced criticism regarding transparency of funds collected for temple construction.", "category": "Law", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/128625", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_28-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/128625"}], "article_id": "adebb14d"}, {"headline": "Airline not liable for weather delays: Gujarat consumer panel", "summary": "Gujarat State Consumer Disputes Redressal Commission ruled airlines are not liable for flight delays due to weather. This decision came after a passenger sought compensation for a Delhi-Ahmedabad flight delay. The panel cited precedents affirming weather as an uncontrollable factor.", "category": "Law", "page": 1, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128625", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_28-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/128625"}], "article_id": "a82d4302"}, {"headline": "Contractor booked for 'obstructing work'", "summary": "A contractor, Mohammed Irfan, was booked for allegedly obstructing the work of an engineer at the BBMP Road Infrastructure division. He purportedly prevented the engineer from discharging duties and hurled abuses.", "category": "Law", "page": 1, "importance": 2, "telegram_url": "https://t.me/c/1877410077/128625", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_28-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/128625"}], "article_id": "7539746d"}, {"headline": "3 more charged in Prajwal sex cases", "summary": "Three more individuals were charged in connection with the Prajwal Revanna sexual assault cases, allegedly obstructing investigation and colluding with the accused. They were arrested in Bengaluru for their role in the scandal.", "category": "Law", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/128625", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_28-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/128625"}], "article_id": "1531daf5"}, {"headline": "HDK's 'reserved' chair for CM speaks the politest at Bidadi township protest", "summary": "HD Kumaraswamy's \"reserved\" chair at a protest against the Bidadi Township project became a talking point. He joined farmers, demanding resolution of their land concerns. The gesture highlighted his continued advocacy for farmers.", "category": "Politics", "page": 1, "importance": 4, "telegram_url": "https://t.me/c/1877410077/128625", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_28-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/128625"}], "article_id": "1ff0fbfa"}, {"headline": "Test for exam leak, 3 held", "summary": "Three individuals were arrested in Bengaluru for alleged involvement in a question paper leak during a police sub-inspector exam. The leak involved questions about a murder case. A special investigation team is probing the matter, which had four sets of papers.", "category": "Law", "page": 1, "importance": 3, "telegram_url": "https://t.me/c/1877410077/128625", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_28-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/128625"}], "article_id": "6818ced7"}, {"headline": "Man dies after 'triggering car' crash in T'kuru, highway partner escapes", "summary": "A man died and his friend escaped after their car crashed near Tumakuru. Police suspect the deceased, Praveen, triggered the crash by jumping from the moving vehicle. The incident occurred following an argument after a party.", "category": "Law", "page": 1, "importance": 2, "telegram_url": "https://t.me/c/1877410077/128625", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_28-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/128625"}], "article_id": "dbabf925"}, {"headline": "Cabo de Good Hope, Tiny Verde to play Argentina", "summary": "Cabo de Good Hope and Tiny Verde will play in the final of the Argentina Cup, a local football tournament. The match is set for Sunday, promising an exciting conclusion to the competition.", "category": "Sports", "page": 1, "importance" let deepLinkTarget = null;
function handleDeepLink() {
  const hash = window.location.hash;
  if (!hash || !sortedCats.length) return;
  
  const cleanHash = hash.startsWith('#article-') ? hash.slice(9) : hash.slice(1);
  const targetArticle = DIGEST.articles.find(art => art.article_id === cleanHash);
  
  if (targetArticle) {
    deepLinkTarget = {article: targetArticle, hash: cleanHash};
  }
}
handleDeepLink();

let catIdx=0,vpW=0,vpH=0;
const panels=[];
const outer=document.getElementById('outer');
const hTrack=document.getElementById('hTrack');
const hintUp=document.getElementById('hintUp');
const hintRight=document.getElementById('hintRight');
const catFlash=document.getElementById('catFlash');
const cfIcon=document.getElementById('cfIcon');
const cfName=document.getElementById('cfName');

function buildAll() {
  vpW=outer.offsetWidth; vpH=outer.offsetHeight;
  hTrack.innerHTML=''; panels.length=0;
  sortedCats.forEach((cat,ci)=>{
    const m=CAT_META[cat]||{color:"#e8334a",icon:"📰"};
    const arts=byCategory[cat];
    const panel=document.createElement('div');
    panel.className='cat-panel';
    panel.id=`cat-panel-${ci}`;
    panel.style.setProperty('--cc',m.color);
    panel.innerHTML=`<div class="progress-row" id="prow-${ci}" style="--cc:${m.color}"></div><div class="v-feed" id="vfeed-${ci}"><div class="v-track" id="vtrack-${ci}"></div></div>`;
    hTrack.appendChild(panel);
    const pRow=panel.querySelector(`#prow-${ci}`);
    const vFeed=panel.querySelector(`#vfeed-${ci}`);
    const vTrack=panel.querySelector(`#vtrack-${ci}`);
    const cardH=vFeed.getBoundingClientRect().height||vpH;
    
    arts.forEach((art,ai)=>{
      const card = buildCard(art, cardH, m, cat, ai);
      card.id = `article-${art.article_id}`;
      card.dataset.articleId = art.article_id;
      vTrack.appendChild(card);
    });
    
    panels.push({pRow,vFeed,vTrack,articles:arts,artIdx:0});
    buildPRow(ci);
  });
  
  hTrack.style.transition='none';
  hTrack.style.transform='translateX(0)';
  syncV(0,false);
  
  // Apply deep link after build — 200ms ensures card heights are measured
  if (deepLinkTarget) {
    setTimeout(() => applyDeepLink(deepLinkTarget), 200);
  }
}

function buildCard(art,h,m,cat,articleIndex) {
  const src=art.sources?.[0];
  // Direct PDF link with #page=N - respected by all modern browser PDF viewers
  // when the file is opened via a link click (Chrome, Firefox, Safari, Edge).
  // Falls back to the Telegram source URL if no PDF is available.
  const href = src?.pdf_filename
    ? ('pdfs/' + src.pdf_filename + '#page=' + (src.page || 1))
    : (src?.telegram_url || '#');
  const card=document.createElement('div');
  card.className='card';
  card.dataset.articleId = art.article_id;
  card.style.height=h+'px';
  card.style.setProperty('--cc',m.color);
  card.innerHTML=`
    <div class="card-content">
      <div class="card-toprow">
        <div class="cat-pill">
          <div class="pill-icon"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="1" y="1" width="8" height="2" rx="0.6" fill="#888"/><rect x="1" y="4.5" width="5" height="1.5" rx="0.6" fill="#666"/><rect x="1" y="7" width="6" height="1.5" rx="0.6" fill="#666"/></svg></div>
          ${cat.toUpperCase()}
        </div>
        <div class="card-date">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="2.5" width="11" height="9.5" rx="1.8" stroke="#555" stroke-width="1.2"/><path d="M4.5 1v3M8.5 1v3" stroke="#555" stroke-width="1.2" stroke-linecap="round"/><path d="M1 6h11" stroke="#555" stroke-width="1.2"/></svg>
          ${DIGEST.date}
        </div>
      </div>
      <div class="card-headline">${art.headline}</div>
      <div class="card-summary">${art.summary}</div>
      <div class="card-divider"></div>
      <div class="card-footer">
        ${src?`<a class="src-chip" href="${href}" target="_blank" onclick="event.stopPropagation()">${src.newspaper}<span class="src-chip-sep">&middot;</span><span class="src-chip-pg">Pg ${src.page}</span><span class="src-chip-ext"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M3.5 7.5L7.5 3.5M7.5 3.5H5M7.5 3.5V6" stroke="#555" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></span></a>`:'<div></div>'}
        <div class="info-btn"><svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6.5" stroke="#444" stroke-width="1.3"/><circle cx="7.5" cy="4.5" r="0.8" fill="#555"/><path d="M7.5 7v4" stroke="#555" stroke-width="1.5" stroke-linecap="round"/></svg></div>
      </div>
    </div>`;
  return card;
}

function buildPRow(ci) {
  const p=panels[ci],ai=p.artIdx;
  p.pRow.innerHTML='';
  p.articles.forEach((_,i)=>{
    const seg=document.createElement('div');
    seg.className='pseg'+(i<ai?' done':i===ai?' active':'');
    p.pRow.appendChild(seg);
  });
}

function syncV(ci,animated) {
  const p=panels[ci],h=p.vFeed.getBoundingClientRect().height;
 p.vTrack.style.transition=animated?'transform 0.35s cubic-bezier(0.4,0,0.2,1)':'none';
  p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;
  buildPRow(ci);
}

function applyDeepLink(target) {
  const ci = sortedCats.findIndex(cat =>
    byCategory[cat].some(art => art.article_id === target.hash)
  );
  if (ci === -1) return;

  // Set catIdx BEFORE calling goCat so the horizontal track lands correctly
  catIdx = ci;
  hTrack.style.transition = 'none';
  hTrack.style.transform = `translateX(${-ci * vpW}px)`;

  const ai = byCategory[sortedCats[ci]].findIndex(art => art.article_id === target.hash);
  if (ai === -1) return;
  panels[ci].artIdx = ai;
  syncV(ci, false);

  const card = document.getElementById('article-' + target.hash);
  if (card) {
    card.classList.add('target-highlight');
    setTimeout(() => card.classList.remove('target-highlight'), 3000);
  }
}

function goArt(d) {
  const p=panels[catIdx];
  const n=Math.max(0,Math.min(p.artIdx+d,p.articles.length-1));
  if(n===p.artIdx&&d!==0)return;
  p.artIdx=n; syncV(catIdx,true); dismiss();
}

function goCat(idx,animated=true) {
  idx=Math.max(0,Math.min(idx,sortedCats.length-1));
  if(idx===catIdx&&animated)return;
  const prev=catIdx; catIdx=idx;
  hTrack.style.transition=animated?'transform 0.38s cubic-bezier(0.4,0,0.2,1)':'none';
  hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;
  if(animated&&idx!==prev) {
    const m=CAT_META[sortedCats[idx]]||{color:"#e8334a",icon:"📰"};
    catFlash.style.background=m.color+'18';
    cfIcon.textContent=m.icon; cfName.textContent=sortedCats[idx]; cfName.style.color=m.color;
    catFlash.classList.add('on'); setTimeout(()=>catFlash.classList.remove('on'),500);
  }
  dismiss();
}

let dismissed=false;
function dismiss() {
  if(dismissed)return; dismissed=true;
  hintUp.classList.remove('visible'); hintRight.classList.remove('visible');
  hintUp.classList.add('gone'); hintRight.classList.add('gone');
}

(function initHints() {
  const KEY='dailyBriefHintSeen';
  if(!localStorage.getItem(KEY)) {
    localStorage.setItem(KEY,'1');
    setTimeout(()=>{ if(!dismissed){ hintUp.classList.add('visible'); hintRight.classList.add('visible'); } },2500);
  }
})();

let tsX=0,tsY=0,tcX=0,tcY=0,axis=null,drag=false;
outer.addEventListener('touchstart',e=>{ tsX=e.touches[0].clientX; tsY=e.touches[0].clientY; tcX=0; tcY=0; axis=null; drag=true; hTrack.style.transition='none'; const p=panels[catIdx]; if(p)p.vTrack.style.transition='none'; },{passive:true});
outer.addEventListener('touchmove',e=>{ if(!drag)return; const dx=e.touches[0].clientX-tsX,dy=e.touches[0].clientY-tsY; tcX=dx; tcY=dy; if(!axis&&(Math.abs(dx)>8||Math.abs(dy)>8))axis=Math.abs(dx)>Math.abs(dy)?'h':'v'; if(!axis)return; e.preventDefault(); if(axis==='h'){ const edge=(catIdx===0&&dx>0)||(catIdx===sortedCats.length-1&&dx<0); hTrack.style.transform=`translateX(${-catIdx*vpW+dx*(edge ? 0.14 : 1)}px)`; }else{ const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height; const edge=(p.artIdx===0&&dy>0)||(p.artIdx===p.articles.length-1&&dy<0); p.vTrack.style.transform=`translateY(${-p.artIdx*h+dy*(edge ? 0.14 : 1)}px)`; } },{passive:false});
outer.addEventListener('touchend',()=>{ if(!drag)return; drag=false; if(axis==='h'){ const t=vpW*.2; if(tcX<-t)goCat(catIdx+1); else if(tcX>t)goCat(catIdx-1); else{hTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';hTrack.style.transform=`translateX(${-catIdx*vpW}px)`;} }else if(axis==='v'){ const t=vpH*.2; if(tcY<-t)goArt(1); else if(tcY>t)goArt(-1); else{const p=panels[catIdx],h=p.vFeed.getBoundingClientRect().height;p.vTrack.style.transition='transform 0.3s cubic-bezier(.4,0,.2,1)';p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`;} } axis=null; },{passive:true});
document.addEventListener('keydown',e=>{ if(e.key==='ArrowDown'||e.key===' '){e.preventDefault();goArt(1);} if(e.key==='ArrowUp'){e.preventDefault();goArt(-1);} if(e.key==='ArrowRight'){e.preventDefault();goCat(catIdx+1);} if(e.key==='ArrowLeft'){e.preventDefault();goCat(catIdx-1);} });
let wl=false;
outer.addEventListener('wheel',e=>{ e.preventDefault();if(wl)return;wl=true; Math.abs(e.deltaX)>Math.abs(e.deltaY)?goCat(catIdx+(e.deltaX>0?1:-1)):goArt(e.deltaY>0?1:-1); setTimeout(()=>wl=false,500); },{passive:false});
window.addEventListener('resize',()=>{ vpW=outer.offsetWidth;vpH=outer.offsetHeight; hTrack.style.transition='none'; hTrack.style.transform=`translateX(${-catIdx*vpW}px)`; panels.forEach(p=>{ const h=p.vFeed.getBoundingClientRect().height; p.vTrack.querySelectorAll('.card').forEach(c=>c.style.height=h+'px'); p.vTrack.style.transition='none'; p.vTrack.style.transform=`translateY(${-p.artIdx*h}px)`; }); });

buildAll();
</script>
</body>
</html>
