<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Inter', -apple-system, sans-serif;
  background: #0c0c0c; color: #fff; touch-action: none;
}
.outer { position: fixed; inset: 0; overflow: hidden; }
.h-track { display: flex; height: 100%; will-change: transform; }
.cat-panel { flex-shrink:0; width:100vw; height:100%; display:flex; flex-direction:column; overflow:hidden; }
.progress-row { flex-shrink:0; display:flex; gap:4px; padding:14px 16px 10px; background:#0c0c0c; position:relative; z-index:5; overflow:visible; }
.progress-row::after { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:80%; height:120px; background:radial-gradient(ellipse at top,color-mix(in srgb,var(--cc) 30%,transparent) 0%,transparent 70%); pointer-events:none; z-index:-1; }
.pseg { flex:1; height:2px; border-radius:1px; background:rgba(255,255,255,0.12); position:relative; overflow:hidden; }
.pseg::after { content:''; position:absolute; inset:0; background:var(--cc,#e8334a); transform:scaleX(0); transform-origin:left; transition:transform 0.25s ease; }
.pseg.done::after, .pseg.active::after { transform:scaleX(1); }
.v-feed { flex:1; overflow:hidden; position:relative; clip-path:inset(0); }
.v-track { display:flex; flex-direction:column; will-change:transform; }
.card { 
  width:100%; flex-shrink:0; background:#0c0c0c; display:flex; flex-direction:column; 
  overflow:hidden; position:relative; 
  scroll-margin-top: 80px;
}
.card.target-highlight {
  background: linear-gradient(135deg, #fff3cd22 0%, #ffeaa722 100%) !important;
  box-shadow: 0 0 30px rgba(255, 193, 7, 0.4);
  border: 2px solid #f39c12;
  animation: pulse-highlight 2s ease-in-out;
}
@keyframes pulse-highlight {
  0%, 100% { box-shadow: 0 0 30px rgba(255, 193, 7, 0.4); }
  50% { box-shadow: 0 0 50px rgba(255, 193, 7, 0.6); }
}
.card-content { flex:1; display:flex; flex-direction:column; padding:36px 20px 22px; min-height:0; position:relative; z-index:1; }
.card-toprow { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; flex-shrink:0; }
.cat-pill { display:inline-flex; align-items:center; gap:7px; background:#1c1c1e; border-radius:8px; padding:7px 12px 7px 10px; font-size:11.5px; font-weight:700; letter-spacing:0.07em; color:#d0d0d0; text-transform:uppercase; line-height:1; }
.pill-icon { width:16px; height:16px; background:#2e2e30; border-radius:3px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.pill-icon svg { display:block; }
.card-date { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:500; color:#666; letter-spacing:0.01em; }
.card-headline { font-size:28px; font-weight:800; line-height:1.18; color:#fff; letter-spacing:-0.03em; margin-bottom:20px; flex-shrink:0; }
.card-summary { font-size:15.5px; font-weight:400; line-height:1.62; color:#6b6b6b; flex:1; overflow:hidden; display:-webkit-box; -webkit-line-clamp:7; -webkit-box-orient:vertical; }
.card-divider { height:1px; background:#1e1e1e; margin:20px 0 16px; flex-shrink:0; }
.card-footer { display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.src-chip { display:inline-flex; align-items:center; gap:6px; background:#181818; border:1px solid #282828; border-radius:9px; padding:8px 13px; font-size:12.5px; font-weight:600; color:#c0c0c0; text-decoration:none; letter-spacing:0.005em; line-height:1; }
.src-chip-sep { color:#3a3a3a; font-weight:400; }
.src-chip-pg { color:#555; font-weight:500; }
.src-chip-ext { margin-left:2px; }
.src-chip-ext svg { display:block; }
.info-btn { width:36px; height:36px; border-radius:50%; border:1.5px solid #252525; background:#141414; display:flex; align-items:center; justify-content:center; color:#555; cursor:pointer; flex-shrink:0; }
.cat-flash { position:fixed; inset:0; z-index:600; pointer-events:none; opacity:0; transition:opacity 0.12s; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; }
.cat-flash.on { opacity:1; }
.cf-icon { font-size:34px; }
.cf-name { font-size:22px; font-weight:900; letter-spacing:-0.03em; text-transform:uppercase; }
.hint { position:fixed; display:flex; flex-direction:column; align-items:center; gap:5px; pointer-events:none; z-index:400; opacity:0; transition:opacity 0.6s ease; }
.hint.visible { opacity:1; }
.hint.gone { opacity:0 !important; transition:opacity 0.4s; }
.hint-pill { font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.55); background:rgba(255,255,255,0.07); backdrop-filter:blur(10px); padding:5px 13px; border-radius:100px; border:1px solid rgba(255,255,255,0.09); }
.hint-arr { font-size:16px; color:rgba(255,255,255,0.4); }
.h-up { bottom:28px; left:50%; transform:translateX(-50%); animation:bUp 2s ease-in-out infinite; }
.h-right { top:50%; right:14px; transform:translateY(-50%); animation:bRight 2s ease-in-out infinite 0.6s; }
@keyframes bUp { 0%,100% { bottom:28px; opacity:.65; } 50% { bottom:36px; opacity:1; } }
@keyframes bRight { 0%,100% { right:14px; opacity:.65; } 50% { right:6px; opacity:1; } }
</style>

<script>
const DIGEST   = {"date": "12 May 2026", "articles": [{"headline": "Paddy production projected to reach record 133.5 million tonnes", "summary": "The Agriculture Ministry's first advance estimate for 2024-25 projects kharif paddy production at a record 133.5 million tonnes. This is higher than the 126.7 million tonnes estimated in the previous year. Good monsoon rains across major growing states have boosted acreage and yield expectations, potentially easing food inflation concerns.", "category": "Economy", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123448", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE-Bengaluru 12-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123448"}], "article_id": "3e353f49"}, {"headline": "Government increases MSP for rabi crops for 2025-26 season", "summary": "The Cabinet Committee on Economic Affairs has approved an increase in the Minimum Support Price (MSP) for six rabi crops for the 2025-26 marketing season. The hike for wheat is Rs 150 per quintal, bringing it to Rs 2,425. The move aims to ensure remunerative prices for farmers and encourage crop diversification toward oilseeds and pulses.", "category": "Economy", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123448", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE-Bengaluru 12-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123448"}], "article_id": "286f8986"}, {"headline": "Zomato plans Rs 8,500 crore fundraise via QIP", "summary": "Food delivery giant Zomato announced plans to raise Rs 8,500 crore through a Qualified Institutional Placement (QIP). The company aims to strengthen its balance sheet and enhance its cash reserves to compete more effectively in the rapidly growing quick commerce market, specifically through its Blinkit vertical. The board has approved the proposal.", "category": "Business", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123448", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE-Bengaluru 12-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123448"}], "article_id": "beb7c286"}, {"headline": "IMF raises India GDP growth forecast to 7 percent", "summary": "The International Monetary Fund (IMF) has upgraded India's GDP growth projection for the current financial year to 7%, up from its previous estimate of 6.8%. The revision is attributed to resilient domestic demand and a recovery in rural consumption. India remains the fastest-growing major economy globally, according to the World Economic Outlook report.", "category": "Economy", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/123448", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE-Bengaluru 12-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123448"}], "article_id": "485e30eb"}, {"headline": "RBI Governor warns of inflation risks from volatile food prices", "summary": "Reserve Bank of India Governor Shaktikanta Das cautioned that while headline inflation has moderated, volatile food prices remain a significant risk to reaching the 4% target. Speaking at a summit, he emphasized that the central bank must remain vigilant and maintain its restrictive policy stance until inflation aligns with the target on a durable basis.", "category": "Economy", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123448", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE-Bengaluru 12-05.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123448"}], "article_id": "e87e1d9c"}, {"headline": "Apple to expand retail footprint with four new Indian stores", "summary": "Apple has confirmed plans to open four more retail stores in India, targeting cities like Bengaluru and Pune. This follows the successful launch of its flagship stores in Mumbai and Delhi. The expansion reflects Apple's growing commitment to the Indian market, which has become a key manufacturing and retail hub for the global technology giant.", "category": "Technology", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123448", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE-Bengaluru 12-05.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123448"}], "article_id": "35b3467b"}, {"headline": "GST Council to discuss tax slab rationalization in upcoming meeting", "summary": "The GST Council is scheduled to meet to discuss potential changes in tax slabs and rate rationalization. A Group of Ministers (GoM) has been reviewing items for possible slab shifts to reduce the burden on essential goods while increasing revenue from luxury or demerit items. Decisions on GST rates for health and life insurance premiums are also expected.", "category": "Economy", "page": 2, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123448", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE-Bengaluru 12-05.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123448"}], "article_id": "79a9d4d0"}, {"headline": "Government targets 12,000 km highway construction for current fiscal", "summary": "Union Minister Nitin Gadkari announced that the Ministry of Road Transport and Highways aims to construct 12,000 km of national highways in FY25. He highlighted that the government is focusing on innovative financing models like InvITs to fund new expressways. The goal is to reduce logistics costs in India to roughly 9% of the GDP from the current 14%.", "category": "Infrastructure", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123448", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE-Bengaluru 12-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123448"}], "article_id": "b4a500b1"}, {"headline": "Global oil prices fluctuate amid Middle East geopolitical tensions", "summary": "Brent crude prices remained volatile, hovering around $75 per barrel as markets reacted to the ongoing conflict in the Middle East. Concerns over potential supply disruptions from Iran provided upward pressure, while a weakening demand outlook from China limited gains. Analysts expect prices to stay sensitive to any escalation in the regional geopolitical landscape.", "category": "World", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123448", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE-Bengaluru 12-05.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123448"}], "article_id": "424587df"}, {"headline": "Tesla beats quarterly profit estimates on lower production costs", "summary": "Tesla reported third-quarter earnings that surpassed analyst expectations, driven by reduced cost per vehicle and robust sales of regulatory credits. CEO Elon Musk projected a 20% to 30% growth in vehicle deliveries for the next year. The company's profit margins improved despite stiff competition and previous price cuts across major international markets.", "category": "Business", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123448", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE-Bengaluru 12-05.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123448"}], "article_id": "5ab7ddc3"}, {"headline": "Retail inflation eases to 4-month low of 5.02 percent", "summary": "India’s retail inflation, based on the Consumer Price Index (CPI), eased to 5.02% in the latest month, down from 6.83% previously. The decline was primarily led by a sharp drop in vegetable prices, particularly tomatoes and onions. Core inflation also showed signs of softening, providing relief to the central bank’s monetary policy committee.", "category": "Economy", "page": 6, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123448", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE-Bengaluru 12-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123448"}], "article_id": "07971980"}, {"headline": "Reliance Industries reports marginal dip in quarterly net profit", "summary": "Reliance Industries (RIL) posted a consolidated net profit of Rs 17,394 crore for the quarter, a slight decrease compared to the previous year. While the retail and telecom (Jio) segments showed double-digit growth, the oil-to-chemicals (O2C) business faced pressure due to lower refining margins. Overall revenue for the conglomerate remained largely stable.", "category": "Business", "page": 6, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123448", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE-Bengaluru 12-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123448"}], "article_id": "b4d7be79"}, {"headline": "HDFC Bank net profit surges 33 percent post-merger", "summary": "HDFC Bank reported a 33% year-on-year jump in standalone net profit to Rs 15,976 crore for the second quarter. This is the first full quarter of results following its landmark merger with HDFC Ltd. While net interest income grew significantly, the bank saw a slight uptick in gross non-performing assets (NPAs), though capital adequacy remains strong.", "category": "Business", "page": 7, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123448", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE-Bengaluru 12-05.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/123448"}], "article_id": "5ec45436"}, {"headline": "Election Commission announces poll dates for Maharashtra and Jharkhand", "summary": "The Election Commission of India has released the schedule for the upcoming Assembly elections. Maharashtra will vote in a single phase on November 20, while Jharkhand will vote in two phases on November 13 and 20. The counting of votes for both states will take place on November 23. The Model Code of Conduct is now in immediate effect.", "category": "Politics", "page": 10, "importance": 10, "telegram_url": "https://t.me/c/1877410077/123448", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE-Bengaluru 12-05.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/123448"}], "article_id": "d488c3d7"}, {"headline": "AI adoption rising among Indian startups to enhance efficiency", "summary": "A recent industry report indicates that over 70% of Indian startups have integrated Artificial Intelligence (AI) into their core operations to improve productivity. Sectors like FinTech and HealthTech are leading the adoption to automate customer service and data analysis. Investors are increasingly favoring startups that demonstrate a clear AI-first strategy.", "category": "Technology", "page": 15, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123448", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE-Bengaluru 12-05.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/123448"}], "article_id": "24f88936"}, {"headline": "India secures dominant Test series win against New Zealand", "summary": "The Indian cricket team secured a comprehensive victory against New Zealand in the second Test match, clinching the three-match series. A stellar performance by the spin bowlers and a century by the opening batsman were the highlights of the match. India solidifies its top position in the World Test Championship (WTC) points table with this win.", "category": "Sports", "page": 16, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123448", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE-Bengaluru 12-05.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/123448"}], "article_id": "77085c56"}, {"headline": "Google Weighs Manufacturing AI Servers in India", "summary": "IT Minister Ashwini Vaishnaw has requested Google to begin manufacturing high-performance AI servers in India. Google has broken ground on a $15 billion AI hub in Andhra Pradesh's Visakhapatnam, which will host up to 5 gigawatts of data center capacity, marking its largest investment outside the United States.", "category": "Technology", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123443", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123443"}], "article_id": "bf42e190"}, {"headline": "GCCs Shift to Leaner Teams and Fewer Replacements", "summary": "India’s Global Capability Centres (GCCs) are moving away from headcount-led growth. New setups are starting with smaller teams of roughly 50 employees, and backfill mandates have dropped to 70-75 replacements per 100 exits. Companies are increasingly using AI and automation to scale output with highly skilled, leaner workforces.", "category": "Business", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123443", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123443"}], "article_id": "ad0cd887"}, {"headline": "Amazon Quick Commerce Push Pressures Market Leader Blinkit", "summary": "Amazon has intensified its 10-minute delivery competition, reaching 450,000-500,000 daily orders through approximately 500 dark stores. Market leader Blinkit, despite processing 3 million daily orders, has acknowledged losing market share in key metros as competition from Amazon and Flipkart Minutes grows.", "category": "Business", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123443", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123443"}], "article_id": "9ad8fd50"}, {"headline": "Insurance Companies Adopt Embedded Models for E-commerce and Fintech", "summary": "Insurers are bundling products into e-commerce and payment journeys to protect merchants from defaults and fraudulent orders. Startups like Riskcovry and Assurekit are designing contextual insurance for small businesses, with digital payment firms like Paytm and PhonePe pushing merchants to opt for credit protection.", "category": "Business", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123443", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123443"}], "article_id": "0fbd509f"}, {"headline": "SoftBank to Manufacture AI Data Centre Battery Cells in Japan", "summary": "SoftBank Group’s mobile unit will begin large-scale battery cell manufacturing at its Osaka plant starting April 2027. Partnering with Cosmos Lab and DeltaX, the project aims for an output of one gigawatt-hour per year to address the growing power demands of AI services and energy storage systems.", "category": "Technology", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123443", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123443"}], "article_id": "2f0df7aa"}, {"headline": "OpenAI Launches $4 Billion Unit to Push Enterprise AI", "summary": "OpenAI is establishing a new company with over $4 billion in initial investment to help organizations deploy AI systems. The venture, majority-owned by OpenAI, includes the acquisition of consulting firm Tomoro. The unit aims to embed engineers within corporate clients to identify high-impact AI applications.", "category": "Technology", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123443", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123443"}], "article_id": "c1fd0f26"}, {"headline": "TSMC to Remain Apple’s Primary Chip Manufacturing Partner", "summary": "Taiwan Semiconductor Manufacturing Co (TSMC) is expected to maintain its status as Apple’s lead chip partner despite reports of Apple potentially shifting some orders to Intel. Experts cite TSMC’s technological lead and production stability as critical for Apple’s core devices for the foreseeable future.", "category": "Technology", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123443", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123443"}], "article_id": "79ccd3ab"}, {"headline": "DailyObjects in Talks for 300 Crore Primary and Secondary Fundraise", "summary": "Lifestyle accessories brand DailyObjects is in advanced stages to close a 300 crore financing round led by Xponentia Capital. The deal, which may double the company's valuation to 1,000 crore, will provide an exit for early investor Roots Ventures and fund the brand’s omnichannel retail expansion.", "category": "Business", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123443", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123443"}], "article_id": "b349ade5"}, {"headline": "Alpha Compute Expands Confidential GPU Services in India", "summary": "US-listed AI infrastructure provider Alpha Compute is expanding its confidential GPU-as-a-service in India. Led by Cambridge Analytica whistleblower Brittany Kaiser, the firm is working with local data centers to provide low-latency AI services for clients like Telegram, focusing on secure, high-performance computing.", "category": "Technology", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123443", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123443"}], "article_id": "cbb765c0"}, {"headline": "Omar Abdullah Meets Amit Shah to Discuss J&K Statehood", "summary": "J&K Chief Minister Omar Abdullah met Union Home Minister Amit Shah in New Delhi to discuss the restoration of statehood and rationalization of reservation policies. The meeting also addressed the current security and economic situation in the Union Territory and governance issues regarding the appointment of the Attorney General.", "category": "Politics", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123443", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123443"}], "article_id": "6a0d3e5a"}, {"headline": "AIADMK Factions Show Deep Rifts During Tamil Nadu Oath-Taking", "summary": "Deep divisions within the AIADMK were evident during the oath-taking of the 17th Tamil Nadu Assembly as MLAs arrived in two separate groups. One faction led by SP Velumani submitted a letter claiming support for his leadership, challenging the authority of general secretary Edappadi K. Palaniswami.", "category": "Politics", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123443", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123443"}], "article_id": "36107c0e"}, {"headline": "Siddaramaiah Accuses BJP of Betrayal Politics Following PM’s Remarks", "summary": "Karnataka CM Siddaramaiah hit back at PM Modi’s allegations that Congress betrayed the DMK. Siddaramaiah cited a list of regional parties he claimed the BJP had sidelined in the past, including the Shiv Sena and Akali Dal. He questioned the PM’s economic management as citizens are being asked to cut consumption of gold and fuel.", "category": "Politics", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123443", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123443"}], "article_id": "4ce1cd0b"}, {"headline": "Kerala Private Bus Operators Oppose Free Travel Offer for Women", "summary": "Private bus operators in Kerala have raised concerns over the UDF's election promise to offer free travel to women in state-owned KSRTC buses. Operators claim the move will severely hurt their revenues and are demanding a relief package or stakeholder consultations before the scheme is implemented.", "category": "Business", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123443", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123443"}], "article_id": "2dc2392a"}, {"headline": "War Disrupts UAE Real Estate Market with Project Delays", "summary": "Construction project handovers in the UAE could be delayed by up to nine months due to the West Asia conflict. Rerouted shipping and a 30% rise in input costs for materials like aluminum and ceramics are straining developers. Approximately half of the 45,000 units scheduled for 2026 delivery in Dubai may be pushed to 2027.", "category": "Infrastructure", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123443", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123443"}], "article_id": "e4f9ed51"}, {"headline": "Jyothy Labs to Exit Henkel Brands Pril and Fa", "summary": "Jyothy Labs announced it will end its 15-year licensing partnership with German firm Henkel for the brands Pril and Fa on May 31, 2026. The company decided not to renew the arrangement after exploring commercial alternatives and plans to manage the transition by focusing on its own core brand portfolio.", "category": "Business", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123443", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123443"}], "article_id": "c10ba589"}, {"headline": "IHCL Plans Global Expansion with Asset-Light Strategy", "summary": "Indian Hotels Company (IHCL) is shifting its focus to international markets, targeting Frankfurt, South Africa, and Bhutan. MD Puneet Chhatwal stated the domestic business is on 'autopilot,' allowing the firm to seek management contracts and operating leases overseas. IHCL reported a 14.7% rise in Q4 net profit to 645 crore.", "category": "Business", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123443", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123443"}], "article_id": "6ea660ba"}, {"headline": "Manipal Health Completes 495 Crore Mumbai Hospital Acquisition", "summary": "Manipal Health Enterprises acquired an operational hospital building and land in Mumbai’s Andheri East for 495 crore. This concludes the second leg of a larger transaction totaling 908 crore. The deal highlights high demand for tertiary care infrastructure in metropolitan markets where large operational facilities are scarce.", "category": "Business", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123443", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123443"}], "article_id": "a5ecfad0"}, {"headline": "IIT Bhubaneswar AI Model Improves Rainfall Prediction Accuracy", "summary": "Researchers at IIT Bhubaneswar have developed an ensemble-based spatial attention AI model to predict rainfall with high accuracy. The system aims to provide better flood warnings in Odisha by analyzing complex weather patterns, potentially mitigating the impact of intense localized flooding during the monsoon.", "category": "Science", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123443", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/123443"}], "article_id": "8d449c93"}, {"headline": "Netanyahu Proposes Ending Israel’s Reliance on US Military Aid", "summary": "Israeli Prime Minister Benjamin Netanyahu stated he aims to phase out the $3.8 billion annual US military financial assistance over the next decade. Citing a desire for greater self-reliance and stronger ties with Gulf states, Netanyahu indicated that the timing is right to reconsider the long-standing funding arrangement.", "category": "World", "page": 12, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123443", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/123443"}], "article_id": "787bed15"}, {"headline": "China Car Sales Fall 21.5% Amid Iran War Oil Shock", "summary": "Passenger vehicle sales in China slumped 21.5% in April to 1.4 million units, the weakest April performance since 2022. The decline was driven by a sharp drop in demand for gasoline-powered cars following oil price volatility linked to the Iran conflict. Electric vehicle sales growth was insufficient to offset the broader market contraction.", "category": "Economy", "page": 12, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123443", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/123443"}], "article_id": "94769c22"}, {"headline": "Samsung and SK Hynix Outperform India Inc in Profits", "summary": "South Korean chipmakers Samsung and SK Hynix reported a combined net profit of $59.7 billion for the March quarter, surpassing the total aggregate profit of all listed Indian companies. The profit surge is attributed to massive global demand for memory chips essential for artificial intelligence technology and high operating margins.", "category": "Business", "page": 13, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123443", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/123443"}], "article_id": "7fac3d72"}, {"headline": "Government Official Rules Out Hike in Gold Import Duty", "summary": "Despite PM Modi’s appeal for citizens to avoid gold purchases, a government official clarified that there are currently no plans to increase import duties on gold and silver. India’s gold imports rose 24% to $72 billion in FY26. The industry warns that further duty hikes could encourage smuggling rather than reducing demand.", "category": "Economy", "page": 14, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123443", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/123443"}], "article_id": "89022d4c"}, {"headline": "Overleveraged Microfinance Borrowers Pose Rising Delinquency Risks", "summary": "Approximately 15,800 crore in microfinance loans, or 5% of the sector's total portfolio, are held by borrowers with loans from more than three lenders. Credit bureau data shows these overleveraged customers carry average debts exceeding 1 lakh, raising concerns about repayment capacity during economic business cycles.", "category": "Economy", "page": 14, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123443", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/123443"}], "article_id": "58cc054a"}, {"headline": "India Unemployment Rate Rises to 5% in March Quarter", "summary": "National survey data shows India’s unemployment rate rose to 5% in the January-March quarter from 4.8%. The increase was driven by rural joblessness and a rise in female unemployment to 5.3%. Youth unemployment reached 15%, while the overall labour force participation rate slightly dipped to 55.5%.", "category": "Economy", "page": 18, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123443", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/123443"}], "article_id": "25014ea6"}, {"headline": "IT Employee Body Demands Mandatory WFH Advisory from Government", "summary": "The Nascent Information Technology Employees Senate (NITES) has urged the labour ministry to mandate work-from-home for 5.8 million IT workers. The request follows PM Modi’s call for energy conservation. The body argues that WFH can reduce fuel consumption without disrupting productivity, as proven during the pandemic.", "category": "Business", "page": 18, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123443", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/123443"}], "article_id": "8646c5ff"}, {"headline": "Handset Retailers Gain from Memory Cost Inflation on Old Stock", "summary": "Smartphone dealers are seeing temporary profit gains as they sell older inventory at new, higher prices driven by 'memflation' or memory chip shortages. While retailers' per-unit margins have improved, distributors face challenges with a 25-30% increase in working capital required to maintain stock levels.", "category": "Business", "page": 18, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123443", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET Bengaluru 12-05-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/123443"}], "article_id": "dd97060c"}, {"headline": "Trump Says Iran Ceasefire is on Life Support After Proposal Rejected", "summary": "President Donald Trump stated a ceasefire with Iran is on 'life support' after he rejected Tehran's response to a US peace proposal. Iran's response demanded compensation for war damage and an end to the naval blockade. The 10-week-old conflict has already killed thousands and severely disrupted global energy flows through the Strait of Hormuz.", "category": "World", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/123462", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 12-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123462"}], "article_id": "eb0d7942"}, {"headline": "Government Weighs WFH Mandates and Fuel Price Hikes to Save Energy", "summary": "The petroleum ministry is considering austerity measures including potential retail price hikes for petrol and diesel. Officials suggest measures could include mandating work-from-home for up to 50% of employees in organizations. These steps aim to reduce domestic consumption as global energy supply chains face disruption from the closure of the Strait of Hormuz.", "category": "Economy", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123462", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 12-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123462"}], "article_id": "fbfe57d9"}, {"headline": "India to Draft New Joint Doctrines for ISR and Target Acquisition", "summary": "The Indian armed forces are set to release two new warfighting doctrines focused on Intelligence, Surveillance, and Reconnaissance (ISR) and targeting. Prepared by the Integrated Defence Staff, these manuals aim to integrate military capabilities across land, sea, air, space, and cyber domains to enable faster wartime decision-making and support the shift toward theatre commands.", "category": "Science", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123462", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 12-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123462"}], "article_id": "f117f388"}, {"headline": "Four Women Die After C-Section Deliveries at Kota State Hospitals", "summary": "Four women have died within a week following C-section deliveries at hospitals attached to the Kota Medical College in Rajasthan. Victims showed similar symptoms, including kidney infections and blood pressure drops. A probe team from Jaipur's SMS Hospital is investigating the deaths at JK Lone and New Medical College hospitals.", "category": "Health", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123462", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 12-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123462"}], "article_id": "9406fb56"}, {"headline": "Markets Tumble as Prime Minister’s Austerity Call Fuels Economic Concerns", "summary": "The Sensex fell 1,313 points (1.70%) and the Nifty dropped 1.49% following PM Modi’s appeal to reduce fuel and gold consumption. Jewelry and travel stocks were major losers, with Titan shedding 6.73%. The rupee also fell to 95.31 per dollar, its steepest single-day drop since March, as investors anticipate tougher measures to curb imports.", "category": "Business", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123462", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 12-05.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123462"}], "article_id": "c4b3dfa5"}, {"headline": "Keir Starmer Vows to Fight On After Disastrous Local Election Results", "summary": "British PM Keir Starmer pledged to prove his 'doubters' wrong after his Labour party lost over 1,400 council seats and control of the Welsh parliament. Despite calls from some MPs to step down, Starmer vowed to remain bolder and reset his premiership. Restless lawmakers cite economic growth failure and dissatisfaction with his leadership.", "category": "World", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123462", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 12-05.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123462"}], "article_id": "195d887d"}, {"headline": "SC Stays Sringeri Assembly Seat Recount Result in Relief for Congress", "summary": "The Supreme Court granted interim relief to Congress MLA TD Rajegowda by staying a recent vote recount that had declared BJP's DN Jeevaraj the winner of the Sringeri seat. The court observed that the Returning Officer's exercise of reverifying validated postal ballots was prima facie invalid. Status quo ante has been restored until the appeal is decided.", "category": "Law", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123462", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 12-05.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123462"}], "article_id": "7bc1ad1e"}, {"headline": "UP Minister Seeks Removal of Nursery Rhymes Over ‘Indian Values’", "summary": "Uttar Pradesh Higher Education Minister Yogendra Upadhyaya plans to write to the Centre seeking the removal of rhymes like 'Johnny Johnny Yes Papa' from school syllabi. He argues these poems promote dishonesty and selfishness, which he claims are against Indian values. He clarify he is not opposed to the English language but wants culturally appropriate content.", "category": "Education", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123462", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 12-05.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123462"}], "article_id": "ba46f724"}, {"headline": "Wordle to Launch as TV Game Show Hosted by Savannah Guthrie", "summary": "The New York Times' viral word game 'Wordle' is being adapted into a television game show on NBC next year. Teams will compete in guessing five-letter words to win cash prizes. The show will be hosted by Savannah Guthrie. The move follows the game's massive success since its 2021 launch and 2022 acquisition by the NYT.", "category": "Culture", "page": 2, "importance": 3, "telegram_url": "https://t.me/c/1877410077/123462", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 12-05.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123462"}], "article_id": "916e51a7"}, {"headline": "Soaring Ticket Prices and War Shadows Loom Over 2026 World Cup", "summary": "Anticipation for the 2026 FIFA World Cup is being met with backlash over 'extortionate' ticket prices, with the priciest seats reaching $32,970. Political tensions and the conflict in West Asia have also cast a shadow, with broadcast rights deadlocks in India and questions over Iran's participation. FIFA is currently managing the public relations fallout.", "category": "Sports", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123462", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 12-05.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123462"}], "article_id": "cf66566d"}, {"headline": "Karnataka to Implement Bilingual Education Policy in Government Schools", "summary": "Karnataka Education Minister Madhu Bangarappa announced that government schools will adopt a bilingual education policy (Kannada and English) from the next academic year. The move aims to improve English proficiency for global competitiveness while keeping Kannada as the foundation. Teacher training and curriculum revisions are planned to support the roll-out.", "category": "Education", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123462", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 12-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123462"}], "article_id": "e1886792"}, {"headline": "Siddaramaiah Blames Centre’s Foreign Policy for Rising Fuel Costs", "summary": "Karnataka CM Siddaramaiah criticized the Union government's 'confused foreign policy' for the current economic hardship and rising fuel prices. His comments followed PM Modi’s appeal for austerity. Siddaramaiah argued that India’s failure to take a firm stand on justice in the West Asia conflict led to the current crisis, rather than domestic consumption issues.", "category": "Economy", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123462", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 12-05.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123462"}], "article_id": "aa52980c"}, {"headline": "Police Probe Forgery Racket Involving Organ Donation Documents in Kerala", "summary": "Kochi police are investigating a forgery racket that produced fake certificates for organ donation. Six people have been arrested for forging letterheads of legislators, senior police officers, and private hospitals to bypass SOPs. The racket has been active since 2023, and investigators are now examining the role of hospital administrations in these procedural lapses.", "category": "Health", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123462", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 12-05.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123462"}], "article_id": "0ac70a18"}, {"headline": "Andhra Pradesh Launches Deep-Tech Skilling Initiative with IBM", "summary": "Andhra Pradesh CM N Chandrababu Naidu announced a statewide deep-tech skilling program in collaboration with IBM SkillsBuild. The initiative will cover AI, quantum computing, cybersecurity, and data analytics. It aims to reach 2 lakh learners in 2026-27 and 10 lakh over five years, focusing on empowering students and researchers with industry-driven learning.", "category": "Education", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123462", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 12-05.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123462"}], "article_id": "4caed4d2"}, {"headline": "Telangana CM Directs Fast-Track Probe Against Union Minister’s Son", "summary": "Telangana CM Revanth Reddy ordered a special team to investigate a POCSO case registered against Bhageerath, the son of Union Minister Bandi Sanjay Kumar. The case follows allegations of sexual harassment of a minor. While the accused claims the girl's family attempted extortion, the DGP has been tasked with ensuring a thorough and immediate investigation.", "category": "Law", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123462", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 12-05.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123462"}], "article_id": "2d9d272f"}, {"headline": "West Asia War Clouds Brics Foreign Ministers’ Meeting in India", "summary": "Differences between Iran and the UAE over energy infrastructure attacks are challenging the upcoming Brics foreign ministers’ meeting in India. Diplomats report difficulty in reaching a consensus for a joint statement due to the West Asia conflict. Brazil, China, and South Africa are also resisting changes to established language regarding the Palestine issue.", "category": "World", "page": 5, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123462", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 12-05.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123462"}], "article_id": "46c22f71"}, {"headline": "Bihar Notifies New Industrial Land Policy to Eliminate Red Tape", "summary": "The Bihar government notified the Land Allotment and Management Policy, 2026, replacing the 2020 version. Managed by BIADA, the new policy mandates online allotments and e-auctions for industrial plots to ensure transparency. It includes plug-and-play facilities, simplified payments, and clear timelines to make the state more investor-friendly.", "category": "Economy", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123462", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 12-05.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123462"}], "article_id": "b5adb2ae"}, {"headline": "Supreme Court Suggests Timelines for Disposal of Bail Pleas", "summary": "The Supreme Court suggested that all high courts prescribe outer timelines for disposing of bail disputes to protect personal liberty. A bench led by the CJI recommended that bail pleas be listed within a week of filing and discouraged routine adjournments sought by governments. The court emphasized the need for a collaborative approach with investigating agencies.", "category": "Law", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123462", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 12-05.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/123462"}], "article_id": "2f4a535b"}, {"headline": "Himachal Pradesh Mandates Dope Testing for Government Job Recruits", "summary": "Chief Minister Sukhvinder Singh Sukhu announced that heroin testing will be mandatory for government job recruitment and admissions to state-run medical and engineering colleges. Part of a 'zero tolerance' policy, the move aims to save the state's youth from narcotics. Candidates found positive will be offered rehabilitation and treatment.", "category": "Health", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123462", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 12-05.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/123462"}], "article_id": "bb855f83"}, {"headline": "SC Raps Rajasthan Over ‘Utter Failure’ to Curb Illegal Sand Mining", "summary": "The Supreme Court criticized the Rajasthan government for failing to stop the sand mining mafia in the Chambal Gharial Sanctuary. The court observed that enforcement steps exist only on paper and questioned why unregistered tractors were allowed to operate. The bench suggested the state establish a special task force to combat the organized mafia.", "category": "Environment", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123462", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 12-05.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/123462"}], "article_id": "93a3767b"}, {"headline": "UN Warns Fertilizer Blockade in Hormuz Puts Millions at Hunger Risk", "summary": "The head of a UN task force warned that 45 million more people could face starvation if fertilizers remain blocked in the Strait of Hormuz. The ongoing conflict has prevented vital agricultural supplies from reaching global markets. Jorge Moreira da Silva stated that the international community has only a few weeks to avert a massive humanitarian crisis.", "category": "World", "page": 13, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123462", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 12-05.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/123462"}], "article_id": "ab307e4c"}, {"headline": "Google Foils AI-Driven Cyberattack Exploiting Unknown Digital Vulnerability", "summary": "Google disrupted a criminal group's attempt to use artificial intelligence to exploit a company's previously unknown digital vulnerability. Threat intelligence analysts stated this represents the realization of long-standing warnings about hackers using AI to supercharge their capabilities. The incident highlights heightened risks for global cybersecurity in the AI era.", "category": "Technology", "page": 14, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123462", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 12-05.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/123462"}], "article_id": "017341ae"}, {"headline": "Delhi Capitals Beat Punjab Kings to Keep IPL Playoff Hopes Alive", "summary": "Delhi Capitals secured a three-wicket victory over Punjab Kings in Dharamsala, successfully chasing a target of 211. DC's Axar Patel and David Miller hit half-centuries to overcome an early wobble. The win keeps DC in the playoff hunt, while PBKS suffered their fourth consecutive defeat. All 20 overs in the first innings were bowled by pacers.", "category": "Sports", "page": 16, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123462", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 12-05.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/123462"}], "article_id": "6c3c9ecf"}, {"headline": "BFI Issued Showcause Notice Over Selection Process Irregularities", "summary": "The Sports Ministry issued a showcause notice to the Boxing Federation of India (BFI) regarding administrative lapses and lack of transparency in athlete selection for the Asian Games and CWG. Issues include restricted entry to the COAS Open Cup and failure to appoint a High Performance Director. BFI has been given seven days to respond to the allegations.", "category": "Sports", "page": 16, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123462", "sources": [{"newspaper": "Hindustan Times", "pdf_filename": "UHT Bengaluru 12-05.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/123462"}], "article_id": "9b59d603"}, {"headline": "China's Decree 834 creates national security framework for supply chains", "summary": "The Chinese government issued Decree 834, a comprehensive regulation on supply chain security that subjects multinational companies to scrutiny if their actions cause 'substantial harm'. Accompanied by Decree 835, the framework aims to deter firms from shifting manufacturing out of China. Experts suggest India needs a similar state-backed protective system to counter these regulations.", "category": "Business", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "8fe989ee"}, {"headline": "Equity mutual fund inflows fall 5% in April despite market rise", "summary": "Inflows into equity mutual funds fell 5% in April to ₹38,440.2 crore despite a 6.5% rise in the BSE Sensex. While Systematic Investment Plan (SIP) contributions remained firm at ₹31,115 crore, household investors showed caution amid geopolitical tensions in West Asia. High energy prices and a widening trade gap put pressure on the rupee, though mutual funds still provide market support.", "category": "Business", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "69834f99"}, {"headline": "Mumbai and Chennai report highest shares of high-value metro fraud", "summary": "Data from 2024 crime records show that while most financial fraud cases in Indian metros involve losses below ₹10 lakh, Chennai, Coimbatore, and Mumbai report the highest shares of fraud exceeding ₹1 crore. Chennai leads with 7% of cases being high-value, followed by Coimbatore at 5.9% and Mumbai at 5.4%. In contrast, Pune reported the lowest share of high-value cases at 0.3%.", "category": "India", "page": 1, "importance": 4, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "dc5df2bb"}, {"headline": "West Asia conflict threatens India’s MSME and retail credit recovery", "summary": "An escalating conflict in West Asia and disruptions in the Strait of Hormuz risk derailing India’s bank credit growth, which exceeded 14% recently. MSMEs are facing liquidity strain with ₹8 trillion locked in delayed payments. High crude prices and rupee depreciation are increasing production costs, potentially triggering defaults in vehicle and retail loan portfolios as inflation rises.", "category": "Economy", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "c5c02216"}, {"headline": "Indian markets slump as PM Modi calls for voluntary austerity measures", "summary": "Benchmark indices marked their steepest single-day fall since March after Prime Minister Narendra Modi urged citizens to cut fuel use and gold purchases. The Nifty 50 fell 1.49% and the Sensex slumped 1.7% as investors interpreted the remarks as a signal for upcoming fuel price hikes. Shares of oil marketing companies, jewellers, and airlines were hit hardest by the selloff.", "category": "Business", "page": 3, "importance": 10, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "3a4f9148"}, {"headline": "Oil marketing companies use tax data to identify ineligible subsidy users", "summary": "Hindustan Petroleum, Indian Oil, and Bharat Petroleum have started using income tax records to identify and disqualify LPG subsidy beneficiaries earning over ₹10 lakh annually. Consumers receive text messages stating their eligibility may be discontinued unless they dispute the findings within seven days. This move comes as OMCs face daily losses of ₹1,000 crore on fuel and gas sales.", "category": "Business", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "c4ce260b"}, {"headline": "GST Council to clarify taxation for ride-hailing app companies by July", "summary": "The GST Council is expected to meet before mid-July to discuss simplified procedures and the taxation of app-based cab services. The focus is on whether subscription-based platforms, which do not set fares or collect payments directly, are liable for tax under Section 9(5). The move aims to bring clarity and avoid disputes caused by differing interpretations from various authorities.", "category": "Law", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "32dbd5b2"}, {"headline": "Chinese imports drive explosion in low-speed electric scooter sales", "summary": "Sales of low-speed electric scooters, often powered by cheap Chinese kits, surged over 200% in 2025 to 1.3 million units. These vehicles do not require registration on the Vahan portal, allowing them to grow rapidly despite concerns from established EV makers regarding product quality and consumer safety. Market experts suggest the low price point is attracting young users and delivery fleets.", "category": "Technology", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "36181c9c"}, {"headline": "Repo teams begin collecting Spirit Airlines jets amid liquidation fears", "summary": "Aircraft leasing firms have deployed specialized pilots from Nomadic Aviation Group to repossess dozens of Spirit Airlines jets as the carrier nears liquidation. The complex process involves coordinating with airport officials, maintenance inspections, and navigating regulatory paperwork. Approximately 24 jets have been moved to storage facilities in the Arizona desert to prevent rust.", "category": "World", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "8cb4d643"}, {"headline": "Affluent Indians shift to local luxury destinations amid rising airfares", "summary": "High international airfares and geopolitical instability in West Asia are pushing wealthy Indian travellers toward domestic premium markets. Luxury hotels in Goa, Kerala, and Rajasthan are seeing record tariffs and high occupancy during the traditional off-season. Some families have abandoned European trips as business class seats cross ₹5 lakh, opting for private cruises in Kochi instead.", "category": "Culture", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "d02aac3e"}, {"headline": "US trade delegation to visit India for bilateral agreement talks", "summary": "A US trade delegation is expected to visit India to continue negotiations for a bilateral agreement, following a visit by Indian trade officials to Washington last month. The talks aim to conclude subsequent phases of a trade pact initially agreed upon in February. Specific dates for the visit are yet to be finalized as both nations seek to strengthen economic ties.", "category": "Economy", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "64380c30"}, {"headline": "Centre considers incentives to boost nationwide floating solar panel installation", "summary": "The Indian government is mulling new incentives for floating solar panels to ensure renewable energy capacity is distributed across more states. New and renewable energy secretary Santosh Sarangi stated that the energy transition will focus on affordability and sustainability. The move aims to prevent solar capacity from being concentrated only in a few geographically favorable regions.", "category": "Environment", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "5387454f"}, {"headline": "Economists predict wider current account deficit despite PM’s austerity call", "summary": "India's current account deficit is expected to widen to 1.8-2% of GDP in FY27 as the Strait of Hormuz conflict elevates crude oil prices and weakens capital flows. Economists warn that Prime Minister Modi's call for voluntary austerity regarding gold and travel may only provide limited relief to the external account, with the oil bill potentially rising by $18 billion on an annualized basis.", "category": "Economy", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "a205d348"}, {"headline": "Private centers allowed to test and certify fuel dispensers under new rules", "summary": "The Centre has amended Legal Metrology rules to permit government-approved private testing centers to inspect and certify fuel dispensing machines. This applies to petrol, diesel, CNG, LPG, and hydrogen dispensers. The move aims to reduce delays for fuel retailers who previously faced bottlenecks with government inspectors, while ensuring accuracy for consumers.", "category": "Infrastructure", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "5fe73ed2"}, {"headline": "Petroleum ministry rules out bailout for fuel retailers amid losses", "summary": "The government has no current proposal to provide fiscal support or a bailout for oil marketing companies despite their significant losses on fuel sales. Sujata Sharma, joint secretary at the petroleum ministry, stated that petrol and diesel prices remain stable at pumps for now. The ministry is focusing on austerity measures and ensuring unhindered supplies during the West Asia crisis.", "category": "Business", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "bf5961f8"}, {"headline": "India mulls emergency steps to protect forex reserves during war", "summary": "Government officials and the RBI are discussing emergency measures to shore up foreign-exchange reserves as the Iran war continues. Potential steps include curbing non-essential imports like gold and electronics, and implementing the first fuel price hike since the conflict began. Reserves recently dropped to $690.7 billion, the lowest in over a month, due to rising energy costs.", "category": "Economy", "page": 4, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "1eadcf5c"}, {"headline": "Apex regulator orders mandatory digital database for all blood centres", "summary": "The CDSCO has directed all 4,153 licensed blood centres in India to register on the Online National Drug Licensing System by 13 May. The move follows cases of contaminated transfusions and aims to track donor histories and provide public visibility into blood supplies. The registration is mandatory regardless of whether a facility's license is active, under renewal, or being processed.", "category": "Health", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "84cd32de"}, {"headline": "Novo Nordisk transfers Parkinson's therapy to Zuckerberg-backed AI startup", "summary": "Novo Nordisk has agreed to hand over an experimental Parkinson’s therapy to Cellular Intelligence, an AI startup, to accelerate clinical trials. Novo will acquire a stake in the Boston-based startup as part of the deal and stands to receive royalties and milestone payments. The move reflects a broader industry trend of utilizing AI to speed up the development of complex neurological treatments.", "category": "Science", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "61ab3e44"}, {"headline": "Tencent and Alibaba face slowing growth due to rising AI costs", "summary": "Tech giants Tencent and Alibaba are expected to see earnings shaped by rising AI investment costs and intensifying domestic competition following the launch of DeepSeek’s V4. Analysts predict Tencent's growth may slow as AI spending doubles, while Alibaba's valuation remains tied to long-term monetization. The firms are struggling to balance innovation costs with weak local consumption.", "category": "Technology", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "54c9f364"}, {"headline": "Fintech Slice prepares to launch AI-powered wealth management tools", "summary": "Slice is beta-testing a 'personal CFO' tool within its banking app to enter the wealth management sector. Built on regulated infrastructure, the AI tool tracks idle funds, maturing deposits, and warns users of potential cash crunches. Slice plans to eventually add investment products, evolving from a payments and credit platform into a full-stack financial distribution service.", "category": "Business", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "d08d23fd"}, {"headline": "SoftBank Corp to expand into AI computing power and battery production", "summary": "SoftBank's mobile unit plans to sell AI computing power and manufacture large-scale battery cells to meet hardware demand. The company will provide infrastructure for AI training in Japan and partner with South Korean firms to mass-produce batteries starting next fiscal year. The batteries will power AI data centres as SoftBank seeks a larger role in the global artificial intelligence race.", "category": "Technology", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "53f93baf"}, {"headline": "OpenAI secondary share sales create hundreds of new millionaires", "summary": "Over 600 current and former OpenAI employees collectively sold $6.6 billion in shares during a recent financing round, benefiting from the AI boom before an IPO. Some researchers walked away with up to $30 million each. The scale of pre-listing wealth creation is unprecedented, with top executives like Greg Brockman holding equity worth approximately $30 billion.", "category": "Business", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "a0ae6ef8"}, {"headline": "SBI Q4 results show margin pressure from repo rate cuts", "summary": "State Bank of India shares fell 11% following Q4 results that showed net interest income (NII) growth lagging behind loan growth. Domestic net interest margins (NIM) fell to 2.93% after repo rate cuts led to lower loan yields. However, the bank saw a 55% jump in loan processing fees and management aims to maintain domestic NIM above 3% for the next fiscal year.", "category": "Business", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "a853b21b"}, {"headline": "Britannia Industries reports subdued volume growth amid international supply issues", "summary": "Britannia Industries saw shares fall 7% after reporting consolidated revenue growth of 6.5% and volume growth of 5.5% in Q4. Performance was hindered by supply disruptions in international business due to the West Asia war and competition in India. The company plans calibrated price hikes from Q1FY27 and is optimizing sourcing between India and international facilities.", "category": "Business", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "19391859"}, {"headline": "Mutual fund investors show resilience despite drop in passive fund inflows", "summary": "Net inflows into index funds dropped 43% month-on-month to ₹4,625 crore in April, while active equity fund inflows remained relatively steady with a 5% dip. Despite global volatility, retail investors have shown resilience, with small-cap and mid-cap categories hitting record highs. The trend suggests a shift back to active funds as investors seek professional management during market stress.", "category": "Business", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "b54c8082"}, {"headline": "South Indian Bank warns of gold loan slowdown under RBI rules", "summary": "Tighter RBI guidelines on gold loans are expected to slow growth at South Indian Bank, where the gold portfolio recently grew 46% to ₹24,729 crore. The new rules, effective 1 April, require strict classification of loans and cap consumption-based loans at ₹2.5 lakh. The bank is monitoring risks through a 'value at risk' framework but expects meeting robust demand to become difficult.", "category": "Business", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "2595e33c"}, {"headline": "Industry giants Adani and Mittal back PM's self-reliance energy call", "summary": "Business leaders Gautam Adani and Sunil Bharti Mittal have endorsed PM Modi’s appeal to cut gold and fuel imports. Speaking at the CII summit, Mittal urged for faster renewable energy adoption while Adani called for sovereign AI and energy intelligence. Industry leaders stressed that building domestic capacity is essential to shield the Indian economy from geopolitical shocks.", "category": "Business", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "39507dc1"}, {"headline": "Weak demand leads to divergent performance for sub-$1 billion IT firms", "summary": "Mid-tier Indian IT services firms are seeing widening performance gaps due to weak deal momentum and competition. While Sasken Technologies doubled revenue through acquisitions, Birlasoft reported a 6% revenue decline in FY26. Smaller firms are struggling to defend market share against larger peers while adapting to rapid AI-driven shifts in client demand and macroeconomic headwinds.", "category": "Business", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "8c4fe874"}, {"headline": "Calcutta High Court rules telecom firms need music licences for caller tunes", "summary": "The Calcutta High Court ruled that telecom operators must obtain separate licences from lyricists and composers through IPRS to offer caller tunes. The court held that music labels do not have the legal authority to grant rights for underlying musical and literary works. The dual-licensing framework will require telcos to pay royalties of 8-15% of end-user prices for ringtone services.", "category": "Law", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "07981d07"}, {"headline": "FMCG stocks rebound on early signs of stabilizing consumer demand", "summary": "The Nifty FMCG index has risen 6% over the past month as management commentary from Nestlé, Marico, and Dabur hints at improving consumption trends. Marico expects double-digit revenue growth in FY27, while Dabur has raised its guidance following GST cuts. However, rising input costs remain a risk, forcing companies to balance price hikes with volume growth to protect margins.", "category": "Business", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "c6c4c63a"}, {"headline": "Court dismissal of Tamannaah Bhatia case highlights celebrity content misuse", "summary": "A Madras High Court ruling against actor Tamannaah Bhatia over unauthorized image use after contract expiry has spotlighted the issue of 'long-tail' celebrity content misuse. Experts note that old stock and digital assets often remain in circulation indefinitely. The case underscores a need for rigorous contract drafting that clearly defines AI rights and inventory liquidation timelines.", "category": "Law", "page": 9, "importance": 4, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "f3143be6"}, {"headline": "Beijing confirms first visit by US President Donald Trump since 2017", "summary": "China has confirmed that US President Donald Trump will visit Beijing this week for a summit with Xi Jinping. Top negotiators will meet in Seoul beforehand to discuss trade tariffs, the Middle East war, and Taiwan. The visit is seen as a crucial step in managing differences and injecting stability into a volatile global relationship, despite ongoing diplomatic tensions.", "category": "World", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "5949890a"}, {"headline": "US and Iran remain deadlocked over Strait of Hormuz peace terms", "summary": "Peace negotiations between the US and Iran have hit an impasse, leaving the Strait of Hormuz largely blocked. Iran demanded an immediate end to fighting in Lebanon and the lifting of US sanctions in exchange for reopening the waterway, which handles a fifth of the world's energy. President Trump rejected the terms as 'totally unacceptable,' causing Brent crude to rise toward $105.", "category": "World", "page": 10, "importance": 9, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "414ebabf"}, {"headline": "Xi Jinping prioritizes national security as China's economy faces structural mess", "summary": "Chinese leader Xi Jinping is steering billions into AI and semiconductors while the domestic economy struggles with a property bust and high unemployment. Despite a massive military expansion and industrial strength, consumer confidence has gutted. Research indicates that state distortions and a focus on security over economic reform have reduced productivity and slowed GDP growth.", "category": "World", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/123410", "sources": [{"newspaper": "Mint", "pdf_filename": "Mint  Bengaluru 12-05-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/123410"}], "article_id": "b2605a74"}, {"headline": "India-bound fertilizer shipment scrapped over concerns of Iranian origin", "summary": "A cargo of urea intended for India was scrapped after officials raised concerns that it originated from Iran, which is under US sanctions. Aditya Birla Global Trading withdrew the cargo and offered a replacement. The incident highlights the strict oversight of trade origins as India balances its fertilizer requirements with international diplomatic and sanction protocols.", "category": "Business", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/123410
