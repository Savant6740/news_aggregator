elegram_url": "https://t.me/c/1877410077/126286"}], "article_id": "f3a69a37"}, {"headline": "NCW seeks report on murder of Delhi University assistant professor", "summary": "The National Commission for Women has sought a detailed report from the Delhi Police regarding the death of DU assistant professor Devosmita Paul. Paul was found dead at her Vasundhara Enclave residence on Thursday. The NCW has requested the FIR status, forensic findings, and CCTV footage within seven days. Police have registered a murder case under the Bharatiya Nyaya Sanhita.", "category": "India", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126286", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126286"}], "article_id": "df7d2763"}, {"headline": "Delhi government to penalize negligent officials in safety lapse cases", "summary": "Home Minister Ashish Sood announced that Delhi officials found guilty of negligence allowing illegal construction could face jail terms up to two years. Under the Disaster Management Act and Revenue Recovery Act, the government may withhold salaries and pensions or attach personal assets to recover losses. District Magistrates will now be empowered to fix accountability across departments.", "category": "Politics", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126286", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126286"}], "article_id": "b21512b7"}, {"headline": "Delhi government data shows 398% rise in fire deaths over decade", "summary": "Official data reveals that fire-related deaths in Delhi increased from 291 in 2014-15 to 1,452 in 2024-25. Total fire calls rose from 23,242 to 36,568 in the same period. Home Minister Ashish Sood attributed the increase to rising population, higher usage of flammable materials like wallpaper and plastic, and changes in gas used for air conditioners. Awareness campaigns are being launched.", "category": "Health", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126286", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126286"}], "article_id": "8f4023df"}, {"headline": "MCD seals five B&B units and demolishes 82 illegal properties", "summary": "The Municipal Corporation of Delhi launched a crackdown on illegal buildings following the Malviya Nagar fire. Five bed-and-breakfast units were sealed in Hauz Rani, and eight properties were targeted in Saket’s Saidulajab. Since June 1, the MCD has demolished 82 properties and sealed 43 for misuse or building by-law violations. Over 150 notices have been issued to other offenders.", "category": "Infrastructure", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126286", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126286"}], "article_id": "48d1bc61"}, {"headline": "Owner of fire-hit building previously arrested for aiding illegal immigrants", "summary": "Lavkesh Bajaj, owner of the Flourish Stay B&B where 21 died, was previously arrested in January 2025. He was accused of letting Bangladeshi nationals use his address to obtain fraudulent Indian identity documents for money. Bajaj is currently in police custody facing charges of culpable homicide not amounting to murder and grievous hurt related to the June 3 fire tragedy.", "category": "Law", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/126286", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126286"}], "article_id": "0f4edef2"}, {"headline": "One labourer killed and two injured in Lodhi Colony wall collapse", "summary": "A 55-year-old labourer died and two others were injured after a boundary wall and storage structure collapsed during sewage pipeline work in south Delhi's Lodhi Colony. The incident occurred at 1:08 a.m. on Friday during excavation. Rescue teams from the Delhi Fire Services and police pulled the survivors from the debris. The deceased has been identified as Devender.", "category": "India", "page": 2, "importance": 3, "telegram_url": "https://t.me/c/1877410077/126286", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126286"}], "article_id": "26b4bc86"}, {"headline": "Delhi High Court vacates stay on 2020 riots conspiracy charges", "summary": "The Delhi High Court vacated an interim order that had restrained a trial court from framing charges against accused persons in the 2020 north-east Delhi \"larger conspiracy\" case. Justice Neena Bansal Krishna also dismissed a plea by Devangana Kalita seeking access to specific WhatsApp chats and videos. The case involves charges under the Unlawful Activities (Prevention) Act.", "category": "Law", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126286", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126286"}], "article_id": "65e7e4cb"}, {"headline": "Delhi Police deploy personnel ahead of proposed CJP protest", "summary": "Delhi Police have deployed over 1,000 personnel in New Delhi despite receiving no formal request from the Cockroach Janta Party (CJP) for a protest at Jantar Mantar. The outfit, founded by Abhijeet Dipke, had called for a demonstration to demand Education Minister Dharmendra Pradhan’s resignation over exam lapses. Police stated they would examine any request if submitted.", "category": "India", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/126286", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126286"}], "article_id": "654d8854"}, {"headline": "Tamil Nadu CM Joseph Vijay outlines 436 vision statements for governance", "summary": "Chief Minister C. Joseph Vijay chaired his first Cabinet meeting, outlining 436 vision statements under the ‘Vetri Tamizhagam Vision Document.’ The plan is divided among 35 departments with specific targets for women's welfare, education, and infrastructure. The government also affirmed its stance against the Mekedatu reservoir project and pledged strict action against narcotics.", "category": "Politics", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126286", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/126286"}], "article_id": "9a23d40d"}, {"headline": "Himachal CM seeks better central compensation for State's ecological services", "summary": "Himachal Pradesh CM Sukhvinder Singh Sukhu claimed the State provides ecological services worth ₹90,000 crore annually but receives inadequate compensation. Speaking on World Environment Day, he set a target to increase forest cover to 32% by 2030. Sukhu plans to raise the issue at the upcoming NITI Aayog meeting, highlighting the State's role as the \"Lungs of North India.\"", "category": "Environment", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126286", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/126286"}], "article_id": "470fcfac"}, {"headline": "Karm Trust supports underprivileged women through graduate and law fellowships", "summary": "Founded by Radhika Bharat Ram, the Karm Trust provides fellowships to young women from households earning less than ₹5 lakh annually. The program supports students at Delhi University with tuition, travel, and mentorship. It currently offers Graduate and Law Fellowships, providing tools like laptops and digital skills training to help women achieve financial independence.", "category": "Education", "page": 3, "importance": 4, "telegram_url": "https://t.me/c/1877410077/126286", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/126286"}], "article_id": "614c6033"}, {"headline": "West Bengal CM Suvendu Adhikari visits Delhi amid portfolio allocation delays", "summary": "West Bengal CM Suvendu Adhikari traveled to Delhi for consultations with BJP leadership as the allocation of portfolios for 35 newly inducted ministers was deferred for a second time. Adhikari currently manages 42 departments. The visit is expected to focus on infrastructure development, industrial expansion, and ensuring the smooth execution of central projects in the state.", "category": "Politics", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126286", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/126286"}], "article_id": "55b060b9"}, {"headline": "BJD slams Centre for 11-year delay in Odisha coastal highway", "summary": "The Biju Janata Dal (BJD) criticized the Central government for delaying and altering the Odisha Coastal Highway Project, first announced in 2015. While the Union Cabinet recently approved the ₹8,301 crore project connecting Rameshwar to Paradip, the BJD argued the 11-year wait disregarded the aspirations of the people and the state's future economic development.", "category": "Infrastructure", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126286", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/126286"}], "article_id": "a494edaa"}, {"headline": "Supreme Court stays deportation of five women declared foreigners in Assam", "summary": "The Supreme Court ordered a status quo on the deportation of five women who were declared illegal foreigners by a Gauhati High Court order. A bench led by Justice Vikram Nath sought responses from the Centre and Assam government. The petitioners are challenging the Foreigners Tribunal's findings. The court directed that they should not be deported until the next hearing on July 16.", "category": "Law", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126286", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/126286"}], "article_id": "9fac9b95"}, {"headline": "Congress Rajya Sabha nominee Praveen Chakravarty faces opposition from Left allies", "summary": "Congress nominee Praveen Chakravarty filed papers for the Tamil Nadu Rajya Sabha byelection, claiming support from a new \"Social Justice Progressive Alliance.\" However, the CPI and CPI(M) objected to his claim, stating they were not consulted about the alliance name. The Left parties maintain they are only providing outside support to the TVK government and remain part of the DMK-led bloc.", "category": "Politics", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126286", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/126286"}], "article_id": "d0c4691c"}, {"headline": "Dalit worker allegedly assaulted and hung in well in Haryana", "summary": "A 32-year-old Dalit man was allegedly beaten and hung upside down in a well by upper-caste men in Haryana’s Hansi district on suspicion of stealing a motor. The victim, Baru, was reportedly filmed while being forced to confess. Police have registered a case for attempt to murder and criminal intimidation against several individuals from Sorkhi village after the victim sought medical care.", "category": "India", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126286", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/126286"}], "article_id": "6ced0c55"}, {"headline": "NDA announces candidates for Bihar Legislative Council biennial elections", "summary": "The National Democratic Alliance in Bihar announced eight candidates for the June 18 Legislative Council polls. The JD(U) named Nishant Kumar, son of CM Nitish Kumar, alongside three others. The BJP also announced four candidates including Sanjay Mayukh and Sheela Pandit. Ten seats are up for election, with current holders including members from JD(U), BJP, RJD, and Congress.", "category": "Politics", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126286", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/126286"}], "article_id": "9cb33ccf"}, {"headline": "Thar Desert residents use traditional methods to combat extreme heatwave", "summary": "Residents of Rajasthan’s Thar Desert are using thatched roofs and clay-cow dung walls to lower indoor temperatures as mercury levels cross 46 degrees Celsius. While the 45-day closure of the Indira Gandhi Canal for maintenance caused water shortages, the flow has recently been restored. Villagers are seeking increased work under MGNREGS to mitigate the heatwave's economic impact.", "category": "Environment", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126286", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/126286"}], "article_id": "9c5d9e67"}, {"headline": "ADR report finds 13 Karnataka Cabinet ministers are crorepatis", "summary": "An analysis by the Association for Democratic Reforms revealed that 13 out of 14 Karnataka Cabinet ministers are crorepatis, with average assets of ₹206.15 crore. CM D.K. Shivakumar leads with assets worth ₹1,413.80 crore. The report also noted that 13 ministers have declared criminal cases against themselves, including three with serious charges.", "category": "Politics", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126286", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/126286"}], "article_id": "c770de10"}, {"headline": "Congress fears cross-voting in Madhya Pradesh Rajya Sabha elections", "summary": "Internal discontent within the Congress over the nomination of Meenakshi Natarajan for a Rajya Sabha seat in Madhya Pradesh has fueled fears of cross-voting. While the BJP has fielded two candidates, it has enough surplus votes to potentially influence the third seat. The Congress currently has 62 eligible voters, but some members have publicly criticized the candidate selection.", "category": "Politics", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126286", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/126286"}], "article_id": "7a86aec5"}, {"headline": "Ammonia gas leak at Kerala ice plant hospitalises 12 people", "summary": "Twelve people were hospitalized in Ernakulam district after an ammonia leak at a private ice plant in Munambam. The leak occurred when a building slab fell onto a receiver tank. Residents reported breathing difficulties and eye irritation. Fire and rescue services took two hours to control the situation. A local young woman with asthma was shifted to a taluk hospital for specialized care.", "category": "Health", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/126286", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/126286"}], "article_id": "ae137851"}, {"headline": "Survivor in 2017 actor rape case seeks SIT investigation", "summary": "The survivor in the 2017 actor rape case moved the Kerala High Court seeking a Special Investigation Team probe into alleged unauthorized access to a memory card containing visuals of the crime. She requested the court to quash a previous inquiry report and order a fresh, time-bound investigation into the possible copying and transmission of the sensitive video recordings.", "category": "Law", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126286", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/126286"}], "article_id": "a4aaa75c"}, {"headline": "Karnataka government announces free bus travel for all students", "summary": "Chief Minister D.K. Shivakumar announced free bus travel for students across Karnataka. While the move is expected to benefit lakhs of students, transport corporation officials expressed concerns over potential revenue losses. Currently, around 10 lakh students use concessional passes. The success of the scheme depends on the government reimbursing the RTCs, which are already facing dues.", "category": "Education", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126286", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/126286"}], "article_id": "8ecb64a4"}, {"headline": "Putin warns Western pressure on India will damage international relations", "summary": "Russian President Vladimir Putin stated that Western attempts to pressure India to reduce ties with Russia would harm global stability. He described India as a reliable partner that prioritizes national interests. Putin also offered to jointly develop Su-57 stealth aircraft with India and noted that Moscow would not interfere in \"delicate\" border issues between India and China.", "category": "World", "page": 12, "importance": 9, "telegram_url": "https://t.me/c/1877410077/126286", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/126286"}], "article_id": "3590c228"}, {"headline": "Supreme Court denies bail to travel blogger accused of spying", "summary": "The Supreme Court dismissed the bail application of travel blogger Jyoti Malhotra, accused of sharing sensitive information with Pakistani intelligence. A bench led by Justice Dipankar Datta termed the allegations \"very serious,\" involving national security. Malhotra, who ran the \"Travel-with-Jo\" channel, has been in custody since May 2023 under the Official Secrets Act.", "category": "Law", "page": 12, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126286", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/126286"}], "article_id": "9b8ff68a"}, {"headline": "Nepal Foreign Minister Shisir Khanal meets NSA Ajit Doval in Delhi", "summary": "Nepal's Foreign Minister Shisir Khanal met with India's National Security Adviser Ajit Doval during an official visit to New Delhi. This is the first high-level visit from Nepal’s new government since March. Discussions focused on enhancing cooperation in trade, connectivity, and energy. Khanal is also expected to hold talks with External Affairs Minister S. Jaishankar.", "category": "Politics", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126286", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/126286"}], "article_id": "9c816d0d"}, {"headline": "Census official denies data tampering in Rajasthan house listing operation", "summary": "An official from the Registrar General of India clarified that re-checking house listing data in Rajasthan is a standard procedure to correct discrepancies. The response follows reports that enumerators were being asked to edit entries on LPG connections and open defecation. The official emphasized that field inspections ensure data accuracy in India's first digital census.", "category": "India", "page": 12, "importance": 4, "telegram_url": "https://t.me/c/1877410077/126286", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/126286"}], "article_id": "7f577d2e"}, {"headline": "Gunmen kill three Kuki villagers and torch homes in Manipur", "summary": "Unidentified gunmen killed three Kuki villagers, including a woman, and burned seven houses in Manipur's Kangpokpi district. The Kuki Inpi Manipur accused Naga insurgent groups of the attack. Chief Minister Yumnam Khemchand Singh condemned the \"cowardly\" violence and ordered enhanced security. The attack occurred amid ongoing ethnic tensions and demands for a separate administration.", "category": "India", "page": 12, "importance": 8, "telegram_url": "https://t.me/c/1877410077/126286", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/126286"}], "article_id": "daf1ea8f"}, {"headline": "CBSE hires teenage hacker to fix vulnerabilities in re-evaluation portal", "summary": "The CBSE invited 19-year-old ethical hacker Nisarga Adhikary to work with IIT experts to fix \"critical vulnerabilities\" in its IT system. Gaps included an \"Authentication Bypass\" and a data exposure glitch. An IIT team worked 16 to 18 hours daily for two weeks to patch the codebase after the board's portal was hit by massive coordinated cyberattacks during student re-evaluations.", "category": "Technology", "page": 13, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126286", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/126286"}], "article_id": "adfb4044"}, {"headline": "CBSE files police complaint over sophisticated cyberattacks on student portal", "summary": "The CBSE has filed a formal complaint with the Delhi Police's IFSO Unit after its Post-Result Services Portal was hit by coordinated cyberattacks. Attackers used multiple IP addresses to flood the system with malicious traffic, attempting to deny access to students and extract information. The Board stated its databases remain secure and no data breach has been detected.", "category": "Technology", "page": 13, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126286", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/126286"}], "article_id": "c9b63bda"}, {"headline": "Andaman and Nicobar administration proposes formal elections for tribal councils", "summary": "The Andaman and Nicobar Islands administration plans to introduce formal ballot paper elections for Nicobarese Village and Island Tribal Councils. Draft rules include provisions for delimitation and women's seat reservations. Some community leaders expressed concern that the move could bureaucratize traditional governance and favor leaders who support controversial development projects.", "category": "Politics", "page": 13, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126286", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/126286"}], "article_id": "0f7f434d"}, {"headline": "Two workers killed in underground coal mine roof collapse in Shahdol", "summary": "Two workers died and four were injured after a roof collapsed at the Bangwar coal mine in Madhya Pradesh, operated by SECL. The victims, Ballu Baiga and Golu Baiga, were constructing a stopping wall when the accident occurred. Rescue teams and mine management reached the site immediately. The injured were admitted to a local hospital for treatment.", "category": "India", "page": 14, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126286", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/126286"}], "article_id": "f2aa5028"}, {"headline": "J&K CM Omar Abdullah calls Article 370 abrogation a policy mistake", "summary": "Speaking at The Hindu Huddle, J&K CM Omar Abdullah described the abrogation of Article 370 as the Union government’s biggest policy error. He demanded the restoration of statehood and questioned the lack of a clear timeline. Abdullah also argued that ‘One Nation, One Election’ is unrealistic for a diverse country with varying state government stability.", "category": "Politics", "page": 16, "importance": 8, "telegram_url": "https://t.me/c/1877410077/126286", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/126286"}], "article_id": "c59464fc"}, {"headline": "Diplomats at Hindu Huddle emphasize international cooperation and rules-based trade", "summary": "Envoys from the EU and Australia discussed the importance of a rules-based order at The Hindu Huddle. EU Ambassador Hervé Delphin highlighted India’s role in conflict resolution, while Australian High Commissioner Philip Green stressed the need to protect existing trade and shipping rules amid global polarization. Former Foreign Secretary Nirupama Rao also addressed the panel.", "category": "World", "page": 16, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126286", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH Delhi 06-06-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/126286"}], "article_id": "81eee4fb"}, {"headline": "Chinese Ambassador calls for full normalization of ties with India", "summary": "Chinese Ambassador Xu Feihong stated that India-China relations have improved to a \"new level o ational autonomy of these state-run companies.", "category": "Business", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126225", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_06-06-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/126225"}], "article_id": "353e96a3"}, {"headline": "AirTrunk plans $30 billion data centre investment in India by 2030", "summary": "Australian hyperscale data centre provider AirTrunk has announced plans to invest $30 billion in India to develop a 5-gigawatt capacity by 2030. The company met with Prime Minister Narendra Modi to discuss its digital infrastructure roadmap. The investment aims to support India's growing demand for cloud services and artificial intelligence.", "category": "Infrastructure", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126225", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_06-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/126225"}], "article_id": "df6f9eaf"}, {"headline": "Maruti Suzuki increases market share to 42.8% in May sales", "summary": "Maruti Suzuki India reported a significant increase in its passenger vehicle market share, reaching 42.8% in May. Growth was driven by strong sales in the SUV segment and a recovery in the entry-level car category. The company plans to launch new models and expand production capacity to meet growing demand in the domestic market.", "category": "Business", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126225", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_06-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/126225"}], "article_id": "2c2bbf1f"}, {"headline": "Regulator considers price hike for critical cancer treatment drugs", "summary": "The National Pharmaceutical Pricing Authority is evaluating a proposal to increase the prices of several cancer drugs, including cisplatin and carboplatin. The move follows representation from manufacturers citing a sharp rise in the cost of active pharmaceutical ingredients. If approved, the hike could impact the affordability of critical treatments.", "category": "Health", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126225", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_06-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/126225"}], "article_id": "3fab429e"}, {"headline": "Trai plan to regulate internet TV raises concerns among broadcasters", "summary": "The Telecom Regulatory Authority of India (Trai) has proposed a new framework to regulate internet-based television services. The move aims to bring OTT platforms and social media video services under a common licensing regime. Industry bodies have raised concerns that such regulations could stifle innovation and overlap with existing IT rules.", "category": "Technology", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126225", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_06-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/126225"}], "article_id": "884fe50b"}, {"headline": "The cultural significance of handloom sarees among women MPs", "summary": "The use of handloom sarees by women Members of Parliament has become a symbol of cultural identity and support for India's traditional weaving industry. Many MPs choose to wear regionally distinct weaves during parliamentary sessions to showcase the country's diverse heritage. This trend has helped revive interest in traditional textiles and supports rural artisans.", "category": "Culture", "page": 10, "importance": 3, "telegram_url": "https://t.me/c/1877410077/126225", "sources": [{"newspaper": "Economic Times", "pdf_filename": "Bangalore_ET_06-06-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/126225"}], "article_id": "8864bf82"}, {"headline": "CBSE muddle hits foreign admissions and IIT dreams of students", "summary": "A sudden drop in CBSE Class XII marks following re-evaluation has left many students in a crisis. Several students who had secured foreign scholarships or met IIT eligibility criteria found their marks reduced by 10-20 points, jeopardizing their admissions. Families are concerned about the lack of clarity and the impact on time-sensitive college enrollment windows.", "category": "Education", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "7b72046c"}, {"headline": "AirTrunk unveils $30bn push for data centers in India", "summary": "Australian data center operator AirTrunk has announced a $30 billion investment to develop 5GW of data center capacity in India by 2030. This move aims to position India as a global hub for AI and cloud infrastructure. The investment follows similar large-scale commitments from global tech giants like Microsoft, Amazon, and Google in the Indian digital sector.", "category": "Business", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "c13f60f9"}, {"headline": "R&AW officer's wife trampled to death by tusker in Kodagu", "summary": "The wife of a senior R&AW officer was tragically trampled to death by a wild elephant in Kodagu, Karnataka. The incident occurred while she was inspecting coffee plantations. Despite immediate attempts to rescue her, she succumbed to her injuries. Local authorities have highlighted the increasing frequency of human-wildlife conflict in the region's plantation areas.", "category": "Environment", "page": 1, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "cd527f17"}, {"headline": "BDA gets court reprieve on Rera ambit for now", "summary": "The Karnataka High Court has granted a stay on the applicability of the Real Estate (Regulation and Development) Act (Rera) for projects of the Bangalore Development Authority (BDA). The BDA argued that it is a planning authority, not a commercial promoter, and its projects follow specific BDA Acts. The court will further examine if BDA falls under the definition of a 'promoter'.", "category": "Law", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "a19cda36"}, {"headline": "Zelenskyy open letter urges Putin to end the four-year war", "summary": "Ukrainian President Volodymyr Zelenskyy has written an open letter to Russian President Vladimir Putin, proposing a face-to-face meeting to negotiate an end to the ongoing conflict. Zelenskyy emphasized that Ukraine is ready for peace based on a US-backed proposal. The Kremlin has acknowledged the letter but remains skeptical, citing the current situation on the battlefield.", "category": "World", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "9e843c7c"}, {"headline": "Bhutan announces monthly incentives for families to have more babies", "summary": "Concerned about its declining population, the Bhutanese government has introduced monthly incentives of approximately $105 for families having a third or subsequent child. The scheme applies to children born on or after June 4, 2026, with payments continuing until the child reaches the age of three. The move aims to stabilize the nation's demographic future.", "category": "World", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "5e93481f"}, {"headline": "Bengaluru development body governing most coveted portfolio", "summary": "The Bengaluru development portfolio has become the center of a political tug-of-war in the new Karnataka cabinet. Controlling major urban agencies like BDA, BBMP, and BWSSB, the ministry manages massive infrastructure projects and land-related decisions. Historically held by CMs or Deputy CMs, its allocation remains a high-stakes issue due to its vast economic and political influence.", "category": "Politics", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "96ab54fb"}, {"headline": "Rahul and Kharge accompany candidates for Rajya Sabha nominations", "summary": "Top Congress leaders Rahul Gandhi and Mallikarjun Kharge accompanied the party's candidates as they filed nominations for the Rajya Sabha from Karnataka. The three candidates, including former MP GC Chandrashekhar, are expected to win based on the party's strength in the state assembly. The move demonstrates the party high command's active involvement in state-level legislative processes.", "category": "Politics", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "cde313ce"}, {"headline": "BJP undecided on supporting Deve Gowda for Rajya Sabha", "summary": "The BJP is yet to announce its stance on whether to support JD(S) patriarch HD Deve Gowda for a Rajya Sabha seat. While some leaders advocate for an alliance, others suggest the party should field its own candidate. The delay has triggered speculation about the future of the BJP-JD(S) partnership in Karnataka and the strategic calculations for the upcoming elections.", "category": "Politics", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "8b7b9495"}, {"headline": "Byre Gowda gets plum portfolio while Shivakumar keeps BDA", "summary": "In a strategic cabinet reshuffle, Krishna Byre Gowda was assigned a key ministry, while Deputy CM DK Shivakumar retained control of the Bangalore Development Authority (BDA). The move is seen as an attempt to balance power among various factions within the ruling Congress party in Karnataka. Shivakumar will continue to oversee major infrastructure and land development projects.", "category": "Politics", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "db4bfc28"}, {"headline": "Karnataka govt issues order on free bus passes for students", "summary": "The Karnataka government has officially issued an order implementing free bus passes for students across the state. This fulfills a key pre-poll promise made by the Congress party. Students can now travel to educational institutions for free using state-run transport services. The transport department is working on the logistics to ensure smooth distribution of the passes.", "category": "Infrastructure", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "1793caab"}, {"headline": "Minister Khandre shifts focus to rural development and forests", "summary": "Eshwar Khandre, newly assigned the forest and environment portfolio, stated he will focus on rural development and protecting forest resources. He emphasized the need for sustainable growth and addressing the grievances of people living in forest-fringe areas. Khandre plans to implement various schemes to improve the quality of life in villages while ensuring environmental conservation.", "category": "Environment", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "62ebff77"}, {"headline": "AI technology to track attendance of Karnataka government staff", "summary": "The Karnataka government has decided to use Artificial Intelligence (AI) to track the attendance and punctuality of its staff. The new system, Kartavya, will use facial recognition and location tracking to ensure employees are in their offices during working hours. The move aims to improve administrative efficiency and accountability across various government departments.", "category": "Technology", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "5d34da2d"}, {"headline": "DK Shivakumar holds bilateral talks with German delegation", "summary": "Karnataka Deputy CM DK Shivakumar held talks with a high-level German delegation to discuss cooperation in infrastructure and renewable energy. The meeting focused on potential investments in the state's green energy sector and urban development projects. Shivakumar expressed the government's commitment to creating a favorable environment for international business and technology transfer.", "category": "Business", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "0128166c"}, {"headline": "Hariprasad says party will resolve cabinet discontent internally", "summary": "Senior Congress leader BK Hariprasad stated that the party's high command is aware of the dissatisfaction among some ministers regarding portfolio allocation and will resolve the issue internally. He urged leaders to remain united and focus on delivering the party's promises to the people. Hariprasad emphasized that such issues are common in large parties and will be handled tactfully.", "category": "Politics", "page": 2, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "2937e28b"}, {"headline": "Minister Khader inspects facilities at Jayanagar government hospital", "summary": "Health Minister UT Khader conducted a surprise inspection of the government hospital in Jayanagar to review its facilities and patient care. During the visit, he interacted with patients and staff to understand the challenges faced by the institution. Khader directed officials to upgrade the infrastructure and ensure that quality healthcare is accessible to all sections of society.", "category": "Health", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "81116e42"}, {"headline": "Agri student dies after falling from tree on university campus", "summary": "A 24-year-old MSc student at the University of Agricultural Sciences in Bengaluru tragically died after falling from a jackfruit tree on the campus. The incident occurred at midnight when the student and his friends went to pick fruit. Despite being rushed to a nearby hospital, he succumbed to his injuries. Police have registered a case of unnatural death and are investigating.", "category": "India", "page": 3, "importance": 3, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "70d44981"}, {"headline": "Two workers suffocate to death in chemical cooling tower basin", "summary": "Tragedy struck a chemical factory in Jigani as two brothers suffocated to death while cleaning a cooling tower basin. The victims were reportedly not wearing proper safety gear when they entered the basin and were overcome by toxic fumes. Two other coworkers who tried to rescue them are in critical condition. Police have filed a case of negligence against the factory management.", "category": "India", "page": 3, "importance": 3, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "9d1e141e"}, {"headline": "Karnataka records significant surge in female homeowners", "summary": "Data from the National Family Health Survey-6 reveals a major shift in property ownership in Karnataka, with a sharp rise in the number of women owning homes. Both urban and rural areas have seen an increase, attributed to government incentives, greater financial independence, and changing social attitudes. Experts believe this trend enhances the financial security and social status of women.", "category": "Economy", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "a3d4b40b"}, {"headline": "Domestic help steals Rs 25L from employer's home", "summary": "A domestic worker in Bengaluru was arrested for allegedly stealing Rs 25 lakh from her employer's residence over several years. The theft came to light when the homeowner noticed a significant shortage in cash kept for property transactions. CCTV footage confirmed the worker's involvement. Police managed to recover Rs 15 lakh from the suspect's residence.", "category": "Law", "page": 4, "importance": 2, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "9373bf79"}, {"headline": "Minor detained for series of vehicle and phone thefts", "summary": "A 17-year-old boy was detained by Bengaluru police for his involvement in stealing multiple two-wheelers and mobile phones across the city. The suspect allegedly targeted parked vehicles and pedestrians in several localities. Following his confession, police recovered several stolen items. The minor has been sent to a juvenile observation home pending further legal proceedings.", "category": "Law", "page": 4, "importance": 1, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "09c30111"}, {"headline": "Bengaluru to get 10.3km dedicated bicycle track on Major Arterial Road", "summary": "The Bangalore Development Authority is set to inaugurate a 10.3km dedicated bicycle track along the Major Arterial Road (MAR). The project aims to provide a safe and separate lane for cyclists, encouraging eco-friendly commuting in the city. The track, which features modern signage and barriers, is scheduled to open later this month as part of the city's infrastructure expansion.", "category": "Infrastructure", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "a68cfffb"}, {"headline": "Experts emphasize that climate action must begin at home", "summary": "During a summit in Bengaluru, environmental experts highlighted that individual efforts are crucial in the fight against climate change. They urged citizens to adopt sustainable practices such as waste segregation, water conservation, and reducing energy consumption. The summit called for a collective move toward eco-friendly lifestyles to mitigate the impact of global warming.", "category": "Environment", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "86d9740f"}, {"headline": "BDA launches Green Bengaluru portal for public participation", "summary": "The Bangalore Development Authority has launched the 'Green Bengaluru' portal to encourage citizens to participate in the city's afforestation efforts. The platform allows users to track tree plantation drives, report illegal felling, and suggest locations for new green belts. The initiative aims to leverage technology to restore the city's green cover through community engagement.", "category": "Environment", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "3382ee3e"}, {"headline": "Karnataka CET results expected to be announced today", "summary": "The results for the Karnataka Common Entrance Test (CET) 2026 are scheduled to be released today. More than three lakh students appeared for the examination held in April for admissions to professional courses like engineering and agriculture. Candidates can check their results on the official website. The KEA has made all arrangements for a smooth and transparent result declaration.", "category": "Education", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "7528254d"}, {"headline": "Jayanagar residents complain of trash-lined streets and poor waste collection", "summary": "Residents of Jayanagar 2nd Block have raised concerns over the deteriorating garbage collection system, which has turned tree-lined streets into trash dumps. Despite multiple complaints to the BBMP, the issue remains unresolved, leading to health hazards and foul smells. Local community groups have called for immediate intervention and a regularized waste management schedule.", "category": "Environment", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "99d2208a"}, {"headline": "Happy Streets event returns to Koramangala this Sunday", "summary": "The popular 'Happy Streets' initiative is set to return to Koramangala, offering residents a car-free morning filled with fun and fitness activities. A stretch of the 4th Block will be closed to traffic, allowing people to participate in yoga, cycling, and street performances. The event aims to promote community bonding and a healthy lifestyle in the city's residential areas.", "category": "Culture", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "e6e0e9af"}, {"headline": "Bengaluru traffic police provided with cooling helmets for heat relief", "summary": "In a bid to protect outdoor personnel from rising temperatures, the Bengaluru traffic police have distributed specialized cooling helmets. These helmets are designed to lower the wearer's body temperature and prevent heatstroke during long shifts on the city's streets. The initiative is part of a larger project to improve the working conditions of frontline officers during summer.", "category": "Health", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "73523382"}, {"headline": "Two engineers arrested for accepting bribe of Rs 2 lakh", "summary": "Lokayukta police have arrested two assistant engineers of the BBMP for allegedly accepting a bribe of Rs 2 lakh from a contractor. The bribe was reportedly demanded to clear pending bills and provide no-objection certificates for a construction project. A trap was laid following a complaint, and the officials were caught red-handed. Both have been remanded to judicial custody.", "category": "Law", "page": 4, "importance": 3, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "644327ec"}, {"headline": "Ex-MLC kidnapped with toy gun over minor car dent", "summary": "A former MLC in Bengaluru was allegedly kidnapped by four men following a minor road accident that dented his car. The kidnappers used a plastic toy gun to threaten the victim and demanded a ransom of Rs 2 crore. However, the police tracked down the suspects and rescued the leader within hours. All four accused have been arrested and booked for kidnapping and extortion.", "category": "Law", "page": 5, "importance": 3, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "7a799f67"}, {"headline": "Two youths arrested in Davanagere for suspected terror activities", "summary": "The Karnataka police have arrested two youths in Davanagere on suspicion of being involved in terror-related activities. Based on intelligence inputs, the duo was picked up for allegedly radicalizing local youth and planning disruptive acts. Investigators are currently probing their links to international outfits and searching for any caches of explosive materials or weapons.", "category": "India", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "1f67bec5"}, {"headline": "HC clears land acquisition for Banashankari VI Stage project", "summary": "The Karnataka High Court has upheld the land acquisition process for the Banashankari VI Stage residential project, dismissing several petitions by landowners. The court ruled that the acquisition was for public purpose and followed due legal process. This decision paves the way for the BDA to proceed with the long-delayed development of one of the city's largest layouts.", "category": "Law", "page": 5, "importance": 4, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "0c0b0361"}, {"headline": "Woman reported missing found dead in Kumbalagodu lake", "summary": "A 29-year-old woman who went missing from her home in Kumbalagodu was found dead in a nearby lake. The victim's family had filed a missing person report earlier this week. Initial investigations suggest she may have committed suicide following domestic disputes. Police have sent the body for an autopsy and are questioning family members to determine the exact circumstances.", "category": "Law", "page": 5, "importance": 2, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "107cf295"}, {"headline": "Toppers receive cheques as 90 gold medals missing from convocation", "summary": "In a major embarrassment, Tumkur University was unable to award 90 gold medals during its annual convocation as the supplier failed to deliver them on time. The university was forced to give toppers cheques for the value of the medals instead. Officials cited logistical issues for the delay and promised to distribute the actual medals to the students as soon as they are received.", "category": "Education", "page": 5, "importance": 4, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "0ee9546f"}, {"headline": "Lokayukta directs BBMP to prioritize garbage disposal and black spots", "summary": "The Karnataka Lokayukta has instructed the BBMP to prioritize the clearance of garbage black spots and improve waste disposal across the city. During a surprise inspection, several areas were found to be poorly managed, leading to environmental and health concerns. The Lokayukta warned of strict action against officials if the waste management system is not improved within a month.", "category": "Environment", "page": 5, "importance": 4, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "7959ba7d"}, {"headline": "TMC loses control of Mekhliganj municipality to Congress", "summary": "The Trinamool Congress has lost control of the Mekhliganj municipality in West Bengal after six of its councillors defected to the Congress party. This shift gives the Congress a majority in the local body, marking a significant setback for the TMC in North Bengal. The defecting councillors cited dissatisfaction with the party's local leadership and developmental issues.", "category": "Politics", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "dd17bab9"}, {"headline": "Mamata Banerjee visits Delhi to discuss cabinet portfolios with PM", "summary": "West Bengal CM Mamata Banerjee arrived in New Delhi for a scheduled meeting with Prime Minister Narendra Modi to discuss various state-related issues and potential cabinet adjustments. The visit comes amid political shifts in her state and is seen as an attempt to coordinate on development projects. Banerjee is also expected to meet other central leaders during her two-day visit.", "category": "Politics", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "821d6f94"}, {"headline": "Fashion experts highlight lightweight breathable fabrics for summer style", "summary": "As Bengaluru experiences a hot summer, fashion experts are recommending the use of lightweight and breathable fabrics like cotton, linen, and mulmul. The trend emphasizes comfort over heavy, structured designs, with a focus on pastel colors and floral prints. Designers suggest that such fabrics are ideal for the city's current climate while maintaining a stylish and modern look.", "category": "Culture", "page": 8, "importance": 2, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "74b4c940"}, {"headline": "Miracle survival: Dawa Sherpa rescued after 5 days on Everest", "summary": "In a rare feat of endurance, Dawa Sherpa was rescued from Mount Everest after being missing for five days in the 'death zone' above 8,000 meters. Rescuers found him alive despite extreme exposure and a lack of supplemental oxygen. His survival has been hailed as a miracle by the mountaineering community, though he is currently receiving intensive care for severe frostbite and exhaustion.", "category": "Sports", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "f7d683e5"}, {"headline": "New blood test may predict lung cancer five years early", "summary": "Scientists have developed a breakthrough blood test that can detect signals of lung cancer more than five years before clinical symptoms appear. The protein-based tool identifies high-risk individuals who could benefit from early intervention, potentially increasing survival rates. This development is particularly significant for early-stage diagnosis, which is often missed with current methods.", "category": "Health", "page": 9, "importance": 8, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "f123b478"}, {"headline": "UP begins resettling Sambhal Hindus who fled 1978 riots", "summary": "The Uttar Pradesh government has started the process of resettling Hindu families who fled Sambhal following communal riots in 1978. The initiative provides these families with land and financial assistance to rebuild their homes. After nearly 50 years, many displaced individuals expressed relief at being able to return to their ancestral town and restore their livelihoods.", "category": "Politics", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "928ddcf4"}, {"headline": "Tamil Nadu asks Governor to sanction execution of Senthil Balaji", "summary": "The Tamil Nadu government has formally requested Governor RN Ravi to sanction the execution of a court order regarding the prosecution of former minister Senthil Balaji. Balaji is facing charges in a cash-for-jobs scam and has been in judicial custody. The move follows recent legal developments that require the governor's assent for further proceedings against high-ranking officials.", "category": "Law", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "d54022d0"}, {"headline": "Maharashtra extends OBC educational benefits to Maratha community", "summary": "The Maharashtra government has decided to extend educational benefits previously reserved for Other Backward Classes (OBC) to the Maratha community. This includes fee waivers and scholarships for students in various higher education courses. The decision follows a prolonged protest by Maratha activists demanding reservation and aim to address the community's socio-economic grievances.", "category": "Politics", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "6d16b7bd"}, {"headline": "Modi claims public disapproval forced Congress to change Karnataka CM", "summary": "Prime Minister Narendra Modi, during an event in Surat, claimed that the Congress party was forced to change its Chief Minister in Karnataka due to widespread public disapproval. He alleged that the party's governance had failed to meet the people's expectations, leading to internal pressure. Modi used the occasion to highlight the BJP's stability and commitment to development across India.", "category": "Politics", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "4e839dd9"}, {"headline": "BJP cites high GDP figures to mock Rahul Gandhi's predictions", "summary": "The BJP has used the latest GDP growth figures of 7.7% to mock Congress leader Rahul Gandhi's earlier predictions of an economic slowdown. Party leaders stated that the data proves the resilience of the Indian economy under the current government. They argued that the sustained growth in various sectors contradicts the opposition's claims of economic mismanagement and rising inflation.", "category": "Politics", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "0bdb8104"}, {"headline": "Report shows digital divide in India remains a major challenge", "summary": "A new report on digital inclusion in India highlights a persistent divide in access to technology between urban and rural populations. While mobile phone ownership has risen to 95%, only 39% of individuals have access to the internet for basic services. The report calls for targeted policies to ensure that digital tools lead to social and economic empowerment rather than just access.", "category": "Technology", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "9340f030"}, {"headline": "Delhi hotel fire: Police investigate owner for international human trafficking", "summary": "Following a major fire at a hotel in Delhi, police have expanded their investigation to include allegations of international human trafficking. The owner is suspected of using the hotel as a transit point for illegal migration and forged documents. Investigators discovered several forged passports and travel records, leading to a broader probe into a potential multi-state trafficking network.", "category": "Law", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "5935c867"}, {"headline": "Goa student commits suicide after viral clip of littering", "summary": "A 23-year-old student in Goa reportedly committed suicide after a video of him littering went viral and led to an FIR. The young man was reportedly distressed by the social media backlash and the police case. The incident has sparked a debate in the state about the impact of online shaming and the need for more sensitive handling of minor environmental offenses by authorities.", "category": "India", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "2f5a816e"}, {"headline": "Maharashtra records 292 sunstroke cases and 21 deaths this summer", "summary": "Maharashtra has reported 292 confirmed sunstroke cases and 21 heat-related deaths since the beginning of summer. Several districts, including Jalgaon and Nagpur, have seen temperatures soar above 45 degrees Celsius. Health authorities have issued several advisories, urging citizens to stay hydrated and avoid outdoor activities during peak heat hours as the heatwave continues.", "category": "Health", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "37b30d0a"}, {"headline": "DNA evidence links accused to 3-year-old's rape and murder", "summary": "In a major breakthrough, forensic labs have confirmed that DNA evidence from the scene of a 3-year-old girl's rape and murder matches a prime suspect. The horrific crime, which took place in Pune, had shocked the community. The police stated that the forensic report provides a strong basis for a fast-track trial and are confident of securing a conviction in the case.", "category": "Law", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/126210", "sources": [{"newspaper": "Times of India", "pdf_filename": "Bangalore_TOI_06-06-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/126210"}], "article_id": "
