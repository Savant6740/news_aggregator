फाइनेंस के लिए ₹20,000 करोड़ की क्रेडिट गारंटी योजना", "summary": "केंद्र सरकार ने माइक्रोफाइनेंस संस्थानों (MFIs) के लिए ₹20,000 करोड़ की क्रेडिट गारंटी योजना शुरू की। इसका उद्देश्य MFIs को नकदी की कमी से उबरने और ऋण प्रवाह बढ़ाने में मदद करना है। यह योजना 20 मार्च से 30 जून 2026 तक या ₹20,000 करोड़ की कुल गारंटी कवरेज तक सक्रिय रहेगी, जिससे छोटे MFIs को लाभ होगा।", "category": "Economy", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117673", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_21-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117673"}]}, {"headline": "कच्चे तेल में नरमी के बावजूद प्रीमियम पेट्रोल महंगा", "summary": "अमेरिकी और इजरायली बयानों के बाद वैश्विक कच्चे तेल की कीमतें नरम होकर $105 प्रति बैरल पर आ गईं। हालांकि, तेल विपणन कंपनियों ने देशभर में प्रीमियम पेट्रोल के दाम ₹2 से ₹2.35 प्रति लीटर तक बढ़ा दिए। औद्योगिक डीजल की कीमतों में भी ₹22 प्रति लीटर की बढ़ोतरी हुई है।", "category": "Economy", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117673", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_21-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117673"}]}, {"headline": "भारत का विदेशी मुद्रा भंडार 709.76 अरब डॉलर घटा", "summary": "13 मार्च को समाप्त सप्ताह में भारत का विदेशी मुद्रा भंडार $7.05 अरब घटकर $709.76 अरब हो गया। यह लगातार दूसरा सप्ताह है जब भंडार में गिरावट आई है। विदेशी मुद्रा परिसंपत्तियां $7.68 अरब घटकर $555.57 अरब रह गईं।", "category": "Economy", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117673", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_21-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117673"}]}, {"headline": "CBDT ने नए आयकर नियम 2026 अधिसूचित किए", "summary": "केंद्रीय प्रत्यक्ष कर बोर्ड (CBDT) ने आयकर नियम, 2026 को अधिसूचित किया, जो 1 अप्रैल 2026 से लागू होंगे। इन नियमों में वेतन पर कराधान, अनुपालन खुलासे, ट्रांसफर प्राइसिंग और विदेशी कर क्रेडिट में बदलाव किए गए हैं। बंगलुरु, हैदराबाद, पुणे और अहमदाबाद में हाउस रेंट अलाउंस (HRA) छूट अब मुंबई और दिल्ली के बराबर होगी।", "category": "Economy", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117673", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_21-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117673"}]}, {"headline": "अनिल अग्रवाल ने भारत में खनन क्षेत्र की कमियां उजागर कीं", "summary": "वेदांत ग्रुप के संस्थापक अनिल अग्रवाल ने भारत के खनन क्षेत्र में गंभीर कमियों को उजागर किया, बताया कि पिछले एक दशक में नीलाम किए गए 85% खनिज ब्लॉक अभी भी चालू नहीं हो पाए हैं। उन्होंने तुरंत सुधारों की मांग की ताकि देश की आयात निर्भरता कम हो सके।", "category": "Economy", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117673", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_21-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117673"}]}, {"headline": "सूचकांकों में उछाल, कच्चे तेल में उतार-चढ़ाव से बढ़त सीमित", "summary": "शुक्रवार को भारतीय शेयर बाजारों में तेजी रही, लेकिन दिन के दौरान कच्चे तेल की कीमतों में अचानक उछाल से बढ़त सीमित हो गई। सेंसेक्स 326 अंक बढ़कर 74,533 पर और निफ्टी 112 अंक बढ़कर 23,115 पर बंद हुआ। विदेशी निवेशकों की लगातार बिकवाली से बाजार का मनोबल गिरा हुआ है।", "category": "Economy", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117673", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_21-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117673"}]}, {"headline": "एफपीआई ने वित्तीय, ऑटोमोबाइल और दूरसंचार शेयर बेचे", "summary": "विदेशी पोर्टफोलियो निवेशकों (FPIs) ने मार्च के पहले दो हफ्तों में वित्तीय सेवाओं, ऑटोमोबाइल और दूरसंचार शेयरों में सबसे ज्यादा बिकवाली की, कुल ₹52,703 करोड़ की शुद्ध निकासी हुई। उन्होंने पूंजीगत सामान, धातु और बिजली क्षेत्रों में थोड़ी खरीदारी की। ईरान संघर्ष और कच्चे तेल की कीमतों में उछाल ने बाजार की धारणा बदली है।", "category": "Economy", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117673", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_21-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117673"}]}, {"headline": "खुदरा निवेशक इंडेक्स योजनाओं की ओर, वैश्विक निवेश में रुचि", "summary": "भू-राजनीतिक संघर्षों के बावजूद खुदरा निवेशकों की बाजार में भागीदारी बनी हुई है, लेकिन वे अधिक सतर्क हो गए हैं। निवेशक अब विविधीकरण, ऋणबद्ध निवेश और इंडेक्स-आधारित योजनाओं को अपना रहे हैं। स्मॉलकेस के सीईओ और संस्थापक वसंत कामत के अनुसार, वैश्विक निवेश में लगातार रुचि देखी गई है।", "category": "Economy", "page": 3, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117673", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_21-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117673"}]}, {"headline": "छोटे करदाताओं के लिए नया आईटी अधिनियम आसान बनाएगा अनुपालन", "summary": "वित्त मंत्री निर्मला सीतारमण ने कहा कि नया आयकर अधिनियम, 2025, छोटे कारोबारियों और पेशेवरों के लिए नियमों का पालन आसान बनाएगा और मुकदमों की संख्या में कमी लाएगा। ₹10 करोड़ तक का कारोबार करने वाले व्यवसायों को विस्तृत बही-खाते रखने और ऑडिट करवाने से छूट मिलेगी, जिससे बड़ी राहत मिलेगी।", "category": "Economy", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117673", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_21-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117673"}]}, {"headline": "हरित उदयोग पर जोर, ऊर्जा सुरक्षा के लिए रणनीतिक जरूरत", "summary": "पीएम की आर्थिक सलाहकार परिषद के चेयरमैन एस. महेंद देव ने कहा कि पश्चिम एशिया में संघर्ष ने वैश्विक बाजारों की कमजोरी को उजागर किया, जिससे कच्चे तेल और गैस की कीमतें बढ़ीं। इससे भारत की 'आत्मनिर्भर भारत' पहल और ऊर्जा सुरक्षा के लिए हरित औद्योगीकरण की रणनीतिक जरूरत सामने आई है।", "category": "Economy", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117673", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_21-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117673"}]}, {"headline": "अति-अमीरों पर कर से असमानता कम हो सकती है: कौशिकी बसु", "summary": "पूर्व मुख्य आर्थिक सलाहकार कौशिकी बसु ने सुझाव दिया कि अति-अमीरों की सीमांत आय पर कर की दर बढ़ाना असमानता को कम कर सकता है, निजी उद्यम की भूमिका को बरकरार रखते हुए। उन्होंने इस अतिरिक्त राजस्व को समाज के गरीब वर्गों में प्रभावी ढंग से पुनर्वितरित करने पर जोर दिया।", "category": "Economy", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117673", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_21-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117673"}]}, {"headline": "पश्चिम एशिया संकट से कीटनाशक लागत में 20-25% वृद्धि संभव", "summary": "पश्चिम एशिया में जारी संघर्ष के कारण भारत के फसल सुरक्षा उद्योग के लिए कीटनाशक लागत में 20 से 25% की वृद्धि हो सकती है। क्रॉपलाइफ इंडिया ने बताया कि इससे कुछ फसल सुरक्षा उत्पादों की कमी हो सकती है, जिससे उपज और उत्पाद की गुणवत्ता प्रभावित होगी।", "category": "Economy", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117673", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_21-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117673"}]}, {"headline": "आरबीआई ने वित्तीय बाजारों पर पश्चिम एशिया संकट का आकलन किया", "summary": "भारतीय रिजर्व बैंक के केंद्रीय बोर्ड ने पश्चिम एशिया में मौजूदा भू-राजनीतिक घटनाक्रमों और उसके वित्तीय बाजारों पर पड़ने वाले प्रभाव का आकलन किया। यह युद्ध शुरू होने के बाद केंद्रीय बैंक की पहली बोर्ड बैठक थी, जिसमें तेल की कीमतों में उछाल और रुपये के अवमूल्यन के बीच मौद्रिक नीति चुनौतियों पर चर्चा हुई।", "category": "Economy", "page": 4, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117673", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_21-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117673"}]}, {"headline": "रोजगार सुधार के लिए आपूर्ति नीतियां अपर्याप्त: राधिका कपूर", "summary": "अंतर्राष्ट्रीय श्रम संगठन (ILO) की वरिष्ठ रोजगार विशेषज्ञ राधिका कपूर ने कहा कि शिक्षा और कल्याणकारी योजनाओं में सुधार अकेले बेहतर रोजगार परिणाम नहीं दे सकते, मजबूत श्रम मांग की जरूरत है। आपूर्ति-पक्ष की नीतियां, जैसे कौशल विकास, बिना नौकरी सृजन के बेहतर रोजगार परिणामों में नहीं बदलतीं।", "category": "Economy", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117673", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_21-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117673"}]}, {"headline": "खुले अर्थ तंत्र के स्वचालित स्थिरीकरण पर संपादकीय", "summary": "संपादकीय तर्क देता है कि भारत को खुले अर्थतंत्र के स्वचालित स्थिरीकरण को अपनाना चाहिए, जहाँ लचीली विनिमय दरें बाहरी झटकों को सरकारी हस्तक्षेप के बिना अवशोषित करती हैं। यह दृष्टिकोण मुद्रास्फीति लक्ष्यीकरण के साथ संरेखित होता है और बाजार शक्तियों को वैश्विक आर्थिक परिवर्तनों के अनुकूल होने की अनुमति देकर दीर्घकालिक स्थिरता को बढ़ावा देता है।", "category": "Economy", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117673", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_21-03-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117673"}]}, {"headline": "Rupee sinks 108 paise to breach 93/$ amid West Asia war, FPI outflows", "summary": "The Indian rupee fell 108 paise to an all-time low of 93.71 against the US dollar. This significant depreciation is attributed to hardening crude oil prices due to the West Asia war, FPI outflows from the equity market, and a strong dollar. Its fall was over 100 paise, similar to June 2024.", "category": "Economy", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Guinea bauxite shipments rerouted to India amid West Asia crisis", "summary": "Nine ships carrying 1.2 million tonnes of bauxite from Guinea, originally bound for the UAE, were diverted to India due to the West Asia conflict. This is good news for India's alumina industry, which requires large bauxite volumes. India is well-positioned to absorb volumes due to refining capacities and favorable pricing.", "category": "Economy", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Large lenders rein in retail loan GNPAs; private banks see rise", "summary": "Major banks like SBI, HDFC Bank, and ICICI Bank contained gross non-performing assets (GNPAs) in retail loans between April and December 2025. SBI's retail GNPA was ₹11,168 crore, unchanged. HDFC and ICICI saw declines. However, many private sector banks, led by Axis Bank (23% rise), saw increased retail GNPAs, prompting calls for prudence.", "category": "Economy", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Removing Iran oil sanctions could ease global supply quickly: US Energy Sec", "summary": "US Energy Secretary Chris Wright stated that removing sanctions on stranded Iranian oil would get supplies to Asia within three or four days, with refined products hitting the market in a month and a half. This comes amid intensifying West Asia conflict and global energy supply concerns.", "category": "Economy", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Nifty rebounds modestly after rout, Accenture results lift IT", "summary": "Indian benchmarks closed marginally higher on Friday, with Nifty 50 up 112.35 points to 23,114.50, and Sensex gaining 325.72 points. The recovery followed easing crude oil prices and Accenture's positive Q2 results, which lifted IT stocks. Lingering geopolitical tensions and FII outflows remain concerns.", "category": "Economy", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Retail investor interest in IPOs wanes amid market turbulence", "summary": "Retail investor interest in IPOs has declined, with many failing to secure full retail subscription. A SEBI study revealed \"flipping\" behavior and that retail investors sold 67.6% of shares within a week if returns exceeded 20%. The recent Iran war-induced market turbulence has further dampened sentiment, urging caution and long-term views.", "category": "Economy", "page": 5, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Stock markets' reaction to past wars: volatility is often short-lived", "summary": "An analysis of Indian stock market reactions to past geopolitical conflicts like the Gulf War (1990), Iraq War (2003), and Russia-Ukraine conflict (2022) shows that war-induced volatility is often short-lived. Markets react more to economic impacts like crude oil prices than actual attacks, with corrections typically lasting a few months before other influences take over.", "category": "Economy", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Community kitchens proposed as solution to India's LPG crisis", "summary": "Amid West Asia conflict disrupting India's LPG supply and high black market prices, community kitchens are proposed as an efficient solution. During Covid, states like Kerala and Madhya Pradesh successfully ran such kitchens, demonstrating their ability to provide affordable, nutritious food while significantly cutting fuel consumption compared to individual household cooking.", "category": "Economy", "page": 6, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Crude oil falls as US, allies aim to boost supply", "summary": "Crude oil prices fell on Friday, with Brent futures down $1.36 to $107.29 a barrel, and US WTI crude down $1.92 to $94.22. This drop followed offers from leading European nations and Japan to secure safe passage for ships through the Strait of Hormuz, and US moves to boost oil supply.", "category": "Economy", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Gold price fall boosts Gudi Padwa, Ugadi jewellery sales", "summary": "Over 10% fall in gold prices boosted jewellery sales for Gudi Padwa and Ugadi. Sales were 10% higher by value than last year, estimated at ₹22,000 crore on a single day. Gold prices fell to ₹1,47,218 per 10g on Friday, while silver prices increased. Strong traction in diamond jewellery and colored gemstones was also noted.", "category": "Economy", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Raw sugar futures poised for biggest weekly gain in 1-1/2 years", "summary": "Raw sugar futures on the ICE exchange hit fresh five-month highs on Friday, heading for their biggest weekly gain in 1-1/2 years. The surge is attributed to the US-Israeli war on Iran keeping the market on edge and pushing up energy prices. Raw sugar rose 0.9% to 15.50 cents per lb.", "category": "Economy", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Cotton demand may rise as pricey crude oil increases MMF costs", "summary": "Cotton stakeholders anticipate increased demand for natural fibre as prices of man-made fibres (MMF) like polyester have surged 10-25% due to rising crude oil prices from the West Asia war. Cotton Association of India expects a 10 lakh bale increase in consumption. Import costs for cotton also rose due to a weakening rupee.", "category": "Economy", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Aluminium prices recover as market weighs Iran war disruptions", "summary": "Aluminium prices steadied on Friday as investors balanced the impacts of the Iran war and lower supply from disrupted West Asia operations against weaker demand from spiking oil prices. Benchmark 3-month aluminium on LME was up 0.5% at $3,269 a tonne, after closing down 4.4% in the previous session.", "category": "Economy", "page": 8, "importance": 4, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Iran war risks pesticide industry, input costs to rise 20-25%", "summary": "CropLife India warns that the Iran war's disruption to supply chains and shipping routes may increase input costs for the crop protection industry by 20-25%, leading to higher farmer costs and potential product shortages. The industry seeks energy incentives for local production and remains vigilant against illicit products.", "category": "Economy", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Edible oil sector seeks balanced policy amid global disruptions", "summary": "The Solvent Extractors’ Association of India (SEA) urges a balanced policy for the vegetable oil and oilseed sector amidst global disruptions, weather uncertainties, and domestic fundamentals. Elevated crude oil prices impact production and transportation costs. A shift towards a \"Super El Nino\" raises concerns of below-normal monsoon rainfall, affecting kharif oilseed sowing.", "category": "Economy", "page": 8, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Chicken prices soar on bird mortality, reduced weight from heat", "summary": "Chicken prices have surged to ₹270-340 per kg in retail markets, hitting record highs, due to increased bird mortality from intense summer heat and reduced bird weight (1.5-1.75 kg). Input costs like feed and logistics remain elevated. Despite price rises, demand remains strong, partly due to the Ramadan season.", "category": "Economy", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Rupee Touches Record Low of 93.73 Against US Dollar", "summary": "The Indian rupee hit an all-time low of 93.73 against the US dollar on Friday due to sustained capital outflows and rising geopolitical tensions in West Asia. Despite intervention by the Reserve Bank of India to provide dollar liquidity, the currency faced its steepest single-day decline in four years, plunging up to 110 paise before making a slight recovery.", "category": "Economy", "page": 1, "importance": 10, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "Industrial Diesel Prices Hiked by Rs 22 Per Litre", "summary": "State-run oil marketing companies have increased the price of industrial diesel by approximately Rs 22 per litre, a 25% jump. The hike targets bulk consumers like railways, defense, and cement plants to offset rising global crude costs caused by the Iran-Israel conflict. Premium petrol prices were also raised by Rs 2 per litre, while retail diesel remains unchanged.", "category": "Economy", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "FM Sitharaman Urges Tax Officials to Focus on Fairer Assessments", "summary": "Finance Minister Nirmala Sitharaman has instructed tax officials to focus on 'fairer demand' and faster resolution of disputes. Speaking at the 'Prarambh 2026' event, she emphasized that taxpayers are partners in nation-building and called for a more transparent, taxpayer-friendly approach. She urged officials to minimize interference with honest taxpayers while ensuring compliance.", "category": "Economy", "page": 7, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "WPI Inflation Projected to Rise Due to West Asia Conflict", "summary": "Wholesale Price Index (WPI) inflation in India is projected to rise by 0.3 to 0.7 percentage points due to the escalating Iran-Israel conflict. Rising import costs for crude oil and shipping disruptions in the Strait of Hormuz are the primary drivers. This could lead to a widening of the annual trade deficit by $5-10 billion and put pressure on domestic fuel prices.", "category": "Economy", "page": 8, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "Gold and Silver Prices Rebound Amid Geopolitical Tensions", "summary": "Domestic gold prices rose by 1.86% to Rs 1,47,652 per 10 grams on Friday, following safe-haven demand sparked by the Iran-Israel conflict. Silver also saw a 2.43% gain to reach Rs 2,37,081 per kilogram. Analysts suggest that while prices have rebounded, the rally may not last if the US Federal Reserve maintains a hawkish stance on interest rates to combat inflation.", "category": "Economy", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "India’s Oil Supplies Threatened by Hormuz Strait Blockade", "summary": "India's crude oil imports fell by 23% in early March as shipping through the Strait of Hormuz became increasingly risky. Refiners are pivoting to Russia and Africa to plug the gap. Energy analysts warn that a prolonged blockade of the waterway, which handles 20% of global oil supply, could trigger a significant energy crisis and fuel price spikes in India and other major importers.", "category": "Economy", "page": 10, "importance": 10, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "Foreign Investors Withdraw Record Funds from Indian Financial Services", "summary": "Foreign Portfolio Investors (FPIs) sold Indian financial services stocks worth over Rs 31,000 crore in the first half of March. This marks the highest-ever fortnightly exit from the sector. Concerns over global banking stability and rising interest rates in the US prompted the massive sell-off. The BFSI sector has fallen 12.7% over the past month due to this trend.", "category": "Economy", "page": 12, "importance": 9, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "RBI Board Approves FY27 Budget and Utkarsh 3.0 Plan", "summary": "The Reserve Bank of India’s central board has approved the bank's budget for the 2026-27 accounting year. The board also cleared the 'Utkarsh 3.0' framework, which outlines the bank's medium-term strategy and roadmap for the next three years. The meeting was chaired by Governor Shaktikanta Das and attended by deputy governors and senior government officials.", "category": "Economy", "page": 12, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 12, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "Heavy snowfall in Solang Valley leads to road closures", "summary": "Late winter snowfall in Himachal Pradesh's high-altitude areas, including Rohtang and the Atal Tunnel, has led to road closures near Solang Nala. Temperatures in Shimla dropped 2-5°C following prolonged rain. Tourist resorts like Gulmarg and Sonamarg in Kashmir also received fresh snow, providing a boost to tourism following an unusually warm winter season.", "category": "India", "page": 1, "importance": 4, "telegram_url": "https://t.me/c/1877410077/117689", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_TH BL Delhi 21~03~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117689"}]}, {"headline": "Centre blocks 300 illegal gambling and betting apps", "summary": "In a major crackdown, the central government has blocked 300 illegal online betting and gambling sites, bringing the total number of prohibited platforms to nearly 4,800. The action targeted sports betting platforms, online casinos, and real-money card games that functioned as peer-to-peer marketplaces. Government sources said the move is part of ongoing efforts to curb illegal gambling.", "category": "India", "page": 9, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117689", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_TH BL Delhi 21~03~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117689"}]}, {"headline": "India successfully tests Agni-IV missile", "summary": "India successfully conducted a test of its Agni-IV nuclear-capable ballistic missile, capable of striking targets up to 4,000 km. The test enhances defence capabilities.", "category": "India", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "Indian Navy to Escort Merchant Ships Through Strait of Hormuz", "summary": "The Indian government is planning an emergency evacuation and escort plan for merchant vessels in the Persian Gulf. Indian Navy warships may provide security to tankers and cargo ships through the volatile Strait of Hormuz to ensure steady supplies of crude oil, natural gas, and cooking gas amid regional conflict that has stranded over 70,000 containers.", "category": "India", "page": 1, "importance": 9, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "Fresh Gunfire Reported in Manipur’s Ukhrul District", "summary": "Panic gripped Manipur's Ukhrul district following reports of fresh gunfire between Kuki and Naga groups. While no injuries were immediately reported, residents fled their homes as firing continued for over an hour. The incident marks a resurgence of tension in a region that has seen significant ethnic violence and displacement since May 2023.", "category": "India", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "Bengaluru Faces LPG Crisis; CM Seeks Central Intervention", "summary": "Bengaluru is experiencing a severe shortage of LPG cylinders due to disruptions in the global supply chain linked to the West Asia conflict. Chief Minister Siddaramaiah has written to the Centre seeking urgent intervention. The city currently receives only 1,000 cylinders daily against an estimated demand of 50,000, impacting households and local businesses.", "category": "India", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "Iran attacks Kuwaiti refinery as West Asia conflict worsens", "summary": "Iran launched a drone attack on Kuwait’s Mina Al-Ahmadi refinery on Friday, while Israel assassinated a senior spokesman for Iran’s Revolutionary Guards in Tehran. The escalation has caused a 12% drop in global oil and petroleum flows. Iran's Supreme Leader Ayatollah Mojtaba Khamenei called for a 'resistance economy' as major world powers struggle to secure safe passage for shipping.", "category": "World", "page": 3, "importance": 10, "telegram_url": "https://t.me/c/1877410077/117689", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_TH BL Delhi 21~03~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117689"}]}, {"headline": "US Energy Secretary says removing Iran sanctions would ease supply", "summary": "US Energy Secretary Chris Wright stated that lifting sanctions on stranded Iranian oil could bring supplies to Asia within days. He estimated that oil would arrive at ports in three to four days and reach the broader market over the next month-and-a-half. The move is seen as a potential measure to stabilize global energy markets currently pressured by West Asian hostilities.", "category": "World", "page": 3, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117689", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_TH BL Delhi 21~03~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117689"}]}, {"headline": "China’s share of global economy shrinks amid deflation and weak yuan", "summary": "China's gross domestic product as a share of the global economy fell to 16.5% in 2025, down from its 2021 peak of 18.5%. While the nation remains a manufacturing leader, domestic deflation and a weak yuan have eroded its economy's value in dollar terms. This shift is impacting global business investment strategies and straining international trade relationships.", "category": "World", "page": 16, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117677", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_21-03-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/117677"}]}, {"headline": "Iran threatens global tourist sites amid US-Israeli strikes", "summary": "Iran has threatened to target recreational and tourist sites worldwide in retaliation for ongoing US and Israeli strikes on its energy and weapons infrastructure. A military spokesman warned that Tehran's enemies would not be safe beyond the Middle East. The conflict has severely impacted Iran's weapons programs and the regional energy industry.", "category": "World", "page": 13, "importance": 9, "telegram_url": "https://t.me/c/1877410077/117677", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_21-03-2026.pdf", "page": 13, "telegram_url": "https://t.me/c/1877410077/117677"}]}, {"headline": "India chairs G20 working group on disaster risk reduction", "summary": "India is chairing a G20 working group focused on disaster risk reduction strategies. The group aims to enhance international cooperation in managing natural disasters.", "category": "World", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "India enhances maritime security cooperation", "summary": "India is enhancing maritime security cooperation with friendly nations to ensure safety and security in the Indian Ocean region. Joint exercises are being conducted.", "category": "World", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "UN calls for urgent action on food security", "summary": "The UN has called for urgent action to address global food security challenges, exacerbated by conflicts and climate change. Support for vulnerable populations is crucial.", "category": "World", "page": 18, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 18, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "ऊर्जा भंडारों पर हमलों: संतुलित और दूरदर्शी दृष्टिकोण जरूरी", "summary": "एक पाठक के पत्र में पश्चिम एशिया में ऊर्जा भंडारों पर हो रहे हमलों की निंदा की गई है। पत्र में वैश्विक आर्थिक प्रभाव और विकासशील देशों के लिए ऊर्जा सुरक्षा के महत्व पर जोर दिया गया है। लेखक ने संघर्ष को नियंत्रित करने और स्थिरता बहाल करने के लिए संयम और कूटनीतिक प्रयासों का आह्वान किया है।", "category": "World", "page": 5, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117673", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_21-03-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117673"}]}, {"headline": "ईरान ने कुवैत रिफाइनरी पर हमला किया, इजरायल में भी हमले तेज", "summary": "ईरान ने कुवैत की मीना अल-अहमदी तेल रिफाइनरी पर ड्रोन से हमला किया और इजरायल में चेतावनी के रूप में सायरन बजने लगे। यह घटना पश्चिम एशिया में संघर्ष बढ़ने का संकेत है। यह हमला ईरान के प्राकृतिक गैस क्षेत्र में हुए विस्फोटों के बाद हुआ है, जिससे ऊर्जा अवसंरचना पर हमले तेज हो गए हैं।", "category": "World", "page": 10, "importance": 9, "telegram_url": "https://t.me/c/1877410077/117673", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_21-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117673"}]}, {"headline": "रियाद में ईरानी हमले में एक भारतीय नागरिक की मौत", "summary": "रियाद में ईरान के हमले में एक भारतीय नागरिक की मौत हो गई, जिससे पश्चिम एशिया में जारी संघर्ष में मरने वाले भारतीयों की कुल संख्या छह हो गई है। रियाद स्थित भारतीय दूतावास ने इस दुखद घटना पर गहरा शोक व्यक्त किया है।", "category": "World", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117673", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_21-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117673"}]}, {"headline": "Iran attacks Kuwait refinery; Israel kills Revolutionary Guards spokesman", "summary": "The US-Israel war on Iran intensified as Iran attacked an oil refinery in Kuwait and Israel killed an Iranian Revolutionary Guards spokesman. Brent crude stabilised at $110, but fears of global energy supply disruption remain. International efforts are underway to ensure safe passage through the Strait of Hormuz.", "category": "World", "page": 3, "importance": 10, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "WTO adopts new mechanism to track resolution of trade concerns", "summary": "The WTO adopted a new mechanism for its Committee on Market Access (CMA) to track the resolution of trade concerns raised by member countries. A standing agenda item will allow members to update progress. 33 concerns were raised, with 6 related to India's policies (e.g., import restrictions).", "category": "World", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Sri Lanka Denies US Request to Land Fighter Jets", "summary": "Sri Lankan President Anura Kumara Dissanayake confirmed that his government denied a US request to land two fighter jets at Mattala International Airport. Dissanayake emphasized Sri Lanka's commitment to neutrality and regional peace, refusing to be drawn into the escalating US-Iran conflict despite long-standing defense ties with both nations.", "category": "World", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "Pakistan Declines Active Military Role in Saudi Arabia", "summary": "Pakistan has reportedly declined a Saudi Arabian request to deploy its military for security following regional tensions. Despite a Strategic Mutual Defence Agreement, Islamabad cited its ongoing internal security commitments and the need to maintain a balanced stance in the West Asian conflict as reasons for the refusal, while reaffirming support for Saudi territorial integrity.", "category": "World", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "US Deploys Amphibious Warship and Marines to West Asia", "summary": "The United States is deploying an amphibious assault ship and thousands of Marines to the Persian Gulf following Iranian attacks on refinery targets. The move is aimed at deterring further aggression and protecting critical shipping lanes in the Strait of Hormuz. Iranian leaders have vowed to continue military production despite the increased US presence in the region.", "category": "World", "page": 10, "importance": 10, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "Trump Criticizes NATO Allies for Not Assisting in Hormuz", "summary": "Former US President Donald Trump has called NATO allies 'cowards' for refusing to join maritime escort missions in the Strait of Hormuz. Trump argued that since European and Asian nations rely more on Gulf oil than the US does, they should take the lead in securing the waterway. He suggested that US troops should only be deployed if other nations contribute more to the effort.", "category": "World", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "Summer flight schedules to drop 10-15% on capacity constraints", "summary": "Indian airlines are expected to operate 10-15% fewer flights this summer compared to 2025 due to aircraft shortages and new pilot rest norms. Implementation of revised flight duty time limitations and ongoing supply chain disruptions have limited operational flexibility. Jet fuel costs also rose by nearly 5.8% in March, adding further cost pressures on major carriers like IndiGo.", "category": "Infrastructure", "page": 10, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117689", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_TH BL Delhi 21~03~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117689"}]}, {"headline": "India invites bids for ₹7,280 crore rare earth magnet plants", "summary": "The Centre has launched an incentive scheme to establish five integrated sintered rare-earth magnet manufacturing facilities in India. The programme offers ₹750 crore in capital subsidies and ₹6,450 crore in sales-linked incentives. The move aims to reduce import dependence on China, which currently dominates the global rare earth supply chain.", "category": "Infrastructure", "page": 15, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117677", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_21-03-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/117677"}]}, {"headline": "Government focuses on infrastructure development to boost economy", "summary": "The Indian government is prioritizing infrastructure development projects to stimulate economic growth and create employment opportunities. Key focus areas include roads, railways, and renewable energy.", "category": "Infrastructure", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "Indian railways to upgrade infrastructure", "summary": "Indian Railways plans a significant upgrade of its infrastructure, focusing on track renewal, electrification, and modern signaling systems to improve safety and speed.", "category": "Infrastructure", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "India's infrastructure development projects progress", "summary": "Key infrastructure development projects in India are progressing as planned, contributing to economic growth and improved connectivity. Focus is on timely completion.", "category": "Infrastructure", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "India enhances digital infrastructure", "summary": "India is enhancing its digital infrastructure to support economic growth and improve service delivery. Investments are focused on expanding broadband and data centers.", "category": "Infrastructure", "page": 15, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 15, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "Indian Railways plans expansion of high-speed network", "summary": "Indian Railways plans to expand its high-speed rail network to improve connectivity and reduce travel times. Project execution is a key focus.", "category": "Infrastructure", "page": 16, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 16, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "India strengthens logistics and supply chains", "summary": "India is strengthening its logistics and supply chains to reduce costs and improve efficiency. The National Logistics Policy is a key driver.", "category": "Infrastructure", "page": 20, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 20, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "India boosts infrastructure investment", "summary": "India is boosting investment in infrastructure development, focusing on key sectors like roads, railways, and energy. This aims to stimulate economic activity.", "category": "Infrastructure", "page": 25, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 25, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "भारत की पारेषण व्यवस्था में ₹7.9 लाख करोड़ का निवेश होगा", "summary": "केंद्रीय विद्युत प्राधिकरण के अनुसार, भारत की बिजली पारेषण व्यवस्था में अगले 10 वर्षों में ₹7.9 लाख करोड़ का निवेश होने की संभावना है। यह निवेश 2036 तक 900 गीगावॉट गैर-जीवाश्म ईंधन-आधारित ऊर्जा को ग्रिड से जोड़ने के लिए बुनियादी ढांचे को स्थापित करने हेतु किया जाएगा।", "category": "Infrastructure", "page": 4, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117673", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_21-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117673"}]}, {"headline": "Fewer flights expected in summer schedule due to pilot, aircraft shortage", "summary": "India's summer flight schedule (from March 29) is expected to have 10-15% fewer flights year-on-year, and compared to the winter schedule. Factors include pilot and aircraft shortages, revised flight duty limitation norms, rising operational costs, and regulatory interventions on airfares. Thousands were stranded in December 2025 due to disruptions.", "category": "Infrastructure", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Bengaluru to Introduce New Policy for Street Vending", "summary": "Karnataka Deputy CM DK Shivakumar announced that a new policy will be implemented to regulate street vending in Bengaluru. The plan includes earmarking specific zones for vendors to prevent footpath encroachment and traffic congestion. Over 60,000 registered vendors will be affected, and carts parked on roads overnight will be seized to free up space for pedestrians.", "category": "Infrastructure", "page": 3, "importance": 4, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "Gujarat Government Approves Power Purchase Agreement for Tata Mundra", "summary": "The Gujarat government has approved a supplemental Power Purchase Agreement (PPA) for Tata Power’s 4,000-MW Mundra plant. This move allows the plant to restart operations next week, helping to meet the state's peak summer electricity demand. The agreement follows prolonged negotiations over fuel cost pass-throughs and aims to provide operational stability to the project.", "category": "Infrastructure", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "PGCIL Board Oks New Merger Plan for 28 Subsidiaries", "summary": "Power Grid Corporation of India (PGCIL) has approved a plan to merge 28 of its wholly-owned subsidiaries into the parent entity. The restructuring is aimed at simplifying the organizational structure and improving operational efficiency. The move follows regulatory approvals and is part of a broader push toward administrative streamlining within the state-run utility.", "category": "Infrastructure", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "Airlines Warn of Fare Hike Due to Free Seat Mandate", "summary": "The Federation of Indian Airlines (FIA) has warned that a government directive requiring airlines to offer at least 60% of seats for free selection will lead to a sharp hike in overall airfares. Airlines argue the mandate interferes with their ancillary revenue models and will force them to redistribute costs, potentially making budget travel more expensive for passengers.", "category": "Infrastructure", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "RBI slaps ₹31.8 lakh penalty on HSBC for non-compliance", "summary": "The Reserve Bank of India has imposed a ₹31.8 lakh penalty on the Hongkong and Shanghai Banking Corporation (HSBC) for failing to comply with directions regarding inoperative accounts and unclaimed deposits. The penalty followed a statutory inspection for supervisory evaluation based on the bank's financial position as of March 31, 2025, according to a central bank statement.", "category": "Law", "page": 7, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117689", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_TH BL Delhi 21~03~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117689"}]}, {"headline": "SBI receives ₹6,337 crore Income Tax demand", "summary": "The State Bank of India (SBI) has received a tax demand totaling ₹6,337.5 crore, including interest, for the assessment year 2023-24. The demand follows a scrutiny assessment by the Income Tax department where several disallowances were made. SBI disclosed the notification to stock exchanges on Friday, noting that the order was issued under relevant sections of the Income Tax Act, 1961.", "category": "Law", "page": 7, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117689", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_TH BL Delhi 21~03~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117689"}]}, {"headline": "NCLAT issues notice to Jaiprakash Associates monitoring committee", "summary": "The National Company Law Appellate Tribunal has issued a notice to the monitoring committee of bankrupt Jaiprakash Associates Ltd. The notice follows a plea by Velocity Enterprises challenging the rejection of its ₹2.55 crore claim. The tribunal stayed the invocation of the contractor’s bank guarantee until the next hearing in May.", "category": "Law", "page": 14, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117677", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_21-03-2026.pdf", "page": 14, "telegram_url": "https://t.me/c/1877410077/117677"}]}, {"headline": "Centre proposes new draft bill for data protection", "summary": "The central government has proposed a new draft bill for digital personal data protection, aiming to safeguard citizens' data and enhance privacy regulations.", "category": "Law", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "India strengthens intellectual property rights", "summary": "India is strengthening its intellectual property rights regime to encourage innovation and protect intellectual assets. New policies are being implemented.", "category": "Law", "page": 8, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "India strengthens data protection laws", "summary": "India is strengthening its data protection laws to enhance privacy and security for digital information. The new framework aims for robust compliance.", "category": "Law", "page": 24, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 24, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "सरकार ने 300 से अधिक अवैध जुआ साइटों और ऐप को ब्लॉक किया", "summary": "सरकार ने अवैध जुआ और सट्टेबाजी से संबंधित 300 से अधिक वेबसाइटों और ऐप को ब्लॉक कर दिया है। इनमें ऑनलाइन स्पोर्ट्स सट्टेबाजी, कैसीनो और सट्टा बाजार की तरह काम करने वाले प्लेटफॉर्म शामिल हैं। अब तक लगभग 8,400 वेबसाइटों को ब्लॉक किया जा चुका है।", "category": "Law", "page": 1, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117673", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_21-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117673"}]}, {"headline": "अनिल अंबानी से 2,929 करोड़ रुपये के धोखाधड़ी मामले में पूछताछ", "summary": "सीबीआई ने भारतीय स्टेट बैंक (SBI) की शिकायत पर रिलायंस कम्युनिकेशंस लिमिटेड (आरकॉम) और अनिल अंबानी के खिलाफ ₹2,929 करोड़ के धोखाधड़ी मामले में लगातार दूसरे दिन छह घंटे से अधिक पूछताछ की। पूछताछ में कंपनी को जारी ऋण निधि में कथित हेराफेरी और अन्य अनियमितताएं शामिल थीं।", "category": "Law", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117673", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_21-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117673"}]}, {"headline": "जेपी मॉर्गन चेज बैंक ने सेबी के साथ 34.43 लाख रुपये का मामला निपटाया", "summary": "जेपी मॉर्गन चेज बैंक एनए ने सेबी को ₹34.43 लाख का भुगतान करके एक मामले का निपटारा किया। सेबी ने आरोप लगाया था कि फर्म ने चार FPIs को कैटेगरी-2 लाइसेंस दिया था, जबकि ये FPIs ब्रिटिश-FCA द्वारा विनियमित नहीं थे। साथ ही, एक FPI के नए पंजीकरण में देरी हुई।", "category": "Law", "page": 3, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117673", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_21-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117673"}]}, {"headline": "चंबल अभयारण्य में अवैध खनन: अधिकारियों की जिम्मेदारी तय होगी", "summary": "उच्चतम न्यायालय ने संकेत दिया है कि वह राजस्थान, मध्य प्रदेश और उत्तर प्रदेश के अधिकारियों को राष्ट्रीय चंबल अभयारण्य में अवैध रेत खनन से वन्यजीवों को हुए नुकसान के लिए जिम्मेदार ठहराएगा। न्यायालय ने प्रशासन की लापरवाही को उजागर किया, जिससे घड़ियाल जैसे लुप्तप्राय जलीय जीवों पर असर पड़ा है।", "category": "Law", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117673", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_21-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117673"}]}, {"headline": "चुनाव आयोग मामले की सुनवाई से मुख्य न्यायाधीश अलग हुए", "summary": "मुख्य न्यायाधीश ने मुख्य चुनाव आयुक्त और अन्य चुनाव आयुक्त (नियुक्ति, सेवा की शर्तें और कथित भ्रष्टाचार) अधिनियम, 2023 को चुनौती देने वाली याचिकाओं की सुनवाई से खुद को अलग कर लिया। यह मामला अब एक अन्य पीठ को सौंपा जाएगा, जिसमें भारत का मुख्य न्यायाधीश बनने की कतार में शामिल कोई न्यायाधीश नहीं होगा, ताकि हितों के टकराव से बचा जा सके।", "category": "Law", "page": 6, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117673", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_21-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117673"}]}, {"headline": "Chief Justice Recuses from Hearing Plea on EC Selection Panel", "summary": "Chief Justice of India DY Chandrachud has recused himself from a bench hearing a petition challenging the exclusion of the CJI from the panel that selects Election Commissioners. The CJI stated he would assign the case to a bench where the judge is not in line to become the next Chief Justice, addressing concerns about potential conflicts of interest.", "category": "Law", "page": 2, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "Supreme Court Grants Bail in Rs 730 Crore Liquor Case", "summary": "The Supreme Court has granted regular bail to Avinash Reddy, an accused in the multi-crore Andhra Pradesh liquor policy scam. The case involves alleged irregularities and kickbacks in a structured network that operated between 2019 and 2024. A bench comprising Justice Surya Kant and Justice Joymalya Bagchi noted that 11 individuals have been granted bail so far.", "category": "Law", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "Karnataka HC Advises CM to Avoid Direct Official Transfers", "summary": "The leaned_TH BL Delhi 21~03~2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117689"}]}, {"headline": "The evolution of Twitter from digital cafe to toxic network", "summary": "A retrospective on Old Twitter examines how the platform originally fostered close-knit digital communities in India. Early users describe a space of genuine connection and professional networking that preceded the rise of influencers and coordinated trolling. The shift to X has prompted many original users to migrate to other niche social platforms.", "category": "Technology", "page": 10, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117677", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_21-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117677"}]}, {"headline": "Cybersecurity threats on the rise, experts warn", "summary": "Cybersecurity threats are increasing globally, with experts warning of sophisticated attacks. Businesses and individuals are urged to enhance their security measures.", "category": "Technology", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "Tech giant launches new AI-powered services", "summary": "A leading technology company has launched a suite of new AI-powered services aimed at enhancing productivity and user experience across its platforms.", "category": "Technology", "page": 2, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "SpaceX launches new Starlink satellites", "summary": "SpaceX successfully launched another batch of Starlink satellites, expanding its satellite internet constellation. The mission a ce": 6, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Lexus launches ES 500e electric car in India at ₹90 lakh", "summary": "Japanese luxury carmaker Lexus launched its all-new ES 500e electric car in India, priced at ₹90 lakh (ex-showroom). It features a 74.68 kWh lithium-ion battery, producing 252 kW max power and offering a driving range of up to 580 km. Lexus India plans to offer powertrain options based on customer demand.", "category": "Technology", "page": 2, "importance": 4, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "TVS introduces battery-as-a-service for EVs, launches Orbiter V1", "summary": "TVS Motor Company introduced a battery-as-a-service (BaaS) model across its electric two-wheeler range to lower upfront ownership costs. Concurrently, it launched the Orbiter V1, its most accessible EV, priced at ₹49,999 (with BaaS). BaaS plans start from ₹862 per month for up to 60 months.", "category": "Technology", "page": 4, "importance": 4, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Accenture's Q2 results, guidance upgrade boost IT stocks", "summary": "Indian IT stocks rose after Accenture's Q2 results showed $22.1 billion new bookings and revenue of $18 billion (up 8% USD, 4% local currency), with a guidance upgrade. The Nifty IT index closed up 2.17%. LTM, Infosys, TCS, and Wipro gained. AI-led transformation is seen widening services scope for Indian IT.", "category": "Technology", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "India leads Asia-Pacific OTT content spend growth, drives global output", "summary": "India is leading OTT content spend growth in the Asia-Pacific (APAC) region, with content platforms driving expenditure from 8% of $20.4 billion in 2021 to an estimated 12% of $22 billion in 2026. India produced over 24,000 titles in Jan 2026, a quarter of global YouTube videos in 2025. OTT video revenue expected to double traditional TV by 2030.", "category": "Technology", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Startup Founders Embrace 'Hacker Houses' for Collaborative Growth", "summary": "A new trend of 'hacker houses' is emerging in Bengaluru, where Gen Z developers and startup founders live and work together to build AI products. Facilities like 'The Residency' and 'Localhost' provide shared residential and workspace environments, offering a blend of residence and incubator for early-stage ventures with monthly costs ranging from Rs 40,000 to Rs 80,000.", "category": "Technology", "page": 1, "importance": 4, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "Amazon Planning Return to Smartphone Market with 'Transformer'", "summary": "Amazon is reportedly developing a new smartphone, codenamed 'Transformer', marking its return to the hardware market after the Fire Phone failure. The device is expected to feature deep integration with Alexa and AI-driven personalization. The project aims to challenge ": "https://t.me/c/1877410077/117690"}]}, {"headline": "PMO asks Agri Min to combat fertilizer shortage amid Iran war", "summary": "The PMO has asked the Ministry of Agriculture and Farmers’ Welfare (MoFW) to brief it on measures to combat a potential fertilizer and chemical shortage, expected due to the prolonged Iran war. The MoFW is exploring biologicals and bio-additives to reduce fertilizer dependence and seeking policy support for home-grown technologies.", "category": "Politics", "page": 8, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 8, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Govt plans expanded social security for 32 cr gig workers", "summary": "The Labour Ministry is planning to expand social security, including insurance cover, for at least 32 crore unorganised, gig, and platform workers. The Employees’ State Insurance Corporation (ESIC) is examining models. The Social Security Code, 2020, outlines welfare schemes and funding by Centre, States, or CSR, addressing significant coverage gaps.", "category": "Politics", "page": 10, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Trinamool Unveils 10-Point Manifesto for West Bengal Polls", "summary": "West Bengal CM Mamata Banerjee released a 10-point 'Didi’s 10 Pledge' manifesto ahead of assembly elections. Key promises include two new healthcare schemes, doorstep delivery of medical care through 'Duaray Chikitsa' camps, seven new districts, and increased financial assistance under the Lakshmir Bhandar scheme to Rs 1,500 for general category and Rs 2,000 for SC/ST women.", "category": "Politics", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "New Bill Proposes to Formalise IPS Deputation in CAPFs", "summary": "The Central Armed Police Forces (General Administration) Bill, 2026, aims to formalize the deputation of IPS officers at senior ranks. The bill proposes mandating that 50% of IG posts and 100% of ADG and DG posts be filled by IPS officers. This move is facing opposition from CAPF cadre officers who argue it limits their career progression and leadership opportunities.", "category": "Politics", "page": 2, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 2, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "Congress Joins Hands with Regional Parties for Assam Polls", "summary": "The Congress party has forged an alliance with regional parties Assam Jatiya Parishad (AJP) and Raijor Dal for the upcoming state assembly elections. The tie-up, led by Gaurav Gogoi, aims to provide a unified front against the BJP-led NDA. Under the seat-sharing agreement, Raijor Dal will contest 11 seats while AJP has been allotted 10.", "category": "Politics", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "Rahul Gandhi Vows to Lead Congress Campaign in Kerala", "summary": "Congress leader Rahul Gandhi announced that he will lead the party's campaign for the April 9 Kerala assembly elections. Addressing a rally, he expressed confidence in the United Democratic Front (UDF) victory. The party has finalized its candidate list after intense internal scrutiny, including veteran leader K Sudhakaran who withdrew from the Konni seat to lead state-wide efforts.", "category": "Politics", "page": 4, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "MK Stalin Accuses AIADMK of Subservience to Delhi", "summary": "Tamil Nadu CM MK Stalin criticized the AIADMK, claiming the opposition party requires 'Delhi's consent' for its political decisions. Stalin portrayed the upcoming elections as a battle between the DMK-led alliance and those controlled by the central government. He emphasized the need for state autonomy in fiscal matters and criticized the Centre's response to regional fuel shortages.", "category": "Politics", "page": 4, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 4, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "Rainfall brings relief to Kashmir’s saffron industry", "summary": "Recent spells of continuous rainfall have revived saffron fields in Kashmir's Pampore area after a prolonged dry spell. Saffron growers, who witnessed the lowest February precipitation since 1960, hope the moisture will support corm development for the next season. Official data showed a 57% moisture deficit in Budgam, making the recent showers critical for securing farmer livelihoods.", "category": "Environment", "page": 9, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117689", "sources": [{"newspaper": "Business Line", "pdf_filename": "cleaned_TH BL Delhi 21~03~2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117689"}]}, {"headline": "India’s carbon trading plan for steel delayed by data gaps", "summary": "The rollout of a domestic carbon market for the steel industry has slowed due to inconsistencies in emission data collected from various plants ategory": "Culture", "page": 10, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 10, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "Psychologists warn against the ‘illusion of explanatory depth’ online", "summary": "Psychotherapists are noting a rise in misinformed confidence as users assume expertise after consuming short-form content. This cognitive shortcut, known as the illusion of explanatory depth, can lead to communication breakdowns in personal relationships. Experts advocate for intellectual humility and curiosity to maintain healthy social bonds.", "category": "Health", "page": 3, "importance": 4, "telegram_url": "https://t.me/c/1877410077/117677", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_21-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117677"}]}, {"headline": "New drug approved for treatment of rare disease", "summary": "A new drug has been approved for the treatment of a rare genetic disorder, offering hope to patients. The approval follows successful clinical trials.", "category": "Health", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "WHO concerned about rise in respiratory illnesses", "summary": "The World Health Organization (WHO) has expressed concern over the rise in respiratory illnesses globally. Public health advisories are being issued to prevent further spread.", "category": "Health", "page": 3, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 3, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "Pharmaceutical comp ry": "Telemedicine services are expanding rapidly, providing remote healthcare access. This technology is crucial for improving healthcare delivery, especially in rural areas.", "category": "Health", "page": 22, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 22, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "New vaccine for tropical disease in trials", "summary": "A new vaccine for a prevalent tropical disease is undergoing clinical trials. Positive results could offer a breakthrough in disease control.", "category": "Health", "page": 23, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 23, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "New medical treatments emerging", "summary": "Emerging medical treatments are offering new hope for various diseases. Advancements in gene therapy and personalized medicine are significant.", "category": "Health", "page": 25, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 25, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "AI in healthcare improves patient outcomes", "summary": "Artificial intelligence in healthcare is improving patient outcomes through advanced diagnostics and personalized treatment plans. Its role in medical research is growing.", "category": "Health", "page": 26, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 26, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "वजन घटाने का सस्ता उपाय पड़ सकता है महंगा: विशेषज्ञ", "summary": "विशेषज्ञ वजन घटाने वाली दवा सेमाग्लूटाइड के दुरुपयोग को लेकर चिंतित हैं। सोशल मीडिया प्रचार और जेनेरिक संस्करणों की उम्मीद से स्वस्थ लोग भी इसे खरीद रहे हैं, जिससे गंभीर दुष्प्रभाव हो सकते हैं। डॉक्टरों ने चेतावनी दी कि यह सिर्फ वजन घटाने की दवा नहीं, बल्कि हृदय, यकृत और मेटाबॉलिक स्वास्थ्य से जुड़ी बीमारियों के लिए है।", "category": "Health", "page": 1, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117673", "sources": [{"newspaper": "Business Standard", "pdf_filename": "BS_Delhi_H_21-03-2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117673"}]}, {"headline": "Generic semaglutide to launch, 80% cheaper than Ozempic", "summary": "Natco Pharma, Glenmark, and Eris Lifesciences are launching generic semaglutide for Type-2 diabetes, priced over 80% lower than Novo Nordisk’s Ozempic. This follows the patent expiry. Natco's vials are ₹1,290/month, pens ₹4,000. Doctors caution against indiscriminate use due to potential side effects and need for patient education.", "category": "Health", "page": 1, "importance": 8, "telegram_url": "https://t.me/c/1877410077/117690", "sources": [{"newspaper": "The Hindu", "pdf_filename": "TH BL HD Bangalore 21~03~2026.pdf", "page": 1, "telegram_url": "https://t.me/c/1877410077/117690"}]}, {"headline": "Natco and Eris to Launch Generic Slimming Shots in India", "summary": "Natco Pharma and Eris Lifesciences are set to launch generic versions of semaglutide, a popular weight-loss drug, in India. The launches will include both vial and pen formats. This follows the patent expiry of Novo Nordisk's blockbuster drug. The lower-priced generic versions are expected to retail at Rs 1,290 to Rs 1,750 per month, making the treatment more accessible.", "category": "Health", "page": 9, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 9, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "Manvendra Singh Shekhawat maps 2,000km of Sahyadri mountain trails", "summary": "Hiker Manvendra Singh Shekhawat is documenting ancient trails across the Sahyadri range in Maharashtra to prevent them from being lost to history. The project, HikeX, aims to create a digital database for trekkers and educate the public on wilderness skills. The initiative also seeks to create local livelihood opportunities through eco-tourism.", "category": "Sports", "page": 7, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117677", "sources": [{"newspaper": "Mint", "pdf_filename": "Bengaluru_Mint_21-03-2026.pdf", "page": 7, "telegram_url": "https://t.me/c/1877410077/117677"}]}, {"headline": "LeBron James Sets New Record for Most Regular Season Games", "summary": "NBA superstar LeBron James has played his 1,612th regular-season game, tying Robert Parish for the most appearances in league history. James achieved the feat during the LA Lakers' 134-126 win over the Miami Heat. At 41, James continues to perform at an elite level, scoring 19 points and grabbing 15 rebounds in the milestone game.", "category": "Sports", "page": 11, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "KKR Pacer Harshit Rana Ruled Out of Entire IPL Season", "summary": "Kolkata Knight Riders (KKR) have suffered a major setback as pacer Harshit Rana has been ruled out of the entire IPL 2026 season due to a ligament injury. Rana, who was expected to lead the bowling attack, sustained the injury during a practice session. The team has yet to announce a replacement for the young bowler ahead of their opening match against Sunrisers Hyderabad.", "category": "Sports", "page": 11, "importance": 5, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "Ronnie O’Sullivan Breaks World Record for Highest Snooker Break", "summary": "Seven-time world champion Ronnie O’Sullivan has broken the record for the highest-ever break in professional snooker, scoring 153. The feat was achieved during his win over Jamie Burnett at the World Open in China. O'Sullivan surpassed the previous record of 148, which he had also held, further cementing his status as the greatest player in snooker history.", "category": "Sports", "page": 11, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117684", "sources": [{"newspaper": "Economic Times", "pdf_filename": "ET_Bangalore_21-03-2026.pdf", "page": 11, "telegram_url": "https://t.me/c/1877410077/117684"}]}, {"headline": "New advancements in battery technology", "summary": "Researchers have announced significant advancements in battery technology, promising higher energy density and faster charging. This could revolutionize electric vehicles and renewable energy storage.", "category": "Science", "page": 5, "importance": 7, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 5, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "Space exploration missions advance", "summary": "Global space agencies are advancing ambitious exploration missions, including lunar and Martian exploration. These missions aim to expand scientific understanding and technological capabilities.", "category": "Science", "page": 6, "importance": 6, "telegram_url": "https://t.me/c/1877410077/117662", "sources": [{"newspaper": "Financial Express", "pdf_filename": "FE_Bengaluru_21-03-2026.pdf", "page": 6, "telegram_url": "https://t.me/c/1877410077/117662"}]}, {"headline": "India strengthens space exploration capabilities", "summary": "India is strengthening its capabilities in space exploration with new missions planned. T
